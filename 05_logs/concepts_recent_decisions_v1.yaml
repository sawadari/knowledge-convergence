- date: '2026-03-20'
  theme: 同一 authority tier 内の複数 reviewer / forum の tie-break と veto 競合
  decision: same-tier review conflict を reviewer 序列ではなく approval structure・facet precedence・forum charter・fallback/escalation path により処理する方針を暫定固定し、response semantics と veto strength を整理した
  note: approve / conditional_approve / veto / abstain / silence / timeout の意味論を分け、policy_block・risk_block を outvote 不可の blocking veto、review_block を same-frame remediation 前提の approval_conflict とした。forum verdict は lawful quorum と chair_tiebreak がある場合だけ1 review_unit outcome として数え、timeout は承認ではなく H4 から fallback / escalate へ分岐する方針を採用した。
- date: '2026-03-20'
  theme: sink typing evidence の freshness / self-report / mirrored observation の precedence
  decision: freshness taxonomy を live / grace / stale / invalid の4状態で暫定固定し、mirror lag を effective age に織り込み、self-report を owner binding 系の補助根拠に限定した
  note: claim facet ごとに局所比較を行い、admissibility → integrity → freshness → provenance → externality conservatism → recency の tie-break を採用した。mirrored telemetry は suspected leak や provisional promotion に限定して使い、confirmed leak や sealed 再縮退の override には使わない。DecisionLedger / GraphEngine には freshness_state・mirror_lag_class・override_block_reason などの linkage を追加する方針を採用した。
- date: '2026-03-20'
  theme: shared telemetry / cache / derived preview の sink 分類
  decision: 5軸 vocabulary と class precedence を暫定固定し、shared telemetry=既定 bounded、temporary_cache=既定 sealed、derived_preview=既定 bounded として profile/context override を採用した
  note: sealed/bounded/externalized を queryability・visibility・reuse・automation・TTL の最大軸で判定し、regulated では sealed 例外を狭め、organizational_or_social では human-forwardable な surface を重く見て外部化を早める方針を採用した。single_branch / external_irreversible / policy_sensitive では admissibility cap を別に置き、DecisionLedger / GraphEngine の sink typing record unit を追加した。
- date: '2026-03-20'
  theme: suspected leak と confirmed leak の detector threshold
  decision: suspected / confirmed leak を confidence 単独ではなく detector confidence・corroboration・provenance separation・detector integrity の4軸で切り、sink class / profile / context override ごとの threshold floor を暫定固定した
  note: authoritative_state / public_output / external_commitment / irreversible_resource_lock の各 sink class について suspected / confirmed の base threshold floor を置き、regulated は quarantine を早める lower threshold、organizational_or_social は false positive 抑制の higher threshold を採用した。confirmed は direct reach evidence と direct sink identity を要し、shortcut は authoritative_state / public_output / external_commitment にだけ限定し、irreversible_resource_lock では認めない。shared telemetry / temporary cache / derived preview については provisional sink typing を置き、DecisionLedger / GraphEngine の detector record 単位を拡張した。
- date: '2026-03-20'
  theme: externality budget の ttl / audience / sink cap の数値較正
  decision: isolation externality budget の numeric cap table を regulated / engineering_tradeoff / organizational_or_social の3 profile で暫定固定し、single_branch / external irreversible / policy-sensitive 文脈の stricter override を採用した
  note: sealed_internal と bounded_internal_observable について sink_cap_count、audience_cap_named_humans、artifact_kind_cap_count、ttl、review_due、expiry、purge_due_after_expiry を profile 別に固定し、externalized_nonbinding と authoritative_or_committing は isolation_basis では正当化しない方針を維持した。review_due は期限前の cleanup / revalidation 専用 cap、expiry は quarantine/purge 遷移、single_branch / external irreversible / policy-sensitive では class cap と ttl をさらに切り詰める。
- date: '2026-03-20'
  theme: mapping registry authority の delegated review と SLA
  decision: registry authority tier を central authority / domain authority / delegated reviewer に分け、delegated reviewer を review・template-bound activation・same-identity revalidation・provisional emergency suspend に限定する方針を暫定固定した
  note: cross-domain conversion、global canonical core change、authority/accountability/rollback expectation の再束縛は central authority に留保し、domain authority は domain-local rule の ratification / activation / supersession / final revoke を担う。baseline SLA は delegated review=2営業日、domain ratification=5営業日、central ratification=10営業日、activation/reflection=2営業日、emergency suspend confirmation=1営業日とし、期限超過は predecessor の有無と upper authority path に応じて hold / escalate / false に分岐する。local convention は registry_id・lineage・witness のない慣行として扱い、lawful basis に数えない。
- date: '2026-03-20'
  theme: dominance_only mapping と monotone strengthening の境界
  decision: dominance_only を shared-core coverage の basis から切り離し、monotone strengthening governance を別建てで採用する方針を暫定固定した
  note: 許容対象を safety / monitoring / rollback readiness / evidence gate strengthening に限定し、authority・accountability・rollback expectation・effect_zone を変える action family を禁止した。DecisionLedger には strengthening rule・witness・invariance を、GraphEngine には rule lifecycle と action admitted/rejected event を残す。
- date: '2026-03-20'
  theme: route family の partial-overlap candidate に対する lawful route mapping
  decision: partial-overlap candidate を canonical route core と residual bundle に分け、exact_equivalent / core_equivalent だけを lawful mapped coverage の basis とする方針を暫定固定した
  note: shared-core coverage は、current action の support profile が全 live branch の preserved core に含まれ、residual bundle が affected zone と authority/accountability/rollback expectation を変えないときにだけ lawful mapped basis で主張できる。required facet に ratified mapping がなければ incomparable_coverage、mapping があっても residual に触れれば uncovered とする。DecisionLedger には mapping rule・canonical core・relation kind・validity を、GraphEngine には ratified/activated/revoked/superseded と coverage invalidation を残す。
- date: '2026-03-20'
  theme: shared-core action / intersection-safe action の admissible 条件
  decision: 未解決 plurality / open stakeholder conflict の下でも、shared_core または intersection_safe の coverage_kind を満たす action だけを branch-preserving に許容し、uncovered / incomparable_coverage を分離して扱う方針を暫定固定した
  note: coverage_basis は live candidate / outcome 全体を覆う reflected binding に、isolation_basis は contested binding の外側または shadow/sandbox/rollback-contained な effect zone に限定した。ratified だが未 reflected の outcome は coverage に数えず、branch collapse・external irreversible commitment・policy-sensitive reduction は既定で禁止とした。q_decision は coverage_kind に応じて blocker 化し、DecisionLedger / GraphEngine の記録単位も分離した。
- date: '2026-03-20'
  theme: unresolved plurality から active governance blocker への昇格規則
  decision: unresolved_plurality は保存状態そのものでは blocker とせず、commitment requirement・branch-critical divergence・action coverage 不足・lawful path 状態の交差でだけ active governance blocker へ昇格させる方針を暫定固定した
  note: commitment_mode / plurality_effect_zone / path_status / action_coverage を最小語彙とし、plurality それ自体や候補数だけでは blocker 化しないと整理した。single-branch または bounded authoritative set を現在要求する文脈で、candidate 差分が safety・法規・契約・外部コミット・結果責任・不可逆 resource lock に触れ、intended action が reflected coexistence / scope split / scoped exploration に包まれていないときだけ q_decision を抑制する。same-frame path があれば hold、上位 authority path のみなら escalate、lawful path absent や target invalidated なら false とする。
- date: '2026-03-20'
  theme: canonical unit / baseline registry の共通化
  decision: canonical registry を authority-bound な正規化基盤として暫定固定し、quantity kind・semantic facet・canonical unit・baseline family・comparator profile・sampling window profile・ratified conversion rule を最小核とした
  note: ratified conversion rule が active で scope 内にある場合だけ incomparable_guard の representation mismatch を解消できると整理した。DecisionLedger を normative authority、GraphEngine を versioned persistence owner、GraphBuild/GraphLint を proposal/diagnostic 側に分け、same-frame manual redesign の lawful alignment は既存 registry rule を使う場合に限定した。
- date: '2026-03-20'
  theme: guard_contradiction と same-frame manual redesign path の判定規則
  decision: guard_failure / guard_contradiction / incomparable_guard を切り分け、same-frame manual redesign path を frame-preserving redesign として暫定固定した
  note: guard_failure は admissible set 非空の未充足、guard_contradiction は admissible set 空、incomparable_guard は canonical conversion / baseline / ratified comparison rule 不足と整理した。same-frame manual redesign path は target・V・R・policy を緩めずに admissible set を非空化できる lawful manual redesign とし、存在時は delegated branch を human_approval_required、非存在時は force_escalate または current frame false へ送る方針を採用した。
- date: '2026-03-20'
  theme: 非収束領域の理論化
  decision: 非収束を Hold / false / unresolved_plurality / deliberate_exploration に分け、未収束を failure 一般へ潰さない方針を暫定固定した
  note: unresolved_plurality は institutional incomparability・ratified coexistence・scope split pending などに支えられる co-legitimate alternatives の保存状態、deliberate_exploration は objective / owner / review_window / exit_criteria を持つ探索統制状態と整理した。unknown relation や live conflict はそのまま plurality 扱いせず、delegated auto は branch collapse を正当化しない。
- date: '2026-03-20'
  theme: calibration history の decay window と drift 閾値
  decision: calibrated self-confidence の履歴較正について、stratum の最小軸、time decay、effective sample floor、rollback_success の部分算入、mild / severe drift の閾値を暫定固定した
  note: γ, op, ic, ext, rev, ev_cls, ctx_cls を stratum 最小軸とし、cross-profile の正の流用を禁止した。decay は domain 別 half-life / max window を持ち、verification_pending は成功へ算入せず、policy_version major change・unseen context/evidence class・negative outcome 連続を severe drift とした
- date: '2026-03-20'
  theme: guard cap の ordinal / numeric 較正式
  decision: mixed-domain profile と delegation_scope D の guard facet を ordinal_cap / numeric_guard / set_valued_requirement に正規化し、strictest bound の meet と branch 接続規則を暫定固定した
  note: ordinal cap は最小許容 bound、numeric guard は comparator・unit・baseline 正規化後の meet、required_all は和集合、allowed_set は積集合を採用した。guard meet の結果は eligible / guard_failure / guard_contradiction / incomparable_guard に正規化し、branch-critical / regulated trigger / external commitment を含む incomparable_guard は force_escalate 側へ寄せた
- date: '2026-03-20'
  theme: auto_rollback の完了保証と rollback failure 時の分岐
  decision: auto_rollback 完了を rollback_target への lawful restoration と verification evidence の充足で判定し、rollback_success / verification_pending / partial_rollback / rollback_fail を暫定固定した
  note: verification_pending は成功扱いせず、partial_rollback と rollback_fail は既定で force_escalate とした。regulated / engineering_tradeoff / organizational_or_social ごとに completion 条件と escalation 境界を分けた
- date: '2026-03-20'
  theme: self-confidence の較正と confidence_floor の設定
  decision: calibrated self-confidence を raw self-report から切り離し、required_evidence・freshness・conflict・decision context・rollback readiness・過去実績から保守的に較正する統治用信号として暫定固定した
  note: confidence_floor は domain profile ごとの base floor と operation/impact/externality/reversibility による uplift で管理し、cold start・drift・critical disputed evidence では delegated auto を止める方針を採用した
- date: '2026-03-19'
  theme: 収束の候補定義の比較
  decision: 収束の基礎定義として二層型を暫定採用した
  note: 説明可能化型と判断可能化型を二層モデルの内部要件として再配置した
- date: '2026-03-19'
  theme: Knowledge State の最小構成
  decision: Knowledge State の理論上の最小核を認識層 K_e=(G,C,E)、統治層 K_g=(G,C,E,V,R) として整理した
  note: H は履歴・監査・差戻しを担う運用層として残し、K=(G,C,E,V,R,H) という拡張状態表記は維持した
- date: '2026-03-19'
  theme: 認識収束と統治収束の接続条件
  decision: C_e(K_e) の必須判定項目、K_g への追加条件、Hold(K) の理由付き正当化、AI自己評価と人間承認の境界を暫定整理した
  note: 説明可能性と実行承認のあいだに、価値 V と責任 R を束縛する統治ゲートを置く方針を採用した
- date: '2026-03-19'
  theme: 価値 V と責任 R の表現形式
  decision: V は採択基準・許容リスク・優先関係・棄却条件、R は承認主体・実行主体・結果責任主体・エスカレーション先・委任範囲を最小語彙とし、制御語彙を基底に置く多層表現を暫定採用した
  note: 自然言語は説明層、部分順序は優先関係、数値化は補助層として位置づけた
- date: '2026-03-19'
  theme: Knowledge State 各成分の最小単位の厳密化
  decision: 各成分について、存在条件と収束十分条件を分離し、G/C の境界、E の型付き欠落マーカー、V/R/H の最小存在条件とツール割付けを暫定固定した
  note: 存在条件を満たしても収束成立は意味しない方針を明示し、DecisionLedger と GraphLint の責務境界を強化した
- date: '2026-03-19'
  theme: C_e(K_e) の管理可能水準の定量化または半定量化
  decision: Q_e(K_e) を 6 次元の順序尺度として暫定固定し、重大/軽微/許容の分類規則、true/hold/false 分岐条件を採用した
  note: 主要主張未充足は gate 判定で重く扱い、単一総合スコアを主判定器にしない方針を明示した
- date: '2026-03-20'
  theme: Hold(K) の理由語彙と差戻し条件の標準化
  decision: Hold の最小 reason_code を H1〜H6 に固定し、各 code に rollback_target・required_action・reopen_condition・deadline_basis・escalation_condition を必須化した
  note: GraphLint は診断正本、DecisionLedger は hold 運用正本、GraphEngine は状態遷移履歴の正本という責務分割を明示した
- date: '2026-03-20'
  theme: Q_g(K_g) と C_g(K_g) の接続定義
  decision: Q_g(K_g)=(q_decision, q_responsibility) の 0..3 順序尺度、Eval_g(K_g) ∈ {true, hold, false} の branch 条件、DecisionLedger と GraphEngine の判定責務分割を暫定固定した
  note: GC1 を entry gate とし、H3〜H6 を governance hold の理由語彙として用い、GraphEngine は意味判定を持たず履歴確定に専念する方針を明示した
- date: '2026-03-20'
  theme: 事前委任された自動承認範囲の形式化
  decision: delegation_scope D の最小構文を target_scope・guard_conditions・prohibited_conditions・required_evidence・fallback_branch・audit_obligation として暫定固定し、human approval required / conditional auto / auto rollback / force escalate の概念境界を整理した
  note: 事前委任は価値採択主体や結果責任主体の移転を意味せず、DecisionLedger に delegation policy schema を保持する方針を明示した
- date: '2026-03-20'
  theme: V の priority_relation と数値補助の厳密化
  decision: priority_relation から blocks を排除し、dominates / independent / incomparable を最小関係語彙として採用したうえで、numeric_support は veto や未比較性を上書きしない補助層として暫定固定した
  note: 未裁定の stakeholder conflict は V に直接押し込まず、裁定結果だけを V に反映する方針を採用した
- date: '2026-03-20'
  theme: 複数 hold reason の優先順位と集約規則
  decision: Hold は single reason ではなく、primary_reason 1件と secondary_reasons 集合を持つ複合モデルとして暫定固定した
  note: epistemic blocker を entry gate 上で優先し、同一 family 内では root-cause 優先、同順位では H2>H1 / H6>H5>H3>H4 の既定順序を採用した
- date: '2026-03-20'
  theme: typed missing marker の共通語彙化
  decision: 共通語彙の核を absent / pending / external_ref / not_applicable / disputed に固定し、E は evidence_status、V/R は binding_status で受ける方針を暫定採用した
  note: approval_pending / risk_excess / policy_block は marker ではなく統治状態として扱い、legacy の e_missing_* / e_conflicted は正規化対象とした
- date: '2026-03-20'
  theme: priority_relation の領域別語彙較正
  decision: priority_relation の共通 relation 語彙を dominates / independent / incomparable / unknown に固定し、領域差は calibration profile と stakeholder conflict の裁定層で扱う方針を暫定採用した
  note: unknown は未束縛、incomparable は制度的比較禁止、independent は並列評価、dominates は ratified precedence として分離した
- date: '2026-03-20'
  theme: stakeholder conflict の裁定層接続
  decision: live conflict は V の外で adjudication case として保持し、ratified かつ reflected された outcome だけを V に反映する方針を暫定採用した
  note: adjudication case の最小核、open→ratified→reflected の lifecycle、branch-critical open conflict の q_decision / Eval_g への接続境界を整理した
- date: '2026-03-20'
  theme: q_decision / q_responsibility の領域別較正
  decision: Q_g(K_g) の共通下位観点、domain profile ごとの cap rule、score 2/3 条件、cross-check 規則を暫定固定した
  note: regulated_domain / engineering_tradeoff_domain / organizational_or_social_domain で語彙は共有し、適用下位観点と blocker 規則だけを較正する方針を採用した
- date: '2026-03-20'
  theme: 複数承認主体、代理承認、fallback role の正規化
  decision: approval structure を approval_mode・required_approver_condition・proxy_rule・quorum_rule・fallback_role・approval_validity を含む責任構造の最小拡張として暫定固定した
  note: q_responsibility=2 と 3 の境界を approval structure の機械可読性で分け、構造不足は H3、運用中の承認待ちや conflict は H4 へ写像する方針を採用した
- date: '2026-03-20'
  theme: delegation_scope D の guard/prohibition 語彙の標準化
  decision: guard_conditions を cap 判定、prohibited_conditions を categorical blocker として分離し、後者を X_auto / X_esc に分ける方針を暫定固定した
  note: required_evidence の pending / external_ref / freshness 不足は既定では guard failure、critical disputed evidence と lawful exception required は prohibition family に送る方針を採用した
- date: '2026-03-20'
  theme: mixed-domain profile 合成規則
  decision: profile を decision target 全体へ一括適用せず、affected subdimension と delegation facet ごとに applicable profile 集合を求め、score=min・blocker=union・global cap 後適用で合成する方針を暫定固定した
  note: local override は stricter 方向の精密化に限定し、regulated veto・mandatory authority・X_esc・branch-critical cap を緩めない方針を採用した
- date: '2026-03-20'
  theme: disjunctive requirement / route family の meet 演算
  decision: any_of / k_of_n / route family を、local bundle を持つ admissible selection family として暫定固定し、strictest meet は lawful alignment 後の admissible selection の交差で定義する方針を採用した
  note: route family を allowed_set や required_all へ直接還元しない。single-step any_of と identical-universe pure k_of_n だけを special case として還元し、semantic obligation / counting basis / route mapping / exclusivity が揃わない場合は incomparable_guard とする。
- date: '2026-03-20'
  theme: stakeholder conflict の branch-criticality と chained adjudication 規則
  decision: live stakeholder conflict を adjudication layer の governance object とし、branch-criticality の4因子、precedence DAG に基づく chained adjudication、q_decision / Eval_g / tool split への接続を暫定固定した
  note: stakeholder 数や numeric_support を criticality proxy に使わず、frame 定義→hard gate→risk gate→tradeoff の順で head case を処理する方針を採用した
- date: '2026-03-20'
  theme: action coverage basis の expiry / revocation 規則
  decision: basis_status を active / review_due / expired / revoked / superseded / revalidation_pending に整理し、expiry・revocation・supersession・revalidation を basis kind 横断で分離して q_decision と lifecycle event へ接続する方針を採用した
  note: review_due は expiry 後 grace ではなく期限前 cap とし、expired basis の暗黙延長、revoked basis の in-place 再有効化、stale basis を使った external commitment を禁止した。
- date: '2026-03-20'
  theme: shadow / sandbox / branch-local artifact の externality budget と expiry
  decision: shadow / sandbox / branch-local artifact を containment profile として整理し、externality budget を allowed sink set・audience class・artifact kind・ttl・rollback/purge obligation・automation prohibition の束として暫定固定した
  note: externalized_nonbinding と authoritative_or_committing は intersection_safe の isolation_basis に数えず、confirmed leak は isolation_basis を即時 revoked にし、review_due は cleanup / containment だけを許す期限前 cap とした。
- date: '2026-03-20'
  theme: detector integrity class と provenance level の canonical registry
  decision: sink typing と leak detector の共通 registry として、5つの source family、5段階の detector integrity class、4段階の provenance level、claim facet 別 precedence を暫定固定した
  note: human declaration / mirrored telemetry / direct system observation / access-control or routing log / direct reach evidence を区別し、single total order は採用せず、effect realization・route identity・sink typing positive escalation・owner binding の各 facet ごとに precedence を分けた。confirmed leak の integrity floor は sink class ごとに authoritative_state=system_of_record_or_forensic、public_output=standard_observability、external_commitment=control_plane_record、irreversible_resource_lock=system_of_record_or_forensic とした。DecisionLedger / GraphEngine には evidence_source_family・claim_facet・direct_reach_basis などの record linkage を追加した。
- date: '2026-03-20'
  theme: mirror lag estimate と sampling window の統計的同値 rule
  decision: mirror lag estimate を平均遅延ではなく upper-bound freshness parameter として扱い、sampling window equivalence を exact / conservative / provisional / non-equivalent に分けて freshness・suspected judgement・confirmed judgement の admissibility に接続する方針を採用した
  note: duration 一致だけでは window equivalence を認めず、observation_mode・aggregation_operator・alignment_anchor・coverage・missing_data policy を束縛する ratified rule を要求した。outward-risk 側では conservative_equivalent まで許すが、sealed re-entry / closure confirmation では exact_equivalent を要求する。DecisionLedger / GraphEngine には sampling_window_profile_ref・window_equivalence_rule_ref・lag_upper_bound・coverage_ratio・alias_risk_class などを追加する。
- theme: Q_e(K_e) の補助主張側しきい値を領域別にどう較正するか
  decision: 補助主張 cluster の score 2/3 floor、independence rule、systemic promotion 条件を domain profile ごとに暫定固定した
  note: regulated_domain / engineering_tradeoff_domain / organizational_or_social_domain ごとに、q_structure〜q_explain の score2/score3 に必要な cluster role と minimum cluster count を固定し、active primary unresolved 時の cap と context-sensitive claim の active/inactive uplift rule を採用した。
- theme: 根拠強度を q_evidence の内部で扱うか、別次元として外出しするか
  decision: 根拠強度は q_evidence の内部 subfactor として扱い、Q_e(K_e) の第7軸にはしない方針を暫定固定した
  note: coverage / binding / strength_class / origin_diversity を q_evidence 内で評価し、GraphLint 出力には evidence_strength_profile を別欄で出してよいが Q_e 次元は増やさない方針を採用した。
- theme: latent_downstream な hold reason を、いつ active な governance blocker へ昇格させるか
  decision: latent_downstream は relation ではなく activation_state として保持し、promotion trigger で active governance blocker へ昇格させる方針を暫定固定した
  note: GC1 通過、dependency clear、deadline 逼迫、precommit/externality 露出を昇格トリガにし、特に H5/H6 は near_due や external exposure があれば GC1 前でも latent のまま放置しない方針を採用した。
- theme: 複数 hold reason の relation_to_primary を dependency だけで足りるとみなすか、causal/temporal を追加するか
  decision: relation_to_primary を dependency だけに縮退させず、dependency / causal / temporal / independent を分けた共通語彙へ拡張する方針を暫定固定した
  note: derived_from_primary / dependency_precondition / causal_driver / temporal_deadline_precedence / independent_co_blocker の5語彙を採用し、activation_state は別フィールドへ分離した。
- theme: H1〜H6 の下位 subtype をどこまで共通語彙化し、どこから領域拡張に委ねるか
  decision: H1〜H6 の family-level core subtype と domain extension 境界を暫定固定した
  note: 各 H family に4つの core subtype を固定し、領域別の finer typing は parent_core_subtype_ref を持つ extension としてのみ許し、cross-family 付け替えを禁止した。
- theme: linked / bound の正値語彙を present 系へ統一するか、component-specific positive state を維持するか
  decision: linked / bound は literal present へ統一せず、component-specific positive state を authoritative storage に維持する方針を暫定固定した
  note: E は linked、V/R は bound、G/C/H auxiliary は concrete value/ref/digest を positive state とし、generic analytics には derived positive_meta_state=present を返してよいが raw schema に present は保存しない方針を採用した。
- theme: H の補助メタデータに typed missing marker をどこまで許し、どこから invalid event とみなすか
  decision: H の typed missing marker は audit-support auxiliary field に限って許し、core event / replay-critical field では invalid event とする境界を暫定固定した
  note: event_id/timestamp/actor_ref/operation/reason と replay-critical transition field には marker を許さず、supporting_evidence_ref や external_case_ref などの auxiliary field にだけ required metadata 付きで marker を許す方針を採用した。
- theme: organizational_or_social_domain における risk_binding の not_applicable 境界をどう監査可能にするか
  decision: organizational_or_social_domain の risk_binding=not_applicable 境界を effect_zone / reversibility / reviewer / reevaluation trigger 付きの監査パケットで暫定固定した
  note: pure clarification / reversible local analysis / internal option listing に限って not_applicable を許し、reputation・privacy・人員・対外説明・resource commitment・contested risk_tolerance がある場合は risk_binding を active にする方針を採用した。
- theme: score 3 の再利用可能性を profile 間でどうベンチマークするか
  decision: score 3 の profile 間比較は ordinal 直比較ではなく witness packet と portability class で benchmark する方針を暫定固定した
  note: direct_reusable / caveated_reusable / benchmark_only / non_reusable の4クラスを採用し、Q24 は canonical registry cell と suite governance の固定へ切り分けた。
- theme: weighted quorum や議決権重み付けを、approval structure の共通語彙へどこまで含めるか
  decision: weighted quorum は approval structure の core へ最小 tally semantics だけを入れ、weight table や apportionment formula は extension registry へ分離する方針を暫定固定した
  note: counting_basis, threshold_rule, mandatory_role_set, veto/abstention/timeout/tie_break, weighted_tally_profile_ref を core に残し、seat_weight_table_ref や constituency snapshot は extension に逃がす方針を採用した。
- theme: joint approval と joint accountability の衝突を、同一 R でどう分離して追跡するか
  decision: approval leg と accountability leg を別レコードとして保持し、co-accountability は facet partition + residual owner 付きでのみ許す方針を暫定固定した
  note: approval 成立は accountability 移転の代用ではなく、forum verdict / proxy / fallback は approval leg に閉じ、rollback owner / reflection owner を accountability leg に明示する。
- theme: same-frame manual redesign action family の finer typing をどこまで共通語彙化するか
  decision: same-frame manual redesign action family は5つの core family だけを共通語彙化し、domain/tool 固有 subtype は extension registry へ分離する方針を暫定固定した
  note: route substitution、safe envelope、evidence gate strengthening、canonical alignment、rollback/monitoring relayout を core とし、reframe / policy exception / role change は除外した。
- theme: deliberate_exploration の option value と終了条件をどう半定量化するか
  decision: deliberate_exploration は discrimination gain・branch relevance・reuse value・reversibility と cost/risk burn の半定量評価で継続 / bounded 継続 / 終了を判定する方針を暫定固定した
  note: review window, budget cap, risk/authority bound, allowed action の4条件を termination と結び、探索中を先送り一般と切り分けた。
- theme: ordered_fallback と weighted k_of_n を、route family の core ではなく拡張語彙としてどう分離するか
  decision: ordered_fallback と weighted k_of_n は route family core ではなく extension overlay として分離する方針を暫定固定した
  note: core は any_of / k_of_n の離散 selection semantics に留め、ordered chain と weighted threshold は overlay registry に逃がし、approval weighted quorum と混同しない。
- theme: externality budget の ttl / audience / sink cap を profile ごとにどこまで数値較正するか
  decision: externality budget の numeric calibration は 3 profile baseline + stricter-only context override で固定する方針を暫定固定した
  note: sink / audience / artifact kind / review_due / expiry / purge_due_after_expiry を baseline 化し、review_due と expiry を別概念として固定した。
