  note: active/superseded/canary/rolled-back の policy head を lineage segment として扱い、retained witness minimum、replay-ready archive、finality state、targeted reopen、DecisionLedger / GraphEngine / GraphLint / archive object の lineage 管理責務を採用した。
- theme: scheduler migration regression audit / rollback debt settlement / post-migration attestation をどこまで registry 化するか
  decision: scheduler migration の regression audit / rollback debt settlement / post-migration attestation を暫定固定した
  note: regression audit window、rollback debt bucket、attestation packet、insufficient attestation branch、reopen trigger、tool ごとの post-migration 管理責務を採用した。
- theme: scheduler policy promotion / fleet-wide commit / divergence budget closure をどこまで registry 化するか
  decision: scheduler policy promotion / fleet-wide commit / divergence budget closure を暫定固定した
  note: promotion gate、divergence budget、phase mode、closure witness、mixed-mode promotion と rollback 分岐、tool ごとの promotion 管理責務を採用した。
- theme: scheduler rollout canary cohort / exception lane / emergency bypass をどこまで registry 化するか
  decision: rollout 中の canary cohort / exception lane / emergency bypass の境界を暫定固定した
  note: cohort selection unit、mandatory exclusion set、widening condition、exception lane、shadow-mode、emergency bypass の required field と禁止境界、tool ごとの rollout exception 管理責務を採用した。
- theme: scheduler policy rollout / what-if simulation / threshold migration witness をどこまで registry 化するか
  decision: scheduler policy rollout の simulation / canary / migration witness を暫定固定した
  note: what-if simulation の scenario class と input bundle、success/failure witness、canary rollout / dual-policy coexistence、old/new threshold の comparability witness、tool ごとの rollout 管理責務を採用した。
- theme: quota debt remediation / lane rebalancing / backlog-drain plan をどこまで registry 化するか
  decision: quota debt の remediation family と lane rebalancing / backlog-drain plan を暫定固定した
  note: confirmed breach には remediation plan を必須とし、starvation / disclosure / reseal / audit_followup debt ごとに remediation family を分離した。donor/receiver lane、borrow cap、protected floor、expiry、rollback path を束ねた rebalance rule と、waiver を伴う debt forgiveness の例外条件を採用した。
- theme: scheduler fairness breach / auto-throttle activation の confirmation / hysteresis / cooldown-clearance をどこまで registry 化するか
  decision: scheduler breach の確定条件と hysteresis / cooldown-clearance を暫定固定した
  note: nominal / suspected_breach / confirmed_breach / mitigating / cooldown / cleared の状態を導入し、activation threshold と release threshold を分離した。confirmed_breach には sustained window、debt worsening、独立 corroboration のいずれかを要求し、same-source 二重計上を禁止した。
- theme: multi-session scheduler telemetry / fairness SLO / auto-throttle threshold をどこまで registry 化するか
  decision: multi-session scheduler の観測項目と fairness SLO、threshold branch を暫定固定した
  note: lane occupancy・wait time tail・preemption・checkpoint yield gap・debt carry-over・settlement residue age を telemetry の基本集合とし、bounded_wait_p95 / debt_half_life / override_budget_ratio などを SLO に採用した。threshold branch は observe_only / auto_throttle / mandatory_checkpoint_yield / manual_escalation の4段階とした。
- theme: cross-session settlement checkpoint / quota debt carry-over / audit proof bundle をどこまで registry 化するか
  decision: 複数 session の結果を閉じ直す settlement checkpoint と debt carry-over を暫定固定した
  note: settlement checkpoint を append-only bundle とし、starvation / disclosure / reseal / audit followup debt を分離した。partial closure と global clean closure を明確に分け、audit proof bundle を外向け closure の必須条件にした。
- theme: authority-tier 競合下の forced preemption / emergency override / appeal reopen をどこまで registry 化するか
  decision: authority 競合時の override と appeal reopen について、優先権と差戻しの境界を暫定固定した
  note: override_basis・target snapshot・counter-sign notice・restoration path を強制し、emergency override と appeal reopen を分離した。同格 authority 競合では contested surface freeze と remand を既定とした。
- theme: shared archive object / chain family 競合下の witness reservation / packet budget segregation をどこまで registry 化するか
  decision: shared archive object 上の資源予約について、reservation unit と borrow 制約を暫定固定した
  note: witness_set / trace_packet_budget / exact_payload_handle / identity_unseal_slot / revoke_reseal_window の5 reservation unit を導入した。trace-equivalent witness だけを共有可能とし、exact payload・identity unseal・revoke reseal は exclusive か escrow transfer に限定した。
- theme: multi-case legal-hold / nested replay session の quota / priority / starvation avoidance をどこまで registry 化するか
  decision: 複数 replay session の同時実行条件について、lane・優先度・入れ子条件・飢餓回避を暫定固定した
  note: exclusive mutation / bounded parallel read / nested child / observer shadow の4 lane と、life-safety から routine review までの priority class を採用した。nested replay は scope widening 禁止、preemption は freeze witness 必須、timer inheritance は surface ごとの stricter-of rule とした。
- theme: reopened reverse chain の re-compaction / reseal / retention timer resume をどこまで registry 化するか
  decision: reopen / replay / correction 後の reverse chain を閉じ直す readiness 条件と timer rule を暫定固定した
  note: re-compaction readiness を5条件で束ね、reseal を chain manifest / packet set / identity layer / blob custody の4 surface で管理する方針を採用した。timer rule を resume / carry_over / reset / freeze_continue に分け、pre-reopen checkpoint の上書きを禁止した。
- theme: replay-derived finding の correction / supersession / head reactivation をどこまで registry 化するか
  decision: replay-derived finding を correction / supersession / reverse head reactivation / incident escalation に振り分ける境界を暫定固定した
  note: finding class を7群に分け、silent current-basis promotion を禁止した。reverse head reactivation は shadowed-not-invalidated な prior head と replay-traceable lineage を要件とし、supersession には recipient closure evidence を要求する方針を採用した。
- theme: replay audit packet の bounded disclosure / actor-slice redaction をどこまで registry 化するか
  decision: replay audit window 中に出せる packet class と slice visibility の境界を暫定固定した
  note: summary / trace / exact payload / identity-unseal の4 packet class を導入し、actor identity・accountability binding・recipient alias・evidence blob を別 slice として扱う方針を採用した。join barrier と post-use reseal を要求し、packet 横断 stitching による clear identity 再構成を禁止した。
- theme: transition bundle の reverse chain に対する legal-hold reopen / replay audit window をどこまで registry 化するか
  decision: compaction 済み reverse chain に対する legal-hold reopen と replay audit window の境界を暫定固定した
  note: reopen を checkpoint・segment digest・retention attestation を束ねた witness に基づく操作として定義し、current basis と audit basis を分離した。bounded replay と full replay の境界、freeze / stop / reseal の状態、tool ごとの reopen / replay 管理責務を採用した。
- theme: forward/reverse/correction chain の compaction / finality checkpoint / evidence retention をどこまで registry 化するか
  decision: forward / reverse / correction chain の compaction class、replay-equivalence witness、finality checkpoint、evidence retention tier を暫定固定した
  note: compaction を raw chain の削除ではなく checkpoint 追加として扱い、current basis に closure_checkpoint を使うには replay-equivalence witness を要求する方針を採用した。retention tier を chain_core / proof_core / notice_core / downstream_ack_core / full_archive に分け、legal-hold や escalated_gap がある間の finality を禁止する方針を採用した。
- theme: correction notice の downstream propagation / acknowledgment closure / stale notice quarantine をどこまで registry 化するか
  decision: correction notice の downstream propagation について、recipient surface、required acknowledgment、closure class、stale notice quarantine、current basis への接続を暫定固定した
  note: primary / delegated / disclosed downstream / inferred downstream を区別し、closure を exact_closed / bounded_closed / quarantined_stale / escalated_gap / open の5値で扱う方針を採用した。upstream supersession だけで downstream stale notice を閉じず、quarantine を current basis からの隔離状態として明示する方針を採用した。
- theme: reverse continuity bundle の overlapping rollback / cascade rollback / rollback-set normalization をどこまで registry 化するか
  decision: 複数の reverse continuity bundle が重なる場合について、rollback cell の canonical 単位、overlap class、active head、cascade rollback / reverse-of-reverse の admissibility を暫定固定した
  note: rollback cell を forward ref・affected cell・notice surface・authority path・correction generation の束として定義し、authority race や conflicting supersession では automatic head 決定を禁止した。same-surface duplicate だけを idempotent collapse 可能とし、reverse-of-reverse には prior reverse の reopen eligibility と notice duty の可視化を要求する方針を採用した。
- theme: transition bundle の partial rollback / reverse continuity witness と correction notice supersession をどこまで registry 化するか
  decision: partial rollback を reverse continuity bundle の append として扱い、minimum reverse witness、affected partition cell selection mode、correction notice supersession / full re-notice 条件を暫定固定した
  note: forward bundle の削除を禁止したうえで、cell_exact を原則とし、recipient closure / authority rebind の lawful expansion だけを許した。correction notice は widening や coverage 不足や downstream 不明を伴う場合に supersession ではなく full re-notice を要求する方針を採用した。
- date: '2026-03-21'
  theme: merge / split transition bundle における lineage slice partition witness を audit witness charter とどう接続するか
  decision: merge / split transition bundle について、lineage slice partition witness の minimum field set、audit witness packet / central delegation charter / bridge token / archive manifest の binding、notice / correction / rollback duty 分離を暫定固定した
  note: lineage slice partition witness を hard partition axis ごとの canonical cell に固定し、audit witness packet を lawful continuity の一次 witness、charter を authority/duty template、bridge token を narrow continuity binder、archive manifest を immutable rollback/reopen anchor とした。partial rollback は reverse continuity bundle と correction notice bundle を append する方針にした。
- date: '2026-03-21'
  theme: bounded_loss_summary の preserved-statistic set / top-k cap を detector family / profile ごとにどこまで registry 化するか
  decision: duplicate_discard_digest の bounded_loss_summary について、detector family 主導の preserved-statistic registry、cap class、lossless escalation 条件、silent summary drift 検査を暫定固定した
  note: local_convention_detected / confirmed_policy_drift / bias_penalty / flooding_penalty には bounded admissibility を残す一方、suspected_leak / replay_penalty は lossless mandatory とした。さらに protected facet / authority path / export bundle / lawful purpose / retention bucket を hard partition axis とし、top-k summary には omitted tail mass・omitted bucket count・max omitted bucket mass・concentration upper bound を mandatory 化した。
- date: '2026-03-21'
  theme: root_profile / schema_version migration 時の dual-root coexistence window と comparability rule をどこまで registry 化するか
  decision: root_profile / schema_version migration について、dual-root coexistence の use surface 境界、comparison loss class、new issuance freeze / old root freeze、comparability witness、rollback rule を暫定固定した
  note: current_basis は exact_equivalent の shadow dual-current に限って conditional、history_verification は admissible、external_audit_disclosure と bridge_continuity は loss disclosure / bridge token 前提の conditional、replay_benchmark は benchmark linkage 前提の admissible とした。さらに successor 早出し防止の new issuance freeze と predecessor 引きずり防止の old root freeze を分離した。
- date: '2026-03-21'
  theme: central delegation charter extension registry の mixed-version coexistence window と batch migration witness 境界をどこまで registry 化するか
  decision: central delegation charter extension registry について、weighted_quorum・ordered_fallback・jurisdiction_subtype_extension の family ごとに mixed-version coexistence の use surface 境界、predecessor freeze、successor mandatory、dual-validity window、batch migration witness を暫定固定した
  note: new issuance は全 family で freeze 後 predecessor reuse を禁止し、history verification は admissible とした。weighted quorum は open forum / open packet 限定、ordered fallback は active containment continuity 限定、jurisdiction subtype extension は lineage closure 限定で bounded coexistence を許し、batch migration witness に open packet lineage・recipient-visible packet・emergency lane・drift scan・rollback witness を必須化した。
- date: '2026-03-21'
  theme: provisional recipient-visible export の recipient acknowledgment / batch recall evidence 境界をどこまで registry 化するか
  decision: provisional recipient-visible export では、packet class × context ごとに recipient acknowledgment requirement を分け、batch recall evidence を per-recipient coverage と downstream chain を含む completion class で判定する方針を暫定固定した
  note: recipient acknowledgment は authority approval や truth 判定ではなく recipient-side evidence として扱い、send success / open tracking / non-response を completion の代用にしない。complete / bounded_complete / escalated_gap / incomplete の4値を導入し、emergency / external-audit では complete のみ、local / central でも bounded_complete を packet class と override witness によって厳格に制限する方針を採用した。
- date: '2026-03-21'
  theme: measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
  decision: measurement_projection_profile では、raw measurement bundle / comparison-stable projection / registered extension / critical extension の4層を分離し、granularity class、lawful collapse 条件、critical extension 昇格条件を registry 化する方針を暫定固定した
  note: comparison-stable projection の最小核は measurement_projection_profile_ref・measurement_scope_ref・claim_semantics_ref・attested_measurement_digest_ref とし、aggregation / uncertainty / composition / suite / extension family は必要時だけ conditional core として追加する。advisory summary は local 補助に限定し、central / emergency / external-audit の current basis へ昇格させない方針を採用した。
- date: '2026-03-21'
  theme: measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
  decision: measurement_projection_profile では、raw measurement bundle / comparison-stable projection / registered extension / critical extension の4層を分離し、granularity class、lawful collapse 条件、critical extension 昇格条件を registry 化する方針を暫定固定した
  note: comparison-stable projection の最小核は measurement_projection_profile_ref・measurement_scope_ref・claim_semantics_ref・attested_measurement_digest_ref とし、aggregation / uncertainty / composition / suite / extension family は必要時だけ conditional core として追加する。advisory summary は local 補助に限定し、central / emergency / external-audit の current basis へ昇格させない方針を採用した。
- date: '2026-03-21'
  theme: central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  decision: central delegation charter extension registry では、migration・supersession・inheritance を別遷移として registry 化し、alias chain は semantic-equality migration に限定し、successor chain は material change または monotone strengthening を伴う profile successor として扱う方針を暫定固定した
  note: weighted quorum・ordered fallback・jurisdiction subtype extension の各 family ごとに admissible transition 条件を分け、silent weakening / silent fallback / subtype minimum 緩和を禁止した。local / central / emergency / external-audit の各 context では deprecation notice duty、dual-validity window、provisional export / emergency lane への propagation rule を別に持たせる方針を採用した。
- date: '2026-03-21'
  theme: provisional recipient-visible export の contradiction / recall / notice duty をどこまで registry 化するか
  decision: provisional recipient-visible export は current_decision_preview / bounded_preview / emergency_reveal / post_confirm_follow_up の4 packet class に分け、contradiction・rollback・supersession・expiry・reflection completion に応じて revoke / correct / narrow / follow-up notice を registry 化した duty family で扱う方針を暫定固定した
  note: recipient-visible provisional packet は named recipient・explicit provisional label・expiry・notice plan・follow-up owner・predecessor/successor lineage を必須とし、public explanation と irreversible commitment を既定禁止にした。archive / bridge continuity は context と packet class に応じて mandatory 化し、silent replacement / silent expiry / widening correction を禁止する方針を採用した。
- date: '2026-03-21'
  theme: HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  decision: HSM attestation packet / human observer credential では、comparison-stable な projection / digest / registry reference family だけを notation core に残し、algorithm suite policy と extension meaning は extension registry に、raw measurement claim・vendor parameter blob・transcript / screen artifact は raw evidence adjunct に退避する方針を暫定固定した
  note: raw measurement claim は projection profile と semantics ref を伴う digest family に縮約し、algorithm suite は profile ref と strength class に正規化し、extension field は registered / critical extension に限って registry 昇格させる。local / central / emergency / external-audit の context ごとに mandatory / conditional / forbidden を分け、challenge / freshness / replay / post-confirm duty は raw claim や algorithm literal や extension payload で代用しない方針を採用した。
- date: '2026-03-21'
  theme: central delegation charter の weighted quorum / ordered fallback / jurisdiction subtype extension の registry 分離
  decision: central delegation charter では、jurisdiction family・authority family・approval route family・override / escalation family・non-delegable boundary を taxonomy core に残し、weighted quorum・ordered fallback・jurisdiction subtype extension は extension registry として分離する方針を暫定固定した
  note: weighted quorum は collective approval forum の tally policy、ordered fallback は same-or-higher authority への monotone successor chain、jurisdiction subtype extension は family-level minimum を弱めない finer legal / sector overlay として整理した。local / central / emergency / external-audit の各 context で admissibility を分け、auditor の voting seat 化、silent fallback、subtype による family minimum 緩和を禁止した。
- date: '2026-03-21'
  theme: ratified 済みだが未 reflected の裁定結果を provisional binding としてどこまで使うか
  decision: ratified 済みだが未 reflected の裁定結果は authoritative binding に昇格させず、reflection preparation・bounded internal preview・厳格条件付き provisional recipient-visible export に限定して provisional use する方針を暫定固定した
  note: current decision / coverage / route gating / hold release / recipient-visible export の各 use surface を分け、shared_core coverage・head clear・route switch・hold release・public/irreversible export を unreflected outcome だけで正当化しない方針を採用した。recipient-visible provisional export では named recipient、explicit provisional label、expiry、contradiction notice path、archive/bridge continuity、post-reflection follow-up owner を mandatory とした。
- date: '2026-03-21'
  theme: HSM attestation packet / human observer credential の external serialization notation
  decision: HSM attestation packet と human observer credential の external serialization notation では、semantic registry layer・canonical serialization layer・raw vendor evidence layer の三層分離、canonical field family、notation profile registry、challenge / freshness / replay / post-confirm duty の独立 binding rule を採用する方針を暫定固定した
  note: HSM 側は hsm_detached_receipt / hsm_custody_external_bundle / hsm_challenge_emergency_bundle、observer 側は observer_scoped_session_credential / observer_challenge_bound_credential / observer_post_confirm_reviewer_credential を採用した。raw vendor blob や timestamp 単独や packet_digest 単独は canonical admissibility の代用にせず、local / central / emergency / external-audit の context ごとに mandatory / conditional / forbidden profile を分ける方針を採用した。
- date: '2026-03-21'
  theme: central delegation charter の jurisdiction family / authority family taxonomy
  decision: central delegation charter では jurisdiction family・authority family・override / escalation family・non-delegable boundary を canonical taxonomy として固定し、local / central / emergency / external-audit の context ごとに mandatory / conditional / forbidden authority family を分ける方針を暫定固定した
  note: jurisdiction family は same_tenant_same_jurisdiction から sovereign_or_external_audit_overlay までの5群、authority family は domain_execution / domain_review / domain_protected_facet / central_policy / central_exception / emergency_containment の6群を採用した。external auditor は authority family に数えず observer credential lane へ分離し、protected facet の final interpretation、cross-boundary broad reveal、charter issuance / ratification、bridge token の external continuity revoke / reissue、post-confirm 前の public explanation / irreversible commitment を non-delegable boundary として central lane へ固定した。
- date: '2026-03-21'
  theme: probabilistic allocation_witness の calibration strata / scoring rule / risk threshold registry
  decision: probabilistic allocation_witness は、class ごとの calibration strata・scoring rule・evidence window・confidence floor・risk threshold を registry cell として固定し、deterministic current basis を代替させず、freeze / verify_only / triage へつなぐ非対称な diagnostic overlay としてだけ扱う方針を暫定固定した
  note: calibrated_branch_distribution・ambiguous_mapping_posterior・risk_envelope_distribution の3 class を hypothesis universe / calibration profile / scoring rule / evidence window / decision cost profile が一致する場合にだけ比較可能とし、sub_bundle local current・super_bundle coverage では診断補助としてのみ許し、handoff_manifest current・replay / recipient alias / downstream digest continuity では current basis として禁止した。良好な probabilistic score を理由に deterministic mandatory witness の欠落や downgrade block を解除しない方針も採用した。
- date: '2026-03-21'
  theme: allocation_witness の composite unit / derived metric decomposition rule
  decision: allocation_witness の composite unit / derived metric は、family ごとの canonical component へ lawful に分解できる場合にだけ current comparison に入れ、mandatory component 欠落・family collapse・comparison profile 不一致の metric は current basis から除外する方針を暫定固定した
  note: super_bundle coverage、handoff_manifest current、recipient alias / replay export / downstream digest continuity では set-valued component を mandatory とし、sub_bundle local current で quantity conservation と identity binding を同時要求する場合は numeric + set-valued の togetherness を要求し、probabilistic component は diagnostic overlay に限定する方針を採用した。
- date: '2026-03-21'
  theme: handoff manifest の rollback / reopen / replay splice の canonical rule
  decision: handoff manifest の rollback / reopen / replay splice は、archive manifest object を rewrite せず append-only linkage event と active current cell の切替で扱い、local reopen は same-boundary repair に限定し、nonlocal 再接続は replay splice として explicit successor proof と LCA boundary interface を要求する方針を暫定固定した
  note: rollback は mandatory closure 上の current claim を撤回するが archived manifest object の削除や non-dependent sibling への一律 cascade を意味せず、recipient alias / replay export / downstream digest continuity は predecessor/current/successor witness cell の切替に従って再束縛する方針を採用した。
- date: '2026-03-21'
  theme: bundle-of-bundles の recursive nesting / stage DAG constraint の canonical rule
  decision: recursive nesting は、intermediate super_bundle が独自の coverage rule / dependency cut / charter / export boundary を持ち、2層 flattening では current admissibility または lineage boundary を保持できない場合にだけ許す方針を暫定固定した
  note: containment を rooted tree に固定し、child dependency を parent ごとの DAG に限定し、cross-branch dependency は lowest common ancestor の boundary interface を通すこと、child override は parent mandatory rule を弱めない monotone strengthening に限ること、recipient alias / replay export / downstream digest を LCA boundary を越えて自動継承させないことを採用した。
- date: '2026-03-21'
  theme: allocation_witness の numeric / set-valued / probabilistic family の canonical registry
  decision: allocation_witness を numeric・set-valued・probabilistic の3 family に分け、context ごとの mandatory / conditional / forbidden matrix と downgrade barrier を持つ canonical registry として扱う方針を暫定固定した
  note: super-bundle coverage claim、handoff_manifest current、recipient alias / replay export / downstream digest continuity では set-valued witness を mandatory とし、numeric witness は conserved quantity / quota / capacity の補助に限定し、probabilistic witness は calibration profile / scoring rule / evidence window が揃う場合でも freeze / verify_only / risk triage の補助に留め、sole current basis へ昇格させない方針を採用した。
- date: '2026-03-21'
  theme: staged n→m transition の bundle-of-bundles canonical schema
  decision: staged n→m transition は flat な single canonical bundle ではなく、global continuity を束ねる super_bundle、stage-bound な sub_bundle、stage 境界を固定する handoff_manifest の三者で canonical 化する方針を暫定固定した
