  change: Q16-Q20 を反映し、approval/accountability split model、same-frame manual redesign typing、deliberate exploration option value、route family extension boundary、externality budget numeric calibration を追加し、Q16/Q17/Q19/Q20 に対応する stale open point を整理した
- date: '2026-03-22'
  change: Q21-Q24 を反映し、freshness_expiry_registry_model、detector_abuse_anchor_binding_model、joint_change_artifact_contribution_model、replay_benchmark_registry_model を追加して、Q21-Q24 に対応する stale residual open point を整理し、priority_formal_topics を update_operator の fixed 化へ更新した
connection_conditions:
  status: provisional_fixed
  bridge_statement: 認識収束から統治収束への移行は自動昇格ではない。C_e(K_e)=true を満たしたうえで、統治用に束縛された文脈 C_dec、価値・リスク条件 V、責任割当 R が追加されて初めて K_g=(G,C,E,V,R) を構成できる。
  bridge_predicate:
    notation: B(K_e, V, R)
    statement: B(K_e, V, R)=true とは、C_e(K_e)=true であり、かつ統治判断に必要な追加条件が満たされて K_g へ持ち上げ可能であることを指す。
  governance_binding_conditions:
  - id: GB1
    name: 決定対象の明示
    statement: 何を実行・保留・差戻しの対象として判定するのかが C の中で統治用文脈として明示されていること。
  - id: GB2
    name: 採択基準と許容リスクの明示
    statement: 少なくとも1つの採択基準 A、許容リスク条件 L、優先関係 P、棄却条件 X のうち必要部分が V として記述され、どの条件で採択不能になるかが示されていること。
  - id: GB3
    name: 責任割当の明示
    statement: 少なくとも承認主体 Ap または結果責任主体 Ac が R に明示され、必要に応じて実行主体 Ex、エスカレーション Esc、委任範囲 D も区別されていること。
  - id: GB4
    name: 保留・差戻し・エスカレーション条件の明示
    statement: 実行不能時に Hold(K) へ入る条件、差戻し条件、上位承認へのエスカレーション条件が理由付きで定義されていること。
  - id: GB5
    name: 結果影響の分類
    statement: 対象判断が可逆か不可逆か、外部影響を持つか内部限定かが少なくとも粗い分類で記録されていること。
  governance_entry_rule:
    status: provisional_fixed
    statement: Eval_g(K_g) は GC1=C_e(K_e)=true のときだけ評価する。GC1 が未成立なら governance evaluator は開始せず、認識側の Eval_e(K_e) の結果を優先する。
    operational_note: GC1 未成立時、運用記録上の governance_eval_state は not_started とし、governance reason は必要なら latent_downstream として保持する。
  governance_branch_interpretation:
    status: provisional_fixed
    statement: Eval_g(K_g)=true は統治収束が成立したこと、hold は統治 blocker が同一 decision context 内で修復可能なこと、false は同一 decision context での統治修復が不能であることを意味する。
hold_reason_model:
  status: provisional_fixed
  notation: Hold(K, rc, pkt)
  statement: Hold は失敗ではなく、認識収束または統治収束が未成立であることを、正規化 reason_code rc と解消パケット pkt を伴って維持する状態である。
  reason_code_set:
    status: provisional_fixed
    statement: 最小 reason_code は H1〜H6 とし、詳細差分は issue_type や自然言語 explanation に押し下げる。
    codes:
    - id: H1
      code: epistemic_gap
      layer: epistemic
    - id: H2
      code: epistemic_conflict
      layer: epistemic
    - id: H3
      code: governance_unbound
      layer: governance
    - id: H4
      code: approval_pending
      layer: governance
    - id: H5
      code: risk_excess
      layer: governance
    - id: H6
      code: policy_block
      layer: governance
  hold_packet:
    status: provisional_fixed
    notation: pkt = (rollback_target, required_action, reopen_condition, deadline_basis, escalation_condition)
    required_fields:
    - rollback_target
    - required_action
    - reopen_condition
    - deadline_basis
    - escalation_condition
    well_formedness_rule: Hold(K, rc, pkt) が正当なのは、rc ∈ {H1,...,H6} かつ pkt の必須項目が欠けず、origin_ref により根拠追跡できる場合である。
  resolution_table:
    H1:
      rollback_target:
      - GraphBuild
      - source_owner
      - domain_curator
      reopen_condition: GraphLint 再評価で relevant major gap が消え、対応する q_i >= 2 になること
      deadline_basis: evidence_eta or decision_due
      escalation_condition:
      - 期限超過
      - source_owner 不在
      - 再発閾値超過
    H2:
      rollback_target:
      - domain_owner
      - analyst
      - conflict_resolver
      reopen_condition: GraphLint 再評価で relevant major conflict/ambiguity が消えること
      deadline_basis: decision_due or immediate_review
      escalation_condition:
      - 価値衝突へ波及
      - 権限者不在
      - 期限超過
    H3:
      rollback_target:
      - DecisionLedger
      - decision_owner
      - governance_designer
      reopen_condition: GC2〜GC4 に必要な binding が埋まること
      deadline_basis: governance_gate_due
      escalation_condition:
      - owner 不明
      - V/R 衝突
      - 期限超過
    H4:
      rollback_target:
      - approval_authority
      reopen_condition: 必要承認が揃い失効していないこと
      deadline_basis: approval_sla or decision_due
      escalation_condition:
      - SLA 超過
      - 承認主体不在
      - 承認競合
    H5:
      rollback_target:
      - risk_owner
      - approval_authority
      reopen_condition: residual_risk <= risk_tolerance または formal_waiver が記録されること
      deadline_basis: risk_review_due or execution_gate_due
      escalation_condition:
      - critical risk
      - waiver 要求
      - 期限超過
    H6:
      rollback_target:
      - policy_owner
      - compliance_authority
      - legal_or_safety_authority
      reopen_condition: policy_check=pass または valid_exception が記録されること
      deadline_basis: policy_review_window or decision_due
      escalation_condition:
      - 外部影響あり
      - 規制/契約違反恐れ
      - 例外承認要求
  hold_vs_false_rule:
    status: provisional_fixed
    statement: rc が存在しても、同一 decision context 内で reopen_condition を満たしうる場合だけ Hold を返す。repairability が reframe_required または unrecoverable_in_scope、あるいは適法な例外経路が存在しない場合は false または reject/rollback 側へ分岐する。
  release_judgement_model:
    status: provisional_fixed
    statement: 解除判定は reason family ごとの source-of-judgement に委ね、状態遷移の確定記録は GraphEngine が担う。
    rules:
    - H1/H2 の解除候補判定は GraphLint 再評価により与える
    - H3〜H6 の解除候補判定は DecisionLedger の binding, approval, risk, policy 判定により与える
    - GraphEngine は解除可否そのものの意味判定は持たず、解除イベントを H に永続化する
  ownership_split:
    status: provisional_fixed
    GraphLint_authority:
    - epistemic issue の診断正本
    - q_e と trace_path の正本
    - H1/H2 の候補 rc 生成
    DecisionLedger_authority:
    - Hold case の運用正本
    - rollback_target, deadline_basis, escalation_condition, approvals の正本
    - H3〜H6 の候補 rc 生成と解除候補判定
    GraphEngine_authority:
    - hold_entered, hold_updated, hold_rebased, hold_cleared の履歴イベント正本
    - K_e/K_g/K_full の状態遷移整合
  aggregated_reason_model:
    status: provisional_fixed
    notation: HR = (rc_p, RC_s, Rel)
    statement: Hold の理由表現は、primary reason rc_p と secondary reasons 集合 RC_s、および各 secondary と primary の関係 Rel から成る。
    components:
      primary_reason:
        required_fields:
        - reason_code
        - origin_layer
        - origin_ref
        - source_of_judgement
        meaning: 再開順序、代表通知、代表SLAを与える主 blocker
      secondary_reasons:
        required_fields:
        - reason_code
        - origin_layer
        - origin_ref
        - relation_to_primary
        - activation_state
        - source_of_judgement
        meaning: 独立 co-blocker、従属 blocker、causal/temporal 先行 blocker を、active または latent_downstream の activation_state 付きで保持する集合
      relation_to_primary_vocab:
      - derived_from_primary
      - dependency_precondition
      - causal_driver
      - temporal_deadline_precedence
      - independent_co_blocker
      activation_state_vocab:
      - active
      - latent_downstream
    well_formedness_rules:
    - active reason が1件以上あるとき primary_reason は必須
    - secondary_reasons は reason_code が primary_reason と同一でもよいが、origin_ref により別 issue として区別する
    - activation_state=latent_downstream は rc∈{H3,H4,H5,H6} かつ GC1 未成立または governance facet 未適用のときだけ許す
    - relation_to_primary=temporal_deadline_precedence を使う場合は secondary deadline と primary repair ETA の比較根拠を持たなければならない
    - hold cleared には active reason 集合が空であることを要し、primary_reason の解消だけでは足りない
  priority_selection_model:
    status: provisional_fixed
    statement: primary_reason の選定は、entry gate 優先、root-cause 優先、impact/lawfulness 優先、既定順序の4段で行う。
    selection_order:
    - 'entry_gate_precedence: H1/H2 が active なら rc_p 候補は epistemic family から選ぶ'
    - 'dependency_root_cause: 他 reason の reopen_condition や required_action の前提になる reason を rc_p とする'
    - 'impact_lawfulness: root cause が複数並ぶ場合は高 impact / 強 lawful constraint を優先する'
    - 'default_tie_break: 同点時は epistemic で H2 > H1、governance で H6 > H5 > H3 > H4'
    dependency_rules:
    - H2 は、主要曖昧性や意味衝突の解消が gap 補完の前提である場合に H1 より先行する
    - H6 は、適法な例外経路なしに branch が禁止される場合に H5/H4/H3 より先行する
    - H5 は、risk_tolerance 超過の解消または formal waiver が approval 有効化の前提である場合に H4 より先行する
    - H3 は、approval path や responsibility binding 自体が未束縛である場合に H4 より先行する
    - secondary reason が temporal_deadline_precedence を持ち、deadline が primary repair ETA より先行する場合は primary_reason 再選定候補に昇格してよい
  hold_transition_events:
    status: provisional_fixed
    statement: GraphEngine は複合 hold の active reason 集合の変化をイベントとして永続化する。
    events:
      hold_entered: active reason 集合が空から非空になった
      hold_updated: secondary_reasons が増減したが primary_reason は維持された
      hold_rebased: primary_reason が解除され、残存 secondary reason から新 primary_reason が選ばれた
      hold_cleared: active reason 集合が空になった
    boundary_rule: GraphEngine は event を確定記録するが、primary_reason の意味選定自体は GraphLint と DecisionLedger の結果に依存する
v_r_representation:
  status: provisional_fixed
  core_proposition: V と R は、制御語彙を基底に、優先関係は部分順序、閾値や局所比較は数値補助、監査説明は自然言語で重ねる多層表現を採用する。
  representation_comparison:
    natural_language:
      strength:
      - 説明性が高い
      - 監査理由を残しやすい
      - 人間合意形成に向く
      weakness:
      - 曖昧で機械判定しにくい
      - 同義語揺れが発生しやすい
      position: 説明層として採用
    controlled_vocabulary:
      strength:
      - 機械可読性が高い
      - 判定器とログが安定する
      - ツール間接続に向く
      weakness:
      - 語彙設計が必要
      - 表現力が粗くなりやすい
      position: 基底表現として採用
    partial_order:
      strength:
      - 優先関係と未比較性を保持できる
      - 価値衝突を潰さずに残せる
      weakness:
      - 演算規則が直感的でない場合がある
      position: priority_relation の表現として採用
    numeric:
      strength:
      - 閾値判定や局所比較に強い
      - 自動化しやすい
      weakness:
      - 擬似精密化が起きやすい
      - 禁止条件や制度制約を潰しやすい
      position: 補助層として限定採用
  adopted_design_rules:
  - 自然言語を主判定器にしない
  - 単一総合スコアを唯一の採択規則にしない
  - 制御語彙 id と自然言語説明を必ず対応付ける
  - 優先関係は全順序を強制せず、未比較を許す
  priority_relation_formalization:
    status: provisional_fixed
    notation: P = (P_dom, P_indep, P_inc)
    statement: priority_relation は total order ではなく、dominance・independence・incomparability を分けて表す。veto 的禁止は X に属し、P へ混在させない。
    components:
      P_dom: criterion 集合 A 上の strict partial order。P_dom ⊆ A×A。
      P_indep: 優先順位ではなく独立評価であることを表す対称関係。P_indep ⊆ {{a,b} | a,b ∈ A, a≠b}。
      P_inc: 自動比較を許さない未比較関係。P_inc ⊆ {{a,b} | a,b ∈ A, a≠b}。
    well_formedness_rules:
    - P_dom は irreflexive, asymmetric, transitive でなければならない
    - P_indep と P_inc は symmetric であり、同一 pair に対して同時成立させない
    - P_dom(a,b) と P_dom(b,a) が同時成立してはならない
    - blocks は P に置かず X(veto_conditions) に置く
    - pair 未記述は independent / incomparable ではなく unknown relation として扱う
    minimal_operations:
    - 'dominance_closure: P_dom の推移閉包を計算する'
    - 'cycle_detection: dominance cycle を検出して invalid とする'
    - 'comparability_query: pair が dominates / independent / incomparable / unknown のどれかを返す'
    - 'veto_precheck: X を先に評価して admissible set を絞る'
    - 'admissible_comparison: veto 除外後の比較可能集合だけに P と numeric_support を適用する'
    relation_vocab_critique:
      dominates: 採用。tradeoff 時の優先関係を表すために必要。
      blocks: P では不採用。絶対禁止や採択不能条件は X の責務であり、優先関係と混ぜると部分順序が壊れる。
      independent: 採用。未記述や未比較と区別しないと、独立評価可能な pair と未整理 pair が混線する。
      incomparable: 採用。未裁定の価値衝突を保存し、自動順位付け禁止を明示するために必要。
  numeric_support_constraints:
    status: provisional_fixed
    statement: numeric_support は V の補助層であり、veto・must constraint・未比較性・未裁定 stakeholder conflict を上書きできない。
    allowed_uses:
    - criterion 単位の threshold / range / delta 判定
    - 同一 comparability class 内の local tie-break
    - risk / cost / performance / capacity の evidence-backed estimate
    - priority_relation が既に束縛された後の補助説明
    forbidden_uses:
    - X を無視して execute を選ぶこと
    - P_inc を total score で潰すこと
    - P が unknown の pair を重み付き平均で自動比較すること
    - 未裁定 stakeholder conflict を numeric aggregation だけで解消済みとみなすこと
    - must や policy block を preference score に落とすこと
    decision_order:
    - 1. veto_conditions X を評価する
    - 2. must / mandatory criteria を評価する
    - 3. P により pair の比較可能性を判定する
    - 4. comparable な領域に限って numeric_support を適用する
    - 5. unresolved incomparability または stakeholder conflict が残る場合は hold / escalate を返す
  priority_relation_domain_calibration:
    status: provisional_fixed
    statement: priority_relation の形式化では、relation の意味論と pair の適用可能性を分ける。relation の query state は共通語彙で固定し、domain_profile がどの pair にどの state を許すかを規定する。
    query_contract:
      states:
      - dominates
      - independent
      - incomparable
      - unknown
      default_for_unspecified_pair: unknown
      state_meaning:
        dominates: ratified な strict precedence が存在する
        independent: parallel check 対象であり precedence を持たない
        incomparable: 制度的に自動比較禁止であり human_adjudication が必要
        unknown: relation 未束縛または未モデリング
    domain_profile_axes:
      criterion_domain:
      - regulatory_or_safety
      - contractual
      - performance
      - cost_or_schedule
      - operability
      - strategic_or_business
      - ethical_or_reputational
      comparison_mode:
      - hard_gate
      - local_tradeoff
      - parallel_check
      - human_adjudication
      numeric_eligibility:
      - not_allowed
      - criterion_local_only
      - comparable_set_only
      adjudication_mode:
      - pre_ratified_rule
      - approval_authority
      - policy_owner
      - human_panel
    pair_assignment_rules:
    - hard_gate な criterion は P ではなく X または kind=must で扱う。
    - comparison_mode=parallel_check の pair は P_indep 候補である。
    - comparison_mode=human_adjudication の pair は、制度的禁止が明示されていれば P_inc、未設計なら unknown とする。
    - local_tradeoff を許す pair にだけ P_dom と numeric_support の連携を許す。
    prohibited_confusions:
    - unknown != independent
    - unknown != incomparable
    - dominates != veto
    - independent != weighted_sum_allowed
    - incomparable != missing_data
    decision_order_refinement:
    - 1. X(veto_conditions) を評価する
    - 2. must criteria を評価する
    - 3. pair ごとに relation query を行う
    - 4. unknown が branch-critical pair に残る場合は H3 または adjudication pending とする
    - 5. independent pair は parallel check とし、criterion-local numeric_support だけを許す
    - 6. incomparable pair は hold または escalate とし、numeric aggregation を禁止する
    - 7. dominates が定義された comparable set に限って local tie-break を許す
decision_ledger_minimal_schema:
  status: provisional_fixed
  statement: DecisionLedger に接続する最小スキーマ案。複合 hold を扱うため、decision_outcome には entry gate 状態、primary_reason、secondary_reasons を保持する。
  schema:
    decision_context:
      target: 判定対象 id
      alternatives:
      - 案 id
      decision_time: 判定時点
      scope: 対象範囲
    V:
      criteria:
      - id: criterion_id
        kind: must|tradeoff|preference
        description: 自然言語説明
      risk_tolerance:
        level: low|medium|high|critical など
        description: 自然言語説明
      priority_relation:
        dominance_edges:
        - higher: criterion_id
          lower: criterion_id
          rationale_ref: evidence_ref or policy_ref
        independence_pairs:
        - left: criterion_id
          right: criterion_id
          rationale_ref: evidence_ref or policy_ref
        incomparability_pairs:
        - left: criterion_id
          right: criterion_id
          reason: unresolved_value_conflict|policy_open|needs_human_adjudication
        normalization_rules:
        - blocks を priority_relation に入れない
        - veto は veto_conditions に置く
        - pair 未記述は unknown/unbound を意味する
        - dominance cycle は invalid
        query_contract:
          states:
          - dominates
          - independent
          - incomparable
          - unknown
          default_unspecified_pair: unknown
          unknown_requires_branch_guard: true
        domain_profile_ref: priority_profile_id
        reflection_rule: 未裁定の stakeholder conflict は conflict_case 側で保持し、ratified outcome だけを priority_relation / veto_conditions / risk_tolerance へ反映する
      veto_conditions:
      - id: veto_id
        description: 違反時は採択不能
      numeric_support:
      - support_id: numeric_support_id
        target_ref: decision target id or alternative id
        criterion_id: criterion_id
        metric: metric_name
        comparator: <=|>=|range|delta|rank
        direction: minimize|maximize|target_range
        value_ref: observed_value or estimate_ref
        threshold: optional
        usage_mode: threshold_check|local_tiebreak|risk_estimate|capacity_estimate
        evidence_ref: evidence_ref
        non_override_guards:
        - cannot_override_veto
        - cannot_resolve_incomparability
        - cannot_replace_missing_priority_relation
        - cannot_settle_live_stakeholder_conflict
      decision_policy:
      - veto_conditions を先に評価する
      - must criteria を soft score に落とさない
      - priority_relation query で dominates / independent / incomparable / unknown を判定する
      - unknown が branch-critical pair に残る場合は hold or escalate を優先する
      - independent pair は parallel check とし、numeric_support は criterion-local use に限定する
      - numeric_support は admissible かつ comparable な範囲でのみ使う
      - incomparability または未裁定 stakeholder conflict が残る場合は hold or escalate を優先する
      - branch-critical な open conflict case が残る場合は hold or escalate を優先し、ratified 済みでも reflected 前は true を返さない
    R:
      approval_authority:
        mode: single|all_of|any_of|quorum|forum
        approver_set:
        - role_id
        required_approver_condition:
          kind: single|all_of|any_of|k_of_n|forum_rule
          required_count: integer or formula
          mandatory_roles:
          - role_id
        proxy_rules:
        - principal_role_id: role_id
          proxy_role_id: role_id
          activation_condition: unavailable|vacancy|sla_breach|delegated_window
          scope_limit: decision target or branch scope
          validity_ref: policy_ref|validity_id
        quorum_rule:
          eligible_roles:
          - role_id
          threshold: integer or formula
          dissent_policy: record_only|blocks|escalate
        fallback_roles:
        - activates_when: unavailable|vacancy|expiry|quorum_unmet|sla_breach
          role_id: role_id
          scope_limit: decision target or branch scope
        validity:
          valid_from: datetime
          valid_until: datetime or policy event
          invalidated_by:
          - context_change|policy_change|evidence_change|time_expiry
          renewal_condition: policy_ref|rule_ref
        segregation_of_duties:
          incompatible_role_pairs:
          - - role_id
            - role_id
      execution_actor:
      - role_id|agent_id
      outcome_accountability:
      - role_id
      escalation_rules:
      - when: risk_excess|value_conflict|policy_block など
        to: role_id
      delegation_scope:
        policy_id: delegation_policy_id
        target_scope:
          target_ref: decision target id
          operation_class: create|update|approve_candidate|rollback など
          scope: 適用範囲
          time_window: 有効期間または判定時点境界
        guard_conditions:
          impact_cap: low|medium|high|critical
          reversibility_cap: reversible|partially_reversible|irreversible
          externality_cap: internal_only|bounded_external|external_allowed
          policy_risk_cap: low|medium|high|critical
          confidence_floor: ordinal or numeric
          freshness_rule_ref: policy_ref|rule_ref
          rollback_required: true|false
          required_post_checks:
          - check_id
        prohibited_conditions:
          auto_block:
          - code: non_delegable_operation|live_branch_critical_conflict|disputed_critical_evidence|external_irreversible_commitment|public_commitment_or_role_change
            applies_when: condition
            rationale_ref: policy_ref|rule_ref
          escalate_required:
          - code: out_of_scope|lawful_exception_required|authority_or_accountability_missing|decision_context_invalidated|rollback_path_absent_when_mandatory
            applies_when: condition
            rationale_ref: policy_ref|rule_ref
          precedence_rule: X_esc > X_auto > guard_failure
        required_evidence:
          all_of:
          - evidence_ref or evidence_status
          freshness_rule_ref: policy_ref|rule_ref
          external_ref_policy: allowed_with_freshness|manual_review_required|not_allowed
          missing_evidence_branch: human_approval_required|force_escalate
          disputed_evidence_branch: human_approval_required|force_escalate
        fallback_branch:
          out_of_scope: force_escalate
          auto_block: human_approval_required|force_escalate
          required_evidence_missing: human_approval_required|force_escalate
          approval_invalid: human_approval_required|force_escalate
          decision_context_invalidated: force_escalate
          post_check_fail: auto_rollback|force_escalate
          rollback_fail: force_escalate
        rollback_control:
          rollback_owner: role_id|agent_id
          rollback_target_ref: baseline_ref|state_ref|snapshot_ref
          rollback_plan_ref: rollback_plan_id|inverse_op_set_ref
          completion_criteria_ref: policy_ref|rule_ref
          verification_requirements:
          - check_id|evidence_ref
          pending_window: duration|sla_ref
          verification_pending_branch: auto_rollback|force_escalate
          partial_rollback_branch: force_escalate
          rollback_fail_branch: force_escalate
          external_verification_required_when:
          - regulated_binding_affected
          - released_artifact_affected
          - external_commitment_touched
        audit_obligation:
          log_level: summary|full
          trace_required: true
          rationale_required: true
          review_window: duration or SLA ref
        validity:
          valid_from: datetime
          valid_until: datetime or policy event
      approval_policy:
      - 複数承認主体を使う場合、approval_authority.mode と required_approver_condition を必須にする
      - proxy は principal_role_id と activation_condition を持つ lawful proxy だけを有効とする
      - quorum_rule は mandatory_roles と segregation_of_duties を上書きしてはならない
      - fallback_roles の発動は承認成立そのものではなく、fallback 承認経路の開始を意味する
      - expired または invalidated な approval は成立数へ算入しない
    decision_outcome:
      epistemic_eval_state: true|hold|false
      governance_entry_state: blocked_by_epistemic|eligible
      governance_eval_state: not_started|true|hold|false
      branch: execute|hold|rollback|reject|escalate
      primary_reason:
        reason_code: H1|H2|H3|H4|H5|H6
        origin_ref: issue_id|decision_id|policy_ref
        source_of_judgement: GraphLint|DecisionLedger
      secondary_reasons:
      - reason_code: H1|H2|H3|H4|H5|H6
        origin_ref: issue_id|decision_id|policy_ref
        relation_to_primary: derived_from_primary|independent_co_blocker|latent_downstream
        source_of_judgement: GraphLint|DecisionLedger
      rationale: 自然言語説明
    adjudication:
      conflict_cases:
      - case_id: conflict_case_id
        decision_target_ref: target_ref
        contested_binding:
          binding_kind: priority_relation|veto_condition|risk_tolerance|scope|policy_interpretation
          criterion_refs:
          - criterion_id
        stakeholders:
        - role_id
        criticality: branch_critical|non_branch_critical
        lifecycle_state: open|ratified|reflected|rejected|superseded
        required_authority: role_id|institution_id
        allowed_outcomes:
        - relation_update|veto_update|risk_tolerance_update|scope_split|reject_change
        chosen_outcome: optional until ratified
        reflection_ops:
        - op_ref or payload_ref
      adjudication_policy:
      - branch-critical な open conflict case が残る間は governance_state=true を返さない
      - ratified と reflected を分離し、V の authoritative update は reflected 後だけ有効とする
      - open conflict を numeric_support だけで解消済みとみなさない
epistemic_manageability_model:
  status: provisional_fixed
  statement: 認識収束の管理可能水準は、issue の影響区分、管理状態、修復可能性、および Q_e(K_e) の gate 条件によって半定量的に判定する。
  issue_schema:
    fields:
    - issue_id
    - check_id
    - issue_type
    - claim_refs
    - impact_class
    - management_status
    - repairability
    - reason_code
    - explanation
    - next_action
    field_meanings:
      impact_class: major | minor | allowable
      management_status: managed | unmanaged
      repairability: repairable_in_frame | reframe_required | unrecoverable_in_scope
  severity_classification_rules:
    contradiction:
      major:
      - 同一文脈下で主要主張どうしが同時に成立不能である
      - 矛盾が execute/hold/reject の分岐結果を反転させる
      - 安全・法規・契約・対外約束に関わる主張の矛盾である
      - 根本主張または複数下位主張に広く波及する
      minor:
      - 補助主張間の局所矛盾であり、主要判断を直ちには変えない
      - 粒度差や表現差に起因し、局所修正で隔離できる
      allowable:
      - 代替案やシナリオ分岐として明示的に分離されている
      - 時間版・バージョン違いとして文脈 C によって切り分け済みである
    evidence_gap:
      major:
      - 主要主張に evidence_ref も正当化された evidence_status もない
      - 安全・法規・契約上必須の主張に根拠欠落がある
      - 根拠が disputed であり代替根拠もない
      minor:
      - 補助主張の直接根拠が未取得だが、上位根拠や近接根拠で暫定支持できる
      - pending または external_ref であり、取得経路と期限がある
      allowable:
      - 探索仮説であり decision target に未接続である
      - not_applicable が正当化されている
    ambiguity:
      major:
      - 主要語・閾値・対象範囲・時間条件の解釈差で真理条件または分岐結果が変わる
      - 主語、対象物、制約適用先が主要主張で一意に定まらない
      minor:
      - 自然言語表現は揺れているが、canonical id や relation により意味が固定できる
      - 補助説明文の曖昧さであり主要分岐を変えない
      allowable:
      - 同義表現が辞書・語彙表で正規化済みである
      - 機械判定に影響しない文体差である
    explanation_path_gap:
      major:
      - 主要主張について claim→context→evidence→constraint の経路が切れている
      - どの根拠と文脈でその主張が成立するか説明できない
      minor:
      - 経路は存在するが補助ノードのメタデータが一部不足している
      - 手動補助があれば追跡可能だが自動提示が不完全である
      allowable:
      - 主要主張の経路は全て提示可能で、補助主張の一部だけ自動説明が弱い
  branch_model:
    notation: Eval_e(K_e) ∈ {true, hold, false}
    true_condition:
    - P_G(K)=true, P_C(K)=true, P_E(K)=true
    - Q_e(K_e) の全次元が 2 以上
    - major かつ unmanaged の contradiction / evidence_gap / ambiguity / explanation_path_gap が存在しない
    - 主要主張に対する構造・文脈・根拠・説明経路の充足率が 1.0
    hold_condition:
    - true_condition を満たさない
    - ただし blocker issue の repairability が全て repairable_in_frame である
    - 各 blocker issue に next_action があり、同一 decision context のまま修復可能である
    false_condition:
    - P_G, P_C, P_E のいずれかが主要主張レベルで成立不能
    - major issue の repairability が reframe_required または unrecoverable_in_scope である
    - 主要主張集合が現行文脈では両立不能で、同一フレーム内修復ではなく問いの再設定を要する
    interpretation_note: Hold は C_e(K_e)=false を理由付きで維持する運用分岐であり、論理値としての false と区別して扱う。
  graphlint_mapping:
    status: provisional_fixed
    pipeline:
    - 'presence_check: P_G, P_C, P_E を判定する'
    - 'issue_extraction: EC1〜EC6 に対して issue を抽出する'
    - 'issue_classification: impact_class, management_status, repairability, reason_code を付与する'
    - 'dimension_scoring: issue 群を q_structure〜q_explain へ写像する'
    - 'branch_decision: true / hold / false を決める'
    - 'report_generation: blocker, hold_reason, next_action, trace_path を返す'
    recommended_output_schema:
      epistemic_state: true|hold|false
      q_e:
        q_structure: 0..3
        q_context: 0..3
        q_evidence: 0..3
        q_conflict: 0..3
        q_ambiguity: 0..3
        q_explain: 0..3
        evidence_strength_profile:
          strength_class: linkable_optional|traceable_supporting|traceable_branch_basis|authority_bound_direct
          required_floor: linkable_optional|traceable_supporting|traceable_branch_basis|authority_bound_direct
          floor_satisfied: true|false
          diversity_score: 0..3
      blocking_issues:
      - issue_id: issue_id
        reason_code: reason_code
        repairability: repairable_in_frame|reframe_required|unrecoverable_in_scope
        next_action: action
      trace_paths:
      - claim_id -> context_id -> evidence_id -> constraint_id
      primary_reason:
        reason_code: H1|H2
        origin_ref: issue_id
        source_of_judgement: GraphLint
      secondary_reasons:
      - reason_code: H1|H2
        origin_ref: issue_id
        relation_to_primary: derived_from_primary|dependency_precondition|causal_driver|temporal_deadline_precedence|independent_co_blocker
        activation_state: active
    implementation_notes:
    - claim criticality 判定には claim_criticality_graphlint_model の claim role / criticality band / activation state を使う
    - q_evidence では coverage / binding / strength_class / origin_diversity の最弱リンクを評価し、evidence_strength_profile は監査用説明変数として返す
    - 補助主張 cluster の domain calibration には auxiliary_support_domain_calibration_model を使う
    - 単一合計点ではなく blocker 優先の gate 判定にする
    - Hold を返す場合は必ず next_action を返す
  open_points:
  - 主要主張 criticality の自動推定と手動指定の境界
governance_manageability_model:
  status: provisional_fixed
  statement: 統治収束の管理可能水準は、GC1〜GC5、Q_g(K_g)、および H3〜H6 を用いて半定量的に判定する。
  entry_rule: GC1=C_e(K_e)=true のときだけ Eval_g(K_g) を評価する。
  issue_schema:
    fields:
    - issue_id
    - check_id
    - issue_type
    - target_refs
    - impact_class
    - management_status
    - repairability
    - reason_code
    - explanation
    - next_action
    field_meanings:
      impact_class: major | minor | allowable
      management_status: managed | unmanaged
      repairability: repairable_in_frame | exception_path_available | reframe_required | unrecoverable_in_scope
  issue_type_families:
  - governance_context_gap
  - value_binding_gap
  - responsibility_binding_gap
  - stakeholder_conflict_pending
  - approval_wait
  - approval_conflict
  - risk_overrun
  - policy_violation
  - delegation_gap
  - escalation_gap
  - branch_undefined
  - approval_structure_gap
  - proxy_invalid
  - quorum_unmet
  - fallback_activation_pending
  severity_classification_rules:
    governance_context_gap:
      major:
      - 主要 decision target の target_ref, scope, decision_time のいずれかが欠落している
      - 代替案集合または branch 対象が不明で、採択対象が定まらない
      minor:
      - 補助 target の alternatives や decision notes が不足しているが主要 branch には直ちに影響しない
    value_binding_gap:
      major:
      - 主要 target に A/L/X が未束縛である
      - risk-bearing decision なのに risk_tolerance がない
      - tradeoff があるのに P がなく、分岐結果が逆転しうる
      minor:
      - numeric_support や stakeholder notes が不足しているが、主要 branch は判定可能
    responsibility_binding_gap:
      major:
      - Ap または Ac が未束縛である
      - AI/agent を Ex に含むのに D がない
      - 高影響判断なのに Esc がない
      minor:
      - consulted/informed や fallback role が不足しているが主要責任連鎖は判定可能
    approval:
      major:
      - required approval が未取得、失効、または衝突しており、高影響 branch を確定できない
      - quorum_unmet または fallback_activation_pending により主要 branch の承認成立が未完了である
      minor:
      - 低影響・内部限定判断で補助承認だけが未了
      - proxy activation は lawful だが、補助承認の記録待ちが残っている
    risk:
      major:
      - residual_risk > risk_tolerance で、mitigation plan も formal_waiver もない
      minor:
      - threshold 近傍だが mitigation plan と review_due がある
    policy:
      major:
      - 法規、契約、外部約束、組織 policy が branch を禁止し、valid_exception もない
      minor:
      - 内部 guideline 逸脱だが例外経路があり、policy owner が特定されている
    stakeholder_conflict_pending:
      major:
      - open adjudication case が branch-critical であり、priority_relation / veto_conditions / risk_tolerance のいずれかが未 reflected のため chosen branch が確定できない
      - stakeholder position の違いにより execute / hold / reject / escalate の結果が反転しうる
      - required authority、adjudication SLA、または lawful adjudication path が欠けている
      minor:
      - open conflict はあるが non-branch-critical であり、chosen branch から隔離されている
      - 補助案や未選択代替案に関する conflict で、decision note と case_ref を残せば主要 branch は維持できる
    approval_structure:
      major:
      - approval_mode または required approver condition が欠落し、主要 branch の成立可否を判定できない
      - proxy_rule が principal を欠く、lawful activation condition を欠く、または non_proxyable branch で proxy を計上している
      - fallback_role が required なのに activation rule も lawful authority もない
      minor:
      - 主要 branch は single approval で成立するが、補助 branch や再利用テンプレート側の proxy/quorum metadata が不足している
  reason_code_mapping:
    H3:
    - governance_context_gap
    - value_binding_gap
    - responsibility_binding_gap
    - delegation_gap
    - escalation_gap
    - branch_undefined
    - stakeholder_conflict_pending
    - approval_structure_gap
    - proxy_invalid
    H4:
    - approval_wait
    - approval_conflict
    - quorum_unmet
    - fallback_activation_pending
    H5:
    - risk_overrun
    H6:
    - policy_violation
  branch_model:
    notation: Eval_g(K_g) ∈ {true, hold, false}
    true_condition:
    - GC1=C_e(K_e)=true
    - P_V(K)=true and P_R(K)=true
    - q_decision >= 2 and q_responsibility >= 2
    - major かつ unmanaged の governance_context_gap / value_binding_gap / responsibility_binding_gap が存在しない
    - required approval が chosen branch に対して有効である
    - residual_risk > risk_tolerance が未解消のまま残っていない、または formal_waiver が有効である
    - policy violation が未解消のまま残っていない、または valid_exception が有効である
    - branch-critical な open stakeholder_conflict_pending が存在せず、必要な裁定結果は reflected 済みである
    hold_condition:
    - true_condition を満たさない
    - ただし blocker issue の reason_code が H3〜H6 に正規化されている
    - 各 blocker issue の repairability が repairable_in_frame または exception_path_available である
    - 各 blocker issue に resolution packet と next_action があり、同一 decision context のまま再開可能である
    - branch-critical な open stakeholder_conflict_pending であっても、required authority と adjudication path があり、同一 decision context のまま ratified / reflected へ進める場合は H3 系 hold 候補になる
    false_condition:
    - GC1 は満たすが、major blocker の repairability が reframe_required または unrecoverable_in_scope である
    - 主要 decision target の差替え、問いの再設定、または責任主体の再設計が必要である
    - 適法な例外経路が存在せず、policy/contract/regulatory block を同一 frame で解消できない
    - approver_unassignable, accountability_unassignable, lawful_exception_absent のいずれかが成立する
    - branch-critical な open stakeholder_conflict_pending があり、required authority 不在、lawful adjudication path 不在、または chosen branch を同一 frame で確定できない場合は false 側へ分岐する
    interpretation_note: true は統治収束成立、hold は統治不足の理由付き保留、false は同一 decision context での統治修復不能を意味する。
  decision_ledger_mapping:
    pipeline:
    - 'presence_check: P_V, P_R と decision_context の存在を判定する'
    - 'issue_extraction: GC2〜GC5 に対して governance issue を抽出する'
    - 'issue_classification: impact_class, management_status, repairability, reason_code を付与する'
    - 'dimension_scoring: issue 群を q_decision, q_responsibility へ写像する'
    - 'branch_decision: true / hold / false を決める'
    - 'outcome_binding: chosen branch, approvals, rationale, hold packet を decision record に束縛する'
    recommended_output_schema:
      governance_state: true|hold|false
      q_g:
        q_decision: 0..3
        q_responsibility: 0..3
      blocking_issues:
      - issue_id: issue_id
        reason_code: H3|H4|H5|H6
        repairability: repairable_in_frame|exception_path_available|reframe_required|unrecoverable_in_scope
        next_action: action
      decision_outcome_candidate: execute|hold|rollback|reject|escalate
      primary_reason:
        reason_code: H3|H4|H5|H6
        origin_ref: issue_id
        source_of_judgement: DecisionLedger
      secondary_reasons:
      - reason_code: H3|H4|H5|H6
        origin_ref: issue_id
        relation_to_primary: derived_from_primary|dependency_precondition|causal_driver|temporal_deadline_precedence|independent_co_blocker
        activation_state: active|latent_downstream
  graphengine_boundary:
    statement: GraphEngine は Eval_g の意味判定を持たず、DecisionLedger が返した governance_state と decision_outcome を履歴イベントへ確定記録する。
  open_points:
  - 複数承認主体や共同責任の衝突解消規則
  - reject と rollback の語彙境界
  - proxy approval / quorum / fallback role を q_responsibility=3 条件へどう接続するか
  - guard cap の strictest bound を ordinal / numeric threshold へ写像する meet 演算をどう定めるか
delegation_scope_formalization:
  status: provisional_fixed
  statement: 事前委任された自動承認範囲は、DecisionLedger 上の delegation policy として D=(T,G,X,E_req,F,A) で表す。
  notation: D = (T, G, X, E_req, F, A)
  component_meaning:
    T: target_scope。decision target、operation class、scope、time/horizon から成る対象境界。
    G: guard_conditions。conditional_auto を許す条件集合。impact、reversibility、externality、policy_risk、confidence などを含む。
    X: prohibited_conditions。delegated path を categorical に止める条件集合であり、X=(X_auto, X_esc) に分ける。X_auto は自動実行のみを禁止し、X_esc は上位 authority への送致を強制する。
    E_req: required_evidence。自動実行前に満たすべき evidence/status 条件。
    F: fallback_branch。out_of_scope、required_evidence_missing、post_check_fail、rollback_fail などへの分岐規則。
    A: audit_obligation。最低限残すべき actor_ref、timestamp、operation、rationale、evidence_ref_or_status、outcome などの監査義務。
  well_formedness_rules:
  - T, G, X, E_req, F, A の6成分がすべて存在してはじめて D を正当な delegation policy とみなす
  - X は X_auto と X_esc に分け、同一 predicate を両方へ重複登録してはならない
  - X_esc は X_auto より優先し、該当時は delegated path を終了して force_escalate を返す
  - G failure は categorical prohibition とみなさず、lawful manual path の有無で human_approval_required か force_escalate を分ける
  - F には少なくとも out_of_scope, auto_block, post_check_fail, rollback_fail の分岐が定義されていなければならない
  - A には最低限 actor_ref, timestamp, operation, rationale, outcome の記録義務が含まれていなければならない
  - D は decision_context と execution actor に束縛されていなければならない
  non_implications:
  - D の存在は automatic execute を強制しない
  - manual approval path の存在は conditional_auto を正当化しない
  - rollback path の存在は prohibited condition を上書きしない
  normalized_vocabulary:
    X_partition:
      X_auto:
      - non_delegable_operation
      - live_branch_critical_conflict
      - disputed_critical_evidence
      - external_irreversible_commitment
      - public_commitment_or_role_change
      X_esc:
      - out_of_scope
      - lawful_exception_required
      - authority_or_accountability_missing
      - decision_context_invalidated
      - rollback_path_absent_when_mandatory
    G_core:
    - impact_within_cap
    - reversibility_within_cap
    - externality_within_cap
    - policy_risk_within_cap
    - evidence_ready
    - evidence_fresh
    - confidence_ready
    - approval_validity_live
    - rollback_ready
    - postcheck_ready
    - audit_ready
  cross_check_rules:
  - scope_state は T 側で評価し、out_of_scope は guard failure ではなく X_esc として処理する
  - required_evidence の pending / external_ref / freshness不足は既定では G 側の evidence_ready / evidence_fresh failure とし、critical disputed evidence だけを X_auto または X_esc へ送る
  - approval_validity_live=false かつ renewal authority が同一 frame にあれば human_approval_required、renewal authority 不在なら force_escalate とする
  - rollback_ready=false は rollback obligation を持つ monitored auto branch では X_esc 候補であり、rollback obligation がない branch では not_applicable with justification を許す
  - confidence_ready は calibrated self-confidence を参照し、raw self-report だけでは満たしたとみなさない
  - rollback_required=true のとき rollback_ready=true を与えるには、rollback_target_ref・rollback_plan_ref・rollback_owner・verification_requirements・pending_window・failure_branch が事前束縛されていなければならない。
  - verification_pending は rollback_success と同一視してはならず、pending window と critical exposure の cross-check を通らない限り auto_rollback completion に使えない。
  - partial_rollback と rollback_fail は delegated path の完了ではなく、既定で force_escalate を返す。
  domain_profile_calibration:
    regulated_domain:
      hard_prohibition:
      - external_irreversible_commitment
      - disputed_critical_evidence
      - live_branch_critical_conflict
      - lawful_exception_required
      local_cap_rules:
      - impact_within_cap
      - policy_risk_within_cap
      - evidence_fresh
      - confidence_ready
      - approval_validity_live
      - audit_ready
    engineering_tradeoff_domain:
      hard_prohibition:
      - non_delegable_operation
      - external_irreversible_commitment
      - live_branch_critical_conflict
      local_cap_rules:
      - impact_within_cap
      - reversibility_within_cap
      - externality_within_cap
      - policy_risk_within_cap
      - evidence_ready
      - confidence_ready
      - rollback_ready
    organizational_or_social_domain:
      hard_prohibition:
      - public_commitment_or_role_change
      - live_branch_critical_conflict
      - lawful_exception_required
      local_cap_rules:
      - externality_within_cap
      - evidence_ready
      - confidence_ready
      - approval_validity_live
      - audit_ready
  mixed_domain_composition:
    status: provisional_fixed
    statement: delegation_scope D の mixed-domain 合成では、prohibition family は和集合、guard family は guard facet ごとの strictest bound、branch 分岐は X_esc > X_auto > guard_failure > eligible の順で評価する。
    notation:
      applicable_profiles_per_guard: Π_g(t,o) ⊆ Γ_g
      escalate_prohibition: X_esc^*(t,o) = ⋃ { X_esc^γ | γ ∈ Π_D(t,o) }
      auto_block: X_auto^*(t,o) = ⋃ { X_auto^γ | γ ∈ Π_D(t,o) }
      strictest_guard_bound: θ_g^*(t,o) = meet { θ_g^γ | γ ∈ Π_g(t,o) }
    evaluation_order:
    - 1. Π_D(t,o) を operation class, externality, reversibility, authority path, public commitment, required evidence から決める。
    - 2. X_esc^*(t,o) を評価し、hit したら delegated path を終了して force_escalate を返す。
    - 3. X_auto^*(t,o) を評価し、hit したら conditional_auto を禁止し、lawful manual path があれば human_approval_required、なければ force_escalate を返す。
    - 4. 残った guard facet について θ_g^*(t,o) を評価し、fail なら human_approval_required、lawful manual path なしなら force_escalate を返す。
    - 5. post-check fail や residual risk excess が起きた場合、rollback obligation があり rollback_ready=true なら auto_rollback、そうでなければ force_escalate を返す。
    meet_rules:
    - impact/externality/policy_risk など序数 cap は、より低い許容上限を strictest とする。
    - evidence/approval_validity/audit など要件集合は、必須条件の和集合を strictest とする。
    - strictest bound が比較不能な guard は、branch-critical/high-impact なら X_esc 相当、その他は guard_failure として扱う。
    non_relaxation_rules:
    - engineering rollback readiness は regulated X_esc を打ち消さない。
    - organizational forum approval は regulated lawful exception_required を打ち消さない。
    - public_commitment_or_role_change は低 impact な internal operation であっても X_auto または X_esc 候補として残る。
delegation_branch_model:
  status: provisional_fixed
  notation: Branch_D(z, D) -> {human_approval_required, conditional_auto, auto_rollback, force_escalate}
  input_vector:
    impact_class: low | medium | high | critical
    reversibility: reversible | partially_reversible | irreversible
    externality: internal_only | external_effect
    policy_risk: low | medium | high | critical
    self_confidence: calibrated ordinal or numeric score
    evidence_state: linked | pending | external_ref | disputed | insufficient
    scope_state: in_scope | out_of_scope
    decision_context_state: live | invalidated
    approval_validity_state: live | expired | invalidated
    lawful_manual_path: present | absent
    exception_authority_path: present | absent
    rollback_ready: true | false
  evaluation_order:
  - 'precheck 1: scope_state=out_of_scope、decision_context_state=invalidated、または authority_or_accountability_missing なら force_escalate'
  - 'precheck 2: X_esc に該当、または lawful exception が必要なのに exception_authority_path=absent なら force_escalate'
  - 'precheck 3: X_auto に該当するなら、lawful_manual_path=present のとき human_approval_required、absent のとき force_escalate'
  - 'precheck 4: G の cap failure、required_evidence の pending / external_ref / freshness不足、approval_validity_state!=live のいずれかがあれば、lawful_manual_path=present のとき human_approval_required、absent のとき force_escalate'
  - 'precheck 5: in_scope かつ G を満たし、X_auto/X_esc に触れず、E_req を満たすなら conditional_auto'
  - 'runtime 6: conditional_auto 実行後に post_check_fail, residual_risk_excess, drift_detected のいずれかが起き、rollback_ready=true なら auto_rollback 手続へ入る'
  - 'runtime 7: auto_rollback 手続は rollback_success / verification_pending / partial_rollback / rollback_fail の4状態へ正規化する'
  - 'runtime 8: verification_pending は pending_window が生き、critical externality / branch-critical binding が未発火のときだけ auto_rollback 監視状態として維持できる。それ以外は force_escalate'
  - 'runtime 9: partial_rollback または rollback_fail、外部影響顕在化、policy breach 発見なら force_escalate'
  branch_conditions:
    human_approval_required:
    - X_esc には当たらない
    - lawful manual path が同一 decision context に存在する
    - X_auto に該当する、または G の cap failure / E_req 不充足 / approval validity 失効により自動実行境界を越える
    conditional_auto:
    - scope_state=in_scope
    - decision_context_state=live
    - approval_validity_state=live
    - required_evidence を満たす
    - X_auto / X_esc に該当しない
    - impact_class, reversibility, externality, policy_risk, self_confidence が D の guard_conditions 範囲内にある
    - 監査義務、post-check、必要な rollback path が事前定義されている
    auto_rollback:
    - conditional_auto が実行済みである
    - post_check_fail, residual_risk_excess, drift_detected のいずれかが起きる
    - rollback が可逆範囲で可能であり rollback_ready=true である
    - completion は rollback_success / verification_pending / partial_rollback / rollback_fail の4状態で追跡する
    force_escalate:
    - X_esc 該当
    - X_auto または guard failure で lawful_manual_path がない
    - policy exception や lawful exception が必要
    - rollback 不可、partial_rollback、または rollback_fail
    - verification_pending が pending window を超過する、または branch-critical externality を伴う
    - 責任主体や承認主体が割り当て不能
  stage_note: human_approval_required と conditional_auto は主に事前統治分岐、auto_rollback は事後監視分岐、rollback_success / verification_pending / partial_rollback / rollback_fail は auto_rollback 内部の完了状態、force_escalate は事前・事後の両方で発火しうる。
auto_rollback_completion_model:
  status: provisional_fixed
  statement: auto_rollback は conditional_auto 後の事後監視分岐であり、完了は inverse action の送出ではなく、rollback_target への lawful restoration と required verification の充足で判定する。
  notation:
    rollback_ready: RR(z,D)=true
    rollback_outcome: ρ_rb ∈ {rollback_success, verification_pending, partial_rollback, rollback_fail}
    completion_predicate: C_rb(z,D)=true iff ρ_rb = rollback_success
  rollback_ready_predicate:
    statement: RR(z,D)=true は、rollback obligation を持つ delegated operation について、逆操作可能性、責任主体、完了検証、失敗時分岐が事前束縛されていることを意味する。
    required_bindings:
    - rollback_target_ref
    - rollback_plan_ref または inverse_ops_ref
    - rollback_owner
    - rollback_trigger_set
    - verification_requirements
    - pending_window
    - failure_branch=force_escalate
    - audit_trace_path
    failure_triggers:
    - required_bindings の欠落
    - lawful rollback owner / authority の不在
    - external irreversible commitment を rollback success だけで吸収しようとする設計
    - verification rule 不在のまま rollback_success を主張すること
  outcome_semantics:
    rollback_success: rollback_target への復元、required post-check の pass、verification evidence の束縛、residual_risk の許容内化が揃った状態。
    verification_pending: rollback action は完了したが completion verification が未完了な状態。pending window 内でのみ auto_rollback 監視状態として保持できる。
    partial_rollback: 復元された facet と未復元 facet が混在し、branch-critical facet または外部影響の未解消が残る状態。
    rollback_fail: rollback action 失敗、completion verification 失敗、lawful path 消失、timeout のいずれかで delegated recovery が閉じない状態。
  completion_conditions:
  - rollback_success には rollback_target 到達だけでなく、required post-check と verification evidence の両方を要する。
  - verification_pending は success ではなく、C_rb(z,D)=false のままである。
  - partial_rollback と rollback_fail は delegated path の completion ではない。
  - rollback_success が成立しても、それは original execute 成功ではなく rollback branch の lawful completion を意味するだけである。
  domain_completion_conditions:
    regulated_domain:
    - rollback_target への復元
    - required post-check pass
    - safety/compliance/release/contractual binding に対する verification evidence
    - released artifact・規制記録・対外約束に触れる場合の independent または authority-bound verification
    engineering_tradeoff_domain:
    - baseline または rollback_target への復元
    - affected dependency の propagation check pass
    - residual_risk <= pre-approved tolerance
    organizational_or_social_domain:
    - workflow / assignment / state の復元、または compensating action の記録
    - communication owner または reflection owner の確認
    - public commitment / role change / outside notification を含む場合の acknowledgement または authority confirmation
  branch_connection_rules:
  - verification_pending は pending_window が生き、critical externality と branch-critical binding が未発火のときだけ auto_rollback 監視状態として残せる。
  - verification_pending が pending_window を超過する、または branch-critical exposure を伴う場合は force_escalate。
  - partial_rollback は既定で force_escalate。
  - rollback_fail は force_escalate。
  audit_log_requirements:
  - rollback_trigger_ref
  - pre_change_baseline_ref または rollback_target_ref
  - executed_inverse_actions
  - rollback_owner_ref
  - verification_evidence_refs
  - residual_risk_assessment
  - remaining_externality_status
  - pending_window と escalation_record
  non_implications:
  - verification_pending は temporary success ではない。
  - partial_rollback は managed degradation ではなく、既定では escalation 対象である。
  - rollback_ready の存在は external irreversible commitment を delegated auto で許す理由にならない。
stakeholder_conflict_adjudication_boundary:
  status: provisional_fixed
  statement: 未裁定の stakeholder conflict は V の内部 relation ではなく、DecisionLedger 上の adjudication layer A_conf として管理する。V には ratified かつ reflected された outcome だけを authoritative に反映する。
  adjudication_case_minimum:
    case_id: conflict_case_id
    decision_target_ref: target_ref
    contested_binding:
      binding_kind: priority_relation|veto_condition|risk_tolerance|scope|policy_interpretation
      criterion_pair_or_set:
      - criterion_id
    stakeholder_positions:
    - stakeholder_ref: role_id
      proposed_binding_ref: binding_ref or claim_ref
      rationale_ref: evidence_ref or policy_ref
    criticality: branch_critical|non_branch_critical
    required_authority: role_id or institution_id
    lifecycle_state: open|ratified|reflected|rejected|superseded
    allowed_outcomes:
    - relation_update
    - veto_update
    - risk_tolerance_update
    - scope_split
    - reject_change
    chosen_outcome_ref: resolution ref after ratification
    reflection_ops:
    - operation refs that update V
  reflection_rules:
  - ratified outcome が relation_update かつ relation=dominates なら P_dom を更新する。
  - ratified outcome が relation_update かつ relation=independent なら P_indep を更新する。
  - ratified outcome が relation_update かつ relation=incomparable なら P_inc を更新し、必要なら human_adjudication_required を残す。
  - ratified outcome が veto_update なら X を更新する。
  - ratified outcome が risk_tolerance_update なら L を更新する。
  - ratified outcome が scope_split なら decision context を分岐し、各 branch の V を再束縛する。
  - ratified outcome が reject_change なら contested proposal を棄却し、既存 binding を維持する。
  - lifecycle_state=open の conflict は V に確定 relation として書き込まない。
  branching_rules:
  - open conflict が branch-critical なら Eval_g は hold または escalate を返す。
  - open conflict を numeric_support だけで解消済みと扱ってはならない。
  - conflict case が ratified されるまで pair 未記述は unknown のまま保持する。
  - required_authority 不在または lawful adjudication path 不在の branch-critical conflict は false または force_escalate 側へ送る。
  notation: A_conf = (Case, Guard, Reflect)
  state_machine:
    core_path:
    - open
    - ratified
    - reflected
    other_states:
    - rejected
    - superseded
    rules:
    - open state の case は V に authoritative relation として書き込まない
    - ratified は outcome の制度承認を意味するが、reflection_ops 完了前は V 更新完了を意味しない
    - reflected は outcome が V に反映され、以後の priority / veto / risk 評価に使用可能であることを意味する
    - superseded case は旧 case を無効化するのではなく、新 case または policy ref への追跡可能性を残す
  q_decision_binding_rules:
  - branch-critical な open conflict がある場合、q_decision <= 1 とする。
  - branch-critical な open conflict かつ required_authority または lawful adjudication path が欠ける場合、q_decision = 0 とし Eval_g=false 候補にする。
  - open conflict が non-branch-critical で chosen branch と隔離されている場合、case_ref を保持したまま q_decision >= 2 を許しうる。
  - ratified だが reflected 前の case が branch-critical なら、governance_state=true を返さず hold を維持する。
  - reflected 済みの case だけが priority_relation / veto_conditions / risk_tolerance の正式束縛に寄与する。
  branch_criticality_model:
    status: provisional_fixed
    statement: conflict case c が intended action a と decision context d に対して branch-critical であるのは、c の outcome が a の lawful branch または required authority path を変えうる場合に限る。
    notation:
      intended_action: a
      decision_context: d
      conflict_case: c
      branch_critical_predicate: BC(c,a,d) = Touch(c,d) ∧ Sens(c,a,d) ∧ ¬Covered(c,a,d) ∧ Due(c,d)
    factor_meaning:
      Touch(c,d): c の contested binding が current target の scope, policy interpretation, veto, risk tolerance, priority relation, authority path, accountability binding のいずれかに作用する
      Sens(c,a,d): ratifiable な少なくとも2つの outcome で a の admissibility, approval path, rollback readiness, accountability, branch outcome のいずれかが変わる
      Covered(c,a,d): reflected coexistence / reflected scope split / target isolation basis により、c を未解決のままでも a が全 admissible outcome で lawful に覆われる
      Due(c,d): current frame がその binding の確定を今要求する、または active review window / deadline / external commitment がある
    decision_rules:
    - BC(c,a,d)=true なら q_decision <= 1 とする。
    - BC(c,a,d)=true かつ required_authority または lawful adjudication path が欠ける場合、q_decision = 0 とし Eval_g=false 候補にする。
    - Touch または Sens が欠ける conflict は advisory / deferred case として残しうるが、case_ref の説明責任は残る。
    - Covered(c,a,d)=true の判定には reflected basis を要求し、unratified memo や numeric support を basis に使ってはならない。
    non_implications:
    - stakeholder 数や intensity は BC の十分条件ではない。
    - BC(c,a,d)=false でも、その conflict が他 branch や後続 frame で重要になる可能性は残る。
    - ratified but not reflected outcome は Covered(c,a,d)=true を意味しない。
  chained_adjudication_model:
    status: provisional_fixed
    statement: 複数の open conflict は、binding dependency と gate precedence から作る precedence DAG に従って処理し、未解決 minimal element を active head case とする。
    notation:
      chain: Chain_conf = (Case, ≺, Head, Route)
      head_case: Head(Chain_conf) = {c ∈ Case_open | ¬∃c' (c' ≺ c and c' unresolved)}
    default_precedence_layers:
    - L0 = policy_interpretation / scope
    - L1 = veto_condition
    - L2 = risk_tolerance
    - L3 = priority_relation
    edge_rules:
    - case_i の outcome が case_j の decision target, authority, admissible candidate set, evaluation frame を定めるなら case_i ≺ case_j
    - policy_interpretation / scope case は、同一 target に対する veto / risk / priority case に先行する
    - veto_condition case は、同一 target に対する risk_tolerance / priority_relation case に先行する
    - risk_tolerance case は、同一 admissible family の priority_relation case に先行する
    routing_rules:
    - active head case に same-frame authority と review window がある場合、Route=head_hold として Eval_g=hold を返す
    - same-frame authority はないが lawful upper authority path がある場合、Route=head_escalate として Eval_g=escalate を返す
    - lawful path absent, authority absent, target invalidated, irrecoverable deadline breach のいずれかなら Route=head_false として Eval_g=false を返す
    - delegation_scope D が force_escalate を要求する場合、ordinary hold より強く escalation route を優先する
    batching_rules:
    - same decision_target_ref, same authority tier, same review window, no precedence edge を満たす case だけを同一 batch として ratification 候補にできる
    - batch は upstream binding を暗黙に変更してはならない
    - same layer の batch は実務上の同時処理であって、理論上の precedence 未定義を隠す道具にしてはならない
    q_decision_connection:
    - active head case が branch-critical で未解決なら q_decision <= 1 とする
    - head case が ratified だが未 reflected なら head_clear とみなさず q_decision <= 1 を維持する
    - 下流 case が残っていても、current action が head-cleared かつ Covered 条件を満たすなら q_decision >= 2 を許しうる
    record_units:
      DecisionLedger:
        minimal_schema:
          conflict_case_id: case id
          chain_id: chain id
          precedence_layer: L0|L1|L2|L3
          depends_on_case_refs:
          - case id
          active_head_flag: true|false
          criticality_basis:
          - binding_effect
          - outcome_sensitivity
          - coverage_absence
          - commitment_due
          coverage_or_isolation_basis_ref: basis ref or null
          required_authority: role_id or institution_id
          route_status: same_frame|upper_path|absent
          lifecycle_state: open|ratified|reflected|rejected|superseded
      GraphEngine:
        events:
        - conflict_opened
        - chain_linked
        - head_activated
        - ratified
        - reflected
        - head_shifted
        - escalated
        - cleared
        - superseded
    residual_open_points:
    - cross-layer / cross-authority をまたぐ nested batch の lawful decomposition
    - partial-overlap route family と conflict chain の coverage equivalence
    - shared-core action / intersection-safe action を Covered 条件へ組み込む基準
same_layer_conflict_batch_tiebreak_model:
  status: provisional_fixed
  statement: same_layer_conflict_batch_tiebreak_model は、同一 authority tier τ・同一 precedence layer λ に属する複数 open conflict を cluster 化し、batchability、active head、timeout/fallback、split 条件を deterministic に定める。
  notation:
    authority_tier: τ
    precedence_layer: λ
    same_layer_open_set: Σ_(τ,λ) = {c ∈ Case_open | Tier(c)=τ ∧ Layer(c)=λ}
    interaction_graph: I_(τ,λ) = (Σ_(τ,λ), E_sh ∪ E_auth ∪ E_eff ∪ E_basis ∪ E_excl)
    cluster_family: Cl_(τ,λ) = Conn(I_(τ,λ))
    batchable_predicate: Bat(B,d)=true iff SameTier(B) ∧ SameLayer(B) ∧ SharedWindowOrCharter(B,d) ∧ NoUnresolvedUpstream(B) ∧ BundleConsistent(B,d) ∧ NoImplicitUpstreamMutation(B)
    head_order: HOrd(B,a,d) = (VR(B,a,d), U(B,d), EZ(B,a,d), CG(B,a,d), CP(B), StableId(B))
    active_head: Head_(τ,λ)(a,d) = lexmax_{B ∈ Cl_open} HOrd(B,a,d)
  edge_meaning:
    E_sh: same decision_target_ref または overlapping candidate family
    E_auth: same required authority / forum / fallback path
    E_eff: same protected facet / effect_zone / accountability binding
    E_basis: same evidence basis / remediation packet / timeout dependency
    E_excl: outcome exclusivity または branch-coupling
  rank_domains:
    veto_reach_rank:
      order:
      - target_global
      - shared_branch_family
      - local_branch
      - none
    urgency_rank:
      statement: effective_due が早いほど高順位。forum convenience、batch 待ち、reviewer 不在は due 延長根拠にしない。
    effect_zone_rank:
      order:
      - authority_path_or_global_commitment
      - chosen_branch_family
      - local_candidate_pair
      - facet_local
    coverage_gap_rank:
      order:
      - uncovered
      - partially_isolated
      - isolated
  operational_rules:
  - cluster は connected component 単位で作り、member case 数ではなく interaction edge によって決める。
  - Head_(τ,λ) は lexmax で一意に選び、完全同順位のときだけ StableId で決定する。arrival order や stakeholder count は HOrd に入れない。
  - Bat(B,d)=false なら B は split 候補へ分解し、bundle ratification を試みてはならない。
  - VR(B,a,d) >= shared_branch_family かつ reflected isolation basis がない場合、B は head_hold または head_escalate を返す。
  - VR(B,a,d)=local_branch かつ reflected isolation basis がある場合だけ、blocking member を split して residual cluster を再評価できる。
  - member case の mandatory timeout は Timeout(c)=true として記録し、Fallback(c,d)=live なら fallback_activate、そうでなければ hold または escalate を返す。timeout は approve に変換しない。
  - batch ratified でも bundle reflection が完了するまでは HeadClear(B)=false とし、q_decision <= 1 を維持する。
  predicates:
    reflected_isolation_basis: Iso(c,a,d)=true iff reflected scope split / reflected coexistence / reflected target isolation が c の全 blocking effect を chosen action a から遮断する
    bundle_consistency: BundleConsistent(B,d)=true iff B の各 case から1つずつ選んだ ratifiable outcome の束が、同一 chosen branch family と authority path を保ったまま共同反映できる
    head_clear: HeadClear(B)=true iff all critical members of B are reflected and no blocking timeout / veto / unresolved exclusivity remains
  q_decision_connection:
  - active head cluster B が未 reflected なら q_decision <= 1 とする
  - active head cluster B に lawful path absent または required authority absent があれば q_decision = 0 候補にする
  - split 後の residual cluster が HeadClear=true で current action と Covered 条件を満たす場合だけ、q_decision >= 2 を再評価できる
  record_units:
    DecisionLedger:
      minimal_schema:
        cluster_id: cluster id
        member_case_refs:
        - case id
        interaction_edge_kinds:
        - E_sh | E_auth | E_eff | E_basis | E_excl
        batchable: true|false
        head_order_snapshot:
          veto_reach_rank: target_global|shared_branch_family|local_branch|none
          urgency_basis: effective due ref
          effect_zone_rank: authority_path_or_global_commitment|chosen_branch_family|local_candidate_pair|facet_local
          coverage_gap_rank: uncovered|partially_isolated|isolated
          coupling_degree: integer
          stable_id: deterministic tiebreak id
        split_basis_ref: basis ref or null
        timeout_member_refs:
        - case id
        fallback_basis_ref: basis ref or null
        bundle_outcome_refs:
        - outcome ref
    GraphEngine:
      events:
      - same_layer_cluster_opened
      - same_layer_cluster_split
      - same_layer_head_promoted
      - blocking_veto_reach_raised
      - cluster_member_timed_out
      - cluster_fallback_activated
      - bundle_ratified
      - bundle_reflected
      - cluster_cleared
    GraphLint:
      lint_rules:
      - hidden_precedence_edge_in_same_layer_batch
      - timeout_as_deemed_approval
      - mixed_authority_or_mixed_layer_batch
      - unreflected_bundle_treated_as_head_clear
      - implicit_upstream_binding_mutation
  residual_open_points:
  - cross-layer / cross-authority をまたぐ nested batch の lawful decomposition
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで parameter 化するか
  - lawful cadence / expected burst envelope を batch charter とどう接続するか
approval_structure_formalization:
  status: provisional_fixed
  statement: 複数承認主体を含む approval binding は、Ap の単純集合ではなく A_p^+=(M, S_req, Pxy, Q, Fbk, Vld, SoD) で表す。
  notation: A_p^+ = (M, S_req, Pxy, Q, Fbk, Vld, SoD)
  component_meaning:
    M: approval_mode。single / all_of / any_of / quorum / forum
    S_req: required approver condition。必須 role、k-of-n、または forum membership 条件を含む
    Pxy: proxy rules。principal_role_id, proxy_role_id, activation_condition, scope_limit の組
    Q: quorum rule。eligible_voting_set_ref, counting_basis(headcount|seat_weight), threshold_rule, mandatory_role_set, veto_rule, abstention_rule, timeout_rule, tie_break_rule, weighted_tally_profile_ref_or_null の組
    Fbk: fallback activation rules。vacancy, unavailable, SLA breach, expiry などから lawful fallback role への写像
    Vld: approval validity。valid_from, valid_until, invalidated_by, renewal_condition
    SoD: segregation_of_duties。principal と proxy、approver と executor などの兼務禁止
  well_formedness_rules:
  - M は |Ap|>1、proxy、quorum、forum、fallback のいずれかがあるとき必須である
  - S_req は approver_set と required_count または mandatory roles を含み、誰の承認不足で branch が未成立か判定できなければならない
  - Pxy の principal_role_id は S_req または approver_set に含まれていなければならない
  - Q の threshold は eligible_roles 数を超えてはならず、mandatory role を閾値に埋もれさせてはならない
  - Fbk は activation_condition と scope_limit を伴わなければならない
  - Vld により失効した承認は quorum や any_of の成立数へ算入してはならない
  - SoD に違反する principal/proxy/approver/executor の組は有効承認として数えてはならない
  - counting_basis=seat_weight のとき、weighted_tally_profile_ref_or_null は null であってはならない
  - seat weight は mandatory role や blocking veto を上書きしてはならない
  - observer/auditor seat を voting weight や veto class に算入してはならない
  score_connection:
    q_responsibility_2:
    - 主要 branch の Ap/Ex/Ac が束縛されている
    - 複数承認主体を使う場合は M と S_req が束縛されている
    - proxy または fallback を使う場合は lawful activation condition が束縛されている
    - 期限失効のある領域では Vld が参照可能である
    q_responsibility_3:
    - Pxy, Q, Fbk, Vld, SoD, approval conflict routing が機械可読である
    - domain profile ごとの差を保ったまま再利用可能な approval template になっている
    - approval conflict, proxy invalid, fallback activation pending を evaluator が一貫して分類できる
  hold_connection_rules:
    H3_candidates:
    - approval_structure_gap
    - proxy_invalid
    - fallback_role_missing_when_required
    - invalid_quorum_definition
    - approval_validity_unbound_in_expiring_domain
    H4_candidates:
    - approval_wait
    - approval_conflict
    - quorum_unmet
    - fallback_activation_pending
    - proxy_activation_pending
    decision_rule: 構造不足や lawful path 欠如は H3、運用上の承認待ち・衝突・定足未充足は H4 とする。
  domain_profile_notes:
    regulated_domain:
    - high-impact branch では principal role、proxy 可否、expiry、SoD を強く要求する
    - non_proxyable branch は Pxy を空ではなく explicit non_proxyable として残す
    engineering_tradeoff_domain:
    - single approval なら M=single だけで score 2 を満たしうる
    - 継続運用・自動化・複数部門承認では Q または Fbk を束縛しないと score 3 へ上がらない
    organizational_or_social_domain:
    - forum, quorum, dissent_policy, fallback chair が重要になる
    - 会議体承認では S_req に forum membership と議長または reflection owner の役割を含める
  open_points:
  - federated organization 間の approval structure を単一 A_p^+ で表し切れるか
  weighted_quorum_boundary:
    core_fields:
    - counting_basis
    - threshold_rule
    - mandatory_role_set
    - veto_rule
    - abstention_rule
    - timeout_rule
    - tie_break_rule
    - weighted_tally_profile_ref_or_null
    extension_fields:
    - seat_weight_table_ref
    - apportionment_formula_ref
    - constituency_snapshot_ref
    - reapportionment_trigger
    - supermajority_profile_ref
    - minority_protection_profile_ref
    routing_boundary: weighted quorum は forum 内部 tally に属し、same-tier peer conflict routing を直接置き換えない
same_tier_reviewer_conflict_model:
  status: provisional_fixed
  statement: same_tier_reviewer_conflict_model は、同一 authority tier に属する複数 reviewer / forum が同一 decision target / branch / facet に応答したとき、validity 判定、blocking veto、forum 内部 tie、timeout、fallback / escalation を機械可読に決める形式化である。
  notation:
    review_unit: u = (unit_id, unit_kind, authority_tier, scope_ref, effect_zone, mandatory_flag, veto_authority_class, forum_rule_ref, fallback_rule_ref, due_at, validity_ref)
    review_response: r = (unit_ref, response_kind, responded_at, condition_set_ref, veto_basis_ref, dissent_ref, quorum_snapshot_ref, chair_tiebreak_ref, minutes_ref, validity_state)
    same_tier_overlap: Ov(u_i,u_j,d)=true iff tier(u_i)=tier(u_j) ∧ ScopeOverlap(u_i,u_j,d)=true ∧ EffectZoneOverlap(u_i,u_j,d)=true
    valid_response: VR(u,r,t)=true iff scope / authority / expiry / SoD / veto charter が live で、response_kind が unit_kind に対して lawful である
    effective_response: ER(u,r,t) ∈ {approve, conditional_pending, veto_review, veto_risk, veto_policy, abstain, silence, timeout, invalid}
    conflict_cluster: Γ(d,τ,t) = { (u,r) | tier(u)=τ ∧ Ov(u,*,d) ∧ VR(u,r,t)=true }
    approval_ready: APR(Γ,d,t)=true iff mandatory unit が満たされ、blocking veto がなく、forum / quorum / fallback が成立し、conditional_pending / timeout が chosen branch を未決のまま残さない
  axioms:
  - same-tier reviewer の人格的序列は precedence source にならない
  - forum verdict は内部 quorum, minutes, chair_tiebreak rule が lawful に成立したときだけ 1 review_unit outcome として数える
  - silence は assent でも abstain でもなく、due 超過後にだけ timeout へ遷移する
  - timeout は fallback activation または escalation trigger にはなれても、approve の代替にはならない
  - veto は pre-bound な veto_authority_class と veto_basis_ref があるときだけ有効であり、未束縛の否定意見は veto として算入してはならない
  - veto_risk と veto_policy は same tier の approve 数で outvote してはならない
  - same-tier conflict は facet precedence、mandatory role、forum charter、fallback / escalation path のいずれでも解けないとき approval_conflict として保持する
  normalization_rules:
    response_kind:
      approve: unconditional かつ live validity を持つ賛成応答。成立数へ算入できる。
      conditional_approve: condition_set_ref が reflected または auto-checkable に充足されるまで conditional_pending として扱う。
      veto: veto_authority_class により veto_review / veto_risk / veto_policy へ正規化する。
      abstain: 出席・参加は記録するが成立数へ算入しない。mandatory role 欠落を埋めない。
      silence: due 前の未応答。集計に算入しない。
      timeout: due 超過後の未応答。mandatory unit の場合は fallback または escalation 評価を強制する。
    veto_authority_class:
      none: veto 不可。否定意見は dissent_note または condition_set に押し下げる。
      review_block: same-frame remediation があれば H4 approval_conflict として保持しうる。
      risk_block: residual_risk / waiver に関する blocking veto。H5 候補である。
      policy_block: policy / compliance / contract / mandatory gate に関する blocking veto。H6 候補である。
  evaluation_order:
  - 1. review_unit と review_response の validity を評価し、invalid response を除外する
  - 2. forum unit について quorum_snapshot / minutes / chair_tiebreak の lawful 成立を確認し、未成立なら forum_internal_tie_pending または invalid_quorum_definition へ送る
  - 3. stakeholder_conflict_adjudication_boundary の facet precedence を使い、policy_interpretation / veto_condition / risk_tolerance / approval completion の順に blocking 効果を判定する
  - 4. mandatory unit の response を確認し、missing / silence / timeout / invalid proxy を approval wait 系へ送る
  - 5. blocking veto がなければ approval_mode, quorum, fallback, condition_set_ref を評価し、APR(Γ,d,t) を判定する
  - 6. APR=false かつ same-frame remedy がある場合は hold、upper authority path だけがある場合は escalate、lawful path absent なら false を返す
  hold_connection_rules:
    H3_candidates:
    - review_scope_unbound
    - veto_authority_unbound
    - forum_rule_missing
    - chair_tiebreak_unbound
    - timeout_path_missing
    - invalid_forum_minutes_or_reflection_owner
    H4_candidates:
    - conditional_approval_pending
    - same_tier_approval_conflict
    - mandatory_review_timeout
    - forum_internal_tie_pending
    - fallback_reviewer_pending
    H5_candidates:
    - same_tier_risk_block_veto
    H6_candidates:
    - same_tier_policy_block_veto
  branch_mapping:
    hold:
    - same-frame remediation・re-review・chair tie-break・fallback activation により current frame 内で再開可能
    - timeout だが lawful fallback reviewer / forum があり、decision_due 前に再評価できる
    escalate:
    - same tier では解けないが meta-forum / appeal path / upper authority path がある
    - risk_block / policy_block veto の解除に formal waiver, valid exception, upper-tier adjudication が必要
    'false':
    - required reviewer / forum が失効し、fallback も upper path も absent で decision_due を回復できない
    - blocking veto を lawful に覆う path が absent で、chosen branch を current frame で維持できない
  q_responsibility_connection:
    score_2_minimum:
    - same-tier に複数 review_unit がある場合、scope_ref, effect_zone, response_kind semantics, mandatory_flag, due_at が束縛されている
    - veto を許す場合は veto_authority_class と veto_basis_ref の束縛先がある
    - forum を使う場合は quorum_rule, minutes_reflection_owner, chair_tiebreak rule が束縛されている
    score_3_extra:
    - same-tier conflict routing, invalid response exclusion, timeout/fallback/escalation path が機械可読である
    - conflict_cluster, response lineage, forum internal tally, chair_tiebreak application が再現可能である
  decision_ledger_schema_extension:
    fields:
    - review_unit_id
    - review_unit_kind
    - authority_tier
    - scope_ref
    - effect_zone
    - mandatory_flag
    - response_kind
    - effective_response_kind
    - response_due_at
    - responded_at
    - veto_authority_class
    - veto_basis_ref
    - condition_set_ref
    - quorum_snapshot_ref
    - chair_tiebreak_ref
    - minutes_ref
    - conflict_cluster_ref
    - fallback_rule_ref
    - resolution_path_ref
  graph_engine_events:
  - review_response_recorded
  - review_response_invalidated
  - review_timeout_detected
  - forum_internal_tie_detected
  - chair_tiebreak_applied
  - same_tier_conflict_opened
  - same_tier_conflict_escalated
  - same_tier_conflict_resolved
  - fallback_reviewer_activated
  residual_open_points:
  - weighted quorum / voting power を forum 内部 tally と same-tier conflict routing のどちらへ載せるか
  - silence を deemed abstain へ写像できる例外を domain ごとにどこまで許すか
  - partial-overlap scope の複数 forum outcome を 1 conflict_cluster に束ねる条件をどこで切るか
disjunctive_route_family_model:
  status: provisional_fixed
  statement: disjunctive route family model は、any_of / k_of_n を local bundle を持つ route 候補族として表し、strictest admissible set を admissible selection family の交差で与える。
  notation:
    route_family: F = (Sem, σ, k, U, B, A, X, Cnt, Map)
    route_candidate: r = (route_id, local_bundle_ref, semantic_facet_ref, activation_conditions, incompatibility_ref)
    admissible_selection: 'Adm(F,t,o) = { S ⊆ U | Count_Cnt(S) >= k ∧ X_ok(S) ∧ ∀r∈S: A(r,t,o) ∧ BundleReady(B(r),t,o) }'
    strictest_meet: Adm^*(t,o) = ⋂_{i} Adm(Align(F_i),t,o)
  axioms:
  - any_of は route_family の特殊形であり、k=1 とする。
  - 各 route candidate は family-level disjunction の前に local conjunction として評価される。
  - strictest meet は route id の単純交差ではなく、lawful alignment 後の admissible selection family の交差である。
  - Adm^* が非空なら未充足は guard_failure、Adm^* が空なら guard_contradiction とする。
  - Sem, Cnt, Map, X の alignment が未成立なら incomparable_guard とする。
  algorithm:
  - 1. route family の presence を確認し、binding gap なら meet 前に H3 family へ送る。
  - 2. obligation_family_ref, counting_basis, semantic_facet, selection_scope を見て lawful alignment の可否を判定する。
  - 3. comparable な場合、各 route の local bundle readiness と activation predicate を評価する。
  - 4. exclusivity_rules と counting_basis を反映して Adm(F_i,t,o) を作る。
  - 5. Adm^*(t,o)=⋂ Adm(F_i,t,o) を計算し、Sel_cur との関係から eligible / guard_failure / guard_contradiction を返す。
  - 6. incomparable な場合は registry / route mapping governance を要求し、incomparable_guard を返す。
  minimal_schema:
    route_family_fields:
    - route_family_id
    - obligation_family_ref
    - modality
    - k_required
    - candidate_routes
    - counting_basis
    - exclusivity_rules
    - route_alignment_rule_ref
    - selection_scope_ref
    route_candidate_fields:
    - route_id
    - local_bundle_ref または local_requirements
    - semantic_facet_ref
    - activation_conditions
    - incompatibility_ref
    - authority_or_evidence_ref
    - status
  branch_connection_rules:
  - family-level feasible selection が残る限り、部分充足は guard_failure とし、lawful manual path があれば human_approval_required へ落とす。
  - feasible selection が空で same-frame route redesign path があれば human_approval_required、なければ force_escalate、lawful path absent なら current frame false 候補とする。
  - incomparable_guard は route redesign より先に mapping / counting / semantic alignment の ratification を要する。
  examples:
    evidence_route:
      modality: any_of
      routes:
      - r1 = 試験報告書 + traceability
      - r2 = 認証済み外部証跡 + freshness check
      interpretation: r1 と r2 のどちらか一方が local bundle として成立すればよい。
    rollback_route:
      modality: k_of_n
      k_required: 2
      routes:
      - r1 = DB snapshot restore
      - r2 = artifact rollback
      - r3 = feature flag revert
      interpretation: 3候補中2 route を事前に成立させないと delegated auto を許可しない。
    approval_route:
      modality: any_of
      routes:
      - r1 = principal approver route
      - r2 = lawful proxy route with activation condition
      interpretation: principal 不在時に proxy rule が lawful で active なら、同一 obligation family の別 route として扱える。
  residual_open_points:
  - partial-overlap route の dominance_only / core_equivalent / exact_equivalent を canonical registry へどう載せるか
resolved_points:
- cross-session settlement checkpoint / quota debt carry-over / audit proof bundle を、settlement checkpoint、debt vector、transfer rule、closure projection、audit proof completeness の分離として暫定固定した
- authority-tier 競合下の forced preemption / emergency override / appeal reopen を、override class、precedence DAG、contested surface freeze、appeal lane、restoration outcome の分離として暫定固定した
- shared archive object / chain family 競合下の witness reservation / packet budget segregation を、reservation unit、sharing mode、borrow debt、orphan reclaim、silent invalidation 防止の分離として暫定固定した
- multi-case legal-hold / nested replay session の quota / priority / starvation avoidance を、quota class、priority class、nested admissibility、starvation bound、timer inheritance の分離として暫定固定した
- reopened reverse chain の re-compaction / reseal / retention timer resume を、readiness state、reseal surface、timer rule、post-reopen checkpoint append の分離として暫定固定した
- replay-derived finding の correction / supersession / head reactivation を、finding class、action branch、reactivation admissibility、notice duty projection の分離として暫定固定した
- replay audit packet の bounded disclosure / actor-slice redaction を、packet class、slice visibility、join barrier、unseal gate の分離として暫定固定した
- legal-hold reopen / replay audit window を、rehydration witness、window class、basis lane、freeze/stop 条件の分離として暫定固定した
- forward/reverse/correction chain の compaction / finality checkpoint / evidence retention を、compaction class、replay-equivalence witness、retention tier、finality state の分離として暫定固定した
- correction notice の downstream propagation / acknowledgment closure / stale notice quarantine を、recipient surface、closure class、quarantine、current basis admissibility の分離として暫定固定した
- overlapping rollback / cascade rollback / rollback-set normalization を、rollback cell 正規形、overlap class、active head、reverse-of-reverse admissibility の分離として暫定固定した
- partial rollback / reverse continuity witness と correction notice supersession を、affected partition cell 選択、minimum reverse witness、supersession class、full re-notice 条件の分離として暫定固定した
- central delegation charter extension registry の migration / supersession / inheritance 境界を、alias migration・successor supersession・monotone inheritance と freeze / history window / propagation rule の分離として暫定固定した
- central delegation charter の weighted quorum / ordered fallback / jurisdiction subtype extension を、taxonomy core と extension parameter に分離して暫定固定した
- ratified 済みだが未 reflected の裁定結果の provisional binding を、authoritative binding / preview / preparation / controlled provisional export の分離として暫定固定した
- detector confidence aggregation window / cluster de-dup rule を、signal / cluster / corroboration / aggregation window の分離、dedup 同値関係、bounded aggregation、branch 接続として暫定固定した
- 同一 authority tier 内の複数 reviewer / forum の tie-break と veto 競合を、response semantics・blocking veto・forum internal tie・timeout/fallback・DecisionLedger linkage を含めて暫定固定した
- shared telemetry / temporary cache / derived preview の sink typing を、5軸 vocabulary・class precedence・profile/context override で暫定固定した
- partial-overlap route candidate の lawful route mapping を、canonical route core と relation_kind で暫定固定した
- basis lifecycle を active / review_due / expired / revoked / superseded / revalidation_pending に整理し、expiry・revocation・supersession・revalidation の分岐と q_decision 接続を暫定固定した
- shadow / sandbox / branch-local artifact の externality budget を allowed sink / audience / ttl / rollback-purge obligation / automation prohibition の束として暫定固定した
- registry authority tier を central authority / domain authority / delegated reviewer に分け、delegated review・template-bound activation・same-identity revalidation・emergency suspend の権限境界と baseline SLA を暫定固定した
- detector integrity class と provenance level の canonical registry を、source family・5段階 integrity class・4段階 provenance level・claim facet 別 precedence として暫定固定した
- sink typing evidence の freshness precedence を、freshness 4状態・mirror lag を織り込んだ effective age・self-report admissibility・facet 局所 tie-break として暫定固定した
- local_convention_detected と confirmed policy drift の detector threshold を、local convention / confirmed drift の分離、threshold bundle、authority tier 別 confirmation で暫定固定した
- mirror lag estimate と sampling window の統計的同値 rule を、window semantics・lag upper bound・equivalence class・resampling admissibility・branch mapping を含めて暫定固定した
open_points:
- multi-session scheduler telemetry / fairness SLO / auto-throttle threshold をどこまで parameter 化するか
- profile 別の review / activation / emergency confirmation SLA をどこまで数値較正するか
- profile/context ごとの aggregation window と hard expiry をどこまで registry 化するか
- lawful cadence / expected burst envelope を detector family / sink class ごとにどこまで registry 化するか
sink_typing_freshness_precedence_model:
  status: provisional_fixed
  statement: sink_typing_freshness_precedence_model は、claim facet 別 precedence を前提に、freshness・mirror lag・self-report admissibility を局所比較規則として追加し、sink typing と leak judgement の時間的整合性を定める形式化である。
  notation:
    evidence_item: ε = (source_family, integrity_class, provenance_level, claim_facet, source_observation_time, identity_ref, content_ref)
    evaluation_time: t_now = current evaluation time
    observation_age: Δ(ε)=t_now-τ_obs(ε)
    mirror_lag: λ(ε)=0 for non-mirrored evidence; estimated or bounded lag for mirrored telemetry
    effective_age: A_eff(ε)=Δ(ε)+λ(ε)
    freshness_state: F(ε,φ,π,χ) ∈ {live, grace, stale, invalid}
    self_report_admissible: SR(ε,φ)=true iff source_family=human_declaration ∧ φ∈{owner_binding_or_declared_intent} ∧ override prohibition を破らない
    confirmability: CF(ε,s)=true iff sink class s の integrity floor・direct sink identity・required corroboration を満たす
    conservative_externality_rank: X(ε)= evidence が示す sink externality の保守側順位
  axioms:
  - 比較は同一 claim facet の内部でのみ行い、single total order は採用しない。
  - mirrored telemetry の freshness は A_eff で判定し、lag が unknown_or_excessive なら少なくとも stale とする。
  - human declaration は owner binding / declared intent / declared TTL の補助根拠には使えるが、observed effect realization や confirmed leak の否定根拠には使わない。
  - stale と invalid の evidence は positive escalation、sealed re-entry、confirmed leak の決定根拠に使わない。
  - 同一 facet で最後まで競合が残るときは、より高い externality を示す evidence を安全側に優先する。
  freshness_state_rules:
    live:
    - A_eff が facet/profile/context ごとの freshness window 内にある
    - revoked / superseded / identity mismatch / clock missing がない
    grace:
    - A_eff は主 window を超えるが hard expiry 以内にある
    - current state と連続する evidence chain が残っている
    stale:
    - A_eff が hard expiry を超える
    - mirror lag が unknown_or_excessive である
    - 連続性を示す evidence chain が欠ける
    invalid:
    - revoked / superseded / forgery suspicion / identity mismatch / missing clock のいずれかがある
  facet_admissibility:
    owner_binding_or_declared_intent:
      admissible_families:
      - human_declaration
      - access_control_or_routing_log
      - direct_system_observation
      - mirrored_telemetry
      rules:
      - human declaration を declared intent と owner binding の第一候補に置く。
      - ただし observed realization facet を上書きしない。
    route_identity:
      admissible_families:
      - access_control_or_routing_log
      - direct_system_observation
      - mirrored_telemetry
      - human_declaration
      rules:
      - routing / access record を優先し、mirrored telemetry は補助比較にとどめる。
    sink_typing_positive_escalation:
      admissible_families:
      - direct_system_observation
      - access_control_or_routing_log
      - mirrored_telemetry
      rules:
      - human declaration 単独では escalation basis にならない。
      - mirrored telemetry は live なら provisional bounded/externalized の候補、grace なら manual review 付き suspicion の候補に限る。
    effect_realization:
      admissible_families:
      - direct_reach_evidence
      - direct_system_observation
      - access_control_or_routing_log
      - mirrored_telemetry
      rules:
      - confirmed judgement では CF(ε,s)=true の evidence だけを候補に残す。
      - mirrored telemetry 単独では confirmed leak を成立させない。
  local_tie_break:
    statement: 同一 facet 内では、候補 evidence を lexicographic に比較する。
    order:
    - admissible かつ invalid でないこと
    - confirmed branch なら CF(ε,s)=true を満たすこと
    - より高い integrity class
    - より高い freshness state (live > grace > stale > invalid)
    - より高い provenance level
    - より保守的な externality rank
    - より新しい source_observation_time
  state_connection_rules:
    promotion_to_bounded_or_externalized:
    - ∃ε with facet=sink_typing_positive_escalation such that F(ε)=live and source_family∈{mirrored_telemetry, direct_system_observation, access_control_or_routing_log} なら provisional promotion 候補になる。
    - F(ε)=grace の mirrored telemetry は suspicion と manual review を起こせるが、authoritative_or_committing への確定昇格は起こさない。
    reentry_to_sealed_internal:
    - sealed re-entry は、live な owner binding declaration、sealed cap 充足、lookback window 内の contrary observation 不在を同時に満たすときだけ provisional に許す。
    - 過去に externalized 以上の観測がある場合、fresh remediation / reflection / direct closure evidence がなければ sealed へ戻さない。
    confirmed_leak:
    - confirmed_leak(s)=true は、sink class s に対し CF(ε,s)=true かつ F(ε)=live の evidence が存在するときだけ成立する。
    - grace / stale / invalid の evidence は confirmed judgement に使わない。
  decision_ledger_schema_extension:
    fields:
    - freshness_state
    - freshness_window_ref
    - hard_expiry_time
    - effective_age
    - mirror_lag_estimate
    - mirror_lag_class
    - self_report_scope
    - contrary_evidence_lookback_ref
    - override_block_reason
  graph_engine_events:
  - evidence_freshness_degraded
  - mirror_lag_exceeded
  - self_report_override_rejected
  - sink_promotion_provisional
  - sealed_reentry_blocked
  residual_open_points:
  - mirror lag estimate の統計的妥当性を sampling window equivalence とどう結合するか
  - profile/context ごとの freshness window と hard expiry の数値較正をどこまで registry 化するか
mirror_sampling_equivalence_model:
  status: provisional_fixed
  statement: mirror_sampling_equivalence_model は、mirrored observation と resampled measurement を freshness / detector / confirmed judgement に使うとき、mirror lag の upper bound と sampling window semantics の lawful equivalence を形式化するモデルである。
  notation:
    window_profile: ω = (mode, span, stride_or_trigger, aggregation_operator, alignment_anchor, coverage_basis, missing_data_policy, clock_basis, lag_estimation_method)
    equivalence_class: Eq(ω_s,ω_t,φ,π,χ,b) ∈ {exact_equivalent, conservative_equivalent, provisional_equivalent, non_equivalent}
    lag_upper_bound: λ⁺(ε,φ,π,χ,b) = current judgement に対して admissible な mirror lag upper bound
    effective_age_upper: A_eff⁺(ε)=Δ_obs(ε)+λ⁺(ε,φ,π,χ,b)
    coverage_ratio: Cov(ε,φ)= current claim facet に必要な coverage をどれだけ覆うかを示す比率
    alias_risk_class: Alias(ε,ω,φ) ∈ {bounded, degraded, excessive, unknown}
    directional_safety: DirSafe(Eq,φ)= conservative mapping が claim facet φ の安全側を壊さないこと
    lawful_resampling: RS(ε,ω_s→ω_t,φ,π,χ,b)=true iff active な ratified rule が存在し、Eq≠non_equivalent で、coverage / clock / provenance 条件を満たす
    outward_risk_facets:
    - sink_typing_positive_escalation
    - effect_realization
    - drift_support
  axioms:
  - window span の一致だけでは Eq=exact_equivalent を与えない。mode・aggregation operator・alignment anchor・coverage basis の一致、またはそれを保存する ratified rule を要求する。
  - rolling mean / tumbling count / cumulative snapshot / point sample は、ratified rule がない限り相互変換して current fact に使わない。
  - confirmed judgement で使う lag は mean lag ではなく λ⁺ を用いる。upper bound が出ない mirror は confirmed branch で使わない。
  - direct_system_observation と direct_reach_evidence には λ⁺=0 を与え、mirror rule に依存させない。
  - Cov 不足、Alias=excessive、clock mismatch、identity mismatch のいずれかがあるとき、少なくとも Eq=non_equivalent または freshness=stale とする。
  equivalence_rules:
    exact_equivalent:
    - ω_s と ω_t が mode・aggregation_operator・alignment_anchor・coverage_basis・clock_basis で一致する。
    - または active な identity-preserving ratified rule が存在し、DirSafe を問題にしなくてよい。
    conservative_equivalent:
    - active な ratified rule が存在し、Eq の bias が outward-risk facet に対して安全側である。
    - Cov が policy floor を満たし、Alias が bounded または degraded にとどまる。
    provisional_equivalent:
    - bounded lag と部分的 alignment はあるが、authority pending、coverage gap、missingness remediation、operator mismatch のいずれかが残る。
    - same-frame manual review または direct observation が追加で必要である。
    non_equivalent:
    - alignment anchor 不一致、aggregation semantics 不一致、lag upper bound 不在、clock mismatch、coverage gap 過大、Alias=excessive。
  freshness_connection:
    live:
    - A_eff⁺(ε) が live window 内にあり、Eq∈{exact_equivalent, conservative_equivalent} で、Cov と Alias が current facet の floor を満たす。
    - ただし conservative_equivalent を live として扱えるのは φ∈outward_risk_facets のときだけである。
    grace:
    - A_eff⁺(ε) は hard expiry 内だが、Eq=provisional_equivalent、または Alias=degraded、または Cov が confirm floor を満たさない。
    stale:
    - A_eff⁺(ε) が hard expiry を超える、または Eq=non_equivalent、または λ⁺ が unknown_or_excessive である。
    invalid:
    - timestamp / anchor / identity / provenance のいずれかが current judgement に必要な最小束縛を欠く。
  admissibility_rules:
    suspected_or_provisional:
    - Eq∈{exact_equivalent, conservative_equivalent, provisional_equivalent} かつ freshness∈{live, grace} なら suspicion / provisional promotion の補助根拠になりうる。
    confirmed_judgement:
    - Eq=exact_equivalent、または Eq=conservative_equivalent かつ DirSafe(Eq,φ)=true かつ φ∈outward_risk_facets を要求する。
    - さらに sink class ごとの integrity floor、direct sink identity、既存の direct reach 制約を満たす。
    - mirrored telemetry 単独では direct_reach_confirmed を満たさない。
    sealed_reentry_or_closure:
    - Eq=exact_equivalent と live freshness を要求する。conservative / provisional mapping は sealed re-entry や closure confirmation に使わない。
  branch_mapping:
    hold:
    - Eq=provisional_equivalent だが same-frame で direct observation、rule repair、window remap の lawful path がある。
    escalate:
    - cross-domain / global_default の window rule ratification が必要で、current authority では完結できない。
    'false':
    - Eq=non_equivalent で、lawful direct path も repair path もなく、current reliance を同一 frame で維持できない。
  decision_ledger_schema_extension:
    fields:
    - source_sampling_window_profile_ref
    - target_sampling_window_profile_ref
    - window_equivalence_class
    - window_equivalence_rule_ref
    - resampling_operator_ref
    - lag_upper_bound
    - lag_bound_method_ref
    - coverage_ratio
    - alias_risk_class
    - alignment_anchor_ref
  graph_engine_events:
  - sampling_window_equivalence_applied
  - sampling_window_equivalence_degraded
  - mirror_lag_reestimated
  - resampling_rule_rejected
  - coverage_gap_detected
  residual_open_points:
  - profile/context ごとの freshness window と hard expiry の数値較正をどこまで registry 化するか
mirror_lag_prior_credibility_model:
  status: provisional_fixed
  statement: mirror_lag_prior_credibility_model は、source family ごとに mirror lag upper bound の初期 prior λ0⁺ と credibility class κ_lag を定め、fresh lag evidence・ratified cadence rule・clock health を用いて安全側に更新し、A_eff・freshness・detector window・confirmation_due の admissibility へ接続する形式モデルである。
  notation:
    source_family: σ ∈ {direct_system_observation, direct_reach_evidence, access_control_or_routing_log, mirrored_telemetry, mirrored_registry, exported_log, batch_summary, human_declaration}
    lag_credibility_class: κ_lag ∈ {deterministic, bounded_strong, bounded_moderate, weak, unknown_or_excessive}
    credibility_level: ρ_lag(κ_lag) ∈ [0,1]
    prior_upper_bound: λ0⁺(σ) = source family σ に対する初期 lag upper bound
    ratified_bound: λrat⁺(ε) = ratified cadence / SLA / batch rule から導く bound
    empirical_bound: λemp⁺(ε) = recent lag sample から得る保守側 bound
    breach_guard: λbr⁺(ε) = recent bound breach を踏まえた再縮退 guard
    hard_floor: λfloor⁺(σ) = source family ごとに下回れない最小 bound
    active_upper_bound: λ*⁺(ε,φ,π,χ) = current judgement に使う active lag upper bound
    effective_age_upper: A_eff⁺(ε)=Δobs(ε)+λ*⁺(ε,φ,π,χ)
    admissible_live: LiveLag(ε,φ,π,χ)=true iff κ_lag と A_eff⁺ が current window 条件を満たす
  credibility_scale:
    deterministic:
      credibility_level: 0.99
      semantics: zero-lag または hard ceiling が authority/clock basis で確定している
    bounded_strong:
      credibility_level: 0.95
      semantics: stable mirror path または ratified SLA で強く上界を束縛できる
    bounded_moderate:
      credibility_level: 0.9
      semantics: batch rule または十分な empirical history で上界を置けるが変動余地が残る
    weak:
      credibility_level: 0.75
      semantics: sparse export / summary / self-report 補助に依存し、上界の信頼が弱い
    unknown_or_excessive:
      credibility_level: 0.0
      semantics: admissible な上界がない、または current window に対して過大である
  source_family_prior_table:
    direct_system_observation:
      prior_upper_bound: 0秒
      default_class: deterministic
      hard_floor: 0秒
    direct_reach_evidence:
      prior_upper_bound: 0秒
      default_class: deterministic
      hard_floor: 0秒
    access_control_or_routing_log:
      prior_upper_bound: 5分
      default_class: bounded_strong
      hard_floor: 1分
    mirrored_telemetry:
      prior_upper_bound: 30分
      default_class: bounded_strong
      hard_floor: 5分
    mirrored_registry:
      prior_upper_bound: 1営業日
      default_class: bounded_moderate
      hard_floor: 2時間
    exported_log:
      prior_upper_bound: 4時間
      default_class: bounded_moderate
      hard_floor: 30分
    batch_summary:
      prior_upper_bound: 2営業日
      default_class: weak
      hard_floor: 4時間
  axioms:
  - λ*⁺ は mean lag ではなく safety-side upper bound として扱う。
  - direct_system_observation と direct_reach_evidence には λ*⁺=0 を与え、mirror 規則を介さない。
  - weaker basis や self-report は λ*⁺ を tighten できない。tighten は stronger basis が入った場合にだけ許す。
  - recent breach が active bound を超え、repair / revalidation が未了なら κ_lag=unknown_or_excessive とする。
  - clock missing、alignment anchor 不整合、identity lineage 断絶、sampling semantics 不明のいずれかがある場合、少なくとも κ_lag∉{deterministic, bounded_strong} とする。
  update_rules:
    basis_precedence:
    - deterministic_clock_or_sequence
    - ratified_cadence_or_sla
    - empirical_monitored_bound
    - source_family_prior
    - declared_or_manual_estimate
    selection_rule:
    - deterministic basis がある場合、κ_lag=deterministic かつ λ*⁺=max(λfloor⁺, λdet⁺) とする。
    - それ以外では、もっとも強い admissible basis tier を選び、λ*⁺=max(λfloor⁺, λbasis_selected⁺, λbr⁺, safety_margin) とする。
    - selected basis が empirical_monitored_bound で、sample 数や horizon が不足するときは κ_lag を bounded_moderate 以下へ cap する。
    - declared_or_manual_estimate だけが残るときは κ_lag∈{weak, unknown_or_excessive} とし、confirmed branch には使わない。
  admissibility_rules:
    freshness_connection:
    - LiveLag=true には、A_eff⁺ が current signal persistence window を超えず、κ_lag∈{deterministic, bounded_strong}、または local_convention / provisional drift に限り κ_lag=bounded_moderate を許す。
    - A_eff⁺ が signal persistence window を超えて hard expiry 以内なら grace、hard expiry 超過または κ_lag=unknown_or_excessive なら stale とする。
    confirmation_due_connection:
    - emergency confirm に使う mirrored evidence は、κ_lag∈{deterministic, bounded_strong} かつ A_eff⁺ ≤ min(confirmation_due_remaining, hard_expiry_remaining) を要求する。
    - mirrored_registry / exported_log / batch_summary は、単独では release / closure confirmation の最終根拠にしない。
    branch_connection:
    - κ_lag=bounded_moderate は suspicion / provisional promotion / hold 継続には使えるが、confirmed leak / sealed re-entry / closure には単独で使わない。
    - κ_lag=weak は manual review / hold 補助に限定する。
    - κ_lag=unknown_or_excessive は current judgement では stale 以上として扱い、confirmed branch から排除する。
  decision_ledger_schema_extension:
    fields:
    - lag_prior_family
    - lag_prior_upper_bound
    - lag_hard_floor
    - lag_credibility_class
    - lag_credibility_level
    - lag_bound_basis_ref
    - lag_bound_updated_at
    - lag_recent_breach_ref
    - lag_unknown_or_excessive_reason
  graph_engine_events:
  - lag_prior_initialized
  - lag_bound_tightened
  - lag_bound_degraded
  - lag_unknown_or_excessive_detected
  - lag_bound_revalidated
  residual_open_points:
  - small-sample 時の λemp⁺ に使う prior α0 / β0 と ρ_lag を source family ごとにどう較正するか
  - operator bias / adversarial flooding / replay attack の補正項を lag 由来不確実性とどう分離するか
same_team_partial_independence_model:
  status: provisional_fixed
  statement: same_team_partial_independence_model は、同一 team / 同一 authority family の signal pair に対し、operator・tool・forum・raw basis・derivation の差分から partial independence class を与え、ProvSep と Cor への反映規則、bounded bonus、same_team corroboration unit の cap を定める形式モデルである。
  notation:
    signal: s = (signal_id, hypothesis_key, detector_family_ref, claim_facet_ref, team_id, operator_id, tool_family_id, pipeline_id, forum_id, authority_tier_ref, authority_path_ref, source_instance_ref, raw_basis_lineage_ref, derivation_kind_ref, observation_anchor_ref, window_anchor_ref)
    top_separation: SepTop(s_i,s_j) ∈ {same_source, same_pipeline, same_team, cross_pipeline, cross_authority}
    team_partial_class: TP(s_i,s_j) ∈ {coupled_duplicate, judgement_split, tool_split, dual_separated, forum_separated}
    hidden_coupling_axis: HCA(s_i,s_j) ⊆ {shared_raw_basis_snapshot, mirrored_or_derived_copy, shared_operator_judgement, shared_tool_or_model_run, shared_rulepack_or_prompt_pack, shared_forum_or_review_chain, shared_authority_path}
    same_team_bonus: B_team(s_i,s_j) ∈ {none, judgement_bonus, tool_bonus, one_team_unit}
    same_team_admissible: STAdm(s_i,s_j,δ,β)=true iff B_team=one_team_unit ∧ ReqSep(δ,β)=same_team ∧ ForbiddenFacet(δ,β)=false
    forbidden_same_team_confirm: ForbidTeam(δ,β)=true iff detector family δ が suspected_leak final confirm を要求する、または facet/profile/context β が direct_reach・direct_sink_identity・external_commitment・sealed_reentry・policy_sensitive を含む
    team_cap: TeamCap(T,h,w)=1 = team T, hypothesis h, aggregation window w から数えてよい same_team corroboration unit の上限
  classification_order:
  - SepTop は same_source / mirrored derivation / same_pipeline / cross_pipeline / cross_authority を先に判定し、residual case にだけ TP を適用する。
  - cross_pipeline または cross_authority が成立する場合、TP は参照しても Cor の class は上位 separation を優先する。
  - same raw-basis snapshot、same exported slice、same mirrored copy から生じた pair は、別 operator / 別 tool でも TP=coupled_duplicate とする。
  class_rules:
    coupled_duplicate:
      conditions:
      - raw_basis_lineage_ref が同一で snapshot 再利用に留まる
      - derivation_kind_ref が mirror / replica / cache / derived_preview のいずれか
      - 同一判断鎖を別 signal_id に再包装しただけである
      outputs:
        same_team_bonus: none
        corroboration_increment: 0
    judgement_split:
      conditions:
      - operator_id は異なる
      - tool_family_id, forum_id, raw_basis_lineage_ref, pipeline_id のうち主要部分が共有される
      outputs:
        same_team_bonus: judgement_bonus
        corroboration_increment: 0
    tool_split:
      conditions:
      - tool_family_id または model execution family は異なる
      - operator_id または raw_basis_lineage_ref / forum_id の共有が残る
      outputs:
        same_team_bonus: tool_bonus
        corroboration_increment: 0
    dual_separated:
      conditions:
      - operator_id が異なる
      - tool_family_id または execution family が異なる
      - raw_basis_lineage_ref が単一 snapshot 共有ではない
      - derivation_kind_ref が mirrored_or_derived_copy ではない
      - observation_anchor_ref または acquisition path が独立している
      outputs:
        same_team_bonus: one_team_unit
        corroboration_increment: 1 under TeamCap
    forum_separated:
      conditions:
      - dual_separated の条件を満たす
      - forum_id または review chain が分離される
      - authority_tier は同一だが authority_path_ref または sub-forum path が分離される
      outputs:
        same_team_bonus: one_team_unit
        corroboration_increment: 1 under TeamCap
  axioms:
  - judgement_split と tool_split は bounded diagnostic diversity ではあるが、Cor を増やす独立 corroboration には数えない。
  - dual_separated / forum_separated でも HCA に shared_rulepack_or_prompt_pack があり、かつ同一 raw basis への同型変換に留まる場合は one_team_unit へ昇格させない。
  - same_team corroboration unit は TeamCap により 1 team / 1 hypothesis / 1 aggregation window あたり 1 unit を上限とし、同 team 内 pair を線形加算しない。
  - STAdm=true でも、ForbidTeam=true のとき final confirm には使わず、at most suspicion / hold / template-local review 補助に留める。
  - same_team corroboration unit は cross_pipeline / cross_authority required separation の代用にならない。
  ProvSep_Cor_connection:
  - SepTop=same_team かつ TP∈{coupled_duplicate, judgement_split, tool_split} のとき、ProvSep=same_team と記録してよいが Cor の独立 unit は増やさない。
  - SepTop=same_team かつ TP∈{dual_separated, forum_separated} かつ STAdm=true のとき、same_team corroboration unit を 1 つだけ形成する。
  - SepTop=cross_pipeline または cross_authority のとき、same_team 内部 class は diagnostic metadata として保持し、Cor の class は上位 separation を優先する。
  detector_context_rules:
    local_convention_detected:
    - judgement_bonus / tool_bonus は triage priority または max_conf の bounded bonus にだけ使う。
    - dual_separated / forum_separated は same_team corroboration unit として admissible になりうる。
    confirmed_policy_drift:
    - template_local で ReqSep=same_team の場合に限り、forum_separated を confirm 補助へ使える。
    - domain_local 以上で ReqSep が cross_pipeline 以上なら same_team corroboration は不足とする。
    suspected_leak:
    - same_team partial independence は suspicion 強化には使えても、direct reach / sink identity requirement を代替しない。
  decision_ledger_schema_extension:
    fields:
    - top_separation_class
    - same_team_partial_class
    - hidden_coupling_axis_set
    - same_team_bonus_class
    - same_team_admissibility_flag
    - same_team_confirm_forbidden_reason
    - same_team_cap_applied
