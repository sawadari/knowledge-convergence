cross_session_settlement_debt_model:
  status: provisional_fixed
  statement: cross_session_settlement_debt_model は、settlement checkpoint、debt vector、transfer rule、closure projection、audit proof completeness を parameter 化するモデルである。
  primitives:
    settlement_checkpoint: χ_s = (covered_sessions, surviving_holds, released_reservations, transferred_debts, unresolved_residue, closure_projection, proof_bundle)
    debt_vector: δ = (δ_starvation, δ_disclosure, δ_reseal, δ_audit)
    transfer_rule: τ_d transfers one debt item only with lawful receiver, acceptance, due window, discharge condition
    closure_projection: γ ∈ {partial_surface, partial_object, global_clean, global_with_residue}
  functions:
    SettlementReady: SettlementReady(χ_s)=true iff covered live sessions are explicit, mandatory debt disposition is bound, and proof bundle is complete for requested closure projection.
    DebtTransferOK: DebtTransferOK(τ_d)=true iff receiver authority/custody matches debt class and acceptance + due window + discharge condition are present.
    GlobalClosureOK: GlobalClosureOK(γ)=true iff γ=global_clean implies no surviving hold and no unresolved residue, and γ=global_with_residue never implies final clean state.
    ProofBundleComplete: ProofBundleComplete(χ_s)=true iff scheduling, preemption, reservation, packet, debt, restoration, and closure lineage are all linked.
  tool_split:
    DecisionLedger: χ_s, δ, τ_d, γ の normative binding を保持する。
