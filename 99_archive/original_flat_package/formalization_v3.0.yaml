shared_archive_reservation_budget_model:
  status: provisional_fixed
  statement: shared_archive_reservation_budget_model は、reservation unit、sharing mode、borrow debt、orphan reclaim、silent invalidation 防止を parameter 化するモデルである。
  primitives:
    reservation_unit: ρ ∈ {witness_set, trace_packet_budget, exact_payload_handle, identity_unseal_slot, revoke_reseal_window}
    sharing_mode: μ ∈ {shareable_read_equivalent, exclusive_mutable, escrow_transfer, forbidden_borrow}
    borrow_debt: δ_b ≥ 0 recorded with deadline, reason, return obligation
    reclaim_state: κ ∈ {heartbeat_lost, quarantine_reclaim, hold_blocked, reassigned_with_witness, fully_released}
  functions:
    ReservationGrantOK: ReservationGrantOK(session,ρ,μ)=true iff quota / purpose / audience constraints hold and conflicting exclusive reservations are absent.
    BorrowOK: BorrowOK(ρ)=true iff authority ratification, debt ledger, return deadline, and downstream revoke plan are all present.
    OrphanReclaimOK: OrphanReclaimOK(ρ)=true iff hold/challenge absence is verified or reassignment witness is complete.
    SilentInvalidationForbidden: SilentInvalidationForbidden(s1,s2)=true iff revocation or reseal by s1 triggers affected-session notice and admissibility recompute for s2 when shared witness exists.
  tool_split:
    DecisionLedger: ρ, μ, δ_b, transfer / release judgement を保持する。
    GraphEngine: reservation map と recompute workflow を生成する。
    GraphLint: BorrowOK / OrphanReclaimOK / SilentInvalidationForbidden 違反を検査する。
    archive_object: exclusive handle custody と release witness を保存する。
  forbidden_shortcuts:
  - BorrowOK を満たさず budget を流用する
  - OrphanReclaimOK を満たさず reservation を fully_released にする
