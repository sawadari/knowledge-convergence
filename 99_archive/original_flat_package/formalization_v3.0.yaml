detector_confidence_aggregation_model:
  status: provisional_fixed
  statement: detector_confidence_aggregation_model は、detector signal を cluster と corroboration unit へ正規化し、same-source 系の重複を除去したうえで bounded に confidence を集約し、policy drift と leak 系の threshold model へ共通入力を与える形式化である。
  notation:
    detector_case: χ = (case_id, detector_family, hypothesis_key, target_ref, effect_zone_ref, aggregation_window_profile_ref, state)
    signal_unit: s = (signal_id, detector_family, hypothesis_key, source_family_ref, source_instance_ref, pipeline_ref, team_ref, authority_tier_ref, claim_facet, lineage_ref, observed_at, window_profile_ref, strength_class, integrity_class, freshness_state, raw_confidence)
    cluster_unit: c = (cluster_id, hypothesis_key, target_ref, lineage_ref, facet_or_sink_ref, effect_zone_ref, window_anchor, dedup_rule_ref, member_signal_refs)
    corroboration_unit: u = (unit_id, case_ref, independence_class, member_cluster_refs, representative_cluster_ref)
    independence_class: I ∈ {same_source, same_pipeline, same_team, cross_pipeline, cross_authority}
    strength_class: Σ ∈ {weak, moderate, strong}
    dedup_equivalence: s_i ≈ s_j iff detector_family・hypothesis_key・target/lineage・facet_or_sink・effect_zone が一致し、差分が retry / mirror / batch slice / same-window overlap に留まる
    effective_signal_confidence: conf_eff(s,t)=raw_confidence(s) × fresh_weight(s,t) × integrity_weight(s)
    cluster_support: cl_conf(c,t)=cap1(max_{s∈c} conf_eff(s,t) + λ_div·div_bonus(c,t) + λ_pers·pers_bonus(c,t) - λ_dep·dep_penalty(c,t))
    corroboration_count: Cor(χ,t)=min(3, |{u | u is admissible corroboration unit for χ at t}|)
    separation_grade: ProvSep(χ,t)=max_{u admissible for χ at t} independence_class(u)
    aggregate_confidence: agg_conf(χ,t)=cap1(BoundedAgg({cl_conf(rep(u),t) | u admissible}))
    max_signal_confidence: max_conf(χ,t)=max_{c in case χ} cl_conf(c,t)
    penalty_link: max_conf(χ,t), agg_conf(χ,t), Cor(χ,t) は adversarial_correlation_penalty_model の penalty と confirm-eligibility gate を反映した後の値とする
  axioms:
  - same_source / same_pipeline の repeated alert は dedup_equivalence で同一 cluster へ畳み込み、独立 corroboration として二重算入しない。
  - mirrored duplicate は freshness / lag 条件が整っても same original observation の copy である限り cross_pipeline corroboration に昇格しない。
  - batch anomaly は item 数ではなく batch incident 1 件として扱い、batch slice の個数を Cor(χ,t) へ加えない。
  - window overlap があり hypothesis_key・effect_zone・lineage が同じなら merge を優先し、state transition または effect-zone shift がある場合だけ別 cluster とする。
  - burst event は pers_bonus を増やしうるが、Cor(χ,t) と ProvSep(χ,t) の shortcut には使わない。
  - bias penalty は judgement_bonus / tool_bonus / same_team corroboration credit を先に除去し、その後にだけ numeric penalty を掛ける。
  - flooding penalty は dedup / merge / TeamCap 後の excess multiplicity にだけ掛け、registered cadence 内の lawful burst を二重減点しない。
  - replay penalty は freshness / lag / epoch split で既に invalid な support を二重減点せず、残余の reused support にだけ掛ける。
  - agg_conf(χ,t) は threshold 判定の一部にすぎず、blast radius・authority tier・effective reliance・direct authoritative pair / direct reach evidence を上書きしない。
  detector_parameterization:
    local_convention_detected:
      window_anchor: registry review / reflection cycle
      cluster_key: basis lineage + protected facet + lifecycle state + effect zone
      corroboration_floor: same-team capped, cross-pipeline 以上で独立 corroboration
      confirm_mode: confirmed_policy_drift model が扱う
    policy_drift:
      window_anchor: active/reflected basis epoch + effective reliance interval
      cluster_key: basis lineage + protected facet mismatch + runtime effective-use path
      corroboration_floor: cross-pipeline 以上、または direct authoritative pair
      confirm_mode: policy_drift_detector_threshold_model の CPD へ入力
    suspected_leak:
      window_anchor: sink exposure episode + ttl/containment window
      cluster_key: artifact lineage + sink family + route identity + audience/automation reach
      corroboration_floor: cross-pipeline 以上、confirmed には direct reach evidence を追加要求
      confirm_mode: isolation_externality_budget_model の LeakS/LeakC へ入力
  branch_connection_rules:
    emergency_suspend:
    - max_conf(χ,t) が高く、effective reliance または prohibited sink / protected facet hit があるとき single strong cluster でも起動しうる。
    - ただし burst だけでは起動せず、current action の downstream automation / external commitment / authoritative reliance と束で評価する。
    confirm:
    - policy drift では agg_conf(χ,t) に加えて direct authoritative pair または required separation を満たす Cor(χ,t) を要する。
    - leak confirm では agg_conf(χ,t) に加えて direct reach evidence と direct sink identity を要し、mirrored telemetry 単独を shortcut にしない。
    release:
    - lawful repair / reflection / closure evidence により live cluster が消え、NoActiveMismatch または no live exposure が成立したとき。
    - window expiry だけでは release せず、repair または contrary evidence の束縛を要求する。
  decision_ledger_schema_extension:
    fields:
    - detector_case_id
    - hypothesis_key
    - signal_unit_id
    - signal_cluster_id
    - corroboration_unit_id
    - aggregation_window_profile_ref
    - window_anchor_ref
    - independence_class
    - duplicate_kind
    - burst_cap_state
    - cluster_support_class
    - aggregate_confidence_ref
    - penalty_profile_ref
    - penalty_gate_flag
