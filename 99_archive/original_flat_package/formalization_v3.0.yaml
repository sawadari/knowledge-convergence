scheduler_policy_rollout_migration_model:
  status: provisional_fixed
  statement: scheduler_policy_rollout_migration_model は、simulation scenario、input bundle、canary rollout、threshold migration comparability を parameter 化するモデルである。
  primitives:
    policy_snapshot: π ∈ PolicySnapshot
    scenario_class: σ ∈ {steady_state_load, burst_contention, debt_recovery, telemetry_loss_or_lag, manual_override_conflict, mixed_profile_competition}
    simulation_bundle: β = (π_old, π_new, threshold_diff, hysteresis_diff, remediation_diff, replay_slice, baseline, protected_floor_map, debt_backlog_vector, source_integrity_assumption, rollback_target)
