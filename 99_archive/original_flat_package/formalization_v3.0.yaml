        signal_persistence_window: BD(5)
        corroboration_aggregation_window: BD(10)
        case_hard_expiry: BD(20)
      confirmed_policy_drift:
        signal_persistence_window: BD(3)
        corroboration_aggregation_window: BD(5)
        case_hard_expiry: BD(10)
      suspected_leak:
        signal_persistence_window: HR(4)
        corroboration_aggregation_window: BD(1)
        case_hard_expiry: BD(2)
    organizational_or_social:
      local_convention_detected:
        signal_persistence_window: BD(7)
        corroboration_aggregation_window: BD(12)
        case_hard_expiry: BD(20)
      confirmed_policy_drift:
        signal_persistence_window: BD(5)
        corroboration_aggregation_window: BD(7)
        case_hard_expiry: BD(12)
      suspected_leak:
        signal_persistence_window: BD(1)
        corroboration_aggregation_window: BD(2)
        case_hard_expiry: BD(3)
  context_cap_table:
    single_branch:
      local_convention_detected:
        signal_persistence_window: BD(2)
        corroboration_aggregation_window: BD(3)
        case_hard_expiry: BD(5)
      confirmed_policy_drift:
        signal_persistence_window: BD(1)
        corroboration_aggregation_window: BD(2)
        case_hard_expiry: BD(4)
      suspected_leak:
        signal_persistence_window: HR(2)
        corroboration_aggregation_window: HR(4)
        case_hard_expiry: HR(8)
    external_irreversible:
      local_convention_detected:
        signal_persistence_window: BD(1)
        corroboration_aggregation_window: BD(2)
        case_hard_expiry: BD(4)
      confirmed_policy_drift:
        signal_persistence_window: HR(4)
        corroboration_aggregation_window: BD(1)
        case_hard_expiry: BD(2)
      suspected_leak:
        signal_persistence_window: HR(1)
        corroboration_aggregation_window: HR(2)
        case_hard_expiry: HR(4)
    policy_sensitive:
      local_convention_detected:
        signal_persistence_window: BD(2)
        corroboration_aggregation_window: BD(4)
        case_hard_expiry: BD(7)
      confirmed_policy_drift:
        signal_persistence_window: BD(1)
        corroboration_aggregation_window: BD(2)
        case_hard_expiry: BD(5)
      suspected_leak:
        signal_persistence_window: HR(2)
        corroboration_aggregation_window: HR(4)
        case_hard_expiry: BD(1)
  family_specific_invalidity_rules:
    local_convention_detected:
    - hard expiry 到達後、同一 review / reflection cycle 内の fresh registry/runtime pair を欠く cluster は confirm / release の根拠として invalid_support へ落とす。
    - reviewer disagreement だけで生じた weak cluster は hard expiry 前でも direct mismatch を伴わなければ confirm 側へ昇格しない。
    confirmed_policy_drift:
    - hard expiry 到達後、active/reflected basis と current effective use を結ぶ live trace を欠く mismatch evidence は invalid_support へ落とす。
    - confirmed_state の継続には stale drift evidence ではなく fresh repair evidence または fresh reconfirmation を要求する。
    suspected_leak:
    - hard expiry 到達後、mirrored telemetry・indirect routing evidence・self-report は confirm / release の根拠として invalid_support へ落とす。
    - direct reach evidence も hard expiry 超過後は incident history にだけ残り、ongoing quarantine / confirm の current 根拠には再観測を要求する。
  merge_split_rules:
    merge:
    - hypothesis_key・target/lineage・protected facet or sink family・effect zone が一致し、cluster 間隔が AW 以内で、remediation / confirm / release / reflection epoch の切替えがなければ同一 case epoch へ merge する。
    split:
    - effect zone、protected facet、sink family、authority tier、remediation epoch、closure epoch のいずれかが切り替わるときは split する。
    - hard expiry 超過後の new signal は reopen ではなく new epoch とする。
    dedup:
    - same_source / same_pipeline / mirrored duplicate / batch slice は dedup_equivalence により同一 cluster へ畳み込む。
  linkage_rules:
    with_freshness_and_mirror_lag:
    - mirrored source の A_eff は observation age ではなく lag upper bound を加えた effective age で判定する。
    - lag upper bound が unknown_or_excessive のときは、少なくとも grace_support 以下へ落とし、confirmed branch には使わない。
    with_sla_clock:
    - emergency suspend が起動している case では、confirm に使う cluster は confirmation_due_at と ExpAt(χ) の早い方まで live_support を維持しなければならない。
    - hard expiry 到達は auto release を意味しない。hard expiry 後は re-observation / higher authority review / explicit closure のいずれかを要求する。
  decision_ledger_schema_extension:
    fields:
    - detector_case_family
    - signal_persistence_window_ref
    - corroboration_aggregation_window_ref
    - case_hard_expiry_ref
    - hard_expiry_at
    - support_state
    - case_epoch_id
    - epoch_split_reason
    - stale_to_invalid_reason
  graph_engine_events:
  - detector_support_degraded_to_grace
  - detector_support_invalidated
  - detector_case_epoch_split
  - detector_case_hard_expiry_reached
  - detector_case_reobserved
  residual_open_points: []
  registry_resolution:
  - freshness/expiry registry の canonical separation は freshness_expiry_registry_model で解消した。
  - profile baseline と context cap の二層構造を正式採用した。
policy_drift_detector_threshold_model:
  status: provisional_fixed
  statement: policy_drift_detector_threshold_model は、registry artifact に対する drift detector の signal 群から local_convention_detected と confirmed_policy_drift を分け、blast radius と authority tier に応じて emergency suspend と confirmation authority を切り分ける形式モデルである。
  notation:
    detector_signal: δ = (signal_id, artifact_id, signal_kind, protected_facet_ref, lifecycle_state_ref, source_family_ref, provenance_group_ref, detector_integrity_class, detector_confidence, observation_time, basis_ref)
    signal_kind: κ ∈ {direct_registry_mismatch, unregistered_effective_use, silent_extension, predecessor_bypass, suspended_or_revoked_reliance, unreflected_override, authority_path_mismatch}
    detected_state: DSt(ρ,t) ∈ {none, local_convention_detected, confirmed_policy_drift, cleared}
    effective_reliance: EffRel(ρ,t)=true iff current runtime / reflected dependency / intended action が ρ またはその local substitute を authoritative basis として用いている
    facet_hit: FacHit(ρ,t)=true iff protected facet 上の mismatch が admissible evidence により観測される
    strong_signal: Strong(ρ,t)=true iff admissible κ に direct_registry_mismatch, suspended_or_revoked_reliance, authority_path_mismatch のいずれかが含まれる
    provenance_separation: ProvSep(ρ,t) ∈ {same_source, same_pipeline, same_team, cross_pipeline, cross_authority}
    corroboration_level: Cor(ρ,t) ∈ {0,1,2,3}
    direct_authoritative_pair: DirAuth(ρ,t)=true iff first-party authoritative registry evidence と runtime effective-use trace が protected facet 一致で連結している
    penalty_gate: PenGate(ρ,t)=true iff adversarial_correlation_penalty_model において confirm-eligible path が severe penalty で閉じている
    prior_ready: PriorReady(ρ,t)=true iff small_sample_prior_credibility_calibration_model において Ready(detector_confirmability, ρ, t)=true
    base_detect_floor:
      template_local: 0.65
      domain_local: 0.6
      cross_domain: 0.55
      global_default: 0.5
    base_confirm_floor:
      template_local: 0.85
      domain_local: 0.85
      cross_domain: 0.88
      global_default: 0.9
    required_separation:
      template_local: same_team
      domain_local: cross_pipeline
      cross_domain: cross_pipeline
      global_default: cross_authority
    confirmation_tier:
      template_local: domain_authority
      domain_local: domain_authority
      cross_domain: central_authority
      global_default: central_authority
    local_convention_detected: LCD(ρ,t)=true iff EffRel(ρ,t)=true ∧ FacHit(ρ,t)=true ∧ max_conf(ρ,t)≥base_detect_floor(B(ρ)) ∧ (Strong(ρ,t)=true ∨ Cor(ρ,t)≥2 ∨ DirAuth(ρ,t)=true)
    confirmed_policy_drift: CPD(ρ,t)=true iff EffRel(ρ,t)=true ∧ FacHit(ρ,t)=true ∧ agg_conf(ρ,t)≥base_confirm_floor(B(ρ)) ∧ (DirAuth(ρ,t)=true ∨ (Cor(ρ,t)≥2 ∧ ProvSep(ρ,t)≥required_separation(B(ρ)))) ∧ SameTierConflictOnly(ρ,t)=false ∧ PenGate(ρ,t)=false ∧ PriorReady(ρ,t)=true
  axioms:
  - EffRel(ρ,t)=false の proposal / review hygiene issue は LCD / CPD を成立させない。
  - same_source / same_pipeline の repeated signal は 1 corroboration group として数え、confidence aggregation の独立証拠として二重算入しない。
  - mirrored observation は freshness / lag 条件が未確定の間、LCD の補助には使えても CPD の shortcut には使わない。
  - SameTierConflictOnly(ρ,t)=true、すなわち peer disagreement だけで unreflected override も unauthorized activation もない場合、CPD(ρ,t)=false とする。
  - delegated reviewer は LCD と provisional emergency suspend を発火できるが、CPD の final confirm は confirmation_tier(B(ρ)) を満たす authority が行う。
  - PenGate(ρ,t)=true の間、LCD は起動しうるが CPD は開かない。
  - DirAuth(ρ,t)=true かつ direct anchor clean のとき、direct cluster 自体には numeric penalty を掛けず、周辺 corroboration path だけを減衰させる。
  - cross_domain / global_default artifact の CPD confirm は DirAuth(ρ,t)=true でも central_authority confirm を省略しない。
  branch_mapping:
    hold:
    - LCD(ρ,t)=true かつ PredSafe(ρ,t)=true かつ same-frame で lineage / witness / reflection repair が可能
    emergency_suspend:
    - LCD(ρ,t)=true かつ (AutoPathLive(ρ,t)=true ∨ B(ρ)∈{cross_domain, global_default} ∨ CriticalFacetHit(ρ,t)=true)
    confirm:
    - CPD(ρ,t)=true かつ confirmer tier が confirmation_tier(B(ρ)) を満たす
    release:
    - LCD(ρ,t)=true かつ CPD(ρ,t)=false かつ LinkageRepaired(ρ,t)=true かつ NoActiveMismatch(ρ,t)=true
    revoke:
    - CPD(ρ,t)=true かつ unlawful basis 自体を authoritative set から除外する必要があり PreservingSuccessorOnly(ρ,t)=false
    escalate:
    - LCD(ρ,t)=true かつ confirmer tier 不足、peer forum conflict 未解決、または cross-domain impact により上位 authority path が必要
    'false':
    - PredSafe(ρ,t)=false かつ UpperAuthorityPath(ρ,t)=false かつ current intended reliance を同一 frame で lawful に継続できない
  decision_ledger_schema_extension:
    fields:
    - detector_case_id
    - signal_bundle_ref
    - corroboration_group_ref
    - provenance_separation_class
    - affected_protected_facet_ref
    - affected_basis_status_ref
    - effective_reliance_ref
    - confirmation_authority_ref
    - release_basis_ref
    - revoke_basis_ref
  graph_engine_events:
  - detector_signal_recorded
  - drift_corroborated
  - local_convention_detected
  - policy_drift_escalated
  - policy_drift_confirmed
  - policy_drift_released
  - policy_drift_revoked
  - policy_drift_false_positive_cleared
  - policy_drift_confirm_gated
  residual_open_points:
  - mirror lag estimate と sampling window の統計的同値 rule を provenance / freshness とどう統合するか
  - small-sample 時の penalty gate 閾値を profile / artifact class ごとにどう較正するか
isolation_externality_budget_model:
  status: provisional_fixed
  statement: isolation_externality_budget_model は、shadow execution、sandbox execution、branch-local artifact generation が intersection_safe の isolation_basis として lawful である条件を、externality class cap と sink / audience / ttl / rollback-purge obligation の budget 制約として形式化するモデルである。
  notation:
    isolation_basis: ι = (basis_id, isolation_profile_ref, artifact_mode, class_cap, allowed_sink_set, allowed_audience_class, allowed_artifact_kind_set, ttl_window, review_due_at, expiry_at, rollback_packet_ref, purge_rule_ref, automation_block_rule_ref, leak_detector_rule_ref, owner_binding_ref, status)
    externality_class: Ext(ι,a,t) ∈ {sealed_internal, bounded_internal_observable, externalized_nonbinding, authoritative_or_committing}
    within_budget: BudOK(ι,a,t)=true iff Ext(ι,a,t) ≤ class_cap(ι) ∧ Sink(a,t)⊆allowed_sink_set(ι) ∧ Audience(a,t)⊆allowed_audience_class(ι) ∧ Kind(a)⊆allowed_artifact_kind_set(ι) ∧ t∈ttl_window(ι) ∧ AutomationBlocked(a,t)=true ∧ RollbackReady(ι,t)=true
    review_due: RD(ι,t)=true iff t < expiry_at(ι) ∧ t ≥ review_due_at(ι) ∧ LeakConfirmed(ι,t)=false
    expired: EX(ι,t)=true iff t > expiry_at(ι)
    suspected_leak: LeakS(ι,e,t)=true iff e が prohibited sink 到達の兆候を示すが provenance separation が未確定
    confirmed_leak: LeakC(ι,e,t)=true iff e が authoritative state / public output / external commitment / irreversible resource lock への到達を同定する
  axioms:
  - BudOK(ι,a,t)=true のときだけ intersection_safe の isolation_basis として reliance できる。
  - Ext(ι,a,t)∈{externalized_nonbinding, authoritative_or_committing} の action は isolation_basis では正当化しない。
  - RD(ι,t)=true は budget 延長ではなく pre-expiry cap であり、cleanup / purge / containment reinforcement 以外の propagation を許さない。
  - LeakC(ι,e,t)=true のとき BSt(ι,t)=revoked とし、containment / rollback / notification / escalation 以外の reliance を禁止する。
  - EX(ι,t)=true の isolation artifact は quarantine read-only または purge queue に移し、新規 propagation basis に使わない。
  profile_caps:
    strict_internal_profile:
      class_cap: sealed_internal
      allowed_modes:
      - shadow_execution
      - sandbox_execution
    bounded_review_profile:
      class_cap: bounded_internal_observable
      allowed_modes:
      - sandbox_execution
      - branch_local_artifact
      required_labels:
      - non_authoritative
      - branch_bound
      - no_automation
      - expiry_at
    extended_review_profile:
      class_cap: bounded_internal_observable
      allowed_modes:
      - sandbox_execution
      - branch_local_artifact
      required_labels:
      - non_authoritative
      - branch_bound
      - no_automation
      - expiry_at
      - owner
  duration_basis:
    hour: HR(n)
    business_day: BD(n)
  numeric_cap_table:
    regulated:
      sealed_internal:
        admissibility: default
        sink_cap_count: 3
        audience_cap_named_humans: 1
        artifact_kind_cap_count: 3
        review_due: HR(4)
        expiry: BD(1)
        purge_due_after_expiry: HR(4)
      bounded_internal_observable:
        admissibility: exception_only
        required_authority: domain_authority
        sink_cap_count: 2
        audience_cap_named_humans: 3
        artifact_kind_cap_count: 2
        review_due: HR(4)
        expiry: BD(1)
        purge_due_after_expiry: HR(4)
      externalized_nonbinding:
        admissibility: not_isolation_basis
      authoritative_or_committing:
        admissibility: prohibited
    engineering_tradeoff:
      sealed_internal:
        admissibility: default
        sink_cap_count: 4
        audience_cap_named_humans: 2
        artifact_kind_cap_count: 4
        review_due: BD(1)
        expiry: BD(3)
        purge_due_after_expiry: BD(1)
      bounded_internal_observable:
        admissibility: default
        sink_cap_count: 4
        audience_cap_named_humans: 7
        artifact_kind_cap_count: 4
        review_due: BD(2)
        expiry: BD(5)
        purge_due_after_expiry: BD(1)
      externalized_nonbinding:
        admissibility: not_isolation_basis
      authoritative_or_committing:
        admissibility: prohibited
    organizational_or_social:
      sealed_internal:
        admissibility: default
        sink_cap_count: 4
        audience_cap_named_humans: 3
        artifact_kind_cap_count: 4
        review_due: BD(2)
        expiry: BD(5)
        purge_due_after_expiry: BD(2)
      bounded_internal_observable:
        admissibility: default
        sink_cap_count: 5
        audience_cap_named_humans: 15
        artifact_kind_cap_count: 5
        review_due: BD(5)
        expiry: BD(10)
        purge_due_after_expiry: BD(2)
      externalized_nonbinding:
        admissibility: not_isolation_basis
      authoritative_or_committing:
        admissibility: prohibited
  override_context_caps:
    single_branch:
      class_cap: sealed_internal
      audience_cap_named_humans: 2
      review_due: HR(4)
      expiry: BD(1)
    external_irreversible:
      class_cap: sealed_internal
      audience_cap_named_humans: 1
      review_due: HR(1)
      expiry: HR(4)
    policy_sensitive:
      class_cap: sealed_internal
      audience_cap_named_humans: 3
      review_due: HR(4)
      expiry: BD(1)
      bounded_internal_observable_exception_requires:
      - domain_authority_preapproval
      - designated_compliance_reviewer
  effective_cap_functions:
    class_cap: ClassCapEff(π,ctx)=min_class(BaseClassCap(π), OverrideClassCap(ctx))
    sink_cap: SinkCapEff(π,ctx)=min(BaseSinkCap(π), OverrideSinkCap(ctx)) when OverrideSinkCap is defined else BaseSinkCap(π)
    audience_cap: AudCapEff(π,ctx)=min(BaseAudienceCap(π), OverrideAudienceCap(ctx))
    artifact_cap: ArtCapEff(π,ctx)=min(BaseArtifactCap(π), OverrideArtifactCap(ctx)) when OverrideArtifactCap is defined else BaseArtifactCap(π)
    review_due: RevDueEff(π,ctx)=min(BaseReviewDue(π), OverrideReviewDue(ctx))
    expiry: ExpEff(π,ctx)=min(BaseExpiry(π), OverrideExpiry(ctx))
    purge_due: PurgeEff(π,ctx)=min(BasePurgeDue(π), OverridePurgeDue(ctx)) when OverridePurgeDue is defined else BasePurgeDue(π)
  operational_constraints:
  - RD(ι,t)=true の間は extension_request / cleanup / revalidation / purge 準備だけを許し、new sink 追加・audience 拡張・artifact 派生を禁止する。
  - EX(ι,t)=true のとき artifact は quarantine read-only へ遷移し、t ≤ expiry_at(ι)+purge_due_after_expiry(ι) の範囲で purge または reset を完了しなければならない。
  - Ctx={single_branch, external_irreversible, policy_sensitive} のいずれかが真なら、CapEff は strictest override を採る。
  - externalized_nonbinding と authoritative_or_committing は numeric cap を持っても isolation_basis の lawful reliance には使わない。
  q_decision_connection_rules:
  - BudOK(ι,a,t)=false だが same-frame purge / reset / route shutdown で回復可能なら hold とする。
  - LeakS(ι,e,t)=true のとき、quarantine と propagation freeze を即時実施し、authority route があれば escalate を優先する。
  - LeakC(ι,e,t)=true で rollback / notification / containment path が lawful に存在する場合は escalate、存在しない場合は false とする。
  - RD(ι,t)=true の basis を使った audience 拡張、external route 接続、authoritative pre-stage は q_decision を 1 以下に抑える。
  detector_threshold_model:
    provenance_levels:
      none: 0
      candidate_link: 1
      linked_path: 2
      direct_sink_identity: 3
    detector_integrity_levels:
      self_declared: 0
      mirrored_observability: 1
      standard_observability: 2
      control_plane_record: 3
      system_of_record_or_forensic: 4
    base_thresholds:
      authoritative_state:
        theta_s: 0.45
        kappa_s: 1
        pi_s: candidate_link
        theta_c: 0.8
        kappa_c: 2
        pi_c: direct_sink_identity
        shortcut_allowed: true
      public_output:
        theta_s: 0.5
        kappa_s: 1
        pi_s: candidate_link
        theta_c: 0.85
        kappa_c: 2
        pi_c: direct_sink_identity
        shortcut_allowed: true
      external_commitment:
        theta_s: 0.4
        kappa_s: 1
        pi_s: candidate_link
        theta_c: 0.85
        kappa_c: 2
        pi_c: direct_sink_identity
        shortcut_allowed: true
      irreversible_resource_lock:
        theta_s: 0.55
        kappa_s: 1
        pi_s: candidate_link
        theta_c: 0.9
        kappa_c: 2
        pi_c: direct_sink_identity
        shortcut_allowed: false
    profile_adjustments:
      regulated:
        delta_theta_s: -0.1
        delta_theta_c: -0.05
        integrity_floor_confirmed: system_of_record_or_forensic
        integrity_floor_suspected: mirrored_observability
      engineering_tradeoff:
        delta_theta_s: 0.0
        delta_theta_c: 0.0
        integrity_floor_confirmed: standard_observability
        integrity_floor_suspected: mirrored_observability
      organizational_or_social:
        delta_theta_s: 0.05
        delta_theta_c: 0.05
        integrity_floor_confirmed: standard_observability
        integrity_floor_suspected: mirrored_observability
    context_adjustments:
      single_branch:
        delta_theta_s: -0.05
        delta_theta_c: -0.05
        integrity_floor_confirmed_override:
      external_irreversible:
        delta_theta_s: -0.15
        delta_theta_c: -0.05
        shortcut_allowed_override: false
        integrity_floor_confirmed_override:
      policy_sensitive:
        delta_theta_s: -0.1
        delta_theta_c: -0.05
        integrity_floor_confirmed_override: control_plane_record
    direct_reach_evidence_rules:
      authoritative_state: DirectReach(e)=1 iff WriteReceipt(e)=1 ∧ TargetObjMatch(e)=1
      public_output: DirectReach(e)=1 iff PublicVisible(e)=1 ∧ PublicationRouteMatch(e)=1
      external_commitment: DirectReach(e)=1 iff CommitRecord(e)=1 ∧ RecipientMatch(e)=1
      irreversible_resource_lock: DirectReach(e)=1 iff LockReceipt(e)=1 ∧ LockedResourceMatch(e)=1
    effective_threshold_functions:
      theta_s: θS_eff(π,s,ctx)=clamp01(θS_base(s)+ΔθS_profile(π)+ΔθS_ctx(ctx))
      theta_c: θC_eff(π,s,ctx)=clamp01(θC_base(s)+ΔθC_profile(π)+ΔθC_ctx(ctx))
      kappa_s: κS_eff(π,s,ctx)=κS_base(s)
      kappa_c: κC_eff(π,s,ctx)=κC_base(s)
      pi_s: πS_eff(π,s,ctx)=πS_base(s)
      pi_c: πC_eff(π,s,ctx)=πC_base(s)
      int_s: IntS_eff(π,ctx)=max_int(mirrored_observability, IntSFloor_profile(π), IntSFloor_ctx(ctx))
      int_c: IntC_eff(π,s,ctx)=max_int(BaseIntFloor_sink(s), IntFloor_profile(π), IntFloor_ctx(ctx), IntFloor_ctx_override(ctx))
      shortcut: Shortcut(e,s,ctx)=1 iff shortcut_allowed(s)=true ∧ DirectReach(e)=1 ∧ Int(e)≥BaseIntFloor_sink(s) ∧ shortcut_allowed_override(ctx)≠false
      penalty_linkage: Conf(e), Corr(e), Prov(e) は detector_confidence_aggregation_model と adversarial_correlation_penalty_model の admissible output を使う
      prior_ready: PriorReadyLeak(e,t)=true iff small_sample_prior_credibility_calibration_model において Ready(detector_confirmability, e, t)=true
    decision_rules:
      leak_suspected: LeakS(ι,e,t)=true iff Conf(e) ≥ θS_eff(Profile(ι),SC(e),Ctx(ι,e)) ∧ Corr(e) ≥ κS_eff(Profile(ι),SC(e),Ctx(ι,e)) ∧ Prov(e) ≥ πS_eff(Profile(ι),SC(e),Ctx(ι,e)) ∧ Int(e) ≥ IntS_eff(Profile(ι),Ctx(ι,e))
      leak_confirmed: LeakC(ι,e,t)=true iff Conf(e) ≥ θC_eff(Profile(ι),SC(e),Ctx(ι,e)) ∧ Corr(e) ≥ max(1, κC_eff(Profile(ι),SC(e),Ctx(ι,e)) - Shortcut(e,SC(e),Ctx(ι,e))) ∧ Prov(e) ≥ πC_eff(Profile(ι),SC(e),Ctx(ι,e)) ∧ Int(e) ≥ IntC_eff(Profile(ι),SC(e),Ctx(ι,e)) ∧ DirectReach(e)=1 ∧ PriorReadyLeak(e,t)=true
    provisional_sink_typing:
      notation:
        queryability: Qq(a) ∈ {owner_local, bounded_internal, external_addressable}
        visibility: Vis(a) ∈ {owner_only, named_internal, cross_team_internal, external_party}
        reusability: Reu(a) ∈ {none, case_bound_internal, repeatable_internal, cross_context_or_public}
        automation_reach: Aut(a) ∈ {none, owner_local_noncommitting, internal_nonowner_noncommitting, external_or_committing}
        ttl_state: Ttl(a,π,ctx) ∈ {within_sealed_cap, within_bounded_cap, exceeds_bounded_cap}
        human_portability: HP(a) ∈ {low, high}
        audience_binding: AB(a) ∈ {named_bound, broad_or_unbound}
      effective_class_rule:
        externalized_nonbinding: ST_ext(a,π,ctx)=1 iff Qq(a)=external_addressable ∨ Vis(a)=external_party ∨ Reu(a)=cross_context_or_public ∨ Aut(a)=external_or_committing ∨ Ttl(a,π,ctx)=exceeds_bounded_cap
        bounded_internal_observable: ST_bnd(a,π,ctx)=1 iff ST_ext(a,π,ctx)=0 ∧ (Qq(a)=bounded_internal ∨ Vis(a)∈{named_internal,cross_team_internal} ∨ Reu(a)=repeatable_internal ∨ Aut(a)=internal_nonowner_noncommitting ∨ Ttl(a,π,ctx)=within_bounded_cap) ∧ ¬SealExc(a,π,ctx)
        sealed_internal: ST_seal(a,π,ctx)=1 iff ST_ext(a,π,ctx)=0 ∧ ST_bnd(a,π,ctx)=0 ∧ OwnerBound(a)=1
      artifact_specific_rules:
        shared_telemetry: SinkType(shared_telemetry)=sealed_internal iff OwnerBound=1 ∧ Qq=owner_local ∧ Vis=owner_only ∧ Reu∈{none,case_bound_internal} ∧ Aut∈{none,owner_local_noncommitting} ∧ Ttl=within_sealed_cap; otherwise bounded_internal_observable unless ST_ext=1
        temporary_cache: SinkType(temporary_cache)=sealed_internal iff Qq=owner_local ∧ Vis=owner_only ∧ Reu∈{none,case_bound_internal} ∧ Aut∈{none,owner_local_noncommitting} ∧ Ttl=within_sealed_cap; bounded_internal_observable iff ST_ext=0 and not sealed; externalized_nonbinding iff ST_ext=1
        derived_preview: SinkType(derived_preview)=bounded_internal_observable by default; sealed_internal only under the same owner-local conditions as temporary_cache; externalized_nonbinding iff ST_ext=1
      profile_overrides:
        regulated: Promote_reg(a)=max_class(SinkType(a), bounded_internal_observable) when Vis(a)≠owner_only ∨ Qq(a)≠owner_local ∨ Aut(a)=internal_nonowner_noncommitting; derived_preview with external visibility or public export affordance is forced to externalized_nonbinding
        engineering_tradeoff: Promote_eng(a)=SinkType(a) (base rule をそのまま使う)
        organizational_or_social: Promote_soc(a)=externalized_nonbinding when AB(a)=broad_or_unbound ∨ (HP(a)=high ∧ Reu(a)≠none); otherwise reuse / visibility 軸を base rule より重く扱う
      context_overrides:
        single_branch: CtxCap_single_branch(a)=sealed_internal for admissibility unless named decision forum coverage exists; bounded_internal_observable 以上でも forum coverage がなければ isolation basis として使えない
        external_irreversible: CtxCap_external_irreversible(a)=sealed_internal; ST_ext(a,π,ctx)=1 ⇒ quarantine_and_escalate
        policy_sensitive: CtxCap_policy_sensitive(a)=bounded_internal_observable; ST_ext(a,π,ctx)=1 ⇒ automation_block=1 ∧ compliance_review_required=1
      registry_connection:
        required_fields:
        - sink_type_declared
        - sink_type_effective
        - axis_observation_bundle_ref
        - owner_binding_ref
        - profile_override_ref
        - context_override_ref
        - sink_typing_basis_ref
        - detector_integrity_class_ref
        - provenance_level_ref
        - sink_typing_confidence_ref
        - evidence_source_family_ref
        - claim_facet
        - source_observation_time
        - direct_reach_basis_ref
        - corroboration_group_ref
        claim_facet_precedence:
          effect_realization: direct_reach_evidence ≻ direct_system_observation ≻ access_control_or_routing_log ≻ mirrored_telemetry ≻ human_declaration
          route_identity: access_control_or_routing_log ≻ direct_system_observation ≻ mirrored_telemetry ≻ human_declaration
          sink_typing_positive_escalation: direct_system_observation ≻ access_control_or_routing_log ≻ mirrored_telemetry ≻ human_declaration
          owner_binding_or_declared_intent: human_declaration ≻ access_control_or_routing_log ≻ direct_system_observation ≻ mirrored_telemetry
        precedence_rule: single total order は採用せず、claim facet ごとに precedence を固定する。freshness/lag は別モデルで扱う。
    source_family_defaults:
      human_declaration:
        integrity_default: self_declared
        provenance_cap: candidate_link
      mirrored_telemetry:
        integrity_default: mirrored_observability
        provenance_cap: linked_path
      direct_system_observation:
        integrity_default: standard_observability
        provenance_cap: direct_sink_identity
      access_control_or_routing_log:
        integrity_default: control_plane_record
        provenance_cap: direct_sink_identity
      direct_reach_evidence:
        integrity_default: system_of_record_or_forensic
        provenance_cap: direct_sink_identity
    claim_facet_precedence:
      effect_realization:
      - direct_reach_evidence
      - direct_system_observation
      - access_control_or_routing_log
      - mirrored_telemetry
      - human_declaration
