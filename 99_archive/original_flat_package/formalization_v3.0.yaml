  - shared prompt / shared rulepack / shared model checkpoint を hidden common-mode coupling としてどこまで registry 化するか
cadence_registry_calibration_model:
  status: provisional_fixed
  statement: cadence_registry_calibration_model は、detector family と cadence sink class ごとの通常観測 cadence、simultaneous burst、review backlog、confirmation lag を数理的に束縛し、profile/context に応じて安全側へ縮める形式モデルである。
  notation:
    detector_family: φ ∈ {local_convention_detected, confirmed_policy_drift, suspected_leak, bias_penalty, flooding_penalty, replay_penalty}
    cadence_sink_class: ξ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
    profile: π ∈ {regulated, engineering_tradeoff, organizational_or_social}
    context_class: Ω ∈ {normal, single_branch, external_irreversible, policy_sensitive}
    cadence_window: W_eff(φ,ξ,π,Ω)
    normal_event_cap: N_eff(φ,ξ,π,Ω)
    simultaneous_burst_cap: B_eff(φ,ξ,π,Ω)
    review_backlog_soft_cap: Q_eff(φ,ξ,π,Ω)
    confirmation_lag_soft_cap: L_eff(φ,ξ,π,Ω)
    observed_event_count: Obs(χ,t) = current window 内の dedup 後 signal / cluster 数
    concurrent_burst_mass: BurstObs(χ,t) = same anchor epoch 内で同時に生きている cluster 数
    review_backlog: Backlog(χ,t) = review queue に残る unresolved cluster 数
    confirmation_lag: LagConf(χ,t) = oldest live unresolved cluster の age
    lawful_burst_witness: LBW(χ,t)=true iff registered cadence, incident runbook, lawful retry/resampling envelope, or ratified batch charter のいずれかが active
  duration_macros:
    MIN(15): 15分
    HR(1): 1時間
    BD(1): 1営業日
  baseline_table:
    local_convention_detected:
      cadence_window: BD(5)
      normal_event_cap: 12
      simultaneous_burst_cap: 24
      review_backlog_soft_cap: 8
      confirmation_lag_soft_cap: BD(5)
    confirmed_policy_drift:
      cadence_window: BD(2)
      normal_event_cap: 6
      simultaneous_burst_cap: 12
      review_backlog_soft_cap: 4
      confirmation_lag_soft_cap: BD(2)
    suspected_leak:
      cadence_window: HR(4)
      normal_event_cap: 3
      simultaneous_burst_cap: 6
      review_backlog_soft_cap: 2
      confirmation_lag_soft_cap: HR(4)
    bias_penalty:
      cadence_window: BD(1)
      normal_event_cap: 8
      simultaneous_burst_cap: 16
      review_backlog_soft_cap: 4
      confirmation_lag_soft_cap: BD(2)
    flooding_penalty:
      cadence_window: HR(2)
      normal_event_cap: 10
      simultaneous_burst_cap: 20
      review_backlog_soft_cap: 3
      confirmation_lag_soft_cap: HR(2)
    replay_penalty:
      cadence_window: BD(1)
      normal_event_cap: 6
      simultaneous_burst_cap: 12
      review_backlog_soft_cap: 3
      confirmation_lag_soft_cap: BD(1)
  sink_class_multipliers:
    owner_bound_internal:
      count_multiplier: 1.5
      time_multiplier: 1.5
    bounded_internal_shared:
      count_multiplier: 1.0
      time_multiplier: 1.0
    authoritative_state:
      count_multiplier: 0.5
      time_multiplier: 0.5
    public_or_external_commitment:
      count_multiplier: 0.33
      time_multiplier: 0.33
    irreversible_resource_lock:
      count_multiplier: 0.25
      time_multiplier: 0.25
  profile_multipliers:
    regulated:
      count_multiplier: 0.75
      time_multiplier: 0.75
    engineering_tradeoff:
      count_multiplier: 1.0
      time_multiplier: 1.0
    organizational_or_social:
      count_multiplier: 1.15
      time_multiplier: 1.15
  context_multipliers:
    normal:
      count_multiplier: 1.0
      time_multiplier: 1.0
    single_branch:
      count_multiplier: 0.75
      time_multiplier: 0.75
    external_irreversible:
      count_multiplier: 0.5
      time_multiplier: 0.5
    policy_sensitive:
      count_multiplier: 0.6
      time_multiplier: 0.6
  effective_binding_rules:
  - N_eff = max(1, floor(N0(φ) × μ_count(ξ) × μ_count(π) × μ_count(Ω))) とする。
  - B_eff = max(N_eff, floor(B0(φ) × μ_count(ξ) × μ_count(π) × μ_count(Ω))) とする。
  - Q_eff = max(1, floor(Q0(φ) × μ_count(ξ) × μ_count(π) × μ_count(Ω))) とする。
  - L_eff と W_eff は baseline duration に μ_time(ξ) × μ_time(π) × μ_time(Ω) を掛け、安全側へ round_down した duration macro に丸める。
  - same case が複数 sink class に触れるときは最も strict な ξ を採用する。
  - batch charter は N_eff と B_eff に対してのみ一時的 override を持てる。Q_eff と L_eff は override 不可とする。
  batch_charter_rules:
    admissibility:
    - batch_charter は detector_family、sink_class、owner、window_start/end、allowed operation family、fallback path、audit obligation を束縛していなければならない。
    numerical_cap:
    - charter ありでも N_eff と B_eff の引上げは高々 2 倍、かつ sink class strictness を上書きしてはならない。
    prohibitions:
    - authoritative_state 以上の sink で confirmation lag や required review の緩和に batch charter を使ってはならない。
    - irreversible_resource_lock に対して charter を benign presumption に使ってはならない。
  state_predicates:
    normal_burst:
      definition: Obs <= N_eff かつ BurstObs <= B_eff かつ Backlog <= Q_eff かつ LagConf <= L_eff
    lawful_burst:
      definition: Obs > N_eff かつ BurstObs <= B_eff かつ Backlog <= Q_eff かつ LagConf <= L_eff かつ LBW=true
    suspicious_burst:
      definition: Obs > B_eff または Backlog > Q_eff または LagConf > L_eff または [Obs > N_eff かつ LBW=false]
    attack_like_or_drift_like_active:
      definition: suspicious_burst かつ [detector_abuse_anchor, queue_saturation_witness, concealed_replay_witness, direct_authoritative_mismatch, policy_drift_witness] のいずれかが active
  linkage_rules:
    with_early_stage_burst_flooding_separation_model:
    - cadence_axis は registered / bounded_elevated / excess / critical_excess を W_eff, N_eff, B_eff, LBW により決める。
    - lawful_burst は lawful incident burst の必要条件になりうるが十分条件ではない。
    with_detector_window_expiry_calibration_model:
    - L_eff breach は confirmation_due breach 候補を立てるが、hard expiry そのものではない。
    - W_eff は aggregation window の benign 代替ではなく、burst classification の局所 window として使う。
    with_same_layer_conflict_batch_tiebreak_model:
    - shared cadence registry cell が一致しない case は same batch charter へ自動併合しない。
    - backlog breach は effective_due_urgency を押し上げるが deemed approval を導かない。
    with_adversarial_correlation_penalty_model:
    - flooding penalty は suspicious_burst または attack_like_or_drift_like_active を入力候補にするが、registered lawful_burst には二重減点しない。
    - replay penalty は concealed replay witness が attack_like_or_drift_like_active を開くときだけ severe gate 候補になる。
  decision_ledger_schema_extension:
    fields:
    - cadence_registry_cell_ref
    - cadence_sink_class
    - effective_cadence_window
    - effective_normal_event_cap
    - effective_simultaneous_burst_cap
    - effective_review_backlog_soft_cap
    - effective_confirmation_lag_soft_cap
    - lawful_burst_witness_ref
    - batch_charter_adjustment_ref
    - cadence_state
    - cadence_breach_reason_set
  graph_engine_events:
  - cadence_registry_cell_bound
  - cadence_effective_cap_computed
  - cadence_state_promoted
  - cadence_backlog_breached
  - cadence_confirmation_lag_breached
  - cadence_batch_charter_override_applied
  residual_open_points:
  - seasonal / incident campaign 型の lawful burst を static baseline と runtime override のどちらで吸収するか
  - direct abuse anchor と detector abuse anchor の minimum bundle を family ごとにどう切るか
detector_window_expiry_calibration_model:
  status: provisional_fixed
  statement: detector_window_expiry_calibration_model は、detector case ごとの signal persistence window・corroboration aggregation window・case hard expiry を profile / context ごとに較正し、freshness・mirror lag・confirmation_due と接続して stale evidence の admissibility を定める形式モデルである。
  notation:
    detector_case_family: φ ∈ {local_convention_detected, confirmed_policy_drift, suspected_leak}
    support_state: SS(c,t) ∈ {live_support, grace_support, invalid_support}
    persistence_window: PW(π,Ω,φ) = profile π と active context Ω の下で、cluster c が live corroboration として数えられる最大 duration
    aggregation_window: AW(π,Ω,φ) = 同一 case epoch 内で cluster / corroboration unit を併合できる最大 span
    hard_expiry: HE(π,Ω,φ) = unresolved case evidence を current judgement に使える最終 duration
    effective_age: A_eff(c,t)=if source_family(c)=mirrored then obs_age(c,t)+lag_upper_bound(c,t) else obs_age(c,t)
    hard_expiry_at: ExpAt(χ)=last_live_observation_at(χ)+HE(Profile(χ),Ctx(χ),Family(χ))
    epoch_split: EpochSplit(χ,t)=true iff A_eff(rep(χ),t)>HE(Profile(χ),Ctx(χ),Family(χ)) または remediation / confirm / release / reflection epoch が切り替わった
  duration_macros:
    HR(8): 8時間
    BD(20): 20営業日
  axioms:
  - 任意の π, Ω, φ について PW(π,Ω,φ) ≤ AW(π,Ω,φ) < HE(π,Ω,φ) とする。
  - context override は PW / AW / HE を短縮または同値維持にだけ働く。延長は許さない。
  - SS(c,t)=live_support iff A_eff(c,t) ≤ PW(Profile(c),Ctx(c),Family(c)) かつ invalidity trigger がない。
  - SS(c,t)=grace_support iff PW < A_eff(c,t) ≤ HE かつ invalidity trigger がない。
  - SS(c,t)=invalid_support iff A_eff(c,t) > HE、identity mismatch、epoch mismatch、revoked lineage、forgery suspicion のいずれかがある。
  - confirm / release / closure に使えるのは live_support だけとする。grace_support は hold / suspend 継続と manual review の補助に限定する。
  - hard expiry は case history を消さない。hard expiry は prospective judgement に対する stale support の admissibility を失効させ、new signal は原則 new epoch として扱う。
  baseline_table:
    regulated:
      local_convention_detected:
        signal_persistence_window: BD(2)
        corroboration_aggregation_window: BD(4)
        case_hard_expiry: BD(7)
      confirmed_policy_drift:
        signal_persistence_window: BD(1)
        corroboration_aggregation_window: BD(2)
        case_hard_expiry: BD(5)
      suspected_leak:
        signal_persistence_window: HR(2)
        corroboration_aggregation_window: HR(4)
        case_hard_expiry: BD(1)
    engineering_tradeoff:
