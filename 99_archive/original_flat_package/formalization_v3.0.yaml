  statement: scheduler_service_restoration_closure_model は、restoration attestation、external recommit、status-page closure を parameter 化するモデルである。
  primitives:
    restoration_packet: α_s = (protected_surface_continuity, error_budget_posture, reserve_refill_status, residual_risk, attestation_owner)
    recommit_case: γ_s = (reopened_commitment_surface, residual_degradation, notice_scope, lane_owner, effective_window)
    closure_packet: ω_s = (incident_timeline, restoration_basis, remaining_watch_mode, next_review_window, closure_owner)
    closure_state: σ_s ∈ {internally_restored, externally_attested, recommitted_guarded, closure_pending, publicly_closed, reopened_for_review}
  functions:
    RestorationAttestable: RestorationAttestable(α_s)=true iff continuity, budget posture, refill status, residual risk, and owner are all bound.
    RecommitLawful: RecommitLawful(γ_s)=true iff reopened surface, residual degradation, notice scope, owner, and effective window are all bound.
    ClosureComplete: ClosureComplete(ω_s)=true iff timeline, restoration basis, remaining watch mode, review window, and owner are all bound.
    PubliclyClosable: PubliclyClosable(α_s,γ_s,ω_s)=true iff restoration is attestable, recommit is lawful, and closure packet remains honest about residual watch and risk.
    PrematureClosureRisk: PrematureClosureRisk(α_s,ω_s)=high iff public closure omits residual risk or remaining watch obligations.
  tool_split:
    DecisionLedger: α_s, γ_s, ω_s, σ_s の normative binding を保持する。
    GraphEngine: RestorationAttestable、RecommitLawful、ClosureComplete、PubliclyClosable を計算する。
    GraphLint: risk-free attestation / notice-free recommit / watchless closure を検査する。
    archive_object: α_s, γ_s, ω_s と external audit trail を保存する。
  forbidden_shortcuts:
  - RestorationAttestable を residual risk なしで true にする
  - RecommitLawful を notice scope なしで満たしたとみなす
  - ClosureComplete を remaining watch mode なしで宣言する
  residual_open_points: []
