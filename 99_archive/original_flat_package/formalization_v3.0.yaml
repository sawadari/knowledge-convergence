    sink_typing_floors:
      sealed_internal_provisional:
        integrity_floor: self_declared
        provenance_floor: none
        contradiction_rule: higher_integrity evidence that implies bounded_or_higher defeats sealed provisional typing
      bounded_internal_observable_trigger:
