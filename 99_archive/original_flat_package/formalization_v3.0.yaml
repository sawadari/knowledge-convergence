multi_session_scheduler_observability_model:
  status: provisional_fixed
  statement: multi_session_scheduler_observability_model は、telemetry witness、fairness indicator、threshold profile、control action を parameter 化するモデルである。
  primitives:
    telemetry_witness: τ = (field, window, source_integrity, mirror_lag_bound, scope, value)
    fairness_indicator: φ ∈ {bounded_wait_p95, consecutive_preemption_cap, debt_half_life, residue_age_budget, override_budget_ratio, yield_compliance_ratio}
    threshold_profile: θ(profile, authority_tier, risk_class, φ)
    control_action: a ∈ {observe_only, auto_throttle, mandatory_checkpoint_yield, manual_escalation}
  functions:
    TelemetryUsable: TelemetryUsable(τ)=true iff window, integrity, lag bound, and scope are all bound.
    FairnessEval: FairnessEval(φ)=measured from admissible telemetry witnesses without mean-only collapse when tail-sensitive.
    ThresholdSelect: ThresholdSelect(profile,authority,risk,φ)=strictest applicable θ for φ.
    ActionTrigger: ActionTrigger(φ)=a chosen from observe_only / auto_throttle / mandatory_checkpoint_yield / manual_escalation based on ThresholdSelect and breach severity.
    RecoveryDirection: RecoveryDirection(debt_trend,yield_evidence,residue_age)=true only when debt decay and closure evidence are both observed.
  tool_split:
    DecisionLedger: φ, θ, a の normative binding を保持する。
    GraphEngine: τ の集約と ActionTrigger を生成する。
    GraphLint: TelemetryUsable / FairnessEval / ThresholdSelect 違反を検査する。
    archive_object: τ と breach bundle の immutable snapshot を保存する。
  forbidden_shortcuts:
  - TelemetryUsable を満たさない τ を唯一根拠に ActionTrigger する
  - FairnessEval を平均 collapse だけで近似する
  - RecoveryDirection を UI 上の debt 非表示だけで true にする
