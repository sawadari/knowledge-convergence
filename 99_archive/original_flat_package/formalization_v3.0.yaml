title: 知識収束学_形式化管理
file_role: formalization
version: '3.0'
language: ja
status: active
last_updated: '2026-03-22'
scope:
  statement: '知識収束学の数理・計算的な形式化候補を管理する。

    '
knowledge_state:
  status: provisional_fixed
  notation: K = (G, C, E, V, R, H)
  statement: Knowledge State は知識収束判定のための拡張状態である。概念的最小構成は認識層と統治層で分けて扱う。
  components:
    G: 構造化グラフ
    C: 文脈
    E: 根拠集合
    V: 価値基準・許容リスク・優先関係・棄却条件
    R: 承認主体・実行主体・結果責任主体・エスカレーション・委任範囲
    H: 履歴
  minimal_model:
    epistemic_core:
      notation: K_e = (G, C, E)
      status: provisional_adopted
      reason:
      - G がなければ主張対象と関係を表現できない
      - C がなければ主張の意味範囲と適用条件を固定できない
      - E がなければ説明可能性と根拠接続性を満たせない
      supports:
      - C_e(K) の基底
      removable_components:
      - V
      - R
      - H
    governance_extension:
      notation: K_g = (G, C, E, V, R)
      status: provisional_adopted
      reason:
      - V がなければ複数案の採択基準と許容リスクを定められない
      - R がなければ承認主体・実行主体・結果責任主体を定められない
      supports:
      - C_g(K) の基底
      removable_components:
      - H
    operational_envelope:
      notation: K_full = (G, C, E, V, R, H)
      status: provisional_adopted
      reason:
      - H は状態遷移・監査・差戻し・自己評価の時系列検証に必要
      - ただし単一時点の認識収束・統治収束判定の最小要件ではない
  component_minima:
    G:
      status: provisional_adopted
      minimal_unit: 少なくとも1つの主要主張と、その主張を他要素に接続する少なくとも1つの型付き関係または制約
      notes:
      - claim と relation を区別する
      - 実装上はグラフノード・エッジに畳み込めるが概念上は不可欠
      existence_condition: 少なくとも1つの claim_id と、claim を他要素へ接続する型付き relation_id または constraint_id が存在すること。
      missing_condition:
      - claim_id が存在しない
      - claim はあるが relation/constraint がなく、構造化主張として閉じていない
      boundary_rule: 主張内容・制約内容・依存関係は G に属し、適用境界は C に属する。
    C:
      status: provisional_adopted
      minimal_unit: 少なくとも対象範囲、時間または状況、目的または問いのいずれかを含む適用文脈
      notes:
      - 主張の意味は文脈なしに固定できない
      - 実装上は属性でも別ノード群でもよい
      existence_condition: scope があり、さらに horizon(時間・状況) または intent(目的・問い) の少なくとも一方があること。
      missing_condition:
      - scope がない
      - 主要主張の適用境界を説明する horizon/intent がない
      boundary_rule: 適用範囲・評価時点・前提状況・問いは C に属し、主張の真理条件を形成する内部条件は G に属する。
    E:
      status: provisional_adopted
      minimal_unit: 主要主張に結び付いた evidence binding 1件。binding の値は evidence_ref または型付き欠落マーカー。
      notes:
      - 根拠ゼロのままでも状態は存在するが、通常は C_e(K)=true になりにくい
      existence_condition: 各主要主張について evidence_ref または evidence_status があること。
      missing_condition:
      - evidence_ref も evidence_status もない
      - 主要主張の根拠所在が追跡できない
      evidence_status_vocabulary:
      - 'linked: 根拠参照あり'
      - 'absent: 必要だが未取得'
      - 'pending: 取得待ち'
      - 'external_ref: 外部系参照のみ'
      - 'not_applicable: 根拠要求自体が適用外'
      - 'disputed: 根拠候補が競合中'
      legacy_evidence_status_mapping:
      - e_missing_absent -> absent
      - e_missing_pending -> pending
      - e_missing_external_ref -> external_ref
      - e_missing_not_applicable -> not_applicable
      - e_conflicted -> disputed
    V:
      status: provisional_fixed
      minimal_unit: 少なくとも1つの採択基準 A、または1つの許容リスク条件 L、または1つの棄却条件 X の明示
      formal_core: V_min = (A, L, P, X)
      component_meaning:
        A: typed acceptance criteria の集合
        L: 許容リスクの境界またはカテゴリ
        P: A 上または基準群上の部分順序
        X: 違反時に採択不能とする veto conditions の集合
      notes:
      - P は未比較性を表現するため全順序ではなく部分順序を基本とする
      - L はカテゴリでも区間でもよいが、許容か超過かを判定できる必要がある
      - 数値スコアは A や L を補助する optional layer であり、V_min の必須成分ではない
      existence_condition: decision target に対して A, L, X のいずれかが1件以上束縛されていること。
      required_fields_for_presence:
      - target_ref
      - at least one of A/L/X
      required_fields_for_governance:
      - decision target
      - criteria or veto conditions
      - risk tolerance when risk-bearing decision
      - priority relation P when tradeoff exists
      optional_fields:
      - numeric_support
      - stakeholder_notes
      - policy_ref
    R:
      status: provisional_fixed
      minimal_unit: 少なくとも1つの承認主体 Ap または結果責任主体 Ac の明示に加え、必要に応じて委任範囲 D かエスカレーション Esc を結び付けること
      formal_core: R_min = (Ap, Ex, Ac, Esc, D)
      component_meaning:
        Ap: approval authority の集合
        Ex: execution actors の集合
        Ac: outcome accountability の集合
        Esc: 条件付きエスカレーション先の関係
        D: 事前委任範囲または委任ポリシー参照
      notes:
      - Ap, Ex, Ac は同一主体に束ねてもよいが、区別可能であることを保つ
      - 主体識別子は原則として person_id ではなく role_id または制度主体 id を使う
      - AI/agent は D の範囲内で Ex になれても、既定の Ac にはしない
      existence_condition: Ap または Ac の少なくとも一方が role_id または institution_id で束縛されていること。
      required_fields_for_presence:
      - at least one of Ap/Ac
      required_fields_for_governance:
      - Ap or Ac
      - Ex when execution is planned
      - D when Ex includes AI/agent
      - Esc when high impact or conflict escalation is required
      - approval_structure when multiple approvers, proxy, quorum, or fallback exists
      optional_fields:
      - consulted
      - informed
      - policy_ref
      - approval_structure_ref
      approval_structure_extension:
        status: provisional_fixed
        statement: 複数承認主体、proxy、quorum、fallback を含む場合、R_min の Ap を approval structure A_p^+ で具体化する。
        notation: A_p^+ = (M, S_req, Pxy, Q, Fbk, Vld, SoD)
        component_meaning:
          M: approval_mode。single / all_of / any_of / quorum / forum
          S_req: required approver condition と approver_set
          Pxy: principal role と lawful proxy role、その activation condition
          Q: quorum rule。eligible 集合、閾値、dissent の扱い
          Fbk: fallback role と activation rule
          Vld: approval validity / expiry / invalidation
          SoD: segregation_of_duties または兼務禁止条件
        activation_rule: A_p^+ は |Ap|>1、proxy、quorum、forum、fallback のいずれかが存在するとき required になる。
    H:
      status: provisional_adopted
      minimal_unit: event_id, timestamp, actor_ref, operation, reason をもつイベント1件。
      notes:
      - 運用上は重要だが最小判定では補助層
      existence_condition: 上記5要素を持つイベントが少なくとも1件あること。
      missing_condition:
      - イベント履歴がなく差戻しや監査ができない
  resolved_points:
  - G, C, E を認識収束の最小核とする
  - V, R を統治収束への追加必須成分とする
  - H を運用・監査・履歴管理層として位置づける
  - K = (G, C, E, V, R, H) という拡張状態表記を維持する
  - Q_g(K_g)=(q_decision, q_responsibility) と Eval_g(K_g) ∈ {true, hold, false} の接続を暫定固定する
  - delegation_scope D の最小構文を D=(T,G,X,E_req,F,A) として暫定固定した
  - Branch_D を human approval required / conditional auto / auto rollback / force escalate の4分岐として暫定整理した
  - stakeholder conflict の branch-criticality を、binding_effect・outcome_sensitivity・coverage_absence・commitment_due の4因子で q_decision に接続する方針を暫定固定した
  - 複数 stakeholder conflict は precedence DAG と active head case により chained adjudication する方針を暫定固定した
  - 同一 authority・同一 precedence layer の複数 conflictを cluster 化し、batchability、active head、blocking veto reach、timeout/fallback、split 条件を deterministic に決める方針を暫定固定した
  open_points:
  - lawful cadence / expected burst envelope を detector family / sink class ごとにどう registry 化するか
  - ratified 済みだが未 reflected の outcome を provisional binding としてどこまで使うか
  - calibration strata の粒度と cross-profile 再利用境界をどう定めるか
  - H を理論本体に含め続けるか、運用メタ層として外出しするか
  - rollback_success を historical success にどう算入するか
  - latent_downstream reason を Eval_e 完了後にいつ active governance blocker へ昇格させるか
  - relation_to_primary を dependency だけで表すか、causal/temporal relation まで拡張するか
  - linked と bound を component-specific positive state のまま維持するか、present 系へ統一するか
  - H の補助メタデータに typed missing marker をどこまで許すか
  - legacy の unknown / TBD / N/A を正規化する migration rule をどこまで自動化するか
  - score 3 の再利用可能性を profile 間でどうベンチマークするか
  - weighted quorum や voting power を approval structure へどこまで含めるか
  - disjunctive route family や any_of 要件を set-valued meet へどう一般化するか
  - composite unit / derived metric を canonical registry の quantity family へどう分解するか
  - route family の partial-overlap candidate に対する lawful route mapping
  - action coverage basis の expiry / revocation 規則
  component_existence_model:
    status: provisional_fixed
    statement: 各成分について、presence predicate P_x と convergence sufficiency S_x を分けて扱う。
    notation:
    - 'P_G(K), P_C(K), P_E(K), P_V(K), P_R(K), P_H(K): 各成分の存在述語'
    - 'S_e(K): 認識収束に必要な局所十分性の束'
    - 'S_g(K): 統治収束に必要な局所十分性の束'
    rules:
    - P_x(K)=true は成分が参照可能であることを意味するが、収束成立は意味しない
    - C_e(K_e)=true には少なくとも P_G, P_C, P_E が true であり、かつ EC1〜EC6 を満たす必要がある
    - C_g(K_g)=true には少なくとも P_V, P_R が true であり、かつ GC1〜GC5 を満たす必要がある
  component_boundary_rules:
    status: provisional_fixed
    G_vs_C:
      statement: G は意味内容の構造、C は解釈と適用の境界である。
      decision_rules:
      - 命題そのものを変えるなら G を更新する
      - 命題は維持したまま適用条件だけを変えるなら C を更新する
      - 同一表現が両義的な場合、正本を一方に置き他方は ref 参照にする
  typed_missing_marker_system:
    status: provisional_fixed
    statement: typed missing marker は、required な slot が局所正本で component-specific positive state を持たない理由を、共通語彙で表す正規化状態系である。Present は派生述語であり raw status ではない。
    notation:
    - M = {absent, pending, external_ref, not_applicable, disputed}
    - evidence_status ∈ {linked} ∪ M
    - binding_status ∈ {bound} ∪ M
    - Present(slot)=true iff component-specific positive state or concrete value/ref/digest exists
    common_markers:
    - absent
    - pending
    - external_ref
    - not_applicable
    - disputed
    positive_states:
      G_C_slot_state: concrete_value_or_ref
      evidence_status: linked
      binding_status: bound
      H_auxiliary_slot_state: concrete_value_or_ref_or_digest
    marker_constraints:
      absent:
      - required_by が必要
      - 外部 locator があるなら external_ref を使う
      pending:
      - pending_owner または next_action が必要
      - due_basis または reopen_condition が必要
      external_ref:
      - external_locator または external_system_ref が必要
      not_applicable:
      - applicability_basis または justification_ref が必要
      disputed:
      - dispute_ref または competing_candidates_ref が必要
    component_projections:
      G_C: required な claim/relation/scope/intent などの slot に共通語彙を適用できるが、core identity field が marker のまま確定保存されることは許さない。
      E: evidence_status を linked または M で表す。
      V_R: binding_status を bound または M で表す。approval/risk/policy は別 state とする。
      H: event_id, timestamp, actor_ref, operation, reason の core field と replay-critical transition field には marker を許さない。audit-support auxiliary field にだけ marker を許し、closure-critical witness には使えない。
    prohibited_serializations:
    - 'null'
    - '""'
    - unknown
    - TBD
    - N/A
    - missing
    - unbound
    - e_missing_absent
    - e_missing_pending
    - e_missing_external_ref
    - e_missing_not_applicable
    - e_conflicted
    legacy_normalization:
    - e_missing_absent -> absent
    - e_missing_pending -> pending
    - e_missing_external_ref -> external_ref
    - e_missing_not_applicable -> not_applicable
    - e_conflicted -> disputed
    - unknown / TBD / empty -> absent + migration_warning (metadata 不足時)
    tool_mapping:
      GraphBuild:
      - G/C/E の初期 slot に対して marker を付与できる。
      - V/R の authoritative binding_status は生成せず、必要なら suggestion として渡す。
      GraphLint:
      - legacy marker を正規化して G/C/E を検査する。
      - marker 単独ではなく criticality と repairability を加えて H1/H2 候補を返す。
      DecisionLedger:
      - V/R の binding_status を authoritative に保持する。
      - approval_pending, risk_excess, policy_block は marker ではなく H4/H5/H6 または governance state として保持する。
      GraphEngine:
      - 正規化後の status を履歴と共に永続化する。
      - raw_status を保持してもよいが、参照APIでは normalized_status を正本とする。
    hold_candidate_rules:
    - G/C/E の absent / pending / external_ref は major かつ repairable_in_frame なら H1 候補
    - G/C/E の disputed は H2 候補
    - V/R の required binding に対する absent / pending / external_ref / disputed は H3 候補
    - H4/H5/H6 は typed missing marker からは直接導かず、approval/risk/policy evaluator が返す
    non_implications:
    - pending は成功見込みを保証しない
    - external_ref は局所未検査を正当化しない
    - not_applicable は optional であることを自動意味しない
    - disputed は単なる低 confidence と同義ではない
    derived_meta_projection:
      present: component-specific positive state または concrete value/ref/digest を持つ
      reasoned_missing: typed missing marker と required metadata を持つ
      invalid: required slot に prohibited serialization または許されない marker がある
update_operator:
  status: provisional_fixed
  notation: 'U_a : (K, Δ, Π) -> (K'', h, o)'
  statement: 'U_a は、主体 a が、差分要求 Δ と適用中の統治・政策文脈 Π の下で、知識状態 K を監査可能な履歴事象 h を伴って別の知識状態 K'' へ遷移させる型付き更新作用素である。各更新は、構造・文脈・根拠・価値・責任・履歴のうち許可された成分だけを更新できる。'
  examples:
  - 発話による更新
  - 根拠追加による更新
  - 反証による更新
  - 承認による更新
  - 差戻しによる更新
  outcome_space: o ∈ {execute, hold, reject, escalate, rollback}
  required_bindings:
  - target_slot
  - authority_basis
  - evidence_ref または justified_missing_marker
  - applied_policy_version
  - expected_branch
  - failure_branch
  failure_rule: 制約違反、根拠不足、承認不足、政策違反、競合未解消がある場合、U_a は silent success を返してはならず、hold / reject / escalate / rollback のいずれかへ分岐し、その理由を履歴へ残さなければならない。
  implementation_binding:
    GraphLint: Δ適用前後の構造・文脈・根拠・矛盾・曖昧性の検査を担当する。
    DecisionLedger: V/R/approval/authority の正本判断と branch 決定を担当する。
    GraphEngine: K から K' への状態遷移と履歴 h の永続化を担当する。
    archive_object: evidence / manifest / digest の保存境界と監査証跡を保持する。
  adoption_rule: 主体、差分、政策文脈、監査痕跡、失敗分岐を明示できるとき採用する。
  rejection_rule: U_a を K->K の無条件写像として扱い、制約違反や承認不足でも成功扱いにする立場は採用しない。
  promotion_condition: GraphLint / DecisionLedger / GraphEngine / archive object の責務分割と接続できること。
  negative_examples:
  - 承認不足でも成功扱いで状態を書き換える更新
  - 根拠参照なしに value や responsibility を上書きする更新
  - 失敗分岐を履歴へ残さない更新
quality_vector:
  status: provisional_fixed
  notation: Q(K), Q_e(K_e), Q_g(K_g)
  statement: 品質は単一スカラーではなく、順序付き多次元ベクトルとして扱う。認識収束では Q_e(K_e) を、統治収束では Q_g(K_g) を主に用いる。
  layer_projection:
    epistemic_quality_vector:
      notation: Q_e(K_e)
      form: (q_structure, q_context, q_evidence, q_conflict, q_ambiguity, q_explain)
      dimensions:
        q_structure: 主要主張と制約・対象との構造閉包の充足度
        q_context: 主要主張の適用境界が固定されている度合い
        q_evidence: 主要主張に対する根拠接続の充足度
        q_conflict: 重大矛盾が除去または隔離されている度合い
        q_ambiguity: 主要曖昧性が解消または管理されている度合い
        q_explain: 主要主張について claim→context→evidence→constraint の説明経路を提示できる度合い
    governance_quality_vector:
      notation: Q_g(K_g)
      form: (q_decision, q_responsibility)
      dimensions:
        q_decision: 決定対象、統治用文脈、採択基準、許容リスク、棄却条件、分岐条件が主要 decision target に束縛されている度合い
        q_responsibility: 承認主体、実行主体、結果責任主体、委任範囲、エスカレーション条件が主要 branch に束縛されている度合い
      sub_dimensions:
        q_decision:
        - decision_context_binding
        - value_binding
        - risk_binding
        - branch_condition_binding
        q_responsibility:
        - approval_binding
        - execution_binding
        - accountability_binding
        - delegation_binding
        - escalation_binding
      scale_definition:
        q_decision:
          '0': 主要 decision target の target/scope/time、または V(A/L/X) が欠落し、branch 判定が不能
          '1': target と基本基準はあるが、risk_tolerance, veto, alternatives, hold/reject 条件の一部が未束縛
          '2': 主要 target の decision context, A/L/X, 分岐条件が束縛され、残差は軽微または管理可能
          '3': 2 を満たし、tradeoff 用の priority_relation P と必要な numeric_support が整備され、再利用可能な強い統治条件になっている
        q_responsibility:
          '0': Ap/Ac が未束縛、required approval structure が成立不能、または AI/agent 実行に必要な D が欠落し、責任分岐が不能
          '1': Ap/Ac はあるが、approval_mode、required approver condition、proxy/quorum/fallback/approval validity の一部が未束縛または fragile
          '2': 主要 branch に必要な Ap/Ex/Ac が role_id 等で束縛され、複数承認主体を使う場合は approval_mode と required approver condition が明示され、AI 実行時の D と高影響時の Esc が管理可能
          '3': 2 を満たし、proxy_rule、quorum_rule、fallback_role、expiry/invalidation、segregation_of_duties、approval conflict routing まで機械可読に整備されている
      sub_dimension_aggregation:
        status: provisional_fixed
        statement: q_decision と q_responsibility は、domain profile と decision target に対して applicable な下位観点スコアの min で集約し、その後に branch-critical cap を適用する。
        notation:
          q_decision: q_decision = min { s_i | i ∈ I_dec^app(Γ_g, t) }
          q_responsibility: q_responsibility = min { r_j | j ∈ I_resp^app(Γ_g, t) }
        applicability_rules:
        - I_resp^app から delegation_binding を外してよいのは、Ex に AI/agent や事前委任自動化が含まれない場合だけである
        - I_dec^app から risk_binding を外してよいのは、decision target が明示的に non-risk-bearing であり、その justification と organizational risk NA audit packet(effect_zone, reversibility_class, reviewer/reflection_owner, reevaluation_trigger) が記録されている場合だけである
        - I_resp^app から escalation_binding を外してよいのは、high impact, branch-critical conflict, policy/risk exception のいずれもなく、manual owner が同一 frame で閉じている場合だけである
        cap_rules:
        - branch-critical open conflict with lawful path -> q_decision <= 1
        - branch-critical open conflict without required_authority or lawful adjudication path -> q_decision = 0
        - branch-critical ratified but not reflected -> q_decision <= 1
        - AI/agent ∈ Ex and D absent -> q_responsibility = 0
        - regulated high-impact branch and Esc absent -> q_responsibility = 0
      dimension_effects:
        q_decision:
          decision_context_binding:
          - governance_context_gap
          - branch_undefined
          value_binding:
          - value_binding_gap
          - stakeholder_conflict_pending(binding_kind=priority_relation|veto_condition)
          risk_binding:
          - risk_overrun
          - value_binding_gap(risk_tolerance missing)
          - stakeholder_conflict_pending(binding_kind=risk_tolerance)
          branch_condition_binding:
          - branch_undefined
          - policy_violation(valid_exception absent)
          - stakeholder_conflict_pending(criticality=branch_critical)
        q_responsibility:
          approval_binding:
          - responsibility_binding_gap(Ap)
          - approval_wait
          - approval_conflict
          - approval_structure_gap
          - proxy_invalid
          - quorum_unmet
          - fallback_activation_pending
          execution_binding:
          - responsibility_binding_gap(Ex)
          - policy_violation(no lawful executor)
          accountability_binding:
          - responsibility_binding_gap(Ac)
          delegation_binding:
          - delegation_gap
          - required_evidence_missing_for_auto
          - self_confidence_below_floor
          escalation_binding:
          - escalation_gap
          - risk_overrun(no escalation path)
          - policy_violation(no exception authority)
          - stakeholder_conflict_pending(no adjudication authority)
      domain_calibration:
        status: provisional_fixed
        profile_variable: Γ_g ∈ {regulated_domain, engineering_tradeoff_domain, organizational_or_social_domain}
        statement: 各 profile は共通下位観点に対して applicability、score cap、score 3 の追加要件を与える。mixed-domain な target では affected subdimension ごとに stricter profile を採る。
        profiles:
          regulated_domain:
            applicable_sub_dimensions:
              q_decision:
              - decision_context_binding
              - value_binding
              - risk_binding
              - branch_condition_binding
              q_responsibility_always:
              - approval_binding
              - accountability_binding
              - escalation_binding
              q_responsibility_conditional:
              - execution_binding
              - delegation_binding
            score_guides:
              q_decision:
                '0':
                - required authority または lawful adjudication path のない branch-critical open conflict
                - required risk_tolerance / veto / policy binding の欠落
                - 主要 decision context 欠落で branch 判定不能
                '1':
                - authority/path はあるが branch-critical open conflict が未 reflected
                - major target の branch 判定は保留できるが execute/reject を確定できない
                '2':
                - decision context, A/L/X, required policy_ref が束縛
                - branch-critical conflict が不存在または reflected 済み
                - execute|hold|rollback|reject|escalate の境界が管理可能
                '3':
                - 2 を満たし、P, exception path, reflection trace, review window が再利用可能な形で整備
                - numeric_support が non-override guard 付きで安定運用可能
              q_responsibility:
                '0':
                - Ap または Ac 欠落
                - AI/agent 実行で D 欠落
                - high impact branch で Esc または exception authority 欠落
                '1':
                - Ap/Ac はあるが approval validity, fallback, escalation のいずれかが不安定
                - manual owner はいるが自動実行境界を閉じられない
                '2':
                - 主要 branch の Ap/Ex/Ac が束縛されている
                - 複数承認主体を使う場合は approval_mode と required approver condition が束縛されている
                - AI/agent 実行時の D と escalation path が管理可能である
                '3':
                - 2 を満たし、proxy 可否、fallback role、expiry、segregation_of_duties、exception authority が機械可読に整備されている
                - quorum や dual approval を使う場合、mandatory role と invalidation rule が明示されている
          engineering_tradeoff_domain:
            applicable_sub_dimensions:
              q_decision:
              - decision_context_binding
              - value_binding
              - risk_binding
              - branch_condition_binding
              q_responsibility:
              - approval_binding
              - execution_binding
              - accountability_binding
              - delegation_binding
              - escalation_binding
            score_guides:
              q_decision:
                '0':
                - must/veto satisfaction 不明
                - comparable set 未定で主要 branch を選べない
                '1':
                - 比較集合はあるが P または local tradeoff boundary が不安定
                - branch-critical conflict が open で reflected 前
                '2':
                - comparable alternatives, A/L/X, local tradeoff boundary, risk owner が束縛
                - non-branch-critical conflict は case_ref 付きで隔離
                '3':
                - 2 を満たし、P_dom/P_indep と numeric_support usage_mode がテンプレート化
                - sensitivity note と再評価条件が束縛
              q_responsibility:
                '0':
                - 主要 branch の Ap または Ac 欠落
                - AI/agent 実行で D 欠落
                '1':
                - decision owner と accountability はあるが rollback owner / fallback / review SLA が不足
                '2':
                - decision owner, executor, accountability, escalation threshold が束縛されている
                - 複数承認主体を使う場合は approval_mode と成立条件が束縛されている
                - reversible internal auto action には D と rollback owner がある
                '3':
                - 2 を満たし、proxy approval, quorum, fallback role, rollback owner, review SLA が機械可読である
                - approval validity と再承認条件が束縛されている
          organizational_or_social_domain:
            applicable_sub_dimensions:
              q_decision_always:
              - decision_context_binding
              - value_binding
              - branch_condition_binding
              q_decision_conditional:
              - risk_binding
              q_responsibility_always:
              - approval_binding
              - execution_binding
              - accountability_binding
              - escalation_binding
              q_responsibility_conditional:
              - delegation_binding
            score_guides:
              q_decision:
                '0':
                - decision forum/owner または stakeholder map 欠落
                - branch-critical value conflict に adjudication path がない
                '1':
                - forum/path はあるが open conflict が unresolved で reflected 前
                - accept/reject/hold 条件が暫定で fragile
                '2':
                - decision owner/forum, stakeholder positions, review window, provisional criteria が束縛
                - 未解決 conflict は case と authority path を持つ
                - risk_binding が active な場合は risk owner または review forum、harm surface、review window が束縛されている
                '3':
                - 2 を満たし、adjudication charter, reflection SLA, precedence archive, supersession rule が再利用可能
                - risk_binding=not_applicable を使う場合でも、audit packet と reevaluation trigger が reusable な形で残る
              q_responsibility:
                '0':
                - approver または accountability owner 欠落
                - role ambiguity で coordinator または communication owner を割り当てられない
                '1':
                - owner はあるが proxy/quorum/fallback が未整備で、裁定継続性が fragile
                '2':
                - approval forum, execution coordinator, accountability owner, escalation path が束縛されている
                - forum を使う場合は quorum または議決成立条件が束縛されている
                - AI/agent は drafting/analysis など狭い D の内側に限定されている
                '3':
                - 2 を満たし、proxy authority, quorum, dissent logging, fallback chair, reflection owner が機械可読に整備されている
                - forum approval の expiry または supersession rule が束縛されている
        mixed_profile_rule:
        - 安全・法規・契約・対外約束が絡む subdimension には regulated_domain の cap を優先適用する
        - engineering tradeoff の local rule は regulated cap を上書きできない
        - organizational conflict が engineering decision に被る場合、value_binding と escalation_binding には stricter profile を適用する
        mixed_domain_composition:
          status: provisional_fixed
          statement: mixed-domain target では、profile を target 単位で単一選択せず、下位観点ごとに applicable profile 集合 Π_i(t) を求め、score=min、blocker=union、global cap 後適用で合成する。
          notation:
            applicable_profiles: Π_i(t) ⊆ Γ_g
            subdimension_score: s_i^*(t) = min { s_i^γ(t) | γ ∈ Π_i(t) }
            blocker_union: B_i^*(t) = ⋃ { B_i^γ(t) | γ ∈ Π_i(t) }
            decision_aggregation: q_decision(t) = Cap_dec( min { s_i^*(t) | i ∈ I_dec^app(t) } )
            responsibility_aggregation: q_responsibility(t) = Cap_resp( min { r_j^*(t) | j ∈ I_resp^app(t) } )
          algorithm:
          - 1. target t を q_decision / q_responsibility の各下位観点へ分解する。
          - 2. criterion_domain, risk kind, authority type, operation class, externality, forum/adjudication binding から Π_i(t) を構成する。
          - 3. 各下位観点の profile 別スコア候補 s_i^γ(t), r_j^γ(t) を計算し、strictest aggregation として min を採る。
          - 4. blocker は B_i^*(t) として union で保持し、dominant blocker を trace 上の主 reason に選ぶ。
          - 5. branch-critical open conflict / missing lawful path / unreflected ratification などの global cap を集約後に適用する。
          - 6. q_decision, q_responsibility がともに 2 以上でも、delegation_scope D 側で X_esc / X_auto が active なら execute/conditional_auto へは進めない。
          applicability_rules:
          - regulated_domain を active にする trigger が一つでもある subdimension では、regulated profile の blocker と cap を必ず評価対象へ含める。
          - engineering_tradeoff_domain と organizational_or_social_domain が同時 active の場合、forum/adjudication/reflection に関わる blocker は organizational 側、comparable alternatives と local tradeoff に関わる blocker は engineering 側として両方残す。
          - profile が一つも active でない subdimension は modeling error とし、H3 candidate に送る。
          local_override_rule:
          - local override ω は admissible set の内部精密化であるときだけ許す。
          - ω が regulated mandatory authority, veto, policy gate, X_esc, branch-critical cap を緩める場合は invalid とする。
          - ω は s_i^*(t) を改善してよくても、global cap を解除してはならない。
          boundary_cases:
          - 安全 release gate を含む性能対コスト tradeoff では、value_binding / risk_binding は regulated と engineering の両方を active にし、min 集約と regulated cap を適用する。
          - forum ratified だが未 reflected の case がある場合、organizational 側の運用準備が整っていても q_decision <= 1 を維持する。
          - internal reversible update でも external release artifact に接続した瞬間、delegation_binding は regulated profile を追加で active にする。
      cross_check_rules:
        status: provisional_fixed
        rules:
        - C_g(K_g)=true には q_decision >= 2 かつ q_responsibility >= 2 を要求する
        - subdimension のいずれかが 0 の場合、その q 軸は 0 とし、hold か false かは repairability と lawful path で決める
        - branch-critical open conflict は q_decision を 1 以下に抑え、reflected 後にだけ 2 以上へ戻しうる
        - required approval が未取得または失効なら approval_binding は 1 以下に抑える。lawful approver 不在なら 0 にする
        - delegation_binding=not_applicable を許すのは AI/agent 実行が存在しない場合だけである
        - organizational_or_social_domain では case_ref 単独では value_binding を 2 に上げず、authority path と review window を同時要求する
    full_quality_vector:
      notation: Q(K)
      form: (Q_e, Q_g)
      note: 実装上は平坦化してもよいが、理論上は認識層と統治層を分けて保持する。
  ordinal_scale:
    '0': 'blocker: 成立不能または重大未管理'
    '1': 'fragile: 管理されていない重要問題が残る、または主要項目が部分欠落'
    '2': 'managed: 主要項目は満たされ、残差は管理可能'
    '3': 'strong: 主要項目が高密度に満たされ、残差がほぼない'
  design_rules:
  - 単一総合スコアを C_e(K_e) や C_g(K_g) の唯一判定器にしない
  - q_i は間隔尺度ではなく順序尺度を基本とする
  - C_e(K_e) は gate 判定と Q_e(K_e) の併用で判定する
  - 主要主張と補助主張を分け、主要主張の未充足を重く扱う
  mapping_to_checks:
    EC1: q_structure
    EC2: q_context
    EC3: q_evidence
    EC4: q_conflict
    EC5: q_ambiguity
    EC6: q_explain
    GC2-GC3: q_decision
    GC4: q_responsibility
    GC5: q_decision / q_responsibility cross-check
  scoring_policy:
    primary_claim_policy: 主要主張(decision_critical または safety/regulatory/contractual/root claim)を満たさない場合、対応次元は 2 以上にならない。
    coverage_thresholds:
      score_3: 主要主張充足率 1.0 かつ補助主張充足率 0.9 以上
      score_2: 主要主張充足率 1.0 かつ補助主張充足率 0.7 以上
      score_1: 主要主張充足率が 0.5 以上 1.0 未満、または補助主張充足率が 0.7 未満
      score_0: 主要主張充足率が 0.5 未満、または blocker issue が存在
    conflict_ambiguity_policy:
      score_3: 重大問題なし。軽微問題も実質ゼロ
      score_2: 軽微問題のみ、または許容問題のみ。主要主張に未管理重大問題なし
      score_1: 重大問題が管理付きで残る、または軽微未管理問題が主要判断へ波及しうる
      score_0: 未管理の重大矛盾または主要曖昧性が存在
    governance_policy:
      entry_gate: GC1=C_e(K_e)=true のときだけ Q_g を主判定に用いる
      score_2_requirement: 主要 decision target について q_decision, q_responsibility の両方が 2 以上であること
      score_0_triggers:
      - 主要 target の GC2 または GC3 が欠落して branch 判定が不能
      - 主要 branch の Ap または Ac が欠落
      - AI/agent を Ex に含むのに D がない
      - 高影響判断で Esc または required approval path がない
convergence_candidates:
  status: provisionally_resolved
  candidates:
  - id: CC1
    name: 固定点型
    idea: 更新作用素を適用しても本質的変化が起きない状態
    merit:
    - 数学的に扱いやすい
    risk:
    - 実務上は固定しすぎる恐れがある
    evaluation: 棄却ではないが、基礎定義としては不採用
    reason:
    - 半順序・固定点理論へ接続しやすい
    - ただし実務では更新停止を過度に要求しやすい
    - 保留や暫定承認の扱いが弱い
  - id: CC2
    name: 閾値到達型
    idea: 品質指標が所定閾値を超えた状態
    merit:
    - 実装しやすい
    risk:
    - 閾値設計が恣意的になりやすい
    evaluation: 補助的採用
    reason:
    - 実装上の判定器として有効
    - ただし閾値は定義そのものではなく運用パラメータに留めるべき
  - id: CC3
    name: 判断可能化型
    idea: いま決定してよいか、保留すべきかを説明付きで判定できる状態
    merit:
    - 実務に近い
    risk:
    - 数学化がやや難しい
    evaluation: 部分採用
    reason:
    - 統治収束の中心要件として有効
    - ただし説明可能性と責任構造を別に要する
  - id: CC4
    name: 説明可能化型
    idea: 主張、根拠、制約、責任が辿れる状態
    merit:
    - 監査と整合する
    risk:
    - 決定可能性そのものは保証しない
    evaluation: 部分採用
    reason:
    - 認識収束の中心要件として有効
    - ただし説明可能だけでは実行可否は決まらない
  - id: CC5
    name: 二層型
    idea: 認識収束と統治収束を分ける
    merit:
    - 知識成立と実行承認を分離できる
    risk:
    - モデルが複雑になる
    evaluation: 基礎定義として暫定採用
    reason:
    - 説明可能性と意思決定可能性を分離できる
    - GraphLint と DecisionLedger の役割分担に接続しやすい
    - 人間承認を後段で明示的に扱える
proposed_two_layer_model:
  status: provisional_adopted
  layers:
    epistemic_convergence:
      statement: '矛盾、欠落、曖昧性、根拠不足が管理可能水準にあり、 説明可能な状態。

        '
    governance_convergence:
      statement: 'さらに責任主体、承認条件、リスク受容が設定され、 実行可否を判定できる状態。

        '
  selection_reason:
  - 知識成立と実行承認を分離できる
  - 認識収束をGraphLint系検査と接続しやすい
  - 統治収束をDecisionLedger系承認と接続しやすい
  - AI自己評価を認識層と統治層に分けて設計できる
  decision_rules:
    epistemic_convergence_predicate:
      notation: C_e(K)
      statement: C_e(K)=true とは、重大矛盾が許容上限未満であり、主要主張に必要な根拠・文脈・制約が追跡可能で、残存する曖昧性が管理可能と判定された状態を指す。
      required_checks:
      - id: EC1
        name: 主張構造の閉包
        statement: 主要主張が少なくとも1つ存在し、主要主張どうしまたは主要主張と制約・対象が型付き関係で接続されていること。
      - id: EC2
        name: 文脈境界の固定
        statement: 対象範囲、時間または状況、目的または問いのうち必要な文脈が明示され、主要主張の適用範囲が説明できること。
      - id: EC3
        name: 根拠接続
        statement: 主要主張ごとに少なくとも1つの根拠参照または欠落マーカーがあり、重大主張に未管理の根拠欠落が残っていないこと。
      - id: EC4
        name: 重大矛盾の管理
        statement: 重大矛盾が未解消のまま許容上限を超えて残っていないこと。矛盾が残る場合は理由付きで管理対象化されていること。
      - id: EC5
        name: 主要曖昧性の管理
        statement: 判断を左右する主要語や条件の曖昧性が未管理のまま残っていないこと。残存曖昧性は影響範囲付きで記録されていること。
      - id: EC6
        name: 説明経路の可用性
        statement: 主要主張について、主張→文脈→根拠→制約の追跡経路を提示できること。
    governance_convergence_predicate:
      notation: C_g(K)
      statement: C_g(K)=true とは、C_e(K)=true を満たしたうえで、Q_g(K_g) の各次元が管理可能水準にあり、承認主体・実行主体・結果責任主体・許容リスク・例外経路が束縛され、確定分岐へ進める状態を指す。
      dependency: C_g(K) -> C_e(K)
      required_checks:
      - id: GC1
        name: 認識収束の成立
        statement: 前提として C_e(K_e)=true であること。
      - id: GC2
        name: 統治用文脈の束縛
        statement: 決定対象、対象範囲、期限または判定時点、代替案の集合が統治用文脈として固定されていること。
      - id: GC3
        name: 価値・リスク条件の束縛
        statement: 採択基準、許容リスク、棄却条件または差戻し条件が V として明示されていること。
      - id: GC4
        name: 責任構造の束縛
        statement: 承認主体、実行主体、結果責任主体のうち必要な主体が R に明示されていること。
      - id: GC5
        name: 統治評価の分岐可能性
        statement: execute, hold, rollback, reject, escalate のいずれかを理由付きで選べ、必要な主体・条件へ束縛できること。
    hold_state:
      notation: Hold(K)
      statement: 保留は失敗ではなく、C_e(K)=false または C_g(K)=false を理由付きで維持する正当な状態である。
non_convergence_domain_model:
  status: provisional_fixed
  statement: 非収束は単一の失敗状態ではなく、収束停止の理由構造をもつ正規状態集合として扱う。
  notation:
    non_convergence_state: N ∈ {hold, false, unresolved_plurality, deliberate_exploration}
    candidate_family: F_t = {K_i | i ∈ I_t}
    plurality_packet: Π_t = (preservation_basis, candidate_set_ref, closure_condition, adjudication_or_split_path, review_window)
    exploration_charter: Ξ_t = (objective, candidate_family_ref, owner, review_window, exit_criteria, allowed_actions, risk_bound, authority_bound)
  state_meanings:
    hold: same-frame repairable blocker を理由付きで保持する状態。既存の Hold(K, rc, pkt) を用いる。
    'false': 同一 frame / decision context の内部では lawful に再開できず、reframe_required, unrecoverable_in_scope, lawful_path_absent のいずれかで評価線を閉じる状態。
    unresolved_plurality: 複数の co-legitimate candidate があり、制度的比較禁止、ratified coexistence、または lawful scope split 待ちにより single reduction を正当化できない状態。
    deliberate_exploration: 追加根拠獲得、設計識別、制度学習のため、exploration charter に基づいて候補集合を意図的に開いたまま維持する状態。
  classification_basis:
    premature_closure_risk_domain: 過度な収束要求が safety / legality / external commitment / explainability を損なう領域。
    protected_incomparability_domain: 比較禁止または ratified plural coexistence が制度的に要求される領域。
    exploratory_continuation_domain: option value や evidence gain が branch collapse より高い領域。
  predicates:
    false_state:
      notation: False(K, ψ)
      well_formedness:
      - ψ は reframe_required / unrecoverable_in_scope / lawful_path_absent / target_invalidated のいずれかを含む
      - 同一 frame で reopen_condition を定義できない
    unresolved_plurality_predicate:
      notation: UP(F_t, Π_t)
      conditions:
      - '|candidate_set_ref| >= 2'
      - preservation_basis が institutional_incomparability / ratified_coexistence / scope_split_pending / plurality_preservation_charter のいずれかで束縛されている
      - single-branch reduction が prohibited, unratified, または current frame でまだ要求されていない
      - unknown relation や raw missing/conflict だけが根拠ではない
      non_implications:
      - all candidates executable を意味しない
      - live unadjudicated conflict の代用ではない
      - C_g(global)=true を意味しない
    deliberate_exploration_predicate:
      notation: DE(F_t, Ξ_t)
      conditions:
      - objective が定義されている
      - candidate_family_ref または hypothesis_family_ref がある
      - owner と review_window がある
      - exit_criteria がある
      - allowed_actions がある
      - risk_bound と authority_bound がある
      non_implications:
      - 単なる defer を意味しない
      - 最終 commitment branch の execute 承認を意味しない
      - gap/conflict を免責しない
  boundary_rules:
  - 主要 epistemic gap/conflict が root cause なら、UP/DE に入る前に H1/H2 を優先する。
  - live で未裁定の stakeholder conflict は adjudication case として保持し、そのまま UP とみなさない。
  - unknown relation は未束縛であり、institutional incomparability と同一視しない。
  - same-frame repairable blocker は Hold、same-frame lawful path absent または reframe_required は False とする。
  - UP は plurality preservation、DE は exploration governance であり、同一状態ではない。
  layer_connections:
    with_C_e:
    - C_e は candidate ごと、または shared core ごとに評価する。
    - UP は複数 candidate が branch-local に C_e=true でも成立しうる。
    - DE では最終 commitment target の C_e/C_g を未確定のまま残しうるが、探索に使う artifact の解釈可能性は必要である。
    with_C_g_and_Eval_g:
    - single-branch commitment を要する target では、UP が active かつ reduction/reflection 未了の間、global C_g=true にしない。
    - DE は final execute 判定ではなく、exploration action に対する scoped governance judgement としてのみ true になりうる。
    - branch-critical な UP で lawful adjudication path がある場合、Eval_g は hold または escalate 候補である。
    - branch-critical な UP で lawful path がない場合、Eval_g=false 候補である。
    with_adjudication:
    - live stakeholder conflict は adjudication layer に置く。
    - ratified and reflected な split / coexistence / precedence update が成立したときだけ UP を解消できる。
    - ratified だが未 reflected の outcome は UP または hold を解除しない。
    with_delegation_scope:
    - D は UP/DE の下で branch-preserving / evidence-gathering / shared-core action だけを scoped に許可しうる。
    - D は branch collapse、external commitment、role change、policy-sensitive reduction を明示許可なしに自動化してはならない。
    - state-changing operation で UP/DE が active の場合、既定では human_approval_required または force_escalate へ寄せる。
  transition_model:
    states:
    - hold
    - 'false'
    - unresolved_plurality
    - deliberate_exploration
    - epistemic_converged
    - governance_converged
    rules:
    - 'Hold -> governance_converged: relevant blocker が解消し、C_e/C_g がともに満たされたとき'
    - 'Hold -> false: deadline 超過、lawful path 消失、または reframe_required が確定したとき'
    - 'Hold -> unresolved_plurality: gap/conflict 解消後に複数の co-legitimate candidate が残り、single reduction を正当化できないとき'
    - 'Hold -> deliberate_exploration: reopen action が exploration charter へ置き換わり、探索継続が ratify されたとき'
    - 'unresolved_plurality -> governance_converged: adjudication reflected、scope split formalized、または coexistence rule が authoritative binding されたとき'
    - 'unresolved_plurality -> hold: singular commitment が必要になり、same-frame adjudication or split path があるとき'
    - 'unresolved_plurality -> false: singular commitment が必要で、lawful adjudication / split path が存在しないとき'
    - 'unresolved_plurality -> deliberate_exploration: plurality を保持したまま識別的 evidence acquisition が charter 化されたとき'
    - 'deliberate_exploration -> governance_converged: exit_criteria が満たされ、選択または split/coexistence rule が reflected されたとき'
    - 'deliberate_exploration -> unresolved_plurality: 探索後も co-legitimate candidate が残り、plurality preservation へ移るとき'
    - 'deliberate_exploration -> hold: 探索自体は正当だが、exploration execution に H1〜H6 blocker が生じたとき'
    - 'deliberate_exploration -> false: review window 消滅、authority 消失、risk bound 超過、または objective 無効化により current frame を維持できないとき'
  tool_mapping_extension:
    GraphBuild:
    - candidate family や hypothesis family の骨格を生成する
    - shared core と branch-specific slot の分離候補を出す
    GraphLint:
    - candidate ごとの C_e と shared-core の epistemic quality を検査する
    - raw gap/conflict を UP/DE へ誤分類しないための entry gate を提供する
    DecisionLedger:
    - plurality_packet Π と exploration_charter Ξ の正本を保持する
    - adjudication path、scope split、scoped approval を管理する
    GraphEngine:
    - Hold / False / UP / DE の状態遷移を履歴イベントとして永続化する
    - candidate family, shared core, scoped action の参照整合を管理する
  plurality_blocker_escalation_model:
    status: provisional_fixed
    statement: unresolved_plurality の blocker 化は plurality 自体ではなく、commitment requirement、candidate 差分の effect zone、lawful resolution path、intended action の coverage を交差させて判定する。
    notation:
      commitment_mode: μ_t ∈ {open_plural, bounded_multi, single_branch, split_required}
      plurality_effect_zone: ζ_t(F_t) ∈ {local_noncritical, branch_critical, global_commitment}
      path_status: ρ_t ∈ {same_frame_available, escalation_available, absent}
      action_coverage: χ(t,o) ∈ {preserved, uncovered}
      branch_result: Br_pl(t,o) ∈ {preserve, hold, escalate, false}
      active_plurality_blocker: APB(t,o) = true iff UP(F_t, Π_t) ∧ CommitReq(t,o) ∧ CritDiv(t) ∧ χ(t,o)=uncovered
    commitment_requirement_predicate:
      notation: CommitReq(t,o)
      true_when:
      - μ_t = single_branch
      - μ_t = split_required かつ split がまだ formalized / reflected されていない
      - μ_t = bounded_multi かつ authoritative branch set または required cardinality が未束縛で、operation o がその確定を前提にする
      non_true_when:
      - μ_t = open_plural で、operation o が branch-preserving に留まる
      - bounded_multi でも required branch set が reflected 済みで、operation o がその内側に留まる
    critical_divergence_predicate:
      notation: CritDiv(t)
      true_when:
      - ζ_t(F_t) ∈ {branch_critical, global_commitment}
      - 少なくとも 1 組の candidate 差分が safety / regulatory / contractual / external commitment / outcome accountability / irreversible resource lock のいずれかに波及する
      non_true_when:
      - 差分が local simulation parameter や explanation note に留まり、branch condition を変えない
    coverage_rules:
      preserved_when:
      - operation o が evidence gathering / simulation / branch-preserving trace update である
      - reflected coexistence rule の作用範囲内である
      - formalized scope split 後の split-local action である
      - scoped exploration charter の allowed_actions に含まれ、final commitment を前提にしない
      uncovered_when:
      - operation o が branch collapse または authoritative choice を含む
      - public / external commitment、role / accountability binding、mutually exclusive resource allocation を含む
      - reflected 前の ratified coexistence / split しか根拠がない
    branch_rules:
      preserve:
      - UP は active だが APB=false であり、plurality preservation をそのまま維持する
      hold:
      - APB=true かつ ρ_t=same_frame_available
      escalate:
      - APB=true かつ ρ_t=escalation_available かつ same-frame resolution path がない
      'false':
      - APB=true かつ ρ_t=absent
      - APB=true かつ target_invalidated
      - APB=true かつ commitment deadline が irrecoverably missed
    q_decision_connection:
      rules:
      - Br_pl=preserve は q_decision cap を生じさせない。ただし global C_g=true を自動意味しない
      - Br_pl=hold は q_decision <= 1 とする
      - Br_pl=escalate は q_decision <= 1 とし、delegated branch では force_escalate 候補に送る
      - Br_pl=false は q_decision = 0 の候補であり、current frame false 候補に送る
      - reflected coexistence / split / adjudication outcome が intended action を覆った時点でだけ APB を解除できる
    minimal_record_units:
      DecisionLedger_plurality_blocker_case:
      - blocker_case_id
      - target_ref
      - plurality_packet_ref
      - commitment_mode
      - plurality_effect_zone
      - operation_ref
      - action_coverage
      - path_status
      - due_basis_or_review_window
      - resolution_owner_or_authority_ref
      - branch_result
      GraphEngine_events:
      - plurality_blocker_activated
      - plurality_blocker_escalated
      - plurality_blocker_cleared
      - plurality_blocker_reframed
    non_implications:
    - APB=true は候補全体の reject を意味しない
    - APB=false は plurality が解消したことを意味しない
    - exploration charter の存在は final commitment branch の blocker を自動解除しない
    - candidate ごとの C_e=true は APB=false を保証しない
  residual_open_points:
  - shared-core action / intersection-safe action の admissible set 定義
  - exploration charter の option value, budget, termination metric の半定量化
mathematical_directions:
  partial_order_model:
    status: provisional_fixed
    idea: '知識状態に「より整合している」「より説明可能である」等の半順序を入れ、 単調更新作用素の固定点として収束を考える。

      '
    adoption_rule: 収束を単一スコアではなく、より整合・より説明可能・より判断可能という順序で扱えるとき採用する。
    rejection_rule: 質的 blocker や非比較性を単純平均へ潰す場合は採用しない。
    promotion_condition: A5 と quality_vector の順序尺度に接続できること。
    negative_examples:
    - blocker が残っていても平均点で上書きする評価
    - 非比較な二状態を無理に全順序へ潰す評価
  metric_model:
    status: provisional_adopted
    idea: '知識状態間の距離を、矛盾数、欠落数、曖昧密度、責任欠落などから定義し、 収束を距離縮小として考える。

      '
    role: supplementary_diagnostic_model
    adoption_scope: 補助的診断モデルとしてのみ採用し、基礎定義モデルにはしない。
    rejection_rule: 収束の基礎形式化を距離縮小だけで表し、blocker・非比較性・制度的禁止比較を見えなくする場合は採用しない。
    negative_examples:
    - 矛盾の重大度差を距離の総和へ潰す評価
    - 制度的に比較禁止の選択肢を単一距離で並べる評価
  abstract_interpretation_model:
    status: provisional_fixed
    idea: 'GraphLint を抽象解釈的検査器として捉え、知識状態の安全側近似を計算する。

      '
    adoption_rule: GraphLint を安全側近似の検査器として捉え、知識状態の保守的近似を計算できるとき採用する。
    rejection_rule: 完全精密性を前提にして安全側判定を壊す場合は採用しない。
    promotion_condition: GraphLint の実装責務へ直接接続できること。
    negative_examples:
    - 曖昧な欠落を安全側に倒さず success 扱いする検査
    - 抽象状態と具体状態の対応を残さない検査
ai_self_evaluation_model:
  status: provisional_fixed
  statement: AI自己評価は、主として認識収束側の診断と、統治収束に必要な欠落の指摘に限定して認める。最終的な統治承認そのものは原則として人間または事前委任された制度主体が担う。
  evaluation_targets:
  - 出力整合性
  - 知識十分性
  - 目的適合性
  - 実行リスク
  - 根拠不足
  - 判断保留必要性
  permitted_scope:
  - G, C, E の構造整合性、欠落、矛盾、曖昧性の診断
  - C_e(K_e) の候補判定と、その理由説明
  - V, R の未束縛や不足に起因する C_g(K_g)=false の指摘
  - Hold(K, reason) の候補提示
  non_delegable_scope:
  - 新しい価値基準 V の最終採択
  - 結果責任主体 R の最終決定
  - 不可逆または外部影響を持つ実行承認
  - ポリシー例外や規制逸脱の承認
  human_approval_required_when:
  - 安全、法規、契約、対外約束、予算、正式リリースなど不可逆または高影響の判断を行うとき
  - 複数ステークホルダー間の価値衝突を裁定するとき
  - 責任主体の新規割当または変更を行うとき
  - AI が低信頼または高不確実と自己評価したとき
  - 事前委任された運用範囲を逸脱するとき
  conditionally_delegable_when:
  - 対象が内部限定で可逆であり、事前に承認済みの V と R の枠内で動くとき
  - delegation_scope D に T, G, X, E_req, F, A が定義されているとき
  - 差戻し条件と監査ログ H の記録が必須化されているとき
  open_points:
  - 自己評価監査ログの保存期間と要約粒度をどこまで共通化するか
  delegation_judgement_inputs:
  - impact_class
  - reversibility
  - externality
  - policy_risk
  - calibrated_confidence
  - evidence_state
  - rollback_ready
  - approval_validity
self_confidence_calibration_model:
  status: provisional_fixed
  statement: calibrated self-confidence は、固定された stratum σ の下で delegated execution を安全に完了できる見込みを、現在条件と事後観測履歴から保守的に推定する統治用量である。真理値でも承認代替でもない。
  notation:
    stratum: σ = (γ, op, ic, ext, rev, ev_cls, ctx_cls)
    factor_vector: S_conf(a,t,σ) = (c_ev, c_fr, c_cf, c_ctx, c_rb, c_hist)
    base_confidence: Conf_base(a,t,σ) = min_app S_conf(a,t,σ)
    calibrated_confidence: Conf*(a,t,σ) = max(0, Conf_base(a,t,σ) - p_miscal(a,σ) - p_shift(a,t,σ))
    confidence_ready: CR(a,t,σ) = true iff Conf*(a,t,σ) >= F(γ, op, ic, ext, rev) and B_conf(a,t,σ)=false
  factor_semantics:
    c_ev: required_evidence の completeness / authority / availability を 0..1 へ写像した値
    c_fr: freshness rule と reflection rule を満たしている度合い
    c_cf: critical disputed evidence や branch-critical open conflict がない度合い
    c_ctx: decision context, approval validity, policy context が失効していない度合い
    c_rb: rollback obligation がある場合に rollback path / owner / trigger / verification が有効である度合い。rollback 不要な operation では 1 を置く
    c_hist: 同一 stratum における過去成功率の lower confidence bound またはそれに準ずる保守値
  penalty_terms:
    p_miscal: raw self-report と実績の乖離が継続したときに課す miscalibration penalty
    p_shift: out-of-profile, cold start, evidence distribution shift, policy version change に対する penalty
  blocker_overrides:
  - critical disputed evidence がある場合は CR=false
  - branch-critical open conflict または ratified だが未 reflected の critical case がある場合は CR=false
  - approval_validity_live=false で lawful renewal path もない場合は CR=false
  - rollback_required なのに rollback_ready=false の場合は CR=false
  - out_of_scope または lawful_exception_required は confidence とは別に X_esc として処理し、conditional_auto を禁止する
  domain_floor_function:
    statement: F は domain profile を基底とし、operation class・impact・externality・reversibility の uplift を加える。
    base_floor:
      regulated_domain: 0.9
      engineering_tradeoff_domain: 0.75
      organizational_or_social_domain: 0.8
    recommended_floors:
      regulated_domain_internal_reversible_auto: 0.95
      engineering_tradeoff_domain_reversible_internal_update: 0.85
      organizational_or_social_domain_cross_unit_update: 0.9
    non_floor_cases:
    - external irreversible commitment
    - public commitment or role change
    - lawful exception required
    - non-delegable operation
  branch_rules:
  - Conf* < F かつ lawful manual path がある場合は human_approval_required
  - Conf* < F かつ lawful manual path がない場合は force_escalate
  - Conf* >= F でも B_conf=true または X_auto/X_esc active なら conditional_auto に進めない
  - cold start または severe shift の場合は、既定で human_approval_required とし、regulated_domain では delegated auto を許さない
  audit_and_recalibration:
    required_logs:
    - raw self-report
    - factor_vector
    - penalty_terms
    - applied floor
    - stratum id
    - post-check result
    - rollback result
    - incident / escalation outcome
    update_rule: Conf* の更新は post-check / rollback / incident を含む realized outcome によってのみ行い、宣言値だけでは更新しない。
  history_update_model:
    status: provisional_fixed
    statement: c_hist は、同一 stratum σ に属する realized outcome を time decay 付きで集約し、Beta lower confidence bound で保守化して求める。
    notation:
      realized_outcome_set: Ω_real = {success, rollback_success, partial_rollback, rollback_fail, incident, forced_escalation_after_boundary_violation}
      active_history: H_σ(t) = { e_i | stratum(e_i)=σ, age_days(e_i) <= W_max(γ), outcome(e_i) ∈ Ω_real }
      time_weight: w_i(t) = 2^{-Δdays_i / HL(γ)}
      effective_sample: N_eff(a,t,σ) = Σ_{e_i ∈ H_σ(t)} w_i(t)
      outcome_score: y_i ∈ {1, 0.5, 0}
      context_class: Ω(a,t) = active context class of a at t, default normal
      target_family: τ_auto = delegated_auto_success
      posterior_alpha: α(a,t,σ) = α0(τ_auto, γ, Ω(a,t)) + Σ w_i(t) y_i
      posterior_beta: β(a,t,σ) = β0(τ_auto, γ, Ω(a,t)) + Σ w_i(t) (1 - y_i)
      historical_confidence: c_hist(a,t,σ) = LCB_Beta(ρ(τ_auto, γ, Ω(a,t)), α(a,t,σ), β(a,t,σ))
    default_parameters:
      fallback_prior:
        alpha0: 1.0
        beta0: 1.0
        credibility_level: 0.9
      calibrated_prior_binding:
        target_family: delegated_auto_success
        context_binding: decision context に active な context class があればそれを使い、なければ normal を使う
      decay_defaults:
        regulated_domain:
          half_life_days: 30
          max_window_days: 90
          minimum_effective_samples: 8
          credibility_level: 0.95
        engineering_tradeoff_domain:
          half_life_days: 60
          max_window_days: 180
          minimum_effective_samples: 12
          credibility_level: 0.9
        organizational_or_social_domain:
          half_life_days: 45
          max_window_days: 120
          minimum_effective_samples: 10
          credibility_level: 0.9
    outcome_mapping_rules:
    - success -> y_i = 1.0
    - rollback_success -> y_i = 0.5, ただし internal_only かつ reversible で verification_pass 済み、remaining_externality_status=none のときだけ
    - partial_rollback -> y_i = 0.0
    - rollback_fail -> y_i = 0.0
    - incident -> y_i = 0.0
    - forced_escalation_after_boundary_violation -> y_i = 0.0
    - verification_pending は Ω_real に入れず、success/failure 未確定として p_shift 側で監視する
    - manual_safe_reroute は delegated completion の成功率へ入れず、shift monitor だけに残す
    cold_start_rule:
    - N_eff < minimum_effective_samples(γ) のときは cold_start=true とし、regulated_domain では CR=false、他 domain でも conditional_auto を既定停止する
    - cross-profile からの borrowed history は c_hist の正の evidence に算入せず、必要なら prior cap にしか使わない
  stratum_reuse_boundary_model:
    status: provisional_fixed
    statement: calibration history の再利用は stratum 一致を基本とし、より緩い strata や異なる profile からの成功履歴で confidence を引き上げない。
    rules:
    - γ と op が一致しない source history は c_hist の正の evidence に入れない
    - source の ic / ext / rev が target より permissive な場合、その source history は target の positive reuse に使わない
    - ev_cls または ctx_cls が unseen bucket へ遷移した場合、新しい σ を立てて cold start 扱いにする
    - stricter stratum から looser stratum への流用も positive uplift ではなく prior cap に限定する
  drift_detection_model:
    status: provisional_fixed
    statement: p_shift は policy / evidence / context / outcome の drift を mild / severe に正規化して加算し、severe では delegated auto を停止する。
    notation:
      drift_state: DS(a,t,σ) ∈ {none, mild, severe}
      penalty_cap: 0 <= p_shift(a,t,σ) <= 0.4
      recent_negative_rate: r_neg(a,t,σ) = (Σ w_i 1[y_i=0]) / N_eff
      recent_rollback_share: r_rb(a,t,σ) = (Σ w_i 1[outcome_i=rollback_success]) / N_eff
    mild_triggers:
    - weighted success の低下が直近基準線から 0.15 以上
    - r_rb > 0.3
    - external_ref / pending / freshness exception の比率が直近基準線から 0.2 以上悪化
    - policy_version の minor change
    severe_triggers:
    - policy_version の major change
    - unseen ev_cls または unseen ctx_cls への遷移
    - r_neg >= 0.2
    - 直近3件の realized outcome に 2件以上の negative outcome
    - critical incident または boundary_violation 起因の forced escalation が1件でも発生
    penalty_updates:
      mild:
        success_drop: 0.1
        rollback_share: 0.05
        evidence_mix_shift: 0.05
        policy_minor_change: 0.1
      severe:
        policy_major_change: 0.25
        unseen_context_or_evidence_class: 0.25
        negative_rate_excess: 0.2
        consecutive_negative_outcomes: 0.2
        critical_incident_or_boundary_violation: 0.25
      aggregation_rule: p_shift は active penalty の和を 0.4 で cap したものとし、severe trigger が1つでも active なら DS=severe とする
    branch_effects:
    - DS=mild のときは Conf* に p_shift を課し、confidence_ready を再評価する
    - DS=severe のときは regulated_domain で CR=false、他 domain でも既定で conditional_auto を停止する
    - verification_pending が pending_window を超過した場合は severe 側へ昇格させる
  non_implications:
  - Conf* は truth probability ではない
  - Conf* は V や R の未束縛を埋めない
  - 高い c_hist は現在の evidence/freshness/context 欠落を相殺しない
  - rollback_success は無条件の success と同一視しない
guard_meet_model:
  status: provisional_fixed
  statement: delegation_scope D の guard facet は kind ごとに正規化し、比較可能な場合だけ strictest bound の meet を計算する。meet 結果は delegated path の admissible set と branch 候補へ直接写像する。
  notation:
    guard_kind: κ(g) ∈ {ordinal_cap, numeric_upper, numeric_lower, numeric_range, numeric_delta, required_all, allowed_set, route_family}
    applicability_profiles: Π_g(t,o) ⊆ Γ_g
    canonical_guard: N_g^γ = normalize(g, γ, unit, reference_frame, comparator)
    comparable_predicate: Comp(N_i, N_j) ∈ {true, false}
    meet_status: μ_g(t,o) ∈ {eligible, guard_failure, guard_contradiction, incomparable_guard}
    route_family:
      family: F = (Sem, σ, k, U, B, A, X, Cnt, Map)
      admissible_selection: 'Adm(F,t,o) = { S ⊆ U | Count_Cnt(S) >= k ∧ X_ok(S) ∧ ∀r∈S: A(r,t,o)=true ∧ BundleReady(B(r),t,o)=true }'
      current_realization: Sel_cur(t,o) = { r ∈ U | A(r,t,o)=true ∧ BundleReady(B(r),t,o)=true }
  comparability_conditions:
  - comparator direction が一致していること
  - canonical unit へ変換可能であること
  - reference frame / baseline / sampling window が両立していること
  - same facet semantics を共有していること
  kind_models:
    ordinal_cap:
      permissiveness_orders:
        impact_cap: low < medium < high < critical
        policy_risk_cap: low < medium < high < critical
        externality_cap: internal_only < bounded_external < external_allowed
        reversibility_cap: reversible < partially_reversible < irreversible
      strictest_rule: θ_ord^*(t,o,g)=min{θ_i'}
      interpretation: min はより厳しい許容上限を表す。順序未定義 pair は incomparable_guard とする。
    numeric_upper:
      canonical_form: x <= u
      strictest_rule: u^*(t,o,g)=min{convert(u_i)}
    numeric_lower:
      canonical_form: x >= l
      strictest_rule: l^*(t,o,g)=max{convert(l_i)}
    numeric_range:
      canonical_form: l <= x <= u
      strictest_rule: I^*(t,o,g)=[max{convert(l_i)}, min{convert(u_i)}]
      contradiction_condition: max{convert(l_i)} > min{convert(u_i)}
    numeric_delta:
      canonical_form: '|x - x_ref| <= d または Δx <= d'
      strictest_rule: d^*(t,o,g)=min{convert(d_i)}
      comparability_extra:
      - x_ref または baseline ref が一致または ratified 変換可能であること
      - delta の向きと observation window が一致していること
      - baseline family が同一であるか、registry 上の lawful alignment が存在すること
    required_all:
      canonical_form: すべて満たすべき required item 集合 Req
      strictest_rule: Req^*(t,o,g)=⋃ Req_i
      contradiction_condition: Req^*(t,o,g) に ratified mutually exclusive item pair が含まれる場合。
    allowed_set:
      canonical_form: 許容候補集合 Allow
      strictest_rule: Allow^*(t,o,g)=⋂ Allow_i
      contradiction_condition: Allow^*(t,o,g)=∅
    route_family:
      canonical_form: 同一 obligation family を満たす route 候補族。modality σ ∈ {any_of, k_of_n}、any_of は k=1 とみなす。
      component_meaning:
        Sem: obligation_family_ref または canonical semantic obligation
        σ: modality。any_of または k_of_n
        k: 必要 route 数。any_of では 1
        U: candidate route universe
        B: 各 route の local conjunctive bundle
        A: route activation predicate。freshness, authority, scope, policy などを含む
        X: mutual exclusion または coexistence constraint
        Cnt: counting_basis。route_count / coverage_class / authority_class など
        Map: route alignment / equivalence の ratified rule
      strictest_rule: lawful alignment 後の各 family の admissible selection を交差して Adm^*(t,o)=⋂ Adm(F_i',t,o) を作り、strictest admissible set とする。
      special_reduction_rules:
      - single-step route だけから成る any_of は allowed_set と等価に還元できる。
      - candidate universe と counting_basis が同一で、差分が k だけの k_of_n は k^*=max{k_i} に還元できる。
      contradiction_conditions:
      - Adm^*(t,o)=∅
      - k^* が feasible な non-exclusive active route 数を上回る
      - 各 feasible route の local bundle が mandatory guard と両立しない
      incomparability_conditions:
      - Sem mismatch かつ ratified route mapping 不在
      - Cnt mismatch かつ lawful alignment rule 不在
      - exclusivity semantics mismatch
      - partial-overlap 候補の coverage equivalence が未 ratified
      status_mapping:
        eligible: Sel_cur が Adm^* の少なくとも1要素を実現する
        guard_failure: Adm^* は非空だが Sel_cur が条件未充足
        guard_contradiction: Adm^*=∅
        incomparable_guard: alignment 不成立
  meet_status_rules:
  - comparable で current state が strictest bound を満たす場合、μ_g=eligible
  - comparable で strictest admissible set は非空だが current state が満たさない場合、μ_g=guard_failure
  - comparable で strictest admissible set が空になる場合、μ_g=guard_contradiction
  - canonical conversion 不可、baseline 変換規則不在、direction 不一致、semantic mismatch の場合、μ_g=incomparable_guard
  branch_mapping:
    eligible:
      branch: conditional_auto_candidate
      note: X_auto / X_esc と required_evidence / approval_validity の cross-check を別途通す。
    guard_failure:
      with_lawful_manual_path: human_approval_required
      without_lawful_manual_path: force_escalate
    guard_contradiction:
      with_same_frame_manual_redesign_path: human_approval_required
      without_same_frame_manual_redesign_path_but_with_escalation_path: force_escalate
      without_lawful_path: current_frame_false_candidate
      force_escalate_candidate_when:
      - branch_critical
      - regulated high impact
      - external commitment に接触する
    incomparable_guard:
      default_with_lawful_manual_path: human_approval_required
      default_without_lawful_manual_path: force_escalate
      force_escalate_when:
      - branch-critical facet に触れる
      - regulated / contractual / external commitment の guard である
      - canonical unit / baseline 変換不能が policy-bound facet に生じる
  local_override_constraints:
  - local override は canonical unit の精密化、narrower range、additional required item の追加としてだけ許す。
  - local override は strictest bound を緩めてはならない。
  - regulated mandatory authority、veto、X_esc、branch-critical cap を override で解除してはならない。
  residual_open_points:
  - route family の partial-overlap candidate に対する lawful route mapping と coverage equivalence をどう registry 化するか
  - composite unit / derived metric を quantity family と conversion rule へどう分解するか
  - sampling window の統計的同値や resampling の admissible 条件をどう与えるか
action_coverage_model:
  status: provisional_fixed
  statement: action_coverage_model は、unresolved_plurality または open stakeholder conflict の下で current intended action a を lawful に進められるかを、coverage_basis と isolation_basis で判定する形式化である。
  notation:
    frame: Φ = (decision_context_ref, target_ref, scope_ref, V_ref, R_ref, policy_refs, commitment_class)
    live_candidates: Λ(Φ) = 現在生存している candidate / split branch / coexistence branch の集合
    live_outcomes: Ω(Φ) = active conflict head case について ratifiable で lawful な outcome の集合
    affected_zone: Z(a) = action a が変更・拘束・外化する target / facet / effect の集合
    contested_zone: Δ(Φ) = 未裁定 plurality / conflict により binding が揺れている facet / authority / accountability / externality の集合
  predicates:
    shared_core: 'SC(Φ,a)=true iff ∀x∈Λ(Φ)∪Ω(Φ): Adm(x,a)=true ∧ Eff_x(a)|Δ(Φ) が outcome 非依存に一致し ∧ Collapse(a)=false ∧ ExtIrrev(a)=false'
    intersection_safe: IS(Φ,a)=true iff Z(a)∩Δ(Φ)=∅ または SafeInvariant(Z(a),Λ(Φ),Ω(Φ))=true, かつ BranchPreserve(a)=true ∧ ExtIrrev(a)=false ∧ AccountabilityShift(a)=false
    coverage_kind: CovKind(Φ,a) ∈ {shared_core, intersection_safe, uncovered, incomparable_coverage}
    admissible_under_nonconvergence: Adm_nc(Φ,a)=true iff CovKind(Φ,a)∈{shared_core, intersection_safe} ∧ Auth(a)=valid ∧ (RollbackReady(a)=true または Reversible(a)=true)
  classification_rules:
    shared_core_conditions:
    - reflected coexistence / reflected split / scoped exploration charter / pre-bound route family のいずれかが、全 live branch で同一 action family を覆うこと
    - required authority, accountability family, rollback expectation が branch 間で一致すること
    - action 実行後も live branch set を減らさず、future adjudication / split / reflection path を閉じないこと
    intersection_safe_conditions:
    - affected zone が contested zone の外にあること、または live branch 間で identical invariant として registry / reflected rule により束縛されていること
    - shadow / sandbox / branch-local artifact の場合、authoritative state、public output、external commitment、irreversible resource lock に波及しないこと
    - rollback-contained と主張するなら、rollback packet、trigger、owner、verification window が束縛されていること
    uncovered_conditions:
    - shared_core 条件も intersection_safe 条件も満たさないこと
    - current action が conflict outcome または plural branch の少なくとも一部で unlawful / unaccountable / non-rollback-ready になること
    incomparable_coverage_conditions:
    - route mapping、facet alignment、registry conversion、scope alignment が ratified されておらず、coverage の空/非空を正当に判定できないこと
    - 未 reflected outcome や unratified mapping しか basis がないこと
  required_evidence:
  - live_candidate_set_ref または live_outcome_set_ref
  - coverage_basis_ref または isolation_basis_ref
  - affected_target_ref / affected_facet_ref / effect_zone_ref
  - branch_preserving_basis_ref
  - authority_basis_ref / accountability_preservation_ref
  - rollback_packet_ref または reversibility_basis_ref
  - expiry_or_review_window
  - basis_status_ref
  - review_window_ref
  - successor_basis_ref
  branch_connection_rules:
  - CovKind が shared_core または intersection_safe なら、plurality / open conflict はそれだけでは q_decision の blocker にならない。
  - CovKind が uncovered で、current action に branch-critical divergence がある場合、q_decision は 1 以下となり、same-frame 補強可能なら hold、上位 authority / registry path があれば escalate、lawful path absent なら false へ送る。
  - CovKind が incomparable_coverage の場合、coverage 不足ではなく lawful alignment 不足として hold または escalate を返し、guard_contradiction と同一視しない。
  - ratified だが未 reflected の outcome は CovKind=shared_core の根拠に使えない。
  action_family_partition:
    admissible_examples:
    - evidence gathering / simulation / note update / trace repair
    - shared-core な safety or monitoring strengthening
    - rollback readiness strengthening
    - sandbox / shadow / dry-run execution
    - reflected split 範囲内の local action
    prohibited_examples:
    - branch collapse
    - public release / contractual commit / external notification
    - policy reinterpretation / target replacement / scope split introduction
    - role or accountability reassignment
    - unratified mapping を使った workaround
  decision_ledger_minimal_schema_extension:
    fields:
    - intended_action_ref
    - intended_action_family
    - coverage_kind
    - coverage_basis_ref
    - isolation_basis_ref
    - affected_target_ref
    - affected_facet_ref
    - effect_zone_ref
    - branch_preserving_basis_ref
    - authority_basis_ref
    - accountability_preservation_ref
    - rollback_packet_ref
    - expiry_or_review_window
    - basis_status_ref
    - review_window_ref
    - successor_basis_ref
  graph_engine_events:
  - action_coverage_bound
  - action_coverage_invalidated
  - action_executed_under_plurality
  - action_blocked_uncovered
  - action_escalated_for_coverage
  - action_coverage_expired
  - action_coverage_review_due
  - action_coverage_revalidated
  residual_open_points:
  - ratified 済みだが未 reflected の outcome を provisional coverage としてどこまで許すか
  - dominance_only mapping と monotone strengthening action の境界をどこまで形式化するか
same_frame_manual_redesign_model:
  status: provisional_fixed
  statement: same-frame manual redesign path は、guard_contradiction により空になった delegated admissible set を、同一 frame Φ を保ったまま lawful manual redesign で非空化できるかを表す述語である。manual override ではなく、frame-preserving redesign だけを数える。
  notation:
    frame: Φ = (decision_context_ref, target_ref, scope_ref, V_ref, R_ref, policy_refs, commitment_class)
    redesign_operator: δ ∈ Δ_sf
    predicate: SR(Φ,t,o)=true iff ∃δ such that Inv_preserve(Φ,δ)=true ∧ Lawful(δ)=true ∧ μ_g(t,δ(o)) ∈ {eligible, guard_failure}
  frame_invariants:
  - decision_context_ref が維持されること
  - target_ref と commitment_class が維持されること
  - V の mandatory criterion / veto / risk_tolerance を緩めないこと
  - R の required authority / accountability family を bypass しないこと
  - scope split, public commitment, external irreversible commitment, role change, policy exception を新規導入しないこと
  required_metadata:
  - redesign_owner_ref
  - redesign_action_family_ref
  - preserved_invariants_ref
  - redesign_success_criteria
  - re_evaluation_target_ref
  - authority_basis_ref
  - review_window または due_basis
  - fallback_escalation_ref
  allowed_operator_families:
  - already-bound route family 内の候補差替え
  - parameter narrowing / safer envelope / stricter threshold
  - required evidence / freshness / rollback / post-check strengthening
  - ratified registry に基づく canonical unit / baseline alignment
  - shared-core を保った rollout / monitoring / rollback plan redesign
  prohibited_operator_families:
  - decision target replacement
  - risk_tolerance / veto / mandatory authority relaxation
  - scope split or public/external commitment introduction
  - live conflict / unresolved plurality の単純 collapse
  - unratified conversion rule or policy exception as workaround
  decision_rules:
  - required_metadata が欠ける場合、SR(Φ,t,o)=false とする。
  - 単に human approver が存在することは SR の成立条件ではない。
  - 再設計後に authoritative V/R 更新、policy reinterpretation、decision target 差替えが必要なら same-frame ではなく escalation / adjudication / reframe へ送る。
  - baseline mismatch や unit mismatch で lawful registry がない場合は redesign 不可能ではなく incomparable_guard 側へ留める。
  - registry mutation または新しい conversion rule の ratification が必要な場合、それは same-frame redesign ではなく escalation / registry governance に送る。
  branch_connection_rules:
  - μ_g=guard_contradiction かつ SR=true のとき Branch_D=human_approval_required であり、Eval_g では Hold 候補である。
  - μ_g=guard_contradiction かつ SR=false だが escalation path があるとき Branch_D=force_escalate である。
  - μ_g=guard_contradiction かつ SR=false かつ lawful path absent のとき current frame false 候補である。
  - μ_g=incomparable_guard は SR を評価する前に registry / comparison rule の ratification を要する。
  non_implications:
  - SR=true は redesign 後の即時 execute を意味しない。
  - SR=true は delegated auto の継続許可を意味しない。
  - SR=false は branch 全体の reject を意味せず、lawful escalation があれば force_escalate に留まる。
  core_type_boundary:
  - 共通語彙の core family は route_substitution_within_bound_family / parameter_narrowing_or_safe_envelope / evidence_gate_strengthening / canonical_alignment_using_ratified_registry / rollback_monitoring_readiness_relayout の5つに限る。
  - domain/tool 固有 subtype は extension registry を通して parent core family に従属させる。
canonical_registry_model:
  status: provisional_fixed
  statement: canonical registry model は、guard 比較と lawful alignment のための authority-bound な正規化層を与える。registry は quantity / baseline / comparator / sampling window / conversion の entry 群からなり、normalize と active-rule check を通じて incomparable_guard を comparable / issue-coded state へ写像する。
  notation:
    registry: Λ = (QF, BF, CP, WP, CR, RI)
    normalization_tuple: ν(x) = (qk, sf, u_c, b_f, c_p, w_p)
    active_rule_predicate: Active(r,t,γ,op)=true iff r が ratified かつ validity/scope/profile 制約を満たす
    comparability_predicate: Comp_Λ(x,y)=true iff sf が一致し、u_c/b_f/c_p/w_p が一致または active な ratified rule 群で lawful に整合化できる
  component_meaning:
    QF: quantity family registry。quantity kind、semantic facet、canonical unit、allowed source unit、precision policy を持つ。
    BF: baseline family registry。anchor kind、reference object type、identity condition、refresh / supersession rule を持つ。
    CP: comparator profile registry。upper/lower/range/delta、direction、tolerance、operand constraint、admissible numeric support を持つ。
    WP: sampling window profile registry。window kind、duration/event rule、aggregation operator、alignment / resampling rule を持つ。
    CR: ratified conversion rule registry。source/target family、transform、precondition、loss class、scope、authority、validity を持つ。
    RI: registry issue vocabulary。binding gap や absent rule を typed issue として正規化する。
  minimal_entry_schemas:
    quantity_family_entry:
    - quantity_family_id
    - quantity_kind
    - semantic_facet
    - canonical_unit
    - allowed_source_units
    - precision_policy
    baseline_family_entry:
    - baseline_family_id
    - anchor_kind
    - reference_object_type
    - identity_condition
    - refresh_rule
    comparator_profile_entry:
    - comparator_profile_id
    - comparator_kind
    - direction
    - tolerance_policy
    - operand_constraints
    sampling_window_profile_entry:
    - window_profile_id
    - window_kind
    - window_spec
    - aggregation_operator
    - alignment_rule
    conversion_rule_entry:
    - rule_id
    - source_ref
    - target_ref
    - transform_ref_or_formula
    - preconditions
    - loss_class
    - scope
    - authority_ref
    - status
    - valid_from_or_version
  ratification_policy:
    authoritative_use_rule: CR の rule は status=ratified かつ Active=true のときだけ authoritative に使える。draft/proposed/expired/superseded は suggestion としてしか使わない。
    non_implications:
    - convert 可能であることは compare 可能であることを自動意味しない。semantic facet と comparator profile の整合が別途必要である。
    - rule が存在しても scope/profile/impact 制約外なら current comparison には使えない。
  registry_issue_mapping:
    statement: incomparable_guard は registry 側の issue code へ写像して repairability と escalation を分ける。
    mapping_rules:
      quantity kind / semantic facet / comparator / window 注記欠落: registry_binding_gap
      source-target family は識別できるが active な rule 不在: conversion_rule_absent
      baseline family または anchor mismatch で lawful alignment rule 不在: baseline_alignment_absent
      sampling window / aggregation semantics mismatch で ratified alignment rule 不在: window_alignment_absent
      rule はあるが current scope/profile/impact に適用不能: rule_scope_mismatch
      semantic facet 自体が食い違う: semantic_mismatch
  same_frame_alignment_operator:
    status: provisional_fixed
    notation: Align_Λ^sf(x)=x' iff registry mutation を伴わず、既存の active ratified rule だけで ν(x) を lawful に再表現できる
    allowed_when:
    - re-expression が unit 変換、baseline rebinding、window alignment の既存 rule 適用に留まる
    - decision_context_ref, target_ref, commitment_class, V_ref, R_ref が不変である
    - new registry entry の ratification、policy exception、semantic facet change を要しない
    forbidden_when:
    - new conversion rule / baseline family / window equivalence rule の作成が必要
    - derived metric の新規定義や comparator profile の再解釈が必要
    - alignment が authority family や risk tolerance の再束縛を要求する
  tool_authority_split:
    DecisionLedger: registry entry と conversion rule の ratification / activation / supersession の normative authority を持つ。
    GraphEngine: registry version と usage trace の persistence owner であり、reference integrity を管理する。
    GraphBuild: quantity / baseline / comparator / window の候補 binding を提案できるが、status は proposed に留まる。
    GraphLint: normalize と Comp_Λ を評価し、registry issue code と trace を返すが、rule を ratify しない。
  residual_open_points:
  - composite unit / derived metric を quantity family と conversion rule へどう分解するか
  - sampling window の統計的同値や resampling の admissible 条件をどう与えるか
  - registry 更新 workflow、delegated review、SLA をどこまで共通 schema 化するか
semantic_delta_autoclassification_model:
  status: provisional_fixed
  statement: semantic_delta_autoclassification_model は、shared prompt / template 変更を canonical normalization・execution replay・downstream binding・protected invariant の witness で安全側に分類し、semantic delta class を hidden coupling、prior reset、burst taxonomy、penalty gate へ束縛する形式モデルである。
  notation:
    delta_case: δ = (delta_case_id, source_family, old_artifact_ref, new_artifact_ref, relation_ref, facet_scope_ref, detector_scope_ref, profile_ref, context_ref, state)
    semantic_delta_class: Δ_auto(δ,β) ∈ {none, bounded, material, unresolved}
    lineage_integrity: LinOK(δ)=true iff parent / lineage_root / execution_capsule / witness_ref が束縛される
    normalized_equivalence: NormEq(δ)=true iff canonical normalization 後に executing token graph・schema binding・routing primitive が同型である
    protected_invariant: InvOK(δ,β)=true iff protected facet β に対する benchmark / golden replay / branch outcome が許容域内に留まる
    downstream_equivalence: DownEq(δ,β)=true iff β に対する required schema keys、sink / audience、evidence / authority / route binding が不変である
    scoped_downstream_change: ScpDown(δ)=true iff downstream binding change が ratified affected facet set 内に閉じ、review owner と rollback path が束縛される
    facet_map_ratified: FacRat(δ)=true iff affected facet set と blast radius が ratified mapping / equivalence envelope で束縛される
    control_semantic_change: CtrlChg(δ,β)=true iff β 上で threshold / comparator / veto / escalation / routing / sink / evidence / requiredness / authority / confirm-release logic のいずれかが変化する
    benchmark_material_drift: BenchMat(δ,β)=true iff replay / golden set で β の protected outcome difference が許容域を超える
    multi_source_confound: MultiSrc(δ)=true iff prompt / template / rulepack / checkpoint の joint change で artifact 別寄与を分離できない
    witness_conflict: WitConflict(δ)=true iff NormEq / InvOK / DownEq / CtrlChg の判定が矛盾する
  classification_rules:
    none:
      predicate: Δ_auto(δ,β)=none iff LinOK(δ) ∧ NormEq(δ) ∧ InvOK(δ,β) ∧ DownEq(δ,β) ∧ ¬CtrlChg(δ,β)
      consequences:
      - parameterized_variant / inherited_bundle に対しても β 上は corroboration increment = 0 とする
      - lineage が連続する限り、affected β の prior reset は不要である
    bounded:
      predicate: Δ_auto(δ,β)=bounded iff LinOK(δ) ∧ FacRat(δ) ∧ ScpDown(δ) ∧ ¬BenchMat(δ,β) ∧ ¬MultiSrc(δ) ∧ ¬WitConflict(δ) ∧ Δ_auto(δ,β)≠none ∧ β が ratified affected facet set に含まれる
      consequences:
      - affected β では corroboration increment = 0、triage metadata は bounded 扱いとする
      - unaffected protected facet β' については warmed calibration を維持できる
    material:
      predicate: Δ_auto(δ,β)=material iff LinOK(δ) ∧ [CtrlChg(δ,β) ∨ BenchMat(δ,β) ∨ (¬ScpDown(δ) ∧ β に downstream branch 影響)]
      consequences:
      - affected β の operational stratum は sparse 以下へ巻き戻す候補とする
      - pre/post artifact を独立 corroboration route に数えない
    unresolved:
      predicate: Δ_auto(δ,β)=unresolved iff ¬LinOK(δ) ∨ MultiSrc(δ) ∨ WitConflict(δ) ∨ [protected β に触れる ∧ ¬FacRat(δ)] ∨ witness set 不足
      consequences:
      - affected β の prior_ready_flag = false 候補とし、manual review required 候補を立てる
      - lawful burst witness には使わない
  safety_axioms:
  - witness 不足時の既定値は unresolved である
  - none は independent corroboration route を生成しない
  - bounded は affected facet の confirmability を上げない
  - protected facet に対する bounded 判定には FacRat と replay benchmark の両方が必要である
  coupling_mapping_rules:
  - Rel∈{parameterized_variant, inherited_bundle} かつ Δ_auto(δ,β)=none なら CS(s_i,s_j,β)=hard_shared とする
  - Rel∈{parameterized_variant, inherited_bundle} かつ Δ_auto(δ,β)=bounded なら affected β に限り bounded_shared を許す
  - Δ_auto(δ,β)∈{material, unresolved} なら affected β で hard_shared と reset trigger 候補を立てる
  prior_reset_mapping:
    none:
    - lineage 連続かつ benchmark 安定なら affected β の OS を維持できる
    bounded:
    - affected β だけ OS=sparse 候補とし、unaffected β' の warmed は維持できる
    material:
    - affected β の OS を sparse または cold_start 候補へ巻き戻す
    unresolved:
    - affected β の prior_ready_flag を false 候補とし、cold_start / sparse へ巻き戻す
  burst_penalty_mapping:
  - none / bounded / material / unresolved のいずれでも corroboration increment を自動加算しない
  - material / unresolved の dense rotation は flooding_suspect candidate を強化する
  - concealed material drift は replay / bias / flooding penalty severity を上げうる
  decision_ledger_schema_extension:
    fields:
    - semantic_delta_class
    - delta_case_id
    - delta_witness_ref_set
    - affected_facet_set
    - affected_detector_family_set
    - protected_invariant_result
    - downstream_binding_diff_class
    - scoped_prior_reset_reason
    - manual_review_required_by_delta
  graph_engine_events:
  - semantic_delta_classified
  - semantic_delta_reclassified
  - delta_witness_bound
  - protected_invariant_failed
  - scoped_prior_reset_triggered
  - burst_taxonomy_degraded_by_delta
  residual_open_points: []
implementation_mapping:
  GraphBuild:
    role: 意図抽出、G/C 骨格生成、E バインディング初期化、registry 候補生成
    convergence_role: 主に P_G, P_C, P_E を成立させる初期構造化を担う。redesignable slot と candidate route family の骨格候補を出力できる。 加えて、quantity kind / baseline family / comparator / sampling window の候補 binding を proposed 状態で出力できる。
  GraphLint:
    role: 意図抽出済み構造に対する G/C/E 検査、guard 正規化、registry issue 候補生成、H1/H2 候補生成、q_e と trace_path の出力
    convergence_role: 主に C_e(K) の前提となる P_G, P_C, P_E と EC1〜EC6 の検査を担い、H1/H2 の解除候補判定を再評価で返す。加えて guard_failure / guard_contradiction / incomparable_guard の切り分け trace を返す。 registry を参照して normalize と Comp_Λ を評価し、incomparable_guard を registry issue code へ写像する。
  DecisionLedger:
    role: V, R, decision_context, hold cases, approvals, decision outcomes, registry ratification の正本保持、adjudication case と conflict chain routing の正本保持
    convergence_role: 主に P_V, P_R と GC2〜GC5 の記録・判定支援を担い、Q_g と Eval_g の候補判定、H3〜H6 の解除候補判定、decision outcome の正本保持を行う。加えて redesign packet、authority basis、same-frame manual redesign path の正本を保持する。 加えて、registry entry / conversion rule の ratification, activation, supersession の normative authority を持つ。 加えて、conflict_case / chain_id / precedence_edge / criticality_basis / authority_route を authoritative に保持する。
  GraphEngine:
    role: 状態遷移、参照整合、Hold イベント永続化、registry version 永続化、API、conflict chain lifecycle 永続化
    convergence_role: K_e, K_g, K_full と H を横断管理し、DecisionLedger や GraphLint の結果を統合して governance_state / hold 状態遷移を履歴イベントとして確定記録する。加えて redesign requested / redesign approved / redesign rejected / escalation forced の履歴を永続化する。 加えて、registry version と usage trace の persistence owner として supersession と参照整合を管理する。 加えて、conflict_opened / head_activated / ratified / reflected / escalated / cleared / head_shifted の履歴を永続化する。
self_evaluation_audit_log_retention_model:
  status: provisional_fixed
  statement: self_evaluation_audit_log_retention_model は、semantic delta class・hidden coupling・prior reset・burst taxonomy・override judgement の自己評価を、再監査・再較正できる最小 event schema、detail tier、retention bucket、tool 別正本責務として形式化するモデルである。
  objects:
    audit_event: a=(id, fam, subj, prof, ctx, facet, pol, cap, wit, out, br, auth, par, t)
  vocabularies:
    event_family:
    - registry_snapshot
    - evaluation_run
    - witness_binding
    - override_review
    - branch_transition
    - recalibration_feedback
    detail_tier:
    - full_witness
    - summary_with_repro_capsule
    - archive_digest
    - purge_eligible_digest
    retention_bucket:
    - normative_permanent
    - audit_long
    - audit_medium
    - summary_short
  helper_predicates:
    protected_touch: Prot(a)=true iff facet(a) ∩ protected_facet_set(ctx(a)) ≠ ∅
    override_event: Ovrd(a)=true iff fam(a)=override_review or out(a) includes override / veto / release / reject / delegated_auto_reenable
    final_outcome: Final(a)=true iff out(a) includes final confirm / final release / final reject / confirmed leak / confirmed drift / severe penalty
    material_or_unresolved: MatUnres(a)=true iff out(a).semantic_delta_class ∈ {material, unresolved}
    hard_coupling_or_unresolved_relation: HardCpl(a)=true iff out(a).coupling_strength=hard_shared or out(a).relation_kind=unresolved
    reset_related: Reset(a)=true iff br(a) includes prior_reset / calibration_reset / rollback / revoke
    adverse_burst: AdvBurst(a)=true iff out(a).burst_taxonomy ∈ {ambiguous_sparse_burst, flooding_suspect, attack_like_flooding_confirmed}
    benign_scoped: Benign(a)=true iff ¬Prot(a) ∧ ¬Ovrd(a) ∧ ¬MatUnres(a) ∧ ¬Reset(a) ∧ br(a) ∈ {no_state_change, scoped_internal_review}
    legal_hold: LHold(a)=true iff auth(a) includes legal_hold or postmortem_hold or active_investigation_hold
    repro_capsule_ready: ReproOK(a)=true iff cap(a) is immutable replay capsule or wit(a) is a deterministic witness bundle with hash linkage
  canonical_minimum_fields:
  - event_id
  - event_family
  - event_time
  - tool_owner
  - subject_ref
  - profile
  - context_class
  - policy_bundle_ref
  - execution_capsule_ref
  - witness_ref_set
  - witness_hash_set
  - outcome_label
  - branch_effect
  - actor_or_authority_ref
  - retention_bucket
  - parent_event_ref_set
  detail_tier_assignment:
    full_witness:
      predicate: FullReq(a)=true iff Prot(a) ∨ Ovrd(a) ∨ Final(a) ∨ MatUnres(a) ∨ HardCpl(a) ∨ Reset(a) ∨ AdvBurst(a)
    summary_with_repro_capsule:
      predicate: SumCap(a)=true iff ¬FullReq(a) ∧ Benign(a) ∧ ReproOK(a)
    archive_digest:
      predicate: ArchReq(a)=true iff [Final(a) ∨ Ovrd(a) ∨ threshold_review_relevant(a) ∨ postmortem_relevant(a)] and case_closed(a)=true
    purge_eligible_digest:
      predicate: PurgeOK(a)=true iff SumCap(a) ∧ non_normative(a)=true ∧ CanonMinFixed(a)=true ∧ LHold(a)=false
  bucket_assignment_rules:
    normative_permanent:
      predicate: RetBucket(a)=normative_permanent iff Final(a) ∨ Ovrd(a) ∨ registry_ratification(a)=true ∨ LHold(a)=true
    audit_long:
      predicate: RetBucket(a)=audit_long iff RetBucket(a)≠normative_permanent and [Prot(a) ∨ MatUnres(a) ∨ HardCpl(a) ∨ Reset(a) ∨ AdvBurst(a)]
    audit_medium:
      predicate: RetBucket(a)=audit_medium iff RetBucket(a)∉{normative_permanent,audit_long} and [threshold_review_relevant(a) ∨ replay_comparison_relevant(a) ∨ bounded_change(a)=true]
    summary_short:
      predicate: RetBucket(a)=summary_short iff RetBucket(a)∉{normative_permanent,audit_long,audit_medium}
  retention_table:
    normative_permanent:
      full_witness_hot: permanent
      archive_retention: permanent
      purge_rule: never
    audit_long:
      regulated:
        full_witness_hot: 365d
        archive_retention: 7y
      engineering_tradeoff:
        full_witness_hot: 180d
        archive_retention: 3y
      organizational_or_social:
        full_witness_hot: 90d
        archive_retention: 2y
    audit_medium:
      regulated:
        full_witness_hot: 180d
        archive_retention: 3y
      engineering_tradeoff:
        full_witness_hot: 90d
        archive_retention: 1y
      organizational_or_social:
        full_witness_hot: 30d
        archive_retention: 180d
    summary_short:
      regulated:
        full_witness_hot: 30d
        archive_retention: 1y
      engineering_tradeoff:
        full_witness_hot: 14d
        archive_retention: 180d
      organizational_or_social:
        full_witness_hot: 7d
        archive_retention: 90d
  context_override_rules:
    tighten_only_contexts:
    - external_irreversible
    - policy_sensitive
    - public_exposure
    - safety_critical
    shortening_admissible_contexts:
    - sandbox_internal
    - branch_local_nonbinding
    - template_local_review
    rules:
    - tighten_only_contexts では bucket を短縮してはならない
    - shortening_admissible_contexts でも Prot(a)=false かつ Ovrd(a)=false の場合に限り 1 bucket だけ短縮できる
    - LHold(a)=true の event は retention / purge clock を停止する
  tool_projection:
    decision_ledger_store:
      predicate: Store_DL(a)=true iff fam(a) in {registry_snapshot, override_review} or Final(a)=true or LHold(a)=true
    graph_engine_store:
      predicate: Store_GE(a)=true iff fam(a) in {evaluation_run, branch_transition, recalibration_feedback} or retention timer is attached
    graphlint_store:
      predicate: Store_GL(a)=true iff fam(a) in {evaluation_run, witness_binding} and diagnostic trace is derivable or replay-supporting
  invariants:
  - PurgeOK(a)=true なら、RetBucket(a) ≠ normative_permanent かつ LHold(a)=false でなければならない。
  - Final(a)=true または Ovrd(a)=true の event を summary_short へ落としてはならない。
  - Prot(a)=true かつ [MatUnres(a) ∨ Reset(a)] の event は少なくとも audit_long でなければならない。
  - branch_effect を変える event が GraphLint にしか存在しない状態を許してはならない。branch_effect が非自明なら GraphEngine または DecisionLedger に linked event が必要である。
  residual_open_points:
  - bridge packet の cryptographic shape をどこまで formal parameter 化するか
  - execution capsule binary と manifest/hash の canonical archive object 境界
  - duplicate_discard_digest の multiset root hash primitive / collision witness / compression 境界をどこまで formal parameter 化するか
identity_redaction_accountability_model:
  status: provisional_fixed
  statement: identity_redaction_accountability_model は、reviewer / operator の identity surface を層化し、場面別の最小可視層、lawful reopen 条件、tool ごとの保存責務を形式化する。
  primitives:
    actor_surface: σ = (actor_key, display_identity, stable_pseudonym, team_or_forum_label_set, authority_binding_ref_set, accountability_binding_ref_set, reopen_key_ref, pseudonym_scope, epoch_id, visibility_class)
    identity_layers: L_id = {display_identity, stable_pseudonym, team_or_forum_label, authority_binding, accountability_binding, legal_hold_reopen_key}
    scenario: γ ∈ {routine_review, cadence_breach, penalty_review, review_accountability, incident_replay, security_escalation, external_audit}
    viewer_role: υ ∈ {operator_self, peer_reviewer, delegated_reviewer, forum_chair, domain_authority, central_authority, security_officer, legal_hold_custodian, external_auditor}
    visible_layers: View(γ,υ,σ) ⊆ L_id
    lower_layer_sufficiency: Suff(γ,σ)=true iff stable_pseudonym・authority_binding・accountability_binding と必要な lineage だけで当該 judgement を lawful に再構成できる
    reveal_predicate: Reveal(γ,υ,σ)=true iff lawful_purpose(γ) ∧ required_tier(υ,γ) ∧ active_reopen_basis(σ,γ) ∧ ¬Suff(γ,σ)
  minimum_visibility_rules:
    routine_review:
      required_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
    cadence_breach:
      required_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      conditional_layers:
      - accountability_binding
    penalty_review:
      required_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      additional_context:
      - tool_or_pipeline_lineage_ref
      - forum_chain_ref
    review_accountability:
      required_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
    incident_replay:
      required_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      - event_or_execution_lineage_ref
    security_escalation:
      required_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      - legal_hold_reopen_key
  invariants:
  - すべての normative event は stable_pseudonym、authority_binding_ref、accountability_binding_ref を持たなければならない。
  - display_identity は optional surface であり canonical actor key になってはならない。
  - stable_pseudonym は scope × epoch 内で一意でなければならず、rotation は lineage bridge を伴わなければならない。
  - legal_hold_reopen_key は通常 event body と別 custody に置き、visible layers から導出できてはならない。
  - cadence breach、penalty activation、review accountability の primary judgement は cleartext personal identity に依存してはならない。ただし Reveal 条件を満たす場合を除く。
  tool_projection:
    DecisionLedger:
      required_fields:
      - actor_pseudonym_ref
      - authority_binding_ref_set
      - accountability_binding_ref_set
      - reopen_authorization_basis_ref
      - legal_hold_state
    GraphEngine:
      required_fields:
      - runtime_actor_instance_ref
      - pseudonym_epoch_id
      - pseudonym_lineage_bridge_ref
      - session_or_run_ref
      - reopen_event_ref_set
    GraphLint:
      required_fields:
      - actor_class_ref
      - authority_tier_ref
      - forum_label_ref
      - redacted_trace_summary_ref
      forbidden_fields:
      - cleartext_identity
      - reopen_key_ref
    archive_object:
      required_fields:
      - pseudonymized_event_body_ref
      - sealed_identity_envelope_ref_or_pointer
      - reopen_policy_ref
      - access_audit_log_ref
  residual_open_points:
  - bridge packet の cryptographic shape をどこまで formal parameter 化するか
  - audit witness shard を HSM / append-only service / 人的 witness のどこまで hybrid parameter 化するか
  - export-local pseudonym の TTL / revocation と accountability lineage の保持をどう parameter 化するか
execution_capsule_archive_boundary_model:
  status: provisional_fixed
  statement: execution_capsule_archive_boundary_model は、execution capsule の archive core、retained blob、sealed identity envelope、pointer、replay / purge admissibility を形式化する。
  primitives:
    execution_capsule: ξ = (B, m, h, ε, Π, ρ)
    payload_blob: b_i = (blob_id, media_type, bytes_len, content_digest, serialization_profile, immutability_class, retention_pin)
    manifest: m = (capsule_id, event_family, payload_role_map, replay_class, canonicalization_profile, environment_descriptor_ref, policy_bundle_ref_set, lineage_ref_set, digest_binding_set, envelope_binding_ref)
    digest_chain: h = (manifest_digest, payload_digest_set, envelope_digest, pointer_target_digest_set, parent_archive_digest, hash_algorithm_set)
    sealed_identity_envelope: ε = (envelope_ref, envelope_digest, custody_ref, reopen_policy_ref, access_audit_ref)
    locator: π_j = (locator_ref, target_digest, immutability_class, retrieval_scope, expiry_class)
    replay_class: ρ ∈ {summary_only, analytical_replay, deterministic_replay, forensic_replay}
  predicates:
    core_archive_predicate: CoreArch(ξ)=true iff m と manifest_digest が存在し、digest_binding_set・policy_bundle_ref_set・lineage_ref_set・envelope_binding_ref が欠落していない。
    blob_binding_predicate: BlobBound(b_i,ξ)=true iff b_i.content_digest ∈ payload_digest_set(h) かつ b_i.serialization_profile が m に適合し、immutability_class が mutable_alias でない。
    pointer_binding_predicate: PtrBound(π_j,ξ)=true iff π_j.target_digest ∈ pointer_target_digest_set(h) かつ π_j.immutability_class ∈ {immutable_pinned, immutable_snapshot}。
    replay_requirement_predicate: ReplayReq(ρ,b_i)=true iff ρ ∈ {deterministic_replay, forensic_replay} であり、b_i が payload_role_map 上 required role を持つ。
    replay_admissibility: ReplayOK(ξ)=true iff CoreArch(ξ)=true かつ ρ=summary_only なら summary artifact が存在し、ρ=analytical_replay なら required normalized artifact または reproducibility capsule が存在し、ρ∈{deterministic_replay, forensic_replay} ならすべての required blob について BlobBound(b_i,ξ)=true かつ environment_descriptor_ref が固定されている。
    reopen_admissibility: ReopenOK(ξ)=true iff CoreArch(ξ)=true かつ envelope_digest が存在し、lawful reopen basis と custody proof が active である。
    purge_blob_predicate: PurgeBlobOK(b_i,ξ)=true iff CoreArch(ξ)=true かつ ReplayReq(ρ,b_i)=false かつ legal_hold_active=false かつ retained capsule だけで ReplayOK(ξ) が維持される。
  invariants:
  - CoreArch(ξ)=false の capsule を archive completed とみなしてはならない。
  - PtrBound(π_j,ξ)=false の locator は canonical evidence にならない。
  - ρ ∈ {deterministic_replay, forensic_replay} のとき、required blob が purge された capsule に ReplayOK(ξ)=true を与えてはならない。
  - envelope_digest を持たない pseudonymized body に reopen admissibility を与えてはならない。
  - manifest を現行 toolchain から再生成して archived manifest の代用にしてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - capsule_id
      - replay_class
      - policy_bundle_ref_set
      - lineage_ref_set
      - purge_admissibility_state
      - legal_hold_basis_ref
    GraphEngine:
      required_fields:
      - runtime_capsule_production_ref
      - environment_descriptor_ref
      - blob_pin_state_set
      - replay_request_ref_set
      - replay_result_ref_set
    archive_object:
      required_fields:
      - manifest_digest
      - digest_binding_set
      - pseudonymized_event_body_ref
      - sealed_identity_envelope_ref_or_digest
      - purge_or_reopen_audit_ref
    external_blob_store:
      required_fields:
      - content_address
      - immutability_class
      - retention_pin_state
      - retrieve_access_audit_ref
      forbidden_states:
      - manifest binding を持たない孤立 blob
      - mutable latest alias のみで到達可能な replay_required_blob
  residual_open_points:
  - emergency bypass で materialize した temporary export を archive boundary の外でどう TTL 管理するか
  - duplicate_discard_digest の multiset root hash primitive / collision witness / compression 境界をどこまで formal parameter 化するか
raw_signal_retention_model:
  status: provisional_fixed
  statement: raw_signal_retention_model は、cluster de-dup 後に detector family / claim facet / sink class / replay class ごとに保持すべき minimum retained raw unit を形式化し、confirm・penalty・incident replay・purge admissibility を接続する。
  primitives:
    detector_family: δ ∈ {local_convention_detected, confirmed_policy_drift, suspected_leak, bias_penalty, flooding_penalty, replay_penalty}
    claim_facet: φ ∈ {effect_realization, direct_reach_confirmed, route_identity, recipient_identity, owner_binding_or_declared_intent, protected_facet_mismatch, sink_typing_positive_escalation}
    sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
    replay_class: ρ ∈ {summary_only, analytical_replay, deterministic_replay, forensic_replay}
    retained_artifact: α ∈ {cluster_representative, duplicate_discard_digest, burst_evidence_packet, abuse_anchor_packet, replay_support_blob}
    cluster: χ = (cluster_id, hypothesis_key, detector_family_ref, claim_facet_ref, sink_class_ref, representative_signal_ref, duplicate_digest_ref, burst_packet_ref, abuse_anchor_ref, replay_blob_ref, archive_bucket_ref, legal_hold_state)
  auxiliary_predicates: StrictSink(κ)=true iff κ ∈ {authoritative_state, public_or_external_commitment, irreversible_resource_lock} LeakCore(φ)=true iff φ ∈ {effect_realization, direct_reach_confirmed, route_identity, recipient_identity} ProtectedFacet(φ)=true iff φ = protected_facet_mismatch Rep(χ)=true iff representative_signal_ref が digest-bound raw slice または normalized snapshot とともに保持される Dup(χ)=true iff duplicate_digest_ref が member cardinality・discard_reason_set・multiset root を保持する Burst(χ)=true iff burst_packet_ref が cadence registry cell・window counts・lag/backlog snapshot を保持する Anch(χ)=true iff abuse_anchor_ref が anchor_kind・anchor_digest_set・actor_or_route_binding を保持する RBlob(χ)=true iff replay_blob_ref が blob_digest・serialization_profile・environment_descriptor_ref・replay_class を保持する
  family_minimum_predicates:
    local_convention_detected: MinRet(δ,φ,κ,χ)=true iff δ=local_convention_detected ∧ Rep(χ) ∧ ((StrictSink(κ) ∨ ProtectedFacet(φ)) → Dup(χ)) ∧ ((ProtectedFacet(φ) ∨ ρ∈{deterministic_replay, forensic_replay}) → RBlob(χ))
    confirmed_policy_drift: MinRet(δ,φ,κ,χ)=true iff δ=confirmed_policy_drift ∧ Rep(χ) ∧ BasisPair(χ)=true ∧ ((ProtectedFacet(φ) ∨ StrictSink(κ)) → RBlob(χ)) ∧ (SeverityUsesClusterCardinality(χ)=true → Dup(χ))
    suspected_leak: MinRet(δ,φ,κ,χ)=true iff δ=suspected_leak ∧ Rep(χ) ∧ RouteOrRecipientEvidence(χ)=true ∧ EffectEvidence(χ)=true ∧ (ExposureEpisodeMerged(χ)=true → Dup(χ)) ∧ ((LeakCore(φ) ∧ κ∈{public_or_external_commitment, irreversible_resource_lock}) → RBlob(χ))
    bias_penalty: MinRet(δ,φ,κ,χ)=true iff δ=bias_penalty ∧ Rep(χ) ∧ Dup(χ) ∧ ActorConcentrationEvidence(χ)=true ∧ (FinalPenalty(χ) =true → Anch(χ))
    flooding_penalty: MinRet(δ,φ,κ,χ)=true iff δ=flooding_penalty ∧ Rep(χ) ∧ Dup(χ) ∧ Burst(χ) ∧ (DirectAbuseConfirm(χ)=true → Anch(χ))
    replay_penalty: MinRet(δ,φ,κ,χ)=true iff δ=replay_penalty ∧ Rep(χ) ∧ Dup(χ) ∧ ReplayLineageEvidence(χ)=true ∧ ((ProtectedFacet(φ) ∨ ρ∈{deterministic_replay, forensic_replay}) → RBlob(χ)) ∧ (IntentionalReuseConfirm(χ)=true → Anch(χ))
  replay_and_purge_predicates:
    canonical_evidence_predicate: CanonEv(χ)=true iff MinRet(δ,φ,κ,χ)=true
    confirm_admissibility: ConfirmOK(χ)=true iff CanonEv(χ)=true かつ detector-family-specific confirm rule が別途満たされる
    penalty_admissibility: PenOK(χ)=true iff CanonEv(χ)=true かつ penalty fairness review に必要な actor/route lineage が失われていない
    purge_admissibility: PurgeOK(χ)=true iff CanonEv(χ)=true を壊さず、legal_hold_state=inactive かつ archive_bucket が raw purge を許し、ρ に応じた replay requirement を retained artifact 側で満たす
  invariants:
  - MinRet(δ,φ,κ,χ)=false の cluster を confirm / penalty / incident replay の canonical evidence に数えてはならない。
  - flooding_penalty または replay_penalty で Dup(χ)=false の cluster に count-inflation / concealment judgement を与えてはならない。
  - suspected_leak で RouteOrRecipientEvidence(χ)=false または EffectEvidence(χ)=false の cluster を confirmed leak へ進めてはならない。
  - ρ ∈ {deterministic_replay, forensic_replay} なのに RBlob(χ)=false である cluster に replay admissibility を与えてはならない。
  - PurgeOK(χ)=true により MinRet(δ,φ,κ,χ) が事後的に false になる purge を許してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - retention_family_rule_ref
      - cluster_id
      - claim_facet_ref
      - sink_class_ref
      - replay_class
      - archive_bucket_ref
      - purge_admissibility_state
      - confirm_or_penalty_usage_ref
    GraphEngine:
      required_fields:
      - representative_signal_ref
      - duplicate_digest_ref
      - burst_packet_ref
      - abuse_anchor_ref
      - replay_blob_ref
      - blob_pin_or_unpin_event
      - purge_execution_event
  residual_open_points:
  - duplicate_discard_digest の multiset root hash primitive / collision witness / compression 境界をどこまで formal parameter 化するか
legal_hold_reopen_custody_model:
  status: provisional_fixed
  statement: legal_hold_reopen_custody_model は、sealed identity envelope の reopen を lane-based quorum、access audit 先行固定、retention timer 停止、provisional emergency bypass と authority post-confirm の二段階で形式化する。
  primitives:
    reopen_scenario: γ ∈ {normal_reopen, incident_replay, external_audit, security_escalation}
    custody_lane: λ ∈ {authority_lane, custody_lane, security_lane, audit_notary_lane}
    actor_class: α ∈ {delegated_reviewer, domain_authority, central_authority, legal_hold_custodian, security_officer, audit_notary, external_auditor}
    shard_class: ω ∈ {authorization_shard, custody_release_shard, security_override_shard, audit_witness_shard}
    holder: h_i = (actor_id, actor_class, lane, shard_class, independence_group, active_scope_ref)
    reopen_basis: β = (purpose_tag, scenario, tenant_scope, domain_scope, legal_hold_state, investigation_state, audit_charter_ref, protected_facet_flag, cross_system_join_flag)
    access_session: s = (session_id, envelope_ref, basis_ref, reveal_scope, audit_anchor_ref, timer_pause_ref_set, ttl, post_confirm_due, reseal_state)
    required_lane_vector: Req(γ,β) は scenario と basis に応じた lane ごとの最小 required count を返す
  predicates:
    eligibility_predicate: Elig(h_i,γ,β)=true iff h_i.actor_class / lane / shard_class が scenario γ と basis β に対して許可されている。
    independence_predicate: Indep(h_i,h_j)=true iff h_i.independence_group ≠ h_j.independence_group。
    lane_count: Cnt(λ,H)=|{h_i∈H | h_i.lane=λ}|
    authority_tier_requirement: AuthTier(β)=central_authority iff cross_domain_or_cross_tenant(β)=true or external_global_audit(β)=true; otherwise domain_authority。
    quorum_predicate: Qrm(γ,H,β)=true iff 各 required lane λ について Cnt(λ,H) が Req(γ,β)[λ] 以上であり、採用された holder 群が pairwise independent である。
    normal_quorum: Req(normal_reopen,β)={authority_lane:1,custody_lane:1,audit_notary_lane:1}。
    incident_quorum: Req(incident_replay,β)={authority_lane:1,custody_lane:1,audit_notary_lane:1} に加え、β.protected_facet_flag=true または β.cross_system_join_flag=true または compromise_suspected=true のとき security_lane:1 を追加する。
    external_audit_quorum: Req(external_audit,β)={authority_lane:1,custody_lane:1,audit_notary_lane:1} かつ AuthTier(β)=central_authority を既定とし、domain_local_charter(β)=true のときだけ domain_authority を許す。
    security_provisional_quorum: Req(security_escalation,β) の provisional phase は {security_lane:1,custody_lane:1,audit_notary_lane:1}。
    audit_anchor_predicate: AuditReady(s)=true iff append-only access audit anchor が key materialization より前に存在する。
    timer_pause_requirement: TimerPauseReq(γ,β)=true iff γ∈{external_audit,security_escalation} or β.legal_hold_state=active or β.investigation_state=active。
    timer_pause_predicate: TimerPaused(s,β)=true iff TimerPauseReq(γ,β)=false or envelope と required replay blob の retention timer が pause 済みである。
    grant_predicate: Grant(γ,H,β,s)=true iff Qrm(γ,H,β) ∧ AuditReady(s) ∧ TimerPaused(s,β) ∧ reveal_scope(s) が basis β の minimum necessary slice に収まる。
    post_confirm_predicate: PostConfOK(s)=true iff γ=security_escalation のとき authority_lane の holder による confirm が post_confirm_due 以前に記録される。
    final_reopen_predicate: FinalOpen(γ,H,β,s)=true iff Grant(γ,H,β,s)=true かつ γ≠security_escalation ならそのまま、γ=security_escalation なら PostConfOK(s)=true。
  invariants:
  - delegated_reviewer を authority_lane / custody_lane / security_lane の quorum 充足者に数えてはならない。
  - 同一 independence_group を同一 session の複数 required lane に重複計上してはならない。
  - AuditReady(s)=false の session に key materialization を与えてはならない。
  - external_auditor を Qrm の構成員に入れてはならない。
  - security_escalation の provisional open を final evidence / penalty finalization / public explanation に直結させてはならない。
  - decrypted envelope output を canonical archive object に格上げしてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - reopen_basis_ref
      - lane_quorum_policy_ref
      - authority_tier_requirement
      - legal_hold_or_investigation_state
      - allowed_reveal_scope
      - post_confirm_due
    GraphEngine:
      required_fields:
      - access_session_id
      - audit_anchor_ref
      - timer_pause_or_resume_event
      - key_materialization_event
      - reseal_event
      - derived_export_digest_ref
    archive_object:
      required_fields:
      - sealed_identity_envelope_ref_or_digest
      - reopen_policy_ref
      - access_audit_log_ref
      - derived_export_digest_ref
    GraphLint:
      forbidden_fields:
      - cleartext_identity
      - shard_material
      - long_lived_decrypt_output
  residual_open_points:
  - audit witness packet の vendor-neutral attestation / observer credential schema をどこまで model parameter 化するか
  - cross-jurisdiction external audit の authority taxonomy と central delegation charter をどこまで predicate 化するか
stable_pseudonym_continuity_model:
  status: provisional_fixed
  statement: stable_pseudonym_continuity_model は、stable pseudonym の canonical scope、epoch rotation、bridge token の cryptographic composition、export-local pseudonym の TTL / revocation / non-reuse を形式化し、identity redaction・legal reopen・archive replay・external digest の continuity 条件を束縛する形式モデルである。
  primitives:
    canonical_scope: s = (tenant_id, authority_family_id, accountability_domain_id)
    stable_pseudonym: π = (scope_ref, epoch_ref, pseudonym_commitment)
    bridge_kind: b ∈ {epoch_rotation, scope_transition, reopen_export_rebind}
    profile: γ ∈ {regulated_domain, engineering_tradeoff_domain, organizational_or_social_domain}
    sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
    recipient_class: r ∈ {internal_owner_or_same_scope_reviewer, domain_or_central_authority, external_auditor, external_commitment_recipient, emergency_response_principal}
    proof_profile: ψ ∈ {internal_ledger_only, authority_scoped_proof, external_audit_proof, emergency_bypass_proof}
    bridge_token: τ = (bridge_token_id, bridge_kind, predecessor_commitment, successor_commitment, canonical_scope_relation, lawful_purpose_ref, authorization_basis_ref, accountability_lineage_ref, recipient_class, validity_window, non_reuse_clause, revocation_handle, envelope_binding_digest, archive_manifest_digest_or_null, reopen_event_ref_or_null, duplicate_digest_ref_or_null, proof_profile_ref, issuance_notary_ref, hsm_seal_ref, derived_proof_ref_or_null)
    export_binding: χ = (source_pseudonym_ref, export_pseudonym_ref, recipient_class, export_purpose_ref, retention_bucket, export_bundle_id, reopen_event_ref_or_null, bridge_token_ref)
    continuity_predicate: Cont(π_i, π_j, β_chain)=true iff there exists an admissible bridge chain from π_i to π_j
    visible_equivalence: VisEq(π_i, π_j, r)=true iff recipient class r is allowed to treat π_i and π_j as the same visible actor
  canonical_scope_rules:
    root_scope_predicate: RootScope(s)=true iff s is keyed by tenant_id, authority_family_id, accountability_domain_id
    projection_rule:
    - forum_surface, tool_surface, archive_surface は local reference を持ちうるが independent root scope を作らない
    - same actor continuity の canonical judge は root scope 上でのみ行う
  epoch_rules:
    admissible_same_epoch_changes:
    - forum membership update
    - tool migration
    - archive relocation
    - display label change
    rotation_trigger_predicate: RotTrig(x)=true iff x changes authority_binding or accountability_domain or raises reidentification_risk or changes lawful_partition
    invariants:
    - π is unique within (scope_ref, epoch_ref)
    - ¬RotTrig(x) alone では epoch を更新してはならない
    - RotTrig(x)=true で successor を発行する場合は少なくとも1つの bridge token を要する
  bridge_rules:
    epoch_rotation:
      predicate: Bridge_epoch(τ)=true iff bridge_kind=epoch_rotation ∧ predecessor.scope = successor.scope ∧ predecessor.epoch ≠ successor.epoch
    scope_transition:
      predicate: Bridge_scope(τ)=true iff bridge_kind=scope_transition ∧ same tenant ∧ ratified authority/accountability transition ∧ lawful purpose present
    reopen_export_rebind:
      predicate: Bridge_export(τ)=true iff bridge_kind=reopen_export_rebind ∧ successor is export-local pseudonym ∧ non_reuse_clause=true
    invariants:
    - cross-tenant successor を lawful continuity bridge で直接結んではならない
    - τ は cleartext identity を含んではならない
    - τ だけで transitive closure 全体を recipient-visible にしてはならない
    - scope_transition と reopen_export_rebind は reusable join key を生成してはならない
  cryptographic_composition:
    seal_predicate: SealOK(τ)=true iff hsm_seal_ref signs the canonical commitment of bridge_token fields and binds issuance authority + envelope_binding_digest
    notarization_predicate: NoteOK(τ)=true iff issuance_notary_ref is append-only and records issue / supersede / revoke / expire events for bridge_token_id
    proof_requirement: ProofReq(τ,κ,r)=true iff r∈{external_auditor,external_commitment_recipient,emergency_response_principal} or κ∈{public_or_external_commitment,irreversible_resource_lock} or recipient lacks lawful reopen path
    proof_predicate: ProofOK(τ,κ,r)=true iff ProofReq(τ,κ,r)=false or derived_proof_ref_or_null proves recipient-scoped commitment, reveal cap, validity window, and no source stable pseudonym disclosure
    token_validity: TokOK(τ,κ,r)=true iff SealOK(τ) ∧ NoteOK(τ) ∧ ProofOK(τ,κ,r) ∧ validity_window active ∧ revocation_handle not revoked
    invariants:
    - SealOK(τ)=false または NoteOK(τ)=false の token を continuity witness に使ってはならない
    - ProofReq(τ,κ,r)=true なのに ProofOK(τ,κ,r)=false の token を external digest / external audit / emergency bypass export に使ってはならない
    - append-only notarization を欠く token を archive replay linkage の canonical basis にしてはならない
  continuity_rules:
    internal_continuity:
      predicate: IntCont(π_i,π_j)=true iff Cont(π_i,π_j,β_chain)=true and all bridge tokens in chain satisfy TokOK under internal_authority context
    visible_continuity:
      predicate: VisEq(π_i,π_j,r)=true iff IntCont(π_i,π_j)=true and same canonical scope and recipient class r is authorized
    cut_conditions:
    - cross-tenant
    - public_or_external_commitment recipient
    - external_auditor recipient
    - compromise quarantine active
  export_local_pseudonym_rules:
    issuance_binding: IssueBind(χ)=true iff χ binds exactly one tuple (source_pseudonym_ref, recipient_class, export_purpose_ref, retention_bucket, export_bundle_id, reopen_event_ref_or_null)
    ttl_table:
      engineering_tradeoff_domain:
        owner_bound_internal: 30d
        bounded_internal_shared: 7d
        authoritative_state: 72h
        public_or_external_commitment: 24h
        irreversible_resource_lock: 8h
      organizational_or_social_domain:
        owner_bound_internal: 14d
        bounded_internal_shared: 72h
        authoritative_state: 48h
        public_or_external_commitment: 12h
        irreversible_resource_lock: 4h
      regulated_domain:
        owner_bound_internal: 7d
        bounded_internal_shared: 24h
        authoritative_state: 24h
        public_or_external_commitment: 8h
        irreversible_resource_lock: 1h
    recipient_caps:
      internal_owner_or_same_scope_reviewer: none
      domain_or_central_authority: 72h
      external_auditor: 24h
      external_commitment_recipient: 8h
      emergency_response_principal: 1h
    effective_ttl:
      predicate: TTL_eff(χ,γ,κ,r)=min(TTL_table[γ][κ], recipient_cap[r], remaining_reopen_window(χ), active_post_confirm_due(χ))
    revocation_predicates:
      expiry: Expire(χ)=true iff now > TTL_eff(χ,γ,κ,r)
      basis_loss: BasisLost(χ)=true iff lawful purpose or authorization basis becomes inactive
      bridge_loss: BridgeLost(χ)=true iff bridge token is superseded or revoked or legal-hold reseal closes the reopen path
      misuse: Misuse(χ)=true iff recipient mismatch or export_bundle_id deviation or non_reuse_clause violation is observed
      quarantine: Quar(χ)=true iff compromise / leak / routing anomaly forces containment
      effective_revocation: Rev(χ)=true iff Expire(χ) or BasisLost(χ) or BridgeLost(χ) or Misuse(χ) or Quar(χ)
    invariants:
    - IssueBind(χ)=false の export-local pseudonym を lawful continuity alias に使ってはならない
    - Rev(χ)=true の pseudonym を replay continuation や追補 export のために再活性化してはならない
    - external recipient visible field は export_pseudonym_ref を参照し、source_pseudonym_ref を直接出してはならない
    - export-local pseudonym の purge / revoke は accountability_lineage_ref と bridge token tombstone を消してはならない
  connection_predicates:
    duplicate_digest_binding: DigBridgeOK(τ,Δ)=true iff duplicate_digest_ref_or_null points to Δ and external digest lineage uses export-local pseudonym or redacted lineage slice, never source stable pseudonym
    archive_replay_binding: ArchBridgeOK(τ,α)=true iff archive_manifest_digest_or_null binds α and external replay requires ProofReq(τ,κ,r)=true → ProofOK(τ,κ,r)=true
    legal_hold_reopen_binding: ReopenBridgeOK(τ,ρ)=true iff reopen_event_ref_or_null points to lawful lane-based reopen event ρ with active envelope binding and reseal not yet completed
    emergency_bypass_binding: EmergBridgeOK(τ)=true iff proof_profile_ref indicates provisional bounded reveal and token is barred from final evidence / public explanation / penalty usage before post-confirm
  tool_projection:
    DecisionLedger:
      required_fields:
      - actor_pseudonym_ref
      - pseudonym_scope_ref
      - pseudonym_epoch_id
      - bridge_token_ref_set
      - proof_profile_ref
      - accountability_lineage_ref
      - export_bundle_id_or_null
      - effective_ttl
      - revocation_state
    GraphEngine:
      required_fields:
      - runtime_actor_instance_ref
      - pseudonym_projection_surface
      - epoch_rotation_event_ref
      - export_rebind_event_ref
      - archive_manifest_digest_or_null
      - duplicate_digest_ref_or_null
    GraphLint:
      required_fields:
      - actor_pseudonym_ref
      - scope_class_ref
      - epoch_class_ref
      - bridge_kind_ref
      - proof_profile_ref
      - effective_ttl_class
      forbidden_fields:
      - cleartext_identity
      - reusable_join_key
    archive_object:
      required_fields:
      - source_pseudonym_ref
      - export_pseudonym_ref_or_null
      - bridge_token_digest
      - envelope_binding_ref
      - manifest_digest
  residual_open_points:
  - post-quantum migration を含む suite revision の dual-validity window と anti-downgrade rule をどこまで canonical parameter 化するか
  - merge / split transition bundle の predecessor/successor cardinality と export-local pseudonym 再発行条件をどこまで parameter 化するか
  - export-local pseudonym を伴う external digest の lineage slice をどこまで reversible にするか
duplicate_discard_digest_model:
  status: provisional_fixed
  statement: duplicate_discard_digest_model は、cluster de-dup 後に discard された member 群を root profile に束縛された count-sensitive multiset root と compression grade で要約し、confirm・penalty・replay・purge admissibility に必要な最小 summary binding を形式化する。
  primitives:
    detector_family: δ ∈ {local_convention_detected, confirmed_policy_drift, suspected_leak, bias_penalty, flooding_penalty, replay_penalty}
    claim_facet: φ ∈ {effect_realization, direct_reach_confirmed, route_identity, recipient_identity, owner_binding_or_declared_intent, protected_facet_mismatch, sink_typing_positive_escalation}
    sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
    replay_class: ρ ∈ {summary_only, analytical_replay, deterministic_replay, forensic_replay}
    recipient_class: r ∈ {internal_owner_or_same_scope_reviewer, domain_or_central_authority, external_auditor, external_commitment_recipient, emergency_response_principal}
    root_profile: π_h ∈ {compact_internal_v1, standard_canonical_v1, strict_external_v1}
    compression_grade: γ ∈ {lossless_canonical, bounded_loss_summary, coarse_internal_summary}
    member_projection: μ = (signal_digest, duplicate_reason_set, actor_lineage_slice, route_slice, recipient_slice, effect_slice, local_basis_slice, family_override_slice)
    collision_witness: ω = (root_profile_ref, schema_version_ref, serialization_fingerprint, multiplicity_commitment, partition_commitment_ref_or_null, migration_witness_ref_or_null)
    duplicate_digest: Δ = (cluster_id, detector_family_ref, claim_facet_ref, sink_class_ref, replay_class_ref, canonical_scope_ref, pseudonym_epoch_ref, generation_window_ref, member_projection_schema_ref, root_profile_ref, schema_version_ref, multiset_root, collision_witness_ref_or_null, compression_grade_ref, total_member_count, unique_signature_count, duplicate_reason_histogram, lineage_summary_ref, route_summary_ref, recipient_summary_ref, effect_summary_ref, representative_ref, retained_artifact_linkage_ref, bridge_token_proof_ref_or_null, archive_manifest_digest_or_null)
  canonical_projection_rules:
    common_projection_predicate: Proj_base(m)=true iff signal_digest、duplicate_reason_set、canonical_scope_ref、pseudonym_epoch_ref が member_projection_schema_ref に従って正規化される。
    family_override_predicates:
      local_convention_detected: Proj_loc(m)=true iff local_basis_slice と actor_lineage_slice が含まれる。
      confirmed_policy_drift: Proj_drift(m)=true iff basis_pair_slice と effective_use_path_slice が含まれる。
      suspected_leak: Proj_leak(m)=true iff route_slice と recipient_slice と effect_slice の required subset が含まれる。
      bias_penalty: Proj_bias(m)=true iff actor_lineage_slice と operator_or_reviewer_split_slice が含まれる。
      flooding_penalty: Proj_flood(m)=true iff cadence_window_slice と burst_shape_slice が含まれる。
      replay_penalty: Proj_replay(m)=true iff replay_lineage_slice と reused_artifact_relation_slice が含まれる。
    effective_projection_rule: Proj(m,δ,φ,κ,ρ)=Proj_base(m) ∧ required family override ∧ sink/replay strictness に応じた追加 slice を含む。
  multiset_root_rules:
    notation:
      member_signature: σ(m)=H_{π_h}(Proj(m,δ,φ,κ,ρ))
      canonical_multiset: Mχ={(σ_i,n_i)}
      multiset_root: Root_{π_h}(χ)=MH_{π_h}(Mχ)
    invariants:
    - permutation_invariant: 同一 Mχ なら member 順序が変わっても Root_{π_h}(χ) は不変である。
    - count_sensitive: n_i が変われば Root_{π_h}(χ) も変わらなければならない。
    - profile_bound: root_profile_ref が違う digest を migration witness なしに同一 Root 比較へ使ってはならない。
    - schema_bound: schema_version_ref が違う digest を同一 Root 比較へ使ってはならない。
    - scope_epoch_bound: canonical_scope_ref または pseudonym_epoch_ref が違う member を同一 Mχ に混ぜてはならない。
    - representative_non_substitute: representative_ref 単体を Root_{π_h}(χ) の代替にしてはならない。
    root_profile_selection:
      strict_profile_rule: RootProf(δ,φ,κ,ρ,r)=strict_external_v1 iff κ∈{public_or_external_commitment, irreversible_resource_lock} または ρ∈{deterministic_replay, forensic_replay} または r∈{external_auditor, external_commitment_recipient, emergency_response_principal} または δ∈{suspected_leak, replay_penalty} または protected/external facet が active である。
      compact_internal_rule: RootProf(δ,φ,κ,ρ,r)=compact_internal_v1 iff κ∈{owner_bound_internal, bounded_internal_shared} ∧ ρ=summary_only ∧ r=internal_owner_or_same_scope_reviewer ∧ protected/external facet が active でない。
      default_rule: 上記以外の admissible case では RootProf(δ,φ,κ,ρ,r)=standard_canonical_v1 とする。
  collision_witness_rules:
    requirement: CollReq(δ,φ,κ,ρ,r)=true iff κ∈{public_or_external_commitment, irreversible_resource_lock} または ρ∈{deterministic_replay, forensic_replay} または r∈{external_auditor, external_commitment_recipient, emergency_response_principal} または δ∈{suspected_leak, replay_penalty} または protected facet が active である。
    admissibility: CollOK(Δ,δ,φ,κ,ρ,r)=true iff CollReq(δ,φ,κ,ρ,r)=false または collision_witness_ref_or_null が root_profile_ref・schema_version_ref・serialization_fingerprint・multiplicity_commitment・required partition commitment を束縛する。
  compression_boundary_rules:
    grade_rule: CompGrade(Δ)=compression_grade_ref
    lossless_requirement: LosslessReq(δ,φ,κ,ρ,r)=true iff κ∈{public_or_external_commitment, irreversible_resource_lock} または ρ∈{deterministic_replay, forensic_replay} または r∈{external_auditor, external_commitment_recipient, emergency_response_principal} または δ∈{suspected_leak, replay_penalty} または protected facet / authority path 差分が active である。
    bounded_loss_admissibility: BoundedOK(Δ,δ,φ,κ,ρ,r)=true iff compression_grade_ref=bounded_loss_summary ∧ ρ=analytical_replay ∧ r∈{internal_owner_or_same_scope_reviewer, domain_or_central_authority} ∧ κ∈{owner_bound_internal, bounded_internal_shared, authoritative_state} ∧ total_member_count と unique_signature_count が exact であり、duplicate_reason presence が保たれ、route / recipient / effect / lineage partition が protected facet / external commitment / authority path / export bundle / lawful purpose / retention bucket を跨いで融合しない。
    coarse_admissibility: CoarseOK(Δ,δ,φ,κ,ρ,r)=true iff compression_grade_ref=coarse_internal_summary ∧ ρ=summary_only ∧ κ∈{owner_bound_internal, bounded_internal_shared} ∧ r=internal_owner_or_same_scope_reviewer ∧ Δ が confirm / penalty / external digest に使われない。
    compression_validity: CompOK(Δ,δ,φ,κ,ρ,r)=true iff (LosslessReq(δ,φ,κ,ρ,r)=true → compression_grade_ref=lossless_canonical) ∧ (LosslessReq(δ,φ,κ,ρ,r)=false → (compression_grade_ref=lossless_canonical ∨ BoundedOK(Δ,δ,φ,κ,ρ,r) ∨ CoarseOK(Δ,δ,φ,κ,ρ,r))).
  summary_requirements:
    cardinality_summary: CardOK(Δ)=true iff total_member_count、unique_signature_count、duplicate_reason_histogram が束縛される。
    lineage_summary: LineageOK(Δ,δ)=true iff δ∈{confirmed_policy_drift,bias_penalty,replay_penalty,suspected_leak} のとき lineage_summary_ref があり、external digest では export-local pseudonym または redacted lineage slice を参照する。
    route_recipient_effect_summary: LeakSumOK(Δ,δ,φ,κ)=true iff δ=suspected_leak または φ∈{route_identity,recipient_identity,effect_realization} または κ∈{public_or_external_commitment,irreversible_resource_lock} のとき route_summary_ref / recipient_summary_ref / effect_summary_ref の required subset が束縛される。
    replay_summary: ReplaySumOK(Δ,ρ)=true iff ρ∈{deterministic_replay,forensic_replay} のとき retained_artifact_linkage_ref が replay-support blob へ到達する。
    external_linkage: ExtLinkOK(Δ)=true iff duplicate_digest が external digest / recipient-visible export に使われない、または export-local pseudonym / redacted lineage slice が single export bundle・single recipient class・single lawful purpose・single retention bucket に束縛され、bridge_token_proof_ref_or_null が ProofOK を満たす bridge token を指す。
    archive_linkage: ArchOK(Δ,ρ)=true iff ρ∈{deterministic_replay,forensic_replay} または external continuity に duplicate_digest を使うときは archive_manifest_digest_or_null が束縛される。
  admissibility_predicates:
    digest_validity: DigOK(Δ,δ,φ,κ,ρ,r)=true iff Root_{π_h}(χ) bound ∧ CardOK(Δ) ∧ CollOK(Δ,δ,φ,κ,ρ,r) ∧ CompOK(Δ,δ,φ,κ,ρ,r) ∧ LineageOK(Δ,δ) ∧ LeakSumOK(Δ,δ,φ,κ) ∧ ReplaySumOK(Δ,ρ) ∧ ExtLinkOK(Δ) ∧ ArchOK(Δ,ρ)
    confirm_admissibility: ConfirmDigestOK(Δ)=true iff DigOK(Δ,δ,φ,κ,ρ,r)=true かつ compression_grade_ref ≠ coarse_internal_summary かつ detector family ごとの confirm predicate が別途満たされる。
    penalty_admissibility: PenaltyDigestOK(Δ)=true iff DigOK(Δ,δ,φ,κ,ρ,r)=true かつ compression_grade_ref ∈ {lossless_canonical, bounded_loss_summary} かつ fairness review に必要な concentration / lineage summary が欠落していない。
    purge_admissibility: PurgeDigestOK(Δ)=true iff DigOK(Δ,δ,φ,κ,ρ,r)=true を壊さず、legal_hold inactive かつ raw purge 後も family minimum retained raw unit を digest + retained linkage で再構成できる。
  invariants:
  - DigOK(Δ,δ,φ,κ,ρ,r)=false の digest を confirm / penalty / replay の canonical evidence に使ってはならない。
  - suspected_leak で LeakSumOK(Δ,δ,φ,κ)=false の digest を confirmed leak へ進めてはならない。
  - bias_penalty / flooding_penalty / replay_penalty で CardOK(Δ)=false の digest に cluster-severity judgement を与えてはならない。
  - root_profile_ref または schema_version_ref が違う digest を migration witness なしに同一 comparability class へ入れてはならない。
  - external digest で source stable pseudonym を recipient-visible field に出してはならない。
  - PurgeDigestOK(Δ)=true により member_projection_schema_ref や duplicate_reason_histogram が失われる purge を許してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - duplicate_digest_ref
      - member_projection_schema_ref
      - root_profile_ref
      - schema_version_ref
      - multiset_root
      - collision_witness_ref_or_null
      - compression_grade_ref
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - lineage_summary_ref
      - route_summary_ref
      - recipient_summary_ref
      - effect_summary_ref
      - bridge_token_proof_ref_or_null
      - archive_manifest_digest_or_null
      - purge_admissibility_state
      - confirm_or_penalty_usage_ref
    GraphEngine:
      required_fields:
      - duplicate_digest_generation_event
      - representative_signal_ref
      - retained_artifact_linkage_ref
      - replay_support_blob_ref_or_null
      - export_rebind_event_ref_or_null
      - collision_witness_generation_ref_or_null
    GraphLint:
      required_fields:
      - duplicate_digest_ref
      - member_projection_schema_ref
      - root_profile_ref
      - schema_version_ref
      - multiset_root
      - compression_grade_ref
      - total_member_count
      - unique_signature_count
      forbidden_fields:
      - cleartext_identity
      - raw_reusable_join_key
  residual_open_points:
  - root_profile の version migration と dual-root coexistence window をどこまで canonical registry 化するか
  - merge / split transition bundle における lineage slice partition witness を audit witness charter とどう接続するか
root_profile_schema_version_dual_root_comparability_model:
  status: provisional_fixed
  statement: root_profile_schema_version_dual_root_comparability_model は、root_profile / schema_version migration 時の dual-root coexistence admissibility、comparison loss class、freeze boundary、comparability witness completeness、drift absence、rollback validity を parameter 化するモデルである。
  primitives:
    use_surface: υ ∈ {current_basis, history_verification, external_audit_disclosure, bridge_continuity, replay_benchmark}
    loss_class: λ ∈ {exact_equivalent, bounded_projection_loss, benchmark_only, non_comparable}
    window_class: ω ∈ {shadow_dual_current_internal_only, audit_and_bridge_only, history_only}
    root_profile: π ∈ RootProfileRef
    schema_version: σ ∈ SchemaVersionRef
    root_digest: d ∈ RootDigest
    dual_root_digest: d_pair = (predecessor_digest_set_or_digest, successor_digest_set_or_digest, pair_binding_rule_ref, subject_set_manifest_ref_or_digest)
    comparability_witness: W_c = (comparability_witness_id, predecessor_root_profile_ref, successor_root_profile_ref, predecessor_schema_version_ref, successor_schema_version_ref, canonicalization_rule_ref, projection_family_ref, comparison_objective_ref, comparison_loss_class_ref, admissible_use_surface_set, pre_arm_new_issuance_freeze_at, old_root_freeze_at, dual_root_window_class_ref, predecessor_root_digest_set_or_digest, successor_root_digest_set_or_digest, dual_root_digest_ref, benchmark_family_ref_or_null, benchmark_dataset_digest_or_null, bridge_token_proof_ref_or_null, drift_scan_digest_ref, rollback_policy_ref, archive_manifest_digest_ref)
    migration_state: μ_state ∈ {pre_arm_freeze, armed_shadow_validation, successor_primary_window, history_only, rollback_active}
    comparability_state: σ_cmp ∈ {valid, invalid, drift_detected, rollback_required}
  functions:
    use_surface_admissibility: SurfAdm(υ,λ)=conditional for (υ=current_basis, λ=exact_equivalent); =admissible for (υ=history_verification, λ∈{exact_equivalent,bounded_projection_loss,benchmark_only}) and conditional for λ=non_comparable only as history-only retention; =conditional for (υ=external_audit_disclosure, λ∈{exact_equivalent,bounded_projection_loss}); =conditional for (υ=bridge_continuity, λ∈{exact_equivalent,bounded_projection_loss}); =admissible for (υ=replay_benchmark, λ∈{exact_equivalent,bounded_projection_loss,benchmark_only}); otherwise forbidden
    new_issuance_freeze_validity: NewFreezeOK(W_c,t)=true iff before pre_arm_new_issuance_freeze_at no successor issuance exists, and between pre_arm_new_issuance_freeze_at and arm release no issuance claims successor current basis without canonicalization_rule_ref, projection_family_ref, rollback_policy_ref, and drift scan readiness
    old_root_freeze_validity: OldFreezeOK(W_c,t)=true iff after old_root_freeze_at no predecessor-only current_basis issuance exists and any predecessor reuse is confined to υ∈{history_verification, external_audit_disclosure, bridge_continuity, replay_benchmark} with SurfAdm not forbidden
    current_basis_validity: CurrOK(W_c,t)=true iff comparison_loss_class_ref=exact_equivalent, current_basis∈admissible_use_surface_set, successor is marked primary, paired dual_root_digest_ref is present, and predecessor digest is not used as sole current basis after old_root_freeze_at
    external_audit_validity: AuditOK(W_c,t)=true iff external_audit_disclosure∈admissible_use_surface_set, successor current primary digest is explicit, and (comparison_loss_class_ref=exact_equivalent or explicit loss disclosure annex exists)
    bridge_continuity_validity: BridgeOK(W_c,t)=true iff bridge_continuity∈admissible_use_surface_set, bridge_token_proof_ref_or_null not null, archive manifest linkage exists, and comparison_loss_class_ref∈{exact_equivalent,bounded_projection_loss}
    replay_benchmark_validity: BenchOK(W_c,t)=true iff replay_benchmark∈admissible_use_surface_set and benchmark_family_ref_or_null / benchmark_dataset_digest_or_null are present when comparison_loss_class_ref∈{bounded_projection_loss,benchmark_only}
    window_validity: WinOK(W_c,t)=true iff μ_state=armed_shadow_validation implies ω=shadow_dual_current_internal_only, μ_state=successor_primary_window implies ω∈{shadow_dual_current_internal_only,audit_and_bridge_only}, and μ_state=history_only implies ω=history_only
    drift_absence: DriftFree(W_c,t)=true iff no successor issuance lacks paired dual_root_digest during shadow current, no benchmark_only digest appears on current_basis / bridge_continuity / external_audit_disclosure, no non_comparable pair is used outside history_only, and no predecessor current reuse appears after old_root_freeze_at
    comparability_state_eval: CmpState(W_c,t)=valid iff NewFreezeOK(W_c,t) and OldFreezeOK(W_c,t) and WinOK(W_c,t) and DriftFree(W_c,t) and ((current_basis∈admissible_use_surface_set)->CurrOK(W_c,t)) and ((external_audit_disclosure∈admissible_use_surface_set)->AuditOK(W_c,t)) and ((bridge_continuity∈admissible_use_surface_set)->BridgeOK(W_c,t)) and ((replay_benchmark∈admissible_use_surface_set)->BenchOK(W_c,t)); =drift_detected iff not DriftFree(W_c,t); =rollback_required iff successor invalidation or benchmark / bridge correction is required; else invalid
    rollback_validity: RollbackOK(R,W_c,t)=true iff rollback references comparability_witness_id(W_c), explicitly invalidates affected successor digests, states predecessor re-enable scope and time window, updates bridge / benchmark linkage, and emits correction notice when external_audit_disclosure or bridge_continuity was active
  axioms:
  - root_profile_ref または schema_version_ref が異なる root digest は、comparability_witness なしに同一 current comparison class へ入れてはならない。
  - comparison_loss_class_ref=benchmark_only は current_basis / external_audit_disclosure / bridge_continuity に使ってはならない。
  - comparison_loss_class_ref=non_comparable は history_only retention へ直ちに落とし、migration success の証拠にしてはならない。
  - old_root_freeze_at 後の predecessor digest を sole current basis として扱ってはならない。
  - rollback は reverse witness なしに predecessor を silent re-enable してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - comparability_witness_id
      - predecessor_root_profile_ref
      - successor_root_profile_ref
      - predecessor_schema_version_ref
      - successor_schema_version_ref
      - comparison_loss_class_ref
      - admissible_use_surface_set
      - pre_arm_new_issuance_freeze_at
      - old_root_freeze_at
      - dual_root_window_class_ref
      - comparability_state
    GraphEngine:
      required_fields:
      - use_surface
      - issue_time
      - primary_root_profile_ref
      - primary_schema_version_ref
      - paired_dual_root_digest_ref_or_null
      - benchmark_family_ref_or_null
      - bridge_token_proof_ref_or_null
      - loss_class_ref
      - drift_scan_result
    GraphLint:
      checks:
      - cross_profile_or_schema_comparison_without_witness
      - successor_issuance_before_new_issuance_freeze_release
      - predecessor_current_reuse_after_old_root_freeze
      - bounded_projection_loss_used_as_current_basis
      - benchmark_only_used_for_bridge_or_external_audit_current_basis
      - non_comparable_pair_used_outside_history_only
      - rollback_without_reverse_comparability_witness
      - silent_dual_root_drift_detected
    archive_object:
      required_fields:
      - paired_dual_root_digest
      - loss_disclosure_annex_or_null
      - benchmark_dataset_digest_or_null
      - bridge_token_proof_ref_or_null
      - drift_scan_digest
      - rollback_manifest_digest_or_null
      - comparability_completion_witness_digest_or_null
  residual_open_points: []
bounded_loss_summary_registry_model:
  status: provisional_fixed
  statement: bounded_loss_summary_registry_model は、duplicate_discard_digest の bounded_loss_summary について、detector family / claim facet / sink class / replay class / recipient class / root profile ごとの exact preserved statistic、top-k cap、tail metric、lossless escalation 条件、silent summary drift predicate を parameter 化するモデルである。
  primitives:
    detector_family: δ ∈ {local_convention_detected, confirmed_policy_drift, suspected_leak, bias_penalty, flooding_penalty, replay_penalty}
    claim_facet_family: φ_f ∈ {local_convention_pattern, basis_or_policy_path, route_or_recipient_or_effect, actor_or_reviewer_fairness, cadence_or_burst, replay_or_lineage_relation}
    sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
    replay_class: ρ ∈ {summary_only, analytical_replay, deterministic_replay, forensic_replay}
    recipient_class: r ∈ {internal_owner_or_same_scope_reviewer, domain_or_central_authority, external_auditor, external_commitment_recipient, emergency_response_principal}
    root_profile: π_h ∈ {compact_internal_v1, standard_canonical_v1, strict_external_v1}
    cap_class: c ∈ {local_review, authority_review, lossless_only}
    statistic_family: σ_s ∈ {total_member_count, unique_signature_count, duplicate_reason_histogram, local_basis_bucket_count, basis_pair_bucket_count, effective_use_path_bucket_count, registry_binding_bucket_count, route_partition_count, recipient_partition_count, effect_bucket_count, reviewer_operator_split_matrix, registered_cadence_bucket_histogram, burst_shape_bucket_count, source_diversity_bucket_count, canonical_scope_partition_count, pseudonym_epoch_partition_count, export_bundle_partition_count, lawful_purpose_partition_count, retention_bucket_partition_count, omitted_tail_mass, omitted_bucket_count, max_omitted_bucket_mass, concentration_upper_bound}
    preservation_state: ψ ∈ {exact, exact_topk_with_exact_tail, lossless_only, forbidden}
    summary_registry_cell: R_b = (detector_family_ref, claim_facet_family_ref, sink_class_ref, replay_class_ref, recipient_class_ref, root_profile_ref, cap_class_ref, exact_stat_set, topk_cap_vector, hard_partition_axis_set, escalation_condition_set)
    bounded_summary: B = (summary_registry_cell_ref, summary_generation_rule_ref, exact_preserved_stat_digest, topk_value_table, omitted_tail_mass_by_dimension, omitted_bucket_count_by_dimension, max_omitted_bucket_mass_by_dimension, concentration_upper_bound_by_dimension, partition_guard_digest, drift_scan_basis_digest)
  functions:
    cap_class_selection: Cap(κ,ρ,r,π_h)=lossless_only iff ρ∈{deterministic_replay,forensic_replay} or r∈{external_auditor,external_commitment_recipient,emergency_response_principal} or κ∈{public_or_external_commitment,irreversible_resource_lock} or π_h=strict_external_v1; =authority_review iff π_h=standard_canonical_v1 or r=domain_or_central_authority or κ=authoritative_state; =local_review otherwise
    bounded_admissibility: BndAdm(δ,φ_f,κ,ρ,r,π_h)=true iff Cap(κ,ρ,r,π_h)≠lossless_only and δ∉{suspected_leak,replay_penalty} and no protected facet / authority path / external continuity escalation condition is active
    cell_resolution: Cell(δ,φ_f,κ,ρ,r,π_h)=the unique registry cell R_b selected by detector family first, then claim facet overlay, then the strictest cap class and escalation condition from sink/replay/recipient/root profile
    exact_stat_requirement: ExactReq(σ_s,R_b)=true iff σ_s∈exact_stat_set(R_b) or σ_s is a hard partition axis count or σ_s∈{omitted_tail_mass,omitted_bucket_count,max_omitted_bucket_mass} for a top-k dimension
    topk_cap: K(R_b,d)=the numeric cap assigned to dimension d by topk_cap_vector(R_b); K(local_review,local_basis)=8, K(authority_review,local_basis)=16, K(local_review,lineage)=4, K(authority_review,lineage)=8, and lossless_only has no truncation
    summary_trailer_validity: TrailOK(B,R_b)=true iff summary_registry_cell_ref(B)=id(R_b) and summary_generation_rule_ref is bound and each truncated dimension has exact omitted_tail_mass, omitted_bucket_count, max_omitted_bucket_mass, concentration_upper_bound, and partition_guard_digest covers every hard partition axis in R_b
    hard_partition_integrity: PartOK(B,R_b)=true iff no bucket in B merges members across protected_facet_partition, authority_path_partition, export_bundle_partition, lawful_purpose_partition, retention_bucket_partition, canonical_scope_partition, or pseudonym_epoch_partition required by R_b
    summary_validity: SumOK(B,Δ,δ,φ_f,κ,ρ,r,π_h)=true iff Cell(δ,φ_f,κ,ρ,r,π_h)=R_b and ((BndAdm(...)=false) -> compression_grade_ref(Δ)=lossless_canonical) and ((BndAdm(...)=true) -> compression_grade_ref(Δ)=bounded_loss_summary and TrailOK(B,R_b) and PartOK(B,R_b) and every σ_s with ExactReq(σ_s,R_b)=true is exact in B and every truncated dimension respects K(R_b,d))
    silent_summary_drift: Drift(B,t)=true iff recomputation under summary_generation_rule_ref changes exact_preserved_stat_digest, or any omitted_tail_mass / omitted_bucket_count / max_omitted_bucket_mass differs, or any hard partition merge appears, or the resolved cap class at time t is stricter than the archived cap_class_ref
    fairness_guard: FairOK(B)=true iff actor_or_reviewer_fairness overlay is active -> reviewer_operator_split_matrix is exact and omitted_tail_mass_actor_dimension, max_omitted_bucket_mass_actor_dimension, concentration_upper_bound_actor_dimension are exact
  axioms:
  - δ∈{suspected_leak,replay_penalty} なら compression_grade_ref=bounded_loss_summary を使ってはならない。
  - Cap(κ,ρ,r,π_h)=lossless_only の文脈では any top-k truncation を使ってはならない。
  - top-k dimension を持つ bounded summary は omitted_tail_mass と omitted_bucket_count と max_omitted_bucket_mass を exact に持たなければ無効である。
  - hard partition axis を跨いだ bucket merge がある bounded summary は無効である。
  - Drift(B,t)=true の bounded summary を fairness review / severity review / authoritative analytical review の basis に使ってはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - summary_registry_cell_ref
      - cap_class_ref
      - exact_preserved_stat_digest
      - compression_admissibility_state
      - lossless_escalation_reason_or_null
    GraphEngine:
      required_fields:
      - detector_family_ref
      - claim_facet_family_ref
      - sink_class_ref
      - replay_class_ref
      - recipient_class_ref
      - root_profile_ref
      - topk_value_table
      - omitted_tail_mass_by_dimension
      - partition_guard_digest
    GraphLint:
      checks:
      - bounded_used_in_lossless_only_context
      - bounded_used_for_suspected_leak_or_replay_penalty
      - missing_tail_metric_for_topk_dimension
      - hard_partition_merge_in_summary_bucket
      - cap_class_undershoot
      - silent_summary_drift_detected
      - fairness_tail_missing
    archive_object:
      required_fields:
      - summary_generation_rule_snapshot
      - tail_audit_sample_or_lossless_fallback_linkage
      - partition_guard_digest
      - drift_diff_report
      - recompute_basis_manifest
  residual_open_points: []
transition_bundle_lineage_partition_model:
  status: provisional_fixed
  statement: transition_bundle_lineage_partition_model は、merge / split / rebind を伴う transition bundle に対し、lineage slice partition witness、audit witness packet、charter binding、bridge continuity、notice / correction / rollback completeness を parameter 化するモデルである。
  primitives:
    partition_axis: α ∈ {tenant_partition, authority_path_partition, export_bundle_partition, lawful_purpose_partition, retention_bucket_partition, canonical_scope_partition, pseudonym_epoch_partition}
    bundle_class: β ∈ {one_to_many_split, many_to_one_merge, many_to_many_recomposition, rebind_without_cardinality_change, retire_or_tombstone}
    continuity_class: χ ∈ {internal_continuity_only, authority_crossing_continuity, export_continuity, reverse_rollback_continuity}
    duty_class: δ ∈ {lawful_continuity, reveal_notice_correction, rollback_reopen}
    partition_cell: c = (tenant_partition, authority_path_partition, export_bundle_partition, lawful_purpose_partition, retention_bucket_partition, canonical_scope_partition, pseudonym_epoch_partition)
    lineage_slice: λ = (partition_cell_ref, predecessor_lineage_digest_set_or_digest, successor_lineage_digest_set_or_digest, allocation_vector_ref, retired_flag, retire_reason_ref_or_null)
    lineage_partition_witness: W_p = (witness_id, bundle_class_ref, predecessor_cell_set_digest, successor_cell_set_digest, predecessor_coverage_vector, successor_provenance_vector, retired_slice_set_digest_or_null, forbidden_cross_partition_merge_flag, allocation_rule_ref, partition_invariant_digest, bridge_pair_candidate_digest_or_null)
    audit_witness_packet: W_a = (packet_id, transition_bundle_id, lineage_partition_witness_ref, continuity_class_ref, charter_binding_ref_or_null, predecessor_coverage_digest, successor_provenance_digest, duty_surface_digest, archive_manifest_digest_ref, validity_state)
    delegation_charter: C_d = (charter_id, authority_path_ref, allowed_bundle_class_set, protected_facet_guard, notice_duty_template_ref, correction_duty_template_ref, rollback_duty_template_ref, expiry_ref_or_null)
    bridge_token: B = (bridge_token_id, predecessor_successor_pair_digest, bridge_scope_ref, audience_class_ref, lawful_purpose_ref, expiry_or_freeze_ref, archive_manifest_digest_ref)
    transition_bundle: T = (transition_bundle_id, bundle_class_ref, transition_reason_ref, predecessor_bundle_member_set_digest, successor_bundle_member_set_digest, lineage_partition_witness_ref, audit_witness_packet_ref, delegation_charter_ref_or_null, bridge_token_digest_set_or_null, archive_manifest_digest_ref, notice_and_correction_plan_ref_or_null, reverse_bundle_linkage_ref_or_null, initiated_at, finalized_at_or_null)
    reverse_bundle: R = (reverse_bundle_id, forward_transition_bundle_ref, affected_partition_cell_set_digest, reverse_continuity_class_ref, correction_notice_plan_ref, archive_manifest_digest_ref)
    bundle_state: σ ∈ {prepared, attested, active, correction_pending, rollback_pending, reversed, retired}
  functions:
    hard_partition_preservation: HardPartOK(T)=true iff every lineage_slice λ referenced by W_p preserves equality of partition_cell on all α except when C_d explicitly admits rebind_without_cardinality_change on canonical_scope_partition or pseudonym_epoch_partition, and even then predecessor_successor_pair_digest is bound by B or W_a.
    predecessor_coverage_completeness: PredCoverOK(T)=true iff every predecessor slice in predecessor_bundle_member_set_digest appears exactly once in predecessor_coverage_vector as allocated, retired, or deferred_with_reason, and deferred_with_reason is forbidden at finalized state.
    successor_provenance_completeness: SuccProvOK(T)=true iff every successor slice in successor_bundle_member_set_digest has at least one predecessor provenance entry or an allowed creation_basis_ref in C_d; orphan successor slices are forbidden.
    audit_packet_validity: AuditPktOK(W_a,T)=true iff W_a.lineage_partition_witness_ref=W_p, predecessor_coverage_digest / successor_provenance_digest match W_p, archive_manifest_digest_ref matches T.archive_manifest_digest_ref, and validity_state=valid.
    charter_binding_validity: CharterBindOK(T)=true iff β∈C_d.allowed_bundle_class_set for delegated transitions, protected_facet_guard passes, and required duty templates for χ are present; otherwise only local non-crossing internal_continuity_only may proceed without C_d.
    bridge_token_admissibility: BridgeOK(T)=true iff every bridge token B binds only predecessor_successor_pair_digest already admitted by W_p, audience_class_ref and lawful_purpose_ref do not widen the partition cell, and B is never the sole witness for many_to_one_merge or many_to_many_recomposition admissibility.
    notice_correction_completeness: NoticeOK(T)=true iff notice_and_correction_plan_ref_or_null enumerates all recipient-visible affected partition cells, required recipient class, correction trigger, and completion evidence class required by C_d or χ; send_success alone is insufficient.
    rollback_reverse_validity: RollbackOK(T,R)=true iff R.forward_transition_bundle_ref=T, affected_partition_cell_set_digest ⊆ W_p.successor_cell_set_digest, reverse_continuity_class_ref is admitted for each affected cell, correction_notice_plan_ref is complete, and archive manifests for T and R are both immutable.
    reopen_admissibility: ReopenOK(T)=true iff retired or reversed cells carry reopen eligibility, lawful purpose, and authority path sufficient for correction or legal-hold recovery, without erasing T from archive.
  tool_projection:
    DecisionLedger:
      required_fields:
      - transition_bundle_id
      - bundle_class_ref
      - audit_witness_packet_ref
      - delegation_charter_ref_or_null
      - notice_and_correction_plan_ref_or_null
      - reverse_bundle_linkage_ref_or_null
      - bundle_state
    GraphEngine:
      required_fields:
      - predecessor_bundle_member_set_digest
      - successor_bundle_member_set_digest
      - lineage_partition_witness_ref
      - predecessor_coverage_vector
      - successor_provenance_vector
      - allocation_rule_ref
    GraphLint:
      must_detect:
      - missing_predecessor_coverage
      - orphan_successor_slice
      - forbidden_cross_partition_merge
      - bridge_token_used_as_primary_authorization
      - notice_plan_incomplete
      - reverse_bundle_without_forward_anchor
    archive_object:
      required_fields:
      - transition_bundle_digest
      - audit_witness_packet_digest
      - bridge_token_digest_set_or_null
      - notice_evidence_digest_set_or_null
      - reverse_bundle_digest_set_or_null
  residual_open_points: []
tenant_merge_split_continuity_model:
  status: provisional_fixed
  statement: tenant_merge_split_continuity_model は、tenant merge / split における lawful continuity を、literal stable pseudonym keep・linear rebind・event-bundle rebind・hard cut の4分岐として形式化し、bridge token、lineage slice、archive manifest、transition charter の admissibility を束縛するモデルである。
  primitives:
    topology_change: μ ∈ {recontainer_1_to_1, merge_n_to_1, split_1_to_n}
    accountability_relation: a ∈ {preserved, reallocated, ambiguous}
    authority_relation: u ∈ {same_authority_family, cross_authority_family}
    jurisdiction_relation: j ∈ {same_jurisdiction_family, cross_jurisdiction_family}
    transition_mode: ν ∈ {linear_rebind, event_bundle_rebind, hard_cut}
    transition_event: ε = (transition_event_id, topology_change, predecessor_scope_set, successor_scope_set, effective_cutover_time, accountability_relation, authority_relation, jurisdiction_relation, allocation_witness_ref_or_null, transition_charter_ref, witness_packet_ref, archive_handover_manifest_ref_or_null, lawful_purpose_ref, ratification_event_ref, reflection_event_ref_or_null)
    mapping_relation: m ⊆ predecessor_scope_set × successor_scope_set
  imported_predicates:
    root_scope: RootScope(s) from stable_pseudonym_continuity_model
    token_validity: TokOK(τ,κ,r) from stable_pseudonym_continuity_model
    packet_validity: PacketOK(p,d,β,ς,μ_sess,τ,κ_sink,r) from audit_witness_packet_delegation_charter_model
  functions:
    tenant_change_predicate: Tenchg(ε)=true iff there exists s_i∈predecessor_scope_set, s_j∈successor_scope_set such that s_i.tenant_id ≠ s_j.tenant_id
    literal_keep_predicate: KeepLit(ε)=true iff Tenchg(ε)=false
    preserved_transition_predicate: PresTrans(ε)=true iff accountability_relation=preserved and authority_relation=same_authority_family and jurisdiction_relation=same_jurisdiction_family and reflection_event_ref_or_null is not null
    unique_mapping_predicate: Uniq(ε,m)=true iff topology_change=recontainer_1_to_1 and |predecessor_scope_set|=1 and |successor_scope_set|=1 and m is bijective
    bundle_requirement: BundleReq(ε)=true iff topology_change∈{merge_n_to_1, split_1_to_n} or accountability_relation∈{reallocated, ambiguous}
    mode_selector: Mode(ε,m)=linear_rebind iff Tenchg(ε)=true and PresTrans(ε)=true and Uniq(ε,m)=true; Mode(ε,m)=event_bundle_rebind iff Tenchg(ε)=true and reflection_event_ref_or_null is not null and BundleReq(ε)=true and witness_packet_ref is not null; otherwise Mode(ε,m)=hard_cut
    charter_admissibility: CharTransOK(ε,d)=true iff d.charter_id=transition_charter_ref and d.authority_tier=central_authority and reflection_event_ref_or_null is not null
    linear_rebind_admissibility: LinRebindOK(ε,m,τ,d)=true iff Mode(ε,m)=linear_rebind and CharTransOK(ε,d)=true and TokOK(τ,authoritative_state,domain_or_central_authority)=true
    bundle_rebind_admissibility: BundleRebindOK(ε,p,d)=true iff Mode(ε,m)=event_bundle_rebind and CharTransOK(ε,d)=true and PacketOK(p,d,β,bounded_actor_slice,supervised_session,τ,authoritative_state,domain_or_central_authority)=true and (topology_change=merge_n_to_1 → allocation_witness_ref_or_null is not null) and (topology_change=split_1_to_n → allocation_witness_ref_or_null is not null)
    lineage_partition_admissibility: LineagePartOK(ε)=true iff Mode(ε,m)=event_bundle_rebind implies allocation_witness_ref_or_null proves branch-local coverage; otherwise accountability_relation=preserved
    archive_handover_admissibility: ArchHandOK(ε)=true iff archive_handover_manifest_ref_or_null is not null whenever Tenchg(ε)=true
  invariants:
  - Tenchg(ε)=true なら KeepLit(ε)=false とする。
  - Mode(ε,m)=linear_rebind なら topology_change=recontainer_1_to_1、PresTrans(ε)=true、CharTransOK(ε,d)=true を同時に満たす。
  - topology_change∈{merge_n_to_1, split_1_to_n} なら single linear bridge token 1本だけで lawful continuity を主張してはならない。
  - domain_delegation charter を cross-tenant / cross-jurisdiction transition charter の admissible witness に数えてはならない。
  - Tenchg(ε)=true のとき predecessor manifest は immutable のまま保持し、successor tenant は新しい manifest root を持つ。
  - accountability_relation∈{reallocated, ambiguous} で allocation_witness_ref_or_null が null の transition は常に hard_cut とする。
  tool_projection:
    DecisionLedger:
      required_fields:
      - transition_event_id
      - topology_change
      - predecessor_scope_set
      - successor_scope_set
      - transition_mode
      - allocation_witness_ref_or_null
      - transition_charter_ref
      - reflection_event_ref_or_null
    GraphEngine:
      required_fields:
      - predecessor_successor_mapping_ref
      - transition_bundle_digest_ref_or_null
      - bridge_token_ref_set
      - lineage_partition_event_ref_or_null
      - archive_handover_manifest_ref_or_null
    archive_object:
      required_fields:
      - predecessor_manifest_digest_set
      - successor_manifest_digest
      - handover_manifest_digest
      - cutover_time
    GraphLint:
      forbidden_fields:
      - predecessor_stable_pseudonym_reuse_after_cutover
      - retroactive_manifest_merge
      - domain_delegation_as_cross_tenant_transition_charter
  residual_open_points:
  - transition charter の authority family / jurisdiction family override をどこまで predicate library 化するか
  - staged n→m transition を bundle-of-bundles continuity としてどこまで parameter 化するか
  - reflected 前の provisional transition bundle を bounded internal review にどこまで使えるか
transition_bundle_canonical_schema_model:
  status: provisional_fixed
  statement: transition_bundle_canonical_schema_model は、merge / split transition bundle の canonical schema を common core・cardinality / mapping layer・edge layer・continuity linkage・export alias layer の5層で形式化し、topology ごとの mandatory field と continuity cut predicate を定義するモデルである。
  primitives:
    topology_kind: θ ∈ {recontainer_1_to_1, merge_n_to_1, split_1_to_n}
    mapping_mode: μ_map ∈ {one_to_one_unique, many_to_one_exhaustive, one_to_many_partition}
    coverage_mode: χ ∈ {exact_singleton, all_predecessors_covered, full_partition, full_partition_or_explicit_hard_cut}
    continuity_state: υ ∈ {active, frozen, cut}
    transition_bundle: β = (bundle_id, schema_version_ref, transition_event_ref, topology_kind, transition_mode, cutover_time, predecessor_scope_ref_set, successor_scope_ref_set, predecessor_count, successor_count, edge_count, mapping_mode, transition_charter_ref, witness_packet_ref_or_null, bundle_digest_ref, bundle_proof_ref, archive_handover_manifest_ref, predecessor_manifest_digest_set, successor_manifest_digest_set, lawful_purpose_ref, coverage_mode, unique_mapping_witness_ref_or_null, allocation_witness_ref_set_or_null, lineage_partition_witness_ref_set_or_null, uncovered_branch_disposition_ref_or_null, export_alias_binding_ref_set_or_null, continuity_state)
    transition_edge: ε = (edge_id, predecessor_scope_ref, successor_scope_ref, relation_kind, predecessor_lineage_slice_ref_or_null, successor_lineage_slice_ref_or_null, allocation_witness_ref_or_null, edge_bridge_token_ref, edge_proof_ref, token_handle_ref, proof_handle_ref)
    export_alias_binding: α = (alias_binding_id, successor_branch_ref, export_bundle_ref, export_local_pseudonym_ref, recipient_class_ref, alias_policy_ref, alias_non_reuse_clause_ref, alias_revocation_handle_ref)
  imported_predicates:
    transition_mode_selector: Mode(εv,m) from tenant_merge_split_continuity_model
    charter_validity: CharTransOK(εv,d) from tenant_merge_split_continuity_model
    token_validity: TokLive(λ) from bridge_token_registry_model
    proof_validity: ProofLive(ψ) from bridge_token_registry_model
  functions:
    topology_cardinality_admissibility: CardOK(β)=true iff (θ=recontainer_1_to_1 -> predecessor_count=1 and successor_count=1 and edge_count=1) and (θ=merge_n_to_1 -> predecessor_count>=2 and successor_count=1 and edge_count=predecessor_count) and (θ=split_1_to_n -> predecessor_count=1 and successor_count>=2 and edge_count=successor_count)
    mapping_mode_admissibility: MapOK(β)=true iff (θ=recontainer_1_to_1 -> μ_map=one_to_one_unique and unique_mapping_witness_ref_or_null is not null) and (θ=merge_n_to_1 -> μ_map=many_to_one_exhaustive and allocation_witness_ref_set_or_null is not null) and (θ=split_1_to_n -> μ_map=one_to_many_partition and allocation_witness_ref_set_or_null is not null and lineage_partition_witness_ref_set_or_null is not null)
    coverage_admissibility: CovOK(β,E)=true iff (θ=recontainer_1_to_1 -> χ=exact_singleton) and (θ=merge_n_to_1 -> χ=all_predecessors_covered and every predecessor_scope_ref has exactly one edge to the sole successor) and (θ=split_1_to_n -> χ=full_partition_or_explicit_hard_cut and predecessor lineage is either fully partitioned across successor edges or uncovered_branch_disposition_ref_or_null records lawful hard cut)
    edge_admissibility: EdgeOK(ε)=true iff TokLive(ε.token_handle_ref)=true and ProofLive(ε.proof_handle_ref)=true and relation_kind matches mapping_mode and edge_proof_ref binds predecessor_scope_ref, successor_scope_ref, lawful_purpose_ref, transition_charter_ref
    bundle_proof_admissibility: BundProofOK(β,E)=true iff ProofLive(bundle_proof_ref)=true and bundle_digest_ref commits to edge_set E, predecessor_manifest_digest_set, successor_manifest_digest_set, archive_handover_manifest_ref, transition_charter_ref
    manifest_linkage_admissibility: ManOK(β)=true iff archive_handover_manifest_ref is not null and predecessor_manifest_digest_set is immutable and successor_manifest_digest_set is non-empty
    export_alias_admissibility: AliasOK(α)=true iff α.export_local_pseudonym_ref is bound to exactly one successor_branch_ref, one export_bundle_ref, one recipient_class_ref and its parent proof_handle is live
    continuity_cut_predicate: Cut(β,E,A)=true iff CardOK(β)=false or MapOK(β)=false or CovOK(β,E)=false or there exists mandatory ε∈E with EdgeOK(ε)=false or BundProofOK(β,E)=false or ManOK(β)=false or there exists α∈A with AliasOK(α)=false
  invariants:
  - CardOK(β)=false の bundle を lawful continuity artifact として publish してはならない。
  - θ∈{merge_n_to_1, split_1_to_n} なら bundle_proof_ref を mandatory とし、single edge proof だけで bundle 全体 continuity を主張してはならない。
  - θ=split_1_to_n で lineage partition witness がない場合、successor_count>=2 でも continuity_state は active にならない。
  - bundle_digest_ref は predecessor_manifest_digest_set / successor_manifest_digest_set / archive_handover_manifest_ref のいずれかが変われば再生成を要する。
  - export_local_pseudonym_ref は source stable pseudonym、他 successor branch alias、他 export bundle alias と同値にしてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - transition_bundle_id
      - topology_kind
      - predecessor_count
      - successor_count
      - edge_count
      - mapping_mode
      - coverage_mode
      - transition_charter_ref
      - bundle_digest_ref
      - bundle_proof_ref
    GraphEngine:
      required_fields:
      - edge_set_ref
      - allocation_witness_ref_set_or_null
      - lineage_partition_witness_ref_set_or_null
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      - export_alias_binding_ref_set_or_null
    archive_object:
      required_fields:
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      - bundle_digest_ref
    GraphLint:
      forbidden_fields:
      - implicit_topology_inference_from_edge_count_only
      - bundle_digest_without_mapping_or_coverage_witness
      - predecessor_manifest_rewrite_after_cutover
      - cross_branch_export_alias_reuse
  residual_open_points:
  - staged n→m transition を bundle-of-bundles continuity としてどこまで parameter 化するか
  - allocation_witness の numeric / set-valued / probabilistic family をどこまで canonical registry 化するか
  - bundle-of-bundles における mandatory edge cohort / super-bundle coverage / archive linkage をどこで parameter 化するか
bridge_token_registry_model:
  status: provisional_fixed
  statement: bridge_token_registry_model は、bridge token の signature suite・proof profile・revocation handle を assurance class ベースの parameter として形式化し、continuity context ごとの admissibility、supersession、tombstone、局所 revoke 伝播を判定するモデルである。
  primitives:
    continuity_context: ξ ∈ {internal_continuity, transition_bundle, external_audit, recipient_visible_continuity, emergency_bypass}
    suite_class: σ ∈ {internal_attested_v1, transition_anchor_v1, external_audit_v1, recipient_export_v1, emergency_bypass_v1}
    seal_class: η ∈ {hsm_scope_attested, hsm_central_attested, dual_control_or_exception_attested}
    notarization_class: ν ∈ {append_only_internal_notary, append_only_transition_notary, append_only_external_audit_notary, append_only_export_notary, append_only_emergency_notary}
    proof_class: π ∈ {none, same_scope_attestation, bundle_edge_commitment, auditor_bound_continuity_proof, recipient_alias_continuity_proof, provisional_bounded_reveal_proof}
    handle_state: h ∈ {active, superseded, revoked, quarantined, expired, tombstoned}
    handle_reason: ω ∈ {key_compromise, lawful_basis_lost, recipient_scope_violation, transition_mapping_invalidated, authority_retracted, archive_or_reopen_link_break, hard_cut_transition, superseded_by_stronger}
    suite_registry_cell: Σ = (suite_id, suite_class, seal_class, notarization_class, proof_class, signer_authority_tier, key_custody_class, recipient_binding_mode, reveal_cap_class, allowed_contexts, prohibited_contexts, downgrade_barrier, migration_policy_ref)
    token_handle: λ = (token_handle_id, bridge_token_id, state, reason_or_null, predecessor_handle_or_null, superseding_handle_or_null)
    proof_handle: ψ = (proof_handle_id, bridge_token_id, proof_profile_ref, recipient_class, export_bundle_id_or_null, state, reason_or_null, parent_token_handle_id)
  imported_predicates:
    token_core_validity: TokOK(τ,κ,r) from stable_pseudonym_continuity_model
    transition_charter_validity: CharTransOK(ε,d) from tenant_merge_split_continuity_model
    witness_packet_validity: PacketOK(p,d,β,ς,μ_sess,τ,κ_sink,r) from audit_witness_packet_delegation_charter_model
  functions:
    suite_context_admissibility: SuiteCtxOK(Σ,ξ)=true iff ξ ∈ Σ.allowed_contexts and ξ ∉ Σ.prohibited_contexts
    proof_profile_admissibility: ProfOK(π,ξ)=true iff (ξ=internal_continuity -> π∈{none,same_scope_attestation}) and (ξ=transition_bundle -> π=bundle_edge_commitment) and (ξ=external_audit -> π=auditor_bound_continuity_proof) and (ξ=recipient_visible_continuity -> π=recipient_alias_continuity_proof) and (ξ=emergency_bypass -> π=provisional_bounded_reveal_proof)
    proof_requirement: ProofReq(ξ)=true iff ξ ∈ {transition_bundle, external_audit, recipient_visible_continuity, emergency_bypass}
    token_live_for_use: TokLive(λ)=true iff λ.state=active
    proof_live_for_use: ProofLive(ψ)=true iff ψ.state=active
    supersession_admissibility: SupOK(λ_old,λ_new)=true iff commitment(old)=commitment(new) and lawful_purpose(old)=lawful_purpose(new) and accountability_lineage(old)=accountability_lineage(new) and strength(new)≥strength(old) and reveal_cap(new)≤reveal_cap(old) and ttl(new)≤ttl(old)
    tombstone_requirement: TombReq(τ,ε)=true iff hard_cut_transition or key_compromise causing continuity ambiguity or transition_mapping_invalidated without same-frame repair or branch-critical charter revocation occurs
    base_to_proof_propagation: Propagate(λ,ψ)=invalidate iff λ.state∈{revoked,tombstoned}; Propagate(λ,ψ)=freeze iff λ.state=quarantined; otherwise local proof revoke may remain ψ-only
    context_use_admissibility: CtxUseOK(τ,Σ,λ,ψ,ξ,κ,r)=true iff TokOK(τ,κ,r)=true and SuiteCtxOK(Σ,ξ)=true and TokLive(λ)=true and (ProofReq(ξ)=false or (ProfOK(Σ.proof_class,ξ)=true and ProofLive(ψ)=true))
  context_matrix:
    internal_continuity:
      required_suite_class:
      - internal_attested_v1
      - transition_anchor_v1
      required_linkage:
      - lawful_purpose_ref
      - authorization_basis_ref
      - issuance_notary_ref
    transition_bundle:
      required_suite_class:
      - transition_anchor_v1
      required_linkage:
      - transition_charter_ref
      - predecessor_successor_mapping_ref_or_bundle_digest
      - allocation_witness_ref_or_unique_mapping_ref
      - archive_handover_manifest_ref
    external_audit:
      required_suite_class:
      - external_audit_v1
      required_linkage:
      - charter_ref
      - archive_manifest_digest_ref_or_null
      - duplicate_digest_ref_or_null
      - recipient_class=external_auditor
    recipient_visible_continuity:
      required_suite_class:
      - recipient_export_v1
      required_linkage:
      - export_local_pseudonym_ref
      - export_bundle_id
      - recipient_class
      - effective_ttl
      - non_reuse_clause
    emergency_bypass:
      required_suite_class:
      - emergency_bypass_v1
      required_linkage:
      - exception_lane_ref
      - post_confirm_due
      - post_confirm_owner
      - audience_cap
      - provisional_marker
  invariants:
  - ξ=recipient_visible_continuity なら source stable pseudonym を recipient-visible field に出してはならない。
  - ξ=transition_bundle なら single bridge token 1本だけで merge_n_to_1 または split_1_to_n の全体 continuity を表してはならない。
  - SupOK(λ_old,λ_new)=true であっても λ_old から新しい proof_handle を発行してはならない。
  - λ.state=tombstoned なら CtxUseOK はすべて false とする。
  - proof_handle の局所 revoke は parent token_handle の lineage record を消さない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - bridge_token_ref
      - suite_id
      - proof_profile_ref
      - token_handle_id
      - proof_handle_id_or_null
      - handle_state
      - superseding_handle_ref_or_null
      - tombstone_event_ref_or_null
    GraphEngine:
      required_fields:
      - continuity_context
      - transition_bundle_ref_or_null
      - export_bundle_id_or_null
      - revocation_event_ref_or_null
      - proof_handle_ref_set
    GraphLint:
      forbidden_fields:
      - implicit_proof_profile_inference
      - single_revocation_flag_only
      - silent_suite_downgrade
      - superseded_token_reused_as_current_external_witness
  residual_open_points:
  - bundle-of-bundles における claim class ごとの lane split と super-bundle current claim の境界をどこまで parameter 化するか
central_delegation_charter_taxonomy_model:
  status: provisional_fixed
  statement: central_delegation_charter_taxonomy_model は、central delegation charter における jurisdiction family・authority family・override / escalation family・non-delegable boundary を parameter 化し、local / central / emergency / external-audit の各 context で lawful な authority binding を判定するモデルである。
  primitives:
    jurisdiction_family: j ∈ {same_tenant_same_jurisdiction, same_tenant_cross_jurisdiction, cross_tenant_same_jurisdiction, cross_tenant_cross_jurisdiction, sovereign_or_external_audit_overlay}
    authority_family: a ∈ {domain_execution_authority, domain_review_authority, domain_protected_facet_authority, central_policy_authority, central_exception_authority, emergency_containment_authority}
    context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    override_family: ω ∈ {monotone_scope_narrowing_override, centralization_override, emergency_containment_override, external_audit_supervised_override, non_delegable_escalation}
    approval_route_family: ρ ∈ {single_domain_route, dual_control_route, central_supervised_route, emergency_then_post_confirm_route, external_audit_supervised_route}
    lawful_purpose_family: π ∈ {internal_operation, protected_facet_review, cross_boundary_reveal, emergency_containment, external_audit_response, post_confirm_disposition}
    charter_taxonomy_cell: τ = (charter_id, charter_kind, tenant_relation_scope, jurisdiction_family_scope, authority_family_scope, override_family_set, escalation_family_set, non_delegable_action_family_set, allowed_context_set, allowed_approval_route_family_set, lawful_purpose_family_set, required_attestation_profile_set, required_observer_profile_set, post_confirm_policy_ref_or_null, bridge_token_policy_ref_or_null, archive_linkage_policy_ref_or_null, effective_window, issuer_ref)
  imported_predicates:
    packet_validity: PacketOK(p,d,β,ς,μ,τ_tok,κ_sink,r) from audit_witness_packet_delegation_charter_model
    witness_requirement: WReq(β,ς,μ) from audit_witness_authority_bypass_model
    central_requirement: CentralReq(β,ς,μ) from audit_witness_authority_bypass_model
  functions:
    jurisdiction_requirement: JurisReq(β,π)= sovereign_or_external_audit_overlay if π=external_audit_response or β.external_party_visibility=true; cross_tenant_cross_jurisdiction if β.tenant_relation=cross_tenant and β.jurisdiction_relation=cross_jurisdiction_family; cross_tenant_same_jurisdiction if β.tenant_relation=cross_tenant and β.jurisdiction_relation=same_jurisdiction_family; same_tenant_cross_jurisdiction if β.tenant_relation=same_tenant and β.jurisdiction_relation=cross_jurisdiction_family; same_tenant_same_jurisdiction otherwise
    authority_requirement: AuthReq(ξ,β,π)= {domain_execution_authority} if ξ=local_context and π=internal_operation; {domain_execution_authority,domain_protected_facet_authority} if ξ=local_context and π=protected_facet_review; {central_policy_authority} if ξ=central_context; {emergency_containment_authority} if ξ=emergency_context and π=emergency_containment; {emergency_containment_authority,central_exception_authority} if ξ=emergency_context and (β.protected_facet_flag=true or π=post_confirm_disposition); {central_policy_authority} if ξ=external_audit_context; {} otherwise
    route_requirement: RouteReq(ξ,β,π)= single_domain_route if ξ=local_context and β.tenant_relation=same_tenant and β.jurisdiction_relation=same_jurisdiction_family; dual_control_route if ξ=local_context and π=protected_facet_review; central_supervised_route if ξ=central_context; emergency_then_post_confirm_route if ξ=emergency_context; external_audit_supervised_route if ξ=external_audit_context
    override_admissibility: OverrideOK(ω,ξ,β,π)=true iff (ω=monotone_scope_narrowing_override and ξ∈{local_context,central_context}) or (ω=centralization_override and (β.tenant_relation=cross_tenant or β.jurisdiction_relation=cross_jurisdiction_family or β.protected_facet_flag=true)) or (ω=emergency_containment_override and ξ=emergency_context and π=emergency_containment) or (ω=external_audit_supervised_override and ξ=external_audit_context) or (ω=non_delegable_escalation and NonDel(β,π)=true)
    non_delegable_boundary: NonDel(β,π)=true iff π∈{post_confirm_disposition} or β.protected_facet_flag=true and π∈{protected_facet_review,cross_boundary_reveal} or β.tenant_relation=cross_tenant and β.reveal_scope>=bounded_actor_slice or β.jurisdiction_relation=cross_jurisdiction_family and β.reveal_scope>=bounded_actor_slice or β.bridge_or_archive_continuity_action=true
    charter_taxonomy_validity: TaxOK(τ,β,ξ,π)=true iff JurisReq(β,π) ∈ τ.jurisdiction_family_scope and AuthReq(ξ,β,π) ⊆ τ.authority_family_scope and RouteReq(ξ,β,π) ∈ τ.allowed_approval_route_family_set and π ∈ τ.lawful_purpose_family_set and ((NonDel(β,π)=false) or non_delegable_escalation ∈ τ.escalation_family_set)
    context_binding_validity: CtxBindOK(τ,p,β,ξ,π)=true iff TaxOK(τ,β,ξ,π)=true and (ξ!=external_audit_context or τ.required_observer_profile_set ≠ ∅) and (ξ!=emergency_context or τ.post_confirm_policy_ref_or_null not null) and PacketOK(p, referenced charter, β, reveal scope, session mode, token, sink class, recipient)=true
  invariants:
  - external auditor または observer credential holder を AuthReq の充足者に数えてはならない。
  - ξ=emergency_context の charter は post_confirm_policy_ref_or_null を必須とし、steady-state current delegation の既定 route にしてはならない。
  - NonDel=true の action family は、domain_review_authority 単独では finalize してはならない。
  - JurisReq が cross_tenant_cross_jurisdiction または sovereign_or_external_audit_overlay のとき、single_domain_route を RouteReq にしてはならない。
  - TaxOK=true でも required attestation / observer profile が空なら、external-audit または protected reveal の current basis にしてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - charter_id
      - jurisdiction_family
      - authority_family_set
      - approval_route_family
      - lawful_purpose_family
      - non_delegable_escalation_flag
    GraphEngine:
      required_fields:
      - tenant_relation
      - jurisdiction_relation
      - protected_facet_flag
      - external_party_visibility
      - bridge_or_archive_continuity_action
      - post_confirm_policy_ref_or_null
    GraphLint:
      checks:
      - external_auditor_counted_as_authority
      - emergency_lane_used_as_steady_state_route
      - single_domain_route_used_for_cross_boundary_context
      - missing_non_delegable_escalation
      - observer_profile_missing_in_external_audit_context
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離 parameter 化するか
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで parameter 化するか
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで parameter 化するか
priority_formal_topics:
- update_operator を主体・制約・監査・失敗分岐まで fixed にする
- knowledge 定義・公理候補と矛盾しない update_operator の fixed 文を作る
- mathematical_directions 3候補の採用/非採用/保留を update_operator fixed 後に確定する
provisional_convergence_definition:
  status: provisional_fixed
  statement: 収束は単一の停止条件ではなく、認識収束 C_e(K) と統治収束 C_g(K) から成る二層判定問題として扱う。
  operational_note:
  - 閾値は C_e(K), C_g(K) を具体化する運用パラメータであり、定義そのものではない
  - 固定点は長期的安定性を議論するための数理補助概念として用いる
  - 非収束はすべて failure ではなく、Hold / false / unresolved_plurality / deliberate_exploration を区別して扱う
audit_witness_profile_registry_model:
  status: provisional_fixed
  statement: audit_witness_profile_registry_model は、audit witness packet に入る attestation / observer credential を vendor-neutral な class registry として形式化し、文脈別 mandatory predicate、binding field 要求、migration alias、anti-downgrade barrier を判定するモデルである。
  primitives:
    attestation_class: a ∈ {session_precommit, custody_boundary, observer_challenge, authority_outcome}
    observer_credential_class: o ∈ {supervised_session_observer, protected_audit_observer, emergency_containment_observer, post_confirm_reviewer}
    witness_context: ξ ∈ {internal_supervised_session, external_protected_audit, emergency_bypass, post_confirm_review}
    requirement_state: ρ ∈ {mandatory, conditional, optional, forbidden}
    barrier_dimension: δ ∈ {independence, custody, freshness, replay_binding, authority_binding}
    binding_field: b ∈ {session_basis_ref, scope_packet_digest_ref, reveal_scope_ref, audience_binding_ref, lawful_purpose_ref, charter_ref, authority_decision_ref, append_only_precommit_ref, observer_challenge_ref, packet_digest, bridge_token_proof_ref, archive_manifest_digest_ref, validity_window_ref, revocation_handle_ref, supersession_ref}
    attestation_profile: A = (attestation_class, issuer_kind, verifier_kind, independence_floor, custody_floor, freshness_floor, replay_binding_requirement, authority_binding_requirement, forbidden_context_set, migration_alias_set, downgrade_barrier_set)
    observer_profile: O = (observer_credential_class, issuer_kind, independence_floor, contact_route_mode, reveal_scope_cap, challenge_requirement, post_confirm_duty_flag, forbidden_context_set, migration_alias_set, downgrade_barrier_set)
  imported_predicates:
    packet_validity: PacketOK(p,d,β,ς,μ,τ,κ_sink,r) from audit_witness_packet_delegation_charter_model
    packet_class_admissibility: PClassOK(pclass,β,ς) from audit_witness_packet_delegation_charter_model
    witness_requirement: WReq(β,ς,μ) from audit_witness_authority_bypass_model
  functions:
    attestation_requirement: AttReq(ξ)= {session_precommit} if ξ=internal_supervised_session; {session_precommit,custody_boundary} if ξ=external_protected_audit; {session_precommit,custody_boundary,observer_challenge} if ξ=emergency_bypass; {authority_outcome} if ξ=post_confirm_review
    observer_requirement: ObsReq(ξ)= {} if ξ=internal_supervised_session; {protected_audit_observer} if ξ=external_protected_audit; {emergency_containment_observer} if ξ=emergency_bypass; {post_confirm_reviewer} if ξ=post_confirm_review
    conditional_requirement: CondReq(ξ,β)= {custody_boundary} if ξ=internal_supervised_session and (β.protected_facet_flag=true or β.external_party_visibility=true); {observer_challenge} if ξ=external_protected_audit and (β.clear_identity_flag=true or β.direct_contact_route_flag=true); {custody_boundary} if ξ=post_confirm_review and β.protected_facet_flag=true; {} otherwise
    binding_requirement: BindReq(ξ)= {session_basis_ref,scope_packet_digest_ref,reveal_scope_ref,audience_binding_ref,lawful_purpose_ref,charter_ref,append_only_precommit_ref,packet_digest,validity_window_ref} if ξ∈{internal_supervised_session,external_protected_audit,emergency_bypass}; {session_basis_ref,charter_ref,authority_decision_ref,packet_digest,validity_window_ref} if ξ=post_confirm_review
    context_profile_validity: ProfOK(P_A,P_O,ξ,β)=true iff AttReq(ξ) ⊆ class(P_A) and ObsReq(ξ) ⊆ class(P_O) and CondReq(ξ,β) ⊆ class(P_A∪P_O) and all profiles avoid forbidden_context_set for ξ
    binding_validity: BindOK(p,ξ)=true iff BindReq(ξ) ⊆ present_fields(p)
    alias_preserving_translation: AliasOK(A_old,A_new)=true iff A_old.attestation_class=A_new.attestation_class and A_old.migration_alias_set references A_new and A_new preserves all downgrade_barrier_set dimensions of A_old
    monotone_strengthening: MonoUp(X_old,X_new)=true iff for every δ∈{independence,custody,freshness,replay_binding,authority_binding}, level(X_new,δ) >= level(X_old,δ) and forbidden_context_set(X_new) does not remove a requirement that current packet depends on
    migration_admissibility: MigOK(X_old,X_new,ξ)=true iff AliasOK(X_old,X_new)=true or MonoUp(X_old,X_new)=true
    downgrade_block: DownBlock(X_old,X_new,ξ)=true iff MigOK(X_old,X_new,ξ)=false or (ξ∈{external_protected_audit,emergency_bypass} and level(X_new,replay_binding) < level(X_old,replay_binding)) or (ξ=emergency_bypass and post_confirm_duty_flag(X_new)=false)
    registry_conformity: RegOK(p,P_A,P_O,ξ,β,d,τ,κ_sink,r)=true iff PacketOK(p,d,β,p.redaction_class,p.packet_class,τ,κ_sink,r)=true and ProfOK(P_A,P_O,ξ,β)=true and BindOK(p,ξ)=true and no pair (x_old,x_new) in migration_chain(p) violates DownBlock(x_old,x_new,ξ)
  invariants:
  - ξ=internal_supervised_session では authority_outcome を current witness basis に使ってはならない。
  - ξ=external_protected_audit では session_precommit と custody_boundary を必須とし、clear_identity または direct_contact_route を含む場合は observer_challenge も必須とする。
  - ξ=emergency_bypass では observer_challenge と emergency_containment_observer が必須であり、authority_outcome は post-confirm 完了前の current basis に使ってはならない。
  - ξ=post_confirm_review では authority_outcome と post_confirm_reviewer が必須であり、emergency_containment_observer 単独で final reviewer を代替してはならない。
  - same packet の current witness は migration_alias_ref なしに旧 profile と新 profile を混在させてはならない。
  - external_protected_audit / emergency_bypass で session_precommit only へ落とす revision は forbidden downgrade である。
  tool_projection:
    DecisionLedger:
      required_fields:
      - attestation_class_ref_set
      - observer_credential_class_ref_set
      - attestation_profile_ref_set
      - observer_profile_ref_set
      - registry_epoch_ref
      - migration_alias_ref_set
      - downgrade_check_result
    GraphEngine:
      required_fields:
      - append_only_precommit_ref
      - hsm_attestation_ref_or_null
      - observer_challenge_ref_or_null
      - human_observer_credential_ref_or_null
      - authority_outcome_attestation_ref_or_null
    GraphLint:
      required_fields:
      - witness_context
      - mandatory_profile_satisfied
      - forbidden_downgrade_detected
      - mixed_profile_without_alias_detected
  residual_open_points:
  - HSM attestation packet / observer credential envelope の external serialization notation をどこまで model parameter として扱うか
  - central delegation charter の authority family / jurisdiction family taxonomy をどこまで predicate library に落とすか
bridge_token_suite_revision_model:
  status: provisional_fixed
  statement: bridge_token_suite_revision_model は、bridge token suite の revision を predecessor/successor 関係、dual-validity mode、context 別 anti-downgrade predicate、migration witness、token_handle / proof_handle cut predicate を持つ registry cell として形式化し、legacy verification と current issuance の admissibility を分離して判定するモデルである。
  primitives:
    continuity_context: ξ ∈ {internal_continuity, transition_bundle, external_audit, recipient_visible_continuity, emergency_bypass}
    migration_kind: μ ∈ {alias_preserving_translation, monotone_strengthening, hard_cut_reissue}
    dual_validity_mode: ω ∈ {verify_legacy_only, bounded_parallel_issue, successor_only}
    barrier_dimension: δ ∈ {seal_strength, notarization_strength, proof_binding_strength, signer_authority, key_custody, recipient_binding, reveal_cap, replay_binding, witness_independence, witness_custody, authority_binding}
    revision_cell: R = (revision_id, predecessor_suite_id, successor_suite_id, migration_kind, covered_contexts, dual_validity_mode, activation_time, cutoff_time_or_null, legacy_issue_policy, successor_issue_policy, barrier_vector, required_attestation_profile_map, required_observer_profile_map, migration_witness_req_set, token_cut_policy, proof_cut_policy, tombstone_trigger_set)
  imported_predicates:
    suite_context_admissibility: SuiteCtxOK(Σ,ξ) from bridge_token_registry_model
    proof_profile_admissibility: ProfOK(π,ξ) from bridge_token_registry_model
    token_live_for_use: TokLive(λ) from bridge_token_registry_model
    proof_live_for_use: ProofLive(ψ) from bridge_token_registry_model
    supersession_admissibility: SupOK(λ_old,λ_new) from bridge_token_registry_model
    witness_registry_conformity: RegOK(p,P_A,P_O,ξ,β,d,τ,κ_sink,r) from audit_witness_profile_registry_model
  functions:
    suite_level: SLevel(Σ,δ)= strength(Σ.seal_class) if δ=seal_strength; strength(Σ.notarization_class) if δ=notarization_strength; strength(Σ.proof_class) if δ=proof_binding_strength; strength(Σ.signer_authority_tier) if δ=signer_authority; strength(Σ.key_custody_class) if δ=key_custody; strength(Σ.recipient_binding_mode) if δ=recipient_binding; inverse_breadth(Σ.reveal_cap_class) if δ=reveal_cap; 1 if Σ.proof_class ∈ {bundle_edge_commitment,auditor_bound_continuity_proof,provisional_bounded_reveal_proof} and δ=replay_binding; 0 otherwise
    witness_level: WLevel(P_A,P_O,δ)= min(independence_floor(P_A), independence_floor(P_O_or_top)) if δ=witness_independence; min(custody_floor(P_A), custody_floor(P_O_or_top)) if δ=witness_custody; min(authority_binding_requirement(P_A), post_confirm_duty_flag(P_O_or_top)) if δ=authority_binding; min(freshness_floor(P_A), freshness_floor(P_O_or_top)) if δ∈{replay_binding}; top otherwise
    alias_revision_admissibility: AliasRevOK(R,Σ_old,Σ_new)=true iff R.migration_kind=alias_preserving_translation and covered_contexts(R) ⊆ allowed_contexts(Σ_old)∩allowed_contexts(Σ_new) and proof_class(Σ_old)=proof_class(Σ_new) and for every δ in barrier_vector(R), SLevel(Σ_new,δ) >= SLevel(Σ_old,δ)
    monotone_revision_admissibility: MonoRevOK(R,Σ_old,Σ_new)=true iff R.migration_kind=monotone_strengthening and covered_contexts(R) ⊆ allowed_contexts(Σ_new) and for every δ in barrier_vector(R), SLevel(Σ_new,δ) >= SLevel(Σ_old,δ) and exists δ* with strict increase
    dual_window_admissibility: DualWinOK(R,ξ,t)=true iff ξ ∈ covered_contexts(R) and ((ω=verify_legacy_only and activation_time<=t) or (ω=bounded_parallel_issue and activation_time<=t and (cutoff_time_or_null is null or t<=cutoff_time_or_null)) or (ω=successor_only and t<activation_time))
    legacy_issue_admissibility: LegacyIssueOK(R,ξ,t)=true iff ξ ∈ covered_contexts(R) and ω=bounded_parallel_issue and activation_time<=t and (cutoff_time_or_null is null or t<=cutoff_time_or_null) and legacy_issue_policy permits ξ
    effective_downgrade_block: EffDownBlock(R,Σ_old,Σ_new,P_A_old,P_O_old,P_A_new,P_O_new,ξ,β)=true iff (AliasRevOK(R,Σ_old,Σ_new)=false and MonoRevOK(R,Σ_old,Σ_new)=false) or exists δ in barrier_vector(R) such that SLevel(Σ_new,δ)<SLevel(Σ_old,δ) or WLevel(P_A_new,P_O_new,δ)<WLevel(P_A_old,P_O_old,δ) or RegOK(packet_current,P_A_new,P_O_new,ξ,β,dummy_d,τ_dummy,κ_sink_dummy,r_dummy)=false
    token_cut_decision: TokCut(R,λ_old,λ_new_or_null,ξ,t)= hard_cut if migration_kind(R)=hard_cut_reissue or EffDownBlock(...)=true or (cutoff_time_or_null not null and t>cutoff_time_or_null and λ_new_or_null is null); reissue if ξ∈covered_contexts(R) and activation_time<=t and λ_new_or_null is null; none otherwise
    proof_cut_decision: ProofCut(R,ψ,ξ,t)= revoke if parent(ψ) is hard_cut or ξ∉covered_contexts(R) or (cutoff_time_or_null not null and t>cutoff_time_or_null and suite(ψ)=predecessor_suite_id); reissue if activation_time<=t and current_use(ψ)=true and suite(ψ)=predecessor_suite_id; none otherwise
    revision_conformity: RevOK(R,Σ_old,Σ_new,λ_old,λ_new_or_null,ψ,P_A_old,P_O_old,P_A_new,P_O_new,ξ,t,β)=true iff SuiteCtxOK(Σ_old,ξ)=true and SuiteCtxOK(Σ_new,ξ)=true and (DualWinOK(R,ξ,t)=true or ξ uses successor only) and EffDownBlock(R,Σ_old,Σ_new,P_A_old,P_O_old,P_A_new,P_O_new,ξ,β)=false and TokCut(R,λ_old,λ_new_or_null,ξ,t)≠hard_cut and ProofCut(R,ψ,ξ,t)≠revoke
  invariants:
  - ω=verify_legacy_only のとき、legacy issue はすべて false でなければならない。
  - ξ=external_audit では activation_time 以後の新しい auditor-bound continuity proof に predecessor suite を使ってはならない。
  - ξ=recipient_visible_continuity では TTL 延長または recipient alias 再発行を predecessor proof_handle のまま行ってはならない。
  - ξ=emergency_bypass では bounded_parallel_issue を既定値にしてはならず、registry に explicit permit がない限り successor_only とする。
  - same current continuity claim に対して predecessor suite と successor suite の proof を migration witness なしに併記してはならない。
  - bridge token suite の migration が admissible でも、required attestation / observer profile の effective barrier が下がれば forbidden downgrade とする。
  residual_open_points:
  - bundle-of-bundles における mandatory edge cohort / super-bundle coverage / archive linkage をどこで parameter 化するか
proof_handle_partial_revocation_propagation_model:
  status: provisional_fixed
  statement: proof_handle_partial_revocation_propagation_model は、proof_handle の revoke / supersede / quarantine / expire を sink class ごとの cut / freeze / tombstone / verify_only に写像し、token_handle hard cut と局所 revoke の分界を形式化するモデルである。
  primitives:
    revocation_event: ρ ∈ {revoke, supersede, quarantine, expire}
    sink_class: κ ∈ {mirrored_cache, replay_export, downstream_digest, recipient_visible_alias, archive_manifest_continuity}
    propagation_action: a ∈ {cut, freeze, tombstone, verify_only}
    proof_scope_unit: υ ∈ {per_proof, per_bundle, per_recipient_alias_bundle, per_manifest_continuity_claim}
    proof_artifact_kind: χ ∈ {edge_proof, bundle_proof, recipient_bound_proof, manifest_linkage_proof}
    use_mode: m ∈ {historical_verify, internal_forensic, current_internal, current_external}
  imported_predicates:
    token_live_for_use: TokLive(λ) from bridge_token_registry_model
    proof_live_for_use: ProofLive(ψ) from bridge_token_registry_model
    edge_admissibility: EdgeOK(ε) from transition_bundle_canonical_schema_model
    export_alias_admissibility: AliasOK(α) from transition_bundle_canonical_schema_model
    revision_conformity: RevOK(R,...) from bridge_token_suite_revision_model
  functions:
    scope_unit: Scope(ψ)=per_bundle if artifact_kind(ψ)=bundle_proof; per_recipient_alias_bundle if artifact_kind(ψ)=recipient_bound_proof; per_manifest_continuity_claim if artifact_kind(ψ)=manifest_linkage_proof; per_proof otherwise
    base_action: BaseAct(ρ,κ)= cut if (κ=mirrored_cache and ρ=revoke) or (κ=recipient_visible_alias and ρ∈{revoke,supersede,expire}) or (κ=replay_export and ρ=supersede); freeze if (κ=mirrored_cache and ρ∈{supersede,quarantine}) or (κ=replay_export and ρ=quarantine) or (κ=downstream_digest and ρ=quarantine) or (κ=recipient_visible_alias and ρ=quarantine) or (κ=archive_manifest_continuity and ρ=quarantine); tombstone if (κ=replay_export and ρ=revoke) or (κ=downstream_digest and ρ=revoke); verify_only otherwise
    target_dependency: Dep(o,ψ)=true iff o directly cites ψ or o cites a bundle coverage claim, recipient alias claim, export bundle claim, or manifest continuity claim whose admissibility depends on ψ
    local_revoke_admissibility: LocalCutOK(ψ,ρ)=true iff TokLive(parent(ψ))=true and reason(ψ,ρ) ∈ {recipient_scope_or_reveal_cap_violation, export_bundle_binding_loss, proof_profile_mismatch, local_anomaly_containment, ttl_expiry}
    token_hard_cut_requirement: TokHardCutReq(ψ,ρ)=true iff TokLive(parent(ψ))=false or reason(ψ,ρ) ∈ {key_compromise_or_signature_suite_failure, transition_charter_or_authority_retracted, transition_bundle_mapping_invalidated, archive_manifest_or_reopen_link_break, hard_cut_transition}
    propagation_target_unit: Unit(ψ,κ)=Scope(ψ) if κ∈{mirrored_cache,archive_manifest_continuity}; per_recipient_alias_bundle if κ=recipient_visible_alias; per_bundle if κ∈{replay_export,downstream_digest} and artifact_kind(ψ)=bundle_proof; per_proof otherwise
    effective_action: EffAct(ρ,ψ,κ,o)= tombstone if TokHardCutReq(ψ,ρ)=true and Dep(o,ψ)=true and κ∈{replay_export,downstream_digest}; cut if TokHardCutReq(ψ,ρ)=true and Dep(o,ψ)=true and κ∈{mirrored_cache,recipient_visible_alias}; freeze if TokHardCutReq(ψ,ρ)=true and Dep(o,ψ)=true and κ=archive_manifest_continuity; BaseAct(ρ,κ) if LocalCutOK(ψ,ρ)=true and Dep(o,ψ)=true; none otherwise
    use_admissibility: UseOK(o,m,t)=true iff for every ψ depended on by o, EffAct(event_of(ψ),ψ,sink_of(o),o) not in {cut,tombstone} and not (EffAct(...)=freeze and m∈{current_internal,current_external}) and not (EffAct(...)=verify_only and m∈{current_internal,current_external})
    bundle_vs_edge_separation: BundleLocalOK(B,E_set)=true iff bundle_proof_handle(B) is live or every coverage claim using B is non-current; EdgeLocalOK(ε)=true iff EdgeOK(ε)=true independent of bundle handle except when bundle handle is mandatory witness for ε's claim class
  invariants:
  - TokHardCutReq(ψ,ρ)=true なら、ψ に依存する current continuity claim は local successor proof の有無にかかわらず継続してはならない。
  - κ=archive_manifest_continuity では archive manifest object 自体は immutable であり、更新対象は manifest linkage claim だけである。
  - ρ=supersede の old proof_handle は historical_verify には使えても、current_external または recipient alias 再発行には使えない。
  - ρ=quarantine の proof_handle は internal_forensic を除く current claim に使えない。
  - bundle proof revoke は bundle coverage claim を止めるが、独立 live edge proof まで自動無効化しない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - revocation_event_kind
      - reason_code
      - propagation_scope_unit
      - sink_action_map
      - successor_proof_handle_ref_or_null
      - review_window_or_null
    GraphEngine:
      required_fields:
      - dependency_target_set
      - sink_class
      - effective_action
      - bundle_or_edge_scope
      - current_use_blocked
    GraphLint:
      forbidden_fields:
      - cache_only_invalidation_as_full_propagation
      - silent_bundle_to_edge_cascade
      - manifest_rewrite_for_local_proof_revoke
      - verify_only_handle_used_for_current_claim
  residual_open_points:
  - staged n→m transition を bundle-of-bundles で表すとき、sub-bundle / super-bundle 間の propagation 継承境界をどこまで parameter 化するか
  - staged n→m transition を bundle-of-bundles で表すとき、proof propagation の最小 bundle 単位をどこまで parameter 化するか
simultaneous_suite_revision_dual_validity_model:
  status: provisional_fixed
  statement: simultaneous_suite_revision_dual_validity_model は、同一 transition bundle 内で bundle proof と edge proof が異なる predecessor/successor suite を持つ場合に、dual-validity window の共有粒度を bundle_lane / edge_cohort_lane / claim_class_policy の3層で形式化し、bundle coverage claim と edge 局所 claim の current admissibility を切り分けるモデルである。
  primitives:
    claim_class: χ ∈ {bundle_coverage_claim, edge_local_claim, replay_or_digest_continuity_claim, recipient_alias_or_ttl_extension_claim, archive_manifest_current_linkage_claim}
    revision_lane: ℓ ∈ {bundle_lane} ∪ {edge_cohort_lane_i}
    witness_state: σ ∈ {live_predecessor, live_successor, freeze, verify_only, cut, tombstone}
    coordination_mode: μ ∈ {claim_class_shared, lane_local, named_mixed_mode}
    current_claim: c = (claim_class_ref, dependency_set, current_use_context, bundle_ref_or_null, edge_cohort_ref_set_or_null)
  imported_predicates:
    revision_conformity: RevOK(R,...) from bridge_token_suite_revision_model
    effective_action: EffAct(ρ,ψ,κ,o) from proof_handle_partial_revocation_propagation_model
    edge_admissibility: EdgeOK(ε) from transition_bundle_canonical_schema_model
  functions:
    lane_binding: Lane(ψ)=bundle_lane if artifact_kind(ψ)=bundle_proof; edge_cohort_lane(cohort_ref(ψ)) otherwise
    required_lanes: ReqLane(c)= {bundle_lane}∪mandatory_edge_cohort_set(c) if class(c)=bundle_coverage_claim; {edge_cohort_lane(cohort_ref(c))} if class(c)=edge_local_claim; dependency-derived lane set otherwise
    witness_state_projection: WState(ψ,c,t)= tombstone if EffAct(event_of(ψ),ψ,sink_of(c),c)=tombstone; cut if EffAct(...)=cut; freeze if EffAct(...)=freeze; verify_only if EffAct(...)=verify_only; live_successor if suite(ψ)=successor and RevOK(revision_cell_of(ψ),...)=true; live_predecessor if suite(ψ)=predecessor and RevOK(revision_cell_of(ψ),...)=true; cut otherwise
    mandatory_edge_cohort_conformity: CohOK(c,t)=true iff class(c)≠bundle_coverage_claim or every mandatory edge witness for c is in {live_successor} or explicitly legacy-admissible under claim_class_policy(c,t)
    mixed_mode_admissibility: MixOK(c,t)=true iff coordination_mode(c,t)=named_mixed_mode or every mandatory witness for c is homogeneous in suite generation; and no same current claim anonymously combines predecessor and successor witnesses
    claim_state: ClaimState(c,t)= tombstone if any mandatory witness in ReqLane(c) is tombstone or cut; freeze if any mandatory witness in ReqLane(c) is freeze or CohOK(c,t)=false; verify_only if every remaining mandatory witness is in {live_predecessor, verify_only} and current issuance is not permitted by claim_class_policy(c,t); live_successor if every mandatory witness is live_successor and MixOK(c,t)=true; live_predecessor if class(c)=edge_local_claim and every mandatory witness is live_predecessor and claim_class_policy(c,t) permits current legacy use; freeze otherwise
    current_admissibility: CurOK(c,t)=true iff ClaimState(c,t) ∈ {live_successor, live_predecessor}
  invariants:
  - class(c)=bundle_coverage_claim で CohOK(c,t)=false なら CurOK(c,t)=false でなければならない。
  - class(c)=edge_local_claim は bundle witness 非必須なら bundle_lane の freeze だけで自動的に current 不可へ落としてはならない。
  - same current claim に predecessor / successor witness を migration witness なしに無記名併記してはならない。
  - EffAct 由来の freeze / verify_only / cut / tombstone は dual-validity window より優先し、window が開いていても current admissibility を回復させない。
  - class(c)=recipient_alias_or_ttl_extension_claim では predecessor proof の dual-validity だけで TTL 延長や alias 再発行を許してはならない。
  residual_open_points:
  - bundle-of-bundles を super_bundle / sub_bundle の2層に固定するか、recursive nesting をどこまで parameter 化するか
  - allocation_witness の numeric / set-valued / probabilistic family をどこまで canonical registry 化するか
staged_bundle_of_bundles_canonical_schema_model:
  status: provisional_fixed
  statement: staged_bundle_of_bundles_canonical_schema_model は、staged n→m transition を super_bundle・sub_bundle・handoff_manifest の三者で形式化し、sub-bundle local current、handoff current、super-bundle coverage current の依存関係を stage DAG 上で定義するモデルである。
  primitives:
    super_bundle: β ∈ Bsup
    sub_bundle: b ∈ Bsub
    handoff_manifest: h ∈ Handoff
    stage: s ∈ S
    claim_layer: λ ∈ {sub_bundle_local, handoff_current, super_bundle_coverage, replay_or_digest_export, recipient_alias}
    bundle_state: σ ∈ {current, freeze, verify_only, tombstone, cut}
  imported_predicates:
    local_bundle_current: LCur(b,t) from transition_bundle_canonical_schema_model
    claim_state: ClaimState(c,t) from simultaneous_suite_revision_dual_validity_model
  functions:
    stage_of: Stage(b)=s
    parent_super: Parent(b)=β
    mandatory_sub_bundles: MandSub(β,t)= set of b required by super_bundle_coverage_rule(β,t)
    mandatory_handoffs: MandH(β,t)= set of h required by super_bundle_coverage_rule(β,t)
    handoff_source: Src(h)=b_i
    handoff_target: Tgt(h)=b_j
    handoff_current: HCur(h,t)=true iff exit_condition(Src(h),t)=satisfied and entry_condition(Tgt(h),t)=satisfied and handoff_digest_match(h,t)=true and charter_ok(h,t)=true
    sub_bundle_state: SubState(b,t)= tombstone if local_cut_or_tombstone(b,t)=true; freeze if local_freeze(b,t)=true; verify_only if local_verify_only(b,t)=true; current if LCur(b,t)=true; cut otherwise
    super_bundle_state: SupState(β,t)= tombstone if any mandatory sub_bundle or mandatory handoff is tombstone or cut; freeze if any mandatory sub_bundle or mandatory handoff is freeze; verify_only if every mandatory dependency is in {current, verify_only} and current issuance is not permitted by super_bundle_policy(β,t); current if every b in MandSub(β,t) satisfies SubState(b,t)=current and every h in MandH(β,t) satisfies HCur(h,t)=true and global_charter_ok(β,t)=true and global_lineage_ok(β,t)=true; cut otherwise
    layer_projection: Proj(artifact,t)= sub_bundle_local if artifact scoped to single b; handoff_current if artifact scoped to h; super_bundle_coverage if artifact depends on β-level coverage rule; replay_or_digest_export or recipient_alias otherwise by sink class
  invariants:
  - SupState(β,t)=current であるためには、MandSub(β,t) と MandH(β,t) の未充足 dependency が存在してはならない。
  - 依存しない sub_bundle b_k の freeze / verify_only / tombstone は、MandSub(β,t) に入らない限り SupState(β,t) を自動変更してはならない。
  - recipient_alias と replay_or_digest_export は stage boundary を越えて自動継承してはならず、explicit successor proof と linkage predicate を要する。
  - archive manifest object は immutable であり、state 遷移は linkage record にのみ作用しなければならない。
  - flat な single bundle への暗黙 flattening によって HCur(h,t) の検査を省略してはならない。
  residual_open_points:
  - allocation_witness の numeric / set-valued / probabilistic family をどこまで canonical parameter 化するか
  - bundle-of-bundles を super_bundle / sub_bundle の2層に固定するか、recursive nesting をどこまで parameter 化するか
  - handoff manifest の rollback / reopen / replay splice を、stage DAG と lineage continuity の上でどう parameter 化するか
allocation_witness_family_registry_model:
  status: provisional_fixed
  statement: allocation_witness_family_registry_model は、allocation_witness を numeric / set_valued / probabilistic の3 family と canonical class で形式化し、context ごとの mandatory predicate、comparability、downgrade barrier、sole-current-basis 禁止条件を判定するモデルである。
  primitives:
    family_kind: φ ∈ {numeric, set_valued, probabilistic}
    context: ξ ∈ {sub_bundle_local_current, super_bundle_coverage, handoff_manifest_current, anti_downgrade_check, replay_recipient_alias_downstream_digest}
    requirement_state: ρ ∈ {mandatory, conditional, optional, forbidden}
    numeric_class: ν ∈ {conserved_quantity_balance, bounded_share_vector, weighted_capacity_or_vote}
    set_class: σ ∈ {exhaustive_partition_set, coverage_membership_set, route_assignment_relation}
    probabilistic_class: π ∈ {calibrated_branch_distribution, ambiguous_mapping_posterior, risk_envelope_distribution}
    witness: w = (witness_id, family_kind, class_ref, scope_ref, provenance_ref, instance_digest_ref)
  imported_predicates:
    super_bundle_state: SupState(β,t) from staged_bundle_of_bundles_canonical_schema_model
    handoff_current: HCur(h,t) from staged_bundle_of_bundles_canonical_schema_model
    local_claim_state: ClaimState(c,t) from simultaneous_suite_revision_dual_validity_model
  functions:
    family_requirement: FamReq(ξ,t)= {set_valued} if ξ∈{super_bundle_coverage, handoff_manifest_current, replay_recipient_alias_downstream_digest}; {numeric,set_valued} if ξ=sub_bundle_local_current and both quantity_conservation_required(t)=true and identity_binding_required(t)=true; {set_valued} with optional numeric if ξ=anti_downgrade_check and deterministic mapping required; {numeric} or {set_valued} by local topology otherwise
    numeric_comparability: NumCmpOK(w1,w2)=true iff family_kind(w1)=family_kind(w2)=numeric and quantity_family_ref(w1)=quantity_family_ref(w2) and canonical_unit_ref(w1)=canonical_unit_ref(w2) and denominator_scope_ref_or_null(w1)=denominator_scope_ref_or_null(w2) and tolerance_profile_ref(w1)=tolerance_profile_ref(w2) and measurement_window_ref_or_null(w1)=measurement_window_ref_or_null(w2)
    set_comparability: SetCmpOK(w1,w2)=true iff family_kind(w1)=family_kind(w2)=set_valued and universe_ref(w1)=universe_ref(w2) and canonical_identity_profile_ref(w1)=canonical_identity_profile_ref(w2) and partition_mode(w1)=partition_mode(w2) and scope_cut_ref_or_null(w1)=scope_cut_ref_or_null(w2)
    probabilistic_comparability: ProbCmpOK(w1,w2)=true iff family_kind(w1)=family_kind(w2)=probabilistic and hypothesis_universe_ref(w1)=hypothesis_universe_ref(w2) and calibration_profile_ref(w1)=calibration_profile_ref(w2) and scoring_rule_ref(w1)=scoring_rule_ref(w2) and evidence_window_ref(w1)=evidence_window_ref(w2)
    witness_admissibility: WOK(w,ξ,t)= false if family_kind(w)=probabilistic and ξ∈{handoff_manifest_current,replay_recipient_alias_downstream_digest}; false if family_kind(w)=numeric and identity_binding_required(ξ,t)=true; false if family_kind(w)=set_valued and class_ref(w)=coverage_membership_set and exclusivity_required(ξ,t)=true and completeness_flag(w)=false; true if family_kind(w)=numeric and NumCmpOK(w,required_numeric_profile(ξ,t))=true and balance_ok(w,ξ,t)=true; true if family_kind(w)=set_valued and SetCmpOK(w,required_set_profile(ξ,t))=true and membership_ok(w,ξ,t)=true; true if family_kind(w)=probabilistic and ξ=anti_downgrade_check and ProbCmpOK(w,required_prob_profile(t))=true and diagnostic_only_flag(w)=true; false otherwise
    sole_current_basis: SoleOK(W,ξ,t)=true iff FamReq(ξ,t) ⊆ {family_kind(w) | w∈W and WOK(w,ξ,t)=true} and not (all family_kind(w)=probabilistic for w in W) and not (ξ∈{super_bundle_coverage,handoff_manifest_current,replay_recipient_alias_downstream_digest} and all family_kind(w)≠set_valued for w in W)
    downgrade_block: DownBlock(W_old,W_new,ξ)=true iff exists w_old∈W_old such that family_kind(w_old)=set_valued and identity_binding_required(ξ)=true and every admissible w_new∈W_new has family_kind(w_new)∈{numeric,probabilistic}; or exists deterministic_old∈W_old and probabilistic_new∈W_new with calibration_profile_ref(probabilistic_new) not comparable to deterministic_old
  invariants:
  - ξ∈{super_bundle_coverage,handoff_manifest_current,replay_recipient_alias_downstream_digest} で set_valued witness が存在しないなら SoleOK=false でなければならない。
  - probabilistic witness は super_bundle current、handoff current、recipient alias continuity の sole current basis にしてはならない。
  - identity_binding_required(ξ,t)=true なら numeric witness だけで current continuity を主張してはならない。
  - composite / derived metric を numeric witness として current 判定へ使うときは canonical decomposition registry が not null でなければならない。
  - calibration profile / scoring rule / evidence window が一致しない probabilistic witness を silent に合成して anti-downgrade pass を主張してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - witness_family_ref
      - witness_class_ref
      - context_ref
      - requirement_state
      - comparator_profile_ref
      - downgrade_barrier_ref
    GraphEngine:
      required_fields:
      - witness_instance_digest_ref
      - scope_ref
      - quantity_or_universe_ref
      - admissibility_result
      - sole_current_basis_flag
    GraphLint:
      forbidden_fields:
      - numeric_only_current_claim_when_identity_binding_required
      - probabilistic_only_current_claim
      - incomparable_probabilistic_merge
      - coverage_set_used_as_partition_without_exclusivity_check
  residual_open_points:
  - bundle-of-bundles を super_bundle / sub_bundle の2層に固定するか、recursive nesting をどこまで parameter 化するか
  - recursive nesting を許す場合の stage DAG / dependency / inheritance constraint をどこまで parameter 化するか
  - handoff manifest の rollback / reopen / replay splice を、stage DAG と lineage continuity の上でどう parameter 化するか
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで parameter 化するか
allocation_witness_composite_decomposition_model:
  status: provisional_fixed
  statement: allocation_witness_composite_decomposition_model は、composite unit / derived metric を family component の有限集合へ分解し、lawful decomposition・context ごとの mandatory component・comparison exclusion・togetherness rule を parameter 化するモデルである。
  primitives:
    composite_witness: ω ∈ Ω
    component: κ ∈ K
    family_kind: φ(κ) ∈ {numeric, set_valued, probabilistic}
    context: ξ ∈ {sub_bundle_local_current, super_bundle_coverage, handoff_manifest_current, replay_recipient_alias_downstream_digest}
    decomposition_map: Dec(ω)=⟨κ_1,...,κ_n⟩
    derived_metric: μ = Agg(Dec(ω), profile)
    comparison_state: χ ∈ {admissible, comparison_excluded, diagnostic_only}
  imported_predicates:
    family_admissibility: WOK(κ,ξ,t) from allocation_witness_family_registry_model
    family_requirement: FamReq(ξ,t) from allocation_witness_family_registry_model
    super_bundle_state: SupState(β,t) from staged_bundle_of_bundles_canonical_schema_model
    handoff_current: HCur(h,t) from handoff_manifest_rollback_reopen_replay_splice_model
  functions:
    lawful_decomposition: DecOK(ω,ξ,t)=true iff every κ in Dec(ω) maps to exactly one canonical family class, family-specific comparator fields are preserved, provenance_link(κ,ω) is explicit, and no mandatory deterministic component required by FamReq(ξ,t) is silently dropped
    mandatory_component_set: MandComp(ξ,t)= {set_valued} if ξ∈{super_bundle_coverage,handoff_manifest_current,replay_recipient_alias_downstream_digest}; {numeric,set_valued} if ξ=sub_bundle_local_current and quantity_conservation_required(t)=true and identity_binding_required(t)=true; {set_valued} if ξ=sub_bundle_local_current and identity_binding_required(t)=true only; {numeric} if ξ=sub_bundle_local_current and pure_quantity_balancing(t)=true
    togetherness: TogOK(ω,ξ,t)=true iff MandComp(ξ,t) ⊆ {φ(κ) | κ∈Dec(ω) and WOK(κ,ξ,t)=true} and every dependency-linked pair of numeric/set_valued components required for the same claim is evaluated within the same decomposition packet
    comparison_exclusion: Excl(ω,ξ,t)=true iff DecOK(ω,ξ,t)=false or TogOK(ω,ξ,t)=false or exists κ in Dec(ω) with family-specific comparator mismatch or exists probabilistic-only support for a deterministic current claim
    derived_metric_admissibility: DerOK(μ,ω,ξ,t)=diagnostic_only if Excl(ω,ξ,t)=false and μ is used only for ranking/triage/overlay; admissible_as_support if Excl(ω,ξ,t)=false and μ does not replace any member of MandComp(ξ,t); comparison_excluded otherwise
    downgrade_barrier: DecDownBlock(ω_old,ω_new,ξ)=true iff there exists κ_old in Dec(ω_old) with φ(κ_old)=set_valued and φ(κ)≠set_valued for every admissible κ in Dec(ω_new); or there exists deterministic κ_old replaced only by probabilistic κ_new in a current continuity claim
  invariants:
  - Excl(ω,ξ,t)=true なら ω を current comparison に使ってはならない。
  - ξ∈{super_bundle_coverage,handoff_manifest_current,replay_recipient_alias_downstream_digest} で φ(κ)=set_valued の admissible component が存在しないなら TogOK(ω,ξ,t)=false でなければならない。
  - quantity_conservation_required(t)=true かつ identity_binding_required(t)=true の sub_bundle local current では numeric と set_valued を同時に満たさない限り admissible current になってはならない。
  - probabilistic component または derived risk score だけで deterministic current continuity を主張してはならない。
  - derived metric は Agg と source component を追跡できる provenance を持たない限り admissible_as_support になってはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - decomposition_schema_ref
      - component_family_set
      - mandatory_component_set_ref
      - comparison_exclusion_reason_or_null
      - derived_metric_role
    GraphEngine:
      required_fields:
      - component_instance_refs
      - family_admissibility_vector
      - togetherness_result
      - derived_metric_state
    GraphLint:
      forbidden_fields:
      - undeclared_composite_metric_as_current_basis
      - missing_mandatory_set_component
      - identity_binding_numeric_only_decomposition
      - probabilistic_only_current_continuity_claim
  residual_open_points:
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで parameter 化するか
  - central delegation charter の jurisdiction family / authority family taxonomy をどこまで parameter 化するか
  - HSM attestation packet / human observer credential の external serialization notation をどこまで parameter 化するか
recursive_bundle_of_bundles_stage_dag_model:
  status: provisional_fixed
  statement: recursive_bundle_of_bundles_stage_dag_model は、bundle-of-bundles の recursive nesting を rooted tree containment、parent ごとの child DAG、lowest common ancestor boundary interface、monotone strengthening override で parameter 化し、nested super_bundle / sub_bundle 間の dependency・inheritance・current admissibility を well-founded に保つモデルである。
  primitives:
    node: x ∈ N = Bsup ∪ Bsub
    nested_super_bundle: β ∈ Bsup
    leaf_sub_bundle: b ∈ Bsub
    boundary_interface: ι ∈ I
    node_state: σ ∈ {current, freeze, verify_only, tombstone, cut}
  imported_predicates:
    leaf_state: SubState(b,t) from staged_bundle_of_bundles_canonical_schema_model
    handoff_current: HCur(h,t) from staged_bundle_of_bundles_canonical_schema_model
    witness_admissibility: WOK(w,ξ,t) from allocation_witness_family_registry_model
  functions:
    parent: Par(x) = immediate parent super_bundle or ⊥
    children: Child(β)= {x ∈ N | Par(x)=β}
    depth: Depth(x)= tree depth induced by Par
    unique_parent: UPar(x)=true iff x=root or there exists exactly one β with Par(x)=β
    containment_acyclicity: TreeOK=true iff transitive closure of Par has no cycle and each transition program has exactly one root super_bundle
    local_stage_dag: DagOK(β)=true iff the immediate dependency graph over Child(β) is acyclic
    lowest_common_ancestor: LCA(x,y)= unique lowest β such that x,y are descendants of β
    boundary_interface_declared: IfcOK(x,y)=true iff there exists ι at LCA(x,y) with source_boundary(x), target_boundary(y), handoff_or_linkage_rule(ι)
    edge_admissibility: DepOK(x,y)=true iff (Par(x)=Par(y) and immediate_edge_declared(x,y)=true) or (LCA(x,y)≠⊥ and IfcOK(x,y)=true and ancestor_order_respected(x,y)=true)
    mandatory_children: MandNode(β,t)= mandatory immediate children required by coverage_rule(β,t)
    mandatory_interfaces: MandIfc(β,t)= mandatory boundary interfaces / handoffs required by coverage_rule(β,t)
    child_override_monotonicity: OvrOK(β_child,β_parent)=true iff every parent mandatory rule remains mandatory or stronger at β_child
    node_state: NodeState(x,t)= leaf_state(x,t) if x∈Bsub; SupRecState(x,t) otherwise
    recursive_super_state: SupRecState(β,t)= tombstone if TreeOK=false or any x in MandNode(β,t) has NodeState(x,t) in {tombstone, cut} or any mandatory interface in MandIfc(β,t) is invalid; freeze if any x in MandNode(β,t) has NodeState(x,t)=freeze or any mandatory interface in MandIfc(β,t) is freeze; verify_only if every mandatory child/interface is in {current, verify_only} and current issuance is not permitted by coverage_rule(β,t); current if DagOK(β)=true and OvrOK(child,β)=true for every child and every x in MandNode(β,t) has NodeState(x,t)=current and every interface in MandIfc(β,t) is current; cut otherwise
    nonlocal_projection: LiftOK(a,β,t)=true iff artifact a scoped below β has explicit successor proof and linkage at every crossed LCA boundary
  invariants:
  - x≠root なら UPar(x)=true でなければならない。multi-parent shared child は許されない。
  - すべての β について DagOK(β)=true でなければならない。child DAG に cycle を作ってはならない。
  - DepOK(x,y)=false の dependency を current basis に使ってはならない。cross-branch dependency には LCA boundary interface が要る。
  - OvrOK(child,parent)=false なら child policy を current admissibility 判定に使ってはならない。child override は parent mandatory rule を弱めてはならない。
  - NodeState(child,t)=current は ancestor current を含意しないが、SupRecState(β,t)=current なら MandNode(β,t) と MandIfc(β,t) はすべて current でなければならない。
  - 非依存 branch の freeze / verify_only / tombstone は mandatory closure に入らない限り ancestor current を自動変更してはならない。
  - recipient alias / replay export / downstream digest は LiftOK=false のまま ancestor / sibling scope で current use してはならない。
  residual_open_points:
  - handoff manifest の rollback / reopen / replay splice を、stage DAG と lineage continuity の上でどう parameter 化するか
  - allocation_witness の composite unit / derived metric を family registry とどう parameter 化するか
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで parameter 化するか
handoff_manifest_rollback_reopen_replay_splice_model:
  status: provisional_fixed
  statement: handoff_manifest_rollback_reopen_replay_splice_model は、nested stage DAG 上の handoff_manifest に対する rollback / reopen / replay splice を、archive manifest immutable・append-only linkage event・same-boundary repair・mandatory closure / LCA fanout propagation・predecessor/current/successor witness cell の切替として parameter 化するモデルである。
  primitives:
    handoff_manifest: h ∈ Handoff
    event: ε ∈ Ev_h
    event_kind: κ ∈ {rollback, reopen, replay_splice}
    propagation_scope: ρ ∈ {local_only, ancestor_chain, lca_fanout, escalate, false_candidate}
    handoff_state: η ∈ {current, reopen_pending, rolled_back, spliced_current, verify_only, freeze, cut, tombstone}
    linkage_cell: λ ∈ {predecessor_witness_cell, current_linkage_cell, successor_witness_cell}
  imported_predicates:
    base_handoff_current: HBaseCur(h,t) = HCur(h,t) from staged_bundle_of_bundles_canonical_schema_model
    super_bundle_state: SupState(β,t) from staged_bundle_of_bundles_canonical_schema_model
    recursive_node_state: NodeState(x,t) from recursive_bundle_of_bundles_stage_dag_model
    nonlocal_projection: LiftOK(a,β,t) from recursive_bundle_of_bundles_stage_dag_model
    family_witness_admissibility: FamReq(ξ,t) from allocation_witness_family_registry_model
  functions:
    handoff_source: Src(h)= source_sub_bundle_ref(h)
    handoff_target: Tgt(h)= target_sub_bundle_ref(h)
    boundary_lca: BLCA(h)= lowest common ancestor of Src(h), Tgt(h)
    ancestor_closure: Anc(h,t)= { β | h is in the mandatory interface closure used by β at t }
    export_cross_use: XUse(h,t)=true iff there exists artifact a such that a depends on h, Proj(a,t)∈{replay_or_digest_export,recipient_alias}, and a is current outside the local scope of h
    same_boundary_repair: SBR(ε,h)=true iff source_ref(ε)=Src(h) and target_ref(ε)=Tgt(h) and boundary_kind(ε)=stage_boundary_kind(h) and charter_ref(ε)=handoff_charter_ref(h) and scope_cut_ref(ε)=scope_cut_ref(h) and recipient_export_boundary_class(ε)=recipient_export_boundary_class(h)
    rollback_admissibility: RbOK(ε,h,t)=true iff kind(ε)=rollback and HState(h,t)∈{current,spliced_current,freeze,verify_only} and lawful_rollback_target(ε,h)=true and required_authority_present(ε,h,t)=true
    reopen_admissibility: RoOK(ε,h,t)=true iff kind(ε)=reopen and SBR(ε,h)=true and same_frame_repair_path(ε,h,t)=true and not recipient_class_widening(ε) and not branch_retarget(ε)
    splice_admissibility: SpOK(ε,h,t)=true iff kind(ε)=replay_splice and archived_manifest_rewrite(ε)=false and explicit_successor_proof(ε)=true and declared_lca_boundary_interface(BLCA(h),ε)=true and successor_witness_complete(ε,t)=true
    ancestor_digest_change: AChg(ε,h,t)=true iff rollback_or_splice_changes_mandatory_interface_status(ε,h,t)=true or lineage_digest_summary_changes(ε,h,t)=true
    propagation_scope: Prop(ε,h,t)= local_only if (RoOK(ε,h,t)=true or RbOK(ε,h,t)=true) and AChg(ε,h,t)=false and XUse(h,t)=false; ancestor_chain if AChg(ε,h,t)=true and XUse(h,t)=false and branch_retarget(ε)=false; lca_fanout if XUse(h,t)=true or (kind(ε)=replay_splice and branch_retarget(ε)=true); escalate if lawful_upper_path_exists(ε,h,t)=true and (RbOK(ε,h,t)=false and RoOK(ε,h,t)=false and SpOK(ε,h,t)=false); false_candidate otherwise
    latest_event: Last(h,t)= latest admissible event for h at or before t
    handoff_state: HState(h,t)= tombstone if base_manifest_invalid(h,t)=true; cut if Last(h,t) exists and Prop(Last(h,t),h,t)=false_candidate; reopen_pending if Last(h,t) exists and kind(Last(h,t))=reopen and replacement_witness_complete(Last(h,t),t)=false; rolled_back if Last(h,t) exists and kind(Last(h,t))=rollback and no later admissible replay_splice exists; spliced_current if Last(h,t) exists and kind(Last(h,t))=replay_splice and SpOK(Last(h,t),h,t)=true; freeze if partial_authority_or_witness(h,t)=true; verify_only if every mandatory witness is in {current,verify_only} and current issuance is forbidden; current if HBaseCur(h,t)=true; cut otherwise
    effective_handoff_current: HEffCur(h,t)=true iff HState(h,t)∈{current,spliced_current}
    witness_pointer: WPtr(h,t,λ)= archived_source_close_witness(h) if λ=predecessor_witness_cell; active_linkage_ref(h,t) if λ=current_linkage_cell; successor_linkage_ref_or_null(h,t) if λ=successor_witness_cell
  invariants:
  - archived handoff_manifest object、source_exit archive manifest digest、target_entry archive manifest digest は rollback / reopen / replay splice で rewrite してはならない。
  - RoOK(ε,h,t)=true であるためには SBR(ε,h)=true でなければならない。source / target / scope cut / charter / recipient-export boundary class を変えるものは reopen ではなく replay_splice または reframe である。
  - Prop(ε,h,t)=local_only の event は Anc(h,t) の外側の ancestor current と non-dependent sibling current を変更してはならない。
  - SpOK(ε,h,t)=true であるためには explicit successor proof と declared LCA boundary interface が必要であり、silent retarget を current continuity basis に使ってはならない。
  - same current continuity claim は splice record なしに predecessor_witness_cell と successor_witness_cell を無記名混在させてはならない。
  - replay_or_digest_export と recipient_alias の current continuity は WPtr(h,t,current_linkage_cell) または WPtr(h,t,successor_witness_cell) に束縛されなければならず、archived manifest object へ直接束縛してはならない。
  - HState(h,t)=rolled_back は archived predecessor evidence の無効化を意味せず、current continuity claim の撤回だけを意味する。
  tool_projection:
    DecisionLedger:
      required_fields:
      - event_id
      - event_kind
      - affected_handoff_manifest_ref
      - boundary_lca_ref
      - supersedes_linkage_ref_or_null
      - propagation_scope
      - predecessor_witness_cell_ref
      - current_linkage_cell_ref
      - successor_witness_cell_ref_or_null
      - lineage_digest_summary_ref_or_delta
    GraphEngine:
      required_fields:
      - dependency_closure_ref
      - ancestor_recompute_set
      - lca_fanout_set
      - local_only_flag
      - active_linkage_ref
      - export_continuity_rebind_ref_set
    GraphLint:
      checks:
      - archived_manifest_rewrite_detected
      - silent_boundary_change_under_reopen
      - undeclared_lca_retarget
      - unnamed_predecessor_successor_mixing
      - export_continuity_bound_to_archived_manifest
  residual_open_points:
  - allocation_witness の composite unit / derived metric を family registry とどう parameter 化するか
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで parameter 化するか
  - central delegation charter の jurisdiction family / authority family taxonomy をどこまで registry parameter として切り出すか
probabilistic_allocation_witness_registry_model:
  status: provisional_fixed
  statement: probabilistic_allocation_witness_registry_model は、probabilistic allocation_witness を class / calibration stratum / scoring rule / evidence window / confidence floor / risk threshold を持つ registry cell として parameter 化し、deterministic current basis を代替させずに verify_only / freeze / triage / anti-downgrade suspicion へ接続するモデルである。
  primitives:
    probabilistic_class: π ∈ {calibrated_branch_distribution, ambiguous_mapping_posterior, risk_envelope_distribution}
    context: ξ ∈ {sub_bundle_local_current, super_bundle_coverage, handoff_manifest_current, anti_downgrade_check, replay_recipient_alias_downstream_digest}
    role_state: ρ ∈ {diagnostic_only, verify_only_trigger, freeze_trigger, triage_trigger, downgrade_guard, forbidden}
    action_state: α ∈ {no_penalty, verify_only, freeze, triage, escalate, false_candidate}
    probabilistic_profile: P = (probabilistic_class, hypothesis_or_consequence_universe_ref, calibration_stratum_ref, calibration_profile_ref, scoring_rule_ref, evidence_window_ref, confidence_floor_ref, threshold_profile_ref, decision_cost_profile_ref, allowed_context_set, forbidden_context_set, drift_monitor_ref_or_null)
    score_vector: S = (calibration_score, ambiguity_score_or_null, tail_risk_score_or_null, sample_coverage_score, drift_score_or_null)
    probabilistic_witness: w = (witness_id, probabilistic_class, profile_ref, score_vector_ref, provenance_ref, instance_digest_ref)
  imported_predicates:
    family_requirement: FamReq(ξ,t) from allocation_witness_family_registry_model
    probabilistic_comparability: ProbCmpOK(w1,w2) from allocation_witness_family_registry_model
    witness_admissibility: WOK(w,ξ,t) from allocation_witness_family_registry_model
  functions:
    role_projection: Role(π,ξ)= forbidden if ξ∈{handoff_manifest_current,replay_recipient_alias_downstream_digest}; downgrade_guard if ξ=anti_downgrade_check; diagnostic_only if ξ∈{sub_bundle_local_current,super_bundle_coverage} and π∈{calibrated_branch_distribution,ambiguous_mapping_posterior}; triage_trigger if ξ∈{sub_bundle_local_current,super_bundle_coverage} and π=risk_envelope_distribution; diagnostic_only otherwise
    profile_match: ProfOK(w,P)=true iff class_ref(w)=probabilistic_class(P) and hypothesis_or_consequence_universe_ref(w)=hypothesis_or_consequence_universe_ref(P) and calibration_stratum_ref(w)=calibration_stratum_ref(P) and calibration_profile_ref(w)=calibration_profile_ref(P) and scoring_rule_ref(w)=scoring_rule_ref(P) and evidence_window_ref(w)=evidence_window_ref(P) and decision_cost_profile_ref(w)=decision_cost_profile_ref(P)
    deterministic_guard: DetGuard(W_det,ξ,t)=true iff for every family φ in FamReq(ξ,t), there exists w∈W_det such that family_kind(w)=φ and family_kind(w)≠probabilistic and WOK(w,ξ,t)=true
    score_extraction: Score(w)= referenced score vector of w
    threshold_action: Act(w,P,ξ,t)= false_candidate if ProfOK(w,P)=false or evidence_window_live(w,P,t)=false or drift_within_cap(w,P,t)=false; escalate if Role(class_ref(w),ξ)=forbidden and attempted_as_current_basis(w,ξ,t)=true; freeze if calibration_score(Score(w)) < freeze_confidence_floor(P) or ambiguity_score(Score(w)) > freeze_ambiguity_cap(P) or tail_risk_score(Score(w)) > freeze_risk_cap(P); verify_only if calibration_score(Score(w)) < confidence_floor_ref(P) or sample_coverage_score(Score(w)) < review_floor(P); triage if class_ref(w)=risk_envelope_distribution and tail_risk_score(Score(w)) > triage_risk_cap(P); no_penalty otherwise
    overlay_admissibility: ProbUseOK(w,P,ξ,t)=true iff ProfOK(w,P)=true and Role(class_ref(w),ξ)≠forbidden and evidence_window_live(w,P,t)=true and drift_within_cap(w,P,t)=true
    worst_action: Worst(W_prob,Pset,ξ,t)= maximum severity action among {Act(w,P,ξ,t) | w∈W_prob, P∈Pset, profile_ref(w)=profile_id(P)} with order no_penalty < verify_only < freeze < triage < escalate < false_candidate
    anti_downgrade_pass: AntiDownPass(W_prob,W_det,Pset,t)=true iff DetGuard(W_det,anti_downgrade_check,t)=true and Worst(W_prob,Pset,anti_downgrade_check,t) = no_penalty
    current_promotion_block: CurBlock(W_prob,W_det,Pset,ξ,t)=true iff DetGuard(W_det,ξ,t)=false or Worst(W_prob,Pset,ξ,t)∈{verify_only,freeze,triage,escalate,false_candidate} or ξ∈{handoff_manifest_current,replay_recipient_alias_downstream_digest}
  invariants:
  - DetGuard(W_det,ξ,t)=false のとき、probabilistic witness は current claim を成立させてはならない。
  - ξ∈{handoff_manifest_current,replay_recipient_alias_downstream_digest} では、ProbUseOK=true であっても probabilistic witness を current basis に使ってはならない。
  - AntiDownPass=true であるためには deterministic family の mandatory 条件が先に満たされていなければならず、probabilistic witness 単独で downgrade block を解除してはならない。
  - ProfOK=false または ProbCmpOK=false の probabilistic witness を silent に平均化・合成して threshold action を計算してはならない。
  - Act が no_penalty であっても、それは追加 penalty がないことを意味するだけで、deterministic pass や lawful continuity の証明を意味してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - probabilistic_class_ref
      - profile_ref
      - score_vector_ref
      - threshold_action
      - decision_cost_profile_ref
      - deterministic_guard_result
      - forbidden_context_flag
    GraphEngine:
      required_fields:
      - evidence_window_live_flag
      - drift_monitor_result
      - calibration_score
      - ambiguity_score_or_null
      - tail_risk_score_or_null
      - worst_action
      - current_promotion_block_flag
    GraphLint:
      checks:
      - probabilistic_only_current_claim
      - low_risk_used_to_clear_deterministic_block
      - forbidden_context_probabilistic_basis
      - cross_profile_probabilistic_merge
      - silent_scoring_rule_swap
  residual_open_points:
  - central delegation charter の jurisdiction family / authority family taxonomy をどこまで registry parameter として切り出すか
  - HSM attestation packet / human observer credential の external serialization notation をどこまで parameter 化するか
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで parameter 化するか
freshness_expiry_registry_model:
  status: provisional_fixed
  statement: freshness_expiry_registry_model は、evidence freshness と case hard expiry を別 registry として定義し、profile baseline と context cap の合成で admissibility を決める形式モデルである。
  notation:
    source_family: σ
    claim_facet: ψ
    detector_family: δ
    profile: π
    context: Ω
    freshness_cell: FC=(σ,ψ,π)
    expiry_cell: EC=(δ,ψ,π)
    freshness_window: FW(FC,Ω)
    grace_window: GW(FC,Ω)
    hard_expiry: HE(EC,Ω)
    freshness_state: FS(ε,t) ∈ {live, grace, stale, invalid}
    case_support_state: CS(χ,t) ∈ {live_case, grace_case, expired_case, invalid_case}
  axioms:
  - FW(FC,Ω) < HE(EC,Ω) を要求しないが、confirmed branch に使えるのは常に FS=live の evidence だけである。
  - CS(χ,t)=expired_case iff age(χ,t) > HE(EC,Ω) または epoch_split / revocation / invalidity trigger がある。
  - context cap は FW, GW, HE を短縮または同値維持にだけ作用し、延長は許さない。
  - history retention と prospective admissibility は別であり、expired_case でも archive/history としては保持できる。
  registry_schema:
    freshness_cell_fields:
    - source_family
    - claim_facet
    - baseline_profile
    - freshness_window
    - grace_window_or_null
    - integrity_floor
    - provenance_floor
    - mirror_lag_budget_ref
    expiry_cell_fields:
    - detector_family
    - claim_facet
    - baseline_profile
    - aggregation_window
    - hard_expiry
    - live_only_branch_set
    - grace_admissible_branch_set
    context_cap_fields:
    - context_tag
    - cell_selector
    - shortening_rule
    - hard_cap
    - stricter_only
  binding_rules:
  - FS=grace は hold / suspend / manual review の補助に限定し、confirm / release / external commitment に使わない。
  - hard expiry 超過は new epoch を要求し、stale support の暗黙 carry-over を禁止する。
  - freshness registry cell と expiry registry cell は同じ profile でも別 id で束縛する。
  resolved_boundary:
  - evidence admissibility window と case carry-over window の canonical separation
  - profile baseline + context cap の registry composition
  - review_due / grace / expired の branch semantics
  residual_open_points: []
detector_abuse_anchor_binding_model:
  status: provisional_fixed
  statement: detector_abuse_anchor_binding_model は、detector family ごとに direct abuse anchor DAA と detector abuse anchor TAA の最小束縛を分離し、penalty / suspend / confirm branch への到達条件を定める形式モデルである。
  notation:
    detector_family: δ ∈ {sink_identity_and_reach, route_access_and_owner, cadence_burst, replay_lineage, semantic_delta_and_policy_drift}
    direct_abuse_anchor: DAA(δ)
    detector_abuse_anchor: TAA(δ)
    separated_corroboration: SC
    final_penalty_ready: FPR(δ)=true iff DAA(δ) ∧ freshness_live ∧ replayable
    suspend_ready: SR(δ)=true iff TAA(δ) ∨ (DAA(δ) ∧ protected_facet_touch)
  axioms:
  - FPR(δ) ⇒ SR(δ) だが、SR(δ) ⇏ FPR(δ) である。
  - TAA(δ) は degrade / suspend / manual_review を開けるが、final penalty や malicious intent confirm の十分条件ではない。
  - SC は TAA(δ) を補強できるが、protected facet または external commitment に触れる最終 judgement では DAA(δ) を原則要求する。
  family_binding_table:
    sink_identity_and_reach:
      DAA:
      - direct sink identity/reach
      - authoritative route/access witness
      - prohibited effect realization or attempt
      TAA:
      - mirror poisoning or access-log suppression
      - same facet corroboration or authoritative mismatch
      - protected/externality touch
    route_access_and_owner:
      DAA:
      - unauthorized access trace
      - actor/credential/owner mismatch
      - current route relevance
      TAA:
      - threshold bypass or log omission
      - route_identity/owner_binding replayable witness
      - protected binding hit
    cadence_burst:
      DAA:
      - queue saturation/probing/retry storm direct trace
      - protected sink reachability
      - lawful burst witness absent
      TAA:
      - density breach + hidden coupling concentration
      - duplicate/replay/mirror reuse
      - same-family burst packet
    replay_lineage:
      DAA:
      - exact concealed lineage/hash reuse
      - cross-epoch reuse after expiry/revocation
      - confirm path contamination
      TAA:
      - duplicate digest inconsistency
      - wrapper-only diversification
      - cluster representative conflict
    semantic_delta_and_policy_drift:
      DAA:
      - unannounced material threshold/route/schema change
      - protected facet benchmark drift
      - active branch meaning change
      TAA:
      - calibration bypass or hidden coupling concealment
      - semantic delta material/unresolved
      - policy/externality sensitive context
  branch_rules:
    manual_review: SR(δ)=true のとき開く。
    suspend_or_degrade: TAA(δ)=true で protected facet または externality-sensitive context に触れるとき開く。
    final_penalty_or_confirmed_attack_like: FPR(δ)=true かつ required counterexample rejection を満たすときだけ開く。
  residual_open_points: []
joint_change_artifact_contribution_model:
  status: provisional_fixed
  statement: joint_change_artifact_contribution_model は、prompt_pack / rulepack / template_bundle の joint change を benchmark cell 上の counterfactual replay で分解し、artifact ごとの最小寄与 class を与える形式モデルである。
  notation:
    artifact_set: A={p,r,t}
    benchmark_cell: λ
    replay_run: R_λ(S) where S ⊆ A
    facet_set: Φ
    contribution_class: CC(a,φ) ∈ {decisive_primary, required_joint, modulating, observational_only, unresolved_joint}
  minimum_matrix:
  - R_λ(∅)
  - R_λ({p})
  - R_λ({r})
  - R_λ({t})
  - R_λ({p,r})
  - R_λ({p,t})
  - R_λ({r,t})
  - R_λ({p,r,t})
  classification_rules:
  - CC(a,φ)=decisive_primary iff R_λ({a}) が protected outcome または decision branch を baseline から一貫して変える。
  - CC(a,φ)=required_joint iff 単独では変わらないが、変化が起きる全ての successful pair/full bundle に a が含まれる。
  - CC(a,φ)=modulating iff branch は不変だが severity/confidence/blast radius/review requirement を変える。
  - CC(a,φ)=observational_only iff execution-semantic no-op で render/presentation 影響に限られる。
  - CC(a,φ)=unresolved_joint iff benchmark coverage / witness / facet mapping / replay matrix が不足する。
  admissibility_constraints:
  - decisive_primary または required_joint を主張するには benchmark_cell_ref と negative_case_ref を必須とする。
  - protected facet に関する attribution は unaffected facet negative case を伴わなければならない。
  - lexical diff だけでは CC を決められない。
  residual_open_points: []
replay_benchmark_registry_model:
  status: provisional_fixed
  statement: replay_benchmark_registry_model は、detector family × claim facet × criticality band × evidence strength class × portability class × profile family の canonical registry cell λ を単位に replay benchmark suite を正本化する形式モデルである。
  notation:
    detector_family: δ
    claim_facet: ψ
    criticality_band: κ
    evidence_strength_class: η
    portability_class: ρ
    profile_family: π
    benchmark_cell: λ=(δ,ψ,κ,η,ρ,π)
    suite_version: v=(major, minor, patch)
    migration_relation: Mig(λ_old, λ_new) ∈ {alias_preserving, fork_required, incompatible}
  axioms:
  - benchmark suite は λ ごとに positive/negative/boundary/stale-abuse/joint-change case set を持つ。
  - cross-profile comparability は同一 ψ と ρ を共有し、mandatory negative case と protected invariant が保存される λ 同士でだけ成立する。
  - Mig(λ_old, λ_new)=alias_preserving となるのは cell core tuple が同一で、protected invariant と mandatory negative case の意味が保存されるときに限る。
  - suite_version.major の更新は cell core tuple 変更または pass/fail semantics 変更を意味する。minor は case set 拡張、patch は metadata 修正である。
  canonical_cell_schema:
  - benchmark_cell_id
  - detector_family
  - claim_facet
  - criticality_band
  - evidence_strength_class
