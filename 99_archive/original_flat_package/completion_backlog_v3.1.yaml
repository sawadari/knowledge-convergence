operational_completion_definition:
  statement: ここでいう100%とは、理論の永遠の終了ではなく、internal tracking label v3.1 / canonical release v1 を統治可能版として凍結できる運用上の完了状態を指す。
  required_end_state:
    status_targets:
      draft: 0
      candidate: 0
      strong_candidate: 0
      open_questions: 0
      deferred_points: 0
    cross_file_consistency:
    - research_master / concepts / formalization / thread_handoff の4ファイル間で用語と論点状態が矛盾しない
    - current_priority と current_unresolved_issues と current_handoff.unresolved_issues が一致する
    - 完了済み論点は handoff の adopted_points または rejected_points のいずれかに落ちている
    decision_traceability:
    - 各重要論点に adoption_rule, rejection_rule, promotion_condition がある
    - 各重要論点に採用理由と棄却理由がある
    - 各重要論点に例外条件と禁止 shortcut がある
    - 各重要論点に最低1つの負例テストまたは破綻例がある
    implementation_readiness:
    - GraphLint に渡せる判定単位がある
    - DecisionLedger に渡せる採用・棄却・保留イベントがある
    - GraphEngine に渡せる状態遷移条件がある
    - archive object に渡せる保存・監査証跡要件がある
promotion_rules:
  draft_to_candidate:
    required:
    - 問いが1文で言える
    - 比較する選択肢が最低2つある
    - 論点の外延と非対象範囲が書かれている
    forbidden:
    - 論点自体が曖昧なまま status だけを上げる
  candidate_to_strong_candidate:
    required:
    - 比較表がある
    - 棄却理由がある
    - 最低1つの具体例に当てて破綻しない
    forbidden:
    - 採用理由だけを書き、棄却理由を書かない
  strong_candidate_to_provisional_adopted:
    required:
    - concepts と formalization の両方に反映できる
    - thread_handoff に採用・棄却・保留が記録される
    - research_master の次スレッド指示と矛盾しない
    forbidden:
    - 概念だけ固めて形式化を後回しにする
  provisional_adopted_to_provisional_fixed:
    required:
    - 例外条件が定義済みである
    - 負例テストに耐える
    - GraphLint / DecisionLedger / GraphEngine / archive object の責務分割に落ちる
    forbidden:
    - 平常系だけで固定し、緊急系と争訟系を未定義のまま残す
thread_execution_rule:
  statement: 各スレッドは考察スレッドではなく決定スレッドとして扱う。
  mandatory_output_fields:
  - 今回このスレッドで決めることは1つだけ
  - 比較する選択肢は最大3つまで
  - 各選択肢の採用メリット
  - 各選択肢の棄却理由
  - 今回の決定
  - 例外条件
  - 今回 fixed になった文
  - 今回 defer したもの
