    - reviewer_class_ref
    - required_module_ref
    - qualification_refresh_ref
    - effective_before_review_ref
    - closed_at_or_null
    rules:
    - required_module_ref のない retraining gate を reviewer retraining gate と呼んではならない。
    - qualification_refresh_ref のない gate を competency-safe doctrine adoption とみなしてはならない。
    - effective_before_review_ref のない gate を pre-review mandatory refresh と称してはならない。
  tool_responsibilities:
