    - activation_trigger_ref
    - minimum_disclosure_pack_ref
    - release_channel_ref
    - handoff_owner_ref
    - activated_at_or_null
    rules:
    - activation_trigger_ref のない lane を crisis disclosure fast lane と呼んではならない。
    - minimum_disclosure_pack_ref のない lane を minimum viable crisis disclosure とみなしてはならない。
    - handoff_owner_ref のない fast path を accountable emergency release と称してはならない。
  post_incident_retrospective_packet:
