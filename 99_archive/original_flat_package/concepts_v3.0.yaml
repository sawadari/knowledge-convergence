    - expiry_action_ref
    - legal_hold_exception_ref
    - verified_at_or_null
    rules:
    - retention_window_ref のない lane を retention expiry lane と呼んではならない。
    - expiry_action_ref のない policy を enforceable expiry control とみなしてはならない。
    - legal_hold_exception_ref のない retention override を lawful hold path と称してはならない。
