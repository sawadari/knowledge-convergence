scheduler_federation_restitution_governance:
  status: provisional_fixed
  statement: scheduler_federation_restitution_governance とは、claimant restitution reserve、payout apportionment rule、insolvency backstop を束ねて federation assurance failure 後の補填責務と支払順序を固定する規則である。
  core_claims:
  - appeal や restatement の結果として補填義務が生じうる以上、reserve floor を事前に持たなければ制度は無責任になる。
  - payout は早い者勝ちにしてはならない。claim eligibility、loss class、priority band、shared liability ratio を固定しなければ公平性を失う。
  - partner insolvency は例外処理に閉じてはならない。backstop trigger、temporary bridge source、recovery recourse を定める必要がある。
  - partial payout でも受領者通知が必要である。underfunded settlement を full remediation と誤認させてはならない。
  - reserve は数字だけでは足りない。segregation condition、liquidity window、depletion escalation がなければ実際には払えない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve registry、claim evaluation、priority lint、payout archive を分担する。
  claimant_restitution_reserve:
    required_fields:
    - reserve_id
    - reserve_floor_ref
    - segregation_condition_ref
    - liquidity_window_ref
    - depletion_escalation_ref
    - effective_window_ref
    rules:
    - reserve_floor_ref のない reserve を claimant restitution reserve と呼んではならない。
    - segregation_condition_ref のない reserve を payout-safe reserve とみなしてはならない。
    - depletion_escalation_ref のない reserve を failure-ready compensation pool と称してはならない。
  payout_apportionment_rule:
    required_fields:
    - payout_rule_id
    - claim_eligibility_ref
    - loss_class_ref
    - priority_band_ref
    - shared_liability_ratio_ref
    - partial_payout_notice_ref
    rules:
    - claim_eligibility_ref のない payout rule を payout apportionment rule と呼んではならない。
    - priority_band_ref のない payout rule を fairness-preserving payout order とみなしてはならない。
    - partial_payout_notice_ref のない payout rule を recipient-visible underfunded payout と称してはならない。
  insolvency_backstop:
    required_fields:
    - backstop_id
    - trigger_condition_ref
    - bridge_source_ref
    - recovery_recourse_ref
    - counterparty_notice_ref
    - activated_at_or_null
    rules:
    - trigger_condition_ref のない backstop を insolvency backstop と呼んではならない。
    - bridge_source_ref のない backstop を continuity-safe claimant protection とみなしてはならない。
    - recovery_recourse_ref のない backstop を recoverable emergency funding と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - restitution reserve registry
      - claim eligibility decision
      - payout apportionment binding
      - insolvency backstop activation decision
    GraphEngine:
      owns:
      - shared liability ratio calculation
      - priority-band payout projection
      - reserve depletion simulation
      - backstop source materialization
    GraphLint:
      owns:
      - underfunded reserve lint
      - missing priority band lint
      - silent partial payout lint
      - unrecoverable backstop lint
    archive_object:
      owns:
      - reserve packet
      - claim dossier archive
      - payout manifest
      - backstop recovery archive
  forbidden_shortcuts:
  - reserve floor なしで claimant protection を約束する
  - priority band なしで case-by-case 裁量配分する
  - backstop recourse なしで emergency funding を恒常化する
  residual_open_points: []
scheduler_federation_supervisory_disclosure_governance:
  status: provisional_fixed
  statement: scheduler_federation_supervisory_disclosure_governance とは、supervisory notice trigger、regulator liaison corridor、compelled disclosure replay を束ねて federation assurance の監督当局向け通知と強制開示整合を固定する規則である。
  core_claims:
  - 重大事案の通知は善意任せにしてはならない。material supervisory trigger、notice deadline、liaison owner、disclosure scope を固定しなければ regulator communication が崩れる。
  - regulator liaison は mailbox ではない。routing authority、single source packet、response log、divergence escalation を束ねなければ一貫説明ができない。
  - compelled disclosure replay がないと regulator A への開示と regulator B / public への開示が乖離する。disclosure delta を registry 化して replay 可能にする必要がある。
  - supervisory notice と public notice は同じではない。通知先、期限、秘匿範囲、recipient-visible divergence note を区別する必要がある。
  - 監督当局ごとの差分要求は否定できないが、single source packet がなければ case narrative が破綻する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は notice registry、routing graph、divergence lint、regulatory archive を分担する。
  supervisory_notice_trigger:
    required_fields:
    - notice_trigger_id
    - material_trigger_class_ref
    - notice_deadline_ref
    - liaison_owner_ref
    - disclosure_scope_ref
    - activated_at_or_null
    rules:
    - material_trigger_class_ref のない trigger を supervisory notice trigger と呼んではならない。
    - notice_deadline_ref のない trigger を time-safe regulator notice basis とみなしてはならない。
    - liaison_owner_ref のない trigger を accountable supervisory escalation と称してはならない。
  regulator_liaison_corridor:
    required_fields:
    - liaison_corridor_id
    - routing_authority_ref
    - single_source_packet_ref
    - response_log_ref
    - divergence_escalation_ref
    - closed_at_or_null
    rules:
    - routing_authority_ref のない corridor を regulator liaison corridor と呼んではならない。
    - single_source_packet_ref のない corridor を consistency-safe regulator interface とみなしてはならない。
    - response_log_ref のない corridor を auditable supervisory communication と称してはならない。
  compelled_disclosure_replay:
    required_fields:
    - replay_case_id
    - disclosure_delta_ref
    - target_regulator_ref
    - recipient_divergence_note_ref
    - replay_deadline_ref
    - closed_at_or_null
    rules:
    - disclosure_delta_ref のない replay を compelled disclosure replay と呼んではならない。
    - target_regulator_ref のない replay を regulator-specific disclosure alignment とみなしてはならない。
    - recipient_divergence_note_ref のない replay を recipient-visible divergence handling と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - supervisory notice trigger registry
      - liaison corridor decision
      - compelled disclosure replay decision
      - divergence note binding
    GraphEngine:
      owns:
      - multi-regulator routing graph
      - single source packet materialization
      - disclosure delta comparison
      - replay deadline tracking
    GraphLint:
      owns:
      - missed notice deadline lint
      - inconsistent regulator narrative lint
      - missing divergence note lint
      - unsourced disclosure delta lint
    archive_object:
      owns:
      - supervisory packet
      - liaison response archive
      - disclosure replay archive
      - divergence note manifest
  forbidden_shortcuts:
  - material trigger を informal judgment だけで通知不要にする
  - single source packet なしで regulator ごとに別 narrative を送る
  - compelled disclosure delta を later recipients に黙って隠す
  residual_open_points: []
scheduler_federation_public_transparency_governance:
  status: provisional_fixed
  statement: scheduler_federation_public_transparency_governance とは、public transparency report、assurance seal downgrade badge、recipient advisory channel を束ねて federation assurance 劣化時の一般向け開示と行動喚起の境界を固定する規則である。
  core_claims:
  - regulator への notice だけでは federation assurance failure は収束しない。public transparency report がなければ一般受領者と市場は stale trust を持ち続ける。
  - public report は広報資料ではない。reporting scope、severity band、affected recipient segment、corrective status を束ねなければ accountability packet と呼べない。
  - assurance seal downgrade badge は飾りではない。downgrade trigger、visibility surface、historical retention、reinstatement pointer がなければ badge state の変化を追跡できない。
  - recipient advisory channel は単なる FAQ ではない。recipient segment、urgency class、action menu、callback lane を固定しなければ affected recipient を実際に動かせない。
  - public transparency は sealed evidence を公開する権利ではない。market-facing caveat と bounded fact floor を保ちながら downgrade 理由を説明しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は public report registry、badge state projection、advisory routing、transparency archive を分担する。
  public_transparency_report:
    required_fields:
    - report_id
    - report_scope_ref
    - reporting_window_ref
    - severity_band_ref
    - affected_recipient_segment_ref
    - corrective_status_ref
    - published_at_or_null
    rules:
    - report_scope_ref のない disclosure を public transparency report と呼んではならない。
    - severity_band_ref のない report を badge downgrade explanation とみなしてはならない。
    - affected_recipient_segment_ref のない report を recipient-actionable transparency と称してはならない。
  assurance_seal_downgrade_badge:
    required_fields:
    - badge_event_id
    - badge_class_ref
    - downgrade_trigger_ref
    - visibility_surface_ref
    - historical_retention_ref
    - reinstatement_pointer_ref
    - activated_at_or_null
    rules:
    - downgrade_trigger_ref のない badge 変更を assurance seal downgrade と呼んではならない。
    - visibility_surface_ref のない badge を recipient-visible status signal とみなしてはならない。
    - historical_retention_ref のない badge state を auditable assurance history と称してはならない。
  recipient_advisory_channel:
    required_fields:
    - advisory_case_id
    - recipient_segment_ref
    - urgency_class_ref
    - action_menu_ref
    - callback_lane_ref
    - closure_criterion_ref
    - opened_at_or_null
    rules:
    - recipient_segment_ref のない advisory を targeted recipient advisory と呼んではならない。
    - action_menu_ref のない advisory を behavior-guiding notice とみなしてはならない。
    - callback_lane_ref のない channel を accountable advisory channel と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - public transparency report registry
      - downgrade badge decision
      - recipient advisory obligation binding
      - public caveat policy
    GraphEngine:
      owns:
      - affected recipient segmentation
      - badge surface projection
      - advisory routing
      - status synchronization across surfaces
    GraphLint:
      owns:
      - silent downgrade lint
      - missing severity band lint
      - untargeted advisory lint
      - public-overdisclosure lint
    archive_object:
      owns:
      - public report snapshot
      - badge state timeline
      - advisory publication packet
      - historical caveat manifest
  forbidden_shortcuts:
  - regulator notice 済みを理由に public disclosure を省略する
  - downgrade trigger を示さず badge だけ下げる
  - recipient action menu なしで advisory を完了扱いにする
  residual_open_points: []
scheduler_federation_transparency_archive_governance:
  status: provisional_fixed
  statement: scheduler_federation_transparency_archive_governance とは、public transparency archive index、immutable report digest、subscription diff feed を束ねて federation public disclosure の履歴・改変検知・差分配信を固定する規則である。
  core_claims:
  - public transparency は瞬間値では足りない。archive index がなければ report の supersession と badge history を追跡できない。
  - immutable report digest がない transparency report は改ざん耐性を持たない。content hash、render hash、badge state hash を束ねなければ canonical archive copy と呼べない。
  - subscription diff feed は広告配信ではない。subscriber class、diff scope、delivery cadence、replay window を固定しなければ dependable change channel と呼べない。
  - historical badge retention を report archive と分離してはならない。report supersession と badge state change は同じ lineage で辿れる必要がある。
  - archive は edit history の垂れ流しではない。publicly visible な差分と sealed reason を混在させてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は archive registry、digest validation、subscriber routing、immutable storage を分担する。
  public_transparency_archive_index:
    required_fields:
    - archive_entry_id
    - report_ref
    - canonical_url_ref
    - index_scope_ref
    - retention_window_ref
    - superseded_by_ref
    - indexed_at_or_null
    rules:
    - canonical_url_ref のない archive entry を public transparency archive index と呼んではならない。
    - index_scope_ref のない entry を searchable historical disclosure とみなしてはならない。
    - retention_window_ref のない archive を accountable public history と称してはならない。
  immutable_report_digest:
    required_fields:
    - digest_id
    - report_ref
    - content_hash_ref
    - render_hash_ref
    - badge_state_hash_ref
    - signed_at_or_null
    rules:
    - content_hash_ref のない digest を immutable report digest と呼んではならない。
    - render_hash_ref のない digest を surface-stable archive proof とみなしてはならない。
    - badge_state_hash_ref のない digest を report/badge linked evidence と称してはならない。
  subscription_diff_feed:
    required_fields:
    - feed_id
    - subscriber_class_ref
    - diff_scope_ref
    - delivery_cadence_ref
    - replay_window_ref
    - opt_out_rule_ref
    - last_published_at_or_null
    rules:
    - subscriber_class_ref のない feed を subscription diff feed と呼んではならない。
    - diff_scope_ref のない feed を bounded change notification とみなしてはならない。
    - replay_window_ref のない feed を catch-up capable subscription と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - archive index registry
      - digest signing policy
      - subscriber class binding
      - supersession lineage decision
    GraphEngine:
      owns:
      - archive linkage materialization
      - report-to-badge digest projection
      - diff feed generation
      - subscription replay routing
    GraphLint:
      owns:
      - mutable archive lint
      - missing digest lint
      - scope-leaking diff lint
      - orphaned supersession lint
    archive_object:
      owns:
      - immutable report snapshots
      - signed digest bundle
      - subscriber delivery log
      - historical badge timeline
  forbidden_shortcuts:
  - canonical archive index なしで最新版リンクだけを残す
  - digest なしで transparency report を silent edit する
  - subscriber scope を定めず diff feed を一斉配信する
  residual_open_points: []
scheduler_federation_recipient_response_governance:
  status: provisional_fixed
  statement: scheduler_federation_recipient_response_governance とは、recipient acknowledgement receipt、corrective action attestation、advisory non-response escalation を束ねて federation advisory 後の受領・是正・未応答対応を固定する規則である。
  core_claims:
  - advisory を送っただけでは recipient communication は成立しない。acknowledgement receipt がなければ delivery と comprehension を区別できない。
  - corrective action は宣言だけでは足りない。required action set、evidence slot、attester class、due window を束ねなければ corrective action attestation と呼べない。
  - non-response は単なる遅延ではない。escalation trigger、fallback contact lane、risk band を固定しなければ unresponsive high-risk recipient を扱えない。
  - recipient class ごとに expected response が異なる。critical integrator と casual downstream user を同じ due window で扱ってはならない。
  - acknowledgement と attestation は別 lane である。receipt があることと、是正完了が証明されたことを混同してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は response duty binding、deadline projection、missing-response lint、attestation archive を分担する。
  recipient_acknowledgement_receipt:
    required_fields:
    - receipt_id
    - advisory_ref
    - recipient_class_ref
    - delivery_status_ref
    - acknowledgement_deadline_ref
    - acknowledgement_state_ref
    - received_at_or_null
    rules:
    - recipient_class_ref のない receipt を recipient acknowledgement receipt と呼んではならない。
    - acknowledgement_deadline_ref のない receipt を accountable receipt lane とみなしてはならない。
    - acknowledgement_state_ref のない receipt を response-tracking artifact と称してはならない。
  corrective_action_attestation:
    required_fields:
    - attestation_id
    - advisory_ref
    - required_action_set_ref
    - evidence_slot_ref
    - attester_class_ref
    - due_at_ref
    - submitted_at_or_null
    rules:
    - required_action_set_ref のない attestation を corrective action attestation と呼んではならない。
    - evidence_slot_ref のない attestation を verifiable remediation claim とみなしてはならない。
    - attester_class_ref のない attestation を accountable response proof と称してはならない。
  advisory_non_response_escalation:
    required_fields:
    - escalation_case_id
    - advisory_ref
    - escalation_trigger_ref
    - fallback_contact_lane_ref
    - risk_band_ref
    - escalated_at_or_null
    rules:
    - escalation_trigger_ref のない follow-up を advisory non-response escalation と呼んではならない。
    - fallback_contact_lane_ref のない escalation を reachable fallback lane とみなしてはならない。
    - risk_band_ref のない escalation を risk-prioritized response control と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recipient response obligation binding
      - acknowledgement deadline policy
      - attestation admissibility decision
      - non-response escalation trigger
    GraphEngine:
      owns:
      - recipient-class due window projection
      - delivery/receipt state transition
      - action evidence routing
      - fallback contact cascade
    GraphLint:
      owns:
      - missing receipt lint
      - receipt/attestation confusion lint
      - late-response lint
      - silent high-risk non-response lint
    archive_object:
      owns:
      - receipt packet
      - attestation evidence bundle
      - escalation log
      - response timeline snapshot
  forbidden_shortcuts:
  - delivery success を acknowledgement success と同一視する
  - evidence なしの remediation claim を attestation 扱いにする
  - high-risk recipient の未応答を generic reminder だけで済ませる
  residual_open_points: []
scheduler_federation_assurance_reinstatement_governance:
  status: provisional_fixed
  statement: scheduler_federation_assurance_reinstatement_governance とは、assurance seal reinstatement criteria、probationary recovery badge、relapse downgrade ladder を束ねて federation assurance downgrade 後の回復と再劣化の扱いを固定する規則である。
  core_claims:
  - assurance recovery は自己申告では足りない。reinstatement criteria が remediation completion、verification basis、approval quorum を束ねなければ badge を戻してはならない。
  - downgrade から full recovery へ一気に戻すと false rehabilitation を招く。probationary recovery badge を通じて monitoring と restriction を残す必要がある。
  - relapse は単なる新規 downgrade ではない。prior recovery ref、relapse trigger、repeat failure window を固定しなければ repeated failure を追跡できない。
  - reinstatement と recipient advisory closure は別 lane である。badge が上がっても未完了の recipient action duty を自動で閉じてはならない。
  - probationary badge は marketing badge ではない。restriction set と monitoring cadence がなければ cautionary trust signal にならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reinstatement registry、probation projection、relapse detection、recovery history archive を分担する。
  assurance_seal_reinstatement_criteria:
    required_fields:
    - reinstatement_case_id
    - originating_downgrade_ref
    - remediation_completion_ref
    - verification_basis_ref
    - approval_quorum_ref
    - eligible_at_or_null
    rules:
    - remediation_completion_ref のない case を assurance seal reinstatement criteria と呼んではならない。
    - verification_basis_ref のない reinstatement を evidence-backed recovery とみなしてはならない。
    - approval_quorum_ref のない decision を authoritative badge restoration と称してはならない。
  probationary_recovery_badge:
    required_fields:
    - recovery_badge_id
    - badge_surface_ref
    - probation_window_ref
    - restriction_set_ref
    - monitoring_cadence_ref
    - issued_at_or_null
    rules:
    - probation_window_ref のない badge を probationary recovery badge と呼んではならない。
    - restriction_set_ref のない badge を conditional trust signal とみなしてはならない。
    - monitoring_cadence_ref のない badge を monitored recovery state と称してはならない。
  relapse_downgrade_ladder:
    required_fields:
    - relapse_case_id
    - prior_recovery_ref
    - relapse_trigger_ref
    - downgrade_step_ref
    - repeat_failure_window_ref
    - applied_at_or_null
    rules:
    - prior_recovery_ref のない case を relapse downgrade ladder と呼んではならない。
    - relapse_trigger_ref のない relapse を evidence-based repeated failure とみなしてはならない。
    - downgrade_step_ref のない relapse 処理を consistent downgrade response と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reinstatement eligibility decision
      - probation badge policy
      - relapse ladder binding
      - recovery/quorum record
    GraphEngine:
      owns:
