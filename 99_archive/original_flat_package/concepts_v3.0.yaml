      - quorum-independence gap lint
      - freeze-scope missing lint
      - resume-rule absent lint
    archive_object:
      owns:
      - challenge dossier archive
      - review quorum record
      - freeze/resume event log
      - dispute closure packet
  forbidden_shortcuts:
  - receipt SLA なしで challenge を受理済み扱いにする
  - independence rule なしの reviewer quorum で dispute を閉じる
  - resume rule なしの freeze を無期限運用する
  residual_open_points: []
scheduler_federation_trust_recovery_governance:
  status: provisional_fixed
  statement: scheduler_federation_trust_recovery_governance とは、trust recovery evidence bundle、remediation completion attestation、probation exit criterion を束ねて、再信頼主張の証拠・完了確認・監督強度解除条件を固定する規則である。
  core_claims:
  - trust recovery は雰囲気ではなく evidence bundle で示すべきである。indicator set と observation window がなければ比較できない。
  - remediation completion は owner self-claim だけでは足りない。verifier role と attested_at が必要である。
  - probation exit criterion がない recovery governance は、いつ通常運用へ戻してよいか判断できない。
  - trust recovery evidence は correction closure と連動するが同一ではない。誤り訂正が完了しても信頼回復が成立したとは限らない。
  - residual risk cap を持たない probation exit は、見かけ上の改善で review 強度を下げる危険がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は recovery policy、attestation evaluation、probation exit calculation、evidence archive を分担する。
  trust_recovery_evidence_bundle:
    required_fields:
    - evidence_bundle_id
    - indicator_set_ref
    - remediation_evidence_ref
    - observation_window_ref
    - reviewer_note_ref
    - assembled_at_or_null
    rules:
    - indicator_set_ref のない bundle を trust recovery evidence bundle と呼んではならない。
    - observation_window_ref のない bundle を trend-comparable recovery evidence とみなしてはならない。
    - remediation_evidence_ref のない bundle を post-remediation trust packet と称してはならない。
  remediation_completion_attestation:
    required_fields:
    - completion_attestation_id
    - remediation_action_set_ref
    - owner_confirmation_ref
    - verifier_role_ref
    - attested_at_or_null
    - expiry_at_or_null
    rules:
    - remediation_action_set_ref のない record を remediation completion attestation と呼んではならない。
    - verifier_role_ref のない attestation を independently checked completion とみなしてはならない。
    - attested_at_or_null のない claim を time-bound remediation proof と称してはならない。
  probation_exit_criterion:
    required_fields:
    - probation_exit_id
    - minimum_indicator_threshold_ref
    - consecutive_review_count_ref
    - residual_risk_cap_ref
    - approval_quorum_ref
    - effective_at_or_null
    rules:
    - minimum_indicator_threshold_ref のない criterion を probation exit criterion と呼んではならない。
    - residual_risk_cap_ref のない criterion を bounded recovery release rule とみなしてはならない。
    - approval_quorum_ref のない exit decision を accountable supervision release と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recovery evidence policy
      - completion attestation policy
      - probation exit rule
      - approval quorum binding
    GraphEngine:
      owns:
      - indicator bundle assembly
      - attestation sufficiency evaluation
      - probation exit eligibility calculation
      - residual risk projection
    GraphLint:
      owns:
      - evidence-window missing lint
      - attestation-without-verifier lint
      - premature-probation-exit lint
      - residual-risk-cap absent lint
    archive_object:
      owns:
      - recovery evidence packet
      - completion attestation archive
      - probation review history
      - exit approval bundle
  forbidden_shortcuts:
  - observation window なしで trust recovery を宣言する
  - verifier なしの remediation 完了自己申告で probation を解除する
  - residual risk cap なしで review 強度を通常運用へ戻す
  residual_open_points: []
scheduler_federation_crisis_disclosure_governance:
  status: provisional_fixed
  statement: scheduler_federation_crisis_disclosure_governance とは、publication embargo exception、crisis disclosure fast lane、post-incident retrospective packet を束ねて、緊急時の一時保留・即時開示・事後検証を固定する規則である。
  core_claims:
  - 危機時に通常 cadence だけでは間に合わないが、だからといって無制限 embargo を許してはならない。
  - crisis disclosure fast lane は speed のためだけではない。minimum disclosure pack がなければ早く出しても意味がない。
  - post-incident retrospective packet がない crisis governance は、後から判断妥当性を検証できない。
  - embargo exception は public interest test と max embargo window を持たなければ secrecy shortcut になる。
  - fast lane の handoff owner が不明だと、初動開示と後続 correction の責任が消える。
  - DecisionLedger / GraphEngine / GraphLint / archive object は embargo rule、fast-lane activation、retrospective assembly、incident archive を分担する。
  publication_embargo_exception:
    required_fields:
    - embargo_exception_id
    - embargo_basis_ref
    - max_embargo_window_ref
    - approval_authority_ref
    - public_interest_test_ref
    - effective_at_or_null
    rules:
    - embargo_basis_ref のない record を publication embargo exception と呼んではならない。
    - max_embargo_window_ref のない exception を bounded secrecy allowance とみなしてはならない。
    - public_interest_test_ref のない embargo を public-accountable delay path と称してはならない。
  crisis_disclosure_fast_lane:
