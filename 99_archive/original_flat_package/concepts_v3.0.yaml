audit_witness_external_audit_emergency_bypass_governance:
  status: provisional_fixed
  statement: audit_witness_external_audit_emergency_bypass_governance とは、legal-hold reopen と external audit における audit witness を単一 actor や単一装置へ還元せず、append-only precommit・HSM attested witness・human observer witness の役割分離で管理し、さらに central_authority 必須境界と emergency bypass の最大 reveal scope / post-confirm SLA を拘束する規則である。
  core_claims:
  - audit witness shard は decryption key の追加所有権ではなく、reveal session が lawful に開始・観測・再監査されたことを示す witness composition として扱う。
  - append-only precommit はすべての external_audit / security_escalation / clear-identity reopen で必須とし、後付けログで代替しない。
  - HSM attested witness は、cross-tenant、cross-jurisdiction、cross-system join、protected facet、external party visibility、accountable_identity_slice のいずれかに触れるとき mandatory とする。
  - human observer witness は常時 mandatory ではなく、clear identity または direct contact route を含む emergency bypass、cross-jurisdiction external audit、central_authority が最終承認する supervised session のときだけ mandatory とする。
  - central_authority は cross-tenant と cross-jurisdiction の既定 authority であり、domain_authority 例外は same-tenant・same-jurisdiction・pre-ratified charter・bounded reveal・supervised session に限る。
  - emergency bypass は provisional containment path であり、full envelope を開く経路ではない。authority post-confirm 前に final evidence、penalty finalization、public explanation へ流用してはならない。
  audit_witness_hybrid_policy:
    mandatory_base:
      append_only_precommit:
        statement: access audit anchor を envelope materialization より前に append-only path へ固定する基底 witness。
        required_when:
        - external_audit
        - security_escalation
        - clear-identity reopen
        - digest-bound export with external recipient
    conditional_layers:
      hsm_attested_witness:
        statement: session nonce、scope packet digest、envelope digest、audience binding を device-backed に attest する mechanized witness。
        required_when:
        - cross-tenant
        - cross-jurisdiction
        - cross-system join
        - protected facet touched
        - external party visibility
        - reveal_scope >= accountable_identity_slice
      human_observer_witness:
        statement: session purpose・named recipient・reveal_scope 実行を観測し、observer log と post-session challenge を残す人的 witness。
        required_when:
        - cross-jurisdiction external_audit
        - central_authority supervised session with clear identity
        - security_escalation where direct contact route or clear display identity is revealed
        non_roles:
        - authority_lane の代用にしない
        - custody_lane の代用にしない
        - external_auditor 自身を reusable witness holder にしない
  independence_rules:
  - append_only precommit path は request owner、custody release service、security override service と別 independence group を要する。
  - HSM attested witness は custody secret を保持する HSM partition と同一 logical slot に置かず、attestation key と release key を分離する。
  - human observer witness は authority_lane / custody_lane / security_lane の充足者と同一自然人にしない。
  - 同一 managed service でも control plane と audit plane が独立に封印・検証できないなら append_only precommit と HSM witness の二役に数えない。
  - external_auditor、delegated_reviewer、named recipient を audit witness component の reusable issuer にしない。
  central_authority_boundary:
    mandatory_conditions:
    - cross-tenant external audit
    - cross-jurisdiction external audit
    - cross-authority-family または global-default charter に依存する external audit
    - cross-system join により domain-local registry を越える actor continuity 復元が必要
    - external party 向け reveal が bounded_actor_slice を超える
    - protected facet を含む external audit または security escalation の post-confirm
    - domain authority 間で competing interpretation が残る
    domain_authority_exception_conditions:
    - same tenant かつ same jurisdiction family である
    - audit charter が central template または central delegation で事前 ratified 済みである
    - reveal_scope が handle_only または bounded_actor_slice に留まる
    - supervised session または digest-bound export に限定され、unsupervised plaintext export を行わない
    - cross-system join が domain-local canonical registry の範囲に収まる
    - protected facet の final interpretation を新規に変更しない
    non_implications:
    - single external auditor の存在だけでは central_authority 必須にならない
    - central_authority 必須だからといって clear identity reveal が自動許可されるわけではない
    - domain_authority 例外が成立しても HSM attested witness や append-only precommit の要否は別に評価する
  emergency_bypass_scope_policy:
    reveal_scope_classes:
      handle_only:
        statement: session_id、incident id、charter ref、branch ref のみを示し、actor continuity や identity を含まない。
      bounded_actor_slice:
        statement: stable pseudonym または export-local pseudonym、authority / accountability binding、minimal lineage anchor だけを含み、clear identity・direct contact route・reusable join key を含まない。
      accountable_identity_slice:
        statement: 単一 named principal の display identity または direct contact route と accountability binding を含む限定 slice。audience は 1 名または 1 supervised session に束縛し、bulk reveal を禁止する。
      full_envelope:
        statement: sealed identity envelope 全体、multi-actor clear identity、reusable join key、broad lineage を含む reveal。emergency bypass の admissible output にしない。
    baseline_profile_caps:
      regulated:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 2
        ttl: 4時間
        derived_export_cap: 1
        post_confirm_sla: 4時間
      engineering_tradeoff:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 2
        ttl: 1営業日
        derived_export_cap: 1
        post_confirm_sla: 1営業日
      organizational_or_social:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 3
        ttl: 1営業日
        derived_export_cap: 1
        post_confirm_sla: 1営業日
    context_caps:
      single_branch:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 2
        ttl: 4時間
        post_confirm_sla: 2時間
      external_irreversible:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 1
        ttl: 1時間
        post_confirm_sla: 1時間
      policy_sensitive:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 1
        ttl: 2時間
        post_confirm_sla: 1時間
    exception_rule:
      life_safety_or_active_compromise:
        statement: bounded_actor_slice だけでは containment が成立しないときに限り、single named principal への accountable_identity_slice を provisional に許す。
        preconditions:
        - security_lane と custody_lane が active である
        - append-only precommit と HSM attested witness が先に固定されている
        - human observer witness が session を観測する
        - audience が 1 名または 1 supervised session に束縛される
        - clear identity を使わない代替 containment path が不成立である
        numeric_caps:
          ttl: 1時間
          post_confirm_sla_default: 1時間
          post_confirm_sla_when_external_irreversible_or_policy_sensitive: 30分
        prohibitions:
        - full_envelope へ拡張しない
        - recipient list の拡張に使わない
        - canonical archive object や long-lived cache へ昇格しない
    failure_branches:
    - post-confirm 不成立時は auto-reseal、derived export revoke、continued hold、violation event を同時発火する。
    - 上位 authority path が生存するなら escalate を優先し、path absent なら current bypass session は false として閉じる。
    - ttl 超過または audience 拡張が起きた session は emergency convenience ではなく violation として扱う。
  decision_ledger_graph_engine_archive_split:
    DecisionLedger:
    - witness composition class
    - authority boundary judgement
    - effective max reveal scope
    - effective audience/ttl/post-confirm cap
    - exception basis and breach branch
    GraphEngine:
    - append-only precommit ref
    - HSM attestation ref
    - human observer session ref
    - auto-reseal timer
    - derived export revoke / shutdown event
    archive_object:
    - sealed session digest
    - witness packet digest
    - post-confirm outcome ref
    GraphLint:
    - redacted session summary only
    - clear identity、direct contact route、witness private material を保持しない
  prohibited_shortcuts:
  - append-only log だけで high-risk external audit の witness を満たしたとみなさない。
  - HSM attestation だけで human observer witness が必要な session を置換しない。
  - domain_authority だけで cross-tenant external audit を final confirm しない。
  - accountable_identity_slice を recipient 2 名以上へ同時配布しない。
  - emergency bypass 出力を authority post-confirm 前に final evidence / penalty / public explanation へ流用しない。
  - full_envelope を emergency containment の既定値にしない。
  residual_open_points:
  - vendor-neutral な HSM attestation packet / human observer credential schema をどこまで canonical registry 化するか
  - jurisdiction family と central delegation charter の finer taxonomy をどこまで formal registry 化するか
audit_witness_packet_central_delegation_charter_governance:
  status: provisional_fixed
  statement: 'audit_witness_packet_central_delegation_charter_governance とは、cross-tenant / cross-jurisdiction /

    protected external audit / emergency bypass において、audit witness packet と

    central delegation charter を単なる添付書類ではなく lawful continuity を束ねる監査単位として扱い、

    canonical schema・authority scope・delegation boundary・exception lane・post-confirm duty を拘束する規則である。

    '
  core_claims:
  - audit witness packet は witness の寄せ集めではなく、session basis・authority judgement・continuity linkage・post-confirm duty を1つの packet digest に束ねた監査単位である。
  - central delegation charter は reviewer assignment 一般ではなく、どの authority tier がどの scope・action family・exception lane をどの SLA で代行できるかを拘束する統治契約である。
  - cross-tenant / cross-jurisdiction / protected external audit では、packet が charter ref を持たないなら lawful continuity を主張してはならない。
  - duplicate_discard_digest・bridge token・archive manifest は packet の外部 link ではなく、scope summary・pseudonym continuity・replay continuity を束ねる mandatory linkage として扱う。
  - emergency bypass packet は provisional record であり、post-confirm 前の final evidence / final penalty / public explanation の basis にしてはならない。
  canonical_packet_schema:
    packet_identity_fields:
    - witness_packet_id
    - packet_class_ref
    - packet_schema_version_ref
    - packet_digest
    - generation_time
    - generator_authority_ref
    - source_system_family_ref
    session_basis_fields:
    - session_id_ref
    - scenario_ref
    - lawful_purpose_ref
    - scope_packet_digest_ref
    - reveal_scope_ref
    - audience_binding_ref
    - supervised_session_ref_or_null
    - request_event_ref
    witness_composition_fields:
    - append_only_precommit_ref
    - hsm_attestation_ref_or_null
    - human_observer_credential_ref_or_null
    - witness_component_set
    - witness_independence_class_ref
    - observer_challenge_ref_or_null
    authority_and_charter_fields:
    - charter_ref
    - charter_version_ref
    - authority_tier_ref
    - authority_decision_ref
    - domain_exception_basis_ref_or_null
    - exception_lane_ref_or_null
    - approval_or_post_confirm_due
    scope_and_continuity_fields:
    - duplicate_discard_digest_ref_or_null
    - root_profile_ref_or_null
    - compression_grade_ref_or_null
    - collision_witness_ref_or_null
    - bridge_token_proof_ref_or_null
    - archive_manifest_digest_ref_or_null
    - export_local_pseudonym_ref_or_null
    - lineage_slice_ref_or_null
    outcome_and_duty_fields:
    - session_outcome_ref
    - post_confirm_owner_ref
    - reseal_event_ref_or_null
    - revoke_event_ref_or_null
    - archive_promotion_state
    - downstream_usage_cap_ref
    privacy_and_retention_fields:
    - redaction_class_ref
    - recipient_class_ref
    - retention_bucket_ref
    - visibility_class_ref
    - non_reuse_clause_ref_or_null
    - purge_or_hold_state_ref
    packet_class_policy:
      internal_supervised:
        statement: same-tenant / bounded internal review の監査 packet。charter_ref は mandatory だが、bridge token proof と archive manifest digest は recipient-visible continuity がない限り optional とする。
      external_protected_audit:
        statement: cross-tenant / cross-jurisdiction / protected external audit の canonical packet。charter_ref、append-only precommit、required witness、bridge token proof、archive manifest digest を mandatory とする。
      emergency_bypass_record:
        statement: provisional containment の監査 packet。exception lane、post-confirm due、auto-reseal / revoke path を mandatory とし、archive_promotion_state は provisional に固定する。
      post_confirm_outcome_record:
        statement: authority post-confirm 後の最終 packet。confirm outcome、continued hold / revoke / reseal の分岐、archive promotion judgement を束ねる。
  central_delegation_charter_schema:
    identity_fields:
    - charter_id
    - charter_kind_ref
    - charter_version_ref
    - issuing_authority_ref
    - ratification_event_ref
    - effective_window
    - supersession_ref_or_null
    authority_scope_fields:
    - authority_tier_ref
    - tenant_relation_scope
    - jurisdiction_family_scope
    - protected_facet_scope
    - reveal_scope_cap
    - recipient_class_cap
    - allowed_session_mode_set
    delegation_boundary_fields:
    - allowed_action_family_set
    - forbidden_action_family_set
    - domain_exception_admissibility_rule
    - required_witness_floor
    - required_charter_template_ref_or_null
    - non_delegable_boundary_set
    sla_and_exception_fields:
    - activation_sla
    - review_sla
    - emergency_bypass_sla
    - post_confirm_sla
    - exception_lane_set
    - escalation_path_ref
    duty_and_linkage_fields:
    - post_confirm_owner_ref
    - archive_linkage_policy_ref
    - bridge_token_policy_ref
    - duplicate_digest_usage_policy_ref
    - observer_independence_policy_ref
    - revoke_and_suspend_rule_ref
    charter_kind_policy:
      central_template:
        statement: cross-boundary external audit の global baseline。authority family / witness floor / non-delegable boundary を規定する。
      central_delegation:
        statement: central_authority が domain または delegated reviewer へ bounded scope を委任する charter。template 逸脱を許さない。
      domain_delegation:
        statement: same-tenant / same-jurisdiction / pre-ratified bounded scope に限る domain-local charter。cross-boundary final confirm を許さない。
      emergency_exception_charter:
        statement: life-safety / active compromise の provisional lane 用 charter。single named principal・short TTL・post-confirm duty を mandatory とする。
  linkage_rules:
  - audit witness packet は常に charter_ref を持ち、packet digest 単体で lawful continuity を主張してはならない。
  - duplicate_discard_digest を packet に結ぶ場合、root_profile_ref と compression_grade_ref を同時に保持し、external_protected_audit / post_confirm_outcome_record では lossless_canonical 以外を許さない。
  - export-local pseudonym または redacted lineage slice を external continuity に使う場合、bridge_token_proof_ref を mandatory とし、source stable pseudonym を packet 外面へ露出しない。
  - deterministic replay / forensic replay / protected external audit / public_or_external_commitment へ接続する packet では archive_manifest_digest_ref を mandatory とする。
  - emergency_bypass_record は exception_lane_ref と post_confirm_owner_ref を mandatory とし、post-confirm 前に final evidence / final penalty / public explanation へ流用してはならない。
  - central_delegation charter は allowed_action_family_set と non_delegable_boundary_set を同時に持ち、delegated reviewer を authority tier の代用にしてはならない。
  - domain_delegation charter は same-tenant・same-jurisdiction・bounded reveal の範囲でだけ有効とし、cross-tenant / cross-jurisdiction final confirm を開いてはならない。
  decision_ledger_graph_engine_archive_split:
    DecisionLedger:
    - witness_packet_id と packet_digest
    - charter_ref と authority_decision_ref
    - effective reveal / recipient / SLA cap
    - exception lane と post-confirm owner
    - duplicate digest / bridge token / archive manifest linkage judgement
    GraphEngine:
    - append_only_precommit_ref
    - hsm_attestation_ref
    - human_observer_credential_ref
    - auto-reseal / revoke / reseal timer event
    - supervised session / export bundle execution ref
    archive_object:
    - witness_packet_digest
    - charter_digest
    - archive_manifest_digest
    - post_confirm outcome bundle
    GraphLint:
    - packet class / charter kind / linkage state の lint のみ保持する
    - clear identity、direct contact route、witness private material、full envelope payload を保持しない
  prohibited_shortcuts:
  - packet digest だけで authority scope や lawful continuity を主張する。
  - charter_ref を reviewer memo で代替する。
  - bounded_loss_summary の duplicate digest を external_protected_audit や post_confirm outcome の basis に流用する。
  - bridge token proof を欠いた export-local pseudonym を cross-boundary packet へ入れる。
  - archive manifest digest を欠いた packet で deterministic / forensic / protected external replay を主張する。
  - delegated reviewer や external auditor を authority tier / witness independence の代用にする。
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  - jurisdiction family / authority family の finer taxonomy を central delegation charter の registry にどこまで落とすか
  - tenant merge / split を伴う lawful continuity で bridge token / lineage slice / charter chain をどう接続するか
audit_witness_external_serialization_notation_governance:
  status: provisional_fixed
  statement: audit_witness_external_serialization_notation_governance とは、HSM attestation packet と human observer credential を外部伝達可能な vendor-neutral notation として扱うとき、semantic registry layer・canonical serialization layer・raw vendor evidence layer を分離し、challenge / freshness / replay / post-confirm duty を比較可能な detached canonical envelope として固定する規則である。
  core_claims:
  - external serialization notation は raw vendor blob をそのまま比較対象にすることではなく、registry ref・binding ref・canonical digest を持つ detached canonical envelope を正本にすることである。
  - semantic registry layer は class/profile の意味を管理し、canonical serialization layer は外部比較可能な field family を管理し、raw vendor evidence layer は quote・certificate chain・transcript・screen artifact などの製品依存物を digest-bound adjunct として従属保持する。
  - challenge binding・freshness binding・replay binding・post-confirm duty は別スロットであり、timestamp、packet digest、observer 名義などの単一要素で相互代用してはならない。
  - human observer credential は witness / reviewer credential であり、authority family や final approver の代用ではない。
  serialization_layers:
    semantic_registry_layer:
      statement: attestation class / profile、observer credential class / profile、verification_method_class、independence floor、custody floor、downgrade barrier を管理する意味層。
      owned_by:
      - audit_witness_profile_registry_governance
    canonical_serialization_layer:
      statement: external comparison、archive linkage、recipient-bound export、migration alias 判定に使う detached canonical envelope 層。field family と canonicalization profile を持つ。
      owned_by:
      - audit_witness_external_serialization_notation_governance
    raw_vendor_evidence_layer:
      statement: HSM quote、certificate chain、vendor receipt、session transcript、screen recording、device measurement blob などの製品依存 artifact を保管する層。canonical core には digest / ref だけを残す。
      owned_by:
      - archive object / external evidence adjunct
  canonical_field_families:
    common_identity_and_profile:
    - notation_kind_ref
    - notation_profile_ref
    - canonicalization_profile_ref
    - registry_epoch_ref
    - class_ref
    - profile_ref
    - issuer_handle_ref
    - subject_handle_ref_or_pseudonym_ref
    - packet_digest
    - raw_vendor_artifact_digest_ref_or_null
    scope_authority_and_custody:
    - session_basis_ref
    - scope_packet_digest_ref
    - reveal_scope_ref_or_cap_ref
    - audience_binding_ref_or_null
    - lawful_purpose_ref
    - charter_ref
    - authority_decision_ref_or_null
    - custody_boundary_ref_or_null
    challenge_freshness_replay:
    - challenge_bundle_ref_or_null
    - challenge_outcome_ref_or_null
    - freshness_anchor_ref
    - freshness_window_ref
    - replay_binding_ref
    - recipient_binding_ref_or_null
    lifecycle_and_continuity:
    - archive_manifest_digest_ref_or_null
    - bridge_token_proof_ref_or_null
    - validity_window_ref
    - revocation_handle_ref_or_null
    - supersession_ref_or_null
    - post_confirm_due_ref_or_null
    - post_confirm_owner_or_duty_ref_or_null
    hsm_attestation_specific:
    - attested_measurement_digest_ref
    - device_class_ref
    - signer_class_ref
    - detached_signature_container_ref
    observer_credential_specific:
    - observer_role_profile_ref
    - independence_attestation_ref
    - contact_route_mode_ref
    - session_presence_ref
    - reuse_prohibition_ref
  notation_profile_registry:
    hsm_attestation_packet:
      hsm_detached_receipt:
        statement: same-tenant bounded exchange 向けの最小 detached canonical receipt。raw quote digest と semantic profile ref を束縛するが、recipient-scoped replay guard は必須にしない。
        mandatory_bindings:
        - session_basis_ref
        - scope_packet_digest_ref
        - lawful_purpose_ref
        - charter_ref
        - freshness_anchor_ref
        - packet_digest
      hsm_custody_external_bundle:
        statement: cross-boundary / protected reveal / external audit 向けの custody-bound bundle。recipient binding、archive linkage、custody boundary を mandatory とする。
        mandatory_bindings:
        - custody_boundary_ref
        - audience_binding_ref_or_null
        - replay_binding_ref
        - archive_manifest_digest_ref_or_null
        - packet_digest
      hsm_challenge_emergency_bundle:
        statement: emergency containment または clear-identity / direct-contact reveal を伴う場合の challenge-bound bundle。challenge bundle と explicit post-confirm duty を mandatory とする。
        mandatory_bindings:
        - challenge_bundle_ref_or_null
        - challenge_outcome_ref_or_null
        - freshness_anchor_ref
        - replay_binding_ref
        - post_confirm_due_ref_or_null
    human_observer_credential:
      observer_scoped_session_credential:
        statement: supervised session の presence・scope cap・independence claim を示す基本 credential。interactive reveal がない限り challenge-bound を強制しない。
      observer_challenge_bound_credential:
        statement: challenge / response と session presence を束縛する observer credential。clear identity / direct contact / emergency bypass を含む reveal で mandatory になる。
      observer_post_confirm_reviewer_credential:
        statement: authority_outcome 後の post-confirm review / reseal / revoke judgement を担う reviewer credential。session-start witness や authority family の代用にはしない。
  admissibility_rules:
    canonical_comparison_basis:
    - 外部比較は canonical serialization layer 上の packet_digest と required binding field で行い、raw vendor blob の byte 列一致を canonical equality とみなさない。
    - notation_profile_ref と canonicalization_profile_ref が一致するか、alias-preserving migration / monotone strengthening が registry で明示されている場合にだけ比較可能とする。
    challenge_binding:
    - clear identity、direct contact route、emergency bypass、observer challenge class を含む場合は challenge_bundle_ref と challenge_outcome_ref を mandatory とする。
    - observer 名義や transcript 添付だけで challenge 実施済みとみなしてはならない。
    freshness_binding:
    - freshness は append_only_precommit / nonce-counter window / challenge round-trip / authority outcome window のいずれかの anchor で束縛する。
    - external audit と emergency bypass では wall-clock timestamp 単独を freshness anchor とみなしてはならない。
    replay_binding:
    - packet_digest 単独では replay guard にならず、session・recipient・purpose・archive・bridge のどの reuse を禁止するかを replay_binding_ref で明示する。
    - recipient-visible continuity や external replay を許す場合は archive_manifest_digest_ref、bridge continuity を伴う場合は bridge_token_proof_ref も mandatory とする。
    post_confirm_duty:
    - emergency provisional reveal、post-confirm pending の external protected audit、recipient-visible provisional export では post_confirm_due と owner / duty ref を mandatory とする。
    - observer_post_confirm_reviewer_credential は authority_outcome 前の provisional witness を finalize する根拠に使ってはならない。
  context_matrix:
    local_context:
      mandatory_hsm_profiles:
      - hsm_detached_receipt
      conditional_hsm_profiles:
      - hsm_custody_external_bundle if protected_facet=true or external replay is intended
      optional_observer_profiles:
      - observer_scoped_session_credential
      forbidden_profiles:
      - observer_post_confirm_reviewer_credential as session-start witness
      - hsm_challenge_emergency_bundle without emergency trigger
    central_context:
      mandatory_hsm_profiles:
      - hsm_custody_external_bundle
      conditional_hsm_profiles:
      - hsm_challenge_emergency_bundle if direct named notification or provisional reveal is used
      conditional_observer_profiles:
      - observer_challenge_bound_credential if clear identity or direct contact route is included
      forbidden_profiles:
      - hsm_detached_receipt as sole basis for cross-boundary reveal
    emergency_context:
      mandatory_hsm_profiles:
      - hsm_challenge_emergency_bundle
      mandatory_observer_profiles:
      - observer_challenge_bound_credential
      mandatory_lifecycle_bindings:
      - post_confirm_due_ref_or_null
      - post_confirm_owner_or_duty_ref_or_null
      forbidden_profiles:
      - observer_scoped_session_credential alone
      - hsm_detached_receipt alone
    external_audit_context:
      mandatory_hsm_profiles:
      - hsm_custody_external_bundle
      conditional_hsm_profiles:
      - hsm_challenge_emergency_bundle if clear identity or direct named route is used
      conditional_observer_profiles:
      - observer_challenge_bound_credential if named / interactive route is used
      - observer_post_confirm_reviewer_credential only after authority_outcome stage
      forbidden_profiles:
      - hsm_detached_receipt as external audit replay basis
  responsibility_split:
    DecisionLedger:
    - notation_profile_ref、canonicalization_profile_ref、registry_epoch_ref、migration_alias_ref、post_confirm duty を正本記録する。
    - semantic profile registry と notation profile registry の対応を記録し、mixed-profile without alias を禁止する。
    GraphEngine:
    - session_basis・challenge bundle・freshness anchor・custody boundary・replay binding の存在と相互束縛を評価する。
    - charter / authority / archive / bridge continuity との dependency を解決する。
    GraphLint:
    - raw vendor blob の canonical 昇格、timestamp-only freshness、packet-digest-only replay guard、observer credential の authority 化、post-confirm duty 欠落を lint する。
    archive_object:
    - canonical envelope digest、raw vendor artifact digest、challenge transcript digest、bridge / archive linkage digest を immutable に保持する。
    - canonical core と raw evidence adjunct の boundary を崩さず、外部 export 時にも canonical envelope を基準に再構成する。
  prohibited_shortcuts:
  - raw vendor quote、PDF receipt、screen capture を canonical comparison object とみなす。
  - timestamp だけで freshness を満たしたとみなす。
  - packet_digest だけで replay guard を満たしたとみなす。
  - observer credential を authority family や final approver として数える。
  - emergency bundle から post_confirm_due / owner を落としたまま external reveal を通す。
  - migration alias なしに旧 notation profile と新 notation profile を同一 packet へ混在させる。
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
audit_witness_notation_core_separation_governance:
  status: provisional_fixed
  statement: audit_witness_notation_core_separation_governance とは、HSM attestation packet と human observer credential に含まれる raw measurement claim・algorithm suite・extension field を、notation core・extension registry・raw evidence adjunct の三者へ分離し、比較可能性と監査可能性を壊さずに context ごとの admissibility を制御する統治規則である。
  core_claims:
  - raw measurement claim は raw quote、PCR / register tuple、device measurement blob、session transcript excerpt をそのまま notation core に置かず、comparison-stable な projection / digest / semantics family に縮約して保持する。
  - algorithm suite は concrete OID、COSE alg、curve parameter、certificate extension detail の literal 集合を core に残さず、admissibility / comparability / anti-downgrade 判定に必要な algorithm_suite_profile_ref と suite_strength_class_ref_or_null へ正規化する。互換性・migration alias・downgrade barrier は extension registry 側で管理する。
  - extension field は core へ自由挿入せず、meaning-affecting かつ registered な extension だけを registered_extension_set_ref_or_null / critical_extension_digest_ref_or_null として registry 昇格させる。unregistered extension payload は raw evidence adjunct に留め、central / emergency / external-audit では current basis や external comparison basis に使わない。
  - challenge / freshness / replay / post-confirm duty は separation 後も独立 binding であり、raw measurement claim、algorithm literal、extension payload のいずれでも単独代用してはならない。
  core_vs_extension_matrix:
    raw_measurement_claim:
      notation_core:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      extension_registry:
      - measurement_projection_profile_registry
      - claim_semantics_registry
      - projection_migration_alias_ref_or_null
      - context_admissibility_binding_ref
      raw_evidence_adjunct:
      - vendor_quote_or_measurement_blob
      - register_or_pcr_tuple
      - certificate_chain_or_vendor_statement
      - transcript_or_screen_artifact
    algorithm_suite:
      notation_core:
      - algorithm_suite_profile_ref
      - suite_strength_class_ref_or_null
      extension_registry:
      - suite_compatibility_family_ref
      - anti_downgrade_policy_ref
      - suite_alias_or_supersession_ref_or_null
      raw_evidence_adjunct:
      - concrete_oid_or_cose_alg_values
      - vendor_parameter_blob
      - certificate_extension_detail
    extension_field:
      notation_core:
      - registered_extension_set_ref_or_null
      - critical_extension_digest_ref_or_null
      extension_registry:
      - extension_profile_ref
      - extension_field_family_registry
      - criticality_rule_ref
      - context_admissibility_rule_ref
      raw_evidence_adjunct:
      - unregistered_vendor_extension_blob
      - display_only_metadata
      - transport_specific_wrapper
  context_matrix:
    local_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      conditional_extension_families:
      - algorithm_suite_profile_ref if local comparison barrier or downgrade barrier depends on suite family
      - registered_extension_set_ref_or_null if extension meaning affects later cross-boundary reuse
      allowed_raw_adjunct:
      - vendor_quote_or_measurement_blob
      - transcript_or_screen_artifact
      - concrete_oid_or_cose_alg_values
      forbidden:
      - unregistered extension payload を current basis や external comparison basis に昇格する
      - raw measurement claim の byte 列や literal tuple を canonical equality 判定へ直接投入する
    central_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      - algorithm_suite_profile_ref
      conditional_extension_families:
      - registered_extension_set_ref_or_null if any meaning-affecting extension is present
      - critical_extension_digest_ref_or_null if protected facet or downgrade-sensitive path is involved
      forbidden:
      - algorithm literal だけで suite comparability を主張する
      - unregistered critical extension を silent ignore したまま central review を通す
    emergency_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      - algorithm_suite_profile_ref
      mandatory_bindings:
      - challenge_bundle_ref_or_null
      - challenge_outcome_ref_or_null
      - freshness_anchor_ref
      - replay_binding_ref
      - post_confirm_due_ref_or_null
      - post_confirm_owner_or_duty_ref_or_null
      allowed_extensions:
      - emergency_whitelisted_extension_profile_ref only
      forbidden:
      - raw-only extension payload を理由に emergency reveal の admissibility を変える
      - algorithm suite profile を欠いたまま emergency challenge bundle を current basis にする
    external_audit_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      - algorithm_suite_profile_ref
      mandatory_extension_families:
      - registered_extension_set_ref_or_null if any extension affects interpretation or replay continuity
      - critical_extension_digest_ref_or_null if protected facet or suite migration is involved
      forbidden:
      - hsm raw quote や observer transcript だけを external audit comparison object にする
      - unregistered extension payload を external current basis や replay basis に使う
  responsibility_split:
    DecisionLedger:
    - measurement_projection_profile_ref、claim_semantics_ref、algorithm_suite_profile_ref、suite_strength_class_ref_or_null、registered_extension_set_ref_or_null、critical_extension_digest_ref_or_null、migration alias を正本記録する。
    - semantic profile registry と notation core projection registry の対応、および extension criticality rule を記録する。
    GraphEngine:
    - context ごとの mandatory / conditional / forbidden 判定を実行し、challenge / freshness / replay / post-confirm duty との依存を解決する。
    - projection profile・suite profile・extension profile の alias / supersession / anti-downgrade 判定を行う。
    GraphLint:
    - raw measurement claim の core 混入、algorithm literal の core 比較、unregistered extension の silent promotion、critical extension digest 欠落、suite downgrade without alias を lint する。
    archive_object:
    - canonical envelope digest と raw vendor evidence adjunct digest を immutable に保持し、core/extension/adjunct の boundary を崩さない。
  prohibited_shortcuts:
  - raw quote、register tuple、transcript excerpt を canonical core field としてそのまま比較する。
  - concrete OID / COSE alg / parameter blob を registry ref なしに comparability や admissibility の根拠に使う。
  - unregistered extension payload を central / emergency / external-audit の current basis に昇格する。
  - measurement claim / algorithm suite / extension field のいずれか単独で challenge / freshness / replay / post-confirm duty を満たしたとみなす。
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
measurement_projection_profile_governance:
  status: provisional_fixed
  statement: measurement_projection_profile_governance とは、raw measurement bundle から comparison-stable projection を作る粒度、複数 raw field の lawful collapse 条件、registered extension と critical extension の昇格境界を registry 化し、local / central / emergency / external-audit の各 context で current basis に使える投影だけを制御する統治規則である。
  four_layer_partition:
    raw_measurement_bundle: vendor quote、register tuple、sensor transcript、parameter blob、screen artifact、timestamp 群、source-local metadata を含む原始測定束である。比較や current basis に直接使わず、digest / ref で保持する。
    comparison_stable_projection: 比較可能性に必要な core family だけを残した canonical projection であり、measurement_projection_profile_ref・measurement_scope_ref・claim_semantics_ref・attested_measurement_digest_ref を最小核とする。
    registered_extension: projection core に入らないが意味解釈・比較条件・operator rule を左右する追加情報であり、registry ref で束縛する。
    critical_extension: registered extension のうち、current basis・protected facet・admissibility・replay / reveal continuity・anti-downgrade に影響するものだけを昇格させ、digest と notice duty を伴って扱う。
  granularity_classes:
    atomic_projection:
      statement: 1つの raw measurement family を1つの canonical claim family へ写す粒度である。
      admissible_usage:
      - local
      - central
      - emergency
      - external_audit
    normalized_projection:
      statement: unit / code / naming の正規化を伴うが、意味と比較順序を変えない粒度である。
      admissible_usage:
      - local
      - central
      - emergency
      - external_audit
    bounded_aggregate_projection:
      statement: 複数 raw slot を registry 済み aggregation operator で collapse する粒度である。source cardinality、window class、composition digest、uncertainty bound を伴う場合にだけ comparison-stable とみなす。
      admissible_usage:
      - local
      - central_conditional
      - emergency_conditional
      - external_audit_conditional
    advisory_summary_projection:
      statement: pass/fail・traffic-light・one-line digest のような要約粒度である。current basis や replay basis には使わず、local diagnostic / recipient preview の補助に限る。
      admissible_usage:
      - local_conditional
  projection_core_family_matrix:
    always_in_projection_core:
    - measurement_projection_profile_ref
    - measurement_scope_ref
    - claim_semantics_ref
    - attested_measurement_digest_ref
    conditional_core_families:
      normalization_or_unit_family_ref: unit / code / scale の正規化が identity でない場合は mandatory
      aggregation_operator_ref: 複数 raw field を collapse する場合は mandatory
      observation_window_class_ref: time/window/sampling collapse がある場合は mandatory
      source_cardinality_ref: multi-source / multi-register collapse がある場合は mandatory
      composition_digest_ref_or_null: bounded_aggregate_projection を external comparison・replay・current basis に使う場合は mandatory
      uncertainty_or_tolerance_class_ref_or_null: 省略すると pass/fail や ordering が変わる場合は mandatory
      algorithm_suite_profile_ref_or_null: suite family が comparability・anti-downgrade・admissibility に関与する context では mandatory
      registered_extension_set_ref_or_null: meaning-affecting extension がある場合は mandatory
      critical_extension_digest_ref_or_null: critical extension が1つでもある場合は mandatory
    raw_bundle_only:
    - vendor_quote_or_measurement_blob
    - register_tuple_sequence
    - parameter_blob
    - screen_or_transcript_artifact
    - display_only_metadata
  lawful_collapse_rules:
    lawful_when:
    - collapse 前後で claim_semantics_ref、measurement_scope_ref、protected facet が不変である
    - used operator が measurement_projection_profile に登録され、aggregation_operator_ref または normalization ref として明示されている
    - multi-source / multi-window collapse では source_cardinality_ref、observation_window_class_ref、composition_digest_ref_or_null がある
    - collapse により ordering や pass/fail が変わりうる場合、uncertainty_or_tolerance_class_ref_or_null または threshold profile ref が束縛されている
    - raw bundle への trace-back が digest / manifest で可能であり、silent information loss にならない
    forbidden_when:
    - time window や source set が異なる raw slot を window class や composition digest なしに1値へ潰す
    - protected facet、reveal scope、replay continuity、challenge duty に効く差分を summary flag に埋め込んで core から落とす
    - pass/fail summary や color code を atomic / normalized projection の代用 current basis に使う
    - local 用 advisory summary を central / emergency / external_audit の comparison basis へ昇格する
  critical_extension_promotion:
    promote_to_critical_when:
    - extension が claim semantics、scope boundary、unit family、aggregation admissibility を変える
    - extension が suite downgrade barrier、protected facet interpretation、recipient-visible reveal cap を変える
    - extension が replay / challenge / post-confirm continuity の required duty を増減させる
    - extension を落とすと central / emergency / external_audit の current basis 可否が変わる
    keep_as_registered_noncritical_when:
    - display-only metadata や local UI helper のように意味・admissibility・continuity を変えない
    - raw adjunct から再生できても current basis の比較結果を変えない
  context_matrix:
    local_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      - advisory_summary_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      conditional:
      - aggregation_operator_ref for collapsed comparison
      - composition_digest_ref_or_null when later cross-boundary reuse is intended
      - critical_extension_digest_ref_or_null when local output may later become recipient-visible or central basis
      forbidden:
      - advisory summary を raw trace-back なしの authoritative local current にする
    central_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      - aggregation_operator_ref when collapsed
      - algorithm_suite_profile_ref if comparability or downgrade barrier depends on suite
      conditional:
      - source_cardinality_ref
      - observation_window_class_ref
      - composition_digest_ref_or_null
      - uncertainty_or_tolerance_class_ref_or_null
      - critical_extension_digest_ref_or_null
      forbidden:
      - advisory_summary_projection を central review current basis に使う
      - critical extension を registered だけで済ませて digest / notice duty を落とす
    emergency_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      - algorithm_suite_profile_ref
      - challenge_bundle_ref_or_null
      - freshness_anchor_ref
      - replay_binding_ref
      - post_confirm_due_ref_or_null
      conditional:
      - bounded_aggregate_projection は immediate containment に必要な場合だけ許し、composition_digest_ref_or_null と critical_extension_digest_ref_or_null を伴う
      forbidden:
      - raw-only collapse や advisory summary を emergency reveal / current basis に使う
      - critical extension 未束縛のまま protected facet に触れる
    external_audit_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      - algorithm_suite_profile_ref when suite family is part of comparability claim
      - composition_digest_ref_or_null for any collapsed projection that is audit-visible
      - critical_extension_digest_ref_or_null when interpretation or replay continuity is affected
      forbidden:
      - advisory_summary_projection を audit comparison object に使う
      - raw measurement quote だけで comparison-stable projection の代用を主張する
      - critical extension を omission したまま alias-equivalent と扱う
  responsibility_split:
    DecisionLedger:
    - measurement_projection_profile_ref、granularity_class、allowed_collapse_operator_set、critical_extension_rule_ref、projection migration alias / successor を正本記録する。
    - どの collapse が local-only / central admissible / emergency conditional / external-audit admissible かを profile ごとに authoritative に判定する。
    GraphEngine:
    - 実際の packet / claim ごとに core family の充足、collapse witness、critical extension digest、challenge / replay / post-confirm duty の存在を評価する。
    - issue_time / context / recipient visibility に応じて advisory summary の昇格禁止、collapsed projection の current-basis admissibility、profile alias / supersession を駆動する。
    GraphLint:
    - summary-only current basis、operator 無記録 collapse、scope/window/source 混在 collapse、critical extension silent drop、raw blob の core 混入を検査する。
    archive_object:
    - raw measurement bundle digest、composition manifest digest、projection manifest digest、critical extension manifest digest を immutable に保持する。
  migration_barriers:
  - granularity_class が advisory_summary_projection から comparison-stable class へ変わる場合は alias ではなく successor / review を要する。
  - aggregation operator、window class、source cardinality requirement、uncertainty binding のいずれかが変わる場合は semantic delta として扱い、silent alias migration を禁止する。
  - critical extension の判定結果が変わる profile change は migration ではなく bounded または material successor として扱う。
  prohibited_shortcuts:
  - register tuple の個数や source set を隠したまま aggregated scalar だけを comparison object とみなす。
  - pass/fail、traffic-light、one-line digest を current basis や replay basis の代用にする。
  - critical extension を display-only metadata 扱いして digest と notice duty を落とす。
  - raw bundle の trace-back なしに collapsed projection を alias-equivalent と主張する。
  residual_open_points: []
ratified_unreflected_provisional_binding_governance:
  status: provisional_fixed
  statement: ratified_unreflected_provisional_binding_governance とは、adjudication case の outcome が ratified 済みだがまだ reflected されていないとき、その outcome を authoritative binding とみなさず、reflection preparation・bounded internal preview・厳格条件付き provisional recipient-visible export にだけ限定して provisional に使う統治規則である。
  core_claims:
  - authoritative binding は reflected 後だけ成立する。ratified-unreflected outcome は制度承認済みの resolution candidate ではあるが、current decision・coverage・route gating・hold release の正本 basis にはならない。
  - provisional use は、future reflection を準備する internal operation と、active / reflected basis が既に lawful に覆っている branch-preserving operation に限る。unreflected outcome 単独で approval path・required authority・accountability・rollback expectation を変更してはならない。
  - coverage では provisional preview と authoritative coverage を分ける。ratified-unreflected outcome は simulation / impact analysis / successor draft には使えても、shared_core・intersection_safe・target isolation・blocking veto clear の basis には使えない。
  - recipient-visible export は例外であり、named recipient、explicit provisional label、expiry、contradiction / supersession notice path、archive / bridge continuity、post-reflection follow-up を備える central lane の controlled provisional packet に限って conditional に許す。
  lifecycle_partition:
    open: 未 ratified。outcome 自体が未承認であり、provisional binding も許されない。
    ratified_unreflected: outcome は承認済みだが reflection_ops が未完了。preview / preparation / conditioned provisional export だけを許し、authoritative reliance は禁止する。
    reflected: outcome が V / route / basis / charter に反映済み。以後は通常の authoritative binding として扱える。
  use_surface_matrix:
    current_decision:
      allowed:
      - reflection_ops の起票、successor draft、review queue ordering、contradiction check などの non-authoritative preparation
      conditional:
      - active / reflected basis が別に存在し、その basis だけで lawful な branch-preserving local diagnostic / containment を行う際に、ratified-unreflected outcome を preview metadata として添付すること
      forbidden:
      - required authority、approval path、accountability owner、rollback expectation、external commitment を変える current decision の正当化
      - branch collapse、final approver fix、risk cap relaxation、policy reinterpretation 完了とみなすこと
    coverage:
      allowed:
      - successor basis 生成前の provisional coverage preview、impact simulation、delta explanation
      conditional:
      - covered / uncovered の確定ではなく、reflection pending を明示した preview label 付き internal comparison
      forbidden:
      - shared_core、intersection_safe、target isolation basis、blocking veto clear、branch-critical coverage satisfaction の basis に使うこと
    route_gating:
      allowed:
      - reflection-only route、archive prep、recipient notice prep、successor activation check の起票
      conditional:
      - active route を保持したまま、successor route の dry-run / validation queue を作ること
      forbidden:
      - active approval route の切替、fallback 完了扱い、gate bypass、timeout clear を unreflected outcome だけで行うこと
    hold_release:
      allowed: []
      conditional:
      - hold family の名称を conflict_pending から reflection_pending へ変える内部整理。ただし governance hold 自体は残すこと
      forbidden:
      - branch-critical hold、policy block、recipient-visible hold、external commitment hold を解除すること
      - head clear、bundle clear、q_decision>=2 の根拠に使うこと
    recipient_visible_export:
      allowed: []
      conditional:
      - named recipient に限定され、explicit provisional label、expiry、contradiction / supersession notice path、archive manifest digest、必要時 bridge token linkage、post-reflection follow-up owner が揃う controlled provisional packet
      forbidden:
      - public explanation、irreversible commitment、silent replacement、recipient-visible continuity の final basis、contradiction 発生後の無通知継続
  context_and_authority_rules:
    local_same_tenant_internal:
      statement: domain-local review / preparation では preview と reflection preparation を許す。ただし reflected basis を持たない authoritative action は禁止する。
    central_or_cross_jurisdiction:
      statement: central lane は provisional export と contradiction handling を統括できるが、それでも authoritative route switch と hold release は reflected 後に限定する。
    emergency_containment:
      statement: emergency lane は containment / notification prep を早められるが、ratified-unreflected outcome を steady-state authority の代用にしてはならない。
    external_audit_or_recipient_visible:
      statement: recipient-visible provisional export は named recipient・lawful purpose・archive/bridge continuity・revocation/notice duty が揃う場合だけ conditional に許す。public / anonymous / irreversible 方向は forbidden とする。
  contradiction_and_lifecycle_rules:
    expiry:
    - provisional packet は expiry と review_due を持ち、期限超過後は active basis へ自動昇格せず失効させる。
    supersession:
    - successor reflected outcome が成立したとき、旧 provisional packet は superseded として recipient notice と archive linkage を残す。
    rollback_and_contradiction:
    - contradiction、rollback、reflection failure、authority withdrawal が起きたとき、provisional export は explicit notice path を通じて revoke / correct / narrow しなければならない。
    - silent replacement、silent expiry、local memo だけでの cleanup を禁止する。
  responsibility_split:
    DecisionLedger: adjudication lifecycle、provisional_binding_class、allowed_surface_set、expiry、recipient set、notice / follow-up duty、supersession / contradiction link の正本を持つ。
    GraphEngine: reflection_ops、active route 維持、head_clear 禁止、expiry 到達、contradiction 発火、recipient notice queue を永続化する。
    GraphLint: unreflected outcome の authoritative use、shared_core coverage 化、route switch、hold release、silent provisional export、notice 欠落を検査する。
    archive_object: provisional packet digest、recipient scope、expiry、contradiction notice、supersession lineage の immutable linkage を保持する。
  prohibited_shortcuts:
  - ratified だからほぼ reflected とみなして active route を切り替えること
  - provisional coverage preview を shared_core coverage と読み替えること
  - reflection pending の hold を解除したことにすること
  - recipient-visible provisional export を post-confirm duty や contradiction notice なしで配ること
  - public explanation や irreversible commitment を provisional packet だけで正当化すること
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
provisional_recipient_visible_export_notice_governance:
  status: provisional_fixed
  statement: provisional_recipient_visible_export_notice_governance とは、authoritative reflection 前または controlled post-confirm で recipient-visible に出される provisional packet を packet class ごとに分離し、contradiction・rollback・supersession・expiry・reflection completion に応じた revoke / correct / narrow / follow-up notice の duty を registry 化して、recipient continuity と監査可能性を壊さないよう統治する規則である。
  core_claims:
  - recipient-visible provisional export は単一の操作ではなく、current_decision_preview・bounded_preview・emergency_reveal・post_confirm_follow_up の4 packet class に分ける。各 class は許される recipient、claim surface、action expectation、continuity requirement が異なる。
  - recipient-visible provisional packet は、packet_class、explicit provisional label、named recipient scope、expiry、notice plan、follow-up owner、predecessor/successor lineage を持たなければならない。contradiction / rollback / supersession / expiry が起きた packet を silent replacement または silent expiry で終わらせてはならない。
  - revoke は lawful basis 自体が失効したときに使い、correct は recipient scope / commitment class / reveal class を広げない successor correction に限定し、narrow は reveal scope / recipient scope / claim surface を単調減少で狭める replacement に限定する。follow-up notice は reflected successor または final closure が出た後に、受信済み recipient へ outcome を接続する義務である。
  - public explanation と anonymous broad distribution は既定で forbidden とし、recipient-visible provisional packet は named recipient または bounded recipient set に限定する。public-facing explanation が必要な場合は provisional packet ではなく別の redacted / ratified communication lane を使う。
  - archive / bridge continuity は packet class と context に応じて mandatory 化し、cross-boundary reuse、external audit、emergency reveal、recipient-visible continuity を伴う packet では archive manifest digest と bridge token proof を欠いてはならない。
  packet_classes:
    current_decision_preview:
      statement: 現在の意思決定参加者に対し、current decision の provisional state を説明するための最小 packet。action expectation は review / acknowledgment に限り、final commitment を発生させない。
      mandatory_fields:
      - packet_class_ref
      - provisional_label_ref
      - recipient_scope_ref
      - issue_time
      - expiry_at
      - notice_plan_ref
      - follow_up_owner_ref
      forbidden:
      - irreversible commitment の要求
      - public explanation への流用
      - archive / bridge continuity を欠いた cross-boundary reuse
    bounded_preview:
      statement: limited recipient に対し preview / preparation を行う packet。future reflected outcome への provisional anticipation を伝えるが、authoritative route switch や final obligation を生まない。
      mandatory_fields:
      - packet_class_ref
      - provisional_label_ref
      - recipient_scope_ref
      - preview_basis_ref
      - expiry_at
      - notice_plan_ref
      - predecessor_packet_ref_or_null
      - follow_up_owner_ref
      conditional_fields:
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null when cross-boundary continuity is intended
    emergency_reveal:
      statement: containment / safety / time-critical coordination のために緊急で限定開示する packet。steady-state authority の代用にはならず、strict expiry・recall path・post-confirm follow-up を持つ。
      mandatory_fields:
      - packet_class_ref
      - provisional_label_ref
      - recipient_scope_ref
      - emergency_reason_ref
      - issue_time
      - expiry_at
      - notice_plan_ref
      - follow_up_owner_ref
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null
      forbidden:
      - irreversible commitment の要求
      - public broadcast
      - notice plan を欠いた emergency reveal
    post_confirm_follow_up:
      statement: reflected successor または final closure を受信済み recipient へ接続するための follow-up packet。provisional packet の後続であり、新たな provisional reliance を増やすための packet ではない。
      mandatory_fields:
      - packet_class_ref
      - predecessor_packet_ref
      - final_outcome_ref_or_closure_ref
      - recipient_scope_ref
      - follow_up_reason_ref
      - archive_manifest_digest_ref_or_null
  notice_action_family:
    revoke:
      trigger:
      - contradiction が packet の claim surface を維持不能にしたとき
      - rollback / authority withdrawal / reflection failure により lawful basis が消えたとき
      - expiry 超過後も lawful successor を発行できないとき
      constraints:
      - recipient-visible packet には revoke notice を発行しなければならない
      - revoke は active basis への silent fallthrough を許さない
    correct:
      trigger:
      - packet 内容に修正可能な factual / labeling / linkage defect があり、lawful basis は保持されるとき
      constraints:
      - recipient scope を広げてはならない
      - irreversible commitment class を追加してはならない
      - predecessor/successor link を必須とする
    narrow:
      trigger:
      - reveal scope、recipient scope、claim surface、retention / forwardability を狭める必要があるとき
      constraints:
      - monotone narrowing だけを許す
      - broader packet を narrower packet で置き換えるときも notice を要する
    follow_up_notice:
      trigger:
      - reflected successor が成立したとき
      - final closure / revoke / permanent hold が確定したとき
      - emergency reveal の暫定状態を steady-state outcome に接続するとき
      constraints:
      - 受信済み recipient に successor または closure を接続する
      - public explanation へ一般化して代用してはならない
  state_machine:
    states:
    - draft
    - issued_active
    - notice_pending
    - corrected_successor_issued
    - narrowed_successor_issued
    - revoked_closed
    - expired_notice_pending
    - follow_up_closed
    transition_rules:
    - 'draft -> issued_active: issue admissibility と mandatory field family を満たしたとき'
    - 'issued_active -> notice_pending: contradiction / rollback / supersession / expiry / reflection completion が起きたとき'
    - 'notice_pending -> corrected_successor_issued: widening を伴わない correction successor と correction notice が発行されたとき'
    - 'notice_pending -> narrowed_successor_issued: monotone narrowing successor と narrowing notice が発行されたとき'
    - 'notice_pending -> revoked_closed: revoke notice が発行され、active reliance が閉じられたとき'
    - 'notice_pending -> follow_up_closed: reflected successor または final closure の follow-up notice が発行されたとき'
    - 'issued_active -> expired_notice_pending: expiry 到達時に successor も closure notice も未発行のとき'
  context_matrix:
    local_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: conditional
      bridge_continuity: conditional
      post_confirm_follow_up: conditional
      notes:
      - same-team の review / acknowledgment 向け packet を許す
      - cross-boundary reuse または later replay を想定する場合は archive continuity を mandatory に繰り上げる
    central_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: mandatory
      bridge_continuity: conditional
      post_confirm_follow_up: mandatory
      notes:
      - central policy / exception lane では notice owner と successor lineage を必須にする
      - recipient-visible continuity または cross-jurisdiction handoff を伴う場合は bridge continuity も mandatory にする
    emergency_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: mandatory
      bridge_continuity: mandatory
      post_confirm_follow_up: mandatory
      notes:
      - containment 指示や危険回避の bounded action は許すが、steady-state authority の代用は許さない
      - expiry と recall path を欠く emergency reveal は許さない
    external_audit_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: mandatory
      bridge_continuity: mandatory
      post_confirm_follow_up: mandatory
      notes:
      - recipient は audit recipient と lawful purpose で明示束縛し、anonymous publication を禁止する
      - supersession / revoke / correction には immutable archive linkage を必須にする
  responsibility_split:
    DecisionLedger:
    - packet_class、recipient_scope、provisional_label、expiry、notice_plan、follow_up_owner、predecessor/successor lineage、archive / bridge continuity ref を正本化する。
    - notice_action family の trigger、required notice、completion state を event として保持する。
    GraphEngine:
    - contradiction / rollback / supersession / expiry / reflection completion を受けて notice_pending・successor issuance・follow_up_due を遷移させる。
    - context ごとの archive / bridge mandatory 判定、recipient set enforcement、silent replacement 防止を実行する。
    GraphLint:
    - public explanation 化、irreversible commitment 化、silent replacement、silent expiry、widening correction、missing follow-up owner、missing continuity ref を検査する。
    archive_object:
    - packet digest、recipient scope、notice artifact、successor linkage、archive manifest digest、bridge token proof ref を immutable に保持する。
  prohibited_shortcuts:
  - public explanation を provisional packet で代用すること。
  - recipient-visible packet を contradiction 後に silent replacement すること。
  - expiry を revoke / follow-up notice の代わりに使うこと。
  - correction を理由に recipient scope や commitment class を広げること。
  - archive / bridge continuity が必要な packet を local memo だけで置き換えること。
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
provisional_recipient_visible_export_acknowledgment_recall_governance:
  status: provisional_fixed
  statement: provisional_recipient_visible_export_acknowledgment_recall_governance とは、recipient-visible provisional packet に対して、どの packet class / context で recipient acknowledgment を要求し、どの evidence family で contradiction closure・rollback 完了・follow-up closure・recall 完了を判定するかを registry 化し、silent gap と downstream open risk を統治する規則である。
  core_claims:
  - recipient acknowledgment は、named recipient が特定 packet またはその lawful successor / closure notice を受領し、少なくとも recipient-side state transition が起きたことを示す recipient-side evidence である。これは authority approval、truth 判定、contradiction 解消、lawful basis 回復そのものではない。
  - batch recall evidence は、recipient 集合ごとに recall duty がどこまで閉じたかを示す coverage evidence であり、per-recipient acknowledgment、hard bounce/no-access、successor follow-up acknowledgment、downstream forwarding disclosure、downstream recall completion を束ねて判定する。単なる send success、open-tracking、non-response はそれだけで completion にならない。
  - closure 判定は packet 単体ではなく recipient set と downstream chain を含む。contradiction / rollback / follow-up の duty は、required notice を発行しただけでは閉じず、context ごとに要求される acknowledgment / recall coverage class を満たして初めて close できる。
  - emergency_reveal は issuance の first move を recipient acknowledgment 待ちにしてはならないが、closure と recall completion は最も厳格に追跡する。external_audit では bounded_complete を認めず、immutable witness を伴う exact completion だけを closure とみなす。
  recipient_acknowledgment_semantics:
    receipt_acknowledgment: named recipient またはその lawful delegate が、packet digest / predecessor-successor lineage / issue_time を束縛して受領事実を返したことを示す最小 acknowledgment である。
    read_or_action_acknowledgment: recipient が packet を確認し、required bounded action または reliance freeze を受け取ったことを示す acknowledgment である。review request や containment instruction を伴う packet で追加要求されうる。
    recall_acknowledgment: recipient が revoke / correction / narrow / follow-up closure を受領し、旧 packet への reliance を止め、保持 / forwarding / operational use の停止または置換を確認したことを示す acknowledgment である。
    non_implications:
    - acknowledgment は current decision approval を意味しない。
    - acknowledgment は packet 内容の真実性や lawful adequacy を保証しない。
    - receipt_acknowledgment は recall_acknowledgment の代用ではない。
  acknowledgment_requirement_matrix:
    current_decision_preview:
      local_context: conditional
      central_context: mandatory
      emergency_context: forbidden
      external_audit_context: forbidden
    bounded_preview:
      local_context: conditional
      central_context: mandatory
      emergency_context: forbidden
      external_audit_context: mandatory
    emergency_reveal:
      local_context: mandatory
      central_context: mandatory
      emergency_context: mandatory
      external_audit_context: mandatory
    post_confirm_follow_up:
      local_context: conditional
      central_context: mandatory
      emergency_context: mandatory
      external_audit_context: mandatory
  conditional_rules:
    current_decision_preview_local:
    - same-team bounded review で downstream forwarding が制度上禁止され、later replay basis に使わない場合は conditional とする。
    - recipient が hold release 準備、route switch 準備、protected facet handling のいずれかに関与する場合は mandatory へ繰り上げる。
    bounded_preview_local:
    - named recipient が bounded preparation だけを行い、cross-boundary continuity を持たず、packet expiry が短い場合は conditional とする。
    - cross-boundary recipient、later recall cost が高い recipient、または forwarding 許容 recipient を含む場合は mandatory へ繰り上げる。
    post_confirm_follow_up_local:
    - 旧 provisional packet が local confined で downstream chain を持たない場合は conditional とする。
    - 旧 packet が emergency_reveal 由来、または prior recall gap を含む場合は mandatory へ繰り上げる。
  batch_recall_evidence_classes:
    hard_bounce_no_access: delivery 失敗が recipient alias・delivery channel・time window に束縛され、content access が成立していないことを示す evidence。未到達の closure に使える。
    soft_bounce_or_temporary_failure: 一時的 failure。completion には使えず pending または escalated_gap に残す。
    explicit_receipt_or_read_ack: recipient から返る receipt / read / action acknowledgment。reach coverage には使えるが recall completion には recall_ack または lawful successor acknowledgement を別途要する。
    explicit_recall_ack: recipient が revoke / correction / narrow / follow-up closure を受領し旧 reliance を止めたことを示す evidence。
    non_response_timeout: 指定 timeout まで recipient-originated evidence が無い状態。completion そのものではなく bounded_complete 候補または escalation trigger にしかならない。
    downstream_forwarding_disclosed: recipient が downstream recipient への forwarding / re-share を disclosed した evidence。child recipient set を batch に追加し、親 recipient の recall は child coverage 完了まで閉じない。
    downstream_silent_retention_gap: forwarding や retention が起こりうるが child recipient / retention stop が証明できない gap。complete を阻害する。
    successor_follow_up_ack: reflected successor または final closure packet への acknowledgment。旧 packet の recall_ack を代替しうるが predecessor/successor lineage を必須とする。
  completion_classes:
    complete: 全 recipient alias が explicit_recall_ack、successor_follow_up_ack、または hard_bounce_no_access で覆われ、開いた downstream chain が残っていない状態。
    bounded_complete: 一部 recipient が non_response_timeout のままだが、packet class / context / sink exposure が bounded であり、downstream forwarding / silent retention gap がなく、manual override と audit witness が付いた例外 closure。
    escalated_gap: downstream forwarding disclosure 未回収、downstream_silent_retention_gap、soft bounce の長期継続、または mandatory acknowledgment context での non-response が残り、上位 owner / authority へ引き上げられた状態。
    incomplete: timeout 進行中または required successor / recall evidence が未収集の状態。
  context_completion_matrix:
    local_context:
      complete_required_for:
      - emergency_reveal when contradiction/rollback/final closure is involved
      - cross-boundary bounded_preview
      - any packet with disclosed downstream forwarding
      bounded_complete_allowed_when:
      - packet class が current_decision_preview または bounded_preview である
      - recipient set が local confined で forwarding が禁止されている
      - non_response_timeout だけが残り、hard bounce / forwarding / silent retention gap がない
      - follow_up_owner の manual override と archive witness がある
      manual_override: allowed with owner_reason_ref・risk_acceptance_ref・next_review_at。
      audit_witness: recipient alias set、timeout record、channel log digest、override reason を残す。
    central_context:
      complete_required_for:
      - all emergency_reveal
      - all external-facing bounded_preview
      - all post_confirm_follow_up with prior recall gap
      bounded_complete_allowed_when:
      - packet class が current_decision_preview または strictly internal bounded_preview である
      - central owner と policy reviewer の dual sign-off がある
      - non_response_timeout 以外の open gap がなく、downstream forwarding / silent retention gap がない
      manual_override: conditional。central owner と policy reviewer の dual sign-off を必須とし、expiry 延長の代用にしてはならない。
      audit_witness: recipient coverage table、override packet、next escalation trigger、closure digest を残す。
    emergency_context:
      complete_required_for:
      - all contradiction closure
      - all rollback closure
      - all emergency_reveal expiry closure
      - all post_confirm_follow_up after emergency_reveal
      bounded_complete_allowed_when: []
      manual_override: issuance には不要だが closure には使えない。non-response は escalation を遅らせる理由にならない。
      audit_witness: issue_time、first-move reason、recipient reach attempts、escalation path、post-confirm closure evidence を残す。
    external_audit_context:
      complete_required_for:
      - all packet classes
      bounded_complete_allowed_when: []
      manual_override: forbidden。recipient-visible completion を percentage や attestation only で近似してはならない。
      audit_witness: immutable recipient coverage manifest、predecessor/successor lineage、recall evidence digest、downstream chain closure evidence を残す。
  effect_rules:
    contradiction_closure:
    - required notice を出しただけでは contradiction closure にならない。required recipient coverage class が満たされ、open downstream chain が閉じて初めて closure とみなす。
    - recipient acknowledgment は contradiction の truth value を変えない。closure は notice/recall duty の充足判定にだけ使う。
    rollback_completion:
    - rollback 完了は packet recall completion と underlying action rollback を分ける。recipient acknowledgment は前者にだけ効く。
    - 旧 packet に基づく bounded action が発行されていた場合は、read_or_action_acknowledgment または successor_follow_up_ack を要する。
    follow_up_notice_completion:
    - follow-up notice は、reflective successor または final closure が recipient set に届き、required acknowledgment class を満たしたときに閉じる。
    - post_confirm_follow_up は predecessor_packet_ref を欠いたまま旧 packet の recall completion 代用にしてはならない。
  responsibility_split:
    DecisionLedger:
    - packet ごとに acknowledgment requirement class、recipient alias set、timeout、recall duty state、manual override 条件、downstream child set linkage を正本記録する。
    - per-recipient coverage state を received / read / recalled / bounced_no_access / pending / escalated_gap に分けて保持する。
    GraphEngine:
    - issue_time・expiry・notice action・recipient response をもとに timeout と escalation を駆動し、downstream forwarding disclosed 時は child recipient set を追加する。
    - batch completion class を complete / bounded_complete / escalated_gap / incomplete のいずれかへ計算し、context ごとの closure admissibility を判定する。
    GraphLint:
    - send success や open tracking を acknowledgment と誤用すること、non-response を recall completion と数えること、downstream gap を無視して complete 扱いすること、forbidden context で bounded_complete を使うことを検査する。
    archive_object:
    - recipient coverage manifest、acknowledgment digest、bounce/no-access evidence digest、override packet digest、downstream closure manifest を immutable に保持する。
  prohibited_shortcuts:
  - SMTP accepted / message sent を recipient acknowledgment の代用にすること。
  - open pixel / click log だけで read_or_action_acknowledgment を主張すること。
  - non-response timeout を complete とみなし、recall duty を silent close すること。
  - downstream forwarding disclosed 後に child recipient coverage を追加せず親 recipient だけで closure すること。
  - external_audit や emergency_context で bounded_complete を使って recall completion を近似すること。
  residual_open_points: []
central_delegation_charter_extension_registry_governance:
  status: provisional_fixed
  statement: central_delegation_charter_extension_registry_governance とは、central delegation charter の comparison-stable な taxonomy core と、weighted quorum・ordered fallback・jurisdiction subtype extension を収める extension registry を分離し、context ごとの admissibility・override / escalation との接続・migration / supersession の統治境界を定める規則である。
  separation_principle:
  - taxonomy core は、どの authority family がどの jurisdiction family / context / lawful purpose に対して current decision を拘束できるかを比較可能にする最小核であり、文脈ごとに意味が変わる tally や fallback sequence を埋め込まない。
  - extension registry は、core が固定した authority / route / boundary の上に forum tally、successor chain、finer legal overlay を付与する層である。extension は family-level minimum を弱めず、monotone strengthening または bounded operational refinement だけを許す。
  - weighted quorum と ordered fallback は route mechanics の extension であり、jurisdiction subtype extension は family-level classification の上に乗る legal / sector overlay である。3者とも authority family や non-delegable boundary そのものに格上げしてはならない。
  core_vs_extension_matrix:
    weighted_quorum:
      classification: extension_registry
      statement: weighted quorum は collective approval forum における seat weight・threshold・veto・abstention・timeout rule を表す approval-structure extension であり、authority family や approval route family そのものではない。
      core_anchor: authority_family / approval_route_family / lawful_purpose_family は core に残し、weight vector・k-of-n threshold・veto class・abstention semantics・timeout handoff を extension profile に置く。
      mandatory_when:
      - single approver ではなく heterogeneous authority seat または 3席以上の collective forum を current decision basis に使うとき
      - same-tier conflict batch や central supervised board で vote weight / veto reach / abstention handling が decision outcome を変えうるとき
      conditional_when:
      - single-tenant の protected facet review を temporary board 化し、seat weight を advisory ではなく bounded approval input にするとき
      forbidden_when:
      - single_domain_route の単独承認を擬似 quorum へ読み替えるとき
      - emergency immediate containment の first move を quorum 成立待ちにするとき
      - external auditor や observer credential holder を voting seat や veto seat に数えるとき
    ordered_fallback:
      classification: extension_registry
      statement: ordered fallback は timeout・unavailability・recusal・route invalidation に備えた pre-registered successor chain を表す route-succession extension であり、approval route family 自体ではない。
      core_anchor: approval_route_family / override_family / escalation_family / non_delegable_boundary は core に残し、successor chain・trigger・wait window・activation witness・post-confirm duty を extension profile に置く。
      mandatory_when:
      - emergency_then_post_confirm_route で authority loss や responder unavailability を lawful に吸収する必要があるとき
      - central supervised route で responder succession または timeout handoff を事前登録しないと continuity が壊れるとき
      conditional_when:
      - local / central route で bounded successor chain を持つが、active route の primary path は明確に生きているとき
      forbidden_when:
      - fallback を使って non-delegable escalation や centralization override を迂回するとき
      - successor authority が predecessor より弱い権限または広い reveal を許す downgrade になるとき
      - route switch や timeout clear を silent に実施するとき
    jurisdiction_subtype_extension:
      classification: split_core_and_extension
      statement: jurisdiction family は taxonomy core に残し、sector statute・data class・export control・retention / notice variation・observer / attestation delta などの finer legal/regulatory overlay は jurisdiction subtype extension として registry 化する。
      core_anchor: tenant_relation_scope / jurisdiction_family_scope / lawful_purpose_family / non_delegable_boundary は core に残し、subtype_code・delta rule・mandatory witness delta・retention / notice delta・escalation trigger を extension profile に置く。
      mandatory_when:
      - cross_jurisdiction_family または sovereign_or_external_audit_overlay が current basis に入るとき
      - protected facet や recipient-visible export が subtype-specific disclosure / retention / notice rule に触れるとき
      - external audit response や cross-tenant reveal で legal overlay を明示しないと lawful purpose を特定できないとき
      conditional_when:
      - same jurisdiction family 内だが sector-specific overlay や customer-specific compliance appendix が存在しうるとき
      forbidden_when:
      - subtype extension を使って family-level minimum disclosure cap・observer requirement・retention duty を弱めるとき
      - locale や recipient 名だけから subtype を暗黙推定し、explicit profile_ref を持たないとき
  context_matrix:
    local_context:
      weighted_quorum: conditional。collective forum を current basis に使う場合だけ admissible。単独承認の擬似 quorum 化は forbidden。
      ordered_fallback: conditional。bounded successor chain は許すが、silent route switch や downgrade は forbidden。
      jurisdiction_subtype_extension: conditional。sector / customer overlay がある場合に限って使う。family-level minimum を下げる local convenience は forbidden。
    central_context:
      weighted_quorum: conditional。central board / supervised forum で seat weight が outcome を変える場合に admissible。authority family の代用にはしない。
      ordered_fallback: conditional。central responder succession や timeout handoff は許すが、non-delegable escalation の省略は forbidden。
      jurisdiction_subtype_extension: mandatory 寄り。cross-boundary / protected facet / external visibility を扱う場合は explicit profile_ref を必須とする。
    emergency_context:
      weighted_quorum: immediate containment では forbidden。post-confirm review や retrospective adjudication では conditional。
      ordered_fallback: mandatory 寄り。responder loss / timeout / custody break に備えた successor chain を要求する。
      jurisdiction_subtype_extension: containment first move では conditional だが、external reveal・retention・post-confirm disposition に入る時点で mandatory 寄りに昇格する。
    external_audit_context:
      weighted_quorum: forbidden。auditor-facing disclosure gate を vote weight だけで決めない。
      ordered_fallback: conditional。responder succession は許すが、supervised route を弱めてはならない。
      jurisdiction_subtype_extension: mandatory。overlay subtype を explicit に束縛しない external audit response を current basis にしてはならない。
  binding_rules:
    with_approval_route:
    - weighted quorum は dual_control_route または central_supervised_route の seat set が explicit な場合にだけ current basis へ接続できる。single_domain_route の solitary approval を後付けの weighted vote に変換してはならない。
    - ordered fallback は predecessor route と successor route の両方を explicit に持ち、trigger / timeout / recusal / invalidation reason を event として残す。fallback 発火は same-or-higher authority と monotone scope narrowing または centralization を満たさなければならない。
    - jurisdiction subtype extension は route family 自体を silent に変更せず、必要なら route_requirement を厳しくする delta としてだけ作用できる。
    with_override_and_escalation:
    - weighted quorum は centralization override や non-delegable escalation を自動承認しない。必要な override family は別に core 側で明示する。
    - ordered fallback は pre-registered な chain に従って centralization override または non-delegable escalation を発火できるが、activation witness と post-confirm duty を伴わなければならない。
    - jurisdiction subtype extension は external notice、observer requirement、retention、bridge / archive continuity の追加義務を課せるが、family-level minimum を緩める override には使えない。
    with_non_delegable_boundary:
    - 3つの extension はいずれも non-delegable action family を削除・縮退・匿名化してはならない。
    - protected facet の final interpretation、cross-boundary broad reveal、bridge token の external continuity revoke / reissue、post-confirm 前の public explanation / irreversible commitment は extension だけで lawful 化してはならない。
  registry_schema:
    weighted_quorum_profile:
      mandatory_fields:
      - profile_id
      - seat_class_set
      - weight_vector_ref
      - threshold_rule
      - veto_class_set_or_null
      - abstention_rule
      - timeout_policy_ref
      - fallback_profile_ref_or_null
      - supersession_rule_ref
    ordered_fallback_profile:
      mandatory_fields:
      - profile_id
      - predecessor_route_family
      - ordered_successor_chain
      - activation_trigger_set
      - wait_window_ref
      - same_or_higher_authority_constraint
      - post_confirm_policy_ref_or_null
      - supersession_rule_ref
    jurisdiction_subtype_profile:
      mandatory_fields:
      - profile_id
      - parent_jurisdiction_family
      - subtype_code
      - lawful_purpose_delta_set
      - reveal_cap_delta_set
      - retention_notice_rule_set
      - required_attestation_profile_delta_set
      - required_observer_profile_delta_set
      - escalation_trigger_set
      - supersession_rule_ref
  responsibility_split:
    DecisionLedger: charter_core_ref と extension_profile_ref 群、activation reason、seat weight / fallback trigger / subtype binding の current decision 正本、supersession / inheritance link を保持する。
    GraphEngine: context 判定から extension mandatory/conditional/forbidden を解釈し、timeout / recusal / route invalidation に応じた fallback activation、subtype delta による observer / attestation / notice requirement を発火する。
    GraphLint: weighted quorum の誤用、silent fallback、downgrade successor、missing subtype profile、subtype による family minimum 緩和、auditor の voting seat 化を検査する。
    archive_object: charter core digest、extension profile digest、activation witness、supersession / inheritance lineage、migration note を immutable に保持する。
  prohibited_shortcuts:
  - weighted quorum を authority family 名の一部に埋め込み、core taxonomy の比較対象にしてしまうこと
  - ordered fallback を使って centralization override や non-delegable escalation を silent に省略すること
  - jurisdiction subtype extension を単なるラベルとして扱い、retention / notice / observer / attestation の delta を持たせないこと
  - subtype extension を使って family-level minimum disclosure cap や reviewer independence を弱めること
  - external auditor や observer credential holder を quorum seat / veto seat に数えること
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで registry 化するか
central_delegation_charter_extension_transition_governance:
  status: provisional_fixed
  statement: central_delegation_charter_extension_transition_governance とは、central delegation charter extension registry に属する weighted quorum・ordered fallback・jurisdiction subtype extension の各 profile について、migration・supersession・inheritance の遷移境界を分離し、taxonomy core・non-delegable boundary・context admissibility を壊さずに alias chain / successor chain / deprecation duty / provisional export propagation を統治する規則である。
  core_claims:
  - extension profile の遷移は migration・supersession・inheritance の3類型に分ける。migration は semantic delta が none の identifier / schema / code migration に限定し、supersession は material または bounded でも outcome space を変えうる変更を successor chain へ送る。inheritance は parent profile の family-level minimum を保持したまま、child profile が monotone strengthening または bounded narrowing だけを加える場合に限定する。
  - alias chain は equivalence-preserving migration にだけ使う。threshold rule、veto reach、fallback successor order、retention / observer / attestation duty、reveal cap の意味が変わる場合は alias ではなく successor chain を使わなければならない。
  - deprecation は old profile を history から消すことではなく、新規 issuance に対する predecessor freeze、bounded dual-validity window、context 別 successor admissibility、notice duty を束ねる lifecycle である。deprecated predecessor を current basis に使い続ける条件は context と issuance_time で制御し、silent continuation を禁止する。
  - provisional recipient-visible export と emergency lane は charter extension の遷移影響を受ける。recipient-visible packet が deprecated / superseded profile に依存している場合は follow-up notice または revoke / correction を要し、emergency lane では immediate first move を阻害しない一方で post-confirm successor binding を必須にする。
  - non-delegable boundary は extension 遷移でも弱められない。weighted quorum の再設計、ordered fallback の route successor、jurisdiction subtype overlay の変更はいずれも protected facet final interpretation、central exception、cross-boundary broad reveal、bridge continuity revoke / reissue、public explanation / irreversible commitment を extension 単独で lawful 化してはならない。
  transition_taxonomy:
    migration:
      statement: migration は semantic delta none の profile rename / schema version update / registry code migration を扱う。predecessor と successor は comparison-stable であり、alias chain で同値比較できる。
      admissible_when:
      - core_anchor と outcome space が不変である
      - comparability witness と alias family ref を提示できる
      - bounded dual-validity window と new issuance freeze_at を定義できる
      mandatory_fields:
      - predecessor_profile_ref
      - successor_profile_ref
      - transition_kind=migration
      - semantic_delta_class=none
      - alias_family_ref
      - comparability_witness_ref
      - dual_validity_window_ref_or_null
      - new_issuance_freeze_at
      - deprecation_notice_policy_ref
      forbidden_when:
      - threshold / veto / retention / observer / attestation / reveal cap の意味が変わる
      - context admissibility が predecessor と successor で変わる
      - non-delegable boundary への接続条件が変わる
    supersession:
      statement: supersession は bounded でも outcome space を変えうる変更を扱う successor 遷移であり、predecessor と successor は lineage で結ばれるが alias ではない。
      admissible_when:
      - material または bounded semantic delta が明示されている
      - successor admissibility と predecessor freeze policy が context 別に定義されている
      - deprecation notice / follow-up notice / migration barrier が定義されている
      mandatory_fields:
      - predecessor_profile_ref
      - successor_profile_ref
      - transition_kind=supersession
      - semantic_delta_class in {bounded, material}
      - delta_summary_ref
      - affected_context_set
      - new_issuance_freeze_at
      - allowed_history_window_ref_or_null
      - deprecation_notice_policy_ref
      - provisional_export_propagation_rule_ref_or_null
      forbidden_when:
      - successor を silent activation する
      - deprecated predecessor を freeze 後の新規 issuance に使う
      - dual-validity を無期限化する
    inheritance:
      statement: inheritance は parent profile の minimum を保ったまま child profile が stricter delta または bounded narrowing を足す遷移であり、family-level minimum を弱める child override を許さない。
      admissible_when:
      - parent profile ref と inherited field family が明示されている
      - child delta が monotone strengthening または bounded narrowing である
      - inheritance 適用 context と local override boundary が宣言されている
      mandatory_fields:
      - child_profile_ref
      - parent_profile_ref
      - transition_kind=inheritance
      - inherited_field_family_set
      - child_delta_ref
      - monotone_proof_ref
      - applicable_context_set
      - deprecation_notice_policy_ref_or_null
      forbidden_when:
      - vote dilution や weaker authority route を child で追加する
      - family-level retention / observer / attestation / reveal minimum を child が下げる
      - inheritance を理由に non-delegable escalation を省略する
  family_rules:
    weighted_quorum:
      migration_boundary:
      - seat_class_set と threshold outcome region が同値で、weight vector / veto semantics / abstention semantics の意味が不変な rename / schema migration だけを migration とする
      - seat class の集約単位や veto reach が変わる場合は supersession とする
      supersession_boundary:
      - threshold percentage、k-of-n rule、veto reach、timeout-to-fallback linkage が outcome を変えうる場合
      - observer_nonvoting_seat の扱い、abstention counting、seat weight normalization が変わる場合
      inheritance_boundary:
      - child forum が parent forum の seat class を保持したまま stricter threshold、additional veto、narrower reveal cap を加える場合だけ inheritance を許す
      - vote dilution、seat removal、observer の voting seat 化、quorum wait の長期化は inheritance に使えない
    ordered_fallback:
      migration_boundary:
      - successor route family と activation trigger semantics が不変で route_id / schema ref / note family だけが変わる場合に migration を許す
      supersession_boundary:
      - ordered successor chain の順序、authority tier、wait_window、activation_trigger_set、post-confirm duty が変わる場合
      - same-or-higher authority constraint の実質が変わる場合
      inheritance_boundary:
      - child route が parent chain を保持したまま stricter trigger、shorter wait、centralized successor prepending を行う場合だけ inheritance を許す
      - weaker authority append、silent bypass branch、non-delegable escalation 回避は inheritance で導入してはならない
    jurisdiction_subtype_extension:
      migration_boundary:
      - subtype_code や registry namespace が変わっても lawful_purpose_delta / reveal_cap_delta / retention_notice_rule / observer / attestation delta が不変なら migration を許す
      supersession_boundary:
      - retention / notice duty、required observer / attestation、reveal_cap、escalation trigger のいずれかが変わる場合は supersession とする
      inheritance_boundary:
      - child subtype が parent subtype の delta を保持したまま stricter retention / notice / observer / attestation requirement を足す場合だけ inheritance を許す
      - family-level minimum を緩める local/customer convenience overlay を inheritance に使ってはならない
  context_matrix:
    local_context:
      migration: conditional。alias comparability witness があれば bounded dual-validity を許す。notice は affected operator / reviewer へ必要。
      supersession: conditional。new issuance freeze と successor ref を必須とし、active board / route / subtype basis が残っている場合は follow-up notice を要求する。
      inheritance: conditional。team-local child delta は許すが parent minimum 緩和は forbidden。
    central_context:
      migration: mandatory 寄り。registry alias chain、effective_at、deprecation notice、archive digest linkage を必須とする。
      supersession: mandatory。successor admissibility matrix、dual-validity cap、new issuance freeze、provisional export propagation を必須とする。
      inheritance: conditional。central-approved child overlay は許すが bounded local override を超える場合は supersession へ送る。
    emergency_context:
      migration: conditional。immediate first move を止めない範囲でのみ許し、post-confirm successor binding を mandatory とする。
      supersession: conditional。active containment 中は predecessor reuse を短時間だけ許しうるが、stabilization 後の new issuance は successor 強制とする。
      inheritance: mandatory 寄り。emergency child profile は shorter wait / tighter duty / stronger observer requirement だけを加えられる。weaker path の追加は forbidden。
    external_audit_context:
      migration: mandatory。predecessor / successor / alias family / comparability witness を audit packet に束縛しなければならない。
      supersession: mandatory。dual-reference disclosure、deprecation notice、history window を欠く current basis は forbidden。
      inheritance: conditional。external-audit overlay child は stricter disclosure / observer / retention rule だけを追加できる。minimum 緩和は forbidden。
  transition_record_schema:
    common_mandatory_fields:
    - extension_kind
    - transition_kind
    - predecessor_profile_ref_or_null
    - successor_or_child_profile_ref
    - semantic_delta_class
    - affected_context_set
    - effective_at
    - new_issuance_freeze_at_or_null
    - deprecation_notice_policy_ref_or_null
    - dual_validity_window_ref_or_null
    - comparability_witness_ref_or_null
    - monotone_proof_ref_or_null
    - provisional_export_propagation_rule_ref_or_null
    - emergency_lane_rule_ref_or_null
    - archive_transition_manifest_ref
    alias_chain_minimum_fields:
    - alias_family_ref
    - alias_generation
    - alias_equivalence_scope_ref
    successor_chain_minimum_fields:
    - successor_family_ref
    - successor_generation
    - delta_summary_ref
    - history_window_ref_or_null
    inheritance_minimum_fields:
    - parent_profile_ref
    - inherited_field_family_set
    - child_delta_ref
    - local_override_boundary_ref_or_null
  propagation_rules:
    provisional_export:
    - deprecated / superseded charter profile を参照する recipient-visible provisional packet は、follow-up successor notice または revoke / correction notice を必要とする
    - profile change により recipient scope / commitment class / public explanation admissibility が変わる場合、packet を silent に継続してはならない
    emergency_lane:
    - active containment 中の predecessor reuse は immediate first move を阻害しない bounded reuse に限る
    - post-confirm phase では successor profile または explicit closure notice へ必ず接続する
  responsibility_split:
    DecisionLedger: extension profile の predecessor/successor/parent lineage、semantic_delta_class、effective_at、freeze_at、deprecation notice duty、provisional export propagation duty を正本記録する。
    GraphEngine: issue_time / context / active route / recipient-visible state に応じて predecessor・successor・child profile の admissibility を計算し、notice due・post-confirm binding・dual-validity expiration を駆動する。
    GraphLint: alias と successor の取り違え、silent weakening、freeze 後 predecessor issuance、weaker child inheritance、missing comparability witness、missing provisional follow-up を検査する。
    archive_object: transition manifest、comparability witness、monotone proof、deprecation notice artifact、dual-validity window 記録を immutable に保持する。
  prohibited_shortcuts:
  - semantic delta がある profile change を alias migration と偽装すること
  - deprecated predecessor を freeze 後の新規 issuance に使い続けること
  - inheritance を理由に vote dilution、weaker fallback、retention / observer / attestation duty 緩和を入れること
  - provisional recipient-visible packet や emergency lane の active packet を successor notice なしで放置すること
  - dual-validity window を無期限の mixed-version coexistence に変えること
  residual_open_points:
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
central_delegation_charter_extension_mixed_version_batch_migration_governance:
  status: provisional_fixed
  statement: central_delegation_charter_extension_mixed_version_batch_migration_governance とは、weighted_quorum・ordered_fallback・jurisdiction_subtype_extension の各 extension family について、mixed-version coexistence の許容面と predecessor freeze / successor mandatory / dual-validity window / history-only retention の境界を registry 化し、migration batch witness によって open packet lineage・recipient-visible packet・emergency lane への伝播と rollback を統治する規則である。
  core_claims:
  - mixed-version coexistence は「old/new profile が同時に存在すること」一般ではなく、どの use surface で predecessor をまだ lawful に参照できるかの限定的な window である。新規 issuance と current basis は freeze 境界で強く切り、open lineage continuation・recipient-visible follow-up・active containment continuity・history verification を分けて扱う。
  - weighted_quorum は forum outcome space の比較可能性が崩れやすいため、mixed-version を open forum / open packet lineage の収束処理にだけ限定する。ordered_fallback は active route continuity を守るために最も広い bounded coexistence を許すが、post-confirm successor binding を mandatory とする。jurisdiction_subtype_extension は legal overlay の二重運用が disclosure / retention duty を曖昧にしやすいため、new issuance と external-audit current basis では原則 forbidden とする。
  - predecessor freeze は profile の existence を消すことではなく、new issuance current basis への再使用を止める cut である。freeze 後の predecessor は open lineage closure または immutable history verification にしか使えず、recipient-visible packet や emergency lane に残っている場合は successor notice / follow-up / explicit bounded reuse witness を要する。
  - batch migration witness は profile 単位ではなく migration batch 単位で管理する。batch は predecessor profile set、successor profile set、affected context set、open packet lineage set、recipient-visible packet set、emergency lane case set、freeze / dual-validity / rollback 情報を同時に持ち、silent mixed-version drift を検出できなければ complete とみなさない。
  - rollback は migration 失敗時に predecessor を自動復権させる近道ではない。rollback も独立の witnessed batch として扱い、どの issuance を predecessor へ戻し、どの recipient-visible packet と emergency lane に correction / successor replacement notice を出したかを明示しなければならない。
  family_surface_matrix:
    weighted_quorum:
      new_issuance_current_basis: forbidden。freeze 後の新規 board / forum / approval packet は必ず successor profile を使う。
      open_lineage_continuation: conditional。freeze 前に開いた forum session、既発行 packet lineage、未完了の supervised batch に限り bounded coexistence を認める。
      recipient_visible_follow_up: conditional。recipient-visible packet が旧 quorum で justified されている場合は successor notice または correction notice を要求する。
      emergency_lane_active_containment: forbidden。immediate first move を mixed quorum state や旧 board wait に依存させてはならない。
      external_audit_current_basis: forbidden。監査向け current disclosure gate を predecessor / successor 併記の曖昧運用にしてはならない。
      history_verification: admissible。immutable witness により predecessor / successor の lineage と outcome equivalence が追跡できる場合に限る。
    ordered_fallback:
      new_issuance_current_basis: forbidden。freeze 後の新規 route issuance は successor chain へ固定する。
      open_lineage_continuation: conditional。freeze 前に active だった chain instance と、それに束縛された packet lineage に限る。
      recipient_visible_follow_up: conditional。route justification や responder identity が変わる場合は successor follow-up packet を要する。
      emergency_lane_active_containment: admissible。active containment を切らないための bounded predecessor reuse を許すが、stabilization 後は successor mandatory とする。
      external_audit_current_basis: conditional。incident continuity を説明するための dual-reference disclosure は許すが、sole gate を predecessor に残してはならない。
      history_verification: admissible。route activation witness と successor binding witness が immutable に残る場合に限る。
    jurisdiction_subtype_extension:
      new_issuance_current_basis: forbidden。freeze 後に旧 legal overlay を新規 issuance の current basis に使ってはならない。
      open_lineage_continuation: conditional。freeze 前に lawful に発行された open packet lineage を閉じるための bounded continuation に限る。
      recipient_visible_follow_up: conditional。notice / retention / reveal duty が変わる場合は successor overlay に基づく follow-up or correction を mandatory とする。
      emergency_lane_active_containment: conditional。containment first move では bounded predecessor reuse を許しうるが、external reveal / retention / post-confirm disposition は successor binding を要する。
      external_audit_current_basis: forbidden。監査 current basis で旧 overlay と新 overlay を曖昧に併用してはならない。
      history_verification: admissible。predecessor overlay の lawful basis と successor overlay への cutover witness を archive で追跡できる場合に限る。
  freeze_and_successor_rules:
    weighted_quorum:
      predecessor_freeze_boundary: effective successor profile が reflected され、かつ new board / new approval packet を開始する時点で predecessor freeze を掛ける。open forum session は batch witness で列挙されたものだけ継続できる。
      dual_validity_window: open_forum_and_open_packet_only。window 終了後は history_only retention に落とす。
      successor_mandatory_for:
      - new board opening after freeze
      - freeze 後に新規発行される approval packet
      - external-audit current basis
      - recipient-visible packet の successor justification
    ordered_fallback:
      predecessor_freeze_boundary: successor chain が reflected され、かつ responder continuity を壊さずに chain switch 可能になった時点で new issuance freeze を掛ける。active chain instance は case 単位 witness に限り旧 chain を短時間保持できる。
      dual_validity_window: active_chain_only_then_history_only。active_containment case が stabilization / closure に入ったら successor binding へ切り替える。
      successor_mandatory_for:
      - freeze 後に新規生成される route packet
      - stabilization 後の post-confirm path
      - 新規 incident 受付
      - closure / audit packet
    jurisdiction_subtype_extension:
      predecessor_freeze_boundary: successor overlay が lawful purpose / reveal / retention / observer delta を確定した時点で new issuance freeze を掛ける。旧 overlay は pre-freeze lineage の closure にしか使えない。
      dual_validity_window: lineage_closure_only_then_history_only。cross-boundary reveal や external audit では no mixed current basis。
      successor_mandatory_for:
      - freeze 後のすべての new issuance
      - external-audit current disclosure
      - cross-boundary reveal
      - post-confirm retention / notice disposition
  batch_migration_witness:
    minimum_field_set:
    - migration_batch_id
    - extension_family
    - transition_kind_set
    - predecessor_profile_set
    - successor_profile_set
    - affected_context_set
    - new_issuance_freeze_at
    - dual_validity_window_class
    - dual_validity_window_end_or_condition
    - open_packet_lineage_set_or_digest
    - recipient_visible_packet_set_or_digest
    - emergency_lane_case_set_or_digest
    - propagation_policy_ref
    - completion_criteria_ref
    - rollback_policy_ref
    - archive_transition_manifest_ref
    - drift_scan_digest_ref
    family_specific_addenda:
      weighted_quorum:
      - active_forum_session_set_or_digest
      - seat_outcome_comparability_ref
      - board_close_or_revote_policy_ref
      ordered_fallback:
      - active_chain_instance_set_or_digest
      - trigger_carryover_mapping_ref
      - post_confirm_successor_deadline_ref
      jurisdiction_subtype_extension:
      - duty_delta_summary_ref
      - notice_retention_delta_ref
      - observer_attestation_delta_ref
    propagation_requirements:
    - open packet lineage は predecessor / successor のどちらで閉じるかを lineage 単位で明示しなければならない。
    - recipient-visible packet は successor notice / correction / revoke / closure のどれを要求するかを packet set ごとに明示し、必要な場合は provisional_recipient_visible_export_acknowledgment_recall_governance の completion 条件を満たさなければならない。
    - emergency lane case は active_containment 中の bounded predecessor reuse と post-confirm successor binding deadline を case ごとに明示しなければならない。
    - affected_context_set に external_audit_context が含まれる場合は dual-reference disclosure artifact を batch witness に含める。
    completion_criteria:
    - new_issuance freeze が system state 上で実際に有効化され、freeze 後 issuance が predecessor profile へ流入していない。
    - open packet lineage set が successor binding、explicit closure、または lawful history-only retention のいずれかで被覆されている。
    - recipient-visible packet set と emergency lane case set について required propagation が完了している。
    - drift scan により silent mixed-version drift が 0 件、または escalated and closed である。
    - rollback policy が tested / armed されており、no-rollback の場合は explicit waiver witness がある。
    rollback_rule:
    - rollback は rollback_batch_id を持つ独立 witness として記録し、どの successor activation を取り消し、どの predecessor re-enable を認めたかを明示する。
    - rollback は freeze を silent に解除してはならず、freeze override reason・time window・affected issuance scope を必須とする。
    - recipient-visible packet または emergency lane に影響する rollback は correction / successor replacement / closure notice のいずれかを required propagation とする。
  responsibility_split:
    DecisionLedger: migration_batch_id、predecessor/successor profile set、freeze_at、dual-validity class、propagation duty、rollback policy、completion state の正本を保持する。
    GraphEngine: context / use surface / issue_time / packet lineage / emergency case を評価し、predecessor admissibility、successor mandatory、propagation due、drift scan 対象集合を計算する。
    GraphLint: freeze 後 predecessor reuse、family 不適合な coexistence、missing batch witness field、recipient-visible / emergency propagation 欠落、silent mixed-version drift、unwitnessed rollback を検査する。
    archive_object: batch transition manifest、dual-reference disclosure、drift scan digest、rollback witness、completion witness を immutable に保持する。
  prohibited_shortcuts:
  - mixed-version coexistence を「旧 profile もまだ残っている」だけで正当化すること
  - batch migration witness を作らずに freeze と successor 切替を個別イベントの寄せ集めで済ませること
  - recipient-visible packet や emergency lane の active state を predecessor 参照のまま silent に放置すること
  - jurisdiction subtype overlay の old/new 併用を external audit current basis の近道に使うこと
  - rollback を silent predecessor re-enable として実施すること
  residual_open_points: []
transition_bundle_reverse_continuity_governance:
  status: provisional_fixed
  statement: transition_bundle_reverse_continuity_governance とは、forward transition bundle を erase せずに partial rollback を reverse continuity bundle として append するときの minimum witness、affected partition cell 選択、correction notice supersession、full re-notice 境界を固定する規則である。
  core_claims:
  - reverse continuity bundle は「誤りを消す」ための overwrite ではなく、forward bundle によって生じた successor 側 effect を、affected partition cell 単位で lawful に戻すための append-only governance object である。
  - affected partition cell の既定単位は forward bundle の successor cell であり、cell_exact を原則とする。recipient closure や authority rebind の都合で拡張するときは、その expansion reason を witness に残さなければならない。
  - reverse bundle は、どの successor effect をどの predecessor baseline または retire state に戻すかを exact に示し、forward bundle の predecessor/successor provenance を破壊してはならない。
  - correction notice が previous notice を supersede できるのは、recipient class・export bundle・lawful purpose・retention bucket・commitment class を widen せず、かつ predecessor notice lineage が連結している場合に限る。
  - recipient scope の拡大、lawful purpose の変更、retention bucket の変更、commitment class の変更、prior recipient coverage の欠落、downstream forwarding 不明がある場合は、単なる supersession ではなく full re-notice を要求する。
  - archive manifest は forward bundle / reverse bundle / correction notice bundle を immutable に連結する recovery anchor であり、reverse 成立後も forward bundle を削除してはならない。
  minimum_reverse_witness:
    required_fields:
    - reverse_bundle_id
    - forward_transition_bundle_ref
    - affected_partition_cell_set_digest
    - rollback_basis_ref
    - reverse_to_predecessor_or_retire_map_digest
    - reverse_reason_code_ref
    - correction_notice_plan_ref
    - supersession_class_ref
    - archive_manifest_digest_ref
    - authority_path_ref
    - initiated_at
    - finalized_at_or_null
    rules:
    - rollback_basis_ref には forward bundle の bundle_class_ref と lawful continuity class の双方へ辿れる witness を要求する。
    - reverse_to_predecessor_or_retire_map_digest は affected cell ごとに predecessor baseline, retire target, no_restore のいずれかを exact に指定しなければならない。
    - correction_notice_plan_ref が null を許されるのは recipient-visible effect が 0 である internal-only rollback に限る。
  affected_partition_cell_selection:
    selection_modes:
      cell_exact: forward bundle の successor partition cell と 1 対 1 で rollback 対象を指定する既定形。
      recipient_closure_expansion: 同一 notice surface を閉じるため、同一 recipient class / export bundle 内の隣接 cell をまとめて対象に広げる。
      authority_rebind_expansion: authority path や canonical scope の再束縛が同一 action としてのみ合法なとき、関連 cell を束ねて戻す。
      retire_only_projection: predecessor baseline へ戻さず retire/tombstone に落とす場合に、lineage 終端 cell だけを対象にする。
    constraints:
    - selection mode は forward bundle が生成した successor cell 集合の部分集合または lawful expansion に限る。
    - lawful expansion では widened cell ごとに expansion reason と notice impact を示さなければならない。
    - other authority path や other lawful purpose への越境 rollback は reverse bundle 単独では許されず、reframe または new transition bundle を要する。
  correction_notice_supersession:
    supersession_classes:
      narrow_replace: 同一 recipient surface 上で claim surface または commitment surface を狭める correction。previous notice を supersede 可能。
      same_surface_correct: 同一 recipient class / export bundle / lawful purpose / retention bucket のまま factual error を是正する correction。previous notice を supersede 可能。
      recall_and_replace: previous notice を明示 revoke したうえで successor correction を出す。supersede は revoke evidence 付きでのみ許容。
      full_re_notice: recipient set, lawful purpose, retention bucket, commitment class, downstream duty のいずれかが material に変わるため、previous notice の supersede では足りず full re-notice が必要。
    mandatory_full_re_notice_conditions:
    - recipient class の widening
    - export bundle の変更
    - lawful purpose の変更
    - retention bucket の変更
    - commitment class の変更
    - previous notice coverage が bounded 以上で閉じていない
    - downstream forwarding が unresolved のまま
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reverse_bundle_id
      - rollback_basis_ref
      - supersession_class_ref
      - correction_notice_plan_ref
      - authority_path_ref
      - reverse lifecycle state
    GraphEngine:
      owns:
      - affected_partition_cell_set_digest generation
      - reverse_to_predecessor_or_retire_map_digest generation
      - forward/reverse provenance consistency check materialization
    GraphLint:
      owns:
      - illegal expansion lint
      - missing rollback basis lint
      - supersession-with-widening lint
      - forward deletion shortcut lint
    archive_object:
      owns:
      - forward/reverse/correction immutable linkage
      - recovery anchor snapshot
      - notice evidence package
  forbidden_shortcuts:
  - reverse bundle 成立をもって forward bundle を削除する
  - affected partition cell を recipient surface や authority path の証拠なしに広げる
  - coverage 不足の previous notice を superseded とみなして閉じる
  - bridge token や send success だけで correction notice supersession を完了扱いにする
  residual_open_points: []
reverse_bundle_overlap_cascade_governance:
  status: provisional_fixed
  statement: reverse_bundle_overlap_cascade_governance とは、同一 forward bundle または同一 affected partition cell に対して複数の reverse continuity bundle が生じる場合の rollback-set canonical 単位、overlap class、cascade rollback、reverse-of-reverse の admissibility を固定する規則である。
  core_claims:
  - rollback-set の canonical 単位は、forward bundle ref、affected partition cell、notice surface、authority path、correction generation を束ねた rollback cell である。
  - 複数 reverse bundle の重なりは、disjoint_refinement、same_surface_duplicate、authority_race、conflicting_supersession、reverse_of_reverse に分類して扱う。
  - current head は rollback cell ごとに 1 本だけ持ち、同一 head に対して competing reverse が並ぶ場合は automatic merge せず blocker または escalate に送る。
  - cascade rollback は既存 reverse bundle を前提に追加の reverse を積む操作であり、常に current head state から 1 手ずつ辿れる lineage を要求する。forward bundle を飛び越えた shortcut rollback は許さない。
  - reverse-of-reverse は reopen と new transition を混同してはならない。prior reverse bundle に reopen_eligible と authority path があり、notice duty が未閉鎖でない場合に限り admissible とする。
  - normalization の目的は最新 1 件だけを残すことではなく、rollback cell ごとに shadowed ancestor と active head を分離し、replay 可能な lineage を保つことである。
  rollback_cell_normal_form:
    required_fields:
    - forward_transition_bundle_ref
    - affected_partition_cell_ref
    - notice_surface_ref
    - authority_path_ref
    - correction_generation_ref
    - head_state_ref
    - shadowed_ancestor_set_digest_or_null
    invariants:
    - 同一 rollback cell には同時に 2 つ以上の active head を持たせてはならない。
    - correction_generation_ref は supersession chain と一致しなければならない。
    - shadowed ancestor は replay で再構成可能な lineage を保持しなければならない。
  overlap_classes:
    disjoint_refinement: affected cell は重なるが notice surface または authority path が strict refinement で競合しない。
    same_surface_duplicate: 同一 rollback cell に対して意味的に同じ reverse が再発行された状態。idempotent collapse で畳める。
    authority_race: 同一 affected cell に対して異なる authority path が competing reverse を提示している状態。automatic head 決定禁止。
    conflicting_supersession: notice generation は successor を名乗るが rollback target や commitment surface が両立しない状態。blocker。
    reverse_of_reverse: existing reverse head をさらに巻き戻す reopen 系操作。prior reverse の reopen_eligible と notice closure を要件とする。
  normalization_policy:
    rules:
    - same_surface_duplicate は same semantic digest と same rollback target map が一致する場合に限り idempotent collapse を許す。
    - disjoint_refinement は stricter surface へ narrow するだけなら active head を更新できるが、widen を伴う場合は conflicting_supersession に送る。
    - authority_race と conflicting_supersession は current basis を更新せず、escalate または reframe_required とする。
    - reverse_of_reverse は prior reverse head を ancestor として明示し、head chain を一本化しなければならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - rollback cell registry
      - active head state
      - escalation / blocker state
    GraphEngine:
      owns:
      - overlap detection materialization
      - shadowed ancestor set generation
      - head chain reconstruction
    GraphLint:
      owns:
      - dual-active-head lint
      - authority-race lint
      - shortcut-cascade lint
      - conflicting-supersession lint
    archive_object:
      owns:
      - ancestor/head immutable chain
      - idempotent collapse witness snapshot
  forbidden_shortcuts:
  - 複数 reverse bundle のうち timestamp 最新だけを current head とみなす
  - reverse-of-reverse を prior reverse lineage を残さず in-place 上書きする
  - authority race を silent tie-break で解消する
  - same semantic digest 不一致の duplicate を idempotent collapse する
  residual_open_points: []
correction_notice_downstream_closure_governance:
  status: provisional_fixed
  statement: correction_notice_downstream_closure_governance とは、correction notice の downstream propagation、acknowledgment closure、stale notice quarantine、current basis への影響を固定する規則である。
  core_claims:
  - notice closure の canonical 単位は recipient surface であり、primary recipient、delegated recipient、disclosed downstream、inferred downstream を区別して追跡する。
  - upstream で supersession が成立しても、downstream recipient に stale notice が残っているなら closure は自動では完了しない。current basis は downstream closure または lawful quarantine を確認してから更新する。
  - closure class は exact_closed、bounded_closed、quarantined_stale、escalated_gap、open の 5 値で扱い、send success や non-response だけで exact_closed にしてはならない。
  - stale notice quarantine は、旧 notice を current basis から隔離しつつ replay/audit 用の lineage は保持する統治状態であり、silent delete や silent overwrite の代用ではない。
  - inferred downstream が unresolved のまま commitment surface が残る場合は bounded_closed では足りず escalated_gap または full re-notice を要求する。
  - acknowledgment は receipt_ack、action_ack、correction_ack、recall_ack に分け、どの ack が必要かは recipient surface と notice class で決める。
  recipient_surface_model:
    surface_classes:
      primary_recipient: 初回 notice の名宛人。
      delegated_recipient: primary recipient から duty を引き継いだ指名済み受領者。
      disclosed_downstream: forwarding / export / delegation により明示的に把握されている downstream recipient。
      inferred_downstream: 完全な recipient identity は不明だが downstream propagation が推測される surface。
    required_bindings:
    - recipient_surface_id
    - notice_bundle_ref
    - recipient_class_ref
    - commitment_surface_ref
    - downstream_edge_set_digest_or_null
    - required_ack_class_set
    - closure_class_ref
  closure_policy:
    closure_classes:
      exact_closed: 必要な recipient surface がすべて required ack か equivalent completion evidence で閉じている。
      bounded_closed: 限定された surface で residual uncertainty があるが、context/profile 上 current basis に使える範囲に収まる。
      quarantined_stale: 旧 notice を stale として current basis から隔離したが replay/audit のために保持している。
      escalated_gap: downstream gap が material であり current basis を止めたうえで escalation した。
      open: closure 未了。
    rules:
    - inferred_downstream が commitment-relevant surface に残る場合、bounded_closed の admissibility は strict profile 限定とする。
    - quarantined_stale は stale notice と active successor notice が lineage で結ばれている場合に限り current basis 補助に使える。
    - escalated_gap または open がある rollback cell は final closure 扱いにしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recipient surface registry
      - required ack class set
      - closure class state
      - quarantine state
    GraphEngine:
      owns:
      - downstream edge materialization
      - surface lineage generation
      - closure evidence aggregation
    GraphLint:
      owns:
      - stale-current coexistence lint
      - missing downstream coverage lint
      - invalid bounded_closed lint
      - silent overwrite lint
    archive_object:
      owns:
      - notice lineage chain
      - ack evidence package
      - quarantine snapshot
  forbidden_shortcuts:
  - send success や non-response timeout だけで exact_closed とみなす
  - stale notice を lineage を残さず silent delete する
  - inferred downstream unresolved のまま bounded_closed を current basis に使う
  - upstream supersession だけで downstream stale notice の closure を完了扱いにする
  residual_open_points: []
transition_chain_compaction_finality_governance:
  status: provisional_fixed
  statement: transition_chain_compaction_finality_governance とは、forward / reverse / correction chain を raw chain を消さずに compaction する条件、finality checkpoint、evidence retention tier を固定する規則である。
  core_claims:
  - compaction は raw chain の削除ではなく、replay-equivalent checkpoint を追加する圧縮操作である。raw forward / reverse / correction events は archive 上に保持し続ける。
  - finality checkpoint は、「もはや chain が変わらない」ことではなく、current basis に必要な rollback / notice / authority challenge が管理可能な範囲で閉じていることを示す統治状態である。
  - compaction class は structural_only、notice_squash、closure_checkpoint、audit_projection の4群に分け、どこまで current basis / audit basis に使えるかを分ける。
  - raw chain を compacted checkpoint に置き換えて current basis に使うには replay-equivalence witness が必要であり、witness は predecessor/successor lineage、active head、closure class、quarantine、authority state を再構成可能にしなければならない。
  - evidence retention tier は chain_core、proof_core、notice_core、downstream_ack_core、full_archive の5層に分け、profile/context ごとの minimum tier を下回って compaction してはならない。
  - legal-hold、open rollback cell、escalated notice gap、active authority challenge がある間は finality checkpoint を出してはならず、closure_checkpoint 以上の compaction を current basis に使ってはならない。
  compaction_classes:
    structural_only: lineage index や head pointer を付けるだけで notice/proof payload は縮約しない。
    notice_squash: lineage を保ったまま superseded notice を successor notice へ束ねるが、quarantine / ack evidence は保持する。
    closure_checkpoint: rollback cell と recipient surface の closure state を集約し、current basis 参照を軽量化する。
    audit_projection: audit basis 向けに compaction した read model。raw chain への replay path を mandatory にする。
  finality_policy:
    required_conditions:
    - 全 rollback cell に dual-active-head がない
    - recipient surface に open または escalated_gap がない
    - quarantined_stale は lineage-linked で replay-visible である
    - active authority challenge が current checkpoint を止めていない
    - required retention tier を満たす
    states:
      not_ready: current basis checkpoint として使えない。
      bounded_ready: 限定 context で current basis に使える。
      final_ready: registered context で current basis に使える。
      audit_only: audit basis には使えるが current basis には使えない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - checkpoint state
      - finality state
      - retention tier requirement
    GraphEngine:
      owns:
      - replay-equivalence witness generation
      - chain compaction materialization
      - checkpoint lineage map
    GraphLint:
      owns:
      - non-replay-equivalent compaction lint
      - illegal finality lint
      - retention-tier underrun lint
    archive_object:
      owns:
      - raw chain preservation
      - checkpoint snapshot
      - tiered evidence package
  forbidden_shortcuts:
  - raw chain を削除して compacted checkpoint だけを残す
  - replay-equivalence witness なしで closure_checkpoint を current basis に使う
  - legal-hold や escalated_gap があるのに final_ready を付与する
  - required retention tier を下回る証拠欠落を compaction の一部として黙認する
  residual_open_points: []
reverse_chain_legal_hold_reopen_replay_governance:
  status: provisional_fixed
  statement: reverse_chain_legal_hold_reopen_replay_governance とは、compaction 済み reverse chain に legal-hold または reopen 要求が入ったときの chain rehydration witness、replay audit window、current basis / audit basis の切替境界を固定する規則である。
  core_claims:
  - compaction は raw chain の消去ではなく checkpoint と manifest による再構成可能化であり、reopen は checkpoint・ancestor/head lineage・retained blob digest を束ねた rehydration witness が揃うときにだけ許される。
  - reopen purpose は correction_reopen、review_reopen、legal_hold_preservation、external_audit_reconstruction に分け、purpose ごとに許される replay scope と audience が異なる。
  - current basis は reflected 済み head と closure checkpoint を正本とし続け、replay 中に生成される audit basis は別 lane として保持する。audit basis を current basis へ昇格するには ratified correction または lawful no-change closure が必要である。
  - bounded replay は、目的・audience・affected rollback cell・retention tier が限定され、required witness が replay-equivalent で足りる場合に限る。payload exactness、identity unseal、cross-purpose stitching が必要な場合は full replay を要求する。
  - replay audit window は start / freeze / stop / reseal の状態を持ち、freeze 中は retention timer を止めても current basis を更新してはならない。window close 前に未解決の notice gap や authority challenge が残る場合は stop ではなく escalated_hold に送る。
  - legal-hold は replay の権利を自動付与しない。legal-hold は purge / compaction / timer 進行を停止するが、raw chain の reveal や de-redaction は別の purpose-bound authorization と packet rule を要する。
  rehydration_witness:
    required_fields:
    - reopen_session_id
    - trigger_kind_ref
    - reopen_purpose_ref
    - compaction_checkpoint_ref
    - reverse_chain_segment_digest_ref
    - ancestor_head_chain_digest_ref
    - retention_tier_attestation_ref
    - lawful_purpose_ref
    - authority_path_ref
    - audience_class_ref
    - requested_replay_scope_ref
    - started_at
    - freeze_until_or_null
    - closed_at_or_null
    rules:
    - compaction_checkpoint_ref は replay-equivalence witness と archive manifest digest に辿れなければならない。
    - reverse_chain_segment_digest_ref は reopen 対象 rollback cell 集合の境界を exact に示し、same checkpoint 内の unrelated segment を混ぜてはならない。
    - retention tier minimum が requested replay scope を満たさない場合は bounded replay を拒否し、必要なら full_archive recovery または escalate に送る。
  replay_window_classes:
    bounded_current_confirmation: current basis の妥当性確認だけを行い、current head や notice duty を変えない bounded replay。
    correction_validation: correction / reverse-of-reverse の admissibility を検証するために affected rollback cell 周辺だけを再生する replay。
    legal_hold_preservation: purge 停止・blob reseal・access audit のために witness chain を保持する replay。内容 reveal は最小限に限定する。
    external_audit_reconstruction: external audit 向けに replay-traceable lineage と required packet を再構成する replay。exact payload や identity unseal は別 gate を通す。
  basis_switch_rules:
    allowed_transitions:
    - current_basis -> audit_basis(session_open)
    - audit_basis -> current_basis(ratified_and_reflected_correction)
    - audit_basis -> current_basis(no_change_closure_with_witness)
    - audit_basis -> archived_audit_basis(session_close_no_promotion)
    blocked_transitions:
    - audit_basis で得た provisional finding を ratification なしに current_basis へ上書きする
    - freeze state のまま current basis を切り替える
    - legal_hold_preservation replay を根拠に correction_validation の昇格を行う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reopen_session_id
      - reopen purpose / lawful purpose binding
      - basis lane state
      - promotion or no-change closure judgement
    GraphEngine:
      owns:
      - checkpoint rehydration plan
      - reverse chain segment reconstruction
      - affected rollback cell replay materialization
      - session freeze/stop lineage
    GraphLint:
      owns:
      - insufficient witness lint
      - scope leakage lint
      - illegal basis promotion lint
      - cross-purpose replay shortcut lint
    archive_object:
      owns:
      - checkpoint + manifest + retained blob linkage
      - rehydration witness packet
      - session access audit snapshot
  forbidden_shortcuts:
  - legal-hold を理由に raw chain 全体を自動 reveal する
  - checkpoint ref なしで current system state から replay を再生成する
  - audit basis の provisional finding を ratified correction なしに current basis へ反映する
  - freeze 中に retention timer を再開したり finality を再付与する
  residual_open_points: []
replay_packet_bounded_disclosure_governance:
  status: provisional_fixed
  statement: replay_packet_bounded_disclosure_governance とは、replay audit window 中に出せる packet class、actor/accountability/recipient/evidence slice の redaction-preserving disclosure、unseal 要件を固定する規則である。
  core_claims:
  - replay packet は chain dump ではなく purpose-bound packet class として出す。既定 class は summary_packet、trace_packet、exact_payload_packet、identity_unseal_packet の4群とする。
  - summary_packet は event family・affected rollback cell digest・finding class・time window を示すが、raw payload と individual identity を含めない。trace_packet は lineage / checkpoint / manifest linkage を示すが、blob 本体は含めない。
  - exact_payload_packet は exact payload が replay に必須な場合に限り許され、retention tier、audience class、purpose、authority path を満たさなければならない。identity_unseal_packet は別 gate であり、exact payload と同時許可を前提にしない。
  - actor identity、accountability binding、recipient alias、evidence blob は別 slice として扱い、同一 session で複数 packet を stitch して clear identity や cross-purpose reconstruction を作ってはならない。
  - redaction-preserving replay では packet ごとに redaction_basis_ref、join_barrier_ref、downstream_copy_rule を必須にし、consumer は packet class を跨いだ silent enrichment をしてはならない。
  - external audit でも disclosure は minimum sufficient packet を原則とし、full chain reveal は exact payload と identity unseal の双方が lawful に必要な場合に限る。
  packet_classes:
    summary_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - finding_class_ref
      - affected_rollback_cell_set_digest
      - time_window_ref
      - redaction_basis_ref
      - audience_class_ref
    trace_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - checkpoint_ref
      - lineage_segment_digest_ref
      - manifest_digest_ref
      - event_family_digest_ref
      - join_barrier_ref
    exact_payload_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - blob_digest_ref
      - payload_scope_ref
      - retention_attestation_ref
      - audience_class_ref
      - authority_path_ref
      - copy_rule_ref
    identity_unseal_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - identity_layer_ref
      - unseal_basis_ref
      - audience_class_ref
      - authority_path_ref
      - post_use_reseal_rule_ref
  slice_visibility_matrix:
    actor_identity: summary/trace では pseudonym まで、identity_unseal_packet でのみ lower layer を開く。
    accountability_binding: trace までは authority tier と forum binding を開示できるが、named individual binding は unseal gate を要する。
    recipient_alias: summary では cardinality/digest まで、trace では recipient surface lineage まで、exact payload と独立に扱う。
    evidence_blob: blob 本体は exact_payload_packet に限定し、trace_packet では blob_digest_ref のみを出す。
  stitching_barriers:
    rules:
    - summary_packet + trace_packet から clear identity を復元できてはならない。
    - identity_unseal_packet を exact_payload_packet と自動連結してはならない。
    - 異なる reopen purpose や audience_class 間で packet を再利用してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - packet_class admissibility
      - audience / purpose binding
      - unseal authorization record
      - downstream copy restriction
    GraphEngine:
      owns:
      - packet materialization
      - slice-level redaction transform
      - join barrier tag propagation
    GraphLint:
      owns:
      - over-disclosure lint
      - cross-packet stitching lint
      - identity/blob co-release lint
      - missing redaction basis lint
    archive_object:
      owns:
      - packet manifest snapshot
      - issued packet digest log
      - post-use reseal evidence
  forbidden_shortcuts:
  - trace packet に raw blob を混ぜる
  - identity unseal を packet class ではなく viewer role だけで暗黙許可する
  - 同一 replay session 内の packet を横断結合して clear identity を再構成する
  - external audit を理由に full chain dump を既定動作にする
  residual_open_points: []
replay_derived_correction_reactivation_governance:
  status: provisional_fixed
  statement: replay_derived_correction_reactivation_governance とは、replay session で得た finding を correction / supersession / reverse head reactivation / new transition / escalate に振り分け、current basis と notice duty にどう接続するかを固定する規則である。
  core_claims:
  - replay finding class の既定集合は no_change、evidence_gap_confirmed、correction_required、supersession_required、lineage_break_detected、unlawful_disclosure_detected、insufficient_replay の7群とする。
  - no_change と evidence_gap_confirmed は no-change closure または bounded hold へ送れるが、current basis を silent に更新してはならない。correction_required と supersession_required は ratified correction path を要する。
  - reverse head reactivation は、prior reverse head が shadowed されただけで invalidated されておらず、new finding が current head の admissibility を否定し、かつ ancestor lineage が replay-traceable なときに限り許される。
  - lineage_break_detected と unlawful_disclosure_detected は reverse head reactivation では解決できず、new transition または escalate を要求する。
  - supersession_required は notice surface / commitment surface / recipient coverage の関係を伴うため、correction notice plan と recipient closure class を持たない限り current basis へ昇格できない。
  - replay で得た finding を reflected 前の provisional binding に使ってよいのは hold reason の追加や packet revoke までであり、branch-critical outcome を silent に切り替えてはならない。
  finding_classes:
    no_change: current head と notice duty に material change がない。witness 付き no-change closure 候補。
    evidence_gap_confirmed: 不足していた証拠の欠落自体が replay で確認された状態。bounded hold または explicit no-progress note を要する。
    correction_required: 同一 surface 内の correction で current basis を是正できる。ratified correction と reflected update を要する。
    supersession_required: prior notice / prior reverse head を successor が置き換える必要がある。coverage / commitment / recipient closure を伴う。
    lineage_break_detected: replay により ancestor/head chain の lawful continuity が破れている。new transition または reframe を要する。
    unlawful_disclosure_detected: packet issue や identity/blob co-release が unlawful だった。packet revoke / incident escalation / downstream notice を要する。
    insufficient_replay: required replay scope を再構成できず判断不能。current basis は維持し escalation または further recovery を要求する。
  branch_rules:
    allowed_actions:
    - no_change_closure
    - bounded_hold
    - ratified_correction
    - ratified_supersession
    - reverse_head_reactivation
    - new_transition_required
    - escalate_incident
    constraints:
    - reverse_head_reactivation では prior head の invalidation reason が cleared であり、shadowed ancestor digest が replay で確認できなければならない。
    - ratified_supersession では correction notice plan と recipient closure evidence が必須である。
    - lineage_break_detected と unlawful_disclosure_detected は current basis promotion を禁止し、incident or reframe lane に送る。
  notice_duty_projection:
    no_change: 新規 notice は不要。ただし replay session close witness を残す。
    correction_required: same-surface correction notice または internal correction packet を要求する。
    supersession_required: recipient closure plan を伴う successor correction notice を要求する。
    unlawful_disclosure_detected: revoke / breach / downstream recall notice を要求する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - finding class judgement
      - action branch selection
      - ratification state
      - notice duty binding
    GraphEngine:
      owns:
      - ancestor/head consistency replay
      - reactivation candidate reconstruction
      - finding-to-graph update plan
    GraphLint:
      owns:
      - illegal silent promotion lint
      - reactivation-with-invalid-ancestor lint
      - notice duty omission lint
      - insufficient replay closure lint
    archive_object:
      owns:
      - finding packet
      - no-change closure witness
      - reactivation / supersession proof bundle
  forbidden_shortcuts:
  - correction_required finding を no-change closure として閉じる
  - invalidated された prior reverse head を replay trace なしに再活性化する
  - unlawful_disclosure_detected を packet delete だけで無かったことにする
  - supersession_required に recipient closure evidence なしで current basis を切り替える
  residual_open_points: []
reopened_chain_reseal_retention_resume_governance:
  status: provisional_fixed
  statement: reopened_chain_reseal_retention_resume_governance とは、reopen / replay / correction 後の reverse chain を再 compaction し、reseal し、retention timer を resume / carry-over / reset する readiness 条件を固定する規則である。
  core_claims:
  - re-compaction readiness は replay session closed、finding branch resolved、required notice duty closed or escalated、packet revoke/reseal completed、active legal-hold unresolved なし、の5条件を満たすときにだけ真となる。
  - reseal は chain manifest reseal、packet set reseal、identity layer reseal、blob custody reseal の4面を持ち、ひとつでも未完なら final_ready を再付与してはならない。
  - retention timer は resume、carry_over、reset、freeze_continue の4値で扱う。legal-hold 継続中は freeze_continue、same-purpose bounded replay だけなら carry_over、payload unseal や downstream revoke を伴う incident replay では reset を要求する。
  - re-compaction 後の checkpoint は pre-reopen checkpoint を上書きせず、post-reopen checkpoint として append し、which-finding-branch closed this session を witness に残さなければならない。
  - audit basis を archived_audit_basis へ落とすには no-change closure witness または ratified-and-reflected outcome が必要であり、insufficient_replay や unresolved incident を抱えたまま reseal してはならない。
  - retention timer の resume は packet / identity / blob の各 surface で非同期に完了しうるが、surface ごとの timer_state をまとめて final closure と誤認してはならない。
  recompaction_readiness:
    required_checks:
    - replay_session_state=closed
    - finding_branch_state in {no_change_closed, correction_reflected, supersession_reflected, incident_escalated_with_hold}
    - required_notice_duty_state in {closed, escalated_gap_recorded}
    - reseal_surface_set completed
    - active_legal_hold_state in {none, separately_frozen_outside_session}
    allowed_targets:
    - closure_checkpoint
    - audit_projection
    - notice_squash
    blocked_targets:
    - structural_only を装って unresolved packet revoke を隠す
    - closure_checkpoint で insufficient_replay を閉じる
  reseal_surfaces:
    chain_manifest_reseal: post-reopen checkpoint と session closure witness を manifest に append する。
    packet_set_reseal: issued replay packet / revoke packet / correction packet の有効状態を閉じる。
    identity_layer_reseal: identity_unseal した layer を lawful に再封緘し、reuse 禁止を記録する。
    blob_custody_reseal: exact payload blob の custody handle と access audit を閉じる。
  timer_rules:
    resume: same-purpose / no-incident / no-unseal で session closure 後ただちに再開できる。
    carry_over: freeze 期間を差し引いて元の deadline を維持する。既定値。
    reset: payload unseal・incident escalation・downstream revoke・new legal obligation により保持義務が materially 更新された場合に要求する。
    freeze_continue: separate legal-hold や unresolved external audit hold が残る場合に継続する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - re-compaction readiness judgement
      - timer rule binding
      - final closure admissibility
      - separately frozen hold linkage
    GraphEngine:
      owns:
      - post-reopen checkpoint generation
      - surface-specific reseal state materialization
      - timer state propagation
    GraphLint:
      owns:
      - premature final_ready lint
      - mixed surface closure lint
      - illegal timer reset/carry-over lint
      - overwriting pre-reopen checkpoint lint
    archive_object:
      owns:
      - post-reopen checkpoint snapshot
      - reseal proof bundle
      - surface-level timer audit history
  forbidden_shortcuts:
  - pre-reopen checkpoint を上書きして reopen 痕跡を消す
  - identity layer が未 reseal のまま final_ready を付与する
  - insufficient_replay や unresolved incident を抱えたまま closure checkpoint を出す
  - timer を chain surface 一括で再開して packet / blob / identity の差異を失う
  residual_open_points: []
multi_session_quota_priority_governance:
  status: provisional_fixed
  statement: multi_session_quota_priority_governance とは、同一 chain family・同一 archive object・同一 authority tier に複数の legal-hold / replay session が重なるときの quota class、priority class、nested replay admissibility、starvation avoidance を固定する規則である。
  core_claims:
  - 同時実行枠は mutation を伴う exclusive_mutation_lane、trace 読み出し主体の bounded_parallel_read_lane、親 session の lawful 境界内でだけ走る nested_child_lane、監視専用の observer_shadow_lane の4 quota class で扱う。
  - priority は life_safety_or_active_compromise、external_mandated_audit、lawful_correction_reopen、routine_review の4 class を基本とし、優先度の高さは disclosure authority や identity unseal 権限を自動付与しない。
  - nested replay は child scope が parent scope の真部分集合であり、purpose・audience・identity layer・packet budget を widen せず、parent の join barrier と freeze rule を継承するときに限って許される。条件を満たさないものは sibling session として独立に queue する。
  - starvation avoidance は aging credit、max continuous occupancy、reservation checkpoint yield の3条件で扱う。低優先度 session を無期限に待機させてはならず、期限超過時は progress guarantee か authority escalation のどちらかを必須にする。
  - preemption は always-on override ではなく、preempted session snapshot、surface-level timer state、issued packet state、reason code を含む freeze witness を残したときにだけ許される。
  - timer inheritance は chain / packet / identity / blob の各 surface ごとに stricter-of rule を適用する。child session や lower priority session が親より短い retention や広い disclosure を選んではならない。
  quota_classes:
    exclusive_mutation_lane: checkpoint append、reseal、revoke、current basis promotion のように状態を変える操作専用の単独実行枠。
    bounded_parallel_read_lane: trace / summary / witness verification のような read-equivalent replay を並列に許す枠。
    nested_child_lane: 親 session に従属し、scope widening を伴わない child replay の専用枠。
    observer_shadow_lane: audit observability や fairness telemetry 採取だけを行い、packet issuance や timer mutation を行わない枠。
  priority_classes:
    life_safety_or_active_compromise: 安全影響または active compromise を抑止するために最上位 preemption を許す class。
    external_mandated_audit: 法令・契約・司法等で期限拘束された監査再生。
    lawful_correction_reopen: current basis の correction / supersession を要する reopen。
    routine_review: 定期レビューや説明補助のための非緊急 replay。
  nested_admissibility:
    required_conditions:
    - child_requested_scope ⊂ parent_admitted_scope
    - child_purpose compatible_with parent_purpose
    - child_audience_class no_wider_than parent_audience_class
    - child_identity_layer_cap no_wider_than parent_identity_cap
    - child_packet_budget explicitly reserved
    - parent_join_barrier inherited
    blocked_conditions:
    - child session が exact payload や identity unseal を parent より広く要求する
    - parent session が freeze 中なのに child が timer resume を試みる
    - child を使って sibling session の queue 順を飛び越える
  starvation_avoidance:
    fairness_controls:
    - aging_credit
    - max_continuous_occupancy
    - checkpoint_yield
    - priority_decay_for_noncritical_repeat
    rules:
    - routine_review でも aging_credit が閾値を超えたら bounded_parallel_read の最小枠を確保する。
    - external_mandated_audit が連続しても exclusive_mutation_lane を占有し続ける場合は checkpoint_yield を挿入する。
    - life_safety_or_active_compromise class の連続 preemption は starvation debt として ledger に記録する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - quota / priority binding
      - preemption reason code
      - nested admissibility judgement
      - starvation debt record
    GraphEngine:
      owns:
      - lane allocation
      - session snapshot / freeze witness materialization
      - surface-level timer inheritance propagation
    GraphLint:
      owns:
      - illegal nested widening lint
      - silent priority bypass lint
      - starvation bound violation lint
      - mixed-surface timer inheritance lint
    archive_object:
      owns:
      - lane occupancy evidence
      - preemption snapshot bundle
      - reservation checkpoint witness
  forbidden_shortcuts:
  - priority class だけで identity unseal や exact payload disclosure を暗黙許可する
  - nested child を使って parent scope を事後的に widen する
  - preemption 前の session snapshot を残さず active lane を奪う
  - chain surface の timer rule を packet / identity / blob に一括コピーする
  residual_open_points: []
shared_archive_reservation_budget_governance:
  status: provisional_fixed
  statement: shared_archive_reservation_budget_governance とは、複数 session が同一 archive object / chain family / checkpoint lineage を競合利用するときの witness reservation unit、sharing mode、packet budget segregation、borrow 制約を固定する規則である。
  core_claims:
  - reservation unit は witness_set、trace_packet_budget、exact_payload_handle、identity_unseal_slot、revoke_reseal_window の5単位を基本とする。trace 系と manifest digest は sharing 可能だが、exact payload と identity unseal は原則 exclusive または escrow とする。
  - packet budget は purpose と audience の直積で segregate する。summary/trace と exact payload / identity unseal を同一 budget に混ぜてはならず、borrow は central-authority ratification と debt ledger がある場合にだけ例外的に許す。
  - copy-on-read が可能なのは trace-equivalent witness に限る。mutable packet manifest や post-use reseal obligation を共有 alias してはならない。
  - orphan reservation は heartbeat timeout で即時解放せず、legal-hold / appeal / audit challenge の有無を確認したうえで quarantine_reclaim へ送る。
  - ある session の packet revoke や identity reseal が、別 session の lawful witness を silent invalidation してはならない。影響を受ける session には affected-session notice と admissibility recompute を必須にする。
  - shared archive object 上の reservation は allocation 記録だけでなく、release / transfer / quarantine の各遷移にも immutable witness を残さなければならない。
  reservation_units:
    witness_set: checkpoint / lineage / manifest digest を束ねた read-equivalent witness 単位。
    trace_packet_budget: summary / trace packet を発行できる上限枠。
    exact_payload_handle: payload blob の一時アクセス権を示す exclusive handle。
    identity_unseal_slot: identity layer を lawful に開くための一時 slot。
    revoke_reseal_window: issued packet revoke と post-use reseal を完了させる専用 window。
  sharing_modes:
    shareable_read_equivalent: trace-equivalent witness だけを複数 session で共有できる。
    exclusive_mutable: exact payload handle と revoke_reseal_window は単独保持を原則とする。
    escrow_transfer: authority ratification と受け手の acceptance が揃った場合に限り一時移管できる。
    forbidden_borrow: purpose widening・audience widening・identity widening を伴う借用は禁止する。
  borrowing_rules:
    allowed_only_if:
    - central_authority_ratified
    - borrow_reason_code recorded
    - debt_ledger appended
    - downstream revoke propagation plan exists
    blocked_if:
    - borrow により packet class が widen する
    - identity_unseal_slot を trace session に流用する
    - return deadline が未定義のまま escrow transfer する
  orphan_recovery:
    states:
    - heartbeat_lost
    - quarantine_reclaim
    - hold_blocked
    - reassigned_with_witness
    - fully_released
    rules:
    - heartbeat_lost だけでは fully_released にしない。
    - legal_hold / appeal / external_audit challenge が残るときは hold_blocked に留める。
    - reassigned には old holder の last snapshot と new holder の acceptance witness を要求する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reservation grant / release / transfer decision
      - borrow debt ledger
      - affected-session notice obligation
    GraphEngine:
      owns:
      - reservation materialization
      - copy-on-read trace issuance
      - quarantine reclaim workflow
      - admissibility recompute trigger
    GraphLint:
      owns:
      - mixed-budget disclosure lint
      - silent invalidation lint
      - illegal borrow lint
      - orphan release without witness lint
    archive_object:
      owns:
      - reservation map snapshot
      - exclusive handle custody
      - transfer / release witness bundle
  forbidden_shortcuts:
  - trace budget を exact payload handle に横流しする
  - identity_unseal_slot を viewer role だけで黙って再利用する
  - heartbeat timeout を理由に hold 確認なしで reservation を自動解放する
  - 一方の session の revoke を他方の witness 失効として silent 適用する
  residual_open_points: []
authority_competition_override_appeal_governance:
  status: provisional_fixed
  statement: authority_competition_override_appeal_governance とは、central authority・domain authority・delegated reviewer・external mandate が競合するときの forced preemption、emergency override、appeal reopen、contested surface freeze を固定する規則である。
  core_claims:
  - override は authority tier の高さだけで自動成立しない。override_basis_ref、target_session_snapshot_ref、contested_surface_ref、counter-sign notice plan、restoration path が揃ったときにだけ forced preemption を許す。
  - emergency override は life-safety / active compromise / legal non-compliance を即時抑止するための例外であり、schedule priority を上げられても packet class や identity layer を自動 widen してはならない。
  - appeal reopen は既存 session を上書きする操作ではなく、source decision を参照する appellate lane として append する。appeal lane は source lane の mutable record を直接編集してはならない。
  - 同格 authority の競合は arrival time や operator discretion で解いてはならない。precedence DAG で優劣がつかない場合は contested surface を freeze し、上位 forum へ remand する。
  - override 後の restoration outcome は uphold、modify、vacate、remand の4 class に分け、quota debt・timer inheritance・reservation transfer の帰結を outcome ごとに明示する。
  - external mandate は scope と期限が明示された拘束であり、mandate 外の packet borrowing や identity unseal を正当化しない。
  override_classes:
    emergency_override: 即時危険抑止のための例外的 preemption。
    regular_forced_preemption: 上位 authority の通常 override。
    mandated_takeover: 司法・法令・契約等の external mandate による takeover。
    appeal_reopen: 既存判定の再審査を行う appellate lane。
  precedence_dag_rules:
    ordered_edges:
    - external_mandate > central_authority
    - central_authority > domain_authority
    - domain_authority > delegated_reviewer
    tie_rules:
    - 同一 tier で lawful scope が衝突するときは contested surface freeze を行う。
    - counter-sign notice が欠ける override は effective にしない。
    - precedence DAG で未比較なら remand を既定とする。
  appeal_lane_model:
    required_fields:
    - appeal_lane_id
    - source_session_id
    - appeal_basis_ref
    - contested_surface_set
    - forum_ref
    - stay_or_nonstay_flag
    - restoration_outcome_or_null
    rules:
    - appeal_lane は source session の immutable snapshot を参照し、source ledger record を直接更新しない。
    - stay が付く場合だけ contested surface の mutation を止められる。
    - appeal outcome は uphold / modify / vacate / remand のいずれかに閉じる。
  restoration_outcomes:
    uphold: override または source decision を維持する。
    modify: 一部 surface / packet / timer rule を変更して戻す。
    vacate: target decision を失効させ、新たな lane でやり直す。
    remand: 上位 forum へ差し戻し、現 lane は contested freeze を維持する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - override basis binding
      - precedence DAG evaluation
      - appeal lane creation
      - restoration outcome record
    GraphEngine:
      owns:
      - target session snapshot
      - contested surface freeze materialization
      - reservation / timer transfer plan
    GraphLint:
      owns:
      - scope-widening override lint
      - uncountersigned override lint
      - appeal-overwrite lint
      - equal-tier silent tie-break lint
    archive_object:
      owns:
      - override packet bundle
      - appeal snapshot archive
      - restoration witness bundle
  forbidden_shortcuts:
  - authority tier が高いことだけで override を成立させる
  - emergency override を理由に packet class や identity layer を widen する
  - appeal reopen で source session の record を直接書き換える
  - 同格 authority の衝突を arrival time だけで解決する
  residual_open_points: []
cross_session_settlement_debt_governance:
  status: provisional_fixed
  statement: cross_session_settlement_debt_governance とは、重なり合った multi-session replay / hold / appeal 群を lawful に閉じ直すための settlement checkpoint、quota debt carry-over、audit proof bundle を固定する規則である。
  core_claims:
  - settlement checkpoint は global merge ではなく append-only bundle であり、surviving hold、released reservation、transferred debt、contested residue、current basis promotion admissibility を一括で記録する。
  - debt は starvation_debt、disclosure_debt、reseal_debt、audit_followup_debt の4 class に分ける。ひとつの session の closure が他 session の debt を自動相殺してはならない。
  - debt transfer は lawful receiver、acceptance witness、due window、discharge condition が明示された場合にだけ許す。受け手不在の debt は settlement checkpoint に unresolved residue として残す。
  - partial settlement は surface 単位または object 単位で許されるが、partial closure を global clean closure と誤認させてはならない。global closure は surviving hold なし、required reseal complete、mandatory debt disposition complete を要件とする。
  - audit proof bundle には schedule decision lineage、preemption chain、reservation transfer、packet issuance / revoke history、debt ledger、restoration outcome、closure projection を含めなければならない。
  - auto-compaction や final_ready 再付与は settlement bundle 完成後でなければならず、unresolved residue を隠すための closure checkpoint を禁止する。
  settlement_bundle_fields:
    required_fields:
    - settlement_checkpoint_id
    - covered_session_set
    - surviving_hold_set
    - released_reservation_set
    - transferred_debt_set
    - unresolved_residue_set
    - closure_projection_ref
    - audit_proof_bundle_ref
    - created_at
    rules:
    - covered_session_set の外にある live session を暗黙に閉じてはならない。
    - closure_projection_ref は partial_surface / partial_object / global_clean / global_with_residue を区別する。
    - audit_proof_bundle_ref が欠ける settlement checkpoint は external-facing closure に使ってはならない。
  debt_classes:
    starvation_debt: 待機・checkpoint yield 不足・連続 preemption により生じた公平性負債。
    disclosure_debt: issued packet revoke・recipient notice・downstream cleanup が残っている負債。
    reseal_debt: identity / blob / packet / manifest の再封緘が未完な負債。
    audit_followup_debt: external audit や appeal remand に伴う追加提出・照合作業の負債。
  transfer_rules:
    allowed_only_if:
    - lawful_receiver_ref present
    - receiver_acceptance_ref present
    - due_window_ref present
    - discharge_condition_ref present
    blocked_if:
    - receiver が debt class に対応する authority / custody を持たない
    - partial settlement を理由に unrelated debt をまとめて移す
    - due window 不明のまま debt を carry-over する
  closure_states:
    partial_surface: 一部 surface だけ lawful に閉じた状態。
    partial_object: 一部 object / chain family だけ閉じた状態。
    global_clean: surviving hold も unresolved residue もない全体閉鎖。
    global_with_residue: global scope を評価したが residue が残るため clean closure ではない状態。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - settlement checkpoint judgement
      - debt transfer / discharge record
      - closure projection binding
      - current basis promotion admissibility after settlement
    GraphEngine:
      owns:
      - settlement bundle materialization
      - surface/object closure projection generation
      - debt carry-over propagation
    GraphLint:
      owns:
      - false global closure lint
      - debt transfer without receiver lint
      - missing audit proof bundle lint
      - residue-hiding checkpoint lint
    archive_object:
      owns:
      - audit proof bundle snapshot
      - settlement checkpoint archive
      - debt ledger history pack
  forbidden_shortcuts:
  - partial settlement を global clean closure と表示する
  - receiver acceptance なしで debt を transfer する
  - audit proof bundle なしで external-facing closure を出す
  - unresolved residue を closure checkpoint の外に落として見えなくする
  residual_open_points: []
multi_session_scheduler_observability_governance:
  status: provisional_fixed
  statement: multi_session_scheduler_observability_governance とは、multi-session replay / hold / appeal scheduler の健全性を継続監視するための telemetry field、fairness SLO、auto-throttle / checkpoint yield / escalation threshold を固定する規則である。
  core_claims:
  - scheduler observability は ad-hoc log ではなく append-only telemetry witness として扱う。lane occupancy、waiting time、preemption、checkpoint yield gap、debt carry-over、settlement residue age を canonical field とする。
  - fairness は平均値だけでなく tail と debt persistence で測る。priority / profile / authority tier ごとの bounded_wait_p95、consecutive_preemption_cap、debt_half_life、residue_age_budget、override_budget_ratio を SLO の基本集合とする。
  - threshold branch は observe_only、auto_throttle、mandatory_checkpoint_yield、manual_escalation の4段階を基本とし、同一 breach を複数 action に重複計上してはならない。
  - threshold は global 固定値ではなく profile / authority tier / risk class の stricter-of 合成で決める。life_safety_or_active_compromise は routine_review より短い wait budget と低い override budget を持つ。
  - telemetry sample には aggregation window、source integrity class、mirror lag bound、coverage scope を束ねる。window 不明の sample や mirror-only sample を threshold 判定の唯一根拠にしてはならない。
  - debt が dashboard から消えただけでは discharge とみなさない。debt vector の減衰、checkpoint yield 実施、reservation / reseal / notice 完了の witness が揃ってはじめて recovery direction を認める。
  telemetry_fields:
    lane_occupancy_ratio: lane class ごとの occupied_time / allocatable_time。exclusive_mutation_lane と bounded_parallel_read_lane を分けて観測する。
    waiting_time_bucket: session priority / profile / authority tier ごとの待機時間分布。平均値ではなく p50 / p95 / max witness を残す。
    preemption_event_counter: forced_preemption / emergency_override / checkpoint_yield による割込み件数と連続回数。
    checkpoint_yield_gap: 要求された yield から実施までの遅延。未実施 yield は gap として累積する。
    debt_carry_over_delta: starvation / disclosure / reseal / audit_followup debt の純増減。
    settlement_residue_age: unresolved residue が settlement checkpoint を跨いで残存している時間。
    override_budget_ratio: override 使用量 / 許容 budget。authority tier と risk class ごとに測る。
  fairness_indicators:
    bounded_wait_p95: profile / priority ごとの許容待機時間に対する 95 パーセンタイル比。
    consecutive_preemption_cap: 同一 lane / 同一 session family が連続で preempt される回数上限。
    debt_half_life: 増加した debt が半減するまでの時間。改善方向の健全性指標として扱う。
    residue_age_budget: settlement residue が clean closure 候補を阻害せずに残れる上限時間。
    override_budget_ratio: override / forced preemption の使用率が policy budget をどれだけ消費したかを示す。
    yield_compliance_ratio: mandatory checkpoint yield 要求に対する期限内実施率。
  threshold_actions:
    observe_only: 指標を監視するが scheduling policy をまだ変えない。
    auto_throttle: 低優先 session の新規 admission または lane share を自動的に抑制する。
    mandatory_checkpoint_yield: active session に checkpoint yield を強制し、他 lane へ機会を開く。
    manual_escalation: 自動制御では戻せないと判断し human/authority review に送る。
  threshold_binding_rules:
    composition:
    - profile baseline, authority tier cap, risk class cap の strictest threshold を採用する。
    - life_safety_or_active_compromise class では wait budget と override budget の双方を短くする。
    - routine_review class にだけ緩い threshold を与えても、shared lane の protected floor は侵食してはならない。
    blocked_patterns:
    - single dashboard average だけで breach / healthy を判定する
    - same mirrored source を独立 telemetry として二重計上する
    - local operator convenience を理由に risk class より緩い threshold を上書きする
  tool_responsibilities:
    DecisionLedger:
      owns:
      - telemetry field registry
      - fairness indicator / threshold binding
      - action class binding
      - profile / authority / risk override record
    GraphEngine:
      owns:
      - windowed telemetry aggregation
      - lane/sample linkage
      - threshold action dispatch trigger
      - debt / residue trend materialization
    GraphLint:
      owns:
      - missing telemetry witness lint
      - mean-only fairness lint
      - impossible threshold ordering lint
      - same-source double count lint
    archive_object:
      owns:
      - telemetry snapshot pack
      - aggregation window witness
      - threshold breach audit bundle
  forbidden_shortcuts:
  - 平均 wait time だけで fairness healthy を宣言する
  - window / source integrity が不明な sample だけで auto_throttle を発火する
  - debt が UI から見えなくなっただけで discharge 扱いにする
  - profile / authority / risk の stricter rule を local override で黙って緩和する
  residual_open_points: []
scheduler_breach_hysteresis_cooldown_governance:
  status: provisional_fixed
  statement: scheduler_breach_hysteresis_cooldown_governance とは、threshold crossing を confirmed breach に昇格させる confirmation 条件、activation / release hysteresis、cooldown-clearance を固定する規則である。
  core_claims:
  - single-window threshold crossing は breach ではなく suspected_breach とする。confirmed_breach へ進めるには sustained window、debt worsening か preemption chain witness、または独立 source corroboration のいずれかが必要である。
  - activation threshold と release threshold を分ける。breach を開く条件よりも解く条件を厳しくし、signal が閾値近傍で往復するだけで throttle を on/off させてはならない。
  - auto_throttle、mandatory_checkpoint_yield、manual_escalation は同一 lifecycle 上で扱う。action ごとに minimum active duration と re-entry cooloff を持ち、manual clear を silent timer expiry で代替してはならない。
  - cooldown-clearance は no-breach window だけでなく debt decay、yield completion、residue non-growth、override budget recovery を確認してはじめて成立する。
  - same mirrored telemetry、same operator re-emit、same aggregation lineage は corroboration として二重計上してはならない。confirmation は source family と processing path の partial independence を明示的に使う。
  - manual suspension や emergency hold から通常運用へ戻すときは release owner、expiry、rollback-of-throttle witness を束ねる。解除を UI 操作だけで完了扱いにしてはならない。
  breach_states:
    nominal: threshold 未超過で mitigation action なし。
    suspected_breach: 一時的 crossing または単一 source crossing。confirmed ではない。
    confirmed_breach: confirmation 条件を満たし mitigation action が必要と判定された状態。
    mitigating: auto_throttle または mandatory_checkpoint_yield が active な状態。
    cooldown: breach 指標は改善したが release witness の確認待ち状態。
    cleared: release / cooldown-clearance が完了し normal scheduling に戻せる状態。
  confirmation_rules:
    confirmed_if_any:
    - sustained window breach が policy で定めた連続窓数を満たす
    - threshold crossing と同一 lane family の starvation_debt / residue_age が同時悪化する
    - 独立 source family から corroborating witness が得られる
    blocked_if:
    - same mirrored source だけを複数根拠として積む
    - single spike を sustained breach と誤認する
    - manual test run の synthetic sample を production breach 判定へ混入する
  hysteresis_policy:
    activation_release_split: activation threshold と release threshold を別 registry cell で管理する。
    minimum_active_duration: confirmed_breach 後は action class ごとの minimum active duration を満たすまで自動解除しない。
    reentry_cooloff: clear 後しばらくは同一 breach family の再開条件を厳しくし、flapping を抑える。
    manual_override_rule: human override は reason, owner, expiry, fallback branch を束ねる。
  cooldown_clearance:
    required_evidence:
    - no-breach windows across required horizon
    - debt vector non-increasing or decaying
    - mandatory checkpoint yield completed if required
    - override budget recovered within cap
    blocked_if:
    - debt や residue が隠れたまま signal だけ静かになる
    - active mitigation を手動で外したが witness が残らない
    - same backlog が別 lane に移っただけで cleared と宣言する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - breach state binding
      - activation/release threshold registry
      - manual release / suspension record
      - independence/corroboration rule binding
    GraphEngine:
      owns:
      - state transition materialization
      - window continuity check
      - cooldown timer and evidence aggregation
      - rollback-of-throttle witness generation
    GraphLint:
      owns:
      - flapping control lint
      - same-source corroboration lint
      - premature clear lint
      - manual release without owner/expiry lint
    archive_object:
      owns:
      - breach lifecycle snapshot
      - action activation/deactivation log
      - cooldown evidence bundle
  forbidden_shortcuts:
  - single spike だけで confirmed_breach を開く
  - activation と同じ threshold でそのまま release する
  - same mirrored source を corroboration に二重計上する
  - cooldown evidence なしに throttle を解除する
  residual_open_points: []
quota_debt_remediation_rebalancing_governance:
  status: provisional_fixed
  statement: quota_debt_remediation_rebalancing_governance とは、confirmed breach 後の debt remediation family、lane rebalancing rule、backlog-drain plan、debt discharge / forgiveness 条件を固定する規則である。
  core_claims:
  - confirmed breach は remediation plan を必須にする。throttle を掛けるだけで debt を解消したことにしてはならない。
  - debt class ごとに remediation family を分ける。starvation_debt は fairness credit / reserved yield slot、disclosure_debt は revoke-notice sweep、reseal_debt は dedicated reseal window、audit_followup_debt は evidence assembly lane を基本とする。
  - lane rebalancing は donor lane、receiver lane、temporary borrow cap、protected floor、expiry、rollback path を束ねて行う。life-safety や mandated audit の protected floor を routine backlog drain のために侵食してはならない。
  - backlog-drain plan には target backlog class、drain horizon、per-window throughput target、admission freeze scope、review checkpoint を必須にする。改善を定量化せずに drain 完了を宣言してはならない。
  - debt discharge は obligation class ごとの completion witness を要求する。debt forgiveness は discharge evidence が不十分でも policy 上切り捨てる操作ではなく、authority-bound waiver と residual risk acknowledgment を持つ例外としてのみ許す。
  - rebalancing は lane 移動だけで debt を隠してはならない。receiver lane に移した backlog / residue / reseal obligation も traceable に carry され、settlement checkpoint に反映されなければならない。
  remediation_families:
    starvation_debt: reserved_yield_slot、fairness credit refill、bounded priority relaxation により待機 debt を減らす。
    disclosure_debt: issued packet revoke、recipient notice、downstream cleanup を sweep lane で束ねて解消する。
    reseal_debt: identity / blob / packet / manifest の reseal obligation を専用 window へ寄せる。
    audit_followup_debt: audit packet assembly、cross-check、submission queue を専用 lane で処理する。
  lane_rebalancing_rules:
    required_fields:
    - donor_lane_ref
    - receiver_lane_ref
    - temporary_borrow_cap
    - protected_floor_ref
    - expiry_ref
    - rollback_path_ref
    rules:
    - receiver lane が debt class に対応する custody / authority を持たない場合は rebalance を禁止する。
    - protected floor を下回る donor からの借用は、emergency class を除き許さない。
    - expiry 到達後に auto-return できない rebalancing は manual escalation を伴う。
  backlog_drain_plan:
    required_fields:
    - target_backlog_class
    - drain_horizon_ref
    - throughput_target_ref
    - admission_freeze_scope_ref
    - review_checkpoint_schedule_ref
    success_conditions:
    - target backlog が horizon 内で monotone に減少する
    - new debt creation rate が bounded である
    - protected floor を侵食しない
  debt_discharge_and_forgiveness:
    discharge_requires:
    - obligation-specific completion witness
    - carry-over residue linkage cleared or explicitly transferred
    - review checkpoint pass if policy requires
    forgiveness_allowed_only_if:
    - authority-bound waiver exists
    - residual risk acknowledgment exists
    - audit proof bundle links the waiver
    blocked_if:
    - timeout 到来だけで debt を forgive する
    - lane move だけで debt を hidden discharge 扱いにする
    - protected floor violation を残したまま remediation 完了を宣言する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - remediation family binding
      - lane rebalance approval
      - debt discharge / waiver record
      - protected floor exception binding
    GraphEngine:
      owns:
      - rebalance execution plan
      - backlog-drain progress materialization
      - carry-over linkage propagation
      - rollback path execution witness
    GraphLint:
      owns:
      - hidden debt transfer lint
      - protected floor violation lint
      - drain plan incompleteness lint
      - forgiveness without waiver lint
    archive_object:
      owns:
      - rebalance snapshot
      - drain progress pack
      - debt discharge / waiver witness bundle
  forbidden_shortcuts:
  - confirmed breach に remediation plan を付けず throttle だけ掛ける
  - protected floor を侵食しても backlog が減れば良しとする
  - timeout だけで debt forgiveness を行う
  - lane move を hidden discharge として residue を見えなくする
  residual_open_points: []
scheduler_policy_rollout_migration_governance:
  status: provisional_fixed
  statement: scheduler_policy_rollout_migration_governance とは、threshold / hysteresis / remediation policy を変更するときに required な what-if simulation、canary rollout、dual-policy coexistence、rollback 可能性、comparability witness を固定する規則である。
  core_claims:
  - scheduler policy 変更は direct flip ではなく、what-if simulation と rollout packet を通した staged migration として扱う。simulation なしに protected floor や fairness SLO に触れる policy を有効化してはならない。
  - simulation scenario class は steady_state_load、burst_contention、debt_recovery、telemetry_loss_or_lag、manual_override_conflict、mixed_profile_competition を基本集合とする。新 policy は少なくとも normal / stress / degraded の3系統を跨いで比較しなければならない。
  - simulation input bundle には old/new policy snapshot、threshold/hysteresis diff、remediation family diff、telemetry replay slice、fairness baseline、protected floor map、active debt/backlog vector、source integrity assumption、rollback target を必須にする。policy diff だけで simulation 可とみなしてはならない。
  - success witness は protected floor 非侵食、critical profile の bounded_wait tail 非悪化、debt creation rate の増分許容内、rollback rehearsal 成功、comparability witness 充足を要求する。failure witness は hidden debt 増加、non-comparable metric、rollback path 不成立、mirror-only telemetry 依存を含む。
  - canary rollout は bounded cohort、window、blast radius cap、freeze gate、rollback trigger を束ねる。dual-policy coexistence 中は old/new policy の decision trace を同一 observability vocabulary で比較できなければならない。
  - threshold migration は old/new threshold の comparability witness を持つ。metric meaning・aggregation window・source integrity・scope unit が揃わない比較を improvement 根拠に使ってはならない。
  simulation_scenario_classes:
    steady_state_load: 定常負荷で fairness SLO と queue latency が維持されるかを見る。
    burst_contention: 短時間の高競合で throttle / yield / escalation branch が過剰反応しないかを見る。
    debt_recovery: 既存 debt / residue を持つ状態で新 policy が remediation を阻害しないかを見る。
    telemetry_loss_or_lag: 欠測・lag・mirror degrade 下で breach 判定が unsafe に発火しないかを見る。
    manual_override_conflict: human override / suspension と新 policy が衝突したとき precedence と rollback が保たれるかを見る。
    mixed_profile_competition: life-safety / audit / routine_review が同一 lane 群を競合したとき protected floor が守られるかを見る。
  simulation_input_bundle:
    required_fields:
    - old_policy_snapshot_ref
    - new_policy_snapshot_ref
    - threshold_diff_ref
    - hysteresis_diff_ref
    - remediation_diff_ref
    - telemetry_replay_slice_ref
    - fairness_baseline_ref
    - protected_floor_map_ref
    - active_debt_backlog_vector_ref
    - source_integrity_assumption_ref
    - rollback_target_ref
    rules:
    - telemetry_replay_slice は profile / lane / authority tier の coverage を明示し、critical cohort を欠いた sample を general success 根拠にしてはならない。
    - baseline は old policy の stable window から作り、temporary incident window を既定 baseline にしてはならない。
    - rollback_target_ref は current active head と rollback 先 policy head の双方を束ねる。
  witness_rules:
    success_requires:
    - protected floor preserved
    - critical cohort fairness tail non-worsening within budget
    - debt creation delta within migration budget
    - rollback rehearsal succeeded against same scope unit
    - old/new comparability witness bound
    failure_if_any:
    - hidden debt transfer or residue age growth is detected
    - simulation uses non-comparable metric/window/source assumptions
    - rollback rehearsal or freeze gate is missing
    - mirror-only telemetry is used as sole success basis
  rollout_controls:
    canary_required_fields:
    - canary_cohort_ref
    - coexistence_window_ref
    - blast_radius_cap_ref
    - freeze_gate_ref
    - rollback_trigger_ref
    - promotion_review_checkpoint_ref
    dual_policy_rules:
    - old/new policy trace は共通の field vocabulary と threshold lineage を持たなければならない。
    - coexistence window 中は promotion 判定より rollback safety を優先し、 unresolved debt surge がある間は widen してはならない。
    - canary outcome は cohort-local success と global safety success を分けて記録する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - policy rollout charter
      - simulation scenario registry
      - comparability witness binding
      - promotion/freeze/rollback decision record
    GraphEngine:
      owns:
      - telemetry replay simulation
      - old/new trace materialization
      - canary cohort execution
      - rollback rehearsal witness generation
    GraphLint:
      owns:
      - non-comparable metric lint
      - critical cohort omission lint
      - rollback path missing lint
      - mirror-only success basis lint
    archive_object:
      owns:
      - simulation packet
      - dual-policy comparison bundle
      - rollout/rehearsal snapshot
  forbidden_shortcuts:
  - what-if simulation なしで threshold / hysteresis を本番 flip する
  - critical cohort を欠いた replay slice だけで success を宣言する
  - old/new metric の意味や window が違うまま比較する
  - rollback rehearsal をせず canary を widen する
  residual_open_points: []
scheduler_rollout_exception_governance:
  status: provisional_fixed
  statement: scheduler_rollout_exception_governance とは、rollout 中の canary cohort 選定、exception lane、shadow-mode cohort、emergency bypass の admissibility と境界を固定する規則である。
  core_claims:
  - canary cohort は session 単位ではなく lane/profile/authority tier/risk class を含む scope unit で選ぶ。critical profile を routine cohort に混ぜて silent canary することを許さない。
  - mandatory exclusion set を持つ。life-safety、active compromise response、regulator-mandated audit sweep、lawful replay reconstruction は、明示 charter がない限り enforcement canary から除外し、必要なら shadow-mode のみで観測する。
  - widening は cohort step と review checkpoint を持つ。前段階 unresolved bypass、hidden debt、comparability break が残る間は cohort 拡大を禁止する。
  - exception lane は policy evaluation 自体を飛ばす逃げ道ではない。exception lane に送った traffic についても bypass reason、owner、expiry、re-entry 条件、post-bypass review を必須にする。
  - emergency bypass は bounded suspension であり、新 policy の silent repeal ではない。bypass は reason、authority path、expiry、rollback precedence、counterfactual trace capture を束ねなければならない。
  - shadow-mode cohort は decision divergence を観測するが action enforcement をしない。shadow-mode 結果を enforcement success と混同して promotion 根拠に使ってはならない。
  canary_cohort_rules:
    selection_unit: lane family × profile × authority tier × risk class を基本 scope unit とする。
    mandatory_exclusion_set:
    - life_safety traffic without explicit rollout charter
    - active compromise containment lane
    - regulator-mandated audit sweep with fixed SLA
    - lawful replay reconstruction requiring deterministic trace preservation
    widening_conditions:
    - current cohort stable over required window
    - no unresolved bypass or hidden debt surge
    - comparability witness still valid after scope expansion
  exception_and_bypass:
    exception_lane_required_fields:
    - scope_unit_ref
    - bypass_reason_ref
    - owner_ref
    - expiry_ref
    - reentry_condition_ref
    - post_bypass_review_ref
    shadow_mode_required_fields:
    - shadow_scope_ref
    - decision_diff_capture_ref
    - no_enforcement_attestation_ref
    - promotion_exclusion_ref
    emergency_bypass_required_fields:
    - trigger_ref
    - authority_path_ref
    - expiry_ref
    - rollback_precedence_ref
    - counterfactual_trace_capture_ref
    - post_confirm_review_ref
    blocked_patterns:
    - expiry のない bypass を常設化する
    - shadow-mode divergence を enforcement success として昇格する
    - exception lane を backlog 隠しや protected floor 侵食の逃げ道に使う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - cohort charter
      - mandatory exclusion binding
      - exception lane / bypass approval
      - post-bypass review record
    GraphEngine:
      owns:
      - cohort partition materialization
      - shadow-mode diff capture
      - bypass path routing
      - re-entry candidate generation
    GraphLint:
      owns:
      - critical traffic silent canary lint
      - expiryless bypass lint
      - shadow/enforcement confusion lint
      - exception lane debt concealment lint
    archive_object:
      owns:
      - cohort membership snapshot
      - bypass / shadow trace bundle
      - post-bypass review packet
  forbidden_shortcuts:
  - critical profile を routine canary に黙って混ぜる
  - expiry や owner のない bypass を認める
  - shadow-mode の結果を enforcement success に読み替える
  - exception lane へ移した debt を rollout 評価から消す
  residual_open_points: []
scheduler_policy_promotion_divergence_governance:
  status: provisional_fixed
  statement: scheduler_policy_promotion_divergence_governance とは、canary から phase expansion / fleet-wide commit へ進める promotion gate、cohort 間 divergence budget、freeze / rollback trigger、closure witness を固定する規則である。
  core_claims:
  - promotion は single success flag ではなく multi-gate review として扱う。required stability window、critical cohort sign-off、rollback readiness、open bypass closure、debt non-growth を満たしたときだけ phase expansion を許す。
  - fleet-wide commit 前に divergence budget を明示する。cohort ごとの fairness tail 差、debt creation 差、override consumption 差、protected floor pressure 差を budget 化し、local improvement だけで global commit を正当化してはならない。
  - budget breach は severity に応じて widen freeze、partial rollback、fleet rollback、reframe_required に分岐する。budget breach を note に残すだけで promotion を継続してはならない。
  - closure witness は promotion head、covered cohort set、retired policy head、remaining shadow / bypass residue、rollback readiness snapshot を束ねる。commit 後にどの旧 policy がどこまで生きているか不明な状態を許さない。
  - critical cohort sign-off は named owner の subjective approval だけでは足りず、comparability / residue / protected floor の客観 witness を伴う。
  - phase expansion は monotone である必要はない。cohort A を widening しつつ cohort B を rollback する mixed-mode を許すが、coverage claim と divergence budget を別に記録しなければならない。
  promotion_gates:
    required_gates:
    - stability_window_pass
    - critical_cohort_signoff
    - rollback_readiness_alive
    - open_bypass_closed_or_bounded
    - debt_non_growth_within_budget
    phase_modes:
    - phase_expand
    - hold_current_scope
    - partial_rollback
    - fleet_commit
    - fleet_rollback
    - reframe_required
  divergence_budgets:
    dimensions:
    - fairness_tail_delta
    - debt_creation_delta
    - override_budget_delta
    - protected_floor_pressure_delta
    closure_requires:
    - covered cohort set is explicit
    - retired policy head and surviving legacy head are explicit
    - remaining shadow/bypass residue is bounded
    - rollback readiness snapshot is archived
    breach_branches:
      minor: widen freeze and targeted review
      material: partial rollback or narrowed commit
      critical: fleet rollback or reframe_required
  tool_responsibilities:
    DecisionLedger:
      owns:
      - promotion gate binding
      - divergence budget registry
      - phase mode decision
      - commit/rollback closure record
    GraphEngine:
      owns:
      - cohort coverage computation
      - divergence delta materialization
      - mixed-mode promotion plan
      - rollback execution witness
    GraphLint:
      owns:
      - budget breach ignored lint
      - implicit fleet commit lint
      - residue-unclosed promotion lint
      - legacy head ambiguity lint
    archive_object:
      owns:
      - promotion review packet
      - divergence budget snapshot
      - commit/rollback closure bundle
  forbidden_shortcuts:
  - single dashboard green を fleet-wide commit 根拠にする
  - divergence budget breach を note 扱いにして promotion を続ける
  - surviving legacy head を曖昧なまま commit を宣言する
  - critical cohort sign-off を subjective approval だけで済ませる
  residual_open_points: []
scheduler_post_migration_attestation_governance:
  status: provisional_fixed
  statement: scheduler_post_migration_attestation_governance とは、promotion または rollback の後に required な regression audit window、rollback debt settlement、post-migration attestation、reopen trigger を固定する規則である。
  core_claims:
  - commit または rollback は closure の終点ではなく post-migration observation の始点である。regression audit window、long-tail follow-up checkpoint、reopen trigger を持たない migration を final とみなしてはならない。
  - rollback は無害な元戻しではなく rollback debt を生みうる。stale bypass、orphan shadow trace、reopened backlog、threshold drift residue、operator confusion debt を独立 bucket として扱う。
  - settlement には debt bucket ごとの owner、due window、completion witness、carry-forward rule を必須にする。rollback しただけで stale bypass や orphan shadow trace が自然消滅したものとみなしてはならない。
  - post-migration attestation packet は migration branch、covered scope、observed regression outcome、remaining residue、rollback debt settlement status、reopen trigger table を束ねる。summary note だけで attested closure にしてはならない。
  - insufficient attestation のときは accepted_final ではなく provisional_closure、extended_audit、targeted_reopen、escalated_hold のいずれかへ送る。
  - reopen trigger は fairness tail relapse、debt resurgence、protected floor pressure recurrence、unexpected bypass resurrection、comparability witness invalidation を基本集合とする。
  regression_audit:
    required_fields:
    - audit_window_ref
    - followup_checkpoint_schedule_ref
    - reopen_trigger_table_ref
    - covered_scope_ref
    - observer_class_ref
    long_tail_checks:
    - fairness tail relapse after initial stability
    - debt resurgence after mitigation removal
    - protected floor pressure recurrence
    - unexpected bypass resurrection or stale exception lane usage
  rollback_debt_buckets:
    stale_bypass_debt: rollback 後も残る bypass / suspension / freeze artifact。
    orphan_shadow_trace_debt: promotion/rollback 後に owner を失った shadow trace。
    reopened_backlog_debt: rollback により再出現した backlog / residue。
    threshold_drift_residue: old/new threshold 切替後に比較不能な drift として残る residue。
    operator_confusion_debt: runbook / UI / alert semantics の不整合により残る運用 debt。
  attestation_packet:
    required_fields:
    - migration_branch_ref
    - covered_scope_ref
    - regression_outcome_ref
    - remaining_residue_ref
    - rollback_debt_status_ref
    - reopen_trigger_table_ref
    - attestor_ref
    - issued_at
    insufficient_branches:
    - provisional_closure
    - extended_audit
    - targeted_reopen
    - escalated_hold
  tool_responsibilities:
    DecisionLedger:
      owns:
      - post-migration audit charter
      - rollback debt bucket binding
      - attestation status judgement
      - reopen trigger binding
    GraphEngine:
      owns:
      - follow-up checkpoint generation
      - rollback debt carry-forward linkage
      - attestation packet materialization
      - targeted reopen candidate generation
    GraphLint:
      owns:
      - final-without-attestation lint
      - stale bypass debt omission lint
      - reopen trigger missing lint
      - orphan shadow trace lint
    archive_object:
      owns:
      - regression audit pack
      - rollback debt settlement bundle
      - post-migration attestation snapshot
  forbidden_shortcuts:
  - promotion/rollback 直後の summary note だけで final closure とみなす
  - rollback したから stale bypass や orphan shadow trace は自然消滅したとみなす
  - attestation 不足を黙って accepted_final に読み替える
  - reopen trigger table を持たない migration を完了扱いにする
  residual_open_points: []
scheduler_policy_lineage_finality_governance:
  status: provisional_fixed
  statement: scheduler_policy_lineage_finality_governance とは、policy old/new head、canary/promoted/rolled-back branch、attestation packet をどこまで retained witness として残し、どこから compaction できるか、また superseded head の finality と targeted reopen path をどう固定するかの規則である。
  core_claims:
  - policy lineage は単なる設定履歴ではなく、decision / rollout / rollback / attestation を束ねた branch graph として扱う。active head、superseded head、canary branch、rolled-back branch を snapshot の寄せ集めにしてはならない。
  - compaction は evidence の破棄ではなく retained witness への射影である。head digest、predecessor/successor relation、policy diff digest、promotion/rollback decision record、attestation packet、reopen trigger table を残せない segment は compaction してはならない。
  - replay-ready archive は segment manifest、branch boundary、required dependency registry ref、materialization pointer、witness completeness を束ねる。summary note だけを残して replay-ready とみなしてはならない。
  - superseded head には finality state を与える。sealed_final になった superseded head は lawful targeted reopen petition なしに active head へ復帰させてはならない。operator convenience を理由に old config を即時復帰する shortcut を許さない。
  - targeted reopen は affected scope、reopen basis、resurrection barrier、carry-forward debt visibility を束ねる。reopen で old head を部分再利用する場合も、新 head で生じた debt / attestation residue を無視してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は lineage の normative finality、branch materialization、shortcut lint、retained witness preservation を分担する。
  compaction_classes:
    active_head_segment: 現行 head とその直近 predecessor/successor を含む非 compaction 区間。full witness を要求する。
    attestable_predecessor_segment: attestation packet と promotion/rollback record により要約可能だが targeted replay は保持する区間。
    replay_ready_compacted_segment: raw payload の一部を畳み込んでも segment manifest と materialization pointer で replay できる区間。
    sealed_final_segment: lawful reopen petition がない限り active head に戻れない finalized 区間。
  retained_witness_minimum:
    required_fields:
    - lineage_segment_id
    - segment_manifest_digest_ref
    - head_digest_ref
    - predecessor_successor_binding_ref
    - policy_diff_digest_ref
    - promotion_or_rollback_decision_ref
    - attestation_packet_ref
    - reopen_trigger_table_ref
    - materialization_pointer_ref
    - dependency_registry_snapshot_ref
    rules:
    - dependency_registry_snapshot_ref は threshold / hysteresis / remediation family の解釈基準を固定できなければならない。
    - materialization_pointer_ref は replay 時に exact segment boundary を復元できなければならない。
    - attestation_packet_ref が insufficient のまま sealed_final_segment へ移してはならない。
  supersession_finality:
    states:
    - active
    - superseded_replayable
    - sealed_final
    - targeted_reopen_pending
    - reopened_exception
    resurrection_barriers:
    - lawful targeted reopen petition without scope widening
    - carry-forward debt visibility attested
    - current active head closure or coexistence mode explicitly bound
    - replay-ready witness completeness verified
    blocked_patterns:
    - sealed_final head を operator convenience だけで再活性化する
    - targeted reopen を branch-wide undo に読み替える
    - canary branch の incomplete witness を promoted predecessor と同格に扱う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - finality state binding
      - targeted reopen petition / judgement
      - carry-forward debt visibility record
      - canonical head nomination
    GraphEngine:
      owns:
      - lineage segment graph materialization
      - branch boundary reconstruction
      - targeted replay plan generation
      - coexistence path realization
    GraphLint:
      owns:
      - insufficient retained witness lint
      - illegal resurrection lint
      - scope-widened reopen lint
      - incomplete attestation finality lint
    archive_object:
      owns:
      - segment manifest
      - materialization pointer set
      - attestation packet bundle
      - sealed lineage snapshot
  forbidden_shortcuts:
  - summary note だけを残して replay-ready archive とみなす
  - sealed_final の superseded head を即座に active へ戻す
  - targeted reopen で carry-forward debt を黙って捨てる
  - branch boundary が曖昧なまま compaction を進める
  residual_open_points: []
scheduler_lineage_retention_purge_governance:
  status: provisional_fixed
  statement: scheduler_lineage_retention_purge_governance とは、lineage archive の retention tier、legal-hold carveout、purge admissibility と purge attestation を固定する規則である。
  core_claims:
  - retention は age だけでなく branch role、replay obligation、audit exposure、reopen probability で決める。recent だが low-risk だからすぐ purge できる、あるいは old だから自動 purge できる、といった単純規則を許さない。
  - active head segment、superseded_replayable segment、sealed_final segment は retention floor が異なる。sealed_final でも purge 前に manifest / decision / attestation digest の minimum witness floor を維持しなければならない。
  - legal-hold / audit-hold / targeted_reopen_pending は purge を止めるが、visibility widening を自動付与しない。preservation freeze と content reveal authority を混同してはならない。
  - purge は payload purge、index purge、materialization pointer purge を分けて扱う。manifest retention と digest retention だけで lawful replay / attestation が成立しない場合、payload purge を許してはならない。
  - purge attestation packet は purge scope、hold clearance、alternate witness sufficiency、reopen clearance、residual reference map を束ねる。delete success のログだけで purge 完了扱いにしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は retention floor binding、hold propagation、purge simulation、insufficient purge lint、attestation preservation を分担する。
  retention_tiers:
    hot_active: 現行 head と reopen 直後の例外 branch。full payload と materialization pointer を保持する。
    warm_replay_ready: superseded_replayable segment。targeted replay と audit reconstruction に必要な payload / manifest を保持する。
    cold_attestable: sealed_final segment。manifest、decision digest、attestation packet を最低限保持し、payload purge は alternate witness sufficiency がある場合に限る。
    minimal_manifest_hold: payload を purge した後も lawful attestation と existence proof のために manifest/digest を保持する tier。
  hold_and_purge_rules:
    hold_classes:
    - legal_hold
    - audit_hold
    - targeted_reopen_pending
    - debt_settlement_hold
    purge_scopes:
    - payload_only
    - materialization_pointer_only
    - derived_index_only
    - full_segment_purge
    blocked_if:
    - active hold が残る
    - alternate witness sufficiency が未証明
    - reopen trigger table に unresolved branch がある
    - carry-forward debt visibility が purge 後に失われる
  purge_attestation_packet:
    required_fields:
    - purge_scope_ref
    - target_segment_ref
    - retention_tier_ref
    - hold_clearance_ref
    - alternate_witness_sufficiency_ref
    - reopen_clearance_ref
    - residual_reference_map_ref
    - executed_by_ref
    - executed_at
    - post_purge_verification_ref
    rules:
    - post_purge_verification_ref は purge 後にどの replay / audit demand がまだ満たせるかを示さなければならない。
    - full_segment_purge は residual_reference_map_ref を失わせるなら許容しない。
    - debt_settlement_hold が残る segment を cold_attestable tier に落としてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - retention tier binding
      - hold clearance judgement
      - purge approval record
      - post-purge admissibility statement
    GraphEngine:
      owns:
      - purge impact simulation
      - residual reference map generation
      - hold propagation over lineage graph
      - post-purge replay capability check
    GraphLint:
      owns:
      - hold-bypassed purge lint
      - insufficient alternate witness lint
      - manifest-loss purge lint
      - debt visibility loss lint
    archive_object:
      owns:
      - tiered storage placement
      - purge attestation packet
      - minimal manifest hold set
      - post-purge verification artifact
  forbidden_shortcuts:
  - age だけで sealed lineage を自動 purge する
  - legal-hold を content reveal 権限に読み替える
  - delete success log だけで purge 完了扱いにする
  - purge 後に carry-forward debt や reopen path を追跡不能にする
  residual_open_points: []
scheduler_lineage_external_export_governance:
  status: provisional_fixed
  statement: scheduler_lineage_external_export_governance とは、external audit export、foreign replay proof、trust-boundary redaction、de-redaction authority を固定する規則である。
  core_claims:
  - external export は raw archive mirror ではなく purpose-bound derived packet を原則とする。受領者に不要な raw payload や internal actor slice を bundled export してはならない。
  - recipient class を regulator、independent_auditor、partner_operator、internal_separated_team などで分け、許可される witness 粒度と redaction profile を明示する。same company でも trust boundary が違えば export rule は変わる。
  - foreign replay proof は export packet がどの lineage segment から導出され、どの redaction が入り、何を再現可能とし何を再現不能とするかを示す。proof なしの CSV や summary を replay-capable export とみなしてはならない。
  - redaction は content hiding だけでなく join barrier を含む。actor slice、tenant slice、sensitive threshold value、lawful trigger basis は redaction ledger なしに削ってはならない。
  - de-redaction authority は export authority と別に持つ。受領後の問い合わせや紛争を理由に export packet を自動 de-redact してはならない。
  - external export packet は import / reactivation 権限を与えない。foreign replay proof は検証可能性を与えるが canonical head の変更権限は与えない。
  recipient_classes:
    regulator: lawful basis が明示され、必要最小限の raw witness と redaction ledger を受け取れる。
    independent_auditor: verification に必要な manifest / digest / replay proof を受け取れるが actor identity は profile で制限される。
    partner_operator: joint operation に必要な bounded packet のみ受け取り、internal debt / unrelated segment は受け取れない。
    internal_separated_team: 同一組織でも SoD 境界に応じて redacted packet を受け取る。
  export_packet:
    required_fields:
    - export_purpose_ref
    - recipient_class_ref
    - target_segment_ref
    - export_scope_ref
    - redaction_profile_ref
    - redaction_ledger_ref
    - foreign_replay_proof_ref
    - lawful_basis_ref
    - expiry_ref
    - verification_instruction_ref
    rules:
    - export_scope_ref は target_segment からの lawful projection でなければならない。
    - foreign_replay_proof_ref は replayable set と intentionally non-replayable set の両方を示さなければならない。
    - verification_instruction_ref は受領者がどの digest / proof / manifest を検証すべきかを明示しなければならない。
  redaction_and_authority:
    redaction_targets:
    - actor_identity_slice
    - tenant_specific_slice
    - sensitive_threshold_values
    - lawful_trigger_basis
    - unrelated_branch_payload
    authority_split:
      export_authority: bounded export packet を承認する authority。
      de_redaction_authority: 追加 reveal や join barrier 解放を承認する authority。
    blocked_patterns:
    - redaction ledger なしに actor slice を伏せる
    - export 問い合わせを理由に自動 de-redact する
    - foreign replay proof なしの summary を audit-ready packet と称する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - export purpose / recipient binding
      - authority split
      - export approval / expiry record
      - non-importability statement
    GraphEngine:
      owns:
      - bounded export projection
      - foreign replay proof generation
      - redacted lineage packet materialization
      - verification instruction synthesis
    GraphLint:
      owns:
      - over-broad export lint
      - missing replay proof lint
      - unauthorized de-redaction lint
      - join-barrier leakage lint
    archive_object:
      owns:
      - export packet snapshot
      - redaction ledger
      - foreign replay proof artifact
      - recipient-scoped manifest bundle
  forbidden_shortcuts:
  - raw archive mirror を default external export とする
  - foreign replay proof なしの summary を audit-ready と称する
  - export authority と de-redaction authority を混同する
  - external export packet を import / reactivation 権限付きと誤読させる
  residual_open_points: []
scheduler_lineage_schema_compatibility_governance:
  status: provisional_fixed
  statement: scheduler_lineage_schema_compatibility_governance とは、schema evolution、cross-version replay compatibility、mixed-version coexistence、downgrade barrier を固定する規則である。
  core_claims:
  - schema evolution は lineage semantics の書き換えではなく表現層の進化として扱う。finality state、reopen trigger、debt visibility、attestation sufficiency の意味を失う migration を compatibility と呼んではならない。
  - archive segment は source schema version、semantic profile、adapter manifest を束ねる。version 番号だけ残して transformation logic を失った archive を replay-ready とみなしてはならない。
  - cross-version replay は semantic equivalence witness があるときにだけ許す。field rename や enum split があっても、effect on finality / rollback / purge / export semantics が等価でなければ compatible としてはならない。
  - mixed-version coexistence は reader-lift を原則にし、writer ambiguity を避ける。複数 version の segment を同時に読むことは許しても、canonical head を複数 schema で同時に mutate してはならない。
  - downgrade barrier は information loss class を基準に立てる。newer schema の veto condition、reopen reason、redaction join barrier、retention hold を older schema へ落とすと失われるなら downgrade export / replay を禁止する。
  - adapter は code artifact である前に governed witness である。adapter version、semantic coverage、known loss class、validation packet を固定せずに migration を silent に走らせてはならない。
  schema_and_adapter:
    required_fields:
    - source_schema_version_ref
    - target_schema_version_ref
    - semantic_profile_ref
    - adapter_manifest_ref
    - known_loss_class_ref
    - validation_packet_ref
    - compatibility_decision_ref
    rules:
    - adapter_manifest_ref は transformed field map だけでなく preserved / derived / dropped semantics を示さなければならない。
    - validation_packet_ref は representative lineage segment に対する replay comparison を含まなければならない。
    - compatibility_decision_ref は full_compatible / compatible_with_loss / non_compatible のいずれかを bound しなければならない。
  compatibility_and_barrier:
    compatibility_classes:
    - full_compatible
    - compatible_with_loss
    - non_compatible
    loss_classes:
    - display_only_loss
    - derived_metric_loss
    - governance_semantics_loss
    - identity_join_barrier_loss
    - finality_or_reopen_loss
    downgrade_block_if:
    - governance_semantics_loss がある
    - identity_join_barrier_loss により lawful redaction semantics が崩れる
    - finality_or_reopen_loss により targeted reopen / sealed_final 判定が変わる
  mixed_version_rules:
    reader_lift: older/newer segment を同一 query で読めても canonical semantics は source profile を保持する。
    single_writer_rule: canonical head mutation は単一 schema writer からのみ許す。
    blocked_patterns:
    - adapter manifest なしで implicit field rename を流す
    - compatible_with_loss を full_compatible と偽装する
    - mixed-version read を理由に mixed-version write を許す
  tool_responsibilities:
    DecisionLedger:
      owns:
      - compatibility decision
      - downgrade barrier judgement
      - single-writer governance
      - adapter approval record
    GraphEngine:
      owns:
      - cross-version projection
      - replay comparison generation
      - adapter execution trace
      - mixed-version reader-lift materialization
    GraphLint:
      owns:
      - missing adapter manifest lint
      - unsafe downgrade lint
      - writer ambiguity lint
      - loss-class concealment lint
    archive_object:
      owns:
      - schema-tagged segment snapshot
      - adapter manifest bundle
      - validation packet
      - compatibility evidence archive
  forbidden_shortcuts:
  - schema version だけ保存して adapter manifest を残さない
  - governance semantics loss を含む downgrade を compatibility と称する
  - mixed-version reader-lift を mixed-version write 許可に読み替える
  - compatible_with_loss を full_compatible として監査に流す
  residual_open_points: []
scheduler_lineage_mergeback_head_governance:
  status: provisional_fixed
  statement: scheduler_lineage_mergeback_head_governance とは、reopened / imported / corrective branch を canonical lineage に merge-back するときの admissibility、inherited debt carry-forward、canonical head selection を固定する規則である。
  core_claims:
  - merge-back は branch 消去ではなく lawful re-integration である。source branch、target head、merge purpose、covered scope、conflict class、merge witness が揃うときにだけ canonical lineage へ戻せる。
  - merge admissibility は branch class ごとに違う。targeted_reopen branch は affected scope exactness を要求し、imported_verified branch は issuer provenance と local attestation を要求し、corrective_reverse branch は reverse lineage witness を要求する。
  - merge で debt は消えない。attestation residue、notice duty residue、replay gap debt、redaction join debt、schema adapter debt を inherited debt bundle として carry-forward し、discharge point を明示しなければならない。
  - canonical head は一意に選ぶ。merge 後の状態は incumbent_preserved、merged_head_promoted、bounded_dual_head、merge_rejected のいずれかとして記録し、dual current を黙認してはならない。
  - conflict class は semantic_conflict、authority_conflict、chronology_conflict、witness_gap_conflict、redaction_barrier_conflict を基本集合とする。resolved class を示せない conflict を抱えたまま merge 完了扱いにしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は merge judgement、debt propagation、head nomination、witness preservation を分担する。
  branch_classes:
    targeted_reopen_branch: closed lineage の一部 scope だけを reopen して corrective merge-back 候補になっている branch。
    imported_verified_branch: external export/import packet と local verification を経て merge 候補になっている branch。
    corrective_reverse_branch: reverse-of-reverse または rollback 由来で canonical correction を目指す branch。
    analysis_only_branch: 比較・監査・shadow 用であり canonical merge-back 候補にはならない branch。
  merge_witness:
    required_fields:
    - source_branch_ref
    - target_head_ref
    - merge_purpose_ref
    - covered_scope_ref
    - conflict_class_set_ref
    - conflict_resolution_packet_ref
    - inherited_debt_bundle_ref
    - attestation_residue_ref
    - canonical_head_nomination_ref
    - effective_at
    - approved_by_ref
    rules:
    - covered_scope_ref は source branch の admissible segment だけを指し、unrelated branch payload を巻き込んではならない。
    - conflict_resolution_packet_ref は resolved / deferred / blocking の class を分けて示さなければならない。
    - canonical_head_nomination_ref は merge 結果の唯一 current head または bounded coexistence head set を明示しなければならない。
  inherited_debt_bundle:
    debt_classes:
    - attestation_residue
    - notice_duty_residue
    - replay_gap_debt
    - redaction_join_debt
    - schema_adapter_debt
    rules:
    - 各 debt item は source branch origin、receiver owner、due window、discharge witness を持たなければならない。
    - merge 後に receiver owner が未束縛の debt item を orphan debt として放置してはならない。
    - merged_head_promoted のときも inherited debt bundle は head closure note から分離して追跡しなければならない。
  canonical_head_selection:
    states:
    - incumbent_preserved
    - merged_head_promoted
    - bounded_dual_head
    - merge_rejected
    selection_rules:
    - single-writer canonicality を破る head 選定を禁止する。
    - bounded_dual_head は coexistence_scope と expiry が明示された場合にのみ許す。
    - merge_rejected の場合も source branch の debt と witness disposition を残さなければならない。
    blocked_patterns:
    - merge note だけを残して canonical head nomination を省略する
    - resolved していない authority_conflict を抱えたまま merged_head_promoted にする
    - imported_verified_branch を local attestation なしで canonical head 候補にする
  tool_responsibilities:
    DecisionLedger:
      owns:
      - merge admissibility judgement
      - conflict class / resolution binding
      - inherited debt bundle binding
      - canonical head nomination
    GraphEngine:
      owns:
      - merge witness materialization
      - branch overlap / scope computation
      - debt carry-forward propagation
      - head transition realization
    GraphLint:
      owns:
      - illegal dual-current lint
      - missing debt carry-forward lint
      - unresolved conflict merge lint
      - head nomination omission lint
    archive_object:
      owns:
      - merge witness packet
      - source/target branch snapshot
      - inherited debt bundle artifact
      - post-merge head snapshot
  forbidden_shortcuts:
  - source branch をそのまま canonical lineage に append する
  - merge 完了を理由に inherited debt を自然消滅扱いにする
  - canonical head nomination なしに merged state を current とみなす
  - analysis_only_branch を convenience のために merge-back する
  residual_open_points: []
scheduler_lineage_branch_quarantine_tombstone_governance:
  status: provisional_fixed
  statement: scheduler_lineage_branch_quarantine_tombstone_governance とは、merge されない branch の quarantine、owner 喪失 branch の orphan 化、abandoned branch の tombstone 化、restore gate を固定する規則である。
  core_claims:
  - branch は merged されない限り生存し続けてよいわけではない。active_exception、quarantined_pending、orphaned_no_owner、tombstoned_abandoned、evidentiary_hold を基本 lifecycle state とする。
  - quarantine は purge でも delete でもない。canonical head candidacy、automatic merge eligibility、external export widening を停止しつつ、witness と debt visibility を保持する隔離状態として扱う。
  - orphan branch は owner 不在だけでなく authority path / lawful purpose / maintenance custody の欠落を含む。custodian が束縛されない orphan を active branch として残してはならない。
  - tombstone は evidence-preserving closure である。last admissible head、pending debt disposition、restore barrier、expiry reason、retention floor を束ねた tombstone packet を必須にする。
  - restore は undo ではなく新たな petition である。tombstoned branch は restore petition、lawful basis、custodian、head safety、debt visibility が揃うときにだけ戻せる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は lifecycle judgement、custody propagation、tombstone packet、restore admissibility を分担する。
  branch_lifecycle_states:
    active_exception: bounded coexistence 下で生存している例外 branch。owner と expiry を持つ。
    quarantined_pending: merge / restore / purge judgement 待ちで execution と head candidacy を停止した branch。
    orphaned_no_owner: owner または authority path を失い、custodian だけが保持している branch。
    tombstoned_abandoned: restore petition がない限り再活性化できない墓標化 branch。
    evidentiary_hold: 監査・法的保持のために content は維持するが canonical 操作は許さない branch。
  quarantine_and_orphan_rules:
    quarantine_triggers:
    - merge witness missing beyond allowed window
    - blocking conflict unresolved beyond checkpoint
    - owner or authority path lost
    - import provenance challenged or revoked
    orphan_conditions:
    - named owner absent
    - lawful purpose expired
    - custodian not bound
    - restore or merge path unknown
    blocked_while_quarantined:
    - canonical head nomination
    - automatic merge-back
    - scope widening export
    - silent retention downgrade
  tombstone_packet:
    required_fields:
    - branch_ref
    - last_admissible_head_ref
    - lifecycle_state_ref
    - pending_debt_disposition_ref
    - retention_floor_ref
    - restore_barrier_ref
    - custodian_ref
    - tombstoned_at
    - reason_ref
    rules:
    - pending_debt_disposition_ref は tombstone 後の debt owner または waiver authority を示さなければならない。
    - restore_barrier_ref は lawful basis / safety / witness completeness を分けて示さなければならない。
    - last_admissible_head_ref を失う tombstone packet は監査用墓標として不十分である。
  restore_gate:
    required_conditions:
    - restore petition with lawful basis
    - custodian and future owner bound
    - head safety and conflict check complete
    - debt visibility preserved
    blocked_patterns:
    - operator convenience だけで tombstone を解除する
    - orphan branch を custodian なしで restore する
    - quarantine 中の branch を evidence review なしで merge-back する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - lifecycle state judgement
      - custodian binding
      - tombstone approval record
      - restore admissibility judgement
    GraphEngine:
      owns:
      - branch isolation / freeze realization
      - orphan detection
      - tombstone packet materialization
      - restore candidate generation
    GraphLint:
      owns:
      - ownerless-active-branch lint
      - missing tombstone packet lint
      - illegal restore lint
      - quarantine-bypassed merge lint
    archive_object:
      owns:
      - quarantine snapshot
      - tombstone packet
      - custody history
      - restore petition artifact
  forbidden_shortcuts:
  - merge しない branch を何も記録せず放置する
  - quarantine を delete と同義に扱う
  - tombstone packet なしに abandoned branch を purge 対象へ送る
  - owner 不在の branch を active exception のまま残す
  residual_open_points: []
scheduler_imported_branch_provenance_governance:
  status: provisional_fixed
  statement: scheduler_imported_branch_provenance_governance とは、external / foreign source から入る imported branch の provenance proof、issuer trust class、replay admission mode、local attestation 境界を固定する規則である。
  core_claims:
  - imported branch は reopened internal branch と同一ではない。issuer identity、signature suite、source lineage digest、export purpose、schema compatibility、redaction profile を束ねた provenance proof がない imported branch を canonical lineage の近傍に置いてはならない。
  - issuer trust class を trusted_peer、constrained_partner、independent_auditor、untrusted_forensic に分け、許される replay / comparison / merge 作用を変える。issuer が同業他社か監査主体かで admission mode は変わる。
  - replay admission mode は verify_only、shadow_only、bounded_merge_candidate、non_admissible を基本集合とする。foreign replay proof があっても local attestation なしに canonical head mutation を許してはならない。
  - import packet は debt disclosure を含まなければならない。source 側で未解消の attestation residue、notice obligation、join barrier、schema loss class を hidden にしたまま import してはならない。
  - local attestation は external truth の承認ではなく local governance への接続である。imported branch が local policy、protected floor、retention / redaction rule と矛盾しないことを確認しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は import provenance、trust class binding、admission mode、local attestation、mutation prohibition を分担する。
  issuer_trust_classes:
    trusted_peer: schema / attestation / custody profile が相互認証されている peer source。bounded_merge_candidate まで進みうる。
    constrained_partner: joint operation だが authority や visibility に制約がある partner source。shadow_only または bounded_merge_candidate。
    independent_auditor: verification 目的の source。verify_only を原則とし canonical mutation 権限は持たない。
    untrusted_forensic: 出所や chain-of-custody が限定的な source。comparison や anomaly triage 用で non_admissible を原則とする。
  import_packet:
    required_fields:
    - issuer_identity_ref
    - issuer_trust_class_ref
    - source_lineage_digest_ref
    - signature_suite_ref
    - foreign_replay_proof_ref
    - schema_compatibility_ref
    - redaction_profile_ref
    - debt_disclosure_ref
    - lawful_import_purpose_ref
    - received_at
    rules:
    - debt_disclosure_ref は source 側の residual debt と loss class を少なくとも class 粒度で示さなければならない。
    - schema_compatibility_ref は local schema への projection 可否と downgrade barrier を示さなければならない。
    - signature_suite_ref や foreign_replay_proof_ref が欠ける packet は verify_only 以上へ昇格させてはならない。
  admission_modes:
    verify_only: digest / signature / provenance を検証するだけで local replay や branch comparison を行わない。
    shadow_only: local action へ影響させず comparison / divergence 観測だけを行う。
    bounded_merge_candidate: local attestation 後に限定 merge 候補になりうる。
    non_admissible: 保持しても canonical lineage 近傍では扱わない。
  local_attestation_gate:
    required_checks:
    - issuer trust class admitted for stated purpose
    - local protected floor and redaction rule compatibility
    - debt disclosure and loss class completeness
    - canonical mutation still blocked until merge witness is bound
    blocked_patterns:
    - trusted_peer だから local attestation を省略する
    - independent_auditor packet を merge 候補に昇格する
    - debt disclosure を欠いた import packet を shadow_only 以上で扱う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - issuer trust class binding
      - lawful import purpose
      - admission mode judgement
      - local attestation decision
    GraphEngine:
      owns:
      - import packet parsing
      - foreign replay proof verification
      - schema projection check
      - shadow comparison materialization
    GraphLint:
      owns:
      - missing provenance proof lint
      - trust-class misuse lint
      - debt-disclosure omission lint
      - illegal canonical mutation lint
    archive_object:
      owns:
      - import packet artifact
      - issuer signature / proof bundle
      - local attestation snapshot
      - admission-mode history
  forbidden_shortcuts:
  - issuer trust class を付けず imported branch を受け入れる
  - foreign replay proof だけで canonical mutation 権限まで与える
  - debt disclosure を欠いた import packet を bounded_merge_candidate にする
  - independent_auditor packet を trusted_peer と同格に扱う
  residual_open_points: []
scheduler_lineage_patch_equivalence_governance:
  status: provisional_fixed
  statement: scheduler_lineage_patch_equivalence_governance とは、rebase / cherry-pick / squash を含む patch 系 branch 操作の provenance、semantic equivalence、disclosed-loss 境界、canonical head replacement 条件を固定する規則である。
  core_claims:
  - rebase や cherry-pick は text diff 操作ではなく lineage transformation である。origin head set、transformed scope、dropped claim、conflict resolution、debt delta を束ねた patch provenance bundle がなければ lawful transformation とみなしてはならない。
  - operation class は pure_rebase、conflict_resolved_rebase、cherry_pick_patch、squashed_patch_bundle を基本集合とする。同じ patch でも conflict 解消や squash により equivalence class は変わる。
  - equivalence は semantically_equivalent、equivalent_with_disclosed_loss、non_equivalent を分ける。attestation edge、notice duty、redaction join barrier、reopen trigger を落とした patch を semantically_equivalent と呼んではならない。
  - carry-forward debt delta を必須にする。patch により debt が新規生成・転写・消滅・waive されたなら、その差分を provenance bundle で追跡しなければならない。
  - canonical head replacement は equivalence witness と head safety packet を持つときにだけ許す。silent squash や hidden cherry-pick で current head lineage を置換してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は patch judgement、equivalence witness、debt delta、head replacement safety を分担する。
  operation_classes:
    pure_rebase: content と normative meaning を保ったまま ancestor base を付け替える操作。
    conflict_resolved_rebase: rebase 中に conflict resolution を含み、semantic drift 可能性がある操作。
    cherry_pick_patch: origin branch の一部 change set だけを選択して適用する操作。
    squashed_patch_bundle: 複数 change set をまとめて適用し origin granularity を失いやすい操作。
  patch_provenance_bundle:
    required_fields:
    - operation_class_ref
    - origin_head_set_ref
    - target_base_ref
    - transformed_scope_ref
    - dropped_claim_set_ref
    - conflict_resolution_packet_ref
    - equivalence_witness_ref
    - debt_delta_ref
    - resulting_head_ref
    - issued_at
    rules:
    - origin_head_set_ref は patch 前の source lineage を exact に指さなければならない。
    - dropped_claim_set_ref が空でない場合、その patch は semantically_equivalent と判定してはならない。
    - debt_delta_ref は created / transferred / discharged / waived を分けて示さなければならない。
  equivalence_classes:
    semantically_equivalent: normative meaning、attestation sufficiency、notice duty、redaction join barrier、reopen trigger が保たれている。
    equivalent_with_disclosed_loss: 利用可能だが落ちた claim / witness / granularity が disclosure されている。
    non_equivalent: lineage meaning や governance semantics が変わり、単純 replacement 根拠に使えない。
  head_replacement_rules:
    required_conditions:
    - equivalence witness bound
    - debt delta reviewed
    - resulting head safety packet complete
    - origin head preservation or retirement explicit
    blocked_patterns:
    - squashed patch を provenance なしで current head に置換する
    - equivalent_with_disclosed_loss を semantically_equivalent として扱う
    - origin head retirement を曖昧にしたまま cherry-pick patch を canonical 化する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - operation class judgement
      - equivalence class binding
      - debt delta approval
      - canonical head replacement judgement
    GraphEngine:
      owns:
      - origin/target patch lineage reconstruction
      - equivalence witness generation
      - debt delta propagation
      - resulting head materialization
    GraphLint:
      owns:
      - missing patch provenance lint
      - silent-loss equivalence lint
      - illegal head replacement lint
      - hidden debt delta lint
    archive_object:
      owns:
      - patch provenance bundle
      - equivalence witness artifact
      - origin/result head snapshot
      - debt delta record
  forbidden_shortcuts:
  - rebase / cherry-pick を単なる text diff とみなす
  - equivalence witness なしで canonical head replacement を行う
  - silent squash で origin granularity と debt delta を失う
  - equivalent_with_disclosed_loss を disclosure なしで current replacement 根拠に使う
  residual_open_points: []
scheduler_lineage_merge_queue_freeze_governance:
  status: provisional_fixed
  statement: scheduler_lineage_merge_queue_freeze_governance とは、同じ canonical head 近傍で競合する merge / restore / patch candidate の reservation unit、priority ordering、conflict arbitration、freeze window を固定する規則である。
  core_claims:
  - concurrent candidate は FIFO だけでは扱えない。reservation unit を canonical_head_ref、affected_scope_ref、mutation_class_ref、authority_envelope_ref の組として束縛し、同じ reservation unit を競合単位として queue する。
  - priority は authority tier、risk class、lawful deadline、debt age、freeze sensitivity の strict ordering で決める。operator convenience や arrival order だけで safety-critical corrective candidate を追い越してはならない。
  - conflict arbitration は overlap_conflict、authority_conflict、witness_conflict、freeze_conflict、starvation_conflict を区別する。blocking class ごとに arbitration path と veto reach を分け、局所競合を global stop に拡大してはならない。
  - freeze window は queue pause ではなく mutation boundary である。attestation export、purge attestation、head replacement review など head safety が揺らぐ局面では freeze_scope、freeze_owner、thaw_condition、max_duration を束ねた freeze packet を要求する。
  - veto reach は exact scope と protected floor に限定する。authority conflict が一部 scope に閉じている場合、無関係な reservation lane まで止めてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reservation binding、priority evaluation、freeze packet、arbitration outcome を分担する。
  reservation_units:
    exclusive_head_mutation_slot: 同一 canonical head と重なる affected scope を変える mutation 用の排他的 reservation。
    bounded_patch_replacement_slot: equivalence witness review 付き patch head replacement 用の予約単位。
    restore_petition_slot: tombstoned / quarantined branch の restore judgement 用の予約単位。
    comparison_only_lane: shadow / verify-only / evidence assembly のための非 mutation lane。mutation slot を消費しない。
  arbitration_and_veto:
    priority_factors:
    - authority tier and lawful mandate
    - risk class and protected floor exposure
    - debt age / pending hold / deadline pressure
    - freeze sensitivity and witness expiry proximity
    conflict_classes:
    - overlap_conflict
    - authority_conflict
    - witness_conflict
    - freeze_conflict
    - starvation_conflict
    rules:
    - veto reach は affected_scope_ref と protected floor に限定し、queue 全体へ自動拡張してはならない。
    - starvation_conflict は単なる待機時間ではなく repeated displacement と debt worsening を伴う場合に開く。
    - arbitration outcome は admitted / deferred / blocked / frozen のいずれかを明示しなければならない。
  freeze_window:
    required_fields:
    - freeze_scope_ref
    - freeze_reason_ref
    - freeze_owner_ref
    - thaw_condition_ref
    - max_duration_ref
    - active_reservation_set_ref
    - issued_at
    states:
    - open
    - soft_frozen
    - hard_frozen
    - thaw_pending
    rules:
    - soft_frozen では新規 mutation admission を止めるが comparison_only_lane は許しうる。
    - hard_frozen では thaw_condition_ref が満たされるまで affected scope の head mutation を禁止する。
    - freeze_reason_ref が消えても thaw witness なしに自動 thaw してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reservation unit binding
      - priority / veto rule binding
      - freeze packet approval
      - arbitration outcome ratification
    GraphEngine:
      owns:
      - candidate overlap detection
      - queue ordering materialization
      - freeze scope projection
      - thaw readiness computation
    GraphLint:
      owns:
      - hidden overlap lint
      - global-stop overreach lint
      - missing freeze packet lint
      - illegal priority inversion lint
    archive_object:
      owns:
      - reservation snapshot
      - arbitration packet
      - freeze packet
      - queue state transition record
  forbidden_shortcuts:
  - arrival order だけで authority / risk ordering を上書きする
  - local conflict を理由に queue 全体を黙って freeze する
  - freeze packet なしで attestation 中の head mutation を進める
  - comparison_only candidate を mutation slot に見せかけて優先権を取らせる
  residual_open_points: []
scheduler_reservation_lease_recovery_governance:
  status: provisional_fixed
  statement: scheduler_reservation_lease_recovery_governance とは、reservation の lease class、renewal / expiry witness、stale claimant recovery、starvation appeal を固定する規則である。
  core_claims:
  - reservation は無期限 lock ではない。short_mutation_lease、evidence_assembly_lease、manual_review_lease、freeze_guard_lease を基本集合とし、lease class ごとに renewal 条件と expiry ceiling を分ける。
  - renewal には progress witness が要る。heartbeat や UI open 状態だけで lease を延命してはならず、witness assembly、conflict resolution、head safety review の進捗を示さなければならない。
  - stale claimant は time-out だけでなく owner 喪失、executor crash、freeze reason 消滅後の無反応、debt non-progress を含む。stale 判定後は release、reassign、quarantine、contested_hold のいずれかへ送る。
  - recovery は silent unlock ではない。reservation lineage、last progress witness、debt disposition、freeze interaction を束ねた recovery packet を残さなければならない。
  - starvation appeal は stale recovery の代替ではない。repeated displacement と worsening debt を受けた candidate だけが bounded appeal lane に入り、priority inversion の是正を求められる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は lease binding、stale detection、recovery packet、appeal lane を分担する。
  lease_classes:
    short_mutation_lease: 通常の merge / restore / patch mutation に使う短い reservation。明確な commit deadline を持つ。
    evidence_assembly_lease: witness や attestation packet を揃えるための補助 reservation。mutation 権限は限定される。
    manual_review_lease: human arbitration や authority review 待ちの reservation。owner と expiry の双方を必須にする。
    freeze_guard_lease: active freeze packet に結びついた保全用 lease。freeze owner と thaw condition に従属する。
  stale_claimant_detection:
    signals:
    - lease expired without valid renewal
    - owner or authority path lost
    - executor crash with no checkpoint advance
    - freeze cleared but claimant no response
    - debt / witness progress stagnant beyond policy window
    rules:
    - heartbeat-only renewal を progress witness の代替にしてはならない。
    - freeze_guard_lease は freeze packet が失効した時点で再評価しなければならない。
    - same claimant の repeated stale を history から切り離してはならない。
  recovery_and_appeal:
    recovery_outcomes:
    - released
    - reassigned
    - quarantined
    - contested_hold
    appeal_admission:
    - repeated displacement across bounded horizon
    - debt worsening or deadline compression
    - candidate still lawful and witness-complete enough for review
    blocked_patterns:
    - stale claimant を UI refresh だけで復活扱いにする
    - appeal lane を通常 priority lane の抜け道にする
    - reassigned reservation で旧 claimant の debt disposition を失う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - lease class binding
      - renewal / expiry rule binding
      - recovery packet approval
      - appeal admission judgement
    GraphEngine:
      owns:
      - lease timer and progress linkage
      - stale claimant detection
      - reassignment path materialization
      - appeal queue projection
    GraphLint:
      owns:
      - heartbeat-only renewal lint
      - silent unlock lint
      - appeal abuse lint
      - missing debt disposition lint
    archive_object:
      owns:
      - lease snapshot
      - recovery packet
      - stale detection evidence
      - appeal trail
  forbidden_shortcuts:
  - UI が開いているだけで lease renewal 扱いにする
  - stale recovery を silent unlock で済ませる
  - appeal lane を高 priority への抜け道として常設する
  - reassignment 時に旧 claimant の debt と freeze interaction を捨てる
  residual_open_points: []
scheduler_merge_train_atomicity_governance:
  status: provisional_fixed
  statement: scheduler_merge_train_atomicity_governance とは、複数 candidate を merge train として束ねるときの compatibility class、atomicity boundary、partial rollback segmentation、batch witness を固定する規則である。
  core_claims:
  - batch execution は throughput 最適化であって witness 省略ではない。merge train は serial_same_head、disjoint_scope_bundle、evidence_sidecar の batch class に分け、compatibility を満たす candidate だけを束ねる。
  - atomicity boundary を明示しなければならない。全 train を一括 atomic とみなすのではなく、shared head mutation、shared debt disposition、shared freeze dependency の境界で rollback cell を切る。
  - partial failure は異常ではなく規定された outcome である。segment ごとに committed、rolled_back、held_for_replay、quarantined_failure を区別し、silent partial success を full success と言い換えてはならない。
  - batch witness は member order、precondition digest、rollback cell partition、expected debt delta、post-commit digest を束ねる。member 追加や削除を runtime convenience で黙って行ってはならない。
  - partial rollback は affected rollback cell に限定する。disjoint scope bundle の一部失敗を理由に unrelated candidate まで巻き戻してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は batch class binding、atomicity judgement、rollback segmentation、batch witness preservation を分担する。
  batch_classes:
    serial_same_head_train: 同一 canonical head に対して順序付き mutation を適用する train。member order が意味を持つ。
    disjoint_scope_bundle: 同じ epoch 内だが affected scope が互いに独立している候補の束。rollback cell を scope ごとに切れる。
    evidence_sidecar_bundle: mutation candidate に comparison/evidence assembly candidate が付随する束。sidecar は commit outcome を補助するが単独 mutation を持たない。
  atomicity_and_segmentation:
    rollback_cells:
    - shared_head_cell
    - shared_debt_cell
    - shared_freeze_cell
    - disjoint_scope_cell
    segment_outcomes:
    - committed
    - rolled_back
    - held_for_replay
    - quarantined_failure
    rules:
    - serial_same_head_train では shared_head_cell を跨ぐ reorder を禁止する。
    - disjoint_scope_bundle の failure は原則として同じ disjoint_scope_cell 内に閉じ込める。
    - held_for_replay は replay precondition と reservation lineage を失わずに残さなければならない。
  batch_witness:
    required_fields:
    - batch_class_ref
    - member_order_ref
    - compatibility_proof_ref
    - rollback_cell_partition_ref
    - precondition_digest_ref
    - expected_debt_delta_ref
    - freeze_dependency_ref
    - post_commit_digest_ref
    - issued_at
    rules:
    - member_order_ref は train 実行順を exact に示さなければならない。
    - rollback_cell_partition_ref がない batch は partial failure を lawful に扱えない。
    - post_commit_digest_ref なしで committed を宣言してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - batch class binding
      - atomicity boundary approval
      - segment outcome ratification
      - rollback cell policy
    GraphEngine:
      owns:
      - compatibility analysis
      - batch assembly
      - segment execution trace
      - rollback materialization
    GraphLint:
      owns:
      - illegal bundle lint
      - hidden reorder lint
      - missing rollback cell lint
      - silent partial-success lint
    archive_object:
      owns:
      - batch witness
      - pre/post digest snapshot
      - segment execution record
      - rollback proof
  forbidden_shortcuts:
  - batch member を runtime convenience で黙って追加・削除する
  - partial success を full success と言い換える
  - rollback cell を越えて unrelated candidate まで巻き戻す
  - post-commit digest なしで committed を宣言する
  residual_open_points: []
scheduler_executor_recovery_idempotency_governance:
  status: provisional_fixed
  statement: scheduler_executor_recovery_idempotency_governance とは、executor crash / duplicate dispatch 後の recovery checkpoint、idempotent replay、duplicate suppression を固定する規則である。
  core_claims:
  - executor failure 後の再開は推測で行ってはならない。recovery は dispatch log、checkpoint digest、reservation lineage、post-commit digest を束ねた recovery checkpoint packet を起点にしなければならない。
  - すべての mutation candidate は idempotency key を持つ。同じ key の replay は同一 outcome または explicit no-op に収束し、新しい key を付けて同一 mutation を押し込んではならない。
  - failure class は dispatch_before_commit_loss、commit_before_ack_loss、checkpoint_gap、duplicate_dispatch、partial_side_effect_unknown を基本集合とする。class ごとに replay-safe reissue、digest verification、manual hold の扱いを分ける。
  - duplicate suppression は operation payload だけでなく reservation lineage と intended rollback cell を見る。見かけ上似た payload でも別 reservation lineage なら同一操作とみなしてはならない。
  - recovery phase は detect、seal、reissue_or_verify、reconcile、close を基本集合とする。close には debt disposition と surviving reservation set の整合確認が要る。
  - DecisionLedger / GraphEngine / GraphLint / archive object は failure class binding、checkpoint packet、idempotency check、duplicate suppression、reconciliation trace を分担する。
  failure_classes:
    dispatch_before_commit_loss: dispatch 記録はあるが commit digest がない。実行有無が不確定な failure。
    commit_before_ack_loss: commit digest はあるが ack / queue state 更新が欠ける failure。
    checkpoint_gap: precondition または post-condition checkpoint が欠けて recovery 判定が不十分な状態。
    duplicate_dispatch: 同じ reservation lineage / idempotency key に対して複数 dispatch が飛んだ状態。
    partial_side_effect_unknown: 一部 side effect の成否が不明で replay と rollback の両方に注意が必要な状態。
  recovery_checkpoint:
    required_fields:
    - failure_class_ref
    - reservation_lineage_ref
    - idempotency_key_ref
    - precondition_digest_ref
    - post_commit_digest_ref_or_null
    - executor_instance_ref
    - last_checkpoint_ref
    - surviving_reservation_set_ref
    - issued_at
    rules:
    - idempotency_key_ref がない recovery checkpoint は replay-safe reissue を許してはならない。
    - post_commit_digest_ref_or_null が null の場合は reissue 前に duplicate suppression と side-effect probe を要求する。
    - surviving_reservation_set_ref を更新せずに close へ進んではならない。
  idempotent_replay_and_duplicate_suppression:
    recovery_phases:
    - detect
    - seal
    - reissue_or_verify
    - reconcile
    - close
    rules:
    - 同じ idempotency key の replay は same outcome か explicit no-op に収束しなければならない。
    - duplicate suppression は idempotency key、reservation lineage、rollback cell、post-commit digest の一致で判定する。
    - partial_side_effect_unknown class は verify path を通さずに blind reissue してはならない。
    blocked_patterns:
    - crash 後に queue 全体を最初から再実行する
    - 同一 mutation に新しい idempotency key を付けて押し込む
    - duplicate suppression を UI 上の manual clear だけで済ませる
  tool_responsibilities:
    DecisionLedger:
      owns:
      - failure class binding
      - recovery checkpoint approval
      - idempotency policy binding
      - reconciliation closure judgement
    GraphEngine:
      owns:
      - checkpoint comparison
      - reissue_or_verify path selection
      - duplicate suppression matching
      - reservation set reconciliation
    GraphLint:
      owns:
      - missing idempotency key lint
      - blind reissue lint
      - duplicate lineage mismatch lint
      - close-without-reconcile lint
    archive_object:
      owns:
      - recovery checkpoint packet
      - dispatch / commit / ack trace
      - reconciliation snapshot
      - duplicate suppression evidence
  forbidden_shortcuts:
  - crash 後に queue 全体を最初から再実行する
  - 同一 mutation に新しい idempotency key を付けて再投入する
  - post-commit digest 未確認のまま blind reissue する
  - surviving reservation の整合確認なしで recovery を close する
  residual_open_points: []
scheduler_degraded_manual_reconciliation_governance:
  status: provisional_fixed
  statement: scheduler_degraded_manual_reconciliation_governance とは、自動 executor が unsafe / unavailable / evidence-incomplete のときの degraded operation class、manual takeover packet、通常運用へ戻す reconciliation closure を固定する規則である。
  core_claims:
  - degraded mode は自由な人手介入ではない。observe_only、evidence_sealing、bounded_verify_only、manual_corrective_mutation、global_hold_transition の operation class を分け、automation 停止中でも許される surface を限定する。
  - manual takeover は UI 操作ではなく packet 化された権限移譲である。takeover reason、affected scope、authority path、required co-sign、expiry、fallback branch、rollback readiness、post-manual reconciliation owner を束ねなければならない。
  - unsafe / unavailable / evidence-incomplete を区別する。unsafe は mutation surface を最も狭くし、unavailable は bounded manual corrective path を許しうるが、evidence-incomplete は証拠補完または hold を優先する。
  - manual corrective mutation は replay 可能な記録を前提にする。out-of-band action や口頭判断だけで canonical head を更新してはならず、post-manual reconciliation packet が closure に必須である。
  - reconciliation closure は queue reopen ではなく residue settlement である。surviving reservation、duplicate suppression residue、external side effect echo、debt disposition、re-enable gate を束ねて close しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は degraded class binding、takeover packet、closure witness、re-enable gate を分担する。
  degraded_operation_classes:
    observe_only: read/query/diagnostic だけを許す。canonical head mutation を禁止する。
    evidence_sealing: 現時点の reservation / checkpoint / digest を封印し、後続の blind overwrite を防ぐ。
    bounded_verify_only: post-commit digest 照合や duplicate suppression の検証だけを行う。新規 effect を生成しない。
    manual_corrective_mutation: 明示的 packet と co-sign を伴う限定的な corrective mutation。affected scope と rollback path を必須にする。
    global_hold_transition: unsafe scope を hard hold へ移し、他 lane へ影響を明示する遷移。
  manual_takeover_packet:
    required_fields:
    - takeover_packet_id
    - trigger_class_ref
    - degraded_mode_class_ref
    - affected_scope_ref
    - authority_path_ref
    - operator_or_team_ref
    - required_cosign_set_ref
    - expiry_at
    - fallback_branch_ref
    - rollback_readiness_ref
    - reconciliation_owner_ref
    - issued_at
    rules:
    - required_cosign_set_ref を満たさない manual_corrective_mutation を admission してはならない。
    - expiry_at を過ぎた takeover packet は auto-close せず、hold or revoke へ遷移しなければならない。
    - fallback_branch_ref と rollback_readiness_ref が空のまま risky mutation を許してはならない。
  reconciliation_closure:
    required_evidence:
    - surviving_reservation_set reconciled
    - duplicate suppression residue classified
    - external side effect echo captured or explicitly pending
    - debt disposition bound
    - re-enable gate approved
    states:
    - takeover_open
    - manual_active
    - reconcile_pending
    - reconcile_blocked
    - closed
    rules:
    - reconcile_pending 中は automation を full reopen してはならない。
    - external echo が未確認でも lawful pending class と owner/expiry があれば reconcile_blocked として保持できる。
    - closed へ進むには no-hidden-reservation / no-unbounded-residue / no-blind-duplicate の3条件が必要である。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - degraded mode class binding
      - manual takeover packet ratification
      - closure judgement
      - re-enable gate approval
    GraphEngine:
      owns:
      - allowed surface projection
      - takeover-to-reconcile state machine
      - surviving reservation comparison
      - closure readiness computation
    GraphLint:
      owns:
      - illegal degraded surface lint
      - missing cosign lint
      - close-with-hidden-residue lint
      - blind-manual-mutation lint
    archive_object:
      owns:
      - takeover packet
      - sealed checkpoint snapshot
      - reconciliation closure packet
      - re-enable audit bundle
  forbidden_shortcuts:
  - executor を止めた途端に operator が自由に head mutation できるようにする
  - manual takeover packet なしで UI 操作を正本更新とみなす
  - duplicate suppression residue や surviving reservation 未整理のまま close する
  - unsafe class なのに unavailable class と同じ surface を許す
  residual_open_points: []
scheduler_manual_takeover_session_governance:
  status: provisional_fixed
  statement: scheduler_manual_takeover_session_governance とは、manual takeover を実行する actor の capability lease、operator session attestation、emergency revocation を固定する規則である。
  core_claims:
  - manual takeover 権限は static role ではなく short-lived capability lease として発行する。observer_review_lease、bounded_corrective_lease、emergency_hold_lease、dual_control_override_lease を基本集合とし、scope、expiry、cosign 条件を持たせる。
  - operator session は login 状態では足りない。session attestation には device trust class、step-up factor、peer presence、screen/control ownership、session heartbeat、active scope binding を含める。
  - lease と session は別物である。capability lease があっても attested session が失効すれば mutation を続けてはならず、attested session があっても lease scope 外の action を許してはならない。
  - dual_control は symbolic approval ではない。high-risk corrective mutation や protected floor 変更には second signer の contemporaneous witness と emergency revocation path を要求する。
  - session revoke は operator logout だけではない。compromise suspicion、peer loss、heartbeat gap、scope drift、stale screen-control transfer を revocation trigger に含める。
  - DecisionLedger / GraphEngine / GraphLint / archive object は capability lease binding、session attestation、revocation lineage、post-revoke hold を分担する。
  capability_leases:
    observer_review_lease: observe_only と bounded_verify_only だけを許す最小権限 lease。
    bounded_corrective_lease: 限定 scope の manual corrective mutation を許す lease。rollback readiness を必須にする。
    emergency_hold_lease: unsafe scope を freeze / hold へ送るための即時権限 lease。mutation 権限は含まない。
    dual_control_override_lease: protected floor に触れる corrective mutation 用の dual-control lease。second signer が必須。
  session_attestation:
    required_fields:
    - session_id
    - actor_ref
    - device_trust_class_ref
    - step_up_factor_ref
    - peer_presence_ref
    - screen_control_owner_ref
    - scope_binding_ref
    - heartbeat_interval_ref
    - lease_set_ref
    - issued_at
    - expires_at
    rules:
    - peer_presence_ref が required な lease class では single-actor session を admission してはならない。
    - screen_control_owner_ref が変わったときは re-attestation を要求し、old session を implicit に引き継いではならない。
    - heartbeat gap は network loss と operator absence を区別しても、mutation continuation の唯一根拠にはしてはならない。
  revocation_policy:
    triggers:
    - compromise suspicion or impossible travel
    - peer presence lost for dual-control lease
    - heartbeat gap beyond policy window
    - scope drift or unauthorized surface request
    - device trust downgrade or stale screen-control transfer
    outcomes:
    - lease_revoked
    - session_revoked
    - forced_hold
    - reissue_required
    rules:
    - revoked session の open mutation intent は forced_hold または reissue_required に送る。
    - lease_revoked と session_revoked を同一 event に潰してはならない。どちらが失効したかを lineage に残す。
    - revocation 後に operator が local cache から継続した action は canonical mutation として受理してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - capability lease registry
      - session attestation binding
      - dual-control proof
      - revocation judgement
    GraphEngine:
      owns:
      - lease-scope projection
      - session/lease join check
      - peer heartbeat monitoring
      - post-revoke hold transition
    GraphLint:
      owns:
      - scope-overrun lint
      - missing step-up lint
      - peer-required-but-absent lint
      - revoked-session mutation lint
    archive_object:
      owns:
      - capability lease packet
      - session attestation packet
      - revocation event chain
      - forced-hold snapshot
  forbidden_shortcuts:
  - static admin role だけで manual takeover capability を無期限に与える
  - login 済みなら attested session なしでも corrective mutation を許す
  - dual-control が必要なのに second signer の contemporaneous witness なしで進める
  - revoked session の local cache action を後追いで正本反映する
  residual_open_points: []
scheduler_out_of_band_side_effect_governance:
  status: provisional_fixed
  statement: scheduler_out_of_band_side_effect_governance とは、manual / external 系で発生した out-of-band side effect の attestation、external echo assimilation、rollback admissibility を固定する規則である。
  core_claims:
  - out-of-band side effect は ghost fact にしてはならない。manual_console_change、foreign_api_commit、offline_human_actuation、deferred_external_ack の class を分け、canonical scheduler に入る前に attestation packet を要求する。
  - attestation は観察報告ではなく effect claim である。intended action、observed external echo、operator/session lineage、target system identity、pre/post digest or bounded surrogate、rollback feasibility を束ねなければならない。
  - external echo assimilation は append-only で行う。scheduler が知らない external effect を見つけても、canonical mutation へ即時折り畳まず、echo_observed / echo_correlated / echo_admitted / echo_contested の state を経由する。
  - idempotent replay と out-of-band echo が衝突した場合、effect equivalence を先に判定する。同じ effect なら duplicate suppression / no-op assimilation へ送り、非同値なら contested effect として rollback or compensation gate を開く。
  - rollback admissibility は always-undo ではない。external irreversible actuation、legal notice emission、human physical intervention などは compensation-first になるため、rollback gate と compensation path を分ける。
  - DecisionLedger / GraphEngine / GraphLint / archive object は effect claim binding、echo correlation、rollback gate、compensation lineage を分担する。
  side_effect_classes:
    manual_console_change: operator が UI/console から直接起こした external system change。
    foreign_api_commit: foreign executor / integration が独自 token で行った commit。
    offline_human_actuation: physical system や paper process など digital trace が弱い human actuation。
    deferred_external_ack: 先に scheduler intent があり、後から external ack / receipt が戻る side effect。
  attestation_packet:
    required_fields:
    - effect_claim_id
    - side_effect_class_ref
    - intended_action_ref_or_null
    - observed_external_echo_ref
    - operator_or_agent_lineage_ref
    - target_system_identity_ref
    - pre_effect_digest_or_surrogate_ref
    - post_effect_digest_or_surrogate_ref
    - rollback_feasibility_ref
    - compensation_path_ref_or_null
    - captured_at
    rules:
    - pre/post digest が exact で取れない class では surrogate witness の loss class を明示しなければならない。
    - intended_action_ref_or_null が null の effect claim は orphan echo として隔離し、即時 admission してはならない。
    - rollback_feasibility_ref が false の effect claim では compensation_path_ref_or_null を空にしてはならない。
  assimilation_and_rollback:
    echo_states:
    - echo_observed
    - echo_correlated
    - echo_admitted
    - echo_contested
    - echo_compensated
    equivalence_rules:
    - same intended effect and same protected scope なら duplicate suppression candidate として扱う
    - same target but different protected floor exposure なら contested に送る
    - orphan echo は bounded hold で保持し lawful linkage が付くまで canonical mutation に織り込まない
    rollback_gate:
      admit_rollback_if:
      - effect reversible and rollback path witnessed
      - protected floor not worsened by undo
      - external echo lineage complete enough to avoid blind double-action
      use_compensation_if:
      - effect physically or legally irreversible
      - undo would worsen safety or notice duty
      - pre-effect state not reconstructable within bounded confidence
  tool_responsibilities:
    DecisionLedger:
      owns:
      - effect claim schema
      - assimilation judgement
      - rollback vs compensation decision
      - orphan echo hold judgement
    GraphEngine:
      owns:
      - echo correlation
      - equivalence evaluation
      - rollback feasibility computation
      - compensation dependency graph
    GraphLint:
      owns:
      - orphan echo admission lint
      - surrogate-without-loss-class lint
      - blind rollback lint
      - duplicate-effect mismatch lint
    archive_object:
      owns:
      - effect attestation packet
      - external echo evidence
      - rollback/compensation packet
      - contested effect snapshot
  forbidden_shortcuts:
  - external で起きた effect を attestation なしで canonical fact とみなす
  - orphan echo を intended action linkage なしで admission する
  - rollback feasibility 不明なのに undo を先行させる
  - irreversible effect を compensation path なしで close する
  residual_open_points: []
scheduler_reconciliation_residue_debt_governance:
  status: provisional_fixed
  statement: scheduler_reconciliation_residue_debt_governance とは、manual / out-of-band 後に残る reconciliation residue debt の class、aging、reopen petition、closure aging を固定する規則である。
  core_claims:
  - residue debt は single bucket では足りない。echo_pending_debt、rollback_pending_debt、compensation_pending_debt、authority_review_debt、evidence_gap_debt を区別し、aging budget と escalation path を別に持たせる。
  - closure は debt-free だけではない。bounded pending を許す場合でも debt owner、review cadence、expiry ceiling、reopen trigger を束ねた residue debt packet が必要である。
  - aging は時間経過だけでなく risk trend を見る。same debt が review cadence を跨いで non-progress、scope widening、protected floor exposure worsening を起こしたら escalation する。
  - reopen petition は complaint box ではない。closure 後に reopen できるのは new witness、missed echo、wrong equivalence judgement、authority challenge が bounded horizon 内で揃う場合だけである。
  - closure aging は freeze ではなく finality pressure である。debt が bounded pending のまま aging ceiling を超えたら forced review、quarantine、manual lane disable のいずれかへ遷移させる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は debt packet、aging computation、reopen petition gate、closure barrier を分担する。
  residue_debt_classes:
    echo_pending_debt: external echo の未到着や未相関で残る debt。
    rollback_pending_debt: rollback が lawful/admissible だが未実施の debt。
    compensation_pending_debt: irreversible effect に対する compensation 未完了の debt。
    authority_review_debt: human / authority judgement を待つ debt。
    evidence_gap_debt: closure 判断に必要な witness が足りない debt。
  aging_and_reopen:
    required_packet_fields:
    - residue_debt_id
    - debt_class_ref
    - owner_ref
    - review_cadence_ref
    - aging_budget_ref
    - expiry_ceiling_ref
    - protected_scope_ref
    - reopen_trigger_set_ref
    - created_at
    - last_progress_at
    escalate_if:
    - review cadence を跨いで no progress
    - debt scope or protected floor exposure worsens
    - same debt family repeats across closures
    - expiry ceiling reached with unresolved protected effect
    reopen_petition_if:
    - new witness materially changes equivalence or rollback judgement
    - missed external echo or hidden reservation is discovered
    - authority challenge is filed within bounded horizon
    - closure packet is shown to have omitted required debt binding
  closure_barriers:
    allow_bounded_pending_if:
    - debt class explicitly declared and owner bound
    - aging budget and review cadence within policy ceiling
    - protected floor not silently widened
    block_final_closure_if:
    - unowned residue debt remains
    - aging budget exceeded without escalation
    - reopen-trigger witness already present but ignored
    - same debt repeats without family-level remediation plan
    forced_actions_after_aging:
    - forced_review
    - quarantine
    - manual_lane_disable
  tool_responsibilities:
    DecisionLedger:
      owns:
      - residue debt packet
      - bounded pending approval
      - reopen petition judgement
      - closure barrier judgement
    GraphEngine:
      owns:
      - debt aging computation
      - progress/non-progress evaluation
      - reopen trigger matching
      - forced-action recommendation
    GraphLint:
      owns:
      - unowned debt lint
      - aging-ceiling breach lint
      - ignored reopen-trigger lint
      - repeat-debt-without-remediation lint
    archive_object:
      owns:
      - residue debt packet
      - closure packet lineage
      - reopen petition evidence bundle
      - aging snapshots
  forbidden_shortcuts:
  - pending と書くだけで debt class / owner / aging budget を省略する
  - closure 後の new witness を reopen petition に載せず握り潰す
  - aging ceiling 超過を silent carry-over で延命する
  - 同じ debt family の再発を individual case として切り離す
  residual_open_points: []
scheduler_failover_split_brain_governance:
  status: provisional_fixed
  statement: scheduler_failover_split_brain_governance とは、control-plane failover の leader election、cross-site lease transfer、split-brain containment を固定する規則である。
  core_claims:
  - failover は process restart ではない。leader election を clean_handover、degraded_handover、forced_fence_failover の class で分け、surviving reservation と writer authority の継承条件を固定する。
  - cross-site lease transfer は copy ではなく rebind である。site token、epoch、writer fence、surviving reservation digest、manual takeover residue を束ねた transfer packet が必要である。
  - split-brain は detection 後に事後説明するのでは遅い。quorum loss、epoch divergence、dual writer evidence、echo mismatch を detection signal にし、suspected_split / fenced_secondary / sealed_primary / recovery_merge の containment state を持たせる。
  - manual takeover と failover は独立でない。manual lane が active なときの leader election は takeover lineage と session revoke 状態を見なければならず、dual active writer を絶対に許してはならない。
  - surviving reservation は winner site がそのまま使えるとは限らない。pre-failover checkpoint、reservation lineage digest、external echo debt、freeze packet を評価し、rebind / quarantine / discard を決める。
  - DecisionLedger / GraphEngine / GraphLint / archive object は election class、transfer packet、containment state、post-failover reconciliation を分担する。
  failover_classes:
    clean_handover: planned switchover。primary が writer fence を明示的に relinquish する。
    degraded_handover: partial outage 下の handover。quorum は弱いが lineage digest は取得できる。
    forced_fence_failover: primary 応答不能や split-brain suspicion 下で secondary を fenced writer として昇格する。
  transfer_and_containment:
    transfer_packet_fields:
    - transfer_packet_id
    - failover_class_ref
    - from_site_ref
    - to_site_ref
    - epoch_ref
    - writer_fence_ref
    - surviving_reservation_digest_ref
    - manual_takeover_residue_ref
    - freeze_packet_set_ref
    - issued_at
    containment_states:
    - nominal
    - suspected_split
    - fenced_secondary
    - sealed_primary
    - recovery_merge
    rules:
    - writer_fence_ref が不明な状態で new writer を admission してはならない。
    - suspected_split 中は comparison-only lane 以外の cross-site mutation を停止する。
    - manual_takeover_residue_ref が active なまま clean_handover を宣言してはならない。
  surviving_reservation_policy:
    rebind_if:
    - reservation lineage digest intact
    - affected scope not contested across sites
    - external echo debt classified
    quarantine_if:
    - checkpoint gap or echo mismatch exists
    - manual lane residue unresolved
    - freeze packet ownership ambiguous
    discard_if:
    - writer fence violation confirmed
    - reservation lineage unverifiable
    - duplicate writer committed same protected scope
  tool_responsibilities:
    DecisionLedger:
      owns:
      - leader election class
      - transfer packet approval
      - writer fence binding
      - surviving reservation disposition
    GraphEngine:
      owns:
      - epoch divergence detection
      - split-brain containment transition
      - reservation rebind/quarantine computation
      - post-failover reconciliation plan
    GraphLint:
      owns:
      - dual-writer lint
      - missing writer fence lint
      - illegal clean-handover lint
      - survivor-reuse-without-digest lint
    archive_object:
      owns:
      - transfer packet
      - containment snapshot
      - epoch divergence evidence
      - post-failover reconciliation bundle
  forbidden_shortcuts:
  - secondary を起動しただけで新 leader とみなす
  - writer fence 不明のまま cross-site mutation を再開する
  - manual takeover residue を見ずに clean handover を宣言する
  - surviving reservation を lineage digest なしで再利用する
  residual_open_points: []
scheduler_temporal_witness_trust_governance:
  status: provisional_fixed
  statement: scheduler_temporal_witness_trust_governance とは、site / device / external system を跨ぐ clock skew budget、deadline normalization、temporal witness trust を固定する規則である。
  core_claims:
  - timestamp は裸で比較してはならない。site_clock、device_clock、external_receipt_clock、trusted_reference_clock の class を分け、skew budget と trust tier を registry 化する。
  - lease expiry、heartbeat gap、deadline breach、echo freshness は raw timestamp ではなく normalized temporal window で判定する。clock class ごとに source lag、network uncertainty、mirror lag を吸収した比較窓が必要である。
  - trusted time source は単一 NTP 名では足りない。anchor source、fallback source、untrusted local-only source を分け、source downgrade が起きたら admissibility を狭めなければならない。
  - manual session と external echo は timestamp forgery や stale cache に弱い。temporal witness trust には signing lineage、capture path、reference-anchor 差分、replay freshness ceiling を含める。
  - temporal ambiguity は silently resolve してはならない。same event に矛盾する timestamp family がある場合、temporal_contested state を開き、expiry / reopen / close を保留する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は clock class registry、normalization rule、temporal contest、trusted source downgrade を分担する。
  clock_classes_and_budgets:
    site_clock: control-plane site が使う基準時計。通常最も高い trust tier を持つが、site outage 時は downgrade しうる。
    device_clock: operator device や session host の時計。drift が大きく、single-source evidence には使えない。
    external_receipt_clock: foreign system receipt / receipt log の時計。source-specific lag を含む。
    trusted_reference_clock: 複数 source を束ねる reference anchor。normalization の基準に使う。
    skew_budget_rules:
    - lease expiry は site_clock と trusted_reference_clock の tighter window で判定する
    - heartbeat gap は device_clock 依存だけにせず transport/server witness を併用する
    - external echo freshness は external_receipt_clock の source lag budget を差し引いて判定する
  normalization_and_contest:
    normalization_fields:
    - clock_class_ref
    - trusted_source_tier_ref
    - observed_timestamp
    - normalized_interval_start
    - normalized_interval_end
    - source_lag_budget_ref
    - capture_path_ref
    temporal_contest_if:
    - same event has mutually inconsistent timestamp families beyond skew budget
    - trusted source downgrade invalidates previously admissible freshness claim
    - device-only timestamp is used for protected action expiry
    rules:
    - normalized interval が重ならない competing claims は temporal_contested に送る。
    - trusted_source_tier_ref が downgrade した後は cached normalization を blind reuse してはならない。
    - deadline normalization は more-conservative side を採り、late effect を early とみなしてはならない。
  temporal_witness_trust:
    required_fields:
    - temporal_witness_id
    - event_ref
    - clock_class_ref
    - trusted_source_tier_ref
    - capture_path_ref
    - anchor_delta_ref
    - freshness_ceiling_ref
    - signed_lineage_ref_or_null
    - recorded_at
    trust_rules:
    - signed_lineage_ref_or_null がない witness は protected mutation の唯一根拠にしてはならない。
    - freshness_ceiling_ref を超えた cached witness で reopen / close を判定してはならない。
    - anchor_delta_ref が budget 外なら temporal contest か downgrade へ送る。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - clock class registry
      - trusted source tier binding
      - temporal contest judgement
      - normalization policy approval
    GraphEngine:
      owns:
      - interval normalization
      - skew budget evaluation
      - cross-clock comparison
      - contest detection
    GraphLint:
      owns:
      - device-only expiry lint
      - stale-witness freshness lint
      - blind cached-normalization lint
      - forged-timestamp suspicion lint
    archive_object:
      owns:
      - temporal witness packet
      - normalization snapshot
      - source downgrade evidence
      - temporal contest bundle
  forbidden_shortcuts:
  - raw timestamp をそのまま比較して expiry / freshness を決める
  - device clock だけで protected action の deadline を判定する
  - trusted source downgrade 後も古い normalization を blind reuse する
  - 矛盾する timestamp family を silent に丸める
  residual_open_points: []
scheduler_emergency_hotfix_supersession_governance:
  status: provisional_fixed
  statement: scheduler_emergency_hotfix_supersession_governance とは、incident 中の emergency hotfix lane、bounded bypass ceiling、supersession sunset を固定する規則である。
  core_claims:
  - emergency hotfix は通常 rollout の省略版ではない。containment_hotfix、evidence_preserving_hotfix、compatibility_hotfix、rollback_preparation_hotfix の class を分け、incident の被害抑止と replay 可能性の両立を要求する。
  - bounded bypass は自由裁量ではなく ceiling を持つ。approval path、allowed scope、mutable surface、time-to-live、required witness、fallback branch を束ねない bypass を protected floor へ通してはならない。
  - hotfix lane は canonical lane の代替正本ではない。temporary override は supersession path か explicit rollback path を必須とし、恒久 policy へ silent merge してはならない。
  - sunset は calendar reminder では足りない。expiry、revalidation owner、post-incident review due、supersession candidate、debt carry-over disposition を束ねる sunset packet を要求する。
  - incident 中でも evidence floor は維持する。unsafe mutation を止めるための bypass は許されうるが、evidence sealing、delta witness、rollback readiness を欠く shortcut は許してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は hotfix class binding、bypass admissibility、supersession readiness、sunset enforcement を分担する。
  hotfix_classes:
    containment_hotfix: blast radius を即時に狭めるための抑止 hotfix。新機能追加を目的にしてはならない。
    evidence_preserving_hotfix: state 破壊を防ぎ証拠保全を優先する hotfix。mutation surface は最小限に限定する。
    compatibility_hotfix: trusted dependency / protocol mismatch を暫定吸収する hotfix。supersession path を必須にする。
    rollback_preparation_hotfix: 安全 rollback や compensating patch を成立させるための事前整形 hotfix。単独恒久化を禁止する。
  bounded_bypass:
    required_fields:
    - bypass_packet_id
    - incident_case_ref
    - hotfix_class_ref
    - allowed_scope_ref
    - mutable_surface_ref
    - protected_floor_exception_ref
    - authority_path_ref
    - expiry_at
    - required_witness_set_ref
    - fallback_branch_ref
    - rollback_readiness_ref
    - issued_at
    rules:
    - protected_floor_exception_ref が empty の bypass を protected surface へ適用してはならない。
    - expiry_at を過ぎた bypass を operator memory や cached token で延命してはならない。
    - required_witness_set_ref を欠く bypass は containment を理由にしても canonical mutation として受理してはならない。
  supersession_sunset:
    states:
    - hotfix_open
    - stabilizing
    - supersession_candidate
    - sunset_pending
    - sunset_closed
    - rollback_reentered
    required_evidence:
    - temporary delta witness
    - rollback readiness confirmed
    - superseding policy or explicit rollback path chosen
    - post-incident review due bound
    - carry-over debt disposition attached
    rules:
    - supersession_candidate のまま期限超過した hotfix を canonical baseline と誤認してはならない。
    - sunset_closed へ進むには bypass token 無効化と surviving debt disposition が必須である。
    - rollback_reentered は失敗ではなく lawful branch であり、supersession closed と混同してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - hotfix class registry
      - bypass packet ratification
      - sunset / supersession judgement
      - post-incident review due binding
    GraphEngine:
      owns:
      - bounded bypass surface projection
      - state transition for hotfix lifecycle
      - rollback readiness computation
      - supersession candidate diff generation
    GraphLint:
      owns:
      - illegal protected-floor bypass lint
      - missing sunset binding lint
      - permanent-hotfix drift lint
      - witness-poor hotfix lint
    archive_object:
      owns:
      - bypass packet
      - hotfix delta snapshot
      - sunset packet
      - supersession/rollback audit bundle
  forbidden_shortcuts:
  - incident 中なら approval path なしで protected floor を bypass できるとみなす
  - temporary hotfix を review や supersession なしで恒久 baseline に繰り上げる
  - rollback readiness がないまま risky hotfix を投入する
  - expired bypass token を operator 慣行で再利用する
  residual_open_points: []
scheduler_incident_evidence_triage_governance:
  status: provisional_fixed
  statement: scheduler_incident_evidence_triage_governance とは、incident 発生時の evidence freeze、triage queue、blast-radius classification を固定する規則である。
  core_claims:
  - incident triage の最初の仕事は hotfix ではなく evidence freeze である。volatile telemetry、reservation map、active lease、cross-site digest、operator session の snapshot 順序を固定しなければならない。
  - triage queue は severity だけで決めない。blast radius、protected floor proximity、ongoing mutation count、evidence volatility、external commitment の5軸で priority を決める。
  - blast radius は affected component count のみではない。canonical head 汚染可能性、reservation starvation 拡散、external side effect 連鎖、trust downgrade 波及を含めて分類する。
  - containment は lane 単位で行う。global stop、writer freeze、bounded reader degrade、external echo quarantine の class を分け、過剰停止を防ぎつつ unsafe propagation を止める。
  - scope 誤認は incident 二次被害の主要因である。classification confidence が低いときは aggressive hotfix ではなく escalation / additional freeze を優先する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は incident class binding、freeze ordering、blast-radius computation、triage packet 保存を分担する。
  evidence_freeze_classes:
    volatile_runtime_freeze: メモリ上 telemetry、active heartbeat、ephemeral queue state を優先凍結する。
    control_plane_freeze: leader state、lease table、reservation map、policy hash を凍結する。
    operator_surface_freeze: manual takeover session、screen control、override token を凍結する。
    external_echo_freeze: 外部システムからの echo / receipt / callback を quarantine 付きで凍結する。
  triage_queue:
    priority_axes:
    - blast_radius_class
    - protected_floor_proximity
    - ongoing_mutation_count
    - evidence_volatility_class
    - external_commitment_exposure
    rules:
    - evidence_volatility が最上位なのに freeze を後回しにしてはならない。
    - same root cause の subcase を independent incident として過剰分割してはならない。
    - classification confidence が policy floor 未満なら aggressive containment より escalation を優先しなければならない。
  blast_radius_classes:
    local_lane: 単一 lane または bounded scope に閉じる incident。
    cross_lane: 複数 lane に starvation / reservation 汚染が波及する incident。
    cross_site: site 間 failover や lease transfer を巻き込む incident。
    external_commitment: 外部 effect や対外約束まで汚染しうる incident。
  containment_actions:
    global_stop: system-wide writer stop。最も強い containment。
    writer_freeze: 該当 writer family だけを停止する。
    bounded_reader_degrade: reader を degrade しつつ mutation を抑える。
    external_echo_quarantine: 外部 callback / echo を隔離して同化を止める。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - incident class registry
      - freeze ordering rule
      - triage priority ratification
      - containment choice approval
    GraphEngine:
      owns:
      - freeze sequence execution plan
      - blast-radius propagation graph
      - triage queue materialization
      - classification confidence computation
    GraphLint:
      owns:
      - late-freeze lint
      - scope-overclaim lint
      - triage-priority inversion lint
      - low-confidence aggressive action lint
    archive_object:
      owns:
      - freeze snapshot pack
      - incident triage packet
      - blast-radius witness bundle
      - containment timeline
  forbidden_shortcuts:
  - evidence freeze 前に aggressive hotfix を先行させる
  - incident priority を severity の一軸だけで決める
  - classification confidence が低いのに global stop 相当の判断を silent に通す
  - same root cause の subcase を別事件として扱い triage を歪める
  residual_open_points: []
scheduler_emergency_rollback_reentry_governance:
  status: provisional_fixed
  statement: scheduler_emergency_rollback_reentry_governance とは、emergency rollback lane、compensating patch、state re-entry witness を固定する規則である。
  core_claims:
  - rollback は reverse replay の別名ではない。state_only_rollback、reservation_rollback、policy_pointer_rollback、external_effect_compensation の class を分け、可逆性の違いを明示しなければならない。
  - compensating patch は rollback failure の隠蔽ではない。irreversible external effect、schema drift、foreign acknowledgment 後の state には compensation lane を使い、no-change rollback と混同してはならない。
  - quarantine から通常運用へ戻るには state re-entry witness が必要である。duplicate suppression residue、echo assimilation status、reservation hygiene、temporal normalization を束ねなければならない。
  - rollback lane は hotfix lane より狭い。rollback を理由に新しい speculative mutation や silent repair を混ぜてはならない。
  - re-entry は restored ではなく admissible で判定する。before-state との byte-level 一致ではなく、normative obligation と side effect account が閉じたかで戻す。
  - DecisionLedger / GraphEngine / GraphLint / archive object は rollback class binding、compensation admissibility、re-entry witness、quarantine exit judgement を分担する。
  rollback_classes:
    state_only_rollback: canonical state だけを戻す rollback。外部 effect は含まない。
    reservation_rollback: lease / reservation / queue owner のみを戻す rollback。
    policy_pointer_rollback: policy head / pointer / feature gate を以前の安全点へ戻す rollback。
    external_effect_compensation: 取り消せない外部 effect に対して相殺手段を適用する compensation lane。
  compensation_policy:
    required_fields:
    - compensation_packet_id
    - irreversible_effect_ref
    - compensation_action_ref
    - authority_path_ref
    - deadline_or_freshness_ref
    - external_receipt_expectation_ref
    - followup_owner_ref
    - issued_at
    rules:
    - irreversible_effect_ref が未確定のまま compensation を canonical closure として扱ってはならない。
    - compensation_action_ref は rollback path と独立に評価し、same mutation の別名にしてはならない。
    - external_receipt_expectation_ref がある場合、receipt 未達を closed と誤認してはならない。
  state_reentry_witness:
    required_evidence:
    - duplicate suppression residue resolved or explicitly carried
    - external echo assimilation state bound
    - reservation hygiene confirmed
    - temporal normalization window satisfied
    - quarantine exit owner approved
    states:
    - rollback_open
    - compensation_pending
    - reentry_pending
    - reentry_blocked
    - reentered
    rules:
    - reentry_pending 中に speculative batch を admission してはならない。
    - reentry_blocked は failure ではなく unresolved obligation を示す lawful state である。
    - reentered へ進むには no-hidden-effect / no-hidden-reservation / no-time-anomaly の3条件が必要である。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - rollback class registry
      - compensation packet ratification
      - re-entry witness judgement
      - quarantine exit approval
    GraphEngine:
      owns:
      - rollback lane projection
      - compensation dependency graph
      - re-entry readiness computation
      - quarantine exit state machine
    GraphLint:
      owns:
      - rollback-lane widening lint
      - fake-compensation lint
      - premature-reentry lint
      - hidden-effect carry lint
    archive_object:
      owns:
      - rollback packet
      - compensation packet
      - re-entry witness bundle
      - quarantine exit snapshot
  forbidden_shortcuts:
  - rollback を理由に新しい speculative mutation を混ぜる
  - irreversible external effect を no-change rollback として扱う
  - re-entry witness なしで quarantine を解除する
  - receipt 未達の compensation を closed と見なす
  residual_open_points: []
scheduler_hotfix_divergence_reintegration_governance:
  status: provisional_fixed
  statement: scheduler_hotfix_divergence_reintegration_governance とは、hotfix divergence debt、temporary fork custody、reintegration gate を固定する規則である。
  core_claims:
  - temporary fork は技術的副産物ではなく統治対象である。hotfix-only delta、rollback residue delta、compatibility shim delta、missing review delta を divergence debt class として持たせる。
  - fork custody は branch の所有ではなく obligation の所有である。owner、sunset due、reintegration target、forbidden carry-over、evidence completeness を custody packet に束ねる。
  - reintegration は merge ではなく settlement である。semantic equivalence witness、debt discharge plan、stale dependency review、superseded bypass invalidation を通らない reintegration を許してはならない。
  - temporary fork は放置すると将来の migration と audit を破壊する。stale fork には quarantine、tombstone、forced archival のいずれかを割り当てる。
  - divergence debt は commit count では測れない。baseline との差分が protected floor、external effect、trust downgrade、operator override に与える影響で class 化しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は divergence debt binding、custody packet、reintegration gate、stale fork disposition を分担する。
  divergence_debt_classes:
    hotfix_only_delta: temporary hotfix にだけ存在し baseline 未反映の差分。
    rollback_residue_delta: rollback / compensation 後に残った補助差分。
    compatibility_shim_delta: 依存系の暫定吸収ロジックに由来する差分。
    missing_review_delta: post-incident review や security/legal review 未完了の差分。
  temporary_fork_custody:
    required_fields:
    - fork_custody_id
    - fork_ref
    - debt_class_set_ref
    - custody_owner_ref
    - sunset_due_at
    - reintegration_target_ref
    - forbidden_carry_over_ref
    - evidence_completeness_ref
    - issued_at
    rules:
    - custody_owner_ref が空の fork を active divergence として残してはならない。
    - forbidden_carry_over_ref を満たさない reintegration proposal を admission してはならない。
    - sunset_due_at を過ぎた stale fork は quarantine / tombstone / forced archival のいずれかへ必ず遷移させる。
  reintegration_gate:
    required_evidence:
    - semantic equivalence or explicit delta acceptance witness
    - debt discharge plan approved
    - stale dependency review completed
    - superseded bypass invalidated
    - review obligations closed or explicitly carried
    states:
    - fork_active
    - reintegration_preparing
    - reintegration_blocked
    - reintegrated
    - tombstoned
    rules:
    - reintegration_preparing 中に debt discharge plan が未承認なら baseline へ merge してはならない。
    - reintegrated へ進むには stale fork token の無効化が必要である。
    - tombstoned fork を evidence linkage なしで purge してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - divergence debt registry
      - fork custody packet
      - reintegration gate judgement
      - stale fork disposition approval
    GraphEngine:
      owns:
      - baseline-vs-fork delta graph
      - semantic equivalence projection
      - gate readiness computation
      - quarantine/tombstone transition
    GraphLint:
      owns:
      - ownerless-fork lint
      - carry-over violation lint
      - premature-reintegration lint
      - orphaned-tombstone lint
    archive_object:
      owns:
      - fork custody packet
      - delta witness bundle
      - reintegration audit bundle
      - tombstone archive
  forbidden_shortcuts:
  - custody owner のない temporary fork を放置する
  - debt discharge plan 未承認のまま baseline に reintegrate する
  - stale fork を tombstone linkage なしで消す
  - semantic equivalence 不明の差分を silent に carry-over する
  residual_open_points: []
scheduler_incident_command_override_governance:
  status: provisional_fixed
  statement: scheduler_incident_command_override_governance とは、incident command quorum、escalation ladder、lawful override attestation を固定する規則である。
  core_claims:
  - incident command は肩書ではなく role bundle である。incident_commander、safety_authority、platform_owner、evidence_custodian、external_commitment_owner を分け、severity ごとに必須 role を定義する。
  - quorum は headcount ではなく authority coverage で見る。protected floor、external commitment、cross-site failover、legal/security exposure の facet を覆う role が揃わなければ override を ratify してはならない。
  - escalation ladder は severity の線形表では足りない。blast radius class、time-to-harm、evidence volatility、override exhaustion を使って next authority path を決める。
  - lawful override は emergency だからこそ packet 化する。reason、requested surface、affected scope、quorum snapshot、expiry、fallback、review due を束ねた attestation を要求する。
  - command handoff は口頭引継ぎでは足りない。active override、pending compensation、unfrozen evidence、external commitment を含む shift packet が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は role/quorum binding、escalation routing、override attestation、handoff lineage を分担する。
  incident_roles:
    incident_commander: 全体判断の主担当。time-to-harm と containment 優先順位を担う。
    safety_authority: protected floor と risk acceptance の正当性を担う。
    platform_owner: scheduler / control plane の技術正本を担う。
    evidence_custodian: freeze / archive / replay witness の正当性を担う。
    external_commitment_owner: 顧客・法務・外部システムとの obligation を担う。
  quorum_rules:
    severity_profiles:
      contained_local:
      - incident_commander
      - platform_owner
      cross_lane_or_cross_site:
      - incident_commander
      - platform_owner
      - evidence_custodian
      protected_floor_or_external_commitment:
      - incident_commander
      - safety_authority
      - platform_owner
      - evidence_custodian
      - external_commitment_owner
    rules:
    - required role coverage を欠く quorum を symbolic majority で代替してはならない。
    - same person が複数 role を兼務しても、dual-control が必要な facet では独立 witness を別に要求する。
    - override exhaustion が policy ceiling を超えた場合は low severity でも上位 authority へ escalation しなければならない。
  override_attestation:
    required_fields:
    - override_attestation_id
    - incident_case_ref
    - reason_ref
    - requested_surface_ref
    - affected_scope_ref
    - quorum_snapshot_ref
    - authority_path_ref
    - expiry_at
    - fallback_branch_ref
    - review_due_at
    - issued_at
    rules:
    - quorum_snapshot_ref が stale な override attestation を再利用してはならない。
    - requested_surface_ref が packet より広い local action を lawful override とみなしてはならない。
    - review_due_at のない override は emergency でも許してはならない。
  escalation_ladder:
    signals:
    - blast_radius_class
    - time_to_harm
    - evidence_volatility
    - override_exhaustion
    - external_commitment_exposure
    rules:
    - time_to_harm が短くても authority coverage 不足を省略してはならない。必要なら narrower surface へ落として先行する。
    - cross-team handoff では active override と pending compensation を省略してはならない。
    - escalation 失敗時は silent continuation ではなく forced_hold へ送る。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - incident role registry
      - quorum coverage rule
      - override attestation ratification
      - handoff acceptance judgement
    GraphEngine:
      owns:
      - authority coverage computation
      - escalation routing graph
      - override surface projection
      - shift handoff packet generation
    GraphLint:
      owns:
      - role-gap quorum lint
      - stale-quorum override lint
      - surface-overreach lint
      - handoff omission lint
    archive_object:
      owns:
      - override attestation
      - quorum snapshot
      - handoff packet
      - escalation timeline bundle
  forbidden_shortcuts:
  - symbolic majority だけで authority coverage 不足を埋める
  - stale quorum snapshot を再利用して override を延命する
  - packet より広い local action を lawful override とみなす
  - cross-team handoff で active override や pending compensation を省略する
  residual_open_points: []
scheduler_post_incident_learning_governance:
  status: provisional_fixed
  statement: scheduler_post_incident_learning_governance とは、post-incident causal graph、preventive control uplift、replay drill obligation を固定する規則である。
  core_claims:
  - post-incident review は blame summary ではなく causal graph で保持する。latent condition、trigger event、amplifier、detection gap、recovery gap、governance gap を分けて結ばなければならない。
  - single root cause は便利だが危険である。control-plane bug、operator workload、threshold miscalibration、evidence freeze delay、authority gap の複合寄与を潰してはならない。
  - preventive control uplift は action item list では足りない。policy uplift、tooling uplift、training uplift、drill uplift の class を分け、効果検証と recertification obligation を付ける。
  - replay drill は optional retrospective ではない。重大 incident class ごとに replay scope、freshness、required participant、success witness を registry 化する。
  - 学習結果は hotfix や override を正当化する免罪符ではない。causal uncertainty が高い場合は uplift を narrower hypothesis として束縛し、baseline rule を silent に書き換えてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は causal graph binding、uplift package、drill obligation、effectiveness review を分担する。
  causal_graph:
    node_classes:
      latent_condition: 平時から存在した脆弱性や capacity debt。
      trigger_event: incident を顕在化させた直接事象。
      amplifier: blast radius や復旧遅延を拡大した要因。
      detection_gap: 観測・アラート・triage の不足。
      recovery_gap: rollback / compensation / reintegration の不足。
      governance_gap: authority / policy / review / training の不足。
    rules:
    - single root cause label に graph を潰してはならない。
    - causal edge には witness source と confidence を付ける。
    - latent condition を trigger と混同して再発防止策を狭めてはならない。
  preventive_uplift:
    classes:
      policy_uplift: threshold、approval、sunset、custody などの規則更新。
      tooling_uplift: GraphEngine / GraphLint / observability / automation の改善。
      training_uplift: role 別訓練、handoff、decision drill の改善。
      drill_uplift: 定期 replay drill や chaos / tabletop の改善。
    rules:
    - uplift proposal には target gap、expected effect、verification horizon、owner、recertification due を束ねる。
    - causal confidence が低い uplift を baseline rule change として即時恒久化してはならない。
    - training_uplift を policy failure の代替にしてはならない。
  replay_drill_obligation:
    required_fields:
    - drill_obligation_id
    - incident_class_ref
    - required_participant_set_ref
    - replay_scope_ref
    - freshness_deadline_ref
    - success_witness_ref
    - recertification_due_at
    - issued_at
    rules:
    - 重大 incident class の replay drill obligation を optional learning memo に落としてはならない。
    - success_witness_ref のない drill 完了を learning closure とみなしてはならない。
    - recertification_due_at を過ぎた uplift を active control と誤認してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - causal graph registry
      - uplift package ratification
      - drill obligation binding
      - effectiveness review judgement
    GraphEngine:
      owns:
      - causal propagation graph materialization
      - uplift-to-control linkage
      - drill scenario generation
      - effectiveness metric computation
    GraphLint:
      owns:
      - single-root-cause collapse lint
      - uncertain-uplift permanence lint
      - missing-success-witness lint
      - expired-recertification lint
    archive_object:
      owns:
      - causal graph bundle
      - uplift package
      - drill execution record
      - effectiveness review archive
  forbidden_shortcuts:
  - single root cause label で causal graph を潰す
  - confidence の低い uplift を baseline rule change として即時恒久化する
  - success witness のない drill 完了を closure とみなす
  - expired recertification の uplift を active control と誤認する
  residual_open_points: []
scheduler_emergency_human_continuity_governance:
  status: provisional_fixed
  statement: scheduler_emergency_human_continuity_governance とは、長時間 incident 中の capability depletion、fatigue budget、shift handover continuity を固定する規則である。
  core_claims:
  - 長期 incident では operator の疲労と認知狭窄を system risk として扱う。個人の善意や根性に委ねず、override 回数、連続拘束時間、sleep debt proxy、peer review 欠落を depletion witness として束ねなければならない。
  - fatigue budget は勤務時間管理の別名ではない。role criticality、protected surface exposure、manual override density、night-hour concentration を加味した risk budget として扱う。
  - shift handover は meeting ではなく lawful continuity packet である。active override、pending compensation、freeze state、unsealed evidence、next decision due を欠いた handover を continuity 完了とみなしてはならない。
  - single heroic operator 依存を許してはならない。同一人に override approval、evidence custody、external commitment まで集中した場合は continuity degradation として escalate しなければならない。
  - handoff loss は communication error ではなく governance failure である。未移管 obligation、期限切れ token、未確認 freeze window を残した shift end は lawful closure を阻害する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は depletion signal binding、fatigue budget projection、handover completeness、continuity audit を分担する。
  depletion_signals:
    override_density: 単位時間あたりの override / emergency bypass / manual takeover 件数。
    continuous_command_duration: 同一 operator または同一小集団が command role を保持し続けた時間。
    peer_independence_loss: 必要な second reviewer / buddy witness が同一疲労帯に偏っている状態。
    sleep_debt_proxy: 休息 window 未達、深夜連続拘束、handover 遅延などから推定する疲労 proxy。
    evidence_attention_gap: evidence review・freeze verification・closure review の未処理累積。
  fatigue_budget:
    required_fields:
    - fatigue_budget_profile_ref
    - role_criticality_ref
    - operator_or_shift_team_ref
    - protected_surface_exposure_ref
    - manual_override_density_ref
    - night_hour_weight_ref
    - max_continuous_command_ref
    - mandatory_relief_trigger_ref
    - issued_at
    rules:
    - fatigue budget を超過した operator に protected-surface override を継続させてはならない。
    - budget 超過後の延長は owner_reason_ref、peer witness、expiry を束ねた temporary exception がなければ許されない。
    - 同一疲労帯の peer を独立 corroboration として再利用してはならない。
  handover_packet:
    required_fields:
    - handover_packet_id
    - from_shift_ref
    - to_shift_ref
    - active_override_set_ref
    - pending_compensation_set_ref
    - open_freeze_window_ref
    - unsealed_evidence_ref
    - next_decision_due_ref
    - external_commitment_ref
    - acknowledgment_ref
    - sealed_at
    rules:
    - acknowledgment_ref のない handover packet を continuity 完了とみなしてはならない。
    - active override と next decision due の両方が未記載なら command continuity を引き継いだことにしてはならない。
    - 未移管 obligation を口頭メモだけで残してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - depletion signal registry
      - fatigue budget ratification
      - handover completeness judgement
      - temporary extension approval
    GraphEngine:
      owns:
      - fatigue budget burn-down projection
      - continuity risk graph
      - handover dependency expansion
      - relief trigger computation
    GraphLint:
      owns:
      - single-hero dependency lint
      - budget-overrun protected override lint
      - incomplete handover lint
      - missing peer-independence lint
    archive_object:
      owns:
      - fatigue budget packet
      - handover packet
      - shift continuity snapshot
      - continuity audit bundle
  forbidden_shortcuts:
  - 長時間 incident を理由に fatigue budget を無期限に無効化する
  - 口頭引継ぎだけで handover 完了とみなす
  - 疲労帯が同じ peer を独立 reviewer として数える
  - single operator 依存を heroic response として正当化する
  residual_open_points: []
scheduler_relief_staffing_governance:
  status: provisional_fixed
  statement: scheduler_relief_staffing_governance とは、relief roster coverage、role substitution、certification freshness を固定する規則である。
  core_claims:
  - relief roster は人員名簿ではなく capability coverage table である。incident role、surface scope、time horizon、independence requirement を束ねなければ roster があっても使えない。
  - role substitution は full replacement だけではない。observation_only、bounded_override、full_command_relief、external_commitment_proxy の class を分け、必要以上の権限を流してはならない。
  - certification freshness は資格の有無だけでなく、last drill、recent incident exposure、schema/profile familiarity、tool version familiarity を含めて判定する。
  - cross-team borrowing は capacity 拡張だが、責任の無主化を起こしやすい。borrowed responder には lending owner、receiving owner、scope cap、sunset を明示しなければならない。
  - substitution gap を local convention で埋めてはならない。freshness floor 未達の responder は scoped downgrade か observer duty に落とし、protected-surface authority を与えてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は relief role binding、freshness computation、substitution ceiling、borrowing witness を分担する。
  relief_roster_classes:
    warm_standby: 即時交代可能な roster。必要な drill と tool familiarity を維持する。
    delayed_relief: 一定セットアップ後に交代可能な roster。handover horizon を長めに要求する。
    borrowed_specialist: 他 team / 他 domain から限定面だけ借りる roster。scope cap を強くかける。
    observer_support: decision support や evidence watching だけを担う roster。command authority は持たない。
  substitution_classes:
    observation_only: 閲覧と助言のみ許す。mutation と override は禁止。
    bounded_override: 限定 scope の override だけ許す。expiry と peer witness が必須。
    full_command_relief: incident commander または command bundle を一時的に引き継ぐ。strict coverage が必要。
    external_commitment_proxy: 外部連絡と obligation translation だけを代行する。internal protected mutation は含まない。
  certification_freshness:
    required_axes:
    - credential_validity
    - last_drill_age
    - recent_incident_exposure
    - profile_or_schema_familiarity
    - tool_version_familiarity
    - protected_surface_history
    rules:
    - credential_validity だけで full_command_relief を許してはならない。
    - tool_version_familiarity が stale の responder を protected-surface substitute にしてはならない。
    - freshness floor 未達なら observer_support または bounded_override へ downgrade しなければならない。
  borrowing_controls:
    required_fields:
    - borrow_packet_id
    - lending_owner_ref
    - receiving_owner_ref
    - substitution_class_ref
    - scope_cap_ref
    - sunset_due_ref
    - freshness_snapshot_ref
    - handover_dependency_ref
    - issued_at
    rules:
    - lending_owner_ref または receiving_owner_ref のない borrowed responder を active command に入れてはならない。
    - scope_cap_ref のない borrowing を emergency necessity で正当化してはならない。
    - sunset_due_ref 超過後の borrowing を暗黙更新してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - relief roster registry
      - substitution class ratification
      - borrowing packet approval
      - freshness floor policy
    GraphEngine:
      owns:
      - coverage gap projection
      - freshness score materialization
      - scope-cap compatibility check
      - relief assignment proposal
    GraphLint:
      owns:
      - stale-certification substitution lint
      - ownerless borrowing lint
      - over-scoped substitute lint
      - implicit escalation-by-borrow lint
    archive_object:
      owns:
      - roster snapshot
      - borrowing packet
      - freshness witness bundle
      - substitution audit trail
  forbidden_shortcuts:
  - 資格があるだけで freshness floor を満たしたことにする
  - borrowed responder に full authority を一括付与する
  - scope cap のない substitution を emergency necessity で通す
  - sunset なしの borrowing を慣行で継続する
  residual_open_points: []
scheduler_handover_continuity_repair_governance:
  status: provisional_fixed
  statement: scheduler_handover_continuity_repair_governance とは、handover packet sealing、continuity checksum、orphaned obligation recovery を固定する規則である。
  core_claims:
  - handover packet は送信しただけでは成立しない。seal digest、receiver acknowledgment、obligation checksum、token transfer state が揃ってはじめて continuity packet として有効である。
  - continuity checksum は document hash ではなく obligation completeness 証明である。active override、pending review due、open freeze、compensation receipt、external commitment、borrowed authority を含めなければならない。
  - orphaned obligation は human error の総称ではなく class を持つ。orphaned_override、orphaned_due_item、orphaned_borrowing、orphaned_evidence_watch、orphaned_external_commitment を分けて recovery lane を変える。
  - recovery は after-the-fact reconciliation だけではない。missing acknowledgment や checksum mismatch の時点で protected-surface lock または escalation を開くべき場合がある。
  - handover repair は silent patch で済ませてはならない。recovered obligation が発見されたなら repair packet と cause class を残し、次 shift の basis を書き換えるときも witness を残さなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は continuity checksum binding、orphan detection、repair lane routing、repair audit を分担する。
  continuity_checksum:
    required_items:
    - active_override_set
    - pending_decision_due_set
    - open_freeze_window_set
    - compensation_receipt_wait_set
    - external_commitment_set
    - borrowed_authority_set
    - unsealed_evidence_watch_set
    rules:
    - required_items のいずれかが unknown のまま handover_complete を宣言してはならない。
    - checksum mismatch を cosmetic mismatch として握りつぶしてはならない。
    - borrowed_authority_set の transfer 状態が不明なまま shift close をしてはならない。
  orphan_classes:
    orphaned_override: active override owner が存在しない状態。
    orphaned_due_item: next decision due や review due の owner が欠落した状態。
    orphaned_borrowing: borrowed responder の lending / receiving owner が片方欠落した状態。
    orphaned_evidence_watch: freeze / evidence watch の監視主体が途切れた状態。
    orphaned_external_commitment: 顧客・法務・外部システム obligation の follow-up owner が欠落した状態。
  repair_lanes:
    immediate_lock: protected-surface mutation を一時停止し owner recovery を先行させる。
    priority_rebind: 不足 owner を優先再割当し continuity basis を補正する。
    escalated_gap: 同一 shift で repair 不可能なため command escalation に送る。
    historical_repair: 既に影響が閉じた obligation を audit lane で修復する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - checksum schema
      - orphan class registry
      - repair packet ratification
      - rebind approval
    GraphEngine:
      owns:
      - obligation expansion graph
      - checksum materialization
      - orphan detection
      - repair lane recommendation
    GraphLint:
      owns:
      - false-complete handover lint
      - hidden orphan lint
      - silent repair lint
      - borrow-transfer mismatch lint
    archive_object:
      owns:
      - sealed handover packet
      - checksum witness bundle
      - repair packet
      - continuity failure audit trail
  forbidden_shortcuts:
  - receiver acknowledgment なしで handover_complete を宣言する
  - checksum mismatch を軽微差分として黙殺する
  - orphaned override を shift 慣行で放置する
  - repair packet なしで continuity basis を書き換える
  residual_open_points: []
scheduler_fatigue_failsafe_governance:
  status: provisional_fixed
  statement: scheduler_fatigue_failsafe_governance とは、fatigue-triggered override cooldown、protected-surface lockout、dual-control recovery を固定する規則である。
  core_claims:
  - fatigue signal と continuity failure は monitoring event で終わらせてはならない。protected surface に対しては lockout or downgrade の fail-safe branch を自動で開けるようにしなければならない。
  - lockout は全停止の別名ではない。override_lockout、new_bypass_lockout、evidence_custody_lockout、external_commitment_lockout の class を分け、危険面だけを先に閉じる。
  - cooldown は単なる待機時間ではない。fresh peer の参加、open obligation の再割当、fatigue indicator の改善、handover checksum 整合を揃えなければ reentry を許してはならない。
  - dual-control recovery は second approver を追加すれば終わりではない。fresh peer independence、shared fatigue exclusion、surface-specific witness を要求する。
  - lockout 解除は operator 自己申告に依存してはならない。DecisionLedger 上の release owner と archive 上の recovery witness が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は fatigue fail-safe class binding、lockout projection、dual-control recovery gate、release audit を分担する。
  lockout_classes:
    override_lockout: new override / emergency bypass の発行を止める。
    new_bypass_lockout: temporary bypass token の発行と延長を止める。
    evidence_custody_lockout: single fatigued operator による evidence unseal / reclassify を止める。
    external_commitment_lockout: 外部向け irreversible commitment の単独発行を止める。
  cooldown_requirements:
    required_evidence:
    - fresh_peer_joined
    - shared_fatigue_slice_excluded
    - open_obligation_rebound
    - handover_checksum_clean
    - fatigue_indicator_below_release_floor
    - release_owner_ref
    rules:
    - fresh_peer_joined が false のまま protected-surface lockout を解除してはならない。
    - fatigue_indicator が改善しても open_obligation_rebound が未完了なら cooldown を clear してはならない。
    - release_owner_ref のない解除を temporary kindness として許してはならない。
  dual_control_recovery:
    states:
    - single_operator_risk
    - lockout_active
    - cooldown_pending
    - dual_control_reentry_pending
    - dual_control_restored
    rules:
    - dual_control_reentry_pending 中に same-fatigue peer だけで corroboration を構成してはならない。
    - dual_control_restored へ進むには surface-specific second witness が必要である。
    - single_operator_risk を informal buddy arrangement で closed とみなしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - lockout class registry
      - cooldown release approval
      - dual-control recovery judgement
      - protected-surface release owner binding
    GraphEngine:
      owns:
      - surface-specific lockout projection
      - cooldown readiness computation
      - fresh-peer independence check
      - recovery state machine
    GraphLint:
      owns:
      - premature-unlock lint
      - same-fatigue dual-control lint
      - self-attested recovery lint
      - partial-lockout leakage lint
    archive_object:
      owns:
      - lockout packet
      - cooldown witness bundle
      - dual-control recovery packet
      - release audit snapshot
  forbidden_shortcuts:
  - fatigue signal を advisory 扱いのまま protected override を継続する
  - 自己申告だけで lockout を解除する
  - same-fatigue peer を second approver に置いて dual-control restored とみなす
  - cooldown 中に new bypass token を再発行する
  residual_open_points: []
scheduler_owner_loss_failover_governance:
  status: provisional_fixed
  statement: scheduler_owner_loss_failover_governance とは、command vacancy succession、deadman escalation、missing-owner freeze を固定する規則である。
  core_claims:
  - owner 不在は単なる勤務穴ではない。incident commander、evidence custodian、external commitment owner、borrowing owner の vacancy class を分け、surface ごとに succession path を持たせなければならない。
  - deadman escalation は監視 ping の timeout だけで済ませてはならない。last acknowledgment、pending due criticality、active override presence、protected surface exposure を束ねて escalation を決める。
  - missing-owner freeze は fail-safe であり punishment ではない。owner 不在の間に protected mutation、new external commitment、evidence unseal が続かないよう surface-specific freeze を開く。
  - succession は最も近い肩書への丸投げではない。coverage、freshness、fatigue slice、current obligation load を満たした successor だけを lawful successor とする。
  - vacancy recovery は事後補記で済ませてはならない。who lost, when frozen, who succeeded, what remained blocked を packet として残さなければ audit 不能になる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は vacancy class binding、deadman timer evaluation、freeze projection、succession audit を分担する。
  vacancy_classes:
    command_vacancy: incident commander または command quorum の欠落。
    custody_vacancy: evidence custodian / freeze owner の欠落。
    external_commitment_vacancy: 顧客・法務・外部 obligation owner の欠落。
    borrowing_owner_vacancy: cross-team borrowing の lending / receiving owner の欠落。
  deadman_policy:
    required_fields:
    - deadman_policy_id
    - owner_role_ref
    - expected_ack_interval_ref
    - active_override_presence_ref
    - pending_due_criticality_ref
    - protected_surface_exposure_ref
    - vacancy_freeze_class_ref
    - succession_path_ref
    - issued_at
    rules:
    - expected_ack_interval 超過かつ active_override_presence がある場合、deadman escalation を silent に遅延してはならない。
    - pending_due_criticality が high の vacancy を next shift まで放置してはならない。
    - succession_path_ref のない deadman policy を protected surface に適用してはならない。
  freeze_and_succession:
    freeze_classes:
    - command_freeze
    - evidence_freeze
    - external_commitment_freeze
    - borrowing_freeze
    succession_states:
    - owner_missing_suspected
    - owner_missing_confirmed
    - freeze_active
    - successor_pending
    - successor_bound
    - escalated_gap
    rules:
    - owner_missing_confirmed のまま successor_pending を飛ばして mutation を再開してはならない。
    - successor_bound へ進むには freshness と fatigue exclusion の両方が必要である。
    - escalated_gap は failure ではなく no-lawful-successor 状態を示す。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - vacancy class registry
      - deadman policy ratification
      - succession judgement
      - freeze release approval
    GraphEngine:
      owns:
      - owner heartbeat evaluation
      - deadman escalation computation
      - surface-specific freeze projection
      - successor candidate graph
    GraphLint:
      owns:
      - missing-owner silent-run lint
      - ownerless protected mutation lint
      - unqualified succession lint
      - vacancy packet omission lint
    archive_object:
      owns:
      - vacancy packet
      - deadman escalation log
      - freeze / succession audit bundle
      - blocked-obligation snapshot
  forbidden_shortcuts:
  - owner 不在を informal代理 で黙って埋める
  - deadman timeout を見ても protected mutation を継続する
  - freshness / fatigue exclusion 未確認の successor を bind する
  - freeze / succession packet を残さず後から補記する
  residual_open_points: []
scheduler_peer_challenge_governance:
  status: provisional_fixed
  statement: scheduler_peer_challenge_governance とは、peer corroboration buddy-check、impairment dissent、contested override suspension を固定する規則である。
  core_claims:
  - buddy-check は仲良し確認ではなく protected surface の safety interlock である。high-risk override、evidence unseal、external irreversible commitment では mandatory peer corroboration を要求する。
  - impairment suspicion は人格攻撃として処理してはならない。fatigue indicator、speech / action incoherence、checksum neglect、unsafe override insistence などの challenge trigger を packet 化して扱う。
  - contested override は単なる disagreement ではない。surface criticality が高い場合は dispute 解消前に temporary suspension を開き、freeze / alternate approver / escalation のいずれかに送る。
  - dissent を sabotage と誤認して抑圧してはならない。lawful dissent には reason_code、observed signal、requested surface hold、alternate review path を与える。
  - buddy witness の独立性は名簿上の別人では足りない。same fatigue slice、same command dependency、same token custody を除外しなければ corroboration にならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は challenge trigger binding、temporary suspension routing、alternate reviewer selection、peer challenge audit を分担する。
  buddy_check_classes:
    mandatory_high_risk_override: high-risk override 前に peer corroboration を要求する。
    mandatory_evidence_unseal: sensitive evidence unseal / reclassify 前に peer corroboration を要求する。
    mandatory_external_commitment: irreversible external commitment 前に peer corroboration を要求する。
    advisory_low_risk_review: 低リスク面では advisory buddy-check に留める。
  challenge_triggers:
    fatigue_or_impairment_signal: fatigue budget 超過、sleep debt proxy 悪化、行動 incoherence など。
    checksum_neglect_pattern: handover / obligation checksum を繰り返し無視する。
    unsafe_override_push: low-confidence かつ high-risk override を強行しようとする。
    peer_independence_collapse: 必要な second witness が同一依存帯に潰れた状態。
  contested_override_policy:
    temporary_suspension_actions:
    - surface_hold
    - alternate_approver_required
    - command_escalation
    - evidence_freeze_extension
    required_fields:
    - challenge_packet_id
    - challenged_surface_ref
    - trigger_ref
    - requested_hold_ref
    - alternate_review_path_ref
    - challenge_owner_ref
    - expiry_ref
    - issued_at
    rules:
    - high-risk contested override を dispute 解消前に実行してはならない。
    - requested_hold_ref のない challenge を sabotage 扱いで無効化してはならない。
    - alternate_review_path_ref のない temporary suspension を無期限化してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - buddy-check policy
      - challenge trigger registry
      - temporary suspension approval
      - alternate review path binding
    GraphEngine:
      owns:
      - independence check
      - challenge severity routing
      - alternate reviewer search
      - suspension state machine
    GraphLint:
      owns:
      - same-dependency buddy lint
      - suppressed-dissent lint
      - premature contested-execution lint
      - challenge-packet omission lint
    archive_object:
      owns:
      - challenge packet
      - buddy corroboration witness
      - temporary suspension audit bundle
      - alternate review trace
  forbidden_shortcuts:
  - buddy-check を名簿上の別人確認だけで済ませる
  - impairment suspicion を人格問題として握りつぶす
  - high-risk contested override を dispute 解消前に実行する
  - lawful dissent を sabotage 扱いして packet 化しない
  residual_open_points: []
scheduler_post_incident_staffing_recovery_governance:
  status: provisional_fixed
  statement: scheduler_post_incident_staffing_recovery_governance とは、prolonged-incident staffing horizon、rest debt settlement、recovery-readiness release を固定する規則である。
  core_claims:
  - 長期 incident では staffing を場当たりで延長してはならない。0-12h、12-36h、36-72h、72h超の horizon tier ごとに required role bundle、planned relief wave、borrowed capacity 上限を registry 化しなければならない。
  - rest debt は勤務時間の超過量だけではない。night concentration、protected-surface override 密度、handover failure exposure、peer challenge 介入回数を含む recovery debt として扱う。
  - incident 終息直後に nominal readiness を宣言してはならない。watchfloor、open compensation、residual freeze、external commitment follow-up を残したまま通常復帰するのは continuity 再破綻を招く。
  - recovery-readiness release は疲労回復の自己申告ではなく、rest debt settlement、coverage reconstitution、watchfloor stability、obligation rebound の完了によってのみ許される。
  - planned relief wave を持たない prolonged incident は lawful continuity を満たしにくい。shift 境界と role bundle 境界を分け、誰をいつ relief するかを decision basis に含めるべきである。
  - DecisionLedger / GraphEngine / GraphLint / archive object は staffing horizon tier binding、rest debt ledger、watchfloor release judgement、post-incident staffing recovery audit を分担する。
  staffing_horizon_tiers:
    tactical_0_12h: 既存 primary roster で耐える区間。mandatory relief plan を事前に束縛する。
    extended_12_36h: planned relief wave が必須の区間。single-hero dependency を禁止する。
    sustained_36_72h: borrowed capacity と degraded noncritical work suspension を前提に coverage を組み直す区間。
    campaign_72h_plus: portfolio レベルの reserve 再配分と mutual-aid escalation を検討する区間。
  rest_debt_settlement:
    required_fields:
    - rest_debt_packet_id
    - operator_or_shift_group_ref
    - staffing_horizon_tier_ref
    - sleep_debt_proxy_ref
    - night_load_ref
    - protected_override_density_ref
    - continuity_break_ref
    - minimum_recovery_window_ref
    - compensating_relief_ref
    - settlement_due_ref
    - issued_at
    rules:
    - rest debt packet のない prolonged incident close を nominal recovery とみなしてはならない。
    - minimum_recovery_window_ref を満たさない operator を protected-surface release の quorum に含めてはならない。
    - compensating_relief_ref のない debt carryover を慣行で次シフトへ繰り越してはならない。
  recovery_readiness_release:
    required_evidence:
    - watchfloor_state_ref
    - coverage_reconstitution_ref
    - open_obligation_rebound_ref
    - rest_debt_settlement_ref
    - external_followup_clear_ref
    - release_owner_ref
    - release_timebox_ref
    rules:
    - watchfloor_state_ref が unstable のまま recovery-readiness release を宣言してはならない。
    - release_owner_ref のない復帰宣言を morale recovery として扱ってはならない。
    - external_followup_clear_ref が false のまま nominal readiness に戻してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - staffing horizon tier registry
      - rest debt packet ratification
      - release owner binding
      - post-incident readiness judgement
    GraphEngine:
      owns:
      - relief wave projection
      - rest debt burn-down computation
      - coverage reconstitution check
      - watchfloor stability computation
    GraphLint:
      owns:
      - heroic-carryover lint
      - unsettled-rest-debt release lint
      - missing-release-owner lint
      - false-nominal-readiness lint
    archive_object:
      owns:
      - rest debt packet
      - relief wave snapshot
      - recovery release witness bundle
      - post-incident staffing audit trail
  forbidden_shortcuts:
  - incident 終息直後に watchfloor なしで通常運用へ戻す
  - rest debt を善意で自然解消する前提にする
  - planned relief wave なしで prolonged incident を延長する
  - release owner 不在のまま readiness 復帰を宣言する
  residual_open_points: []
scheduler_watchfloor_rebound_governance:
  status: provisional_fixed
  statement: scheduler_watchfloor_rebound_governance とは、watchfloor downgrade ladder、relapse trigger、readiness rebound を固定する規則である。
  core_claims:
  - watchfloor は on/off の二値では足りない。high_watch、guarded_watch、limited_watch、nominal_monitor の段階を持たせ、段階ごとに required reviewer density と escalation speed を変えるべきである。
  - rebound は経過時間だけで判定してはならない。stability window、residual incident signal、deferred fix backlog、external inquiry pressure を束ねて評価する。
  - relapse trigger は再発そのものだけではない。same-surface anomaly 再出現、customer re-open、checksum drift、fatigue rebound、suppressed follow-up を trigger family として registry 化する。
  - watchfloor downgrade は成功物語の演出ではない。各 downgrade step は rollback 可能でなければならず、trigger が再発したら即座に上位 stage へ戻す。
  - nominal monitor へ移るには、監視頻度を下げても detection latency が許容範囲に収まる根拠が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は watchfloor stage binding、relapse trigger registry、rebound threshold judgement、downgrade audit を分担する。
  watchfloor_stages:
    high_watch: incident 直後の最大監視。protected surface 変更と follow-up を高頻度で再確認する。
    guarded_watch: critical signal は継続監視しつつ、review cadence をやや緩める段階。
    limited_watch: 主要 signal だけを対象にした限定監視。relapse trigger のみ即時 escalation する。
    nominal_monitor: 平時監視へ近い段階。ただし recent incident lineage は保持する。
  relapse_triggers:
    same_surface_reopen: 同一 protected surface に related anomaly / override / freeze が再発した状態。
    external_reopen_pressure: 顧客・法務・外部 regulator から follow-up や reopen が発生した状態。
    checksum_drift_return: handover checksum や continuity checksum の新たな drift が発見された状態。
    fatigue_rebound: 主要 role の疲労指標が回復前に再上昇した状態。
    suppressed_followup: 予定された compensating follow-up が未実施または形式化だけで終わった状態。
  rebound_rules:
    required_fields:
    - watchfloor_stage_ref
    - stability_window_ref
    - trigger_family_ref
    - detection_latency_budget_ref
    - rollback_stage_ref
    - downgrade_owner_ref
    - ratified_at
    rules:
    - downgrade_owner_ref のない stage 変更を自然減衰として処理してはならない。
    - limited_watch へ下げる前に same_surface_reopen と checksum_drift_return の latency budget を確認しなければならない。
    - relapse trigger が発火したのに rollback_stage_ref へ戻さない downgrade は無効である。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - watchfloor stage registry
      - relapse trigger ratification
      - downgrade owner binding
      - rebound threshold judgement
    GraphEngine:
      owns:
      - stage transition graph
      - relapse trigger materialization
      - detection latency simulation
      - rollback stage recommendation
    GraphLint:
      owns:
      - ownerless downgrade lint
      - ignored-relapse lint
      - latency-budget omission lint
      - non-reversible stage change lint
    archive_object:
      owns:
      - watchfloor transition packet
      - relapse trigger evidence bundle
      - downgrade audit snapshot
      - rebound review trail
  forbidden_shortcuts:
  - watchfloor を time-based timer だけで一気に nominal へ落とす
  - relapse trigger を anecdotal note で済ませる
  - rollback stage を持たない downgrade を許可する
  - detection latency 根拠なしに monitoring cadence を下げる
  residual_open_points: []
scheduler_recovery_debt_closure_governance:
  status: provisional_fixed
  statement: scheduler_recovery_debt_closure_governance とは、deferred maintenance backlog、compensating follow-up、recovery debt closure を固定する規則である。
  core_claims:
  - incident 中に後回しにした項目は雑多な backlog ではない。maintenance debt、documentation debt、control-tuning debt、training debt、compliance debt を分けて closure rule を変えるべきである。
  - compensating follow-up は単なる TODO ではない。debt class ごとに due horizon、owner quorum、evidence of closure、reopen trigger を束ねた packet として管理しなければならない。
  - recovery debt は運用継続と将来 readiness の両方を侵食する。high-critical debt が残る間は nominal readiness を宣言しても reserve quality が毀損する。
  - closure は作業完了申告だけでなく、risk retired、evidence attached、watchfloor impact cleared の3条件を必要とする。
  - 複数 debt を同一 owner に押し込むと second failure を生みやすい。debt closure には staffing and fatigue impact の再計算が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は recovery debt class binding、follow-up packet、closure witness、backlog risk audit を分担する。
  recovery_debt_classes:
    maintenance_debt: 保守・再設定・恒久修正の先送り。
    documentation_debt: handover、runbook、decision rationale の未整備。
    control_tuning_debt: threshold、rule、lint、automation の暫定調整の本修正未完了。
    training_debt: drill、briefing、skill refresh の未実施。
    compliance_debt: 顧客報告、規制説明、監査追補の未完了。
  compensating_followup_packet:
    required_fields:
    - followup_packet_id
    - debt_class_ref
    - risk_rank_ref
    - closure_owner_ref
    - secondary_reviewer_ref
    - due_horizon_ref
    - closure_evidence_ref
    - watchfloor_impact_ref
    - reopen_trigger_ref
    - issued_at
    rules:
    - closure_owner_ref のない follow-up を team awareness で代用してはならない。
    - risk_rank_ref が high の debt を due_horizon_ref なしで backlog に沈めてはならない。
    - closure_evidence_ref のない completion を debt retired とみなしてはならない。
  closure_conditions:
    required_tests:
    - risk_retired_ref
    - evidence_attached_ref
    - watchfloor_impact_cleared_ref
    - staffing_impact_recomputed_ref
    rules:
    - training_debt は attendance だけで closed とみなしてはならない。freshness 反映が必要である。
    - control_tuning_debt は temporary patch のまま閉じてはならない。ratified setting が必要である。
    - watchfloor_impact_cleared_ref が false の debt を nominal readiness 後回しとして閉じてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recovery debt registry
      - follow-up packet ratification
      - closure condition judgement
      - debt priority policy
    GraphEngine:
      owns:
      - backlog dependency expansion
      - staffing impact recomputation
      - closure evidence completeness check
      - debt burn-down projection
    GraphLint:
      owns:
      - ownerless follow-up lint
      - evidence-free closure lint
      - high-risk backlog burial lint
      - training-debt false-closure lint
    archive_object:
      owns:
      - follow-up packet
      - closure witness bundle
      - backlog audit snapshot
      - debt retirement trail
  forbidden_shortcuts:
  - incident backlog を 1つの TODO リストで済ませる
  - closure evidence なしで debt retired を宣言する
  - training debt を出席記録だけで完了扱いにする
  - high-risk debt を due horizon なしで backlog に沈める
  residual_open_points: []
scheduler_surge_staffing_provenance_governance:
  status: provisional_fixed
  statement: scheduler_surge_staffing_provenance_governance とは、surge staffing provenance、vendor-borrowed authority、access sunset を固定する規則である。
  core_claims:
  - surge staffing は人数補充ではなく provenance 付き capability 注入である。internal borrow、affiliate support、vendor specialist、mutual aid を source class として分けるべきである。
  - 外部または借用人員に与える authority は permanent role ではない。sponsor owner、scope cap、protected-surface exclusion、sunset を packet 化しなければならない。
  - vendor specialist は便利でも decision ownership を代替しない。evidence handling、tool access、mutation authority、external communication の境界を明示しなければ責任が霧散する。
  - access sunset は incident close と同義ではない。recovery watchfloor 中の継続 access を認める場合も、timebox と reseal 条件が必要である。
  - borrowed authority は source provenance を残さないと audit 不能である。who sponsored, why admitted, what excluded, when revoked を一体で残す必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は surge source registry、borrowed authority packet、sunset / revoke judgement、provenance audit を分担する。
  surge_source_classes:
    internal_borrow: 同一組織内の他 team から一時借用する source。
    affiliate_support: 関連組織・子会社などの近接系から支援を受ける source。
    vendor_specialist: 外部ベンダや委託先の専門要員を限定投入する source。
    mutual_aid: 異常時の相互支援協定に基づく source。
  borrowed_authority_packet:
    required_fields:
    - borrowed_authority_packet_id
    - surge_source_class_ref
    - sponsor_owner_ref
    - receiving_owner_ref
    - capability_scope_ref
    - protected_surface_exclusion_ref
    - tool_access_ref
    - external_comm_boundary_ref
    - sunset_due_ref
    - revoke_path_ref
    - issued_at
    rules:
    - sponsor_owner_ref のない vendor authority を emergency necessity で通してはならない。
    - protected_surface_exclusion_ref が空の borrowed authority を既定許可としてはならない。
    - sunset_due_ref 超過後の access を tacit extension してはならない。
  access_sunset:
    required_evidence:
    - revocation_owner_ref
    - access_reseal_ref
    - residual_artifact_check_ref
    - handover_or_archive_ref
    - sunset_effective_at
    rules:
    - residual_artifact_check_ref のない sunset を complete とみなしてはならない。
    - tool_access_ref を剥奪しても handover_or_archive_ref がなければ provenance close は未完了である。
    - recovery watchfloor 中の延長 access は新しい packet として再束縛しなければならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - surge source registry
      - borrowed authority ratification
      - sunset approval
      - sponsor accountability binding
    GraphEngine:
      owns:
      - capability-source compatibility check
      - access sunset projection
      - residual artifact scan routing
      - revoke path recommendation
    GraphLint:
      owns:
      - ownerless vendor authority lint
      - missing-exclusion lint
      - sunset-overrun lint
      - unsealed-residual-access lint
    archive_object:
      owns:
      - borrowed authority packet
      - source provenance bundle
      - sunset witness packet
      - revocation audit trail
  forbidden_shortcuts:
  - vendor specialist に sponsor owner なしで authority を与える
  - protected-surface exclusion なしの borrowed authority を既定化する
  - sunset 超過 access を tacit extension する
  - revocation 後の residual artifact を未確認のまま close する
  residual_open_points: []
scheduler_readiness_reserve_protection_governance:
  status: provisional_fixed
  statement: scheduler_readiness_reserve_protection_governance とは、reserve capacity floor、preemptive throttling、admission shedding を固定する規則である。
  core_claims:
  - reserve capacity は余り人員ではない。incident readiness を支える protected reserve として role bundle、time horizon、criticality ごとに floor を持つべきである。
  - recovery 期に全 backlog と通常業務を一斉再開してはならない。reserve floor を侵食する前に preemptive throttling を開く必要がある。
  - admission shedding は失敗ではなく future failure 防止策である。criticality、external obligation、recovery debt、surge usage を踏まえて後回しにする仕事を lawful に選ぶべきである。
  - reserve burn を invisible にしてはならない。planned work、training catch-up、compliance follow-up も reserve を消費するので同じ budget 面で見る必要がある。
  - reserve floor は nominal 時に戻して終わりではない。watchfloor 中は stricter reserve floor を要求し、回復段階に応じて only ratified に緩和すべきである。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve floor registry、burn-rate projection、throttling / shedding judgement、reserve audit を分担する。
  reserve_floor_profiles:
    incident_guarded_floor: watchfloor 中に維持すべき最小 reserve。protected role bundle の余力を厚く持つ。
    recovery_floor: post-incident recovery 期の floor。debt closure と訓練復帰を考慮する。
    nominal_floor: 平時の minimum reserve。通常変動を吸収できる最低線。
  throttling_and_shedding:
    required_fields:
    - reserve_floor_profile_ref
    - current_burn_rate_ref
    - critical_role_gap_ref
    - planned_work_load_ref
    - shedding_candidate_set_ref
    - throttling_owner_ref
    - issued_at
    rules:
    - critical_role_gap_ref が floor を下回るのに throttling_owner_ref なしで現場裁量へ委ねてはならない。
    - shedding_candidate_set_ref を持たずに admission shedding を ad hoc に行ってはならない。
    - training catch-up を reserve 無消費扱いしてはならない。
  shedding_order_principles:
    rules:
    - protected-surface readiness を削る仕事よりも、低 criticality の planned work を先に抑制する。
    - external irreversible commitment を伴う仕事を shed する場合は owner と escalation path を束縛する。
    - reserve floor violation を看過して nominal throughput を維持してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reserve floor policy
      - throttling approval
      - shedding order ratification
      - critical-role reserve binding
    GraphEngine:
      owns:
      - reserve burn-rate projection
      - gap-to-floor computation
      - candidate shedding ranking
      - recovery-stage floor transition computation
    GraphLint:
      owns:
      - invisible reserve burn lint
      - ownerless throttling lint
      - ad-hoc shedding lint
      - floor-violation throughput lint
    archive_object:
      owns:
      - reserve floor snapshot
      - throttling packet
      - shedding decision packet
      - reserve audit trail
  forbidden_shortcuts:
  - reserve capacity を余剰人員として使い切る
  - shedding candidate を持たずに場当たりで仕事を止める
  - training catch-up を reserve 無消費扱いにする
  - floor violation を無視して throughput を維持する
  residual_open_points: []
scheduler_recovery_policy_closure_governance:
  status: provisional_fixed
  statement: scheduler_recovery_policy_closure_governance とは、recovery policy recalibration、drill debt retirement、closure criteria を固定する規則である。
  core_claims:
  - post-incident review は感想会ではない。threshold、roster rule、reserve floor、handover schema、peer challenge rule のうち何を変更するかを policy recalibration packet として束ねるべきである。
  - drill debt は training debt の一部だが、制度改修を定着させるための special debt である。新ルールが drill されず operational freshness に反映されないなら closure は早すぎる。
  - closure criteria は事実上の改善完了判定であり、rule ratified、tooling reflected、drill retired、audit closed の4条件を揃える必要がある。
  - policy recalibration は incident 依存の過剰反応でも不足反応でもいけない。change scope、blast radius、rollback path、owner forum を明示して ratify すべきである。
  - postmortem を永久に開きっぱなしにしても能力は上がらない。closure criteria を満たしたら close し、残課題は別の policy backlog へ正しく移送する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は recalibration packet、drill retirement evidence、closure judgement、policy carryover audit を分担する。
  policy_recalibration_packet:
    required_fields:
    - recalibration_packet_id
    - rule_family_ref
    - change_scope_ref
    - blast_radius_ref
    - rollback_path_ref
    - owner_forum_ref
    - ratification_due_ref
    - tool_reflection_ref
    - issued_at
    rules:
    - blast_radius_ref のない policy change を local lesson learned で済ませてはならない。
    - tool_reflection_ref が false のまま ratified policy を closure 済みにしてはならない。
    - rollback_path_ref のない large-scope retune を一気に本番化してはならない。
  drill_debt_retirement:
    required_fields:
    - drill_debt_id
    - affected_rule_family_ref
    - required_participant_ref
    - scenario_class_ref
    - freshness_update_ref
    - retired_at_or_null
    rules:
    - required_participant_ref が揃わない drill を retirement とみなしてはならない。
    - freshness_update_ref のない drill 完了を roster へ反映してはならない。
    - scenario_class_ref を省略した generic drill だけで targeted closure を宣言してはならない。
  closure_criteria:
    required_tests:
    - policy_ratified_ref
    - tooling_reflected_ref
    - drill_debt_retired_ref
    - audit_closed_ref
    - carryover_backlog_rerouted_ref
    rules:
    - policy_ratified_ref だけで closure を宣言してはならない。
    - carryover_backlog_rerouted_ref が false のまま unresolved item を消してはならない。
    - audit_closed_ref のない close は institutional memory を欠落させる。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recalibration packet ratification
      - closure criteria judgement
      - owner forum binding
      - policy carryover routing
    GraphEngine:
      owns:
      - blast radius graph
      - tool reflection dependency expansion
      - drill coverage computation
      - closure readiness recommendation
    GraphLint:
      owns:
      - ratified-but-unreflected policy lint
      - false drill retirement lint
      - premature closure lint
      - carryover-drop lint
    archive_object:
      owns:
      - recalibration packet
      - drill evidence bundle
      - closure witness packet
      - policy carryover audit trail
  forbidden_shortcuts:
  - ratified policy を tooling 反映前に closure 済みにする
  - generic drill だけで targeted rule closure を宣言する
  - carryover backlog を reroute せずに unresolved item を消す
  - postmortem を無期限 open のまま正本運用する
  residual_open_points: []
scheduler_portfolio_reserve_arbitration_governance:
  status: provisional_fixed
  statement: scheduler_portfolio_reserve_arbitration_governance とは、multi-incident reserve arbitration、mutual-aid escalation、portfolio readiness allocation を固定する規則である。
  core_claims:
  - 複数 incident が同時に reserve を要求する局面では、先着順や声の大きさで allocation を決めてはならない。reserve request packet と portfolio priority basis に基づく arbitration unit を正本化しなければならない。
  - mutual-aid escalation は善意の横流しではない。depletion horizon、blast radius、protected-surface exposure、borrowed capacity 残量を条件として開く統治分岐である。
  - portfolio readiness allocation は受援側だけでなく donor 側の readiness floor も同時に守らなければならない。支援によって donor 側の critical service が collapse する allocation は admissible ではない。
  - multi-incident arbitration では role bundle、time horizon、regulatory exposure、rollback feasibility、customer commitment を同じ request packet に束ねるべきである。単なる headcount 需要だけでは portfolio judgement にならない。
  - reserve を割り当てた後も starvation residue を監視し、temporary allocation を evergreen 化してはならない。portfolio allocation は review window と reroute path を必須とする。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve request registry、arbitration score computation、allocation rule lint、portfolio readiness audit trail を分担する。
  reserve_request_packet:
    required_fields:
    - reserve_request_packet_id
    - requesting_incident_ref
    - requesting_team_ref
    - required_role_bundle_ref
    - depletion_horizon_ref
    - blast_radius_ref
    - protected_surface_exposure_ref
    - customer_commitment_ref
    - minimum_effective_capacity_ref
    - latest_arrival_deadline_ref
    - rollback_feasibility_ref
    - issued_at
    rules:
    - required_role_bundle_ref を generic reserve headcount で置換してはならない。
    - depletion_horizon_ref と latest_arrival_deadline_ref のない request を emergency priority として扱ってはならない。
    - rollback_feasibility_ref が unknown のまま irreversible allocation を通してはならない。
  arbitration_policy:
    precedence_axes:
    - protected-surface exposure
    - depletion horizon urgency
    - customer or regulatory commitment criticality
    - borrowed capacity substitutability
    - rollback feasibility and reroute cost
    rules:
    - 同一 precedence tier では donor starvation risk が低い option を優先する。
    - 同点時は review window が短い temporary allocation を優先し、evergreen lending を避ける。
    - portfolio owner 不在の裁定を informal consensus で確定してはならない。
  mutual_aid_escalation:
    triggers:
    - local reserve が ratified floor を下回る見込みになった
    - 同時 incident により single-team substitution では protected surface を守れない
    - borrowed capacity の access sunset が horizon 内に到来する
    - customer or regulator impact が single-team authority を超える
    required_bindings:
    - donor_readiness_floor_ref
    - aid_duration_cap_ref
    - receiver_exit_plan_ref
    - portfolio_owner_ref
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reserve request packet registry
      - portfolio precedence ratification
      - mutual-aid escalation approval
      - allocation review window binding
    GraphEngine:
      owns:
      - arbitration score computation
      - donor starvation projection
      - arrival deadline feasibility check
      - portfolio readiness simulation
    GraphLint:
      owns:
      - ownerless arbitration lint
      - deadline-free emergency request lint
      - donor-floor violation lint
      - evergreen temporary aid lint
    archive_object:
      owns:
      - reserve request packet
      - arbitration evidence bundle
      - allocation review snapshot
      - portfolio readiness audit trail
  forbidden_shortcuts:
  - 先着順で reserve allocation を固定する
  - donor readiness floor を見ずに支援を抜き続ける
  - review window なしで temporary aid を継続する
  - portfolio owner 不在のまま mutual-aid escalation を宣言する
  residual_open_points: []
scheduler_donor_protection_covenant_governance:
  status: provisional_fixed
  statement: scheduler_donor_protection_covenant_governance とは、donor-team protection floor、aid refusal adjudication、asymmetric support covenant を固定する規則である。
  core_claims:
  - 支援提供側は無限 reservoir ではない。donor team ごとに protected surface、minimum command continuity、relief roster freshness を束ねた protection floor を持たなければならない。
  - aid refusal は非協力の烙印ではなく、lawful refusal reason code と adjudication path を持つ統治行為である。floor breach、regulatory boundary、credential mismatch、recovery debt overload は refusal の正当理由になりうる。
  - asymmetric support covenant は、片務支援が許される範囲、最大 duration、backfill obligation、return milestone を明文化する。善意のまま恒常支援へ滑ってはならない。
  - 受援側の urgency が高くても donor 側の critical service や duty-of-care を壊す transfer は認められない。portfolio は total harm を見て調停すべきである。
  - aid refusal を informal chat で片付けてはならない。拒否には owner、reason code、counter-offer、review forum を必須とする。
  - DecisionLedger / GraphEngine / GraphLint / archive object は donor protection floor registry、refusal adjudication packet、support covenant tracking、donor recovery audit を分担する。
  donor_protection_floor:
    required_fields:
    - donor_team_ref
    - protected_surface_bundle_ref
    - minimum_command_continuity_ref
    - minimum_shift_coverage_ref
    - credential_freshness_ref
    - max_exportable_capacity_ref
    - temporary_aid_expiry_ref
    - ratified_at
    rules:
    - max_exportable_capacity_ref を超える lending を emergency goodwill で正当化してはならない。
    - credential_freshness_ref を満たさない borrowed role を donor floor 算定から除外してはならない。
    - temporary_aid_expiry_ref のない支援は covenant ではなく恒常依存とみなす。
  aid_refusal_adjudication:
    lawful_reason_codes:
    - floor_breach_risk
    - regulatory_or_contractual_boundary
    - credential_mismatch
    - donor_recovery_debt_overload
    - no_safe_handoff_path
    required_fields:
    - refusal_packet_id
    - request_packet_ref
    - reason_code_ref
    - refusal_owner_ref
    - counter_offer_or_null
    - review_forum_ref
    - issued_at
  asymmetric_support_covenant:
    required_bindings:
    - support_role_bundle_ref
    - max_duration_ref
    - receiver_backfill_obligation_ref
    - return_milestone_ref
    - donor_recovery_window_ref
    - portfolio_owner_ref
    rules:
    - receiver_backfill_obligation_ref のない片務支援を renewal してはならない。
    - return_milestone_ref を持たない covenant を evergreen support にしてはならない。
    - donor_recovery_window_ref を飛ばして連続支援を再開してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - donor protection floor registry
      - aid refusal reason code ratification
      - support covenant binding
      - return milestone approval
    GraphEngine:
      owns:
      - donor floor remaining-capacity computation
      - counter-offer feasibility check
      - covenant expiry projection
      - donor recovery window simulation
    GraphLint:
      owns:
      - floor-violating transfer lint
      - ownerless refusal lint
      - evergreen asymmetric support lint
      - missing-return-milestone lint
    archive_object:
      owns:
      - refusal packet
      - support covenant packet
      - counter-offer evidence bundle
      - donor recovery audit trail
  forbidden_shortcuts:
  - aid refusal を口頭断りだけで済ませる
  - donor floor を超えても urgency だけで lending する
  - return milestone なしで片務支援を延長する
  - credential mismatch を気合いで吸収する前提にする
  residual_open_points: []
scheduler_federated_reserve_corridor_governance:
  status: provisional_fixed
  statement: scheduler_federated_reserve_corridor_governance とは、cross-region isolation ring、federated reserve corridor、jurisdictional handoff を固定する規則である。
  core_claims:
  - cross-region mutual-aid は local extension ではない。region、network zone、data residency、labor or duty rule、customer-specific contract をまたぐたびに isolation ring を再確認しなければならない。
  - federated reserve corridor は、どの role bundle と credential class がどの境界をどの期限まで越えられるかを定めた packet である。corridor 不在の越境支援は emergency でも default 許可にしてはならない。
  - jurisdictional handoff では、authority source、command continuity、audit clock、applicable policy set を明示的に切り替える必要がある。receiver が存在しても authority transfer が曖昧なら handoff は未成立である。
  - isolated domain を貫通する支援は最小権限と最小期間を原則とし、role borrow を data or policy borrow と混同してはならない。
  - cross-region corridor は compliance latency も考慮しなければならない。help が早くても lawful audit が追いつかない corridor は admissible ではない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は isolation ring registry、corridor packet binding、jurisdictional handoff witness、cross-region audit trail を分担する。
  isolation_rings:
    ring_classes:
    - network_zone_ring
    - data_residency_ring
    - labor_or_duty_rule_ring
    - customer_contract_ring
    - regulatory_authority_ring
    rules:
    - 複数 ring をまたぐ支援では最も厳しい constraint を corridor の上限とする。
    - role borrow と policy borrow を同一 handoff で自動許可してはならない。
  federated_reserve_corridor:
    required_fields:
    - corridor_packet_id
    - origin_region_ref
    - destination_region_ref
    - allowed_role_bundle_ref
    - credential_class_ref
    - max_duration_ref
    - data_scope_ref
    - policy_set_ref
    - audit_clock_source_ref
    - corridor_owner_ref
    - issued_at
    rules:
    - data_scope_ref のない corridor を remote support 一般に拡張してはならない。
    - audit_clock_source_ref が未束縛の corridor を incident command handoff に用いてはならない。
    - corridor_owner_ref のない越境支援を mutual-aid として記録してはならない。
  jurisdictional_handoff:
    required_evidence:
    - authority_transfer_ref
    - receiver_command_acceptance_ref
    - applicable_policy_set_ref
    - time_normalization_ref
    - language_or_semantics_alignment_ref
    - audit_route_ref
    rules:
    - receiver_command_acceptance_ref がない handoff を unilateral redirect で済ませてはならない。
    - applicable_policy_set_ref が衝突する場合は split operation か local-only execution に戻す。
    - time_normalization_ref を省いて cross-region SLA を比較してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - isolation ring registry
      - corridor packet ratification
      - authority transfer binding
      - applicable policy set judgement
    GraphEngine:
      owns:
      - ring overlap analysis
      - corridor feasibility check
      - time normalization computation
      - handoff continuity simulation
    GraphLint:
      owns:
      - ownerless corridor lint
      - policy-borrow leakage lint
      - time-normalization omission lint
      - unaccepted handoff lint
    archive_object:
      owns:
      - corridor packet
      - authority transfer witness
      - cross-region audit bundle
      - handoff review trail
  forbidden_shortcuts:
  - corridor packet なしで越境支援を通す
  - role borrow を data or policy borrow と同一視する
  - receiver acceptance なしで jurisdictional handoff を成立扱いにする
  - time normalization を省いて SLA 遅延を比較する
  residual_open_points: []
scheduler_priority_override_charter_governance:
  status: provisional_fixed
  statement: scheduler_priority_override_charter_governance とは、portfolio priority override charter、customer-critical carveout、fairness exception sunset を固定する規則である。
  core_claims:
  - portfolio fairness は平時の原則であり、無条件の絶対法則ではない。ただし override は charter、owner、impact budget、expiry を持つときだけ lawful である。
  - customer-critical carveout は売上額の大きさ一般ではなく、life or safety impact、regulatory deadline、contractual irreversibility、broad contagion risk のような class で定義するべきである。
  - fairness exception は通常ルールの停止ではなく、適用範囲を狭く限定した temporary branch である。branch を閉じる sunset review を必須にしなければならない。
  - override により後順位へ押し出される queue には harm budget と compensation path を与えるべきである。例外適用の外部化だけ行い、負債の回収を忘れてはならない。
  - same customer への repeated carveout が慢性化したら emergency ではなく structural under-capacity を疑う。例外の回数そのものが portfolio design の evidence になる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は override charter registry、carveout class binding、impact budget tracking、sunset review audit を分担する。
  override_charter:
    required_fields:
    - override_charter_id
    - carveout_class_ref
    - override_owner_ref
    - affected_queue_family_ref
    - impact_budget_ref
    - expiry_ref
    - sunset_review_forum_ref
    - rollback_path_ref
    - issued_at
    rules:
    - impact_budget_ref のない override を lawful urgency として扱ってはならない。
    - expiry_ref のない carveout を temporary と呼んではならない。
    - rollback_path_ref のない override は fairness exception ではなく rule destruction である。
  customer_critical_carveout:
    classes:
    - life_or_safety_critical
    - regulatory_deadline_critical
    - contractual_irreversibility
    - broad_contagion_risk
    rules:
    - revenue importance 単独を carveout class にしてはならない。
    - same customer への repeated carveout は structural review を mandatory にする。
  fairness_exception_sunset:
    required_evidence:
    - expiry_reached_or_rescinded_ref
    - impacted_queue_compensation_ref
    - residual_harm_ref
    - repeat_frequency_ref
    - sunset_owner_ref
    - review_outcome_ref
    rules:
    - compensation path なしで exception を closed にしてはならない。
    - repeat_frequency_ref が高いのに structural review へ送らない sunset は無効である。
    - sunset_owner_ref のない expiry を silent expiry として処理してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - override charter registry
      - carveout class ratification
      - impact budget approval
      - sunset review judgement
    GraphEngine:
      owns:
      - harm budget propagation
      - affected queue compensation projection
      - repeat carveout detection
      - rollback path feasibility check
    GraphLint:
      owns:
      - budgetless override lint
      - revenue-only carveout lint
      - silent-expiry lint
      - compensation-missing sunset lint
    archive_object:
      owns:
      - override charter packet
      - impact evidence bundle
      - sunset review snapshot
      - structural review trail
  forbidden_shortcuts:
  - 重要顧客だからという理由だけで carveout する
  - impact budget なしで fairness を上書きする
  - expiry だけ過ぎたので自動的に正常復帰したとみなす
  - 後順位 queue の harm を未記録のまま override を閉じる
  residual_open_points: []
scheduler_reserve_debt_settlement_governance:
  status: provisional_fixed
  statement: scheduler_reserve_debt_settlement_governance とは、reserve debt ledger、donor recovery payback、reciprocity settlement を固定する規則である。
  core_claims:
  - mutual-aid と priority override は無償操作ではない。donor capacity loss、queue displacement、training delay、recovery burden を reserve debt ledger に記録しなければならない。
  - reserve debt は receiver-side debt、donor fatigue debt、portfolio fairness debt、cross-region compliance debt に分け、同じ payback rule を当ててはならない。
  - donor recovery payback は人数返却だけでは足りない。time-to-restoration、backfill fulfilment、deferred local obligations、readiness rebound を含めて closure を判断する。
  - reciprocity settlement は revenge accounting ではなく、chronic donor を防ぐための bounded balancing rule である。ageing budget と exception code を持たない reciprocal claim は無効にするべきである。
  - reserve debt を dashboard から消すことと debt を返済することは別である。closure witness を持たない debt retirement を nominal recovery とみなしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve debt ledger registry、payback schedule binding、settlement aging audit、closure witness preservation を分担する。
  reserve_debt_ledger:
    debt_classes:
    - receiver_capacity_debt
    - donor_fatigue_debt
    - portfolio_fairness_debt
    - cross_region_compliance_debt
    required_fields:
    - reserve_debt_id
    - origin_event_ref
    - debt_class_ref
    - debtor_team_ref
    - creditor_team_ref
    - aging_budget_ref
    - closure_witness_kind_ref
    - issued_at
    rules:
    - debt_class_ref のない residual burden を generic aftermath として放置してはならない。
    - aging_budget_ref のない debt を evergreen carryover にしてはならない。
  donor_recovery_payback:
    required_bindings:
    - payback_window_ref
    - backfill_fulfilment_ref
    - deferred_local_obligation_ref
    - readiness_rebound_ref
    - payback_owner_ref
    rules:
    - backfill_fulfilment_ref のない payback を nominal recovery とみなしてはならない。
    - payback_owner_ref のない返済計画を善意の自主回復に委ねてはならない。
  reciprocity_settlement:
    required_fields:
    - settlement_case_id
    - claim_basis_ref
    - exception_code_or_null
    - net_balance_ref
    - settlement_forum_ref
    - closure_witness_ref
    rules:
    - exception_code_or_null が null の repeated imbalance を放置してはならない。
    - claim_basis_ref のない reciprocal request を moral pressure として扱ってはならない。
    - closure_witness_ref のない settlement を帳尻合わせ完了として記録してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reserve debt ledger registry
      - payback window ratification
      - settlement forum judgement
      - closure witness approval
    GraphEngine:
      owns:
      - debt ageing computation
      - net balance projection
      - donor readiness rebound check
      - payback schedule simulation
    GraphLint:
      owns:
      - classless debt lint
      - aging-free debt lint
      - ownerless payback lint
      - closure-witness-missing settlement lint
    archive_object:
      owns:
      - reserve debt packet
      - payback schedule snapshot
      - settlement evidence bundle
      - closure witness archive
  forbidden_shortcuts:
  - reserve debt を dashboard 上の非表示で消し込む
  - payback owner なしで自主回復に任せる
  - net balance を moral pressure で回収する
  - closure witness なしで debt retirement を宣言する
  residual_open_points: []
scheduler_prebuild_readiness_governance:
  status: provisional_fixed
  statement: scheduler_prebuild_readiness_governance とは、campaign-season prebuild、forecast-triggered reserve staging、freeze window coordination を固定する規則である。
  core_claims:
  - known peak や campaign season に対して毎回 incident mode で対処してはならない。forecast profile と reserve prebuild window を持ち、通常期のうちに readiness を積むべきである。
  - forecast-triggered reserve staging は予報の存在だけではなく、confidence band、impact class、lead time、build cost を束ねた trigger で開く。false alarm のコストも prebuild judgement に含めなければならない。
  - freeze window coordination は変更停止の全面化ではない。critical path の消耗を防ぐために、which change families must pause, which may continue under guard を explicit に束縛する。
  - prebuild reserve は既存 team の hidden overtime で作ってはならない。backfill、training freshness、tooling readiness、vendor access validity を含めた staged asset として管理する必要がある。
  - forecast が外れた場合にも prebuild を waste と断じて終えてはならない。false-positive staging の review は次 season の threshold calibration に反映される。
  - DecisionLedger / GraphEngine / GraphLint / archive object は forecast profile registry、reserve staging trigger、freeze coordination binding、seasonal readiness audit を分担する。
  forecast_profiles:
    profile_classes:
