    - timeline_digest_ref のない packet を reconstructable incident review とみなしてはならない。
    - corrective_commitment_ref のない retrospective を learning-closed review と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - embargo exception policy
      - fast-lane activation policy
      - retrospective publication rule
      - public interest test binding
    GraphEngine:
      owns:
