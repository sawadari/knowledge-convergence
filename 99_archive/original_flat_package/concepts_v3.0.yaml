      - probation window scheduling
      - relapse trigger evaluation
      - badge history transition
    GraphLint:
      owns:
      - premature reinstatement lint
      - restriction-free recovery lint
      - relapse amnesia lint
      - advisory-closure coupling lint
    archive_object:
      owns:
      - reinstatement packet
      - probation monitoring log
      - relapse downgrade bundle
      - recovery timeline archive
  forbidden_shortcuts:
  - verification basis なしで badge を full recovery に戻す
  - restriction のない probationary badge を出す
  - repeat failure を新規 case 扱いして relapse history を切る
  residual_open_points: []
scheduler_federation_relay_correction_governance:
  status: provisional_fixed
  statement: scheduler_federation_relay_correction_governance とは、third-party relay obligation、syndication correction cascade、stale copy takedown lane を束ねて federation transparency の外部 surface への伝播後修正を固定する規則である。
  core_claims:
  - public transparency information は origin surface だけでは閉じない。third-party relay partner が存在するなら correction duty を契約・protocol の両面で束ねる必要がある。
  - relay obligation は単なる利用規約ではない。syndication scope、correction SLA、authenticity check、audit return を固定しなければ enforceable relay duty と呼べない。
  - correction cascade は通知メールでは足りない。downstream surface set、cascade deadline、completion digest を束ねなければ stale public copy を追跡できない。
  - takedown は削除だけでは不十分である。safe replacement link または authenticity redirect がなければ recipient は真の current disclosure へ戻れない。
  - relay correction は censorship lane ではない。takedown basis と exception rule を分け、lawful archival quotation や regulator-held mirror を同列に消してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は relay covenant、cascade projection、stale-copy lint、downstream evidence archive を分担する。
  third_party_relay_obligation:
    required_fields:
    - relay_partner_id
    - syndication_scope_ref
    - correction_sla_ref
    - authenticity_check_ref
    - audit_return_ref
    - bound_at_or_null
    rules:
    - syndication_scope_ref のない covenant を third-party relay obligation と呼んではならない。
    - correction_sla_ref のない relay を timely correction duty とみなしてはならない。
    - audit_return_ref のない relay partner を accountable syndication partner と称してはならない。
