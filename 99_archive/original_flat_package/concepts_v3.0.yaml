scheduler_federation_transparency_effectiveness_governance:
  status: provisional_fixed
  statement: scheduler_federation_transparency_effectiveness_governance とは、transparency effectiveness scorecard、recipient behavior telemetry、disclosure fatigue cap を束ねて federation disclosure の到達性・行動変化・過剰通知抑制を固定する規則である。
  core_claims:
  - transparency を出すだけでは改善にならない。effectiveness scorecard がなければ disclosure が実際に理解・行動・再発防止へつながったか比較できない。
  - recipient behavior telemetry は surveillance の口実ではない。event taxonomy、aggregation rule、privacy tier を固定しなければ transparency improvement に使える観測にならない。
  - fatigue cap がない disclosure 運用は self-defeating である。高頻度 advisory は重要通知の可視性まで削る。
  - recipient segment によって success metric は異なる。critical integrator の remediation completion と casual downstream user の acknowledgement を同一 score で混ぜてはならない。
  - telemetry があることと causal improvement が証明されたことは別である。scorecard は confidence band と measurement window を持たなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は scorecard policy、telemetry projection、fatigue breach lint、measurement archive を分担する。
  transparency_effectiveness_scorecard:
    required_fields:
