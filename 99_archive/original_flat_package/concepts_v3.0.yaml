scheduler_federation_oversight_accountability_continuity_governance:
  status: provisional_fixed
  statement: scheduler_federation_oversight_accountability_continuity_governance とは、oversight charter versioning、reviewer conflict disclosure、accountability handback trigger を束ねて、federation oversight の規程更新・審査独立性・責務返却境界を固定する規則である。
  core_claims:
  - oversight charter は最新版だけあればよいわけではない。supersedes lineage と scope diff がなければ、どの判断がどの規程版に従ったか追跡できない。
  - reviewer independence は属性宣言だけでは足りない。conflict disclosure に affected scope と mitigation rule がなければ dissent archive や benchmark fairness の信頼性が崩れる。
  - accountability は incident 終了と同時に自動返却してはならない。handback trigger がなければ crisis/probation 後の責務返却が都合で前倒しされる。
  - charter versioning は policy text 管理ではなく accountability continuity 管理である。effective transition と approval record を結ばない変更は運用境界を壊す。
  - conflict disclosure は reviewer 排除だけを意味しない。recusal、bounded participation、independent counter-sign のどれを取るかを mitigation rule として固定しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は charter lineage、conflict record、handback readiness、continuity archive を分担する。
  oversight_charter_versioning:
    required_fields:
    - charter_version_id
    - supersedes_version_ref
    - scope_diff_ref
    - effective_transition_ref
    - approval_record_ref
    - issued_at_or_null
    rules:
    - scope_diff_ref のない版更新を oversight charter versioning と呼んではならない。
    - effective_transition_ref のない版差替えを accountability-safe charter migration とみなしてはならない。
    - approval_record_ref のない charter を federation oversight authority と称してはならない。
  reviewer_conflict_disclosure:
    required_fields:
    - conflict_disclosure_id
    - reviewer_ref
    - conflict_class_ref
    - affected_scope_ref
    - mitigation_rule_ref
    - disclosed_at_or_null
    rules:
    - conflict_class_ref のない申告を reviewer conflict disclosure と呼んではならない。
    - affected_scope_ref のない disclosure を bounded reviewer independence evidence とみなしてはならない。
    - mitigation_rule_ref のない conflict handling を accountable review hygiene と称してはならない。
  accountability_handback_trigger:
    required_fields:
    - handback_trigger_id
    - trigger_condition_ref
    - current_custodian_ref
    - target_custodian_ref
    - acceptance_requirement_ref
    - armed_at_or_null
    rules:
    - trigger_condition_ref のない返却条件を accountability handback trigger と呼んではならない。
    - target_custodian_ref のない handback を accountable return path とみなしてはならない。
    - acceptance_requirement_ref のない責務返却を completed handback と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - charter version lineage
      - reviewer conflict disclosure record
      - handback trigger policy
      - acceptance requirement binding
    GraphEngine:
      owns:
      - scope diff impact projection
      - reviewer eligibility evaluation
      - handback readiness calculation
      - continuity gap routing
    GraphLint:
      owns:
      - missing-charter-diff lint
      - undisclosed-conflict lint
      - premature-handback lint
      - stale-charter-version lint
    archive_object:
      owns:
      - charter version snapshot set
      - conflict disclosure archive
      - handback trigger history
      - oversight continuity evidence bundle
  forbidden_shortcuts:
  - 新版 charter を旧版との差分なしでそのまま上書きする
  - reviewer conflict を reviewer の自己判断だけで非公開処理する
  - incident 終了宣言だけで accountability を自動返却する
  residual_open_points:
  - scheduler federation oversight amendment notice packet / reviewer recusal substitution lane / handback acceptance attestation をどこまで parameter 化するか
scheduler_federation_oversight_transition_operations_governance:
  status: provisional_fixed
  statement: scheduler_federation_oversight_transition_operations_governance とは、amendment notice packet、reviewer recusal substitution lane、handback acceptance attestation を束ねて、oversight change を実運用へ安全に流す transition 操作を固定する規則である。
  core_claims:
  - charter versioning だけでは現場は切り替わらない。impacted scope と acknowledgement rule を持つ amendment notice packet がなければ適用境界が伝播しない。
  - reviewer conflict disclosure が出たら recusal か継続かを曖昧にしてはならない。substitution lane がなければ quorum と independence が崩れる。
  - handback trigger が発火しても receiving custodian の acceptance attestation がなければ責務返却は成立しない。
  - notice packet は broadcast ではなく accountability packet である。recipient scope と acknowledgement rule を bound しない通知は既読も適用も証明できない。
  - recusal substitution は reviewer を差し替えるだけでは足りない。continuity rule がなければ途中審査の扱いがぶれる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は notice issuance、recusal routing、acceptance attestation、transition archive を分担する。
  charter_amendment_notice_packet:
    required_fields:
    - amendment_notice_id
    - changed_version_ref
    - impacted_policy_scope_ref
    - recipient_scope_ref
    - acknowledgement_rule_ref
    - issued_at_or_null
    rules:
    - impacted_policy_scope_ref のない通知を amendment notice packet と呼んではならない。
    - recipient_scope_ref のない通知を accountable transition notice とみなしてはならない。
    - acknowledgement_rule_ref のない通知を applied-charter evidence と称してはならない。
  reviewer_recusal_substitution_lane:
    required_fields:
    - recusal_lane_id
    - recused_reviewer_ref
    - recusal_basis_ref
    - substitute_pool_ref
    - continuity_rule_ref
    - activated_at_or_null
    rules:
    - recusal_basis_ref のない差替えを reviewer recusal substitution lane と呼んではならない。
    - substitute_pool_ref のない recusal handling を quorum-preserving replacement とみなしてはならない。
    - continuity_rule_ref のない差替えを review-safe continuity lane と称してはならない。
  handback_acceptance_attestation:
    required_fields:
    - acceptance_attestation_id
    - handback_trigger_ref
    - receiving_custodian_ref
    - acceptance_statement_ref
    - inherited_obligation_set_ref
    - attested_at_or_null
    rules:
    - handback_trigger_ref のない受領証跡を handback acceptance attestation と呼んではならない。
    - receiving_custodian_ref のない attestation を accountable handback receipt とみなしてはならない。
    - inherited_obligation_set_ref のない acceptance を complete responsibility receipt と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - amendment notice policy
      - recusal substitution authorization
      - handback acceptance attestation
      - obligation inheritance binding
    GraphEngine:
      owns:
      - recipient scope resolution
      - substitute reviewer routing
      - inherited obligation projection
      - transition completion calculation
    GraphLint:
      owns:
      - missing-notice-ack lint
      - recusal-without-substitute lint
      - partial-handback-attestation lint
      - continuity-rule-gap lint
    archive_object:
      owns:
      - amendment notice packet archive
      - recusal substitution history
      - acceptance attestation bundle
      - transition delivery evidence
  forbidden_shortcuts:
  - 通知先を曖昧なまま charter amendment を有効化する
  - conflict reviewer を recusal させず quorum だけ合わせる
  - 受領者の acceptance なしに handback 完了扱いにする
  residual_open_points:
  - scheduler federation oversight continuity escrow / temporary trustee appointment / orphaned accountability alarm をどこまで parameter 化するか
scheduler_federation_oversight_gap_containment_governance:
  status: provisional_fixed
  statement: scheduler_federation_oversight_gap_containment_governance とは、continuity escrow、temporary trustee appointment、orphaned accountability alarm を束ねて、oversight transition 中の責務空白を封じる規則である。
  core_claims:
  - responsibility gap は invisible queue に置いてはならない。continuity escrow がなければ disputed handback や recusal chain 中に obligation が無主化する。
  - temporary trustee は単なる代理人ではない。mandate scope と expiry rule を持たない trustee 代行は新たな accountability drift を生む。
  - orphaned accountability alarm は監査向けの後追い通知では遅い。response deadline を持つ active alarm でなければ gap を運用で塞げない。
  - continuity escrow は action freeze の口実ではなく protection boundary である。protected obligation scope と frozen mutation rule を bound しないと責務と変更が混線する。
  - temporary trustee appointment は vacancy と conflict の両方に対応すべきだが、basis を分けて記録しなければ exception と常態が区別できない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は escrow binding、temporary trustee mandate、alarm dispatch、gap evidence archive を分担する。
  continuity_escrow:
    required_fields:
    - escrow_id
    - protected_obligation_scope_ref
    - entry_trigger_ref
    - frozen_mutation_rule_ref
    - release_condition_ref
    - opened_at_or_null
    rules:
    - protected_obligation_scope_ref のない退避を continuity escrow と呼んではならない。
    - frozen_mutation_rule_ref のない escrow を accountability-safe protection boundary とみなしてはならない。
    - release_condition_ref のない escrow を bounded continuity hold と称してはならない。
  temporary_trustee_appointment:
    required_fields:
    - trustee_appointment_id
    - vacancy_or_conflict_basis_ref
    - interim_custodian_ref
    - mandate_scope_ref
    - expiry_rule_ref
    - appointed_at_or_null
    rules:
    - vacancy_or_conflict_basis_ref のない代行任命を temporary trustee appointment と呼んではならない。
    - mandate_scope_ref のない trustee を bounded interim custodian とみなしてはならない。
    - expiry_rule_ref のない interim mandate を accountable temporary trusteeship と称してはならない。
  orphaned_accountability_alarm:
    required_fields:
    - accountability_alarm_id
    - uncovered_scope_ref
    - detection_rule_ref
    - escalation_target_ref
    - response_deadline_ref
    - armed_at_or_null
    rules:
    - uncovered_scope_ref のない警報を orphaned accountability alarm と呼んではならない。
    - detection_rule_ref のない alarm を governed gap detection とみなしてはならない。
    - response_deadline_ref のない escalation を time-bound accountability recovery と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - continuity escrow policy
      - temporary trustee appointment record
      - orphaned accountability alarm policy
      - release condition binding
    GraphEngine:
      owns:
      - uncovered scope detection
      - temporary trustee candidate routing
      - escrow state projection
      - alarm deadline tracking
    GraphLint:
      owns:
      - escrow-without-scope lint
      - trustee-mandate-gap lint
      - silent-orphaned-accountability lint
      - expired-temporary-trustee lint
    archive_object:
      owns:
      - continuity escrow archive
      - temporary trustee appointment bundle
      - orphaned accountability alarm history
      - gap closure evidence set
  forbidden_shortcuts:
  - responsibility gap を informal queue で吸収する
  - temporary trustee を mandate scope と expiry なしで延命する
  - orphaned accountability alarm を後追い監査メモで代替する
  residual_open_points:
  - scheduler federation oversight exception docket / sunset waiver ledger / overdue accountability escalation をどこまで parameter 化するか
scheduler_federation_oversight_exception_escalation_governance:
  status: provisional_fixed
  statement: scheduler_federation_oversight_exception_escalation_governance とは、exception docket、sunset waiver ledger、overdue accountability escalation を束ねて、temporary arrangement の例外化と失効後の強制送致境界を固定する規則である。
  core_claims:
  - temporary trustee や escrow は例外であって新常態ではない。exception docket がなければ例外の根拠と影響範囲が失われる。
  - waiver は理由だけでは足りない。sunset date と renewal limit がない waiver は恒久的 loophole になる。
  - overdue accountability は担当者の善意で待ってはならない。escalation path と enforced action を持つ escalation がなければ gap containment が終わらない。
  - exception docket は監査ログではなく active governance object である。affected accountability scope と approving authority を束ねなければ review 不能になる。
  - sunset waiver ledger は compensating control を必須にすべきである。waive だけ記録して mitigation を残さない運用は drift を加速させる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は exception binding、waiver sunset、overdue escalation、exception archive を分担する。
  oversight_exception_docket:
    required_fields:
    - docket_id
    - exception_basis_ref
    - affected_accountability_scope_ref
    - approving_authority_ref
    - expiry_or_review_deadline_ref
    - opened_at_or_null
    rules:
    - exception_basis_ref のない記録を oversight exception docket と呼んではならない。
    - affected_accountability_scope_ref のない docket を bounded oversight exception とみなしてはならない。
    - expiry_or_review_deadline_ref のない exception を time-governed exception lane と称してはならない。
  sunset_waiver_ledger:
    required_fields:
    - waiver_entry_id
    - waived_obligation_ref
    - compensating_control_ref
    - sunset_date_ref
    - renewal_limit_ref
    - recorded_at_or_null
    rules:
    - waived_obligation_ref のない項目を sunset waiver ledger と呼んではならない。
    - compensating_control_ref のない waiver を accountability-safe temporary relief とみなしてはならない。
    - sunset_date_ref のない waiver を self-expiring exception と称してはならない。
  overdue_accountability_escalation:
    required_fields:
    - overdue_escalation_id
    - overdue_condition_ref
    - current_owner_ref
    - escalation_path_ref
    - enforced_action_ref
    - escalated_at_or_null
    rules:
    - overdue_condition_ref のない送致を overdue accountability escalation と呼んではならない。
    - escalation_path_ref のない escalation を governed forced recovery path とみなしてはならない。
    - enforced_action_ref のない escalation を accountability enforcement と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - exception docket policy
      - sunset waiver ledger
      - overdue escalation rule
      - renewal limit binding
    GraphEngine:
      owns:
      - exception deadline tracking
      - waiver sunset countdown
      - overdue condition detection
      - forced action routing
    GraphLint:
      owns:
      - scope-free-exception lint
      - waiver-without-compensating-control lint
      - silent-overdue lint
      - renewal-limit-bypass lint
    archive_object:
      owns:
      - exception docket archive
      - waiver ledger history
      - overdue escalation packet archive
      - enforcement evidence bundle
  forbidden_shortcuts:
  - 例外根拠なしに temporary trustee 運用を延長する
  - compensating control なしに waiver だけ積み上げる
  - 期限超過を owner remider だけで済ませて escalation しない
  residual_open_points:
  - scheduler federation oversight public accountability digest / conflict transparency badge / charter drift bulletin をどこまで parameter 化するか
scheduler_federation_oversight_drift_transparency_governance:
  status: provisional_fixed
  statement: scheduler_federation_oversight_drift_transparency_governance とは、public accountability digest、conflict transparency badge、charter drift bulletin を束ねて、oversight drift と conflict 状況を外部説明可能にする規則である。
  core_claims:
  - public accountability は全文公開ではなく digest 化すべきである。active charter version と accountable scope summary がなければ外部は現在の統治面を判断できない。
  - reviewer conflict disclosure は internal log だけでは足りない。conflict transparency badge がなければ public benchmark や dissent archive の読み手が独立性水準を評価できない。
  - charter drift は silent change にしてはならない。behaviorally relevant diff を示す bulletin がなければ stakeholder は旧規程前提で運用する。
  - digest は簡略化のための曖昧化ではない。publication audience と reporting period を bound しない公開は比較不能になる。
  - conflict badge は shame label ではなく mitigation summary を伴う透明性単位である。status だけを出して mitigation を出さない運用は誤解を増やす。
  - DecisionLedger / GraphEngine / GraphLint / archive object は digest policy、badge rendering、drift bulletin generation、transparency archive を分担する。
  public_accountability_digest:
    required_fields:
    - digest_id
    - reporting_period_ref
    - active_charter_version_ref
    - accountable_scope_summary_ref
    - publication_audience_ref
    - published_at_or_null
    rules:
    - reporting_period_ref のない公開を public accountability digest と呼んではならない。
    - active_charter_version_ref のない要約を current oversight digest とみなしてはならない。
    - publication_audience_ref のない digest を accountable public transparency と称してはならない。
  conflict_transparency_badge:
    required_fields:
    - badge_id
    - reviewer_or_panel_ref
    - conflict_status_ref
    - mitigation_summary_ref
    - display_rule_ref
    - rendered_at_or_null
    rules:
    - conflict_status_ref のない表示を conflict transparency badge と呼んではならない。
    - mitigation_summary_ref のない badge を intelligible reviewer transparency とみなしてはならない。
    - display_rule_ref のない表示を governed public badge と称してはならない。
  charter_drift_bulletin:
    required_fields:
    - drift_bulletin_id
    - baseline_version_ref
    - current_version_ref
    - behaviorally_relevant_diff_ref
    - advisory_rule_ref
    - issued_at_or_null
    rules:
    - baseline_version_ref のない通知を charter drift bulletin と呼んではならない。
    - behaviorally_relevant_diff_ref のない bulletin を stakeholder-actionable drift notice とみなしてはならない。
    - advisory_rule_ref のない drift 通知を accountable guidance update と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - public accountability digest policy
      - conflict badge policy
      - charter drift bulletin rule
      - audience binding
    GraphEngine:
      owns:
      - digest summary generation
      - badge rendering
      - behaviorally relevant diff extraction
      - bulletin recipient routing
    GraphLint:
      owns:
      - digest-without-charter-version lint
      - badge-without-mitigation lint
      - silent-drift lint
      - audience-mismatch lint
    archive_object:
      owns:
      - public digest archive
      - badge render history
      - charter drift bulletin archive
      - transparency publication snapshot
  forbidden_shortcuts:
  - active charter version を伏せたまま accountability digest を出す
  - conflict status だけ出して mitigation summary を省略する
  - behaviorally relevant diff を示さずに drift notice を出したことにする
  residual_open_points:
  - scheduler federation oversight lineage replay packet / recusal history archive / handback closure certificate をどこまで parameter 化するか
scheduler_federation_oversight_closure_archive_governance:
  status: provisional_fixed
  statement: scheduler_federation_oversight_closure_archive_governance とは、lineage replay packet、recusal history archive、handback closure certificate を束ねて、oversight transition の再生可能性と閉鎖証明を固定する規則である。
  core_claims:
  - oversight は current digest だけでは足りない。lineage replay packet がなければ charter drift・conflict handling・handback の経路を後から再構成できない。
  - reviewer independence は単発 badge ではなく history で見る必要がある。recusal history archive がないと recurring conflict や panel bias を検証できない。
  - handback は acceptance attestation だけで終わらない。closure certificate がなければ residual obligation check と reopen rule が結び付かない。
  - lineage replay packet は full log dump ではなく accountable reconstruction artifact である。charter lineage と accountability transition を束ねなければ replay 不能になる。
  - recusal history archive は stigma archive ではない。substitution outcome と retention rule を持つことで only-necessary disclosure に留める。
  - DecisionLedger / GraphEngine / GraphLint / archive object は replay binding、recusal archive policy、closure certificate issuance、closure archive を分担する。
  oversight_lineage_replay_packet:
    required_fields:
    - replay_packet_id
    - charter_lineage_ref
    - accountability_transition_ref
    - dispute_or_incident_scope_ref
    - replay_authority_ref
    - generated_at_or_null
    rules:
    - charter_lineage_ref のない artifact を oversight lineage replay packet と呼んではならない。
    - accountability_transition_ref のない replay を handback-verifiable lineage reconstruction とみなしてはならない。
    - replay_authority_ref のない lineage packet を accountable replay artifact と称してはならない。
  recusal_history_archive:
    required_fields:
    - recusal_archive_id
    - reviewer_ref
    - recusal_event_set_ref
    - substitution_outcome_ref
    - retention_rule_ref
    - archived_at_or_null
    rules:
    - recusal_event_set_ref のない保存を recusal history archive と呼んではならない。
    - substitution_outcome_ref のない archive を review continuity evidence とみなしてはならない。
    - retention_rule_ref のない recusal archive を bounded independence history と称してはならない。
  handback_closure_certificate:
    required_fields:
    - closure_certificate_id
    - handback_acceptance_ref
    - residual_obligation_check_ref
    - closure_approver_ref
    - reopen_rule_ref
    - certified_at_or_null
    rules:
    - handback_acceptance_ref のない証明を handback closure certificate と呼んではならない。
    - residual_obligation_check_ref のない closure を residual-safe handback close とみなしてはならない。
    - reopen_rule_ref のない closure certificate を accountable finalization artifact と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - lineage replay policy
      - recusal history retention policy
      - handback closure certificate
      - reopen rule binding
    GraphEngine:
      owns:
      - lineage replay assembly
      - recusal sequence projection
      - residual obligation check calculation
      - closure certificate readiness evaluation
    GraphLint:
      owns:
      - replay-without-transition lint
      - recusal-history-gap lint
      - closure-without-residual-check lint
      - reopen-rule-missing lint
    archive_object:
      owns:
      - lineage replay packet archive
      - recusal history archive
      - closure certificate archive
      - oversight closure evidence bundle
  forbidden_shortcuts:
  - lineage replay を digest の再表示で代替する
  - recusal history を単発 badge の履歴なしで済ませる
  - residual obligation check なしに handback closure certificate を出す
  residual_open_points:
  - scheduler federation cross-federation appeal lane / neutral convenor selection / binding precedent digest をどこまで parameter 化するか
scheduler_federation_appeal_precedent_governance:
  status: provisional_fixed
  statement: scheduler_federation_appeal_precedent_governance とは、cross-federation appeal lane、neutral convenor selection、binding precedent digest を束ねて federation 間の oversight 異議申立てと拘束力付き判断継承を固定する規則である。
  core_claims:
  - closure archive があっても appeal lane がなければ federation 間異議申立ては ad hoc になる。source closure、appeal basis、admissibility window、stay rule を束ねなければ lawful appellate lane と呼べない。
  - neutral convenor は名目中立では足りない。candidate pool、disqualifying conflict rule、selection method、ratification quorum を固定しなければ reviewer conflict が上位審に再発する。
  - binding precedent digest は単なる要約ではない。canonical holding、binding scope、distinguishable fact pattern、doctrine effective date を明示しなければ再利用可能な規範単位にならない。
  - appeal lane は source federation の closure record を直接上書きしてはならない。appeal outcome は source case chain を参照しつつ append-only に閉じる必要がある。
  - neutral convenor selection は source federation の convenience appointment ではない。conflict screen を通らない chair を default convenor にしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は appeal admissibility、convenor neutrality、precedent scope、appeal archive を分担する。
  cross_federation_appeal_lane:
    required_fields:
    - appeal_lane_id
    - source_closure_ref
    - appellant_federation_ref
    - respondent_federation_ref
    - appeal_basis_ref
    - admissibility_window_ref
    - stay_rule_ref
    - opened_at_or_null
    rules:
    - source_closure_ref のない異議申立てを cross-federation appeal lane と呼んではならない。
    - appeal_basis_ref のない appeal を admissible appellate intake とみなしてはならない。
    - stay_rule_ref のない appeal lane を source-safe appellate corridor と称してはならない。
  neutral_convenor_selection:
    required_fields:
    - convenor_selection_id
    - candidate_pool_ref
    - disqualifying_conflict_rule_ref
    - selection_method_ref
    - ratification_quorum_ref
    - appointed_at_or_null
    rules:
    - candidate_pool_ref のない指名を neutral convenor selection と呼んではならない。
    - disqualifying_conflict_rule_ref のない convenor 指名を conflict-screened appointment とみなしてはならない。
    - ratification_quorum_ref のない convenor 決定を federation-ratified neutral chair と称してはならない。
  binding_precedent_digest:
    required_fields:
    - precedent_digest_id
    - canonical_holding_ref
    - binding_scope_ref
    - distinguishable_fact_pattern_ref
    - doctrine_effective_date_ref
    - publication_tier_ref
    - issued_at_or_null
    rules:
    - canonical_holding_ref のない digest を binding precedent digest と呼んではならない。
    - binding_scope_ref のない digest を federation-reusable precedent とみなしてはならない。
    - distinguishable_fact_pattern_ref のない digest を safe doctrine reuse guide と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - appeal admissibility binding
      - neutral convenor ratification
      - precedent digest registry
      - binding scope declaration
    GraphEngine:
      owns:
      - appeal window / stay evaluation
      - convenor conflict screening
      - precedent scope matching
      - distinguishable fact pattern routing
    GraphLint:
      owns:
      - basis-free appeal lint
      - interested-convenor lint
      - scope-free precedent lint
      - source-overwrite appeal lint
    archive_object:
      owns:
      - appeal packet archive
      - convenor selection trail
      - precedent digest history
      - cross-federation appeal witness bundle
  forbidden_shortcuts:
  - source federation の closure owner を conflict screen なしで default convenor にする
  - admissibility window や appeal basis を空のまま appeal lane を開く
  - binding scope のない appeal note を precedent として横展開する
  residual_open_points:
  - scheduler federation confidential evidence redaction tier / sealed appendix access lane / public summary floor をどこまで registry 化するか
scheduler_federation_autonomous_policy_agent_governance:
  status: provisional_fixed
  statement: scheduler_federation_autonomous_policy_agent_governance とは、autonomous policy agent credential、model drift challenge lane、human override supremacy clause を束ねて、federation 内で agent が自律的に作用できる範囲と、人間が常に停止・凍結・巻き戻しできる境界を固定する規則である。
  core_claims:
  - autonomous policy agent は独立主権者ではない。credential によって model lineage、policy pack lineage、許可 action family、authority ceiling、expiry、revocation lane が束縛されて初めて constitutional actor として扱える。
  - agent の性能指標と合法性指標は分ける。benchmark suite・shadow replay・policy drift detector・contradictory human ruling のいずれかが challenge を開いたときは、convenience より freeze-safe が優先される。
  - model drift challenge lane は advisory review ではない。trigger family、evidence bundle、review authority、temporary freeze rule、resolution path を持たなければ lawful な停止・再開・剥奪にならない。
  - human override supremacy は recommendation override だけを意味しない。agent が scope 内で合法に動いていても、life-safety、constitutional contradiction、contestability、declared emergency、freeze 中の manual takeover では human final stop が常に優先する。
  - agent は自分自身の credential 更新、freeze 解除、override 正当化、public notice 完了を self-certify してはならない。これらは human authority lane と audit witness に残る必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は credential registry、drift evidence evaluation、override lint、reinstatement/revocation archive を分担する。
  autonomous_policy_agent_credential:
    required_fields:
    - agent_credential_id
    - agent_class_ref
    - model_artifact_digest_ref
    - policy_pack_digest_ref
    - authorized_action_family_ref
    - scope_boundary_ref
    - authority_ceiling_ref
    - benchmark_suite_ref
    - expiry_ref
    - revocation_rule_ref
    - fallback_human_owner_ref
    - ratified_at_or_null
    rules:
    - model_artifact_digest_ref と policy_pack_digest_ref のない agent を constitutional actor と呼んではならない。
    - authorized_action_family_ref のない agent を canonical state mutation や external commitment に使ってはならない。
    - fallback_human_owner_ref のない credential を unattended lawful automation とみなしてはならない。
  model_drift_challenge_lane:
    required_bindings:
    - challenge_lane_id
    - trigger_family_ref
    - evidence_bundle_ref
    - review_authority_ref
    - temporary_freeze_rule_ref
    - challenge_window_ref
    - resolution_path_ref
    - opened_at_or_null
    states:
    - shadow_only
    - active
    - challenged
    - temporarily_frozen
    - reinstatement_pending
    - revoked
    rules:
    - evidence_bundle_ref のない challenge を lawful drift review と呼んではならない。
    - temporary_freeze_rule_ref のない challenge lane を safe suspension path とみなしてはならない。
    - review_authority_ref なしに challenged から active へ戻してはならない。
    trigger_families:
    - benchmark breach
    - policy drift detector escalation
    - contradictory human ruling
    - missing telemetry or lineage gap
    - contestability review opening
    - security incident or emergency declaration
  human_override_supremacy_clause:
    required_fields:
    - override_clause_id
    - override_owner_ref
    - preemption_scope_ref
    - non_delegable_stop_rule_ref
    - mandatory_logging_ref
    - public_notice_rule_ref
    - restoration_gate_ref
    - activated_at_or_null
    precedence_rules:
    - life-safety または active compromise を伴う incident command
    - constitutional contradiction または ratified human ruling と agent ruling の衝突
    - contestability review または meta-governance emergency override の発火
    - temporary_freeze が active な期間の manual takeover
    - public notice 未完了の forced preemption
    rules:
    - non_delegable_stop_rule_ref のない clause を human supremacy と呼んではならない。
    - mandatory_logging_ref のない manual takeover を lawful override とみなしてはならない。
    - restoration_gate_ref のない override 解除を safe reinstatement と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - agent credential registry
      - revocation / suspension binding
      - human override declaration
      - reinstatement approval record
    GraphEngine:
      owns:
      - benchmark / shadow replay evaluation
      - drift evidence aggregation
      - freeze propagation and expiry timer
      - human-vs-agent precedence check
    GraphLint:
      owns:
      - credential-missing agent lint
      - benchmark-free automation lint
      - self-reinstatement lint
      - override-without-notice lint
    archive_object:
      owns:
      - credential packet archive
      - drift challenge evidence bundle
      - override notice history
      - reinstatement / revocation history
  forbidden_shortcuts:
  - benchmark_suite_ref なしで autonomous agent を active canonical actor にする。
  - temporary freeze を advisory flag と誤魔化して state mutation を継続する。
  - agent 自身の self-evaluation だけで drift challenge を閉じる。
  - human override を notice なしの silent operator intervention にする。
  - revoked credential を lineage bridge なしで再利用する。
  residual_open_points: []
accountable_identity_slice_exception_threshold_governance:
  status: provisional_fixed
  statement: accountable_identity_slice_exception_threshold_governance とは、life-safety / active compromise 例外で accountable_identity_slice を開ける閾値を detector family / sink class ごとに分け、bounded_actor_slice で足りる場面と single named principal 向け限定 reveal が必要な場面を区別する規則である。
  core_claims:
  - accountable_identity_slice は default reveal class ではない。まず bounded_actor_slice で containment 可能かを判定し、それが失敗した場合にだけ例外 lane を開く。
  - 閾値は detector ごとの生データ量ではなく、detector family の信号性質と sink class の不可逆性で決める。same score でも irreversible_resource_lock は authoritative_state より厳しい。
  - behavioral inference 系 detector は、そのまま accountable_identity_slice を正当化しない。policy drift、flooding、replay、local convention のような間接推論は、direct compromise 系へ upgrade されない限り bounded_actor_slice を上限とする。
  - accountable_identity_slice を許しても audience は single named principal または 1 supervised session に限定し、bulk disclosure、cache promotion、public explanation 流用を禁止する。
  - 例外 lane は identity reveal の権利ではなく containment の責務である。post-confirm が失敗したときは auto-reseal、derived export revoke、continued hold、violation event を同時に起動する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は threshold matrix、direct-route evidence、exception session、auto-reseal branch を分担する。
  detector_family_classes:
    direct_system_compromise:
      statement: direct system observation、access-control / routing log、authenticated incident command など、compromise または imminent harm を直接束縛できる family。
    corroborated_compromise_or_leak:
      statement: suspected_leak / route_identity / effect_realization について multi-source corroboration と direct route evidence が揃った family。
    supervised_human_safety_report:
      statement: named principal または supervised operator からの life-safety report で、incident command と session witness が束縛される family。
    inferred_behavioral_detector:
      statement: policy drift、flooding、replay、local convention、cadence anomaly などの行動推論 family。identity reveal 例外の直接根拠には使わない。
  threshold_matrix:
    direct_system_compromise:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: life_safety_or_active_compromise_with_single_principal
      public_or_external_commitment: active_compromise_or_imminent_life_safety_with_direct_route_evidence
      irreversible_resource_lock: extreme_only_with_central_or_predelegated_incident_authority
    corroborated_compromise_or_leak:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: active_compromise_only_and_dual_corroboration
      public_or_external_commitment: extreme_only_with_direct_route_evidence
      irreversible_resource_lock: forbidden_without_direct_system_compromise_upgrade
    supervised_human_safety_report:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: life_safety_only_and_supervised_session
      public_or_external_commitment: life_safety_only_and_single_named_principal
      irreversible_resource_lock: forbidden_without_direct_system_compromise_upgrade
    inferred_behavioral_detector:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: forbidden
      public_or_external_commitment: forbidden
      irreversible_resource_lock: forbidden
  activation_requirements:
    mandatory_preconditions:
    - life_safety_flag または active_compromise_flag が true である
    - alternative bounded_actor_slice path が failed または insufficient である
    - security_lane と custody_lane が active である
    - append-only precommit、HSM attested witness、human observer witness が先に固定される
    - audience が 1 名または 1 supervised session に束縛される
    - clear identity を authority post-confirm 前の final evidence / penalty / public explanation に流用しない
    numeric_caps_by_sink_class:
      authoritative_state:
        ttl: 1時間
        post_confirm_sla: 1時間
      public_or_external_commitment:
        ttl: 30分
        post_confirm_sla: 30分
      irreversible_resource_lock:
        ttl: 15分
        post_confirm_sla: 15分
    upgrade_requirements:
    - irreversible_resource_lock での例外は central_authority または pre-ratified incident command delegation を要する
    - corroborated_compromise_or_leak が irreversible_resource_lock に触れるときは direct_system_compromise family への upgrade が必要
    - supervised_human_safety_report 単独では lock / public commitment の恒久変更を正当化しない
  tool_responsibilities:
    DecisionLedger:
      owns:
      - threshold matrix registry
      - exception basis binding
      - single-principal authorization
      - post-confirm / auto-reseal judgement
    GraphEngine:
      owns:
      - detector-family and sink-class normalization
      - direct-route evidence evaluation
      - ttl and post-confirm timer
      - derived export revoke execution
    GraphLint:
      owns:
      - behavioral-detector identity reveal lint
      - multi-recipient accountable-slice lint
      - missing-direct-route-evidence lint
      - post-confirm-missing exception lint
    archive_object:
      owns:
      - sealed exception session digest
      - direct-route evidence packet
      - auto-reseal / revoke history
      - exception review trail
  forbidden_shortcuts:
  - policy drift や flooding のような behavioral detector だけで accountable_identity_slice を開く。
  - bounded_internal_shared 以下の sink class に対して convenience のために clear identity を出す。
  - single named principal 制約を破って recipient を増やす。
  - TTL 超過後も derived export を revoke せずに保持する。
  - accountable_identity_slice を canonical archive object の通常 surface へ昇格する。
  residual_open_points: []
execution_capsule_blob_boundary_governance:
  status: provisional_fixed
  statement: execution_capsule_blob_boundary_governance とは、execution capsule の binary payload を inline blob と immutable pinned blob のどちらで保持するかを、root profile と replay class を主軸に、sink strictness・protected facet・legal hold を strict 化条件として固定する規則である。
  core_claims:
  - inline blob は storage optimization であり、canonical proof の downgrade path ではない。manifest に digest・byte-length・serialization profile・replay class が束縛されていない payload を inline 正本と呼んではならない。
  - size 境界は replay class より弱い。forensic replay、active legal hold、strict sink、protected facet、identity envelope 依存がある payload は小さくても pinned を強制する。
  - deterministic replay は例外的に小さい canonical text payload だけ inline を許す。binary sidecar、多部品 payload、mutable serializer、externalized commitment を伴う場合は pinned を強制する。
  - profile 差は summary_only / analytical_replay の inline ceiling と max part count にだけ表す。strict 化は monotone tightening とし、looser profile への downgrade で pin 要件を外してはならない。
  - pointer 単独、post-hoc repin、current system からの再生成を canonical replay artifact の代替にしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object / external blob store は boundary registry、blob lifecycle、forced-pin lint、archive binding を分担する。
  profile_boundary_registry:
    regulated_domain:
      summary_only:
        inline_max_bytes: 131072
        max_inline_parts: 1
        default_materialization: inline_or_pin
      analytical_replay:
        inline_max_bytes: 262144
        max_inline_parts: 1
        default_materialization: inline_or_pin
      deterministic_replay:
        inline_max_bytes: 65536
        max_inline_parts: 1
        default_materialization: pinned_unless_canonical_text_exception
      forensic_replay:
        inline_max_bytes: 0
        max_inline_parts: 0
        default_materialization: pinned_mandatory
    engineering_tradeoff_domain:
      summary_only:
        inline_max_bytes: 524288
        max_inline_parts: 2
        default_materialization: inline_or_pin
      analytical_replay:
        inline_max_bytes: 1048576
        max_inline_parts: 2
        default_materialization: inline_or_pin
      deterministic_replay:
        inline_max_bytes: 262144
        max_inline_parts: 1
        default_materialization: pinned_unless_canonical_text_exception
      forensic_replay:
        inline_max_bytes: 0
        max_inline_parts: 0
        default_materialization: pinned_mandatory
    organizational_or_social_domain:
      summary_only:
        inline_max_bytes: 1048576
        max_inline_parts: 2
        default_materialization: inline_or_pin
      analytical_replay:
        inline_max_bytes: 2097152
        max_inline_parts: 3
        default_materialization: inline_or_pin
      deterministic_replay:
        inline_max_bytes: 262144
        max_inline_parts: 1
        default_materialization: pinned_unless_canonical_text_exception
      forensic_replay:
        inline_max_bytes: 0
        max_inline_parts: 0
        default_materialization: pinned_mandatory
  forced_pin_triggers:
  - replay_class = forensic_replay
  - legal_hold_state = active
  - sink_class ∈ {public_or_external_commitment, irreversible_resource_lock}
  - protected_facet_flag = true
  - sealed_identity_envelope_body_dependency = true
  - payload_parts > max_inline_parts(profile, replay_class)
  - payload_byte_length > inline_max_bytes(profile, replay_class)
  - deterministic_replay で canonical text / fixed serializer / fixed environment descriptor を満たさない
  - binary sidecar または mutable alias への依存がある
  deterministic_inline_exception:
    admissible_when:
    - replay_class = deterministic_replay
    - payload は単一 canonical text object または deterministic serialization 済み single-part blob である
    - payload_byte_length <= inline_max_bytes(profile, deterministic_replay)
    - protected_facet_flag = false かつ sink_class ∉ {public_or_external_commitment, irreversible_resource_lock}
    - manifest に digest・byte-length・serializer version・environment descriptor が束縛されている
    non_implications:
    - deterministic replay 一般で inline を推奨することを意味しない
    - legal hold や forensic review の pin 要件を緩めることを意味しない
  tool_responsibilities:
    DecisionLedger:
      owns:
      - profile boundary registry
      - forced-pin judgement
      - purge / reopen admissibility decision
      - materialization override reason
    GraphEngine:
      owns:
      - blob byte-length and part-count capture
      - pin / unpin lifecycle
      - serializer / environment descriptor capture
      - replay request linkage
    GraphLint:
      owns:
      - oversize-inline lint
      - forensic-inline lint
      - pointer-only canonicalization lint
      - post-hoc repin without witness lint
    archive_object:
      owns:
      - manifest digest binding
      - inline payload embedding
      - pinned blob digest linkage
      - purge / reopen audit trail
    external_blob_store:
      owns:
      - immutable content-addressed blob
      - retention pin state
      - retrieve audit log
      - no normative meaning without manifest binding
  forbidden_shortcuts:
  - size だけで inline / pinned を決め、replay class や sink strictness を無視する。
  - forensic replay や legal hold active の payload を小さいからという理由で inline に留める。
  - mutable URL や latest alias だけを残して canonical pinned blob の代替とする。
  - raw payload を失った後で current system から再生成し、元の pinned blob があったことにする。
  - deterministic replay と称しながら multi-part binary payload を silent inline する。
  residual_open_points: []
claim_criticality_governance:
  status: provisional_fixed
  statement: claim_criticality_governance とは、主要主張 / context-sensitive claim / 補助主張を、branch effect・harm / irreversibility・authority reach・external commitment reach に基づいて criticality band へ分類し、GraphLint の severity / weight / required evidence / escalation routing に写像する規則である。
  core_claims:
  - 主要主張は文章上の見出しではなく、current action の lawful/admissible branch、approval path、accountability binding、rollback readiness、external commitment のいずれかを変えうる claim である。
  - context-sensitive claim は activation predicate が true の文脈でだけ主要主張化する。predicate が false または未束縛なら、主要主張として扱ってはならない。
  - 補助主張は説明・追跡・較正には必要でも、それ単独では current action の lawful branch を変えない claim である。補助主張を束ねても、active な主要主張の欠落を埋めたことにはならない。
  - criticality は truth importance の一般論ではなく、今の decision frame に対する branch importance である。stakeholder の声量や文量の多さを criticality 根拠にしてはならない。
  - GraphLint は issue 抽出の前に claim role と criticality band を束縛し、その結果を severity floor、weight floor、required evidence class、escalation route に写像する。単一総合点で高 criticality claim の欠落を相殺してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は claim role binding、activation state、lint judgement、critical trace archive を分担する。
  claim_role_rules:
    primary_claim:
      statement: activation predicate の有無にかかわらず、現行 frame で false / ambiguity / evidence gap が execute|hold|rollback|escalate|reject の分岐、approval path、責任分担、external commitment を変えうる claim。
      typical_cases:
      - safety gate
      - regulatory / contractual admissibility
      - authority chain validity
      - irreversible resource lock precondition
      - public or customer commitment basis
    context_sensitive_claim:
      statement: 特定 profile / operation / sink / decision context でだけ primary_claim 化する claim。activation predicate ref と inactive 時の downgraded role を必須にする。
      mandatory_fields:
      - activation_predicate_ref
      - active_scope_ref
      - inactive_role_ref
    auxiliary_claim:
      statement: 説明補助、背景説明、calibration、coverage enrichment、implementation detail を支えるが、それ単独では現行 branch を変えない claim。
      non_implications:
      - 不要であることを意味しない
      - systemic cluster 化で重大化しないことを意味しない
  criticality_bands:
    constitutional_or_irreversible:
      triggers:
      - life-safety または重大な法規 / 契約違反に直結する
      - public_or_external_commitment または irreversible_resource_lock を直接変える
      - authority route / human override / non-delegable stop を変える
      graphlint_defaults:
        severity_floor: critical_blocker
        weight_floor: 1.0
        required_evidence_class: authority_bound_direct
        escalation_route: top_authority_or_non_delegable_human_lane
    branch_decisive:
      triggers:
      - execute|hold|rollback|escalate|reject の分岐を変える
      - approval path または accountability binding を変える
      - rollback readiness や required control set を変える
      graphlint_defaults:
        severity_floor: major_blocker
        weight_floor: 1.0
        required_evidence_class: traceable_branch_basis
        escalation_route: decision_owner_or_required_approver_lane
    operational_support:
      triggers:
      - 主要主張の repair path、coverage basis、timing、resource allocation、monitoring adequacy を変える
      - 単独では branch を変えないが、active primary の成否に影響する
      graphlint_defaults:
        severity_floor: repair_major_or_minor
        weight_floor: 0.35
        required_evidence_class: traceable_supporting
        escalation_route: model_owner_or_domain_curator_lane
    explanatory_auxiliary:
      triggers:
      - 説明豊富化
      - reader guidance
      - non-branch background context
      graphlint_defaults:
        severity_floor: informational_or_minor
        weight_floor: 0.2
        required_evidence_class: linkable_or_optional
        escalation_route: local_documentation_lane
  weight_floor_policy:
    active_primary_rule: primary_claim と active な context-sensitive claim は mandatory weight floor 1.0 を持つ。これらに unmanaged major issue があると、対応する q_dimension は 1 を超えてはならない。
    inactive_context_sensitive_rule: inactive な context-sensitive claim は operational_support として最大 0.35 の weight で扱う。active でないのに primary blocker を作ってはならない。
    auxiliary_cap_rule: operational_support / explanatory_auxiliary は score 2→3 の改善に寄与してよいが、active primary の欠落・矛盾・未根拠を埋めて score 0/1→2 を作ってはならない。
    aggregation_note: 複数 auxiliary claim を束ねても primary substitution は作らない。systemic promotion は domain calibration thread で別途固定する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - claim role registry
      - activation predicate binding
      - manual override of criticality band
      - escalation route authority binding
    GraphEngine:
      owns:
      - activation state evaluation
      - claim-to-branch linkage
      - role change history
      - context transition record
    GraphLint:
      owns:
      - criticality band inference proposal
      - role/activation mismatch lint
      - severity / weight / evidence mapping
      - primary-substitution lint
    archive_object:
      owns:
      - critical trace packet
      - claim classification evidence
      - activation predicate witness
      - lint and escalation audit trail
  forbidden_shortcuts:
  - 文書の先頭にあるからという理由だけで主要主張とみなす。
  - activation predicate のない context-sensitive claim を都合よく primary / auxiliary に切り替える。
  - auxiliary claim の件数や総文字数で primary claim 欠落を相殺する。
  - life-safety / legal / external commitment claim を補助主張として single aggregate score に溶かす。
  - criticality を stakeholder 数や声量の proxy にする。
  residual_open_points: []
auxiliary_support_domain_calibration_governance:
  status: provisional_fixed
  statement: auxiliary_support_domain_calibration_governance とは、active な primary_claim / context-sensitive claim を前提に、補助主張 cluster が q_structure / q_context / q_evidence / q_conflict / q_ambiguity / q_explain の各次元を score 2/3 へ押し上げるための floor・independence・systemic promotion 条件を、domain profile ごとに固定する規則である。
  core_claims:
  - 補助主張は primary substitution を作れない。active な primary_claim または active な context-sensitive claim に unresolved major issue が残る場合、対応する q_dimension は 1 を超えてはならない。
  - score 2 は primary basis に加えて最低限の auxiliary support floor が満たされた状態、score 3 は独立性・境界事例・反例探索まで含む robust support が満たされた状態として分ける。
  - 補助主張 cluster は、同一 active claim facet と同一 q_dimension に結び付く補助主張群であり、cluster_role は corroborative / boundary_case / rebuttal / operationalization / explanation_path の5種に正規化する。
  - 同一 source lineage や同一 evidence packet を複数 cluster として重複計上してはならない。独立 origin 数は source owner / collection route / claim facet のいずれかが独立であることを要する。
  - systemic promotion は cluster 件数の多さではなく、同一 active primary facet に対して unresolved auxiliary issue が閾値を超え、branch 判定を実質的に不安定化させる場合にだけ発火する。
  - inactive な context-sensitive claim は operational_support としてしか数えない。predicate witness が真になったときだけ active primary 同等の cap rule を受ける。
  cluster_role_definitions:
    corroborative: 主要主張の根拠や成立条件を別 origin から支持する cluster。
    boundary_case: 適用境界、反例候補、非対象条件、負例テストを明示する cluster。
    rebuttal: 競合 evidence や反対解釈に対する応答、isolating split、解消方針を持つ cluster。
    operationalization: 手順、条件束縛、monitoring、rollback readiness、required metadata を機械可読にする cluster。
    explanation_path: claim→context→evidence→constraint の追跡路を読める形にする cluster。
  domain_calibration_table:
    regulated_domain:
      score2_floor:
        q_structure:
          min_clusters: 2
          required_roles:
          - operationalization
          - corroborative
        q_context:
          min_clusters: 2
          required_roles:
          - boundary_case
          - operationalization
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - explanation_path
        q_conflict:
          min_clusters: 2
          required_roles:
          - rebuttal
          - explanation_path
        q_ambiguity:
          min_clusters: 2
          required_roles:
          - boundary_case
          - explanation_path
        q_explain:
          min_clusters: 2
          required_roles:
          - explanation_path
          - operationalization
      score3_floor:
        q_structure:
          min_clusters: 3
          required_roles:
          - operationalization
          - corroborative
          - boundary_case
        q_context:
          min_clusters: 3
          required_roles:
          - boundary_case
          - operationalization
          - rebuttal
        q_evidence:
          min_clusters: 3
          required_roles:
          - corroborative
          - explanation_path
          - rebuttal
        q_conflict:
          min_clusters: 3
          required_roles:
          - rebuttal
          - boundary_case
          - explanation_path
        q_ambiguity:
          min_clusters: 3
          required_roles:
          - boundary_case
          - rebuttal
          - explanation_path
        q_explain:
          min_clusters: 3
          required_roles:
          - explanation_path
          - operationalization
          - boundary_case
      independence_rule:
        score2_min_independent_origins: 1
        score3_min_independent_origins: 2
      systemic_promotion_threshold: 2
      score3_note: q_evidence と q_conflict を 3 にするには、少なくとも1つの独立 corroborative origin と1つの boundary/rebuttal cluster を要する。
    engineering_tradeoff_domain:
      score2_floor:
        q_structure:
          min_clusters: 1
          required_roles:
          - operationalization
        q_context:
          min_clusters: 1
          required_roles:
          - boundary_case
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - explanation_path
        q_conflict:
          min_clusters: 1
          required_roles:
          - rebuttal
        q_ambiguity:
          min_clusters: 1
          required_roles:
          - boundary_case
        q_explain:
          min_clusters: 1
          required_roles:
          - explanation_path
      score3_floor:
        q_structure:
          min_clusters: 2
          required_roles:
          - operationalization
          - boundary_case
        q_context:
          min_clusters: 2
          required_roles:
          - boundary_case
          - explanation_path
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - rebuttal
        q_conflict:
          min_clusters: 2
          required_roles:
          - rebuttal
          - boundary_case
        q_ambiguity:
          min_clusters: 2
          required_roles:
          - boundary_case
          - rebuttal
        q_explain:
          min_clusters: 2
          required_roles:
          - explanation_path
          - operationalization
      independence_rule:
        score2_min_independent_origins: 1
        score3_min_independent_origins: 2
      systemic_promotion_threshold: 3
      score3_note: tradeoff 比較が branch を変えうる facet では、q_evidence/q_conflict の score 3 に cross-family corroboration または replayed counterexample を要する。
    organizational_or_social_domain:
      score2_floor:
        q_structure:
          min_clusters: 1
          required_roles:
          - operationalization
        q_context:
          min_clusters: 2
          required_roles:
          - boundary_case
          - explanation_path
        q_evidence:
          min_clusters: 1
          required_roles:
          - corroborative
        q_conflict:
          min_clusters: 1
          required_roles:
          - rebuttal
        q_ambiguity:
          min_clusters: 2
          required_roles:
          - boundary_case
          - rebuttal
        q_explain:
          min_clusters: 1
          required_roles:
          - explanation_path
      score3_floor:
        q_structure:
          min_clusters: 2
          required_roles:
          - operationalization
          - boundary_case
        q_context:
          min_clusters: 3
          required_roles:
          - boundary_case
          - explanation_path
          - rebuttal
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - rebuttal
        q_conflict:
          min_clusters: 2
          required_roles:
          - rebuttal
          - explanation_path
        q_ambiguity:
          min_clusters: 3
          required_roles:
          - boundary_case
          - rebuttal
          - explanation_path
        q_explain:
          min_clusters: 2
          required_roles:
          - explanation_path
          - boundary_case
      independence_rule:
        score2_min_independent_origins: 1
        score3_min_independent_origins: 1
      systemic_promotion_threshold: 3
      score3_note: stakeholder scope, dissent handling, interpretation boundary が明示されない限り q_context / q_ambiguity は 3 に到達してはならない。
  systemic_promotion_rule:
    statement: 同一 active primary facet へ結び付く unresolved auxiliary cluster が profile ごとの閾値以上存在し、かつ cluster_role が2種類以上に跨る場合、その facet は auxiliary ではなく branch-instability を生む systemic blocker として major 扱いへ昇格する。
    promotion_preconditions:
    - 同一 active claim facet にリンクしている
    - unresolved cluster count >= systemic_promotion_threshold(profile)
    - cluster_role diversity >= 2
    - 解除されないまま score 2/3 判定を押し下げている
    non_implications:
    - 補助主張が primary_claim へ昇格することを意味しない
    - 件数だけで自動昇格することを意味しない
  active_context_sensitive_uplift_rule:
    inactive_state: predicate witness 未成立または scope 未束縛の context-sensitive claim は auxiliary cluster として最大 operational_support 扱いにとどめる。
    active_state: predicate witness, scope_ref, context binding が揃った瞬間に active primary 相当の floor/cap rule を適用する。
    anti_shortcut: predicate が不明のまま score 2/3 改善に使ってはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - domain calibration registry
      - profile override reason
      - context-sensitive predicate witness binding
      - systemic promotion override approval
    GraphEngine:
      owns:
      - cluster membership history
      - origin lineage capture
      - active/inactive context-sensitive transition
      - promotion event trace
    GraphLint:
      owns:
      - cluster formation
      - score2/score3 floor check
      - independence check
      - systemic promotion recommendation
    archive_object:
      owns:
      - calibration profile ref
      - cluster evidence packet
      - promotion witness
      - negative test packet
  forbidden_shortcuts:
  - active primary の unresolved major issue を残したまま、補助主張件数だけで q_dimension を 2 以上へ上げる。
  - 同一 source lineage の補助主張を独立 origin として重複計上する。
  - regulated_domain の score 3 を boundary_case や rebuttal なしで与える。
  - inactive な context-sensitive claim を都合よく active 扱いして cluster floor を満たしたことにする。
  residual_open_points: []
evidence_strength_embedding_governance:
  status: provisional_fixed
  statement: evidence_strength_embedding_governance とは、根拠強度を Q_e(K_e) の第7軸として外出しせず、q_evidence の内部 subfactor として管理しつつ、GraphLint / DecisionLedger 出力では evidence_strength_class を明示して監査可能にする規則である。
  options_compared:
    embedded_inside_q_evidence:
      adopt: true
      merits:
      - Q_e(K_e)=6次元という既存 contract を壊さない
      - evidence coverage / binding / strength / diversity を q_evidence の内部で連動評価できる
      - Q14/Q24 の benchmark registry に evidence strength class を素直に渡せる
    separate_seventh_dimension:
      adopt: false
      rejected_because:
      - true/hold/false の既存 gate 条件、Q_e 出力 schema、benchmark contract を広範に壊す
      - strength だけ高くても coverage や binding が欠けるケースを別軸で過大評価しやすい
      - primary substitution を防ぐ現在の blocker 優先判定と整合しにくい
  adopted_rule:
    subfactors:
    - coverage
    - binding
    - strength_class
    - origin_diversity
    strength_classes:
    - linkable_optional
    - traceable_supporting
    - traceable_branch_basis
    - authority_bound_direct
    q_evidence_policy: q_evidence は coverage / binding / strength / diversity の最弱リンクで決める。active claim の criticality band が要求する evidence class を満たさない場合、q_evidence は 1 を超えてはならない。
    output_policy: GraphLint は q_evidence とは別に evidence_strength_profile を返してよいが、それは監査用説明変数であり Q_e(K_e) の新次元ではない。
  criticality_alignment:
    constitutional_or_irreversible: authority_bound_direct を要求する
    branch_decisive: traceable_branch_basis 以上を要求する
    operational_support: traceable_supporting 以上を要求する
    explanatory_auxiliary: linkable_optional でもよいが、score 3 には diversity と boundary_case が要る
  tool_responsibilities:
    DecisionLedger:
      owns:
      - required evidence class binding
      - manual override reason when weaker class accepted
      - exception approval trace
    GraphEngine:
      owns:
      - evidence origin lineage
      - evidence packet family
      - strength class history
      - diversity witness linkage
    GraphLint:
      owns:
      - strength class inference
      - q_evidence subfactor scoring
      - strength-floor violation lint
      - output evidence_strength_profile
    archive_object:
      owns:
      - evidence packet digest
      - strength-class witness
      - criticality-to-evidence mapping snapshot
  forbidden_shortcuts:
  - strength class だけ高い単一証跡で q_evidence=3 を与える。
  - coverage や binding が弱いのに evidence_strength を別軸の高得点で相殺する。
  - GraphLint 出力に evidence_strength_profile を出したことを Q_e の次元追加と誤解する。
  residual_open_points: []
latent_downstream_hold_promotion_governance:
  status: provisional_fixed
  statement: latent_downstream_hold_promotion_governance とは、GC1 未成立や governance 評価未開始のため secondary reason をまだ正式 blocker としては扱わない状態を activation_state=latent_downstream として保持し、適用条件が満たされた時点で active governance blocker へ昇格させる規則である。
  core_claims:
  - latent_downstream は relation_to_primary ではなく activation_state である。理由間関係と活性状態を混線させてはならない。
  - latent_downstream は H3〜H6 に限って許す。H1/H2 は epistemic entry gate 上の active issue として扱い、latent に逃がしてはならない。
  - active への昇格は、governance facet が現在の chosen branch / rollback branch に対して適用可能になったとき、または期限・外部性・precommit が先行して待てなくなったときに発火する。
  - H5/H6 は near_due, external_or_irreversible exposure, public/precommit artifact のいずれかがある場合、GC1 完了前でも latent のまま放置してはならない。
  - primary_reason が解消されなくても、secondary reason の deadline が先に来る場合は active promotion を許す。
  promotion_triggers:
    governance_entry_trigger: GC1=true になり Eval_g の対象 facet が判定可能になったとき。
    dependency_clear_trigger: secondary reason の前提になっていた upstream blocker が解消し、required_action を今すぐ実行可能になったとき。
    temporal_urgency_trigger: remaining_time <= promotion_window(profile, reason_code) になったとき。
    precommit_or_externality_trigger: external commitment, irreversible preparation, public notice, customer-visible export など affected facet を先取りする artifact が current/precommit になったとき。
  promotion_windows:
    H3: decision_due の 25% 以内または approval path instantiation 開始時
    H4: approval_sla 開始時点または fallback/proxy activation が必要になった時点
    H5: risk_review_due 到来前、または mitigation/waiver が execution gate より後ろへずれ込むと判明した時点
    H6: policy_review_window 到来前、または exception request / external commitment が発火した時点
  tool_responsibilities:
    DecisionLedger:
      owns:
      - latent reason registry
      - promotion_window policy
      - manual early-promotion decision
      - active governance blocker judgement
    GraphEngine:
      owns:
      - activation_state transition event
      - deadline countdown trace
      - precommit artifact linkage
      - promotion/rebase history
    GraphLint:
      owns:
      - epistemic blockers that mask governance evaluation
      - latent reason surfacing hints for H5/H6
    archive_object:
      owns:
      - promotion witness packet
      - deadline basis snapshot
      - precommit linkage evidence
  forbidden_shortcuts:
  - GC1 未成立を理由に、deadline が迫る H5/H6 を無期限に latent のままにする。
  - relation_to_primary=latent_downstream と書いて activation_state を省略する。
  - chosen branch や precommit artifact が確定しているのに downstream governance blocker を active 化しない。
  residual_open_points: []
hold_reason_relation_taxonomy_governance:
  status: provisional_fixed
  statement: hold_reason_relation_taxonomy_governance とは、secondary hold reason と primary_reason の関係を dependency だけに縮退させず、dependency / causal / temporal / independent を分けて保持する規則である。
  adopted_vocab:
    derived_from_primary: 同一 root issue の局所 manifestation であり、primary の修復で通常は同時に消える。
    dependency_precondition: secondary の required_action または reopen_condition が primary の解消を前提にする。
    causal_driver: primary の存在や処理遅延が secondary の発生確率・強度を押し上げている。
    temporal_deadline_precedence: secondary の deadline や review window が primary の修復予定より先に来る。
    independent_co_blocker: primary と独立に解除が必要な並列 blocker。
  design_rules:
  - relation_to_primary は1つの canonical primary relation を必須にし、activation_state は別フィールドで持つ。
  - dependency_precondition と causal_driver は同義ではない。依存がなくても causal_driver はありうる。
  - temporal_deadline_precedence は causal でも dependency でもなく、SLA / review window / externality timing の順序を表す。
  - independent_co_blocker は「無関係」を意味しない。代表SLAや primary_reason 選定とは独立に解除責務を持つことを意味する。
  selection_guidance:
    pick_dependency_precondition_when:
    - secondary の reopen_condition が primary repair 後でないと評価不能
    - secondary action が primary output を入力とする
    pick_causal_driver_when:
    - primary の放置により risk/policy conflict が増幅する
    - primary event が secondary blocker を誘発した
    pick_temporal_deadline_precedence_when:
    - secondary deadline < planned primary repair completion
    - review window 失効が先に来る
    pick_independent_co_blocker_when:
    - 解除経路が独立
    - どちらを先に修復しても他方は残る
  forbidden_shortcuts:
  - すべての secondary reason を dependency_precondition に丸める。
  - deadline 先行を causal と書き換えて SLA 情報を失う。
  - activation_state=latent_downstream を relation_to_primary に埋め込む。
  residual_open_points: []
hold_reason_subtype_registry_governance:
  status: provisional_fixed
  statement: hold_reason_subtype_registry_governance とは、H1〜H6 の family-level core subtype を共通語彙として固定し、より細かい領域差は parent core subtype を弱めない domain extension としてのみ許す規則である。
  core_subtype_registry:
    H1:
    - missing_primary_evidence
    - missing_context_binding
    - missing_structure_link
    - missing_explanation_path
    H2:
    - contradictory_evidence
    - semantic_ambiguity
    - threshold_or_scope_collision
    - unresolved_counterargument
    H3:
    - decision_context_unbound
    - value_binding_gap
    - responsibility_binding_gap
    - approval_structure_gap
    H4:
    - required_approval_missing
    - approval_conflict_active
    - quorum_or_proxy_unmet
    - fallback_activation_pending
    H5:
    - residual_risk_over_tolerance
    - mitigation_evidence_insufficient
    - waiver_required_ungranted
    - monitoring_or_rollback_inadequate
    H6:
    - explicit_policy_prohibition
    - legal_or_contractual_prohibition
    - external_commitment_conflict
    - exception_path_missing_or_denied
  extension_boundary:
    allowed:
    - domain_extension_subtype は必ず parent_core_subtype_ref を持つ
    - extension は family を跨いではならない
    - extension は reopen authority, deadline_basis family, escalation route family を弱めてはならない
    forbidden:
    - core_subtype を書かず extension 名だけを保持する
    - regulated_domain 固有 subtype を core subtype と同格に扱い、cross-domain benchmark を壊す
    - extension により reason_code family を付け替える
  tool_responsibilities:
    DecisionLedger:
      owns:
      - core subtype registry
      - extension registration approval
      - cross-family invalidation check
    GraphEngine:
      owns:
      - reason_code/core_subtype/extension_subtype history
      - migration alias trace
    GraphLint:
      owns:
      - H1/H2 subtype inference hint
      - invalid subtype/family mismatch lint
    archive_object:
      owns:
      - subtype registry snapshot
      - extension charter witness
      - benchmark export label
  forbidden_shortcuts:
  - core subtype を未記載のまま自然言語だけで hold family を説明する。
  - domain extension subtype で core subtype の reopen_condition を密かに差し替える。
  - 同じ extension 名を複数 family で再利用し、比較可能性を壊す。
  residual_open_points: []
positive_state_vocabulary_governance:
  status: provisional_fixed
  statement: linked / bound を raw schema 上の literal present へ統一せず、component-specific positive state を authoritative storage に維持する。ただし cross-component analytics には derived meta predicate として positive_meta_state=present を返してよい。
  options_compared:
    unify_to_present_literal:
      adopt: false
      rejected_because:
      - evidence linkage と governance binding と event auxiliary value の意味差が消え、監査時に何が満たされたのか読めなくなる
      - legacy 正規化と component-aware lint を壊し、present から linked / bound / concrete value への逆写像が不可能になる
      - Q12 の invalid event 境界で、H の core field が「present かどうか」だけでは replay 可能性を判定できない
    keep_component_specific_positive_state:
      adopt: true
      merits:
      - E は linked、V/R は bound、G/C/H auxiliary は concrete typed value or concrete ref という意味差を保持できる
      - typed missing marker の reason layer と positive state の fulfillment layer を分けられる
      - generic dashboard では derived meta predicate として present_count / reasoned_missing_count を計算できる
  adopted_rule:
    authoritative_positive_states:
      G_C: required slot は concrete typed value または concrete ref を positive state とする。literal present は保存しない。
      E: evidence_status=linked を positive state とする。
      V_R: binding_status=bound を positive state とする。
      H_auxiliary: auxiliary slot は concrete typed value / concrete ref / concrete digest を positive state とする。literal present は保存しない。
    derived_meta_projection:
      present: component-specific positive state または concrete typed value/ref/digest を持つ。
      reasoned_missing: typed missing marker と required metadata を持つ。
      invalid: required slot に prohibited serialization または許されない marker が入っている。
    storage_policy:
    - raw schema 値として present を保存してはならない。present は query/view 層の派生述語である。
    - migration 時に literal present を見つけた場合、component kind を見て linked / bound / concrete value populated へ正規化し、kind が不明なら migration_error とする。
    - cross-component completeness 指標は positive_meta_state を使って集計してよいが、authoritative remediation は component-specific state を参照する。
  tool_responsibilities:
    GraphBuild:
      owns:
      - component kind aware status generation
      - literal present の生成禁止
      - legacy present alias の migration hint
    GraphLint:
      owns:
      - component-specific positive state lint
      - derived positive_meta_state computation
      - present literal misuse detection
    DecisionLedger:
      owns:
      - binding_status=bound の authoritative judgement
      - risk/approval/policy state と binding_status の切り分け
    GraphEngine:
      owns:
      - normalized positive state history
      - invalid migration event trace
      - component-aware state API
    archive_object:
      owns:
      - normalized_state_snapshot
      - migration warning packet
      - component-kind witness
  forbidden_shortcuts:
  - linked / bound / concrete value をまとめて literal present へ潰し、何が満たされたのかを失うこと。
  - present_count が高いことを理由に、linked/bound の component-specific 検査を省略すること。
  - component kind 不明の legacy present を自動的に linked や bound へ決め打ちすること。
  residual_open_points: []
hold_auxiliary_metadata_marker_governance:
  status: provisional_fixed
  statement: H の persisted event では、typed missing marker を core event identity field と replay-critical transition field へ入れてはならない。marker を許すのは audit-support auxiliary field に限り、その marker が branch effect や hold clear を単独で正当化してはならない。
  field_classes:
    core_event_identity_fields:
    - event_id
    - timestamp
    - actor_ref
    - operation
    - reason_or_reason_code
    replay_critical_transition_fields:
    - target_ref
    - state_before_ref_or_digest
    - state_after_ref_or_digest
    - primary_reason_ref
    - transition_kind_or_event_family
    audit_support_auxiliary_fields:
    - supporting_evidence_ref
    - external_case_ref
    - note_attachment_ref
    - migration_hint_ref
    - review_comment_ref
    - non_branch_critical_locator
  marker_admissibility:
    core_event_identity_fields: typed missing marker を一切許さない。欠けた persisted event は invalid_event である。
    replay_critical_transition_fields: draft/precommit 中の一時表現を除き、persisted archive では typed missing marker を許さない。marker が残った event は replay/closure の正本になれず invalid_event とする。
    audit_support_auxiliary_fields:
      allowed_markers:
      - absent
      - pending
      - external_ref
      - not_applicable
      - disputed
      conditions:
      - marker ごとの required metadata(required_by, pending_owner, external_locator, applicability_basis, dispute_ref など) が揃う
      - 当該 auxiliary slot が hold_cleared, approval_granted, waiver_valid, policy_exception_active の sole witness ではない
      - event validity と branch effect の判定が、当該 auxiliary slot 未解決でも変わらない
  invalid_event_rules:
  - core event identity field に marker または prohibited serialization がある persisted event は invalid_event
  - replay-critical transition field に marker が残ったまま hold_cleared / hold_rebased / execute authorization を記録した event は invalid_event
  - audit-support auxiliary field の pending/disputed を closure witness や lawful exception witness として算入した event は invalid_event
  closure_guard_rules:
  - hold_entered / hold_updated は unresolved auxiliary marker を含んでよいが、その marker 自体が primary_reason の根拠にはなれない
  - hold_cleared / approval_granted / waiver_valid / policy_exception_active は core field 完全性に加え、closure-critical witness が concrete value/ref/digest であることを要する
  - external_ref auxiliary は freshness / locator / access basis を満たす場合だけ audit support として許す
  tool_responsibilities:
    GraphBuild:
      owns:
      - draft/precommit auxiliary marker generation
      - core field marker prohibition
    GraphLint:
      owns:
      - invalid_event detection
      - closure-critical witness completeness check
      - auxiliary marker misuse lint
    DecisionLedger:
      owns:
      - closure-critical witness designation
      - approval/waiver/exception witness completeness judgement
    GraphEngine:
      owns:
      - persisted event validity flag
      - draft to persisted normalization trace
      - invalid event quarantine
    archive_object:
      owns:
      - closure witness packet
      - auxiliary marker metadata snapshot
      - invalid_event evidence packet
  forbidden_shortcuts:
  - event_id や timestamp の欠落を pending で埋めて persisted event として受理すること。
  - state_after_ref や primary_reason_ref が unresolved の event を hold_cleared として記録すること。
  - audit-support auxiliary の external_ref を、freshness 未確認のまま lawful closure witness として使うこと。
  residual_open_points: []
organizational_risk_binding_not_applicable_audit_governance:
  status: provisional_fixed
  statement: organizational_or_social_domain で risk_binding=not_applicable を許すのは、decision target が純粋な論点整理・可逆な内部分析・局所メモ更新に限られ、実質的な stakeholder harm / reputational exposure / resource commitment / external commitment / contested risk tolerance を伴わない場合だけである。
  risk_binding_activation_triggers:
  - 人員、顧客、パートナー、世論、ブランド、法務、労務、privacy、security に material な harm/exposure を与えうる
  - 予算、スケジュール、人員配置、公式方針、対外説明、公開物、社内制度を branch とともに拘束する
  - 撤回コストが非軽微、または local owner 単独で即時に巻き戻せない
  - stakeholder 間で risk_tolerance, acceptable harm, escalation duty のいずれかが争点になっている
  - 後続の regulated / contractual / public commitment branch へ接続する precursor decision である
  not_applicable_admissibility:
    allowed_only_when_all_true:
    - decision class が pure_clarification / internal_option_listing / reversible_local_analysis のいずれかである
    - effect_zone が local_internal_only であり、cross-team execution commitment を発生させない
    - reversibility_class が fully_reversible_before_commit である
    - external/public/customer/partner-facing artifact を current basis に含まない
    - risk_tolerance contested case が開いていない
    required_audit_packet:
    - risk_na_basis_class
    - effect_zone
    - reversibility_class
    - stakeholder_set_or_none_basis
    - review_window_or_trigger
    - reviewer_or_reflection_owner
    - reevaluation_trigger_on_externalization_or_commit
  reevaluation_triggers:
  - draft が public/internal official artifact へ昇格する
  - budget/resource/personnel/partner commitment が発生する
  - stakeholder conflict case が risk_tolerance / acceptable harm に触れる
  - 撤回コストが local reversible を超える
  forbidden_shortcuts:
  - 人間系の判断だから定量化しにくいという理由だけで risk_binding=not_applicable にすること。
  - 評判・労務・privacy・対外説明の影響を value conflict だけに押し込み、risk_binding を無効化すること。
  - review_window や reflection owner を残さず not_applicable を長期据え置きすること。
  residual_open_points: []
cross_profile_score3_benchmark_governance:
  status: provisional_fixed
  statement: score 3 の profile 間 benchmark は、生の ordinal 3 同士を比較するのではなく、claim facet ごとの witness packet を source/target profile へ写して portability class を判定し、その上で replay benchmark registry cell へ束縛する。
  benchmark_packet_core_fields:
  - source_profile
  - claim_facet
  - q_dimension_or_subdimension
  - criticality_band
  - active_profile_triggers
  - primary_claim_class
  - evidence_strength_class
  - auxiliary_support_roles_and_independent_origins
  - boundary_case_or_rebuttal_coverage
  - approval_risk_policy_binding_snapshot
  - reflection_or_adjudication_trace_or_null
  - resolved_blocker_and_cap_history
  - negative_case_or_counterexample_packet
  - residual_caveat_set
  portability_classes:
    direct_reusable: target profile で active になる mandatory obligation が source witness packet にすべて含まれ、追加補完なしで target 側でも score 3 を主張できる。
    caveated_reusable: common core は満たすが、target profile 固有の追加 witness が不足しており、補完後にだけ target 側 score 3 を主張できる。
    benchmark_only: benchmark cohort へは入れられるが、target profile の score 3 主張には使えない。比較参考値にとどまる。
    non_reusable: target profile で active な mandatory obligation を source が欠き、比較単位としても誤解を招く。
  comparison_rules:
  - same-profile でも negative_case / blocker_history / criticality_band が欠ける witness packet は direct_reusable にしてはならない。
  - engineering_tradeoff_domain または organizational_or_social_domain から regulated_domain への移植は、regulated mandatory authority / policy / risk witness が揃わない限り benchmark_only 以下である。
  - regulated_domain から engineering_tradeoff_domain への移植は common core が保たれれば direct_reusable または caveated_reusable になりうるが、target local tradeoff boundary と comparable set が未束縛なら caveated 以下である。
  - organizational_or_social_domain の score 3 は adjudication charter / reflection SLA / precedence archive を伴わない限り cross-profile reusable にしてはならない。
  - source witness に unresolved branch-critical cap や temporary exception 依存が残る場合、portability class を direct_reusable にしてはならない。
  cross_profile_default_matrix:
    regulated_domain->regulated_domain: direct_reusable or caveated_reusable
    regulated_domain->engineering_tradeoff_domain: direct_reusable or caveated_reusable
    regulated_domain->organizational_or_social_domain: caveated_reusable
    engineering_tradeoff_domain->regulated_domain: benchmark_only unless regulated-specific witness added
    engineering_tradeoff_domain->organizational_or_social_domain: caveated_reusable if adjudication/authority traces added, else benchmark_only
    organizational_or_social_domain->regulated_domain: benchmark_only or non_reusable
    organizational_or_social_domain->engineering_tradeoff_domain: caveated_reusable or benchmark_only
    organizational_or_social_domain->organizational_or_social_domain: direct_reusable or caveated_reusable
  q24_boundary:
    fixed_now:
    - portability class semantics
    - benchmark packet core fields
    - cross-profile comparison rules
    - benchmark cell への binding 境界
    resolved_by_Q24:
    - canonical benchmark registry cell
    - suite versioning
    - alias-preserving migration rule
    - benchmark cohort registry governance
  forbidden_shortcuts:
  - score=3 という ordinal だけを profile 間 benchmark の入力にすること。
  - regulated profile の witness を欠いたまま engineering の score 3 を regulated へ移植すること。
  - negative case や blocker history を持たない shiny pass packet を reusable score 3 と称すること。
  residual_open_points: []
approval_weighted_quorum_governance:
  status: provisional_fixed
  statement: weighted quorum や voting power は approval structure の共通語彙へ最小 envelope だけを入れ、seat weight table・apportionment formula・constituency census などの詳細は extension registry へ逃がす。つまり「weighted であること」と「成立判定に最低限必要な tally semantics」は core に残すが、組織固有の重み表そのものは core に含めない。
  core_vocabulary:
  - approval_mode=quorum|forum
  - eligible_voting_set_ref
  - counting_basis=headcount|seat_weight
  - threshold_rule
  - mandatory_role_set
  - veto_rule_or_blocking_class
  - abstention_rule
  - timeout_rule
  - tie_break_rule
  - weighted_tally_profile_ref_or_null
  extension_registry_fields:
  - seat_weight_table_ref
  - apportionment_formula_ref
  - constituency_snapshot_ref
  - reapportionment_trigger
  - supermajority_profile_ref
  - minority_protection_profile_ref
  - dynamic_voting_window_or_effective_period
  design_rules:
  - counting_basis=seat_weight を使う場合、weighted_tally_profile_ref を必須にする。headcount の quorum へ暗黙変換してはならない。
  - mandatory role, blocking veto, segregation_of_duties は weighted tally で上書きしてはならない。
  - observer seat, auditor seat, explainer seat を voting weight や veto seat に算入してはならない。
  - weighted tally は forum 内部の成立計算に属し、same-tier peer conflict routing を直接置き換えない。
  - 動的な人員数や部門規模から重みを導く場合でも、current basis では frozen snapshot ref を通してだけ参照する。
  hold_connection_rules:
  - weighted_tally_profile_ref が必要なのに欠ける場合は approval_structure_gap として H3 候補になる。
  - weighted tally profile はあるが threshold 未充足、mandatory role 未参加、valid blocking veto 存在のいずれかなら H4 候補になる。
  - forum internal tally の不成立を、別 forum や peer reviewer の多数で相殺してはならない。
  forbidden_shortcuts:
  - weighted quorum を approval authority family そのものへ昇格させ、core taxonomy を汚染すること。
  - seat weight table を current snapshot なしに live org chart から都度推論すること。
  - weighted majority を理由に mandatory role や policy/risk veto を黙殺すること。
  residual_open_points: []
joint_approval_accountability_split_governance:
  status: provisional_fixed
  statement: joint approval と joint accountability は同一 responsibility object R に共存してよいが、approval leg と accountability leg を別レコードとして保持し、approval 成立を accountability 移転の代用にしてはならない。
  core_claims:
  - approval は「誰が今この action を合法化できるか」を表し、accountability は「誰が outcome / rollback / explanation / incident response を引き受けるか」を表す。両者は同じ人物に束縛されても意味論は別である。
  - joint approval は all_of / quorum / forum などの approval structure で表せるが、joint accountability は無差別な共同責任としては置かず、facet partition と residual owner を持つ明示 co-accountability としてだけ許す。
  - forum verdict、proxy approval、fallback approval は approval leg の成立であり、forum chair・execution coordinator・secretariat を自動的に accountability owner にしてはならない。
  - approval が成立しても accountability leg が未束縛なら execute-ready ではない。逆に accountability owner がいても required approval が未成立なら lawful execution ではない。
  - 同一 actor が approver と accountability owner を兼ねてもよいが、approval_event_ref と accountability_binding_ref を別に残さなければならない。
  minimal_vocabulary:
    responsibility_object:
    - responsibility_id
    - target_ref
    - effect_zone_ref
    - approval_leg_ref
    - accountability_leg_ref
    - decision_outcome_ref
    - state
    approval_leg_fields:
    - approval_case_id
    - action_scope_ref
    - approval_structure_ref
    - approval_outcome_ref
    - validity_window
    - invalidation_rule_ref
    - approval_event_refs
    accountability_leg_fields:
    - accountability_case_id
    - accountable_facet_set
    - primary_owner_ref
    - co_owner_partition_ref_or_null
    - residual_owner_ref
    - rollback_owner_ref
    - reflection_owner_ref
    - liability_window
    - transfer_rule_ref
  adopted_rule:
    binding_rule:
    - commitment-sensitive facet ごとに primary accountability owner をちょうど1つ持つことを原則とする。
    - co-accountability を使う場合、facet partition と residual owner を必須にする。空白 facet を残してはならない。
    - approval leg の fulfilled / expired / invalidated は accountability leg の active / transferred / revoked と独立に遷移する。
    - accountability transfer は approval とは別イベントとして明示し、source owner・target owner・effective window・handoff witness を要する。
    hold_and_gap_policy:
      H3_candidates:
      - approval_accountability_split_gap
      - accountability_partition_missing
      - rollback_owner_missing_when_commitment_active
      - residual_owner_missing_under_co_accountability
      H4_candidates:
      - approval_wait_with_accountability_bound
      - forum_verdict_pending
      - approval_valid_but_accountability_handoff_pending
  tool_split:
    DecisionLedger:
    - approval_leg / accountability_leg の authoritative binding
    - co-accountability partition と residual owner の正当性判定
    - accountability transfer / rollback owner / reflection owner の記録
    GraphEngine:
    - approval state と accountability state の別系列ライフサイクル保存
    - approval_event_ref と accountability_binding_ref の lineage 管理
    - gap / pending / transferred / invalidated の状態遷移保持
    GraphLint:
    - approval 成立だけで accountability 充足とみなした shortcut の検出
    - co-accountability partition の coverage 欠落検出
    - rollback owner / reflection owner 欠落の lint
    archive_object:
    - approval witness packet
    - accountability partition packet
    - handoff / transfer witness packet
  forbidden_shortcuts:
  - approved_by_many を accountability shared_by_many と読み替えること。
  - forum chair / approver / proxy を暗黙の outcome owner とみなすこと。
  - co-accountability を facet partition なしの crowd ownership として記録すること。
  residual_open_points: []
same_frame_manual_redesign_typing_governance:
  status: provisional_fixed
  statement: same-frame manual redesign action family は、frame invariant を保ったまま admissible set を非空化する再設計操作として5つの core family だけを共通語彙化し、それ以下の domain/tool 固有差分は extension registry に逃がす。
  core_families:
    route_substitution_within_bound_family: すでに lawful に束縛された route family の内部で候補 route を差し替える。obligation family・authority path・accountability family は維持する。
    parameter_narrowing_or_safe_envelope: threshold, range, envelope, rollout width を安全側へ狭める。effect_zone や commitment class を拡張してはならない。
    evidence_gate_strengthening: required evidence, freshness, review step, rollback check, post-check を追加・強化する。required approval や veto を減らしてはならない。
    canonical_alignment_using_ratified_registry: ratified な canonical unit / baseline / mapping rule を使って representation mismatch を解消する。新しい registry rule の創設は含まない。
    rollback_monitoring_readiness_relayout: rollback plan、monitoring point、checkpoint、guard sequencing を再配置する。authority / accountability / target は変えない。
  extension_boundary:
    extension_is_required_when:
    - domain 固有の sub-type、artifact choreography、UI/workflow order、tool-specific manifest を表したいとき
    - core family の内部でしか意味を持たない parameter schema や verifier schema を持ちたいとき
    - cross-profile portability を前提にせず、project-local / domain-local な subtype を表したいとき
    core_must_not_include:
    - tool 名や製品名に依存する subtype
    - 業務組織固有の承認 lane 名称
    - domain-specific evidence packet の細目
    - UI 画面順や人員配置のような choreography detail
  governance_rules:
  - extension subtype は必ず parent core family を持つ。core family なしの孤立 subtype を作ってはならない。
  - core family 判定は frame invariants の保存性で行い、作業手順の類似で行ってはならない。
  - target replacement、authority/accountability 変更、policy exception 導入、scope split 導入は same-frame redesign family に含めない。
  forbidden_shortcuts:
  - manual redesign という名前で reframe や policy rewrite を紛れ込ませること。
  - domain 固有 subtype を core に昇格させて共通語彙を汚染すること。
  - evidence strengthening を approval relaxation や risk relaxation の代用にすること。
  residual_open_points: []
deliberate_exploration_option_value_governance:
  status: provisional_fixed
  statement: deliberate_exploration は、exploration charter に対して discrimination gain・branch relevance・reuse value・reversibility headroom と、cost/risk burn を半定量化し、continue / bounded_continue / terminate_or_escalate を判定する。
  semi_quant_axes:
    discrimination_gain: 0=候補識別に寄与しない, 1=局所識別, 2=action-relevant 識別, 3=branch-critical 識別
    branch_relevance: 0=将来判断に無関係, 1=補助的, 2=current action に関連, 3=single-branch commitment を左右
    reuse_value: 0=一回限り, 1=local reuse, 2=profile reuse, 3=cross-profile reuse
    reversibility_headroom: 0=ほぼ不可逆, 1=限定可逆, 2=十分可逆, 3=shadow/sandbox/rollback-contained
    cost_burn: 0=低, 1=管理可能, 2=高, 3=budget breach
    risk_burn: 0=低, 1=管理可能, 2=高, 3=authority/risk bound breach
  decision_policy:
    continue:
    - discrimination_gain >= 2
    - branch_relevance >= 2
    - max(cost_burn, risk_burn) <= 1
    - review_window と budget_cap が残っている
    bounded_continue:
    - discrimination_gain >= 1
    - branch_relevance >= 1 または reuse_value >= 2
    - risk_burn <= 1
    - 終了条件がまだ発火していない
    terminate_or_escalate:
    - discrimination_gain = 0 が連続 review で持続する
    - review_window 失効、budget_cap 超過、または allowed_actions 枯渇
    - risk_burn = 3 または authority/risk bound breach
    - 選択 / coexistence / split / hold / false のいずれかへ出口が定まった
  termination_outcomes:
  - governance_converged へ閉じる
  - ratified coexistence / split に移る
  - same-frame repair が必要なら hold に戻す
  - lawful path absent または frame invalidated なら false へ閉じる
  - registry / authority / policy 再設計が必要なら escalate する
  forbidden_shortcuts:
  - exploration 中だから終了条件を書かなくてよいとみなすこと。
  - 好奇心や作業継続欲だけで option value を高いと扱うこと。
  - cost/risk burn を無視して reuse value だけで継続を正当化すること。
  residual_open_points: []
route_family_extension_boundary_governance:
  status: provisional_fixed
  statement: route family の core は any_of / k_of_n の離散的 selection semantics と candidate/local_bundle/alignment までに限り、ordered_fallback と weighted k_of_n は extension overlay として分離する。
  core_vocabulary:
  - modality=any_of|k_of_n
  - k_required
  - candidate_routes
  - local_bundle_ref
  - activation_conditions
  - incompatibility_ref
  - selection_scope_ref
  - alignment_rule_ref
  extension_overlays:
    ordered_fallback_overlay:
      meaning: すでに lawful な candidate_routes の上に preference order / timeout / activation predicate を重ねる。core modality を置き換えない。
      required_fields:
      - ordered_chain
      - fallback_activation_predicates
      - timeout_rule
      - exhaustion_escalation_ref
    weighted_k_of_n_overlay:
      meaning: candidate route ごとの離散 weight を用いた weighted threshold を重ねる。approval forum の voting power と混同しない。
      required_fields:
      - route_weight_profile_ref
      - weight_threshold_rule
      - eligibility_freeze_ref
      - tie_break_rule
  boundary_rules:
  - ordered_fallback は route family identity ではなく selection policy である。obligation family・effect_zone・authority/accountability を変えてはならない。
  - weighted k_of_n は route selection の overlay であり、approval forum の weighted quorum や seat_weight_table を参照してはならない。必要なら別 registry ref で接続する。
  - extension overlay がなければ core comparability は離散 selection semantics で判定する。overlay 依存 action を core-only family へ写像してはならない。
  forbidden_shortcuts:
  - ordered fallback を any_of の単純並び順と誤認し、timeout / exhaustion / escalation を記録しないこと。
  - weighted k_of_n を approval weighted quorum と同じものとして扱うこと。
  - overlay に依存する route family を core family と称して registry 省略すること。
  residual_open_points: []
externality_budget_numeric_calibration_governance:
  status: provisional_fixed
  statement: externality budget の numeric calibration は regulated / engineering_tradeoff / organizational_or_social の3 profile を baseline とし、single_branch / external_irreversible / policy_sensitive の文脈 override では stricter-only で短縮する。
  calibration_rule:
  - 数値較正対象は sink_cap_count, audience_cap_named_humans, artifact_kind_cap_count, review_due, expiry, purge_due_after_expiry とする。
  - baseline profile table は isolation_externality_budget_governance の numeric_cap_table を正本とする。
  - context override は cap の緩和ではなく min / stricter 方向の短縮だけを許す。
  - review_due は cleanup / containment reinforcement / revalidation 用の pre-expiry cap であり、propagation 延長の黙示承認ではない。
  - expiry 後は quarantine read-only または purge queue へ送り、new propagation basis に使ってはならない。
  profile_summary:
    regulated: sealed_internal を既定とし、bounded_internal_observable は exception_only。review_due と expiry を最短に固定する。
    engineering_tradeoff: sealed_internal と bounded_internal_observable を運用するが、authoritative / externalized は isolation basis に数えない。
    organizational_or_social: bounded_internal_observable の audience を engineering_tradeoff より広く取れるが、human-forwardable surface を重く見て sink typing を保守化する。
  override_summary:
    single_branch: audience / ttl を短くし、sealed_internal を優先する。
    external_irreversible: 最短 review_due / expiry を要求し、class cap を sealed_internal に固定する。
    policy_sensitive: bounded_internal_observable は exception path に限定し、preapproval と designated reviewer を要求する。
  forbidden_shortcuts:
  - profile baseline より緩い local override を許すこと。
  - review_due を expiry の grace period と誤解すること。
  - externalized_nonbinding や authoritative_or_committing を isolation basis の numeric cap で正当化すること。
  residual_open_points: []
