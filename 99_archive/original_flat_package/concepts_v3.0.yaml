policy_drift_detector_governance:
  status: provisional_fixed
  statement: policy drift detector governance とは、registry authority governance と basis lifecycle governance の上に、local convention 流入の疑いと confirmed policy drift を分離して検知し、confidence 単独ではなく evidence separation と protected facet 影響に基づいて hold / emergency suspend / confirm / release / revoke / escalate / false を分ける規則である。
  connections:
    with_registry_authority_governance:
    - drift detector は authority tier の代替ではなく、registry rule の逸脱を検知して lawful な確認経路へ送る補助層である。
    - delegated reviewer は local_convention_detected を起票し provisional emergency suspend を発火できるが、cross_domain / global_default の confirmed policy drift を単独確定しない。
    with_basis_lifecycle_governance:
    - proposal / review 中の不整合は hygiene issue であり、effective reliance を伴わない限り drift とみなさない。
    - ratified だが未 activated / 未 reflected の entry は confirmed drift 判定の正基準にならず、比較対象は active / reflected basis と current effective basis に置く。
    - suspended / revoked / superseded basis への継続 reliance は strong drift signal とみなす。
    with_same_tier_reviewer_conflict_normalization:
    - same-tier reviewer / forum の disagreement 自体は drift ではない。
    - forum charter / fallback / reflection を経ない outcome が effective policy のように運用されたときだけ drift signal になる。
  state_definitions:
    local_convention_detected:
      statement: local_convention_detected とは、local な慣行・未登録 rule・未反映 override・scope 外 extension が authoritative basis のように使われている疑いが admissible signal により成立したが、confirmed policy drift として確定するには provenance separation または authority confirmation がまだ不足している状態である。
      implications:
      - affected artifact の prospective reliance を限定または一時停止し、lineage / witness / scope / authority path の再検査を要求する。
      - same-frame remediation がある場合は hold、ない場合や blast radius が大きい場合は emergency suspend または escalate の起点になる。
      non_implications:
      - confirmed policy drift を自動では意味しない。
      - mere reviewer disagreement、proposal defect、単一 operator の感覚的違和感一般を意味しない。
    confirmed_policy_drift:
      statement: confirmed policy drift とは、active / reflected な authoritative basis と current effective basis の protected facet 差分、または superseded / revoked / unratified / out-of-scope basis の effective use が、分離した admissible evidence と lawful authority confirmation によって確定した状態である。
      implications:
      - affected artifact は confirm / release / revoke / supersede のいずれかが完了するまで authoritative reliance basis に使わない。
      - drift が authority_path、semantic_family、counting_basis、exclusivity、rollback expectation を侵す場合は release より revoke / supersede を優先検討する。
      non_implications:
      - local team の反復実務だけで central policy が自動更新されたことを意味しない。
      - same-tier conflict の存在だけで confirm できることを意味しない。
  signal_taxonomy:
    direct_registry_mismatch:
      statement: active / reflected registry basis と runtime 参照 basis が protected facet 上で直接矛盾する signal。
    unregistered_effective_use:
      statement: registry_id や lineage を欠く mapping / strengthening / canonical entry が effective policy として使われている signal。
    silent_extension:
      statement: template / scope / effect_zone / exclusivity が ratified change なしに拡張されている signal。
    predecessor_bypass:
      statement: active predecessor または required supersession path を飛ばして local rule が実効化されている signal。
    suspended_or_revoked_reliance:
      statement: suspended / revoked / superseded basis が current action で still active 参照されている signal。
    unreflected_override:
      statement: reviewer / forum outcome が reflected 前に binding rule のように流通している signal。
    authority_path_mismatch:
      statement: required authority path / accountability family / rollback expectation が runtime 運用で別物に置換されている signal。
  facet_taxonomy:
    protected_facets:
    - semantic_family
    - counting_basis
    - exclusivity
    - effect_zone
    - authority_path
    - accountability_family
    - rollback_expectation
    lifecycle_states:
    - proposed_only
    - reviewed_pending
    - ratified_unactivated
    - active_reflected
    - emergency_suspended
    - revoked_or_superseded
    evidence_facets:
    - registry_state
    - runtime_trace
    - reviewer_forum_trace
    - operator_practice_trace
    - artifact_diff_trace
  threshold_policy:
    statement: detector threshold は confidence 単独で切らず、strong signal、corroboration、provenance separation、blast radius、authority tier、effective reliance の有無を束で評価する。
    local_convention_detected_floor:
    - strong signal が 1 件あるか、弱い signal が provenance separation つきで 2 群以上あることを要求する。
    - blast radius が大きいほど suspend 開始は早めるが、confirm 条件は緩めない。
    - mirrored 同系統ログ、同一 pipeline の再計算、同一 reviewer thread の反復は corroboration を水増ししない。
    confirmed_policy_drift_floor:
    - active / reflected basis との protected facet mismatch、または superseded / revoked / unratified / out-of-scope basis の effective use を要する。
    - same_source / same_pipeline の反復だけでは足りず、cross-pipeline 以上の provenance separation、または first-party authoritative registry evidence と runtime trace の対を要する。
    - cross_domain / global_default は domain authority または central authority の confirm を要し、delegated reviewer は単独確定しない。
    - same-tier conflict だけでは confirm せず、unreflected override か unauthorized activation が追加で必要である。
  branch_rules:
    hold:
    - local_convention_detected だが active predecessor が lawful で、same-frame で lineage / witness / reflection repair が完了できるとき。
    - disagreement が same-tier conflict に留まり、effective policy drift へ流出していないとき。
    emergency_suspend:
    - local_convention_detected かつ current action が authoritative reliance / downstream automation / external commitment に連なるとき。
    - cross_domain / global_default、または semantic_family / counting_basis / authority_path / rollback_expectation への hit があるとき。
    confirm:
    - confirmed policy drift の条件が満たされ、required authority tier の confirmer が drift packet を承認したとき。
    release:
    - suspicion の原因が lawful lineage、scope repair、reflected correction、false positive clearing により解消し、active mismatch が残らないとき。
    revoke:
    - confirmed policy drift で unlawful basis 自体を authoritative set から外す必要があり、preserving successor だけでは足りないとき。
    escalate:
    - delegated reviewer では authority 不足、cross-domain 影響、または peer forum / chain conflict が残るため上位 authority confirmation が必要なとき。
    'false':
    - lawful predecessor も same-frame remedy も upper authority path もなく、current intended reliance を正当に継続できないとき。
  tool_split:
    DecisionLedger:
    - detector_case_id
    - suspected_signal_bundle_ref
    - corroboration_group_ref
    - provenance_separation_class
    - affected_protected_facet_ref
    - affected_basis_status_ref
    - confirmation_authority_ref
    - release_basis_ref
    - revoke_basis_ref
    GraphEngine:
    - detector_signal_recorded
    - drift_corroborated
    - local_convention_detected
    - policy_drift_escalated
    - policy_drift_confirmed
    - policy_drift_released
    - policy_drift_revoked
    - policy_drift_false_positive_cleared
  residual_open_points:
  - profile/context ごとの aggregation window と hard expiry の数値較正
  - mirror lag upper bound の prior / credibility level を detector freshness / provenance rule にどう較正するか
  - operator bias / adversarial flooding / replay attack の補正を drift corroboration の aggregation 側へどう入れるか
detector_confidence_aggregation_governance:
  status: provisional_fixed
  statement: detector confidence aggregation governance とは、local_convention_detected・confirmed policy drift・suspected leak の各 detector について、signal unit / cluster unit / corroboration unit / aggregation window を分離し、同系統反復や mirrored duplicate を独立証拠として水増しせずに、bounded な confidence aggregation を emergency suspend / confirm / release / revoke へ接続する共通統治規則である。
  core_claims:
  - signal unit と cluster unit と corroboration unit は別物であり、反復 alert 件数そのものを corroboration 数とみなさない。
  - same_source / same_pipeline / mirrored duplicate / batch slice の反復は cluster 内へ畳み込み、独立 corroboration を水増ししない。
  - confidence aggregation は cluster 内では capped aggregation、cluster 間では independence boundary つき bounded aggregation を使い、単純加算を採らない。
  - threshold は aggregated confidence 単独で切らず、blast radius、authority tier、effective reliance、direct authoritative pair または direct reach evidence の有無と束で評価する。
  - window overlap や burst event は persistence の補助根拠にはなりうるが、confirm 条件の shortcut には使わない。
  unit_taxonomy:
    signal_unit:
      statement: 単一 detector 実行または単一 admissible observation から得られる最小観測単位。source family、source instance、pipeline、team、authority tier、claim facet、observed_at、window_profile を束縛する。
    cluster_unit:
      statement: 同じ latent incident / same hypothesis を指す near-duplicate signal 群を束ねた単位。detector family、target lineage、protected facet または sink facet、effect zone、window anchor を共有する。
    corroboration_unit:
      statement: cluster 群のうち、failure mode と provenance が十分に分離され、独立支持として 1 回だけ数えられる単位。same_team 以下の反復は既定で 1 単位に capped する。
    aggregation_window:
      statement: 1 detector case の confidence を集約する時間または event interval。window は detector family ごとに異なり、window overlap は same hypothesis なら merge を優先する。
  detector_profiles:
    local_convention_detected:
      statement: registry / mapping / strengthening / reflection cycle を単位にし、same basis lineage と protected facet mismatch の疑いを cluster 化する。review thread の反復だけでは corroboration を増やさない。
    policy_drift:
      statement: active / reflected basis の有効期間と effective reliance 区間を窓に取り、protected facet mismatch または superseded / revoked / out-of-scope basis の effective use を cluster 化する。confirm には separation または direct authoritative pair を要求する。
    suspected_leak:
      statement: sink exposure episode と containment / ttl window を窓に取り、artifact lineage・sink family・route identity・audience / automation reach を束ねて cluster 化する。mirrored telemetry は suspicion の補助には使えても confirmed leak の shortcut にしない。
  independence_boundaries:
    same_source: 同一 source instance・同一 log stream・同一 declaration thread。独立 corroboration には数えない。
    same_pipeline: 同一 pipeline 内の再計算、retry、mirror copy。既定では 1 cluster に畳み込む。
    same_team: 同一 team / 同一 authority family に属するが、cross_pipeline / cross_authority までは離れていない観測。coupled_duplicate / judgement_split / tool_split / dual_separated / forum_separated に細分し、dual_separated 以上だけを same_team corroboration 候補とする。
    cross_pipeline: 異なる observability path、異なる execution chain、または registry trace と runtime trace のように failure mode が分離された観測。独立 corroboration の既定下限になる。
    cross_authority: authority tier または organization boundary が分離された観測。global_default や external commitment を含む confirm で最も強い separation とみなす。
  duplicate_and_burst_taxonomy:
    repeated_alert: 同一 source / pipeline から同じ hypothesis に対して反復発火した alert。persistence 補助には使えても corroboration を増やさない。
    mirrored_duplicate: 同一原観測の mirror / replica / cache / downstream copy。freshness / lag が整っても独立証拠には数えない。
    batch_anomaly: 単一 batch failure から多数 item が同時発火した状態。item 数ではなく batch incident 1 件として扱い、count inflation を禁止する。
    window_overlap: 重なる集約窓から同一 hypothesis が再計上される状態。window anchor と lineage が同じなら merge し、別 window とみなすには state transition または effect-zone shift を要求する。
    burst_event: 短時間の高頻度 signal 群。strong suspicion の早期起動には使えるが、confirm 条件では capped persistence bonus までに留める。
  aggregation_policy:
    within_cluster:
    - cluster 内集約は max-support を基底にし、source diversity と time persistence にだけ bounded bonus を与える。
    - same_source / same_pipeline の追加 signal は confidence を線形加算しない。
    - batch anomaly の item 数、mirrored duplicate 数、retry 回数は corroboration 数に変換しない。
    across_clusters:
    - cluster 間集約は corroboration unit ごとに代表 cluster を取り、bounded aggregation を使う。
    - same_team 以下の cluster 群は既定で 1 corroboration unit に capped し、cross_pipeline 以上で初めて独立 corroboration を増やす。
    - window overlap で hypothesis_key・effect_zone・lineage が同じ cluster は merge し、distinct state transition がある場合だけ分離する。
    non_implications:
    - aggregated confidence が高いこと自体は confirm を意味しない。
    - single strong cluster は emergency suspend を正当化しうるが、confirmed policy drift や confirmed leak の shortcut 一般にはならない。
  branch_connection:
    emergency_suspend:
    - single strong cluster でも、blast radius が大きい、effective reliance が live、または protected facet / prohibited sink への hit があるときは起動しうる。
    - burst だけで起動するのではなく、current action の downstream automation / external commitment / authoritative reliance と束で評価する。
    confirm:
    - confirmed policy drift には direct authoritative pair、または required separation を満たす 2 以上の corroboration unit を要求する。
    - confirmed leak には direct reach evidence と direct sink identity を要求し、mirrored telemetry 単独を shortcut にしない。
    release:
    - lawful lineage repair、reflection 完了、scope repair、closure evidence、または false positive clearing により active mismatch / live exposure が消えたとき。
    - window expiry だけでは release せず、repair または contrary evidence の束縛を要求する。
    revoke_or_escalate:
    - unlawful basis や leaked artifact を authoritative / active set から外す必要があるときは revoke を優先する。
    - required authority 不足、cross-domain impact、peer forum conflict、notification obligation が残るときは escalate する。
  tool_split:
    DecisionLedger:
    - detector_case_id
    - hypothesis_key
    - signal_unit_id
    - signal_cluster_id
    - corroboration_unit_id
    - aggregation_window_profile_ref
    - window_anchor_ref
    - independence_class
    - duplicate_kind
    - burst_cap_state
    - cluster_support_class
    - aggregated_confidence_bundle_ref
    GraphEngine:
    - detector_signal_clustered
    - detector_signal_deduped
    - detector_cluster_corroborated
    - detector_window_merged
    - detector_burst_capped
    - emergency_suspend_triggered
    - detector_case_released
  residual_open_points:
  - profile/context ごとの aggregation window と hard expiry の数値較正
  - mirror lag upper bound の prior / credibility level を detector freshness rule へどう較正するか
  - operator bias / adversarial flooding / replay attack への補正をどこまで canonical 化するか
detector_window_expiry_governance:
  status: provisional_fixed
  statement: detector window / expiry governance とは、detector case ごとの signal persistence window・corroboration aggregation window・case hard expiry を分離して較正し、freshness・mirror lag・confirmation_due と接続しながら stale evidence の admissibility を統治する規則である。
  core_claims:
  - signal persistence window は cluster が live corroboration として数えられる上限である。
  - corroboration aggregation window は独立 cluster を同一 case epoch に束ねられる上限である。
  - case hard expiry は unresolved case に対して stale support を current judgement へ使える最終上限であり、超過後は invalid へ落とす。
  - grace 領域は hold / emergency suspend の継続や manual review の補助には使えるが、confirmed policy drift、confirmed leak、release / closure の shortcut には使わない。
  - hard expiry 到達は auto release や auto clear を意味しない。hard expiry は stale support の admissibility を失効させ、新しい観測を new epoch として扱う境界である。
  detector_family_rationale:
    local_convention_detected:
      statement: local convention は疑い状態であり、review / reflection cycle にまたがる観測を束ねる必要があるため、3 family の中では最も長い window を取る。
    confirmed_policy_drift:
      statement: confirmed drift は active / reflected basis と current effective use の差分を扱うため、local convention より短く、suspected leak より長い中間 window を取る。
    suspected_leak:
      statement: suspected leak は外部到達や不可逆露出の危険を扱うため、3 family の中で最も短い window と hard expiry を取る。
  baseline_window_table:
    regulated:
      local_convention_detected:
        signal_persistence_window: 2営業日
        corroboration_aggregation_window: 4営業日
        case_hard_expiry: 7営業日
      confirmed_policy_drift:
        signal_persistence_window: 1営業日
        corroboration_aggregation_window: 2営業日
        case_hard_expiry: 5営業日
      suspected_leak:
        signal_persistence_window: 2時間
        corroboration_aggregation_window: 4時間
        case_hard_expiry: 1営業日
    engineering_tradeoff:
      local_convention_detected:
        signal_persistence_window: 5営業日
        corroboration_aggregation_window: 10営業日
        case_hard_expiry: 20営業日
      confirmed_policy_drift:
        signal_persistence_window: 3営業日
        corroboration_aggregation_window: 5営業日
        case_hard_expiry: 10営業日
      suspected_leak:
        signal_persistence_window: 4時間
        corroboration_aggregation_window: 1営業日
        case_hard_expiry: 2営業日
    organizational_or_social:
      local_convention_detected:
        signal_persistence_window: 7営業日
        corroboration_aggregation_window: 12営業日
        case_hard_expiry: 20営業日
      confirmed_policy_drift:
        signal_persistence_window: 5営業日
        corroboration_aggregation_window: 7営業日
        case_hard_expiry: 12営業日
      suspected_leak:
        signal_persistence_window: 1営業日
        corroboration_aggregation_window: 2営業日
        case_hard_expiry: 3営業日
  context_override_caps:
    single_branch:
      local_convention_detected:
        signal_persistence_window_cap: 2営業日
        corroboration_aggregation_window_cap: 3営業日
        case_hard_expiry_cap: 5営業日
      confirmed_policy_drift:
        signal_persistence_window_cap: 1営業日
        corroboration_aggregation_window_cap: 2営業日
        case_hard_expiry_cap: 4営業日
      suspected_leak:
        signal_persistence_window_cap: 2時間
        corroboration_aggregation_window_cap: 4時間
        case_hard_expiry_cap: 8時間
    external_irreversible:
      local_convention_detected:
        signal_persistence_window_cap: 1営業日
        corroboration_aggregation_window_cap: 2営業日
        case_hard_expiry_cap: 4営業日
      confirmed_policy_drift:
        signal_persistence_window_cap: 4時間
        corroboration_aggregation_window_cap: 1営業日
        case_hard_expiry_cap: 2営業日
      suspected_leak:
        signal_persistence_window_cap: 1時間
        corroboration_aggregation_window_cap: 2時間
        case_hard_expiry_cap: 4時間
    policy_sensitive:
      local_convention_detected:
        signal_persistence_window_cap: 2営業日
        corroboration_aggregation_window_cap: 4営業日
        case_hard_expiry_cap: 7営業日
      confirmed_policy_drift:
        signal_persistence_window_cap: 1営業日
        corroboration_aggregation_window_cap: 2営業日
        case_hard_expiry_cap: 5営業日
      suspected_leak:
        signal_persistence_window_cap: 2時間
        corroboration_aggregation_window_cap: 4時間
        case_hard_expiry_cap: 1営業日
  stale_to_invalid_rules:
  - local_convention_detected では、same review / reflection cycle の fresh registry/runtime pair を失った cluster を hard expiry 到達時に invalid へ落とす。
  - confirmed_policy_drift では、active / reflected basis と current effective use を結ぶ live trace を失った mismatch evidence を hard expiry 到達時に invalid へ落とす。
  - suspected_leak では、mirrored telemetry・indirect routing evidence・self-report を hard expiry 到達時に invalid へ落とし、direct reach evidence も history には残すが current confirm / release 根拠には再観測を要求する。
  merge_split_dedup_rules:
    merge:
    - hypothesis_key・target lineage・protected facet / sink family・effect zone が一致し、観測間隔が corroboration aggregation window 内で、remediation / confirm / release / reflection epoch の切替えがなければ merge する。
    split:
    - effect zone、protected facet、sink family、authority tier、remediation epoch、closure epoch のいずれかが切り替わる場合は split する。
    - hard expiry 超過後の新しい signal は reopen ではなく new epoch として扱う。
    dedup:
    - same_source / same_pipeline / mirrored duplicate / batch slice は独立 corroboration として数えず、同一 cluster に畳み込む。
  linkage_rules:
    with_freshness_and_mirror_lag:
    - mirrored source の age は observation age ではなく mirror lag upper bound を加えた effective age で判定する。
    - lag upper bound が unknown_or_excessive の場合、少なくとも live support から外し、confirmed branch には使わない。
    with_confirmation_due:
    - emergency suspend 中の confirm は、contributing evidence が confirmation_due_at と case_hard_expiry の早い方まで live support を維持することを要求する。
    - hard expiry 超過は suspend の auto release ではなく、re-observation / upper review / explicit closure 要求へ接続する。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - detector_case_family
    - signal_persistence_window_ref
    - corroboration_aggregation_window_ref
    - case_hard_expiry_ref
    - hard_expiry_at
    - support_state
    - case_epoch_id
    - stale_to_invalid_reason
    graph_engine:
    - detector_support_degraded_to_grace
    - detector_support_invalidated
    - detector_case_epoch_split
    - detector_case_hard_expiry_reached
    - detector_case_reobserved
  residual_open_points:
  - same-team だが別 tool / 別 operator の partial independence を corroboration independence にどう反映するか
  - operator bias / adversarial flooding / replay attack の補正項をどこまで canonical 化するか
mirror_lag_prior_credibility_governance:
  status: provisional_fixed
  statement: mirror lag prior / credibility governance とは、mirrored source の lag upper bound を source family ごとの prior と credibility class で初期化し、clock / cadence / breach history を用いて安全側に更新し、effective age・freshness・detector window・confirmation_due の admissibility へ接続する規則である。
  core_claims:
  - lag upper bound は平均遅延ではなく、current judgement に使ってよい安全側上界である。
  - credibility は content 真偽ではなく、その lag upper bound を current frame で信頼してよい強さを表す。
  - prior は source family と delivery semantics から与え、sample が少ない場合の初期保守値として使う。
  - 同一 source family でも clock missing、anchor mismatch、identity lineage 断絶、recent breach により credibility は低下しうる。
  - weak basis や self-report は bound を tighten できず、unknown_or_excessive は stale 以上として扱う。
  credibility_classes:
    deterministic:
      statement: hard ceiling または zero-lag が authority/clock basis で確定している状態。
      numeric_level: 0.99
      allowed_use:
      - live support
      - confirmed branch
      - closure / release confirmation
    bounded_strong:
      statement: ratified delivery SLA または stable mirror path により、保守側 upper bound を強く束縛できる状態。
      numeric_level: 0.95
      allowed_use:
      - live support
      - outward-risk facet の confirmed 候補
      limits:
      - direct reach confirmed の代用にはしない
      - sealed re-entry / closure confirmation の単独根拠にはしない
    bounded_moderate:
      statement: ratified batch rule または十分な recent empirical lag から upper bound を置けるが、path 変動余地が残る状態。
      numeric_level: 0.9
      allowed_use:
      - live または grace support
      - provisional promotion
      - suspicion 継続
      limits:
      - confirmed branch の単独根拠にはしない
    weak:
      statement: sparse export、digest、summary、または self-report 補助だけで上界を推定している状態。
      numeric_level: 0.75
      allowed_use:
      - hold 継続
      - manual review 起動
      limits:
      - live confirm / release / closure には使わない
    unknown_or_excessive:
      statement: admissible な upper bound がない、または current window に対して過大である状態。
      numeric_level: 0.0
      allowed_use: []
      limits:
      - stale 以上として扱う
      - confirmed / closure には使わない
  source_family_priors:
    direct_system_observation:
      prior_upper_bound: 0秒
      default_credibility_class: deterministic
      note: same authoritative plane の直観測は mirror lag rule を介さない。
    direct_reach_evidence:
      prior_upper_bound: 0秒
      default_credibility_class: deterministic
      note: current reach / externality の直達証拠は zero-lag で扱う。
    access_control_or_routing_log:
      prior_upper_bound: 5分
      default_credibility_class: bounded_strong
      note: first-party authoritative log を前提とし、clock health と lineage が束縛される場合に限る。
    mirrored_telemetry:
      prior_upper_bound: 30分
      default_credibility_class: bounded_strong
      note: near-real-time mirror path を対象とし、sampling summary や periodic export は含めない。
    mirrored_registry:
      prior_upper_bound: 1営業日
      default_credibility_class: bounded_moderate
      note: reflected registry や secondary catalog の反映遅延を含む。
    exported_log:
      prior_upper_bound: 4時間
      default_credibility_class: bounded_moderate
      note: periodic export / ETL / index refresh を含む。
    batch_summary:
      prior_upper_bound: 2営業日
      default_credibility_class: weak
      note: digest / report / aggregated summary は freshness より coverage 説明向けに使う。
  update_rules:
  - direct_system_observation と direct_reach_evidence は prior を更新せず、常に zero-lag deterministic とする。
  - mirrored source の active upper bound は、source family prior、ratified cadence/SLA bound、recent breach guard、安全余裕の max で保守側に求める。
  - stronger basis が入った場合だけ bound を tighten できる。weak basis や self-report では tighten しない。
  - recent breach が active upper bound を超えた場合、repair/revalidation 前は unknown_or_excessive へ落とす。
  - clock missing、anchor mismatch、identity lineage 断絶、sampling semantics 不明のいずれかがある場合、少なくとも bounded_strong には置かない。
  connection_rules:
    with_effective_age:
    - effective age は observation age + active upper bound で評価する。
    - bounded_moderate 以下の class は、single_branch / external_irreversible / policy_sensitive では live 判定を短くし、window の早い方に従わせる。
    with_freshness:
    - deterministic / bounded_strong で active upper bound が signal persistence window 内なら live 候補になりうる。
    - bounded_moderate は local convention / provisional drift では live 候補になりうるが、confirmed leak / closure の単独根拠にはしない。
    - weak は最大でも grace support とし、unknown_or_excessive は stale 以上とする。
    with_confirmation_due:
    - emergency confirm に使う mirrored evidence は、少なくとも bounded_strong で、effective age が confirmation_due_at と case_hard_expiry の早い方を超えないことを要求する。
    - mirrored_registry / exported_log / batch_summary は、単独では release / closure confirmation の最終根拠にしない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - lag_prior_family
    - lag_prior_upper_bound
    - lag_credibility_class
    - lag_credibility_level
    - lag_bound_basis
    - lag_bound_updated_at
    - lag_unknown_or_excessive_reason
    graph_engine:
    - lag_prior_initialized
    - lag_bound_tightened
    - lag_bound_degraded
    - lag_unknown_or_excessive_detected
  residual_open_points:
  - small-sample 時の empirical lag sample をどの observation class 粒度で pooled 更新するか
  - hidden coupling relation の semantic delta class を detector / facet ごとにどこまで自動判定するか
  - operator bias / adversarial flooding / replay attack の補正を detector confidence 側へどう戻すか
same_team_partial_independence_governance:
  status: provisional_fixed
  statement: same_team partial independence governance とは、同一 team / 同一 authority family の内部で、operator・tool・forum・raw basis・derivation の差分を common-mode failure 分離として較正し、どの pair を bounded diagnostic diversity、どの pair を same_team corroboration unit、どの pair を重複として畳み込むかを定める規則である。
  core_claims:
  - independence は人数差ではなく、共通 upstream・共通判断鎖・共通実行基盤からどこまで failure mode を分離できているかで決まる。
  - top-level provenance separation は same_source / same_pipeline / same_team / cross_pipeline / cross_authority を維持し、same_team はその内部でだけ細分する。
  - operator split だけ、または tool split だけでは独立 corroboration を作らず、manual triage と max_conf の bounded bonus に留める。
  - same_team corroboration unit は dual_separated または forum_separated に限って認め、1 team / 1 hypothesis / 1 aggregation window あたり 1 unit に cap する。
  - same_team corroboration は required_separation=same_team の文脈にだけ使え、cross_pipeline / cross_authority の required separation を代替しない。
  - same_team corroboration は local_convention_detected と template_local の drift 確認補助には使えるが、confirmed leak、direct reach、external commitment、policy_sensitive facet の shortcut には使わない。
  classification_order:
  - まず same_source / mirrored derivation / same_pipeline / cross_pipeline / cross_authority を判定し、same_team の内部較正は residual case にだけ適用する。
  - cross_pipeline または cross_authority が成立する場合、same_team の内部 class ではなく上位 separation を優先する。
  - same raw-basis snapshot、same exported slice、same mirrored copy から生じた pair は、別 operator / 別 tool でも coupled_duplicate へ落とす。
  hidden_coupling_axes:
  - shared_raw_basis_snapshot
  - mirrored_or_derived_copy
  - shared_operator_judgement
  - shared_tool_or_model_run
  - shared_rulepack_or_prompt_pack
  - shared_forum_or_review_chain
  - shared_authority_path
  same_team_partial_classes:
    coupled_duplicate:
      statement: same team 内で見かけ上は別 signal でも、同一 raw basis、mirror copy、derived preview、または実質的に同じ判断鎖から生じた重複。
      allowed_use:
      - dedup
      - persistence support
      non_implications:
      - 独立 corroboration を意味しない。
      - tool / operator の数を増やしても corroboration unit は増えない。
    judgement_split:
      statement: operator は異なるが、tool / forum / raw basis / pipeline が実質的に共有される pair。判断者多様性はあるが、failure mode 分離は弱い。
      allowed_use:
      - manual review priority の上昇
      - max_conf への bounded bonus
      non_implications:
      - corroboration unit の追加を意味しない。
      - confirm 条件の separation を満たさない。
    tool_split:
      statement: tool または model execution family は異なるが、operator または raw basis / forum が共有される pair。診断多様性はあるが、upstream coupling が残る。
      allowed_use:
      - diagnostic diversity の記録
      - max_conf への bounded bonus
      non_implications:
      - corroboration unit の追加を意味しない。
      - cross_pipeline の代用ではない。
    dual_separated:
      statement: operator と tool/execution family がともに分離され、shared raw-basis snapshot や mirrored derivation がなく、観測 anchor または acquisition path が独立している pair。
      allowed_use:
      - same_team corroboration unit
      - local_convention_detected の corroboration 補助
      caps:
      - 1 team / 1 hypothesis / 1 aggregation window あたり 1 unit
      - repeated pair や再観測を線形加算しない
    forum_separated:
      statement: dual_separated に加えて、forum / review chain または sub-authority path が分離され、同一 team 内で最も強い benign independence を持つ pair。
      allowed_use:
      - same_team corroboration unit
      - template_local の drift 確認補助
      caps:
      - cross_pipeline / cross_authority へ昇格しない限り 1 team cap を超えない
  admissibility_rules:
  - judgement_split と tool_split は corroboration unit 数を増やさず、bounded bonus だけを与える。
  - dual_separated / forum_separated でも、shared prompt / shared rulepack / shared model checkpoint が同一 raw basis へ同型変換を掛けているだけなら corroboration unit に昇格させない。
  - same_team corroboration unit は detector family ごとに required_separation=same_team のときだけ admissible であり、cross_pipeline / cross_authority の requirement を代替しない。
  - same_team corroboration unit は direct sink identity、direct reach、external commitment、sealed re-entry、policy_sensitive facet の final confirm には使わない。
  - one team から複数の dual/forum separated pair が出ても、current aggregation window 内では代表 1 unit だけを数える。
  context_connection:
    local_convention_detected:
    - judgement_split / tool_split は investigation priority を上げうるが、confirm shortcut には使わない。
    - dual_separated / forum_separated は same_team corroboration unit として admissible になりうる。
    confirmed_policy_drift:
    - template_local で required_separation=same_team の場合だけ、forum_separated を confirm 補助へ使える。
    - domain_local 以上で required_separation が cross_pipeline 以上なら same_team corroboration は不足とみなす。
    suspected_leak:
    - same_team partial independence は suspicion 強化には使えても、confirmed leak の direct reach / sink identity requirement を代替しない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - same_team_partial_class
    - hidden_coupling_axis_set
    - same_team_pair_admissibility
    - same_team_corroboration_cap_applied
    - bounded_bonus_class
    - confirm_forbidden_reason
    graph_engine:
    - same_team_pair_classified
    - same_team_pair_collapsed
    - same_team_bonus_applied
    - same_team_corroboration_capped
    - same_team_confirm_blocked
  residual_open_points:
  - hidden coupling relation の bounded_shared と hard_shared の境界を detector family / claim facet ごとにどこまで自動判定できるか
  - operator bias / adversarial flooding / replay attack の補正を aggregation 側へどう戻すか
hidden_common_mode_coupling_registry_governance:
  status: provisional_fixed
  statement: hidden common-mode coupling registry governance とは、prompt / rulepack / model checkpoint / template / mirror lineage のように、表面上は別 signal や別 reviewer path に見えても実際には同型変換・同一実行意味・同一派生鎖を共有させる upstream source を canonical registry として管理し、same_team corroboration cap、small-sample prior reset、penalty activation、manual review routing の共通根拠へ接続する規則である。
  core_claims:
  - hidden coupling は pairwise heuristic ではなく authoritative registry で扱う。local naming や運用記憶だけで independence を主張しない。
  - canonical source family は prompt_pack、rulepack、model_checkpoint、template_bundle、mirror_lineage の5つを採用する。
  - mirror_lineage は content source ではなく derivation family だが、independence collapse・replay 判定・prior reset trigger に効くので同じ registry で扱う。
  - same family であっても同一性・派生・継承・鏡像・同一実行束縛を区別し、family 一致だけで hard coupling とみなさない。
  - corroboration 判定は signal pair の表面差分より upstream closure を優先する。
  - registry 未束縛の hidden coupling は independence の証拠ではなく、未知は安全側で unresolved coupling として扱う。
  canonical_source_families:
    prompt_pack:
      statement: 推論・判定・要約の指示集合。system/developer/operator prompt、guard prompt、review prompt の束を含む。
    rulepack:
      statement: 判定規則・lint rule・threshold profile・mapping rule など、実行意味を拘束する規則束。
    model_checkpoint:
      statement: model family、checkpoint、adapter、safety overlay、runtime decoding profile の組。
    template_bundle:
      statement: report / review form / checklist / extraction schema / UI template など、出力・観測の枠を事前に形作るテンプレート束。
    mirror_lineage:
      statement: mirror / cache / exported slice / derived preview / replicated index の lineage root と refresh chain。
  relation_taxonomy:
    identical_source:
      statement: 同一 registry entry または content-equivalent hash / witness を持つ。
    parameterized_variant:
      statement: 共通 parent を持ち、差分は parameter / wording / threshold の局所変化に限られる。semantic role は保存される。
    inherited_bundle:
      statement: base pack / template を継承し、局所 add-on だけが異なる。
    mirrored_lineage:
      statement: direct source ではなく同一 lineage root から派生した copy / cache / export / preview である。
    co_executed_profile:
      statement: prompt / rulepack / checkpoint が別 entry でも同じ execution profile または same run capsule で束縛される。
    unrelated:
      statement: canonical witness 上、同一 upstream source を共有しない。
  coupling_strength_policy:
    hard_shared:
      conditions:
      - identical_source
      - mirrored_lineage
      - co_executed_profile
      - parameterized_variant または inherited_bundle で semantic delta class が none である
      - parameterized_variant または inherited_bundle で semantic delta class が material または unresolved である
      effects:
      - same_team corroboration unit を増やさない。
      - dual_separated / forum_separated を confirm 用 independence に使わない。
      - semantic delta class が none のときも、見かけ上の差分を独立 corroboration route に数えない。
      - small-sample calibration を cold_start または sparse へ戻す trigger になりうる。
    bounded_shared:
      conditions:
      - parameterized_variant または inherited_bundle で、semantic delta が ratified され、affected facet が限定される
      effects:
      - confirm 用 corroboration は増やさず、triage / bounded bonus / scoped manual review routing にだけ使う。
      - profile / facet に応じて same_team cap を厳格化する。
    weak_affinity:
      conditions:
      - family は同じだが active lineage / parent / execution capsule の共有が witness で束縛されない
      effects:
      - registry metadata として保持するが、自動 downgrade はしない。
      - unresolved coupling suspicion が別に立っていれば manual review を優先する。
  registry_entry_schema:
    required_fields:
    - coupling_source_id
    - source_family
    - canonical_fingerprint
    - semantic_role
    - version_or_snapshot
    - parent_source_ref
    - lineage_root_ref
    - execution_capsule_ref
    - authority_ref
    - validity_window
    - status
    optional_fields:
    - affected_detector_family_set
    - affected_claim_facet_set
    - semantic_delta_class
    - mirror_refresh_profile_ref
    - witness_ref
    - supersedes_ref
  linkage_rules:
    same_team_partial_independence:
    - signal pair が hard_shared な coupling source を共有する場合、TP は dual_separated / forum_separated へ昇格させず、少なくとも tool_split 以下へ抑制する。
    - hard_shared mirror_lineage を共有し、かつ raw_basis_lineage も同一なら coupled_duplicate として畳み込む。
    - bounded_shared は corroboration increment を増やさず、diagnostic diversity metadata と scoped triage にだけ使う。
    small_sample_prior_reset:
    - unseen coupling source family、major version change、lineage root change、unresolved relation の新規検出は calibration reset trigger 候補である。
    - hard_shared source の新規発見により、既存の warmed judgement が hidden coupling 前提で成立していた場合は OS を cold_start または sparse へ巻き戻す。
    - bounded_shared でも detector family / claim facet が protected facet に触れるときは prior_ready を一時停止しうる。
    penalty_activation:
    - flooding penalty は burst 内 cluster が hard_shared または bounded_shared source に密集するときに強化する。
    - replay penalty は mirrored_lineage または inherited_bundle の再包装を new corroboration と数えないための根拠にする。
    - bias penalty は shared prompt / template / forum chain が confirm path を実質同型化しているときに severity を上げうる。
    manual_review_routing:
    - hard_shared かつ protected facet 影響あり、または relation unresolved の場合、confirm / release 前に manual review を必須とする。
    - cross-domain / global_default / external_irreversible に触れる coupling registry の新設・major change は central または domain authority review を要する。
    - same-team local template だけに閉じる bounded_shared change は delegated review を許しうるが、confirm shortcut には使わない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - coupling_source_id_set
    - coupling_relation_ref_set
    - coupling_strength_class
    - coupling_resolution_status
    - calibration_reset_reason
    - same_team_downgrade_reason
    - manual_review_required_by_coupling
    graph_engine:
    - coupling_registry_entry_created
    - coupling_registry_entry_superseded
    - coupling_relation_bound
    - hidden_coupling_detected
    - same_team_independence_downgraded
    - calibration_reset_triggered_by_coupling
  residual_open_points:
  - 真の incident burst と adversarial flooding を hidden coupling を前提に early-stage でどう分離するか
adversarial_correlation_penalty_governance:
  status: provisional_fixed
  statement: small-sample prior / credibility governance とは、sparse evidence 下で α0 / β0 / credibility level ρ の役割を分離し、confirm / release / execute のような enabling branch と suspend / gate / manual review のような blocking branch を混同せずに安全側で判定する規則である。
  core_claims:
  - prior は証拠代替ではなく、少数観測時の過信を抑える正則化である。
  - α0 / β0 は prior mean と prior mass を通じて、既定期待値と慣性を分けて与える。
  - ρ は lower confidence bound の厳しさであり、integrity / freshness / provenance の代用ではない。
  - confirm / release / delegated auto re-enable は、confirm-grade support の posterior を安全側に読む用途でだけ prior を使う。
  - emergency suspend / manual review / provisional hold は、small-sample posterior 単独ではなく、strong direct anchor・critical context・policy block と束で開く。
  - severe penalty や confirmed attack-like judgement は、prior だけで作らず、direct abuse anchor または分離した corroboration を要求する。
  penalty_taxonomy:
    bias_penalty:
      statement: operator / reviewer / forum の寄与が過度に集中し、directional skew や confirm/veto の偏りが続くために、見かけ上の corroboration が実質的に同一判断鎖へ収束している状態への補正。
      activation_examples:
      - confirm path の主要 cluster が同一 operator family または同一 reviewer chain に集中する
      - same_team bonus や manual override が特定 operator 側へ系統的に偏る
      - self-report や reviewer-mediated transform への依存が強いのに counter-anchor が乏しい
      first_effects:
      - judgement_bonus / tool_bonus の除去
      - same_team corroboration credit の停止
      - aggregate confidence の安全側減衰
      do_not_apply_as_numeric_penalty_when:
      - direct authoritative pair が first-party anchor と fresh な runtime trace で束縛されている
      - direct reach / direct sink identity が高 integrity で束縛され、operator discretion が confirm path に介在しない
    flooding_penalty:
      statement: 同一 hypothesis / facet / sink に対し、low-diversity signal を短時間に大量投入して queue や aggregation を飽和させ、confidence を水増ししようとする挙動への補正。
      activation_examples:
      - dedup 後にも same pipeline / same team の burst が期待 cadence を大きく超える
      - batch slice や retry が cluster / corroboration unit を押し上げる方向で再包装される
      - sink enumeration や review queue saturation を狙う probing が見える
      first_effects:
      - excess cluster の collapse
      - persistence bonus の抑制
      - confirm path の一時停止または security/audit への escalate
      do_not_apply_when:
      - registry 済み cadence を持つ telemetry / batch job の正常 burst である
      - statistical equivalence rule に沿った lawful re-sampling である
    replay_penalty:
      statement: stale / grace / resolved / revoked の lineage や same observation anchor を、新規観測であるかのように別 window / 別 signal_id / 別 artifact へ再投入する挙動への補正。
      activation_examples:
      - same exported slice / mirrored snapshot / derived preview を new evidence として再利用する
      - hard expiry 超過後の support を new epoch の corroboration に数えようとする
      - resolved case の evidence を lineage concealment つきで再点火する
      first_effects:
      - cross-window corroboration の停止
      - persistence support への格下げまたは invalid 化
      - confirm shortcut の遮断
      do_not_apply_when:
      - explicit revalidation により新しい observation anchor と successor lineage が記録されている
      - remediation / reflection に伴う lawful new epoch が明示されている
  application_rules:
    detector_confidence_aggregation:
    - bias penalty はまず bounded bonus を外し、その後も cluster が残るときだけ confidence を減衰させる。
    - flooding penalty は dedup / merge / TeamCap 適用後の excess multiplicity にだけ掛ける。raw count の多さ自体を penalty 理由にしない。
    - replay penalty は freshness / lag / epoch split で既に invalid な部分を二重減点しない。残余の reused support だけを減衰させる。
    policy_drift_threshold:
    - local_convention_detected は penalty 後の max_conf で評価するが、confirmed_policy_drift は severe penalty が confirm path を汚染している間は開かない。
    - direct authoritative pair が clean なとき、その direct cluster 自体には numeric penalty を掛けず、周辺 corroboration path だけを減衰させる。
    suspected_leak_corroboration:
    - direct reach / direct sink identity は replay や flooding の shortcut を受けず、依然として別の必須条件として要求する。
    - same_team partial independence は suspicion 強化には使えても、penalty で汚染された corroboration は confirmed leak の補助根拠へ昇格させない。
    - severe flooding / replay が detector abuse を示す場合、LeakS とは別に detector abuse escalation を起動する。
  degrade_suspend_escalate_rules:
    degrade:
    - mild bias は bounded bonus を除去する
    - mild flooding は excess cluster を capped duplicate へ畳み込む
    - mild replay は persistence support にだけ残し、new corroboration に数えない
    suspend:
    - moderate flooding / replay により current confirm path が汚染され、automation / externality / authoritative reliance が生きている
    - severe bias により reviewer path の公正性が壊れ、same-frame manual override なしでは confirm を開けない
    escalate:
    - detector abuse suspicion があり、security / audit / upper authority path が存在する
    - severe penalty が policy-sensitive / external-commitment / sealed re-entry の文脈に触れる
    'false':
    - severe penalty があり、lawful remediation path も upper path もなく、current frame で reliance を継続できない
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - calibration_target_family
    - prior_mean
    - prior_mass
    - credibility_level
    - ordinal_fallback_state
    - prior_profile_ref
    - context_cap_ref
    - direct_anchor_exception_flag
    graph_engine:
    - prior_profile_bound
    - ordinal_fallback_entered
    - ordinal_fallback_released
    - calibration_reset_triggered
  residual_open_points:
  - hidden coupling relation の semantic delta class を calibration reset policy へどこまで自動連携するか
  small_sample_prior_credibility_governance:
  role_split:
    prior_mean:
      notation: m0 = α0 / (α0 + β0)
      meaning: sparse evidence 下で既定でどこまで confirm-grade / success-grade だとみなすかの上限。
      safety_direction: high-impact 文脈ほど小さくする。
    prior_mass:
      notation: n0 = α0 + β0
      meaning: 少数観測に対して posterior がどれだけ動きにくいかを決める慣性。
      safety_direction: irreversible / policy-sensitive 文脈ほど大きくする。
    credibility_level:
      notation: ρ
      meaning: lower confidence bound をどこまで厳しく取るかを決める信頼水準。
      safety_direction: confirm / release / execute に使う文脈ほど高くする。
  target_families:
    delegated_auto_success:
      positive_event: bounded delegated action が incident なく完了し、rollback / post-check まで含めて success-grade だったこと。
      note: self-confidence の c_hist に使う。
    detector_confirmability:
      positive_event: detector support が dedup / freshness / provenance / penalty gate を通過し、confirm-grade corroboration として残ること。
      note: confirmed_policy_drift / confirmed_leak / final release 側に使う。
    penalty_severity_estimation:
      positive_event: bias / flooding / replay の penalty judgement が review 後も持続し、confirm gate に値すること。
      note: severe penalty は posterior 単独では作らず、direct abuse anchor または separated corroboration を要する。
  branch_policy:
    enabling_branch:
      applies_to:
      - confirmed_policy_drift
      - confirmed_leak
      - release
      - delegated auto re-enable
      rules:
      - warmed 状態または direct authoritative anchor がない限り、posterior 単独で threshold 充足とみなさない。
      - strong な prior を理由に confirm / release を早めない。
    blocking_branch:
      applies_to:
      - emergency_suspend
      - manual_review_priority
      - provisional_hold
      - penalty_gate provisional activation
      rules:
      - cold_start でも strong direct anchor や protected facet hit があれば開きうる。
      - ただし sparse posterior だけで severe penalty や confirmed attack judgement を作らない。
  ordinal_fallback_policy:
    states:
      cold_start: effective sample が初期閾値未満で、posterior は ranking / bonus removal / manual review priority にしか使わない状態。
      sparse: posterior は suspicion 継続や hold / suspend 維持に使えるが、final confirm / release / severe penalty には不足する状態。
      warmed: posterior を confirm-grade threshold 判定へ使える状態。
    reset_rules:
    - unseen context bucket
    - detector family の切替え
    - major policy version change
    - hidden common-mode coupling の新規検出
    - severe drift / replay concealment
  monotone_strictness_rules:
  - regulated_domain は engineering_tradeoff_domain より prior_mean を上げない。
  - external_irreversible と policy_sensitive は normal context より prior_mass と ρ を下げない。
  - suspected_leak / confirmed_policy_drift / penalty_severity は local_convention_detected より confirm optimism を高くしない。
early_stage_burst_flooding_separation_governance:
  status: provisional_fixed
  statement: early-stage burst / flooding separation governance とは、hidden common-mode coupling registry、same-team corroboration cap、small-sample prior を前提に、lawful incident burst と attack-like flooding を sparse な初期観測段階で分離し、suspend は早めるが confirm は早めすぎないための概念規則である。
  core_claims:
  - early-stage separation は malicious intent の最終断定ではなく、current detector branch を安全側に振り分ける provisional classification である。
  - lawful incident burst は単なる件数の多さではなく、registered cadence または incident response runbook に沿う集中観測であり、direct anchor・独立 route・sink 適合性のいずれかで支えられる。
  - attack-like flooding は、low-diversity・hard_shared concentration・replay reuse・sink probing の組で corroboration を水増しする、または queue / automation path を飽和させる集中投入である。
  - sparse state では benign と hostile の二値に潰さず、ambiguous_sparse を明示的に保持する。
  - suspend threshold は confirm threshold より低く、protected facet や external-sensitive sink では provisional suspend を先に開ける。
  - confirmed attack-like judgement は early-stage score だけで作らず、direct abuse anchor または separated corroboration を追加で要求する。
  minimal_observation_unit:
    support_atom:
      statement: 同一 hypothesis_key、同一 protected facet、同一 sink family、同一 epoch の下で dedup / merge / TeamCap 後に残る最小 support 単位。
      required_bindings:
      - hypothesis_key
      - protected_facet
      - sink_ref_or_sink_family
      - epoch_id
      - cluster_rep_ref
      - source_closure_ref
    cluster:
      statement: 同一 detector case の中で、support_atom を hypothesis_key × protected_facet × sink × epoch ごとに束ねた局所 burst 観測集合。
  cluster_taxonomy:
    lawful_incident_burst:
      statement: registered cadence または ratified incident workflow と整合し、replay concealment がなく、direct anchor / independent route / sink fit のいずれかで支えられる集中観測。
      non_implications:
      - confirm-grade corroboration の自動成立を意味しない。
      - excess multiplicity の全免責を意味しない。
    ambiguous_sparse_burst:
      statement: burst は見えるが、cadence・diversity・coupling・replay・sink exposure のいずれかが未束縛で、lawful / hostile をまだ切れない状態。
      non_implications:
      - benign 判定ではない。
      - confirm-grade flooding 判定でもない。
    flooding_suspect:
      statement: cadence excess、diversity collapse、hard_shared concentration、replay reuse、sink probing のうち複数が同時に現れ、lawful burst witness が不足しているため、corroboration inflation または detector abuse を疑う状態。
      non_implications:
      - 直ちに malicious intent を確定しない。
      - direct anchor を自動で否定しない。
    attack_like_flooding_confirmed:
      statement: flooding_suspect に加え、direct abuse anchor または separated corroboration があり、sink probing / queue saturation / concealed replay のいずれかが confirm-grade に束縛された状態。
      non_implications:
      - incident 内容自体の真偽を一括否定するわけではない。
      - remediation path の不存在を直ちに意味しない。
  threshold_bundle_axes:
    diversity_axis:
      statement: dedup・same_team cap・hidden coupling closure を通した後に、独立 corroboration unit がどこまで残るかを見る軸。
      safety_rule:
      - hard_shared と mirrored_lineage mass は diversity を増やさない。
      - bounded_shared は diagnostic metadata には使えても confirm 用独立 unit には使わない。
    cadence_axis:
      statement: 観測密度が registered cadence、incident runbook、lawful retry / re-sampling envelope と整合するかを見る軸。
      safety_rule:
      - raw count の多さだけで excess とみなさない。
      - registered されていない burst は benign 前提に置かない。
    coupling_axis:
      statement: cluster mass が hard_shared / bounded_shared / unresolved coupling source にどれだけ集中しているかを見る軸。
      safety_rule:
      - unresolved coupling は independence の証拠に使わない。
      - hard_shared concentration は same_team corroboration と persistence bonus を押し上げない。
    replay_axis:
      statement: same observation anchor、stale lineage、resolved / revoked lineage、mirrored preview の再包装がどれだけ含まれるかを見る軸。
      safety_rule:
      - concealed replay は lawful burst witness を上書きしうる強い汚染要因として扱う。
      - explicit revalidation 付き successor lineage は replay と混同しない。
    sink_axis:
      statement: burst が internal low-risk sink なのか、protected internal / external-sensitive / sink-enumerating なのかを見る軸。
      safety_rule:
      - protected / external-sensitive sink では suspend を confirm より先に開いてよい。
      - sink enumeration は detector abuse suspicion の強化要因である。
    direct_anchor_axis:
      statement: first-party runtime trace、direct authoritative pair、direct reach のような direct anchor がどこまで clean に束縛されるかを見る軸。
      safety_rule:
      - direct anchor は lawful burst を支えうるが、concealed replay や sink probing を免責しない。
      - direct anchor 不在では confirmed attack-like judgement を早く作りすぎない。
  branch_rules:
    lawful_incident_burst:
      enter_when:
      - cadence_axis が registered または bounded_elevated である
      - replay_axis が clean である
      - coupling_axis が hard_shared_dense / unresolved_dense ではない
      - direct_anchor_axis、independent route、registered runbook witness のいずれかがある
      effects:
      - excess multiplicity を corroboration unit へ自動加算しない。
      - persistence / triage は許すが、confirm shortcut は開かない。
    ambiguous_sparse_burst:
      enter_when:
      - lawful_incident_burst と flooding_suspect のどちらにも十分束縛されない
      effects:
      - corroboration increment は保守的に cap する。
      - hold / manual review priority / bounded monitoring を優先する。
    flooding_suspect:
      enter_when:
      - cadence excess・diversity collapse・hard_shared concentration・replay reuse・sink probing のうち少なくとも二つが active
      - lawful burst witness が不足または汚染されている
      effects:
      - flooding penalty の mild 以上を候補化する。
      - confirm path への bonus / corroboration increment を停止または減衰する。
      - protected context では emergency suspend / audit review を先に開きうる。
    attack_like_flooding_confirmed:
      enter_when:
      - flooding_suspect が active
      - concealed replay、queue saturation、sink enumeration、lineage concealment のいずれかが direct abuse anchor または separated corroboration で束縛される
      effects:
      - severe penalty gate、detector abuse escalation、security / upper authority path を開きうる。
      - same-frame remediation がなければ current confirm branch を閉じる。
  linkage_rules:
    hidden_common_mode_coupling_registry:
    - coupling registry は diversity_axis と coupling_axis の authoritative root であり、cluster taxonomy は pairwise heuristic ではなく closure を前提に判定する。
    - semantic delta が unresolved の prompt/template change は lawful burst witness を増やさず、ambiguous_sparse または flooding_suspect 側へ倒しうる。
    adversarial_correlation_penalty:
    - flooding_suspect は少なくとも bounded bonus 除去を伴い、attack_like_flooding_confirmed だけが severe flooding penalty や detector abuse escalation の確定根拠になりうる。
    - replay penalty は replay_axis、bias penalty は direct_anchor 汚染の有無と reviewer path concentration を通じて再評価する。
    small_sample_prior_credibility:
    - early-stage separation は cold_start / sparse でも suspend / hold に使えるが、confirmed attack-like judgement を posterior 単独で作らない。
    - lawful_incident_burst でも warmed requirement や direct anchor exception を代替しない。
    detector_confidence_aggregation:
    - lawful_incident_burst では cluster collapse を緩めても corroboration unit cap は維持する。
    - flooding_suspect では excess cluster を capped duplicate または persistence-only support へ落とす。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - burst_cluster_id
    - burst_taxonomy_state
    - diversity_axis_state
    - cadence_axis_state
    - coupling_axis_state
    - replay_axis_state
    - sink_axis_state
    - direct_anchor_axis_state
    - lawful_burst_witness_ref
    - detector_abuse_anchor_ref
    graph_engine:
    - burst_cluster_opened
    - burst_taxonomy_promoted
    - lawful_burst_witness_bound
    - flooding_suspect_raised
    - detector_abuse_anchor_bound
    - attack_like_flooding_confirmed
  residual_open_points:
  - semantic delta class の unresolved/material dense rotation を detector family ごとに cluster taxonomy へどこまで数値接続するか
cadence_registry_governance:
  status: provisional_fixed
  statement: cadence registry governance とは、detector family と sink class ごとに通常運転として許容する観測 cadence、simultaneous burst、review backlog、confirmation lag を canonical registry として束縛し、normal burst / lawful burst / suspicious burst / attack-like or drift-like active state を raw count ではなく registry 逸脱として判定する規則である。
  core_claims:
  - cadence は件数閾値だけではなく、window、burst、backlog、confirmation lag、runbook witness の束で評価する。
  - lawful burst は registered cadence、incident runbook、lawful retry/resampling envelope、batch charter のいずれかにより事前または same-frame で説明可能な集中観測だけを指し、confirm shortcut を開かない。
  - detector family ごとに許容する通常 cadence は異なる。local_convention_detected は backlog / lag を長めに許せるが、suspected_leak と irreversible_resource_lock 近傍では最短で扱う。
  - sink class は owner-bound internal から irreversible lock へ向かうほど cadence 許容量を単調に縮める。
  - cadence registry は batch charter、review_due、confirmation_due、escalation path の安全側 cap として働き、無登録 burst を benign 既定にしない。
  detector_family_taxonomy:
    local_convention_detected:
      statement: local convention や運用ドリフトの初期疑いを拾う detector family。通常 cadence は比較的高く、review backlog も長めに許す。
    confirmed_policy_drift:
      statement: reflected rule と runtime effective use の不整合を確定側へ運ぶ detector family。local convention より strict に扱う。
    suspected_leak:
      statement: containment breach や sink exposure を扱う detector family。cadence と confirmation lag を最も短く扱う family のひとつである。
    bias_penalty:
      statement: reviewer/operator 偏りを扱う penalty family。burst 自体より queue 偏向と review concentration を監視する。
    flooding_penalty:
      statement: corroboration inflation や queue saturation を扱う penalty family。raw cadence 許容量は比較的高いが、lawful witness 不在の excess を最も敏感に疑う。
    replay_penalty:
      statement: stale lineage や mirror reuse の再包装を扱う penalty family。cadence は中程度だが replay witness があると急速に tighten する。
  cadence_sink_classes:
    owner_bound_internal:
      statement: owner に閉じた sealed internal sink。temporary_cache の sealed case や owner-only telemetry を含む。
      typical_sources:
      - sealed_internal
    bounded_internal_shared:
      statement: named internal reviewer までに限定された非 authoritative sink。shared telemetry と derived preview の既定 class を含む。
      typical_sources:
      - bounded_internal_observable
    authoritative_state:
      statement: system of record、authoritative registry、reflected runtime state の mutation または read/write surface。
      typical_sources:
      - authoritative_state
    public_or_external_commitment:
      statement: public output または external commitment に触れる sink。対外説明や counterparty 影響を持つ。
      typical_sources:
      - public_output
      - external_commitment
      - externalized_nonbinding
    irreversible_resource_lock:
      statement: rollback 高コストまたは lawful rollback 不在の lock / irreversible commit を伴う sink。
      typical_sources:
      - irreversible_resource_lock
  projection_rules:
  - shared telemetry / temporary cache / derived preview の surface は、まず sink typing で sealed_internal / bounded_internal_observable / externalized_nonbinding を判定し、その後 cadence sink class へ射影する。
  - authoritative_or_committing は effect_realization と rollback expectation を見て authoritative_state、public_or_external_commitment、irreversible_resource_lock のいずれかへ細分してから cadence registry に入れる。
  - same detector case が複数 sink class に触れる場合は最も strict な sink class を採用する。
  registry_cell_fields:
  - cadence_window
  - normal_event_cap
  - simultaneous_burst_cap
  - review_backlog_soft_cap
  - confirmation_lag_soft_cap
  - lawful_burst_witness_set
  - batch_charter_adjustment_cap
  - suspicious_burst_escalation_rule
  metric_ordering_rules:
    event_rate:
    - flooding_penalty と local_convention_detected は raw event rate の既定許容量を比較的高く持てる。
    - suspected_leak と confirmed_policy_drift は raw event rate の cap を低めに持つ。
    backlog_and_lag:
    - local_convention_detected は backlog / confirmation lag を最も長く許す。
    - confirmed_policy_drift、bias_penalty、replay_penalty は中間で扱う。
    - suspected_leak、flooding_penalty、irreversible_resource_lock 近傍は backlog / lag cap を最短で扱う。
    sink_strictness:
    - owner_bound_internal ≥ bounded_internal_shared ≥ authoritative_state ≥ public_or_external_commitment ≥ irreversible_resource_lock の順で許容量を単調非増加にする。
  burst_state_taxonomy:
    normal_burst:
      statement: registry cell の normal_event_cap、review backlog cap、confirmation lag cap のすべての内側にある状態。
    lawful_burst:
      statement: normal_event_cap は超えるが simultaneous_burst_cap の内側にあり、registered cadence / runbook / lawful retry / ratified batch charter のいずれかで正当化された状態。
      non_implications:
      - confirm shortcut を意味しない。
      - corroboration unit の自動加算を意味しない。
    suspicious_burst:
      statement: burst cap、backlog cap、confirmation lag cap のいずれかを超過するか、または lawful witness を欠いたまま normal cap を超えた状態。
    attack_like_or_drift_like_active:
      statement: suspicious_burst に加えて、family-specific abuse anchor、queue saturation、concealed replay、direct authoritative mismatch、policy drift witness のいずれかが束縛され、current branch を degrade / suspend / escalate へ送るべき状態。
  branch_linkage:
  - cadence registry breach は raw count 単独では final confirm を作らず、early-stage burst taxonomy、penalty gate、policy drift confirm、suspected leak confirm と束で branch を決める。
  - lawful_burst は batch charter の admissibility 根拠には使えるが、review_due と confirmation_due の延長根拠には使わない。
  - batch charter は normal_event_cap と simultaneous_burst_cap を限定的に引き上げられるが、review_backlog_soft_cap と confirmation_lag_soft_cap を緩めない。
  - review backlog breach は queue congestion の事実であり、silence や timeout を benign 既定に反転させない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - cadence_registry_cell_ref
    - cadence_sink_class
    - effective_normal_event_cap
    - effective_simultaneous_burst_cap
    - effective_review_backlog_soft_cap
    - effective_confirmation_lag_soft_cap
    - lawful_burst_witness_ref
    - cadence_breach_reason_set
    - batch_charter_adjustment_ref
    graph_engine:
    - cadence_registry_cell_bound
    - cadence_burst_classified
    - cadence_breach_detected
    - cadence_batch_charter_applied
    - cadence_breach_escalated
  residual_open_points:
  - detector family ごとの direct abuse anchor と detector abuse anchor の最小束縛をどう分けるか
  - seasonal / incident campaign の lawful burst を static registry と runtime override のどちらで吸収するか
semantic_delta_autoclassification_governance:
  status: provisional_fixed
  statement: semantic delta autoclassification governance とは、shared prompt / template 変更を lexical diff だけでなく canonical normalization・execution behavior・downstream binding・protected invariant の witness で判定し、semantic delta class を none / bounded / material / unresolved の4値で安全側に返して、hidden coupling・prior reset・burst taxonomy・penalty activation へ接続する規則である。
  core_claims:
  - semantic delta class の自動判定は wording 類似度ではなく、execution meaning と downstream governance effect の差分判定として扱う。
  - prompt_pack / template_bundle の表面差分だけでは none を返さない。protected facet、decision branch、evidence admissibility、sink exposure、schema binding が不変である witness を要求する。
  - bounded は「小さい変更」を意味しない。affected facet と blast radius が ratified mapping で限定され、unaffected protected facet に material drift が出ないときだけ bounded を返す。
  - material は threshold / comparator / veto / escalation / sink typing / evidence requirement / output schema requiredness / authority semantics / tool routing / confirmation logic の変更を含む。
  - unresolved は失敗ではなく安全側の中立分類であり、lineage 欠落・joint change・witness 競合・protected facet 接触・benchmark 不足のいずれかで既定値として返してよい。
  semantic_delta_classes:
    none:
      statement: canonical normalization 後の executing meaning、protected invariant、downstream binding が保存され、差分が execution-semantic no-op に留まる状態。
      minimum_witness:
      - canonical normalization または semantic no-op witness により executing meaning の同型性が束縛されている
      - protected invariant set が保存されている
      - downstream binding set が不変である
      - lineage / parent / execution capsule が追跡可能である
      governance_effects:
      - parameterized_variant / inherited_bundle でも confirm-grade independence は増えない
      - hard_shared 扱いを維持し、prior reset は原則不要とする
      - lawful burst witness を増やさない
    bounded:
      statement: 変更は存在するが、affected facet と blast radius が ratified mapping で限定され、unaffected protected facet の invariant が保存される状態。
      minimum_witness:
      - affected facet set と detector family set が明示されている
      - bounded-change rule または equivalence envelope が ratified 済みである
      - unaffected protected facet の replay / benchmark drift が許容域内である
      - downstream binding change が scoped で review owner / rollback path を持つ
      governance_effects:
      - affected facet に対してだけ corroboration increment を止め、scoped prior reset / review を掛ける
      - unaffected facet の historical calibration は維持できる
      - bounded bonus / scoped triage metadata にだけ使う
    material:
      statement: 変更が execution branch、confirmability、externality、authority、schema meaning のいずれかを再構成し、scoped cosmetic/bounded update では吸収できない状態。
      trigger_patterns:
      - threshold / comparator / veto / escalation / authority / sink / evidence / schema requiredness / tool routing / confirmation branch の変更
      - same input replay で decision branch または protected facet outcome が変わる
      - downstream binding または execution capsule が変化する
      governance_effects:
      - hard_shared with material drift として扱い、affected facet の warmed state を無効化する
      - pre/post version を独立 corroboration route に数えない
      - unannounced material change が burst 内へ流入した場合、ambiguous_sparse か flooding_suspect を優先する
    unresolved:
      statement: 差分は観測されたが、安全側 classification に必要な lineage / benchmark / facet mapping / execution witness のいずれかが不足または衝突している状態。
      trigger_patterns:
      - lineage / parent / execution capsule / witness ref が欠落している
      - prompt + template + rulepack の joint change で寄与分離不能である
      - lexical diff は小さいが benchmark / protected invariant が未確認である
      - protected facet に触れるのに bounded mapping が ratified されていない
      governance_effects:
      - lawful burst witness を増やさない
      - confirm / release / delegated auto activation の shortcut を開かない
      - protected facet では manual review と scoped reset を先に要求する
  witness_taxonomy:
  - canonicalization_witness
  - semantic_role_binding_witness
  - execution_behavior_witness
  - protected_invariant_witness
  - downstream_binding_witness
  - lineage_integrity_witness
  - replay_benchmark_witness
  facet_override_policy:
    detector_threshold_and_policy_gate:
    - threshold / comparator / confirmability / veto / escalation 文言の変更は lexical small diff でも affected facet 上は少なくとも material 候補とする。
    sink_typing_and_externality:
    - audience / sink / ttl / forwardability / queryability / exportability の変更は bounded 以下へ丸めず、少なくとも material または unresolved とする。
    evidence_binding_and_schema:
    - required field / required evidence / owner binding / freshness binding / route family binding の変更は schema cosmetic とみなさない。
    cosmetic_template_surface:
    - label order / whitespace / explanation prose の変更で、schema key・requiredness・default・routing・guard が不変なら none 候補にできる。
    local_template_internal_triage:
    - template_local かつ internal reversible で、pre-ratified equivalence envelope と replay benchmark がある場合だけ bounded を delegated review で処理しうる。
  failure_patterns:
    false_none:
    - paraphrase が threshold 緩和や veto 除去を隠す
    - template 表示名変更が sink audience / routing change を隠す
    - output schema の optional/required 変更が downstream branch change を隠す
    false_material:
    - render-only 変更なのに benchmark suite 不足のため material へ過大分類する
    - explanatory note の追加を execution meaning change と誤認する
    operational_guard:
    - false negative は confirm path 汚染を生むので、witness 不足時は unresolved に倒す
    - false positive は review cost を増やすが、安全性側の損失は相対的に小さい
  linkage_rules:
    hidden_common_mode_coupling_registry:
    - parameterized_variant / inherited_bundle で semantic delta class が none なら hard_shared を維持する。
    - bounded は affected facet scoped の bounded_shared を作れるが、confirm-grade independence は増やさない。
    - material / unresolved は hard_shared と reset trigger 候補を強める。
    small_sample_prior_credibility:
    - none は lineage 連続かつ benchmark 維持なら warmed calibration を保てる。
    - bounded は affected facet だけ sparse へ巻き戻しうる。
    - material / unresolved は affected facet の prior_ready を false にしうる。
    early_stage_burst_flooding_separation:
    - none は lawful burst witness を増やさず、shared mode collapse を維持する。
    - bounded は triage metadata にだけ使い、affected facet では corroboration inflation を防ぐ。
    - material / unresolved の高密度流入は lawful burst ではなく ambiguous_sparse または flooding_suspect 側の根拠になる。
    adversarial_correlation_penalty:
    - concealed material change や unresolved dense rotation は bias / flooding / replay penalty の severity を上げうる。
    - ratified bounded change 自体は penalty 根拠ではないが、burst inflation と結び付くと bounded bonus を停止する。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - semantic_delta_class
    - delta_witness_ref_set
    - affected_facet_set
    - affected_detector_family_set
    - protected_invariant_result
    - downstream_binding_diff_class
    - scoped_prior_reset_reason
    - manual_review_required_by_delta
    graph_engine:
    - semantic_delta_classified
    - semantic_delta_reclassified
    - delta_witness_bound
    - protected_invariant_failed
    - scoped_prior_reset_triggered
    - burst_taxonomy_degraded_by_delta
  residual_open_points: []
self_evaluation_audit_log_governance:
  status: provisional_fixed
  statement: 自己評価監査ログ統治とは、semantic delta class・hidden coupling・prior reset・burst taxonomy・override judgement の判定を後から再監査・再較正できるように、何を event として残し、どの粒度で witness を保持し、いつ archive / purge へ移すかを定める規則である。
  core_claims:
  - 最終スコアや最終ラベルだけを残しても再監査はできない。判定時点の policy bundle、witness、override、branch effect、actor/authority を結び付けて残す必要がある。
  - GraphLint の説明 trace は有用だが、それだけを正本にしてはならない。normative binding は DecisionLedger、状態遷移と retention timer は GraphEngine、再計算可能な診断要約は GraphLint に分ける。
  - 保存期間は storage 都合ではなく audit criticality、protected facet 影響、override の有無、confirm/release への接続度で決める。
  - raw witness を全件永久保存する方針は採らないが、summary だけに潰してよい class と full witness を残すべき class を分ける。
  canonical_event_families:
    registry_snapshot:
      statement: 判定時点で効いていた policy / rulepack / template / model / registry version の束縛を残す event。
      minimum_fields:
      - policy_bundle_ref
      - registry_version_set
      - execution_capsule_ref
    evaluation_run:
      statement: semantic delta、hidden coupling、drift、burst taxonomy などの自己評価そのものを残す event。
      minimum_fields:
      - target_ref
      - detector_family
      - claim_facet_set
      - outcome_label
      - score_or_class
      - trace_summary_ref
    witness_binding:
      statement: 判定根拠として使った witness の束縛と admissibility を残す event。
      minimum_fields:
      - witness_ref_set
      - witness_hash_set
      - provenance_level
      - integrity_class
    override_review:
      statement: manual review、override、veto、reclassification、release/reject の理由と authority を残す event。
      minimum_fields:
      - reviewer_or_forum_ref
      - authority_basis_ref
      - override_kind
      - rationale_code_set
    branch_transition:
      statement: hold / escalate / suspend / confirm / reject / reset / rollback など branch 変化を残す event。
      minimum_fields:
      - state_before
      - state_after
      - branch_effect
      - parent_case_ref
    recalibration_feedback:
      statement: postmortem、confirmed leak、confirmed drift、false positive/negative 評価など、後から prior や threshold を更新する根拠を残す event。
      minimum_fields:
      - feedback_type
      - linked_event_ref_set
      - recalibration_scope
      - outcome_truth_source
  canonical_minimum_fields:
  - event_id
  - event_family
  - event_time
  - tool_owner
  - subject_ref
  - profile
  - context_class
  - policy_bundle_ref
  - execution_capsule_ref
  - witness_ref_set
  - witness_hash_set
  - outcome_label
  - branch_effect
  - actor_or_authority_ref
  - retention_bucket
  - parent_event_ref_set
  granularity_policy:
    full_witness:
      statement: raw witness、normalized trace、execution capsule、override 理由、branch effect を event 単位で再生可能に残す粒度。
      required_when:
      - protected facet に触れる
      - manual override / veto / escalate / reject / force suspend / delegated auto re-enable を伴う
      - semantic delta class が material または unresolved である
      - hidden coupling が hard_shared または unresolved relation を含む
      - prior reset / calibration reset / policy drift / leak confirm / abuse confirm に接続する
      - burst taxonomy が ambiguous_sparse_burst / flooding_suspect / attack_like_flooding_confirmed のいずれかである
    summary_with_repro_capsule:
      statement: hot path では summary を主に持つが、必要時に deterministic replay または immutable witness bundle へ戻れる粒度。
      admissible_when:
      - override がない
      - protected facet への影響がない、または ratified bounded mapping の範囲に閉じている
      - semantic delta class が none または bounded であり、prior reset を発火していない
      - branch effect が no_state_change または scoped_internal_review に留まる
    archive_digest:
      statement: 日常運用からは外すが、postmortem・監査・再較正のため summary、integrity proof、capsule ref を削らず archive へ送る粒度。
      required_when:
      - case は閉じたが confirm / release / override / penalty / public explanation の根拠として後日再参照されうる
      - raw witness の常時 hot 保持は不要だが、summary だけでは責任追跡が不足する
    purge_eligible_digest:
      statement: 低リスク・非override・非protected の派生診断について、canonical summary と witness hash を残した上で raw trace を purge してよい粒度。
      admissible_when:
      - final outcome や normative binding を変えていない
      - detector tuning や UI explanation の補助であり、protected facet・external sink・authority decision に接続しない
      - archive_digest に必要な summary / hash / capsule ref が先に固定されている
  common_retention_buckets:
    normative_permanent:
      statement: registry ratification、approval / veto / override、final confirm / release / reject、confirmed leak / drift / severe penalty など、normative explanation 責任を持つ event の bucket。
      baseline:
        full_witness_hot: permanent
        archive_retention: permanent
        purge_rule: never
    audit_long:
      statement: protected facet、material / unresolved delta、hard shared coupling、reset、abuse / leak / drift investigation に接続する高監査重要度 bucket。
      baseline_by_profile:
        regulated:
          full_witness_hot: 365d
          archive_retention: 7y
        engineering_tradeoff:
          full_witness_hot: 180d
          archive_retention: 3y
        organizational_or_social:
          full_witness_hot: 90d
          archive_retention: 2y
    audit_medium:
      statement: bounded / none の benign 評価だが、replay、postmortem、threshold review の比較可能性を残す bucket。
      baseline_by_profile:
        regulated:
          full_witness_hot: 180d
          archive_retention: 3y
        engineering_tradeoff:
          full_witness_hot: 90d
          archive_retention: 1y
        organizational_or_social:
          full_witness_hot: 30d
          archive_retention: 180d
    summary_short:
      statement: override なし、protected facet 非接触、nonbinding な自己診断の summary 保持 bucket。
      baseline_by_profile:
        regulated:
          full_witness_hot: 30d
          archive_retention: 1y
        engineering_tradeoff:
          full_witness_hot: 14d
          archive_retention: 180d
        organizational_or_social:
          full_witness_hot: 7d
          archive_retention: 90d
  context_override_rules:
  - external_irreversible、policy_sensitive、public_exposure、safety_critical の文脈では、bucket を短縮せず、少なくとも audit_long とする。
  - sandbox_internal、branch_local_nonbinding、template_local_review では、protected facet 非接触かつ override なしの場合に限り 1 bucket だけ短縮してよい。
  - legal_hold、postmortem_hold、active_investigation が立った event は retention timer を停止し、purge を禁止する。
  purge_and_archive_rules:
  - raw witness を purge してよいのは、canonical minimum fields、summary、witness hash、policy bundle ref、execution capsule ref、actor/authority ref が archive 側に固定された後だけである。
  - GraphEngine は retention_due、archive_due、purge_due を計時し、DecisionLedger は legal_hold と normative no-purge を正本管理する。
  - GraphLint の局所診断ログは purge 可能だが、branch change や override に影響した trace は GraphEngine または DecisionLedger から参照可能でなければならない。
  decision_ledger_graph_engine_graphlint_split:
    DecisionLedger:
    - registry ratification / activation / supersession
    - approval / veto / override / reject / final confirm / release の authority basis
    - legal_hold、postmortem_hold、accountability hold
    GraphEngine:
    - evaluation_run、reclassification、reset、cluster lifecycle、state transition
    - retention_due / archive_due / purge_due timer
    - archive completed / purge completed / replay requested の履歴
    GraphLint:
    - normalized trace summary
    - issue candidate、guard explanation、witness digest
    - deterministic replay に必要な入力正規化メタデータ
  residual_open_points:
  - bridge token の cryptographic shape を HSM-backed seal / append-only notarization / derived proof のどこまで標準化するか
  - merge / split transition bundle の predecessor/successor cardinality と allocation witness をどこまで canonical 化するか
  - export-local pseudonym の TTL table に対する profile/context local override と shortening-only rule をどこまで許すか
  - execution capsule のバイナリ実体と hash / manifest のどこまでを canonical archive object とみなすか
  - cluster de-dup 後の raw signal を event 単位で保持する範囲を detector family ごとにどう揃えるか
identity_redaction_accountability_governance:
  status: provisional_fixed
  statement: identity redaction accountability governance とは、reviewer / operator の個人識別を常時露出させずに、authority・accountability・incident replay・security escalation に必要な再開示可能性だけを lawful に残すため、identity surface の層、場面別 visibility、reopen 条件を定める規則である。
  core_claims:
  - accountability に必要なのは常時の実名露出ではなく、authority に束縛された再開示可能性である。
  - reviewer / operator の identity surface は、display identity、stable pseudonym、team / forum label、authority binding、accountability binding、legal-hold reopen key の少なくとも6層に分けて扱う。
  - cadence breach、bias / flooding / replay penalty、review accountability、incident replay、security escalation は、同じ identity surface を見ない。場面ごとの最小可視層を分ける必要がある。
  - stable pseudonym と authority / accountability binding が残っている限り、通常の監査・レビュー・penalty judgement は cleartext personal identity を要しない。
  - de-redaction は lawful purpose、required authority、active reopen basis、lower-layer insufficiency の4条件が揃うときにだけ許す。
  canonical_identity_layers:
    display_identity:
      statement: 人間に読みやすい表示名。可変であり、canonical key に使ってはならない。
    stable_pseudonym:
      statement: scope と epoch の内部で安定な識別子。通常の event 連結、bias / replay / cadence 追跡の主キーに使う。
    team_or_forum_label:
      statement: team、forum、review lane、operator family などの所属・経路ラベル。集計と可視化に使うが、個人 accountability の代用にはしない。
    authority_binding:
      statement: role、authority tier、approval charter、delegation scope、signature context の束縛。誰が見ても同じ権限意味を取れる層。
    accountability_binding:
      statement: decision owner、execution coordinator、outcome accountability、security escalation owner などの責任束縛。
    legal_hold_reopen_key:
      statement: lawful な再識別のための封印鍵またはそれへの参照。通常ログから導出できず、別 custody に置く。
  visibility_policy_by_scenario:
    routine_review:
      minimum_visible_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      hidden_by_default:
      - display_identity
      - legal_hold_reopen_key
    cadence_breach:
      minimum_visible_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      conditional_layers:
      - accountability_binding
      reveal_conditions:
      - repeated severe breach
      - contested override
      - cross-team queue freeze
    bias_flooding_replay_penalty:
      minimum_visible_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      additional_required_context:
      - tool_or_pipeline_lineage
      - forum_chain_ref
      reveal_conditions:
      - confirmed abuse
      - replay concealment
      - review gaming suspicion that cannot be resolved at pseudonym layer
    review_accountability:
      minimum_visible_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      optional_layers:
      - team_or_forum_label
      non_implications:
      - display identity を常時見せることを意味しない。
    incident_replay:
      minimum_visible_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      - execution_or_event_lineage_ref
      reveal_conditions:
      - same-frame remediation failure
      - cross-system join required
      - external audit basis active
    security_escalation:
      minimum_visible_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      - legal_hold_reopen_key
      non_implications:
      - team_or_forum_label だけで sufficient になることを意味しない。
  decision_ledger_graph_engine_graphlint_archive_split:
    DecisionLedger:
    - normative actor pseudonym
    - authority binding ref
    - accountability binding ref
    - reopen authorization basis
    - legal_hold / accountability_hold state
    forbidden_defaults:
    - real identity cache
    - sole re-identification path
    GraphEngine:
    - runtime actor instance ref
    - pseudonym epoch lineage
    - session / run linkage
    - reopen_requested / reopen_granted / reopen_denied event
    GraphLint:
    - redacted trace summary
    - actor class / authority tier / forum label
    - pseudonym-free diagnostic digest when actor specificity is unnecessary
    archive_object:
    - pseudonymized event body
    - sealed identity envelope または mapping ref
    - reopen policy ref
    - integrity proof and access log
  prohibited_shortcuts:
  - display identity、email address、chat handle を canonical actor key に使わない。
  - stable pseudonym の rotation で accountability lineage を切断しない。
  - team / forum label だけで reviewer / operator accountability を代用しない。
  - delegated reviewer 単独で de-redaction を確定しない。
  - cleartext personal identity の多さを独立 corroboration や bias severity の根拠に使わない。
  - GraphLint trace だけを reopen 可能性の唯一根拠にしない。
  residual_open_points:
  - bridge token の cryptographic shape を HSM-backed seal / append-only notarization / derived proof のどこまで標準化するか
  - tenant merge / split 時の lawful continuity 条件をどこまで細分化するか
  - export-local pseudonym の TTL table に対する profile/context local override と shortening-only rule をどこまで許すか
  - audit witness shard を HSM / append-only service / 人的 witness のどこまで hybrid 設計にするか
  - bridge packet の revocation と accountability lineage 保持をどう両立させるか
execution_capsule_canonical_archive_governance:
  status: provisional_fixed
  statement: execution capsule の canonical archive 境界とは、後続の replay / reopen / purge 判定が現行 runtime や可変 external blob store に依存せず再構成できるよう、manifest を正本核として、必要な digest chain・policy binding・identity envelope linkage・replay class を archive 側へ固定し、binary payload は replay 要件に応じて inline または immutable pinned blob として従属保持する境界である。
  decomposition:
    binary_payload:
      statement: 実行時の raw input / output、normalized artifact、model response snapshot、tool state dump などのバイナリ実体。
      canonical_classes:
      - replay_required_blob
      - optional_supporting_blob
      - noncanonical_external_copy
      rules:
      - deterministic replay または forensic replay を要求する payload は、content-addressed immutable blob として retention pin を付けて保持し、manifest から digest と byte-length で束縛する。
      - analytical replay や audit summary で足りる payload は、raw binary を外部 blob store に退避または purge しうるが、manifest には digest・serialization profile・witness linkage を残す。
      - mutable URL、current-system export、再生成可能だからという理由だけの pointer を canonical payload 代替にしてはならない。
    manifest:
      statement: archive object の正本核であり、payload class、canonicalization profile、digest set、replay class、policy bundle ref、lineage、branch effect、identity envelope linkage を束縛する。
      canonical_class: canonical_archive_core
      minimum_fields:
      - capsule_id
      - event_family
      - payload_role_map
      - replay_class
      - canonicalization_profile
      - environment_descriptor_ref
      - policy_bundle_ref_set
      - lineage_ref_set
      - digest_binding_set
      - sealed_identity_envelope_ref_or_digest
    digest_chain:
      statement: manifest・payload・sealed identity envelope・pointer target の完全性を束縛する最小 integrity layer。
      canonical_class: canonical_integrity_layer
      rules:
      - manifest digest は必須であり、payload / envelope / pointer target を hash chaining で束ねる。
      - digest algorithm、byte length、serialization profile を伴わない hash は replay admissibility を作らない。
      - parent archive object への chained digest は incident replay と purge audit の再構成経路を切ってはならない。
    sealed_identity_envelope:
      statement: pseudonymized event body と分離して別 custody に置かれる reopen 用 sealed object。
      canonical_class: canonical_companion_object
      rules:
      - archive core には envelope 本体ではなく envelope ref / digest / custody policy を固定する。
      - lawful reopen basis が active で required authority が揃う場合に限り別経路で開封する。
      - pseudonymized event body に inline して redaction 境界を崩してはならない。
    reference_pointer:
      statement: immutable blob store や外部記録への locator。
      canonical_class: auxiliary_locator
      rules:
      - pointer 単独は canonical proof にならない。
      - canonical に数えるには target digest、immutability class、retention pin、retrieval scope が manifest に束縛されていなければならない。
      - mutable alias や latest pointer を deterministic replay の入力に使ってはならない。
  scenario_rules:
    incident_replay:
      required_elements:
      - canonical manifest
      - digest chain
      - replay class と execution environment descriptor
      - required payload blob または reproducibility capsule
      conditional_elements:
      - actor reopen が必要な場合の sealed identity envelope
      insufficiency_cases:
      - archived manifest ではなく現行 toolchain から再生成した manifest に依存する
      - pointer target が mutable で archived digest と一致しない
    legal_hold_reopen:
      required_elements:
      - canonical manifest
      - digest chain
      - sealed identity envelope ref と custody proof
      - reopen basis / access audit log
      conditional_elements:
      - payload 内容なしでは当該審査を lawful に行えない場合の retained blob
      non_implications:
      - legal-hold reopen が raw payload の常時保持を意味しない
    purge_archive:
      purge_admissible_when:
      - manifest core と digest chain が retained されている
      - retention bucket が raw payload purge を許す
      - legal hold が inactive である
      - replay class が retained capsule だけで満たされる
      purge_forbidden_when:
      - deterministic replay または forensic replay に exact payload が必要である
      - pointer 先の immutable digest-bound replacement が存在しない
      - branch effect / override review を payload なしで再監査できない
    external_blob_store:
      required_controls:
      - content-addressed immutable storage
      - retention pin / hold linkage
      - digest verification on retrieve
      - access audit log
      non_implications:
      - blob store が normative archive の唯一の正本であることを意味しない
  responsibility_split:
    DecisionLedger:
    - canonical manifest id
    - policy / lineage / branch-effect binding
    - replay class and purge admissibility decision
    - legal-hold / reopen basis
    GraphEngine:
    - runtime execution capsule production record
    - environment descriptor / serialization profile
    - blob pin / unpin lifecycle
    - replay request / replay result linkage
    archive_object:
    - canonical manifest
    - digest chain
    - pseudonymized event body
    - sealed identity envelope ref_or_digest
    - access / purge / reopen audit trail
    external_blob_store:
    - immutable payload blob
    - content-addressed retrieval
    - retention pin state
    - no normative judgement without manifest binding
  prohibited_shortcuts:
  - pointer だけを残して target digest を失った状態を archive 完了とみなさない。
  - 現行 toolchain や current system of record から manifest / payload を再生成して archived object の代用にしない。
  - deterministic replay を要求しながら summary digest だけで sufficient と主張しない。
  - sealed identity envelope を pseudonymized event body に混在させて reopen 権限境界を崩さない。
  - mutable alias / latest version pointer を hash-chained object と同等に扱わない。
  residual_open_points:
  - emergency bypass で materialize した temporary export を archive boundary の外でどう TTL 管理するか
  - duplicate_discard_digest の multiset root hash primitive / collision witness / compression 境界をどこまで固定するか
raw_signal_retention_governance:
  status: provisional_fixed
  statement: cluster de-dup 後の raw signal retention governance とは、detector family / claim facet / sink class / replay class ごとに、dedup 後にも replay・abuse 判定・purge 監査を壊さない minimum retained raw unit と optional retained support blob を分離して固定する規則である。
  core_claims:
  - de-dup 後の retained raw unit は detector family ごとに異なる。cluster representative 1件を universal default にしてはならない。
  - representative だけで足りるのは、local convention の内部レビュー寄り事案や、confirmed policy drift のうち authoritative basis pair と effective use path が別記録で再構成できる場合に限られる。
  - flooding_penalty と replay_penalty では、discard された member 群の digest-bound 集約記録と burst / lineage 証拠を保持しなければ、count inflation・replay concealment・penalty fairness を再監査できない。
  - suspected_leak と protected facet 接触の confirmed_policy_drift では、route / recipient / effect realization / authoritative mismatch を直接または digest-bound に再確認できる raw slice を minimum retained raw unit に含める。
  - purge admissibility は、cluster representative の有無だけでなく、duplicate_discard_digest、abuse_anchor、replay-support blob が family-specific replay requirement を満たすかで判定する。
  retained_artifact_classes:
    cluster_representative:
      statement: dedup 後の cluster を代表する raw unit。representative signal 本体、source lineage、claim facet、window anchor、target lineage、effect zone、protected facet / sink facet を束縛する。
      minimum_fields:
      - representative_signal_id
      - hypothesis_key
      - detector_family
      - claim_facet
      - target_or_basis_lineage_ref
      - effect_zone_ref
      - observed_at
      - source_family
      - pipeline_or_route_ref
      - content_digest_or_normalized_snapshot_ref
    duplicate_discard_digest:
      statement: discard された duplicate 群を再監査するための digest-bound 集約記録。member 全文保持ではなくてもよいが、discard 根拠と cardinality を失ってはならない。
      minimum_fields:
      - cluster_member_digest_set_or_multiset_root
      - discard_reason_set
      - source_diversity_summary
      - window_membership_summary
      - duplicate_kind_summary
      - member_count
    burst_evidence_packet:
      statement: cadence / simultaneous burst / queue saturation / resampling 逸脱を再監査するための raw timing・window・queue 系証拠束。
      minimum_fields:
      - cadence_registry_cell_ref
      - window_event_count
      - simultaneous_burst_count
      - backlog_or_lag_snapshot
      - lawful_burst_witness_ref_set
      - batch_charter_ref_or_null
    abuse_anchor_packet:
      statement: direct abuse anchor または detector abuse anchor を支える raw evidence 束。
      minimum_fields:
      - anchor_kind
      - anchor_digest_set
      - actor_or_route_binding_ref
      - penalty_or_confirm_case_ref
    replay_support_blob:
      statement: deterministic / forensic replay、benchmark replay、protected facet mismatch 再検証のために追加保持する raw blob。
      minimum_fields:
      - blob_digest
      - serialization_profile
      - environment_descriptor_ref
      - replay_class
  family_retention_rules:
    local_convention_detected:
      minimum_retained_raw_unit:
      - cluster_representative
      conditional_minimum:
      - authoritative_state 以上の sink class、または protected facet 接触時は duplicate_discard_digest を追加する
      - protected facet 上の benchmark 差分や material/unresolved semantic delta が関与するときは replay_support_blob を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      - abuse_anchor_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_medium
        bounded_internal_shared: audit_medium
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: audit_long
      purge_notes:
      - cluster representative と required duplicate_discard_digest が残り、active investigation / hold がなく、confirm judgement に使っていなければ raw blob purge を許しうる
    confirmed_policy_drift:
      minimum_retained_raw_unit:
      - cluster_representative
      - authoritative_basis_pair_or_effective_use_path_evidence
      conditional_minimum:
      - protected facet mismatch、external commitment、irreversible lock が絡むときは replay_support_blob を追加する
      - cluster の dedup 後 cardinality や repeated mismatch を severity に使うときは duplicate_discard_digest を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      - abuse_anchor_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: normative_permanent
        public_or_external_commitment: normative_permanent
        irreversible_resource_lock: normative_permanent
      purge_notes:
      - confirm / override / reflected correction の根拠になった mismatch では、required basis pair と protected facet replay-support を欠く purge を許してはならない
    suspected_leak:
      minimum_retained_raw_unit:
      - cluster_representative
      - route_or_recipient_identity_evidence
      - effect_realization_or_direct_reach_basis
      conditional_minimum:
      - cluster 化により exposure episode を畳み込んだときは duplicate_discard_digest を追加する
      - public_or_external_commitment または irreversible_resource_lock では replay_support_blob を既定 required とする
      optional_retained_support_blob:
      - burst_evidence_packet
      - abuse_anchor_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: normative_permanent
        irreversible_resource_lock: normative_permanent
      purge_notes:
      - direct reach / recipient identity / route identity を raw または digest-bound で再確認できない状態で leak case を purge admissible にしてはならない
    bias_penalty:
      minimum_retained_raw_unit:
      - cluster_representative
      - duplicate_discard_digest
      - actor_or_forum_concentration_evidence
      conditional_minimum:
      - final penalty または contested review では abuse_anchor_packet を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      - replay_support_blob
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: audit_long
      purge_notes:
      - fairness review と reopen accountability が残る間は member digest 群と actor concentration evidence の purge を禁止する
    flooding_penalty:
      minimum_retained_raw_unit:
      - cluster_representative
      - duplicate_discard_digest
      - burst_evidence_packet
      conditional_minimum:
      - direct abuse confirm では abuse_anchor_packet を追加する
      optional_retained_support_blob:
      - replay_support_blob
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: audit_long
      purge_notes:
      - burst / count inflation / lawful batch 区別に使った timing 証拠を失う purge を許してはならない
    replay_penalty:
      minimum_retained_raw_unit:
      - cluster_representative
      - duplicate_discard_digest
      - lineage_or_mirror_reuse_evidence
      conditional_minimum:
      - protected facet 影響、branch change、forensic replay 要求時は replay_support_blob を追加する
      - confirmed concealment または intentional reuse では abuse_anchor_packet を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: normative_permanent
      purge_notes:
      - replay lineage と compared artifact の digest-bound relation を失う purge を許してはならない
  claim_facet_overrides:
    effect_realization_or_direct_reach_confirmed:
    - cluster representative だけでは足りず、effect receipt / public observation / target identity match のいずれかを direct または digest-bound で残す
    route_identity_or_recipient_identity:
    - access_control_or_routing_log 系の raw extract または digest-bound canonical slice を minimum retained raw unit に含める
    owner_binding_or_declared_intent:
    - final confirm や penalty fairness に使わない限り human declaration は normalized snapshot と digest 保持で足りる
    protected_facet_mismatch:
    - benchmark replay、authoritative pair、または equivalent raw comparison slice を replay_support_blob として残す
  purge_and_replay_connection:
    replay_classes:
      summary_only:
      - cluster representative と duplicate_discard_digest の summary で replay できる family に限り raw blob purge を許しうる
      analytical_replay:
      - normalized mismatch packet、burst packet、route digest slice など family-specific support blob を要求する
      deterministic_or_forensic:
      - exact payload、route log extract、benchmark blob、environment descriptor など replay_support_blob を required とし purge を禁止する
    decision_rule:
    - purge admissibility は replay class、archive bucket、legal hold、family minimum retained raw unit の4条件を同時に満たすときだけ true にする
    - required raw unit を失った cluster は dedup されていても confirm / penalty / incident replay の canonical evidence に数えない
  decision_ledger_graph_engine_linkage:
    DecisionLedger:
    - retention_family_rule_ref
    - retained_raw_unit_class_set
    - purge_admissibility_state
    - archive_bucket_ref
    - confirm_or_penalty_usage_ref
    GraphEngine:
    - cluster_representative_ref
    - duplicate_discard_digest_ref
    - burst_evidence_packet_ref
    - abuse_anchor_packet_ref
    - replay_support_blob_ref
    - blob_pin_or_unpin_event
  prohibited_shortcuts:
  - cluster representative 1件だけで全 detector family の minimum retained raw unit を満たしたとみなさない。
  - duplicate discard 後の member cardinality と discard reason を失ったまま flooding / replay penalty を確定しない。
  - suspected leak で route / recipient / effect evidence を summary label だけへ潰して purge admissible としない。
  - protected facet mismatch を benchmark replay なしの説明文だけで confirm しない。
  - current system から再計算できることを理由に replay_support_blob を未保持のまま purge してよいと主張しない。
  residual_open_points:
  - duplicate_discard_digest の family-specific summary と replay linkage を detector family / sink class ごとにどこまで固定するか
legal_hold_reopen_custody_governance:
  status: provisional_fixed
  statement: legal_hold_reopen_custody_governance とは、sealed identity envelope を lawful に再開封する際に、authorization・custody・security・audit witness を分離し、scenario ごとの minimum quorum、retention timer 停止、access audit、emergency bypass 条件を定める規則である。
  core_claims:
  - lawful reopen は「誰か1人の権限」ではなく lane-based quorum の成立として扱う。
  - delegated reviewer は reopen request と scope packet 準備まではできるが、単独で authority lane も custody lane も満たさない。
  - domain/central authority が authorization_shard、legal_hold_custodian が custody_release_shard、security_officer が security_override_shard を持ち、役割分離を崩さない。
  - audit witness は access audit anchor が append-only に固定されたことを条件にだけ成立し、事後記録で代替してはならない。
  - emergency bypass は final de-redaction ではなく、containment / incident stabilization のための最小 reveal scope を時限付きで開く provisional path である。
  actor_classes:
    delegated_reviewer:
      statement: reopen request、scope packet、evidence completeness の確認を担う。key release shard を持たない。
    domain_authority:
      statement: same-domain / same-tenant の lawful purpose と reveal scope を承認する authority actor。
    central_authority:
      statement: cross-domain / cross-tenant / global-default / high-sensitivity external audit の final authority を担う。
    legal_hold_custodian:
      statement: sealed identity envelope の escrow、legal hold state、retention timer stop 確認、custody release を担う。
    security_officer:
      statement: security escalation、compromise containment、provisional emergency bypass を担う。
    audit_notary:
      statement: append-only access audit anchor を固定し、audit_witness_shard を発行する独立 lane。
    external_auditor:
      statement: 監査対象の viewer / recipient であり、reusable shard holder にはならない。
  custody_lanes:
    authority_lane:
      holder_classes:
      - domain_authority
      - central_authority
      shard_class: authorization_shard
      statement: purpose / scope / authority tier の適法性を確定する lane。
    custody_lane:
      holder_classes:
      - legal_hold_custodian
      shard_class: custody_release_shard
      statement: sealed identity envelope の escrow release と hold/timer 状態を管理する lane。
    security_lane:
      holder_classes:
      - security_officer
      shard_class: security_override_shard
      statement: active compromise・attack-like 事案で provisional emergency bypass を開く lane。
    audit_notary_lane:
      holder_classes:
      - audit_notary
      shard_class: audit_witness_shard
      statement: access audit anchor の先行固定を条件に witness token を発行する lane。
  quorum_matrix:
    normal_reopen:
      minimum_required_lanes:
      - authority_lane
      - custody_lane
      - audit_notary_lane
      authority_rule:
        same_domain_same_tenant: domain_authority で足りる
        cross_domain_or_global: central_authority を要する
      reveal_scope: accountability_binding または必要最小限の identity slice
      notes:
      - delegated reviewer は request owner になれるが quorum lane には数えない。
    incident_replay:
      minimum_required_lanes:
      - authority_lane
      - custody_lane
      - audit_notary_lane
      conditional_required_lanes:
        security_lane:
        - compromise suspected
        - protected facet touched
        - cross-system join または cross-tenant join が必要
      reveal_scope: incident_slice with lineage and accountable actor binding
    external_audit:
      minimum_required_lanes:
      - authority_lane
      - custody_lane
      - audit_notary_lane
      authority_rule:
        default: central_authority
        exception: domain-local かつ single-tenant で ratified audit charter がある場合だけ domain_authority で足りる
      preconditions:
      - active legal_hold
      - retention timer stopped before envelope materialization
      - export_scope bound to audit charter
      audience_rule:
      - external_auditor は supervised session または digest-bound derived export だけを受ける。
      - external_auditor 自身を shard holder にしない。
    security_escalation:
      provisional_required_lanes:
      - security_lane
      - custody_lane
      - audit_notary_lane
      post_confirm_required_lanes:
      - authority_lane
      post_confirm_sla_basis:
      - profile/context specific emergency confirmation SLA
      reveal_scope: minimum emergency slice only
      failure_branch:
      - authority confirm 不成立なら auto-reseal / continued hold / violation event へ分岐する。
  legal_hold_timer_audit_rules:
  - access audit anchor は envelope materialization より前に append-only store へ固定する。
  - external_audit と security_escalation では、envelope と required replay blob に対する retention timer を release 前に停止する。
  - incident_replay は active_investigation / legal_hold / external response basis のいずれかが立つ場合、timer stop を mandatory にする。
  - normal_reopen は session_hold を立て、confirm / penalty / external response に使う場合だけ legal_hold へ昇格する。
  - reopened material から生成した derived note / export も access audit session に digest-bound linkage する。
  decision_ledger_graph_engine_archive_split:
    DecisionLedger:
    - reopen basis
    - lane quorum policy ref
    - purpose tag / allowed reveal scope
    - legal_hold / investigation_hold / session_hold state
    - post-confirm due
    GraphEngine:
    - access session
    - timer pause / resume event
    - key materialization / reseal event
    - blob pin state
    - derived export digest linkage
    archive_object:
    - sealed_identity_envelope_ref_or_digest
    - reopen_policy_ref
    - access_audit_log_ref
    - derived_export_digest_ref
    GraphLint:
    - redacted explanation only
    - cleartext identity や shard material を保持しない
  custody_separation_rules:
  - 同一自然人または同一 service boundary を authority_lane と custody_lane の両方に数えない。
  - security_lane は provisional bypass だけに使い、final confirm の authority_lane を兼ねない。
  - audit_notary_lane は request owner と独立した append-only path で発行し、pre-issued reusable token にしない。
  - external_auditor と delegated_reviewer に reusable custody shard を渡さない。
  - decrypted envelope を長期 cache や canonical archive object に昇格させない。
  prohibited_shortcuts:
  - delegated reviewer 単独で reopen を確定しない。
  - security_officer 単独で final de-redaction を確定しない。
  - access audit を事後記録で埋め合わせない。
  - retention timer 停止前に emergency bypass を発火しない。
  - external auditor へ raw shard や長期 plaintext copy を渡さない。
  - emergency bypass の出力を authority post-confirm 前に final evidence / penalty / public explanation へ流用しない。
  residual_open_points:
  - audit witness packet の vendor-neutral attestation / observer credential schema をどこまで canonical registry 化するか
  - cross-jurisdiction external audit の authority taxonomy と central delegation charter をどこまで registry 化するか
  - life-safety / active compromise 例外で accountable_identity_slice を許す threshold を profile/context ごとにどこまで再較正するか
stable_pseudonym_continuity_governance:
  status: provisional_fixed
  statement: stable_pseudonym_continuity_governance とは、stable pseudonym を canonical actor continuity handle として扱い、tenant / authority / accountability の lawful 境界に沿って scope・epoch・rotation bridge を定め、通常時の redaction と lawful reopen、さらに recipient-bound export を接続する規則である。
  core_claims:
  - stable pseudonym の canonical root scope は tenant_id × authority_family_id × accountability_domain_id とし、forum / tool / archive は projection surface として従属させる。
  - bridge token は clear identity を運ばず、predecessor / successor pseudonym の continuity commitment、lawful purpose、authorization basis、accountability lineage、revocation handle、sealed identity envelope binding を束縛する continuity artifact である。
  - bridge token の canonical composition は HSM-backed seal・append-only notarization・recipient-scoped derived proof の三層とし、seal と notarization を mandatory、derived proof を external audit / external digest / emergency bypass / recipient-visible export では mandatory とする。
  - reopen 後 derived export は source stable pseudonym を recipient-visible field に再利用せず、recipient / purpose / retention bucket / export bundle に束縛された export-local pseudonym へ一方向に再束縛する。
  - export-local pseudonym は temporary convenience label ではなく、TTL・revocation・non-reuse clause を持つ bounded continuity alias であり、reopen 終了や authority path 失効後に再利用してはならない。
  canonical_scope:
    root_dimensions:
    - tenant_id
    - authority_family
    - accountability_domain
    excluded_as_root_dimensions:
    - forum
    - tool
    - archive_bucket
    note: forum / tool / archive は view / storage / projection の単位であり、root scope を勝手に増やさない。
    projection_surfaces:
      forum_projection:
        statement: forum ごとの局所表示名や review convenience label は持ちうるが、canonical pseudonym root を置換しない。
      tool_projection:
        statement: DecisionLedger / GraphEngine / GraphLint / archive object ごとの local ref は actor pseudonym root へ従属する。
      archive_projection:
        statement: archive bucket や retention bucket は storage lifecycle を分けるが、identity scope root を分けない。
  epoch_policy:
    same_epoch_admissible_changes:
    - forum membership の変更だけ
    - tool migration / storage relocation
    - display label / team label の更新
    - replay capsule の再生成
    rotation_triggers:
    - authority_binding の material change
    - accountability_domain の change
    - tenant split / tenant merge のうち continuity risk がある change
    - compromise / leak / reopen による reidentification risk 上昇
    - legal partition / retention charter change により旧 pseudonym の reuse が unlawful になる場合
    non_triggers:
    - session refresh
    - archive compaction
    - reviewer assignment の一時変更
  bridge_taxonomy:
    epoch_rotation_bridge:
      statement: same canonical scope 内で epoch を更新するときの continuity bridge。
    scope_transition_bridge:
      statement: authority_family または accountability_domain の lawful transition をつなぐ bridge。cross-tenant には使わない。
    reopen_export_rebind_bridge:
      statement: reopened identity から derived export-local pseudonym へ一方向に再束縛する bridge。
  continuity_rules:
    preserve_when:
    - same tenant かつ same accountability_domain で lawful purpose が継続する
    - authority family change が ratified transition として bridge packet に記録されている
    - archive / replay / audit が同一 canonical scope 内で行われる
    cut_when:
    - tenant boundary を跨ぐ
    - public_output / external_commitment / external_audit recipient へ clear continuity を expose する
    - compromise containment のため lineage を quarantine する
    - lawful purpose absent または reveal scope excess
  bridge_token_composition:
    statement: bridge token は continuity の存在証明そのものではなく、continuity commitment と lawful verification path を recipient class ごとに分離して運ぶ artifact である。
    layers:
      hsm_backed_seal:
        statement: canonical field set の commitment を HSM 管理鍵で署名し、issuance authority と envelope binding を偽装不能にする mandatory layer。
        required_for:
        - epoch_rotation_bridge
        - scope_transition_bridge
        - reopen_export_rebind_bridge
      append_only_notarization:
        statement: token issuance / supersession / revocation / expiry を append-only ledger に束縛し、non-equivocation と時系列監査を担保する mandatory layer。
        required_for:
        - internal continuity verification
        - archive replay linkage
        - duplicate digest lineage linkage
        - external audit handoff
      recipient_scoped_derived_proof:
        statement: sealed payload や source stable pseudonym を出さずに recipient / purpose / reveal cap / validity を検証させる proof layer。
        mandatory_when:
        - external_auditor recipient
        - public_or_external_commitment sink
        - irreversible_resource_lock sink
        - emergency_bypass derived export
        - recipient が lawful reopen path を持たない
        optional_when:
        - same canonical scope 内で authority path を持つ internal replay / legal audit
    canonical_fields:
    - bridge_token_id
    - bridge_kind
    - predecessor_pseudonym_commitment
    - successor_pseudonym_commitment_or_export_commitment
    - canonical_scope_relation
    - lawful_purpose_ref
    - authorization_basis_ref
    - accountability_lineage_ref
    - recipient_class
    - validity_window
    - non_reuse_clause
    - revocation_handle
    - envelope_binding_digest
    - archive_manifest_digest_or_null
    - reopen_event_ref_or_null
    - duplicate_digest_ref_or_null
    - proof_profile_ref
    - issuance_notary_ref
    verification_path:
    - append-only notarization に token issuance が存在し、superseded / revoked / expired でないことを確認する。
    - HSM seal が canonical field set の commitment と issuance authority に対して有効であることを検証する。
    - lawful purpose、authorization basis、recipient class、reveal cap が current use と一致することを確認する。
    - derived proof required の文脈では、proof が recipient-scoped commitment と validity window を満たし、source stable pseudonym や clear identity を露出しないことを確認する。
    - reopen / archive / duplicate digest へ接続する場合は、対応する reopen event、archive manifest digest、duplicate digest linkage が token と整合することを確認する。
  export_local_pseudonym_policy:
    statement: export-local pseudonym は source stable pseudonym から導出される recipient-bound alias であり、single export bundle・single recipient class・single lawful purpose・single retention bucket に束縛する。
    issuance_grain:
    - source_pseudonym_ref
    - recipient_class
    - export_purpose
    - retention_bucket
    - export_bundle_id
    - reopen_event_ref_or_null
    ttl_table:
      engineering_tradeoff_domain:
        owner_bound_internal: 30d
        bounded_internal_shared: 7d
        authoritative_state: 72h
        public_or_external_commitment: 24h
        irreversible_resource_lock: 8h
      organizational_or_social_domain:
        owner_bound_internal: 14d
        bounded_internal_shared: 72h
        authoritative_state: 48h
        public_or_external_commitment: 12h
        irreversible_resource_lock: 4h
      regulated_domain:
        owner_bound_internal: 7d
        bounded_internal_shared: 24h
        authoritative_state: 24h
        public_or_external_commitment: 8h
        irreversible_resource_lock: 1h
    recipient_caps:
      internal_owner_or_same_scope_reviewer: none
      domain_or_central_authority: 72h
      external_auditor: 24h
      external_commitment_recipient: 8h
      emergency_response_principal: 1h
    effective_ttl_rule:
      statement: effective TTL は sink class × profile baseline、recipient cap、残存 reopen authorization window、active post-confirm due の strictest min で決める。
    revocation_triggers:
    - validity_window 終了
    - lawful purpose または authorization basis の失効
    - bridge token の superseded / revoked / resealed
    - reopen event close、authority post-confirm failure、legal-hold reseal
    - recipient mismatch、bundle 逸脱、non_reuse_clause 違反
    - compromise / leak / export routing anomaly による quarantine
    non_reuse_clause:
      statement: export-local pseudonym は single export bundle の内部 continuity にだけ使え、recipient class・purpose・retention bucket・reopen event・authority path のいずれかが変われば再発行しなければならない。
      invariants:
      - external digest と別 external recipient への human-readable export で同一 pseudonym を共有してはならない。
      - revoke / expire 済み pseudonym を追補 export や replay continuation に再活性化してはならない。
      - export-local pseudonym の purge / revoke は accountability lineage と bridge token tombstone を消してはならない。
  connection_policy:
    with_duplicate_discard_digest:
    - external digest の lineage summary は source stable pseudonym を直接載せず、bridge token の derived proof または redacted lineage slice を参照する。
    - duplicate_discard_digest が external sink に出るときは、export-local pseudonym と bridge token proof profile が recipient class / sink class に整合していなければならない。
    with_archive_replay:
    - same canonical scope 内の deterministic replay / legal audit では seal + notarization を既定 verification path とし、recipient-visible export がある場合だけ derived proof を追加する。
    - external replay bundle では archive manifest digest と bridge token proof ref を同時に束縛し、manifest 単独や pointer 単独を continuity witness にしてはならない。
    with_legal_hold_reopen:
    - reopen_export_rebind_bridge の token 発行は lane-based quorum で lawful reopen が成立し、sealed identity envelope binding が active である場合にだけ許される。
    - legal-hold reseal、authority post-confirm failure、scope excess が起きたときは dependent export-local pseudonym を自動 revoke する。
    with_emergency_bypass:
    - emergency bypass で出す bridge token は provisional status と bounded reveal を明示し、post-confirm 前に final evidence / public explanation / penalty judgement へ流用してはならない。
    - accountable_identity_slice 例外があっても export-local pseudonym は recipient-bound alias として別に発行し、source stable pseudonym を露出しない。
  prohibited_shortcuts:
  - forum ごとに別 stable pseudonym root を勝手に発行して canonical continuity を壊す。
  - tool migration を理由に pseudonym epoch を更新せず lineage bridge も残さない。
  - cross-tenant export に同一 stable pseudonym を再利用する。
  - bridge token を reusable shard、API key、恒久 join key として使う。
  - append-only notarization を省き、HSM seal だけで continuity witness を満たしたとみなす。
  - external_audit / external_digest / emergency_bypass で derived proof required 条件を無視する。
  - reopened derived export に source pseudonym や clear identity をそのまま出す。
  residual_open_points:
  - post-quantum migration を含む suite revision の dual-validity window と anti-downgrade rule をどこまで canonical registry 化するか
  - bundle-of-bundles における mandatory edge cohort / super-bundle coverage / archive linkage をどこで切るか
  - export-local pseudonym を伴う external digest の lineage slice をどこまで reversible にするか
duplicate_discard_digest_governance:
  status: provisional_fixed
  statement: 'duplicate_discard_digest とは、cluster de-dup により discard した member 群を、

    root profile に束縛された order-independent かつ count-sensitive な canonical digest として保持し、

    confirm・penalty・replay・purge judgement に必要な最小事実を audit-sufficient に残すための規則である。

    '
  core_claims:
  - digest は cluster representative の代用品ではなく、discard 群の監査・公平性・再判定に必要な summary anchor である。
  - canonical field set は common core と detector family / claim facet / sink class / replay class ごとの override に分ける。
  - multiset root は member の順序に依存してはならず、duplicate count の違いを潰してはならない。
  - multiset root の計算法は自由入力にせず、root_profile_ref に束縛する。
  - multiset root だけでは意味が足りず、cardinality、duplicate reason、stable pseudonym lineage、route / recipient / effect coverage を別 field で残す。
  - purge admissibility は、digest が family ごとの minimum retained raw unit を壊さないときにだけ開く。
  canonical_field_model:
    common_core_fields:
    - cluster_id
    - detector_family_ref
    - claim_facet_ref
    - sink_class_ref
    - replay_class_ref
    - canonical_scope_ref
    - pseudonym_epoch_ref
    - generation_window_ref
    - member_projection_schema_ref
    - root_profile_ref
    - schema_version_ref
    - multiset_root
    - collision_witness_ref_or_null
    - compression_grade_ref
    - total_member_count
    - unique_signature_count
    - duplicate_reason_set
    - duplicate_reason_histogram
    - representative_ref
    - retained_artifact_linkage_ref
    - bridge_token_proof_ref_or_null
    - archive_manifest_digest_or_null
    mandatory_semantic_summaries:
      cardinality_summary:
        statement: total_member_count、unique_signature_count、count bucket、discard ratio を残し、root だけで件数を推測させない。
      lineage_summary:
        statement: stable pseudonym lineage は clear identity ではなく、canonical scope / epoch に束縛された continuity slice として残す。
      route_recipient_effect_summary:
        statement: route / recipient / effect evidence が detector 判定に効く family では summary field を mandatory にする。
    family_overrides:
      local_convention_detected:
        extra_fields:
        - local_basis_summary
        - actor_or_team_concentration_summary
      confirmed_policy_drift:
        extra_fields:
        - basis_pair_summary
        - effective_use_path_summary
        - registry_or_policy_binding_summary
      suspected_leak:
        extra_fields:
        - route_summary
        - recipient_summary
        - effect_summary
        - direct_reach_or_observation_basis
      bias_penalty:
        extra_fields:
        - actor_concentration_summary
        - reviewer_or_operator_split_summary
      flooding_penalty:
        extra_fields:
        - cadence_window_summary
        - burst_shape_summary
        - source_diversity_summary
      replay_penalty:
        extra_fields:
        - replay_lineage_summary
        - reused_artifact_relation_summary
    sink_and_replay_overrides:
      strict_sink_rule:
        statement: authoritative_state / public_or_external_commitment / irreversible_resource_lock では、summary 省略を許さず、effect または accountability に触れる field を強化する。
      replay_rule:
        statement: deterministic_replay / forensic_replay では multiset root だけでなく replay-support linkage と archive manifest digest を必須とし、analytical_replay でも member projection schema を捨てない。
  multiset_root_policy:
    statement: multiset root は canonical member projection の multiset から作る order-independent root であり、set hash や representative hash の代用品ではない。
    required_properties:
    - order_independent
    - count_sensitive
    - profile_bound
    - schema_bound
    - scope_epoch_bound
    - family_override_aware
    root_profile_policy:
      statement: root_profile_ref は leaf hash、multiset accumulator、canonical serialization、domain separation、multiplicity encoding、collision witness profile、schema version を一体で束縛する canonical registry key である。
      canonical_profiles:
      - compact_internal_v1
      - standard_canonical_v1
      - strict_external_v1
      rules:
      - multiset root の直接比較・再利用・署名対象化は root_profile_ref と schema_version_ref が一致する場合に限る。
      - root profile または schema version を更新するときは dual-root migration witness を併記し、silent upgrade を禁止する。
      - sink class / replay class / recipient class / detector family の strictest 条件が要求する root profile を採用する。
    collision_witness_policy:
      statement: collision_witness は root の安全性を口頭で主張する代わりではなく、comparability・migration・dispute replay に必要な監査 anchor である。
      mandatory_cases:
      - external digest または recipient-visible export に duplicate_discard_digest を出す場合
      - replay_class が deterministic_replay または forensic_replay の場合
      - detector_family が suspected_leak または replay_penalty の場合
      - protected facet または strict sink に触れる場合
      optional_cases:
      - same-scope internal の summary_only / analytical_replay で、strict sink と protected facet に触れず、external recipient へ出さない場合
    boundary_rules:
    - member projection schema が変わるなら root を同一比較してはならない。
    - root profile または schema version が違う root を migration witness なしに同一 continuity chain へ入れてはならない。
    - canonical scope または pseudonym epoch が違う member を同一 root に混ぜてはならない。
    - same unique member set でも multiplicity が違えば別 root にしなければならない。
  compression_boundary_policy:
    statement: large cluster の summary 圧縮は digest の存在理由を壊さない範囲でだけ許し、lossless_canonical / bounded_loss_summary / coarse_internal_summary の3段階に限定する。
    grades:
      lossless_canonical:
        statement: histogram、route partition、lineage partition、recipient / effect partition を canonical bucket の範囲で正確保持する。
        required_when:
        - sink_class が public_or_external_commitment または irreversible_resource_lock
        - replay_class が deterministic_replay または forensic_replay
        - recipient class が external_auditor / external_commitment_recipient / emergency_response_principal
        - detector_family が suspected_leak または replay_penalty
        - protected facet または authority path の差分が判定に効く
      bounded_loss_summary:
        statement: total_member_count と unique_signature_count を exact に残しつつ、approved bucket / top-k / concentration upper bound のみ圧縮する。
        allowed_when:
        - replay_class が analytical_replay
        - recipient class が internal_owner_or_same_scope_reviewer または domain_or_central_authority
        - sink_class が owner_bound_internal / bounded_internal_shared / authoritative_state
        - protected facet、external commitment、irreversible lock の差分を跨いで summary を融合しない
      coarse_internal_summary:
        statement: internal monitoring 用の粗い summary であり、cluster health の観測には使えても confirm・penalty・external digest の基底には使えない。
        allowed_when:
        - replay_class が summary_only
        - sink_class が owner_bound_internal または bounded_internal_shared
        - recipient class が internal_owner_or_same_scope_reviewer
        - detector_family が local_convention_detected または内部観測専用 family である
    non_negotiable_preservations:
    - total_member_count と unique_signature_count は全 grade で exact に保持する。
    - duplicate_reason_set の presence/absence は全 grade で保持する。
    - route / recipient / effect summary は protected facet、external commitment、authority path を跨いで融合してはならない。
    - lineage summary は canonical scope / epoch / export bundle / lawful purpose / retention bucket を跨いで融合してはならない。
  connection_policy:
    stable_pseudonym_lineage:
    - lineage summary は stable pseudonym continuity を内部接続するが、external digest に source stable pseudonym をそのまま露出しない。
    - export では export-local pseudonym または redacted lineage slice へ再束縛する。
    - external digest に duplicate_discard_digest を出すときは、single export bundle / single recipient class / single lawful purpose / single retention bucket に束縛された lineage slice と bridge token proof_ref を必須にする。
    route_recipient_effect_evidence:
    - suspected_leak では route / recipient / effect のいずれかを root の外に summary field として残す。
    - confirmed_policy_drift / replay_penalty では effective use path または replay lineage の要約を残す。
    cardinality_and_fairness:
    - penalty や severity が cluster cardinality に依存する場合、duplicate_reason_histogram と count bucket を必須にする。
    - fairness review に必要な actor concentration や route concentration を representative 1件へ潰してはならない。
    archive_and_bridge_linkage:
    - deterministic_replay / forensic_replay、または external continuity に使う duplicate_discard_digest では archive manifest digest を mandatory にする。
    - bridge token proof_ref は export-local pseudonym / redacted lineage slice の lawful continuity witness として使い、root 単体で external continuity を主張してはならない。
  prohibited_shortcuts:
  - hash primitive / serialization / multiplicity encoding を digest ごとに自由指定し、root_profile_ref を持たせない。
  - representative 1件だけ残して duplicate_discard_digest を不要とみなす。
  - multiset root だけ残して member projection schema、count summary、duplicate reason を捨てる。
  - unique member set の hash を multiset root だと偽る。
  - root profile または schema version が違う root を migration witness なしに直接比較する。
  - strict sink や leak family で route / recipient / effect summary を省略する。
  - coarse 圧縮 summary を confirm / penalty / external digest の canonical basis に流用する。
  - external digest に source stable pseudonym や clear identity をそのまま出す。
  residual_open_points:
  - root_profile の version migration と dual-root coexistence window をどこまで canonical registry 化するか
  - bounded_loss_summary で保持すべき preserved-statistic set と top-k cap を detector family / profile ごとにどこまで数値 registry 化するか
root_profile_schema_version_dual_root_comparability_governance:
  status: provisional_fixed
  statement: root_profile_schema_version_dual_root_comparability_governance とは、root_profile_ref / schema_version_ref の migration 時に、dual-root coexistence を use surface ごとにどこまで許し、old root freeze / successor mandatory / history-only retention / rollback の境界を comparability witness により registry 化する規則である。
  core_claims:
  - dual-root coexistence は old root と new root を同格 current basis として並立させることではない。migration の間に predecessor と successor の両 digest を保持できるとしても、どの use surface でどちらが primary current basis かを分け、comparability witness で lawful な比較可能性だけを明示しなければならない。
  - new issuance freeze は successor を早出しすることの禁止であり、old root freeze は predecessor を current basis として引きずることの禁止である。したがって migration では、まず canonicalization / projection / benchmark linkage / rollback policy が揃うまで successor issuance を freeze し、arm 後は successor を primary にして predecessor の新規単独利用を止める二段 freeze が必要である。
  - comparability は一枚岩ではなく、exact_equivalent・bounded_projection_loss・benchmark_only・non_comparable の loss class に分けるべきである。current_basis に使えるのは exact_equivalent に限り、bounded_projection_loss は audit annex や bounded bridge continuity に限定し、benchmark_only は replay benchmark にだけ許す。
  - dual-root digest は old/new root を同時に持つことの記録であって、root 単体比較の免罪符ではない。dual-root digest には root pair / schema pair / subject set / canonicalization rule / projection family / loss class / admissible use surface / freeze boundary / rollback linkage を束ね、silent false comparability を検出できなければならない。
  - rollback は predecessor 復権の近道ではない。successor root を無効化する場合でも、どの digest pair・bridge continuity・benchmark baseline を巻き戻し、どの external disclosure に correction notice を出したかを reverse comparability witness として残さなければならない。
  use_surface_matrix:
    current_basis: conditional。dual-root coexistence は migration batch 内の shadow dual-current に限り許すが、successor root を primary current basis とし、comparison_loss_class が exact_equivalent で、paired dual-root digest と freeze boundary がある場合に限る。predecessor の単独 current basis 継続は old_root_freeze 後 forbidden。
    history_verification: admissible。predecessor / successor の両 root を immutable archive 上で保持してよい。bounded_projection_loss や benchmark_only でも、loss disclosure と benchmark linkage があれば history witness としては許すが、non_comparable を continuity recovery に使ってはならない。
    external_audit_disclosure: conditional。監査 current disclosure で dual-root を併記する場合は successor を current primary とし、predecessor は migration disclosure annex に退避する。exact_equivalent は full admissible、bounded_projection_loss は explicit loss notice 付きの annex 限定、benchmark_only / non_comparable は current disclosure basis として forbidden。
    bridge_continuity: conditional。bridge token proof_ref、lineage slice、archive manifest digest、dual-root digest が揃う場合にだけ predecessor→successor continuity を許す。exact_equivalent は bounded bridge continuity に使え、bounded_projection_loss は audience / lawful purpose / retention bucket を広げない narrow bridge に限る。benchmark_only / non_comparable は forbidden。
    replay_benchmark: admissible。benchmark family と comparison window が固定されていれば、exact_equivalent・bounded_projection_loss・benchmark_only を replay benchmark に使える。ただし benchmark 結果を current admissibility や external commitment の代用にしてはならない。
  comparability_loss_classes:
    exact_equivalent:
      meaning: canonical subject set と comparison objective を保ったまま predecessor / successor を current-comparable にできる class。
      allowed_surfaces:
      - current_basis
      - history_verification
      - external_audit_disclosure
      - bridge_continuity
      - replay_benchmark
      requirements:
      - root pair / schema pair が明示されている
      - canonicalization rule と projection family が deterministic で reversible reference を持つ
      - dual-root digest と drift scan digest がある
    bounded_projection_loss:
      meaning: 比較はできるが、aggregation / projection / serialization 差により current-equality までは言えない class。
      allowed_surfaces:
      - history_verification
      - external_audit_disclosure
      - bridge_continuity
      - replay_benchmark
      requirements:
      - loss dimension を comparison_loss_class に明示する
      - external disclosure では loss notice annex を mandatory にする
      - bridge continuity では audience / scope widening を禁止する
    benchmark_only:
      meaning: benchmark / replay / regression tracking のためだけに比較できる class。continuity current basis には使えない。
      allowed_surfaces:
      - history_verification
      - replay_benchmark
      requirements:
      - benchmark family ref と benchmark dataset digest を mandatory にする
      - current / bridge / external current basis への昇格を禁止する
    non_comparable:
      meaning: old/new root の並記は保持できても lawful comparison はできない class。
      allowed_surfaces:
      - history_verification
      requirements:
      - history-only retention に落とす
      - migration success を主張しない
      - successor mandatory surface への流入を禁止する
  freeze_and_window_rules:
    new_issuance_freeze:
      boundary: successor root / schema を使った新規 issuance は、canonicalization rule・projection family・comparability witness template・rollback policy・benchmark linkage が arm 済みになるまで freeze する。
      release_condition: migration batch が dual-root comparability witness の minimum field set を満たし、shadow validation で silent drift が 0 件または explictly waived になったときにだけ release する。
    old_root_freeze:
      boundary: successor issuance が arm され、primary current basis が successor に切り替わった時点で predecessor の新規単独 current usage を freeze する。
      post_freeze_reuse:
      - history_verification
      - external_audit_disclosure annex
      - bounded bridge continuity
      - replay_benchmark
    dual_root_window_classes:
      shadow_dual_current_internal_only: current_basis で paired dual-root digest を保持できる最短 window。internal / same-scope validation に限り、successor primary を mandatory とする。
      audit_and_bridge_only: old root freeze 後に predecessor を external_audit_disclosure annex と bridge continuity witness にだけ残す window。
      history_only: window 終了後は predecessor / successor を immutable archive と benchmark record にだけ残す。
    successor_mandatory_for:
    - new_issuance_freeze 解放後に生成されるすべての new issuance
    - old_root_freeze 後の current basis 判定
    - 監査向け current disclosure の primary digest
    - bridge cutover 後に新規発行される bridge token / external continuity packet
    - migration 完了後に登録される benchmark baseline の primary side
  comparability_witness:
    minimum_field_set:
    - comparability_witness_id
    - migration_kind_ref
    - predecessor_root_profile_ref
    - successor_root_profile_ref
    - predecessor_schema_version_ref
    - successor_schema_version_ref
    - subject_set_manifest_ref_or_digest
    - canonicalization_rule_ref
    - projection_family_ref
    - comparison_objective_ref
    - comparison_loss_class_ref
    - admissible_use_surface_set
    - pre_arm_new_issuance_freeze_at
    - old_root_freeze_at
    - dual_root_window_class_ref
    - window_end_at_or_condition
    - predecessor_root_digest_set_or_digest
    - successor_root_digest_set_or_digest
    - dual_root_digest_ref
    - benchmark_family_ref_or_null
    - benchmark_dataset_digest_or_null
    - bridge_token_proof_ref_or_null
    - drift_scan_digest_ref
    - rollback_policy_ref
    - archive_manifest_digest_ref
    rules:
    - dual_root_digest は predecessor / successor の digest を unordered に潰した summary ではなく、root pair / schema pair / pair-order / subject set / loss class を固定した paired witness でなければならない。
    - comparison_loss_class_ref が bounded_projection_loss 以上なら、どの facet が失われたかを loss disclosure として mandatory にする。
    - benchmark_family_ref は replay_benchmark または benchmark_only を admissible use surface に含む場合に mandatory とする。
    - bridge_token_proof_ref は bridge_continuity を admissible use surface に含む場合に mandatory とする。
    - rollback_policy_ref は predecessor 復帰条件だけでなく、successor digest invalidation・external correction notice・benchmark baseline 巻き戻し条件を含まなければならない。
    drift_and_rollback:
    - silent drift は、paired dual-root digest を持たない successor issuance、loss class と use surface の不一致、benchmark_only digest の current 流用、window 終了後の predecessor current reuse を含む。
    - rollback は reverse comparability witness を持つ独立 event とし、どの root pair を無効化し、どの bridge token / benchmark linkage を巻き戻したかを immutable に残す。
  responsibility_split:
    DecisionLedger: comparability_witness_id、root/schema pair、loss class、admissible use surface、new issuance freeze / old root freeze、primary root designation、rollback policy の正本を保持する。
    GraphEngine: issue_time / use surface / context / digest pair / benchmark linkage を評価し、dual-root admissibility、successor mandatory、window class、bridge continuity validity、drift trigger を計算する。
    GraphLint: migration witness なし root 直接比較、bounded_projection_loss の current basis 流用、benchmark_only の bridge / audit current basis 流用、freeze 前 successor issuance、window 終了後 predecessor current reuse、silent non-comparable carryover を検査する。
    archive_object: predecessor / successor paired digest、loss disclosure annex、benchmark dataset digest、bridge token proof、drift scan、rollback manifest を immutable に保持する。
  prohibited_shortcuts:
  - root_profile_ref または schema_version_ref が異なる root を comparability witness なしに直接比較すること
  - same member set だからという理由だけで new root を exact_equivalent とみなすこと
  - bounded_projection_loss や benchmark_only を current basis の近道に使うこと
  - successor root の shadow validation が終わる前に new issuance freeze を解除すること
  - external partner 未更新を理由に predecessor root を current primary のまま残すこと
  - rollback を silent predecessor re-enable として処理すること
  residual_open_points: []
bounded_loss_summary_registry_governance:
  status: provisional_fixed
  statement: bounded_loss_summary_registry_governance とは、duplicate_discard_digest の bounded_loss_summary について、どの統計を exact に保持し、どの統計を top-k + exact tail で保持し、どの条件で lossless_canonical に escalate し、どの圧縮を forbidden とするかを detector family / claim facet / sink class / replay class / recipient class / root profile ごとの registry cell で固定する規則である。
  core_claims:
  - bounded_loss_summary は「ざっくりした要約」ではない。exact に保持する統計、top-k で保持する統計、exact tail mass / omitted bucket count / max omitted bucket mass を必須にした bounded summary contract である。
  - detector family が preserved-statistic set の主軸を決め、claim facet / sink class / replay class / recipient class / root profile はその cell を弱めずに strict 化するだけである。したがって override は permissive override ではなく monotone tightening として扱う。
  - suspected_leak と replay_penalty は、route/recipient/effect・replay lineage・external continuity の再監査を壊しやすいため bounded_loss_summary を禁止し、lossless_canonical を mandatory とする。
  - protected facet / authority path / export bundle / lawful purpose / retention bucket は hard partition axis であり、bounded_loss_summary でもこれらを跨いで bucket を融合してはならない。partition count は exact に残し、融合が必要なら lossless へ escalate しなければならない。
  - top-k cap は単独では意味を持たない。top-k entry に加えて omitted_tail_mass、omitted_bucket_count、max_omitted_bucket_mass、concentration_upper_bound、summary_generation_rule_ref を残し、silent summary drift を再計算可能にしなければならない。
  - root_profile_ref は multiset root 側の canonicalization を束縛するが、bounded_loss_summary の admissibility にも効く。compact_internal_v1 は bounded admissible、standard_canonical_v1 は authority review 限定で bounded admissible、strict_external_v1 は bounded forbidden とする。
  registry_axes:
    primary_axes:
    - detector_family_ref
    - claim_facet_family_ref
    - sink_class_ref
    - replay_class_ref
    - recipient_class_ref
    - root_profile_ref
    hard_partition_axes:
    - protected_facet_partition
    - authority_path_partition
    - export_bundle_partition
    - lawful_purpose_partition
    - retention_bucket_partition
    - canonical_scope_partition
    - pseudonym_epoch_partition
    resolution_rule: registry cell は detector_family_ref を first key とし、claim_facet_family_ref が statistic family を追加し、sink / replay / recipient / root profile が cap class と lossless escalation 条件を上書きする。override は stricter side を採用し、cap を小さくして detail を減らすことは許されない。
  mandatory_summary_trailer:
    required_fields:
    - summary_registry_cell_ref
    - summary_generation_rule_ref
    - cap_class_ref
    - exact_preserved_stat_digest
    - omitted_bucket_count_by_dimension
    - omitted_tail_mass_by_dimension
    - max_omitted_bucket_mass_by_dimension
    - concentration_upper_bound_by_dimension
    - partition_guard_digest
    - drift_scan_basis_digest
    rules:
    - top-k summary を持つ各 dimension は omitted_tail_mass と max_omitted_bucket_mass を exact に持たなければならない。
    - partition_guard_digest は hard partition axes ごとの exact count vector を束縛しなければならない。
    - summary_generation_rule_ref は detector family / cap class / ordering key / tie-break / bucketization version を固定しなければならない。
  cap_classes:
    local_review:
      statement: same-scope internal analytical review 用の base cap class。
      caps:
        local_basis_top_k: 8
        basis_or_path_top_k: 8
        actor_or_source_top_k: 8
        route_recipient_effect_top_k: 8
        cadence_window_top_k: 8
        lineage_slice_top_k: 4
    authority_review:
      statement: domain_or_central_authority / authoritative_state analytical review 用の stricter cap class。より多くの detail を exact top-k で保持する。
      caps:
        local_basis_top_k: 16
        basis_or_path_top_k: 16
        actor_or_source_top_k: 16
        route_recipient_effect_top_k: 16
        cadence_window_top_k: 12
        lineage_slice_top_k: 8
    lossless_only: deterministic_replay / forensic_replay / strict_external_v1 / external recipient / strict sink / protected facet sensitive context では top-k truncation を許さず、lossless_canonical へ escalate する。
  context_and_profile_rules:
    root_profile_rules:
      compact_internal_v1: bounded_loss_summary admissible。recipient_class と sink_class が local review なら local_review cap、authority review なら authority_review cap を採用する。
      standard_canonical_v1: bounded_loss_summary conditional。recipient_class が domain_or_central_authority または sink_class が authoritative_state の analytical review に限り admissible とし、cap_class は authority_review を mandatory にする。
      strict_external_v1: bounded_loss_summary forbidden。strict_external_v1 を使うなら lossless_canonical へ escalate しなければならない。
    replay_and_recipient_rules:
      analytical_replay: bounded_loss_summary のみ admissible 候補。deterministic / forensic へ昇格した時点で lossless mandatory に切り替える。
      summary_only: coarse_internal_summary 候補であり、bounded_loss_summary を coarse の代用品にしてはならない。
      internal_owner_or_same_scope_reviewer: base は local_review cap class。
      domain_or_central_authority: base は authority_review cap class。
      external_auditor_or_external_commitment_recipient_or_emergency_response_principal: bounded_loss_summary forbidden。
      public_or_external_commitment_or_irreversible_resource_lock: bounded_loss_summary forbidden。
    escalation_conditions:
    - protected facet 差分または authority path 差分が判定に効く
    - recipient-visible export または external continuity に使う
    - deterministic_replay / forensic_replay を要求する
    - strict_external_v1 を要求する
    - cross-partition merge をしないと summary が作れない
  detector_family_registry:
    local_convention_detected:
      bounded_loss_admissibility: admissible。ただし analytical_replay かつ internal recipient に限る。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - local_basis_bucket_count
      - canonical_scope_partition_count
      - pseudonym_epoch_partition_count
      top_k_statistics_with_caps:
      - local_basis_summary
      - actor_or_team_concentration_summary
      - lineage_slice_summary
      forbidden_compressions:
      - route / recipient / effect evidence を local convention summary に吸収して leak family の代用品にすること
      - actor/team concentration を omitted tail mass なしで top-1 representative に潰すこと
    confirmed_policy_drift:
      bounded_loss_admissibility: conditional。protected facet / authority path 差分が inactive で、analytical_replay かつ internal / authority recipient の場合に限る。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - basis_pair_bucket_count
      - effective_use_path_bucket_count
      - registry_or_policy_binding_bucket_count
      - authority_path_partition_count
      top_k_statistics_with_caps:
      - basis_pair_summary
      - effective_use_path_summary
      - registry_or_policy_binding_summary
      - lineage_slice_summary
      forbidden_compressions:
      - authority path 差分を跨いだ basis_pair bucket の融合
      - effective_use_path の上位 path だけ残して policy binding の omitted tail を捨てること
    bias_penalty:
      bounded_loss_admissibility: conditional。final external penalty / irreversible lock でなく、analytical fairness review に限り admissible。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - reviewer_operator_split_matrix
      - protected_facet_partition_count
      - omitted_tail_mass_actor_dimension
      - max_omitted_bucket_mass_actor_dimension
      - concentration_upper_bound_actor_dimension
      top_k_statistics_with_caps:
      - actor_concentration_summary
      - team_or_route_concentration_summary
      - lineage_slice_summary
      forbidden_compressions:
      - fairness review に必要な omitted tail mass を落とすこと
      - reviewer/operator split を top-k identity summary に置き換えること
    flooding_penalty:
      bounded_loss_admissibility: conditional。direct abuse confirm 前の analytical severity review に限り admissible。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - registered_cadence_bucket_histogram
      - burst_shape_bucket_count
      - source_diversity_bucket_count
      - protected_facet_partition_count
      top_k_statistics_with_caps:
      - burst_window_summary
      - source_group_concentration_summary
      - lineage_slice_summary
      forbidden_compressions:
      - cadence bucket を coarse single total へ畳み、burst envelope 破れを再監査できなくすること
      - source diversity を representative 1件へ潰すこと
    suspected_leak:
      bounded_loss_admissibility: forbidden。route / recipient / effect と exposure episode continuity の再監査を壊すため lossless_canonical mandatory。
      exact_preserved_statistics:
      - route_partition_count
      - recipient_partition_count
      - effect_bucket_count
      - exposure_episode_count
      top_k_statistics_with_caps: []
      forbidden_compressions:
      - route / recipient / effect を top-k + tail へ落として external reach の exact replay を失うこと
    replay_penalty:
      bounded_loss_admissibility: forbidden。replay lineage / reused artifact relation / benchmark continuity の再監査を壊すため lossless_canonical mandatory。
      exact_preserved_statistics:
      - replay_lineage_partition_count
      - reused_artifact_relation_count
      - benchmark_linkage_count
      top_k_statistics_with_caps: []
      forbidden_compressions:
      - replay lineage を top-k representative relation に潰すこと
  claim_facet_overlays:
    route_or_recipient_or_effect:
      exact_preservations:
      - route_partition_count
      - recipient_partition_count
      - effect_bucket_count
      cap_dimension: route_recipient_effect_top_k
      escalate_to_lossless_when:
      - direct recipient identity または effect realization が confirm / penalty judgement の basis になる
      - external continuity または recipient-visible export に使う
    basis_or_policy_path:
      exact_preservations:
      - basis_pair_bucket_count
      - effective_use_path_bucket_count
      - registry_or_policy_binding_bucket_count
      cap_dimension: basis_or_path_top_k
    actor_or_reviewer_fairness:
      exact_preservations:
      - reviewer_operator_split_matrix
      - omitted_tail_mass_actor_dimension
      - max_omitted_bucket_mass_actor_dimension
      - concentration_upper_bound_actor_dimension
      cap_dimension: actor_or_source_top_k
    cadence_or_burst:
      exact_preservations:
      - registered_cadence_bucket_histogram
      - burst_shape_bucket_count
      - source_diversity_bucket_count
      cap_dimension: cadence_window_top_k
    replay_or_lineage_relation:
      exact_preservations:
      - canonical_scope_partition_count
      - pseudonym_epoch_partition_count
      - export_bundle_partition_count
      - lawful_purpose_partition_count
      - retention_bucket_partition_count
      cap_dimension: lineage_slice_top_k
      escalate_to_lossless_when:
      - replay lineage そのものが penalty confirm の basis になる
      - bridge continuity を duplicate_discard_digest から直接主張する
  silent_summary_drift_rules:
    drift_detected_when:
    - exact_preserved_stat_digest が再計算値と一致しない
    - top-k entry 集合は一致していても omitted_tail_mass / omitted_bucket_count / max_omitted_bucket_mass のいずれかがずれる
    - hard partition axes を跨いだ bucket merge が見つかる
    - registry cell が要求する cap class より小さい cap で summary が生成されている
    - summary_generation_rule_ref が tie-break / ordering / bucketization version を変えているのに migration witness がない
    - concentration_upper_bound が再計算より楽観的で fairness 判定を弱めている
    mandatory_checks:
    - same raw cluster から recompute した bounded summary と archived summary の diff scan
    - lossless representative sample または archive linkage を用いた tail audit
    - claim facet overlay と detector family overlay の strictest side selection lint
  responsibility_split:
    DecisionLedger: summary_registry_cell_ref、cap_class_ref、exact_preserved_stat_digest、compression_admissibility_state、lossless_escalation_reason の正本を保持する。
    GraphEngine: detector family / claim facet / sink / replay / recipient / root profile から applicable registry cell を解決し、exact stats・top-k summary・tail metrics・partition_guard_digest を生成する。
    GraphLint: forbidden family での bounded usage、missing exact trailer、cap undershoot、hard partition merge、fairness tail 欠落、silent summary drift を検査する。
    archive_object: summary_generation_rule、tail audit sample、lossless fallback linkage、partition_guard_digest、drift diff report を immutable に保持する。
  prohibited_shortcuts:
  - detector family ごとの preserved-statistic set を定義せず、一律の generic top-k summary を使うこと
  - top-k entry だけ残して omitted tail mass / omitted bucket count を捨てること
  - protected facet / authority path / export bundle / lawful purpose / retention bucket を跨いで summary bucket を融合すること
  - strict_external_v1 や deterministic / forensic replay で bounded_loss_summary を使うこと
  - suspected_leak / replay_penalty を local_convention 用 summary profile で近似すること
  - cap class を縮めて detail を減らす override を permissive override として扱うこと
  residual_open_points: []
transition_bundle_lineage_partition_governance:
  status: provisional_fixed
  statement: transition_bundle_lineage_partition_governance とは、tenant / authority / export bundle / lawful purpose / retention bucket / canonical scope / pseudonym epoch の merge / split / rebind を伴う transition bundle について、lineage slice partition witness の最小核、audit witness packet / central delegation charter / bridge token / archive manifest との binding、lawful continuity / notice / correction / rollback duty を固定する規則である。
  core_claims:
  - transition bundle は predecessor と successor の単なる対応表ではない。hard partition axis ごとの lineage slice を canonical cell として切り、その cell ごとに predecessor coverage・successor provenance・duty surface を束ねた governance object である。
  - lineage slice partition witness の主目的は、「何がどこへ移ったか」だけでなく、「何が移ってはならないか」「何が retire されたか」「どの successor がどの duty を負うか」を partition cell 単位で閉じることである。
  - audit witness packet は transition lawful continuity と partition completeness の一次 witness である。central delegation charter は merge / split を実施してよい authority path と duty template を与えるが、packet の代用にはならない。
  - bridge token は cross-scope / cross-epoch / export continuity の successor-facing binding に使うが、merge / split そのものの lawful authorization や notice completion を単独で証明してはならない。
  - archive manifest は immutable recovery anchor であり、bundle 実体・witness packet・bridge token・notice evidence・reverse bundle linkage を固定する。rollback や reopen は archive manifest を介して forward bundle を可逆化するのであって、forward bundle を消し込む操作ではない。
  - partial rollback は「forward bundle をなかったことにする」処理ではなく、affected partition cell だけを対象にした reverse continuity bundle と correction notice bundle を別 object として束ねるべきである。
  hard_partition_axes:
  - tenant_partition
  - authority_path_partition
  - export_bundle_partition
  - lawful_purpose_partition
  - retention_bucket_partition
  - canonical_scope_partition
  - pseudonym_epoch_partition
  transition_relation_taxonomy:
    one_to_many_split: 1つの predecessor lineage slice が複数 successor cell に分配される。allocation vector と excluded successor set を exact に残す。
    many_to_one_merge: 複数 predecessor lineage slice が1つの successor cell に束ねられる。merge admissibility は charter と packet の両方で確認し、hard partition axis を跨ぐ場合は default forbidden。
    many_to_many_recomposition: split と merge が同一 bundle 内で起きる複合遷移。predecessor/successor の cardinality だけで lawful continuity を判定してはならず、cell ごとの allocation witness が必要。
    rebind_without_cardinality_change: canonical scope / pseudonym epoch / export-local pseudonym 等の再束縛で cardinality は変わらないが continuity surface が変わる遷移。bridge token と notice duty が主に効く。
    retire_or_tombstone: successor を持たず lineage slice を終了する遷移。retire reason と reopen path を exact に残さなければならない。
  minimum_bundle_fields:
    required_fields:
    - transition_bundle_id
    - bundle_class_ref
    - transition_reason_ref
    - predecessor_partition_vector_digest
    - successor_partition_vector_digest
    - lineage_slice_partition_witness_ref
    - audit_witness_packet_ref
    - central_delegation_charter_ref_or_null
    - bridge_token_digest_set_or_null
    - archive_manifest_digest_ref
    - notice_and_correction_plan_ref_or_null
    - reverse_bundle_linkage_ref_or_null
    - predecessor_coverage_digest
    - successor_provenance_digest
    - retired_slice_digest_or_null
    - allocation_rule_ref
    - initiated_at
    - finalized_at_or_null
    rules:
    - predecessor_coverage_digest は predecessor slice 全件の covered / retired / deferred を partition cell 単位で exact に束縛しなければならない。
    - successor_provenance_digest は各 successor cell の provenance を predecessor slice set と allocation rule により再構成可能にしなければならない。
    - retired slice が存在する場合は retire reason / reopen eligibility / notice duty を省略してはならない。
  witness_binding_matrix:
    audit_witness_packet:
      primary_role: transition lawful continuity、partition completeness、forbidden cross-partition merge absence の一次証明
      must_bind:
      - lineage_slice_partition_witness_ref
      - predecessor_coverage_digest
      - successor_provenance_digest
      - continuity_class_ref
      - duty_surface_digest
      - archive_manifest_digest_ref
    central_delegation_charter:
      primary_role: authority path と allowed transition family、notice / correction / rollback の duty template を与える
      must_bind:
      - authority_path_ref
      - allowed_bundle_class_set
      - protected_facet_guard
      - notice_duty_template_ref
      - rollback_duty_template_ref
    bridge_token:
      primary_role: cross-scope / cross-epoch / export continuity で predecessor と successor の narrow equivalence を示す
      must_bind:
      - predecessor_successor_pair_digest
      - bridge_scope_ref
      - audience_class_ref
      - lawful_purpose_ref
      - expiry_or_freeze_ref
      limits:
      - bundle lawful authorization の代用禁止
      - notice completion の代用禁止
      - hard partition axis を跨ぐ merge admissibility の代用禁止
    archive_manifest:
      primary_role: bundle 実体、witness、notice evidence、reverse bundle を immutable に凍結し、rollback / reopen の recovery anchor にする
      must_bind:
      - transition_bundle_digest
      - audit_witness_packet_digest
      - bridge_token_digest_set_or_null
      - notice_evidence_digest_set_or_null
      - reverse_bundle_digest_set_or_null
  duty_split:
    transition_lawful_continuity: audit witness packet を主 witness とし、必要に応じて charter / bridge token / archive manifest を従 witness として束ねる。
    reveal_notice_correction: central delegation charter の duty template と notice_and_correction_plan を主にし、bridge token は recipient-facing continuity claim の narrow binder に限定する。
    rollback_reopen: archive manifest と reverse bundle linkage を主にし、forward bundle を erase せず reverse continuity を append する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - transition_bundle_id
      - bundle_class_ref
      - audit_witness_packet_ref
      - central_delegation_charter_ref_or_null
      - notice_and_correction_plan_ref_or_null
      - reverse_bundle_linkage_ref_or_null
      - duty state
    GraphEngine:
      owns:
      - predecessor_partition_vector_digest
      - successor_partition_vector_digest
      - lineage_slice_partition_witness generation
      - allocation vector resolution
      - bridge pairing materialization
    GraphLint:
      owns:
      - cross-partition merge lint
      - missing predecessor coverage lint
      - orphan successor provenance lint
      - bridge-token-overreach lint
      - notice/rollback duty mismatch lint
    archive_object:
      owns:
      - immutable bundle payload
      - audit witness packet snapshot
      - notice evidence package
      - reverse continuity chain
  forbidden_shortcuts:
  - predecessor/successor の cardinality だけで lawful continuity を判定する
  - bridge token だけで merge / split authorization を証明したことにする
  - notice completion を send success や token delivery だけで済ませる
  - partial rollback 時に forward bundle を上書き削除し reverse bundle を残さない
  - tenant / authority path / export bundle / lawful purpose / retention bucket / canonical scope / pseudonym epoch を跨ぐ merge を packet/charter なしで実行する
  residual_open_points: []
tenant_merge_split_lawful_continuity_governance:
  status: provisional_fixed
  statement: 'tenant_merge_split_lawful_continuity_governance とは、tenant merge / split によって tenant_id が変わるとき、

    stable pseudonym・bridge token chain・lineage slice・archive manifest・delegation charter chain の

    どれを continuity として保持でき、どこで cut / rebind / fork しなければならないかを拘束する規則である。

    '
  core_claims:
  - tenant_id が変わる merge / split では、source stable pseudonym の文字列的継続を許さず、continuity は accountability lineage と lawful handover によってのみ主張する。
  - same authority family・same jurisdiction family・accountability preserved・reflected central transition charter・一意な predecessor/successor mapping が同時に満たされる 1→1 recontainer だけが linear rebind を許す。
  - n→1 merge と 1→n split は linear bridge chain では表現せず、predecessor_set / successor_set / allocation witness を持つ transition bundle でだけ lawful continuity を主張する。
  - predecessor の archive manifest は immutable であり、merge 後の単一 manifest へ retroactive に吸収してはならない。successor tenant は新しい manifest root を持つ。
  - domain_delegation charter は same-tenant・same-jurisdiction・bounded reveal の内部委任に限るため、tenant merge / split の continuity charter としては使えず、central transition charter を要する。
  transition_axes:
    topology_change:
      recontainer_1_to_1:
        statement: tenant container だけが 1→1 で置換される。
      merge_n_to_1:
        statement: 複数 predecessor tenant が 1つの successor tenant へ統合される。
      split_1_to_n:
        statement: 1つの predecessor tenant が複数 successor tenant へ分割される。
    accountability_relation:
      preserved:
        statement: accountability_domain が保たれ、結果責任の帰属先が変わらない。
      reallocated:
        statement: accountability_domain が別主体へ再配賦される。
      ambiguous:
        statement: cutover 時点で successor ごとの責任帰属が一意に定まらない。
    authority_relation:
      same_authority_family:
        statement: authority family が不変である。
      cross_authority_family:
        statement: authority family が変わる。
    jurisdiction_relation:
      same_jurisdiction_family:
        statement: jurisdiction family が不変である。
      cross_jurisdiction_family:
        statement: jurisdiction family が変わる。
  keep_cut_rebind_rules:
    stable_pseudonym:
      literal_keep:
        statement: tenant_id が変わる場合は常に禁止する。
      linear_rebind:
        statement: recontainer_1_to_1 で、accountability_relation=preserved、authority_relation=same_authority_family、jurisdiction_relation=same_jurisdiction_family、かつ reflected central transition charter と effective bridge token がある場合に限り、successor stable pseudonym を新発行して lawful continuity を主張できる。
      bundle_rebind:
        statement: merge_n_to_1 または split_1_to_n では、各 successor stable pseudonym を新発行し、transition bundle で predecessor/successor 対応を束ねる。predecessor pseudonym を cutover 後の live alias に使わない。
      hard_cut:
        statement: accountability_relation が reallocated または ambiguous、authority_relation が cross_authority_family、jurisdiction_relation が cross_jurisdiction_family、または ratified だが未 reflected の transition charter しかない場合は literal continuity も linear rebind も認めない。
    bridge_token_chain:
      linear_extension:
        statement: 1→1 recontainer で unique predecessor/successor mapping があり、bridge token の predecessor/successor commitment・lawful purpose・authorization basis・revocation state が健全な場合だけ許す。
      event_rooted_bundle:
        statement: n→1 merge と 1→n split では、single chain の継続ではなく、transition_event_digest・predecessor_set・successor_set・allocation_witness を持つ bundle を mandatory とする。
      cut_conditions:
      - reflected central transition charter がない
      - predecessor/successor mapping が ambiguous
      - bridge token が superseded / revoked / quarantined である
      - lawful purpose または authorization basis が失効している
    lineage_slice:
      preserved_minimal:
        statement: accountability preserved の recontainer では、minimum accountable lineage だけを successor へ carry できる。
      partitioned:
        statement: split では successor ごとに partition witness で割り当てた lineage slice だけを持たせ、他 branch の broad lineage を carry してはならない。
      redacted_only:
        statement: cross-jurisdiction、protected facet、または recipient-visible export では redacted lineage slice または export-local pseudonym 経由でしか continuity を出してはならない。
      cut:
        statement: accountability reallocated / ambiguous で lawful allocation witness がない場合は lineage carry を禁止する。
    archive_manifest:
      predecessor_immutability:
        statement: predecessor manifest は immutable であり、merge 後 manifest に retroactive 連結して置き換えてはならない。
      successor_root:
        statement: successor tenant は新しい archive manifest root を持ち、必要なら predecessor manifest digest 群を handover bundle 経由で参照する。
      split_rule:
        statement: split では successor ごとに branch-local manifest を作り、allocated lineage slice / export bundle / reopen path を branch 別に分ける。
    charter_chain:
      no_automatic_inheritance:
        statement: predecessor charter は successor tenant に自動継承しない。
      central_transition_requirement:
        statement: tenant merge / split の continuity を主張するには、central_template または central_delegation に基づく reflected transition charter を mandatory とする。
      domain_delegation_limit:
        statement: domain_delegation は same-tenant internal operation に限り有効であり、cross-tenant / cross-jurisdiction transition charter の代替にしてはならない。
  lawful_transition_requirements:
  - transition event は predecessor_set / successor_set / effective_cutover_time / accountability_relation / authority_relation / jurisdiction_relation / lawful_purpose / ratification_event / reflection_event を持つ。
  - 1→1 recontainer では unique predecessor/successor mapping witness を mandatory とする。
  - n→1 merge / 1→n split では allocation_witness と branch coverage を mandatory とし、single bridge token 1本で全体を表したことにしてはならない。
  - recipient-visible continuity には export-local pseudonym または redacted lineage slice、bridge_token_proof_ref、archive_manifest_digest_ref、transition charter ref を同時に要する。
  - post-confirm 前の provisional transition bundle を final evidence / public explanation / irreversible commitment の basis にしてはならない。
  prohibited_shortcuts:
  - tenant_id が変わったのに source stable pseudonym を successor tenant の live alias として再利用する。
  - n→1 merge または 1→n split を single linear bridge token 1本で表したことにする。
  - predecessor manifest を書き換えて successor manifest に吸収したことにする。
  - predecessor の domain_delegation charter を successor tenant の transition charter だとみなす。
  - split 後に non-allocated broad lineage を各 successor へ複製して持ち出す。
  - reflected 前の ratified transition charter を final continuity basis として使う。
  residual_open_points:
  - same authority family だが cross-jurisdiction である場合の transition charter override をどこまで taxonomy 化するか
  - staged n→m transition を bundle-of-bundles continuity としてどこまで共通化するか
  - reflected 前の provisional transition bundle を bounded internal review にどこまで使えるか
merge_split_transition_bundle_canonical_schema_governance:
  status: provisional_fixed
  statement: 'merge_split_transition_bundle_canonical_schema_governance とは、tenant merge / split における lawful continuity を

    topology_kind・cardinality・mapping relation・allocation / partition witness・edge proof・bundle proof・archive handover manifest・export alias reissue

    の束として一意に記述し、single token summary や implicit inference による shortcut を禁止する規則である。

    '
  core_claims:
  - canonical schema は common core と topology-specific mandatory を分けるが、どの topology でも explicit topology_kind と explicit predecessor/successor count を持つ。
  - edge proof は predecessor/successor 局所関係を束縛し、bundle proof は edge 集合の coverage・bundle digest・manifest continuity を束縛する。両者を同一 proof ref に潰してはならない。
  - merge / split では allocation_witness と branch coverage を必須にし、1→1 recontainer では unique mapping witness を必須にする。
  - predecessor manifest は immutable のまま残し、successor manifest は新 root として別に作る。handover は archive handover manifest でだけ橋渡しする。
  - export-local pseudonym は successor branch × export bundle × recipient class 単位で新発行し、source stable pseudonym や他 branch alias の再利用を禁止する。
  - schema は topology・mapping・coverage・manifest linkage を保持し、TTL・recipient cap・non-reuse baseline・proof profile・revocation semantics は registry 側参照に残す。
  canonical_field_layers:
    common_core_fields:
    - schema_version_ref
    - transition_bundle_id
    - transition_event_ref
    - topology_kind
    - transition_mode
    - cutover_time
    - predecessor_scope_ref_set
    - successor_scope_ref_set
    - predecessor_count
    - successor_count
    - mapping_mode
    - transition_charter_ref
    - witness_packet_ref_or_null
    - bundle_digest_ref
    - bundle_proof_ref
    - archive_handover_manifest_ref
    - predecessor_manifest_digest_set
    - successor_manifest_digest_set
    - lawful_purpose_ref
    - continuity_status
    cardinality_and_mapping_fields:
    - edge_count
    - branch_coverage_rule_ref
    - unique_mapping_witness_ref_or_null
    - allocation_witness_ref_set_or_null
    - lineage_partition_witness_ref_set_or_null
    - uncovered_branch_disposition_ref_or_null
    - reflected_mapping_event_ref
    edge_fields:
    - edge_id
    - predecessor_scope_ref
    - successor_scope_ref
    - relation_kind
    - predecessor_lineage_slice_ref_or_null
    - successor_lineage_slice_ref_or_null
    - allocation_witness_ref_or_null
    - edge_bridge_token_ref
    - edge_proof_ref
    - token_handle_ref
    - proof_handle_ref
    export_alias_fields:
    - successor_branch_ref
    - export_bundle_ref_set_or_null
    - export_local_pseudonym_ref_set_or_null
    - recipient_class_ref_set_or_null
    - alias_policy_ref_or_null
    - alias_non_reuse_clause_ref_or_null
    - alias_revocation_handle_ref_set_or_null
  topology_mandatory_matrix:
    recontainer_1_to_1:
      cardinality_constraints:
      - predecessor_count=1
      - successor_count=1
      - edge_count=1
      mandatory_fields:
      - unique_mapping_witness_ref
      - edge_proof_ref
      - bundle_digest_ref
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      optional_fields:
      - allocation_witness_ref_or_null
      - lineage_partition_witness_ref_set_or_null
      continuity_cut_triggers:
      - unique_mapping_witness invalidated
      - mandatory edge の token_handle / proof_handle が active ではない
      - bundle_digest_ref と manifest linkage が一致しない
      - reflected transition_charter_ref が失効または未反映になる
    merge_n_to_1:
      cardinality_constraints:
      - predecessor_count>=2
      - successor_count=1
      - edge_count=predecessor_count
      mandatory_fields:
      - allocation_witness_ref_set
      - edge_proof_ref_set
      - bundle_proof_ref
      - branch_coverage_rule_ref=all_predecessors_covered
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      optional_fields:
      - lineage_partition_witness_ref_set_or_null
      continuity_cut_triggers:
      - predecessor_scope のいずれかが edge を持たない
      - allocation_witness が invalid / revoked / unreflected になる
      - mandatory edge の token_handle / proof_handle が active ではない
      - successor manifest root と bundle_digest_ref の整合が崩れる
    split_1_to_n:
      cardinality_constraints:
      - predecessor_count=1
      - successor_count>=2
      - edge_count=successor_count
      mandatory_fields:
      - allocation_witness_ref_set
      - lineage_partition_witness_ref_set
      - edge_proof_ref_set
      - bundle_proof_ref
      - branch_coverage_rule_ref=full_partition_or_explicit_hard_cut
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      optional_fields:
      - uncovered_branch_disposition_ref_or_null
      continuity_cut_triggers:
      - partition witness が overlap / gap を残す
      - successor branch のいずれかが mandatory edge proof を欠く
      - uncovered branch が hard_cut manifest なしで残る
      - export alias が branch 境界を越えて再利用される
  continuity_cut_conditions:
    bundle_level:
    - bundle_proof_ref が inactive / revoked / tombstoned である
    - bundle_digest_ref と edge_set / manifest_set / charter_ref の整合が壊れる
    - archive_handover_manifest_ref が欠落する
    - branch_coverage_rule_ref を満たさない
    edge_level:
    - edge_proof_ref が inactive / revoked / tombstoned である
    - parent token_handle_ref が active ではない
    - allocation_witness_ref_or_null または unique_mapping_witness_ref が invalidated される
    - predecessor_scope_ref / successor_scope_ref の relation_kind が reflected mapping event と整合しない
    export_alias_level:
    - export_local_pseudonym が successor branch / export bundle / recipient class のいずれかを越えて再利用される
    - alias parent proof_handle が inactive / revoked / quarantined になる
    - alias policy が bridge token registry の TTL / recipient cap / non-reuse baseline に反する
  schema_registry_split:
    schema_side:
    - topology_kind と explicit cardinality
    - mapping_mode と edge_set
    - allocation / unique mapping / lineage partition witness ref
    - bundle_digest_ref / bundle_proof_ref / archive_handover_manifest_ref
    - predecessor_manifest_digest_set / successor_manifest_digest_set
    - successor branch ごとの export alias binding
    registry_side:
    - suite_class / proof_profile / signer_authority_tier
    - token_handle / proof_handle の state machine と revocation semantics
    - export-local pseudonym の TTL baseline / recipient cap / non-reuse baseline
    - migration / downgrade barrier / supersession rule
  prohibited_shortcuts:
  - topology_kind を持たず、edge 数だけで merge / split を暗黙推定する。
  - merge / split を summary row 1件または single bridge token 1本で代表させる。
  - allocation_witness / lineage_partition_witness を省略し、bundle digest だけで coverage を主張する。
  - predecessor manifest を successor manifest に retroactive に吸収したことにする。
  - edge proof と bundle proof を同じ ref 1本に潰す。
  - export-local pseudonym を branch 非依存または recipient 非依存の reusable join key にする。
  - source stable pseudonym を successor export alias として再利用する。
  residual_open_points:
  - staged n→m transition を bundle-of-bundles でどう canonical 化するか
  - allocation_witness の numeric / set-valued / probabilistic family をどこまで canonical registry 化するか
  - bundle proof と edge proof の suite revision を同時移行するときの dual-validity window をどう設計するか
bridge_token_registry_governance:
  status: provisional_fixed
  statement: bridge_token_registry_governance とは、bridge token の signature suite・proof profile・revocation handle を raw algorithm 名の羅列ではなく lawful continuity の用途別 assurance class として registry 化し、internal continuity、transition bundle、external audit、recipient-visible continuity、emergency bypass の各文脈で必要最小の cryptographic / governance binding を強制する規則である。
  core_claims:
  - signature suite は単独署名方式ではなく、seal / notarization / derived proof の三層構成、signer authority tier、key custody、recipient binding、downgrade barrier を束ねる registry cell として扱う。
  - proof profile は recipient class 一般ではなく use context ごとに固定し、同じ recipient でも transition bundle と emergency bypass では別 profile を要求しうる。
  - revocation handle は base token の lawful existence を管理する token_handle と、derived proof / export-local pseudonym / bundle edge proof の局所無効化を管理する proof_handle を分ける。
  - supersession は monotone strengthening または reveal narrowing の場合だけ許し、predecessor/successor commitment・lawful purpose・accountability lineage が変わる場合は新規 token 発行または tombstone を要求する。
  - tombstone は hard cut や key compromise 後の ambiguity のように continuity を不可逆に閉じる negative continuity record であり、単なる expiry や superseded と同一視しない。
  signature_suite_registry:
    statement: canonical registry は suite_id ごとに cryptographic layer と governance constraint を一体で束縛し、tool は suite_id を参照して適法性を判断する。
    canonical_fields:
    - suite_id
    - suite_class
    - seal_class
    - notarization_class
    - derived_proof_class
    - signer_authority_tier
    - key_custody_class
    - recipient_binding_mode
    - reveal_cap_class
    - allowed_contexts
    - prohibited_contexts
    - downgrade_barrier
    - migration_policy_ref
    suite_classes:
      internal_attested_v1:
        statement: same canonical scope 内の internal continuity verification 用。seal と append-only notarization を mandatory とし、derived proof は既定では optional とする。
        mandatory_layers:
        - hsm_scope_attested_seal
        - append_only_internal_notary
        allowed_contexts:
        - internal_continuity
        prohibited_contexts:
        - recipient_visible_continuity
      transition_anchor_v1:
        statement: linear rebind または transition bundle の authoritative continuity anchor 用。central もしくは同等 authority の seal/notarization と predecessor-successor commitment を mandatory とする。
        mandatory_layers:
        - hsm_central_attested_seal
        - append_only_transition_notary
        - bundle_edge_commitment_or_null
        required_bindings:
        - transition_charter_ref
        - predecessor_successor_commitment
        - allocation_or_unique_mapping_ref
        allowed_contexts:
        - internal_continuity
        - transition_bundle
        prohibited_contexts:
        - recipient_visible_continuity_without_derived_proof
      external_audit_v1:
        statement: external audit / external digest continuity 用。seal・notarization・auditor-bound derived proof をすべて mandatory とする。
        mandatory_layers:
        - hsm_central_attested_seal
        - append_only_external_audit_notary
        - auditor_bound_continuity_proof
        required_bindings:
        - transition_or_authorization_charter_ref
        - archive_manifest_digest_ref_or_null
        - duplicate_digest_ref_or_null
        allowed_contexts:
        - external_audit
        prohibited_contexts:
        - public_human_readable_export_without_export_alias
      recipient_export_v1:
        statement: recipient-visible continuity 用。recipient-bound export-local pseudonym と short TTL の derived proof を mandatory とする。
        mandatory_layers:
        - hsm_central_or_domain_attested_seal
        - append_only_export_notary
        - recipient_alias_continuity_proof
        required_bindings:
        - export_bundle_id
        - recipient_class
        - lawful_purpose_ref
        - retention_bucket
        allowed_contexts:
        - recipient_visible_continuity
        prohibited_contexts:
        - multi_recipient_reuse
        - reusable_join_key_usage
      emergency_bypass_v1:
        statement: emergency bypass 用。provisional status、bounded reveal、post-confirm due を含む derived proof を mandatory とする。
        mandatory_layers:
        - dual_control_or_exception_attested_seal
        - append_only_emergency_notary
        - provisional_bounded_reveal_proof
        required_bindings:
        - exception_lane_ref
        - post_confirm_due
        - post_confirm_owner
        - audience_cap=1_or_stricter
        allowed_contexts:
        - emergency_bypass
        prohibited_contexts:
        - final_evidence_before_post_confirm
        - public_explanation_before_post_confirm
    general_rules:
    - tool は raw algorithm 名だけを見て suite admissibility を判定してはならず、suite_class と context coverage を同時に確認する。
    - suite revision は downgrade barrier を持ち、lower assurance suite への silent fallback を禁止する。
    - algorithm agility は migration_policy_ref で扱い、suite_id を変えずに裏側実装だけ差し替えたことにしてはならない。
  proof_profile_matrix:
    internal_continuity:
      mandatory_suite_classes:
      - internal_attested_v1
      - transition_anchor_v1
      mandatory_proof_class: none_or_same_scope_attestation
      mandatory_bindings:
      - lawful_purpose_ref
      - authorization_basis_ref
      - issuance_notary_ref
      revocation_cut_events:
      - token_handle_revoked
      - lawful_purpose_lost
    transition_bundle:
      mandatory_suite_classes:
      - transition_anchor_v1
      mandatory_proof_class: bundle_edge_commitment
      mandatory_bindings:
      - transition_charter_ref
      - predecessor_successor_mapping_ref_or_bundle_digest
      - allocation_witness_ref_or_unique_mapping_ref
      - archive_handover_manifest_ref
      revocation_cut_events:
      - transition_charter_revoked
      - allocation_witness_invalidated
      - hard_cut_declared
    external_audit:
      mandatory_suite_classes:
      - external_audit_v1
      mandatory_proof_class: auditor_bound_continuity_proof
      mandatory_bindings:
      - charter_ref
      - archive_manifest_digest_ref_or_null
      - duplicate_digest_ref_or_null
      - recipient_class=external_auditor
      revocation_cut_events:
      - audit_authority_retracted
      - token_handle_quarantined
      - manifest_lineage_broken
    recipient_visible_continuity:
      mandatory_suite_classes:
      - recipient_export_v1
      mandatory_proof_class: recipient_alias_continuity_proof
      mandatory_bindings:
      - export_local_pseudonym_ref
      - export_bundle_id
      - recipient_class
      - effective_ttl
      - non_reuse_clause
      revocation_cut_events:
      - recipient_scope_violation
      - bundle_deviation
      - post_confirm_failure
      - reopen_closed
    emergency_bypass:
      mandatory_suite_classes:
      - emergency_bypass_v1
      mandatory_proof_class: provisional_bounded_reveal_proof
      mandatory_bindings:
      - exception_lane_ref
      - post_confirm_due
      - post_confirm_owner
      - audience_cap
      - provisional_marker
      revocation_cut_events:
      - exception_lane_closed
      - post_confirm_timeout
      - clear_identity_scope_excess
      - authority_denial
  revocation_handle_governance:
    handle_classes:
      token_handle:
        statement: base token の issuance・seal・notary・supersession・tombstone を追跡する正本 handle。bridge token 自体の lawful existence を管理する。
      proof_handle:
        statement: derived proof、export-local pseudonym、bundle edge proof の局所有効性を追跡する従属 handle。recipient / bundle / purpose ごとの revoke を表現する。
    lifecycle_states:
      active: 現在の文脈で continuity witness として使用可能。
      superseded: より強いまたはより狭い successor handle が発行されたため、新規用途には使えないが lineage 参照は残る。
      revoked: lawful basis または cryptographic basis が失効し、当該 handle を continuity witness として使えない。
      quarantined: compromise / anomaly / unresolved dispute のため外部利用と authoritative confirm を一時停止した状態。
      expired: validity window または TTL を超過し、自動的に失効した状態。
      tombstoned: hard cut または irrecoverable ambiguity により continuity chain を不可逆に閉じた状態。
    revocation_reasons:
    - key_compromise_or_signature_suite_failure
    - lawful_purpose_or_authorization_loss
    - recipient_scope_or_reveal_cap_violation
    - transition_bundle_mapping_invalidated
    - transition_charter_or_authority_retracted
    - archive_manifest_or_reopen_link_break
    - hard_cut_transition
    propagation_rules:
    - token_handle が revoked または tombstoned になったときは、従属する proof_handle をすべて invalid にする。
    - proof_handle の recipient misuse は、base token の lawful basis が保たれている限り proof_handle 局所 revoke として閉じられる。
    - token_handle が superseded された後は old handle から新しい proof_handle を発行してはならない。
    - quarantined state は internal forensic review を除き external continuity claim と transition bundle confirm を停止する。
  supersession_and_tombstone_rules:
    supersession_allowed_when:
    - derived proof が recipient class または reveal cap を狭めるだけである
    - TTL が短縮されるだけである
    - suite class が強化されるが predecessor/successor commitment・lawful purpose・accountability lineage・charter linkage は不変である
    - transition bundle に追加 corroboration ref を足すだけで branch allocation 自体は変わらない
    supersession_forbidden_when:
    - predecessor/successor commitment が変わる
    - lawful purpose が変わる
    - accountability lineage が変わる
    - linear rebind と event-bundle rebind の mode を入れ替える
    - tenant hard cut または allocation rewrite が必要である
    tombstone_mandatory_when:
    - hard_cut transition が ratified かつ reflected された
    - key compromise または seal ambiguity により trustworthy continuity が回復不能になった
    - branch-critical token を支える central transition charter が revoke された
    - archive handover manifest または allocation witness が invalidated され、same-frame lawful repair が存在しない
    - derived proof または export-local pseudonym の unlawful cross-recipient reuse が起き、narrow reissue で回復できない
    non_implications:
    - superseded は不正発行を意味しない。
    - expired は tombstone の代用ではない。
    - proof_handle revoke だけでは base token の lineage を自動否定しない。
  connection_policy:
    with_stable_pseudonym_continuity:
    - recipient_visible_continuity では export-local pseudonym と proof_handle を同時に要求し、source stable pseudonym を recipient-visible field に出さない。
    - same canonical scope 内の internal continuity では derived proof を optional にできるが、suite downgrade は認めない。
    with_tenant_merge_split:
    - linear rebind では transition_anchor_v1 以上を要求し、event-bundle rebind では edge または bundle digest ごとの proof_handle を mandatory にする。
    - single bridge token 1本で n→1 merge または 1→n split 全体 continuity を代表させない。
    with_audit_witness_packet:
    - external_audit_v1 と emergency_bypass_v1 は packet 上の required witness と矛盾してはならず、packet digest 単体を suite validity の代わりに使わない。
    with_duplicate_discard_digest_and_archive:
    - external continuity に duplicate_discard_digest または archive manifest digest を使うときは、対応する proof_handle と token_handle の live state を同時に確認する。
  prohibited_shortcuts:
  - 署名が通ることだけを理由に suite admissibility を満たしたとみなす。
  - proof profile を recipient class から暗黙推定し、明示 profile_ref を省略する。
  - base token と derived proof の revoke を単一フラグに潰して局所 revoke を表現しない。
  - superseded token を recipient-visible export や branch-critical continuity の current witness として再利用する。
  - tombstone を出さずに hard cut を単なる expiry や revoke として隠す。
  residual_open_points:
  - post-quantum migration を含む suite revision の dual-validity window と anti-downgrade 監査をどこまで registry 化するか
  - transition bundle の predecessor/successor cardinality と export-local pseudonym 再発行規則をどこまで schema 側へ寄せるか
central_delegation_charter_taxonomy_governance:
  status: provisional_fixed
  statement: central_delegation_charter_taxonomy_governance とは、central delegation charter に含める jurisdiction family・authority family・override / escalation family・non-delegable boundary を canonical taxonomy として固定し、local / central / emergency / external-audit の各 context で、どの authority が lawful に current decision を拘束できるかを比較可能にする規則である。
  canonical_taxonomy:
    jurisdiction_family:
      same_tenant_same_jurisdiction:
        statement: 同一 tenant・同一 jurisdiction family の内部運用。domain-local charter が既定であり、central lane は例外または protected facet 用に限定される。
      same_tenant_cross_jurisdiction:
        statement: 同一 tenant 内だが jurisdiction family をまたぐ運用。domain authority だけでは閉じず、central template または central delegation を既定にする。
      cross_tenant_same_jurisdiction:
        statement: jurisdiction family は同一だが tenant をまたぐ運用。domain-local convenience を current basis にせず、shared charter と bridge / archive continuity を要求する。
      cross_tenant_cross_jurisdiction:
        statement: tenant と jurisdiction family の両方をまたぐ運用。central lane と external-audit readiness を既定にし、domain delegation の自動継承を禁止する。
      sovereign_or_external_audit_overlay:
        statement: regulator・court・external audit など、通常の tenant / domain 境界を上書きする監査・制度 overlay。local current より lawful disclosure 条件を優先する。
    authority_family:
      domain_execution_authority:
        statement: domain-local operation を execute / hold できる一次 authority。
      domain_review_authority:
        statement: domain-local review / approval を行う二次 authority。single-domain bounded decision に限って final approver になりうる。
      domain_protected_facet_authority:
        statement: protected facet の domain interpretation を担う authority。cross-boundary final interpretation の sole owner にはならない。
      central_policy_authority:
        statement: cross-tenant・cross-jurisdiction・external disclosure・global default charter を束ねる central authority。
      central_exception_authority:
        statement: exception lane・non-delegable escalation・post-confirm disposition を束ねる central authority。
      emergency_containment_authority:
        statement: life-safety / active compromise で provisional containment を許す authority。steady-state current の常設代替にはしない。
    override_escalation_family:
      monotone_scope_narrowing_override:
        statement: reveal scope / action family / recipient class を厳しくする override。domain lane でも許容しうる。
      centralization_override:
        statement: domain lane から central lane へ authority を引き上げる override。cross-boundary または protected facet で使う。
      emergency_containment_override:
        statement: immediate containment のため一時的に emergency lane を開く override。post-confirm を必須とする。
      external_audit_supervised_override:
        statement: external audit response のため supervised reveal / challenge を開く override。external auditor を authority 化しない。
      non_delegable_escalation:
        statement: delegation 不能な action family を central_exception_authority へ送る escalation。
  context_matrix:
    local_context:
      mandatory_authority_family:
      - domain_execution_authority
      conditional_authority_family:
      - domain_review_authority
      - domain_protected_facet_authority
      forbidden_authority_family:
      - emergency_containment_authority as steady-state final approver
      - external auditor or observer credential holder as authority family
      mandatory_bindings:
      - single_domain または bounded internal purpose
      - approved local approval route
      - charter scope が same_tenant_same_jurisdiction を覆うこと
    central_context:
      mandatory_authority_family:
      - central_policy_authority
      conditional_authority_family:
      - domain_execution_authority as evidence supplier
      - domain_protected_facet_authority as scoped interpreter
      forbidden_authority_family:
      - external auditor as final approver
      - emergency_containment_authority as normal policy owner
      mandatory_bindings:
      - central template または central delegation charter
      - cross-boundary lawful purpose
      - required attestation packet and challenge path
    emergency_context:
      mandatory_authority_family:
      - emergency_containment_authority
      conditional_authority_family:
      - central_exception_authority for post-confirm or protected facet cases
      - central_policy_authority for continuity-affecting action
      forbidden_authority_family:
      - domain_review_authority as sole finalizer after bypass
      - external auditor as bypass approver
      mandatory_bindings:
      - life-safety or active compromise trigger
      - append-only precommit
      - post-confirm owner / SLA
      - bounded reveal scope
    external_audit_context:
      mandatory_authority_family:
      - central_policy_authority
      conditional_authority_family:
      - domain_review_authority as supervised explainer
      - central_exception_authority for protected facet or exception lane
      forbidden_authority_family:
      - external auditor as charter issuer
      - emergency_containment_authority as routine disclosure owner
      mandatory_bindings:
      - external audit lawful purpose
      - attestation packet
      - observer credential
      - supervised approval route
      - archive / bridge / duplicate digest continuity as needed
  non_delegable_boundaries:
  - protected facet の final interpretation を domain lane だけで final commit してはならない
  - cross-tenant または cross-jurisdiction で bounded_actor_slice を超える reveal は central lane without explicit charter を禁止する
  - central / emergency / external-audit charter の issuance・ratification・revocation を domain delegation へ落としてはならない
  - bridge token の external continuity revoke / reissue と archive manifest continuity basis の final approval を local reviewer へ委譲してはならない
  - emergency bypass 後の public explanation・penalty finalization・irreversible resource lock は post-confirm 前に delegated auto へ送ってはならない
  charter_registry_schema:
    required_fields:
    - charter_id
    - charter_kind
    - tenant_relation_scope
    - jurisdiction_family_scope
    - authority_family_scope
    - override_family_set
    - escalation_family_set
    - non_delegable_action_family_set
    - allowed_context_set
    - allowed_approval_route_family_set
    - lawful_purpose_family_set
    - required_attestation_profile_set
    - required_observer_profile_set
    - post_confirm_policy_ref_or_null
    - bridge_token_policy_ref_or_null
    - archive_linkage_policy_ref_or_null
    - effective_window
    - issuer_ref
  responsibility_split:
    DecisionLedger:
    - charter taxonomy cell、chosen authority family、approval route family、lawful purpose family、non-delegable escalation result を正本記録する
    - local / central / emergency / external-audit のどの context matrix を適用したかを記録する
    GraphEngine:
    - jurisdiction family・authority family・override family の match 判定、context binding 判定、non-delegable boundary 判定を行う
    - conditional authority family が evidence supplier なのか final approver なのかを role-aware に評価する
    GraphLint:
    - external auditor の authority 化、emergency lane の常態化、charter context 不一致、non-delegable boundary の silent delegation、approval route omission を禁止する
  prohibited_shortcuts:
  - external auditor や observer credential holder を authority family へ数え上げる
  - emergency lane を steady-state current delegation の常設 route として使う
  - same_tenant_same_jurisdiction の charter を cross-tenant / cross-jurisdiction current の basis に流用する
  - non-delegable boundary に触れる action を domain_review_authority の承認だけで finalize する
  - approval route family や lawful purpose family を空のまま authority family だけで charter を妥当とみなす
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで registry 化するか
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
