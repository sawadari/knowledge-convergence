scheduler_federation_effectiveness_benchmark_governance:
  status: provisional_fixed
  statement: scheduler_federation_effectiveness_benchmark_governance とは、scorecard calibration strata、benchmark cohort、comparability caveat を束ねて federation transparency metric の比較条件を固定する規則である。
  core_claims:
  - scorecard を出しても calibration strata がなければ比較は歪む。exposure volume、recipient criticality、channel mix をそろえずに ranking してはならない。
  - benchmark cohort は convenience sample ではない。inclusion rule、exclusion rule、refresh cadence を固定しなければ benchmark basis と呼べない。
  - comparability caveat は注釈の飾りではない。window mismatch、policy change、telemetry sparsity を明記しなければ score difference を解釈できない。
  - cross-segment と cross-time-window comparison は同じではない。comparability の破れ方を別々に扱う必要がある。
  - confidence band があっても cohort composition drift があれば benchmark は崩れる。calibration strata と cohort refresh は対で管理しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は benchmark policy、cohort construction、comparability lint、benchmark evidence archive を分担する。
  scorecard_calibration_strata:
    required_fields:
    - strata_id
    - metric_family_ref
    - exposure_band_ref
    - recipient_criticality_band_ref
    - channel_mix_ref
    - window_type_ref
    - approved_at_or_null
    rules:
    - metric_family_ref のない artifact を scorecard calibration strata と呼んではならない。
    - exposure_band_ref のない strata を load-normalized comparison basis とみなしてはならない。
    - channel_mix_ref のない strata を cross-channel calibrated benchmark と称してはならない。
  benchmark_cohort:
    required_fields:
    - cohort_id
    - inclusion_rule_ref
    - exclusion_rule_ref
    - refresh_cadence_ref
    - sample_floor_ref
    - defined_at_or_null
    rules:
    - inclusion_rule_ref のない set を benchmark cohort と呼んではならない。
    - refresh_cadence_ref のない cohort を maintained benchmark basis とみなしてはならない。
    - sample_floor_ref のない cohort を statistically interpretable comparison set と称してはならない。
  comparability_caveat:
