      - benchmark cohort snapshot
      - strata definition bundle
      - comparability caveat ledger
      - published comparison packet
  forbidden_shortcuts:
  - uncalibrated cohort comparison をランキングとして公開する
  - sample floor 未満の cohort を benchmark と称する
  - comparability caveat を internal note のまま外部比較に使う
  residual_open_points: []
scheduler_federation_adaptive_advisory_governance:
  status: provisional_fixed
  statement: scheduler_federation_adaptive_advisory_governance とは、adaptive advisory policy、channel throttling ladder、fatigue override rule を束ねて effectiveness と fatigue を反映した federation disclosure 制御を固定する規則である。
  core_claims:
  - effectiveness score が低いのに advisory design を固定運用し続けてはならない。adaptive advisory policy がないと measurement は飾りになる。
  - channel throttling ladder がない fatigue control は抽象論で終わる。priority-preserving downgrade path を持たなければ alert flood を止められない。
  - fatigue override は unrestricted escape hatch ではない。override authority、trigger basis、post-hoc review を固定しなければ abuse が起きる。
  - channel switch と message suppression は同じではない。safety-critical recipient には reachability を保ったまま throttling しなければならない。
  - low effectiveness を recipient blame に還元してはならない。policy 側で cadence・surface・message form を調整する責任がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は adaptive rule binding、throttling projection、override misuse lint、policy-change archive を分担する。
  adaptive_advisory_policy:
    required_fields:
    - adaptive_policy_id
    - trigger_metric_ref
    - recipient_segment_ref
    - policy_variant_set_ref
    - selection_rule_ref
    - review_cadence_ref
    - effective_at_or_null
    rules:
    - trigger_metric_ref のない policy を adaptive advisory policy と呼んではならない。
    - policy_variant_set_ref のない policy を selectable advisory control とみなしてはならない。
    - selection_rule_ref のない policy を deterministic adaptive route と称してはならない。
  channel_throttling_ladder:
