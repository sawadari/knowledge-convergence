      - double-counting lint
      - silent contagion lint
      - systemic finding downgrade lint
    archive_object:
      owns:
      - finding band packet
      - aggregation bundle
      - contagion notice archive
      - portfolio freeze manifest
  forbidden_shortcuts:
  - distributed weakness を single finding ごとに分解して materiality を下げる
  - same-cause cluster を dedup せず件数だけ膨らませる
  - contagion threshold breach を partner-local issue と偽装する
  residual_open_points:
  - scheduler federation joint-review quorum / minority dissent memo / chair tie-break lane をどこまで registry 化するか
scheduler_federation_remediation_refresh_governance:
  status: provisional_fixed
  statement: scheduler_federation_remediation_refresh_governance とは、remediation closure attestation、follow-up verification cadence、opinion refresh duty を束ねて federation assurance finding の是正閉鎖と意見更新を固定する規則である。
  core_claims:
  - remediation closure は作業完了報告ではない。closure attestation、counterevidence sweep、acceptance witness、partial-closure boundary を束ねなければ finding closed と呼べない。
  - follow-up verification cadence は reminder ではない。finding band と reliance exposure に応じて再確認の周期と owner を固定する統治規則である。
  - same control family の再発や deadline miss は opinion refresh duty を発火しうる。clean opinion を inertial default にしてはならない。
  - partial closure は lawful だが、残存 scope と reliance caveat を束ねなければ misleading closure になる。
  - counterevidence や failed re-test が出たときは refresh、downgrade、withdrawal のいずれかへ進める lane が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は closure registry、verification schedule、stale-opinion lint、refresh archive を分担する。
  remediation_closure_attestation:
    required_fields:
    - closure_attestation_id
    - finding_lineage_ref
    - remediation_action_ref
    - acceptance_witness_ref
    - counterevidence_sweep_ref
    - partial_closure_boundary_ref_or_null
    - closed_at_or_null
    rules:
    - acceptance_witness_ref のない closure を remediation closure attestation と呼んではならない。
    - counterevidence_sweep_ref のない closure を evidence-safe closure とみなしてはならない。
    - partial_closure_boundary_ref_or_null が null のまま残存 scope を hidden にしてはならない。
  follow_up_verification_cadence:
    required_fields:
    - cadence_id
    - finding_band_ref
    - reliance_exposure_ref
    - verification_interval_ref
    - owner_ref
    - deadline_miss_escalation_ref
    rules:
    - verification_interval_ref のない cadence を active follow-up plan と呼んではならない。
    - deadline_miss_escalation_ref のない cadence を enforcement-bearing schedule とみなしてはならない。
  opinion_refresh_duty:
    required_fields:
    - refresh_case_id
    - trigger_class_ref
    - refresh_action_ref
    - recipient_notice_ref
    - withdrawal_or_downgrade_ref
    - closed_at_or_null
    rules:
    - trigger_class_ref のない refresh を lawful opinion change duty と呼んではならない。
    - recipient_notice_ref のない refresh outcome を reliance-safe transition とみなしてはならない。
    - withdrawal_or_downgrade_ref のない stale opinion retention を allowed action と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - closure attestation registry
      - verification cadence binding
      - refresh / downgrade / withdrawal decision
      - recipient notice decision
    GraphEngine:
      owns:
      - finding lineage closure graph
      - verification schedule projection
      - deadline miss detection
      - opinion state transition materialization
    GraphLint:
      owns:
      - false closure lint
      - missed cadence lint
      - stale opinion lint
      - hidden partial-closure lint
    archive_object:
      owns:
      - closure packet
      - verification history
      - refresh / downgrade archive
      - recipient notice archive
  forbidden_shortcuts:
  - acceptance witness なしで finding を closed 扱いにする
  - partial closure を full closure として recipient に伝える
  - re-test fail や deadline miss を opinion refresh duty なしで抱え込む
  residual_open_points:
  - scheduler federation finding materiality band / cross-partner aggregation rule / contagion notice threshold をどこまで registry 化するか
scheduler_federation_reliance_reuse_governance:
  status: provisional_fixed
  statement: scheduler_federation_reliance_reuse_governance とは、stale-reliance withdrawal、third-party reuse boundary、liability caveat passport を束ねて federation assurance artifact の再利用境界と撤回義務を固定する規則である。
  core_claims:
  - assurance artifact は無期限の公共財ではない。reuse audience、reuse purpose、validity window、refresh dependency を束ねなければ lawful reliance basis と呼べない。
  - third-party reuse は原則禁止でも全面自由でもない。passport に記載された audience / purpose / derivative allowance の範囲だけを bounded reuse とする。
  - stale reliance withdrawal は notice だけでは足りない。superseded basis、withdrawal deadline、downstream redistribution duty、archive retention を束ねなければ効かない。
  - liability caveat は免責呪文ではない。scope boundary、excluded risk、refresh dependency、recipient duty を passport に埋め込む必要がある。
  - downstream reuse で original caveat が剥がれてはならない。redistribution には caveat preservation と provenance chain が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は passport registry、reuse evaluation、caveat stripping lint、withdrawal archive を分担する。
  liability_caveat_passport:
    required_fields:
    - passport_id
    - artifact_ref
    - reuse_audience_ref
    - reuse_purpose_ref
    - validity_window_ref
    - scope_boundary_ref
    - refresh_dependency_ref
    - recipient_duty_ref
    rules:
    - reuse_audience_ref のない passport を third-party reusable artifact passport と呼んではならない。
    - validity_window_ref のない passport を time-safe reliance basis とみなしてはならない。
    - refresh_dependency_ref のない passport を update-aware reuse authorization と称してはならない。
  third_party_reuse_boundary:
    required_fields:
    - reuse_case_id
    - derivative_allowance_ref
    - redistribution_limit_ref
    - caveat_preservation_ref
    - provenance_chain_ref
    - closed_at_or_null
    rules:
    - caveat_preservation_ref のない reuse を lawful redistribution と呼んではならない。
    - provenance_chain_ref のない derivative use を audit-safe third-party reuse とみなしてはならない。
  stale_reliance_withdrawal:
    required_fields:
    - withdrawal_case_id
    - superseded_basis_ref
    - withdrawal_deadline_ref
    - downstream_notice_ref
    - redistribution_stop_ref
    - archive_retention_ref
    rules:
    - superseded_basis_ref のない withdrawal を stale-reliance withdrawal と呼んではならない。
    - downstream_notice_ref のない withdrawal を reliance-safe withdrawal とみなしてはならない。
    - redistribution_stop_ref のない withdrawal を propagation-bounded revocation と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - liability caveat passport registry
      - reuse boundary decision
      - withdrawal duty decision
      - redistribution stop decision
    GraphEngine:
      owns:
      - passport dependency graph
      - reuse audience / purpose evaluation
      - downstream propagation set materialization
      - withdrawal deadline tracking
    GraphLint:
