scheduler_federation_effectiveness_oversight_governance:
  status: provisional_fixed
  statement: scheduler_federation_effectiveness_oversight_governance とは、transparency effectiveness publication tier、recipient trust recovery indicator、oversight review cadence を束ねて、effectiveness disclosure の公開粒度・再信頼評価・監督レビュー周期を固定する規則である。
  core_claims:
  - effectiveness metric は全員に同じ粒度で出してよいわけではない。publication tier がないと internal review 用指標と public disclosure 用指標が混線する。
  - recipient trust recovery は open rate や acknowledgement だけでは測れない。baseline と recovery window を持つ indicator がなければ再信頼を語れない。
  - oversight review cadence がない federation disclosure は、challenge intake と metric restatement の運用が人依存になる。
  - publication tier は secrecy の口実ではなく disclosure discipline である。audience scope と granularity を固定しない公開は過少開示にも過剰開示にも崩れる。
  - trust recovery indicator は publication policy と切り離せない。誰に何を再通知するかは recovery threshold と review cadence の両方に依存する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は publication binding、trust recovery score、review due control、oversight archive を分担する。
  transparency_effectiveness_publication_tier:
    required_fields:
    - publication_tier_id
    - audience_scope_ref
    - disclosure_granularity_ref
    - embargo_rule_ref
    - release_authority_ref
    - effective_at_or_null
    rules:
    - audience_scope_ref のない tier を transparency effectiveness publication tier と呼んではならない。
    - disclosure_granularity_ref のない tier を audience-bounded disclosure design とみなしてはならない。
    - release_authority_ref のない publication path を accountable release lane と称してはならない。
  recipient_trust_recovery_indicator:
    required_fields:
    - trust_indicator_id
    - recipient_segment_ref
    - indicator_formula_ref
    - recovery_window_ref
    - baseline_reference_ref
    - computed_at_or_null
    rules:
    - indicator_formula_ref のない artifact を recipient trust recovery indicator と呼んではならない。
    - recovery_window_ref のない score を trend-comparable recovery evidence とみなしてはならない。
    - baseline_reference_ref のない indicator を post-incident trust delta と称してはならない。
  oversight_review_cadence:
    required_fields:
    - oversight_cadence_id
    - review_scope_ref
    - review_frequency_ref
    - challenge_intake_ref
    - restatement_trigger_ref
    - effective_at_or_null
    rules:
    - review_frequency_ref のない policy を oversight review cadence と呼んではならない。
    - challenge_intake_ref のない cadence を challenge-ready oversight lane とみなしてはならない。
    - restatement_trigger_ref のない review schedule を correction-accountable oversight と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - publication tier policy
      - trust recovery indicator definition
      - oversight review cadence policy
      - restatement trigger record
    GraphEngine:
      owns:
