scheduler_retained_core_restart_governance:
  status: provisional_fixed
  statement: scheduler_retained_core_restart_governance とは、retained-core restart canary、autonomy re-enable、rollback fence を固定する規則である。
  core_claims:
  - rebase や controlled retreat の後に retained core を再起動するときは、一括復旧ではなく canary cohort から始めなければならない。restart は再開の意思ではなく failure containment 付きの実験である。
  - autonomy re-enable は manual override の停止ではない。manual-to-auto handback、watch coverage、success window、fallback readiness を束ねた gate を通る必要がある。
  - rollback fence は rollback button 一般ではない。どの signal family、which protected surface、どの latency budget で auto rollback へ戻すかを registry 化しなければならない。
  - retained core 再起動中は throughput 最大化よりも safe observability を優先する。hidden backlog drain や silent queue reopen を canary success と誤認してはならない。
  - manual operator が残る局面では auto に戻した瞬間の責任空白を作ってはならない。handoff owner、expiry、shadow witness を持たない autonomy re-enable は無効である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は restart canary registry、re-enable gate simulation、rollback fence lint、restart evidence archive を分担する。
  restart_canary_packet:
    required_fields:
    - restart_packet_id
    - retained_core_surface_ref
    - canary_cohort_ref
    - success_window_ref
    - watch_owner_ref
    - fallback_ready_ref
    - issued_at
    rules:
    - canary_cohort_ref のない restart を broad reopen として実行してはならない。
    - success_window_ref のない restart success を first minute health だけで宣言してはならない。
    - fallback_ready_ref のない retained-core restart を reversible recovery と呼んではならない。
  autonomy_reenable_gate:
    required_bindings:
    - handback_case_id
    - manual_to_auto_scope_ref
    - watch_coverage_ref
    - shadow_witness_ref
    - gate_owner_ref
    - expiry_or_review_window_ref
    rules:
    - shadow_witness_ref のない handback を safe re-enable とみなしてはならない。
    - gate_owner_ref のない autonomy re-enable を shift change に委ねてはならない。
    - expiry_or_review_window_ref のない temporary re-enable を evergreen auto にしてはならない。
  rollback_fence:
    required_fields:
    - rollback_fence_id
    - trigger_signal_family_ref
    - protected_surface_ref
    - latency_budget_ref
    - rollback_target_mode_ref
    - fence_owner_ref
    rules:
    - trigger_signal_family_ref のない rollback fence を operator intuition で代替してはならない。
    - latency_budget_ref のない rollback を after-the-fact response にしてはならない。
    - rollback_target_mode_ref のない unsafe re-automation を gradual recovery と誤称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - restart canary registry
      - handback gate approval
      - rollback fence binding
      - temporary re-enable expiry ratification
    GraphEngine:
      owns:
      - canary cohort simulation
      - watch coverage sufficiency check
      - success-window evaluation
      - rollback latency projection
    GraphLint:
      owns:
      - cohort-free restart lint
      - ownerless handback lint
      - rollback-target-missing lint
      - shadowless re-enable lint
    archive_object:
      owns:
      - restart packet archive
      - shadow witness bundle
      - rollback event trace
      - restart audit trail
  forbidden_shortcuts:
  - retained core を canary なしで full reopen する
  - manual-to-auto handback を口頭合意だけで済ませる
  - rollback fence を operator heroics に委ねる
  - shadow witness なしで autonomy re-enable を恒常化する
  residual_open_points: []
scheduler_restart_expansion_promotion_governance:
  status: provisional_fixed
  statement: scheduler_restart_expansion_promotion_governance とは、restart cohort expansion、shadow traffic promotion、rollback rehearse を固定する規則である。
  core_claims:
  - canary success の次は binary full-open ではなく cohort expansion plan で進めるべきである。cohort は traffic family、mutation class、customer surface の順に widening し、protected surface を最後まで優先しなければならない。
  - shadow traffic promotion は read-only mirror 一般ではない。what is shadowed、何を commit せず comparison するか、差分逸脱をどの threshold で freeze するかを明示しなければならない。
  - rollback rehearse は drill であり、promotion 前に rollback path を実際に踏めることを示す必要がある。rehearseless promotion は reversible recovery ではない。
  - expansion 中は healthy cohort と risky cohort を同じ success criterion で束ねてはならない。surface class ごとに promotion ceiling と freeze trigger を分ける必要がある。
  - promotion owner が success story を優先して adverse witness を隠してはならない。negative shadow diff は reopen 速度より優先される。
  - DecisionLedger / GraphEngine / GraphLint / archive object は expansion registry、shadow diff evaluation、rollback rehearsal trace、promotion audit trail を分担する。
  expansion_cohort_plan:
    required_fields:
    - expansion_plan_id
    - cohort_sequence_ref
    - surface_priority_ref
    - promotion_ceiling_ref
    - freeze_trigger_ref
    - plan_owner_ref
    - approved_at
    rules:
    - cohort_sequence_ref のない widening を staged recovery と呼んではならない。
    - promotion_ceiling_ref のない expansion を bounded rollout と誤称してはならない。
    - freeze_trigger_ref のない cohort promotion を safe widening とみなしてはならない。
  shadow_traffic_promotion:
    required_bindings:
    - shadow_case_id
    - shadowed_surface_ref
    - non_commit_comparison_ref
    - diff_threshold_ref
    - promotion_gate_owner_ref
    - evaluation_window_ref
    rules:
    - non_commit_comparison_ref のない shadow traffic を harmless mirror とみなしてはならない。
    - diff_threshold_ref のない shadow diff を qualitative comfort で処理してはならない。
    - promotion_gate_owner_ref のない promotion を emergent growth に委ねてはならない。
  rollback_rehearsal:
    required_fields:
    - rehearsal_id
    - covered_cohort_ref
    - rollback_path_ref
    - recovery_time_objective_ref
    - evidence_owner_ref
    - rehearsed_at
    rules:
    - rollback_path_ref のない rehearsal を reversible witness として記録してはならない。
    - recovery_time_objective_ref のない rollback rehearse を pass 扱いしてはならない。
    - evidence_owner_ref のない drill result を promotion basis にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - expansion plan registry
      - promotion ceiling ratification
      - shadow promotion approval
      - rollback rehearsal acceptance
    GraphEngine:
      owns:
      - cohort widening simulation
      - shadow diff scoring
      - freeze-trigger sensitivity analysis
      - rollback time projection
    GraphLint:
      owns:
      - sequence-free expansion lint
      - thresholdless shadow diff lint
      - rehearseless promotion lint
      - ceiling-free widening lint
    archive_object:
      owns:
      - expansion plan archive
      - shadow comparison bundle
      - rollback rehearsal trace
      - promotion audit trail
  forbidden_shortcuts:
  - canary success だけで全面 rollout する
  - shadow traffic を diff threshold なしで解釈する
  - rollback rehearsal を slide deck 証明に置き換える
  - promotion ceiling なしで cohort を連鎖拡大する
  residual_open_points: []
scheduler_autonomy_confidence_freezeback_governance:
  status: provisional_fixed
  statement: scheduler_autonomy_confidence_freezeback_governance とは、autonomy confidence accrual、error-budget reopen、freeze-back trigger を固定する規則である。
  core_claims:
  - restart 後の autonomy は二値の復旧判定では足りない。confidence ledger を持ち、guarded auto がどの witness を積んで nominal auto に近づくかを累積的に扱う必要がある。
  - error budget reopen は失敗回数の素朴な上限ではない。protected surface regression、latency overshoot、manual rescue burn、rollback near-miss を含む budget として管理しなければならない。
  - freeze-back trigger は全停止ではなく confidence accumulation を巻き戻す safety gate である。risk signal が threshold を超えたときは widening を止め、必要なら prior cohort state へ戻すべきである。
  - confidence は時間と変更量で減衰する。long quiet period や major topology change の後に過去の confidence score をそのまま使ってはならない。
  - reopen gate と freeze-back gate は対称ではない。reopen 条件より freeze-back 条件を鋭敏にし、unsafe optimism を抑えなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は confidence ledger registry、error-budget accounting、freeze-back trigger evaluation、confidence archive を分担する。
  confidence_ledger:
    required_fields:
    - confidence_ledger_id
    - witness_family_ref
    - accumulation_window_ref
    - decay_rule_ref
    - nominal_target_ref
    - ledger_owner_ref
    - updated_at
    rules:
    - decay_rule_ref のない confidence を evergreen trust として扱ってはならない。
    - witness_family_ref のない score を persuasive narrative で代替してはならない。
    - nominal_target_ref のない accumulation を progress meter と誤称してはならない。
  error_budget_reopen:
    required_bindings:
    - budget_case_id
    - protected_surface_regression_ref
    - latency_overshoot_ref
    - manual_rescue_burn_ref
    - near_miss_ref
    - reopen_owner_ref
    rules:
    - manual_rescue_burn_ref を無視して budget healthy と宣言してはならない。
    - near_miss_ref のない reopen を zero-risk 回復とみなしてはならない。
    - reopen_owner_ref のない budget judgement を dashboard 自動解釈に委ねてはならない。
  freeze_back_trigger:
    required_fields:
    - freezeback_trigger_id
    - risk_signal_family_ref
    - trigger_threshold_ref
    - fallback_state_ref
    - evaluation_owner_ref
    - armed_at
    rules:
    - risk_signal_family_ref のない freeze-back を operator anxiety で発火してはならない。
    - fallback_state_ref のない freeze-back を safe retreat と呼んではならない。
    - trigger_threshold_ref のない confidence rollback を ad hoc throttle にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - confidence ledger registry
      - error-budget reopen approval
      - freeze-back trigger binding
      - nominal-target ratification
    GraphEngine:
      owns:
      - confidence score accumulation
      - decay calculation
      - error-budget burn projection
      - freeze-back trigger sensitivity analysis
    GraphLint:
      owns:
      - decay-free confidence lint
      - manual-rescue-blind budget lint
      - fallbackless freeze-back lint
      - targetless accumulation lint
    archive_object:
      owns:
      - confidence ledger snapshots
      - error-budget evidence bundle
      - freeze-back trigger archive
      - confidence decay history
  forbidden_shortcuts:
  - confidence decay なしで過去成功を永続利用する
  - manual rescue burn を error budget から外す
  - freeze-back を fallback state なしで発火する
  - nominal target を定めず confidence accumulation を語る
  residual_open_points: []
scheduler_override_debt_unwind_governance:
  status: provisional_fixed
  statement: scheduler_override_debt_unwind_governance とは、manual override debt unwind、operator fatigue reset、break-glass revocation を固定する規則である。
  core_claims:
  - restart 局面で積み上がった manual override は event log で消えるものではない。override debt ledger として残し、どの debt を unwind 完了とみなすかを formalize する必要がある。
  - operator fatigue は個人根性で吸収してはならない。watch density、night carry-over、context switch load、break-glass frequency を束ねた fatigue reset packet が必要である。
  - break-glass token は emergency のために存在する。nominal return 後も revoke されない token は hidden exceptionalism を残す。
  - override debt の unwind は throughput 回復ではなく、manual-only pathway の削除、temporary exception rule の解除、watch burden の正常化を含むべきである。
  - fatigue reset と token revocation は同時に語らなければならない。operator を休ませず token だけ revoke すると contingency coverage が空洞化する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は override debt ledger、fatigue reset attestation、break-glass revocation audit、unwind completion archive を分担する。
  override_debt_ledger:
    required_fields:
    - override_debt_id
    - manual_pathway_ref
    - exception_rule_ref
    - watch_burden_ref
    - unwind_condition_ref
    - debt_owner_ref
    - recorded_at
    rules:
    - manual_pathway_ref のない override debt を abstract burden にしてはならない。
    - unwind_condition_ref のない debt を future cleanup 一般へ逃がしてはならない。
    - debt_owner_ref のない override debt を collective memory に委ねてはならない。
  operator_fatigue_reset:
    required_bindings:
    - fatigue_reset_id
    - watch_density_delta_ref
    - night_carryover_ref
    - context_switch_load_ref
    - recovery_window_ref
    - reset_owner_ref
    rules:
    - recovery_window_ref のない fatigue reset を good intention で代替してはならない。
    - watch_density_delta_ref を測らずに operator normalized と宣言してはならない。
    - reset_owner_ref のない fatigue reset を self-care に委ねてはならない。
  break_glass_revocation:
    required_fields:
    - revocation_case_id
    - token_scope_ref
    - revocation_trigger_ref
    - fallback_coverage_ref
    - revocation_owner_ref
    - revoked_at
    rules:
    - fallback_coverage_ref のない token revoke を safe closure とみなしてはならない。
    - revocation_trigger_ref のない token 存続を routine convenience にしてはならない。
    - token_scope_ref のない revoke を partial cleanup と誤称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - override debt ledger registry
      - fatigue reset approval
      - break-glass revocation binding
      - unwind completion ratification
    GraphEngine:
      owns:
      - manual pathway dependency map
      - watch burden decay calculation
      - fatigue recovery sufficiency check
      - fallback coverage check for token revoke
    GraphLint:
      owns:
      - ownerless override debt lint
      - windowless fatigue reset lint
      - coverage-free revoke lint
      - throughput-only unwind lint
    archive_object:
      owns:
      - override debt snapshots
      - fatigue reset evidence pack
      - token revocation audit trail
      - unwind completion archive
  forbidden_shortcuts:
  - override debt を event log 消失で解消済みとみなす
  - operator fatigue を self-care だけで処理する
  - fallback coverage なしで break-glass token を revoke する
  - throughput 回復だけで unwind 完了とみなす
  residual_open_points: []
scheduler_capacity_reaccrual_reintegration_governance:
  status: provisional_fixed
  statement: scheduler_capacity_reaccrual_reintegration_governance とは、capacity reaccrual、reserve refill、portfolio reintegration を固定する規則である。
  core_claims:
  - incident 後の nominal return は単一 service の復旧ではない。capacity reaccrual plan を持ち、どの worker family、queue lane、vendor dependency をどの順序で戻すかを束縛しなければならない。
  - reserve refill は spare 人員や spare token の再配置一般ではない。consumed reserve の origin、refill horizon、protected surface priority を示す packet が必要である。
  - portfolio reintegration は local recovery の自己申告で開いてはならない。donor-safe condition、mutual-aid unwind、cross-portfolio spillback risk を確認してから戻す必要がある。
  - capacity を戻す局面でも throughput を過大評価してはならない。latent debt、operator recovery、dependency lag を無視した reintegration は false normalcy を生む。
  - reserve refill が未完了のまま nominal portfolio へ戻すと、次の異常で即座に stop-rule へ戻りやすい。restored capacity と restored resilience を区別しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は capacity plan registry、reserve refill audit、portfolio reintegration simulation、resilience archive を分担する。
  capacity_reaccrual_plan:
    required_fields:
    - capacity_plan_id
    - worker_family_restore_ref
    - queue_lane_restore_ref
    - dependency_restore_ref
    - sequencing_rule_ref
    - plan_owner_ref
    - approved_at
    rules:
    - sequencing_rule_ref のない capacity return を orderly recovery と呼んではならない。
    - dependency_restore_ref のない worker return を productive recovery と誤称してはならない。
    - plan_owner_ref のない reaccrual を natural rebound に委ねてはならない。
  reserve_refill_packet:
    required_bindings:
    - refill_packet_id
    - consumed_reserve_origin_ref
    - refill_horizon_ref
    - protected_surface_priority_ref
    - refill_owner_ref
    - completion_witness_ref
    rules:
    - consumed_reserve_origin_ref のない refill を accounting fiction にしてはならない。
    - completion_witness_ref のない reserve refill を resilience recovered とみなしてはならない。
    - refill_horizon_ref のない refill promise を future hope に逃がしてはならない。
  portfolio_reintegration_gate:
    required_fields:
    - reintegration_gate_id
    - donor_safe_condition_ref
    - mutual_aid_unwind_ref
    - spillback_risk_ref
    - gate_owner_ref
    - opened_at
    rules:
    - donor_safe_condition_ref のない reintegration を local convenience で進めてはならない。
    - spillback_risk_ref のない return を portfolio-safe とみなしてはならない。
    - mutual_aid_unwind_ref のない reintegration を clean rejoin と誤称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - capacity reaccrual registry
      - reserve refill ratification
      - portfolio reintegration approval
      - completion witness binding
    GraphEngine:
      owns:
      - restore sequencing simulation
      - reserve refill sufficiency check
      - spillback risk projection
      - donor-safe condition evaluation
    GraphLint:
      owns:
      - sequence-free reaccrual lint
      - witness-free refill lint
      - donor-blind reintegration lint
      - false-normalcy lint
    archive_object:
      owns:
      - capacity plan archive
      - reserve refill packet
      - reintegration evidence bundle
      - resilience recovery archive
  forbidden_shortcuts:
  - capacity を順序なしで一括復帰させる
  - reserve refill を future hope のまま nominal return へ進める
  - donor-safe 条件なしで portfolio reintegration を開く
  - throughput 回復だけで resilience recovered とみなす
  residual_open_points: []
scheduler_service_restoration_closure_governance:
  status: provisional_fixed
  statement: scheduler_service_restoration_closure_governance とは、service restoration attestation、external recommit lane、status-page closure を固定する規則である。
  core_claims:
  - service restoration は internal healthy 宣言では足りない。restoration attestation packet を持ち、protected surface continuity、error-budget posture、reserve refill 状態、residual risk を外部説明可能にしなければならない。
  - external recommit lane は marketing restart ではない。どの SLA / notice / commitment surface を再開できるか、どの residual degradation を残したままかを bounded に束縛する formal lane である。
  - status-page closure は情報発信停止ではなく、incident timeline、restoration basis、remaining watch mode、next review window を閉じる closure packet である。
  - public closure は private optimism より厳格でなければならない。internal convenience のために residual risk を silent にしてはならない。
  - recommit lane と closure packet は切り離してはならない。再約束だけして closure evidence がないと、次回 incident で説明責任が連鎖破綻する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は restoration attestation registry、recommit scope check、status-page closure validation、external audit trail を分担する。
  restoration_attestation_packet:
    required_fields:
    - restoration_packet_id
    - protected_surface_continuity_ref
    - error_budget_posture_ref
    - reserve_refill_status_ref
    - residual_risk_ref
    - attestation_owner_ref
    - issued_at
    rules:
    - residual_risk_ref のない restoration attestation を full normal と表現してはならない。
    - reserve_refill_status_ref のない attestation を resilience recovered と誤称してはならない。
    - attestation_owner_ref のない restoration packet を public statement basis にしてはならない。
  external_recommit_lane:
    required_bindings:
    - recommit_case_id
    - reopened_commitment_surface_ref
    - residual_degradation_ref
    - notice_scope_ref
    - lane_owner_ref
    - effective_window_ref
    rules:
    - residual_degradation_ref を空欄のまま recommit を complete recovery と表現してはならない。
    - notice_scope_ref のない recommit を lawful external lane と扱ってはならない。
    - lane_owner_ref のない SLA reopen を sales optimism に委ねてはならない。
  status_page_closure_packet:
