  statement: scheduler_federation_transparency_accessibility_governance とは、transparency accessibility profile、multilingual equivalence pack、inclusive advisory rendering を束ねて federation transparency の到達可能性と意味同値性を固定する規則である。
  core_claims:
  - transparency は公開しただけでは成立しない。audience need class と modality set を固定しなければ accessibility-complete disclosure と呼べない。
  - multilingual disclosure は単純翻訳ではない。translation basis、equivalence review、locale version set を束ねなければ assurance meaning の同値性を保てない。
  - inclusive advisory rendering は UI 装飾ではない。assistive markup、reading level、fallback human support がなければ advisory action を実行できない受領者が残る。
  - locale ごとの content drift は badge drift と同じくらい危険である。source report と locale pack は equivalence lineage で結ばれていなければならない。
  - accessibility profile は one-size-fits-all ではない。critical recipient と general public で必要な modality と reading level は異なる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は accessibility profile registry、locale equivalence projection、rendering lint、assistive archive を分担する。
  transparency_accessibility_profile:
    required_fields:
    - profile_id
    - audience_need_class_ref
    - modality_set_ref
    - reading_level_ref
    - locale_set_ref
    - effective_at_or_null
    rules:
    - audience_need_class_ref のない profile を transparency accessibility profile と呼んではならない。
    - modality_set_ref のない profile を reachable disclosure configuration とみなしてはならない。
    - locale_set_ref のない profile を multilingual-ready transparency plan と称してはならない。
  multilingual_equivalence_pack:
