    suspend_confirm:
    - provisional emergency suspend が起動済みで、affected reliance が既に停止され、required confirmer への lawful path が残っているとき。
    - suspend の継続は release ではなく confirm / revoke / supersede / explicit hold-confirm のいずれかへ接続されるとき。
