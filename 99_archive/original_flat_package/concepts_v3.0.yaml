  - minimum disclosure pack なしで fast lane を発火する
  - retrospective packet なしで incident closure を宣言する
  residual_open_points: []
scheduler_federation_public_benchmark_context_governance:
  status: provisional_fixed
  statement: scheduler_federation_public_benchmark_context_governance とは、public benchmark caveat panel、partner-specific variance note、reviewer dissent archive を束ねて、public benchmark の誤読防止と disagreement 可視化を固定する規則である。
  core_claims:
  - public benchmark は数値だけでは危険である。caveat panel がなければ comparability limit が消える。
  - partner-specific variance note がない benchmark は、normalization residual を隠した見かけの公平性になる。
  - reviewer dissent archive がない oversight は、意見不一致をなかったことにして false consensus を作る。
  - public benchmark context は脚注ではなく主構成要素である。interpretation note は display location と一体で固定する必要がある。
  - variance note と dissent archive があることで、再利用者は score ではなく判断条件も追跡できる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は context policy、variance projection、dissent visibility lint、public context archive を分担する。
