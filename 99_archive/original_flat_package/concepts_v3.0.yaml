scheduler_doctrine_amendment_variance_governance:
  status: provisional_fixed
  statement: scheduler_doctrine_amendment_variance_governance とは、mid-cycle doctrine amendment petition、cross-year variance corridor、interim ratification を束ねて doctrine change の入口と暫定効力を固定する規則である。
  core_claims:
  - doctrine は silent edit してはならない。変更は amendment petition として trigger、affected invariants、impact scope を束ねて提出しなければならない。
  - variance corridor は shadow doctrine ではない。baseline doctrine からの逸脱を bounded な期間と範囲でのみ許す temporary lane である。
  - interim ratification は便利な抜け道ではなく、full ratification までの provisional effect を期限付きで与える機構である。expiry gate と full ratification route を必ず伴う必要がある。
  - petition と variance は接続される。petition が doctrine change へ進むのか、temporary variance で吸収するのかを分けずに運用すると doctrine lineage が濁る。
  - cross-year variance には return-to-baseline か formal amendment のどちらかを出口として束ねる必要がある。出口のない variance は恒久 drift である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は amendment registry、variance burden evaluation、provisional-effect lint、change evidence archive を分担する。
  doctrine_amendment_petition:
    required_fields:
    - petition_id
    - doctrine_ref
    - amendment_trigger_ref
    - affected_invariant_ref
    - impact_scope_ref
    - proposer_ref
    - submitted_at_or_null
    rules:
    - doctrine_ref のない petition を doctrine amendment petition と呼んではならない。
    - affected_invariant_ref のない petition を substantive doctrine change とみなしてはならない。
    - impact_scope_ref のない petition を ratification queue に流してはならない。
  cross_year_variance_corridor:
    required_bindings:
    - variance_id
    - baseline_doctrine_ref
    - variance_scope_ref
    - corridor_limit_ref
    - expiry_or_review_ref
    - owner_ref
    - admitted_at_or_null
    rules:
    - baseline_doctrine_ref のない variance を doctrine variance と呼んではならない。
    - corridor_limit_ref のない variance を bounded variance corridor とみなしてはならない。
    - expiry_or_review_ref のない variance を cross-year admissible にしてはならない。
  interim_ratification_record:
    required_fields:
    - interim_ratification_id
    - petition_ref
    - provisional_effect_ref
    - expiry_gate_ref
    - full_ratification_route_ref
    - ratifier_ref
    - ratified_at_or_null
    rules:
    - petition_ref のない interim ratification を lawful provisional effect と呼んではならない。
    - expiry_gate_ref のない provisional effect を bounded interim ratification とみなしてはならない。
    - full_ratification_route_ref のない interim record を doctrine bridge にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - amendment petition registry
      - variance corridor admission
      - interim ratification binding
      - variance exit / amendment escalation linkage
    GraphEngine:
      owns:
      - amendment impact projection
      - variance burden evaluation
      - expiry / review breach detection
      - provisional effect overstay risk scoring
    GraphLint:
      owns:
      - trigger-free amendment lint
      - limit-free variance lint
      - expiry-free interim ratification lint
      - shadow-doctrine drift lint
    archive_object:
      owns:
      - amendment petition archive
      - variance corridor evidence
      - interim ratification history
      - doctrine change audit trail
  forbidden_shortcuts:
  - affected invariant を書かずに doctrine amendment を流す
  - corridor limit のない variance を暫定措置として常態化する
  - expiry gate なしで interim ratification を出す
  - petition と variance の出口を分けずに doctrine lineage を混在させる
  residual_open_points: []
scheduler_supersession_conflict_arbitration_governance:
  status: provisional_fixed
  statement: scheduler_supersession_conflict_arbitration_governance とは、supersession conflict arbitration、parallel-charter quarantine、authoritative-head selection を束ねて競合 authority の収束規則を固定するものである。
  core_claims:
  - 同一 scope に複数の charter が authority を主張したら conflict case を開かなければならない。黙って一方を採用する運用は lineage corruption である。
  - parallel-charter quarantine は失敗ではなく保全である。競合中の charter には mutation、promotion、seal を禁止し、read-only reference と evidence capture のみを許す必要がある。
  - authoritative head は日付順では決まらない。selection basis、effective boundary、carry-forward obligation を束ねた head selection が必要である。
  - arbitration 中に active operation を止めるか限定継続するかを quarantine policy 上で明示しなければならない。authority conflict を現場判断に丸投げしてはならない。
  - head selection 後には loser charter の disposition が必要である。supersede、withdraw、split-scope coexistence のどれかを registry 上で固定する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は conflict case registry、overlap analysis、quarantine lint、arbitration archive を分担する。
  supersession_conflict_case:
    required_fields:
    - conflict_case_id
    - contested_charter_refs
    - overlap_scope_ref
    - conflict_basis_ref
    - arbiter_route_ref
    - opened_at_or_null
    rules:
    - contested_charter_refs のない case を supersession conflict と呼んではならない。
    - overlap_scope_ref のない case を authority conflict arbitration に流してはならない。
    - arbiter_route_ref のない case を lawful conflict case とみなしてはならない。
  parallel_charter_quarantine:
    required_bindings:
    - quarantine_id
    - quarantined_charter_ref
    - blocked_operations_ref
    - release_gate_ref
    - quarantine_owner_ref
    - quarantined_at_or_null
    rules:
    - quarantined_charter_ref のない quarantine を charter quarantine と呼んではならない。
    - blocked_operations_ref のない quarantine を protective quarantine とみなしてはならない。
    - release_gate_ref のない quarantine を bounded conflict containment にしてはならない。
  authoritative_head_selection:
    required_fields:
    - selection_id
    - candidate_head_refs
    - selection_basis_ref
    - effective_head_ref
    - announcement_route_ref
    - selected_at_or_null
    rules:
    - candidate_head_refs のない selection を authoritative-head selection と呼んではならない。
    - selection_basis_ref のない head appointment を lawful arbitration result とみなしてはならない。
    - effective_head_ref のない result を governing head と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - conflict case registry
      - parallel-charter quarantine binding
      - authoritative head ratification
      - loser charter disposition recording
    GraphEngine:
      owns:
      - overlap scope analysis
      - authority conflict severity scoring
      - quarantine blast-radius projection
      - head selection consistency check
    GraphLint:
      owns:
      - scope-free conflict lint
      - block-free quarantine lint
      - basis-free head selection lint
      - silent parallel-authority lint
    archive_object:
      owns:
      - conflict case archive
      - quarantine evidence bundle
      - head selection evidence
      - arbitration trail
  forbidden_shortcuts:
  - overlap scope を定義せずに conflict case を閉じる
  - blocked operations のない quarantine を protective と呼ぶ
  - selection basis なしで authoritative head を決める
  - loser charter disposition を定義せずに conflict を解消済みにする
  residual_open_points: []
scheduler_sunset_archive_reopen_governance:
  status: provisional_fixed
  statement: scheduler_sunset_archive_reopen_governance とは、sunset archive reopen、legal-hold carveout、replay scope restoration を束ねて seal 済み archive の限定再活性化規則を固定するものである。
  core_claims:
  - seal 済み archive の reopen は resurrection ではない。reopen basis、requested scope、closure return gate を持つ bounded operation として扱う必要がある。
  - legal-hold carveout は reopen の代用品ではない。seal を維持したまま retention override を与える限定 carveout と、replay を実行する reopen を分けて扱う必要がある。
  - replay scope restoration では sealed bundle 全体を無条件に解放してはならない。restored scope、replay budget、closure return gate を束ねる必要がある。
  - reopen 中の変更は current doctrine / charter head に直書きしてはならない。audit basis または remediation lane に隔離し、closure return か formal carry-forward を経て反映するべきである。
  - reopen の終了条件は明確でなければならない。restored scope の reseal、hold continuation、formal migration のどれで閉じるかを事前に固定する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reopen registry、scope restoration evaluation、hold/reseal lint、reopen evidence archive を分担する。
  archive_reopen_petition:
    required_fields:
    - reopen_petition_id
    - sealed_bundle_ref
    - reopen_basis_ref
    - requested_scope_ref
    - requester_ref
    - filed_at_or_null
    rules:
    - sealed_bundle_ref のない petition を archive reopen petition と呼んではならない。
    - reopen_basis_ref のない reopen を lawful sunset reopen とみなしてはならない。
    - requested_scope_ref のない petition を bounded reopen にしてはならない。
  legal_hold_carveout:
    required_bindings:
    - carveout_id
    - hold_basis_ref
    - excluded_segment_ref
    - retention_override_ref
    - approving_route_ref
    - activated_at_or_null
    rules:
    - hold_basis_ref のない carveout を legal-hold carveout と呼んではならない。
    - excluded_segment_ref のない carveout を bounded hold extension とみなしてはならない。
    - retention_override_ref のない carveout を lawful retention override にしてはならない。
  replay_scope_restoration:
    required_fields:
    - restoration_id
    - reopen_ref
    - restored_scope_ref
    - replay_budget_ref
    - closure_return_gate_ref
    - restored_at_or_null
    rules:
    - reopen_ref のない restoration を replay scope restoration と呼んではならない。
    - restored_scope_ref のない restoration を scoped replay とみなしてはならない。
    - closure_return_gate_ref のない restoration を bounded reopen cycle にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - archive reopen petition registry
      - legal-hold carveout admission
      - replay scope restoration binding
      - reseal / migration closure recording
    GraphEngine:
      owns:
      - reopen basis evaluation
      - restored scope blast-radius projection
      - replay budget sufficiency check
      - closure return satisfiability assessment
    GraphLint:
      owns:
      - basis-free reopen lint
      - segment-free hold carveout lint
      - return-gate-free restoration lint
      - open-ended resurrect lane lint
    archive_object:
      owns:
      - reopen petition archive
      - legal-hold carveout evidence
      - restored replay artifacts
      - reseal closure trail
  forbidden_shortcuts:
  - reopen basis なしで seal 済み bundle を解凍する
  - excluded segment を定義せずに legal-hold carveout を延長する
  - closure return gate なしで restored replay を走らせる
  - reopen 中の生成物を current head へ直書きする
  residual_open_points: []
scheduler_doctrine_migration_program_governance:
  status: provisional_fixed
  statement: scheduler_doctrine_migration_program_governance とは、doctrine migration program、staged adoption wave、rollback-safe coexistence を束ねて doctrine 移行の実施規則を固定するものである。
  core_claims:
  - migration は単一イベントではない。source doctrine、target doctrine、wave plan、success metric を持つ program として設計しなければならない。
  - staged adoption wave は rollout convenience ではなく risk partitioning である。cohort scope、activation condition、coexistence window、rollback trigger を束ねて段階適用する必要がある。
  - coexistence は無制限に許してはならない。parallel scope、incompatibility rule、rollback lane、reconciliation plan を持つ guard が必要である。
  - wave ごとに success/failure witness を残し、成功しても source doctrine の sunset timing を急がない。migration completion と source retirement は別判断である。
  - rollback-safe coexistence では data / evidence / obligations の二重記録境界を定義する必要がある。どこが dual-write、single-write、projection-only なのか不明なまま並走させてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は migration registry、wave impact simulation、coexistence lint、migration archive を分担する。
  doctrine_migration_program:
    required_fields:
    - migration_id
    - source_doctrine_ref
    - target_doctrine_ref
    - migration_wave_plan_ref
    - success_metric_ref
    - program_owner_ref
    - launched_at_or_null
    rules:
    - source_doctrine_ref のない migration を doctrine migration program と呼んではならない。
    - migration_wave_plan_ref のない program を staged migration とみなしてはならない。
    - success_metric_ref のない migration を closure 可能な program にしてはならない。
  staged_adoption_wave:
    required_bindings:
    - wave_id
    - cohort_scope_ref
    - activation_condition_ref
    - coexistence_window_ref
    - rollback_trigger_ref
    - wave_owner_ref
    - activated_at_or_null
    rules:
    - cohort_scope_ref のない wave を staged adoption wave と呼んではならない。
    - coexistence_window_ref のない wave を safe rollout segment とみなしてはならない。
    - rollback_trigger_ref のない wave を rollback-ready wave にしてはならない。
  rollback_safe_coexistence_guard:
    required_fields:
    - guard_id
    - parallel_scope_ref
    - incompatibility_rule_ref
    - rollback_lane_ref
    - reconciliation_plan_ref
    - guard_owner_ref
    - bound_at_or_null
    rules:
    - parallel_scope_ref のない guard を coexistence guard と呼んではならない。
    - incompatibility_rule_ref のない coexistence を safe coexistence とみなしてはならない。
    - rollback_lane_ref のない guard を rollback-safe と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - migration program registry
      - wave activation / rollback binding
      - coexistence guard admission
      - migration completion judgement
    GraphEngine:
      owns:
      - wave impact simulation
      - incompatibility surface detection
      - rollback trigger sensitivity analysis
      - migration success metric tracking
    GraphLint:
      owns:
      - plan-free migration lint
      - window-free wave lint
      - rollback-lane-free coexistence lint
      - unbounded dual-write lint
    archive_object:
      owns:
      - migration program archive
      - wave evidence bundle
      - coexistence guard history
      - migration completion trail
  forbidden_shortcuts:
  - wave plan なしで doctrine migration を開始する
  - coexistence window のない wave を本番適用する
  - rollback lane なしで source / target doctrine を並走させる
  - source retirement を migration completion と自動同一視する
  residual_open_points: []
scheduler_doctrine_conformance_audit_governance:
  status: provisional_fixed
  statement: scheduler_doctrine_conformance_audit_governance とは、doctrine conformance audit、drift scorecard、remediation covenant を束ねて active doctrine の遵守監督を固定する規則である。
  core_claims:
  - doctrine は ratified されただけでは守られない。active charter、variance、migration wave、manual override を横断して conformance audit を行う必要がある。
  - drift は単発違反ではなく累積傾向として測る必要がある。scorecard は violation count だけでなく trend window、severity mix、repeat offender、closure latency を持つべきである。
  - audit で見つかった drift は remediation covenant に接続しなければならない。required fix、deadline、escalation route、accountable owner を束ねずに advisory で終わらせてはならない。
  - scorecard は見栄えのための dashboard ではない。active doctrine に対する structural drift を次の amendment、migration、federation import 判断へ返す evidence surface である。
  - conformance audit では temporary variance や interim ratification を免罪符にしてはならない。許容された variance であっても corridor limit や expiry breach があれば drift として計上する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は conformance registry、drift scoring、covenant lint、remediation archive を分担する。
  doctrine_conformance_audit:
    required_fields:
    - audit_id
    - doctrine_ref
    - audit_scope_ref
    - conformance_basis_ref
    - sample_window_ref
    - auditor_ref
    - attested_at_or_null
    rules:
    - doctrine_ref のない audit を doctrine conformance audit と呼んではならない。
    - conformance_basis_ref のない audit を lawful conformance audit とみなしてはならない。
    - sample_window_ref のない audit を time-bounded audit evidence にしてはならない。
  drift_scorecard:
    required_bindings:
    - scorecard_id
    - measured_scope_ref
    - drift_metric_ref
    - threshold_basis_ref
    - trend_window_ref
    - owner_ref
    - published_at_or_null
    rules:
    - measured_scope_ref のない scorecard を drift scorecard と呼んではならない。
    - drift_metric_ref のない scorecard を conformance trend surface とみなしてはならない。
    - threshold_basis_ref のない scorecard を escalation input にしてはならない。
  remediation_covenant:
    required_fields:
    - covenant_id
    - violation_ref
    - required_fix_ref
    - deadline_ref
    - escalation_route_ref
    - accountable_owner_ref
    - bound_at_or_null
    rules:
    - violation_ref のない covenant を remediation covenant と呼んではならない。
    - required_fix_ref のない covenant を accountable remediation にしてはならない。
    - deadline_ref のない covenant を bounded covenant とみなしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - conformance audit registry
      - drift scorecard publication
      - remediation covenant binding
      - closure / escalation judgement
    GraphEngine:
      owns:
      - drift metric computation
      - trend-window analysis
      - threshold breach detection
      - remediation sufficiency projection
    GraphLint:
      owns:
      - basis-free audit lint
      - metric-free scorecard lint
      - deadline-free covenant lint
      - advisory-only remediation lint
    archive_object:
      owns:
      - conformance audit archive
      - drift scorecard history
      - remediation covenant evidence
      - closure / escalation trail
  forbidden_shortcuts:
  - conformance basis のない audit を監査完了扱いにする
  - drift metric のない scorecard を evidence surface と呼ぶ
  - deadline のない remediation covenant を発行する
  - 重大 drift を advisory memo のまま covenant へ接続しない
  residual_open_points: []
scheduler_federation_doctrine_import_governance:
  status: provisional_fixed
  statement: scheduler_federation_doctrine_import_governance とは、外部または上位組織からの doctrine import、local override boundary、reciprocity attestation を束ねて federated authority の入口を固定する規則である。
  core_claims:
  - federation import は copy & paste ではない。source authority、imported scope、trust tier、semantic baseline、refresh contract を packet として束ねなければ imported doctrine は正本にならない。
  - local override は imported doctrine の自由改変ではない。override basis、許容 deviation、expiry / review、approval route を明示した bounded deviation としてのみ許される。
  - reciprocity attestation は互換宣言では足りない。local projection と remote projection が同じ obligation surface を指していることを equivalence basis と divergence disclosure で示さなければならない。
  - import と adoption と enforcement を分ける必要がある。取り込めたことと内部運用へ昇格できたことを同一視すると shadow authority が生まれる。
  - refresh contract のない imported doctrine は stale authority になる。revocation、supersession、reissue を受け取る経路がない federation は継続 authority を名乗れない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は import registry、override admissibility evaluation、reciprocity lint、federation evidence archive を分担する。
  federation_import_packet:
    required_fields:
    - import_packet_id
    - source_doctrine_ref
    - source_authority_ref
    - imported_scope_ref
    - trust_tier_ref
    - semantic_baseline_ref
    - refresh_contract_ref
    - admitted_at_or_null
    rules:
    - source_authority_ref のない import を federated doctrine import と呼んではならない。
    - semantic_baseline_ref のない import を local reasoning に接続してはならない。
    - refresh_contract_ref のない import を continuing authority とみなしてはならない。
  local_override_boundary:
    required_bindings:
    - override_case_id
    - imported_clause_ref
    - override_basis_ref
    - allowed_deviation_ref
    - expiry_or_review_ref
    - approval_route_ref
    - bounded_at_or_null
    rules:
    - override_basis_ref のない local edit を lawful override にしてはならない。
    - allowed_deviation_ref のない override を bounded deviation と呼んではならない。
    - expiry_or_review_ref のない override を persistent federation boundary にしてはならない。
  reciprocity_attestation:
    required_fields:
    - attestation_id
    - local_projection_ref
    - remote_projection_ref
    - equivalence_basis_ref
    - divergence_disclosure_ref
    - counterpart_attestor_ref
    - attested_at_or_null
    rules:
    - local_projection_ref と remote_projection_ref が揃わない attestation を reciprocity 証明とみなしてはならない。
    - equivalence_basis_ref のない相互運用宣言を semantic reciprocity と称してはならない。
    - divergence_disclosure_ref のない federation claim を no-gap compatibility と表現してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - federation import registry
      - local override approval binding
      - reciprocity attestation ratification
      - refresh / revocation linkage
    GraphEngine:
      owns:
      - import scope projection
      - override impact evaluation
      - semantic baseline comparison
      - refresh-contract reachability check
    GraphLint:
      owns:
      - authority-free import lint
      - basis-free override lint
      - disclosure-free reciprocity lint
      - stale-import lint
    archive_object:
      owns:
      - import packet archive
      - override evidence bundle
      - reciprocity attestation evidence
      - federation authority history
  forbidden_shortcuts:
  - source authority を確認せずに外部 doctrine を imported authority 扱いにする
  - local convenience を理由に imported clause を silent override する
  - divergence disclosure なしで reciprocity attestation を発行する
  - refresh contract のない import を永続 authority として残す
  residual_open_points: []
scheduler_federation_semantic_alignment_governance:
  status: provisional_fixed
  statement: scheduler_federation_semantic_alignment_governance とは、semantic equivalence map、downgrade waiver、obligation uplift を束ねて federated doctrine の意味合わせ境界を固定する規則である。
  core_claims:
  - 同じラベルでも同じ意味とは限らない。imported term は local term との equivalence class、variance class、evidence surface を map に束ねなければ internal reasoning に流してはならない。
  - semantic equivalence map は翻訳メモではない。source clause、local clause、comparison basis、unmapped remainder を残す normative bridge である。
  - downgrade waiver は weaker import を受け入れる例外であり、risk basis、compensating control、expiry を束ねずに発行してはならない。
  - obligation uplift は stricter local adoption の出自を固定する。uplift rationale と enforcement path がなければ imported doctrine 由来なのか local hardening なのかが曖昧になる。
  - waiver と uplift は対になる。どこで義務を弱め、どこで強めたかを同じ semantic bridge 上で追えなければ reciprocity は実質的に崩れる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は semantic map registry、gap evaluation、downgrade / uplift lint、alignment evidence archive を分担する。
  semantic_equivalence_map:
    required_fields:
    - map_id
    - source_clause_ref
    - local_clause_ref_or_null
    - equivalence_class_ref
    - variance_class_ref
    - comparison_basis_ref
    - unmapped_remainder_ref_or_null
    - registered_at_or_null
    rules:
    - comparison_basis_ref のない map を semantic equivalence map と呼んではならない。
    - equivalence_class_ref のない対応付けを interoperable mapping とみなしてはならない。
    - unmapped_remainder_ref_or_null を省略したまま full equivalence を主張してはならない。
  downgrade_waiver:
    required_bindings:
    - waiver_id
    - affected_clause_ref
    - downgrade_basis_ref
    - risk_basis_ref
    - compensating_control_ref
    - expiry_or_review_ref
    - approved_at_or_null
    rules:
    - risk_basis_ref のない waiver を lawful downgrade と称してはならない。
    - compensating_control_ref のない waiver を safe downgrade とみなしてはならない。
    - expiry_or_review_ref のない waiver を bounded waiver と呼んではならない。
  obligation_uplift_record:
    required_fields:
    - uplift_id
    - source_clause_ref
    - uplifted_local_obligation_ref
    - uplift_rationale_ref
    - enforcement_path_ref
    - counterpart_notice_ref
    - bound_at_or_null
    rules:
    - uplift_rationale_ref のない stricter adoption を uplift と呼んではならない。
    - enforcement_path_ref のない uplift を operative obligation にしてはならない。
    - counterpart_notice_ref のない uplift を reciprocal alignment とみなしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - semantic equivalence registry
      - downgrade waiver approval
      - obligation uplift binding
      - counterpart notice record
    GraphEngine:
      owns:
      - clause gap analysis
      - equivalence-class projection
      - compensating-control sufficiency check
      - uplift coverage comparison
    GraphLint:
      owns:
      - basis-free mapping lint
      - control-free waiver lint
      - notice-free uplift lint
      - silent full-equivalence lint
    archive_object:
      owns:
      - semantic comparison evidence
      - waiver evidence bundle
      - uplift notice archive
      - alignment history
  forbidden_shortcuts:
  - comparison basis なしで source clause と local clause を同義扱いにする
  - compensating control なしで weaker import を受け入れる
  - counterpart notice なしで stricter uplift を reciprocal alignment と称する
  - unmapped remainder を伏せたまま full equivalence を主張する
  residual_open_points: []
scheduler_federation_precedence_arbitration_governance:
  status: provisional_fixed
  statement: scheduler_federation_precedence_arbitration_governance とは、precedence matrix、conflict arbitration lane、authoritative-head declaration を束ねて federated doctrine 衝突時の正本決定を固定する規則である。
  core_claims:
  - federated doctrine は一枚岩ではない。上位 doctrine、peer doctrine、local doctrine、temporary variance が同一 scope で衝突する場合は precedence matrix を明示しなければならない。
  - precedence は trust tier だけで決めてはならない。scope overlap、effective boundary、semantic variance、legal mandate を合わせて conflict class を決める必要がある。
  - arbitration lane は議論ログではなく binding path である。claimant、conflict evidence、temporary freeze、decision route、closure condition を束ねなければ lawful arbitration と呼べない。
  - authoritative head は自然発生しない。どの doctrine projection が current enforcement head なのかを declaration record で宣言しなければ downstream execution は split-brain になる。
  - temporary freeze は無期限回避に使ってはならない。freeze expiry と fallback head を束ねておかなければ arbitration 遅延が runtime 停滞を招く。
  - DecisionLedger / GraphEngine / GraphLint / archive object は precedence registry、conflict evaluation、split-head lint、arbitration evidence archive を分担する。
  precedence_matrix:
    required_fields:
    - matrix_id
    - competing_scope_ref
    - doctrine_class_order_ref
    - tie_break_rule_ref
    - effective_boundary_ref
    - legal_mandate_ref_or_null
    - published_at_or_null
    rules:
    - doctrine_class_order_ref のない matrix を precedence matrix と呼んではならない。
    - tie_break_rule_ref のない precedence を deterministic head selection とみなしてはならない。
    - effective_boundary_ref のない matrix を active conflict resolver にしてはならない。
  conflict_arbitration_lane:
    required_bindings:
    - arbitration_id
    - competing_projection_set_ref
    - conflict_evidence_ref
    - temporary_freeze_ref_or_null
    - decision_route_ref
    - closure_condition_ref
    - opened_at_or_null
    rules:
    - conflict_evidence_ref のない lane を arbitration と呼んではならない。
    - decision_route_ref のない escalation を lawful arbitration route とみなしてはならない。
    - closure_condition_ref のない arbitration を resolved conflict にしてはならない。
  authoritative_head_declaration:
    required_fields:
    - head_declaration_id
    - winning_projection_ref
    - covered_scope_ref
    - fallback_head_ref_or_null
    - declaration_basis_ref
    - effective_from_ref
    - declared_at_or_null
    rules:
    - winning_projection_ref のない declaration を authoritative head と呼んではならない。
    - declaration_basis_ref のない head selection を lawful resolution と称してはならない。
    - effective_from_ref のない head declaration を executable current head にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - precedence matrix registry
      - arbitration route binding
      - authoritative head declaration
      - fallback head ratification
    GraphEngine:
      owns:
      - scope-overlap detection
      - conflict class evaluation
      - tie-break simulation
      - freeze impact analysis
    GraphLint:
      owns:
      - order-free precedence lint
      - evidence-free arbitration lint
      - split-head lint
      - expiry-free freeze lint
    archive_object:
      owns:
      - precedence publication archive
      - arbitration evidence bundle
      - head declaration history
      - conflict closure trail
  forbidden_shortcuts:
  - doctrine class order を示さずに trust tier だけで勝者を決める
  - conflict evidence なしで arbitration lane を閉じる
  - head declaration なしで downstream に winning projection を暗黙配布する
  - freeze expiry なしで arbitration を保留し続ける
  residual_open_points: []
scheduler_federation_breach_quarantine_governance:
  status: provisional_fixed
  statement: scheduler_federation_breach_quarantine_governance とは、reciprocity breach quarantine、suspension gate、re-entry attestation を束ねて federated link の異常停止と再接続境界を固定する規則である。
  core_claims:
  - reciprocity breach は信頼低下の感想ではない。projection mismatch、undeclared override、stale refresh、broken notice chain などの breach class を持つ事象である。
  - quarantine は federation 全体停止とは限らない。scope、partner、evidence lane、override lane のどこを隔離するかを bounded に記録しなければ過剰停止か過少停止になる。
  - suspension gate は manual toggle ではない。breach basis、containment scope、fallback authority、resume blocker を束ねた停止決定でなければ lawful suspension と呼べない。
  - 暫定復帰は unrestricted reconnect ではない。re-entry attestation に remediation proof、parity recheck、watch period を持たせなければ breach 再発を抑えられない。
  - quarantine 中の local override や imported obligations は凍結されるものと継続されるものを分けなければならない。全部止めるか全部流すかの二択は危険である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は breach registry、containment evaluation、re-entry lint、suspension evidence archive を分担する。
  breach_quarantine_record:
    required_fields:
    - quarantine_id
    - breach_class_ref
    - affected_partner_ref
    - contained_scope_ref
    - containment_basis_ref
    - fallback_authority_ref_or_null
    - started_at_or_null
    rules:
    - breach_class_ref のない quarantine を reciprocity breach response と呼んではならない。
    - contained_scope_ref のない隔離を bounded quarantine とみなしてはならない。
    - containment_basis_ref のない隔離を lawful containment と称してはならない。
  suspension_gate:
    required_bindings:
    - suspension_id
    - triggered_quarantine_ref
    - resume_blocker_ref
    - fallback_head_ref
    - communication_route_ref
    - review_cadence_ref
    - activated_at_or_null
    rules:
    - resume_blocker_ref のない suspension を controlled suspension にしてはならない。
    - fallback_head_ref のない suspension を safe execution state とみなしてはならない。
    - communication_route_ref のない停止を counterpart-notified suspension と呼んではならない。
  reentry_attestation:
    required_fields:
    - reentry_id
    - suspended_link_ref
    - remediation_proof_ref
    - parity_recheck_ref
    - watch_period_ref
    - approving_route_ref
    - attested_at_or_null
    rules:
    - remediation_proof_ref のない復帰を lawful re-entry とみなしてはならない。
    - parity_recheck_ref のない復帰を reciprocity-restored と称してはならない。
    - watch_period_ref のない re-entry を stabilized reconnection にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - breach quarantine registry
      - suspension activation binding
      - re-entry attestation ratification
      - fallback authority continuity binding
    GraphEngine:
      owns:
      - breach-class detection
      - containment scope evaluation
      - fallback-head continuity check
      - re-entry watch-risk projection
    GraphLint:
      owns:
      - scope-free quarantine lint
      - fallback-free suspension lint
      - proof-free re-entry lint
      - silent reconnect lint
    archive_object:
      owns:
      - breach evidence archive
      - suspension communication record
      - re-entry proof bundle
      - watch-period history
  forbidden_shortcuts:
  - breach class を記録せずに federation link を止める
  - fallback authority なしで suspension を発動する
  - remediation proof なしで counterpart を再接続する
  - watch period なしで re-entry 後すぐに full trust tier へ戻す
  residual_open_points: []
scheduler_federation_provenance_relay_governance:
  status: provisional_fixed
  statement: scheduler_federation_provenance_relay_governance とは、provenance relay、evidence notarization chain、replay parity witness を束ねて federated exchange の由来保証を固定する規則である。
  core_claims:
  - federation 越しの doctrine projection は digest だけでは足りない。source lineage、transformation step、issuer authority、delivery envelope を provenance relay packet として束ねる必要がある。
  - notarization chain は電子署名の有無だけではない。どの projection がどの authority route と evidence bundle に裏打ちされているかを hop ごとに辿れなければならない。
  - replay parity witness は再現性の約束である。双方が同じ scope、same digest set、same normalization rule、same evaluation profile で replay できることを示さなければ parity を主張してはならない。
  - relay 中の local transform は invisible であってはならない。normalization、redaction、projection narrowing、format conversion は transformation step として必ず残す。
  - parity witness があっても retention tier や redaction layer が異なれば same result にはならない。parity claim には visibility profile の一致を含める必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は provenance registry、notarization reachability evaluation、parity lint、relay evidence archive を分担する。
  provenance_relay_packet:
    required_fields:
    - relay_packet_id
    - source_projection_ref
    - lineage_digest_ref
    - transformation_step_ref
    - issuer_authority_ref
    - delivery_envelope_ref
    - relayed_at_or_null
    rules:
    - lineage_digest_ref のない relay を provenance relay と呼んではならない。
    - transformation_step_ref のない relay を faithful projection transfer とみなしてはならない。
    - issuer_authority_ref のない relay を trusted issuance と称してはならない。
  evidence_notarization_chain:
    required_bindings:
    - notarization_id
    - relay_packet_ref
    - authority_route_ref
    - evidence_bundle_ref
    - hop_attestation_ref
    - tamper_check_ref
    - sealed_at_or_null
    rules:
    - authority_route_ref のない chain を notarization chain にしてはならない。
    - evidence_bundle_ref のない chain を evidence-backed relay とみなしてはならない。
    - tamper_check_ref のない chain を integrity-preserving transfer と呼んではならない。
  replay_parity_witness:
    required_fields:
    - parity_witness_id
    - shared_scope_ref
    - digest_set_ref
    - normalization_profile_ref
    - visibility_profile_ref
    - counterpart_result_digest_ref
    - witnessed_at_or_null
    rules:
    - digest_set_ref のない witness を replay parity witness と呼んではならない。
    - normalization_profile_ref のない parity claim を same-evaluation guarantee とみなしてはならない。
    - visibility_profile_ref のない parity claim を redaction-preserving parity と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - provenance relay registry
      - notarization chain ratification
      - parity witness attestation
      - relay transform disclosure binding
    GraphEngine:
      owns:
      - lineage reachability check
      - tamper-path verification
      - normalization-profile comparison
      - counterpart result parity evaluation
    GraphLint:
      owns:
      - lineage-free relay lint
      - tamper-check-free notarization lint
      - profile-free parity lint
      - hidden-transform lint
    archive_object:
      owns:
      - relay packet archive
      - notarization evidence bundle
      - parity witness history
      - delivery envelope snapshots
  forbidden_shortcuts:
  - transformation step を残さずに local reformat を relay へ混ぜ込む
  - tamper check なしで notarization chain を完了扱いにする
  - visibility profile が異なるのに replay parity を主張する
  - source lineage を伏せた relay を trusted import として採用する
  residual_open_points: []
scheduler_federation_detachment_governance:
  status: provisional_fixed
  statement: scheduler_federation_detachment_governance とは、detachment packet、residual obligation repatriation、custody transfer を束ねて federation link の lawful exit を固定する規則である。
  core_claims:
  - federation detachment は接続解除ボタンではない。終了理由、covered scope、effective stop boundary、counterpart notice、fallback doctrine を packet として束ねる必要がある。
  - residual obligation は自然消滅しない。imported obligation、local uplift、open waiver、active remediation covenant を誰が引き取るかを repatriation record で確定しなければならない。
  - custody transfer は evidence コピーではなく責任移転である。どの archive bundle をどの retention tier と replay envelope で誰へ移すかを明示しなければ lawful transfer と呼べない。
  - detachment と repatriation と custody transfer は一体で扱う。link だけ切って obligations や evidence を残すと orphan duty と orphan archive が同時に発生する。
  - counterpart notice と acceptance がない detachment は unilateral severance であり、federation closure と同義ではない。境界を分けて残す必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は detachment registry、residual-duty evaluation、custody lint、exit archive を分担する。
  detachment_packet:
    required_fields:
    - detachment_id
    - federated_link_ref
    - detachment_basis_ref
    - covered_scope_ref
    - effective_stop_boundary_ref
    - counterpart_notice_ref
    - fallback_doctrine_ref
    - sealed_at_or_null
    rules:
    - detachment_basis_ref のない detachment を lawful exit と呼んではならない。
    - effective_stop_boundary_ref のない終了を bounded detachment とみなしてはならない。
    - fallback_doctrine_ref のない detachment を continuity-preserving exit にしてはならない。
  residual_obligation_repatriation:
    required_bindings:
    - repatriation_id
    - detachment_packet_ref
    - residual_obligation_set_ref
    - receiving_authority_ref
    - closure_or_migration_ref
    - acceptance_ref
    - bound_at_or_null
    rules:
    - residual_obligation_set_ref のない repatriation を obligation handoff と呼んではならない。
    - receiving_authority_ref のない repatriation を accountable transfer とみなしてはならない。
    - acceptance_ref のない repatriation を completed handoff にしてはならない。
  custody_transfer_record:
    required_fields:
    - custody_transfer_id
    - target_archive_bundle_ref
    - retention_tier_ref
    - replay_envelope_ref
    - custody_receiver_ref
    - transfer_proof_ref
    - completed_at_or_null
    rules:
    - target_archive_bundle_ref のない transfer を custody transfer と呼んではならない。
    - replay_envelope_ref のない transfer を replay-safe archive move とみなしてはならない。
    - transfer_proof_ref のない transfer を lawful custody completion と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - detachment registry
      - residual obligation repatriation binding
      - custody transfer ratification
      - fallback doctrine continuity binding
    GraphEngine:
      owns:
      - residual duty inventory
      - receiving-authority fit evaluation
      - archive bundle transfer-plan check
      - orphan-duty / orphan-archive risk projection
    GraphLint:
      owns:
      - basis-free detachment lint
      - acceptance-free repatriation lint
      - proof-free custody transfer lint
      - orphan-exit lint
    archive_object:
      owns:
      - detachment packet archive
      - repatriation evidence bundle
      - custody transfer proof archive
      - federation exit history
  forbidden_shortcuts:
  - effective stop boundary を決めずに federation link を切断する
  - receiving authority なしで residual obligation を放流する
  - transfer proof なしで custody transfer を完了扱いにする
  - counterpart notice なしの unilateral severance を federation closure と言い換える
  residual_open_points: []
scheduler_federation_mesh_topology_governance:
  status: provisional_fixed
  statement: scheduler_federation_mesh_topology_governance とは、mesh topology、cascade override propagation、blast-radius segmentation を束ねて multi-partner federation の伝播境界を固定する規則である。
  core_claims:
  - federation mesh は単なる partner 一覧ではない。partner set、authority route、trust boundary、segment class、blast-radius cap を mesh cell として束ねなければ propagation の単位が定まらない。
  - override や breach の伝播は自由連鎖であってはならない。trigger kind、ごとの propagation basis、max hop、attenuation rule、stop condition を明示した rule がない限り cascade を lawful とみなしてはならない。
  - blast-radius segmentation はネットワーク分割ではなく統治分割である。shared scope、bridge condition、override gate、breach quarantine gate を明示しなければ containment を主張できない。
  - single partner 向けに許された local override を mesh 全体の doctrine 変更へ昇格させてはならない。partner-local deviation と federated override を区別する必要がある。
  - mesh trust boundary は symmetric とは限らない。export・import・execution・audit の各 facet ごとに許される corridor を分け、最小権限で設計しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は mesh registry、propagation reachability evaluation、containment lint、segmentation evidence archive を分担する。
  mesh_cell_registry:
    required_fields:
    - mesh_cell_id
    - partner_set_ref
    - authority_route_ref
    - trust_boundary_ref
    - segment_class_ref
    - blast_radius_cap_ref
    - active_at_or_null
    rules:
    - partner_set_ref のない mesh cell を propagation 単位として扱ってはならない。
    - trust_boundary_ref のない接続を federation mesh の lawful corridor と呼んではならない。
    - blast_radius_cap_ref のない mesh cell を containment 済みとみなしてはならない。
  cascade_propagation_rule:
    required_bindings:
    - propagation_rule_id
    - trigger_kind_ref
    - source_mesh_cell_ref
    - target_mesh_cell_ref
    - propagation_basis_ref
    - max_hop_ref
    - attenuation_rule_ref
    - stop_condition_ref
    - bound_at_or_null
    rules:
    - propagation_basis_ref のない伝播を lawful cascade にしてはならない。
    - max_hop_ref のない rule を bounded propagation と呼んではならない。
    - stop_condition_ref のない cascade を federation-wide default として流してはならない。
  blast_radius_segmentation:
    required_fields:
    - segment_id
    - contained_scope_ref
    - allowed_bridge_ref
    - override_gate_ref
    - breach_quarantine_gate_ref
    - measured_at_or_null
    rules:
    - contained_scope_ref のない segmentation を blast-radius control とみなしてはならない。
    - allowed_bridge_ref のない segment 間接続を lawful bridge と呼んではならない。
    - breach_quarantine_gate_ref のない segment を incident containment surface として扱ってはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - mesh cell registry
      - propagation rule ratification
      - segmentation gate binding
      - cross-partner override classification
    GraphEngine:
      owns:
      - mesh reachability projection
      - cascade hop evaluation
      - attenuation / stop-condition check
      - blast-radius spill simulation
    GraphLint:
      owns:
      - boundary-free mesh lint
      - basis-free propagation lint
      - stop-condition-free cascade lint
      - segment-leak lint
    archive_object:
      owns:
      - mesh topology snapshots
      - propagation witness history
      - segmentation evidence bundle
      - quarantine corridor archive
  forbidden_shortcuts:
  - single partner の local override を mesh-wide override と言い換える
  - max hop を定めずに cascade rule を federation default として流す
  - bridge 条件を空欄のまま segment 間伝播を許可する
  - breach quarantine 中の cell を silent に再接続する
  residual_open_points: []
scheduler_federation_membership_governance:
  status: provisional_fixed
  statement: scheduler_federation_membership_governance とは、membership admission、trust-tier probation、expulsion trigger を束ねて federation partner の出入り境界を固定する規則である。
  core_claims:
  - partner admission は接続許可ボタンではない。candidate partner、sponsoring authority、admitted scope、trust tier、probation window、escrow requirement を packet として束ねなければ lawful admission と呼べない。
  - trust tier は static label ではない。observation bundle、violation budget、uplift / hold 判定、review due を持つ probation を通らなければ higher tier に昇格してはならない。
  - membership expulsion は blacklist 宣言だけでは足りない。trigger family、evidence bundle、emergency lane、retained duties、archive custody を明示しなければ accountable exit にならない。
  - probation 中の partner に full propagation privilege を与えてはならない。admitted scope と route privilege は trust tier に応じて段階的に開く必要がある。
  - expulsion 後も retained obligations や archived evidence は残る。membership 終了と duty 消滅を同一視してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は admission registry、probation evaluation、expulsion lint、membership evidence archive を分担する。
  membership_admission_packet:
