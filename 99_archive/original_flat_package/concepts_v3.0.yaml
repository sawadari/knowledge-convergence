      - publication snapshot set
      - trust recovery score history
      - oversight review minute bundle
      - restatement oversight archive
  forbidden_shortcuts:
  - audience scope なしで public tier に effectiveness metric を出す
  - click/open だけで trust recovery を代表させる
  - 改善傾向を理由に oversight review cadence を停止する
  residual_open_points: []
scheduler_federation_metric_restatement_governance:
  status: provisional_fixed
  statement: scheduler_federation_metric_restatement_governance とは、metric restatement severity ladder、correction propagation SLA、recipient re-notification trigger を束ねて、誤った effectiveness disclosure の訂正強度と伝播責務を固定する規則である。
  core_claims:
  - restatement は yes/no では足りない。severity ladder がなければ表現修正、数値訂正、撤回の差が運用に落ちない。
  - correction は出したら終わりではない。propagation SLA がなければ downstream partner への到達が監督不能になる。
  - recipient re-notification trigger がない correction 運用は、既読者と未読者を区別できず trust recovery を壊す。
  - restatement severity は publication tier と連動しなければならない。public tier の correction と internal tier の correction は同じ latency では扱えない。
  - 訂正メッセージも disclosure artifact である。message template と send deadline を bound しない correction は比較不能である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は severity policy、propagation timer、re-notification routing、correction archive を分担する。
  metric_restatement_severity_ladder:
    required_fields:
    - severity_ladder_id
    - error_class_set_ref
    - severity_level_set_ref
    - decision_rule_ref
    - approver_role_ref
    - effective_at_or_null
    rules:
    - error_class_set_ref のない ladder を metric restatement severity ladder と呼んではならない。
    - severity_level_set_ref のない ladder を correction strength taxonomy とみなしてはならない。
    - decision_rule_ref のない restatement path を accountable correction policy と称してはならない。
  correction_propagation_sla:
    required_fields:
    - propagation_sla_id
    - audience_tier_ref
    - max_propagation_latency_ref
    - confirmation_rule_ref
    - escalation_rule_ref
    - effective_at_or_null
    rules:
    - max_propagation_latency_ref のない SLA を correction propagation SLA と呼んではならない。
    - confirmation_rule_ref のない SLA を delivered-correction obligation とみなしてはならない。
    - escalation_rule_ref のない delay handling を accountable propagation lane と称してはならない。
  recipient_renotification_trigger:
    required_fields:
    - renotification_trigger_id
    - severity_threshold_ref
    - impacted_recipient_scope_ref
    - message_template_ref
    - send_deadline_ref
    - armed_at_or_null
    rules:
    - severity_threshold_ref のない trigger を recipient re-notification trigger と呼んではならない。
    - impacted_recipient_scope_ref のない trigger を bounded correction recall rule とみなしてはならない。
    - send_deadline_ref のない re-notification path を time-bound correction notice と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - restatement severity policy
      - propagation SLA policy
      - re-notification threshold record
      - approver role binding
    GraphEngine:
      owns:
      - error class to severity mapping
      - correction propagation timer
      - impacted recipient routing
      - re-notification deadline projection
    GraphLint:
      owns:
      - severity-without-decision-rule lint
      - propagation-latency gap lint
      - unarmed-renotification lint
      - missing-confirmation-rule lint
    archive_object:
      owns:
      - restatement packet archive
      - propagation confirmation log
      - re-notification delivery bundle
      - correction lineage record
  forbidden_shortcuts:
  - severity ladder なしで全 correction を同一テンプレートで流す
  - confirmation rule なしで correction propagation を完了扱いにする
  - impacted recipient scope を推定のまま re-notification を省略する
  residual_open_points: []
scheduler_federation_challenge_review_governance:
  status: provisional_fixed
  statement: scheduler_federation_challenge_review_governance とは、challenge intake schema、independent reviewer quorum、escalation freeze gate を束ねて、metric dispute の受理・独立審査・一時停止境界を固定する規則である。
  core_claims:
  - challenge lane がなければ correction governance は片道運用になる。受理要件と receipt SLA が必要である。
  - independent reviewer quorum は単なる人数要件ではない。independence rule がなければ reviewer pool を増やしても self-review から抜けられない。
  - escalation freeze gate がないと争点が未解決でも public tier metric が流通し続ける。
  - challenge を無制限に受理すると運用は妨害される。admissibility rule と evidence requirement の両方が必要である。
  - freeze gate は停止のためだけではない。release resume rule がないと review が終わっても publication を再開できない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は intake binding、quorum evaluation、freeze control、review archive を分担する。
  challenge_intake_schema:
    required_fields:
    - intake_schema_id
    - admissibility_rule_ref
    - evidence_requirement_ref
    - submission_channel_ref
    - receipt_sla_ref
    - effective_at_or_null
    rules:
    - admissibility_rule_ref のない schema を challenge intake schema と呼んではならない。
    - evidence_requirement_ref のない intake を reviewable submission lane とみなしてはならない。
    - receipt_sla_ref のない submission path を accountable challenge receipt と称してはならない。
  independent_reviewer_quorum:
    required_fields:
    - quorum_policy_id
    - reviewer_pool_ref
    - independence_rule_ref
    - quorum_size_ref
    - tie_break_rule_ref
    - approved_at_or_null
    rules:
    - independence_rule_ref のない policy を independent reviewer quorum と呼んではならない。
    - quorum_size_ref のない policy を bounded review quorum とみなしてはならない。
    - tie_break_rule_ref のない quorum を deterministic review closure と称してはならない。
  escalation_freeze_gate:
    required_fields:
    - freeze_gate_id
    - freeze_trigger_ref
    - affected_publication_scope_ref
    - release_resume_rule_ref
    - override_authority_ref
    - effective_at_or_null
    rules:
    - freeze_trigger_ref のない gate を escalation freeze gate と呼んではならない。
    - affected_publication_scope_ref のない gate を bounded publication halt とみなしてはならない。
    - release_resume_rule_ref のない freeze を accountable pause path と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - challenge admissibility policy
      - reviewer independence rule
      - freeze gate policy
      - override authority binding
    GraphEngine:
      owns:
      - submission validation
      - quorum sufficiency evaluation
      - publication freeze scope projection
      - resume eligibility calculation
    GraphLint:
      owns:
