    - caveat_id
    - comparison_pair_ref
    - non_comparable_factor_ref
    - severity_ref
    - reader_notice_ref
    - attached_at_or_null
    rules:
    - non_comparable_factor_ref のない note を comparability caveat と呼んではならない。
    - severity_ref のない caveat を benchmark interpretation control とみなしてはならない。
    - reader_notice_ref のない caveat を actionable comparison warning と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - benchmark eligibility policy
      - calibration strata approval
      - comparability severity rule
      - publication guardrail
    GraphEngine:
