scheduler_stop_rule_shedding_governance:
  status: provisional_fixed
  statement: scheduler_stop_rule_shedding_governance とは、executive stop-rule、external commitment renegotiation、controlled service shedding を固定する規則である。
  core_claims:
  - reserve prebuild、mutual-aid、override、debt payback を尽くしても protected surface を守れない局面では、heroic overtime ではなく executive stop-rule を開かなければならない。停止判断は恥ではなく portfolio damage containment の統治行為である。
  - executive stop-rule は collapse forecast、law/regulatory exposure、external commitment breach forecast、uncontrolled shedding risk、mitigation exhaustion を束ねた stop packet に基づいて発火するべきである。単なる panic 宣言や口頭の全停止では足りない。
  - external commitment renegotiation は apology 一般ではない。commitment class、notice deadline、promised replacement surface、concession boundary、disclosure owner を持つ bounded disclosure lane として扱うべきである。
  - controlled service shedding は、defer、degrade、suspend、terminate の shed class を分け、protected surface と public surface を同じ粒度で切ってはならない。どこを止め、どこを守り、何を later backlog に送るかを branch 化する必要がある。
  - stop-rule が開いた後も、all-stop を既定動作にしてはならない。retained core、minimum telemetry、manual safety watch、re-entry review window を残した controlled retreat として設計しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は stop packet registry、collapse forecast simulation、shedding rule lint、renegotiation / public notice audit trail を分担する。
  executive_stop_rule:
    required_fields:
    - stop_packet_id
    - portfolio_scope_ref
    - protected_surface_bundle_ref
    - collapse_forecast_ref
    - mitigation_exhaustion_ref
    - regulatory_or_contractual_breach_ref
    - stop_owner_ref
    - executive_forum_ref
    - issued_at
    rules:
    - collapse_forecast_ref のない stop-rule を political convenience で開いてはならない。
    - mitigation_exhaustion_ref を hidden overtime で代替してはならない。
    - executive_forum_ref のない portfolio-wide halt を lawful stop として記録してはならない。
  external_commitment_renegotiation:
    required_bindings:
    - commitment_class_ref
    - notice_deadline_ref
    - disclosure_owner_ref
    - replacement_service_or_null
    - concession_boundary_ref
    - customer_or_regulator_forum_ref
    rules:
    - notice_deadline_ref を過ぎた silent failure を renegotiation 済みと扱ってはならない。
    - replacement_service_or_null が null のまま continuation promise をしてはならない。
    - concession_boundary_ref のない over-promise を現場善意で許してはならない。
  controlled_service_shedding:
    shed_classes:
    - defer_to_backlog
    - degraded_service
    - temporary_suspend
    - termination_lane
    required_fields:
    - shed_case_id
    - shed_class_ref
    - affected_service_family_ref
    - retained_core_ref
    - manual_watch_ref
    - reentry_review_window_ref
    rules:
    - retained_core_ref のない shedding を all-stop として雑に処理してはならない。
    - manual_watch_ref のない degraded service を unattended mode にしてはならない。
    - reentry_review_window_ref のない suspension を evergreen retreat にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - stop packet registry
      - commitment renegotiation approval
      - shed class binding
      - re-entry review window ratification
    GraphEngine:
      owns:
      - collapse forecast simulation
      - retained-core feasibility check
      - shed impact projection
      - notice deadline countdown
    GraphLint:
      owns:
      - forecast-free stop lint
      - silent renegotiation lint
      - retained-core-missing shed lint
      - evergreen suspension lint
    archive_object:
      owns:
      - stop packet
      - renegotiation evidence bundle
      - public/customer notice snapshot
      - controlled shedding audit trail
  forbidden_shortcuts:
  - portfolio collapse forecast を出さずに口頭で全停止する
  - 顧客や regulator への通知を後回しにして内部停止だけ先行する
  - degraded / suspend / terminate を同一クラスとして雑に扱う
  - re-entry review window なしで service shedding を継続する
  residual_open_points: []
scheduler_degraded_mode_envelope_governance:
  status: provisional_fixed
  statement: scheduler_degraded_mode_envelope_governance とは、degraded-mode operating envelope、manual override quota、automation suspension lane を固定する規則である。
  core_claims:
  - degraded mode は正常運転の軽量版ではない。protected operation floor、allowed mutation family、blocked automation family、human watch density を持つ独立運転モードとして明示しなければならない。
  - manual override は善意の隙間作業ではなく scarce override budget である。override token、scope limit、dual acknowledgement、post-use review を持たない break-glass を routine workaround にしてはならない。
  - automation suspension は scheduler 全体を一括停止するものではない。detector family、allocator family、notification family などの suspension lane を分け、どの family を止めても retained core が維持されるかを示す必要がある。
  - degraded mode では throughput 最大化よりも protected surface continuity を優先する。temporary convenience のために hidden retry storm、silent queue bypass、unbounded manual mutation を許してはならない。
  - override quota と suspension lane は duration cap、review window、owner を持つ。quota 不明のまま override 件数だけ積み上げると controlled mode ではなく unmanaged drift になる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は degraded charter registry、override token tracking、suspension lane simulation、manual intervention audit trail を分担する。
  degraded_mode_charter:
    required_fields:
    - degraded_charter_id
    - protected_operation_floor_ref
    - allowed_mutation_family_ref
    - blocked_automation_family_ref
    - human_watch_density_ref
    - duration_cap_ref
    - mode_owner_ref
    - issued_at
    rules:
    - protected_operation_floor_ref のない degraded mode を limited operation と呼んではならない。
    - duration_cap_ref のない degraded mode を temporary response として正当化してはならない。
    - mode_owner_ref のない mode drift を現場判断の連鎖で運用してはならない。
  manual_override_quota:
    required_bindings:
    - override_token_budget_ref
    - scope_limit_ref
    - dual_ack_rule_ref
    - post_use_review_window_ref
    - override_owner_ref
    rules:
    - override_token_budget_ref を超える break-glass を urgent convenience で正当化してはならない。
    - dual_ack_rule_ref のない high-impact override を単独実行してはならない。
    - post_use_review_window_ref のない manual mutation を replay-clean 扱いにしてはならない。
  automation_suspension_lane:
    lane_families:
    - detector_family
    - allocator_family
    - notification_family
    - backfill_family
    required_fields:
    - suspension_lane_id
    - lane_family_ref
    - suspension_trigger_ref
    - fallback_path_ref
    - resumption_gate_ref
    - owner_ref
    rules:
    - fallback_path_ref のない suspension を lawful pause として開いてはならない。
    - resumption_gate_ref のない lane を indefinite suspension にしてはならない。
    - notification_family を止めるなら external notice fallback を同時に束縛しなければならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - degraded charter registry
      - override token budget ratification
      - suspension lane approval
      - resumption gate binding
    GraphEngine:
      owns:
      - protected-floor feasibility check
      - override budget burn-rate projection
      - suspension fallback simulation
      - human-watch coverage computation
    GraphLint:
      owns:
      - floorless degraded-mode lint
      - quota-free break-glass lint
      - fallback-missing suspension lint
      - ownerless mode drift lint
    archive_object:
      owns:
      - degraded charter packet
      - override token log
      - manual intervention snapshot
      - lane suspension audit trail
  forbidden_shortcuts:
  - degraded mode を normal mode の throughput 劣化版として雑に扱う
  - override token なしで break-glass を routine workaround にする
  - suspension lane を family 分解せず scheduler 全停止で代替する
  - post-use review なしで manual override を clean action 扱いにする
  residual_open_points: []
scheduler_reentry_backlog_thaw_governance:
  status: provisional_fixed
  statement: scheduler_reentry_backlog_thaw_governance とは、re-entry eligibility、backlog thaw sequencing、trust restoration notice を固定する規則である。
  core_claims:
  - re-entry は停止解除ボタンではない。protected floor 回復、dependency readiness、debt within bound、notice obligation closure、canary result を束ねた clearance packet が揃ったときにだけ開くべきである。
  - backlog thaw は FIFO 一般ではなく、expiry risk、external commitment criticality、causal coupling、replay contamination risk に応じた thaw class と sequence を持つべきである。
  - trust restoration notice は「復旧しました」で終わらない。どの surface が戻り、どの surface がまだ degraded か、何が再発防止 review 中かを audience ごとに分けて通知する必要がある。
  - re-entry は staged restore canary を前提とする。full reopen を一気に行うと hidden debt、queue surge、dependency flap が再燃するため、restore tranche ごとの rollback fence を持たなければならない。
  - backlog thaw 中は new demand と residual debt を同時に見なければならない。復旧直後の throughput を正常能力と誤認して residual fragility を見失ってはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は re-entry clearance registry、thaw class sequencing、notice bundle management、restore canary audit trail を分担する。
  reentry_clearance_packet:
    required_fields:
    - reentry_packet_id
    - protected_floor_restored_ref
    - dependency_readiness_ref
    - residual_debt_bound_ref
    - notice_closure_ref
    - restore_canary_plan_ref
    - rollback_fence_ref
    - approved_at
    rules:
    - protected_floor_restored_ref のない re-entry を partial recovery enthusiasm で開いてはならない。
    - restore_canary_plan_ref のない full reopen を lawful re-entry として扱ってはならない。
    - rollback_fence_ref のない thaw を retry-on-failure で代替してはならない。
  backlog_thaw_sequence:
    thaw_classes:
    - expiry_risk_first
    - commitment_critical
    - coupled_batch
    - contamination_review_hold
    required_bindings:
    - thaw_sequence_id
    - thaw_class_ref
    - batch_owner_ref
    - thaw_window_ref
    - surge_guard_ref
    rules:
    - contamination_review_hold を thaw queue に混ぜてはならない。
    - surge_guard_ref のない thaw batch を normal backlog drain と同一視してはならない。
    - batch_owner_ref のない thaw sequence を自動再開してはならない。
  trust_restoration_notice:
    audience_classes:
    - customer
    - regulator
    - partner_vendor
    - internal_operator
    required_fields:
    - notice_bundle_id
    - audience_class_ref
    - restored_surface_ref
    - still_degraded_surface_ref
    - review_in_progress_ref
    - notice_owner_ref
    - issued_at
    rules:
    - still_degraded_surface_ref を省いた復旧通知を complete restoration と称してはならない。
    - review_in_progress_ref を隠して closure impression を作ってはならない。
    - notice_owner_ref のない informal recovery message を正本通知として扱ってはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - re-entry clearance packet registry
      - thaw class ratification
      - notice bundle approval
      - rollback fence binding
    GraphEngine:
      owns:
      - dependency readiness check
      - surge-guard simulation
      - restore canary progression
      - backlog thaw ordering computation
    GraphLint:
      owns:
      - canary-free reopen lint
      - ownerless thaw batch lint
      - surface-omitting notice lint
      - rollback-fence-missing re-entry lint
    archive_object:
      owns:
      - re-entry packet
      - thaw sequence snapshot
      - audience-specific notice archive
      - restore canary audit trail
  forbidden_shortcuts:
  - re-entry clearance なしで full reopen する
  - backlog を一括 thaw して surge guard を省く
  - still degraded な surface を通知せずに全面復旧を装う
  - rollback fence なしで canary restore を本番 reopen に昇格する
  residual_open_points: []
scheduler_post_shed_review_governance:
  status: provisional_fixed
  statement: scheduler_post_shed_review_governance とは、post-shed evidence quarantine、causal review gate、recurrence debt retirement を固定する規則である。
  core_claims:
  - controlled shedding の後処理は retrospective meeting 一般ではない。decision trace、override use、suspension lane、external notice、dependency flap を evidence quarantine packet として保存し、後から都合よく消せないようにしなければならない。
  - causal review gate は blame assignment の場ではなく、recurrence mechanism・policy gap・tool failure・vendor dependency のどこに再発源があるかを切り分ける admission gate である。review gate を通らない closure は nominal closure に過ぎない。
  - recurrence debt は unresolved causal hazard、policy repair pending、training gap、dependency redesign pending を含む。再発確率を下げる行為が完了するまでは service restoration と debt retirement を同一視してはならない。
  - evidence quarantine では actor blame を主軸にしてはならない。timing witness、queue state、override budget burn、notice lag、dependency health を causal bundle として残すべきである。
  - review outcome は no-fault systemic issue、policy defect、tool defect、dependency defect、governance misuse などに類型化し、修理 owner と due window を束縛しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は quarantine packet registry、causal review branching、recurrence debt tracking、retirement witness audit を分担する。
  evidence_quarantine_packet:
    required_fields:
    - quarantine_packet_id
    - decision_trace_ref
    - override_usage_ref
    - suspension_lane_ref
    - external_notice_ref
    - dependency_health_snapshot_ref
    - quarantine_owner_ref
    - sealed_at
    rules:
    - decision_trace_ref のない post-shed review を narrative reconstruction で代替してはならない。
    - quarantine_owner_ref のない evidence pack を mutable worklog に置いてはならない。
    - sealed_at のない evidence bundle を stable causal basis と呼んではならない。
  causal_review_gate:
    review_classes:
    - systemic_no_fault_issue
    - policy_defect
    - tool_defect
    - dependency_defect
    - governance_misuse
    required_bindings:
    - review_case_id
    - review_class_ref
    - repair_owner_ref
    - due_window_ref
    - retirement_condition_ref
    - forum_ref
    rules:
    - repair_owner_ref のない review outcome を lesson learned で閉じてはならない。
    - retirement_condition_ref のない causal finding を debt retirement 済みとみなしてはならない。
    - forum_ref のない blame discussion を ratified review outcome にしてはならない。
  recurrence_debt:
    debt_classes:
    - unresolved_causal_hazard
    - policy_repair_pending
    - training_gap_pending
    - dependency_redesign_pending
    required_fields:
    - recurrence_debt_id
    - debt_class_ref
    - origin_review_case_ref
    - repair_owner_ref
    - due_window_ref
    - retirement_witness_ref
    rules:
    - retirement_witness_ref のない debt closure を recurrence retired と記録してはならない。
    - due_window_ref のない debt を future improvement 一般へ逃がしてはならない。
    - origin_review_case_ref のない debt を loose lesson backlog に混ぜてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - quarantine packet registry
      - causal review class ratification
      - recurrence debt binding
      - retirement witness approval
    GraphEngine:
      owns:
      - decision trace reconstruction
      - notice lag correlation
      - dependency-failure contribution analysis
      - repair due-window tracking
    GraphLint:
      owns:
      - unsealed evidence lint
      - ownerless review outcome lint
      - witness-free debt retirement lint
      - blame-only review lint
    archive_object:
      owns:
      - quarantine packet archive
      - review evidence bundle
      - repair progression snapshot
      - retirement witness archive
  forbidden_shortcuts:
  - post-shed evidence を mutable chat log だけで済ませる
  - repair owner なしで lesson learned として閉じる
  - service restoration を recurrence debt retirement と同一視する
  - blame discussion を causal review の代わりにする
  residual_open_points: []
scheduler_dependency_breakpoint_governance:
  status: provisional_fixed
  statement: scheduler_dependency_breakpoint_governance とは、vendor fallback substitution、contract breakpoint lane、dependency reselection を固定する規則である。
  core_claims:
  - vendor や外部依存の failure を internal workaround だけで吸収し続けてはならない。dependency breakpoint class を持ち、どの条件で fallback substitution、contract breakpoint、provider reselection を開くかを明示しなければならない。
  - fallback substitution は互換性を雰囲気で語ってはならない。function surface、data retention duty、latency/risk envelope、operator training delta を束ねた equivalence witness を必要とする。
  - contract breakpoint lane は vendor blame 通告ではなく、SLA breach、legal nonconformity、security or compliance breach、sustained non-recoverability などの class に応じて開く formal lane である。
  - dependency reselection は最安値置換ではない。retained core compatibility、migration cost、audit continuity、exit feasibility、shadow validation plan を比較しなければならない。
  - fallback を開いている間も old dependency を silent dependency として残してはならない。double-write や hidden credential reuse は archiveable migration witness の下で管理する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は dependency breakpoint registry、equivalence scoring、reselection simulation、vendor disclosure / migration audit trail を分担する。
  fallback_substitution_packet:
    required_fields:
    - fallback_packet_id
    - failed_dependency_ref
    - fallback_candidate_ref
    - equivalence_witness_ref
    - training_delta_ref
    - migration_owner_ref
    - approved_at
    rules:
    - equivalence_witness_ref のない substitution を temporary replacement として開いてはならない。
    - training_delta_ref を無視して operator-safe fallback と主張してはならない。
    - migration_owner_ref のない fallback を self-healing と誤称してはならない。
  contract_breakpoint_lane:
    breakpoint_classes:
    - sla_breach
    - legal_nonconformity
    - security_or_compliance_breach
    - sustained_nonrecoverability
    required_bindings:
    - breakpoint_case_id
    - breakpoint_class_ref
    - vendor_notice_owner_ref
    - remedy_window_ref
    - exit_trigger_ref
    - forum_ref
    rules:
    - remedy_window_ref のない breakpoint を venting mail で代替してはならない。
    - exit_trigger_ref のない breakpoint を endless vendor limbo にしてはならない。
    - forum_ref のない external escalation を lawful contract lane と扱ってはならない。
  dependency_reselection:
    required_fields:
    - reselection_case_id
    - compatibility_score_ref
    - migration_cost_ref
    - audit_continuity_ref
    - exit_feasibility_ref
    - shadow_validation_plan_ref
    - selection_owner_ref
    rules:
    - shadow_validation_plan_ref のない reselection を cutover-ready としてはならない。
    - audit_continuity_ref を無視した cheapest-provider 選択を正当化してはならない。
    - selection_owner_ref のない vendor swap を field improvisation に委ねてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - fallback substitution registry
      - breakpoint class ratification
      - reselection decision binding
      - exit trigger approval
    GraphEngine:
      owns:
      - equivalence witness scoring
      - retained-core compatibility simulation
      - migration cost projection
      - shadow validation readiness check
    GraphLint:
      owns:
      - witness-free fallback lint
      - ownerless vendor swap lint
      - audit-blind reselection lint
      - endless breakpoint lint
    archive_object:
      owns:
      - fallback packet
      - vendor notice and remedy archive
      - shadow validation evidence bundle
      - migration audit trail
  forbidden_shortcuts:
  - equivalence witness なしで vendor fallback を開く
  - contract breakpoint を informal grievance で済ませる
  - audit continuity を無視して cheapest provider を選ぶ
  - hidden credential reuse を migration shortcut として許す
  residual_open_points: []
scheduler_budget_rebase_termination_governance:
  status: provisional_fixed
  statement: scheduler_budget_rebase_termination_governance とは、budget exhaustion rebasing、scope collapse charter、termination packet を固定する規則である。
  core_claims:
  - budget exhaustion は金が足りない感覚ではなく、protected obligation を守るために必要な capacity / vendor / governance repair が、ratified budget window 内で到達不能になった状態として定義すべきである。
  - rebasing は promise 破棄ではなく、retained obligation、abandoned scope、resume precondition、external explanation を再束縛する統治行為である。scope を silent に削るだけでは lawful retreat にならない。
  - scope collapse charter は何を残し、何を止め、何を後日再開候補にするかを service family ごとに切る。protected surface と commercially optional surface を同じ縮退ルールで潰してはならない。
  - termination packet は終了宣言ではなく、handoff evidence、data retention duty、customer/regulator notice、archive continuity、future restart barrier を含む。abandonment と clean termination を区別しなければならない。
  - rebase や termination を開くときでも retained core と accountability lane は残る。人員や予算不足を理由に evidence duty や notice duty を捨ててはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は exhaustion trigger registry、collapse charter binding、termination packet validation、retained-obligation audit trail を分担する。
  budget_exhaustion_trigger:
    required_fields:
    - exhaustion_case_id
    - protected_obligation_gap_ref
    - budget_window_ref
    - repair_infeasibility_ref
    - executive_owner_ref
    - forum_ref
    - declared_at
    rules:
