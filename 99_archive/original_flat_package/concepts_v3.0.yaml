    - sampling_rule_ref
    - privacy_tier_ref
    - approved_at_or_null
    rules:
    - event_granularity_ref のない profile を minimization profile と呼んではならない。
    - attribute_whitelist_ref のない profile を least-observation design とみなしてはならない。
    - join_prohibition_ref のない profile を re-identification resistant telemetry profile と称してはならない。
  retention_expiry_lane:
    required_fields:
