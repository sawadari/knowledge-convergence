scheduler_federation_capability_routing_governance:
  status: provisional_fixed
  statement: scheduler_federation_capability_routing_governance とは、capability advertisement、selective subscription、route affinity を束ねて federation 内の機能公開と購読経路を固定する規則である。
  core_claims:
  - capability advertisement は存在宣言ではない。capability family、supported scope、qos profile、trust prerequisite、expiry / review を伴って初めて subscription 可能な surface になる。
  - selective subscription は all-in mirror ではない。selected scope、filter profile、delivery SLA、unsubscribe gate を持たない購読は bounded intake と呼べない。
  - route affinity は preference だけでなく fallback policy を含む。preferred route set、fallback route set、latency budget、residency constraint を束ねなければ lawful route choice にならない。
  - capability 公開と route choice を混同してはならない。公開されていても subscriber の trust tier や residency constraint が満たされなければ route を開いてはならない。
  - subscription は perpetual ではない。expiry / review と unsubscribe gate がない購読は stale dependency を蓄積する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は capability registry、route selection evaluation、subscription lint、routing evidence archive を分担する。
  capability_advertisement:
    required_fields:
    - capability_advert_id
    - partner_ref
    - capability_family_ref
    - supported_scope_ref
    - qos_profile_ref
    - trust_prerequisite_ref
    - expiry_or_review_ref
    - published_at_or_null
    rules:
    - capability_family_ref のない公開を capability advertisement と呼んではならない。
    - trust_prerequisite_ref のない advertisement を open federated service とみなしてはならない。
    - expiry_or_review_ref のない advertisement を continuing capability にしてはならない。
  selective_subscription_contract:
    required_bindings:
    - subscription_contract_id
    - subscriber_partner_ref
    - capability_advert_ref
    - selected_scope_ref
    - filter_profile_ref
    - delivery_sla_ref
    - unsubscribe_gate_ref
    - bound_at_or_null
    rules:
    - selected_scope_ref のない購読を selective subscription と呼んではならない。
    - delivery_sla_ref のない購読を dependable intake とみなしてはならない。
    - unsubscribe_gate_ref のない購読を bounded dependency として扱ってはならない。
  route_affinity_policy:
    required_fields:
    - route_affinity_id
    - capability_family_ref
    - preferred_route_set_ref
    - fallback_route_set_ref
    - latency_budget_ref
    - residency_constraint_ref
    - attested_at_or_null
    rules:
    - preferred_route_set_ref のない方針を route affinity と呼んではならない。
    - fallback_route_set_ref のない route policy を resilient routing とみなしてはならない。
    - residency_constraint_ref のない route choice を lawful placement と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - capability advertisement registry
      - subscription contract binding
      - route affinity ratification
      - stale dependency review binding
    GraphEngine:
      owns:
      - subscriber-capability fit evaluation
      - scope / filter compatibility check
      - route preference selection
      - fallback route feasibility projection
    GraphLint:
      owns:
      - scope-free advertisement lint
      - sla-free subscription lint
      - fallback-free affinity lint
      - residency-violation lint
    archive_object:
      owns:
      - advertisement history
      - subscription evidence bundle
      - route choice snapshots
      - unsubscribe / expiry trail
  forbidden_shortcuts:
  - trust prerequisite を空欄のまま capability を federation-wide 公開する
  - selected scope なしで full mirror subscription を既定値にする
  - fallback route なしで route affinity を resilient と表現する
  - unsubscribe gate なしで perpetual subscription を強制する
  residual_open_points: []
scheduler_federation_partition_failover_governance:
  status: provisional_fixed
  statement: scheduler_federation_partition_failover_governance とは、partition failover、corridor rerouting、reunion attestation を束ねて mesh 分断時の継続運用と再合流を固定する規則である。
  core_claims:
  - partition incident は通信断の事実だけでは足りない。affected mesh cell、partition class、loss boundary、fallback corridor、declared state を packet として束ねなければ failover planning の単位にならない。
  - corridor rerouting は emergency shortcut ではなく bounded bridge である。donor route、recipient route、capacity cap、legal boundary、activation window を明示しなければ lawful reroute と呼べない。
  - reunion は link 再接続だけではない。consistency digest、replay gap review、debt settlement、counterpart acknowledgment が揃って初めて safe reunion を主張できる。
  - partition 中の local override や debt accrual を silent merge してはならない。reunion 前に divergence disclosure と replay gap review を通す必要がある。
  - failover corridor は常態 route にしてはならない。incident close 後も donor capacity や legal boundary を外れた reroute を継続させてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は partition registry、reroute feasibility evaluation、reunion lint、incident archive を分担する。
  partition_incident_packet:
    required_fields:
    - partition_incident_id
    - affected_mesh_cell_set_ref
    - partition_class_ref
    - loss_boundary_ref
    - fallback_corridor_ref
    - declared_at_or_null
    rules:
    - affected_mesh_cell_set_ref のない incident を partition case と呼んではならない。
    - loss_boundary_ref のない incident を bounded outage とみなしてはならない。
    - fallback_corridor_ref のない incident を failover-ready と称してはならない。
  corridor_rerouting_plan:
    required_bindings:
    - reroute_plan_id
    - partition_incident_ref
    - donor_route_ref
    - recipient_route_ref
    - capacity_cap_ref
    - legal_boundary_ref
    - activated_at_or_null
    rules:
    - donor_route_ref のない reroute を corridor rerouting と呼んではならない。
    - capacity_cap_ref のない reroute を donor-safe failover とみなしてはならない。
    - legal_boundary_ref のない reroute を lawful bridge として扱ってはならない。
  reunion_attestation:
    required_fields:
    - reunion_attestation_id
    - partition_incident_ref
    - consistency_digest_ref
    - replay_gap_review_ref
    - debt_settlement_ref
    - counterpart_ack_ref
    - attested_at_or_null
    rules:
    - consistency_digest_ref のない reunion を consistent rejoin と呼んではならない。
    - replay_gap_review_ref のない reunion を divergence-checked merge とみなしてはならない。
    - counterpart_ack_ref のない reunion を bilateral closure にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - partition incident registry
      - reroute activation binding
      - reunion attestation ratification
      - debt carry-forward / settlement binding
    GraphEngine:
      owns:
      - affected-cell loss projection
      - corridor capacity fit evaluation
      - split-path divergence estimation
      - reunion replay-gap check
    GraphLint:
      owns:
      - boundary-free partition lint
      - capacity-free reroute lint
      - review-free reunion lint
      - silent-divergence lint
    archive_object:
      owns:
      - partition incident archive
      - reroute evidence bundle
      - reunion consistency snapshots
      - partition lifecycle history
  forbidden_shortcuts:
  - loss boundary を定めずに partition incident を宣言する
  - capacity cap なしで donor route を reroute に使う
  - replay gap review なしで reunion を完了扱いにする
  - incident close 後も emergency corridor を常態 route として残す
  residual_open_points: []
scheduler_federation_shared_reserve_governance:
  status: provisional_fixed
  statement: scheduler_federation_shared_reserve_governance とは、shared reserve covenant、reciprocity settlement、donor protection floor を束ねて cross-partner 支援の持続性を固定する規則である。
  core_claims:
  - shared reserve は善意の持ち寄りではなく covenant である。reserve pool、contributing partner set、protected floor、callable scope、expiry / review を束ねなければ lawful reserve にならない。
  - reserve call は贈与ではない。donor partner、receiver partner、debt class、settlement window、settlement terms を明示して初めて reciprocity settlement を主張できる。
  - donor protection floor は optional ではない。protected services、fatigue or capacity floor、lawful refusal reason を定めなければ donor-safe support と呼べない。
  - receiver の緊急性だけで donor の protected floor を破ってはならない。federation support は strongest partner の無限責務ではない。
  - settlement が未了でも reserve call の履歴は消えない。carry-forward debt と forgiveness を区別し、silent debt erase を禁止する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve covenant registry、debt / settlement evaluation、donor protection lint、support archive を分担する。
  shared_reserve_covenant:
    required_fields:
    - reserve_covenant_id
    - reserve_pool_ref
    - contributing_partner_set_ref
    - protected_floor_ref
    - callable_scope_ref
    - expiry_or_review_ref
    - ratified_at_or_null
    rules:
    - reserve_pool_ref のない covenant を shared reserve と呼んではならない。
    - protected_floor_ref のない reserve を donor-safe capacity とみなしてはならない。
    - callable_scope_ref のない reserve を lawful call surface にしてはならない。
  reciprocity_settlement:
    required_bindings:
    - settlement_case_id
    - call_event_ref
    - donor_partner_ref
    - receiver_partner_ref
    - debt_class_ref
    - settlement_window_ref
    - settlement_terms_ref
    - settled_at_or_null
    rules:
    - debt_class_ref のない返済を reciprocity settlement と呼んではならない。
    - settlement_window_ref のない reserve call を bounded debt とみなしてはならない。
    - settlement_terms_ref のない処理を lawful settlement と称してはならない。
  donor_protection_floor:
    required_fields:
    - donor_protection_id
    - donor_partner_ref
    - protected_service_set_ref
    - fatigue_or_capacity_floor_ref
    - lawful_refusal_reason_ref
    - restored_at_or_null
    rules:
    - protected_service_set_ref のない floor を donor protection floor と呼んではならない。
    - fatigue_or_capacity_floor_ref のない支援枠を donor-safe reserve にしてはならない。
    - lawful_refusal_reason_ref のない拒否を arbitrary refusal と区別できない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - shared reserve covenant registry
      - settlement case binding
      - donor protection ratification
      - debt carry-forward / forgiveness binding
    GraphEngine:
      owns:
      - reserve availability projection
      - donor floor fit evaluation
      - settlement aging calculation
      - cross-partner overdraw risk simulation
    GraphLint:
      owns:
      - floor-free reserve lint
      - terms-free settlement lint
      - reason-free refusal lint
      - silent-debt-erase lint
    archive_object:
      owns:
      - reserve covenant archive
      - settlement evidence bundle
      - donor protection history
      - support call snapshots
  forbidden_shortcuts:
  - protected floor なしで reserve pool を共有する
  - settlement terms なしで reserve call を完了扱いにする
  - lawful refusal reason を残さず donor refusal を arbitrary に行う
  - 未返済 debt を silent に erase する
  residual_open_points: []
scheduler_federation_joint_drill_governance:
  status: provisional_fixed
  statement: scheduler_federation_joint_drill_governance とは、joint drill charter、evidence escrow、audit cadence を束ねて federation readiness の定期検証を固定する規則である。
  core_claims:
  - joint drill は善意の演習ではない。participating partner、scenario family、scope boundary、success criteria、calendar を charter 化しなければ比較可能な readiness drill にならない。
  - drill evidence は無制限共有してはならない。escrow bundle、redaction profile、shared audience、release rule を束ねて初めて bounded disclosure が成立する。
  - audit cadence は meeting habit ではない。cadence class、mandatory artifact set、missed-cycle escalation、next due を定めなければ dormant readiness drift を監査できない。
  - drill 成績と federation membership を混同してはならない。drill failure は即 expulsion ではなく remediation lane、probation reassessment、scope narrowing へ分岐させる必要がある。
  - evidence escrow は secrecy の口実ではない。release rule と authorized audience を明示しなければ redaction の妥当性も監査できない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は drill charter registry、readiness evaluation、cadence lint、escrow archive を分担する。
  joint_drill_charter:
    required_fields:
    - joint_drill_id
    - participating_partner_set_ref
    - scenario_family_ref
    - scope_boundary_ref
    - success_criteria_ref
    - calendar_ref
    - ratified_at_or_null
    rules:
    - participating_partner_set_ref のない演習を joint drill と呼んではならない。
    - scope_boundary_ref のない drill を bounded rehearsal とみなしてはならない。
    - success_criteria_ref のない drill を readiness evaluation に使ってはならない。
  evidence_escrow:
    required_bindings:
    - escrow_case_id
    - joint_drill_ref
    - escrow_bundle_ref
    - redaction_profile_ref
    - shared_audience_ref
    - release_rule_ref
    - sealed_at_or_null
    rules:
    - escrow_bundle_ref のない保管を evidence escrow と呼んではならない。
    - redaction_profile_ref のない escrow を bounded disclosure とみなしてはならない。
    - release_rule_ref のない escrow を lawful evidence sharing と称してはならない。
  audit_cadence_policy:
    required_fields:
    - audit_cadence_id
    - partner_set_ref
    - cadence_class_ref
    - mandatory_artifact_set_ref
    - missed_cycle_escalation_ref
    - next_due_ref
    - bound_at_or_null
    rules:
    - cadence_class_ref のない方針を audit cadence と呼んではならない。
    - mandatory_artifact_set_ref のない audit を comparability-preserving review とみなしてはならない。
    - missed_cycle_escalation_ref のない cadence を enforceable review にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - joint drill charter registry
      - evidence escrow binding
      - audit cadence ratification
      - drill-failure remediation / probation linkage
    GraphEngine:
      owns:
      - scenario coverage evaluation
      - success-criteria scoring
      - cadence due / missed-cycle projection
      - evidence release eligibility check
    GraphLint:
      owns:
      - criteria-free drill lint
      - profile-free escrow lint
      - escalation-free cadence lint
      - silent-drill-gap lint
    archive_object:
      owns:
      - drill charter archive
      - escrowed evidence bundle
      - audit cadence history
      - drill result snapshots
  forbidden_shortcuts:
  - success criteria なしで drill を readiness evidence に使う
  - release rule なしで drill evidence を federation-wide に共有する
  - missed-cycle escalation なしで audit cadence を enforceable と呼ぶ
  - drill failure を silent に握りつぶして membership healthy とみなす
  residual_open_points: []
scheduler_federation_meta_governance:
  status: provisional_fixed
  statement: scheduler_federation_meta_governance とは、meta-governance council、amendment ratification、emergency override constitution を束ねて federation 自体を変更する上位統治を固定する規則である。
  core_claims:
  - meta-governance council は名誉職ではない。council composition、quorum rule、veto reach、delegated review lane を束ねなければ federation-wide 変更を lawful ratification と呼べない。
  - amendment ratification は単票多数決では足りない。proposal packet、impact surface、ratification threshold、local adoption lag、effective_at を結ばなければ doctrine drift を抑えられない。
  - emergency override は日常 shortcut の合法化ではない。trigger family、declaring authority、scope ceiling、sunset timer、rollback condition を constitution として固定しなければ有事後の説明責任が壊れる。
  - local adoption lag は逸脱免責ではない。lag 中も applicable floor、temporary incompatibility notice、expiry date、compensating control を残さなければ federation compatibility を主張できない。
  - meta-governance change は joint drill や membership review と接続されるが同一ではない。readiness evidence や probation 結果だけで constitutional change を自動承認してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は council registry、ratification state evaluation、constitutional lint、meta-governance archive を分担する。
  meta_governance_council:
    required_fields:
    - council_id
    - member_set_ref
    - quorum_rule_ref
    - veto_reach_ref
    - delegated_review_lane_ref
    - charter_ref
    - ratified_at_or_null
    rules:
    - member_set_ref のない council を federation constitutional forum と呼んではならない。
    - quorum_rule_ref のない採決を lawful council decision とみなしてはならない。
    - delegated_review_lane_ref のない council を overload-safe governance と称してはならない。
  amendment_ratification_rule:
    required_bindings:
    - amendment_id
    - proposal_packet_ref
    - impact_surface_ref
    - ratification_threshold_ref
    - local_adoption_lag_ref
    - effective_at_ref
    - ratified_at_or_null
    rules:
    - proposal_packet_ref のない改定を ratification に掛けてはならない。
    - impact_surface_ref のない amendment を federation-wide binding change と称してはならない。
    - effective_at_ref のない ratification を enforceable amendment とみなしてはならない。
  emergency_override_constitution:
    required_fields:
    - override_constitution_id
    - trigger_family_ref
    - declaring_authority_ref
    - scope_ceiling_ref
    - sunset_timer_ref
    - rollback_condition_ref
    - declared_at_or_null
    rules:
    - trigger_family_ref のない emergency 宣言を constitutional override と呼んではならない。
    - scope_ceiling_ref のない override を bounded emergency action とみなしてはならない。
    - sunset_timer_ref のない override を temporary constitution と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - council charter registry
      - amendment ratification record
      - emergency override declaration
      - rollback / sunset judgement
    GraphEngine:
      owns:
      - quorum / threshold evaluation
      - impact surface projection
      - local adoption lag map
      - override expiry / rollback check
    GraphLint:
      owns:
      - quorum-free council lint
      - impact-free amendment lint
      - scope-ceiling-free override lint
      - sunset-missing emergency lint
    archive_object:
      owns:
      - council session archive
      - ratification packet history
      - emergency override witness bundle
      - rollback outcome archive
  forbidden_shortcuts:
  - joint drill 成績をそのまま constitutional amendment 承認に使う
  - quorum を満たさず local convenience だけで federation rule を改定する
  - sunset timer なしで emergency override を常設化する
  - local adoption lag を理由に applicable floor を黙って無効化する
  residual_open_points: []
scheduler_federation_constitutional_interpretation_governance:
  status: provisional_fixed
  statement: scheduler_federation_constitutional_interpretation_governance とは、constitutional interpretation canon、ambiguity escalation chamber、precedent invalidation test を束ねて federation 憲法解釈の統一と precedent 失効判定を固定する規則である。
  core_claims:
  - constitutional interpretation canon は名称だけでは足りない。scope、binding rule、authority、exception を束ねなければ federation 上位統治の拘束単位にならない。
  - ambiguity escalation chamber は連絡や慣習では足りない。trigger、participant set、procedure、window を束ねなければ lawful governance lane にならない。
  - precedent invalidation test は印象評価では足りない。subject、threshold、effect scope、follow-up を束ねなければ reviewable constitutional outcome にならない。
  - constitutional interpretation canon と ambiguity escalation chamber と precedent invalidation test は分離して見えても、上位規範の binding・運用・評価を一体で閉じる。いずれかが欠けたまま federation-wide safe operation を主張してはならない。
  - local convenience を理由に federation-wide constitutional rule を省略してはならない。temporary handling を使う場合でも authority と rollback を残さなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は federation constitutional interpretation 管理責務を分担する。
  constitutional_interpretation_canon:
    required_fields:
    - constitutional_interpretation_canon_id
    - scope_ref
    - binding_rule_ref
    - authority_ref
    - exception_rule_ref
    - ratified_at_or_null
    rules:
    - scope_ref のない constitutional interpretation canon を federation-wide bounded policy と呼んではならない。
    - binding_rule_ref のない constitutional interpretation canon を executable constitutional rule とみなしてはならない。
    - authority_ref のない constitutional interpretation canon を lawfully owned governance unit と称してはならない。
    residual_open_points:
    - scheduler federation referendum scope gate / stakeholder notice minimum / dissent preservation memo をどこまで registry 化するか
  ambiguity_escalation_chamber:
    required_fields:
    - ambiguity_escalation_chamber_id
    - trigger_ref
    - participant_set_ref
    - procedure_ref
    - deadline_or_window_ref
    - opened_at_or_null
    rules:
