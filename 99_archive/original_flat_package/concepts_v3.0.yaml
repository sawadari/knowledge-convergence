  forbidden_shortcuts:
  - canonical holding なしの digest を precedent 扱いする
  - effective date なしで doctrine update を即時強制する
  - retraining gate を通っていない reviewer に新 doctrine を適用させる
  residual_open_points: []
scheduler_federation_cross_jurisdiction_governance:
  status: provisional_fixed
  statement: scheduler_federation_cross_jurisdiction_governance とは、conflict-of-law profile、local override lane、enforcement reciprocity を束ねて federation assurance doctrine の越境適用条件を固定する規則である。
  core_claims:
  - federation rule は universal law ではない。governing-law priority、mandatory local rule、recognition condition を profile 化しなければ越境執行は壊れる。
  - local override は抜け道ではない。override admissibility、scope cap、sunset condition、recipient caveat を束ねなければ lawful deviation と呼べない。
  - enforcement reciprocity がない federation は一方向支配に傾く。mutual recognition、minimum safeguard parity、non-reciprocal fallback を明示する必要がある。
  - mandatory local rule を convenience だけで無視してはならない。違法執行は doctrine consistency より重い失敗である。
  - override を永続化してはならない。sunset か doctrine revision trigger がなければ local exception が事実上の新 rule になる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は law profile registry、override evaluation、reciprocity lint、cross-border archive を分担する。
  conflict_of_law_profile:
    required_fields:
    - law_profile_id
    - governing_law_priority_ref
    - mandatory_local_rule_ref
    - recognition_condition_ref
    - fallback_compliance_lane_ref
    - effective_window_ref
    rules:
    - governing_law_priority_ref のない profile を conflict-of-law profile と呼んではならない。
    - mandatory_local_rule_ref のない profile を lawful cross-border doctrine basis とみなしてはならない。
    - fallback_compliance_lane_ref のない profile を non-reciprocal safe lane と称してはならない。
  local_override_lane:
    required_fields:
    - override_case_id
    - override_admissibility_ref
    - scope_cap_ref
    - sunset_condition_ref
    - recipient_caveat_ref
    - closed_at_or_null
    rules:
    - override_admissibility_ref のない override を local override lane と呼んではならない。
    - scope_cap_ref のない override を bounded deviation とみなしてはならない。
    - sunset_condition_ref のない override を temporary local adaptation と称してはならない。
  enforcement_reciprocity:
    required_fields:
    - reciprocity_id
    - mutual_recognition_ref
    - minimum_safeguard_parity_ref
    - non_reciprocal_fallback_ref
    - escalation_counterparty_ref
    - activated_at_or_null
    rules:
    - mutual_recognition_ref のない reciprocity を enforcement reciprocity と呼んではならない。
    - minimum_safeguard_parity_ref のない reciprocity を fairness-preserving enforcement とみなしてはならない。
    - non_reciprocal_fallback_ref のない reciprocity を failure-safe cross-border lane と称してはならない。
  tool_responsibilities:
    DecisionLedger:
