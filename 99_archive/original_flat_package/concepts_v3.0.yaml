    - rationale_link_ref のない dissent を reviewable disagreement record とみなしてはならない。
    - publication_rule_ref のない dissent storage を accountable minority record と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - benchmark context policy
