    branch_connection_rules:
    - coverage_kind が shared_core または intersection_safe で、他の hard blocker がなければ、plurality / open conflict だけを理由に q_decision を 1 以下へ落とさない。
    - coverage_kind が uncovered で、candidate divergence または conflict outcome が current action の lawful / accountable branch を変える場合、q_decision は 1 以下に抑制される。
    - coverage_kind が incomparable_coverage の場合、coverage 不足と同一視せず、registry / mapping / facet alignment の不足として hold または escalate を優先する。
    - same-frame で coverage または isolation を補強できれば hold、上位 authority や registry ratification が必要なら escalate、lawful path absent・deadline breach・target invalidation なら false とする。
    tool_split:
      DecisionLedger:
      - intended_action_family
