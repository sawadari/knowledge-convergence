    - recipient_correction_ladder_ref
    - effective_at_or_null
    rules:
    - precedence_ladder_ref のない restatement を canonical correction と呼んではならない。
    - superseded_opinion_order_ref のない restatement を opinion replacement とみなしてはならない。
    - recipient_correction_ladder_ref のない restatement を recipient-visible correction と称してはならない。
  archive_preservation_order:
    required_fields:
    - preservation_order_id
    - retention_class_ref
    - preservation_window_ref
    - deletion_hold_ref
    - access_tier_ref
    - hash_chain_ref
    - released_at_or_null
    rules:
    - deletion_hold_ref のない preservation order を appeal-safe archive order と呼んではならない。
    - hash_chain_ref のない preserved record を tamper-evident archive とみなしてはならない。
    - access_tier_ref のない archive を confidentiality-bounded preservation と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - appeal tribunal registry
      - restatement precedence decision
      - superseded opinion order binding
      - archive preservation order decision
    GraphEngine:
      owns:
      - standing / filing window evaluation
      - precedence graph calculation
      - recipient correction routing
      - preservation dependency projection
    GraphLint:
      owns:
      - conflicted tribunal composition lint
      - missing precedence ladder lint
      - record freeze breach lint
      - deletion-hold bypass lint
    archive_object:
      owns:
      - appeal packet
      - restatement bundle
      - superseded opinion chain
      - preservation manifest
  forbidden_shortcuts:
  - appeal standing を確認せず anyone-can-appeal にする
  - restatement precedence を決めず新旧 opinion を併存させる
  - appeal 中の record を convenience だけで削除する
  residual_open_points:
  - scheduler federation stale-reliance withdrawal / third-party reuse boundary / liability caveat passport をどこまで registry 化するか
scheduler_federation_sealed_evidence_governance:
  status: provisional_fixed
  statement: scheduler_federation_sealed_evidence_governance とは、confidential evidence redaction tier、sealed appendix access lane、public summary floor を束ねて federation assurance appeal / restatement における秘匿情報と公開説明責任の境界を固定する規則である。
  core_claims:
  - confidential evidence は全部公開か全部秘匿かの二択ではない。secrecy basis、redaction scope、reviewer access class、expiry review を tier 化しなければ過剰秘匿と過少保護の両方を招く。
  - sealed appendix access は善意推定で開いてはならない。requester class、necessity basis、least disclosure bundle、audit log を束ねなければ lawful access lane と呼べない。
  - public summary floor がない restatement は opaque correction である。mandatory fact set、reasoning outline、risk disclosure、delta summary を公開下限として固定する必要がある。
  - redaction は convenience masking ではない。harm basis と review expiry がなければ恒久秘匿の抜け道になる。
  - 公開 summary が薄すぎると recipient は reliance adjustment を実行できない。公開最小集合を registry 化する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は redaction registry、access decision、summary sufficiency lint、sealed archive を分担する。
  confidential_evidence_redaction_tier:
    required_fields:
    - redaction_tier_id
    - secrecy_basis_ref
    - redaction_scope_ref
    - reviewer_access_class_ref
    - expiry_review_window_ref
    - harm_threshold_ref
    - approved_at_or_null
    rules:
    - secrecy_basis_ref のない redaction を lawful redaction tier と呼んではならない。
    - reviewer_access_class_ref のない tier を review-safe concealment とみなしてはならない。
    - expiry_review_window_ref のない tier を time-bounded secrecy と称してはならない。
  sealed_appendix_access_lane:
    required_fields:
    - access_case_id
    - requester_class_ref
    - necessity_basis_ref
    - least_disclosure_bundle_ref
    - decision_deadline_ref
    - audit_log_ref
    - closed_at_or_null
    rules:
    - necessity_basis_ref のない access request を sealed appendix access と呼んではならない。
    - least_disclosure_bundle_ref のない access grant を minimal disclosure approval とみなしてはならない。
    - audit_log_ref のない access lane を post-hoc accountable access と称してはならない。
  public_summary_floor:
    required_fields:
    - summary_floor_id
    - mandatory_fact_set_ref
    - reasoning_outline_ref
    - risk_disclosure_ref
    - restatement_delta_ref
    - published_at_or_null
    rules:
    - mandatory_fact_set_ref のない summary を public summary floor と呼んではならない。
    - risk_disclosure_ref のない summary を recipient-actionable explanation とみなしてはならない。
    - restatement_delta_ref のない summary を correction-aware publication と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - redaction tier registry
      - sealed appendix access decision
      - public summary floor binding
      - secrecy expiry review decision
    GraphEngine:
      owns:
      - requester class / necessity evaluation
      - least disclosure bundle materialization
      - summary publication routing
      - expiry review scheduling
    GraphLint:
      owns:
      - over-redaction lint
      - missing audit log lint
      - summary insufficiency lint
      - permanent secrecy shortcut lint
    archive_object:
      owns:
      - sealed appendix packet
      - redaction snapshot
      - access audit trail
      - public summary archive
  forbidden_shortcuts:
  - secrecy basis なしで evidence を blanket redaction する
  - necessity basis なしで sealed appendix を閲覧させる
  - public summary floor を満たさない restatement を公開完了とみなす
  residual_open_points:
  - scheduler federation assurance appeal tribunal / restatement precedence / archive preservation order をどこまで registry 化するか
scheduler_federation_doctrine_propagation_governance:
  status: provisional_fixed
  statement: scheduler_federation_doctrine_propagation_governance とは、precedent digest、doctrine change bulletin、reviewer retraining gate を束ねて federation assurance doctrine の更新と普及を固定する規則である。
  core_claims:
  - appeal outcome は case archive に閉じてはならない。canonical holding、binding scope、distinguishable fact pattern を digest 化しなければ precedent として再利用できない。
  - doctrine change は quiet update にしてはならない。change threshold、effective date、bulletin audience、legacy review handling を固定しなければ旧 doctrine の残存が起こる。
  - reviewer retraining は善意依存で足りない。critical doctrine change が出たなら qualification refresh gate を通す必要がある。
  - digest がない bulletin はただの広報である。holding と適用限界が明示されなければ normative guidance にならない。
  - legacy review は放置してはならない。ongoing review が旧 doctrine を使っている場合は re-check obligation を生じさせるべきである。
  - DecisionLedger / GraphEngine / GraphLint / archive object は precedent registry、audience routing、training lint、doctrine archive を分担する。
  precedent_digest:
    required_fields:
    - precedent_id
    - canonical_holding_ref
    - binding_scope_ref
    - distinguishable_pattern_ref
    - source_case_chain_ref
    - published_at_or_null
    rules:
    - canonical_holding_ref のない digest を precedent digest と呼んではならない。
    - binding_scope_ref のない digest を reusable doctrine unit とみなしてはならない。
    - source_case_chain_ref のない digest を provenance-safe precedent と称してはならない。
  doctrine_change_bulletin:
