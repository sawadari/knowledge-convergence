  statement: scheduler_federation_materiality_aggregation_governance とは、finding materiality band、cross-partner aggregation rule、contagion notice threshold を束ねて federation assurance finding の重み付けと伝播境界を固定する規則である。
  core_claims:
  - materiality は単一 finding の severity だけでは決まらない。scope impact、reliance exposure、recoverability、same-cause clustering を束ねなければ portfolio risk が見えない。
  - aggregation は件数足し算ではない。same control family、same causal chain、shared dependency、shared audience reliance を明示的に束ねてはじめて aggregate materiality を論じられる。
  - cross-partner contagion は guilt by association ではない。bridge dependency、shared control failure、reuse lineage があるときだけ notice threshold を超えうる。
  - materiality band は informational / limited / material / systemic の梯子を持ち、systemic 相当は portfolio freeze や public caveat を引き起こしうる。
  - single partner では limited でも、aggregate では material になりうる。aggregation rule を欠くと distributed weakness を見逃す。
  - DecisionLedger / GraphEngine / GraphLint / archive object は materiality registry、cluster aggregation、contagion lint、notice archive を分担する。
  finding_materiality_band:
    required_fields:
    - materiality_band_id
    - scope_impact_ref
    - reliance_exposure_ref
    - recoverability_ref
    - control_criticality_ref
    - band_class_ref
    rules:
    - scope_impact_ref のない band を finding materiality band と呼んではならない。
    - reliance_exposure_ref のない band を recipient-risk aware classification とみなしてはならない。
    - band_class_ref のない finding を portfolio aggregation に流してはならない。
  cross_partner_aggregation_rule:
    required_fields:
    - aggregation_rule_id
    - same_cause_cluster_ref
    - shared_dependency_ref
    - shared_audience_ref
    - aggregation_window_ref
    - deduplication_rule_ref
    rules:
    - same_cause_cluster_ref のない aggregation を cluster-safe aggregation と呼んではならない。
    - deduplication_rule_ref のない aggregation を net materiality 評価とみなしてはならない。
  contagion_notice_threshold:
    required_fields:
    - notice_threshold_id
    - bridge_dependency_class_ref
    - shared_control_failure_ref
    - reuse_lineage_ref
    - temporary_caveat_ref
    - portfolio_freeze_trigger_ref
    rules:
    - bridge_dependency_class_ref のない threshold を cross-partner contagion rule と呼んではならない。
    - temporary_caveat_ref のない threshold breach を recipient-safe transition とみなしてはならない。
    - portfolio_freeze_trigger_ref のない systemic breach を bounded contagion governance と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - materiality band registry
      - aggregation rule binding
      - notice threshold decision
      - freeze / caveat decision
    GraphEngine:
      owns:
      - same-cause clustering
      - cross-partner aggregation
      - deduplication
      - notice propagation set materialization
    GraphLint:
