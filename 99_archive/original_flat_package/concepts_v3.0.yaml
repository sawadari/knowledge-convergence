axiom_candidates:
- id: A1
  statement: 生成は知識ではない
  status: provisional_fixed
  adoption_rule: 生成物そのものではなく、根拠・文脈・責任・履歴が束縛された知識状態だけを知識として扱うとき採用する。
  rejection_rule: 生成文や要約文を、監査可能性なしに知識へ短絡させる立場は採用しない。
  promotion_condition: knowledge 定義と knowledge_state の束縛要素へ直接接続できること。
  negative_examples:
  - 出典なし生成文
  - 責任主体未束縛の自動要約
  - 監査不能な候補文
- id: A2
  statement: 知識は静的保存物ではなく動的収束過程である
  status: provisional_fixed
  adoption_rule: 履歴 H、差戻し、再承認、expiry を同じ理論内で扱うため、知識を動的収束過程として捉えるとき採用する。
  rejection_rule: 文書保存をもって知識成立とみなし、更新・反証・差戻しを理論外へ追い出す立場は採用しない。
  promotion_condition: update_operator と H の更新履歴に接続できること。
  negative_examples:
  - 文書を保存しただけで知識成立とみなす状態
  - 古い根拠のまま再評価なしで運用継続する状態
- id: A3
  statement: AIは自己評価可能でなければ、複雑系で責任ある補助者になれない
  status: provisionally_resolved
  axiom_disposition: rejected_as_core_axiom
  retained_as: ai_governance_principle
  reason:
  - AIを前提とする設計原理であり、AIなしでも成立すべき理論全体の存在条件ではない。
  - ai_self_evaluation_model で扱う方が位置づけとして自然である。
  rejection_rule: AI固有制約を理論全体の中心公理へ持ち上げ、知識収束学をAI特化理論へ狭める場合は採用しない。
  promotion_condition: ai_self_evaluation_model と delegated execution の統治条件として formalization 側へ接続されること。
  negative_examples:
  - AI利用がない領域で理論の基礎が失効するとみなす立場
  - 自己評価機能の有無だけで責任主体の設計を置き換える立場
- id: A4
  statement: 人間は最終主体であり、AIは判断補助・候補生成・部分実行主体である
  status: provisional_fixed
  adoption_rule: 最終責任主体を人間または制度主体へ残しつつ、AIを判断補助・候補生成・部分実行へ限定するとき採用する。
  rejection_rule: AI出力を無署名のまま外部コミットさせ、責任主体を曖昧化する立場は採用しない。
  promotion_condition: DecisionLedger の approval / execution / accountability 分離と整合すること。
  negative_examples:
  - AI出力を無署名で外部コミットする状態
  - 責任主体不在の自動承認
- id: A5
  statement: 単一最適解より、説明可能で見直し可能な収束が重要である
  status: provisional_fixed
  adoption_rule: 単一最適解ではなく、説明可能で見直し可能な判断可能状態を収束の中心とみなすとき採用する。
  rejection_rule: 単一スコア最大化だけで採択し、非比較性や正当な非収束を潰す立場は採用しない。
  promotion_condition: convergence 定義と二層モデルに直接接続できること。
  negative_examples:
  - 単一スコア最大化だけで採択する状態
  - incomparability を潰して疑似的一意解を作る状態
knowledge_quality_dimensions:
- name: 構造閉包性
  status: provisional_fixed
  maps_to: q_structure
  meaning: 主要主張が制約・対象・他主張に接続されている度合い
- name: 文脈固定性
  status: provisional_fixed
  maps_to: q_context
  meaning: 対象範囲、時間・状況、目的・問いが主要主張に束縛されている度合い
- name: 根拠接続性
  status: provisional_fixed
  maps_to: q_evidence
  meaning: 主要主張に evidence_ref または正当化済み欠落マーカーが結び付いている度合い
- name: 矛盾管理性
  status: provisional_fixed
  maps_to: q_conflict
  meaning: 重大矛盾が除去、隔離、または管理対象化されている度合い
- name: 曖昧性管理性
  status: provisional_fixed
  maps_to: q_ambiguity
  meaning: 主要語、条件、範囲の曖昧性が解消または管理されている度合い
- name: 説明経路可用性
  status: provisional_fixed
  maps_to: q_explain
  meaning: 主要主張について claim→context→evidence→constraint の追跡経路を提示できる度合い
- name: 判断束縛性
  status: provisional_fixed
  maps_to: q_decision
  meaning: 決定対象、統治用文脈、採択基準、許容リスク、棄却条件、分岐条件が主要 decision target に束縛されている度合い
- name: 責任束縛性
  status: provisional_fixed
  maps_to: q_responsibility
  meaning: 承認主体、実行主体、結果責任主体、委任範囲、エスカレーション条件が主要 branch に束縛されている度合い
