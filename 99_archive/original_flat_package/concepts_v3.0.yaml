      - stale artifact reuse lint
    archive_object:
      owns:
      - passport packet
      - reuse case archive
      - withdrawal notice archive
      - superseded artifact retention manifest
  forbidden_shortcuts:
  - passport なし artifact を third-party reusable と主張する
  - caveat を剥がした抜粋だけを downstream 配布する
  - superseded basis が出ても withdrawal notice を original recipient だけで止める
  residual_open_points:
  - scheduler federation remediation closure attestation / follow-up verification cadence / opinion refresh duty をどこまで registry 化するか
scheduler_federation_assurance_appeal_governance:
  status: provisional_fixed
  statement: scheduler_federation_assurance_appeal_governance とは、assurance appeal tribunal、restatement precedence、archive preservation order を束ねて federation assurance outcome の異議申立て、訂正序列、監査可能な保存義務を固定する規則である。
  core_claims:
  - appeal は単なる不満受付ではない。appeal standing、filing window、tribunal composition、conflict screen、record freeze を束ねなければ lawful review lane と呼べない。
  - restatement は自由作文ではない。admissible trigger、precedence ladder、superseded opinion order、recipient-visible correction ladder を固定しなければ旧 opinion と新 opinion の序列が壊れる。
  - archive preservation はバックアップ保存ではない。deletion hold、preservation window、access tier、hash chain を固定しなければ appeal 後の監査可能性を失う。
  - tribunal independence がない appeal は second-opinion shopping に堕ちる。review originator と利害関係のある reviewer は composition から排除しなければならない。
  - withdrawal と restatement は同義ではない。withdrawal は reliance stop を主目的とし、restatement は corrected basis の再提示を主目的とする。
  - DecisionLedger / GraphEngine / GraphLint / archive object は appeal registry、precedence evaluation、shortcut lint、preservation archive を分担する。
  assurance_appeal_tribunal:
    required_fields:
    - appeal_case_id
    - standing_class_ref
    - filing_window_ref
    - tribunal_composition_ref
    - conflict_screen_ref
    - admissibility_rule_ref
    - record_freeze_ref
    - accepted_at_or_null
    rules:
    - standing_class_ref のない appeal を admissible appeal と呼んではならない。
    - tribunal_composition_ref のない appeal tribunal を independent review body とみなしてはならない。
    - record_freeze_ref のない appeal を evidence-safe challenge lane と称してはならない。
  restatement_precedence:
