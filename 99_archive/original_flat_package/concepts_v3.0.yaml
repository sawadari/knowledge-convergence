  statement: scheduler_federation_constitutional_sunset_migration_governance とは、constitutional sunset scan、obsolete clause retirement、continuity migration packet を束ねて obsolete clause の退役と連続移行 packet を固定する規則である。
  core_claims:
  - constitutional sunset scan は名称だけでは足りない。scope、binding rule、authority、exception を束ねなければ federation 上位統治の拘束単位にならない。
  - obsolete clause retirement は連絡や慣習では足りない。trigger、participant set、procedure、window を束ねなければ lawful governance lane にならない。
  - continuity migration packet は印象評価では足りない。subject、threshold、effect scope、follow-up を束ねなければ reviewable constitutional outcome にならない。
  - constitutional sunset scan と obsolete clause retirement と continuity migration packet は分離して見えても、上位規範の binding・運用・評価を一体で閉じる。いずれかが欠けたまま federation-wide safe operation を主張してはならない。
  - local convenience を理由に federation-wide constitutional rule を省略してはならない。temporary handling を使う場合でも authority と rollback を残さなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は federation constitutional sunset and migration 管理責務を分担する。
  constitutional_sunset_scan:
    required_fields:
    - constitutional_sunset_scan_id
    - scope_ref
    - binding_rule_ref
    - authority_ref
    - exception_rule_ref
    - ratified_at_or_null
    rules:
    - scope_ref のない constitutional sunset scan を federation-wide bounded policy と呼んではならない。
    - binding_rule_ref のない constitutional sunset scan を executable constitutional rule とみなしてはならない。
    - authority_ref のない constitutional sunset scan を lawfully owned governance unit と称してはならない。
    residual_open_points:
    - scheduler federation constitutional stress test scenario / override drill attestation / recovery benchmark floor をどこまで registry 化するか
  obsolete_clause_retirement:
    required_fields:
    - obsolete_clause_retirement_id
    - trigger_ref
    - participant_set_ref
    - procedure_ref
    - deadline_or_window_ref
    - opened_at_or_null
    rules:
    - trigger_ref のない obsolete clause retirement を admissible governance procedure と呼んではならない。
    - procedure_ref のない obsolete clause retirement を repeatable federation lane とみなしてはならない。
    - deadline_or_window_ref のない obsolete clause retirement を bounded transition path と称してはならない。
    residual_open_points:
    - scheduler federation constitutional stress test scenario / override drill attestation / recovery benchmark floor をどこまで registry 化するか
  continuity_migration_packet:
    required_fields:
    - continuity_migration_packet_id
    - subject_ref
    - threshold_or_condition_ref
    - effect_scope_ref
    - rollback_or_followup_ref
    - issued_at_or_null
    rules:
    - subject_ref のない continuity migration packet を traceable constitutional check と呼んではならない。
    - threshold_or_condition_ref のない continuity migration packet を reviewable governance test とみなしてはならない。
    - effect_scope_ref のない continuity migration packet を bounded federation outcome と称してはならない。
    residual_open_points:
    - scheduler federation constitutional stress test scenario / override drill attestation / recovery benchmark floor をどこまで registry 化するか
  tool_responsibilities:
    DecisionLedger:
      owns:
      - constitutional sunset scan binding registry
      - obsolete clause retirement execution record
      - continuity migration packet outcome binding
      - federation constitutional sunset and migration decision trail
    GraphEngine:
      owns:
      - constitutional sunset scan rule evaluation
      - obsolete clause retirement procedure routing
      - continuity migration packet threshold judgement
      - federation constitutional sunset and migration state projection
    GraphLint:
      owns:
      - missing-constitutional_sunset_scan lint
      - missing-obsolete_clause_retirement lint
      - missing-continuity_migration_packet lint
      - unsafe-constitutional_sunset_migration shortcut lint
    archive_object:
      owns:
      - constitutional sunset scan archive
      - obsolete clause retirement witness bundle
      - continuity migration packet evidence pack
      - federation constitutional sunset and migration history archive
  forbidden_shortcuts:
  - constitutional sunset scan を authority なしで local convenience により差し替える
  - obsolete clause retirement を informal coordination だけで済ませる
  - continuity migration packet を threshold や follow-up なしで自動通過させる
  residual_open_points:
  - scheduler federation constitutional stress test scenario / override drill attestation / recovery benchmark floor をどこまで registry 化するか
