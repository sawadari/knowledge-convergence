  - continue / bounded_continue / terminate_or_escalate の3分類を採用した
  - review window, budget, risk/authority bound, allowed action 枯渇を終了条件へ接続した
- date: '2026-03-22'
  theme: ordered_fallback と weighted k_of_n を、route family の core ではなく拡張語彙としてどう分離するか
  result: ordered_fallback と weighted k_of_n を route family core から分離した
  detail:
  - core は any_of / k_of_n の離散 selection semantics に限定した
  - ordered_fallback を selection policy overlay とした
  - weighted k_of_n を route overlay とし、approval weighted quorum と混同しない方針を採用した
- date: '2026-03-22'
