  theme: weighted quorum や議決権重み付けを、approval structure の共通語彙へどこまで含めるか
  result: weighted quorum の core-vs-extension 境界を暫定固定した
  detail:
  - counting_basis, threshold_rule, mandatory_role_set, veto/abstention/timeout/tie_break, weighted_tally_profile_ref を core に残す方針を採用した
  - seat_weight_table_ref, apportionment_formula_ref, constituency snapshot などは extension registry に置く方針を採用した
  - weighted quorum は forum 内部 tally であり、peer conflict routing や accountability owner を置き換えない方針を採用した
- date: '2026-03-22'
  theme: joint approval と joint accountability の衝突を、同一 R でどう分離して追跡するか
  result: approval leg と accountability leg を同一 R 内で分離追跡する方針を暫定固定した
  detail:
  - approval 成立と accountability 充足を別判定にした
  - co-accountability は facet partition + residual owner 付きでのみ許す方針を採用した
  - forum/proxy/fallback approval を accountability owner へ暗黙移送しない方針を採用した
- date: '2026-03-22'
  theme: same-frame manual redesign action family の finer typing をどこまで共通語彙化するか
  result: same-frame manual redesign action family の core/extension 境界を暫定固定した
  detail:
  - 5つの core family だけを共通語彙化した
  - domain/tool 固有 subtype は extension registry に分離した
  - reframe / policy exception / role change は same-frame redesign から除外した
- date: '2026-03-22'
  theme: deliberate_exploration の option value と終了条件をどう半定量化するか
  result: deliberate_exploration の option value と termination rule を半定量化した
  detail:
