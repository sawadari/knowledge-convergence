design_intent:
- コア理論を公開仕様として読める短い正本へ再提示する
- 実装者向けに最小データ契約と JSON Schema を与える
- 準拠レベルを KC-E1 / KC-G1 / KC-D1 / KC-A1 として明確化する
- 理論コアと公開配布面を分ける
- 拡張論点と研究ログは引き続き補助層へ隔離する
- 02_supplements から公開配布しやすい補助論点だけを 06_public_annex として再編集する
- 自然言語入力を claim-ready packet へ上げるための言語解釈層を追加する
- 競合・多基準・由来・時相を扱う数学的 packet を追加する
- KC-L1 / KC-M1 / KC-M2 / KC-M3 を追加採用可能な発展プロファイルとして示す
- 証言・専門性・defeater を source quality 以上の正当化 packet として扱う
- 複数レビューの集約規則と dissent retention を明示する
- decision outcome を baseline / gate / artifact / ops feedback へ接続する
- 人の停止権・訓練完了・手動代替を状態として保持する
- 制度運用 annex packet 群に対する conformance suite と semantic validation rulebook を追加する
- 既存 institutional example と負例 test vector を用いた pass/warn/fail 付き適合試験を提供する
- SEシステム統合 annex を追加し、組織構造・人間系・AIエージェント運用へ接続する
