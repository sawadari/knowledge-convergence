title: 知識収束学_公開例示_v1
file_role: public_examples
version: 1
examples:
- example_id: ex_material_change_hold
  profile:
  - KC-E1
  - KC-G1
  - KC-A1
  scenario: 製造業の材質変更提案。試験根拠はあるが承認が未完了で hold になる。
  knowledge_state:
    state_id: ks_material_001
    G:
      claims:
      - claim_id: clm_change_material
        statement: 材質Xを材質Yへ変更する
      relations:
      - relation_id: rel_affects_strength
        from: clm_change_material
        to: test_strength
        type: affects
    C:
      scope: 製品A・ロットB
      intent: コスト低減
      horizon: 次回量産判定
    E:
      bindings:
      - claim_id: clm_change_material
        evidence_ref: ev_strength_test_2026_04_01
    V:
      target_ref: decision_material_change
      criteria:
      - id: crt_strength_ok
        kind: must
        description: 強度基準を満たす
      risk_tolerance:
        level: medium
        description: 安全性に影響しない範囲
    R:
      approval_authority:
        mode: all_of
        approver_set:
        - role_quality_manager
        - role_factory_manager
      execution_actor:
      - role_process_engineer
      outcome_accountability:
      - role_factory_manager
    H:
      events:
      - event_id: evt_001
        timestamp: '2026-04-11T10:00:00+09:00'
        actor_ref: role_process_engineer
        operation: propose_change
        outcome: hold
  decision_outcome:
    decision_context:
      target: decision_material_change
      alternatives:
      - alt_keep_x
      - alt_change_y
      decision_time: '2026-04-11T10:10:00+09:00'
      scope: 製品A・ロットB
    decision_outcome:
      epistemic_eval_state: 'true'
      governance_entry_state: eligible
      governance_eval_state: hold
      branch: hold
      primary_reason:
        reason_code: H4
        origin_ref: approval_role_factory_manager
        source_of_judgement: DecisionLedger
      rationale: 品質管理承認はあるが工場長承認が未了のため。
- example_id: ex_policy_update_execute
  profile:
  - KC-E1
  - KC-G1
  - KC-A1
  scenario: 社内手順書の軽微改定。根拠・承認・責任が揃って execute になる。
  knowledge_state:
    state_id: ks_policy_001
    G:
      claims:
      - claim_id: clm_update_review_cycle
        statement: レビュー周期を四半期ごとへ変更する
      relations:
      - relation_id: rel_updates_doc
        from: clm_update_review_cycle
        to: doc_quality_policy
        type: updates
    C:
      scope: 社内品質手順書
      intent: 運用改善
      horizon: 2026Q2
    E:
      bindings:
      - claim_id: clm_update_review_cycle
        evidence_ref: ev_audit_findings_q1
    V:
      target_ref: decision_policy_update
      criteria:
      - id: crt_no_regulatory_conflict
        kind: must
        description: 規制衝突がない
    R:
      approval_authority:
        mode: single
        approver_set:
        - role_quality_head
      execution_actor:
      - role_doc_controller
      outcome_accountability:
      - role_quality_head
  decision_outcome:
    decision_context:
      target: decision_policy_update
      alternatives:
      - alt_keep_current
      - alt_update_cycle
      decision_time: '2026-04-11T11:00:00+09:00'
      scope: 社内品質手順書
    decision_outcome:
      epistemic_eval_state: 'true'
      governance_entry_state: eligible
      governance_eval_state: 'true'
      branch: execute
      success_basis:
        basis_ref: approval_role_quality_head
        source_of_judgement: DecisionLedger
      rationale: 根拠、承認、責任、対象文書が束縛されており execute 可能。
  note: execute 例では primary_reason を informational placeholder として使うより、実装上は separate success_reason を追加してもよい。互換性のため core 語彙は維持する。
- example_id: ex_delegated_postcheck_rollback
  profile:
  - KC-E1
  - KC-G1
  - KC-D1
  - KC-A1
  scenario: 委任された自動更新が post-check fail により rollback へ分岐する。
  knowledge_state:
    state_id: ks_auto_001
    G:
      claims:
      - claim_id: clm_sync_catalog
        statement: 承認済み製品カタログを同期する
      relations:
      - relation_id: rel_syncs_catalog
        from: clm_sync_catalog
        to: catalog_prod
        type: syncs
    C:
      scope: 製品カタログ同期
      intent: 承認済み情報反映
      horizon: nightly_batch
    E:
      bindings:
      - claim_id: clm_sync_catalog
        evidence_ref: ev_approved_manifest_778
    V:
      target_ref: decision_catalog_sync
      criteria:
      - id: crt_only_approved_items
        kind: must
        description: 承認済み項目のみ反映
    R:
      approval_authority:
        mode: single
        approver_set:
        - role_catalog_owner
      execution_actor:
      - agent_catalog_sync
      outcome_accountability:
      - role_catalog_owner
      delegation_scope:
        policy_id: dp_catalog_sync_v1
        target_scope:
          target_ref: decision_catalog_sync
          operation_class: update
          scope: catalog_prod
          time_window: nightly
        guard_conditions:
          impact_cap: low
          reversibility_cap: reversible
          externality_cap: internal_only
          confidence_floor: high
        prohibited_conditions:
          auto_block: []
          escalate_required: []
        required_evidence:
          all_of:
          - ev_approved_manifest_778
        fallback_branch:
          post_check_fail: auto_rollback
          rollback_fail: force_escalate
        audit_obligation:
          log_level: full
          trace_required: true
          rationale_required: true
  decision_outcome:
    decision_context:
      target: decision_catalog_sync
      alternatives:
      - alt_sync
      - alt_skip
      decision_time: '2026-04-11T02:30:00+09:00'
      scope: catalog_prod
    decision_outcome:
      epistemic_eval_state: 'true'
      governance_entry_state: eligible
      governance_eval_state: 'true'
      branch: rollback
      primary_reason:
        reason_code: H5
        origin_ref: post_check_fail_mismatch
        source_of_judgement: DecisionLedger
      rationale: post-check で未承認項目混入が検出され、delegation policy に従い auto_rollback を実施。
