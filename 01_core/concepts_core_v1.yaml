  domain_validity_convergence:
    status: provisional_fixed_v1_1
    statement: ドメイン妥当性収束とは、K が対象ドメイン固有の成功条件、検証条件、運用条件、実効性条件へ接続され、そのドメインの用途で execute / hold / reject / escalate / rollback
      を判定できる状態である。
    formal_hint: K_d = project(K, domain_profile, domain_packets), C_d(K_d) ∈ {true, hold, false}
    domain_profile_examples:
    - SE_system_engineering_validity
    - medical_clinical_validity
    - legal_due_process_validity
    - financial_model_risk_validity
    - operations_human_factors_validity
    required_minimum:
    - domain_profile_id
    - target_ref
    - success_or_validity_criteria
    - verification_or_check_method
    - applicability_context
    - evidence_or_missing_marker
    - owner_role
    non_implications:
    - ドメイン妥当性収束は普遍的真理を意味しない
    - ドメイン妥当性収束は組織承認を置換しない
    - ドメイン妥当性収束は単一数値スコアに還元しない
  agent_execution_governance:
    status: provisional_fixed_v1_1
    statement: AI/agent は候補生成・批評・監視だけでなく、限定された実行主体 Ex になりうる。ただし、authority_envelope、tool_scope、data_scope、audit_obligation、stop_condition、rollback_path、owner_role、accountability_binding
      が未定義のまま execute へ進めてはならない。
    agent_role_classes:
      candidate_agent: 候補生成・抽出・ドラフト作成を行う。正本確定と対外コミットは既定で禁止する。
      critique_agent: 矛盾、欠落、SE Lint、リスクを検査する。最終裁定は既定で禁止する。
      execution_agent: コード編集、テスト実行、PR作成、外部ツール操作などを行う。authority_envelope と audit が必須である。
      guardian_agent: 他エージェントの出力・権限・失敗・逸脱を監視する。監視結果はR/Hへ接続する。
    core_rule: agent execution と outcome accountability を分離する。AI/agent は Ex になれても既定の Ac にはしない。
  meaningful_human_oversight:
    status: provisional_fixed_v1_1
    statement: 人間が形式的に介在するだけでは human oversight とはみなさない。人間が対象判断を理解し、止める権限を持ち、介入する時間的余裕があり、必要な訓練・代替経路・エスカレーション経路を持つとき、意味ある人間監督とみなす。
    minimum_dimensions:
    - role_scoped_explanation
    - stop_or_override_right
    - intervention_window
    - training_readiness
    - cognitive_load_budget
    - manual_fallback_or_no_fallback_justification
    - escalation_path
    - audit_visibility
    anti_pattern:
    - human_in_the_loop と書くだけで安全とみなす
    - 承認者に理解不能な要約だけを提示する
    - 停止権やrollback pathがないまま高リスク自動実行を許可する
    - 大量のagent行動を単一人間へ無制限に監視させる
  organization_topology:
    status: provisional_fixed_v1_1
    statement: 組織構造・役割・専門性・承認経路・サプライヤー境界・レビュー能力は、外部背景ではなくKのR/C/Hへ接続される一級要素である。
    minimum_units:
    - organization_node
    - role_id
    - decision_right
    - expertise_scope
    - accountability_scope
    - responsibility_scope
    - separation_of_duties
    - conflict_of_interest_status
    - review_capacity
    - escalation_route
    - supplier_or_external_boundary
    - backup_role
    core_rule: 専門家証言の資格 expertise_scope と、意思決定権 decision_right を混同してはならない。
  convergence_measurement:
    status: provisional_fixed_v1_1
    statement: 収束度は単一スカラーではなく、認識・統治・ドメイン妥当性・人間監督・エージェント委任・組織能力を含む複数指標で扱う。総合点で blocker を相殺してはならない。
    recommended_metrics:
    - evidence_coverage
    - trace_completeness
    - validation_readiness
    - verification_coverage
    - decision_reversibility
    - assumption_fragility
    - expert_review_coverage
    - agent_delegation_risk
    - human_oversight_effectiveness
    - organization_capacity_risk
    - change_impact_uncertainty
    blocking_rule: 重大 blocker がある次元は、他次元の高スコアで execute へ相殺してはならない。
axiom_candidates:
- id: A1
  statement: 生成は知識ではない
  status: provisional_fixed
  adoption_rule: 生成物そのものではなく、根拠・文脈・責任・履歴が束縛された知識状態だけを知識として扱うとき採用する。
  rejection_rule: 生成文や要約文を、監査可能性なしに知識へ短絡させる立場は採用しない。
  promotion_condition: knowledge 定義と knowledge_state の束縛要素へ直接接続できること。
  negative_examples:
  - 出典なし生成文
  - 責任主体未束縛の自動要約
  - 監査不能な候補文
- id: A2
  statement: 知識は静的保存物ではなく動的収束過程である
  status: provisional_fixed
  adoption_rule: 履歴 H、差戻し、再承認、expiry を同じ理論内で扱うため、知識を動的収束過程として捉えるとき採用する。
  rejection_rule: 文書保存をもって知識成立とみなし、更新・反証・差戻しを理論外へ追い出す立場は採用しない。
  promotion_condition: update_operator と H の更新履歴に接続できること。
  negative_examples:
  - 文書を保存しただけで知識成立とみなす状態
  - 古い根拠のまま再評価なしで運用継続する状態
- id: A3
  statement: AIは自己評価可能でなければ、複雑系で責任ある補助者になれない
  status: provisionally_resolved
  axiom_disposition: rejected_as_core_axiom
  retained_as: ai_governance_principle
  reason:
  - AIを前提とする設計原理であり、AIなしでも成立すべき理論全体の存在条件ではない。
  - ai_self_evaluation_model で扱う方が位置づけとして自然である。
  rejection_rule: AI固有制約を理論全体の中心公理へ持ち上げ、知識収束学をAI特化理論へ狭める場合は採用しない。
  promotion_condition: ai_self_evaluation_model と delegated execution の統治条件として formalization 側へ接続されること。
  negative_examples:
  - AI利用がない領域で理論の基礎が失効するとみなす立場
  - 自己評価機能の有無だけで責任主体の設計を置き換える立場
- id: A4
  statement: 人間は最終主体であり、AIは判断補助・候補生成・部分実行主体である
  status: provisional_fixed
  adoption_rule: 最終責任主体を人間または制度主体へ残しつつ、AIを判断補助・候補生成・部分実行へ限定するとき採用する。
  rejection_rule: AI出力を無署名のまま外部コミットさせ、責任主体を曖昧化する立場は採用しない。
  promotion_condition: DecisionLedger の approval / execution / accountability 分離と整合すること。
  negative_examples:
  - AI出力を無署名で外部コミットする状態
  - 責任主体不在の自動承認
- id: A5
  statement: 単一最適解より、説明可能で見直し可能な収束が重要である
  status: provisional_fixed
  adoption_rule: 単一最適解ではなく、説明可能で見直し可能な判断可能状態を収束の中心とみなすとき採用する。
  rejection_rule: 単一スコア最大化だけで採択し、非比較性や正当な非収束を潰す立場は採用しない。
  promotion_condition: convergence 定義と二層モデルに直接接続できること。
  negative_examples:
  - 単一スコア最大化だけで採択する状態
  - incomparability を潰して疑似的一意解を作る状態
knowledge_quality_dimensions:
- name: 構造閉包性
  status: provisional_fixed
  maps_to: q_structure
  meaning: 主要主張が制約・対象・他主張に接続されている度合い
- name: 文脈固定性
  status: provisional_fixed
  maps_to: q_context
  meaning: 対象範囲、時間・状況、目的・問いが主要主張に束縛されている度合い
- name: 根拠接続性
  status: provisional_fixed
  maps_to: q_evidence
  meaning: 主要主張に evidence_ref または正当化済み欠落マーカーが結び付いている度合い
- name: 矛盾管理性
  status: provisional_fixed
  maps_to: q_conflict
  meaning: 重大矛盾が除去、隔離、または管理対象化されている度合い
- name: 曖昧性管理性
  status: provisional_fixed
  maps_to: q_ambiguity
  meaning: 主要語、条件、範囲の曖昧性が解消または管理されている度合い
- name: 説明経路可用性
  status: provisional_fixed
  maps_to: q_explain
  meaning: 主要主張について claim→context→evidence→constraint の追跡経路を提示できる度合い
- name: 判断束縛性
  status: provisional_fixed
  maps_to: q_decision
  meaning: 決定対象、統治用文脈、採択基準、許容リスク、棄却条件、分岐条件が主要 decision target に束縛されている度合い
- name: 責任束縛性
  status: provisional_fixed
  maps_to: q_responsibility
  meaning: 承認主体、実行主体、結果責任主体、委任範囲、エスカレーション条件が主要 branch に束縛されている度合い
relation_to_existing_fields:
  language:
    contribution:
    - 意味
    - 語用論
    - 談話
    - 発話行為
    - 曖昧性分析
    limitation:
    - 実行責任と制度的承認を直接は扱いにくい
  ai:
    contribution:
    - 生成
    - 推論
    - 要約
    - 候補生成
    limitation:
    - 知識品質、責任、正本統制を自動では保証しない
  information_theory:
    contribution:
    - 関連情報の抽出
    - 圧縮と伝送の観点
    limitation:
    - 意味、価値、責任を直接扱わない
  mathematics:
    contribution:
    - 状態空間
    - 更新作用素
    - 固定点
    - 制約
    limitation:
    - 価値判断の内容は数理以外の層も必要
  mbse:
    contribution:
    - traceability
    - 要求から設計・検証への接続
    limitation:
    - 自然言語知識や設計理由の動的収束が弱い
novelty_claim:
  statement: '知識収束学の新規性は、知識を保存物ではなく収束状態として再定義し、 生成、意味、検査、価値、責任、統治を一つの知識状態遷移問題として扱う点にある。

    '
governance_manageability:
  status: provisional_fixed
  statement: 統治管理可能性とは、主要 decision target に関する決定条件、責任構造、承認、リスク、ポリシー制約が、重大/軽微/許容と修復可能性で分類され、同一 decision context 内で Eval_g(K_g)
    ∈ {true, hold, false} を判定できることである。
  issue_axes:
  - 'impact_class: major | minor | allowable'
  - 'management_status: managed | unmanaged'
  - 'repairability: repairable_in_frame | exception_path_available | reframe_required | unrecoverable_in_scope'
  decision_rule:
  - GC1=C_e(K_e)=true でなければ Eval_g は開始せず、認識側の Eval_e を優先する
  - q_decision と q_responsibility の両方が 2 以上でなければ C_g(K_g)=true にならない
  - H3/H4 は repairable_in_frame で resolution packet が完全なら Hold 候補になる
  - H5/H6 は mitigation, formal_waiver, valid_exception などの再開経路が定義されている場合だけ Hold 候補になる
  - reframe_required, approver_unassignable, lawful_exception_absent, unrecoverable_in_scope は false 側へ分岐する
  domain_calibration_policy:
    status: provisional_fixed
    statement: Q_g(K_g) は共通下位観点を保ちながら、domain profile ごとに blocker 条件、score 2 の成立条件、score 3 の強化条件を較正する。領域差は語彙分裂ではなく、適用下位観点と
      cap rule の差として扱う。
    shared_sub_dimensions:
      q_decision:
      - decision_context_binding
      - value_binding
      - risk_binding
      - branch_condition_binding
      q_responsibility:
      - approval_binding
      - execution_binding
      - accountability_binding
      - delegation_binding
      - escalation_binding
    applicability_rules:
    - delegation_binding は Ex に AI/agent または事前委任自動化が含まれる場合にだけ active とする
    - risk_binding は risk-bearing decision で active とする。organizational_or_social_domain で not_applicable を許すのは、pure clarification
      / reversible local analysis / internal option listing に限り、effect_zone・reversibility_class・reviewer/reflection_owner・reevaluation_trigger
      を伴う場合だけである
    - escalation_binding は high impact、branch-critical conflict、policy/risk exception path が必要な場合に active とする
    - active でない下位観点は min 集約から除外するが、not_applicable の根拠を残さなければならない
    dimension_effects:
      q_decision:
        decision_context_binding:
        - governance_context_gap
        - branch_undefined
        value_binding:
        - value_binding_gap
        - stakeholder_conflict_pending(contested_binding=priority_relation|veto_condition)
        risk_binding:
        - risk_overrun
        - value_binding_gap(risk_tolerance missing)
        - stakeholder_conflict_pending(contested_binding=risk_tolerance)
        branch_condition_binding:
        - branch_undefined
        - policy_violation(valid exception absent)
        - stakeholder_conflict_pending(branch-critical)
      q_responsibility:
        approval_binding:
        - responsibility_binding_gap(Ap)
        - approval_wait
        - approval_conflict
        execution_binding:
        - responsibility_binding_gap(Ex)
        - policy_violation(no lawful executor)
        accountability_binding:
        - responsibility_binding_gap(Ac)
        delegation_binding:
        - delegation_gap
        - required_evidence_missing_for_auto
        - self_confidence_below_floor
        escalation_binding:
        - escalation_gap
        - risk_overrun(no escalation path)
        - policy_violation(no exception authority)
        - stakeholder_conflict_pending(no adjudication authority)
    domain_profiles:
      regulated_domain:
        statement: 安全・法規・契約・対外約束・不可逆外部影響を含む領域。
        q_decision_profile:
          score_0_triggers:
          - required authority または lawful adjudication path のない branch-critical open conflict
          - 主要 target に required な risk_tolerance, veto_conditions, policy binding が欠落
          - release/compliance branch を左右する decision context が欠落
          score_2_minimum:
          - decision target, scope, decision_time, alternatives が束縛されている
          - A/L/X と required policy_ref が束縛されている
          - branch-critical conflict が不存在、または reflected 済みである
          - execute|hold|rollback|reject|escalate の境界が明示されている
          score_3_extra:
          - priority_relation P、exception path、review window、reflection trace が再利用可能な形で整備されている
          - numeric_support が evidence-backed であり、policy override に使えないことが機械可読に固定されている
        q_responsibility_profile:
          score_0_triggers:
          - Ap または Ac が未束縛
          - AI/agent を Ex に含むのに D がない
          - high impact branch なのに Esc または valid exception authority がない
          score_2_minimum:
          - 主要 branch に必要な Ap/Ex/Ac が role_id などで束縛されている
          - AI/agent 実行時には D が bound であり、禁止条件と required_evidence が記述されている
          - risk/policy breach 時の escalation path が束縛されている
          score_3_extra:
          - proxy, fallback role, SLA, segregation_of_duties が機械可読に整備されている
          - approval validity, waiver validity, exception expiry の失効条件が束縛されている
      engineering_tradeoff_domain:
        statement: must/veto を満たす範囲で性能・コスト・重量・消費電力などを比較する領域。
        q_decision_profile:
          score_0_triggers:
          - must/veto satisfaction が不明で admissible set を作れない
          - comparable set が定まらず主要 branch を選べない
          score_2_minimum:
          - comparable alternatives と local tradeoff boundary が定義されている
          - A/L/X が束縛され、risk owner が特定されている
          - non-branch-critical conflict は隔離され、case_ref が保持されている
          score_3_extra:
          - P_dom/P_indep と numeric_support の usage_mode が安定し、同型の比較に再利用できる
          - sensitivity note または再評価条件が明示されている
        q_responsibility_profile:
          score_0_triggers:
          - 主要 branch の Ap または Ac が欠落
          - AI/agent を Ex に含むのに D がない
          score_2_minimum:
          - decision owner, executor, outcome accountability, escalation threshold が束縛されている
          - reversible internal auto action には D と rollback owner がある
          score_3_extra:
          - proxy approval, fallback role, rollback owner, review SLA が機械可読に整備されている
          - tradeoff 再計算時の再承認条件が束縛されている
      organizational_or_social_domain:
        statement: 部門間利害、戦略、評判、運用変更など、人間裁定と未比較性が多い領域。
        q_decision_profile:
          score_0_triggers:
          - decision forum/owner または stakeholder map が欠落し、裁定の入口自体がない
          - branch-critical な価値衝突があるのに adjudication forum/path がない
          - accept/reject/hold の最低境界が欠落している
          score_2_minimum:
          - decision owner/forum, stakeholder positions, review window が束縛されている
          - 暫定の acceptance/reject/hold 条件が明示されている
          - 未解決 conflict は adjudication case と authority path を持つ
          - risk_binding が active な場合は、risk owner または review forum、harm surface、review window が束縛されている
          score_3_extra:
          - adjudication charter, reflection SLA, precedence archive, supersession rule が再利用可能に整備されている
          - 未比較 pair と比較禁止 pair の区別が運用ルールとして定着している
          - risk_binding=not_applicable を使う場合でも、audit packet と reevaluation trigger が再利用可能に整備されている
        q_responsibility_profile:
          score_0_triggers:
          - approver または accountability owner が欠落
          - role ambiguity により execution coordinator または communication owner を割り当てられない
          score_2_minimum:
          - approval forum, execution coordinator, accountability owner, escalation path が束縛されている
          - AI/agent は drafting/analysis など狭い D の内側に閉じている
          score_3_extra:
          - proxy authority, quorum, dissent logging, fallback chair が機械可読に整備されている
          - 裁定結果の reflection と周知責任が role まで束縛されている
    cross_check_rules:
    - branch-critical な open conflict は authority/path があっても q_decision を 1 以下に抑える
    - branch-critical な ratified だが未 reflected の case は全領域で q_decision を 1 以下に抑える
    - AI/agent を Ex に含むのに D がない場合、q_responsibility は 0 候補になる
    - regulated_domain で high impact branch なのに escalation path がない場合、q_responsibility は 0 候補になる
    - organizational_or_social_domain では、case_ref だけでは q_decision を 2 に上げず、authority path と review window を要する
    - mixed-domain な decision target は affected subdimension ごとに stricter profile を優先する
    non_implications:
    - domain profile を分けても q_decision / q_responsibility の語彙自体を別物にするわけではない
    - engineering_tradeoff_domain で numeric_support が強くても must/veto 欠落を相殺できない
    - organizational_or_social_domain で forum があるだけでは reflected outcome の代用にならない
    mixed_domain_composition_policy:
      status: provisional_fixed
      statement: mixed-domain target では profile を target 全体へ一括選択せず、各 subdimension と delegation facet ごとに applicable profile
        集合を求め、score=min、blocker=union、global cap=post-cap で合成する。
      algorithm:
      - 1. decision target を q_decision / q_responsibility の各 subdimension と delegation facet へ分解する。
      - 2. 各単位について criterion_domain, risk kind, authority type, operation class, externality, forum/adjudication binding から
        applicable profile 集合を作る。
      - 3. 各 subdimension の provisional score は applicable profile ごとの score 候補の min を採る。
      - 4. blocker family は applicable profile ごとに和集合で保持し、説明では dominant blocker と secondary blocker を分ける。
      - 5. branch-critical open conflict / unreflected ratification / missing lawful path などの global cap を最後に適用する。
      - 6. delegation_scope D は X_esc / X_auto の和集合と guard facet ごとの strictest bound で再評価する。
      local_override_rule:
      - local override は stricter 方向の精密化だけ許す。
      - regulated mandatory authority・policy gate・risk tolerance・X_esc を緩める override は無効である。
      - organizational adjudication は reflected 後にだけ authoritative binding へ昇格できる。
revision_note_v1_1:
  revised_on: '2026-05-08'
  reason: SEシステム統合後の理論レビューに基づき、二層収束を汎用三層収束へ拡張し、AI実行主体・意味ある人間監督・組織構造・計量指標をcore側に昇格した。
  compatibility: K=(G,C,E,V,R,H) と既存 branch 語彙は維持する。新規要素は domain_validity / oversight / organization / agent_execution / metrics
    の補助 packet として追加する。
