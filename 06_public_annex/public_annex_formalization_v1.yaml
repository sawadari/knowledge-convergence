title: 知識収束学_公開annex_形式補助束_v1
file_role: public_annex_formalization
package_role: public_annex_distribution
version: 1
status: curated_public_annex
created_on: '2026-04-11'
derived_from:
  package: knowledge_convergence_v1_public_spec_20260411
  source_file: ../../02_supplements/formalization_governance_supplement_v1.yaml
  selection_basis: 公開実装が参照しやすい formal surface を残しつつ、内部研究に偏る細密 parameter 群は raw supplement 側へ残した。
normativity:
  precedence: 01_core > 06_public_annex > 02_supplements
  default_role: annex は informative だが、public_spec_role=recommended_extension の項目は実装接続の標準候補として扱ってよい。
  non_override_rule: annex は 01_core の canonical notation と data contract を上書きしない。
selection_criteria:
- public spec の contract と schema へ自然接続できる formal fragment を優先した
- 重い migration chain・quota debt・bridge suite lifecycle などの内部寄り項目は raw supplement に残した
- state vocabulary、hold semantics、authority boundary、audit retention を重点対象にした
theme_index:
  authority_and_approval:
    label: 権限・承認・責任境界
    note: 公開仕様に載せやすい approval / delegation / accountability の数理側。
    included_entries:
    - ai_self_evaluation_model
    - action_coverage_model
    - registry_authority_delegation_model
    - approval_weighted_quorum_boundary_model
    - approval_accountability_split_model
  confidence_and_timing:
    label: 較正・時間制約・意味差分
    note: delegated execution の安全域と semantic delta の接続に関する形式面。
    included_entries:
    - self_confidence_calibration_model
    - semantic_delta_autoclassification_model
    - sla_clock_calibration_model
  audit_trace_and_disclosure:
    label: 監査・保持・公開境界
    note: traceability と disclosure を公開実装に載せるときの形式面。
    included_entries:
    - self_evaluation_audit_log_retention_model
    - identity_redaction_accountability_model
    - raw_signal_retention_model
    - legal_hold_reopen_custody_model
    - bounded_loss_summary_registry_model
  hold_semantics_and_state_vocab:
    label: Hold 意味論・状態語彙
    note: Hold の理由関係、positive state、探索継続を扱う形式面。
    included_entries:
    - latent_downstream_hold_promotion_model
    - hold_reason_relation_taxonomy_model
    - hold_reason_subtype_registry_model
    - positive_state_vocabulary_model
    - deliberate_exploration_option_value_model
  externality_and_extension_boundaries:
    label: 外部性と拡張境界
    note: route family extension と externality budget の形式境界。
    included_entries:
    - route_family_extension_boundary_model
    - externality_budget_numeric_calibration_model
public_annex_entries:
  authority_and_approval:
    ai_self_evaluation_model:
      label: AI 自己評価の委任境界
      public_spec_role: recommended_extension
      public_reader_note: AI は診断補助までは担えても、最終承認の既定責任主体にはしない。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#ai_self_evaluation_model
      status: provisional_fixed
      statement: AI自己評価は、主として認識収束側の診断と、統治収束に必要な欠落の指摘に限定して認める。最終的な統治承認そのものは原則として人間または事前委任された制度主体が担う。
      deferred_questions:
      - 自己評価監査ログの保存期間と要約粒度をどこまで共通化するか
    action_coverage_model:
      label: action coverage 判定
      public_spec_role: recommended_extension
      public_reader_note: plurality や open conflict の下で intended action を lawful に進められるかを判定する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#action_coverage_model
      status: provisional_fixed
      statement: action_coverage_model は、unresolved_plurality または open stakeholder conflict の下で current intended action a を lawful に進められるかを、coverage_basis と isolation_basis で判定する形式化である。
      public_surface:
        notation:
          frame: Φ = (decision_context_ref, target_ref, scope_ref, V_ref, R_ref, policy_refs, commitment_class)
          live_candidates: Λ(Φ) = 現在生存している candidate / split branch / coexistence branch の集合
          live_outcomes: Ω(Φ) = active conflict head case について ratifiable で lawful な outcome の集合
          affected_zone: Z(a) = action a が変更・拘束・外化する target / facet / effect の集合
          contested_zone: Δ(Φ) = 未裁定 plurality / conflict により binding が揺れている facet / authority / accountability / externality の集合
      public_rules:
        classification_rules:
          shared_core_conditions:
          - reflected coexistence / reflected split / scoped exploration charter / pre-bound route family のいずれかが、全 live branch で同一 action family を覆うこと
          - required authority, accountability family, rollback expectation が branch 間で一致すること
          - action 実行後も live branch set を減らさず、future adjudication / split / reflection path を閉じないこと
          intersection_safe_conditions:
          - affected zone が contested zone の外にあること、または live branch 間で identical invariant として registry / reflected rule により束縛されていること
          - shadow / sandbox / branch-local artifact の場合、authoritative state、public output、external commitment、irreversible resource lock に波及しないこと
          - rollback-contained と主張するなら、rollback packet、trigger、owner、verification window が束縛されていること
          uncovered_conditions:
          - shared_core 条件も intersection_safe 条件も満たさないこと
          - current action が conflict outcome または plural branch の少なくとも一部で unlawful / unaccountable / non-rollback-ready になること
          incomparable_coverage_conditions:
          - route mapping、facet alignment、registry conversion、scope alignment が ratified されておらず、coverage の空/非空を正当に判定できないこと
          - 未 reflected outcome や unratified mapping しか basis がないこと
      implementation_touchpoints:
        decision_ledger_minimal_schema_extension:
          fields:
          - intended_action_ref
          - intended_action_family
          - coverage_kind
          - coverage_basis_ref
          - isolation_basis_ref
          - affected_target_ref
          - affected_facet_ref
          - effect_zone_ref
          - branch_preserving_basis_ref
          - authority_basis_ref
        graph_engine_events:
        - action_coverage_bound
        - action_coverage_invalidated
        - action_executed_under_plurality
        - action_blocked_uncovered
        - action_escalated_for_coverage
        - action_coverage_expired
        - action_coverage_review_due
        - action_coverage_revalidated
      deferred_questions:
      - ratified 済みだが未 reflected の outcome を provisional coverage としてどこまで許すか
      - dominance_only mapping と monotone strengthening action の境界をどこまで形式化するか
    registry_authority_delegation_model:
      label: registry authority delegation
      public_spec_role: recommended_extension
      public_reader_note: authority tier と protected facet に応じた required authority を定める。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#registry_authority_delegation_model
      status: provisional_fixed
      statement: registry_authority_delegation_model は、route mapping / strengthening / canonical registry entry に対する review・ratification・activation・supersession・revoke の required authority tier と SLA breach 分岐を、protected facet と blast radius に基づいて形式化するモデルである。
      public_surface:
        notation:
          registry_artifact: ρ = (artifact_id, artifact_class, identity_ref, scope_ref, template_ref, semantic_delta_class, blast_radius_class, protected_facet_ref, lineage_ref, status)
          authority_tier: Τ ∈ {central_authority, domain_authority, delegated_reviewer}
          action_class: α ∈ {propose, review, ratify, activate, revalidate, supersede, emergency_suspend, revoke, reject}
          protected_facet_set: Π(ρ) = {semantic_family, counting_basis, exclusivity, effect_zone, authority_path, accountability_family, rollback_expectation}
          blast_radius_class: B(ρ) ∈ {template_local, domain_local, cross_domain, global_default}
          required_tier: ReqTier(ρ,α) = current artifact と action α に対して必要な最小 authority tier
          delegated_admissible: DelOK(ρ,α)=true iff α∈{review, activate, revalidate, emergency_suspend} ∧ B(ρ)∈{template_local, domain_local} ∧ semantic_delta_class(ρ)=none ∧ ProtectedInvariant(ρ)=true ∧ LineageComplete(ρ)=true
          predecessor_safe: PredSafe(ρ,t)=true iff predecessor entry が active かつ current action を lawful に覆う
          sla_clock: SLA(ρ,α) = (submitted_at, due_at, breached_at, confirmation_due_at)
          emergency_suspended: ES(ρ,t)=true iff emergency_suspend event が出ており、confirm / release / revoke のいずれも未完了
      public_rules:
        axioms:
        - ReqTier(ρ,α)=central_authority となるのは、cross_domain または global_default の artifact、あるいは semantic family・counting_basis・exclusivity・effect_zone・authority_path・accountability_family・rollback_expectation のいずれかを non-preserving に変更する action である。
        - ReqTier(ρ,α)=domain_authority となるのは、existing canonical core と ratified template を用い、protected facet を保存したまま domain-local scope で ratify / activate / supersede / revoke する action である。
        - ReqTier(ρ,α)=delegated_reviewer を許すのは、review、template-bound activation、same identity / same scope revalidation、および provisional emergency suspend だけである。
        - ratified だが未 activated / 未 reflected の artifact は authoritative reliance basis ではなく、ProspectiveRel(ρ,t)=false とみなす。
        - ES(ρ,t)=true の間、当該 artifact に依拠する prospective action は停止し、confirm / release / revoke が confirmation_due_at までに完了しなければ breach 扱いとする。
        - SLA breach は silent extension を許さず、PredSafe(ρ,t)、same-frame remedy、upper authority path、decision deadline の交差で hold / escalate / false を返す。
        sla_baseline:
          delegated_review_business_days: 2
          domain_ratification_business_days: 5
          central_ratification_business_days: 10
          activation_or_reflection_business_days: 2
          emergency_suspend_confirmation_business_days: 1
          override_rule: profile override は baseline を短縮または厳格化する方向にだけ許す。single_branch / external irreversible / policy-sensitive change のために緩めてはならない。
        tier_rules:
          central_authority:
            required_when:
            - cross-domain conversion rule または canonical route core の新設・変更
            - semantic facet / counting_basis / exclusivity の再解釈
            - authority/accountability/rollback expectation の再束縛
            - global default strengthening family の導入・変更
            - 複数 domain を横断する revoke / supersession dispute
          domain_authority:
            allowed_when:
            - 既存 canonical registry を参照し protected facet を保存する domain-local route mapping
            - central ratified template の範囲内にある domain-local strengthening rule
            - same identity かつ same or narrower scope の canonical registry successor entry
            - domain scope 内の final revoke
            forbidden_when:
            - cross-domain conversion rule の新設
            - global canonical core の変更
            - authority/accountability rebinding
            - rollback expectation の弱化
            - external irreversible commitment を default 許容する緩和
          delegated_reviewer:
            allowed_when:
            - evidence completeness / scope fit / invariance witness / lineage 整合の review
            - pre-ratified template と zero semantic delta を満たす entry の activation
            - same identity・same scope・no revocation trigger の revalidation
            - suspected leak / authority drift / semantic mismatch / policy contradiction に対する provisional emergency suspend
            forbidden_when:
            - 新規 semantic rule の ratification
            - final revoke の単独確定
            - cross-domain / global_default artifact の supersession
            - unregistered convention を lawful basis として承認すること
      implementation_touchpoints:
        decision_ledger_schema_extension:
          fields:
          - artifact_id
          - artifact_class
          - authority_tier
          - delegation_charter_ref
          - template_ref
          - scope_ref
          - protected_facet_ref
          - blast_radius_class
          - lineage_ref
          - ratification_basis_ref
        graph_engine_events:
        - registry_review_started
        - registry_review_due
        - registry_review_breached
        - registry_ratified
        - registry_activated
        - registry_superseded
        - registry_emergency_suspended
        - registry_suspend_confirmed
        - registry_suspend_released
        - registry_revoked
      guardrails:
        breach_branch_rules:
          hold:
          - PredSafe(ρ,t)=true かつ same-frame で review / ratification / activation / confirmation を完了できる
          - emergency suspend 中だが confirmation path が生きており、risk containment が維持されている
          escalate:
          - same-frame では解決できないが upper authority path がある
          - predecessor は失効または不十分だが、lawful successor / confirmation の上位経路がある
          'false':
          - PredSafe(ρ,t)=false かつ upper authority path も absent
          - decision deadline の不可逆 breach または safety / policy constraint により current frame を継続できない
      deferred_questions:
      - profile/context ごとの aggregation window と hard expiry を SLA clock とどう接続するか
    approval_weighted_quorum_boundary_model:
      label: weighted quorum boundary
      public_spec_role: recommended_extension
      public_reader_note: 加重承認の最小 tally semantics を定める。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#approval_weighted_quorum_boundary_model
      status: provisional_fixed
      statement: weighted quorum は approval structure の core tally semantics と extension registry detail を分離して形式化する。
      public_surface:
        notation:
          Q_core: (eligible_voting_set_ref, counting_basis, threshold_rule, mandatory_role_set, veto_rule, abstention_rule, timeout_rule, tie_break_rule, weighted_tally_profile_ref_or_null)
          W_ext: (seat_weight_table_ref, apportionment_formula_ref, constituency_snapshot_ref, reapportionment_trigger, supermajority_profile_ref, minority_protection_profile_ref)
      public_rules:
        boundary_rules:
        - counting_basis=seat_weight -> weighted_tally_profile_ref_or_null ≠ null
        - mandatory_role_set and blocking veto are evaluated before tally success
        - observer/auditor seats are excluded from voting weight and veto class
        - W_ext changes do not rewrite authority family or accountability owner
        routing_boundary: weighted quorum decides forum-internal tally; peer-level conflict routing remains governed by same-tier conflict rules
    approval_accountability_split_model:
      label: approval / accountability split
      public_spec_role: recommended_extension
      public_reader_note: approval leg と accountability leg の別管理を形式化する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#approval_accountability_split_model
      status: provisional_fixed
      statement: 同一 responsibility object R では approval leg と accountability leg を別系列で形式化し、Approve(R)=true と Accountable(R)=true を独立に評価する。
      public_surface:
        notation:
          R: (resp_id, target_ref, effect_zone_ref, A_leg, C_leg, state)
          A_leg: A = (approval_case_id, A_p^+, approval_outcome_ref, validity_window, invalidation_rule_ref, approval_event_refs)
          C_leg: C = (accountable_facet_set, primary_owner, co_owner_partition_or_null, residual_owner, rollback_owner, reflection_owner, liability_window, transfer_rule_ref)
          Approve(R,t): true iff approval outcome is fulfilled and valid at t
          Accountable(R,t): true iff every committed facet in effect_zone_ref has exactly one primary owner or an explicit partition cover with residual owner at t
      public_rules:
        axioms:
        - Approve(R,t)=true does not imply Accountable(R,t)=true.
        - Accountable(R,t)=true does not imply Approve(R,t)=true.
        - joint approval may be represented in A_p^+; joint accountability is valid only when accountable_facet_set is explicitly partitioned and residual_owner is bound.
        - approval expiry / invalidation changes A_leg state but does not silently rewrite C_leg.
        - accountability transfer is a separate event; it never occurs by approval majority alone.
        classification_rules:
          execute_ready: Approve(R,t)=true and Accountable(R,t)=true
          approval_accountability_split_gap: Approve(R,t)=true and Accountable(R,t)=false
          approval_wait: Approve(R,t)=false and Accountable(R,t)=true
          dual_gap: Approve(R,t)=false and Accountable(R,t)=false
        well_formedness_rules:
        - commitment-sensitive facet ごとに primary_owner が一意であるか、co_owner_partition_or_null が facet cover を持ち residual_owner を持つこと。
        - rollback_owner と reflection_owner は target の effect_zone が rollback / explanation を伴う場合に必須である。
        - forum verdict, proxy approval, fallback approval は approval_event_refs にだけ入り、C_leg owner field へ暗黙流入してはならない。
  confidence_and_timing:
    self_confidence_calibration_model:
      label: 自己信頼度較正
      public_spec_role: recommended_extension
      public_reader_note: delegated execution の完了見込みを保守的に推定する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#self_confidence_calibration_model
      status: provisional_fixed
      statement: calibrated self-confidence は、固定された stratum σ の下で delegated execution を安全に完了できる見込みを、現在条件と事後観測履歴から保守的に推定する統治用量である。真理値でも承認代替でもない。
      public_surface:
        notation:
          stratum: σ = (γ, op, ic, ext, rev, ev_cls, ctx_cls)
          factor_vector: S_conf(a,t,σ) = (c_ev, c_fr, c_cf, c_ctx, c_rb, c_hist)
          base_confidence: Conf_base(a,t,σ) = min_app S_conf(a,t,σ)
          calibrated_confidence: Conf*(a,t,σ) = max(0, Conf_base(a,t,σ) - p_miscal(a,σ) - p_shift(a,t,σ))
          confidence_ready: CR(a,t,σ) = true iff Conf*(a,t,σ) >= F(γ, op, ic, ext, rev) and B_conf(a,t,σ)=false
      public_rules:
        branch_rules:
        - Conf* < F かつ lawful manual path がある場合は human_approval_required
        - Conf* < F かつ lawful manual path がない場合は force_escalate
        - Conf* >= F でも B_conf=true または X_auto/X_esc active なら conditional_auto に進めない
        - cold start または severe shift の場合は、既定で human_approval_required とし、regulated_domain では delegated auto を許さない
        factor_semantics:
          c_ev: required_evidence の completeness / authority / availability を 0..1 へ写像した値
          c_fr: freshness rule と reflection rule を満たしている度合い
          c_cf: critical disputed evidence や branch-critical open conflict がない度合い
          c_ctx: decision context, approval validity, policy context が失効していない度合い
          c_rb: rollback obligation がある場合に rollback path / owner / trigger / verification が有効である度合い。rollback 不要な operation では 1 を置く
          c_hist: 同一 stratum における過去成功率の lower confidence bound またはそれに準ずる保守値
        penalty_terms:
          p_miscal: raw self-report と実績の乖離が継続したときに課す miscalibration penalty
          p_shift: out-of-profile, cold start, evidence distribution shift, policy version change に対する penalty
        blocker_overrides:
        - critical disputed evidence がある場合は CR=false
        - branch-critical open conflict または ratified だが未 reflected の critical case がある場合は CR=false
        - approval_validity_live=false で lawful renewal path もない場合は CR=false
        - rollback_required なのに rollback_ready=false の場合は CR=false
        - out_of_scope または lawful_exception_required は confidence とは別に X_esc として処理し、conditional_auto を禁止する
      guardrails:
        non_implications:
        - Conf* は truth probability ではない
        - Conf* は V や R の未束縛を埋めない
        - 高い c_hist は現在の evidence/freshness/context 欠落を相殺しない
        - rollback_success は無条件の success と同一視しない
    semantic_delta_autoclassification_model:
      label: semantic delta 形式化
      public_spec_role: recommended_extension
      public_reader_note: 変更の semantic class を downstream binding と invariant witness に接続する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#semantic_delta_autoclassification_model
      status: provisional_fixed
      statement: semantic_delta_autoclassification_model は、shared prompt / template 変更を canonical normalization・execution replay・downstream binding・protected invariant の witness で安全側に分類し、semantic delta class を hidden coupling、prior reset、burst taxonomy、penalty gate へ束縛する形式モデルである。
      public_surface:
        notation:
          delta_case: δ = (delta_case_id, source_family, old_artifact_ref, new_artifact_ref, relation_ref, facet_scope_ref, detector_scope_ref, profile_ref, context_ref, state)
          semantic_delta_class: Δ_auto(δ,β) ∈ {none, bounded, material, unresolved}
          lineage_integrity: LinOK(δ)=true iff parent / lineage_root / execution_capsule / witness_ref が束縛される
          normalized_equivalence: NormEq(δ)=true iff canonical normalization 後に executing token graph・schema binding・routing primitive が同型である
          protected_invariant: InvOK(δ,β)=true iff protected facet β に対する benchmark / golden replay / branch outcome が許容域内に留まる
          downstream_equivalence: DownEq(δ,β)=true iff β に対する required schema keys、sink / audience、evidence / authority / route binding が不変である
          scoped_downstream_change: ScpDown(δ)=true iff downstream binding change が ratified affected facet set 内に閉じ、review owner と rollback path が束縛される
          facet_map_ratified: FacRat(δ)=true iff affected facet set と blast radius が ratified mapping / equivalence envelope で束縛される
          control_semantic_change: CtrlChg(δ,β)=true iff β 上で threshold / comparator / veto / escalation / routing / sink / evidence / requiredness / authority / confirm-release logic のいずれかが変化する
          benchmark_material_drift: BenchMat(δ,β)=true iff replay / golden set で β の protected outcome difference が許容域を超える
          multi_source_confound: MultiSrc(δ)=true iff prompt / template / rulepack / checkpoint の joint change で artifact 別寄与を分離できない
          witness_conflict: WitConflict(δ)=true iff NormEq / InvOK / DownEq / CtrlChg の判定が矛盾する
      public_rules:
        classification_rules:
          none:
            predicate: Δ_auto(δ,β)=none iff LinOK(δ) ∧ NormEq(δ) ∧ InvOK(δ,β) ∧ DownEq(δ,β) ∧ ¬CtrlChg(δ,β)
            consequences:
            - parameterized_variant / inherited_bundle に対しても β 上は corroboration increment = 0 とする
            - lineage が連続する限り、affected β の prior reset は不要である
          bounded:
            predicate: Δ_auto(δ,β)=bounded iff LinOK(δ) ∧ FacRat(δ) ∧ ScpDown(δ) ∧ ¬BenchMat(δ,β) ∧ ¬MultiSrc(δ) ∧ ¬WitConflict(δ) ∧ Δ_auto(δ,β)≠none ∧ β が ratified affected facet set に含まれる
            consequences:
            - affected β では corroboration increment = 0、triage metadata は bounded 扱いとする
            - unaffected protected facet β' については warmed calibration を維持できる
          material:
            predicate: Δ_auto(δ,β)=material iff LinOK(δ) ∧ [CtrlChg(δ,β) ∨ BenchMat(δ,β) ∨ (¬ScpDown(δ) ∧ β に downstream branch 影響)]
            consequences:
            - affected β の operational stratum は sparse 以下へ巻き戻す候補とする
            - pre/post artifact を独立 corroboration route に数えない
          unresolved:
            predicate: Δ_auto(δ,β)=unresolved iff ¬LinOK(δ) ∨ MultiSrc(δ) ∨ WitConflict(δ) ∨ [protected β に触れる ∧ ¬FacRat(δ)] ∨ witness set 不足
            consequences:
            - affected β の prior_ready_flag = false 候補とし、manual review required 候補を立てる
            - lawful burst witness には使わない
      implementation_touchpoints:
        decision_ledger_schema_extension:
          fields:
          - semantic_delta_class
          - delta_case_id
          - delta_witness_ref_set
          - affected_facet_set
          - affected_detector_family_set
          - protected_invariant_result
          - downstream_binding_diff_class
          - scoped_prior_reset_reason
          - manual_review_required_by_delta
        graph_engine_events:
        - semantic_delta_classified
        - semantic_delta_reclassified
        - delta_witness_bound
        - protected_invariant_failed
        - scoped_prior_reset_triggered
        - burst_taxonomy_degraded_by_delta
    sla_clock_calibration_model:
      label: SLA clock 形式化
      public_spec_role: recommended_extension
      public_reader_note: profile と context override で monotone に deadline を較正する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#sla_clock_calibration_model
      status: provisional_fixed
      statement: sla_clock_calibration_model は、registry artifact の delegated review・required-tier ratification・activation・emergency confirmation に対する due clock を、profile baseline と context override cap の strictest min によって形式化し、silent extension を禁止したまま breach branch を返すモデルである。
      public_surface:
        notation:
          profile: π ∈ {regulated, engineering_tradeoff, organizational_or_social}
          context_override: ω ∈ {single_branch, external_irreversible, policy_sensitive}
          artifact_class: αc ∈ {route_mapping_rule, strengthening_rule, canonical_registry_entry}
          clock_kind: κ ∈ {delegated_review_due, domain_ratification_due, central_ratification_due, activation_due, emergency_confirmation_due}
          active_contexts: Ω ⊆ {single_branch, external_irreversible, policy_sensitive}
          base_clock: Base(π,αc,κ) = profile π における artifact_class αc と clock_kind κ の baseline duration
          override_cap: Cap(ω,αc,κ) = context override ω が課す strictest upper bound
          effective_clock: Eff(π,Ω,αc,κ)=min({Base(π,αc,κ)} ∪ {Cap(ω,αc,κ) | ω∈Ω})
          ratification_clock: RatEff(ρ,π,Ω)=if ReqTier(ρ,ratify)=domain_authority then Eff(π,Class(ρ),domain_ratification_due) else Eff(π,Class(ρ),central_ratification_due)
          review_due_at: RevDueAt(ρ)=submitted_at(ρ)+Eff(Profile(ρ),Ctx(ρ),Class(ρ),delegated_review_due)
          ratification_due_at: RatDueAt(ρ)=ratification_submitted_at(ρ)+RatEff(ρ,Profile(ρ),Ctx(ρ))
          activation_due_at: ActDueAt(ρ)=ratified_at(ρ)+Eff(Profile(ρ),Ctx(ρ),Class(ρ),activation_due)
          confirmation_due_at: ConfDueAt(ρ)=suspended_at(ρ)+Eff(Profile(ρ),Ctx(ρ),Class(ρ),emergency_confirmation_due)
          breach: Br(ρ,κ,t)=true iff due_at(ρ,κ) ≤ t ∧ terminal_event_absent(ρ,κ,t)
          predecessor_safe: PredSafe(ρ,t)=true iff predecessor entry が active かつ current action を lawful に覆う
          suspend_blocked: SuspBlocked(ρ,t)=true iff ES(ρ,t)=true ∧ affected prospective reliance が停止済み
          upper_path_alive: UpPath(ρ,t)=true iff upper authority または lawful cross-forum confirmation path が生存
          breach_branch: BB(ρ,t) ∈ {hold, suspend_confirm, escalate, false}
      public_rules:
        axioms:
        - Ω₁ ⊆ Ω₂ ならば Eff(π,Ω₂,αc,κ) ≤ Eff(π,Ω₁,αc,κ) とする。override は短縮または同値維持にだけ働く。
        - reviewer 不在、forum 都合、batch 待ち、手戻り整理中は Cap を緩和する根拠にならない。
        - due clock を再起動できるのは lawful successor artifact、explicit reframe、または required tier への正式 handoff event だけであり、silent extension は許さない。
        - emergency suspend は prospective reliance を停止するが、confirm / release / revoke / supersede のいずれかが completion するまで ordinary hold に格下げしない。
        - activation_due の breach 中に external / authoritative / branch-critical action を prospective reliance へ使ってはならない。
        baseline_table:
          regulated:
            route_mapping_rule:
              delegated_review_due: BD(1)
              domain_ratification_due: BD(3)
              central_ratification_due: BD(5)
              activation_due: BD(1)
              emergency_confirmation_due: HR(4)
            strengthening_rule:
              delegated_review_due: BD(1)
              domain_ratification_due: BD(2)
              central_ratification_due: BD(4)
              activation_due: HR(4)
              emergency_confirmation_due: HR(4)
            canonical_registry_entry:
              delegated_review_due: HR(4)
              domain_ratification_due: BD(1)
              central_ratification_due: BD(2)
              activation_due: HR(4)
              emergency_confirmation_due: HR(2)
          engineering_tradeoff:
            route_mapping_rule:
              delegated_review_due: BD(2)
              domain_ratification_due: BD(5)
              central_ratification_due: BD(10)
              activation_due: BD(2)
              emergency_confirmation_due: BD(1)
            strengthening_rule:
              delegated_review_due: BD(2)
              domain_ratification_due: BD(4)
              central_ratification_due: BD(7)
              activation_due: BD(1)
              emergency_confirmation_due: BD(1)
            canonical_registry_entry:
              delegated_review_due: BD(1)
              domain_ratification_due: BD(3)
              central_ratification_due: BD(5)
              activation_due: BD(1)
              emergency_confirmation_due: BD(1)
          organizational_or_social:
            route_mapping_rule:
              delegated_review_due: BD(3)
              domain_ratification_due: BD(7)
              central_ratification_due: BD(12)
              activation_due: BD(2)
              emergency_confirmation_due: BD(1)
            strengthening_rule:
              delegated_review_due: BD(2)
              domain_ratification_due: BD(5)
              central_ratification_due: BD(8)
              activation_due: BD(2)
              emergency_confirmation_due: BD(1)
            canonical_registry_entry:
              delegated_review_due: BD(2)
              domain_ratification_due: BD(4)
              central_ratification_due: BD(6)
              activation_due: BD(1)
              emergency_confirmation_due: BD(1)
      implementation_touchpoints:
        decision_ledger_schema_extension:
          fields:
          - sla_profile
          - active_context_override_set
          - artifact_class
          - required_authority_tier
          - delegated_review_due_at
          - ratification_due_at
          - activation_due_at
          - emergency_confirmation_due_at
          - effective_sla_rule_ref
          - predecessor_safe
        graph_engine_events:
        - sla_override_applied
        - delegated_review_due_reached
        - ratification_due_reached
        - activation_due_reached
        - emergency_confirmation_due_reached
        - breach_branch_selected
        - suspend_confirm_entered
        - suspend_confirm_confirmed
        - suspend_confirm_released
      guardrails:
        breach_branch_rules:
          hold: BB(ρ,t)=hold iff PredSafe(ρ,t)=true ∧ SameFrameComplete(ρ,t)=true ∧ ES(ρ,t)=false
          suspend_confirm: BB(ρ,t)=suspend_confirm iff ES(ρ,t)=true ∧ SuspBlocked(ρ,t)=true ∧ UpPath(ρ,t)=true
          escalate: BB(ρ,t)=escalate iff SameFrameComplete(ρ,t)=false ∧ UpPath(ρ,t)=true
          'false': BB(ρ,t)=false iff PredSafe(ρ,t)=false ∧ UpPath(ρ,t)=false
      deferred_questions:
      - profile/context ごとの aggregation window と hard expiry を SLA clock とどう接続するか
  audit_trace_and_disclosure:
    self_evaluation_audit_log_retention_model:
      label: 自己評価監査ログ retention
      public_spec_role: recommended_extension
      public_reader_note: event schema、detail tier、retention bucket を定める。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#self_evaluation_audit_log_retention_model
      status: provisional_fixed
      statement: self_evaluation_audit_log_retention_model は、semantic delta class・hidden coupling・prior reset・burst taxonomy・override judgement の自己評価を、再監査・再較正できる最小 event schema、detail tier、retention bucket、tool 別正本責務として形式化するモデルである。
      public_surface:
        objects:
          audit_event: a=(id, fam, subj, prof, ctx, facet, pol, cap, wit, out, br, auth, par, t)
        vocabularies:
          event_family:
          - registry_snapshot
          - evaluation_run
          - witness_binding
          - override_review
          - branch_transition
          - recalibration_feedback
          detail_tier:
          - full_witness
          - summary_with_repro_capsule
          - archive_digest
          - purge_eligible_digest
          retention_bucket:
          - normative_permanent
          - audit_long
          - audit_medium
          - summary_short
      public_rules:
        invariants:
        - PurgeOK(a)=true なら、RetBucket(a) ≠ normative_permanent かつ LHold(a)=false でなければならない。
        - Final(a)=true または Ovrd(a)=true の event を summary_short へ落としてはならない。
        - Prot(a)=true かつ [MatUnres(a) ∨ Reset(a)] の event は少なくとも audit_long でなければならない。
        - branch_effect を変える event が GraphLint にしか存在しない状態を許してはならない。branch_effect が非自明なら GraphEngine または DecisionLedger に linked event が必要である。
        canonical_minimum_fields:
        - event_id
        - event_family
        - event_time
        - tool_owner
        - subject_ref
        - profile
        - context_class
        - policy_bundle_ref
        detail_tier_assignment:
          full_witness:
            predicate: FullReq(a)=true iff Prot(a) ∨ Ovrd(a) ∨ Final(a) ∨ MatUnres(a) ∨ HardCpl(a) ∨ Reset(a) ∨ AdvBurst(a)
          summary_with_repro_capsule:
            predicate: SumCap(a)=true iff ¬FullReq(a) ∧ Benign(a) ∧ ReproOK(a)
          archive_digest:
            predicate: ArchReq(a)=true iff [Final(a) ∨ Ovrd(a) ∨ threshold_review_relevant(a) ∨ postmortem_relevant(a)] and case_closed(a)=true
          purge_eligible_digest:
            predicate: PurgeOK(a)=true iff SumCap(a) ∧ non_normative(a)=true ∧ CanonMinFixed(a)=true ∧ LHold(a)=false
        bucket_assignment_rules:
          normative_permanent:
            predicate: RetBucket(a)=normative_permanent iff Final(a) ∨ Ovrd(a) ∨ registry_ratification(a)=true ∨ LHold(a)=true
          audit_long:
            predicate: RetBucket(a)=audit_long iff RetBucket(a)≠normative_permanent and [Prot(a) ∨ MatUnres(a) ∨ HardCpl(a) ∨ Reset(a) ∨ AdvBurst(a)]
          audit_medium:
            predicate: RetBucket(a)=audit_medium iff RetBucket(a)∉{normative_permanent,audit_long} and [threshold_review_relevant(a) ∨ replay_comparison_relevant(a) ∨ bounded_change(a)=true]
          summary_short:
            predicate: RetBucket(a)=summary_short iff RetBucket(a)∉{normative_permanent,audit_long,audit_medium}
        retention_table:
          normative_permanent:
            full_witness_hot: permanent
            archive_retention: permanent
            purge_rule: never
          audit_long:
            regulated:
              full_witness_hot: 365d
              archive_retention: 7y
            engineering_tradeoff:
              full_witness_hot: 180d
              archive_retention: 3y
            organizational_or_social:
              full_witness_hot: 90d
              archive_retention: 2y
          audit_medium:
            regulated:
              full_witness_hot: 180d
              archive_retention: 3y
            engineering_tradeoff:
              full_witness_hot: 90d
              archive_retention: 1y
            organizational_or_social:
              full_witness_hot: 30d
              archive_retention: 180d
          summary_short:
            regulated:
              full_witness_hot: 30d
              archive_retention: 1y
            engineering_tradeoff:
              full_witness_hot: 14d
              archive_retention: 180d
            organizational_or_social:
              full_witness_hot: 7d
              archive_retention: 90d
      implementation_touchpoints:
        tool_projection:
          decision_ledger_store:
            predicate: Store_DL(a)=true iff fam(a) in {registry_snapshot, override_review} or Final(a)=true or LHold(a)=true
          graph_engine_store:
            predicate: Store_GE(a)=true iff fam(a) in {evaluation_run, branch_transition, recalibration_feedback} or retention timer is attached
          graphlint_store:
            predicate: Store_GL(a)=true iff fam(a) in {evaluation_run, witness_binding} and diagnostic trace is derivable or replay-supporting
      guardrails:
        context_override_rules:
          tighten_only_contexts:
          - external_irreversible
          - policy_sensitive
          - public_exposure
          - safety_critical
          shortening_admissible_contexts:
          - sandbox_internal
          - branch_local_nonbinding
          - template_local_review
          rules:
          - tighten_only_contexts では bucket を短縮してはならない
          - shortening_admissible_contexts でも Prot(a)=false かつ Ovrd(a)=false の場合に限り 1 bucket だけ短縮できる
          - LHold(a)=true の event は retention / purge clock を停止する
      deferred_questions:
      - bridge packet の cryptographic shape をどこまで formal parameter 化するか
      - execution capsule binary と manifest/hash の canonical archive object 境界
      - duplicate_discard_digest の multiset root hash primitive / collision witness / compression 境界をどこまで formal parameter 化するか
    identity_redaction_accountability_model:
      label: identity redaction accountability
      public_spec_role: recommended_extension
      public_reader_note: 場面別の最小可視層と lawful reopen 条件。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#identity_redaction_accountability_model
      status: provisional_fixed
      statement: identity_redaction_accountability_model は、reviewer / operator の identity surface を層化し、場面別の最小可視層、lawful reopen 条件、tool ごとの保存責務を形式化する。
      public_surface:
        primitives:
          actor_surface: σ = (actor_key, display_identity, stable_pseudonym, team_or_forum_label_set, authority_binding_ref_set, accountability_binding_ref_set, reopen_key_ref, pseudonym_scope, epoch_id, visibility_class)
          identity_layers: L_id = {display_identity, stable_pseudonym, team_or_forum_label, authority_binding, accountability_binding, legal_hold_reopen_key}
          scenario: γ ∈ {routine_review, cadence_breach, penalty_review, review_accountability, incident_replay, security_escalation, external_audit}
          viewer_role: υ ∈ {operator_self, peer_reviewer, delegated_reviewer, forum_chair, domain_authority, central_authority, security_officer, legal_hold_custodian, external_auditor}
          visible_layers: View(γ,υ,σ) ⊆ L_id
          lower_layer_sufficiency: Suff(γ,σ)=true iff stable_pseudonym・authority_binding・accountability_binding と必要な lineage だけで当該 judgement を lawful に再構成できる
          reveal_predicate: Reveal(γ,υ,σ)=true iff lawful_purpose(γ) ∧ required_tier(υ,γ) ∧ active_reopen_basis(σ,γ) ∧ ¬Suff(γ,σ)
      public_rules:
        invariants:
        - すべての normative event は stable_pseudonym、authority_binding_ref、accountability_binding_ref を持たなければならない。
        - display_identity は optional surface であり canonical actor key になってはならない。
        - stable_pseudonym は scope × epoch 内で一意でなければならず、rotation は lineage bridge を伴わなければならない。
        - legal_hold_reopen_key は通常 event body と別 custody に置き、visible layers から導出できてはならない。
        - cadence breach、penalty activation、review accountability の primary judgement は cleartext personal identity に依存してはならない。ただし Reveal 条件を満たす場合を除く。
        minimum_visibility_rules:
          routine_review:
            required_layers:
            - stable_pseudonym
            - team_or_forum_label
            - authority_binding
          cadence_breach:
            required_layers:
            - stable_pseudonym
            - team_or_forum_label
            - authority_binding
            conditional_layers:
            - accountability_binding
          penalty_review:
            required_layers:
            - stable_pseudonym
            - team_or_forum_label
            - authority_binding
            additional_context:
            - tool_or_pipeline_lineage_ref
            - forum_chain_ref
          review_accountability:
            required_layers:
            - stable_pseudonym
            - authority_binding
            - accountability_binding
          incident_replay:
            required_layers:
            - stable_pseudonym
            - authority_binding
            - accountability_binding
            - event_or_execution_lineage_ref
          security_escalation:
            required_layers:
            - stable_pseudonym
            - authority_binding
            - accountability_binding
            - legal_hold_reopen_key
      implementation_touchpoints:
        tool_projection:
          DecisionLedger:
            required_fields:
            - actor_pseudonym_ref
            - authority_binding_ref_set
            - accountability_binding_ref_set
            - reopen_authorization_basis_ref
            - legal_hold_state
          GraphEngine:
            required_fields:
            - runtime_actor_instance_ref
            - pseudonym_epoch_id
            - pseudonym_lineage_bridge_ref
            - session_or_run_ref
            - reopen_event_ref_set
          GraphLint:
            required_fields:
            - actor_class_ref
            - authority_tier_ref
            - forum_label_ref
            - redacted_trace_summary_ref
            forbidden_fields:
            - cleartext_identity
            - reopen_key_ref
          archive_object:
            required_fields:
            - pseudonymized_event_body_ref
            - sealed_identity_envelope_ref_or_pointer
            - reopen_policy_ref
            - access_audit_log_ref
      deferred_questions:
      - bridge packet の cryptographic shape をどこまで formal parameter 化するか
      - audit witness shard を HSM / append-only service / 人的 witness のどこまで hybrid parameter 化するか
      - export-local pseudonym の TTL / revocation と accountability lineage の保持をどう parameter 化するか
    raw_signal_retention_model:
      label: raw signal retention
      public_spec_role: informative_annex
      public_reader_note: minimum retained raw unit と replay admissibility を接続する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#raw_signal_retention_model
      status: provisional_fixed
      statement: raw_signal_retention_model は、cluster de-dup 後に detector family / claim facet / sink class / replay class ごとに保持すべき minimum retained raw unit を形式化し、confirm・penalty・incident replay・purge admissibility を接続する。
      public_surface:
        primitives:
          detector_family: δ ∈ {local_convention_detected, confirmed_policy_drift, suspected_leak, bias_penalty, flooding_penalty, replay_penalty}
          claim_facet: φ ∈ {effect_realization, direct_reach_confirmed, route_identity, recipient_identity, owner_binding_or_declared_intent, protected_facet_mismatch, sink_typing_positive_escalation}
          sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
          replay_class: ρ ∈ {summary_only, analytical_replay, deterministic_replay, forensic_replay}
          retained_artifact: α ∈ {cluster_representative, duplicate_discard_digest, burst_evidence_packet, abuse_anchor_packet, replay_support_blob}
          cluster: χ = (cluster_id, hypothesis_key, detector_family_ref, claim_facet_ref, sink_class_ref, representative_signal_ref, duplicate_digest_ref, burst_packet_ref, abuse_anchor_ref, replay_blob_ref, archive_bucket_ref, legal_hold_state)
      public_rules:
        invariants:
        - MinRet(δ,φ,κ,χ)=false の cluster を confirm / penalty / incident replay の canonical evidence に数えてはならない。
        - flooding_penalty または replay_penalty で Dup(χ)=false の cluster に count-inflation / concealment judgement を与えてはならない。
        - suspected_leak で RouteOrRecipientEvidence(χ)=false または EffectEvidence(χ)=false の cluster を confirmed leak へ進めてはならない。
        - ρ ∈ {deterministic_replay, forensic_replay} なのに RBlob(χ)=false である cluster に replay admissibility を与えてはならない。
        - PurgeOK(χ)=true により MinRet(δ,φ,κ,χ) が事後的に false になる purge を許してはならない。
      implementation_touchpoints:
        tool_projection:
          DecisionLedger:
            required_fields:
            - retention_family_rule_ref
            - cluster_id
            - claim_facet_ref
            - sink_class_ref
            - replay_class
            - archive_bucket_ref
            - purge_admissibility_state
            - confirm_or_penalty_usage_ref
          GraphEngine:
            required_fields:
            - representative_signal_ref
            - duplicate_digest_ref
            - burst_packet_ref
            - abuse_anchor_ref
            - replay_blob_ref
            - blob_pin_or_unpin_event
            - purge_execution_event
      guardrails:
        auxiliary_predicates: StrictSink(κ)=true iff κ ∈ {authoritative_state, public_or_external_commitment, irreversible_resource_lock} LeakCore(φ)=true iff φ ∈ {effect_realization, direct_reach_confirmed, route_identity, recipient_identity} ProtectedFacet(φ)=true iff φ = protected_facet_mismatch Rep(χ)=true iff representative_signal_ref が digest-bound raw slice または normalized snapshot とともに保持される Dup(χ)=true iff duplicate_digest_ref が member cardinality・discard_reason_set・multiset root を保持する Burst(χ)=true iff burst_packet_ref が cadence registry cell・window counts・lag/backlog snapshot を保持する Anch(χ)=true iff abuse_anchor_ref が anchor_kind・anchor_digest_set・actor_or_route_binding を保持する RBlob(χ)=true iff replay_blob_ref が blob_digest・serialization_profile・environment_descriptor_ref・replay_class を保持する
        family_minimum_predicates:
          local_convention_detected: MinRet(δ,φ,κ,χ)=true iff δ=local_convention_detected ∧ Rep(χ) ∧ ((StrictSink(κ) ∨ ProtectedFacet(φ)) → Dup(χ)) ∧ ((ProtectedFacet(φ) ∨ ρ∈{deterministic_replay, forensic_replay}) → RBlob(χ))
          confirmed_policy_drift: MinRet(δ,φ,κ,χ)=true iff δ=confirmed_policy_drift ∧ Rep(χ) ∧ BasisPair(χ)=true ∧ ((ProtectedFacet(φ) ∨ StrictSink(κ)) → RBlob(χ)) ∧ (SeverityUsesClusterCardinality(χ)=true → Dup(χ))
          suspected_leak: MinRet(δ,φ,κ,χ)=true iff δ=suspected_leak ∧ Rep(χ) ∧ RouteOrRecipientEvidence(χ)=true ∧ EffectEvidence(χ)=true ∧ (ExposureEpisodeMerged(χ)=true → Dup(χ)) ∧ ((LeakCore(φ) ∧ κ∈{public_or_external_commitment, irreversible_resource_lock}) → RBlob(χ))
          bias_penalty: MinRet(δ,φ,κ,χ)=true iff δ=bias_penalty ∧ Rep(χ) ∧ Dup(χ) ∧ ActorConcentrationEvidence(χ)=true ∧ (FinalPenalty(χ) =true → Anch(χ))
          flooding_penalty: MinRet(δ,φ,κ,χ)=true iff δ=flooding_penalty ∧ Rep(χ) ∧ Dup(χ) ∧ Burst(χ) ∧ (DirectAbuseConfirm(χ)=true → Anch(χ))
          replay_penalty: MinRet(δ,φ,κ,χ)=true iff δ=replay_penalty ∧ Rep(χ) ∧ Dup(χ) ∧ ReplayLineageEvidence(χ)=true ∧ ((ProtectedFacet(φ) ∨ ρ∈{deterministic_replay, forensic_replay}) → RBlob(χ)) ∧ (IntentionalReuseConfirm(χ)=true → Anch(χ))
        replay_and_purge_predicates:
          canonical_evidence_predicate: CanonEv(χ)=true iff MinRet(δ,φ,κ,χ)=true
          confirm_admissibility: ConfirmOK(χ)=true iff CanonEv(χ)=true かつ detector-family-specific confirm rule が別途満たされる
          penalty_admissibility: PenOK(χ)=true iff CanonEv(χ)=true かつ penalty fairness review に必要な actor/route lineage が失われていない
          purge_admissibility: PurgeOK(χ)=true iff CanonEv(χ)=true を壊さず、legal_hold_state=inactive かつ archive_bucket が raw purge を許し、ρ に応じた replay requirement を retained artifact 側で満たす
      deferred_questions:
      - duplicate_discard_digest の multiset root hash primitive / collision witness / compression 境界をどこまで formal parameter 化するか
    legal_hold_reopen_custody_model:
      label: legal hold reopen custody
      public_spec_role: informative_annex
      public_reader_note: reopen を lane-based quorum と post-confirm で形式化する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#legal_hold_reopen_custody_model
      status: provisional_fixed
      statement: legal_hold_reopen_custody_model は、sealed identity envelope の reopen を lane-based quorum、access audit 先行固定、retention timer 停止、provisional emergency bypass と authority post-confirm の二段階で形式化する。
      public_surface:
        primitives:
          reopen_scenario: γ ∈ {normal_reopen, incident_replay, external_audit, security_escalation}
          custody_lane: λ ∈ {authority_lane, custody_lane, security_lane, audit_notary_lane}
          actor_class: α ∈ {delegated_reviewer, domain_authority, central_authority, legal_hold_custodian, security_officer, audit_notary, external_auditor}
          shard_class: ω ∈ {authorization_shard, custody_release_shard, security_override_shard, audit_witness_shard}
          holder: h_i = (actor_id, actor_class, lane, shard_class, independence_group, active_scope_ref)
          reopen_basis: β = (purpose_tag, scenario, tenant_scope, domain_scope, legal_hold_state, investigation_state, audit_charter_ref, protected_facet_flag, cross_system_join_flag)
          access_session: s = (session_id, envelope_ref, basis_ref, reveal_scope, audit_anchor_ref, timer_pause_ref_set, ttl, post_confirm_due, reseal_state)
          required_lane_vector: Req(γ,β) は scenario と basis に応じた lane ごとの最小 required count を返す
      public_rules:
        invariants:
        - delegated_reviewer を authority_lane / custody_lane / security_lane の quorum 充足者に数えてはならない。
        - 同一 independence_group を同一 session の複数 required lane に重複計上してはならない。
        - AuditReady(s)=false の session に key materialization を与えてはならない。
        - external_auditor を Qrm の構成員に入れてはならない。
        - security_escalation の provisional open を final evidence / penalty finalization / public explanation に直結させてはならない。
        - decrypted envelope output を canonical archive object に格上げしてはならない。
      implementation_touchpoints:
        tool_projection:
          DecisionLedger:
            required_fields:
            - reopen_basis_ref
            - lane_quorum_policy_ref
            - authority_tier_requirement
            - legal_hold_or_investigation_state
            - allowed_reveal_scope
            - post_confirm_due
          GraphEngine:
            required_fields:
            - access_session_id
            - audit_anchor_ref
            - timer_pause_or_resume_event
            - key_materialization_event
            - reseal_event
            - derived_export_digest_ref
          archive_object:
            required_fields:
            - sealed_identity_envelope_ref_or_digest
            - reopen_policy_ref
            - access_audit_log_ref
            - derived_export_digest_ref
          GraphLint:
            forbidden_fields:
            - cleartext_identity
            - shard_material
            - long_lived_decrypt_output
      deferred_questions:
      - audit witness packet の vendor-neutral attestation / observer credential schema をどこまで model parameter 化するか
      - cross-jurisdiction external audit の authority taxonomy と central delegation charter をどこまで predicate 化するか
    bounded_loss_summary_registry_model:
      label: bounded loss summary registry
      public_spec_role: recommended_extension
      public_reader_note: exact preserved statistic、top-k cap、tail metric、lossless escalation を parameter 化する。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#bounded_loss_summary_registry_model
      status: provisional_fixed
      statement: bounded_loss_summary_registry_model は、duplicate_discard_digest の bounded_loss_summary について、detector family / claim facet / sink class / replay class / recipient class / root profile ごとの exact preserved statistic、top-k cap、tail metric、lossless escalation 条件、silent summary drift predicate を parameter 化するモデルである。
      public_surface:
        primitives:
          detector_family: δ ∈ {local_convention_detected, confirmed_policy_drift, suspected_leak, bias_penalty, flooding_penalty, replay_penalty}
          claim_facet_family: φ_f ∈ {local_convention_pattern, basis_or_policy_path, route_or_recipient_or_effect, actor_or_reviewer_fairness, cadence_or_burst, replay_or_lineage_relation}
          sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
          replay_class: ρ ∈ {summary_only, analytical_replay, deterministic_replay, forensic_replay}
          recipient_class: r ∈ {internal_owner_or_same_scope_reviewer, domain_or_central_authority, external_auditor, external_commitment_recipient, emergency_response_principal}
          root_profile: π_h ∈ {compact_internal_v1, standard_canonical_v1, strict_external_v1}
          cap_class: c ∈ {local_review, authority_review, lossless_only}
          statistic_family: σ_s ∈ {total_member_count, unique_signature_count, duplicate_reason_histogram, local_basis_bucket_count, basis_pair_bucket_count, effective_use_path_bucket_count, registry_binding_bucket_count, route_partition_count, recipient_partition_count, effect_bucket_count, reviewer_operator_split_matrix, registered_cadence_bucket_histogram, burst_shape_bucket_count, source_diversity_bucket_count, canonical_scope_partition_count, pseudonym_epoch_partition_count, export_bundle_partition_count, lawful_purpose_partition_count, retention_bucket_partition_count, omitted_tail_mass, omitted_bucket_count, max_omitted_bucket_mass, concentration_upper_bound}
          preservation_state: ψ ∈ {exact, exact_topk_with_exact_tail, lossless_only, forbidden}
          summary_registry_cell: R_b = (detector_family_ref, claim_facet_family_ref, sink_class_ref, replay_class_ref, recipient_class_ref, root_profile_ref, cap_class_ref, exact_stat_set, topk_cap_vector, hard_partition_axis_set, escalation_condition_set)
          bounded_summary: B = (summary_registry_cell_ref, summary_generation_rule_ref, exact_preserved_stat_digest, topk_value_table, omitted_tail_mass_by_dimension, omitted_bucket_count_by_dimension, max_omitted_bucket_mass_by_dimension, concentration_upper_bound_by_dimension, partition_guard_digest, drift_scan_basis_digest)
      public_rules:
        functions:
          cap_class_selection: Cap(κ,ρ,r,π_h)=lossless_only iff ρ∈{deterministic_replay,forensic_replay} or r∈{external_auditor,external_commitment_recipient,emergency_response_principal} or κ∈{public_or_external_commitment,irreversible_resource_lock} or π_h=strict_external_v1; =authority_review iff π_h=standard_canonical_v1 or r=domain_or_central_authority or κ=authoritative_state; =local_review otherwise
          bounded_admissibility: BndAdm(δ,φ_f,κ,ρ,r,π_h)=true iff Cap(κ,ρ,r,π_h)≠lossless_only and δ∉{suspected_leak,replay_penalty} and no protected facet / authority path / external continuity escalation condition is active
          cell_resolution: Cell(δ,φ_f,κ,ρ,r,π_h)=the unique registry cell R_b selected by detector family first, then claim facet overlay, then the strictest cap class and escalation condition from sink/replay/recipient/root profile
          exact_stat_requirement: ExactReq(σ_s,R_b)=true iff σ_s∈exact_stat_set(R_b) or σ_s is a hard partition axis count or σ_s∈{omitted_tail_mass,omitted_bucket_count,max_omitted_bucket_mass} for a top-k dimension
          topk_cap: K(R_b,d)=the numeric cap assigned to dimension d by topk_cap_vector(R_b); K(local_review,local_basis)=8, K(authority_review,local_basis)=16, K(local_review,lineage)=4, K(authority_review,lineage)=8, and lossless_only has no truncation
          summary_trailer_validity: TrailOK(B,R_b)=true iff summary_registry_cell_ref(B)=id(R_b) and summary_generation_rule_ref is bound and each truncated dimension has exact omitted_tail_mass, omitted_bucket_count, max_omitted_bucket_mass, concentration_upper_bound, and partition_guard_digest covers every hard partition axis in R_b
          hard_partition_integrity: PartOK(B,R_b)=true iff no bucket in B merges members across protected_facet_partition, authority_path_partition, export_bundle_partition, lawful_purpose_partition, retention_bucket_partition, canonical_scope_partition, or pseudonym_epoch_partition required by R_b
          summary_validity: SumOK(B,Δ,δ,φ_f,κ,ρ,r,π_h)=true iff Cell(δ,φ_f,κ,ρ,r,π_h)=R_b and ((BndAdm(...)=false) -> compression_grade_ref(Δ)=lossless_canonical) and ((BndAdm(...)=true) -> compression_grade_ref(Δ)=bounded_loss_summary and TrailOK(B,R_b) and PartOK(B,R_b) and every σ_s with ExactReq(σ_s,R_b)=true is exact in B and every truncated dimension respects K(R_b,d))
          silent_summary_drift: Drift(B,t)=true iff recomputation under summary_generation_rule_ref changes exact_preserved_stat_digest, or any omitted_tail_mass / omitted_bucket_count / max_omitted_bucket_mass differs, or any hard partition merge appears, or the resolved cap class at time t is stricter than the archived cap_class_ref
          fairness_guard: FairOK(B)=true iff actor_or_reviewer_fairness overlay is active -> reviewer_operator_split_matrix is exact and omitted_tail_mass_actor_dimension, max_omitted_bucket_mass_actor_dimension, concentration_upper_bound_actor_dimension are exact
        axioms:
        - δ∈{suspected_leak,replay_penalty} なら compression_grade_ref=bounded_loss_summary を使ってはならない。
        - Cap(κ,ρ,r,π_h)=lossless_only の文脈では any top-k truncation を使ってはならない。
        - top-k dimension を持つ bounded summary は omitted_tail_mass と omitted_bucket_count と max_omitted_bucket_mass を exact に持たなければ無効である。
        - hard partition axis を跨いだ bucket merge がある bounded summary は無効である。
        - Drift(B,t)=true の bounded summary を fairness review / severity review / authoritative analytical review の basis に使ってはならない。
      implementation_touchpoints:
        tool_projection:
          DecisionLedger:
            required_fields:
            - summary_registry_cell_ref
            - cap_class_ref
            - exact_preserved_stat_digest
            - compression_admissibility_state
            - lossless_escalation_reason_or_null
          GraphEngine:
            required_fields:
            - detector_family_ref
            - claim_facet_family_ref
            - sink_class_ref
            - replay_class_ref
            - recipient_class_ref
            - root_profile_ref
            - topk_value_table
            - omitted_tail_mass_by_dimension
            - partition_guard_digest
          GraphLint:
            checks:
            - bounded_used_in_lossless_only_context
            - bounded_used_for_suspected_leak_or_replay_penalty
            - missing_tail_metric_for_topk_dimension
            - hard_partition_merge_in_summary_bucket
            - cap_class_undershoot
            - silent_summary_drift_detected
            - fairness_tail_missing
          archive_object:
            required_fields:
            - summary_generation_rule_snapshot
            - tail_audit_sample_or_lossless_fallback_linkage
            - partition_guard_digest
            - drift_diff_report
            - recompute_basis_manifest
  hold_semantics_and_state_vocab:
    latent_downstream_hold_promotion_model:
      label: latent downstream hold promotion
      public_spec_role: recommended_extension
      public_reader_note: latent blocker を active governance blocker へ昇格させる条件。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#latent_downstream_hold_promotion_model
      status: provisional_fixed
      statement: latent_downstream_hold_promotion_model は、secondary governance reason の activation_state を latent_downstream / active に分け、GC1 通過、dependency clear、deadline 逼迫、precommit/externality 露出を promotion trigger として formalize するモデルである。
      public_surface:
        primitives:
          reason_code: rc ∈ {H3,H4,H5,H6}
          activation_state: α_h ∈ {latent_downstream, active}
          governance_stage: g ∈ {pre_gc1, gc1_passed, eval_g_started}
          branch_relevance: β ∈ {inactive, possible, chosen_or_precommit}
          deadline_state: δ ∈ {normal, near_due, overdue}
          externality_exposure: ξ ∈ {none, internal_only, external_or_irreversible}
          dependency_state: d ∈ {masked_by_upstream, clear_for_action}
      public_rules:
        functions:
          LatentAllowed: LatentAllowed(rc,g)=true iff rc∈{H3,H4,H5,H6} and g=pre_gc1.
          Promote: Promote(rc,g,β,δ,ξ,d)=true iff β!=inactive and (g in {gc1_passed, eval_g_started} or d=clear_for_action or δ in {near_due,overdue} or ξ=external_or_irreversible).
          MandatoryEarlyPromotion: MandatoryEarlyPromotion(rc,δ,ξ)=true iff rc in {H5,H6} and (δ in {near_due,overdue} or ξ=external_or_irreversible).
          StateUpdate: α_h(t+1)=active iff Promote(...)=true or MandatoryEarlyPromotion(...)=true; otherwise α_h(t)=latent_downstream may persist only while LatentAllowed=true.
        invariants:
        - g in {gc1_passed, eval_g_started} かつ β!=inactive の reason を latent_downstream のまま残してはならない。
        - MandatoryEarlyPromotion=true の H5/H6 を latent_downstream として保持してはならない。
        - activation_state は relation_to_primary に埋め込んではならない。
        - GraphEngine は promotion event を記録するが、promotion の意味判定は DecisionLedger が担う。
      implementation_touchpoints:
        tool_projection:
          DecisionLedger:
            required_fields:
            - reason_code
            - activation_state
            - promotion_window_ref
            - promotion_trigger_set
          GraphEngine:
            required_fields:
            - activation_transition_event
            - deadline_state
            - precommit_artifact_ref_or_null
            - dependency_state
          GraphLint:
            required_output_fields:
            - masked_by_epistemic_blocker_flag
            - h5_h6_early_promotion_hint
          archive_object:
            required_fields:
            - promotion_witness_packet
            - deadline_basis_snapshot
            - precommit_exposure_packet_or_null
    hold_reason_relation_taxonomy_model:
      label: hold reason 関係モデル
      public_spec_role: recommended_extension
      public_reader_note: dependency / causal / temporal / independent を分ける。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#hold_reason_relation_taxonomy_model
      status: provisional_fixed
      statement: hold_reason_relation_taxonomy_model は、secondary reason と primary_reason の関係を dependency だけに縮退させず、derived / dependency / causal / temporal / independent の5語彙へ正規化するモデルである。
      public_surface:
        primitives:
          relation_to_primary: ρ_h ∈ {derived_from_primary, dependency_precondition, causal_driver, temporal_deadline_precedence, independent_co_blocker}
          activation_state: α_h ∈ {active, latent_downstream}
          deadline: τ ∈ time
          repair_plan_eta: η ∈ time
      public_rules:
        functions:
          TemporalPrecedence: TemporalPrecedence(τ_sec,η_pri)=true iff τ_sec < η_pri.
          DependencyPrecondition: DependencyPrecondition(sec,pri)=true iff sec.required_action or sec.reopen_condition references pri.output or pri.clearance.
          CausalDriver: CausalDriver(sec,pri)=true iff persistence of pri raises the probability or severity of sec without being a logical prerequisite.
          CanonicalRelation: CanonicalRelation(sec,pri)=temporal_deadline_precedence if TemporalPrecedence=true and deadline dominates scheduling; dependency_precondition if DependencyPrecondition=true; causal_driver if CausalDriver=true; derived_from_primary if same root issue packet; independent_co_blocker otherwise.
        invariants:
        - activation_state=latent_downstream を relation_to_primary 値として使ってはならない。
        - temporal_deadline_precedence は causal_driver や dependency_precondition と同義に潰してはならない。
        - derived_from_primary は same-root evidence を要し、単なる時系列近接だけで付与してはならない。
        - independent_co_blocker は解除経路が独立であることを要し、単なる未分析 bucket として使ってはならない。
      implementation_touchpoints:
        tool_projection:
          DecisionLedger:
            required_fields:
            - relation_to_primary
            - activation_state
            - deadline_basis_or_null
            - dependency_ref_or_null
          GraphEngine:
            required_fields:
            - causal_link_ref_or_null
            - deadline_timestamp_or_null
            - repair_plan_eta_or_null
          GraphLint:
            required_checks:
            - latent_state_not_in_relation_field
            - temporal_precedence_not_dropped
            - family_relation_mismatch
          archive_object:
            required_fields:
            - relation_witness_packet
            - deadline_comparison_snapshot_or_null
    hold_reason_subtype_registry_model:
      label: hold reason subtype registry
      public_spec_role: recommended_extension
      public_reader_note: family-level subtype と extension の親子制約。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#hold_reason_subtype_registry_model
      status: provisional_fixed
      statement: hold_reason_subtype_registry_model は、H1〜H6 の family-level core subtype を canonical registry として形式化し、domain extension subtype を parent core subtype の下位にのみ許すモデルである。
      public_surface:
        primitives:
          reason_code: rc ∈ {H1,H2,H3,H4,H5,H6}
          core_subtype: τ_core ∈ CoreSubtype(rc)
          extension_subtype_ref: τ_ext ∈ ExtensionSubtype ∪ {null}
          parent_core_subtype_ref: Parent(τ_ext)=τ_core
      public_rules:
        functions:
          CoreRequired: CoreRequired(rc,τ_core)=true iff τ_core belongs to CoreSubtype(rc).
          ExtensionOK: ExtensionOK(rc,τ_core,τ_ext)=true iff τ_ext=null or Parent(τ_ext)=τ_core and Family(τ_ext)=rc and extension charter does not weaken reopen authority / deadline / escalation families.
          BenchmarkLabel: BenchmarkLabel = (reason_code, core_subtype, extension_subtype_ref_or_null) with cross-domain comparability guaranteed at least at the first two coordinates.
        invariants:
        - CoreRequired=false の hold packet を current registry event として受理してはならない。
        - ExtensionOK=false の extension_subtype を family current use に使ってはならない。
        - extension_subtype_ref だけを記録して core_subtype を省略してはならない。
        - cross-family subtype alias を comparability basis に使ってはならない。
        core_registry:
          H1:
          - missing_primary_evidence
          - missing_context_binding
          - missing_structure_link
          - missing_explanation_path
          H2:
          - contradictory_evidence
          - semantic_ambiguity
          - threshold_or_scope_collision
          - unresolved_counterargument
          H3:
          - decision_context_unbound
          - value_binding_gap
          - responsibility_binding_gap
          - approval_structure_gap
          H4:
          - required_approval_missing
          - approval_conflict_active
          - quorum_or_proxy_unmet
          - fallback_activation_pending
          H5:
          - residual_risk_over_tolerance
          - mitigation_evidence_insufficient
          - waiver_required_ungranted
          - monitoring_or_rollback_inadequate
          H6:
          - explicit_policy_prohibition
          - legal_or_contractual_prohibition
          - external_commitment_conflict
          - exception_path_missing_or_denied
      implementation_touchpoints:
        tool_projection:
          DecisionLedger:
            required_fields:
            - reason_code
            - core_subtype
            - extension_subtype_ref_or_null
            - extension_charter_ref_or_null
          GraphEngine:
            required_fields:
            - subtype_history
            - parent_core_subtype_ref_or_null
            - migration_alias_ref_or_null
          GraphLint:
            required_checks:
            - missing_core_subtype
            - cross_family_subtype_alias
            - unregistered_extension_subtype
          archive_object:
            required_fields:
            - subtype_registry_snapshot
            - benchmark_label
            - extension_witness_or_null
    positive_state_vocabulary_model:
      label: positive state 語彙
      public_spec_role: recommended_extension
      public_reader_note: present だけではない component-specific positive state の保持則。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#positive_state_vocabulary_model
      status: provisional_fixed
      statement: positive state は component-specific に保持し、Present(x) は派生述語としてだけ用いる。
      public_surface:
        notation:
          Pos_GC(slot): true iff slot has concrete typed value/ref
          Pos_E(slot): true iff evidence_status=linked
          Pos_VR(slot): true iff binding_status=bound
          Pos_Haux(slot): true iff auxiliary slot has concrete value/ref/digest
          Present(slot): true iff Pos_component(slot)=true
      public_rules:
        storage_rule:
        - raw status 値として present を保存してはならない
        - literal present は component kind が決まるまで migration_error
        - cross-component 集計は Present(slot) を使ってよいが remediation は Pos_component を使う
      guardrails:
        forbidden_shortcuts:
        - Pos_E と Pos_VR を同じ raw label へ潰すこと
        - Present(slot)=true を見て component-specific obligation を満たしたと誤認すること
    deliberate_exploration_option_value_model:
      label: deliberate exploration option value
      public_spec_role: informative_annex
      public_reader_note: 探索継続の class と exit mapping。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#deliberate_exploration_option_value_model
      status: provisional_fixed
      statement: deliberate_exploration の継続可否は、semi-quant option tuple Ω_exp と charter cap により continue / bounded_continue / terminate_or_escalate を返す。
      public_surface:
        notation:
          exploration_charter: Ξ = (objective_ref, owner_ref, allowed_actions_ref, review_window, budget_cap, risk_cap, exit_criteria_ref)
          option_tuple: Ω_exp = (disc_gain, branch_rel, reuse_val, rev_headroom, cost_burn, risk_burn)
          axis_scale: '{0,1,2,3}'
          continue_class: Cls(Ω_exp,Ξ) ∈ {continue, bounded_continue, terminate_or_escalate}
      public_rules:
        classification_rules:
          continue: disc_gain>=2 and branch_rel>=2 and max(cost_burn,risk_burn)<=1 and review_window/budget_cap remain live
          bounded_continue: disc_gain>=1 and (branch_rel>=1 or reuse_val>=2) and risk_burn<=1 and no termination trigger has fired
          terminate_or_escalate: disc_gain=0 for consecutive reviews, or review_window expired, or budget_cap exceeded, or allowed_actions exhausted, or risk_burn=3
        exit_mapping:
        - resolved branch exists -> governance_converged
        - coexistence or split becomes ratified -> unresolved_plurality / split governance
        - same-frame blocker appears -> hold
        - lawful path absent or frame invalidated -> false
        - authority / registry / policy redesign required -> force_escalate
  externality_and_extension_boundaries:
    route_family_extension_boundary_model:
      label: route family extension boundary
      public_spec_role: recommended_extension
      public_reader_note: core route family と overlay extension の境界。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#route_family_extension_boundary_model
      status: provisional_fixed
      statement: route family core と ordered_fallback / weighted k_of_n overlay を分離し、overlay 依存 semantics は extension registry でのみ解釈する。
      public_surface:
        notation:
          F_core: (modality, k_required, candidate_routes, local_bundle_ref, activation_conditions, incompatibility_ref, selection_scope_ref, alignment_rule_ref)
          OF_ext: (ordered_chain, fallback_activation_predicates, timeout_rule, exhaustion_escalation_ref)
          WK_ext: (route_weight_profile_ref, weight_threshold_rule, eligibility_freeze_ref, tie_break_rule)
          OverlayOK: true iff overlay refers only to candidate_routes already present in F_core and preserves obligation/effect/authority/accountability/rollback semantics
      public_rules:
        axioms:
        - OF_ext does not redefine modality; it only orders already-lawful candidates.
        - WK_ext does not import approval forum seat weight; it only counts route selection weights on candidate_routes.
        - Core comparability is evaluated on F_core. If current action depends on OF_ext or WK_ext and no active overlay registry exists, comparability is not established.
        validity_rules:
        - OverlayOK=false implies extension invalid.
        - weighted threshold without route_weight_profile_ref is invalid.
        - ordered fallback without timeout/exhaustion semantics is incomplete when sequential activation is required.
    externality_budget_numeric_calibration_model:
      label: externality budget numeric calibration
      public_spec_role: recommended_extension
      public_reader_note: profile 別 baseline と stricter-only override。
      source_reference: ../../02_supplements/formalization_governance_supplement_v1.yaml#externality_budget_numeric_calibration_model
      status: provisional_fixed
      statement: externality budget の数値較正は profile baseline table と stricter-only context override の min-composition で与える。
      public_surface:
        notation:
          BaseCap(profile, class): numeric_cap_table から引く baseline cap
          CtxCap(context): single_branch / external_irreversible / policy_sensitive などの stricter override
          EffCap(profile,class,context): min(BaseCap, CtxCap) on each comparable axis
          axes:
          - sink_cap_count
          - audience_cap_named_humans
          - artifact_kind_cap_count
          - review_due
          - expiry
          - purge_due_after_expiry
      public_rules:
        rules:
        - EffCap never relaxes BaseCap.
        - review_due is a pre-expiry control point; expiry is post-validity reliance cutoff.
        - externalized_nonbinding and authoritative_or_committing remain non-isolation classes regardless of numeric cap.
