selection_policy:
  goal: 02_supplements から、公開配布面として安定化できる補助論点だけを annex に再編集する。
  keep_out_of_annex:
  - scheduler / federation pack に実質依存するもの
  - bridge token / witness packet / external serialization など実装依存が強いもの
  - quota / debt / reservation / multi-session のような内部運用管理
  - 長い migration / reverse / replay chain の細密機構
  - 組織固有の numeric table をそのまま要求するもの
  normativity_rule: annex は 01_core を上書きせず、公開実装の補助規則として配布する。
