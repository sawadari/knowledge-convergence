scheduler_dependency_breakpoint_governance:
  status: provisional_fixed
  statement: scheduler_dependency_breakpoint_governance とは、vendor fallback substitution、contract breakpoint lane、dependency reselection を固定する規則である。
  core_claims:
  - vendor や外部依存の failure を internal workaround だけで吸収し続けてはならない。dependency breakpoint class を持ち、どの条件で fallback substitution、contract breakpoint、provider reselection を開くかを明示しなければならない。
  - fallback substitution は互換性を雰囲気で語ってはならない。function surface、data retention duty、latency/risk envelope、operator training delta を束ねた equivalence witness を必要とする。
  - contract breakpoint lane は vendor blame 通告ではなく、SLA breach、legal nonconformity、security or compliance breach、sustained non-recoverability などの class に応じて開く formal lane である。
  - dependency reselection は最安値置換ではない。retained core compatibility、migration cost、audit continuity、exit feasibility、shadow validation plan を比較しなければならない。
  - fallback を開いている間も old dependency を silent dependency として残してはならない。double-write や hidden credential reuse は archiveable migration witness の下で管理する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は dependency breakpoint registry、equivalence scoring、reselection simulation、vendor disclosure / migration audit trail を分担する。
  fallback_substitution_packet:
