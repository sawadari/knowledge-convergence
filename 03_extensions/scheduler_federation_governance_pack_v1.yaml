scheduler_federation_joint_review_governance:
  status: provisional_fixed
  statement: scheduler_federation_joint_review_governance とは、joint-review quorum、minority dissent memo、chair tie-break lane を束ねて federation assurance panel の decision finality を固定する規則である。
  core_claims:
  - joint review は人数合わせではない。quorum floor、role mix、independence mix、scope competence を束ねなければ panel decision と呼べない。
  - abstention は absence と同一ではない。conflict abstention、knowledge-gap abstention、procedural abstention を分けて quorum 計算へ入れる必要がある。
  - minority dissent はノイズではない。finding lineage、reservation reason、unresolved question、requested follow-up を memo 化しなければ suppressed challenge になる。
  - chair tie-break は万能 veto ではない。eligible tie class、trigger timing、deadlock threshold、recipient-visible caveat を束ねなければ恣意運用になる。
  - panel split のまま clean opinion を silently issue してはならない。dissent が material なら qualified outcome か escalation lane を強制する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は panel constitution、vote lineage、deadlock lint、dissent archive を分担する。
  joint_review_quorum:
