    - admission_packet_ref
    - observation_bundle_ref
    - violation_budget_ref
    - uplift_or_hold_ref
    - review_due_ref
    - reviewed_at_or_null
    rules:
    - observation_bundle_ref のない probation を trust-tier review にしてはならない。
    - violation_budget_ref のない probation を bounded supervision と呼んではならない。
    - uplift_or_hold_ref のない review を tier decision とみなしてはならない。
  expulsion_trigger:
