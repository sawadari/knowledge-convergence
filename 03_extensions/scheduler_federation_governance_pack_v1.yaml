    - event_granularity_ref
    - attribute_whitelist_ref
    - join_prohibition_ref
    - sampling_rule_ref
    - privacy_tier_ref
    - approved_at_or_null
    rules:
    - event_granularity_ref のない profile を minimization profile と呼んではならない。
    - attribute_whitelist_ref のない profile を least-observation design とみなしてはならない。
    - join_prohibition_ref のない profile を re-identification resistant telemetry profile と称してはならない。
  retention_expiry_lane:
    required_fields:
    - retention_lane_id
    - telemetry_class_ref
    - retention_window_ref
    - expiry_action_ref
    - legal_hold_exception_ref
    - verified_at_or_null
    rules:
    - retention_window_ref のない lane を retention expiry lane と呼んではならない。
    - expiry_action_ref のない policy を enforceable expiry control とみなしてはならない。
    - legal_hold_exception_ref のない retention override を lawful hold path と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - consent boundary registry
      - minimization approval policy
      - retention/expiry policy
