    - originating_report_ref
    - downstream_surface_set_ref
    - cascade_deadline_ref
    - completion_digest_ref
    - closed_at_or_null
    rules:
    - downstream_surface_set_ref のない case を syndication correction cascade と呼んではならない。
    - cascade_deadline_ref のない cascade を bounded correction program とみなしてはならない。
    - completion_digest_ref のない closure を auditable downstream correction と称してはならない。
  stale_copy_takedown_lane:
    required_fields:
    - takedown_case_id
    - stale_surface_ref
    - takedown_basis_ref
    - safe_replacement_ref
    - exception_rule_ref
    - requested_at_or_null
    rules:
    - takedown_basis_ref のない request を stale copy takedown lane と呼んではならない。
    - safe_replacement_ref のない takedown を recipient-safe removal とみなしてはならない。
    - exception_rule_ref のない lane を bounded takedown control と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - relay obligation binding
      - cascade closure decision
      - takedown basis policy
      - exception handling record
    GraphEngine:
      owns:
      - downstream surface graph
      - cascade deadline routing
      - replacement link projection
      - partner authenticity checks
    GraphLint:
      owns:
      - orphaned relay lint
      - silent downstream stale-copy lint
      - unsafe takedown lint
      - overbroad censorship lint
    archive_object:
      owns:
      - relay covenant packet
      - cascade completion digest
      - takedown request log
      - downstream evidence archive
  forbidden_shortcuts:
  - origin site 修正だけで downstream copy も修正済みとみなす
  - correction SLA のない relay partner を trusted syndication とみなす
  - safe replacement なしで stale copy を消す
  residual_open_points: []
scheduler_federation_transparency_accessibility_governance:
  status: provisional_fixed
  statement: scheduler_federation_transparency_accessibility_governance とは、transparency accessibility profile、multilingual equivalence pack、inclusive advisory rendering を束ねて federation transparency の到達可能性と意味同値性を固定する規則である。
  core_claims:
  - transparency は公開しただけでは成立しない。audience need class と modality set を固定しなければ accessibility-complete disclosure と呼べない。
  - multilingual disclosure は単純翻訳ではない。translation basis、equivalence review、locale version set を束ねなければ assurance meaning の同値性を保てない。
  - inclusive advisory rendering は UI 装飾ではない。assistive markup、reading level、fallback human support がなければ advisory action を実行できない受領者が残る。
  - locale ごとの content drift は badge drift と同じくらい危険である。source report と locale pack は equivalence lineage で結ばれていなければならない。
  - accessibility profile は one-size-fits-all ではない。critical recipient と general public で必要な modality と reading level は異なる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は accessibility profile registry、locale equivalence projection、rendering lint、assistive archive を分担する。
  transparency_accessibility_profile:
    required_fields:
    - profile_id
    - audience_need_class_ref
    - modality_set_ref
    - reading_level_ref
    - locale_set_ref
    - effective_at_or_null
    rules:
    - audience_need_class_ref のない profile を transparency accessibility profile と呼んではならない。
    - modality_set_ref のない profile を reachable disclosure configuration とみなしてはならない。
    - locale_set_ref のない profile を multilingual-ready transparency plan と称してはならない。
  multilingual_equivalence_pack:
    required_fields:
    - pack_id
    - source_report_ref
    - translation_basis_ref
    - equivalence_review_ref
    - locale_version_set_ref
    - published_at_or_null
    rules:
    - translation_basis_ref のない pack を multilingual equivalence pack と呼んではならない。
    - equivalence_review_ref のない pack を meaning-stable locale artifact とみなしてはならない。
    - locale_version_set_ref のない pack を synchronized locale release と称してはならない。
  inclusive_advisory_rendering:
    required_fields:
    - rendering_id
    - advisory_ref
    - channel_modality_ref
    - assistive_markup_ref
    - fallback_human_support_ref
    - rendered_at_or_null
    rules:
    - channel_modality_ref のない rendering を inclusive advisory rendering と呼んではならない。
    - assistive_markup_ref のない rendering を assistive-ready advisory surface とみなしてはならない。
    - fallback_human_support_ref のない rendering を accessibility-bounded advisory lane と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - accessibility profile binding
      - locale equivalence policy
      - human-support requirement decision
      - reading-level governance
    GraphEngine:
      owns:
      - audience-need projection
      - locale pack synchronization
      - assistive rendering generation
      - fallback support routing
    GraphLint:
