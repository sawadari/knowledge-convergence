    - visibility_surface_ref のない badge を recipient-visible status signal とみなしてはならない。
    - historical_retention_ref のない badge state を auditable assurance history と称してはならない。
  recipient_advisory_channel:
    required_fields:
    - advisory_case_id
    - recipient_segment_ref
    - urgency_class_ref
    - action_menu_ref
    - callback_lane_ref
    - closure_criterion_ref
    - opened_at_or_null
    rules:
