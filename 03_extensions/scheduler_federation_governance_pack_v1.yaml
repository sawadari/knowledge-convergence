  - receiver は受領しただけで custodian になれるわけではない。receiver duty と custody class がなければ archive responsibility が宙に浮く。
  - seal break は即時 invalidation 一般ではない。break reason、triage lane、re-seal条件を定めなければ assurance continuity が止まりすぎる。
