scheduler_federation_metric_restatement_governance:
  status: provisional_fixed
  statement: scheduler_federation_metric_restatement_governance とは、metric restatement severity ladder、correction propagation SLA、recipient re-notification trigger を束ねて、誤った effectiveness disclosure の訂正強度と伝播責務を固定する規則である。
  core_claims:
  - restatement は yes/no では足りない。severity ladder がなければ表現修正、数値訂正、撤回の差が運用に落ちない。
  - correction は出したら終わりではない。propagation SLA がなければ downstream partner への到達が監督不能になる。
  - recipient re-notification trigger がない correction 運用は、既読者と未読者を区別できず trust recovery を壊す。
  - restatement severity は publication tier と連動しなければならない。public tier の correction と internal tier の correction は同じ latency では扱えない。
  - 訂正メッセージも disclosure artifact である。message template と send deadline を bound しない correction は比較不能である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は severity policy、propagation timer、re-notification routing、correction archive を分担する。
  metric_restatement_severity_ladder:
    required_fields:
    - severity_ladder_id
    - error_class_set_ref
    - severity_level_set_ref
    - decision_rule_ref
    - approver_role_ref
    - effective_at_or_null
    rules:
    - error_class_set_ref のない ladder を metric restatement severity ladder と呼んではならない。
    - severity_level_set_ref のない ladder を correction strength taxonomy とみなしてはならない。
    - decision_rule_ref のない restatement path を accountable correction policy と称してはならない。
