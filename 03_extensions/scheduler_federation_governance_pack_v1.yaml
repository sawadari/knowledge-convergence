scheduler_federation_public_notice_coordination_governance:
  status: provisional_fixed
  statement: scheduler_federation_public_notice_coordination_governance とは、public incident disclosure threshold、partner attribution embargo、coordinated notice window を束ねて federation の対外告知を固定する規則である。
  core_claims:
  - public disclosure は炎上回避の広報判断ではない。materiality axis、harm zone、scope boundary、minimum public facts を threshold 化しなければ accountability notice にならない。
  - partner attribution embargo は責任逃れではない。attribution lock、release condition、exceptional early-warning lane を束ねることで premature blame を抑えるための統治である。
  - coordinated notice window は沈黙権ではない。start trigger、latest publish deadline、partner acknowledgement floor、silence breach rule を持たなければ lawful delay にならない。
  - public notice は confidentiality appeal と衝突しうる。appeal pending の間も minimum public facts をどこまで残すかを bounded に決めなければならない。
  - multiple partner incidents を single headline に潰してはならない。scope boundary と attribution embargo を保たなければ false collectivization が起きる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は disclosure registry、publish deadline evaluation、embargo violation lint、public notice archive を分担する。
