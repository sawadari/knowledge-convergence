  - remediation undertaking は善処 promise ではない。owner、deadline、acceptance witness、miss escalation を束ねなければ binding action にならない。
  - scope exclusion は自由裁量ではない。exclusion rationale と residual risk notice を残さなければ trust erosion を招く。
  - same finding を複数 opinion class に二重計上してはならない。finding lineage と reservation mapping を保持しなければ public notice と remediation がズレる。
