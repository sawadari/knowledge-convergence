scheduler_reentry_backlog_thaw_governance:
  status: provisional_fixed
  statement: scheduler_reentry_backlog_thaw_governance とは、re-entry eligibility、backlog thaw sequencing、trust restoration notice を固定する規則である。
  core_claims:
  - re-entry は停止解除ボタンではない。protected floor 回復、dependency readiness、debt within bound、notice obligation closure、canary result を束ねた clearance packet が揃ったときにだけ開くべきである。
  - backlog thaw は FIFO 一般ではなく、expiry risk、external commitment criticality、causal coupling、replay contamination risk に応じた thaw class と sequence を持つべきである。
  - trust restoration notice は「復旧しました」で終わらない。どの surface が戻り、どの surface がまだ degraded か、何が再発防止 review 中かを audience ごとに分けて通知する必要がある。
  - re-entry は staged restore canary を前提とする。full reopen を一気に行うと hidden debt、queue surge、dependency flap が再燃するため、restore tranche ごとの rollback fence を持たなければならない。
  - backlog thaw 中は new demand と residual debt を同時に見なければならない。復旧直後の throughput を正常能力と誤認して residual fragility を見失ってはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は re-entry clearance registry、thaw class sequencing、notice bundle management、restore canary audit trail を分担する。
  reentry_clearance_packet:
    required_fields:
