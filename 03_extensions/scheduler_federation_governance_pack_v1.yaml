    - confirmation_rule_ref のない SLA を delivered-correction obligation とみなしてはならない。
    - escalation_rule_ref のない delay handling を accountable propagation lane と称してはならない。
  recipient_renotification_trigger:
    required_fields:
    - renotification_trigger_id
    - severity_threshold_ref
    - impacted_recipient_scope_ref
    - message_template_ref
    - send_deadline_ref
    - armed_at_or_null
    rules:
    - severity_threshold_ref のない trigger を recipient re-notification trigger と呼んではならない。
    - impacted_recipient_scope_ref のない trigger を bounded correction recall rule とみなしてはならない。
    - send_deadline_ref のない re-notification path を time-bound correction notice と称してはならない。
  tool_responsibilities:
