scheduler_federation_assurance_sampling_governance:
  status: provisional_fixed
  statement: scheduler_federation_assurance_sampling_governance とは、assurance evidence sampling profile、exception budget、re-sampling escalation lane を束ねて federation assurance の観測範囲と拡張条件を固定する規則である。
  core_claims:
  - sampling は reviewer の勘ではない。sampling universe、coverage floor、stratification axis、independence rule、hotspot expansion order を profile 化しなければ comparability を保てない。
  - sample size だけでは足りない。partner slice、control family、freshness band、failure history に応じた stratum coverage を持たなければ clean opinion の意味が薄い。
  - exception budget は見逃し allowance ではない。manual skip, missing artifact, delayed confirmation を bounded に管理し、budget 超過時は re-sampling か escalation を強制するための統治量である。
  - same source family や same pipeline lineage を独立 sample と数えてはならない。independence rule がない sampling は evidence multiplicity の錯覚を生む。
  - hotspot anomaly を局所例外で閉じてはならない。budget overrun、cross-partner recurrence、critical control family hit は re-sampling escalation lane に送る。
  - DecisionLedger / GraphEngine / GraphLint / archive object は sampling registry、sample selection trace、independence lint、re-sampling archive を分担する。
  assurance_evidence_sampling_profile:
    required_fields:
    - sampling_profile_id
    - sampling_universe_ref
    - stratification_axis_ref
    - coverage_floor_ref
    - sample_independence_rule_ref
    - hotspot_expansion_order_ref
    - effective_window_ref
    rules:
