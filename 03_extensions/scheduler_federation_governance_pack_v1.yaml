  statement: scheduler_federation_legitimacy_review_governance とは、constitutional legitimacy dashboard、governance health index、review cadence covenant を束ねて 正統性の健全度を定期監視する枠組みを固定する規則である。
  core_claims:
  - constitutional legitimacy dashboard は名称だけでは足りない。scope、binding rule、authority、exception を束ねなければ federation 上位統治の拘束単位にならない。
  - governance health index は連絡や慣習では足りない。trigger、participant set、procedure、window を束ねなければ lawful governance lane にならない。
  - review cadence covenant は印象評価では足りない。subject、threshold、effect scope、follow-up を束ねなければ reviewable constitutional outcome にならない。
  - constitutional legitimacy dashboard と governance health index と review cadence covenant は分離して見えても、上位規範の binding・運用・評価を一体で閉じる。いずれかが欠けたまま federation-wide safe operation を主張してはならない。
  - local convenience を理由に federation-wide constitutional rule を省略してはならない。temporary handling を使う場合でも authority と rollback を残さなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は federation legitimacy review 管理責務を分担する。
  constitutional_legitimacy_dashboard:
    required_fields:
    - constitutional_legitimacy_dashboard_id
    - scope_ref
    - binding_rule_ref
    - authority_ref
    - exception_rule_ref
    - ratified_at_or_null
    rules:
    - scope_ref のない constitutional legitimacy dashboard を federation-wide bounded policy と呼んではならない。
    - binding_rule_ref のない constitutional legitimacy dashboard を executable constitutional rule とみなしてはならない。
    - authority_ref のない constitutional legitimacy dashboard を lawfully owned governance unit と称してはならない。
    residual_open_points:
    - scheduler federation judicial review petition lane / constitutional question referral / advisory opinion register をどこまで registry 化するか
  governance_health_index:
    required_fields:
    - governance_health_index_id
    - trigger_ref
    - participant_set_ref
    - procedure_ref
    - deadline_or_window_ref
    - opened_at_or_null
    rules:
    - trigger_ref のない governance health index を admissible governance procedure と呼んではならない。
    - procedure_ref のない governance health index を repeatable federation lane とみなしてはならない。
    - deadline_or_window_ref のない governance health index を bounded transition path と称してはならない。
    residual_open_points:
    - scheduler federation judicial review petition lane / constitutional question referral / advisory opinion register をどこまで registry 化するか
  review_cadence_covenant:
    required_fields:
    - review_cadence_covenant_id
    - subject_ref
    - threshold_or_condition_ref
    - effect_scope_ref
    - rollback_or_followup_ref
    - issued_at_or_null
    rules:
    - subject_ref のない review cadence covenant を traceable constitutional check と呼んではならない。
    - threshold_or_condition_ref のない review cadence covenant を reviewable governance test とみなしてはならない。
    - effect_scope_ref のない review cadence covenant を bounded federation outcome と称してはならない。
    residual_open_points:
    - scheduler federation judicial review petition lane / constitutional question referral / advisory opinion register をどこまで registry 化するか
  tool_responsibilities:
    DecisionLedger:
      owns:
      - constitutional legitimacy dashboard binding registry
      - governance health index execution record
      - review cadence covenant outcome binding
      - federation legitimacy review decision trail
    GraphEngine:
      owns:
      - constitutional legitimacy dashboard rule evaluation
      - governance health index procedure routing
      - review cadence covenant threshold judgement
      - federation legitimacy review state projection
    GraphLint:
      owns:
      - missing-constitutional_legitimacy_dashboard lint
      - missing-governance_health_index lint
      - missing-review_cadence_covenant lint
      - unsafe-legitimacy_review shortcut lint
    archive_object:
      owns:
      - constitutional legitimacy dashboard archive
      - governance health index witness bundle
      - review cadence covenant evidence pack
      - federation legitimacy review history archive
  forbidden_shortcuts:
  - constitutional legitimacy dashboard を authority なしで local convenience により差し替える
  - governance health index を informal coordination だけで済ませる
  - review cadence covenant を threshold や follow-up なしで自動通過させる
  residual_open_points:
  - scheduler federation judicial review petition lane / constitutional question referral / advisory opinion register をどこまで registry 化するか
