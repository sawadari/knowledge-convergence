scheduler_federation_cross_jurisdiction_governance:
  status: provisional_fixed
  statement: scheduler_federation_cross_jurisdiction_governance とは、conflict-of-law profile、local override lane、enforcement reciprocity を束ねて federation assurance doctrine の越境適用条件を固定する規則である。
  core_claims:
  - federation rule は universal law ではない。governing-law priority、mandatory local rule、recognition condition を profile 化しなければ越境執行は壊れる。
  - local override は抜け道ではない。override admissibility、scope cap、sunset condition、recipient caveat を束ねなければ lawful deviation と呼べない。
  - enforcement reciprocity がない federation は一方向支配に傾く。mutual recognition、minimum safeguard parity、non-reciprocal fallback を明示する必要がある。
  - mandatory local rule を convenience だけで無視してはならない。違法執行は doctrine consistency より重い失敗である。
  - override を永続化してはならない。sunset か doctrine revision trigger がなければ local exception が事実上の新 rule になる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は law profile registry、override evaluation、reciprocity lint、cross-border archive を分担する。
  conflict_of_law_profile:
