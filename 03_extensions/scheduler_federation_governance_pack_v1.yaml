scheduler_federation_restitution_governance:
  status: provisional_fixed
  statement: scheduler_federation_restitution_governance とは、claimant restitution reserve、payout apportionment rule、insolvency backstop を束ねて federation assurance failure 後の補填責務と支払順序を固定する規則である。
  core_claims:
  - appeal や restatement の結果として補填義務が生じうる以上、reserve floor を事前に持たなければ制度は無責任になる。
  - payout は早い者勝ちにしてはならない。claim eligibility、loss class、priority band、shared liability ratio を固定しなければ公平性を失う。
  - partner insolvency は例外処理に閉じてはならない。backstop trigger、temporary bridge source、recovery recourse を定める必要がある。
  - partial payout でも受領者通知が必要である。underfunded settlement を full remediation と誤認させてはならない。
  - reserve は数字だけでは足りない。segregation condition、liquidity window、depletion escalation がなければ実際には払えない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve registry、claim evaluation、priority lint、payout archive を分担する。
