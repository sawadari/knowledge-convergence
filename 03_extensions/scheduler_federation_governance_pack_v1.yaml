      - reason-free refusal lint
      - silent-debt-erase lint
    archive_object:
      owns:
      - reserve covenant archive
      - settlement evidence bundle
      - donor protection history
      - support call snapshots
  forbidden_shortcuts:
  - protected floor なしで reserve pool を共有する
  - settlement terms なしで reserve call を完了扱いにする
  - lawful refusal reason を残さず donor refusal を arbitrary に行う
  - 未返済 debt を silent に erase する
