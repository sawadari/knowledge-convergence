scheduler_federation_transparency_archive_governance:
  status: provisional_fixed
  statement: scheduler_federation_transparency_archive_governance とは、public transparency archive index、immutable report digest、subscription diff feed を束ねて federation public disclosure の履歴・改変検知・差分配信を固定する規則である。
  core_claims:
  - public transparency は瞬間値では足りない。archive index がなければ report の supersession と badge history を追跡できない。
  - immutable report digest がない transparency report は改ざん耐性を持たない。content hash、render hash、badge state hash を束ねなければ canonical archive copy と呼べない。
  - subscription diff feed は広告配信ではない。subscriber class、diff scope、delivery cadence、replay window を固定しなければ dependable change channel と呼べない。
  - historical badge retention を report archive と分離してはならない。report supersession と badge state change は同じ lineage で辿れる必要がある。
  - archive は edit history の垂れ流しではない。publicly visible な差分と sealed reason を混在させてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は archive registry、digest validation、subscriber routing、immutable storage を分担する。
  public_transparency_archive_index:
