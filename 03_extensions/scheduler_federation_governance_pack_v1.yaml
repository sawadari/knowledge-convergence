  statement: scheduler_federation_sealed_evidence_governance とは、confidential evidence redaction tier、sealed appendix access lane、public summary floor を束ねて federation assurance appeal / restatement における秘匿情報と公開説明責任の境界を固定する規則である。
  core_claims:
  - confidential evidence は全部公開か全部秘匿かの二択ではない。secrecy basis、redaction scope、reviewer access class、expiry review を tier 化しなければ過剰秘匿と過少保護の両方を招く。
  - sealed appendix access は善意推定で開いてはならない。requester class、necessity basis、least disclosure bundle、audit log を束ねなければ lawful access lane と呼べない。
  - public summary floor がない restatement は opaque correction である。mandatory fact set、reasoning outline、risk disclosure、delta summary を公開下限として固定する必要がある。
  - redaction は convenience masking ではない。harm basis と review expiry がなければ恒久秘匿の抜け道になる。
  - 公開 summary が薄すぎると recipient は reliance adjustment を実行できない。公開最小集合を registry 化する必要がある。
