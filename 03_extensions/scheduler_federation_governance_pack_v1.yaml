scheduler_federation_causal_evaluation_governance:
  status: provisional_fixed
  statement: scheduler_federation_causal_evaluation_governance とは、experiment holdout lane、intervention change log、causal uplift threshold を束ねて adaptive disclosure の効果判定を固定する規則である。
  core_claims:
  - adaptive policy を導入しても causal evaluation がなければただの運用差し替えで終わる。holdout lane がない before/after 比較は外乱に弱い。
  - intervention は message text だけではない。cadence、channel order、audience split を change log に固定しなければ uplift の原因を追えない。
  - uplift threshold がないと tiny gain を policy churn の口実にしてしまう。
  - holdout は unrestricted experimentation ではない。harm risk、fairness risk、safety-critical notice floor を先に固定しなければならない。
  - negative uplift も学習対象である。失敗実験を消すのではなく archive しなければ policy memory が壊れる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は experiment admissibility、cohort assignment、uplift lint、causal evidence archive を分担する。
  experiment_holdout_lane:
    required_fields:
    - holdout_lane_id
    - eligibility_rule_ref
    - safety_floor_ref
    - allocation_rule_ref
    - fairness_guardrail_ref
    - opened_at_or_null
    rules:
    - eligibility_rule_ref のない setup を experiment holdout lane と呼んではならない。
    - safety_floor_ref のない holdout を permissible causal comparison とみなしてはならない。
    - allocation_rule_ref のない holdout を reproducible experiment lane と称してはならない。
