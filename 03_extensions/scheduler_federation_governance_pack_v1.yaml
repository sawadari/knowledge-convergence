  core_claims:
  - trust anchor は証明書束の置き場ではない。anchor set、issuer scope、owner forum、break-glass constraint を束ねなければ federated root of trust と呼べない。
  - key rotation は hygiene check ではない。rotation cadence、overlap window、dual-sign requirement、stale-key cutoff を covenant 化しなければ compromise 耐性が弱い。
  - revocation は未来向け deny list だけでは足りない。revocation trigger、replayable notice、retroactive trust cut、re-issuance gate を束ねなければ breach lineage を監査できない。
  - break-glass key は emergency override と別物である。利用条件、validity ceiling、mandatory post-use rotation がなければ shortcut credential になる。
  - re-issued credential は clean slate ではない。previous compromise lineage、retained obligation、trust probation を残さなければ accountable recovery とみなせない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は trust anchor registry、rotation / revocation evaluation、stale-key lint、credential archive を分担する。
