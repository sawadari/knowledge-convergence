scheduler_post_shed_review_governance:
  status: provisional_fixed
  statement: scheduler_post_shed_review_governance とは、post-shed evidence quarantine、causal review gate、recurrence debt retirement を固定する規則である。
  core_claims:
  - controlled shedding の後処理は retrospective meeting 一般ではない。decision trace、override use、suspension lane、external notice、dependency flap を evidence quarantine packet として保存し、後から都合よく消せないようにしなければならない。
  - causal review gate は blame assignment の場ではなく、recurrence mechanism・policy gap・tool failure・vendor dependency のどこに再発源があるかを切り分ける admission gate である。review gate を通らない closure は nominal closure に過ぎない。
  - recurrence debt は unresolved causal hazard、policy repair pending、training gap、dependency redesign pending を含む。再発確率を下げる行為が完了するまでは service restoration と debt retirement を同一視してはならない。
  - evidence quarantine では actor blame を主軸にしてはならない。timing witness、queue state、override budget burn、notice lag、dependency health を causal bundle として残すべきである。
  - review outcome は no-fault systemic issue、policy defect、tool defect、dependency defect、governance misuse などに類型化し、修理 owner と due window を束縛しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は quarantine packet registry、causal review branching、recurrence debt tracking、retirement witness audit を分担する。
