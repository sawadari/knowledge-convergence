      - exhaustion evidence pack
      - collapse charter archive
      - termination packet archive
      - retained-obligation audit trail
  forbidden_shortcuts:
  - protected obligation gap を示さずに budget exhaustion を宣言する
  - silent scope cut で rebase を済ませる
  - archive continuity なしで termination を clean exit と呼ぶ
  - resume precondition を定めず deferred scope を future promise にする
  residual_open_points: []
scheduler_retained_core_restart_governance:
  status: provisional_fixed
  statement: scheduler_retained_core_restart_governance とは、retained-core restart canary、autonomy re-enable、rollback fence を固定する規則である。
  core_claims:
  - rebase や controlled retreat の後に retained core を再起動するときは、一括復旧ではなく canary cohort から始めなければならない。restart は再開の意思ではなく failure containment 付きの実験である。
  - autonomy re-enable は manual override の停止ではない。manual-to-auto handback、watch coverage、success window、fallback readiness を束ねた gate を通る必要がある。
  - rollback fence は rollback button 一般ではない。どの signal family、which protected surface、どの latency budget で auto rollback へ戻すかを registry 化しなければならない。
  - retained core 再起動中は throughput 最大化よりも safe observability を優先する。hidden backlog drain や silent queue reopen を canary success と誤認してはならない。
  - manual operator が残る局面では auto に戻した瞬間の責任空白を作ってはならない。handoff owner、expiry、shadow witness を持たない autonomy re-enable は無効である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は restart canary registry、re-enable gate simulation、rollback fence lint、restart evidence archive を分担する。
  restart_canary_packet:
    required_fields:
    - restart_packet_id
    - retained_core_surface_ref
    - canary_cohort_ref
    - success_window_ref
    - watch_owner_ref
    - fallback_ready_ref
    - issued_at
    rules:
    - canary_cohort_ref のない restart を broad reopen として実行してはならない。
    - success_window_ref のない restart success を first minute health だけで宣言してはならない。
    - fallback_ready_ref のない retained-core restart を reversible recovery と呼んではならない。
  autonomy_reenable_gate:
    required_bindings:
    - handback_case_id
    - manual_to_auto_scope_ref
    - watch_coverage_ref
    - shadow_witness_ref
    - gate_owner_ref
    - expiry_or_review_window_ref
    rules:
    - shadow_witness_ref のない handback を safe re-enable とみなしてはならない。
    - gate_owner_ref のない autonomy re-enable を shift change に委ねてはならない。
    - expiry_or_review_window_ref のない temporary re-enable を evergreen auto にしてはならない。
  rollback_fence:
    required_fields:
    - rollback_fence_id
    - trigger_signal_family_ref
    - protected_surface_ref
    - latency_budget_ref
    - rollback_target_mode_ref
    - fence_owner_ref
    rules:
    - trigger_signal_family_ref のない rollback fence を operator intuition で代替してはならない。
    - latency_budget_ref のない rollback を after-the-fact response にしてはならない。
    - rollback_target_mode_ref のない unsafe re-automation を gradual recovery と誤称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - restart canary registry
      - handback gate approval
      - rollback fence binding
      - temporary re-enable expiry ratification
    GraphEngine:
      owns:
      - canary cohort simulation
      - watch coverage sufficiency check
      - success-window evaluation
      - rollback latency projection
    GraphLint:
      owns:
      - cohort-free restart lint
      - ownerless handback lint
      - rollback-target-missing lint
      - shadowless re-enable lint
    archive_object:
      owns:
      - restart packet archive
      - shadow witness bundle
      - rollback event trace
      - restart audit trail
  forbidden_shortcuts:
  - retained core を canary なしで full reopen する
  - manual-to-auto handback を口頭合意だけで済ませる
  - rollback fence を operator heroics に委ねる
  - shadow witness なしで autonomy re-enable を恒常化する
  residual_open_points: []
scheduler_restart_expansion_promotion_governance:
  status: provisional_fixed
  statement: scheduler_restart_expansion_promotion_governance とは、restart cohort expansion、shadow traffic promotion、rollback rehearse を固定する規則である。
  core_claims:
  - canary success の次は binary full-open ではなく cohort expansion plan で進めるべきである。cohort は traffic family、mutation class、customer surface の順に widening し、protected surface を最後まで優先しなければならない。
  - shadow traffic promotion は read-only mirror 一般ではない。what is shadowed、何を commit せず comparison するか、差分逸脱をどの threshold で freeze するかを明示しなければならない。
  - rollback rehearse は drill であり、promotion 前に rollback path を実際に踏めることを示す必要がある。rehearseless promotion は reversible recovery ではない。
  - expansion 中は healthy cohort と risky cohort を同じ success criterion で束ねてはならない。surface class ごとに promotion ceiling と freeze trigger を分ける必要がある。
  - promotion owner が success story を優先して adverse witness を隠してはならない。negative shadow diff は reopen 速度より優先される。
  - DecisionLedger / GraphEngine / GraphLint / archive object は expansion registry、shadow diff evaluation、rollback rehearsal trace、promotion audit trail を分担する。
  expansion_cohort_plan:
    required_fields:
    - expansion_plan_id
    - cohort_sequence_ref
    - surface_priority_ref
    - promotion_ceiling_ref
    - freeze_trigger_ref
    - plan_owner_ref
    - approved_at
    rules:
    - cohort_sequence_ref のない widening を staged recovery と呼んではならない。
    - promotion_ceiling_ref のない expansion を bounded rollout と誤称してはならない。
    - freeze_trigger_ref のない cohort promotion を safe widening とみなしてはならない。
  shadow_traffic_promotion:
    required_bindings:
    - shadow_case_id
    - shadowed_surface_ref
    - non_commit_comparison_ref
    - diff_threshold_ref
    - promotion_gate_owner_ref
    - evaluation_window_ref
    rules:
    - non_commit_comparison_ref のない shadow traffic を harmless mirror とみなしてはならない。
    - diff_threshold_ref のない shadow diff を qualitative comfort で処理してはならない。
    - promotion_gate_owner_ref のない promotion を emergent growth に委ねてはならない。
  rollback_rehearsal:
    required_fields:
    - rehearsal_id
    - covered_cohort_ref
    - rollback_path_ref
    - recovery_time_objective_ref
    - evidence_owner_ref
    - rehearsed_at
    rules:
    - rollback_path_ref のない rehearsal を reversible witness として記録してはならない。
    - recovery_time_objective_ref のない rollback rehearse を pass 扱いしてはならない。
    - evidence_owner_ref のない drill result を promotion basis にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - expansion plan registry
      - promotion ceiling ratification
      - shadow promotion approval
      - rollback rehearsal acceptance
    GraphEngine:
      owns:
      - cohort widening simulation
      - shadow diff scoring
      - freeze-trigger sensitivity analysis
      - rollback time projection
    GraphLint:
      owns:
      - sequence-free expansion lint
      - thresholdless shadow diff lint
      - rehearseless promotion lint
      - ceiling-free widening lint
    archive_object:
      owns:
      - expansion plan archive
      - shadow comparison bundle
      - rollback rehearsal trace
      - promotion audit trail
  forbidden_shortcuts:
  - canary success だけで全面 rollout する
  - shadow traffic を diff threshold なしで解釈する
  - rollback rehearsal を slide deck 証明に置き換える
  - promotion ceiling なしで cohort を連鎖拡大する
  residual_open_points: []
scheduler_autonomy_confidence_freezeback_governance:
  status: provisional_fixed
  statement: scheduler_autonomy_confidence_freezeback_governance とは、autonomy confidence accrual、error-budget reopen、freeze-back trigger を固定する規則である。
  core_claims:
  - restart 後の autonomy は二値の復旧判定では足りない。confidence ledger を持ち、guarded auto がどの witness を積んで nominal auto に近づくかを累積的に扱う必要がある。
  - error budget reopen は失敗回数の素朴な上限ではない。protected surface regression、latency overshoot、manual rescue burn、rollback near-miss を含む budget として管理しなければならない。
  - freeze-back trigger は全停止ではなく confidence accumulation を巻き戻す safety gate である。risk signal が threshold を超えたときは widening を止め、必要なら prior cohort state へ戻すべきである。
  - confidence は時間と変更量で減衰する。long quiet period や major topology change の後に過去の confidence score をそのまま使ってはならない。
  - reopen gate と freeze-back gate は対称ではない。reopen 条件より freeze-back 条件を鋭敏にし、unsafe optimism を抑えなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は confidence ledger registry、error-budget accounting、freeze-back trigger evaluation、confidence archive を分担する。
  confidence_ledger:
    required_fields:
    - confidence_ledger_id
    - witness_family_ref
    - accumulation_window_ref
    - decay_rule_ref
    - nominal_target_ref
    - ledger_owner_ref
    - updated_at
    rules:
    - decay_rule_ref のない confidence を evergreen trust として扱ってはならない。
    - witness_family_ref のない score を persuasive narrative で代替してはならない。
    - nominal_target_ref のない accumulation を progress meter と誤称してはならない。
  error_budget_reopen:
    required_bindings:
    - budget_case_id
    - protected_surface_regression_ref
    - latency_overshoot_ref
    - manual_rescue_burn_ref
    - near_miss_ref
    - reopen_owner_ref
    rules:
    - manual_rescue_burn_ref を無視して budget healthy と宣言してはならない。
    - near_miss_ref のない reopen を zero-risk 回復とみなしてはならない。
    - reopen_owner_ref のない budget judgement を dashboard 自動解釈に委ねてはならない。
  freeze_back_trigger:
    required_fields:
    - freezeback_trigger_id
    - risk_signal_family_ref
    - trigger_threshold_ref
    - fallback_state_ref
    - evaluation_owner_ref
    - armed_at
    rules:
    - risk_signal_family_ref のない freeze-back を operator anxiety で発火してはならない。
    - fallback_state_ref のない freeze-back を safe retreat と呼んではならない。
    - trigger_threshold_ref のない confidence rollback を ad hoc throttle にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - confidence ledger registry
      - error-budget reopen approval
      - freeze-back trigger binding
      - nominal-target ratification
    GraphEngine:
      owns:
      - confidence score accumulation
      - decay calculation
      - error-budget burn projection
      - freeze-back trigger sensitivity analysis
    GraphLint:
      owns:
      - decay-free confidence lint
      - manual-rescue-blind budget lint
      - fallbackless freeze-back lint
      - targetless accumulation lint
    archive_object:
      owns:
      - confidence ledger snapshots
      - error-budget evidence bundle
      - freeze-back trigger archive
      - confidence decay history
  forbidden_shortcuts:
  - confidence decay なしで過去成功を永続利用する
  - manual rescue burn を error budget から外す
  - freeze-back を fallback state なしで発火する
  - nominal target を定めず confidence accumulation を語る
  residual_open_points: []
scheduler_override_debt_unwind_governance:
  status: provisional_fixed
  statement: scheduler_override_debt_unwind_governance とは、manual override debt unwind、operator fatigue reset、break-glass revocation を固定する規則である。
  core_claims:
  - restart 局面で積み上がった manual override は event log で消えるものではない。override debt ledger として残し、どの debt を unwind 完了とみなすかを formalize する必要がある。
  - operator fatigue は個人根性で吸収してはならない。watch density、night carry-over、context switch load、break-glass frequency を束ねた fatigue reset packet が必要である。
  - break-glass token は emergency のために存在する。nominal return 後も revoke されない token は hidden exceptionalism を残す。
  - override debt の unwind は throughput 回復ではなく、manual-only pathway の削除、temporary exception rule の解除、watch burden の正常化を含むべきである。
  - fatigue reset と token revocation は同時に語らなければならない。operator を休ませず token だけ revoke すると contingency coverage が空洞化する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は override debt ledger、fatigue reset attestation、break-glass revocation audit、unwind completion archive を分担する。
  override_debt_ledger:
    required_fields:
    - override_debt_id
    - manual_pathway_ref
    - exception_rule_ref
    - watch_burden_ref
    - unwind_condition_ref
    - debt_owner_ref
    - recorded_at
    rules:
    - manual_pathway_ref のない override debt を abstract burden にしてはならない。
    - unwind_condition_ref のない debt を future cleanup 一般へ逃がしてはならない。
    - debt_owner_ref のない override debt を collective memory に委ねてはならない。
  operator_fatigue_reset:
    required_bindings:
    - fatigue_reset_id
    - watch_density_delta_ref
    - night_carryover_ref
    - context_switch_load_ref
    - recovery_window_ref
    - reset_owner_ref
    rules:
    - recovery_window_ref のない fatigue reset を good intention で代替してはならない。
    - watch_density_delta_ref を測らずに operator normalized と宣言してはならない。
    - reset_owner_ref のない fatigue reset を self-care に委ねてはならない。
  break_glass_revocation:
    required_fields:
    - revocation_case_id
    - token_scope_ref
    - revocation_trigger_ref
    - fallback_coverage_ref
    - revocation_owner_ref
    - revoked_at
    rules:
    - fallback_coverage_ref のない token revoke を safe closure とみなしてはならない。
    - revocation_trigger_ref のない token 存続を routine convenience にしてはならない。
    - token_scope_ref のない revoke を partial cleanup と誤称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - override debt ledger registry
      - fatigue reset approval
      - break-glass revocation binding
      - unwind completion ratification
    GraphEngine:
      owns:
      - manual pathway dependency map
      - watch burden decay calculation
      - fatigue recovery sufficiency check
      - fallback coverage check for token revoke
    GraphLint:
      owns:
      - ownerless override debt lint
      - windowless fatigue reset lint
      - coverage-free revoke lint
      - throughput-only unwind lint
    archive_object:
      owns:
      - override debt snapshots
      - fatigue reset evidence pack
      - token revocation audit trail
      - unwind completion archive
  forbidden_shortcuts:
  - override debt を event log 消失で解消済みとみなす
  - operator fatigue を self-care だけで処理する
  - fallback coverage なしで break-glass token を revoke する
  - throughput 回復だけで unwind 完了とみなす
  residual_open_points: []
scheduler_capacity_reaccrual_reintegration_governance:
  status: provisional_fixed
  statement: scheduler_capacity_reaccrual_reintegration_governance とは、capacity reaccrual、reserve refill、portfolio reintegration を固定する規則である。
  core_claims:
  - incident 後の nominal return は単一 service の復旧ではない。capacity reaccrual plan を持ち、どの worker family、queue lane、vendor dependency をどの順序で戻すかを束縛しなければならない。
  - reserve refill は spare 人員や spare token の再配置一般ではない。consumed reserve の origin、refill horizon、protected surface priority を示す packet が必要である。
  - portfolio reintegration は local recovery の自己申告で開いてはならない。donor-safe condition、mutual-aid unwind、cross-portfolio spillback risk を確認してから戻す必要がある。
  - capacity を戻す局面でも throughput を過大評価してはならない。latent debt、operator recovery、dependency lag を無視した reintegration は false normalcy を生む。
  - reserve refill が未完了のまま nominal portfolio へ戻すと、次の異常で即座に stop-rule へ戻りやすい。restored capacity と restored resilience を区別しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は capacity plan registry、reserve refill audit、portfolio reintegration simulation、resilience archive を分担する。
  capacity_reaccrual_plan:
    required_fields:
    - capacity_plan_id
    - worker_family_restore_ref
    - queue_lane_restore_ref
    - dependency_restore_ref
    - sequencing_rule_ref
    - plan_owner_ref
    - approved_at
    rules:
    - sequencing_rule_ref のない capacity return を orderly recovery と呼んではならない。
    - dependency_restore_ref のない worker return を productive recovery と誤称してはならない。
    - plan_owner_ref のない reaccrual を natural rebound に委ねてはならない。
  reserve_refill_packet:
    required_bindings:
    - refill_packet_id
    - consumed_reserve_origin_ref
    - refill_horizon_ref
    - protected_surface_priority_ref
    - refill_owner_ref
    - completion_witness_ref
    rules:
    - consumed_reserve_origin_ref のない refill を accounting fiction にしてはならない。
    - completion_witness_ref のない reserve refill を resilience recovered とみなしてはならない。
    - refill_horizon_ref のない refill promise を future hope に逃がしてはならない。
  portfolio_reintegration_gate:
    required_fields:
    - reintegration_gate_id
    - donor_safe_condition_ref
    - mutual_aid_unwind_ref
    - spillback_risk_ref
    - gate_owner_ref
    - opened_at
    rules:
    - donor_safe_condition_ref のない reintegration を local convenience で進めてはならない。
    - spillback_risk_ref のない return を portfolio-safe とみなしてはならない。
    - mutual_aid_unwind_ref のない reintegration を clean rejoin と誤称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - capacity reaccrual registry
      - reserve refill ratification
      - portfolio reintegration approval
      - completion witness binding
    GraphEngine:
      owns:
      - restore sequencing simulation
      - reserve refill sufficiency check
      - spillback risk projection
      - donor-safe condition evaluation
    GraphLint:
      owns:
      - sequence-free reaccrual lint
      - witness-free refill lint
      - donor-blind reintegration lint
      - false-normalcy lint
    archive_object:
      owns:
      - capacity plan archive
      - reserve refill packet
      - reintegration evidence bundle
      - resilience recovery archive
  forbidden_shortcuts:
  - capacity を順序なしで一括復帰させる
  - reserve refill を future hope のまま nominal return へ進める
  - donor-safe 条件なしで portfolio reintegration を開く
  - throughput 回復だけで resilience recovered とみなす
  residual_open_points: []
scheduler_service_restoration_closure_governance:
  status: provisional_fixed
  statement: scheduler_service_restoration_closure_governance とは、service restoration attestation、external recommit lane、status-page closure を固定する規則である。
  core_claims:
  - service restoration は internal healthy 宣言では足りない。restoration attestation packet を持ち、protected surface continuity、error-budget posture、reserve refill 状態、residual risk を外部説明可能にしなければならない。
  - external recommit lane は marketing restart ではない。どの SLA / notice / commitment surface を再開できるか、どの residual degradation を残したままかを bounded に束縛する formal lane である。
  - status-page closure は情報発信停止ではなく、incident timeline、restoration basis、remaining watch mode、next review window を閉じる closure packet である。
  - public closure は private optimism より厳格でなければならない。internal convenience のために residual risk を silent にしてはならない。
  - recommit lane と closure packet は切り離してはならない。再約束だけして closure evidence がないと、次回 incident で説明責任が連鎖破綻する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は restoration attestation registry、recommit scope check、status-page closure validation、external audit trail を分担する。
  restoration_attestation_packet:
    required_fields:
    - restoration_packet_id
    - protected_surface_continuity_ref
    - error_budget_posture_ref
    - reserve_refill_status_ref
    - residual_risk_ref
    - attestation_owner_ref
    - issued_at
    rules:
    - residual_risk_ref のない restoration attestation を full normal と表現してはならない。
    - reserve_refill_status_ref のない attestation を resilience recovered と誤称してはならない。
    - attestation_owner_ref のない restoration packet を public statement basis にしてはならない。
  external_recommit_lane:
    required_bindings:
    - recommit_case_id
    - reopened_commitment_surface_ref
    - residual_degradation_ref
    - notice_scope_ref
    - lane_owner_ref
    - effective_window_ref
    rules:
    - residual_degradation_ref を空欄のまま recommit を complete recovery と表現してはならない。
    - notice_scope_ref のない recommit を lawful external lane と扱ってはならない。
    - lane_owner_ref のない SLA reopen を sales optimism に委ねてはならない。
  status_page_closure_packet:
    required_fields:
    - closure_packet_id
    - incident_timeline_ref
    - restoration_basis_ref
    - remaining_watch_mode_ref
    - next_review_window_ref
    - closure_owner_ref
    rules:
    - restoration_basis_ref のない closure を announcement fatigue で終わらせてはならない。
    - remaining_watch_mode_ref のない status closure を no-watch normalcy と誤認させてはならない。
    - next_review_window_ref のない closure を final memory にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - restoration attestation registry
      - external recommit approval
      - status-page closure ratification
      - residual-risk disclosure binding
    GraphEngine:
      owns:
      - protected-surface continuity check
      - recommit scope validation
      - reserve-refill status projection
      - closure completeness check
    GraphLint:
      owns:
      - risk-free attestation lint
      - notice-free recommit lint
      - watchless closure lint
      - premature-closure lint
    archive_object:
      owns:
      - restoration packet archive
      - external recommit notice bundle
      - status-page closure packet
      - external audit trail
  forbidden_shortcuts:
  - residual risk を書かずに full normal を宣言する
  - notice scope なしで external recommit を進める
  - remaining watch mode なしで status-page を閉じる
  - closure evidence なしで public memory を終了させる
  residual_open_points: []
scheduler_restart_learning_reseal_governance:
  status: provisional_fixed
  statement: scheduler_restart_learning_reseal_governance とは、restart / recovery で得た学習を learning feedforward packet、policy baseline reseal gate、next-incident readiness refresh plan に束ねて次回運用へ戻す規則である。
  core_claims:
  - 復旧で得た知見は retro memo では足りない。causal finding、temporary workaround、debt retirement、policy delta を束ねた learning feedforward packet として次回 readiness へ接続しなければならない。
  - policy baseline reseal は暫定ルールの保存ではなく、どの temporary rule を baseline へ昇格させ、どの emergency carveout を sunset させるかを gate で固定する行為である。
  - next-incident readiness refresh は single document update ではない。detector、runbook、staffing、dependency、drill のどの surface を更新対象にするかを bounded plan にしなければならない。
  - service restoration を public に閉じても、learning が baseline へ戻らなければ recovery debt は温存される。closure 後の fixed / pending / forbidden を分けて registry 化しなければならない。
  - lessons learned は owner と due window がなければ学習ではない。ownerless learning packet や due 不明の readiness refresh を adopt 扱いにしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は feedforward registry、reseal gate evaluation、refresh plan lint、learning archive を分担する。
  learning_feedforward_packet:
    required_fields:
    - learning_packet_id
    - source_incident_ref
    - causal_findings_ref
    - temporary_rule_ref
    - debt_retirement_delta_ref
    - policy_delta_ref
    - runbook_delta_ref
    - readiness_targets_ref
    - owner_ref
    - due_window_ref
    - issued_at
    rules:
    - policy_delta_ref のない learning packet を baseline change の根拠にしてはならない。
    - owner_ref と due_window_ref のない lesson を next-incident readiness item として閉じてはならない。
    - readiness_targets_ref を空欄のまま closure complete と表現してはならない。
  policy_baseline_reseal_gate:
    required_bindings:
    - baseline_id
    - prior_baseline_ref
    - delta_class_ref
    - approval_owner_ref
    - effective_at
    - sunset_or_persist_decision_ref
    - rollback_basis_ref
    rules:
    - delta_class_ref のない reseal を meeting consensus だけで成立させてはならない。
    - sunset_or_persist_decision_ref のない temporary workaround を baseline に混入してはならない。
    - rollback_basis_ref のない reseal を irreversible policy change として流してはならない。
  readiness_refresh_plan:
    required_fields:
    - refresh_plan_id
    - scenario_family_ref
    - detector_refresh_scope_ref
    - staffing_refresh_scope_ref
    - dependency_refresh_scope_ref
    - drill_due_ref
    - plan_owner_ref
    rules:
    - scenario_family_ref のない refresh を generic improvement backlog に落としてはならない。
    - drill_due_ref のない refresh を preparedness recovered とみなしてはならない。
    - plan_owner_ref のない refresh scope を self-healing と誤称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - learning packet registry
      - baseline reseal approval
      - refresh-plan binding
      - sunset/persist decision log
    GraphEngine:
      owns:
      - finding-to-policy delta linkage
      - reseal gate completeness check
      - refresh scope impact projection
      - due-window dependency graph
    GraphLint:
      owns:
      - ownerless learning lint
      - delta-free reseal lint
      - scope-free refresh lint
      - closure-without-feedforward lint
    archive_object:
      owns:
      - learning packet archive
      - policy reseal evidence bundle
      - refresh plan snapshot
      - post-incident learning trail
  forbidden_shortcuts:
  - lessons learned を archive 保存だけで closed にする
  - temporary workaround を sunset 判断なしで baseline へ昇格する
  - readiness refresh を owner なしの wish list にする
  - policy delta 不明のまま restart learning complete と宣言する
  residual_open_points: []
scheduler_runbook_owner_drill_governance:
  status: provisional_fixed
  statement: scheduler_runbook_owner_drill_governance とは、runbook delta の ratification、primary/backup owner の再受領、drill backlog issuance を固定する規則である。
  core_claims:
  - runbook delta は diff があるだけでは効力を持たない。scenario family、trigger condition、protected surface、fallback path ごとの ratified delta packet が必要である。
  - owner re-acknowledgment は既読確認ではない。primary owner、backup owner、handover boundary、response SLA を束ねて再受領させなければならない。
  - drill backlog issuance は training wish list ではない。delta に対してどの drill が mandatory か、いつまでに replay / tabletop / shadow exercise を行うかを issue 化する必要がある。
  - runbook を更新しても owner matrix が古いままなら readiness は回復していない。owner vacancy や backup 不在を silent にしてはならない。
  - drill は delta と結び付いていなければ検証にならない。generic annual drill で freshly changed control の妥当性を代替してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は delta registry、owner coverage check、drill issuance trace、runbook evidence archive を分担する。
  runbook_delta_packet:
    required_fields:
    - runbook_delta_id
    - scenario_family_ref
    - trigger_condition_ref
    - protected_surface_ref
    - procedure_delta_ref
    - fallback_path_ref
    - ratifier_ref
    - effective_at
    rules:
    - procedure_delta_ref のない packet を runbook change と呼んではならない。
    - ratifier_ref のない delta を operational basis にしてはならない。
    - fallback_path_ref のない delta を safe update とみなしてはならない。
  owner_acknowledgment_bundle:
    required_bindings:
    - owner_bundle_id
    - primary_owner_ref
    - backup_owner_ref
    - handover_boundary_ref
    - response_sla_ref
    - acknowledged_at
    - expiry_or_review_due_ref
    rules:
    - backup_owner_ref のない critical surface を owner-covered とみなしてはならない。
    - handover_boundary_ref のない acknowledgment を shift continuity の根拠にしてはならない。
    - expiry_or_review_due_ref のない owner bundle を evergreen valid としてはならない。
  drill_backlog_item:
    required_fields:
    - drill_item_id
    - source_delta_ref
    - drill_type_ref
    - due_at
    - completion_witness_ref_or_null
    - drill_owner_ref
    - escalation_path_ref
    rules:
    - source_delta_ref のない drill を delta validation と称してはならない。
    - drill_owner_ref のない backlog を preparedness proof に使ってはならない。
    - escalation_path_ref のない overdue drill を silent debt にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - runbook delta ratification
      - owner acknowledgment registry
      - drill issuance ledger
      - overdue escalation log
    GraphEngine:
      owns:
      - delta-to-owner coverage mapping
      - backup continuity check
      - drill dependency graph
      - overdue impact projection
    GraphLint:
      owns:
      - ratifier-missing runbook lint
      - backupless owner lint
      - delta-free drill lint
      - stale-acknowledgment lint
    archive_object:
      owns:
      - runbook delta archive
      - owner acknowledgment bundle
      - drill issue evidence
      - execution readiness trail
  forbidden_shortcuts:
  - runbook wiki を直接書き換えて ratification を省略する
  - primary owner だけで critical surface の受領完了とみなす
  - generic drill を changed control の検証代わりに使う
  - 期限超過 drill を記録せずに readiness maintained と宣言する
  residual_open_points: []
scheduler_detector_recalibration_governance:
  status: provisional_fixed
  statement: scheduler_detector_recalibration_governance とは、post-incident の detector recalibration、alert threshold retuning、noise-budget reset を固定する規則である。
  core_claims:
  - incident 後の detector は単純再開してはならない。false negative origin、false positive flood、mirror lag、coverage gap を calibration packet に束ねてから再較正する必要がある。
  - threshold retuning は threshold 値の書換えではなく、prior threshold、candidate threshold、shadow validation、migration owner を持つ migration witness として扱う。
  - noise-budget reset は all clear でゼロ化してはならない。fatigue debt、suppression debt、ignored alert residue を explicit に清算しなければならない。
  - single incident の anecdote を全 detector family に一般化してはならない。family / sink / severity 別に retuning 対象を bounded に切り分ける必要がある。
  - shadow validation を経ない aggressive threshold change は unsafe である。production alerting と shadow scoring の divergence を観測しないまま activate してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は calibration registry、migration simulation、noise debt lint、detector evidence archive を分担する。
  calibration_packet:
    required_fields:
    - calibration_packet_id
    - detector_family_ref
    - failure_mode_ref
    - coverage_gap_ref
    - noise_debt_ref
    - candidate_change_ref
    - owner_ref
    - review_window_ref
    rules:
    - failure_mode_ref のない recalibration を post-incident learning と呼んではならない。
    - noise_debt_ref のない reset を clean slate と称してはならない。
    - review_window_ref のない calibration を indefinite tweak にしてはならない。
  threshold_migration_witness:
    required_bindings:
    - migration_witness_id
    - prior_threshold_ref
    - candidate_threshold_ref
    - shadow_validation_ref
    - activation_guard_ref
    - migration_owner_ref
    - effective_at
    rules:
    - shadow_validation_ref のない migration を production activation に進めてはならない。
    - activation_guard_ref のない retuning を reversible と表現してはならない。
    - migration_owner_ref のない threshold change を autonomous drift に委ねてはならない。
  noise_budget_reset:
    required_fields:
    - noise_reset_id
    - fatigue_debt_ref
    - suppression_debt_ref
    - ignored_alert_residue_ref
    - reset_strategy_ref
    - reset_owner_ref
    - closure_due_ref
    rules:
    - suppression_debt_ref のない reset を alert health recovery とみなしてはならない。
    - reset_strategy_ref のない debt cleanup を operator perseverance に委ねてはならない。
    - closure_due_ref のない noise reset を perpetual cleanup にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - calibration packet registry
      - threshold migration approval
      - noise-budget reset log
      - review-window binding
    GraphEngine:
      owns:
      - shadow validation comparison
      - coverage-gap projection
      - threshold impact simulation
      - noise-debt trend evaluation
    GraphLint:
      owns:
      - failure-mode-missing calibration lint
      - shadowless threshold migration lint
      - noise-reset-without-debt lint
      - overbroad-family-generalization lint
    archive_object:
      owns:
      - calibration packet archive
      - migration shadow evidence
      - noise debt cleanup bundle
      - detection recovery trail
  forbidden_shortcuts:
  - incident anecdote だけで detector family 全体を retune する
  - shadow validation なしで threshold を production へ反映する
  - noise debt をゼロリセットして fatigue をなかったことにする
  - owner なしの calibration tweak を self-correcting と呼ぶ
  residual_open_points: []
scheduler_dependency_contact_rehearsal_governance:
  status: provisional_fixed
  statement: scheduler_dependency_contact_rehearsal_governance とは、external dependency の contact-path refresh、failover credential reseal、vendor escalation rehearsal を固定する規則である。
  core_claims:
  - dependency readiness は契約書参照だけでは足りない。actual contact path、reachable escalation chain、fallback window を束ねた packet が必要である。
  - failover credential は incident 後に必ず reseal しなければならない。temporary shared secret や borrowed access を emergency residue のまま残してはならない。
  - vendor escalation rehearsal は紙上ルート確認ではなく、誰に何分以内に reach できるかを completion witness 付きで検証する必要がある。
  - contact path は single person dependency にしてはならない。primary contact、backup contact、off-hours path、contract breakpoint path を明示しなければならない。
  - credential reseal は revoke と reissue を分けて扱う。temporary credential を revoke せずに新 credential を追加するだけでは access debt が残る。
  - DecisionLedger / GraphEngine / GraphLint / archive object は dependency registry、credential lifecycle check、rehearsal trace、vendor evidence archive を分担する。
  contact_path_packet:
    required_fields:
    - contact_packet_id
    - dependency_surface_ref
    - primary_contact_ref
    - backup_contact_ref
    - off_hours_path_ref
    - contract_breakpoint_path_ref
    - valid_until_ref
    - owner_ref
    rules:
    - backup_contact_ref のない packet を reachable path とみなしてはならない。
    - contract_breakpoint_path_ref のない dependency を governed escalation と称してはならない。
    - valid_until_ref のない contact path を fresh とみなしてはならない。
  failover_credential_reseal_case:
    required_bindings:
    - reseal_case_id
    - affected_credential_ref
    - temporary_access_ref
    - revoke_step_ref
    - reissue_step_ref
    - verification_witness_ref
    - case_owner_ref
    - closed_at_or_null
    rules:
    - revoke_step_ref のない reseal を credential cleanup とみなしてはならない。
    - verification_witness_ref のない reissue を ready credential として扱ってはならない。
    - case_owner_ref のない emergency access cleanup を自動収束に委ねてはならない。
  vendor_escalation_rehearsal:
    required_fields:
    - rehearsal_id
    - dependency_surface_ref
    - trigger_scenario_ref
    - target_vendor_path_ref
    - response_window_ref
    - completion_witness_ref_or_null
    - rehearsal_owner_ref
    - next_due_ref
    rules:
    - trigger_scenario_ref のない rehearsal を actionable 検証と呼んではならない。
    - response_window_ref のない rehearsal を SLA readiness の根拠にしてはならない。
    - next_due_ref のない vendor rehearsal を one-off event にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - contact-path registry
      - credential reseal approval
      - vendor rehearsal ledger
      - expiry/next-due binding
    GraphEngine:
      owns:
      - contact reachability graph
      - revoke/reissue dependency check
      - vendor response-window projection
      - single-person dependency detection
    GraphLint:
      owns:
      - backupless contact lint
      - revoke-free reseal lint
      - scenario-free rehearsal lint
      - stale-contact-path lint
    archive_object:
      owns:
      - contact packet archive
      - credential reseal evidence
      - vendor rehearsal trace
      - dependency readiness trail
  forbidden_shortcuts:
  - 契約書上の連絡先だけで reachable path とみなす
  - temporary credential を revoke せずに reissue だけ行う
  - vendor escalation rehearsal をメール送信訓練だけで済ませる
  - single person dependency を silent に残したまま failover ready と宣言する
  residual_open_points: []
scheduler_reserve_roster_recertification_governance:
  status: provisional_fixed
  statement: scheduler_reserve_roster_recertification_governance とは、reserve roster の recertification、fatigue-safe staffing rebuild、succession coverage refresh を固定する規則である。
  core_claims:
  - reserve roster は名簿ではなく skill / authority / fatigue budget を持つ readiness surface である。incident 後には recertification packet で再確認しなければならない。
  - fatigue-safe staffing rebuild は headcount 回復では足りない。on-call density、handover continuity、break-glass residue、recovery window を含めて評価する必要がある。
  - succession coverage refresh は single hero replacement ではない。critical role ごとに successor path、cross-training 状態、vacancy trigger を持たなければならない。
  - training completion を certification freshness と混同してはならない。recent drill participation、manual override exposure、tooling familiarity を freshness に含める必要がある。
  - reserve staffing を nominal count だけで healthy と宣言してはならない。fatigue debt と uncovered shift boundary が残るなら readiness debt は継続する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は roster registry、coverage evaluation、succession lint、staffing evidence archive を分担する。
  recertification_packet:
    required_fields:
    - recert_packet_id
    - role_family_ref
    - skill_scope_ref
    - authority_scope_ref
    - fatigue_budget_ref
    - freshness_evidence_ref
    - owner_ref
    - review_due_ref
    rules:
    - freshness_evidence_ref のない recertification を active-ready とみなしてはならない。
    - fatigue_budget_ref のない reserve roster を safe staffing と呼んではならない。
    - review_due_ref のない recert packet を evergreen valid にしてはならない。
  staffing_coverage_matrix:
    required_bindings:
    - coverage_matrix_id
    - critical_role_ref
    - primary_staff_ref
    - secondary_staff_ref
    - shift_boundary_ref
    - coverage_gap_ref
    - rebuild_owner_ref
    - target_recovery_date_ref
    rules:
    - secondary_staff_ref のない critical role を coverage complete とみなしてはならない。
    - coverage_gap_ref を空欄のまま staffing rebuild を完了扱いにしてはならない。
    - target_recovery_date_ref のない gap を temporary と誤称してはならない。
  succession_refresh:
    required_fields:
    - succession_refresh_id
    - critical_role_ref
    - successor_path_ref
    - cross_training_ref
    - vacancy_trigger_ref
    - refresh_owner_ref
    - next_review_ref
    rules:
    - successor_path_ref のない refresh を succession covered と呼んではならない。
    - cross_training_ref のない successor を effective backup とみなしてはならない。
    - vacancy_trigger_ref のない refresh を incident-ready succession と扱ってはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recertification registry
      - coverage-gap debt log
      - succession refresh approval
      - review-due binding
    GraphEngine:
      owns:
      - role-to-skill coverage evaluation
      - fatigue-budget projection
      - shift-boundary gap detection
      - succession path dependency graph
    GraphLint:
      owns:
      - freshness-free recert lint
      - secondary-missing coverage lint
      - pathless succession lint
      - nominal-headcount-only lint
    archive_object:
      owns:
      - recertification packet archive
      - coverage matrix snapshot
      - succession refresh evidence
      - human readiness trail
  forbidden_shortcuts:
  - 名簿人数だけで reserve roster healthy と宣言する
  - fatigue budget なしで staffing rebuild 完了とみなす
  - single successor name だけで succession refresh 済みとする
  - freshness evidence のない certification を active-ready と扱う
  residual_open_points: []
scheduler_readiness_exercise_scorecard_governance:
  status: provisional_fixed
  statement: scheduler_readiness_exercise_scorecard_governance とは、chaos drill packet、shadow exercise replay、readiness score aging を固定する規則である。
  core_claims:
  - preparedness は宣言ではなく exercise で検証されなければならない。chaos / tabletop / shadow exercise ごとに packet を発行し、scenario、protected surface、success / failure witness を束ねる必要がある。
  - shadow exercise replay は production-like validation だが production そのものではない。traffic source、guard rail、abort condition、observation window を固定しなければならない。
  - readiness score は永続値ではない。control class ごとに aging rule、expiry、re-drill trigger を持たせ、古い成功証跡が current readiness を代表し続けないようにする。
  - exercise completion は pass/fail 二値だけで閉じてはならない。debt discovered、coverage limitation、score uplift/suppression、re-drill due を同時に残す必要がある。
  - single showcase drill を readiness 全体の代用にしてはならない。scenario family、dependency surface、human handoff、detector behavior の coverage matrix を持たなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は exercise registry、shadow replay guard、score aging evaluation、exercise evidence archive を分担する。
  exercise_packet:
    required_fields:
    - exercise_packet_id
    - exercise_type_ref
    - scenario_family_ref
    - protected_surface_ref
    - success_witness_ref_or_null
    - failure_witness_ref_or_null
    - exercise_owner_ref
    - completed_at_or_null
    rules:
    - scenario_family_ref のない exercise を readiness validation と呼んではならない。
    - success_witness_ref_or_null と failure_witness_ref_or_null の両方が空の packet を completed exercise とみなしてはならない。
    - exercise_owner_ref のない packet を governance evidence に使ってはならない。
  shadow_exercise_replay:
    required_bindings:
    - shadow_replay_id
    - traffic_source_ref
    - guard_rail_ref
    - abort_condition_ref
    - observation_window_ref
    - replay_owner_ref
    - replay_result_ref_or_null
    rules:
    - guard_rail_ref のない shadow replay を safe validation とみなしてはならない。
    - abort_condition_ref のない replay を reversible exercise と称してはならない。
    - observation_window_ref のない replay を detector/latency validation の根拠にしてはならない。
  readiness_score_aging:
    required_fields:
    - score_rule_id
    - control_class_ref
    - aging_window_ref
    - expiry_condition_ref
    - redrill_trigger_ref
    - score_owner_ref
    - suppression_rule_ref_or_null
    rules:
    - aging_window_ref のない score を evergreen readiness score と扱ってはならない。
    - redrill_trigger_ref のない score を drift-sensitive preparedness の根拠にしてはならない。
    - score_owner_ref のない score suppression を silent downgrade にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - exercise packet registry
      - shadow replay approval
      - score aging rule binding
      - re-drill trigger log
    GraphEngine:
      owns:
      - coverage-matrix evaluation
      - shadow replay guard simulation
      - score aging computation
      - redrill trigger projection
    GraphLint:
      owns:
      - witness-free exercise lint
      - guardless shadow replay lint
      - aging-free score lint
      - showcase-only coverage lint
    archive_object:
      owns:
      - exercise packet archive
      - shadow replay evidence
      - readiness score history
      - exercise governance trail
  forbidden_shortcuts:
  - 単発 showcase drill だけで readiness 全体を validated と宣言する
  - guard rail なしで shadow replay を実施する
  - aging rule のない readiness score を current evidence として使い続ける
  - exercise debt を pass 判定の陰に隠して閉じる
  residual_open_points: []
scheduler_quarterly_resilience_review_governance:
  status: provisional_fixed
  statement: scheduler_quarterly_resilience_review_governance とは、quarterly cadence の resilience review、dormant risk の wakeup trigger、stale control の retirement を束ねて readiness portfolio を更改する規則である。
  core_claims:
  - exercise 成功だけでは portfolio freshness は維持されない。quarterly review packet に scenario family coverage、dormant risk snapshot、stale control candidate、reinvestment queue を束ねて、周期的に readiness を見直さなければならない。
  - dormant risk は incident が起きていないことをもって低優先度とみなしてはならない。rarity、impact、control dormancy、external signal を wakeup trigger として registry 化し、再起動条件を明示する必要がある。
  - stale control は failure した control だけを指さない。evidence aging、dependency drift、operator non-use、threat mismatch により、今は役に立たない control も retirement candidate に含める必要がある。
  - quarterly review は retrospective memo ではなく portfolio 変更ゲートである。keep / refresh / retire / reinvest の分岐を review packet 上で束縛しなければならない。
  - wakeup と retirement は対になって扱う。眠っていた risk を起こす一方で stale control を retire しなければ、readiness budget は肥大するだけで改善しない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は review registry、wakeup evaluation、retirement lint、review evidence archive を分担する。
  quarterly_review_packet:
    required_fields:
    - review_packet_id
    - review_period_ref
    - scenario_family_coverage_ref
    - dormant_risk_snapshot_ref
    - stale_control_candidates_ref
    - reinvestment_queue_ref
    - review_owner_ref
    - completed_at_or_null
    rules:
    - scenario_family_coverage_ref のない review を portfolio review と呼んではならない。
    - dormant_risk_snapshot_ref のない review を readiness freshness の根拠にしてはならない。
    - review_owner_ref のない quarterly review を self-sustaining governance と誤称してはならない。
  dormant_risk_wakeup_trigger:
    required_bindings:
    - trigger_id
    - dormant_risk_ref
    - wakeup_basis_ref
    - activation_threshold_ref
    - rehearsal_due_ref
    - trigger_owner_ref
    - last_checked_at_or_null
    rules:
    - wakeup_basis_ref のない trigger を low-frequency risk coverage と称してはならない。
    - activation_threshold_ref のない wakeup を ad hoc alarm にしてはならない。
    - rehearsal_due_ref のない wakeup trigger を review-complete とみなしてはならない。
  stale_control_retirement_case:
    required_fields:
    - retirement_case_id
    - control_ref
    - staleness_basis_ref
    - dependency_impact_ref
    - replacement_plan_ref_or_null
    - retirement_owner_ref
    - approved_at_or_null
    rules:
    - staleness_basis_ref のない retirement を cost cutting だけで正当化してはならない。
    - dependency_impact_ref のない retirement を safe simplification と呼んではならない。
    - retirement_owner_ref のない stale-control cleanup を silent disappearance にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - quarterly review packet registry
      - wakeup trigger approval
      - stale-control retirement decision
      - reinvestment queue binding
    GraphEngine:
      owns:
      - coverage-gap projection
      - dormant-risk wakeup evaluation
      - staleness scoring
      - portfolio keep/refresh/retire simulation
    GraphLint:
      owns:
      - coverage-free review lint
      - basis-free wakeup lint
      - impact-free retirement lint
      - calendar-only review lint
    archive_object:
      owns:
      - quarterly review archive
      - wakeup trigger evidence
      - retirement case bundle
      - portfolio freshness history
  forbidden_shortcuts:
  - calendar meeting を開いただけで quarterly resilience review 完了と宣言する
  - incident がないことを理由に dormant risk を永久休眠にする
  - 使われていない control を dependency impact 確認なしで retire する
  - reinvestment queue を持たずに stale control だけを削る
  residual_open_points: []
scheduler_review_budget_exception_governance:
  status: provisional_fixed
  statement: scheduler_review_budget_exception_governance とは、quarterly review から生じる carryforward debt、resilience budget rebalance、retirement exception ratification を束ねて次サイクルへ合法的に繰り越す規則である。
  core_claims:
  - review で見つかった issue は同一 quarter で全部は閉じられない。閉じられない debt は carryforward debt register として source review、carryforward reason、next-cycle due を束ねて残さなければならない。
  - reinvestment queue は wish list では足りない。どの readiness surface からどの surface へ budget を rebalance するか、opportunity cost と approver を持つ decision として固定する必要がある。
  - retirement exception は stale control を擁護する免罪符ではない。blocked retirement、exception basis、compensating control、expiry を持つ一時許可として扱わなければならない。
  - carryforward debt と exception は接続される。retire できない stale control が残るなら、それは residual debt として次サイクルへ露出し続ける必要がある。
  - budget rebalance は total amount だけを見てはならない。debt concentration、coverage void、operator load のどこに負荷が寄るかを portfolio 全体で観測しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は carryforward registry、budget tradeoff evaluation、exception lint、portfolio follow-through archive を分担する。
  carryforward_debt_register:
    required_fields:
    - debt_case_id
    - source_review_ref
    - debt_family_ref
    - carryforward_reason_ref
    - next_cycle_due_ref
    - debt_owner_ref
    - discharge_plan_ref_or_null
    rules:
    - source_review_ref のない debt を carryforward debt と呼んではならない。
    - next_cycle_due_ref のない carryforward を lawful defer とみなしてはならない。
    - debt_owner_ref のない debt register を portfolio memory と誤称してはならない。
  resilience_budget_rebalance_decision:
    required_bindings:
    - rebalance_id
    - prior_budget_ref
    - target_surface_ref
    - funding_shift_ref
    - opportunity_cost_ref
    - approver_ref
    - effective_window_ref
    rules:
    - funding_shift_ref のない rebalance を strategic reprioritization と称してはならない。
    - opportunity_cost_ref のない budget move を free upgrade とみなしてはならない。
    - approver_ref のない rebalance を autonomous portfolio healing に委ねてはならない。
  retirement_exception_packet:
    required_fields:
    - exception_id
    - blocked_retirement_ref
    - exception_basis_ref
    - compensating_control_ref
    - expiry_ref
    - exception_owner_ref
    - ratified_at_or_null
    rules:
    - exception_basis_ref のない stale-control exception を tolerated drift にしてはならない。
    - compensating_control_ref のない exception を safe defer と呼んではならない。
    - expiry_ref のない retirement exception を temporary と表現してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - carryforward debt registry
      - budget rebalance approval
      - retirement exception ratification
      - next-cycle due binding
    GraphEngine:
      owns:
      - debt concentration projection
      - budget tradeoff simulation
      - exception impact graph
      - carryforward-to-discharge dependency map
    GraphLint:
      owns:
      - source-free carryforward lint
      - cost-free rebalance lint
      - expiry-free exception lint
      - hidden residual debt lint
    archive_object:
      owns:
      - carryforward debt archive
      - budget rebalance evidence
      - exception ratification bundle
      - portfolio follow-through trail
  forbidden_shortcuts:
  - 未完了 debt を meeting memo にだけ残して register しない
  - budget shift を total amount の一致だけで正当化する
  - stale control exception を expiry なしで継続する
  - retirement 失敗を carryforward debt と接続せず局所例外として隠す
  residual_open_points: []
scheduler_dormant_risk_scenario_refresh_governance:
  status: provisional_fixed
  statement: scheduler_dormant_risk_scenario_refresh_governance とは、dormant risk の scenario refresh、rare-event coverage gap の起票、wakeup backlog の reprioritization を束ねて低頻度高影響リスクを更新する規則である。
  core_claims:
  - dormant risk を起こしただけでは readiness は増えない。scenario library、detector assumption、operator mental model のいずれが古かったかを refresh packet に束ねる必要がある。
  - rare-event coverage gap は evidence 不足の別名ではない。未カバー surface、consequence band、existing control gap、mitigation backlog を持つ独立 case として扱う必要がある。
  - wakeup backlog は通常の improvement backlog に混ぜてはならない。rarity と impact の組み合わせ、control dormancy、dependency drift を優先度根拠として別に管理しなければならない。
  - scenario refresh は exercise update と直結する。next exercise due がない refresh は conceptual update で終わり、運用 readiness に到達しない。
  - rare-event gap は single scenario の話に閉じない。scenario family と consequence family の両方で coverage void を見る必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は scenario refresh registry、gap graph evaluation、backlog reprioritization lint、rare-risk archive を分担する。
  scenario_refresh_packet:
    required_fields:
    - refresh_packet_id
    - dormant_risk_family_ref
    - trigger_history_ref
    - scenario_delta_ref
    - rarity_basis_ref
    - owner_ref
    - next_exercise_due_ref
    rules:
    - scenario_delta_ref のない refresh を scenario renewal と呼んではならない。
    - rarity_basis_ref のない dormant-risk refresh を low-frequency governance と称してはならない。
    - next_exercise_due_ref のない refresh を readiness update とみなしてはならない。
  rare_event_coverage_gap_case:
    required_bindings:
    - gap_case_id
    - uncovered_surface_ref
    - consequence_band_ref
    - existing_control_gap_ref
    - mitigation_backlog_ref
    - case_owner_ref
    - opened_at
    rules:
    - uncovered_surface_ref のない gap を rare-event coverage gap と呼んではならない。
    - existing_control_gap_ref のない case を generic uncertainty に戻してはならない。
    - case_owner_ref のない gap を backlog noise に埋めてはならない。
  wakeup_backlog_item:
    required_fields:
    - backlog_item_id
    - dormant_risk_ref
    - priority_basis_ref
    - required_evidence_ref
    - scheduled_window_ref
    - backlog_owner_ref
    - status_ref_or_null
    rules:
    - priority_basis_ref のない wakeup item を reprioritized と称してはならない。
    - required_evidence_ref のない item を review-ready とみなしてはならない。
    - scheduled_window_ref のない backlog item を actioned 扱いにしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - scenario refresh registry
      - coverage gap opening
      - wakeup backlog priority ratification
      - next-exercise due binding
    GraphEngine:
      owns:
      - scenario-family delta projection
      - rare-event coverage void graph
      - backlog priority scoring
      - consequence-band propagation
    GraphLint:
      owns:
      - delta-free refresh lint
      - surface-free gap lint
      - basis-free reprioritization lint
      - exercise-less refresh lint
    archive_object:
      owns:
      - scenario refresh archive
      - coverage gap evidence bundle
      - wakeup backlog history
      - rare-risk renewal trail
  forbidden_shortcuts:
  - dormant risk の再起動を scenario library 更新なしで終える
  - rare-event gap を generic uncertainty として backlog に埋める
  - priority basis なしで wakeup backlog を並べ替える
  - exercise due を持たない refresh を readiness 更新と称する
  residual_open_points: []
scheduler_dependency_tiering_substitute_governance:
  status: provisional_fixed
  statement: scheduler_dependency_tiering_substitute_governance とは、dependency resilience tiering、substitute-path qualification、single-point retirement を束ねて dependency portfolio を更新する規則である。
  core_claims:
  - dependency は一律に扱ってはならない。critical surface と failure impact を基礎に tiering し、review cadence・test burden・retirement urgency を tier ごとに変える必要がある。
  - substitute path は existence claim だけでは不十分である。parity scope、failover test、credential status、operational owner が束縛されて初めて qualified と呼べる。
  - single-point retirement は replacement 導入だけでは終わらない。cutover guard、rollback path、dependency impact を持つ case として運ぶ必要がある。
  - rare-event gap で露出した dependency は normal vendor list に戻してはならない。tiering と substitute qualification に接続しなければ再び dormant blind spot になる。
  - internal dependency と external dependency を同じ前提で比較してはならない。ownership boundary、credential reseal burden、support SLA の違いを tier rule に入れる必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は dependency tier registry、substitute qualification evaluation、single-point lint、dependency renewal archive を分担する。
  dependency_tier_packet:
    required_fields:
    - dependency_tier_id
    - dependency_ref
    - critical_surface_ref
    - failure_impact_ref
    - substitute_path_ref_or_null
    - tier_owner_ref
    - reviewed_at
    rules:
    - critical_surface_ref のない tiering を dependency resilience tiering と呼んではならない。
    - failure_impact_ref のない tier は urgency ordering の根拠にしてはならない。
    - tier_owner_ref のない dependency tier packet を governance object とみなしてはならない。
  substitute_qualification_bundle:
    required_bindings:
    - qualification_id
    - substitute_path_ref
    - parity_scope_ref
    - failover_test_ref
    - credential_status_ref
    - bundle_owner_ref
    - expires_at_or_null
    rules:
    - parity_scope_ref のない substitute を qualified fallback と称してはならない。
    - failover_test_ref のない qualification を operational readiness とみなしてはならない。
    - bundle_owner_ref のない substitute path を dormant backup として放置してはならない。
  single_point_retirement_case:
    required_fields:
    - spof_case_id
    - dependency_ref
    - retirement_basis_ref
    - replacement_ref
    - cutover_guard_ref
    - case_owner_ref
    - approved_at_or_null
    rules:
    - retirement_basis_ref のない single-point retirement を simplification と誤称してはならない。
    - cutover_guard_ref のない retirement を safe migration と呼んではならない。
    - case_owner_ref のない spof retirement を inevitable evolution に委ねてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - dependency tier registry
      - substitute qualification approval
      - single-point retirement decision
      - review cadence binding
    GraphEngine:
      owns:
      - failure-impact propagation
      - substitute parity evaluation
      - cutover risk simulation
      - dependency portfolio concentration graph
    GraphLint:
      owns:
      - surface-free tier lint
      - test-free qualification lint
      - guard-free retirement lint
      - hidden-single-point lint
    archive_object:
      owns:
      - dependency tier archive
      - substitute qualification evidence
      - single-point retirement bundle
      - dependency renewal trail
  forbidden_shortcuts:
  - dependency を criticality tier なしで一律管理する
  - 存在するだけの backup path を qualified substitute と呼ぶ
  - cutover guard なしで single point を retire する
  - rare-event gap で露出した dependency を vendor spreadsheet に戻して閉じる
  residual_open_points: []
scheduler_control_evidence_freshness_governance:
  status: provisional_fixed
  statement: scheduler_control_evidence_freshness_governance とは、control evidence の freshness sweep、stale packet の reseal、archive demotion を束ねて active evidence surface を健全化する規則である。
  core_claims:
  - readiness evidence は一度作れば永続に current ではない。control surface、dependency tier、scenario family の変化に応じて freshness sweep を行い、current / stale / archive 候補を切り分ける必要がある。
  - stale packet は即時破棄してはならない。replacement evidence と provenance check を揃えたうえで reseal し、どの packet が current anchor かを明示しなければならない。
  - archive demotion は visibility を落とすだけで証拠価値を消すことではない。retrieval path と restore trigger を持たせ、active surface から外す条件を固定する必要がある。
  - freshness は timestamp だけで決めてはならない。dependency drift、scenario mismatch、owner departure、credential expiry も stale 判定に入れなければならない。
  - reseal と demotion は対立概念ではない。current replacement がある packet は reseal し、historical reference としてだけ必要な artifact は archive に demote する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は freshness registry、reseal decision evaluation、archive lint、evidence hygiene archive を分担する。
  freshness_sweep_packet:
    required_fields:
    - sweep_packet_id
    - control_surface_ref
    - evidence_set_ref
    - freshness_rule_ref
    - stale_findings_ref
    - sweep_owner_ref
    - sweep_completed_at_or_null
    rules:
    - evidence_set_ref のない freshness sweep を evidence hygiene と呼んではならない。
    - freshness_rule_ref のない sweep を timestamp cleanup にしてはならない。
    - sweep_owner_ref のない freshness result を current-state assertion に使ってはならない。
  stale_packet_reseal_decision:
    required_bindings:
    - reseal_id
    - stale_packet_ref
    - replacement_evidence_ref
    - provenance_check_ref
    - reseal_owner_ref
    - effective_at
    - rollback_ref_or_null
    rules:
    - replacement_evidence_ref のない reseal を freshness recovery と称してはならない。
    - provenance_check_ref のない reseal を trusted update とみなしてはならない。
    - reseal_owner_ref のない packet refresh を self-healing と誤称してはならない。
  archive_demotion_case:
    required_fields:
    - demotion_case_id
    - artifact_ref
    - demotion_basis_ref
    - retrieval_path_ref
    - restore_trigger_ref
    - case_owner_ref
    - demoted_at_or_null
    rules:
    - demotion_basis_ref のない archive move を archive demotion と呼んではならない。
    - retrieval_path_ref のない demotion を lawful archive とみなしてはならない。
    - restore_trigger_ref のない demotion を reversible cleanup と表現してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - freshness sweep registry
      - reseal approval
      - archive demotion decision
      - current-anchor designation
    GraphEngine:
      owns:
      - freshness rule evaluation
      - replacement-evidence linkage
      - demotion candidate scoring
      - restore-trigger dependency graph
    GraphLint:
      owns:
      - rule-free sweep lint
      - replacement-free reseal lint
      - retrieval-path-free demotion lint
      - stale-current-anchor lint
    archive_object:
      owns:
      - freshness sweep archive
      - reseal evidence bundle
      - archive demotion history
      - evidence hygiene trail
  forbidden_shortcuts:
  - timestamp だけで evidence freshness を判定する
  - replacement evidence なしで stale packet を reseal する
  - retrieval path なしで artifact を active surface から消す
  - owner 変更や dependency drift を stale 判定から外す
  residual_open_points: []
scheduler_resilience_investment_acceptance_governance:
  status: provisional_fixed
  statement: scheduler_resilience_investment_acceptance_governance とは、review 結果を roadmap commitment と investment tranche に変換し、今期に閉じない residual risk を acceptance record として保持する規則である。
  core_claims:
  - quarterly review の結論は backlog に置くだけでは弱い。どの capability を roadmap commitment に昇格し、どの tranche で投資するかを packet として固定しなければ portfolio decision にならない。
  - investment tranche は金額だけではなく scope、expected risk delta、review gate を持つ必要がある。資源投入の事実と期待する resilience 変化を接続しなければならない。
  - residual risk acceptance は敗北宣言ではない。why not now、acceptance owner、expiry、revisit trigger を持つ bounded decision として扱う必要がある。
  - roadmap commitment と acceptance は同時に必要である。全部を投資対象にすると portfolio が飽和し、全部を acceptance にすると review が形骸化する。
  - acceptance された residual risk は review から消してはならない。次サイクル以降も expired acceptance や changed basis を再評価する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は commitment registry、tranche impact evaluation、acceptance lint、portfolio decision archive を分担する。
  investment_tranche_packet:
    required_fields:
    - tranche_id
    - source_review_ref
    - target_capability_ref
    - tranche_scope_ref
    - expected_risk_delta_ref
    - tranche_owner_ref
    - review_gate_ref
    rules:
    - target_capability_ref のない tranche を resilience investment と呼んではならない。
    - expected_risk_delta_ref のない tranche を justified funding とみなしてはならない。
    - review_gate_ref のない tranche を irreversible commitment にしてはならない。
  roadmap_commitment_case:
    required_bindings:
    - commitment_id
    - capability_ref
    - milestone_ref
    - dependency_basis_ref
    - execution_owner_ref
    - committed_at_or_null
    rules:
    - milestone_ref のない roadmap commitment を executable plan と称してはならない。
    - dependency_basis_ref のない commitment を delivery-safe とみなしてはならない。
    - execution_owner_ref のない roadmap item を strategic intent の陰に隠してはならない。
  residual_risk_acceptance_record:
    required_fields:
    - acceptance_id
    - residual_risk_ref
    - acceptance_basis_ref
    - acceptance_owner_ref
    - expiry_ref
    - revisit_trigger_ref
    - ratified_at_or_null
    rules:
    - acceptance_basis_ref のない acceptance を conscious decision と呼んではならない。
    - expiry_ref のない residual-risk acceptance を bounded defer とみなしてはならない。
    - revisit_trigger_ref のない acceptance を lawful carryover と表現してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - investment tranche registry
      - roadmap commitment approval
      - residual-risk acceptance ratification
      - next-review revisit binding
    GraphEngine:
      owns:
      - expected-risk-delta projection
      - tranche dependency graph
      - commitment feasibility evaluation
      - acceptance expiry/revisit projection
    GraphLint:
      owns:
      - delta-free tranche lint
      - milestone-free commitment lint
      - expiry-free acceptance lint
      - portfolio-saturation lint
    archive_object:
      owns:
      - investment tranche archive
      - roadmap commitment evidence
      - acceptance record history
      - resilience portfolio decision trail
  forbidden_shortcuts:
  - review 結果を backlog 項目に落としただけで roadmap commitment とみなす
  - expected risk delta なしで investment tranche を切る
  - expiry なしで residual risk を acceptance 扱いにする
  - acceptance された risk を次サイクル review から除外する
  residual_open_points: []
scheduler_annual_resilience_governance:
  status: provisional_fixed
  statement: scheduler_annual_resilience_governance とは、年度境界または major cycle boundary において resilience charter renewal、cross-cycle carryover gate、next-year horizon calibration を束ねて portfolio の年次基準線を更新する規則である。
  core_claims:
  - annual renewal は署名の更新では足りない。prior charter の assumption、未解消 debt、active acceptance / exception、scenario horizon の妥当性を renewal packet で束ね直さなければ翌年度の正当性が立たない。
  - carryover gate は何でも次年度へ持ち越す装置ではない。freshness、expiry / due、owner、next-year fit、budget burden を満たす item だけを admitted carryover とし、それ以外は closure か explicit exception に送る必要がある。
  - next-year horizon calibration は forecast の焼き直しではない。scenario horizon、reserve floor、review cadence、portfolio cap、investment envelope を直近 evidence に基づいて再較正する年次設計行為である。
  - renewal と carryover は一体で扱う。charter だけ更新して backlog を無検査で流すと drift が制度化され、carryover だけ整理して horizon を変えないと前年の前提を惰性で延長することになる。
  - annual governance では keep / tighten / rebase / retire の4分岐を必ず残す。renew だけを許す renewal cycle は governance ではなく延命処理である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は renewal registry、carryover admissibility evaluation、calibration lint、annual evidence archive を分担する。
  charter_renewal_packet:
    required_fields:
    - renewal_packet_id
    - review_year_ref
    - prior_charter_ref
    - renewal_scope_ref
    - carryover_summary_ref
    - approval_route_ref
    - ratified_at_or_null
    rules:
    - prior_charter_ref のない renewal を continuity-preserving renewal と呼んではならない。
    - carryover_summary_ref のない renewal を year-boundary governance とみなしてはならない。
    - approval_route_ref のない renewal を lawful charter update と称してはならない。
  cross_cycle_carryover_gate:
    required_bindings:
    - carryover_case_id
    - carryover_item_ref
    - carryover_basis_ref
    - expiry_or_due_ref
    - next_year_fit_ref
    - gate_owner_ref
    - admitted_at_or_null
    rules:
    - carryover_basis_ref のない item を next-year admissible とみなしてはならない。
    - expiry_or_due_ref のない carryover を bounded carryover と表現してはならない。
    - next_year_fit_ref のない carryover を lawful deferral にしてはならない。
  next_year_horizon_calibration_rule:
    required_fields:
    - calibration_id
    - scenario_horizon_ref
    - budget_guard_ref
    - review_cadence_ref
    - portfolio_cap_ref
    - evidence_basis_ref
    - effective_year_ref
    rules:
    - scenario_horizon_ref のない calibration を horizon reset と呼んではならない。
    - budget_guard_ref のない next-year plan を resilience calibration と称してはならない。
    - evidence_basis_ref のない cadence change を calibrated governance とみなしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - annual charter renewal registry
      - carryover admission judgement
      - next-year calibration ratification
      - year-boundary keep/tighten/rebase/retire binding
    GraphEngine:
      owns:
      - carryover admissibility evaluation
      - budget-guard impact projection
      - scenario-horizon coverage comparison
      - cadence/cap rebasing simulation
    GraphLint:
      owns:
      - history-free renewal lint
      - basis-free carryover lint
      - evidence-free calibration lint
      - renew-only annual cycle lint
    archive_object:
      owns:
      - annual renewal packet archive
      - carryover gate evidence
      - calibration evidence bundle
      - year-over-year resilience history
  forbidden_shortcuts:
  - prior charter と carryover summary を見ずに renewal を通す
  - expiry や due のない debt / acceptance / exception を一括で次年度へ流す
  - review cadence や portfolio cap を前年値のコピーで据え置く
  - renew / keep だけを許し retire / rebase を年次判断から外す
  residual_open_points: []
scheduler_charter_variance_recalibration_governance:
  status: provisional_fixed
  statement: scheduler_charter_variance_recalibration_governance とは、annual charter 実行中に variance petition、off-cycle recalibration trigger、emergency horizon override を束ねて in-year deviation を合法化する規則である。
  core_claims:
  - annual charter は immutable ではないが、逸脱は petition 化しなければならない。誰がどの charter clause を破り、どの blast radius で、いつ sunset させるかを variance packet に固定する必要がある。
  - off-cycle recalibration は不満の表明ではなく assumption breach への応答である。forecast error、dependency collapse、threat shift、budget shock のいずれが trigger になったかを記録しなければならない。
  - emergency horizon override は next-year horizon 全体を書き換える権利ではない。override できる dimension、bounded duration、rollback condition を限定し、normal calibration を代替してはならない。
  - variance petition と recalibration trigger は接続される。局所逸脱が前提破綻に由来するなら、temporary exception ではなく off-cycle recalibration を開く必要がある。
  - override は sunset を持つ。expiry なしの emergency override は恒久 rule の裏口であり、charter governance を破壊する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は deviation registry、trigger evaluation、override lint、in-year deviation archive を分担する。
  variance_petition_packet:
    required_fields:
    - petition_id
    - charter_clause_ref
    - variance_basis_ref
    - blast_radius_ref
    - sunset_ref
    - petitioner_ref
    - approved_at_or_null
    rules:
    - charter_clause_ref のない petition を charter variance と呼んではならない。
    - blast_radius_ref のない variance を bounded deviation とみなしてはならない。
    - sunset_ref のない emergency variance を temporary waiver と表現してはならない。
  off_cycle_recalibration_trigger:
    required_bindings:
    - trigger_id
    - trigger_signal_ref
    - breached_assumption_ref
    - recalibration_scope_ref
    - review_owner_ref
    - due_by_ref
    - opened_at_or_null
    rules:
    - breached_assumption_ref のない trigger を recalibration trigger と称してはならない。
    - recalibration_scope_ref のない trigger を lawful re-open とみなしてはならない。
    - due_by_ref のない off-cycle recalibration を urgent governance と呼んではならない。
  emergency_horizon_override_rule:
    required_fields:
    - override_id
    - horizon_dimension_ref
    - emergency_basis_ref
    - bounded_override_ref
    - rollback_condition_ref
    - override_owner_ref
    - expired_at_or_null
    rules:
    - horizon_dimension_ref のない override を calibrated override と称してはならない。
    - bounded_override_ref のない emergency action を horizon override と呼んではならない。
    - rollback_condition_ref のない override を safe emergency lane にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - variance petition registry
      - off-cycle recalibration opening judgement
      - emergency override approval
      - sunset / rollback binding
    GraphEngine:
      owns:
      - assumption-breach detection
      - blast-radius projection
      - recalibration-scope selection
      - override rollback simulation
    GraphLint:
      owns:
      - clause-free variance lint
      - assumption-free trigger lint
      - rollback-free override lint
      - emergency-lane permanence lint
    archive_object:
      owns:
      - variance petition archive
      - recalibration trigger evidence
      - override history
      - in-year deviation trail
  forbidden_shortcuts:
  - charter clause を示さずに variance を出す
  - assumption breach を記録せずに off-cycle recalibration を開く
  - rollback 条件のない override を emergency と称して継続する
  - variance petition だけで structural recalibration を代替する
  residual_open_points: []
scheduler_annual_scenario_rollover_governance:
  status: provisional_fixed
  statement: scheduler_annual_scenario_rollover_governance とは、年度更新時に annual scenario portfolio rollover、dormant-risk reseeding、stress-budget rebasing を束ねて scenario 側の基準線を更改する規則である。
  core_claims:
  - scenario portfolio は棚卸しだけでは足りない。retained scenario、retired scenario、new entrant scenario を rollover packet 上で明示しなければ、coverage gap が前年の惰性に埋もれる。
  - dormant risk は once-discovered で永久保存しても意味がない。signal drift、asset drift、dependency drift、social drift を見て reseed し、seed basis を更新する必要がある。
  - stress budget は総量だけでなく配分比率を rebasing する必要がある。rare-event、dependency shock、operator overload、vendor outage のどこへ追加余力を振るかを決めなければならない。
  - scenario rollover と carryover gate は接続される。次年度へ carryover した debt / acceptance がどの scenario family に残留するかを再マッピングしなければならない。
  - reseeding は古い scenario を増やすことではない。obsolete scenario を retire し、新しい stress surface を entrant として入れる更新である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は scenario registry、coverage comparison、reseed lint、annual scenario archive を分担する。
  scenario_rollover_packet:
    required_fields:
    - rollover_packet_id
    - prior_scenario_portfolio_ref
    - retained_scenarios_ref
    - retired_scenarios_ref
    - entrant_scenarios_ref
    - coverage_delta_ref
    - approved_at_or_null
    rules:
    - prior_scenario_portfolio_ref のない rollover を annual scenario rollover と呼んではならない。
    - coverage_delta_ref のない rollover を coverage-aware renewal とみなしてはならない。
    - entrant_scenarios_ref と retired_scenarios_ref の両方がない更新を rebased portfolio と称してはならない。
  dormant_risk_reseed_rule:
    required_bindings:
    - reseed_id
    - dormant_risk_family_ref
    - reseed_basis_ref
    - signal_drift_ref
    - owner_ref
    - next_probe_due_ref
    - activated_at_or_null
    rules:
    - reseed_basis_ref のない dormant-risk update を reseeding と呼んではならない。
    - signal_drift_ref のない reseed を changed world への応答とみなしてはならない。
    - next_probe_due_ref のない reseed を maintained seed と称してはならない。
  stress_budget_rebase_decision:
    required_fields:
    - rebase_id
    - prior_budget_mix_ref
    - target_stress_surface_ref
    - allocation_shift_ref
    - tradeoff_basis_ref
    - approver_ref
    - effective_window_ref
    rules:
    - allocation_shift_ref のない stress budget 変更を rebasing と呼んではならない。
    - tradeoff_basis_ref のない rebase を evidence-aware allocation と称してはならない。
    - effective_window_ref のない rebase を executable budget move にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - scenario rollover registry
      - reseed approval
      - stress-budget rebase ratification
      - scenario family carryover mapping
    GraphEngine:
      owns:
      - coverage-delta comparison
      - dormant-risk drift evaluation
      - stress-surface allocation simulation
      - carryover-to-scenario remapping
    GraphLint:
      owns:
      - history-free rollover lint
      - basis-free reseed lint
      - tradeoff-free stress rebase lint
      - obsolete-scenario accumulation lint
    archive_object:
      owns:
      - annual scenario rollover archive
      - reseed evidence
      - stress-budget rebase bundle
      - scenario-year history
  forbidden_shortcuts:
  - 前年 scenario list をそのまま再承認する
  - signal drift を見ずに dormant risk seed を維持する
  - stress budget の総量だけ合わせて配分差分を隠す
  - carryover item を scenario family に再マッピングせず放置する
  residual_open_points: []
scheduler_dependency_covenant_renewal_governance:
  status: provisional_fixed
  statement: scheduler_dependency_covenant_renewal_governance とは、年次更新時に dependency covenant renewal、vendor resilience attestation、non-renewal fallback を束ねて外部依存の継続可能性を更新する規則である。
  core_claims:
  - dependency は存在しているだけでは十分ではない。どの SLA / response commitment / credential duty / escalation duty を翌年度も引き受けるのかを covenant renewal packet で取り直さなければならない。
  - vendor resilience attestation は marketing statement ではなく evidence bundle である。contact-path freshness、failover readiness、credential reseal、incident participation readiness を attest させる必要がある。
  - non-renewal は失敗ではなく分岐である。fallback vendor、internal substitution、scope shed、exit timeline のどこに送るかを plan 化しなければ dependency governance が止まる。
  - attestation の freshness と covenant renewal は分離してはならない。attestation が stale な renewal は lawful renewal ではなく紙上延命である。
  - non-renewal fallback は dependency portfolio に visible でなければならない。hidden single point を増やす fallback は renewal の代替にならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は dependency renewal registry、attestation evaluation、fallback lint、annual dependency archive を分担する。
  dependency_covenant_renewal_packet:
    required_fields:
    - renewal_id
    - dependency_ref
    - prior_covenant_ref
    - renewed_obligations_ref
    - attestation_bundle_ref
    - approver_ref
    - effective_year_ref
    rules:
    - prior_covenant_ref のない renewal を dependency continuity renewal と呼んではならない。
    - renewed_obligations_ref のない packet を covenant renewal と称してはならない。
    - attestation_bundle_ref のない renewal を resilience-ready renewal とみなしてはならない。
  vendor_resilience_attestation:
    required_bindings:
    - attestation_id
    - vendor_ref
    - contact_path_freshness_ref
    - failover_readiness_ref
    - credential_state_ref
    - issuer_ref
    - attested_at_or_null
    rules:
    - contact_path_freshness_ref のない attestation を live vendor readiness と呼んではならない。
    - failover_readiness_ref のない attestation を resilience attestation と称してはならない。
    - issuer_ref のない attestation を lawful evidence bundle にしてはならない。
  non_renewal_fallback_plan:
    required_fields:
    - fallback_plan_id
    - dependency_ref
    - non_renewal_basis_ref
    - fallback_mode_ref
    - exit_timeline_ref
    - owner_ref
    - activated_at_or_null
    rules:
    - non_renewal_basis_ref のない fallback を lawful branch と呼んではならない。
    - fallback_mode_ref のない non-renewal を managed substitution と称してはならない。
    - exit_timeline_ref のない fallback を bounded transition にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - dependency covenant renewal registry
      - vendor attestation ratification
      - non-renewal fallback approval
      - effective-year dependency obligation binding
    GraphEngine:
      owns:
      - dependency continuity evaluation
      - attestation freshness scoring
      - fallback viability simulation
      - single-point exposure projection
    GraphLint:
      owns:
      - history-free covenant lint
      - freshness-free attestation lint
      - timeline-free fallback lint
      - hidden-single-point fallback lint
    archive_object:
      owns:
      - dependency renewal archive
      - vendor attestation bundle
      - fallback evidence history
      - yearly dependency trail
  forbidden_shortcuts:
  - prior covenant を見ずに dependency renewal を通す
  - vendor の自己申告だけで resilience attestation とみなす
  - fallback mode と exit timeline を持たずに non-renewal を許容する
  - single point を増やす fallback を hidden にしたまま承認する
  residual_open_points: []
scheduler_resilience_capital_covenant_governance:
  status: provisional_fixed
  statement: scheduler_resilience_capital_covenant_governance とは、年次 planning における resilience capital floor、discretionary stretch allocation、debt burn-down covenant を束ねて資本配賦の規律を固定する規則である。
  core_claims:
  - resilience capital floor は余剰金ではない。review cadence、dependency readiness、scenario renewal、human readiness を維持するための non-negotiable floor として束縛しなければならない。
  - discretionary stretch allocation は growth や emergency の名目で floor を侵食しやすい。stretch を認めるなら source of diversion、duration、recovery path を packet として残す必要がある。
  - debt burn-down covenant は wish list では足りない。carryover debt、active acceptance、exception backlog に対して target reduction、measurement window、tighten rule を covenant 化する必要がある。
  - capital floor と burn-down covenant は接続される。floor を持たずに burn-down を求めると達成不可能な約束になり、burn-down なしで stretch を許すと residual debt が膨張する。
  - stretch allocation は reversible でなければならない。recovery path や sunset のない stretch は floor erosion を制度化する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は capital covenant registry、allocation simulation、erosion lint、annual capital archive を分担する。
  capital_floor_profile:
    required_fields:
    - capital_floor_id
    - protected_surface_ref
    - minimum_budget_ref
    - review_window_ref
    - rationale_ref
    - approver_ref
    - effective_year_ref
    rules:
    - protected_surface_ref のない floor を resilience floor と呼んではならない。
    - minimum_budget_ref のない profile を capital floor と称してはならない。
    - rationale_ref のない floor を lawful protection rule にしてはならない。
  stretch_allocation_decision:
    required_bindings:
    - allocation_id
    - diversion_source_ref
    - target_use_ref
    - duration_ref
    - recovery_path_ref
    - owner_ref
    - approved_at_or_null
    rules:
    - diversion_source_ref のない stretch を discretionary allocation と呼んではならない。
    - duration_ref のない stretch を bounded stretch とみなしてはならない。
    - recovery_path_ref のない stretch を reversible allocation と称してはならない。
  debt_burndown_covenant:
    required_fields:
    - covenant_id
    - debt_population_ref
    - target_reduction_ref
    - measurement_window_ref
    - tighten_rule_ref
    - owner_ref
    - ratified_at_or_null
    rules:
    - debt_population_ref のない covenant を debt covenant と呼んではならない。
    - target_reduction_ref のない burn-down を measurable commitment と称してはならない。
    - tighten_rule_ref のない covenant を enforceable annual promise にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - capital floor registry
      - stretch allocation approval
      - debt burn-down covenant ratification
      - tighten-on-breach binding
    GraphEngine:
      owns:
      - floor sufficiency projection
      - stretch erosion simulation
      - debt reduction measurement
      - tighten-rule impact calculation
    GraphLint:
      owns:
      - surface-free floor lint
      - recovery-path-free stretch lint
      - target-free covenant lint
      - silent floor erosion lint
    archive_object:
      owns:
      - capital floor archive
      - stretch allocation evidence
      - burn-down covenant history
      - capital-year trail
  forbidden_shortcuts:
  - protected surface を示さずに floor を宣言する
  - recovery path のない stretch allocation を通す
  - target reduction のない burn-down covenant を commitment と呼ぶ
  - stretch で floor erosion が起きても annual archive に残さない
  residual_open_points: []
scheduler_charter_audit_freeze_governance:
  status: provisional_fixed
  statement: scheduler_charter_audit_freeze_governance とは、annual renewal 後の charter audit attestation、board-level exception disclosure、renewal freeze gate を束ねて最終監督と停止権限を固定する規則である。
  core_claims:
  - renewal は ratification だけで閉じてはならない。charter assumption、carryover admission、capital floor、active exception の整合を audit attestation で再確認する必要がある。
  - board-level disclosure は embarrassment list ではなく governance surface である。重大 residual debt、expiry-near exception、floor erosion、dependency non-renewal を開示対象として registry 化しなければならない。
  - renewal freeze gate は failure ではなく保護措置である。critical exception、unbounded override、capital covenant breach、attestation gap があるときは renewal effectuation を凍結する必要がある。
  - freeze gate には解除条件が必要である。fix evidence、re-ratification、board acknowledgement のどれで解除できるかを gate 上で束ねなければならない。
  - audit attestation と disclosure は接続される。監査で見つかった重大 gap が board surface に上がらないなら attestation は形式で終わる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は oversight registry、freeze-risk evaluation、disclosure lint、oversight archive を分担する。
  charter_audit_attestation:
    required_fields:
    - attestation_id
    - renewal_ref
    - assumption_check_ref
    - carryover_check_ref
    - capital_check_ref
    - auditor_ref
    - attested_at_or_null
    rules:
    - renewal_ref のない attestation を post-renewal audit と呼んではならない。
    - assumption_check_ref のない attestation を charter audit attestation と称してはならない。
    - auditor_ref のない attestation を lawful oversight evidence にしてはならない。
  board_exception_disclosure_packet:
    required_bindings:
    - disclosure_id
    - exception_population_ref
    - materiality_basis_ref
    - board_audience_ref
    - required_action_ref
    - owner_ref
    - disclosed_at_or_null
    rules:
    - exception_population_ref のない disclosure を board-level disclosure と呼んではならない。
    - materiality_basis_ref のない exception list を governance disclosure と称してはならない。
    - required_action_ref のない disclosure を accountable disclosure にしてはならない。
  renewal_freeze_gate:
    required_fields:
    - freeze_gate_id
    - freeze_trigger_ref
    - blocked_effect_ref
    - release_condition_ref
    - escalation_route_ref
    - gate_owner_ref
    - released_at_or_null
    rules:
    - freeze_trigger_ref のない freeze を lawful renewal freeze と呼んではならない。
    - release_condition_ref のない freeze を bounded freeze とみなしてはならない。
    - escalation_route_ref のない freeze を governed stop-rule にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - audit attestation registry
      - board exception disclosure approval
      - renewal freeze judgement
      - release-condition binding
    GraphEngine:
      owns:
      - post-renewal inconsistency evaluation
      - materiality projection
      - freeze-risk scoring
      - release-condition satisfaction check
    GraphLint:
      owns:
      - renewal-free attestation lint
      - materiality-free disclosure lint
      - release-free freeze lint
      - silent major-exception lint
    archive_object:
      owns:
      - audit attestation archive
      - board disclosure bundle
      - freeze / release history
      - oversight-year trail
  forbidden_shortcuts:
  - renewal ref のない audit memo を attestation 扱いにする
  - 重大 exception を materiality basis なしで disclosure 対象から外す
  - release condition のない freeze gate を常態化する
  - audit で見つかった重大 gap を board surface に上げずに局所 closure する
  residual_open_points: []
scheduler_multi_year_resilience_doctrine_governance:
  status: provisional_fixed
  statement: scheduler_multi_year_resilience_doctrine_governance とは、複数年度にまたがる resilience doctrine、charter supersession lineage、sunset archive seal を束ねて年次 charter 群の上位連続性を固定する規則である。
  core_claims:
  - 年次 renewal の列だけでは doctrine が見えない。複数年度の invariant、適用範囲、失効条件を doctrine packet として明示しなければ、各年 charter の正当性基準が年ごとに揺れる。
  - supersession は latest wins では足りない。どの charter が何を根拠に置き換えられ、どの exception bundle や capital covenant を継承したかを lineage 上で追跡できなければならない。
  - sunset archive seal は削除ではなく封緘である。obsolete charter や expired exception bundle は seal 後も digest・retention tier・replay envelope を保ったまま参照可能であるべきである。
  - document 名の差し替えだけで doctrine version を進めてはならない。governing invariants、validity horizon、approval route が変わるときだけ doctrine version change として扱う必要がある。
  - charter supersession と sunset seal は接続される。superseded charter が seal される前に successor linkage と retained obligations を確定しなければ governance continuity が切れる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は doctrine registry、supersession reachability evaluation、seal lint、multi-year archive を分担する。
  multi_year_doctrine_packet:
    required_fields:
    - doctrine_packet_id
    - doctrine_scope_ref
    - valid_from_year_ref
    - valid_to_or_null
    - governing_invariants_ref
    - approval_route_ref
    - ratified_at_or_null
    rules:
    - doctrine_scope_ref のない packet を multi-year doctrine と呼んではならない。
    - governing_invariants_ref のない doctrine を annual charter の上位基準とみなしてはならない。
    - approval_route_ref のない doctrine update を lawful doctrine ratification と称してはならない。
  charter_supersession_lineage:
    required_bindings:
    - supersession_id
    - superseded_charter_ref
    - superseding_charter_ref
    - supersession_basis_ref
    - effective_boundary_ref
    - lineage_owner_ref
    - registered_at_or_null
    rules:
    - superseded_charter_ref のない supersession を lineage event と呼んではならない。
    - supersession_basis_ref のない置換を lawful supersession とみなしてはならない。
    - effective_boundary_ref のない supersession を time-bounded authority transition にしてはならない。
  sunset_archive_seal:
    required_fields:
    - seal_id
    - target_bundle_ref
    - sunset_basis_ref
    - retention_tier_ref
    - replay_envelope_ref
    - seal_owner_ref
    - sealed_at_or_null
    rules:
    - target_bundle_ref のない seal を archive seal と呼んではならない。
    - sunset_basis_ref のない封緘を lawful sunset とみなしてはならない。
    - replay_envelope_ref のない seal を replay-ready archive と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - multi-year doctrine registry
      - charter supersession registration
      - sunset archive seal judgement
      - retained obligation carry-forward binding
    GraphEngine:
      owns:
      - doctrine-to-charter reachability evaluation
      - supersession lineage consistency check
      - seal impact projection
      - retained obligation inheritance check
    GraphLint:
      owns:
      - invariant-free doctrine lint
      - basis-free supersession lint
      - replay-envelope-free seal lint
      - orphaned successor lint
    archive_object:
      owns:
      - multi-year doctrine packet archive
      - supersession lineage archive
      - sunset seal evidence bundle
      - cross-year governance history
  forbidden_shortcuts:
  - prior / successor linkage を定義せずに charter を superseded 扱いにする
  - retained obligation を確定せずに obsolete charter を seal する
  - approval route なしで doctrine version を更新する
  - seal を deletion と同義にして replay envelope を失わせる
  residual_open_points: []
scheduler_doctrine_amendment_variance_governance:
  status: provisional_fixed
  statement: scheduler_doctrine_amendment_variance_governance とは、mid-cycle doctrine amendment petition、cross-year variance corridor、interim ratification を束ねて doctrine change の入口と暫定効力を固定する規則である。
  core_claims:
  - doctrine は silent edit してはならない。変更は amendment petition として trigger、affected invariants、impact scope を束ねて提出しなければならない。
  - variance corridor は shadow doctrine ではない。baseline doctrine からの逸脱を bounded な期間と範囲でのみ許す temporary lane である。
  - interim ratification は便利な抜け道ではなく、full ratification までの provisional effect を期限付きで与える機構である。expiry gate と full ratification route を必ず伴う必要がある。
  - petition と variance は接続される。petition が doctrine change へ進むのか、temporary variance で吸収するのかを分けずに運用すると doctrine lineage が濁る。
  - cross-year variance には return-to-baseline か formal amendment のどちらかを出口として束ねる必要がある。出口のない variance は恒久 drift である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は amendment registry、variance burden evaluation、provisional-effect lint、change evidence archive を分担する。
  doctrine_amendment_petition:
    required_fields:
    - petition_id
    - doctrine_ref
    - amendment_trigger_ref
    - affected_invariant_ref
    - impact_scope_ref
    - proposer_ref
    - submitted_at_or_null
    rules:
    - doctrine_ref のない petition を doctrine amendment petition と呼んではならない。
    - affected_invariant_ref のない petition を substantive doctrine change とみなしてはならない。
    - impact_scope_ref のない petition を ratification queue に流してはならない。
  cross_year_variance_corridor:
    required_bindings:
    - variance_id
    - baseline_doctrine_ref
    - variance_scope_ref
    - corridor_limit_ref
    - expiry_or_review_ref
    - owner_ref
    - admitted_at_or_null
    rules:
    - baseline_doctrine_ref のない variance を doctrine variance と呼んではならない。
    - corridor_limit_ref のない variance を bounded variance corridor とみなしてはならない。
    - expiry_or_review_ref のない variance を cross-year admissible にしてはならない。
  interim_ratification_record:
    required_fields:
    - interim_ratification_id
    - petition_ref
    - provisional_effect_ref
    - expiry_gate_ref
    - full_ratification_route_ref
    - ratifier_ref
    - ratified_at_or_null
    rules:
    - petition_ref のない interim ratification を lawful provisional effect と呼んではならない。
    - expiry_gate_ref のない provisional effect を bounded interim ratification とみなしてはならない。
    - full_ratification_route_ref のない interim record を doctrine bridge にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - amendment petition registry
      - variance corridor admission
      - interim ratification binding
      - variance exit / amendment escalation linkage
    GraphEngine:
      owns:
      - amendment impact projection
      - variance burden evaluation
      - expiry / review breach detection
      - provisional effect overstay risk scoring
    GraphLint:
      owns:
      - trigger-free amendment lint
      - limit-free variance lint
      - expiry-free interim ratification lint
      - shadow-doctrine drift lint
    archive_object:
      owns:
      - amendment petition archive
      - variance corridor evidence
      - interim ratification history
      - doctrine change audit trail
  forbidden_shortcuts:
  - affected invariant を書かずに doctrine amendment を流す
  - corridor limit のない variance を暫定措置として常態化する
  - expiry gate なしで interim ratification を出す
  - petition と variance の出口を分けずに doctrine lineage を混在させる
  residual_open_points: []
scheduler_supersession_conflict_arbitration_governance:
  status: provisional_fixed
  statement: scheduler_supersession_conflict_arbitration_governance とは、supersession conflict arbitration、parallel-charter quarantine、authoritative-head selection を束ねて競合 authority の収束規則を固定するものである。
  core_claims:
  - 同一 scope に複数の charter が authority を主張したら conflict case を開かなければならない。黙って一方を採用する運用は lineage corruption である。
  - parallel-charter quarantine は失敗ではなく保全である。競合中の charter には mutation、promotion、seal を禁止し、read-only reference と evidence capture のみを許す必要がある。
  - authoritative head は日付順では決まらない。selection basis、effective boundary、carry-forward obligation を束ねた head selection が必要である。
  - arbitration 中に active operation を止めるか限定継続するかを quarantine policy 上で明示しなければならない。authority conflict を現場判断に丸投げしてはならない。
  - head selection 後には loser charter の disposition が必要である。supersede、withdraw、split-scope coexistence のどれかを registry 上で固定する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は conflict case registry、overlap analysis、quarantine lint、arbitration archive を分担する。
  supersession_conflict_case:
    required_fields:
    - conflict_case_id
    - contested_charter_refs
    - overlap_scope_ref
    - conflict_basis_ref
    - arbiter_route_ref
    - opened_at_or_null
    rules:
    - contested_charter_refs のない case を supersession conflict と呼んではならない。
    - overlap_scope_ref のない case を authority conflict arbitration に流してはならない。
    - arbiter_route_ref のない case を lawful conflict case とみなしてはならない。
  parallel_charter_quarantine:
    required_bindings:
    - quarantine_id
    - quarantined_charter_ref
    - blocked_operations_ref
    - release_gate_ref
    - quarantine_owner_ref
    - quarantined_at_or_null
    rules:
    - quarantined_charter_ref のない quarantine を charter quarantine と呼んではならない。
    - blocked_operations_ref のない quarantine を protective quarantine とみなしてはならない。
    - release_gate_ref のない quarantine を bounded conflict containment にしてはならない。
  authoritative_head_selection:
    required_fields:
    - selection_id
    - candidate_head_refs
    - selection_basis_ref
    - effective_head_ref
    - announcement_route_ref
    - selected_at_or_null
    rules:
    - candidate_head_refs のない selection を authoritative-head selection と呼んではならない。
    - selection_basis_ref のない head appointment を lawful arbitration result とみなしてはならない。
    - effective_head_ref のない result を governing head と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - conflict case registry
      - parallel-charter quarantine binding
      - authoritative head ratification
      - loser charter disposition recording
    GraphEngine:
      owns:
      - overlap scope analysis
      - authority conflict severity scoring
      - quarantine blast-radius projection
      - head selection consistency check
    GraphLint:
      owns:
      - scope-free conflict lint
      - block-free quarantine lint
      - basis-free head selection lint
      - silent parallel-authority lint
    archive_object:
      owns:
      - conflict case archive
      - quarantine evidence bundle
      - head selection evidence
      - arbitration trail
  forbidden_shortcuts:
  - overlap scope を定義せずに conflict case を閉じる
  - blocked operations のない quarantine を protective と呼ぶ
  - selection basis なしで authoritative head を決める
  - loser charter disposition を定義せずに conflict を解消済みにする
  residual_open_points: []
scheduler_sunset_archive_reopen_governance:
  status: provisional_fixed
  statement: scheduler_sunset_archive_reopen_governance とは、sunset archive reopen、legal-hold carveout、replay scope restoration を束ねて seal 済み archive の限定再活性化規則を固定するものである。
  core_claims:
  - seal 済み archive の reopen は resurrection ではない。reopen basis、requested scope、closure return gate を持つ bounded operation として扱う必要がある。
  - legal-hold carveout は reopen の代用品ではない。seal を維持したまま retention override を与える限定 carveout と、replay を実行する reopen を分けて扱う必要がある。
  - replay scope restoration では sealed bundle 全体を無条件に解放してはならない。restored scope、replay budget、closure return gate を束ねる必要がある。
  - reopen 中の変更は current doctrine / charter head に直書きしてはならない。audit basis または remediation lane に隔離し、closure return か formal carry-forward を経て反映するべきである。
  - reopen の終了条件は明確でなければならない。restored scope の reseal、hold continuation、formal migration のどれで閉じるかを事前に固定する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reopen registry、scope restoration evaluation、hold/reseal lint、reopen evidence archive を分担する。
  archive_reopen_petition:
    required_fields:
    - reopen_petition_id
    - sealed_bundle_ref
    - reopen_basis_ref
    - requested_scope_ref
    - requester_ref
    - filed_at_or_null
    rules:
    - sealed_bundle_ref のない petition を archive reopen petition と呼んではならない。
    - reopen_basis_ref のない reopen を lawful sunset reopen とみなしてはならない。
    - requested_scope_ref のない petition を bounded reopen にしてはならない。
  legal_hold_carveout:
    required_bindings:
    - carveout_id
    - hold_basis_ref
    - excluded_segment_ref
    - retention_override_ref
    - approving_route_ref
    - activated_at_or_null
    rules:
    - hold_basis_ref のない carveout を legal-hold carveout と呼んではならない。
    - excluded_segment_ref のない carveout を bounded hold extension とみなしてはならない。
    - retention_override_ref のない carveout を lawful retention override にしてはならない。
  replay_scope_restoration:
    required_fields:
    - restoration_id
    - reopen_ref
    - restored_scope_ref
    - replay_budget_ref
    - closure_return_gate_ref
    - restored_at_or_null
    rules:
    - reopen_ref のない restoration を replay scope restoration と呼んではならない。
    - restored_scope_ref のない restoration を scoped replay とみなしてはならない。
    - closure_return_gate_ref のない restoration を bounded reopen cycle にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - archive reopen petition registry
      - legal-hold carveout admission
      - replay scope restoration binding
      - reseal / migration closure recording
    GraphEngine:
      owns:
      - reopen basis evaluation
      - restored scope blast-radius projection
      - replay budget sufficiency check
      - closure return satisfiability assessment
    GraphLint:
      owns:
      - basis-free reopen lint
      - segment-free hold carveout lint
      - return-gate-free restoration lint
      - open-ended resurrect lane lint
    archive_object:
      owns:
      - reopen petition archive
      - legal-hold carveout evidence
      - restored replay artifacts
      - reseal closure trail
  forbidden_shortcuts:
  - reopen basis なしで seal 済み bundle を解凍する
  - excluded segment を定義せずに legal-hold carveout を延長する
  - closure return gate なしで restored replay を走らせる
  - reopen 中の生成物を current head へ直書きする
  residual_open_points: []
scheduler_doctrine_migration_program_governance:
  status: provisional_fixed
  statement: scheduler_doctrine_migration_program_governance とは、doctrine migration program、staged adoption wave、rollback-safe coexistence を束ねて doctrine 移行の実施規則を固定するものである。
  core_claims:
  - migration は単一イベントではない。source doctrine、target doctrine、wave plan、success metric を持つ program として設計しなければならない。
  - staged adoption wave は rollout convenience ではなく risk partitioning である。cohort scope、activation condition、coexistence window、rollback trigger を束ねて段階適用する必要がある。
  - coexistence は無制限に許してはならない。parallel scope、incompatibility rule、rollback lane、reconciliation plan を持つ guard が必要である。
  - wave ごとに success/failure witness を残し、成功しても source doctrine の sunset timing を急がない。migration completion と source retirement は別判断である。
  - rollback-safe coexistence では data / evidence / obligations の二重記録境界を定義する必要がある。どこが dual-write、single-write、projection-only なのか不明なまま並走させてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は migration registry、wave impact simulation、coexistence lint、migration archive を分担する。
  doctrine_migration_program:
    required_fields:
    - migration_id
    - source_doctrine_ref
    - target_doctrine_ref
    - migration_wave_plan_ref
    - success_metric_ref
    - program_owner_ref
    - launched_at_or_null
    rules:
    - source_doctrine_ref のない migration を doctrine migration program と呼んではならない。
    - migration_wave_plan_ref のない program を staged migration とみなしてはならない。
    - success_metric_ref のない migration を closure 可能な program にしてはならない。
  staged_adoption_wave:
    required_bindings:
    - wave_id
    - cohort_scope_ref
    - activation_condition_ref
    - coexistence_window_ref
    - rollback_trigger_ref
    - wave_owner_ref
    - activated_at_or_null
    rules:
    - cohort_scope_ref のない wave を staged adoption wave と呼んではならない。
    - coexistence_window_ref のない wave を safe rollout segment とみなしてはならない。
    - rollback_trigger_ref のない wave を rollback-ready wave にしてはならない。
  rollback_safe_coexistence_guard:
    required_fields:
    - guard_id
    - parallel_scope_ref
    - incompatibility_rule_ref
    - rollback_lane_ref
    - reconciliation_plan_ref
    - guard_owner_ref
    - bound_at_or_null
    rules:
    - parallel_scope_ref のない guard を coexistence guard と呼んではならない。
    - incompatibility_rule_ref のない coexistence を safe coexistence とみなしてはならない。
    - rollback_lane_ref のない guard を rollback-safe と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - migration program registry
      - wave activation / rollback binding
      - coexistence guard admission
      - migration completion judgement
    GraphEngine:
      owns:
      - wave impact simulation
      - incompatibility surface detection
      - rollback trigger sensitivity analysis
      - migration success metric tracking
    GraphLint:
      owns:
      - plan-free migration lint
      - window-free wave lint
      - rollback-lane-free coexistence lint
      - unbounded dual-write lint
    archive_object:
      owns:
      - migration program archive
      - wave evidence bundle
      - coexistence guard history
      - migration completion trail
  forbidden_shortcuts:
  - wave plan なしで doctrine migration を開始する
  - coexistence window のない wave を本番適用する
  - rollback lane なしで source / target doctrine を並走させる
  - source retirement を migration completion と自動同一視する
  residual_open_points: []
scheduler_doctrine_conformance_audit_governance:
  status: provisional_fixed
  statement: scheduler_doctrine_conformance_audit_governance とは、doctrine conformance audit、drift scorecard、remediation covenant を束ねて active doctrine の遵守監督を固定する規則である。
  core_claims:
  - doctrine は ratified されただけでは守られない。active charter、variance、migration wave、manual override を横断して conformance audit を行う必要がある。
  - drift は単発違反ではなく累積傾向として測る必要がある。scorecard は violation count だけでなく trend window、severity mix、repeat offender、closure latency を持つべきである。
  - audit で見つかった drift は remediation covenant に接続しなければならない。required fix、deadline、escalation route、accountable owner を束ねずに advisory で終わらせてはならない。
  - scorecard は見栄えのための dashboard ではない。active doctrine に対する structural drift を次の amendment、migration、federation import 判断へ返す evidence surface である。
  - conformance audit では temporary variance や interim ratification を免罪符にしてはならない。許容された variance であっても corridor limit や expiry breach があれば drift として計上する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は conformance registry、drift scoring、covenant lint、remediation archive を分担する。
  doctrine_conformance_audit:
    required_fields:
    - audit_id
    - doctrine_ref
    - audit_scope_ref
    - conformance_basis_ref
    - sample_window_ref
    - auditor_ref
    - attested_at_or_null
    rules:
    - doctrine_ref のない audit を doctrine conformance audit と呼んではならない。
    - conformance_basis_ref のない audit を lawful conformance audit とみなしてはならない。
    - sample_window_ref のない audit を time-bounded audit evidence にしてはならない。
  drift_scorecard:
    required_bindings:
    - scorecard_id
    - measured_scope_ref
    - drift_metric_ref
    - threshold_basis_ref
    - trend_window_ref
    - owner_ref
    - published_at_or_null
    rules:
    - measured_scope_ref のない scorecard を drift scorecard と呼んではならない。
    - drift_metric_ref のない scorecard を conformance trend surface とみなしてはならない。
    - threshold_basis_ref のない scorecard を escalation input にしてはならない。
  remediation_covenant:
    required_fields:
    - covenant_id
    - violation_ref
    - required_fix_ref
    - deadline_ref
    - escalation_route_ref
    - accountable_owner_ref
    - bound_at_or_null
    rules:
    - violation_ref のない covenant を remediation covenant と呼んではならない。
    - required_fix_ref のない covenant を accountable remediation にしてはならない。
    - deadline_ref のない covenant を bounded covenant とみなしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - conformance audit registry
      - drift scorecard publication
      - remediation covenant binding
      - closure / escalation judgement
    GraphEngine:
      owns:
      - drift metric computation
      - trend-window analysis
      - threshold breach detection
      - remediation sufficiency projection
    GraphLint:
      owns:
      - basis-free audit lint
      - metric-free scorecard lint
      - deadline-free covenant lint
      - advisory-only remediation lint
    archive_object:
      owns:
      - conformance audit archive
      - drift scorecard history
      - remediation covenant evidence
      - closure / escalation trail
  forbidden_shortcuts:
  - conformance basis のない audit を監査完了扱いにする
  - drift metric のない scorecard を evidence surface と呼ぶ
  - deadline のない remediation covenant を発行する
  - 重大 drift を advisory memo のまま covenant へ接続しない
  residual_open_points: []
scheduler_federation_doctrine_import_governance:
  status: provisional_fixed
  statement: scheduler_federation_doctrine_import_governance とは、外部または上位組織からの doctrine import、local override boundary、reciprocity attestation を束ねて federated authority の入口を固定する規則である。
  core_claims:
  - federation import は copy & paste ではない。source authority、imported scope、trust tier、semantic baseline、refresh contract を packet として束ねなければ imported doctrine は正本にならない。
  - local override は imported doctrine の自由改変ではない。override basis、許容 deviation、expiry / review、approval route を明示した bounded deviation としてのみ許される。
  - reciprocity attestation は互換宣言では足りない。local projection と remote projection が同じ obligation surface を指していることを equivalence basis と divergence disclosure で示さなければならない。
  - import と adoption と enforcement を分ける必要がある。取り込めたことと内部運用へ昇格できたことを同一視すると shadow authority が生まれる。
  - refresh contract のない imported doctrine は stale authority になる。revocation、supersession、reissue を受け取る経路がない federation は継続 authority を名乗れない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は import registry、override admissibility evaluation、reciprocity lint、federation evidence archive を分担する。
  federation_import_packet:
    required_fields:
    - import_packet_id
    - source_doctrine_ref
    - source_authority_ref
    - imported_scope_ref
    - trust_tier_ref
    - semantic_baseline_ref
    - refresh_contract_ref
    - admitted_at_or_null
    rules:
    - source_authority_ref のない import を federated doctrine import と呼んではならない。
    - semantic_baseline_ref のない import を local reasoning に接続してはならない。
    - refresh_contract_ref のない import を continuing authority とみなしてはならない。
  local_override_boundary:
    required_bindings:
    - override_case_id
    - imported_clause_ref
    - override_basis_ref
    - allowed_deviation_ref
    - expiry_or_review_ref
    - approval_route_ref
    - bounded_at_or_null
    rules:
    - override_basis_ref のない local edit を lawful override にしてはならない。
    - allowed_deviation_ref のない override を bounded deviation と呼んではならない。
    - expiry_or_review_ref のない override を persistent federation boundary にしてはならない。
  reciprocity_attestation:
    required_fields:
    - attestation_id
    - local_projection_ref
    - remote_projection_ref
    - equivalence_basis_ref
    - divergence_disclosure_ref
    - counterpart_attestor_ref
    - attested_at_or_null
    rules:
    - local_projection_ref と remote_projection_ref が揃わない attestation を reciprocity 証明とみなしてはならない。
    - equivalence_basis_ref のない相互運用宣言を semantic reciprocity と称してはならない。
    - divergence_disclosure_ref のない federation claim を no-gap compatibility と表現してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - federation import registry
      - local override approval binding
      - reciprocity attestation ratification
      - refresh / revocation linkage
    GraphEngine:
      owns:
      - import scope projection
      - override impact evaluation
      - semantic baseline comparison
      - refresh-contract reachability check
    GraphLint:
      owns:
      - authority-free import lint
      - basis-free override lint
      - disclosure-free reciprocity lint
      - stale-import lint
    archive_object:
      owns:
      - import packet archive
      - override evidence bundle
      - reciprocity attestation evidence
      - federation authority history
  forbidden_shortcuts:
  - source authority を確認せずに外部 doctrine を imported authority 扱いにする
  - local convenience を理由に imported clause を silent override する
  - divergence disclosure なしで reciprocity attestation を発行する
  - refresh contract のない import を永続 authority として残す
  residual_open_points: []
scheduler_federation_semantic_alignment_governance:
  status: provisional_fixed
  statement: scheduler_federation_semantic_alignment_governance とは、semantic equivalence map、downgrade waiver、obligation uplift を束ねて federated doctrine の意味合わせ境界を固定する規則である。
  core_claims:
  - 同じラベルでも同じ意味とは限らない。imported term は local term との equivalence class、variance class、evidence surface を map に束ねなければ internal reasoning に流してはならない。
  - semantic equivalence map は翻訳メモではない。source clause、local clause、comparison basis、unmapped remainder を残す normative bridge である。
  - downgrade waiver は weaker import を受け入れる例外であり、risk basis、compensating control、expiry を束ねずに発行してはならない。
  - obligation uplift は stricter local adoption の出自を固定する。uplift rationale と enforcement path がなければ imported doctrine 由来なのか local hardening なのかが曖昧になる。
  - waiver と uplift は対になる。どこで義務を弱め、どこで強めたかを同じ semantic bridge 上で追えなければ reciprocity は実質的に崩れる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は semantic map registry、gap evaluation、downgrade / uplift lint、alignment evidence archive を分担する。
  semantic_equivalence_map:
    required_fields:
    - map_id
    - source_clause_ref
    - local_clause_ref_or_null
    - equivalence_class_ref
    - variance_class_ref
    - comparison_basis_ref
    - unmapped_remainder_ref_or_null
    - registered_at_or_null
    rules:
    - comparison_basis_ref のない map を semantic equivalence map と呼んではならない。
    - equivalence_class_ref のない対応付けを interoperable mapping とみなしてはならない。
    - unmapped_remainder_ref_or_null を省略したまま full equivalence を主張してはならない。
  downgrade_waiver:
    required_bindings:
    - waiver_id
    - affected_clause_ref
    - downgrade_basis_ref
    - risk_basis_ref
    - compensating_control_ref
    - expiry_or_review_ref
    - approved_at_or_null
    rules:
