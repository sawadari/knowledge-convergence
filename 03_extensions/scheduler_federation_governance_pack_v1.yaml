scheduler_federation_auditor_independence_governance:
  status: provisional_fixed
  statement: scheduler_federation_auditor_independence_governance とは、auditor independence attestation、affiliate relation disclosure、non-audit service boundary、fee conflict cap、recusal escalation lane、replacement auditor handoff、public caveat duty を束ねて federation assurance の独立性と継続性を固定する規則である。
  core_claims:
  - independence は宣言文だけでは足りない。affiliate relation snapshot、non-audit service disclosure、fee concentration、cooling-off window を束ねなければ attested independence と呼べない。
  - fee conflict cap は価格統制ではない。single client dependence や success-fee 類似構造が opinion の重みを歪めないための guard である。
  - affiliate relation は名称一致だけで判定してはならない。ownership, board overlap, advisory tie, subcontract chain を含む relation class を明示しなければ hidden conflict を拾えない。
  - recusal は単なる辞退ではない。trigger class、replacement route、workpaper freeze、public caveat duty を束ねなければ assurance continuity が壊れる。
  - replacement auditor handoff は opinion shopping の抜け道であってはならない。handoff reason、open issue register、workpaper custody、clock pause rule を束ねなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は independence registry、relation evaluation、shortcut lint、recusal archive を分担する。
