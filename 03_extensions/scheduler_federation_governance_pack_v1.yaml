  statement: scheduler_federation_assurance_suspension_governance とは、assurance suspension trigger、shadow oversight mode、reinstatement review を束ねて assurance 信頼失陥時の統治を固定する規則である。
  core_claims:
  - suspension は embarrassment hide ではない。trigger family、scope freeze、active notice duty、fallback recording を束ねなければ lawful suspension と呼べない。
  - shadow oversight mode は assurance の完全停止ではない。limited observation surface、manual review cadence、publication fallback を残すことで governance vacuum を防ぐ。
  - reinstatement review は復帰宣言ではない。root-cause closure、repeat-failure check、confidence floor、independence re-check を束ねなければ return to assurance にならない。
  - suspension 中に issue を clean 扱いへ戻してはならない。shadow mode でも unresolved finding と public caveat を維持しなければならない。
  - repeat-failure は単発 miss と同じではない。failure lineage を持たなければ re-entry の厳しさを調整できない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は suspension registry、shadow oversight evaluation、premature reinstatement lint、suspension archive を分担する。
  assurance_suspension_trigger:
    required_fields:
    - suspension_id
    - trigger_family_ref
    - scope_freeze_ref
    - active_notice_duty_ref
    - fallback_recording_ref
    - declared_at_or_null
    rules:
    - trigger_family_ref のない停止を assurance suspension と呼んではならない。
    - scope_freeze_ref のない suspension を bounded assurance halt とみなしてはならない。
    - active_notice_duty_ref のない停止を externally accountable suspension と称してはならない。
