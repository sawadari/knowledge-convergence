  core_claims:
  - rollout は一斉切替ではない。ring class、promotion gate、rollback lane、blast-radius cap を束ねなければ staged deployment と呼べない。
  - compatibility grace window は放置期間ではない。window start、window end、temporary shim、required notice、forced cutoff を明示しなければ lawful coexistence にならない。
  - deprecation sunset は単なる日付では足りない。deprecated surface、fallback removal condition、exception registry、archive duty を持たなければ old path を閉じられない。
  - early ring の成功だけで federation-wide healthy を宣言してはならない。partner diversity、trust tier、segment class が coverage を満たして初めて promotion を許すべきである。
  - temporary shim は bridge であって新標準ではない。shim の owner、expiry、telemetry、exit criterion がなければ compatibility debt が蓄積する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は rollout registry、coverage / cutoff evaluation、shim / sunset lint、deployment archive を分担する。
