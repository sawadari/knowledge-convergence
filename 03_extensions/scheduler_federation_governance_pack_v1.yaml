scheduler_federation_public_transparency_governance:
  status: provisional_fixed
  statement: scheduler_federation_public_transparency_governance とは、public transparency report、assurance seal downgrade badge、recipient advisory channel を束ねて federation assurance 劣化時の一般向け開示と行動喚起の境界を固定する規則である。
  core_claims:
  - regulator への notice だけでは federation assurance failure は収束しない。public transparency report がなければ一般受領者と市場は stale trust を持ち続ける。
  - public report は広報資料ではない。reporting scope、severity band、affected recipient segment、corrective status を束ねなければ accountability packet と呼べない。
  - assurance seal downgrade badge は飾りではない。downgrade trigger、visibility surface、historical retention、reinstatement pointer がなければ badge state の変化を追跡できない。
  - recipient advisory channel は単なる FAQ ではない。recipient segment、urgency class、action menu、callback lane を固定しなければ affected recipient を実際に動かせない。
  - public transparency は sealed evidence を公開する権利ではない。market-facing caveat と bounded fact floor を保ちながら downgrade 理由を説明しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は public report registry、badge state projection、advisory routing、transparency archive を分担する。
  public_transparency_report:
    required_fields:
    - report_id
    - report_scope_ref
    - reporting_window_ref
    - severity_band_ref
    - affected_recipient_segment_ref
    - corrective_status_ref
    - published_at_or_null
    rules:
    - report_scope_ref のない disclosure を public transparency report と呼んではならない。
    - severity_band_ref のない report を badge downgrade explanation とみなしてはならない。
    - affected_recipient_segment_ref のない report を recipient-actionable transparency と称してはならない。
  assurance_seal_downgrade_badge:
