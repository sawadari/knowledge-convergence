  core_claims:
  - scorecard は宣伝用ランキングではない。dimension set、measurement window、publication tier、appeal lane を束ねなければ governance metric と呼べない。
  - 比較指標は single KPI へ潰してはならない。contribution、reliability、remediation velocity、compatibility debt、audit hygiene を分けなければ gaming 耐性が弱い。
