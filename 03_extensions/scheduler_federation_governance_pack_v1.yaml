    - partner_ref
    - trigger_family_ref
    - evidence_bundle_ref
    - emergency_lane_ref
    - retained_duty_ref
    - sealed_at_or_null
    rules:
    - trigger_family_ref のない expulsion を lawful removal と呼んではならない。
    - evidence_bundle_ref のない expulsion を accountable action とみなしてはならない。
    - retained_duty_ref のない expulsion を closed membership case と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - membership admission registry
      - probation tier binding
      - expulsion ratification
      - retained duty carry-forward binding
    GraphEngine:
      owns:
