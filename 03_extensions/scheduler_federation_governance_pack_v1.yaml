    required_fields:
    - threshold_id
    - materiality_axis_ref
    - harm_zone_ref
    - scope_boundary_ref
    - minimum_public_facts_ref
    - trigger_at_or_null
    rules:
    - materiality_axis_ref のない threshold を public incident disclosure threshold と呼んではならない。
    - minimum_public_facts_ref のない告知を accountable public notice とみなしてはならない。
    - scope_boundary_ref のない threshold を partner-scoped disclosure rule と称してはならない。
