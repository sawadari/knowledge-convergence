scheduler_federation_challenge_review_governance:
  status: provisional_fixed
  statement: scheduler_federation_challenge_review_governance とは、challenge intake schema、independent reviewer quorum、escalation freeze gate を束ねて、metric dispute の受理・独立審査・一時停止境界を固定する規則である。
  core_claims:
  - challenge lane がなければ correction governance は片道運用になる。受理要件と receipt SLA が必要である。
  - independent reviewer quorum は単なる人数要件ではない。independence rule がなければ reviewer pool を増やしても self-review から抜けられない。
  - escalation freeze gate がないと争点が未解決でも public tier metric が流通し続ける。
  - challenge を無制限に受理すると運用は妨害される。admissibility rule と evidence requirement の両方が必要である。
  - freeze gate は停止のためだけではない。release resume rule がないと review が終わっても publication を再開できない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は intake binding、quorum evaluation、freeze control、review archive を分担する。
  challenge_intake_schema:
