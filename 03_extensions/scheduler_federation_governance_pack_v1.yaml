    - policy_variant_ref
    - changed_factor_set_ref
    - change_reason_ref
    - activation_time_ref
    - recorded_at_or_null
    rules:
    - changed_factor_set_ref のない record を intervention change log と呼んではならない。
    - change_reason_ref のない log を interpretable policy change evidence とみなしてはならない。
    - activation_time_ref のない log を time-aligned intervention history と称してはならない。
  causal_uplift_threshold:
    required_fields:
    - uplift_threshold_id
    - target_metric_ref
    - minimum_effect_size_ref
    - confidence_requirement_ref
    - harm_guardrail_ref
    - approved_at_or_null
    rules:
    - target_metric_ref のない rule を causal uplift threshold と呼んではならない。
    - minimum_effect_size_ref のない threshold を action-worthy uplift criterion とみなしてはならない。
    - harm_guardrail_ref のない threshold を safe adoption boundary と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - experiment admissibility policy
      - uplift threshold approval
      - holdout safety floor
      - failure-retention policy
    GraphEngine:
      owns:
      - holdout assignment
      - intervention lineage construction
      - uplift estimation input assembly
      - guardrail monitoring
    GraphLint:
      owns:
      - unsafe holdout lint
      - missing-change-log lint
      - tiny-uplift adoption lint
      - failed-experiment erasure lint
    archive_object:
      owns:
      - holdout configuration snapshot
      - intervention change ledger
      - uplift evaluation packet
      - negative-result archive
  forbidden_shortcuts:
  - holdout lane なしの before/after を causal proof とみなす
  - change log なしで policy uplift を主張する
  - harm guardrail を欠いたまま tiny uplift で採用を進める
  residual_open_points: []
scheduler_federation_metric_integrity_governance:
  status: provisional_fixed
  statement: scheduler_federation_metric_integrity_governance とは、cross-partner telemetry normalization、hostile gaming detection、metric audit trail を束ねて federation effectiveness metric の完全性を固定する規則である。
  core_claims:
  - federation metric は partner 実装差を吸収できなければ比較不能である。normalization map がない raw telemetry を benchmark に使ってはならない。
  - high score は必ずしも良い transparency を意味しない。gaming detection がなければ synthetic acknowledgement や selective logging が score を汚染する。
  - metric audit trail は監査用付録ではない。source stream、normalization rule、aggregation revision を追跡できなければ score provenance は説明不能である。
  - partner 特有イベントを消しすぎても integrity は壊れる。normalization は semantic mismatch を caveat 付きで保持しなければならない。
  - gaming suspicion は即断罪ではない。detector basis、confidence tier、review lane を固定して false positive を抑えなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は normalization registry、gaming detector projection、audit provenance、metric challenge archive を分担する。
