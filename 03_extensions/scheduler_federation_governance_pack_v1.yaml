scheduler_federation_capability_routing_governance:
  status: provisional_fixed
  statement: scheduler_federation_capability_routing_governance とは、capability advertisement、selective subscription、route affinity を束ねて federation 内の機能公開と購読経路を固定する規則である。
  core_claims:
  - capability advertisement は存在宣言ではない。capability family、supported scope、qos profile、trust prerequisite、expiry / review を伴って初めて subscription 可能な surface になる。
  - selective subscription は all-in mirror ではない。selected scope、filter profile、delivery SLA、unsubscribe gate を持たない購読は bounded intake と呼べない。
  - route affinity は preference だけでなく fallback policy を含む。preferred route set、fallback route set、latency budget、residency constraint を束ねなければ lawful route choice にならない。
  - capability 公開と route choice を混同してはならない。公開されていても subscriber の trust tier や residency constraint が満たされなければ route を開いてはならない。
  - subscription は perpetual ではない。expiry / review と unsubscribe gate がない購読は stale dependency を蓄積する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は capability registry、route selection evaluation、subscription lint、routing evidence archive を分担する。
  capability_advertisement:
    required_fields:
    - capability_advert_id
    - partner_ref
    - capability_family_ref
    - supported_scope_ref
    - qos_profile_ref
    - trust_prerequisite_ref
    - expiry_or_review_ref
    - published_at_or_null
    rules:
    - capability_family_ref のない公開を capability advertisement と呼んではならない。
    - trust_prerequisite_ref のない advertisement を open federated service とみなしてはならない。
    - expiry_or_review_ref のない advertisement を continuing capability にしてはならない。
  selective_subscription_contract:
    required_bindings:
    - subscription_contract_id
    - subscriber_partner_ref
    - capability_advert_ref
    - selected_scope_ref
    - filter_profile_ref
    - delivery_sla_ref
    - unsubscribe_gate_ref
    - bound_at_or_null
    rules:
    - selected_scope_ref のない購読を selective subscription と呼んではならない。
    - delivery_sla_ref のない購読を dependable intake とみなしてはならない。
    - unsubscribe_gate_ref のない購読を bounded dependency として扱ってはならない。
  route_affinity_policy:
    required_fields:
    - route_affinity_id
    - capability_family_ref
    - preferred_route_set_ref
    - fallback_route_set_ref
    - latency_budget_ref
    - residency_constraint_ref
    - attested_at_or_null
    rules:
    - preferred_route_set_ref のない方針を route affinity と呼んではならない。
    - fallback_route_set_ref のない route policy を resilient routing とみなしてはならない。
    - residency_constraint_ref のない route choice を lawful placement と称してはならない。
  tool_responsibilities:
