  - public assurance notice は広報文ではない。audience class、assurance scope、opinion class、disclosure window、publication channel を固定しなければ trust signal ではなくなる。
  - confidentiality appeal は隠蔽 lane ではない。secrecy claim、harm test、review forum、redaction instruction を束ねなければ lawful non-disclosure と呼べない。
  - assurance notice は full disclosure の強制ではない。partner-safe redaction と public accountability を両立させる appeal lane が必要である。
  - accreditation は永続資格ではない。cadence breach、scope逸脱、independence loss が起きたときは expiry や suspension へ遷移できなければならない。
