    - liaison_corridor_id
    - routing_authority_ref
    - single_source_packet_ref
    - response_log_ref
    - divergence_escalation_ref
    - closed_at_or_null
    rules:
    - routing_authority_ref のない corridor を regulator liaison corridor と呼んではならない。
    - single_source_packet_ref のない corridor を consistency-safe regulator interface とみなしてはならない。
    - response_log_ref のない corridor を auditable supervisory communication と称してはならない。
  compelled_disclosure_replay:
    required_fields:
    - replay_case_id
    - disclosure_delta_ref
    - target_regulator_ref
    - recipient_divergence_note_ref
    - replay_deadline_ref
    - closed_at_or_null
    rules:
    - disclosure_delta_ref のない replay を compelled disclosure replay と呼んではならない。
    - target_regulator_ref のない replay を regulator-specific disclosure alignment とみなしてはならない。
    - recipient_divergence_note_ref のない replay を recipient-visible divergence handling と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - supervisory notice trigger registry
      - liaison corridor decision
      - compelled disclosure replay decision
      - divergence note binding
    GraphEngine:
