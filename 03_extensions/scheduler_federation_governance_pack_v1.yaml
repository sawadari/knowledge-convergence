scheduler_federation_dispute_sanction_governance:
  status: provisional_fixed
  statement: scheduler_federation_dispute_sanction_governance とは、dispute tribunal、sanction ladder、restitution protocol を束ねて cross-partner breach と disagreement の裁定手続きを固定する規則である。
  core_claims:
  - dispute tribunal は ad-hoc 会議ではない。tribunal composition、case intake packet、forum lock、appeal lane を束ねなければ federated adjudication と呼べない。
  - sanction は blacklist か無罪の二択ではない。warning、scope narrowing、probation reset、reserve freeze、expulsion recommendation を梯子として持たなければ proportional enforcement にならない。
  - restitution は善意の補填ではない。loss class、custody return、service credit、evidence repair、deadline を束ねた protocol がなければ accountable recovery にならない。
  - same incident を複数 forum に持ち込んではならない。forum lock と case lineage がなければ parallel shopping により裁定が崩れる。
  - appeal は retry ボタンではない。appealable issue class、new evidence threshold、stay effect、finalization point を定めなければ dispute closure を監査できない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は case registry、sanction / restitution evaluation、forum-shopping lint、adjudication archive を分担する。
