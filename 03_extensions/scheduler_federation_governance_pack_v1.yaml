  forbidden_shortcuts:
  - joint drill 成績をそのまま constitutional amendment 承認に使う
  - quorum を満たさず local convenience だけで federation rule を改定する
  - sunset timer なしで emergency override を常設化する
  - local adoption lag を理由に applicable floor を黙って無効化する
