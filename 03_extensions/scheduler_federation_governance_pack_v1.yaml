scheduler_federation_precedence_arbitration_governance:
  status: provisional_fixed
  statement: scheduler_federation_precedence_arbitration_governance とは、precedence matrix、conflict arbitration lane、authoritative-head declaration を束ねて federated doctrine 衝突時の正本決定を固定する規則である。
  core_claims:
  - federated doctrine は一枚岩ではない。上位 doctrine、peer doctrine、local doctrine、temporary variance が同一 scope で衝突する場合は precedence matrix を明示しなければならない。
  - precedence は trust tier だけで決めてはならない。scope overlap、effective boundary、semantic variance、legal mandate を合わせて conflict class を決める必要がある。
  - arbitration lane は議論ログではなく binding path である。claimant、conflict evidence、temporary freeze、decision route、closure condition を束ねなければ lawful arbitration と呼べない。
  - authoritative head は自然発生しない。どの doctrine projection が current enforcement head なのかを declaration record で宣言しなければ downstream execution は split-brain になる。
  - temporary freeze は無期限回避に使ってはならない。freeze expiry と fallback head を束ねておかなければ arbitration 遅延が runtime 停滞を招く。
  - DecisionLedger / GraphEngine / GraphLint / archive object は precedence registry、conflict evaluation、split-head lint、arbitration evidence archive を分担する。
  precedence_matrix:
    required_fields:
    - matrix_id
    - competing_scope_ref
    - doctrine_class_order_ref
    - tie_break_rule_ref
    - effective_boundary_ref
    - legal_mandate_ref_or_null
    - published_at_or_null
    rules:
    - doctrine_class_order_ref のない matrix を precedence matrix と呼んではならない。
    - tie_break_rule_ref のない precedence を deterministic head selection とみなしてはならない。
    - effective_boundary_ref のない matrix を active conflict resolver にしてはならない。
  conflict_arbitration_lane:
    required_bindings:
    - arbitration_id
    - competing_projection_set_ref
    - conflict_evidence_ref
    - temporary_freeze_ref_or_null
    - decision_route_ref
    - closure_condition_ref
    - opened_at_or_null
    rules:
    - conflict_evidence_ref のない lane を arbitration と呼んではならない。
    - decision_route_ref のない escalation を lawful arbitration route とみなしてはならない。
    - closure_condition_ref のない arbitration を resolved conflict にしてはならない。
  authoritative_head_declaration:
    required_fields:
    - head_declaration_id
    - winning_projection_ref
    - covered_scope_ref
    - fallback_head_ref_or_null
    - declaration_basis_ref
    - effective_from_ref
    - declared_at_or_null
    rules:
    - winning_projection_ref のない declaration を authoritative head と呼んではならない。
    - declaration_basis_ref のない head selection を lawful resolution と称してはならない。
    - effective_from_ref のない head declaration を executable current head にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - precedence matrix registry
      - arbitration route binding
      - authoritative head declaration
      - fallback head ratification
    GraphEngine:
      owns:
      - scope-overlap detection
      - conflict class evaluation
      - tie-break simulation
      - freeze impact analysis
    GraphLint:
      owns:
      - order-free precedence lint
      - evidence-free arbitration lint
      - split-head lint
      - expiry-free freeze lint
    archive_object:
      owns:
      - precedence publication archive
      - arbitration evidence bundle
      - head declaration history
      - conflict closure trail
  forbidden_shortcuts:
  - doctrine class order を示さずに trust tier だけで勝者を決める
  - conflict evidence なしで arbitration lane を閉じる
  - head declaration なしで downstream に winning projection を暗黙配布する
  - freeze expiry なしで arbitration を保留し続ける
  residual_open_points: []
scheduler_federation_breach_quarantine_governance:
  status: provisional_fixed
  statement: scheduler_federation_breach_quarantine_governance とは、reciprocity breach quarantine、suspension gate、re-entry attestation を束ねて federated link の異常停止と再接続境界を固定する規則である。
  core_claims:
  - reciprocity breach は信頼低下の感想ではない。projection mismatch、undeclared override、stale refresh、broken notice chain などの breach class を持つ事象である。
  - quarantine は federation 全体停止とは限らない。scope、partner、evidence lane、override lane のどこを隔離するかを bounded に記録しなければ過剰停止か過少停止になる。
  - suspension gate は manual toggle ではない。breach basis、containment scope、fallback authority、resume blocker を束ねた停止決定でなければ lawful suspension と呼べない。
  - 暫定復帰は unrestricted reconnect ではない。re-entry attestation に remediation proof、parity recheck、watch period を持たせなければ breach 再発を抑えられない。
  - quarantine 中の local override や imported obligations は凍結されるものと継続されるものを分けなければならない。全部止めるか全部流すかの二択は危険である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は breach registry、containment evaluation、re-entry lint、suspension evidence archive を分担する。
  breach_quarantine_record:
    required_fields:
    - quarantine_id
    - breach_class_ref
    - affected_partner_ref
    - contained_scope_ref
    - containment_basis_ref
    - fallback_authority_ref_or_null
    - started_at_or_null
    rules:
    - breach_class_ref のない quarantine を reciprocity breach response と呼んではならない。
    - contained_scope_ref のない隔離を bounded quarantine とみなしてはならない。
    - containment_basis_ref のない隔離を lawful containment と称してはならない。
  suspension_gate:
    required_bindings:
    - suspension_id
    - triggered_quarantine_ref
    - resume_blocker_ref
    - fallback_head_ref
    - communication_route_ref
    - review_cadence_ref
    - activated_at_or_null
    rules:
    - resume_blocker_ref のない suspension を controlled suspension にしてはならない。
    - fallback_head_ref のない suspension を safe execution state とみなしてはならない。
    - communication_route_ref のない停止を counterpart-notified suspension と呼んではならない。
  reentry_attestation:
    required_fields:
    - reentry_id
    - suspended_link_ref
    - remediation_proof_ref
    - parity_recheck_ref
    - watch_period_ref
    - approving_route_ref
    - attested_at_or_null
    rules:
    - remediation_proof_ref のない復帰を lawful re-entry とみなしてはならない。
    - parity_recheck_ref のない復帰を reciprocity-restored と称してはならない。
    - watch_period_ref のない re-entry を stabilized reconnection にしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - breach quarantine registry
      - suspension activation binding
      - re-entry attestation ratification
      - fallback authority continuity binding
    GraphEngine:
      owns:
      - breach-class detection
      - containment scope evaluation
      - fallback-head continuity check
      - re-entry watch-risk projection
    GraphLint:
      owns:
      - scope-free quarantine lint
      - fallback-free suspension lint
      - proof-free re-entry lint
      - silent reconnect lint
    archive_object:
      owns:
      - breach evidence archive
      - suspension communication record
      - re-entry proof bundle
      - watch-period history
  forbidden_shortcuts:
  - breach class を記録せずに federation link を止める
  - fallback authority なしで suspension を発動する
  - remediation proof なしで counterpart を再接続する
  - watch period なしで re-entry 後すぐに full trust tier へ戻す
  residual_open_points: []
scheduler_federation_provenance_relay_governance:
  status: provisional_fixed
  statement: scheduler_federation_provenance_relay_governance とは、provenance relay、evidence notarization chain、replay parity witness を束ねて federated exchange の由来保証を固定する規則である。
  core_claims:
  - federation 越しの doctrine projection は digest だけでは足りない。source lineage、transformation step、issuer authority、delivery envelope を provenance relay packet として束ねる必要がある。
  - notarization chain は電子署名の有無だけではない。どの projection がどの authority route と evidence bundle に裏打ちされているかを hop ごとに辿れなければならない。
  - replay parity witness は再現性の約束である。双方が同じ scope、same digest set、same normalization rule、same evaluation profile で replay できることを示さなければ parity を主張してはならない。
  - relay 中の local transform は invisible であってはならない。normalization、redaction、projection narrowing、format conversion は transformation step として必ず残す。
  - parity witness があっても retention tier や redaction layer が異なれば same result にはならない。parity claim には visibility profile の一致を含める必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は provenance registry、notarization reachability evaluation、parity lint、relay evidence archive を分担する。
  provenance_relay_packet:
    required_fields:
    - relay_packet_id
    - source_projection_ref
    - lineage_digest_ref
    - transformation_step_ref
    - issuer_authority_ref
    - delivery_envelope_ref
    - relayed_at_or_null
    rules:
    - lineage_digest_ref のない relay を provenance relay と呼んではならない。
    - transformation_step_ref のない relay を faithful projection transfer とみなしてはならない。
    - issuer_authority_ref のない relay を trusted issuance と称してはならない。
  evidence_notarization_chain:
    required_bindings:
    - notarization_id
    - relay_packet_ref
    - authority_route_ref
    - evidence_bundle_ref
    - hop_attestation_ref
    - tamper_check_ref
    - sealed_at_or_null
    rules:
    - authority_route_ref のない chain を notarization chain にしてはならない。
    - evidence_bundle_ref のない chain を evidence-backed relay とみなしてはならない。
    - tamper_check_ref のない chain を integrity-preserving transfer と呼んではならない。
  replay_parity_witness:
    required_fields:
    - parity_witness_id
    - shared_scope_ref
    - digest_set_ref
    - normalization_profile_ref
    - visibility_profile_ref
    - counterpart_result_digest_ref
    - witnessed_at_or_null
    rules:
    - digest_set_ref のない witness を replay parity witness と呼んではならない。
    - normalization_profile_ref のない parity claim を same-evaluation guarantee とみなしてはならない。
    - visibility_profile_ref のない parity claim を redaction-preserving parity と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - provenance relay registry
      - notarization chain ratification
      - parity witness attestation
      - relay transform disclosure binding
    GraphEngine:
      owns:
      - lineage reachability check
      - tamper-path verification
      - normalization-profile comparison
      - counterpart result parity evaluation
    GraphLint:
      owns:
      - lineage-free relay lint
      - tamper-check-free notarization lint
      - profile-free parity lint
      - hidden-transform lint
    archive_object:
      owns:
      - relay packet archive
      - notarization evidence bundle
      - parity witness history
      - delivery envelope snapshots
  forbidden_shortcuts:
  - transformation step を残さずに local reformat を relay へ混ぜ込む
  - tamper check なしで notarization chain を完了扱いにする
  - visibility profile が異なるのに replay parity を主張する
  - source lineage を伏せた relay を trusted import として採用する
  residual_open_points: []
scheduler_federation_detachment_governance:
  status: provisional_fixed
  statement: scheduler_federation_detachment_governance とは、detachment packet、residual obligation repatriation、custody transfer を束ねて federation link の lawful exit を固定する規則である。
  core_claims:
  - federation detachment は接続解除ボタンではない。終了理由、covered scope、effective stop boundary、counterpart notice、fallback doctrine を packet として束ねる必要がある。
  - residual obligation は自然消滅しない。imported obligation、local uplift、open waiver、active remediation covenant を誰が引き取るかを repatriation record で確定しなければならない。
  - custody transfer は evidence コピーではなく責任移転である。どの archive bundle をどの retention tier と replay envelope で誰へ移すかを明示しなければ lawful transfer と呼べない。
  - detachment と repatriation と custody transfer は一体で扱う。link だけ切って obligations や evidence を残すと orphan duty と orphan archive が同時に発生する。
  - counterpart notice と acceptance がない detachment は unilateral severance であり、federation closure と同義ではない。境界を分けて残す必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は detachment registry、residual-duty evaluation、custody lint、exit archive を分担する。
  detachment_packet:
    required_fields:
    - detachment_id
    - federated_link_ref
    - detachment_basis_ref
    - covered_scope_ref
    - effective_stop_boundary_ref
    - counterpart_notice_ref
    - fallback_doctrine_ref
    - sealed_at_or_null
    rules:
    - detachment_basis_ref のない detachment を lawful exit と呼んではならない。
    - effective_stop_boundary_ref のない終了を bounded detachment とみなしてはならない。
    - fallback_doctrine_ref のない detachment を continuity-preserving exit にしてはならない。
  residual_obligation_repatriation:
    required_bindings:
    - repatriation_id
    - detachment_packet_ref
    - residual_obligation_set_ref
    - receiving_authority_ref
    - closure_or_migration_ref
    - acceptance_ref
    - bound_at_or_null
    rules:
    - residual_obligation_set_ref のない repatriation を obligation handoff と呼んではならない。
    - receiving_authority_ref のない repatriation を accountable transfer とみなしてはならない。
    - acceptance_ref のない repatriation を completed handoff にしてはならない。
  custody_transfer_record:
    required_fields:
    - custody_transfer_id
    - target_archive_bundle_ref
    - retention_tier_ref
    - replay_envelope_ref
    - custody_receiver_ref
    - transfer_proof_ref
    - completed_at_or_null
    rules:
    - target_archive_bundle_ref のない transfer を custody transfer と呼んではならない。
    - replay_envelope_ref のない transfer を replay-safe archive move とみなしてはならない。
    - transfer_proof_ref のない transfer を lawful custody completion と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - detachment registry
      - residual obligation repatriation binding
      - custody transfer ratification
      - fallback doctrine continuity binding
    GraphEngine:
      owns:
      - residual duty inventory
      - receiving-authority fit evaluation
      - archive bundle transfer-plan check
      - orphan-duty / orphan-archive risk projection
    GraphLint:
      owns:
      - basis-free detachment lint
      - acceptance-free repatriation lint
      - proof-free custody transfer lint
      - orphan-exit lint
    archive_object:
      owns:
      - detachment packet archive
      - repatriation evidence bundle
      - custody transfer proof archive
      - federation exit history
  forbidden_shortcuts:
  - effective stop boundary を決めずに federation link を切断する
  - receiving authority なしで residual obligation を放流する
  - transfer proof なしで custody transfer を完了扱いにする
  - counterpart notice なしの unilateral severance を federation closure と言い換える
  residual_open_points: []
scheduler_federation_mesh_topology_governance:
  status: provisional_fixed
  statement: scheduler_federation_mesh_topology_governance とは、mesh topology、cascade override propagation、blast-radius segmentation を束ねて multi-partner federation の伝播境界を固定する規則である。
  core_claims:
  - federation mesh は単なる partner 一覧ではない。partner set、authority route、trust boundary、segment class、blast-radius cap を mesh cell として束ねなければ propagation の単位が定まらない。
  - override や breach の伝播は自由連鎖であってはならない。trigger kind、ごとの propagation basis、max hop、attenuation rule、stop condition を明示した rule がない限り cascade を lawful とみなしてはならない。
  - blast-radius segmentation はネットワーク分割ではなく統治分割である。shared scope、bridge condition、override gate、breach quarantine gate を明示しなければ containment を主張できない。
  - single partner 向けに許された local override を mesh 全体の doctrine 変更へ昇格させてはならない。partner-local deviation と federated override を区別する必要がある。
  - mesh trust boundary は symmetric とは限らない。export・import・execution・audit の各 facet ごとに許される corridor を分け、最小権限で設計しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は mesh registry、propagation reachability evaluation、containment lint、segmentation evidence archive を分担する。
  mesh_cell_registry:
    required_fields:
    - mesh_cell_id
    - partner_set_ref
    - authority_route_ref
    - trust_boundary_ref
    - segment_class_ref
    - blast_radius_cap_ref
    - active_at_or_null
    rules:
    - partner_set_ref のない mesh cell を propagation 単位として扱ってはならない。
    - trust_boundary_ref のない接続を federation mesh の lawful corridor と呼んではならない。
    - blast_radius_cap_ref のない mesh cell を containment 済みとみなしてはならない。
  cascade_propagation_rule:
    required_bindings:
    - propagation_rule_id
    - trigger_kind_ref
    - source_mesh_cell_ref
    - target_mesh_cell_ref
    - propagation_basis_ref
    - max_hop_ref
    - attenuation_rule_ref
    - stop_condition_ref
    - bound_at_or_null
    rules:
    - propagation_basis_ref のない伝播を lawful cascade にしてはならない。
    - max_hop_ref のない rule を bounded propagation と呼んではならない。
    - stop_condition_ref のない cascade を federation-wide default として流してはならない。
  blast_radius_segmentation:
    required_fields:
    - segment_id
    - contained_scope_ref
    - allowed_bridge_ref
    - override_gate_ref
    - breach_quarantine_gate_ref
    - measured_at_or_null
    rules:
    - contained_scope_ref のない segmentation を blast-radius control とみなしてはならない。
    - allowed_bridge_ref のない segment 間接続を lawful bridge と呼んではならない。
    - breach_quarantine_gate_ref のない segment を incident containment surface として扱ってはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - mesh cell registry
      - propagation rule ratification
      - segmentation gate binding
      - cross-partner override classification
    GraphEngine:
      owns:
      - mesh reachability projection
      - cascade hop evaluation
      - attenuation / stop-condition check
      - blast-radius spill simulation
    GraphLint:
      owns:
      - boundary-free mesh lint
      - basis-free propagation lint
      - stop-condition-free cascade lint
      - segment-leak lint
    archive_object:
      owns:
      - mesh topology snapshots
      - propagation witness history
      - segmentation evidence bundle
      - quarantine corridor archive
  forbidden_shortcuts:
  - single partner の local override を mesh-wide override と言い換える
  - max hop を定めずに cascade rule を federation default として流す
  - bridge 条件を空欄のまま segment 間伝播を許可する
  - breach quarantine 中の cell を silent に再接続する
  residual_open_points: []
scheduler_federation_membership_governance:
  status: provisional_fixed
  statement: scheduler_federation_membership_governance とは、membership admission、trust-tier probation、expulsion trigger を束ねて federation partner の出入り境界を固定する規則である。
  core_claims:
  - partner admission は接続許可ボタンではない。candidate partner、sponsoring authority、admitted scope、trust tier、probation window、escrow requirement を packet として束ねなければ lawful admission と呼べない。
  - trust tier は static label ではない。observation bundle、violation budget、uplift / hold 判定、review due を持つ probation を通らなければ higher tier に昇格してはならない。
  - membership expulsion は blacklist 宣言だけでは足りない。trigger family、evidence bundle、emergency lane、retained duties、archive custody を明示しなければ accountable exit にならない。
  - probation 中の partner に full propagation privilege を与えてはならない。admitted scope と route privilege は trust tier に応じて段階的に開く必要がある。
  - expulsion 後も retained obligations や archived evidence は残る。membership 終了と duty 消滅を同一視してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は admission registry、probation evaluation、expulsion lint、membership evidence archive を分担する。
  membership_admission_packet:
    required_fields:
    - admission_packet_id
    - candidate_partner_ref
    - sponsoring_authority_ref
    - admitted_scope_ref
    - trust_tier_ref
    - probation_window_ref
    - escrow_requirement_ref
    - admitted_at_or_null
    rules:
    - sponsoring_authority_ref のない admission を federated onboarding と呼んではならない。
    - admitted_scope_ref のない partner 接続を bounded admission とみなしてはならない。
    - probation_window_ref のない admission を steady-state membership に昇格してはならない。
  trust_tier_probation:
