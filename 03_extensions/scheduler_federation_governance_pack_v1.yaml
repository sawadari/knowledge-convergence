  core_claims:
  - exit は link disable ではない。exit trigger、notice period、survival clause、asset inventory を treaty として束ねなければ lawful offboarding と呼べない。
  - asset return は物理返却だけでは足りない。key material、shared reserve claim、evidence custody、temporary shim residual を protocol 化しなければ clean separation にならない。
  - post-exit compatibility freeze は報復ではない。allowed residual channel、forbidden live bridge、freeze duration、release condition を定めて silent reconnection を防ぐための統治である。
  - survival clause は離脱後の恒久拘束一般ではない。retained confidentiality、open restitution、audit cooperation、revocation replay duty のみに限定しなければ sovereign exit を阻害する。
  - re-entry は exit の巻き戻しではない。cooldown window、fresh admission packet、residual obligation closure を要求しなければ accountable return にならない。
