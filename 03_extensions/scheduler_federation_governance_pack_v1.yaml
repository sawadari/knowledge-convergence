scheduler_federation_assurance_profile_harmonization_governance:
  status: provisional_fixed
  statement: scheduler_federation_assurance_profile_harmonization_governance とは、external benchmark comparability、assurance profile harmonization、seal expiration policy を束ねて federation assurance の横断比較と陳腐化管理を固定する規則である。
  core_claims:
  - benchmark comparability は同一スコア化ではない。benchmark family、mapping rule、allowed variance band、non-comparable declaration を束ねなければ比較可能性を偽装するだけになる。
  - assurance profile harmonization は local autonomy の消去ではない。profile baseline、downgrade barrier、variance justification、refresh cadence を定めて comparability floor を保つ統治である。
  - seal expiration は cosmetic refresh ではない。seal issue time、validity window、renewal condition、stale-use ban を定めなければ古い assurance を現役信号に流用できてしまう。
  - benchmark refresh は恒常再採点を意味しない。material drift と cadence trigger を区別しなければ運用負荷だけが増える。
  - non-comparable declaration は逃げ道一般ではない。variance justification と remediation path がなければ disclosure duty を免れない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は comparability registry、variance evaluation、stale-seal lint、profile archive を分担する。
