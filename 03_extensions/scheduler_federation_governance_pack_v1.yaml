    - fatigue_state_ref
    - channel_step_set_ref
    - fallback_channel_ref
    - recovery_condition_ref
    - activated_at_or_null
    rules:
    - fatigue_state_ref のない ladder を channel throttling ladder と呼んではならない。
    - channel_step_set_ref のない ladder を staged throttling control とみなしてはならない。
    - fallback_channel_ref のない ladder を reachability-preserving throttle と称してはならない。
  fatigue_override_rule:
    required_fields:
    - override_rule_id
    - override_authority_ref
    - trigger_basis_ref
    - max_duration_ref
    - post_hoc_review_ref
    - invoked_at_or_null
    rules:
    - override_authority_ref のない exception を fatigue override rule と呼んではならない。
    - trigger_basis_ref のない override を necessity-based exception とみなしてはならない。
    - post_hoc_review_ref のない override を accountable emergency bypass と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - adaptive policy registry
      - throttling ladder approval
      - override authority binding
      - policy review decision
    GraphEngine:
      owns:
      - metric-triggered policy selection
      - channel step projection
      - fallback routing
      - fatigue-state recovery scheduling
    GraphLint:
      owns:
      - static-policy-despite-low-effectiveness lint
      - non-reachable throttle lint
      - override-without-review lint
      - ladder-gap lint
    archive_object:
      owns:
      - adaptive policy snapshot
      - throttling transition log
      - override invocation packet
      - policy tuning history
  forbidden_shortcuts:
  - effectiveness 低下を見ても static policy を維持する
  - fallback channel なしで throttling を深くする
  - post-hoc review なしで fatigue override を常態化する
