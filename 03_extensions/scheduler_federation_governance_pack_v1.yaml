scheduler_federation_effectiveness_benchmark_governance:
  status: provisional_fixed
  statement: scheduler_federation_effectiveness_benchmark_governance とは、scorecard calibration strata、benchmark cohort、comparability caveat を束ねて federation transparency metric の比較条件を固定する規則である。
  core_claims:
  - scorecard を出しても calibration strata がなければ比較は歪む。exposure volume、recipient criticality、channel mix をそろえずに ranking してはならない。
  - benchmark cohort は convenience sample ではない。inclusion rule、exclusion rule、refresh cadence を固定しなければ benchmark basis と呼べない。
  - comparability caveat は注釈の飾りではない。window mismatch、policy change、telemetry sparsity を明記しなければ score difference を解釈できない。
  - cross-segment と cross-time-window comparison は同じではない。comparability の破れ方を別々に扱う必要がある。
  - confidence band があっても cohort composition drift があれば benchmark は崩れる。calibration strata と cohort refresh は対で管理しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は benchmark policy、cohort construction、comparability lint、benchmark evidence archive を分担する。
  scorecard_calibration_strata:
    required_fields:
    - strata_id
    - metric_family_ref
    - exposure_band_ref
    - recipient_criticality_band_ref
    - channel_mix_ref
    - window_type_ref
    - approved_at_or_null
    rules:
    - metric_family_ref のない artifact を scorecard calibration strata と呼んではならない。
    - exposure_band_ref のない strata を load-normalized comparison basis とみなしてはならない。
    - channel_mix_ref のない strata を cross-channel calibrated benchmark と称してはならない。
  benchmark_cohort:
    required_fields:
    - cohort_id
    - inclusion_rule_ref
    - exclusion_rule_ref
    - refresh_cadence_ref
    - sample_floor_ref
    - defined_at_or_null
    rules:
    - inclusion_rule_ref のない set を benchmark cohort と呼んではならない。
    - refresh_cadence_ref のない cohort を maintained benchmark basis とみなしてはならない。
    - sample_floor_ref のない cohort を statistically interpretable comparison set と称してはならない。
  comparability_caveat:
    required_fields:
    - caveat_id
    - comparison_pair_ref
    - non_comparable_factor_ref
    - severity_ref
    - reader_notice_ref
    - attached_at_or_null
    rules:
    - non_comparable_factor_ref のない note を comparability caveat と呼んではならない。
    - severity_ref のない caveat を benchmark interpretation control とみなしてはならない。
    - reader_notice_ref のない caveat を actionable comparison warning と称してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - benchmark eligibility policy
      - calibration strata approval
      - comparability severity rule
      - publication guardrail
    GraphEngine:
      owns:
      - cohort construction
      - strata assignment
      - comparison-pair evaluation
      - caveat attachment projection
    GraphLint:
      owns:
      - uncalibrated benchmark lint
      - cohort drift lint
      - missing caveat lint
      - sample-floor breach lint
    archive_object:
      owns:
      - benchmark cohort snapshot
      - strata definition bundle
      - comparability caveat ledger
      - published comparison packet
  forbidden_shortcuts:
  - uncalibrated cohort comparison をランキングとして公開する
  - sample floor 未満の cohort を benchmark と称する
  - comparability caveat を internal note のまま外部比較に使う
  residual_open_points: []
scheduler_federation_adaptive_advisory_governance:
  status: provisional_fixed
  statement: scheduler_federation_adaptive_advisory_governance とは、adaptive advisory policy、channel throttling ladder、fatigue override rule を束ねて effectiveness と fatigue を反映した federation disclosure 制御を固定する規則である。
  core_claims:
  - effectiveness score が低いのに advisory design を固定運用し続けてはならない。adaptive advisory policy がないと measurement は飾りになる。
  - channel throttling ladder がない fatigue control は抽象論で終わる。priority-preserving downgrade path を持たなければ alert flood を止められない。
  - fatigue override は unrestricted escape hatch ではない。override authority、trigger basis、post-hoc review を固定しなければ abuse が起きる。
  - channel switch と message suppression は同じではない。safety-critical recipient には reachability を保ったまま throttling しなければならない。
  - low effectiveness を recipient blame に還元してはならない。policy 側で cadence・surface・message form を調整する責任がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は adaptive rule binding、throttling projection、override misuse lint、policy-change archive を分担する。
  adaptive_advisory_policy:
    required_fields:
    - adaptive_policy_id
    - trigger_metric_ref
    - recipient_segment_ref
    - policy_variant_set_ref
    - selection_rule_ref
    - review_cadence_ref
    - effective_at_or_null
    rules:
    - trigger_metric_ref のない policy を adaptive advisory policy と呼んではならない。
    - policy_variant_set_ref のない policy を selectable advisory control とみなしてはならない。
    - selection_rule_ref のない policy を deterministic adaptive route と称してはならない。
  channel_throttling_ladder:
