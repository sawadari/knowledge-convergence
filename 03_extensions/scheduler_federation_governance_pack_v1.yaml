scheduler_federation_crisis_disclosure_governance:
  status: provisional_fixed
  statement: scheduler_federation_crisis_disclosure_governance とは、publication embargo exception、crisis disclosure fast lane、post-incident retrospective packet を束ねて、緊急時の一時保留・即時開示・事後検証を固定する規則である。
  core_claims:
  - 危機時に通常 cadence だけでは間に合わないが、だからといって無制限 embargo を許してはならない。
  - crisis disclosure fast lane は speed のためだけではない。minimum disclosure pack がなければ早く出しても意味がない。
  - post-incident retrospective packet がない crisis governance は、後から判断妥当性を検証できない。
  - embargo exception は public interest test と max embargo window を持たなければ secrecy shortcut になる。
  - fast lane の handoff owner が不明だと、初動開示と後続 correction の責任が消える。
  - DecisionLedger / GraphEngine / GraphLint / archive object は embargo rule、fast-lane activation、retrospective assembly、incident archive を分担する。
