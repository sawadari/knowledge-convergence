scheduler_federation_assurance_reinstatement_governance:
  status: provisional_fixed
  statement: scheduler_federation_assurance_reinstatement_governance とは、assurance seal reinstatement criteria、probationary recovery badge、relapse downgrade ladder を束ねて federation assurance downgrade 後の回復と再劣化の扱いを固定する規則である。
  core_claims:
  - assurance recovery は自己申告では足りない。reinstatement criteria が remediation completion、verification basis、approval quorum を束ねなければ badge を戻してはならない。
  - downgrade から full recovery へ一気に戻すと false rehabilitation を招く。probationary recovery badge を通じて monitoring と restriction を残す必要がある。
  - relapse は単なる新規 downgrade ではない。prior recovery ref、relapse trigger、repeat failure window を固定しなければ repeated failure を追跡できない。
  - reinstatement と recipient advisory closure は別 lane である。badge が上がっても未完了の recipient action duty を自動で閉じてはならない。
  - probationary badge は marketing badge ではない。restriction set と monitoring cadence がなければ cautionary trust signal にならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reinstatement registry、probation projection、relapse detection、recovery history archive を分担する。
  assurance_seal_reinstatement_criteria:
    required_fields:
    - reinstatement_case_id
    - originating_downgrade_ref
    - remediation_completion_ref
    - verification_basis_ref
    - approval_quorum_ref
    - eligible_at_or_null
    rules:
    - remediation_completion_ref のない case を assurance seal reinstatement criteria と呼んではならない。
    - verification_basis_ref のない reinstatement を evidence-backed recovery とみなしてはならない。
    - approval_quorum_ref のない decision を authoritative badge restoration と称してはならない。
  probationary_recovery_badge:
