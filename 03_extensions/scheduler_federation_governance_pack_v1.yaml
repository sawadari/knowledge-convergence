multi_session_scheduler_observability_governance:
  status: provisional_fixed
  statement: multi_session_scheduler_observability_governance とは、multi-session replay / hold / appeal scheduler の健全性を継続監視するための telemetry field、fairness SLO、auto-throttle / checkpoint yield / escalation threshold を固定する規則である。
  core_claims:
  - scheduler observability は ad-hoc log ではなく append-only telemetry witness として扱う。lane occupancy、waiting time、preemption、checkpoint yield gap、debt carry-over、settlement residue age を canonical field とする。
  - fairness は平均値だけでなく tail と debt persistence で測る。priority / profile / authority tier ごとの bounded_wait_p95、consecutive_preemption_cap、debt_half_life、residue_age_budget、override_budget_ratio を SLO の基本集合とする。
  - threshold branch は observe_only、auto_throttle、mandatory_checkpoint_yield、manual_escalation の4段階を基本とし、同一 breach を複数 action に重複計上してはならない。
  - threshold は global 固定値ではなく profile / authority tier / risk class の stricter-of 合成で決める。life_safety_or_active_compromise は routine_review より短い wait budget と低い override budget を持つ。
  - telemetry sample には aggregation window、source integrity class、mirror lag bound、coverage scope を束ねる。window 不明の sample や mirror-only sample を threshold 判定の唯一根拠にしてはならない。
  - debt が dashboard から消えただけでは discharge とみなさない。debt vector の減衰、checkpoint yield 実施、reservation / reseal / notice 完了の witness が揃ってはじめて recovery direction を認める。
  telemetry_fields:
    lane_occupancy_ratio: lane class ごとの occupied_time / allocatable_time。exclusive_mutation_lane と bounded_parallel_read_lane を分けて観測する。
    waiting_time_bucket: session priority / profile / authority tier ごとの待機時間分布。平均値ではなく p50 / p95 / max witness を残す。
    preemption_event_counter: forced_preemption / emergency_override / checkpoint_yield による割込み件数と連続回数。
    checkpoint_yield_gap: 要求された yield から実施までの遅延。未実施 yield は gap として累積する。
    debt_carry_over_delta: starvation / disclosure / reseal / audit_followup debt の純増減。
    settlement_residue_age: unresolved residue が settlement checkpoint を跨いで残存している時間。
    override_budget_ratio: override 使用量 / 許容 budget。authority tier と risk class ごとに測る。
  fairness_indicators:
    bounded_wait_p95: profile / priority ごとの許容待機時間に対する 95 パーセンタイル比。
    consecutive_preemption_cap: 同一 lane / 同一 session family が連続で preempt される回数上限。
    debt_half_life: 増加した debt が半減するまでの時間。改善方向の健全性指標として扱う。
    residue_age_budget: settlement residue が clean closure 候補を阻害せずに残れる上限時間。
    override_budget_ratio: override / forced preemption の使用率が policy budget をどれだけ消費したかを示す。
    yield_compliance_ratio: mandatory checkpoint yield 要求に対する期限内実施率。
  threshold_actions:
    observe_only: 指標を監視するが scheduling policy をまだ変えない。
    auto_throttle: 低優先 session の新規 admission または lane share を自動的に抑制する。
    mandatory_checkpoint_yield: active session に checkpoint yield を強制し、他 lane へ機会を開く。
    manual_escalation: 自動制御では戻せないと判断し human/authority review に送る。
  threshold_binding_rules:
    composition:
    - profile baseline, authority tier cap, risk class cap の strictest threshold を採用する。
    - life_safety_or_active_compromise class では wait budget と override budget の双方を短くする。
    - routine_review class にだけ緩い threshold を与えても、shared lane の protected floor は侵食してはならない。
    blocked_patterns:
    - single dashboard average だけで breach / healthy を判定する
    - same mirrored source を独立 telemetry として二重計上する
    - local operator convenience を理由に risk class より緩い threshold を上書きする
  tool_responsibilities:
    DecisionLedger:
      owns:
      - telemetry field registry
      - fairness indicator / threshold binding
      - action class binding
      - profile / authority / risk override record
    GraphEngine:
      owns:
      - windowed telemetry aggregation
      - lane/sample linkage
      - threshold action dispatch trigger
      - debt / residue trend materialization
    GraphLint:
      owns:
      - missing telemetry witness lint
      - mean-only fairness lint
      - impossible threshold ordering lint
      - same-source double count lint
    archive_object:
      owns:
      - telemetry snapshot pack
      - aggregation window witness
      - threshold breach audit bundle
  forbidden_shortcuts:
  - 平均 wait time だけで fairness healthy を宣言する
  - window / source integrity が不明な sample だけで auto_throttle を発火する
  - debt が UI から見えなくなっただけで discharge 扱いにする
  - profile / authority / risk の stricter rule を local override で黙って緩和する
  residual_open_points: []
scheduler_breach_hysteresis_cooldown_governance:
  status: provisional_fixed
  statement: scheduler_breach_hysteresis_cooldown_governance とは、threshold crossing を confirmed breach に昇格させる confirmation 条件、activation / release hysteresis、cooldown-clearance を固定する規則である。
  core_claims:
  - single-window threshold crossing は breach ではなく suspected_breach とする。confirmed_breach へ進めるには sustained window、debt worsening か preemption chain witness、または独立 source corroboration のいずれかが必要である。
  - activation threshold と release threshold を分ける。breach を開く条件よりも解く条件を厳しくし、signal が閾値近傍で往復するだけで throttle を on/off させてはならない。
  - auto_throttle、mandatory_checkpoint_yield、manual_escalation は同一 lifecycle 上で扱う。action ごとに minimum active duration と re-entry cooloff を持ち、manual clear を silent timer expiry で代替してはならない。
  - cooldown-clearance は no-breach window だけでなく debt decay、yield completion、residue non-growth、override budget recovery を確認してはじめて成立する。
  - same mirrored telemetry、same operator re-emit、same aggregation lineage は corroboration として二重計上してはならない。confirmation は source family と processing path の partial independence を明示的に使う。
  - manual suspension や emergency hold から通常運用へ戻すときは release owner、expiry、rollback-of-throttle witness を束ねる。解除を UI 操作だけで完了扱いにしてはならない。
  breach_states:
    nominal: threshold 未超過で mitigation action なし。
    suspected_breach: 一時的 crossing または単一 source crossing。confirmed ではない。
    confirmed_breach: confirmation 条件を満たし mitigation action が必要と判定された状態。
    mitigating: auto_throttle または mandatory_checkpoint_yield が active な状態。
    cooldown: breach 指標は改善したが release witness の確認待ち状態。
    cleared: release / cooldown-clearance が完了し normal scheduling に戻せる状態。
  confirmation_rules:
    confirmed_if_any:
    - sustained window breach が policy で定めた連続窓数を満たす
    - threshold crossing と同一 lane family の starvation_debt / residue_age が同時悪化する
    - 独立 source family から corroborating witness が得られる
    blocked_if:
    - same mirrored source だけを複数根拠として積む
    - single spike を sustained breach と誤認する
    - manual test run の synthetic sample を production breach 判定へ混入する
  hysteresis_policy:
    activation_release_split: activation threshold と release threshold を別 registry cell で管理する。
    minimum_active_duration: confirmed_breach 後は action class ごとの minimum active duration を満たすまで自動解除しない。
    reentry_cooloff: clear 後しばらくは同一 breach family の再開条件を厳しくし、flapping を抑える。
    manual_override_rule: human override は reason, owner, expiry, fallback branch を束ねる。
  cooldown_clearance:
    required_evidence:
    - no-breach windows across required horizon
    - debt vector non-increasing or decaying
    - mandatory checkpoint yield completed if required
    - override budget recovered within cap
    blocked_if:
    - debt や residue が隠れたまま signal だけ静かになる
    - active mitigation を手動で外したが witness が残らない
    - same backlog が別 lane に移っただけで cleared と宣言する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - breach state binding
      - activation/release threshold registry
      - manual release / suspension record
      - independence/corroboration rule binding
    GraphEngine:
      owns:
      - state transition materialization
      - window continuity check
      - cooldown timer and evidence aggregation
      - rollback-of-throttle witness generation
    GraphLint:
      owns:
      - flapping control lint
      - same-source corroboration lint
      - premature clear lint
      - manual release without owner/expiry lint
    archive_object:
      owns:
      - breach lifecycle snapshot
      - action activation/deactivation log
      - cooldown evidence bundle
  forbidden_shortcuts:
  - single spike だけで confirmed_breach を開く
  - activation と同じ threshold でそのまま release する
  - same mirrored source を corroboration に二重計上する
  - cooldown evidence なしに throttle を解除する
  residual_open_points: []
scheduler_policy_rollout_migration_governance:
  status: provisional_fixed
  statement: scheduler_policy_rollout_migration_governance とは、threshold / hysteresis / remediation policy を変更するときに required な what-if simulation、canary rollout、dual-policy coexistence、rollback 可能性、comparability witness を固定する規則である。
  core_claims:
  - scheduler policy 変更は direct flip ではなく、what-if simulation と rollout packet を通した staged migration として扱う。simulation なしに protected floor や fairness SLO に触れる policy を有効化してはならない。
  - simulation scenario class は steady_state_load、burst_contention、debt_recovery、telemetry_loss_or_lag、manual_override_conflict、mixed_profile_competition を基本集合とする。新 policy は少なくとも normal / stress / degraded の3系統を跨いで比較しなければならない。
  - simulation input bundle には old/new policy snapshot、threshold/hysteresis diff、remediation family diff、telemetry replay slice、fairness baseline、protected floor map、active debt/backlog vector、source integrity assumption、rollback target を必須にする。policy diff だけで simulation 可とみなしてはならない。
  - success witness は protected floor 非侵食、critical profile の bounded_wait tail 非悪化、debt creation rate の増分許容内、rollback rehearsal 成功、comparability witness 充足を要求する。failure witness は hidden debt 増加、non-comparable metric、rollback path 不成立、mirror-only telemetry 依存を含む。
  - canary rollout は bounded cohort、window、blast radius cap、freeze gate、rollback trigger を束ねる。dual-policy coexistence 中は old/new policy の decision trace を同一 observability vocabulary で比較できなければならない。
  - threshold migration は old/new threshold の comparability witness を持つ。metric meaning・aggregation window・source integrity・scope unit が揃わない比較を improvement 根拠に使ってはならない。
  simulation_scenario_classes:
    steady_state_load: 定常負荷で fairness SLO と queue latency が維持されるかを見る。
    burst_contention: 短時間の高競合で throttle / yield / escalation branch が過剰反応しないかを見る。
    debt_recovery: 既存 debt / residue を持つ状態で新 policy が remediation を阻害しないかを見る。
    telemetry_loss_or_lag: 欠測・lag・mirror degrade 下で breach 判定が unsafe に発火しないかを見る。
    manual_override_conflict: human override / suspension と新 policy が衝突したとき precedence と rollback が保たれるかを見る。
    mixed_profile_competition: life-safety / audit / routine_review が同一 lane 群を競合したとき protected floor が守られるかを見る。
  simulation_input_bundle:
    required_fields:
    - old_policy_snapshot_ref
    - new_policy_snapshot_ref
    - threshold_diff_ref
    - hysteresis_diff_ref
    - remediation_diff_ref
    - telemetry_replay_slice_ref
    - fairness_baseline_ref
    - protected_floor_map_ref
    - active_debt_backlog_vector_ref
    - source_integrity_assumption_ref
    - rollback_target_ref
    rules:
    - telemetry_replay_slice は profile / lane / authority tier の coverage を明示し、critical cohort を欠いた sample を general success 根拠にしてはならない。
    - baseline は old policy の stable window から作り、temporary incident window を既定 baseline にしてはならない。
    - rollback_target_ref は current active head と rollback 先 policy head の双方を束ねる。
  witness_rules:
    success_requires:
    - protected floor preserved
    - critical cohort fairness tail non-worsening within budget
    - debt creation delta within migration budget
    - rollback rehearsal succeeded against same scope unit
    - old/new comparability witness bound
    failure_if_any:
    - hidden debt transfer or residue age growth is detected
    - simulation uses non-comparable metric/window/source assumptions
    - rollback rehearsal or freeze gate is missing
    - mirror-only telemetry is used as sole success basis
  rollout_controls:
    canary_required_fields:
    - canary_cohort_ref
    - coexistence_window_ref
    - blast_radius_cap_ref
    - freeze_gate_ref
    - rollback_trigger_ref
    - promotion_review_checkpoint_ref
    dual_policy_rules:
    - old/new policy trace は共通の field vocabulary と threshold lineage を持たなければならない。
    - coexistence window 中は promotion 判定より rollback safety を優先し、 unresolved debt surge がある間は widen してはならない。
    - canary outcome は cohort-local success と global safety success を分けて記録する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - policy rollout charter
      - simulation scenario registry
      - comparability witness binding
      - promotion/freeze/rollback decision record
    GraphEngine:
      owns:
      - telemetry replay simulation
      - old/new trace materialization
      - canary cohort execution
      - rollback rehearsal witness generation
    GraphLint:
      owns:
      - non-comparable metric lint
      - critical cohort omission lint
      - rollback path missing lint
      - mirror-only success basis lint
    archive_object:
      owns:
      - simulation packet
      - dual-policy comparison bundle
      - rollout/rehearsal snapshot
  forbidden_shortcuts:
  - what-if simulation なしで threshold / hysteresis を本番 flip する
  - critical cohort を欠いた replay slice だけで success を宣言する
  - old/new metric の意味や window が違うまま比較する
  - rollback rehearsal をせず canary を widen する
  residual_open_points: []
scheduler_rollout_exception_governance:
  status: provisional_fixed
  statement: scheduler_rollout_exception_governance とは、rollout 中の canary cohort 選定、exception lane、shadow-mode cohort、emergency bypass の admissibility と境界を固定する規則である。
  core_claims:
  - canary cohort は session 単位ではなく lane/profile/authority tier/risk class を含む scope unit で選ぶ。critical profile を routine cohort に混ぜて silent canary することを許さない。
  - mandatory exclusion set を持つ。life-safety、active compromise response、regulator-mandated audit sweep、lawful replay reconstruction は、明示 charter がない限り enforcement canary から除外し、必要なら shadow-mode のみで観測する。
  - widening は cohort step と review checkpoint を持つ。前段階 unresolved bypass、hidden debt、comparability break が残る間は cohort 拡大を禁止する。
  - exception lane は policy evaluation 自体を飛ばす逃げ道ではない。exception lane に送った traffic についても bypass reason、owner、expiry、re-entry 条件、post-bypass review を必須にする。
  - emergency bypass は bounded suspension であり、新 policy の silent repeal ではない。bypass は reason、authority path、expiry、rollback precedence、counterfactual trace capture を束ねなければならない。
  - shadow-mode cohort は decision divergence を観測するが action enforcement をしない。shadow-mode 結果を enforcement success と混同して promotion 根拠に使ってはならない。
  canary_cohort_rules:
    selection_unit: lane family × profile × authority tier × risk class を基本 scope unit とする。
    mandatory_exclusion_set:
    - life_safety traffic without explicit rollout charter
    - active compromise containment lane
    - regulator-mandated audit sweep with fixed SLA
    - lawful replay reconstruction requiring deterministic trace preservation
    widening_conditions:
    - current cohort stable over required window
    - no unresolved bypass or hidden debt surge
    - comparability witness still valid after scope expansion
  exception_and_bypass:
    exception_lane_required_fields:
    - scope_unit_ref
    - bypass_reason_ref
    - owner_ref
    - expiry_ref
    - reentry_condition_ref
    - post_bypass_review_ref
    shadow_mode_required_fields:
    - shadow_scope_ref
    - decision_diff_capture_ref
    - no_enforcement_attestation_ref
    - promotion_exclusion_ref
    emergency_bypass_required_fields:
    - trigger_ref
    - authority_path_ref
    - expiry_ref
    - rollback_precedence_ref
    - counterfactual_trace_capture_ref
    - post_confirm_review_ref
    blocked_patterns:
    - expiry のない bypass を常設化する
    - shadow-mode divergence を enforcement success として昇格する
    - exception lane を backlog 隠しや protected floor 侵食の逃げ道に使う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - cohort charter
      - mandatory exclusion binding
      - exception lane / bypass approval
      - post-bypass review record
    GraphEngine:
      owns:
      - cohort partition materialization
      - shadow-mode diff capture
      - bypass path routing
      - re-entry candidate generation
    GraphLint:
      owns:
      - critical traffic silent canary lint
      - expiryless bypass lint
      - shadow/enforcement confusion lint
      - exception lane debt concealment lint
    archive_object:
      owns:
      - cohort membership snapshot
      - bypass / shadow trace bundle
      - post-bypass review packet
  forbidden_shortcuts:
  - critical profile を routine canary に黙って混ぜる
  - expiry や owner のない bypass を認める
  - shadow-mode の結果を enforcement success に読み替える
  - exception lane へ移した debt を rollout 評価から消す
  residual_open_points: []
scheduler_policy_promotion_divergence_governance:
  status: provisional_fixed
  statement: scheduler_policy_promotion_divergence_governance とは、canary から phase expansion / fleet-wide commit へ進める promotion gate、cohort 間 divergence budget、freeze / rollback trigger、closure witness を固定する規則である。
  core_claims:
  - promotion は single success flag ではなく multi-gate review として扱う。required stability window、critical cohort sign-off、rollback readiness、open bypass closure、debt non-growth を満たしたときだけ phase expansion を許す。
  - fleet-wide commit 前に divergence budget を明示する。cohort ごとの fairness tail 差、debt creation 差、override consumption 差、protected floor pressure 差を budget 化し、local improvement だけで global commit を正当化してはならない。
  - budget breach は severity に応じて widen freeze、partial rollback、fleet rollback、reframe_required に分岐する。budget breach を note に残すだけで promotion を継続してはならない。
  - closure witness は promotion head、covered cohort set、retired policy head、remaining shadow / bypass residue、rollback readiness snapshot を束ねる。commit 後にどの旧 policy がどこまで生きているか不明な状態を許さない。
  - critical cohort sign-off は named owner の subjective approval だけでは足りず、comparability / residue / protected floor の客観 witness を伴う。
  - phase expansion は monotone である必要はない。cohort A を widening しつつ cohort B を rollback する mixed-mode を許すが、coverage claim と divergence budget を別に記録しなければならない。
  promotion_gates:
    required_gates:
    - stability_window_pass
    - critical_cohort_signoff
    - rollback_readiness_alive
    - open_bypass_closed_or_bounded
    - debt_non_growth_within_budget
    phase_modes:
    - phase_expand
    - hold_current_scope
    - partial_rollback
    - fleet_commit
    - fleet_rollback
    - reframe_required
  divergence_budgets:
    dimensions:
    - fairness_tail_delta
    - debt_creation_delta
    - override_budget_delta
    - protected_floor_pressure_delta
    closure_requires:
    - covered cohort set is explicit
    - retired policy head and surviving legacy head are explicit
    - remaining shadow/bypass residue is bounded
    - rollback readiness snapshot is archived
    breach_branches:
      minor: widen freeze and targeted review
      material: partial rollback or narrowed commit
      critical: fleet rollback or reframe_required
  tool_responsibilities:
    DecisionLedger:
      owns:
      - promotion gate binding
      - divergence budget registry
      - phase mode decision
      - commit/rollback closure record
    GraphEngine:
      owns:
      - cohort coverage computation
      - divergence delta materialization
      - mixed-mode promotion plan
      - rollback execution witness
    GraphLint:
      owns:
      - budget breach ignored lint
      - implicit fleet commit lint
      - residue-unclosed promotion lint
      - legacy head ambiguity lint
    archive_object:
      owns:
      - promotion review packet
      - divergence budget snapshot
      - commit/rollback closure bundle
  forbidden_shortcuts:
  - single dashboard green を fleet-wide commit 根拠にする
  - divergence budget breach を note 扱いにして promotion を続ける
  - surviving legacy head を曖昧なまま commit を宣言する
  - critical cohort sign-off を subjective approval だけで済ませる
  residual_open_points: []
scheduler_post_migration_attestation_governance:
  status: provisional_fixed
  statement: scheduler_post_migration_attestation_governance とは、promotion または rollback の後に required な regression audit window、rollback debt settlement、post-migration attestation、reopen trigger を固定する規則である。
  core_claims:
  - commit または rollback は closure の終点ではなく post-migration observation の始点である。regression audit window、long-tail follow-up checkpoint、reopen trigger を持たない migration を final とみなしてはならない。
  - rollback は無害な元戻しではなく rollback debt を生みうる。stale bypass、orphan shadow trace、reopened backlog、threshold drift residue、operator confusion debt を独立 bucket として扱う。
  - settlement には debt bucket ごとの owner、due window、completion witness、carry-forward rule を必須にする。rollback しただけで stale bypass や orphan shadow trace が自然消滅したものとみなしてはならない。
  - post-migration attestation packet は migration branch、covered scope、observed regression outcome、remaining residue、rollback debt settlement status、reopen trigger table を束ねる。summary note だけで attested closure にしてはならない。
  - insufficient attestation のときは accepted_final ではなく provisional_closure、extended_audit、targeted_reopen、escalated_hold のいずれかへ送る。
  - reopen trigger は fairness tail relapse、debt resurgence、protected floor pressure recurrence、unexpected bypass resurrection、comparability witness invalidation を基本集合とする。
  regression_audit:
    required_fields:
    - audit_window_ref
    - followup_checkpoint_schedule_ref
    - reopen_trigger_table_ref
    - covered_scope_ref
    - observer_class_ref
    long_tail_checks:
    - fairness tail relapse after initial stability
    - debt resurgence after mitigation removal
    - protected floor pressure recurrence
    - unexpected bypass resurrection or stale exception lane usage
  rollback_debt_buckets:
    stale_bypass_debt: rollback 後も残る bypass / suspension / freeze artifact。
    orphan_shadow_trace_debt: promotion/rollback 後に owner を失った shadow trace。
    reopened_backlog_debt: rollback により再出現した backlog / residue。
    threshold_drift_residue: old/new threshold 切替後に比較不能な drift として残る residue。
    operator_confusion_debt: runbook / UI / alert semantics の不整合により残る運用 debt。
  attestation_packet:
    required_fields:
    - migration_branch_ref
    - covered_scope_ref
    - regression_outcome_ref
    - remaining_residue_ref
    - rollback_debt_status_ref
    - reopen_trigger_table_ref
    - attestor_ref
    - issued_at
    insufficient_branches:
    - provisional_closure
    - extended_audit
    - targeted_reopen
    - escalated_hold
  tool_responsibilities:
    DecisionLedger:
      owns:
      - post-migration audit charter
      - rollback debt bucket binding
      - attestation status judgement
      - reopen trigger binding
    GraphEngine:
      owns:
      - follow-up checkpoint generation
      - rollback debt carry-forward linkage
      - attestation packet materialization
      - targeted reopen candidate generation
    GraphLint:
      owns:
      - final-without-attestation lint
      - stale bypass debt omission lint
      - reopen trigger missing lint
      - orphan shadow trace lint
    archive_object:
      owns:
      - regression audit pack
      - rollback debt settlement bundle
      - post-migration attestation snapshot
  forbidden_shortcuts:
  - promotion/rollback 直後の summary note だけで final closure とみなす
  - rollback したから stale bypass や orphan shadow trace は自然消滅したとみなす
  - attestation 不足を黙って accepted_final に読み替える
  - reopen trigger table を持たない migration を完了扱いにする
  residual_open_points: []
scheduler_policy_lineage_finality_governance:
  status: provisional_fixed
  statement: scheduler_policy_lineage_finality_governance とは、policy old/new head、canary/promoted/rolled-back branch、attestation packet をどこまで retained witness として残し、どこから compaction できるか、また superseded head の finality と targeted reopen path をどう固定するかの規則である。
  core_claims:
  - policy lineage は単なる設定履歴ではなく、decision / rollout / rollback / attestation を束ねた branch graph として扱う。active head、superseded head、canary branch、rolled-back branch を snapshot の寄せ集めにしてはならない。
  - compaction は evidence の破棄ではなく retained witness への射影である。head digest、predecessor/successor relation、policy diff digest、promotion/rollback decision record、attestation packet、reopen trigger table を残せない segment は compaction してはならない。
  - replay-ready archive は segment manifest、branch boundary、required dependency registry ref、materialization pointer、witness completeness を束ねる。summary note だけを残して replay-ready とみなしてはならない。
  - superseded head には finality state を与える。sealed_final になった superseded head は lawful targeted reopen petition なしに active head へ復帰させてはならない。operator convenience を理由に old config を即時復帰する shortcut を許さない。
  - targeted reopen は affected scope、reopen basis、resurrection barrier、carry-forward debt visibility を束ねる。reopen で old head を部分再利用する場合も、新 head で生じた debt / attestation residue を無視してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は lineage の normative finality、branch materialization、shortcut lint、retained witness preservation を分担する。
  compaction_classes:
    active_head_segment: 現行 head とその直近 predecessor/successor を含む非 compaction 区間。full witness を要求する。
    attestable_predecessor_segment: attestation packet と promotion/rollback record により要約可能だが targeted replay は保持する区間。
    replay_ready_compacted_segment: raw payload の一部を畳み込んでも segment manifest と materialization pointer で replay できる区間。
    sealed_final_segment: lawful reopen petition がない限り active head に戻れない finalized 区間。
  retained_witness_minimum:
    required_fields:
    - lineage_segment_id
    - segment_manifest_digest_ref
    - head_digest_ref
    - predecessor_successor_binding_ref
    - policy_diff_digest_ref
    - promotion_or_rollback_decision_ref
    - attestation_packet_ref
    - reopen_trigger_table_ref
    - materialization_pointer_ref
    - dependency_registry_snapshot_ref
    rules:
    - dependency_registry_snapshot_ref は threshold / hysteresis / remediation family の解釈基準を固定できなければならない。
    - materialization_pointer_ref は replay 時に exact segment boundary を復元できなければならない。
    - attestation_packet_ref が insufficient のまま sealed_final_segment へ移してはならない。
  supersession_finality:
    states:
    - active
    - superseded_replayable
    - sealed_final
    - targeted_reopen_pending
    - reopened_exception
    resurrection_barriers:
    - lawful targeted reopen petition without scope widening
    - carry-forward debt visibility attested
    - current active head closure or coexistence mode explicitly bound
    - replay-ready witness completeness verified
    blocked_patterns:
    - sealed_final head を operator convenience だけで再活性化する
    - targeted reopen を branch-wide undo に読み替える
    - canary branch の incomplete witness を promoted predecessor と同格に扱う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - finality state binding
      - targeted reopen petition / judgement
      - carry-forward debt visibility record
      - canonical head nomination
    GraphEngine:
      owns:
      - lineage segment graph materialization
      - branch boundary reconstruction
      - targeted replay plan generation
      - coexistence path realization
    GraphLint:
      owns:
      - insufficient retained witness lint
      - illegal resurrection lint
      - scope-widened reopen lint
      - incomplete attestation finality lint
    archive_object:
      owns:
      - segment manifest
      - materialization pointer set
      - attestation packet bundle
      - sealed lineage snapshot
  forbidden_shortcuts:
  - summary note だけを残して replay-ready archive とみなす
  - sealed_final の superseded head を即座に active へ戻す
  - targeted reopen で carry-forward debt を黙って捨てる
  - branch boundary が曖昧なまま compaction を進める
  residual_open_points: []
scheduler_lineage_retention_purge_governance:
  status: provisional_fixed
  statement: scheduler_lineage_retention_purge_governance とは、lineage archive の retention tier、legal-hold carveout、purge admissibility と purge attestation を固定する規則である。
  core_claims:
  - retention は age だけでなく branch role、replay obligation、audit exposure、reopen probability で決める。recent だが low-risk だからすぐ purge できる、あるいは old だから自動 purge できる、といった単純規則を許さない。
  - active head segment、superseded_replayable segment、sealed_final segment は retention floor が異なる。sealed_final でも purge 前に manifest / decision / attestation digest の minimum witness floor を維持しなければならない。
  - legal-hold / audit-hold / targeted_reopen_pending は purge を止めるが、visibility widening を自動付与しない。preservation freeze と content reveal authority を混同してはならない。
  - purge は payload purge、index purge、materialization pointer purge を分けて扱う。manifest retention と digest retention だけで lawful replay / attestation が成立しない場合、payload purge を許してはならない。
  - purge attestation packet は purge scope、hold clearance、alternate witness sufficiency、reopen clearance、residual reference map を束ねる。delete success のログだけで purge 完了扱いにしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は retention floor binding、hold propagation、purge simulation、insufficient purge lint、attestation preservation を分担する。
  retention_tiers:
    hot_active: 現行 head と reopen 直後の例外 branch。full payload と materialization pointer を保持する。
    warm_replay_ready: superseded_replayable segment。targeted replay と audit reconstruction に必要な payload / manifest を保持する。
    cold_attestable: sealed_final segment。manifest、decision digest、attestation packet を最低限保持し、payload purge は alternate witness sufficiency がある場合に限る。
    minimal_manifest_hold: payload を purge した後も lawful attestation と existence proof のために manifest/digest を保持する tier。
  hold_and_purge_rules:
    hold_classes:
    - legal_hold
    - audit_hold
    - targeted_reopen_pending
    - debt_settlement_hold
    purge_scopes:
    - payload_only
    - materialization_pointer_only
    - derived_index_only
    - full_segment_purge
    blocked_if:
    - active hold が残る
    - alternate witness sufficiency が未証明
    - reopen trigger table に unresolved branch がある
    - carry-forward debt visibility が purge 後に失われる
  purge_attestation_packet:
    required_fields:
    - purge_scope_ref
    - target_segment_ref
    - retention_tier_ref
    - hold_clearance_ref
    - alternate_witness_sufficiency_ref
    - reopen_clearance_ref
    - residual_reference_map_ref
    - executed_by_ref
    - executed_at
    - post_purge_verification_ref
    rules:
    - post_purge_verification_ref は purge 後にどの replay / audit demand がまだ満たせるかを示さなければならない。
    - full_segment_purge は residual_reference_map_ref を失わせるなら許容しない。
    - debt_settlement_hold が残る segment を cold_attestable tier に落としてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - retention tier binding
      - hold clearance judgement
      - purge approval record
      - post-purge admissibility statement
    GraphEngine:
      owns:
      - purge impact simulation
      - residual reference map generation
      - hold propagation over lineage graph
      - post-purge replay capability check
    GraphLint:
      owns:
      - hold-bypassed purge lint
      - insufficient alternate witness lint
      - manifest-loss purge lint
      - debt visibility loss lint
    archive_object:
      owns:
      - tiered storage placement
      - purge attestation packet
      - minimal manifest hold set
      - post-purge verification artifact
  forbidden_shortcuts:
  - age だけで sealed lineage を自動 purge する
  - legal-hold を content reveal 権限に読み替える
  - delete success log だけで purge 完了扱いにする
  - purge 後に carry-forward debt や reopen path を追跡不能にする
  residual_open_points: []
scheduler_lineage_external_export_governance:
  status: provisional_fixed
  statement: scheduler_lineage_external_export_governance とは、external audit export、foreign replay proof、trust-boundary redaction、de-redaction authority を固定する規則である。
  core_claims:
  - external export は raw archive mirror ではなく purpose-bound derived packet を原則とする。受領者に不要な raw payload や internal actor slice を bundled export してはならない。
  - recipient class を regulator、independent_auditor、partner_operator、internal_separated_team などで分け、許可される witness 粒度と redaction profile を明示する。same company でも trust boundary が違えば export rule は変わる。
  - foreign replay proof は export packet がどの lineage segment から導出され、どの redaction が入り、何を再現可能とし何を再現不能とするかを示す。proof なしの CSV や summary を replay-capable export とみなしてはならない。
  - redaction は content hiding だけでなく join barrier を含む。actor slice、tenant slice、sensitive threshold value、lawful trigger basis は redaction ledger なしに削ってはならない。
  - de-redaction authority は export authority と別に持つ。受領後の問い合わせや紛争を理由に export packet を自動 de-redact してはならない。
  - external export packet は import / reactivation 権限を与えない。foreign replay proof は検証可能性を与えるが canonical head の変更権限は与えない。
  recipient_classes:
    regulator: lawful basis が明示され、必要最小限の raw witness と redaction ledger を受け取れる。
    independent_auditor: verification に必要な manifest / digest / replay proof を受け取れるが actor identity は profile で制限される。
    partner_operator: joint operation に必要な bounded packet のみ受け取り、internal debt / unrelated segment は受け取れない。
    internal_separated_team: 同一組織でも SoD 境界に応じて redacted packet を受け取る。
  export_packet:
    required_fields:
    - export_purpose_ref
    - recipient_class_ref
    - target_segment_ref
    - export_scope_ref
    - redaction_profile_ref
    - redaction_ledger_ref
    - foreign_replay_proof_ref
    - lawful_basis_ref
    - expiry_ref
    - verification_instruction_ref
    rules:
    - export_scope_ref は target_segment からの lawful projection でなければならない。
    - foreign_replay_proof_ref は replayable set と intentionally non-replayable set の両方を示さなければならない。
    - verification_instruction_ref は受領者がどの digest / proof / manifest を検証すべきかを明示しなければならない。
  redaction_and_authority:
    redaction_targets:
    - actor_identity_slice
    - tenant_specific_slice
    - sensitive_threshold_values
    - lawful_trigger_basis
    - unrelated_branch_payload
    authority_split:
      export_authority: bounded export packet を承認する authority。
      de_redaction_authority: 追加 reveal や join barrier 解放を承認する authority。
    blocked_patterns:
    - redaction ledger なしに actor slice を伏せる
    - export 問い合わせを理由に自動 de-redact する
    - foreign replay proof なしの summary を audit-ready packet と称する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - export purpose / recipient binding
      - authority split
      - export approval / expiry record
      - non-importability statement
    GraphEngine:
      owns:
      - bounded export projection
      - foreign replay proof generation
      - redacted lineage packet materialization
      - verification instruction synthesis
    GraphLint:
      owns:
      - over-broad export lint
      - missing replay proof lint
      - unauthorized de-redaction lint
      - join-barrier leakage lint
    archive_object:
      owns:
      - export packet snapshot
      - redaction ledger
      - foreign replay proof artifact
      - recipient-scoped manifest bundle
  forbidden_shortcuts:
  - raw archive mirror を default external export とする
  - foreign replay proof なしの summary を audit-ready と称する
  - export authority と de-redaction authority を混同する
  - external export packet を import / reactivation 権限付きと誤読させる
  residual_open_points: []
scheduler_lineage_schema_compatibility_governance:
  status: provisional_fixed
  statement: scheduler_lineage_schema_compatibility_governance とは、schema evolution、cross-version replay compatibility、mixed-version coexistence、downgrade barrier を固定する規則である。
  core_claims:
  - schema evolution は lineage semantics の書き換えではなく表現層の進化として扱う。finality state、reopen trigger、debt visibility、attestation sufficiency の意味を失う migration を compatibility と呼んではならない。
  - archive segment は source schema version、semantic profile、adapter manifest を束ねる。version 番号だけ残して transformation logic を失った archive を replay-ready とみなしてはならない。
  - cross-version replay は semantic equivalence witness があるときにだけ許す。field rename や enum split があっても、effect on finality / rollback / purge / export semantics が等価でなければ compatible としてはならない。
  - mixed-version coexistence は reader-lift を原則にし、writer ambiguity を避ける。複数 version の segment を同時に読むことは許しても、canonical head を複数 schema で同時に mutate してはならない。
  - downgrade barrier は information loss class を基準に立てる。newer schema の veto condition、reopen reason、redaction join barrier、retention hold を older schema へ落とすと失われるなら downgrade export / replay を禁止する。
  - adapter は code artifact である前に governed witness である。adapter version、semantic coverage、known loss class、validation packet を固定せずに migration を silent に走らせてはならない。
  schema_and_adapter:
    required_fields:
    - source_schema_version_ref
    - target_schema_version_ref
    - semantic_profile_ref
    - adapter_manifest_ref
    - known_loss_class_ref
    - validation_packet_ref
    - compatibility_decision_ref
    rules:
    - adapter_manifest_ref は transformed field map だけでなく preserved / derived / dropped semantics を示さなければならない。
    - validation_packet_ref は representative lineage segment に対する replay comparison を含まなければならない。
    - compatibility_decision_ref は full_compatible / compatible_with_loss / non_compatible のいずれかを bound しなければならない。
  compatibility_and_barrier:
    compatibility_classes:
    - full_compatible
    - compatible_with_loss
    - non_compatible
    loss_classes:
    - display_only_loss
    - derived_metric_loss
    - governance_semantics_loss
    - identity_join_barrier_loss
    - finality_or_reopen_loss
    downgrade_block_if:
    - governance_semantics_loss がある
    - identity_join_barrier_loss により lawful redaction semantics が崩れる
    - finality_or_reopen_loss により targeted reopen / sealed_final 判定が変わる
  mixed_version_rules:
    reader_lift: older/newer segment を同一 query で読めても canonical semantics は source profile を保持する。
    single_writer_rule: canonical head mutation は単一 schema writer からのみ許す。
    blocked_patterns:
    - adapter manifest なしで implicit field rename を流す
    - compatible_with_loss を full_compatible と偽装する
    - mixed-version read を理由に mixed-version write を許す
  tool_responsibilities:
    DecisionLedger:
      owns:
      - compatibility decision
      - downgrade barrier judgement
      - single-writer governance
      - adapter approval record
    GraphEngine:
      owns:
      - cross-version projection
      - replay comparison generation
      - adapter execution trace
      - mixed-version reader-lift materialization
    GraphLint:
      owns:
      - missing adapter manifest lint
      - unsafe downgrade lint
      - writer ambiguity lint
      - loss-class concealment lint
    archive_object:
      owns:
      - schema-tagged segment snapshot
      - adapter manifest bundle
      - validation packet
      - compatibility evidence archive
  forbidden_shortcuts:
  - schema version だけ保存して adapter manifest を残さない
  - governance semantics loss を含む downgrade を compatibility と称する
  - mixed-version reader-lift を mixed-version write 許可に読み替える
  - compatible_with_loss を full_compatible として監査に流す
  residual_open_points: []
scheduler_lineage_mergeback_head_governance:
  status: provisional_fixed
  statement: scheduler_lineage_mergeback_head_governance とは、reopened / imported / corrective branch を canonical lineage に merge-back するときの admissibility、inherited debt carry-forward、canonical head selection を固定する規則である。
  core_claims:
  - merge-back は branch 消去ではなく lawful re-integration である。source branch、target head、merge purpose、covered scope、conflict class、merge witness が揃うときにだけ canonical lineage へ戻せる。
  - merge admissibility は branch class ごとに違う。targeted_reopen branch は affected scope exactness を要求し、imported_verified branch は issuer provenance と local attestation を要求し、corrective_reverse branch は reverse lineage witness を要求する。
  - merge で debt は消えない。attestation residue、notice duty residue、replay gap debt、redaction join debt、schema adapter debt を inherited debt bundle として carry-forward し、discharge point を明示しなければならない。
  - canonical head は一意に選ぶ。merge 後の状態は incumbent_preserved、merged_head_promoted、bounded_dual_head、merge_rejected のいずれかとして記録し、dual current を黙認してはならない。
  - conflict class は semantic_conflict、authority_conflict、chronology_conflict、witness_gap_conflict、redaction_barrier_conflict を基本集合とする。resolved class を示せない conflict を抱えたまま merge 完了扱いにしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は merge judgement、debt propagation、head nomination、witness preservation を分担する。
  branch_classes:
    targeted_reopen_branch: closed lineage の一部 scope だけを reopen して corrective merge-back 候補になっている branch。
    imported_verified_branch: external export/import packet と local verification を経て merge 候補になっている branch。
    corrective_reverse_branch: reverse-of-reverse または rollback 由来で canonical correction を目指す branch。
    analysis_only_branch: 比較・監査・shadow 用であり canonical merge-back 候補にはならない branch。
  merge_witness:
    required_fields:
    - source_branch_ref
    - target_head_ref
    - merge_purpose_ref
    - covered_scope_ref
    - conflict_class_set_ref
    - conflict_resolution_packet_ref
    - inherited_debt_bundle_ref
    - attestation_residue_ref
    - canonical_head_nomination_ref
    - effective_at
    - approved_by_ref
    rules:
    - covered_scope_ref は source branch の admissible segment だけを指し、unrelated branch payload を巻き込んではならない。
    - conflict_resolution_packet_ref は resolved / deferred / blocking の class を分けて示さなければならない。
    - canonical_head_nomination_ref は merge 結果の唯一 current head または bounded coexistence head set を明示しなければならない。
  inherited_debt_bundle:
    debt_classes:
    - attestation_residue
    - notice_duty_residue
    - replay_gap_debt
    - redaction_join_debt
    - schema_adapter_debt
    rules:
    - 各 debt item は source branch origin、receiver owner、due window、discharge witness を持たなければならない。
    - merge 後に receiver owner が未束縛の debt item を orphan debt として放置してはならない。
    - merged_head_promoted のときも inherited debt bundle は head closure note から分離して追跡しなければならない。
  canonical_head_selection:
    states:
    - incumbent_preserved
    - merged_head_promoted
    - bounded_dual_head
    - merge_rejected
    selection_rules:
    - single-writer canonicality を破る head 選定を禁止する。
    - bounded_dual_head は coexistence_scope と expiry が明示された場合にのみ許す。
    - merge_rejected の場合も source branch の debt と witness disposition を残さなければならない。
    blocked_patterns:
    - merge note だけを残して canonical head nomination を省略する
    - resolved していない authority_conflict を抱えたまま merged_head_promoted にする
    - imported_verified_branch を local attestation なしで canonical head 候補にする
  tool_responsibilities:
    DecisionLedger:
      owns:
      - merge admissibility judgement
      - conflict class / resolution binding
      - inherited debt bundle binding
      - canonical head nomination
    GraphEngine:
      owns:
      - merge witness materialization
      - branch overlap / scope computation
      - debt carry-forward propagation
      - head transition realization
    GraphLint:
      owns:
      - illegal dual-current lint
      - missing debt carry-forward lint
      - unresolved conflict merge lint
      - head nomination omission lint
    archive_object:
      owns:
      - merge witness packet
      - source/target branch snapshot
      - inherited debt bundle artifact
      - post-merge head snapshot
  forbidden_shortcuts:
  - source branch をそのまま canonical lineage に append する
  - merge 完了を理由に inherited debt を自然消滅扱いにする
  - canonical head nomination なしに merged state を current とみなす
  - analysis_only_branch を convenience のために merge-back する
  residual_open_points: []
scheduler_lineage_branch_quarantine_tombstone_governance:
  status: provisional_fixed
  statement: scheduler_lineage_branch_quarantine_tombstone_governance とは、merge されない branch の quarantine、owner 喪失 branch の orphan 化、abandoned branch の tombstone 化、restore gate を固定する規則である。
  core_claims:
  - branch は merged されない限り生存し続けてよいわけではない。active_exception、quarantined_pending、orphaned_no_owner、tombstoned_abandoned、evidentiary_hold を基本 lifecycle state とする。
  - quarantine は purge でも delete でもない。canonical head candidacy、automatic merge eligibility、external export widening を停止しつつ、witness と debt visibility を保持する隔離状態として扱う。
  - orphan branch は owner 不在だけでなく authority path / lawful purpose / maintenance custody の欠落を含む。custodian が束縛されない orphan を active branch として残してはならない。
  - tombstone は evidence-preserving closure である。last admissible head、pending debt disposition、restore barrier、expiry reason、retention floor を束ねた tombstone packet を必須にする。
  - restore は undo ではなく新たな petition である。tombstoned branch は restore petition、lawful basis、custodian、head safety、debt visibility が揃うときにだけ戻せる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は lifecycle judgement、custody propagation、tombstone packet、restore admissibility を分担する。
  branch_lifecycle_states:
    active_exception: bounded coexistence 下で生存している例外 branch。owner と expiry を持つ。
    quarantined_pending: merge / restore / purge judgement 待ちで execution と head candidacy を停止した branch。
    orphaned_no_owner: owner または authority path を失い、custodian だけが保持している branch。
    tombstoned_abandoned: restore petition がない限り再活性化できない墓標化 branch。
    evidentiary_hold: 監査・法的保持のために content は維持するが canonical 操作は許さない branch。
  quarantine_and_orphan_rules:
    quarantine_triggers:
    - merge witness missing beyond allowed window
    - blocking conflict unresolved beyond checkpoint
    - owner or authority path lost
    - import provenance challenged or revoked
    orphan_conditions:
    - named owner absent
    - lawful purpose expired
    - custodian not bound
    - restore or merge path unknown
    blocked_while_quarantined:
    - canonical head nomination
    - automatic merge-back
    - scope widening export
    - silent retention downgrade
  tombstone_packet:
    required_fields:
    - branch_ref
    - last_admissible_head_ref
    - lifecycle_state_ref
    - pending_debt_disposition_ref
    - retention_floor_ref
    - restore_barrier_ref
    - custodian_ref
    - tombstoned_at
    - reason_ref
    rules:
    - pending_debt_disposition_ref は tombstone 後の debt owner または waiver authority を示さなければならない。
    - restore_barrier_ref は lawful basis / safety / witness completeness を分けて示さなければならない。
    - last_admissible_head_ref を失う tombstone packet は監査用墓標として不十分である。
  restore_gate:
    required_conditions:
    - restore petition with lawful basis
    - custodian and future owner bound
    - head safety and conflict check complete
    - debt visibility preserved
    blocked_patterns:
    - operator convenience だけで tombstone を解除する
    - orphan branch を custodian なしで restore する
    - quarantine 中の branch を evidence review なしで merge-back する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - lifecycle state judgement
      - custodian binding
      - tombstone approval record
      - restore admissibility judgement
    GraphEngine:
      owns:
      - branch isolation / freeze realization
      - orphan detection
      - tombstone packet materialization
      - restore candidate generation
    GraphLint:
      owns:
      - ownerless-active-branch lint
      - missing tombstone packet lint
      - illegal restore lint
      - quarantine-bypassed merge lint
    archive_object:
      owns:
      - quarantine snapshot
      - tombstone packet
      - custody history
      - restore petition artifact
  forbidden_shortcuts:
  - merge しない branch を何も記録せず放置する
  - quarantine を delete と同義に扱う
  - tombstone packet なしに abandoned branch を purge 対象へ送る
  - owner 不在の branch を active exception のまま残す
  residual_open_points: []
scheduler_imported_branch_provenance_governance:
  status: provisional_fixed
  statement: scheduler_imported_branch_provenance_governance とは、external / foreign source から入る imported branch の provenance proof、issuer trust class、replay admission mode、local attestation 境界を固定する規則である。
  core_claims:
  - imported branch は reopened internal branch と同一ではない。issuer identity、signature suite、source lineage digest、export purpose、schema compatibility、redaction profile を束ねた provenance proof がない imported branch を canonical lineage の近傍に置いてはならない。
  - issuer trust class を trusted_peer、constrained_partner、independent_auditor、untrusted_forensic に分け、許される replay / comparison / merge 作用を変える。issuer が同業他社か監査主体かで admission mode は変わる。
  - replay admission mode は verify_only、shadow_only、bounded_merge_candidate、non_admissible を基本集合とする。foreign replay proof があっても local attestation なしに canonical head mutation を許してはならない。
  - import packet は debt disclosure を含まなければならない。source 側で未解消の attestation residue、notice obligation、join barrier、schema loss class を hidden にしたまま import してはならない。
  - local attestation は external truth の承認ではなく local governance への接続である。imported branch が local policy、protected floor、retention / redaction rule と矛盾しないことを確認しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は import provenance、trust class binding、admission mode、local attestation、mutation prohibition を分担する。
  issuer_trust_classes:
    trusted_peer: schema / attestation / custody profile が相互認証されている peer source。bounded_merge_candidate まで進みうる。
    constrained_partner: joint operation だが authority や visibility に制約がある partner source。shadow_only または bounded_merge_candidate。
    independent_auditor: verification 目的の source。verify_only を原則とし canonical mutation 権限は持たない。
    untrusted_forensic: 出所や chain-of-custody が限定的な source。comparison や anomaly triage 用で non_admissible を原則とする。
  import_packet:
    required_fields:
    - issuer_identity_ref
    - issuer_trust_class_ref
    - source_lineage_digest_ref
    - signature_suite_ref
    - foreign_replay_proof_ref
    - schema_compatibility_ref
    - redaction_profile_ref
    - debt_disclosure_ref
    - lawful_import_purpose_ref
    - received_at
    rules:
    - debt_disclosure_ref は source 側の residual debt と loss class を少なくとも class 粒度で示さなければならない。
    - schema_compatibility_ref は local schema への projection 可否と downgrade barrier を示さなければならない。
    - signature_suite_ref や foreign_replay_proof_ref が欠ける packet は verify_only 以上へ昇格させてはならない。
  admission_modes:
    verify_only: digest / signature / provenance を検証するだけで local replay や branch comparison を行わない。
    shadow_only: local action へ影響させず comparison / divergence 観測だけを行う。
    bounded_merge_candidate: local attestation 後に限定 merge 候補になりうる。
    non_admissible: 保持しても canonical lineage 近傍では扱わない。
  local_attestation_gate:
    required_checks:
    - issuer trust class admitted for stated purpose
    - local protected floor and redaction rule compatibility
    - debt disclosure and loss class completeness
    - canonical mutation still blocked until merge witness is bound
    blocked_patterns:
    - trusted_peer だから local attestation を省略する
    - independent_auditor packet を merge 候補に昇格する
    - debt disclosure を欠いた import packet を shadow_only 以上で扱う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - issuer trust class binding
      - lawful import purpose
      - admission mode judgement
      - local attestation decision
    GraphEngine:
      owns:
      - import packet parsing
      - foreign replay proof verification
      - schema projection check
      - shadow comparison materialization
    GraphLint:
      owns:
      - missing provenance proof lint
      - trust-class misuse lint
      - debt-disclosure omission lint
      - illegal canonical mutation lint
    archive_object:
      owns:
      - import packet artifact
      - issuer signature / proof bundle
      - local attestation snapshot
      - admission-mode history
  forbidden_shortcuts:
  - issuer trust class を付けず imported branch を受け入れる
  - foreign replay proof だけで canonical mutation 権限まで与える
  - debt disclosure を欠いた import packet を bounded_merge_candidate にする
  - independent_auditor packet を trusted_peer と同格に扱う
  residual_open_points: []
scheduler_lineage_patch_equivalence_governance:
  status: provisional_fixed
  statement: scheduler_lineage_patch_equivalence_governance とは、rebase / cherry-pick / squash を含む patch 系 branch 操作の provenance、semantic equivalence、disclosed-loss 境界、canonical head replacement 条件を固定する規則である。
  core_claims:
  - rebase や cherry-pick は text diff 操作ではなく lineage transformation である。origin head set、transformed scope、dropped claim、conflict resolution、debt delta を束ねた patch provenance bundle がなければ lawful transformation とみなしてはならない。
  - operation class は pure_rebase、conflict_resolved_rebase、cherry_pick_patch、squashed_patch_bundle を基本集合とする。同じ patch でも conflict 解消や squash により equivalence class は変わる。
  - equivalence は semantically_equivalent、equivalent_with_disclosed_loss、non_equivalent を分ける。attestation edge、notice duty、redaction join barrier、reopen trigger を落とした patch を semantically_equivalent と呼んではならない。
  - carry-forward debt delta を必須にする。patch により debt が新規生成・転写・消滅・waive されたなら、その差分を provenance bundle で追跡しなければならない。
  - canonical head replacement は equivalence witness と head safety packet を持つときにだけ許す。silent squash や hidden cherry-pick で current head lineage を置換してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は patch judgement、equivalence witness、debt delta、head replacement safety を分担する。
  operation_classes:
    pure_rebase: content と normative meaning を保ったまま ancestor base を付け替える操作。
    conflict_resolved_rebase: rebase 中に conflict resolution を含み、semantic drift 可能性がある操作。
    cherry_pick_patch: origin branch の一部 change set だけを選択して適用する操作。
    squashed_patch_bundle: 複数 change set をまとめて適用し origin granularity を失いやすい操作。
  patch_provenance_bundle:
    required_fields:
    - operation_class_ref
    - origin_head_set_ref
    - target_base_ref
    - transformed_scope_ref
    - dropped_claim_set_ref
    - conflict_resolution_packet_ref
    - equivalence_witness_ref
    - debt_delta_ref
    - resulting_head_ref
    - issued_at
    rules:
    - origin_head_set_ref は patch 前の source lineage を exact に指さなければならない。
    - dropped_claim_set_ref が空でない場合、その patch は semantically_equivalent と判定してはならない。
    - debt_delta_ref は created / transferred / discharged / waived を分けて示さなければならない。
  equivalence_classes:
    semantically_equivalent: normative meaning、attestation sufficiency、notice duty、redaction join barrier、reopen trigger が保たれている。
    equivalent_with_disclosed_loss: 利用可能だが落ちた claim / witness / granularity が disclosure されている。
    non_equivalent: lineage meaning や governance semantics が変わり、単純 replacement 根拠に使えない。
  head_replacement_rules:
    required_conditions:
    - equivalence witness bound
    - debt delta reviewed
    - resulting head safety packet complete
    - origin head preservation or retirement explicit
    blocked_patterns:
    - squashed patch を provenance なしで current head に置換する
    - equivalent_with_disclosed_loss を semantically_equivalent として扱う
    - origin head retirement を曖昧にしたまま cherry-pick patch を canonical 化する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - operation class judgement
      - equivalence class binding
      - debt delta approval
      - canonical head replacement judgement
    GraphEngine:
      owns:
      - origin/target patch lineage reconstruction
      - equivalence witness generation
      - debt delta propagation
      - resulting head materialization
    GraphLint:
      owns:
      - missing patch provenance lint
      - silent-loss equivalence lint
      - illegal head replacement lint
      - hidden debt delta lint
    archive_object:
      owns:
      - patch provenance bundle
      - equivalence witness artifact
      - origin/result head snapshot
      - debt delta record
  forbidden_shortcuts:
  - rebase / cherry-pick を単なる text diff とみなす
  - equivalence witness なしで canonical head replacement を行う
  - silent squash で origin granularity と debt delta を失う
  - equivalent_with_disclosed_loss を disclosure なしで current replacement 根拠に使う
  residual_open_points: []
scheduler_lineage_merge_queue_freeze_governance:
  status: provisional_fixed
  statement: scheduler_lineage_merge_queue_freeze_governance とは、同じ canonical head 近傍で競合する merge / restore / patch candidate の reservation unit、priority ordering、conflict arbitration、freeze window を固定する規則である。
  core_claims:
  - concurrent candidate は FIFO だけでは扱えない。reservation unit を canonical_head_ref、affected_scope_ref、mutation_class_ref、authority_envelope_ref の組として束縛し、同じ reservation unit を競合単位として queue する。
  - priority は authority tier、risk class、lawful deadline、debt age、freeze sensitivity の strict ordering で決める。operator convenience や arrival order だけで safety-critical corrective candidate を追い越してはならない。
  - conflict arbitration は overlap_conflict、authority_conflict、witness_conflict、freeze_conflict、starvation_conflict を区別する。blocking class ごとに arbitration path と veto reach を分け、局所競合を global stop に拡大してはならない。
  - freeze window は queue pause ではなく mutation boundary である。attestation export、purge attestation、head replacement review など head safety が揺らぐ局面では freeze_scope、freeze_owner、thaw_condition、max_duration を束ねた freeze packet を要求する。
  - veto reach は exact scope と protected floor に限定する。authority conflict が一部 scope に閉じている場合、無関係な reservation lane まで止めてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reservation binding、priority evaluation、freeze packet、arbitration outcome を分担する。
  reservation_units:
    exclusive_head_mutation_slot: 同一 canonical head と重なる affected scope を変える mutation 用の排他的 reservation。
    bounded_patch_replacement_slot: equivalence witness review 付き patch head replacement 用の予約単位。
    restore_petition_slot: tombstoned / quarantined branch の restore judgement 用の予約単位。
    comparison_only_lane: shadow / verify-only / evidence assembly のための非 mutation lane。mutation slot を消費しない。
  arbitration_and_veto:
    priority_factors:
    - authority tier and lawful mandate
    - risk class and protected floor exposure
    - debt age / pending hold / deadline pressure
    - freeze sensitivity and witness expiry proximity
    conflict_classes:
    - overlap_conflict
    - authority_conflict
    - witness_conflict
    - freeze_conflict
    - starvation_conflict
    rules:
    - veto reach は affected_scope_ref と protected floor に限定し、queue 全体へ自動拡張してはならない。
    - starvation_conflict は単なる待機時間ではなく repeated displacement と debt worsening を伴う場合に開く。
    - arbitration outcome は admitted / deferred / blocked / frozen のいずれかを明示しなければならない。
  freeze_window:
    required_fields:
    - freeze_scope_ref
    - freeze_reason_ref
    - freeze_owner_ref
    - thaw_condition_ref
    - max_duration_ref
    - active_reservation_set_ref
    - issued_at
    states:
    - open
    - soft_frozen
    - hard_frozen
    - thaw_pending
    rules:
    - soft_frozen では新規 mutation admission を止めるが comparison_only_lane は許しうる。
    - hard_frozen では thaw_condition_ref が満たされるまで affected scope の head mutation を禁止する。
    - freeze_reason_ref が消えても thaw witness なしに自動 thaw してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reservation unit binding
      - priority / veto rule binding
      - freeze packet approval
      - arbitration outcome ratification
    GraphEngine:
      owns:
      - candidate overlap detection
      - queue ordering materialization
      - freeze scope projection
      - thaw readiness computation
    GraphLint:
      owns:
      - hidden overlap lint
      - global-stop overreach lint
      - missing freeze packet lint
      - illegal priority inversion lint
    archive_object:
      owns:
      - reservation snapshot
      - arbitration packet
      - freeze packet
      - queue state transition record
  forbidden_shortcuts:
  - arrival order だけで authority / risk ordering を上書きする
  - local conflict を理由に queue 全体を黙って freeze する
  - freeze packet なしで attestation 中の head mutation を進める
  - comparison_only candidate を mutation slot に見せかけて優先権を取らせる
  residual_open_points: []
scheduler_reservation_lease_recovery_governance:
  status: provisional_fixed
  statement: scheduler_reservation_lease_recovery_governance とは、reservation の lease class、renewal / expiry witness、stale claimant recovery、starvation appeal を固定する規則である。
  core_claims:
  - reservation は無期限 lock ではない。short_mutation_lease、evidence_assembly_lease、manual_review_lease、freeze_guard_lease を基本集合とし、lease class ごとに renewal 条件と expiry ceiling を分ける。
  - renewal には progress witness が要る。heartbeat や UI open 状態だけで lease を延命してはならず、witness assembly、conflict resolution、head safety review の進捗を示さなければならない。
  - stale claimant は time-out だけでなく owner 喪失、executor crash、freeze reason 消滅後の無反応、debt non-progress を含む。stale 判定後は release、reassign、quarantine、contested_hold のいずれかへ送る。
  - recovery は silent unlock ではない。reservation lineage、last progress witness、debt disposition、freeze interaction を束ねた recovery packet を残さなければならない。
  - starvation appeal は stale recovery の代替ではない。repeated displacement と worsening debt を受けた candidate だけが bounded appeal lane に入り、priority inversion の是正を求められる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は lease binding、stale detection、recovery packet、appeal lane を分担する。
  lease_classes:
    short_mutation_lease: 通常の merge / restore / patch mutation に使う短い reservation。明確な commit deadline を持つ。
    evidence_assembly_lease: witness や attestation packet を揃えるための補助 reservation。mutation 権限は限定される。
    manual_review_lease: human arbitration や authority review 待ちの reservation。owner と expiry の双方を必須にする。
    freeze_guard_lease: active freeze packet に結びついた保全用 lease。freeze owner と thaw condition に従属する。
  stale_claimant_detection:
    signals:
    - lease expired without valid renewal
    - owner or authority path lost
    - executor crash with no checkpoint advance
    - freeze cleared but claimant no response
    - debt / witness progress stagnant beyond policy window
    rules:
    - heartbeat-only renewal を progress witness の代替にしてはならない。
    - freeze_guard_lease は freeze packet が失効した時点で再評価しなければならない。
    - same claimant の repeated stale を history から切り離してはならない。
  recovery_and_appeal:
    recovery_outcomes:
    - released
    - reassigned
    - quarantined
    - contested_hold
    appeal_admission:
    - repeated displacement across bounded horizon
    - debt worsening or deadline compression
    - candidate still lawful and witness-complete enough for review
    blocked_patterns:
    - stale claimant を UI refresh だけで復活扱いにする
    - appeal lane を通常 priority lane の抜け道にする
    - reassigned reservation で旧 claimant の debt disposition を失う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - lease class binding
      - renewal / expiry rule binding
      - recovery packet approval
      - appeal admission judgement
    GraphEngine:
      owns:
      - lease timer and progress linkage
      - stale claimant detection
      - reassignment path materialization
      - appeal queue projection
    GraphLint:
      owns:
      - heartbeat-only renewal lint
      - silent unlock lint
      - appeal abuse lint
      - missing debt disposition lint
    archive_object:
      owns:
      - lease snapshot
      - recovery packet
      - stale detection evidence
      - appeal trail
  forbidden_shortcuts:
  - UI が開いているだけで lease renewal 扱いにする
  - stale recovery を silent unlock で済ませる
  - appeal lane を高 priority への抜け道として常設する
  - reassignment 時に旧 claimant の debt と freeze interaction を捨てる
  residual_open_points: []
scheduler_merge_train_atomicity_governance:
  status: provisional_fixed
  statement: scheduler_merge_train_atomicity_governance とは、複数 candidate を merge train として束ねるときの compatibility class、atomicity boundary、partial rollback segmentation、batch witness を固定する規則である。
  core_claims:
  - batch execution は throughput 最適化であって witness 省略ではない。merge train は serial_same_head、disjoint_scope_bundle、evidence_sidecar の batch class に分け、compatibility を満たす candidate だけを束ねる。
  - atomicity boundary を明示しなければならない。全 train を一括 atomic とみなすのではなく、shared head mutation、shared debt disposition、shared freeze dependency の境界で rollback cell を切る。
  - partial failure は異常ではなく規定された outcome である。segment ごとに committed、rolled_back、held_for_replay、quarantined_failure を区別し、silent partial success を full success と言い換えてはならない。
  - batch witness は member order、precondition digest、rollback cell partition、expected debt delta、post-commit digest を束ねる。member 追加や削除を runtime convenience で黙って行ってはならない。
  - partial rollback は affected rollback cell に限定する。disjoint scope bundle の一部失敗を理由に unrelated candidate まで巻き戻してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は batch class binding、atomicity judgement、rollback segmentation、batch witness preservation を分担する。
  batch_classes:
    serial_same_head_train: 同一 canonical head に対して順序付き mutation を適用する train。member order が意味を持つ。
    disjoint_scope_bundle: 同じ epoch 内だが affected scope が互いに独立している候補の束。rollback cell を scope ごとに切れる。
    evidence_sidecar_bundle: mutation candidate に comparison/evidence assembly candidate が付随する束。sidecar は commit outcome を補助するが単独 mutation を持たない。
  atomicity_and_segmentation:
    rollback_cells:
    - shared_head_cell
    - shared_debt_cell
    - shared_freeze_cell
    - disjoint_scope_cell
    segment_outcomes:
    - committed
    - rolled_back
    - held_for_replay
    - quarantined_failure
    rules:
    - serial_same_head_train では shared_head_cell を跨ぐ reorder を禁止する。
    - disjoint_scope_bundle の failure は原則として同じ disjoint_scope_cell 内に閉じ込める。
    - held_for_replay は replay precondition と reservation lineage を失わずに残さなければならない。
  batch_witness:
    required_fields:
    - batch_class_ref
    - member_order_ref
    - compatibility_proof_ref
    - rollback_cell_partition_ref
    - precondition_digest_ref
    - expected_debt_delta_ref
    - freeze_dependency_ref
    - post_commit_digest_ref
    - issued_at
    rules:
    - member_order_ref は train 実行順を exact に示さなければならない。
    - rollback_cell_partition_ref がない batch は partial failure を lawful に扱えない。
    - post_commit_digest_ref なしで committed を宣言してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - batch class binding
      - atomicity boundary approval
      - segment outcome ratification
      - rollback cell policy
    GraphEngine:
      owns:
      - compatibility analysis
      - batch assembly
      - segment execution trace
      - rollback materialization
    GraphLint:
      owns:
      - illegal bundle lint
      - hidden reorder lint
      - missing rollback cell lint
      - silent partial-success lint
    archive_object:
      owns:
      - batch witness
      - pre/post digest snapshot
      - segment execution record
      - rollback proof
  forbidden_shortcuts:
  - batch member を runtime convenience で黙って追加・削除する
  - partial success を full success と言い換える
  - rollback cell を越えて unrelated candidate まで巻き戻す
  - post-commit digest なしで committed を宣言する
  residual_open_points: []
scheduler_executor_recovery_idempotency_governance:
  status: provisional_fixed
  statement: scheduler_executor_recovery_idempotency_governance とは、executor crash / duplicate dispatch 後の recovery checkpoint、idempotent replay、duplicate suppression を固定する規則である。
  core_claims:
  - executor failure 後の再開は推測で行ってはならない。recovery は dispatch log、checkpoint digest、reservation lineage、post-commit digest を束ねた recovery checkpoint packet を起点にしなければならない。
  - すべての mutation candidate は idempotency key を持つ。同じ key の replay は同一 outcome または explicit no-op に収束し、新しい key を付けて同一 mutation を押し込んではならない。
  - failure class は dispatch_before_commit_loss、commit_before_ack_loss、checkpoint_gap、duplicate_dispatch、partial_side_effect_unknown を基本集合とする。class ごとに replay-safe reissue、digest verification、manual hold の扱いを分ける。
  - duplicate suppression は operation payload だけでなく reservation lineage と intended rollback cell を見る。見かけ上似た payload でも別 reservation lineage なら同一操作とみなしてはならない。
  - recovery phase は detect、seal、reissue_or_verify、reconcile、close を基本集合とする。close には debt disposition と surviving reservation set の整合確認が要る。
  - DecisionLedger / GraphEngine / GraphLint / archive object は failure class binding、checkpoint packet、idempotency check、duplicate suppression、reconciliation trace を分担する。
  failure_classes:
    dispatch_before_commit_loss: dispatch 記録はあるが commit digest がない。実行有無が不確定な failure。
    commit_before_ack_loss: commit digest はあるが ack / queue state 更新が欠ける failure。
    checkpoint_gap: precondition または post-condition checkpoint が欠けて recovery 判定が不十分な状態。
    duplicate_dispatch: 同じ reservation lineage / idempotency key に対して複数 dispatch が飛んだ状態。
    partial_side_effect_unknown: 一部 side effect の成否が不明で replay と rollback の両方に注意が必要な状態。
  recovery_checkpoint:
    required_fields:
    - failure_class_ref
    - reservation_lineage_ref
    - idempotency_key_ref
    - precondition_digest_ref
    - post_commit_digest_ref_or_null
    - executor_instance_ref
    - last_checkpoint_ref
    - surviving_reservation_set_ref
    - issued_at
    rules:
    - idempotency_key_ref がない recovery checkpoint は replay-safe reissue を許してはならない。
    - post_commit_digest_ref_or_null が null の場合は reissue 前に duplicate suppression と side-effect probe を要求する。
    - surviving_reservation_set_ref を更新せずに close へ進んではならない。
  idempotent_replay_and_duplicate_suppression:
    recovery_phases:
    - detect
    - seal
    - reissue_or_verify
    - reconcile
    - close
    rules:
    - 同じ idempotency key の replay は same outcome か explicit no-op に収束しなければならない。
    - duplicate suppression は idempotency key、reservation lineage、rollback cell、post-commit digest の一致で判定する。
    - partial_side_effect_unknown class は verify path を通さずに blind reissue してはならない。
    blocked_patterns:
    - crash 後に queue 全体を最初から再実行する
    - 同一 mutation に新しい idempotency key を付けて押し込む
    - duplicate suppression を UI 上の manual clear だけで済ませる
  tool_responsibilities:
    DecisionLedger:
      owns:
      - failure class binding
      - recovery checkpoint approval
      - idempotency policy binding
      - reconciliation closure judgement
    GraphEngine:
      owns:
      - checkpoint comparison
      - reissue_or_verify path selection
      - duplicate suppression matching
      - reservation set reconciliation
    GraphLint:
      owns:
      - missing idempotency key lint
      - blind reissue lint
      - duplicate lineage mismatch lint
      - close-without-reconcile lint
    archive_object:
      owns:
      - recovery checkpoint packet
      - dispatch / commit / ack trace
      - reconciliation snapshot
      - duplicate suppression evidence
  forbidden_shortcuts:
  - crash 後に queue 全体を最初から再実行する
  - 同一 mutation に新しい idempotency key を付けて再投入する
  - post-commit digest 未確認のまま blind reissue する
  - surviving reservation の整合確認なしで recovery を close する
  residual_open_points: []
scheduler_degraded_manual_reconciliation_governance:
  status: provisional_fixed
  statement: scheduler_degraded_manual_reconciliation_governance とは、自動 executor が unsafe / unavailable / evidence-incomplete のときの degraded operation class、manual takeover packet、通常運用へ戻す reconciliation closure を固定する規則である。
  core_claims:
  - degraded mode は自由な人手介入ではない。observe_only、evidence_sealing、bounded_verify_only、manual_corrective_mutation、global_hold_transition の operation class を分け、automation 停止中でも許される surface を限定する。
  - manual takeover は UI 操作ではなく packet 化された権限移譲である。takeover reason、affected scope、authority path、required co-sign、expiry、fallback branch、rollback readiness、post-manual reconciliation owner を束ねなければならない。
  - unsafe / unavailable / evidence-incomplete を区別する。unsafe は mutation surface を最も狭くし、unavailable は bounded manual corrective path を許しうるが、evidence-incomplete は証拠補完または hold を優先する。
  - manual corrective mutation は replay 可能な記録を前提にする。out-of-band action や口頭判断だけで canonical head を更新してはならず、post-manual reconciliation packet が closure に必須である。
  - reconciliation closure は queue reopen ではなく residue settlement である。surviving reservation、duplicate suppression residue、external side effect echo、debt disposition、re-enable gate を束ねて close しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は degraded class binding、takeover packet、closure witness、re-enable gate を分担する。
  degraded_operation_classes:
    observe_only: read/query/diagnostic だけを許す。canonical head mutation を禁止する。
    evidence_sealing: 現時点の reservation / checkpoint / digest を封印し、後続の blind overwrite を防ぐ。
    bounded_verify_only: post-commit digest 照合や duplicate suppression の検証だけを行う。新規 effect を生成しない。
    manual_corrective_mutation: 明示的 packet と co-sign を伴う限定的な corrective mutation。affected scope と rollback path を必須にする。
    global_hold_transition: unsafe scope を hard hold へ移し、他 lane へ影響を明示する遷移。
  manual_takeover_packet:
    required_fields:
    - takeover_packet_id
    - trigger_class_ref
    - degraded_mode_class_ref
    - affected_scope_ref
    - authority_path_ref
    - operator_or_team_ref
    - required_cosign_set_ref
    - expiry_at
    - fallback_branch_ref
    - rollback_readiness_ref
    - reconciliation_owner_ref
    - issued_at
    rules:
    - required_cosign_set_ref を満たさない manual_corrective_mutation を admission してはならない。
    - expiry_at を過ぎた takeover packet は auto-close せず、hold or revoke へ遷移しなければならない。
    - fallback_branch_ref と rollback_readiness_ref が空のまま risky mutation を許してはならない。
  reconciliation_closure:
    required_evidence:
    - surviving_reservation_set reconciled
    - duplicate suppression residue classified
    - external side effect echo captured or explicitly pending
    - debt disposition bound
    - re-enable gate approved
    states:
    - takeover_open
    - manual_active
    - reconcile_pending
    - reconcile_blocked
    - closed
    rules:
    - reconcile_pending 中は automation を full reopen してはならない。
    - external echo が未確認でも lawful pending class と owner/expiry があれば reconcile_blocked として保持できる。
    - closed へ進むには no-hidden-reservation / no-unbounded-residue / no-blind-duplicate の3条件が必要である。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - degraded mode class binding
      - manual takeover packet ratification
      - closure judgement
      - re-enable gate approval
    GraphEngine:
      owns:
      - allowed surface projection
      - takeover-to-reconcile state machine
      - surviving reservation comparison
      - closure readiness computation
    GraphLint:
      owns:
      - illegal degraded surface lint
      - missing cosign lint
      - close-with-hidden-residue lint
      - blind-manual-mutation lint
    archive_object:
      owns:
      - takeover packet
      - sealed checkpoint snapshot
      - reconciliation closure packet
      - re-enable audit bundle
  forbidden_shortcuts:
  - executor を止めた途端に operator が自由に head mutation できるようにする
  - manual takeover packet なしで UI 操作を正本更新とみなす
  - duplicate suppression residue や surviving reservation 未整理のまま close する
  - unsafe class なのに unavailable class と同じ surface を許す
  residual_open_points: []
scheduler_manual_takeover_session_governance:
  status: provisional_fixed
  statement: scheduler_manual_takeover_session_governance とは、manual takeover を実行する actor の capability lease、operator session attestation、emergency revocation を固定する規則である。
  core_claims:
  - manual takeover 権限は static role ではなく short-lived capability lease として発行する。observer_review_lease、bounded_corrective_lease、emergency_hold_lease、dual_control_override_lease を基本集合とし、scope、expiry、cosign 条件を持たせる。
  - operator session は login 状態では足りない。session attestation には device trust class、step-up factor、peer presence、screen/control ownership、session heartbeat、active scope binding を含める。
  - lease と session は別物である。capability lease があっても attested session が失効すれば mutation を続けてはならず、attested session があっても lease scope 外の action を許してはならない。
  - dual_control は symbolic approval ではない。high-risk corrective mutation や protected floor 変更には second signer の contemporaneous witness と emergency revocation path を要求する。
  - session revoke は operator logout だけではない。compromise suspicion、peer loss、heartbeat gap、scope drift、stale screen-control transfer を revocation trigger に含める。
  - DecisionLedger / GraphEngine / GraphLint / archive object は capability lease binding、session attestation、revocation lineage、post-revoke hold を分担する。
  capability_leases:
    observer_review_lease: observe_only と bounded_verify_only だけを許す最小権限 lease。
    bounded_corrective_lease: 限定 scope の manual corrective mutation を許す lease。rollback readiness を必須にする。
    emergency_hold_lease: unsafe scope を freeze / hold へ送るための即時権限 lease。mutation 権限は含まない。
    dual_control_override_lease: protected floor に触れる corrective mutation 用の dual-control lease。second signer が必須。
  session_attestation:
    required_fields:
    - session_id
    - actor_ref
    - device_trust_class_ref
    - step_up_factor_ref
    - peer_presence_ref
    - screen_control_owner_ref
    - scope_binding_ref
    - heartbeat_interval_ref
    - lease_set_ref
    - issued_at
    - expires_at
    rules:
    - peer_presence_ref が required な lease class では single-actor session を admission してはならない。
    - screen_control_owner_ref が変わったときは re-attestation を要求し、old session を implicit に引き継いではならない。
    - heartbeat gap は network loss と operator absence を区別しても、mutation continuation の唯一根拠にはしてはならない。
  revocation_policy:
    triggers:
    - compromise suspicion or impossible travel
    - peer presence lost for dual-control lease
    - heartbeat gap beyond policy window
    - scope drift or unauthorized surface request
    - device trust downgrade or stale screen-control transfer
    outcomes:
    - lease_revoked
    - session_revoked
    - forced_hold
    - reissue_required
    rules:
    - revoked session の open mutation intent は forced_hold または reissue_required に送る。
    - lease_revoked と session_revoked を同一 event に潰してはならない。どちらが失効したかを lineage に残す。
    - revocation 後に operator が local cache から継続した action は canonical mutation として受理してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - capability lease registry
      - session attestation binding
      - dual-control proof
      - revocation judgement
    GraphEngine:
      owns:
      - lease-scope projection
      - session/lease join check
      - peer heartbeat monitoring
      - post-revoke hold transition
    GraphLint:
      owns:
      - scope-overrun lint
      - missing step-up lint
      - peer-required-but-absent lint
      - revoked-session mutation lint
    archive_object:
      owns:
      - capability lease packet
      - session attestation packet
      - revocation event chain
      - forced-hold snapshot
  forbidden_shortcuts:
  - static admin role だけで manual takeover capability を無期限に与える
  - login 済みなら attested session なしでも corrective mutation を許す
  - dual-control が必要なのに second signer の contemporaneous witness なしで進める
  - revoked session の local cache action を後追いで正本反映する
  residual_open_points: []
scheduler_out_of_band_side_effect_governance:
  status: provisional_fixed
  statement: scheduler_out_of_band_side_effect_governance とは、manual / external 系で発生した out-of-band side effect の attestation、external echo assimilation、rollback admissibility を固定する規則である。
  core_claims:
  - out-of-band side effect は ghost fact にしてはならない。manual_console_change、foreign_api_commit、offline_human_actuation、deferred_external_ack の class を分け、canonical scheduler に入る前に attestation packet を要求する。
  - attestation は観察報告ではなく effect claim である。intended action、observed external echo、operator/session lineage、target system identity、pre/post digest or bounded surrogate、rollback feasibility を束ねなければならない。
  - external echo assimilation は append-only で行う。scheduler が知らない external effect を見つけても、canonical mutation へ即時折り畳まず、echo_observed / echo_correlated / echo_admitted / echo_contested の state を経由する。
  - idempotent replay と out-of-band echo が衝突した場合、effect equivalence を先に判定する。同じ effect なら duplicate suppression / no-op assimilation へ送り、非同値なら contested effect として rollback or compensation gate を開く。
  - rollback admissibility は always-undo ではない。external irreversible actuation、legal notice emission、human physical intervention などは compensation-first になるため、rollback gate と compensation path を分ける。
  - DecisionLedger / GraphEngine / GraphLint / archive object は effect claim binding、echo correlation、rollback gate、compensation lineage を分担する。
  side_effect_classes:
    manual_console_change: operator が UI/console から直接起こした external system change。
    foreign_api_commit: foreign executor / integration が独自 token で行った commit。
    offline_human_actuation: physical system や paper process など digital trace が弱い human actuation。
    deferred_external_ack: 先に scheduler intent があり、後から external ack / receipt が戻る side effect。
  attestation_packet:
    required_fields:
    - effect_claim_id
    - side_effect_class_ref
    - intended_action_ref_or_null
    - observed_external_echo_ref
    - operator_or_agent_lineage_ref
    - target_system_identity_ref
    - pre_effect_digest_or_surrogate_ref
    - post_effect_digest_or_surrogate_ref
    - rollback_feasibility_ref
    - compensation_path_ref_or_null
    - captured_at
    rules:
    - pre/post digest が exact で取れない class では surrogate witness の loss class を明示しなければならない。
    - intended_action_ref_or_null が null の effect claim は orphan echo として隔離し、即時 admission してはならない。
    - rollback_feasibility_ref が false の effect claim では compensation_path_ref_or_null を空にしてはならない。
  assimilation_and_rollback:
    echo_states:
    - echo_observed
    - echo_correlated
    - echo_admitted
    - echo_contested
    - echo_compensated
    equivalence_rules:
    - same intended effect and same protected scope なら duplicate suppression candidate として扱う
    - same target but different protected floor exposure なら contested に送る
    - orphan echo は bounded hold で保持し lawful linkage が付くまで canonical mutation に織り込まない
    rollback_gate:
      admit_rollback_if:
      - effect reversible and rollback path witnessed
      - protected floor not worsened by undo
      - external echo lineage complete enough to avoid blind double-action
      use_compensation_if:
      - effect physically or legally irreversible
      - undo would worsen safety or notice duty
      - pre-effect state not reconstructable within bounded confidence
  tool_responsibilities:
    DecisionLedger:
      owns:
      - effect claim schema
      - assimilation judgement
      - rollback vs compensation decision
      - orphan echo hold judgement
    GraphEngine:
      owns:
      - echo correlation
      - equivalence evaluation
      - rollback feasibility computation
      - compensation dependency graph
    GraphLint:
      owns:
      - orphan echo admission lint
      - surrogate-without-loss-class lint
      - blind rollback lint
      - duplicate-effect mismatch lint
    archive_object:
      owns:
      - effect attestation packet
      - external echo evidence
      - rollback/compensation packet
      - contested effect snapshot
  forbidden_shortcuts:
  - external で起きた effect を attestation なしで canonical fact とみなす
  - orphan echo を intended action linkage なしで admission する
  - rollback feasibility 不明なのに undo を先行させる
  - irreversible effect を compensation path なしで close する
  residual_open_points: []
scheduler_reconciliation_residue_debt_governance:
  status: provisional_fixed
  statement: scheduler_reconciliation_residue_debt_governance とは、manual / out-of-band 後に残る reconciliation residue debt の class、aging、reopen petition、closure aging を固定する規則である。
  core_claims:
  - residue debt は single bucket では足りない。echo_pending_debt、rollback_pending_debt、compensation_pending_debt、authority_review_debt、evidence_gap_debt を区別し、aging budget と escalation path を別に持たせる。
  - closure は debt-free だけではない。bounded pending を許す場合でも debt owner、review cadence、expiry ceiling、reopen trigger を束ねた residue debt packet が必要である。
  - aging は時間経過だけでなく risk trend を見る。same debt が review cadence を跨いで non-progress、scope widening、protected floor exposure worsening を起こしたら escalation する。
  - reopen petition は complaint box ではない。closure 後に reopen できるのは new witness、missed echo、wrong equivalence judgement、authority challenge が bounded horizon 内で揃う場合だけである。
  - closure aging は freeze ではなく finality pressure である。debt が bounded pending のまま aging ceiling を超えたら forced review、quarantine、manual lane disable のいずれかへ遷移させる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は debt packet、aging computation、reopen petition gate、closure barrier を分担する。
  residue_debt_classes:
    echo_pending_debt: external echo の未到着や未相関で残る debt。
    rollback_pending_debt: rollback が lawful/admissible だが未実施の debt。
    compensation_pending_debt: irreversible effect に対する compensation 未完了の debt。
    authority_review_debt: human / authority judgement を待つ debt。
    evidence_gap_debt: closure 判断に必要な witness が足りない debt。
  aging_and_reopen:
    required_packet_fields:
    - residue_debt_id
    - debt_class_ref
    - owner_ref
    - review_cadence_ref
    - aging_budget_ref
    - expiry_ceiling_ref
    - protected_scope_ref
    - reopen_trigger_set_ref
    - created_at
    - last_progress_at
    escalate_if:
    - review cadence を跨いで no progress
    - debt scope or protected floor exposure worsens
    - same debt family repeats across closures
    - expiry ceiling reached with unresolved protected effect
    reopen_petition_if:
    - new witness materially changes equivalence or rollback judgement
    - missed external echo or hidden reservation is discovered
    - authority challenge is filed within bounded horizon
    - closure packet is shown to have omitted required debt binding
  closure_barriers:
    allow_bounded_pending_if:
    - debt class explicitly declared and owner bound
    - aging budget and review cadence within policy ceiling
    - protected floor not silently widened
    block_final_closure_if:
    - unowned residue debt remains
    - aging budget exceeded without escalation
    - reopen-trigger witness already present but ignored
    - same debt repeats without family-level remediation plan
    forced_actions_after_aging:
    - forced_review
    - quarantine
    - manual_lane_disable
  tool_responsibilities:
    DecisionLedger:
      owns:
      - residue debt packet
      - bounded pending approval
      - reopen petition judgement
      - closure barrier judgement
    GraphEngine:
      owns:
      - debt aging computation
      - progress/non-progress evaluation
      - reopen trigger matching
      - forced-action recommendation
    GraphLint:
      owns:
      - unowned debt lint
      - aging-ceiling breach lint
      - ignored reopen-trigger lint
      - repeat-debt-without-remediation lint
    archive_object:
      owns:
      - residue debt packet
      - closure packet lineage
      - reopen petition evidence bundle
      - aging snapshots
  forbidden_shortcuts:
  - pending と書くだけで debt class / owner / aging budget を省略する
  - closure 後の new witness を reopen petition に載せず握り潰す
  - aging ceiling 超過を silent carry-over で延命する
  - 同じ debt family の再発を individual case として切り離す
  residual_open_points: []
scheduler_failover_split_brain_governance:
  status: provisional_fixed
  statement: scheduler_failover_split_brain_governance とは、control-plane failover の leader election、cross-site lease transfer、split-brain containment を固定する規則である。
  core_claims:
  - failover は process restart ではない。leader election を clean_handover、degraded_handover、forced_fence_failover の class で分け、surviving reservation と writer authority の継承条件を固定する。
  - cross-site lease transfer は copy ではなく rebind である。site token、epoch、writer fence、surviving reservation digest、manual takeover residue を束ねた transfer packet が必要である。
  - split-brain は detection 後に事後説明するのでは遅い。quorum loss、epoch divergence、dual writer evidence、echo mismatch を detection signal にし、suspected_split / fenced_secondary / sealed_primary / recovery_merge の containment state を持たせる。
  - manual takeover と failover は独立でない。manual lane が active なときの leader election は takeover lineage と session revoke 状態を見なければならず、dual active writer を絶対に許してはならない。
  - surviving reservation は winner site がそのまま使えるとは限らない。pre-failover checkpoint、reservation lineage digest、external echo debt、freeze packet を評価し、rebind / quarantine / discard を決める。
  - DecisionLedger / GraphEngine / GraphLint / archive object は election class、transfer packet、containment state、post-failover reconciliation を分担する。
  failover_classes:
    clean_handover: planned switchover。primary が writer fence を明示的に relinquish する。
    degraded_handover: partial outage 下の handover。quorum は弱いが lineage digest は取得できる。
    forced_fence_failover: primary 応答不能や split-brain suspicion 下で secondary を fenced writer として昇格する。
  transfer_and_containment:
    transfer_packet_fields:
    - transfer_packet_id
    - failover_class_ref
    - from_site_ref
    - to_site_ref
    - epoch_ref
    - writer_fence_ref
    - surviving_reservation_digest_ref
    - manual_takeover_residue_ref
    - freeze_packet_set_ref
    - issued_at
    containment_states:
    - nominal
    - suspected_split
    - fenced_secondary
    - sealed_primary
    - recovery_merge
    rules:
    - writer_fence_ref が不明な状態で new writer を admission してはならない。
    - suspected_split 中は comparison-only lane 以外の cross-site mutation を停止する。
    - manual_takeover_residue_ref が active なまま clean_handover を宣言してはならない。
  surviving_reservation_policy:
    rebind_if:
    - reservation lineage digest intact
    - affected scope not contested across sites
    - external echo debt classified
    quarantine_if:
    - checkpoint gap or echo mismatch exists
    - manual lane residue unresolved
    - freeze packet ownership ambiguous
    discard_if:
    - writer fence violation confirmed
    - reservation lineage unverifiable
    - duplicate writer committed same protected scope
  tool_responsibilities:
    DecisionLedger:
      owns:
      - leader election class
      - transfer packet approval
      - writer fence binding
      - surviving reservation disposition
    GraphEngine:
      owns:
      - epoch divergence detection
      - split-brain containment transition
      - reservation rebind/quarantine computation
      - post-failover reconciliation plan
    GraphLint:
      owns:
      - dual-writer lint
      - missing writer fence lint
      - illegal clean-handover lint
      - survivor-reuse-without-digest lint
    archive_object:
      owns:
      - transfer packet
      - containment snapshot
      - epoch divergence evidence
      - post-failover reconciliation bundle
  forbidden_shortcuts:
  - secondary を起動しただけで新 leader とみなす
  - writer fence 不明のまま cross-site mutation を再開する
  - manual takeover residue を見ずに clean handover を宣言する
  - surviving reservation を lineage digest なしで再利用する
  residual_open_points: []
scheduler_temporal_witness_trust_governance:
  status: provisional_fixed
  statement: scheduler_temporal_witness_trust_governance とは、site / device / external system を跨ぐ clock skew budget、deadline normalization、temporal witness trust を固定する規則である。
  core_claims:
  - timestamp は裸で比較してはならない。site_clock、device_clock、external_receipt_clock、trusted_reference_clock の class を分け、skew budget と trust tier を registry 化する。
  - lease expiry、heartbeat gap、deadline breach、echo freshness は raw timestamp ではなく normalized temporal window で判定する。clock class ごとに source lag、network uncertainty、mirror lag を吸収した比較窓が必要である。
  - trusted time source は単一 NTP 名では足りない。anchor source、fallback source、untrusted local-only source を分け、source downgrade が起きたら admissibility を狭めなければならない。
  - manual session と external echo は timestamp forgery や stale cache に弱い。temporal witness trust には signing lineage、capture path、reference-anchor 差分、replay freshness ceiling を含める。
  - temporal ambiguity は silently resolve してはならない。same event に矛盾する timestamp family がある場合、temporal_contested state を開き、expiry / reopen / close を保留する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は clock class registry、normalization rule、temporal contest、trusted source downgrade を分担する。
  clock_classes_and_budgets:
    site_clock: control-plane site が使う基準時計。通常最も高い trust tier を持つが、site outage 時は downgrade しうる。
    device_clock: operator device や session host の時計。drift が大きく、single-source evidence には使えない。
    external_receipt_clock: foreign system receipt / receipt log の時計。source-specific lag を含む。
    trusted_reference_clock: 複数 source を束ねる reference anchor。normalization の基準に使う。
    skew_budget_rules:
    - lease expiry は site_clock と trusted_reference_clock の tighter window で判定する
    - heartbeat gap は device_clock 依存だけにせず transport/server witness を併用する
    - external echo freshness は external_receipt_clock の source lag budget を差し引いて判定する
  normalization_and_contest:
    normalization_fields:
    - clock_class_ref
    - trusted_source_tier_ref
    - observed_timestamp
    - normalized_interval_start
    - normalized_interval_end
    - source_lag_budget_ref
    - capture_path_ref
    temporal_contest_if:
    - same event has mutually inconsistent timestamp families beyond skew budget
    - trusted source downgrade invalidates previously admissible freshness claim
    - device-only timestamp is used for protected action expiry
    rules:
    - normalized interval が重ならない competing claims は temporal_contested に送る。
    - trusted_source_tier_ref が downgrade した後は cached normalization を blind reuse してはならない。
    - deadline normalization は more-conservative side を採り、late effect を early とみなしてはならない。
  temporal_witness_trust:
    required_fields:
    - temporal_witness_id
    - event_ref
    - clock_class_ref
    - trusted_source_tier_ref
    - capture_path_ref
    - anchor_delta_ref
    - freshness_ceiling_ref
    - signed_lineage_ref_or_null
    - recorded_at
    trust_rules:
    - signed_lineage_ref_or_null がない witness は protected mutation の唯一根拠にしてはならない。
    - freshness_ceiling_ref を超えた cached witness で reopen / close を判定してはならない。
    - anchor_delta_ref が budget 外なら temporal contest か downgrade へ送る。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - clock class registry
      - trusted source tier binding
      - temporal contest judgement
      - normalization policy approval
    GraphEngine:
      owns:
      - interval normalization
      - skew budget evaluation
      - cross-clock comparison
      - contest detection
    GraphLint:
      owns:
      - device-only expiry lint
      - stale-witness freshness lint
      - blind cached-normalization lint
      - forged-timestamp suspicion lint
    archive_object:
      owns:
      - temporal witness packet
      - normalization snapshot
      - source downgrade evidence
      - temporal contest bundle
  forbidden_shortcuts:
  - raw timestamp をそのまま比較して expiry / freshness を決める
  - device clock だけで protected action の deadline を判定する
  - trusted source downgrade 後も古い normalization を blind reuse する
  - 矛盾する timestamp family を silent に丸める
  residual_open_points: []
scheduler_emergency_hotfix_supersession_governance:
  status: provisional_fixed
  statement: scheduler_emergency_hotfix_supersession_governance とは、incident 中の emergency hotfix lane、bounded bypass ceiling、supersession sunset を固定する規則である。
  core_claims:
  - emergency hotfix は通常 rollout の省略版ではない。containment_hotfix、evidence_preserving_hotfix、compatibility_hotfix、rollback_preparation_hotfix の class を分け、incident の被害抑止と replay 可能性の両立を要求する。
  - bounded bypass は自由裁量ではなく ceiling を持つ。approval path、allowed scope、mutable surface、time-to-live、required witness、fallback branch を束ねない bypass を protected floor へ通してはならない。
  - hotfix lane は canonical lane の代替正本ではない。temporary override は supersession path か explicit rollback path を必須とし、恒久 policy へ silent merge してはならない。
  - sunset は calendar reminder では足りない。expiry、revalidation owner、post-incident review due、supersession candidate、debt carry-over disposition を束ねる sunset packet を要求する。
  - incident 中でも evidence floor は維持する。unsafe mutation を止めるための bypass は許されうるが、evidence sealing、delta witness、rollback readiness を欠く shortcut は許してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は hotfix class binding、bypass admissibility、supersession readiness、sunset enforcement を分担する。
  hotfix_classes:
    containment_hotfix: blast radius を即時に狭めるための抑止 hotfix。新機能追加を目的にしてはならない。
    evidence_preserving_hotfix: state 破壊を防ぎ証拠保全を優先する hotfix。mutation surface は最小限に限定する。
    compatibility_hotfix: trusted dependency / protocol mismatch を暫定吸収する hotfix。supersession path を必須にする。
    rollback_preparation_hotfix: 安全 rollback や compensating patch を成立させるための事前整形 hotfix。単独恒久化を禁止する。
  bounded_bypass:
    required_fields:
    - bypass_packet_id
    - incident_case_ref
    - hotfix_class_ref
    - allowed_scope_ref
    - mutable_surface_ref
    - protected_floor_exception_ref
    - authority_path_ref
    - expiry_at
    - required_witness_set_ref
    - fallback_branch_ref
    - rollback_readiness_ref
    - issued_at
    rules:
    - protected_floor_exception_ref が empty の bypass を protected surface へ適用してはならない。
    - expiry_at を過ぎた bypass を operator memory や cached token で延命してはならない。
    - required_witness_set_ref を欠く bypass は containment を理由にしても canonical mutation として受理してはならない。
  supersession_sunset:
    states:
    - hotfix_open
    - stabilizing
    - supersession_candidate
    - sunset_pending
    - sunset_closed
    - rollback_reentered
    required_evidence:
    - temporary delta witness
    - rollback readiness confirmed
    - superseding policy or explicit rollback path chosen
    - post-incident review due bound
    - carry-over debt disposition attached
    rules:
    - supersession_candidate のまま期限超過した hotfix を canonical baseline と誤認してはならない。
    - sunset_closed へ進むには bypass token 無効化と surviving debt disposition が必須である。
    - rollback_reentered は失敗ではなく lawful branch であり、supersession closed と混同してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - hotfix class registry
      - bypass packet ratification
      - sunset / supersession judgement
      - post-incident review due binding
    GraphEngine:
      owns:
      - bounded bypass surface projection
      - state transition for hotfix lifecycle
      - rollback readiness computation
      - supersession candidate diff generation
    GraphLint:
      owns:
      - illegal protected-floor bypass lint
      - missing sunset binding lint
      - permanent-hotfix drift lint
      - witness-poor hotfix lint
    archive_object:
      owns:
      - bypass packet
      - hotfix delta snapshot
      - sunset packet
      - supersession/rollback audit bundle
  forbidden_shortcuts:
  - incident 中なら approval path なしで protected floor を bypass できるとみなす
  - temporary hotfix を review や supersession なしで恒久 baseline に繰り上げる
  - rollback readiness がないまま risky hotfix を投入する
  - expired bypass token を operator 慣行で再利用する
  residual_open_points: []
scheduler_incident_evidence_triage_governance:
  status: provisional_fixed
  statement: scheduler_incident_evidence_triage_governance とは、incident 発生時の evidence freeze、triage queue、blast-radius classification を固定する規則である。
  core_claims:
  - incident triage の最初の仕事は hotfix ではなく evidence freeze である。volatile telemetry、reservation map、active lease、cross-site digest、operator session の snapshot 順序を固定しなければならない。
  - triage queue は severity だけで決めない。blast radius、protected floor proximity、ongoing mutation count、evidence volatility、external commitment の5軸で priority を決める。
  - blast radius は affected component count のみではない。canonical head 汚染可能性、reservation starvation 拡散、external side effect 連鎖、trust downgrade 波及を含めて分類する。
  - containment は lane 単位で行う。global stop、writer freeze、bounded reader degrade、external echo quarantine の class を分け、過剰停止を防ぎつつ unsafe propagation を止める。
  - scope 誤認は incident 二次被害の主要因である。classification confidence が低いときは aggressive hotfix ではなく escalation / additional freeze を優先する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は incident class binding、freeze ordering、blast-radius computation、triage packet 保存を分担する。
  evidence_freeze_classes:
    volatile_runtime_freeze: メモリ上 telemetry、active heartbeat、ephemeral queue state を優先凍結する。
    control_plane_freeze: leader state、lease table、reservation map、policy hash を凍結する。
    operator_surface_freeze: manual takeover session、screen control、override token を凍結する。
    external_echo_freeze: 外部システムからの echo / receipt / callback を quarantine 付きで凍結する。
  triage_queue:
    priority_axes:
    - blast_radius_class
    - protected_floor_proximity
    - ongoing_mutation_count
    - evidence_volatility_class
    - external_commitment_exposure
    rules:
    - evidence_volatility が最上位なのに freeze を後回しにしてはならない。
    - same root cause の subcase を independent incident として過剰分割してはならない。
    - classification confidence が policy floor 未満なら aggressive containment より escalation を優先しなければならない。
  blast_radius_classes:
    local_lane: 単一 lane または bounded scope に閉じる incident。
    cross_lane: 複数 lane に starvation / reservation 汚染が波及する incident。
    cross_site: site 間 failover や lease transfer を巻き込む incident。
    external_commitment: 外部 effect や対外約束まで汚染しうる incident。
  containment_actions:
    global_stop: system-wide writer stop。最も強い containment。
    writer_freeze: 該当 writer family だけを停止する。
    bounded_reader_degrade: reader を degrade しつつ mutation を抑える。
    external_echo_quarantine: 外部 callback / echo を隔離して同化を止める。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - incident class registry
      - freeze ordering rule
      - triage priority ratification
      - containment choice approval
    GraphEngine:
      owns:
      - freeze sequence execution plan
      - blast-radius propagation graph
      - triage queue materialization
      - classification confidence computation
    GraphLint:
      owns:
      - late-freeze lint
      - scope-overclaim lint
      - triage-priority inversion lint
      - low-confidence aggressive action lint
    archive_object:
      owns:
      - freeze snapshot pack
      - incident triage packet
      - blast-radius witness bundle
      - containment timeline
  forbidden_shortcuts:
  - evidence freeze 前に aggressive hotfix を先行させる
  - incident priority を severity の一軸だけで決める
  - classification confidence が低いのに global stop 相当の判断を silent に通す
  - same root cause の subcase を別事件として扱い triage を歪める
  residual_open_points: []
scheduler_emergency_rollback_reentry_governance:
  status: provisional_fixed
  statement: scheduler_emergency_rollback_reentry_governance とは、emergency rollback lane、compensating patch、state re-entry witness を固定する規則である。
  core_claims:
  - rollback は reverse replay の別名ではない。state_only_rollback、reservation_rollback、policy_pointer_rollback、external_effect_compensation の class を分け、可逆性の違いを明示しなければならない。
  - compensating patch は rollback failure の隠蔽ではない。irreversible external effect、schema drift、foreign acknowledgment 後の state には compensation lane を使い、no-change rollback と混同してはならない。
  - quarantine から通常運用へ戻るには state re-entry witness が必要である。duplicate suppression residue、echo assimilation status、reservation hygiene、temporal normalization を束ねなければならない。
  - rollback lane は hotfix lane より狭い。rollback を理由に新しい speculative mutation や silent repair を混ぜてはならない。
  - re-entry は restored ではなく admissible で判定する。before-state との byte-level 一致ではなく、normative obligation と side effect account が閉じたかで戻す。
  - DecisionLedger / GraphEngine / GraphLint / archive object は rollback class binding、compensation admissibility、re-entry witness、quarantine exit judgement を分担する。
  rollback_classes:
    state_only_rollback: canonical state だけを戻す rollback。外部 effect は含まない。
    reservation_rollback: lease / reservation / queue owner のみを戻す rollback。
    policy_pointer_rollback: policy head / pointer / feature gate を以前の安全点へ戻す rollback。
    external_effect_compensation: 取り消せない外部 effect に対して相殺手段を適用する compensation lane。
  compensation_policy:
    required_fields:
    - compensation_packet_id
    - irreversible_effect_ref
    - compensation_action_ref
    - authority_path_ref
    - deadline_or_freshness_ref
    - external_receipt_expectation_ref
    - followup_owner_ref
    - issued_at
    rules:
    - irreversible_effect_ref が未確定のまま compensation を canonical closure として扱ってはならない。
    - compensation_action_ref は rollback path と独立に評価し、same mutation の別名にしてはならない。
    - external_receipt_expectation_ref がある場合、receipt 未達を closed と誤認してはならない。
  state_reentry_witness:
    required_evidence:
    - duplicate suppression residue resolved or explicitly carried
    - external echo assimilation state bound
    - reservation hygiene confirmed
    - temporal normalization window satisfied
    - quarantine exit owner approved
    states:
    - rollback_open
    - compensation_pending
    - reentry_pending
    - reentry_blocked
    - reentered
    rules:
    - reentry_pending 中に speculative batch を admission してはならない。
    - reentry_blocked は failure ではなく unresolved obligation を示す lawful state である。
    - reentered へ進むには no-hidden-effect / no-hidden-reservation / no-time-anomaly の3条件が必要である。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - rollback class registry
      - compensation packet ratification
      - re-entry witness judgement
      - quarantine exit approval
    GraphEngine:
      owns:
      - rollback lane projection
      - compensation dependency graph
      - re-entry readiness computation
      - quarantine exit state machine
    GraphLint:
      owns:
      - rollback-lane widening lint
      - fake-compensation lint
      - premature-reentry lint
      - hidden-effect carry lint
    archive_object:
      owns:
      - rollback packet
      - compensation packet
      - re-entry witness bundle
      - quarantine exit snapshot
  forbidden_shortcuts:
  - rollback を理由に新しい speculative mutation を混ぜる
  - irreversible external effect を no-change rollback として扱う
  - re-entry witness なしで quarantine を解除する
  - receipt 未達の compensation を closed と見なす
  residual_open_points: []
scheduler_hotfix_divergence_reintegration_governance:
  status: provisional_fixed
  statement: scheduler_hotfix_divergence_reintegration_governance とは、hotfix divergence debt、temporary fork custody、reintegration gate を固定する規則である。
  core_claims:
  - temporary fork は技術的副産物ではなく統治対象である。hotfix-only delta、rollback residue delta、compatibility shim delta、missing review delta を divergence debt class として持たせる。
  - fork custody は branch の所有ではなく obligation の所有である。owner、sunset due、reintegration target、forbidden carry-over、evidence completeness を custody packet に束ねる。
  - reintegration は merge ではなく settlement である。semantic equivalence witness、debt discharge plan、stale dependency review、superseded bypass invalidation を通らない reintegration を許してはならない。
  - temporary fork は放置すると将来の migration と audit を破壊する。stale fork には quarantine、tombstone、forced archival のいずれかを割り当てる。
  - divergence debt は commit count では測れない。baseline との差分が protected floor、external effect、trust downgrade、operator override に与える影響で class 化しなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は divergence debt binding、custody packet、reintegration gate、stale fork disposition を分担する。
  divergence_debt_classes:
    hotfix_only_delta: temporary hotfix にだけ存在し baseline 未反映の差分。
    rollback_residue_delta: rollback / compensation 後に残った補助差分。
    compatibility_shim_delta: 依存系の暫定吸収ロジックに由来する差分。
    missing_review_delta: post-incident review や security/legal review 未完了の差分。
  temporary_fork_custody:
    required_fields:
    - fork_custody_id
    - fork_ref
    - debt_class_set_ref
    - custody_owner_ref
    - sunset_due_at
    - reintegration_target_ref
    - forbidden_carry_over_ref
    - evidence_completeness_ref
    - issued_at
    rules:
    - custody_owner_ref が空の fork を active divergence として残してはならない。
    - forbidden_carry_over_ref を満たさない reintegration proposal を admission してはならない。
    - sunset_due_at を過ぎた stale fork は quarantine / tombstone / forced archival のいずれかへ必ず遷移させる。
  reintegration_gate:
    required_evidence:
    - semantic equivalence or explicit delta acceptance witness
    - debt discharge plan approved
    - stale dependency review completed
    - superseded bypass invalidated
    - review obligations closed or explicitly carried
    states:
    - fork_active
    - reintegration_preparing
    - reintegration_blocked
    - reintegrated
    - tombstoned
    rules:
    - reintegration_preparing 中に debt discharge plan が未承認なら baseline へ merge してはならない。
    - reintegrated へ進むには stale fork token の無効化が必要である。
    - tombstoned fork を evidence linkage なしで purge してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - divergence debt registry
      - fork custody packet
      - reintegration gate judgement
      - stale fork disposition approval
    GraphEngine:
      owns:
      - baseline-vs-fork delta graph
      - semantic equivalence projection
      - gate readiness computation
      - quarantine/tombstone transition
    GraphLint:
      owns:
      - ownerless-fork lint
      - carry-over violation lint
      - premature-reintegration lint
      - orphaned-tombstone lint
    archive_object:
      owns:
      - fork custody packet
      - delta witness bundle
      - reintegration audit bundle
      - tombstone archive
  forbidden_shortcuts:
  - custody owner のない temporary fork を放置する
  - debt discharge plan 未承認のまま baseline に reintegrate する
  - stale fork を tombstone linkage なしで消す
  - semantic equivalence 不明の差分を silent に carry-over する
  residual_open_points: []
scheduler_incident_command_override_governance:
  status: provisional_fixed
  statement: scheduler_incident_command_override_governance とは、incident command quorum、escalation ladder、lawful override attestation を固定する規則である。
  core_claims:
  - incident command は肩書ではなく role bundle である。incident_commander、safety_authority、platform_owner、evidence_custodian、external_commitment_owner を分け、severity ごとに必須 role を定義する。
  - quorum は headcount ではなく authority coverage で見る。protected floor、external commitment、cross-site failover、legal/security exposure の facet を覆う role が揃わなければ override を ratify してはならない。
  - escalation ladder は severity の線形表では足りない。blast radius class、time-to-harm、evidence volatility、override exhaustion を使って next authority path を決める。
  - lawful override は emergency だからこそ packet 化する。reason、requested surface、affected scope、quorum snapshot、expiry、fallback、review due を束ねた attestation を要求する。
  - command handoff は口頭引継ぎでは足りない。active override、pending compensation、unfrozen evidence、external commitment を含む shift packet が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は role/quorum binding、escalation routing、override attestation、handoff lineage を分担する。
  incident_roles:
    incident_commander: 全体判断の主担当。time-to-harm と containment 優先順位を担う。
    safety_authority: protected floor と risk acceptance の正当性を担う。
    platform_owner: scheduler / control plane の技術正本を担う。
    evidence_custodian: freeze / archive / replay witness の正当性を担う。
    external_commitment_owner: 顧客・法務・外部システムとの obligation を担う。
  quorum_rules:
    severity_profiles:
      contained_local:
      - incident_commander
      - platform_owner
      cross_lane_or_cross_site:
      - incident_commander
      - platform_owner
      - evidence_custodian
      protected_floor_or_external_commitment:
      - incident_commander
      - safety_authority
      - platform_owner
      - evidence_custodian
      - external_commitment_owner
    rules:
    - required role coverage を欠く quorum を symbolic majority で代替してはならない。
    - same person が複数 role を兼務しても、dual-control が必要な facet では独立 witness を別に要求する。
    - override exhaustion が policy ceiling を超えた場合は low severity でも上位 authority へ escalation しなければならない。
  override_attestation:
    required_fields:
    - override_attestation_id
    - incident_case_ref
    - reason_ref
    - requested_surface_ref
    - affected_scope_ref
    - quorum_snapshot_ref
    - authority_path_ref
    - expiry_at
    - fallback_branch_ref
    - review_due_at
    - issued_at
    rules:
    - quorum_snapshot_ref が stale な override attestation を再利用してはならない。
    - requested_surface_ref が packet より広い local action を lawful override とみなしてはならない。
    - review_due_at のない override は emergency でも許してはならない。
  escalation_ladder:
    signals:
    - blast_radius_class
    - time_to_harm
    - evidence_volatility
    - override_exhaustion
    - external_commitment_exposure
    rules:
    - time_to_harm が短くても authority coverage 不足を省略してはならない。必要なら narrower surface へ落として先行する。
    - cross-team handoff では active override と pending compensation を省略してはならない。
    - escalation 失敗時は silent continuation ではなく forced_hold へ送る。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - incident role registry
      - quorum coverage rule
      - override attestation ratification
      - handoff acceptance judgement
    GraphEngine:
      owns:
      - authority coverage computation
      - escalation routing graph
      - override surface projection
      - shift handoff packet generation
    GraphLint:
      owns:
      - role-gap quorum lint
      - stale-quorum override lint
      - surface-overreach lint
      - handoff omission lint
    archive_object:
      owns:
      - override attestation
      - quorum snapshot
      - handoff packet
      - escalation timeline bundle
  forbidden_shortcuts:
  - symbolic majority だけで authority coverage 不足を埋める
  - stale quorum snapshot を再利用して override を延命する
  - packet より広い local action を lawful override とみなす
  - cross-team handoff で active override や pending compensation を省略する
  residual_open_points: []
scheduler_post_incident_learning_governance:
  status: provisional_fixed
  statement: scheduler_post_incident_learning_governance とは、post-incident causal graph、preventive control uplift、replay drill obligation を固定する規則である。
  core_claims:
  - post-incident review は blame summary ではなく causal graph で保持する。latent condition、trigger event、amplifier、detection gap、recovery gap、governance gap を分けて結ばなければならない。
  - single root cause は便利だが危険である。control-plane bug、operator workload、threshold miscalibration、evidence freeze delay、authority gap の複合寄与を潰してはならない。
  - preventive control uplift は action item list では足りない。policy uplift、tooling uplift、training uplift、drill uplift の class を分け、効果検証と recertification obligation を付ける。
  - replay drill は optional retrospective ではない。重大 incident class ごとに replay scope、freshness、required participant、success witness を registry 化する。
  - 学習結果は hotfix や override を正当化する免罪符ではない。causal uncertainty が高い場合は uplift を narrower hypothesis として束縛し、baseline rule を silent に書き換えてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は causal graph binding、uplift package、drill obligation、effectiveness review を分担する。
  causal_graph:
    node_classes:
      latent_condition: 平時から存在した脆弱性や capacity debt。
      trigger_event: incident を顕在化させた直接事象。
      amplifier: blast radius や復旧遅延を拡大した要因。
      detection_gap: 観測・アラート・triage の不足。
      recovery_gap: rollback / compensation / reintegration の不足。
      governance_gap: authority / policy / review / training の不足。
    rules:
    - single root cause label に graph を潰してはならない。
    - causal edge には witness source と confidence を付ける。
    - latent condition を trigger と混同して再発防止策を狭めてはならない。
  preventive_uplift:
    classes:
      policy_uplift: threshold、approval、sunset、custody などの規則更新。
      tooling_uplift: GraphEngine / GraphLint / observability / automation の改善。
      training_uplift: role 別訓練、handoff、decision drill の改善。
      drill_uplift: 定期 replay drill や chaos / tabletop の改善。
    rules:
    - uplift proposal には target gap、expected effect、verification horizon、owner、recertification due を束ねる。
    - causal confidence が低い uplift を baseline rule change として即時恒久化してはならない。
    - training_uplift を policy failure の代替にしてはならない。
  replay_drill_obligation:
    required_fields:
    - drill_obligation_id
    - incident_class_ref
    - required_participant_set_ref
    - replay_scope_ref
    - freshness_deadline_ref
    - success_witness_ref
    - recertification_due_at
    - issued_at
    rules:
    - 重大 incident class の replay drill obligation を optional learning memo に落としてはならない。
    - success_witness_ref のない drill 完了を learning closure とみなしてはならない。
    - recertification_due_at を過ぎた uplift を active control と誤認してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - causal graph registry
      - uplift package ratification
      - drill obligation binding
      - effectiveness review judgement
    GraphEngine:
      owns:
      - causal propagation graph materialization
      - uplift-to-control linkage
      - drill scenario generation
      - effectiveness metric computation
    GraphLint:
      owns:
      - single-root-cause collapse lint
      - uncertain-uplift permanence lint
      - missing-success-witness lint
      - expired-recertification lint
    archive_object:
      owns:
      - causal graph bundle
      - uplift package
      - drill execution record
      - effectiveness review archive
  forbidden_shortcuts:
  - single root cause label で causal graph を潰す
  - confidence の低い uplift を baseline rule change として即時恒久化する
  - success witness のない drill 完了を closure とみなす
  - expired recertification の uplift を active control と誤認する
  residual_open_points: []
scheduler_emergency_human_continuity_governance:
  status: provisional_fixed
  statement: scheduler_emergency_human_continuity_governance とは、長時間 incident 中の capability depletion、fatigue budget、shift handover continuity を固定する規則である。
  core_claims:
  - 長期 incident では operator の疲労と認知狭窄を system risk として扱う。個人の善意や根性に委ねず、override 回数、連続拘束時間、sleep debt proxy、peer review 欠落を depletion witness として束ねなければならない。
  - fatigue budget は勤務時間管理の別名ではない。role criticality、protected surface exposure、manual override density、night-hour concentration を加味した risk budget として扱う。
  - shift handover は meeting ではなく lawful continuity packet である。active override、pending compensation、freeze state、unsealed evidence、next decision due を欠いた handover を continuity 完了とみなしてはならない。
  - single heroic operator 依存を許してはならない。同一人に override approval、evidence custody、external commitment まで集中した場合は continuity degradation として escalate しなければならない。
  - handoff loss は communication error ではなく governance failure である。未移管 obligation、期限切れ token、未確認 freeze window を残した shift end は lawful closure を阻害する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は depletion signal binding、fatigue budget projection、handover completeness、continuity audit を分担する。
  depletion_signals:
    override_density: 単位時間あたりの override / emergency bypass / manual takeover 件数。
    continuous_command_duration: 同一 operator または同一小集団が command role を保持し続けた時間。
    peer_independence_loss: 必要な second reviewer / buddy witness が同一疲労帯に偏っている状態。
    sleep_debt_proxy: 休息 window 未達、深夜連続拘束、handover 遅延などから推定する疲労 proxy。
    evidence_attention_gap: evidence review・freeze verification・closure review の未処理累積。
  fatigue_budget:
    required_fields:
    - fatigue_budget_profile_ref
    - role_criticality_ref
    - operator_or_shift_team_ref
    - protected_surface_exposure_ref
    - manual_override_density_ref
    - night_hour_weight_ref
    - max_continuous_command_ref
    - mandatory_relief_trigger_ref
    - issued_at
    rules:
    - fatigue budget を超過した operator に protected-surface override を継続させてはならない。
    - budget 超過後の延長は owner_reason_ref、peer witness、expiry を束ねた temporary exception がなければ許されない。
    - 同一疲労帯の peer を独立 corroboration として再利用してはならない。
  handover_packet:
    required_fields:
    - handover_packet_id
    - from_shift_ref
    - to_shift_ref
    - active_override_set_ref
    - pending_compensation_set_ref
    - open_freeze_window_ref
    - unsealed_evidence_ref
    - next_decision_due_ref
    - external_commitment_ref
    - acknowledgment_ref
    - sealed_at
    rules:
    - acknowledgment_ref のない handover packet を continuity 完了とみなしてはならない。
    - active override と next decision due の両方が未記載なら command continuity を引き継いだことにしてはならない。
    - 未移管 obligation を口頭メモだけで残してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - depletion signal registry
      - fatigue budget ratification
      - handover completeness judgement
      - temporary extension approval
    GraphEngine:
      owns:
      - fatigue budget burn-down projection
      - continuity risk graph
      - handover dependency expansion
      - relief trigger computation
    GraphLint:
      owns:
      - single-hero dependency lint
      - budget-overrun protected override lint
      - incomplete handover lint
      - missing peer-independence lint
    archive_object:
      owns:
      - fatigue budget packet
      - handover packet
      - shift continuity snapshot
      - continuity audit bundle
  forbidden_shortcuts:
  - 長時間 incident を理由に fatigue budget を無期限に無効化する
  - 口頭引継ぎだけで handover 完了とみなす
  - 疲労帯が同じ peer を独立 reviewer として数える
  - single operator 依存を heroic response として正当化する
  residual_open_points: []
scheduler_relief_staffing_governance:
  status: provisional_fixed
  statement: scheduler_relief_staffing_governance とは、relief roster coverage、role substitution、certification freshness を固定する規則である。
  core_claims:
  - relief roster は人員名簿ではなく capability coverage table である。incident role、surface scope、time horizon、independence requirement を束ねなければ roster があっても使えない。
  - role substitution は full replacement だけではない。observation_only、bounded_override、full_command_relief、external_commitment_proxy の class を分け、必要以上の権限を流してはならない。
  - certification freshness は資格の有無だけでなく、last drill、recent incident exposure、schema/profile familiarity、tool version familiarity を含めて判定する。
  - cross-team borrowing は capacity 拡張だが、責任の無主化を起こしやすい。borrowed responder には lending owner、receiving owner、scope cap、sunset を明示しなければならない。
  - substitution gap を local convention で埋めてはならない。freshness floor 未達の responder は scoped downgrade か observer duty に落とし、protected-surface authority を与えてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は relief role binding、freshness computation、substitution ceiling、borrowing witness を分担する。
  relief_roster_classes:
    warm_standby: 即時交代可能な roster。必要な drill と tool familiarity を維持する。
    delayed_relief: 一定セットアップ後に交代可能な roster。handover horizon を長めに要求する。
    borrowed_specialist: 他 team / 他 domain から限定面だけ借りる roster。scope cap を強くかける。
    observer_support: decision support や evidence watching だけを担う roster。command authority は持たない。
  substitution_classes:
    observation_only: 閲覧と助言のみ許す。mutation と override は禁止。
    bounded_override: 限定 scope の override だけ許す。expiry と peer witness が必須。
    full_command_relief: incident commander または command bundle を一時的に引き継ぐ。strict coverage が必要。
    external_commitment_proxy: 外部連絡と obligation translation だけを代行する。internal protected mutation は含まない。
  certification_freshness:
    required_axes:
    - credential_validity
    - last_drill_age
    - recent_incident_exposure
    - profile_or_schema_familiarity
    - tool_version_familiarity
    - protected_surface_history
    rules:
    - credential_validity だけで full_command_relief を許してはならない。
    - tool_version_familiarity が stale の responder を protected-surface substitute にしてはならない。
    - freshness floor 未達なら observer_support または bounded_override へ downgrade しなければならない。
  borrowing_controls:
    required_fields:
    - borrow_packet_id
    - lending_owner_ref
    - receiving_owner_ref
    - substitution_class_ref
    - scope_cap_ref
    - sunset_due_ref
    - freshness_snapshot_ref
    - handover_dependency_ref
    - issued_at
    rules:
    - lending_owner_ref または receiving_owner_ref のない borrowed responder を active command に入れてはならない。
    - scope_cap_ref のない borrowing を emergency necessity で正当化してはならない。
    - sunset_due_ref 超過後の borrowing を暗黙更新してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - relief roster registry
      - substitution class ratification
      - borrowing packet approval
      - freshness floor policy
    GraphEngine:
      owns:
      - coverage gap projection
      - freshness score materialization
      - scope-cap compatibility check
      - relief assignment proposal
    GraphLint:
      owns:
      - stale-certification substitution lint
      - ownerless borrowing lint
      - over-scoped substitute lint
      - implicit escalation-by-borrow lint
    archive_object:
      owns:
      - roster snapshot
      - borrowing packet
      - freshness witness bundle
      - substitution audit trail
  forbidden_shortcuts:
  - 資格があるだけで freshness floor を満たしたことにする
  - borrowed responder に full authority を一括付与する
  - scope cap のない substitution を emergency necessity で通す
  - sunset なしの borrowing を慣行で継続する
  residual_open_points: []
scheduler_handover_continuity_repair_governance:
  status: provisional_fixed
  statement: scheduler_handover_continuity_repair_governance とは、handover packet sealing、continuity checksum、orphaned obligation recovery を固定する規則である。
  core_claims:
  - handover packet は送信しただけでは成立しない。seal digest、receiver acknowledgment、obligation checksum、token transfer state が揃ってはじめて continuity packet として有効である。
  - continuity checksum は document hash ではなく obligation completeness 証明である。active override、pending review due、open freeze、compensation receipt、external commitment、borrowed authority を含めなければならない。
  - orphaned obligation は human error の総称ではなく class を持つ。orphaned_override、orphaned_due_item、orphaned_borrowing、orphaned_evidence_watch、orphaned_external_commitment を分けて recovery lane を変える。
  - recovery は after-the-fact reconciliation だけではない。missing acknowledgment や checksum mismatch の時点で protected-surface lock または escalation を開くべき場合がある。
  - handover repair は silent patch で済ませてはならない。recovered obligation が発見されたなら repair packet と cause class を残し、次 shift の basis を書き換えるときも witness を残さなければならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は continuity checksum binding、orphan detection、repair lane routing、repair audit を分担する。
  continuity_checksum:
    required_items:
    - active_override_set
    - pending_decision_due_set
    - open_freeze_window_set
    - compensation_receipt_wait_set
    - external_commitment_set
    - borrowed_authority_set
    - unsealed_evidence_watch_set
    rules:
    - required_items のいずれかが unknown のまま handover_complete を宣言してはならない。
    - checksum mismatch を cosmetic mismatch として握りつぶしてはならない。
    - borrowed_authority_set の transfer 状態が不明なまま shift close をしてはならない。
  orphan_classes:
    orphaned_override: active override owner が存在しない状態。
    orphaned_due_item: next decision due や review due の owner が欠落した状態。
    orphaned_borrowing: borrowed responder の lending / receiving owner が片方欠落した状態。
    orphaned_evidence_watch: freeze / evidence watch の監視主体が途切れた状態。
    orphaned_external_commitment: 顧客・法務・外部システム obligation の follow-up owner が欠落した状態。
  repair_lanes:
    immediate_lock: protected-surface mutation を一時停止し owner recovery を先行させる。
    priority_rebind: 不足 owner を優先再割当し continuity basis を補正する。
    escalated_gap: 同一 shift で repair 不可能なため command escalation に送る。
    historical_repair: 既に影響が閉じた obligation を audit lane で修復する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - checksum schema
      - orphan class registry
      - repair packet ratification
      - rebind approval
    GraphEngine:
      owns:
      - obligation expansion graph
      - checksum materialization
      - orphan detection
      - repair lane recommendation
    GraphLint:
      owns:
      - false-complete handover lint
      - hidden orphan lint
      - silent repair lint
      - borrow-transfer mismatch lint
    archive_object:
      owns:
      - sealed handover packet
      - checksum witness bundle
      - repair packet
      - continuity failure audit trail
  forbidden_shortcuts:
  - receiver acknowledgment なしで handover_complete を宣言する
  - checksum mismatch を軽微差分として黙殺する
  - orphaned override を shift 慣行で放置する
  - repair packet なしで continuity basis を書き換える
  residual_open_points: []
scheduler_fatigue_failsafe_governance:
  status: provisional_fixed
  statement: scheduler_fatigue_failsafe_governance とは、fatigue-triggered override cooldown、protected-surface lockout、dual-control recovery を固定する規則である。
  core_claims:
  - fatigue signal と continuity failure は monitoring event で終わらせてはならない。protected surface に対しては lockout or downgrade の fail-safe branch を自動で開けるようにしなければならない。
  - lockout は全停止の別名ではない。override_lockout、new_bypass_lockout、evidence_custody_lockout、external_commitment_lockout の class を分け、危険面だけを先に閉じる。
  - cooldown は単なる待機時間ではない。fresh peer の参加、open obligation の再割当、fatigue indicator の改善、handover checksum 整合を揃えなければ reentry を許してはならない。
  - dual-control recovery は second approver を追加すれば終わりではない。fresh peer independence、shared fatigue exclusion、surface-specific witness を要求する。
  - lockout 解除は operator 自己申告に依存してはならない。DecisionLedger 上の release owner と archive 上の recovery witness が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は fatigue fail-safe class binding、lockout projection、dual-control recovery gate、release audit を分担する。
  lockout_classes:
    override_lockout: new override / emergency bypass の発行を止める。
    new_bypass_lockout: temporary bypass token の発行と延長を止める。
    evidence_custody_lockout: single fatigued operator による evidence unseal / reclassify を止める。
    external_commitment_lockout: 外部向け irreversible commitment の単独発行を止める。
  cooldown_requirements:
    required_evidence:
    - fresh_peer_joined
    - shared_fatigue_slice_excluded
    - open_obligation_rebound
    - handover_checksum_clean
    - fatigue_indicator_below_release_floor
    - release_owner_ref
    rules:
    - fresh_peer_joined が false のまま protected-surface lockout を解除してはならない。
    - fatigue_indicator が改善しても open_obligation_rebound が未完了なら cooldown を clear してはならない。
    - release_owner_ref のない解除を temporary kindness として許してはならない。
  dual_control_recovery:
    states:
    - single_operator_risk
    - lockout_active
    - cooldown_pending
    - dual_control_reentry_pending
    - dual_control_restored
    rules:
    - dual_control_reentry_pending 中に same-fatigue peer だけで corroboration を構成してはならない。
    - dual_control_restored へ進むには surface-specific second witness が必要である。
    - single_operator_risk を informal buddy arrangement で closed とみなしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - lockout class registry
      - cooldown release approval
      - dual-control recovery judgement
      - protected-surface release owner binding
    GraphEngine:
      owns:
      - surface-specific lockout projection
      - cooldown readiness computation
      - fresh-peer independence check
      - recovery state machine
    GraphLint:
      owns:
      - premature-unlock lint
      - same-fatigue dual-control lint
      - self-attested recovery lint
      - partial-lockout leakage lint
    archive_object:
      owns:
      - lockout packet
      - cooldown witness bundle
      - dual-control recovery packet
      - release audit snapshot
  forbidden_shortcuts:
  - fatigue signal を advisory 扱いのまま protected override を継続する
  - 自己申告だけで lockout を解除する
  - same-fatigue peer を second approver に置いて dual-control restored とみなす
  - cooldown 中に new bypass token を再発行する
  residual_open_points: []
scheduler_owner_loss_failover_governance:
  status: provisional_fixed
  statement: scheduler_owner_loss_failover_governance とは、command vacancy succession、deadman escalation、missing-owner freeze を固定する規則である。
  core_claims:
  - owner 不在は単なる勤務穴ではない。incident commander、evidence custodian、external commitment owner、borrowing owner の vacancy class を分け、surface ごとに succession path を持たせなければならない。
  - deadman escalation は監視 ping の timeout だけで済ませてはならない。last acknowledgment、pending due criticality、active override presence、protected surface exposure を束ねて escalation を決める。
  - missing-owner freeze は fail-safe であり punishment ではない。owner 不在の間に protected mutation、new external commitment、evidence unseal が続かないよう surface-specific freeze を開く。
  - succession は最も近い肩書への丸投げではない。coverage、freshness、fatigue slice、current obligation load を満たした successor だけを lawful successor とする。
  - vacancy recovery は事後補記で済ませてはならない。who lost, when frozen, who succeeded, what remained blocked を packet として残さなければ audit 不能になる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は vacancy class binding、deadman timer evaluation、freeze projection、succession audit を分担する。
  vacancy_classes:
    command_vacancy: incident commander または command quorum の欠落。
    custody_vacancy: evidence custodian / freeze owner の欠落。
    external_commitment_vacancy: 顧客・法務・外部 obligation owner の欠落。
    borrowing_owner_vacancy: cross-team borrowing の lending / receiving owner の欠落。
  deadman_policy:
    required_fields:
    - deadman_policy_id
    - owner_role_ref
    - expected_ack_interval_ref
    - active_override_presence_ref
    - pending_due_criticality_ref
    - protected_surface_exposure_ref
    - vacancy_freeze_class_ref
    - succession_path_ref
    - issued_at
    rules:
    - expected_ack_interval 超過かつ active_override_presence がある場合、deadman escalation を silent に遅延してはならない。
    - pending_due_criticality が high の vacancy を next shift まで放置してはならない。
    - succession_path_ref のない deadman policy を protected surface に適用してはならない。
  freeze_and_succession:
    freeze_classes:
    - command_freeze
    - evidence_freeze
    - external_commitment_freeze
    - borrowing_freeze
    succession_states:
    - owner_missing_suspected
    - owner_missing_confirmed
    - freeze_active
    - successor_pending
    - successor_bound
    - escalated_gap
    rules:
    - owner_missing_confirmed のまま successor_pending を飛ばして mutation を再開してはならない。
    - successor_bound へ進むには freshness と fatigue exclusion の両方が必要である。
    - escalated_gap は failure ではなく no-lawful-successor 状態を示す。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - vacancy class registry
      - deadman policy ratification
      - succession judgement
      - freeze release approval
    GraphEngine:
      owns:
      - owner heartbeat evaluation
      - deadman escalation computation
      - surface-specific freeze projection
      - successor candidate graph
    GraphLint:
      owns:
      - missing-owner silent-run lint
      - ownerless protected mutation lint
      - unqualified succession lint
      - vacancy packet omission lint
    archive_object:
      owns:
      - vacancy packet
      - deadman escalation log
      - freeze / succession audit bundle
      - blocked-obligation snapshot
  forbidden_shortcuts:
  - owner 不在を informal代理 で黙って埋める
  - deadman timeout を見ても protected mutation を継続する
  - freshness / fatigue exclusion 未確認の successor を bind する
  - freeze / succession packet を残さず後から補記する
  residual_open_points: []
scheduler_peer_challenge_governance:
  status: provisional_fixed
  statement: scheduler_peer_challenge_governance とは、peer corroboration buddy-check、impairment dissent、contested override suspension を固定する規則である。
  core_claims:
  - buddy-check は仲良し確認ではなく protected surface の safety interlock である。high-risk override、evidence unseal、external irreversible commitment では mandatory peer corroboration を要求する。
  - impairment suspicion は人格攻撃として処理してはならない。fatigue indicator、speech / action incoherence、checksum neglect、unsafe override insistence などの challenge trigger を packet 化して扱う。
  - contested override は単なる disagreement ではない。surface criticality が高い場合は dispute 解消前に temporary suspension を開き、freeze / alternate approver / escalation のいずれかに送る。
  - dissent を sabotage と誤認して抑圧してはならない。lawful dissent には reason_code、observed signal、requested surface hold、alternate review path を与える。
  - buddy witness の独立性は名簿上の別人では足りない。same fatigue slice、same command dependency、same token custody を除外しなければ corroboration にならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は challenge trigger binding、temporary suspension routing、alternate reviewer selection、peer challenge audit を分担する。
  buddy_check_classes:
    mandatory_high_risk_override: high-risk override 前に peer corroboration を要求する。
    mandatory_evidence_unseal: sensitive evidence unseal / reclassify 前に peer corroboration を要求する。
    mandatory_external_commitment: irreversible external commitment 前に peer corroboration を要求する。
    advisory_low_risk_review: 低リスク面では advisory buddy-check に留める。
  challenge_triggers:
    fatigue_or_impairment_signal: fatigue budget 超過、sleep debt proxy 悪化、行動 incoherence など。
    checksum_neglect_pattern: handover / obligation checksum を繰り返し無視する。
    unsafe_override_push: low-confidence かつ high-risk override を強行しようとする。
    peer_independence_collapse: 必要な second witness が同一依存帯に潰れた状態。
  contested_override_policy:
    temporary_suspension_actions:
    - surface_hold
    - alternate_approver_required
    - command_escalation
    - evidence_freeze_extension
    required_fields:
    - challenge_packet_id
    - challenged_surface_ref
    - trigger_ref
    - requested_hold_ref
    - alternate_review_path_ref
    - challenge_owner_ref
    - expiry_ref
    - issued_at
    rules:
    - high-risk contested override を dispute 解消前に実行してはならない。
    - requested_hold_ref のない challenge を sabotage 扱いで無効化してはならない。
    - alternate_review_path_ref のない temporary suspension を無期限化してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - buddy-check policy
      - challenge trigger registry
      - temporary suspension approval
      - alternate review path binding
    GraphEngine:
      owns:
      - independence check
      - challenge severity routing
      - alternate reviewer search
      - suspension state machine
    GraphLint:
      owns:
      - same-dependency buddy lint
      - suppressed-dissent lint
      - premature contested-execution lint
      - challenge-packet omission lint
    archive_object:
      owns:
      - challenge packet
      - buddy corroboration witness
      - temporary suspension audit bundle
      - alternate review trace
  forbidden_shortcuts:
  - buddy-check を名簿上の別人確認だけで済ませる
  - impairment suspicion を人格問題として握りつぶす
  - high-risk contested override を dispute 解消前に実行する
  - lawful dissent を sabotage 扱いして packet 化しない
  residual_open_points: []
scheduler_post_incident_staffing_recovery_governance:
  status: provisional_fixed
  statement: scheduler_post_incident_staffing_recovery_governance とは、prolonged-incident staffing horizon、rest debt settlement、recovery-readiness release を固定する規則である。
  core_claims:
  - 長期 incident では staffing を場当たりで延長してはならない。0-12h、12-36h、36-72h、72h超の horizon tier ごとに required role bundle、planned relief wave、borrowed capacity 上限を registry 化しなければならない。
  - rest debt は勤務時間の超過量だけではない。night concentration、protected-surface override 密度、handover failure exposure、peer challenge 介入回数を含む recovery debt として扱う。
  - incident 終息直後に nominal readiness を宣言してはならない。watchfloor、open compensation、residual freeze、external commitment follow-up を残したまま通常復帰するのは continuity 再破綻を招く。
  - recovery-readiness release は疲労回復の自己申告ではなく、rest debt settlement、coverage reconstitution、watchfloor stability、obligation rebound の完了によってのみ許される。
  - planned relief wave を持たない prolonged incident は lawful continuity を満たしにくい。shift 境界と role bundle 境界を分け、誰をいつ relief するかを decision basis に含めるべきである。
  - DecisionLedger / GraphEngine / GraphLint / archive object は staffing horizon tier binding、rest debt ledger、watchfloor release judgement、post-incident staffing recovery audit を分担する。
  staffing_horizon_tiers:
    tactical_0_12h: 既存 primary roster で耐える区間。mandatory relief plan を事前に束縛する。
    extended_12_36h: planned relief wave が必須の区間。single-hero dependency を禁止する。
    sustained_36_72h: borrowed capacity と degraded noncritical work suspension を前提に coverage を組み直す区間。
    campaign_72h_plus: portfolio レベルの reserve 再配分と mutual-aid escalation を検討する区間。
  rest_debt_settlement:
    required_fields:
    - rest_debt_packet_id
    - operator_or_shift_group_ref
    - staffing_horizon_tier_ref
    - sleep_debt_proxy_ref
    - night_load_ref
    - protected_override_density_ref
    - continuity_break_ref
    - minimum_recovery_window_ref
    - compensating_relief_ref
    - settlement_due_ref
    - issued_at
    rules:
    - rest debt packet のない prolonged incident close を nominal recovery とみなしてはならない。
    - minimum_recovery_window_ref を満たさない operator を protected-surface release の quorum に含めてはならない。
    - compensating_relief_ref のない debt carryover を慣行で次シフトへ繰り越してはならない。
  recovery_readiness_release:
    required_evidence:
    - watchfloor_state_ref
    - coverage_reconstitution_ref
    - open_obligation_rebound_ref
    - rest_debt_settlement_ref
    - external_followup_clear_ref
    - release_owner_ref
    - release_timebox_ref
    rules:
    - watchfloor_state_ref が unstable のまま recovery-readiness release を宣言してはならない。
    - release_owner_ref のない復帰宣言を morale recovery として扱ってはならない。
    - external_followup_clear_ref が false のまま nominal readiness に戻してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - staffing horizon tier registry
      - rest debt packet ratification
      - release owner binding
      - post-incident readiness judgement
    GraphEngine:
      owns:
      - relief wave projection
      - rest debt burn-down computation
      - coverage reconstitution check
      - watchfloor stability computation
    GraphLint:
      owns:
      - heroic-carryover lint
      - unsettled-rest-debt release lint
      - missing-release-owner lint
      - false-nominal-readiness lint
    archive_object:
      owns:
      - rest debt packet
      - relief wave snapshot
      - recovery release witness bundle
      - post-incident staffing audit trail
  forbidden_shortcuts:
  - incident 終息直後に watchfloor なしで通常運用へ戻す
  - rest debt を善意で自然解消する前提にする
  - planned relief wave なしで prolonged incident を延長する
  - release owner 不在のまま readiness 復帰を宣言する
  residual_open_points: []
scheduler_watchfloor_rebound_governance:
  status: provisional_fixed
  statement: scheduler_watchfloor_rebound_governance とは、watchfloor downgrade ladder、relapse trigger、readiness rebound を固定する規則である。
  core_claims:
  - watchfloor は on/off の二値では足りない。high_watch、guarded_watch、limited_watch、nominal_monitor の段階を持たせ、段階ごとに required reviewer density と escalation speed を変えるべきである。
  - rebound は経過時間だけで判定してはならない。stability window、residual incident signal、deferred fix backlog、external inquiry pressure を束ねて評価する。
  - relapse trigger は再発そのものだけではない。same-surface anomaly 再出現、customer re-open、checksum drift、fatigue rebound、suppressed follow-up を trigger family として registry 化する。
  - watchfloor downgrade は成功物語の演出ではない。各 downgrade step は rollback 可能でなければならず、trigger が再発したら即座に上位 stage へ戻す。
  - nominal monitor へ移るには、監視頻度を下げても detection latency が許容範囲に収まる根拠が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は watchfloor stage binding、relapse trigger registry、rebound threshold judgement、downgrade audit を分担する。
  watchfloor_stages:
    high_watch: incident 直後の最大監視。protected surface 変更と follow-up を高頻度で再確認する。
    guarded_watch: critical signal は継続監視しつつ、review cadence をやや緩める段階。
    limited_watch: 主要 signal だけを対象にした限定監視。relapse trigger のみ即時 escalation する。
    nominal_monitor: 平時監視へ近い段階。ただし recent incident lineage は保持する。
  relapse_triggers:
    same_surface_reopen: 同一 protected surface に related anomaly / override / freeze が再発した状態。
    external_reopen_pressure: 顧客・法務・外部 regulator から follow-up や reopen が発生した状態。
    checksum_drift_return: handover checksum や continuity checksum の新たな drift が発見された状態。
    fatigue_rebound: 主要 role の疲労指標が回復前に再上昇した状態。
    suppressed_followup: 予定された compensating follow-up が未実施または形式化だけで終わった状態。
  rebound_rules:
    required_fields:
    - watchfloor_stage_ref
    - stability_window_ref
    - trigger_family_ref
    - detection_latency_budget_ref
    - rollback_stage_ref
    - downgrade_owner_ref
    - ratified_at
    rules:
    - downgrade_owner_ref のない stage 変更を自然減衰として処理してはならない。
    - limited_watch へ下げる前に same_surface_reopen と checksum_drift_return の latency budget を確認しなければならない。
    - relapse trigger が発火したのに rollback_stage_ref へ戻さない downgrade は無効である。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - watchfloor stage registry
      - relapse trigger ratification
      - downgrade owner binding
      - rebound threshold judgement
    GraphEngine:
      owns:
      - stage transition graph
      - relapse trigger materialization
      - detection latency simulation
      - rollback stage recommendation
    GraphLint:
      owns:
      - ownerless downgrade lint
      - ignored-relapse lint
      - latency-budget omission lint
      - non-reversible stage change lint
    archive_object:
      owns:
      - watchfloor transition packet
      - relapse trigger evidence bundle
      - downgrade audit snapshot
      - rebound review trail
  forbidden_shortcuts:
  - watchfloor を time-based timer だけで一気に nominal へ落とす
  - relapse trigger を anecdotal note で済ませる
  - rollback stage を持たない downgrade を許可する
  - detection latency 根拠なしに monitoring cadence を下げる
  residual_open_points: []
scheduler_recovery_debt_closure_governance:
  status: provisional_fixed
  statement: scheduler_recovery_debt_closure_governance とは、deferred maintenance backlog、compensating follow-up、recovery debt closure を固定する規則である。
  core_claims:
  - incident 中に後回しにした項目は雑多な backlog ではない。maintenance debt、documentation debt、control-tuning debt、training debt、compliance debt を分けて closure rule を変えるべきである。
  - compensating follow-up は単なる TODO ではない。debt class ごとに due horizon、owner quorum、evidence of closure、reopen trigger を束ねた packet として管理しなければならない。
  - recovery debt は運用継続と将来 readiness の両方を侵食する。high-critical debt が残る間は nominal readiness を宣言しても reserve quality が毀損する。
  - closure は作業完了申告だけでなく、risk retired、evidence attached、watchfloor impact cleared の3条件を必要とする。
  - 複数 debt を同一 owner に押し込むと second failure を生みやすい。debt closure には staffing and fatigue impact の再計算が必要である。
  - DecisionLedger / GraphEngine / GraphLint / archive object は recovery debt class binding、follow-up packet、closure witness、backlog risk audit を分担する。
  recovery_debt_classes:
    maintenance_debt: 保守・再設定・恒久修正の先送り。
    documentation_debt: handover、runbook、decision rationale の未整備。
    control_tuning_debt: threshold、rule、lint、automation の暫定調整の本修正未完了。
    training_debt: drill、briefing、skill refresh の未実施。
    compliance_debt: 顧客報告、規制説明、監査追補の未完了。
  compensating_followup_packet:
    required_fields:
    - followup_packet_id
    - debt_class_ref
    - risk_rank_ref
    - closure_owner_ref
    - secondary_reviewer_ref
    - due_horizon_ref
    - closure_evidence_ref
    - watchfloor_impact_ref
    - reopen_trigger_ref
    - issued_at
    rules:
    - closure_owner_ref のない follow-up を team awareness で代用してはならない。
    - risk_rank_ref が high の debt を due_horizon_ref なしで backlog に沈めてはならない。
    - closure_evidence_ref のない completion を debt retired とみなしてはならない。
  closure_conditions:
    required_tests:
    - risk_retired_ref
    - evidence_attached_ref
    - watchfloor_impact_cleared_ref
    - staffing_impact_recomputed_ref
    rules:
    - training_debt は attendance だけで closed とみなしてはならない。freshness 反映が必要である。
    - control_tuning_debt は temporary patch のまま閉じてはならない。ratified setting が必要である。
    - watchfloor_impact_cleared_ref が false の debt を nominal readiness 後回しとして閉じてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recovery debt registry
      - follow-up packet ratification
      - closure condition judgement
      - debt priority policy
    GraphEngine:
      owns:
      - backlog dependency expansion
      - staffing impact recomputation
      - closure evidence completeness check
      - debt burn-down projection
    GraphLint:
      owns:
      - ownerless follow-up lint
      - evidence-free closure lint
      - high-risk backlog burial lint
      - training-debt false-closure lint
    archive_object:
      owns:
      - follow-up packet
      - closure witness bundle
      - backlog audit snapshot
      - debt retirement trail
  forbidden_shortcuts:
  - incident backlog を 1つの TODO リストで済ませる
  - closure evidence なしで debt retired を宣言する
  - training debt を出席記録だけで完了扱いにする
  - high-risk debt を due horizon なしで backlog に沈める
  residual_open_points: []
scheduler_surge_staffing_provenance_governance:
  status: provisional_fixed
  statement: scheduler_surge_staffing_provenance_governance とは、surge staffing provenance、vendor-borrowed authority、access sunset を固定する規則である。
  core_claims:
  - surge staffing は人数補充ではなく provenance 付き capability 注入である。internal borrow、affiliate support、vendor specialist、mutual aid を source class として分けるべきである。
  - 外部または借用人員に与える authority は permanent role ではない。sponsor owner、scope cap、protected-surface exclusion、sunset を packet 化しなければならない。
  - vendor specialist は便利でも decision ownership を代替しない。evidence handling、tool access、mutation authority、external communication の境界を明示しなければ責任が霧散する。
  - access sunset は incident close と同義ではない。recovery watchfloor 中の継続 access を認める場合も、timebox と reseal 条件が必要である。
  - borrowed authority は source provenance を残さないと audit 不能である。who sponsored, why admitted, what excluded, when revoked を一体で残す必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は surge source registry、borrowed authority packet、sunset / revoke judgement、provenance audit を分担する。
  surge_source_classes:
    internal_borrow: 同一組織内の他 team から一時借用する source。
    affiliate_support: 関連組織・子会社などの近接系から支援を受ける source。
    vendor_specialist: 外部ベンダや委託先の専門要員を限定投入する source。
    mutual_aid: 異常時の相互支援協定に基づく source。
  borrowed_authority_packet:
    required_fields:
    - borrowed_authority_packet_id
    - surge_source_class_ref
    - sponsor_owner_ref
    - receiving_owner_ref
    - capability_scope_ref
    - protected_surface_exclusion_ref
    - tool_access_ref
    - external_comm_boundary_ref
    - sunset_due_ref
    - revoke_path_ref
    - issued_at
    rules:
    - sponsor_owner_ref のない vendor authority を emergency necessity で通してはならない。
    - protected_surface_exclusion_ref が空の borrowed authority を既定許可としてはならない。
    - sunset_due_ref 超過後の access を tacit extension してはならない。
  access_sunset:
    required_evidence:
    - revocation_owner_ref
    - access_reseal_ref
    - residual_artifact_check_ref
    - handover_or_archive_ref
    - sunset_effective_at
    rules:
    - residual_artifact_check_ref のない sunset を complete とみなしてはならない。
    - tool_access_ref を剥奪しても handover_or_archive_ref がなければ provenance close は未完了である。
    - recovery watchfloor 中の延長 access は新しい packet として再束縛しなければならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - surge source registry
      - borrowed authority ratification
      - sunset approval
      - sponsor accountability binding
    GraphEngine:
      owns:
      - capability-source compatibility check
      - access sunset projection
      - residual artifact scan routing
      - revoke path recommendation
    GraphLint:
      owns:
      - ownerless vendor authority lint
      - missing-exclusion lint
      - sunset-overrun lint
      - unsealed-residual-access lint
    archive_object:
      owns:
      - borrowed authority packet
      - source provenance bundle
      - sunset witness packet
      - revocation audit trail
  forbidden_shortcuts:
  - vendor specialist に sponsor owner なしで authority を与える
  - protected-surface exclusion なしの borrowed authority を既定化する
  - sunset 超過 access を tacit extension する
  - revocation 後の residual artifact を未確認のまま close する
  residual_open_points: []
scheduler_readiness_reserve_protection_governance:
  status: provisional_fixed
  statement: scheduler_readiness_reserve_protection_governance とは、reserve capacity floor、preemptive throttling、admission shedding を固定する規則である。
  core_claims:
  - reserve capacity は余り人員ではない。incident readiness を支える protected reserve として role bundle、time horizon、criticality ごとに floor を持つべきである。
  - recovery 期に全 backlog と通常業務を一斉再開してはならない。reserve floor を侵食する前に preemptive throttling を開く必要がある。
  - admission shedding は失敗ではなく future failure 防止策である。criticality、external obligation、recovery debt、surge usage を踏まえて後回しにする仕事を lawful に選ぶべきである。
  - reserve burn を invisible にしてはならない。planned work、training catch-up、compliance follow-up も reserve を消費するので同じ budget 面で見る必要がある。
  - reserve floor は nominal 時に戻して終わりではない。watchfloor 中は stricter reserve floor を要求し、回復段階に応じて only ratified に緩和すべきである。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve floor registry、burn-rate projection、throttling / shedding judgement、reserve audit を分担する。
  reserve_floor_profiles:
    incident_guarded_floor: watchfloor 中に維持すべき最小 reserve。protected role bundle の余力を厚く持つ。
    recovery_floor: post-incident recovery 期の floor。debt closure と訓練復帰を考慮する。
    nominal_floor: 平時の minimum reserve。通常変動を吸収できる最低線。
  throttling_and_shedding:
    required_fields:
    - reserve_floor_profile_ref
    - current_burn_rate_ref
    - critical_role_gap_ref
    - planned_work_load_ref
    - shedding_candidate_set_ref
    - throttling_owner_ref
    - issued_at
    rules:
    - critical_role_gap_ref が floor を下回るのに throttling_owner_ref なしで現場裁量へ委ねてはならない。
    - shedding_candidate_set_ref を持たずに admission shedding を ad hoc に行ってはならない。
    - training catch-up を reserve 無消費扱いしてはならない。
  shedding_order_principles:
    rules:
    - protected-surface readiness を削る仕事よりも、低 criticality の planned work を先に抑制する。
    - external irreversible commitment を伴う仕事を shed する場合は owner と escalation path を束縛する。
    - reserve floor violation を看過して nominal throughput を維持してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reserve floor policy
      - throttling approval
      - shedding order ratification
      - critical-role reserve binding
    GraphEngine:
      owns:
      - reserve burn-rate projection
      - gap-to-floor computation
      - candidate shedding ranking
      - recovery-stage floor transition computation
    GraphLint:
      owns:
      - invisible reserve burn lint
      - ownerless throttling lint
      - ad-hoc shedding lint
      - floor-violation throughput lint
    archive_object:
      owns:
      - reserve floor snapshot
      - throttling packet
      - shedding decision packet
      - reserve audit trail
  forbidden_shortcuts:
  - reserve capacity を余剰人員として使い切る
  - shedding candidate を持たずに場当たりで仕事を止める
  - training catch-up を reserve 無消費扱いにする
  - floor violation を無視して throughput を維持する
  residual_open_points: []
scheduler_recovery_policy_closure_governance:
  status: provisional_fixed
  statement: scheduler_recovery_policy_closure_governance とは、recovery policy recalibration、drill debt retirement、closure criteria を固定する規則である。
  core_claims:
  - post-incident review は感想会ではない。threshold、roster rule、reserve floor、handover schema、peer challenge rule のうち何を変更するかを policy recalibration packet として束ねるべきである。
  - drill debt は training debt の一部だが、制度改修を定着させるための special debt である。新ルールが drill されず operational freshness に反映されないなら closure は早すぎる。
  - closure criteria は事実上の改善完了判定であり、rule ratified、tooling reflected、drill retired、audit closed の4条件を揃える必要がある。
  - policy recalibration は incident 依存の過剰反応でも不足反応でもいけない。change scope、blast radius、rollback path、owner forum を明示して ratify すべきである。
  - postmortem を永久に開きっぱなしにしても能力は上がらない。closure criteria を満たしたら close し、残課題は別の policy backlog へ正しく移送する必要がある。
  - DecisionLedger / GraphEngine / GraphLint / archive object は recalibration packet、drill retirement evidence、closure judgement、policy carryover audit を分担する。
  policy_recalibration_packet:
    required_fields:
    - recalibration_packet_id
    - rule_family_ref
    - change_scope_ref
    - blast_radius_ref
    - rollback_path_ref
    - owner_forum_ref
    - ratification_due_ref
    - tool_reflection_ref
    - issued_at
    rules:
    - blast_radius_ref のない policy change を local lesson learned で済ませてはならない。
    - tool_reflection_ref が false のまま ratified policy を closure 済みにしてはならない。
    - rollback_path_ref のない large-scope retune を一気に本番化してはならない。
  drill_debt_retirement:
    required_fields:
    - drill_debt_id
    - affected_rule_family_ref
    - required_participant_ref
    - scenario_class_ref
    - freshness_update_ref
    - retired_at_or_null
    rules:
    - required_participant_ref が揃わない drill を retirement とみなしてはならない。
    - freshness_update_ref のない drill 完了を roster へ反映してはならない。
    - scenario_class_ref を省略した generic drill だけで targeted closure を宣言してはならない。
  closure_criteria:
    required_tests:
    - policy_ratified_ref
    - tooling_reflected_ref
    - drill_debt_retired_ref
    - audit_closed_ref
    - carryover_backlog_rerouted_ref
    rules:
    - policy_ratified_ref だけで closure を宣言してはならない。
    - carryover_backlog_rerouted_ref が false のまま unresolved item を消してはならない。
    - audit_closed_ref のない close は institutional memory を欠落させる。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recalibration packet ratification
      - closure criteria judgement
      - owner forum binding
      - policy carryover routing
    GraphEngine:
      owns:
      - blast radius graph
      - tool reflection dependency expansion
      - drill coverage computation
      - closure readiness recommendation
    GraphLint:
      owns:
      - ratified-but-unreflected policy lint
      - false drill retirement lint
      - premature closure lint
      - carryover-drop lint
    archive_object:
      owns:
      - recalibration packet
      - drill evidence bundle
      - closure witness packet
      - policy carryover audit trail
  forbidden_shortcuts:
  - ratified policy を tooling 反映前に closure 済みにする
  - generic drill だけで targeted rule closure を宣言する
  - carryover backlog を reroute せずに unresolved item を消す
  - postmortem を無期限 open のまま正本運用する
  residual_open_points: []
scheduler_portfolio_reserve_arbitration_governance:
  status: provisional_fixed
  statement: scheduler_portfolio_reserve_arbitration_governance とは、multi-incident reserve arbitration、mutual-aid escalation、portfolio readiness allocation を固定する規則である。
  core_claims:
  - 複数 incident が同時に reserve を要求する局面では、先着順や声の大きさで allocation を決めてはならない。reserve request packet と portfolio priority basis に基づく arbitration unit を正本化しなければならない。
  - mutual-aid escalation は善意の横流しではない。depletion horizon、blast radius、protected-surface exposure、borrowed capacity 残量を条件として開く統治分岐である。
  - portfolio readiness allocation は受援側だけでなく donor 側の readiness floor も同時に守らなければならない。支援によって donor 側の critical service が collapse する allocation は admissible ではない。
  - multi-incident arbitration では role bundle、time horizon、regulatory exposure、rollback feasibility、customer commitment を同じ request packet に束ねるべきである。単なる headcount 需要だけでは portfolio judgement にならない。
  - reserve を割り当てた後も starvation residue を監視し、temporary allocation を evergreen 化してはならない。portfolio allocation は review window と reroute path を必須とする。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve request registry、arbitration score computation、allocation rule lint、portfolio readiness audit trail を分担する。
  reserve_request_packet:
    required_fields:
    - reserve_request_packet_id
    - requesting_incident_ref
    - requesting_team_ref
    - required_role_bundle_ref
    - depletion_horizon_ref
    - blast_radius_ref
    - protected_surface_exposure_ref
    - customer_commitment_ref
    - minimum_effective_capacity_ref
    - latest_arrival_deadline_ref
    - rollback_feasibility_ref
    - issued_at
    rules:
    - required_role_bundle_ref を generic reserve headcount で置換してはならない。
    - depletion_horizon_ref と latest_arrival_deadline_ref のない request を emergency priority として扱ってはならない。
    - rollback_feasibility_ref が unknown のまま irreversible allocation を通してはならない。
  arbitration_policy:
    precedence_axes:
    - protected-surface exposure
    - depletion horizon urgency
    - customer or regulatory commitment criticality
    - borrowed capacity substitutability
    - rollback feasibility and reroute cost
    rules:
    - 同一 precedence tier では donor starvation risk が低い option を優先する。
    - 同点時は review window が短い temporary allocation を優先し、evergreen lending を避ける。
    - portfolio owner 不在の裁定を informal consensus で確定してはならない。
  mutual_aid_escalation:
    triggers:
    - local reserve が ratified floor を下回る見込みになった
    - 同時 incident により single-team substitution では protected surface を守れない
    - borrowed capacity の access sunset が horizon 内に到来する
    - customer or regulator impact が single-team authority を超える
    required_bindings:
    - donor_readiness_floor_ref
    - aid_duration_cap_ref
    - receiver_exit_plan_ref
    - portfolio_owner_ref
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reserve request packet registry
      - portfolio precedence ratification
      - mutual-aid escalation approval
      - allocation review window binding
    GraphEngine:
      owns:
      - arbitration score computation
      - donor starvation projection
      - arrival deadline feasibility check
      - portfolio readiness simulation
    GraphLint:
      owns:
      - ownerless arbitration lint
      - deadline-free emergency request lint
      - donor-floor violation lint
      - evergreen temporary aid lint
    archive_object:
      owns:
      - reserve request packet
      - arbitration evidence bundle
      - allocation review snapshot
      - portfolio readiness audit trail
  forbidden_shortcuts:
  - 先着順で reserve allocation を固定する
  - donor readiness floor を見ずに支援を抜き続ける
  - review window なしで temporary aid を継続する
  - portfolio owner 不在のまま mutual-aid escalation を宣言する
  residual_open_points: []
scheduler_donor_protection_covenant_governance:
  status: provisional_fixed
  statement: scheduler_donor_protection_covenant_governance とは、donor-team protection floor、aid refusal adjudication、asymmetric support covenant を固定する規則である。
  core_claims:
  - 支援提供側は無限 reservoir ではない。donor team ごとに protected surface、minimum command continuity、relief roster freshness を束ねた protection floor を持たなければならない。
  - aid refusal は非協力の烙印ではなく、lawful refusal reason code と adjudication path を持つ統治行為である。floor breach、regulatory boundary、credential mismatch、recovery debt overload は refusal の正当理由になりうる。
  - asymmetric support covenant は、片務支援が許される範囲、最大 duration、backfill obligation、return milestone を明文化する。善意のまま恒常支援へ滑ってはならない。
  - 受援側の urgency が高くても donor 側の critical service や duty-of-care を壊す transfer は認められない。portfolio は total harm を見て調停すべきである。
  - aid refusal を informal chat で片付けてはならない。拒否には owner、reason code、counter-offer、review forum を必須とする。
  - DecisionLedger / GraphEngine / GraphLint / archive object は donor protection floor registry、refusal adjudication packet、support covenant tracking、donor recovery audit を分担する。
  donor_protection_floor:
    required_fields:
    - donor_team_ref
    - protected_surface_bundle_ref
    - minimum_command_continuity_ref
    - minimum_shift_coverage_ref
    - credential_freshness_ref
    - max_exportable_capacity_ref
    - temporary_aid_expiry_ref
    - ratified_at
    rules:
    - max_exportable_capacity_ref を超える lending を emergency goodwill で正当化してはならない。
    - credential_freshness_ref を満たさない borrowed role を donor floor 算定から除外してはならない。
    - temporary_aid_expiry_ref のない支援は covenant ではなく恒常依存とみなす。
  aid_refusal_adjudication:
    lawful_reason_codes:
    - floor_breach_risk
    - regulatory_or_contractual_boundary
    - credential_mismatch
    - donor_recovery_debt_overload
    - no_safe_handoff_path
    required_fields:
    - refusal_packet_id
    - request_packet_ref
    - reason_code_ref
    - refusal_owner_ref
    - counter_offer_or_null
    - review_forum_ref
    - issued_at
  asymmetric_support_covenant:
    required_bindings:
    - support_role_bundle_ref
    - max_duration_ref
    - receiver_backfill_obligation_ref
    - return_milestone_ref
    - donor_recovery_window_ref
    - portfolio_owner_ref
    rules:
    - receiver_backfill_obligation_ref のない片務支援を renewal してはならない。
    - return_milestone_ref を持たない covenant を evergreen support にしてはならない。
    - donor_recovery_window_ref を飛ばして連続支援を再開してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - donor protection floor registry
      - aid refusal reason code ratification
      - support covenant binding
      - return milestone approval
    GraphEngine:
      owns:
      - donor floor remaining-capacity computation
      - counter-offer feasibility check
      - covenant expiry projection
      - donor recovery window simulation
    GraphLint:
      owns:
      - floor-violating transfer lint
      - ownerless refusal lint
      - evergreen asymmetric support lint
      - missing-return-milestone lint
    archive_object:
      owns:
      - refusal packet
      - support covenant packet
      - counter-offer evidence bundle
      - donor recovery audit trail
  forbidden_shortcuts:
  - aid refusal を口頭断りだけで済ませる
  - donor floor を超えても urgency だけで lending する
  - return milestone なしで片務支援を延長する
  - credential mismatch を気合いで吸収する前提にする
  residual_open_points: []
scheduler_federated_reserve_corridor_governance:
  status: provisional_fixed
  statement: scheduler_federated_reserve_corridor_governance とは、cross-region isolation ring、federated reserve corridor、jurisdictional handoff を固定する規則である。
  core_claims:
  - cross-region mutual-aid は local extension ではない。region、network zone、data residency、labor or duty rule、customer-specific contract をまたぐたびに isolation ring を再確認しなければならない。
  - federated reserve corridor は、どの role bundle と credential class がどの境界をどの期限まで越えられるかを定めた packet である。corridor 不在の越境支援は emergency でも default 許可にしてはならない。
  - jurisdictional handoff では、authority source、command continuity、audit clock、applicable policy set を明示的に切り替える必要がある。receiver が存在しても authority transfer が曖昧なら handoff は未成立である。
  - isolated domain を貫通する支援は最小権限と最小期間を原則とし、role borrow を data or policy borrow と混同してはならない。
  - cross-region corridor は compliance latency も考慮しなければならない。help が早くても lawful audit が追いつかない corridor は admissible ではない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は isolation ring registry、corridor packet binding、jurisdictional handoff witness、cross-region audit trail を分担する。
  isolation_rings:
    ring_classes:
    - network_zone_ring
    - data_residency_ring
    - labor_or_duty_rule_ring
    - customer_contract_ring
    - regulatory_authority_ring
    rules:
    - 複数 ring をまたぐ支援では最も厳しい constraint を corridor の上限とする。
    - role borrow と policy borrow を同一 handoff で自動許可してはならない。
  federated_reserve_corridor:
    required_fields:
    - corridor_packet_id
    - origin_region_ref
    - destination_region_ref
    - allowed_role_bundle_ref
    - credential_class_ref
    - max_duration_ref
    - data_scope_ref
    - policy_set_ref
    - audit_clock_source_ref
    - corridor_owner_ref
    - issued_at
    rules:
    - data_scope_ref のない corridor を remote support 一般に拡張してはならない。
    - audit_clock_source_ref が未束縛の corridor を incident command handoff に用いてはならない。
    - corridor_owner_ref のない越境支援を mutual-aid として記録してはならない。
  jurisdictional_handoff:
    required_evidence:
    - authority_transfer_ref
    - receiver_command_acceptance_ref
    - applicable_policy_set_ref
    - time_normalization_ref
    - language_or_semantics_alignment_ref
    - audit_route_ref
    rules:
    - receiver_command_acceptance_ref がない handoff を unilateral redirect で済ませてはならない。
    - applicable_policy_set_ref が衝突する場合は split operation か local-only execution に戻す。
    - time_normalization_ref を省いて cross-region SLA を比較してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - isolation ring registry
      - corridor packet ratification
      - authority transfer binding
      - applicable policy set judgement
    GraphEngine:
      owns:
      - ring overlap analysis
      - corridor feasibility check
      - time normalization computation
      - handoff continuity simulation
    GraphLint:
      owns:
      - ownerless corridor lint
      - policy-borrow leakage lint
      - time-normalization omission lint
      - unaccepted handoff lint
    archive_object:
      owns:
      - corridor packet
      - authority transfer witness
      - cross-region audit bundle
      - handoff review trail
  forbidden_shortcuts:
  - corridor packet なしで越境支援を通す
  - role borrow を data or policy borrow と同一視する
  - receiver acceptance なしで jurisdictional handoff を成立扱いにする
  - time normalization を省いて SLA 遅延を比較する
  residual_open_points: []
scheduler_priority_override_charter_governance:
  status: provisional_fixed
  statement: scheduler_priority_override_charter_governance とは、portfolio priority override charter、customer-critical carveout、fairness exception sunset を固定する規則である。
  core_claims:
  - portfolio fairness は平時の原則であり、無条件の絶対法則ではない。ただし override は charter、owner、impact budget、expiry を持つときだけ lawful である。
  - customer-critical carveout は売上額の大きさ一般ではなく、life or safety impact、regulatory deadline、contractual irreversibility、broad contagion risk のような class で定義するべきである。
  - fairness exception は通常ルールの停止ではなく、適用範囲を狭く限定した temporary branch である。branch を閉じる sunset review を必須にしなければならない。
  - override により後順位へ押し出される queue には harm budget と compensation path を与えるべきである。例外適用の外部化だけ行い、負債の回収を忘れてはならない。
  - same customer への repeated carveout が慢性化したら emergency ではなく structural under-capacity を疑う。例外の回数そのものが portfolio design の evidence になる。
  - DecisionLedger / GraphEngine / GraphLint / archive object は override charter registry、carveout class binding、impact budget tracking、sunset review audit を分担する。
  override_charter:
    required_fields:
    - override_charter_id
    - carveout_class_ref
    - override_owner_ref
    - affected_queue_family_ref
    - impact_budget_ref
    - expiry_ref
    - sunset_review_forum_ref
    - rollback_path_ref
    - issued_at
    rules:
    - impact_budget_ref のない override を lawful urgency として扱ってはならない。
    - expiry_ref のない carveout を temporary と呼んではならない。
    - rollback_path_ref のない override は fairness exception ではなく rule destruction である。
  customer_critical_carveout:
    classes:
    - life_or_safety_critical
    - regulatory_deadline_critical
    - contractual_irreversibility
    - broad_contagion_risk
    rules:
    - revenue importance 単独を carveout class にしてはならない。
    - same customer への repeated carveout は structural review を mandatory にする。
  fairness_exception_sunset:
    required_evidence:
    - expiry_reached_or_rescinded_ref
    - impacted_queue_compensation_ref
    - residual_harm_ref
    - repeat_frequency_ref
    - sunset_owner_ref
    - review_outcome_ref
    rules:
    - compensation path なしで exception を closed にしてはならない。
    - repeat_frequency_ref が高いのに structural review へ送らない sunset は無効である。
    - sunset_owner_ref のない expiry を silent expiry として処理してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - override charter registry
      - carveout class ratification
      - impact budget approval
      - sunset review judgement
    GraphEngine:
      owns:
      - harm budget propagation
      - affected queue compensation projection
      - repeat carveout detection
      - rollback path feasibility check
    GraphLint:
      owns:
      - budgetless override lint
      - revenue-only carveout lint
      - silent-expiry lint
      - compensation-missing sunset lint
    archive_object:
      owns:
      - override charter packet
      - impact evidence bundle
      - sunset review snapshot
      - structural review trail
  forbidden_shortcuts:
  - 重要顧客だからという理由だけで carveout する
  - impact budget なしで fairness を上書きする
  - expiry だけ過ぎたので自動的に正常復帰したとみなす
  - 後順位 queue の harm を未記録のまま override を閉じる
  residual_open_points: []
scheduler_reserve_debt_settlement_governance:
  status: provisional_fixed
  statement: scheduler_reserve_debt_settlement_governance とは、reserve debt ledger、donor recovery payback、reciprocity settlement を固定する規則である。
  core_claims:
  - mutual-aid と priority override は無償操作ではない。donor capacity loss、queue displacement、training delay、recovery burden を reserve debt ledger に記録しなければならない。
  - reserve debt は receiver-side debt、donor fatigue debt、portfolio fairness debt、cross-region compliance debt に分け、同じ payback rule を当ててはならない。
  - donor recovery payback は人数返却だけでは足りない。time-to-restoration、backfill fulfilment、deferred local obligations、readiness rebound を含めて closure を判断する。
  - reciprocity settlement は revenge accounting ではなく、chronic donor を防ぐための bounded balancing rule である。ageing budget と exception code を持たない reciprocal claim は無効にするべきである。
  - reserve debt を dashboard から消すことと debt を返済することは別である。closure witness を持たない debt retirement を nominal recovery とみなしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は reserve debt ledger registry、payback schedule binding、settlement aging audit、closure witness preservation を分担する。
  reserve_debt_ledger:
    debt_classes:
    - receiver_capacity_debt
    - donor_fatigue_debt
    - portfolio_fairness_debt
    - cross_region_compliance_debt
    required_fields:
    - reserve_debt_id
    - origin_event_ref
    - debt_class_ref
    - debtor_team_ref
    - creditor_team_ref
    - aging_budget_ref
    - closure_witness_kind_ref
    - issued_at
    rules:
    - debt_class_ref のない residual burden を generic aftermath として放置してはならない。
    - aging_budget_ref のない debt を evergreen carryover にしてはならない。
  donor_recovery_payback:
    required_bindings:
    - payback_window_ref
    - backfill_fulfilment_ref
    - deferred_local_obligation_ref
    - readiness_rebound_ref
    - payback_owner_ref
    rules:
    - backfill_fulfilment_ref のない payback を nominal recovery とみなしてはならない。
    - payback_owner_ref のない返済計画を善意の自主回復に委ねてはならない。
  reciprocity_settlement:
    required_fields:
    - settlement_case_id
    - claim_basis_ref
    - exception_code_or_null
    - net_balance_ref
    - settlement_forum_ref
    - closure_witness_ref
    rules:
    - exception_code_or_null が null の repeated imbalance を放置してはならない。
    - claim_basis_ref のない reciprocal request を moral pressure として扱ってはならない。
    - closure_witness_ref のない settlement を帳尻合わせ完了として記録してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reserve debt ledger registry
      - payback window ratification
      - settlement forum judgement
      - closure witness approval
    GraphEngine:
      owns:
      - debt ageing computation
      - net balance projection
      - donor readiness rebound check
      - payback schedule simulation
    GraphLint:
      owns:
      - classless debt lint
      - aging-free debt lint
      - ownerless payback lint
      - closure-witness-missing settlement lint
    archive_object:
      owns:
      - reserve debt packet
      - payback schedule snapshot
      - settlement evidence bundle
      - closure witness archive
  forbidden_shortcuts:
  - reserve debt を dashboard 上の非表示で消し込む
  - payback owner なしで自主回復に任せる
  - net balance を moral pressure で回収する
  - closure witness なしで debt retirement を宣言する
  residual_open_points: []
scheduler_prebuild_readiness_governance:
  status: provisional_fixed
  statement: scheduler_prebuild_readiness_governance とは、campaign-season prebuild、forecast-triggered reserve staging、freeze window coordination を固定する規則である。
  core_claims:
  - known peak や campaign season に対して毎回 incident mode で対処してはならない。forecast profile と reserve prebuild window を持ち、通常期のうちに readiness を積むべきである。
  - forecast-triggered reserve staging は予報の存在だけではなく、confidence band、impact class、lead time、build cost を束ねた trigger で開く。false alarm のコストも prebuild judgement に含めなければならない。
  - freeze window coordination は変更停止の全面化ではない。critical path の消耗を防ぐために、which change families must pause, which may continue under guard を explicit に束縛する。
  - prebuild reserve は既存 team の hidden overtime で作ってはならない。backfill、training freshness、tooling readiness、vendor access validity を含めた staged asset として管理する必要がある。
  - forecast が外れた場合にも prebuild を waste と断じて終えてはならない。false-positive staging の review は次 season の threshold calibration に反映される。
  - DecisionLedger / GraphEngine / GraphLint / archive object は forecast profile registry、reserve staging trigger、freeze coordination binding、seasonal readiness audit を分担する。
  forecast_profiles:
    profile_classes:
    - known_campaign_peak
    - seasonal_demand_wave
    - regulatory_deadline_cluster
    - vendor_dependency_squeeze
    required_fields:
    - forecast_profile_id
    - profile_class_ref
    - confidence_band_ref
    - lead_time_ref
    - impact_class_ref
    - build_cost_ref
    - profile_owner_ref
    - ratified_at
  reserve_staging:
    required_bindings:
    - staging_trigger_ref
    - prebuild_window_ref
    - staged_role_bundle_ref
    - backfill_source_ref
    - training_freshness_ref
    - vendor_access_validity_ref
    - review_window_ref
    rules:
    - backfill_source_ref のない prebuild を hidden overtime で代替してはならない。
    - training_freshness_ref のない staged asset を critical reserve とみなしてはならない。
    - review_window_ref のない staging を forecast 学習に使えない準備として放置してはならない。
  freeze_window_coordination:
    required_fields:
    - freeze_window_id
    - paused_change_family_ref
    - guarded_change_family_ref
    - freeze_owner_ref
    - activation_ref
    - release_condition_ref
    - exception_path_ref
    rules:
    - paused_change_family_ref と guarded_change_family_ref を分けずに全面停止を default にしてはならない。
    - release_condition_ref のない freeze を convenience freeze として延長してはならない。
    - exception_path_ref のない freeze で urgent repair を塞いではならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - forecast profile registry
      - reserve staging trigger ratification
      - freeze window binding
      - seasonal review judgement
    GraphEngine:
      owns:
      - demand-wave projection
      - prebuild sufficiency simulation
      - false-positive staging review
      - freeze impact propagation
    GraphLint:
      owns:
      - hidden-overtime prebuild lint
      - training-stale reserve lint
      - blanket-freeze lint
