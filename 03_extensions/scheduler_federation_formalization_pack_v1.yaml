scheduler_federation_shared_reserve_model:
  status: provisional_fixed
  statement: scheduler_federation_shared_reserve_model は、shared reserve covenant、reciprocity settlement、donor protection floor を parameter 化するモデルである。
  primitives:
    reserve_covenant: ρ_v = (reserve_pool, contributing_partner_set, protected_floor, callable_scope, expiry_or_review, ratified_at)
    settlement_case: ξ_s = (call_event_ref, donor_partner, receiver_partner, debt_class, settlement_window, settlement_terms, settled_at)
    donor_protection: δ_p = (donor_partner, protected_service_set, fatigue_or_capacity_floor, lawful_refusal_reason, restored_at)
    reserve_state: σ_sr ∈ {standing, callable, drawn, settling, overdue, restored, archived}
  functions:
    ReserveBound: ReserveBound(ρ_v)=true iff reserve_pool, contributing_partner_set, protected_floor, callable_scope, expiry_or_review, and ratified_at are all bound.
    SettlementBound: SettlementBound(ξ_s)=true iff call_event_ref, donor_partner, receiver_partner, debt_class, settlement_window, settlement_terms, and settled_at are all bound.
    ProtectionBound: ProtectionBound(δ_p)=true iff donor_partner, protected_service_set, fatigue_or_capacity_floor, lawful_refusal_reason, and restored_at are all bound.
    ReciprocityBalanced: ReciprocityBalanced(ρ_v,ξ_s,δ_p)=true iff reserve draw never violates donor protection floor and every call remains covered by a settlement class or an explicit forgiveness rule.
    DonorOverdrawRisk: DonorOverdrawRisk(ρ_v,ξ_s,δ_p)=high iff reserve calls can consume protected services or leave donor-side debt / fatigue without ratified recovery terms.
  tool_split:
    DecisionLedger: ρ_v, ξ_s, δ_p, σ_sr の normative binding を保持する。
    GraphEngine: ReserveBound、SettlementBound、ProtectionBound、DonorOverdrawRisk を計算する。
    GraphLint: floor-free reserve / terms-free settlement / reason-free refusal を検査する。
    archive_object: ρ_v, ξ_s, δ_p と reserve lifecycle trail を保存する。
  forbidden_shortcuts:
