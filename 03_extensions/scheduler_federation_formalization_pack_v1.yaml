  - BadgeLegible=false の conflict 表示で独立性説明を済ませる
  - DriftActionable=false の差分通知を stakeholder guidance とみなす
  residual_open_points:
  - scheduler federation oversight lineage replay packet / recusal history archive / handback closure certificate をどこまで parameter 化するか
scheduler_federation_oversight_closure_archive_model:
  status: provisional_fixed
  statement: scheduler_federation_oversight_closure_archive_model は、lineage replay packet、recusal history archive、closure certificate を parameter 化するモデルである。
  primitives:
    lineage_replay_packet: ρ = (charter_lineage, accountability_transition, dispute_or_incident_scope, replay_authority, generated_at)
    recusal_history_archive: η = (reviewer, recusal_event_set, substitution_outcome, retention_rule, archived_at)
    closure_certificate: ζ = (handback_acceptance, residual_obligation_check, closure_approver, reopen_rule, certified_at)
    closure_state: κ ∈ {replayable, historically_archived, certificate_ready, certified, reopenable}
  functions:
    ReplayAssembleable: ReplayAssembleable(ρ)=true iff charter lineage, accountability transition, dispute scope, and replay authority are all bound.
    RecusalHistorized: RecusalHistorized(η)=true iff recusal event set, substitution outcome, and retention rule are all bound.
    ClosureCertifiable: ClosureCertifiable(ζ)=true iff handback acceptance, residual obligation check, closure approver, and reopen rule are all bound.
    ClosureTraceable: ClosureTraceable(ρ,η)=true iff oversight transitions and reviewer recusal history can be replayed under bounded authority.
    ReopenReady: ReopenReady(η,ζ)=true iff certified closure still preserves the recusal and residual-obligation evidence needed for governed reopening.
  tool_split:
    DecisionLedger: ρ, η, ζ と κ の normative binding を保持する。
    GraphEngine: replay assembly, recusal sequence projection, residual check calculation, and certificate readiness を計算する。
    GraphLint: ReplayAssembleable / RecusalHistorized / ClosureCertifiable / ReopenReady 違反を検査する。
    archive_object: ρ, η, ζ の snapshot と closure evidence archive を保存する。
  forbidden_shortcuts:
  - ReplayAssembleable=false のまま closure lineage を説明したことにする
  - RecusalHistorized=false の reviewer history を independence evidence に使う
  - ClosureCertifiable=false の handback を最終閉鎖扱いにする
  residual_open_points:
  - scheduler federation cross-federation appeal lane / neutral convenor selection / binding precedent digest をどこまで parameter 化するか
scheduler_federation_appeal_precedent_model:
  status: provisional_fixed
  statement: scheduler_federation_appeal_precedent_model は、cross-federation appeal lane、neutral convenor selection、binding precedent digest を parameter 化するモデルである。
  primitives:
    appeal_lane: α = (source_closure, appellant_federation, respondent_federation, appeal_basis, admissibility_window, stay_rule, opened_at)
    neutral_convenor: ν = (candidate_pool, disqualifying_conflict_rule, selection_method, ratification_quorum, appointed_at)
    precedent_digest: π = (canonical_holding, binding_scope, distinguishable_fact_pattern, doctrine_effective_date, publication_tier, issued_at)
    appeal_state: ω ∈ {intake, admissibility_checked, convenor_seated, under_appeal, decided, precedential, nonbinding_closed}
  functions:
    AppealAdmissible: AppealAdmissible(α)=true iff source_closure, appeal_basis, admissibility_window, and stay_rule are all bound and the filing stays inside the admissibility window.
    ConvenorNeutral: ConvenorNeutral(ν)=true iff candidate_pool, disqualifying_conflict_rule, selection_method, and ratification_quorum are all bound and no disqualifying conflict is hit for the selected convenor.
    DigestBindable: DigestBindable(π)=true iff canonical_holding, binding_scope, distinguishable_fact_pattern, doctrine_effective_date, publication_tier, and issued_at are all bound.
    AppealOperational: AppealOperational(α,ν)=true iff AppealAdmissible(α) and ConvenorNeutral(ν) both hold without source-record overwrite.
    PrecedentReusable: PrecedentReusable(α,ν,π)=true iff AppealOperational(α,ν) and DigestBindable(π) both hold and the digest remains linked to the decided source closure chain.
  tool_split:
    DecisionLedger: α, ν, π と ω の normative binding を保持する。
    GraphEngine: AppealAdmissible、ConvenorNeutral、DigestBindable、PrecedentReusable を計算する。
    GraphLint: AppealAdmissible / ConvenorNeutral / DigestBindable / source-overwrite 違反を検査する。
    archive_object: α, ν, π の snapshot と cross-federation appeal archive を保存する。
  forbidden_shortcuts:
  - AppealAdmissible=false のまま appellate lane を opened とみなす
  - ConvenorNeutral=false のまま neutral appeal を宣言する
  - DigestBindable=false の appeal outcome を binding precedent として流通させる
  residual_open_points:
  - scheduler federation confidential evidence redaction tier / sealed appendix access lane / public summary floor をどこまで parameter 化するか
scheduler_federation_autonomous_policy_agent_model:
  status: provisional_fixed
  statement: scheduler_federation_autonomous_policy_agent_model は、autonomous policy agent credential、model drift challenge lane、human override supremacy clause を parameter 化し、agent action admissibility と freeze / revoke / reinstate 分岐を形式化するモデルである。
  primitives:
    agent_credential: α = (agent_class, model_artifact_digest, policy_pack_digest, authorized_action_family_set, scope_boundary, authority_ceiling, benchmark_suite, expiry, revocation_rule, fallback_human_owner, ratified_at)
    drift_challenge_lane: δ = (trigger_family, evidence_bundle, review_authority, temporary_freeze_rule, challenge_window, resolution_path, opened_at)
    override_clause: ω = (override_owner, preemption_scope, non_delegable_stop_rule, mandatory_logging, public_notice_rule, restoration_gate, activated_at)
    agent_state: σ ∈ {shadow_only, active, challenged, temporarily_frozen, reinstatement_pending, revoked}
    action_class: μ ∈ {advisory_only, bounded_internal_mutation, canonical_state_mutation, external_commitment, emergency_takeover_candidate}
  functions:
    CredValid: CredValid(α,t)=true iff model_artifact_digest, policy_pack_digest, authorized_action_family_set, scope_boundary, authority_ceiling, benchmark_suite, fallback_human_owner are all bound and t < expiry and revocation_rule has not fired.
    ChallengeOpen: ChallengeOpen(δ)=true iff trigger_family, evidence_bundle, review_authority, temporary_freeze_rule, challenge_window, and resolution_path are all bound.
    FreezeRequired: FreezeRequired(α,δ,μ)=true iff ChallengeOpen(δ)=true and (μ ∈ {canonical_state_mutation, external_commitment, emergency_takeover_candidate} or temporary_freeze_rule requests full suspension).
    HumanSupremacy: HumanSupremacy(ω,μ)=true iff override_owner, non_delegable_stop_rule, mandatory_logging, and restoration_gate are all bound and μ touches life-safety, active compromise, constitutional contradiction, contestability, or declared emergency scope.
    AgentActionAdmissible: AgentActionAdmissible(α,δ,ω,μ,t)=true iff CredValid(α,t)=true and μ ∈ authorized_action_family_set and not FreezeRequired(α,δ,μ) and not HumanSupremacy(ω,μ).
    Reinstatable: Reinstatable(α,δ,ω)=true iff ChallengeOpen(δ)=true and review_authority closes the challenge with restoration_gate satisfied and no active revocation rule or human override hold remains.
  invariants:
  - CredValid=false の agent は advisory_only を除き admissible になってはならない。
  - ChallengeOpen=true かつ FreezeRequired=true のとき、canonical_state_mutation と external_commitment は blocked でなければならない。
  - HumanSupremacy=true の action は agent 側の score や self-evaluation で上書きしてはならない。
  - Reinstatable=true を agent self-report だけで確定してはならない。
  tool_split:
    DecisionLedger: α, δ, ω と σ の normative binding を保持する。
    GraphEngine: CredValid、ChallengeOpen、FreezeRequired、HumanSupremacy、AgentActionAdmissible、Reinstatable を計算する。
    GraphLint: credential-missing / benchmark-free / self-reinstatement / override-without-notice 違反を検査する。
    archive_object: α, δ, ω の snapshot と revocation / reinstatement archive を保存する。
  forbidden_shortcuts:
  - CredValid=false のまま agent action を active とみなす
  - FreezeRequired=true でも external commitment を継続する
  - HumanSupremacy=true を agent confidence で打ち消す
  - Reinstatable を human review なしで true にする
  residual_open_points: []
