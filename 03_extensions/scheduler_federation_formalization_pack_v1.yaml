  statement: scheduler_federation_transparency_closed_session_model は、transparency classification charter、closed-session warrant、declassification sunset を parameter 化するモデルである。
  primitives:
    transparency_classification_charter: κ₁ = (scope, binding_rule, authority, exception_rule, ratified_at)
    closed_session_warrant: κ₂ = (trigger, participant_set, procedure, deadline_or_window, opened_at)
    declassification_sunset: κ₃ = (subject, threshold_or_condition, effect_scope, rollback_or_followup, issued_at)
    meta_state: σ ∈ {drafted, queued, active, reviewed, suspended, sunset_due, rolled_back, archived}
  functions:
    TransparencyClassificationCharterBound: TransparencyClassificationCharterBound(κ₁)=true iff scope, binding_rule, authority, exception_rule, and ratified_at are all bound.
    ClosedSessionWarrantReady: ClosedSessionWarrantReady(κ₂)=true iff trigger, participant_set, procedure, deadline_or_window, and opened_at are all bound.
    DeclassificationSunsetCheckable: DeclassificationSunsetCheckable(κ₃)=true iff subject, threshold_or_condition, effect_scope, rollback_or_followup, and issued_at are all bound.
    GovernancePathSafe: GovernancePathSafe(κ₁,κ₂)=true iff the governing rule stays bound while the operative lane remains time-bounded.
    OutcomeReviewable: OutcomeReviewable(κ₂,κ₃)=true iff the procedure lane and the evaluation outcome remain jointly replayable and auditable.
  tool_split:
    DecisionLedger: κ₁, κ₂, κ₃ と σ の normative binding を保持する。
    GraphEngine: TransparencyClassificationCharterBound、ClosedSessionWarrantReady、DeclassificationSunsetCheckable、GovernancePathSafe、OutcomeReviewable を計算する。
    GraphLint: transparency_classification_charter / closed_session_warrant / declassification_sunset の未束縛と unsafe shortcut を検査する。
    archive_object: κ₁, κ₂, κ₃ と transparency classification and closed-session governance lifecycle trail を保存する。
  forbidden_shortcuts:
  - κ₁ を authority 未束縛のまま true とみなす
  - κ₂ を deadline_or_window なしで executable と扱う
  - κ₃ を effect_scope なしで accepted outcome と宣言する
  residual_open_points:
  - scheduler federation whistleblower intake warrant / retaliation stay order / remedy restitution docket をどこまで parameter 化するか
