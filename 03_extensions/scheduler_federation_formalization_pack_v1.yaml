multi_session_scheduler_observability_model:
  status: provisional_fixed
  statement: multi_session_scheduler_observability_model は、telemetry witness、fairness indicator、threshold profile、control action を parameter 化するモデルである。
  primitives:
    telemetry_witness: τ = (field, window, source_integrity, mirror_lag_bound, scope, value)
    fairness_indicator: φ ∈ {bounded_wait_p95, consecutive_preemption_cap, debt_half_life, residue_age_budget, override_budget_ratio, yield_compliance_ratio}
    threshold_profile: θ(profile, authority_tier, risk_class, φ)
    control_action: a ∈ {observe_only, auto_throttle, mandatory_checkpoint_yield, manual_escalation}
  functions:
    TelemetryUsable: TelemetryUsable(τ)=true iff window, integrity, lag bound, and scope are all bound.
    FairnessEval: FairnessEval(φ)=measured from admissible telemetry witnesses without mean-only collapse when tail-sensitive.
    ThresholdSelect: ThresholdSelect(profile,authority,risk,φ)=strictest applicable θ for φ.
    ActionTrigger: ActionTrigger(φ)=a chosen from observe_only / auto_throttle / mandatory_checkpoint_yield / manual_escalation based on ThresholdSelect and breach severity.
    RecoveryDirection: RecoveryDirection(debt_trend,yield_evidence,residue_age)=true only when debt decay and closure evidence are both observed.
  tool_split:
    DecisionLedger: φ, θ, a の normative binding を保持する。
    GraphEngine: τ の集約と ActionTrigger を生成する。
    GraphLint: TelemetryUsable / FairnessEval / ThresholdSelect 違反を検査する。
    archive_object: τ と breach bundle の immutable snapshot を保存する。
  forbidden_shortcuts:
  - TelemetryUsable を満たさない τ を唯一根拠に ActionTrigger する
  - FairnessEval を平均 collapse だけで近似する
  - RecoveryDirection を UI 上の debt 非表示だけで true にする
  residual_open_points: []
scheduler_breach_hysteresis_cooldown_model:
  status: provisional_fixed
  statement: scheduler_breach_hysteresis_cooldown_model は、breach state、confirmation window、activation / release threshold、cooldown-clearance を parameter 化するモデルである。
  primitives:
    breach_state: β ∈ {nominal, suspected_breach, confirmed_breach, mitigating, cooldown, cleared}
    confirmation_window: ω_c = (length, continuity_rule, corroboration_requirement)
    activation_threshold: θ_on(action, indicator)
    release_threshold: θ_off(action, indicator)
    cooldown_window: ω_d = (min_duration, required_evidence_set)
  functions:
    ConfirmBreach: ConfirmBreach(indicator_set)=true iff ω_c is satisfied and corroboration / debt worsening / sustained breach condition holds.
    HysteresisOK: HysteresisOK(action)=true iff θ_on and θ_off are separated and minimum active duration is respected.
    CooldownClearOK: CooldownClearOK(action)=true iff ω_d evidence is complete and debt / residue do not hide behind lane migration.
    CorroborationIndependent: CorroborationIndependent(w1,w2)=true iff source family and processing lineage are independent enough per registry rule.
    ReleaseAllowed: ReleaseAllowed(action)=true iff CooldownClearOK(action) and release owner / expiry / rollback-of-throttle witness are all bound.
  tool_split:
    DecisionLedger: β, θ_on, θ_off, independence rule, ReleaseAllowed の normative binding を保持する。
    GraphEngine: ω_c / ω_d に従う状態遷移を生成する。
    GraphLint: ConfirmBreach / HysteresisOK / CooldownClearOK / ReleaseAllowed 違反を検査する。
    archive_object: breach lifecycle と cooldown witness の immutable snapshot を保存する。
  forbidden_shortcuts:
  - ConfirmBreach を満たさず β=confirmed_breach にする
  - HysteresisOK を満たさず action を flapping させる
  - CooldownClearOK を満たさず ReleaseAllowed=true にする
  residual_open_points: []
scheduler_policy_rollout_migration_model:
  status: provisional_fixed
  statement: scheduler_policy_rollout_migration_model は、simulation scenario、input bundle、canary rollout、threshold migration comparability を parameter 化するモデルである。
  primitives:
    policy_snapshot: π ∈ PolicySnapshot
    scenario_class: σ ∈ {steady_state_load, burst_contention, debt_recovery, telemetry_loss_or_lag, manual_override_conflict, mixed_profile_competition}
    simulation_bundle: β = (π_old, π_new, threshold_diff, hysteresis_diff, remediation_diff, replay_slice, baseline, protected_floor_map, debt_backlog_vector, source_integrity_assumption, rollback_target)
    rollout_state: ρ ∈ {planned, simulated, canary_active, frozen, rollback_ready, promoted, aborted}
    comparability_witness: κ = (metric_semantics, aggregation_window, source_integrity, scope_unit, lineage_ref)
  functions:
    SimulationAdmissible: SimulationAdmissible(β,σ)=true iff β covers the required cohort/risk scope for σ and binds rollback_target.
    ComparabilityOK: ComparabilityOK(κ)=true iff old/new metrics share semantics, window, integrity assumptions, and scope unit.
    RolloutSafe: RolloutSafe(β)=true iff success witness set is satisfied with no failure witness firing.
    RollbackReady: RollbackReady(ρ)=true iff rollback rehearsal succeeded for the same scope unit and freeze gate is bound.
    PromotionReady: PromotionReady(ρ)=true iff canary evidence is stable and RolloutSafe ∧ RollbackReady ∧ ComparabilityOK hold.
  tool_split:
    DecisionLedger: π, κ, ρ の normative binding と promotion / freeze / rollback judgement を保持する。
    GraphEngine: β の simulation と dual-policy trace を生成する。
    GraphLint: SimulationAdmissible / ComparabilityOK / RolloutSafe / RollbackReady 違反を検査する。
    archive_object: simulation / rollout packet を immutable に保存する。
  forbidden_shortcuts:
  - SimulationAdmissible を満たさない β で rollout judgement を行う
  - ComparabilityOK を満たさない old/new trace 比較を採択根拠に使う
  - RollbackReady=false のまま canary を widen する
  residual_open_points: []
scheduler_rollout_exception_model:
  status: provisional_fixed
  statement: scheduler_rollout_exception_model は、canary cohort、mandatory exclusion、shadow-mode、exception lane、emergency bypass を parameter 化するモデルである。
  primitives:
    cohort_scope_unit: χ = (lane_family, profile, authority_tier, risk_class)
    rollout_mode: μ ∈ {enforcement_canary, shadow_mode, exception_lane, emergency_bypass}
    bypass_packet: ε = (trigger, reason, owner, authority_path, expiry, rollback_precedence, reentry_condition, counterfactual_trace_capture)
    cohort_state: ς ∈ {selected, excluded, shadow_only, bypassed, widened, reentered}
  functions:
    CohortEligible: CohortEligible(χ)=true iff χ is not in the mandatory exclusion set or has explicit charter override.
    BypassBounded: BypassBounded(ε)=true iff owner, expiry, authority path, and rollback precedence are all bound.
    ShadowComparable: ShadowComparable(χ)=true iff shadow-mode diff uses the same observability vocabulary as enforcement comparison.
    WidenAllowed: WidenAllowed(χ)=true iff prior cohort is stable, no unresolved bypass remains, and comparability witness survives expansion.
  tool_split:
    DecisionLedger: χ, μ, ε の normative binding を保持する。
    GraphEngine: χ の partition と μ ごとの trace materialization を生成する。
    GraphLint: CohortEligible / BypassBounded / ShadowComparable / WidenAllowed 違反を検査する。
    archive_object: cohort / bypass / shadow packet を保存する。
  forbidden_shortcuts:
  - CohortEligible=false の χ を silently enforcement canary に入れる
  - BypassBounded=false のまま emergency_bypass を継続する
  - ShadowComparable を満たさない diff を promotion 根拠に使う
  residual_open_points: []
scheduler_policy_promotion_divergence_model:
  status: provisional_fixed
  statement: scheduler_policy_promotion_divergence_model は、promotion gate、divergence budget、phase mode、closure witness を parameter 化するモデルである。
  primitives:
    promotion_gate_set: Γ = {stability_window_pass, critical_cohort_signoff, rollback_readiness_alive, open_bypass_closed_or_bounded, debt_non_growth_within_budget}
    divergence_budget: Δ = (fairness_tail_delta, debt_creation_delta, override_budget_delta, protected_floor_pressure_delta)
    phase_mode: φ ∈ {phase_expand, hold_current_scope, partial_rollback, fleet_commit, fleet_rollback, reframe_required}
    closure_witness: ω = (promotion_head, covered_cohort_set, retired_policy_head, surviving_legacy_head_set, residual_shadow_bypass_set, rollback_snapshot)
  functions:
    PromotionGateOK: PromotionGateOK(Γ)=true iff all required gates are satisfied for the target scope.
    BudgetWithin: BudgetWithin(Δ)=true iff all divergence dimensions stay within the registry bound for the target scope.
    PhaseSelect: PhaseSelect(Γ,Δ)=φ chooses expansion / hold / rollback / reframe according to gate and budget state.
    ClosureComplete: ClosureComplete(ω)=true iff coverage, retired/surviving heads, residue, and rollback snapshot are all bound.
  tool_split:
    DecisionLedger: Γ, Δ, φ, ω の normative binding を保持する。
    GraphEngine: Δ と coverage を計算し φ の execution witness を生成する。
    GraphLint: PromotionGateOK / BudgetWithin / ClosureComplete 違反を検査する。
    archive_object: promotion / rollback closure packet を保存する。
  forbidden_shortcuts:
  - PromotionGateOK=false のまま fleet_commit を選ぶ
  - BudgetWithin=false を黙殺して phase_expand を続ける
  - ClosureComplete=false の commit を final と扱う
  residual_open_points: []
scheduler_post_migration_attestation_model:
  status: provisional_fixed
  statement: scheduler_post_migration_attestation_model は、regression audit window、rollback debt bucket、attestation packet、reopen trigger を parameter 化するモデルである。
  primitives:
    audit_window: α = (window, followup_schedule, observer_class, covered_scope)
    rollback_debt_bucket: δ_r ∈ {stale_bypass_debt, orphan_shadow_trace_debt, reopened_backlog_debt, threshold_drift_residue, operator_confusion_debt}
    attestation_status: τ ∈ {accepted_final, provisional_closure, extended_audit, targeted_reopen, escalated_hold}
    attestation_packet: π_a = (migration_branch, covered_scope, regression_outcome, remaining_residue, rollback_debt_status, reopen_trigger_table, attestor, issued_at)
  functions:
    AuditBound: AuditBound(α)=true iff audit window, follow-up schedule, observer class, and covered scope are all bound.
    SettlementReady: SettlementReady(δ_r)=true iff owner, due window, completion witness, and carry-forward rule are bound for each rollback debt bucket.
    AttestationSufficient: AttestationSufficient(π_a)=true iff regression outcome, remaining residue, rollback debt status, and reopen trigger table are all bound.
    ReopenTriggered: ReopenTriggered(π_a)=true iff any registered relapse / resurgence / recurrence condition fires within the audit window.
  tool_split:
    DecisionLedger: α, δ_r, τ, π_a の normative binding を保持する。
    GraphEngine: follow-up と debt linkage と attestation packet を生成する。
    GraphLint: AuditBound / SettlementReady / AttestationSufficient / ReopenTriggered handling 違反を検査する。
    archive_object: audit / settlement / attestation packet を保存する。
  forbidden_shortcuts:
  - AuditBound=false の migration を final closure にする
  - SettlementReady=false の rollback debt を自然消滅扱いにする
  - AttestationSufficient=false を黙って accepted_final にする
  residual_open_points: []
scheduler_policy_lineage_finality_model:
  status: provisional_fixed
  statement: scheduler_policy_lineage_finality_model は、policy lineage の compaction class、replay-ready archive、supersession finality、targeted reopen admissibility を parameter 化するモデルである。
  primitives:
    policy_head: η ∈ PolicyHead
    lineage_segment: λ = (head_set, predecessor_successor_map, branch_boundary, dependency_snapshot)
    retained_witness: ω = (segment_manifest, head_digest, diff_digest, decision_record, attestation_packet, reopen_trigger_table, materialization_pointer)
    finality_state: φ ∈ {active, superseded_replayable, sealed_final, targeted_reopen_pending, reopened_exception}
    reopen_petition: ρ = (target_segment, affected_scope, lawful_basis, coexistence_mode, carry_forward_debt_visibility)
  functions:
    Compactible: Compactible(λ)=true iff ω preserves exact branch boundary, predecessor/successor relation, and replay materialization pointer.
    ReplayReady: ReplayReady(ω)=true iff segment manifest, attestation packet, dependency snapshot, and materialization pointer are all bound.
    SupersessionFinal: SupersessionFinal(η)=φ chosen from active / superseded_replayable / sealed_final / targeted_reopen_pending / reopened_exception.
    TargetedReopenOK: TargetedReopenOK(ρ)=true iff affected_scope is exact, lawful_basis is bound, carry-forward debt remains visible, and coexistence mode is explicit.
    ResurrectionAllowed: ResurrectionAllowed(η)=true only if φ∈{targeted_reopen_pending,reopened_exception} and ReplayReady holds for the target segment.
  tool_split:
    DecisionLedger: φ と ρ の normative binding、canonical head judgement を保持する。
    GraphEngine: λ と ω から targeted replay を materialize する。
    GraphLint: Compactible / ReplayReady / TargetedReopenOK / ResurrectionAllowed 違反を検査する。
    archive_object: ω と sealed lineage snapshot を保存する。
  forbidden_shortcuts:
  - ReplayReady=false の λ を sealed_final とみなす
  - TargetedReopenOK=false の ρ で old head を再活性化する
  - ResurrectionAllowed 判定なしに superseded head を current head に差し替える
  residual_open_points: []
scheduler_lineage_retention_purge_model:
  status: provisional_fixed
  statement: scheduler_lineage_retention_purge_model は、retention tier、hold state、purge scope、purge attestation admissibility を parameter 化するモデルである。
  primitives:
    retention_tier: τ ∈ {hot_active, warm_replay_ready, cold_attestable, minimal_manifest_hold}
    hold_state: h ∈ {none, legal_hold, audit_hold, targeted_reopen_pending, debt_settlement_hold}
    purge_scope: π ∈ {payload_only, materialization_pointer_only, derived_index_only, full_segment_purge}
    purge_packet: γ = (target_segment, τ, h, π, alternate_witness_sufficiency, reopen_clearance, residual_reference_map, post_purge_verification)
  functions:
    RetentionFloor: RetentionFloor(segment)=τ chosen from branch role, replay obligation, audit exposure, and reopen probability.
    HoldBlocksPurge: HoldBlocksPurge(h)=true iff h ≠ none.
    PurgeAdmissible: PurgeAdmissible(γ)=true iff HoldBlocksPurge(h)=false, alternate witness sufficiency is proven, reopen clearance is bound, and residual reference map survives.
    ManifestOnlySafe: ManifestOnlySafe(segment)=true iff lawful replay/audit demand can still be met without payload.
    PostPurgeReplayOK: PostPurgeReplayOK(γ)=true iff post_purge_verification preserves declared replay / attestation capability.
  tool_split:
    DecisionLedger: τ, h, γ の normative binding と purge judgement を保持する。
    GraphEngine: γ の purge impact と residual reference map を生成する。
    GraphLint: PurgeAdmissible / ManifestOnlySafe / PostPurgeReplayOK 違反を検査する。
    archive_object: tiered storage と purge attestation artifact を保存する。
  forbidden_shortcuts:
  - HoldBlocksPurge=true のまま purge を実行する
  - ManifestOnlySafe=false の segment を payload purge する
  - PostPurgeReplayOK を確認せず full_segment_purge を行う
  residual_open_points: []
scheduler_lineage_external_export_model:
  status: provisional_fixed
  statement: scheduler_lineage_external_export_model は、recipient class、export scope、redaction profile、foreign replay proof、authority split を parameter 化するモデルである。
  primitives:
    recipient_class: κ ∈ {regulator, independent_auditor, partner_operator, internal_separated_team}
    export_scope: σ = lawful projection of target_segment
    redaction_profile: δ = (hidden_fields, join_barriers, visible_digests, reveal_policy)
    foreign_replay_proof: ψ = (source_segment_digest, export_scope, redaction_ledger, replayable_set, non_replayable_set, verification_instructions)
    authority_split: α = (export_authority, de_redaction_authority)
  functions:
    ExportAdmissible: ExportAdmissible(κ,σ)=true iff recipient class, lawful basis, and export scope are mutually consistent.
    RedactionComplete: RedactionComplete(δ)=true iff hidden fields, join barriers, and reveal policy are explicitly bound.
    ForeignReplayProofOK: ForeignReplayProofOK(ψ)=true iff source digest, replayable/non-replayable sets, and verification instructions are bound.
    DeRedactionAllowed: DeRedactionAllowed(α)=true only when de_redaction_authority is distinct and explicitly exercised under lawful basis.
    NonImportable: NonImportable(export_packet)=true iff packet grants verification only and no canonical-head mutation right.
  tool_split:
    DecisionLedger: κ, α と export approval / expiry / non-importability judgement を保持する。
    GraphEngine: σ, δ, ψ に従って external packet を生成する。
    GraphLint: ExportAdmissible / RedactionComplete / ForeignReplayProofOK / DeRedactionAllowed / NonImportable 違反を検査する。
    archive_object: recipient-scoped export packet と ψ を保存する。
  forbidden_shortcuts:
  - ExportAdmissible を満たさない κ,σ で packet を出力する
  - RedactionComplete=false のまま export する
  - ForeignReplayProofOK=false の summary packet を監査用途へ流す
  residual_open_points: []
scheduler_lineage_schema_compatibility_model:
  status: provisional_fixed
  statement: scheduler_lineage_schema_compatibility_model は、schema version、adapter manifest、compatibility class、loss class、downgrade barrier、mixed-version coexistence を parameter 化するモデルである。
  primitives:
    schema_version: ν ∈ SchemaVersion
    adapter_manifest: μ = (source_version, target_version, transformed_field_map, preserved_semantics, dropped_semantics, known_loss_class, validation_packet)
    compatibility_class: κ ∈ {full_compatible, compatible_with_loss, non_compatible}
    loss_class: ℓ ∈ {display_only_loss, derived_metric_loss, governance_semantics_loss, identity_join_barrier_loss, finality_or_reopen_loss}
    writer_mode: ω ∈ {single_writer, mixed_reader_only}
  functions:
    AdapterBound: AdapterBound(μ)=true iff source/target version, preserved semantics, dropped semantics, and validation packet are all bound.
    CompatibilityOK: CompatibilityOK(μ)=κ determined by replay comparison and semantic equivalence witness.
    DowngradeBlocked: DowngradeBlocked(ℓ)=true iff ℓ ∈ {governance_semantics_loss, identity_join_barrier_loss, finality_or_reopen_loss}.
    ReaderLiftSafe: ReaderLiftSafe(ν_old,ν_new)=true iff mixed-version read preserves source-profile semantics without writer ambiguity.
    SingleWriterEnforced: SingleWriterEnforced(ω)=true iff canonical head mutation is allowed only from one schema writer.
  tool_split:
    DecisionLedger: κ, ℓ, ω の normative binding と downgrade judgement を保持する。
    GraphEngine: μ に基づく cross-version projection と replay comparison を生成する。
    GraphLint: AdapterBound / CompatibilityOK / DowngradeBlocked / ReaderLiftSafe / SingleWriterEnforced 違反を検査する。
    archive_object: schema-tagged segment, μ, validation packet を保存する。
  forbidden_shortcuts:
  - AdapterBound=false の migration を replay-ready と扱う
  - DowngradeBlocked=true の loss class を含む export/replay を許可する
  - SingleWriterEnforced を満たさない mixed-version write を行う
  residual_open_points: []
scheduler_lineage_mergeback_head_model:
  status: provisional_fixed
  statement: scheduler_lineage_mergeback_head_model は、merge witness、conflict class、inherited debt bundle、canonical head selection を parameter 化するモデルである。
  primitives:
    source_branch: β_s ∈ Branch
    target_head: η_t ∈ Head
    merge_witness: μ = (β_s, η_t, merge_purpose, covered_scope, conflict_class_set, conflict_resolution_packet, inherited_debt_bundle, canonical_head_nomination)
    conflict_class: χ ∈ {semantic_conflict, authority_conflict, chronology_conflict, witness_gap_conflict, redaction_barrier_conflict}
    inherited_debt_bundle: δ_i = (debt_items, receiver_owner_set, due_window_set, discharge_witness_set)
    head_state: η ∈ {incumbent_preserved, merged_head_promoted, bounded_dual_head, merge_rejected}
  functions:
    MergeAdmissible: MergeAdmissible(μ)=true iff branch class, covered scope, lawful purpose, and required witness set are all bound.
    ConflictResolved: ConflictResolved(μ)=true iff every blocking χ has a bound resolution or explicit rejection outcome.
    DebtCarryForwardOK: DebtCarryForwardOK(δ_i)=true iff each debt item has receiver owner, due window, and discharge witness.
    CanonicalHeadUnique: CanonicalHeadUnique(η)=true iff exactly one current head or an explicitly bounded dual-head set is nominated.
    MergeFinalized: MergeFinalized(μ)=true iff MergeAdmissible ∧ ConflictResolved ∧ DebtCarryForwardOK ∧ CanonicalHeadUnique hold.
  tool_split:
    DecisionLedger: μ と η の normative binding を保持する。
    GraphEngine: μ に基づく branch merge と debt propagation を生成する。
    GraphLint: MergeAdmissible / ConflictResolved / DebtCarryForwardOK / CanonicalHeadUnique 違反を検査する。
    archive_object: μ と post-merge head snapshot を保存する。
  forbidden_shortcuts:
  - MergeAdmissible=false の β_s を merge 候補にする
  - DebtCarryForwardOK=false のまま merged_head_promoted を宣言する
  - CanonicalHeadUnique を満たさない dual-current を current basis に反映する
  residual_open_points: []
scheduler_lineage_branch_quarantine_tombstone_model:
  status: provisional_fixed
  statement: scheduler_lineage_branch_quarantine_tombstone_model は、branch lifecycle state、custody、tombstone packet、restore admissibility を parameter 化するモデルである。
  primitives:
    branch_state: σ_b ∈ {active_exception, quarantined_pending, orphaned_no_owner, tombstoned_abandoned, evidentiary_hold}
    custody: κ = (owner, custodian, lawful_purpose, authority_path, expiry)
    tombstone_packet: π_t = (branch_ref, last_admissible_head, pending_debt_disposition, retention_floor, restore_barrier, custodian, reason)
    restore_petition: ρ_t = (branch_ref, lawful_basis, future_owner, head_safety_packet, debt_visibility_packet)
    quarantine_trigger: τ_q ∈ {missing_merge_witness, unresolved_blocking_conflict, owner_lost, provenance_challenged}
  functions:
    QuarantineRequired: QuarantineRequired(τ_q)=true iff branch cannot lawfully remain merge-eligible or head-candidate under current witness state.
    OwnerlessOrphan: OwnerlessOrphan(κ)=true iff owner or authority_path is absent and custodian-only holding remains.
    TombstoneReady: TombstoneReady(π_t)=true iff last admissible head, debt disposition, retention floor, and restore barrier are all bound.
    RestoreAllowed: RestoreAllowed(ρ_t)=true iff lawful basis, future owner, head safety, and debt visibility are all bound.
    EvidenceSurvives: EvidenceSurvives(σ_b)=true iff quarantine or tombstone never destroys required witness and debt traceability.
  tool_split:
    DecisionLedger: σ_b, κ, π_t, ρ_t の normative binding を保持する。
    GraphEngine: τ_q を検出し、π_t と restore candidate を生成する。
    GraphLint: QuarantineRequired / TombstoneReady / RestoreAllowed / EvidenceSurvives 違反を検査する。
    archive_object: quarantine / tombstone / restore artifact を保存する。
  forbidden_shortcuts:
  - QuarantineRequired=true の branch を active のままにする
  - TombstoneReady=false のまま abandoned 扱いにする
  - RestoreAllowed=false の tombstoned branch を再活性化する
  residual_open_points: []
scheduler_imported_branch_provenance_model:
  status: provisional_fixed
  statement: scheduler_imported_branch_provenance_model は、issuer trust class、import packet、admission mode、local attestation を parameter 化するモデルである。
  primitives:
    issuer_trust_class: τ_i ∈ {trusted_peer, constrained_partner, independent_auditor, untrusted_forensic}
