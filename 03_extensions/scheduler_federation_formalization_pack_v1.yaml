    corridor_reroute: ρ_c = (partition_incident_ref, donor_route, recipient_route, capacity_cap, legal_boundary, activated_at)
    reunion_attestation: α_u = (partition_incident_ref, consistency_digest, replay_gap_review, debt_settlement, counterpart_ack, attested_at)
    partition_state: σ_pf ∈ {nominal, partitioned, rerouting, degraded, reunion_pending, reunited, archived}
  functions:
    PartitionBound: PartitionBound(π_i)=true iff affected_mesh_cell_set, partition_class, loss_boundary, fallback_corridor, and declared_at are all bound.
    CorridorBound: CorridorBound(ρ_c)=true iff partition_incident_ref, donor_route, recipient_route, capacity_cap, legal_boundary, and activated_at are all bound.
    ReunionBound: ReunionBound(α_u)=true iff partition_incident_ref, consistency_digest, replay_gap_review, debt_settlement, counterpart_ack, and attested_at are all bound.
    FailoverSafe: FailoverSafe(π_i,ρ_c)=true iff rerouted traffic remains inside capacity_cap and legal_boundary for all affected mesh cells.
    SplitBrainRisk: SplitBrainRisk(π_i,ρ_c,α_u)=high iff partition-local divergence can re-enter federation without replay-gap review, debt settlement, or bilateral acknowledgment.
  tool_split:
    DecisionLedger: π_i, ρ_c, α_u, σ_pf の normative binding を保持する。
    GraphEngine: PartitionBound、CorridorBound、ReunionBound、SplitBrainRisk を計算する。
