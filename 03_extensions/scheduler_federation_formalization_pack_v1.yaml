  statement: scheduler_federation_breach_quarantine_model は、breach quarantine、suspension gate、re-entry attestation を parameter 化するモデルである。
  primitives:
    breach_quarantine: β_q = (breach_class, affected_partner, contained_scope, containment_basis, fallback_authority, started_at)
    suspension_gate: γ_s = (triggered_quarantine, resume_blocker, fallback_head, communication_route, review_cadence, activated_at)
    reentry_attestation: ρ_r = (suspended_link, remediation_proof, parity_recheck, watch_period, approving_route, attested_at)
    breach_state: σ_br ∈ {contained, suspended, locally_running, rechecking, watch_mode, restored, terminated}
  functions:
    QuarantineBound: QuarantineBound(β_q)=true iff breach_class, affected_partner, contained_scope, containment_basis, and started_at are all bound.
    SuspensionBound: SuspensionBound(γ_s)=true iff triggered_quarantine, resume_blocker, fallback_head, communication_route, review_cadence, and activated_at are all bound.
    ReentryBound: ReentryBound(ρ_r)=true iff suspended_link, remediation_proof, parity_recheck, watch_period, approving_route, and attested_at are all bound.
    BreachClosed: BreachClosed(β_q,γ_s,ρ_r)=true iff breach containment, suspension or bounded local continuity, and lawful re-entry or termination are all queryable.
    LeakageRisk: LeakageRisk(β_q,γ_s,ρ_r)=high iff reciprocity breach is known while no bounded containment, fallback head, or proof-backed re-entry exists.
  tool_split:
    DecisionLedger: β_q, γ_s, ρ_r, σ_br の normative binding を保持する。
    GraphEngine: QuarantineBound、SuspensionBound、ReentryBound、LeakageRisk を計算する。
    GraphLint: scope-free quarantine / fallback-free suspension / proof-free re-entry を検査する。
    archive_object: β_q, γ_s, ρ_r と breach recovery trail を保存する。
  forbidden_shortcuts:
  - QuarantineBound を contained scope なしで true にする
  - SuspensionBound を fallback head なしで満たしたとみなす
  - ReentryBound を parity recheck なしで宣言する
  residual_open_points: []
scheduler_federation_provenance_relay_model:
  status: provisional_fixed
  statement: scheduler_federation_provenance_relay_model は、provenance relay、evidence notarization chain、replay parity witness を parameter 化するモデルである。
  primitives:
    relay_packet: φ_p = (source_projection, lineage_digest, transformation_step, issuer_authority, delivery_envelope, relayed_at)
    notarization_chain: ν_c = (relay_packet, authority_route, evidence_bundle, hop_attestation, tamper_check, sealed_at)
    parity_witness: ψ_w = (shared_scope, digest_set, normalization_profile, visibility_profile, counterpart_result_digest, witnessed_at)
    provenance_state: σ_pr ∈ {relayed, notarized, parity_checked, divergent, tampered, archived}
  functions:
    RelayBound: RelayBound(φ_p)=true iff source_projection, lineage_digest, transformation_step, issuer_authority, delivery_envelope, and relayed_at are all bound.
    NotarizationBound: NotarizationBound(ν_c)=true iff relay_packet, authority_route, evidence_bundle, hop_attestation, tamper_check, and sealed_at are all bound.
    ParityBound: ParityBound(ψ_w)=true iff shared_scope, digest_set, normalization_profile, visibility_profile, counterpart_result_digest, and witnessed_at are all bound.
    ProvenanceClosed: ProvenanceClosed(φ_p,ν_c,ψ_w)=true iff relay provenance, notarization, and parity witness remain jointly queryable for the exchanged projection.
    ProvenanceGapRisk: ProvenanceGapRisk(φ_p,ν_c,ψ_w)=high iff relayed doctrine or evidence lacks transformation disclosure, tamper verification, or parity profile alignment.
  tool_split:
    DecisionLedger: φ_p, ν_c, ψ_w, σ_pr の normative binding を保持する。
    GraphEngine: RelayBound、NotarizationBound、ParityBound、ProvenanceGapRisk を計算する。
    GraphLint: lineage-free relay / tamper-check-free notarization / profile-free parity を検査する。
    archive_object: φ_p, ν_c, ψ_w と relay exchange trail を保存する。
  forbidden_shortcuts:
  - RelayBound を transformation step なしで true にする
  - NotarizationBound を tamper check なしで満たしたとみなす
  - ParityBound を visibility profile なしで宣言する
  residual_open_points: []
scheduler_federation_detachment_model:
  status: provisional_fixed
  statement: scheduler_federation_detachment_model は、detachment packet、residual obligation repatriation、custody transfer を parameter 化するモデルである。
  primitives:
    detachment_packet: τ_d = (federated_link, detachment_basis, covered_scope, effective_stop_boundary, counterpart_notice, fallback_doctrine, sealed_at)
    repatriation_record: ρ_o = (detachment_packet, residual_obligation_set, receiving_authority, closure_or_migration, acceptance, bound_at)
    custody_transfer: κ_t = (target_archive_bundle, retention_tier, replay_envelope, custody_receiver, transfer_proof, completed_at)
    detachment_state: σ_dt ∈ {announced, bounded, repatriating, transferring, detached, orphaned, archived}
  functions:
    DetachmentBound: DetachmentBound(τ_d)=true iff federated_link, detachment_basis, covered_scope, effective_stop_boundary, counterpart_notice, fallback_doctrine, and sealed_at are all bound.
    RepatriationBound: RepatriationBound(ρ_o)=true iff detachment_packet, residual_obligation_set, receiving_authority, closure_or_migration, acceptance, and bound_at are all bound.
    CustodyTransferBound: CustodyTransferBound(κ_t)=true iff target_archive_bundle, retention_tier, replay_envelope, custody_receiver, transfer_proof, and completed_at are all bound.
    DetachmentClosed: DetachmentClosed(τ_d,ρ_o,κ_t)=true iff exit boundary, residual duty handoff, and archive custody transfer remain jointly queryable after detachment.
    AbandonedDutyRisk: AbandonedDutyRisk(τ_d,ρ_o,κ_t)=high iff a federated link is detached while residual obligations or archive custody lack an accepting receiver.
  tool_split:
    DecisionLedger: τ_d, ρ_o, κ_t, σ_dt の normative binding を保持する。
    GraphEngine: DetachmentBound、RepatriationBound、CustodyTransferBound、AbandonedDutyRisk を計算する。
    GraphLint: basis-free detachment / acceptance-free repatriation / proof-free custody transfer を検査する。
    archive_object: τ_d, ρ_o, κ_t と federation exit trail を保存する。
  forbidden_shortcuts:
  - DetachmentBound を fallback doctrine なしで true にする
  - RepatriationBound を acceptance なしで満たしたとみなす
  - CustodyTransferBound を transfer proof なしで宣言する
  residual_open_points: []
scheduler_federation_mesh_topology_model:
  status: provisional_fixed
  statement: scheduler_federation_mesh_topology_model は、mesh cell、cascade propagation rule、blast-radius segmentation を parameter 化するモデルである。
  primitives:
    mesh_cell: μ = (partner_set, authority_route, trust_boundary, segment_class, blast_radius_cap, active_at)
    propagation_rule: π = (trigger_kind, source_mesh_cell, target_mesh_cell, propagation_basis, max_hop, attenuation_rule, stop_condition, bound_at)
    segmentation_barrier: β = (segment_id, contained_scope, allowed_bridge, override_gate, breach_quarantine_gate, measured_at)
    mesh_state: σ_m ∈ {planned, admitted, segmented, propagating, quarantined, detached, archived}
  functions:
    MeshBound: MeshBound(μ)=true iff partner_set, authority_route, trust_boundary, segment_class, blast_radius_cap, and active_at are all bound.
    PropagationBound: PropagationBound(π)=true iff trigger_kind, source_mesh_cell, target_mesh_cell, propagation_basis, max_hop, attenuation_rule, stop_condition, and bound_at are all bound.
    SegmentationBound: SegmentationBound(β)=true iff contained_scope, allowed_bridge, override_gate, breach_quarantine_gate, and measured_at are all bound.
    CascadeContained: CascadeContained(μ,π,β)=true iff every propagated override or breach remains inside allowed bridges and terminates at declared stop conditions before exceeding blast_radius_cap.
    MeshSpillRisk: MeshSpillRisk(μ,π,β)=high iff propagation can cross trust boundaries or segment classes without a lawful bridge, attenuation rule, or quarantine gate.
  tool_split:
    DecisionLedger: μ, π, β, σ_m の normative binding を保持する。
    GraphEngine: MeshBound、PropagationBound、SegmentationBound、MeshSpillRisk を計算する。
    GraphLint: boundary-free mesh / basis-free propagation / gate-free segmentation を検査する。
    archive_object: μ, π, β と mesh topology trail を保存する。
  forbidden_shortcuts:
  - MeshBound を trust boundary なしで true にする
  - PropagationBound を max_hop なしで満たしたとみなす
  - SegmentationBound を breach quarantine gate なしで宣言する
  residual_open_points: []
scheduler_federation_membership_model:
  status: provisional_fixed
  statement: scheduler_federation_membership_model は、membership admission、trust-tier probation、expulsion trigger を parameter 化するモデルである。
  primitives:
    admission_packet: α = (candidate_partner, sponsoring_authority, admitted_scope, trust_tier, probation_window, escrow_requirement, admitted_at)
    probation_record: ρ = (admission_packet, observation_bundle, violation_budget, uplift_or_hold, review_due, reviewed_at)
    expulsion_case: ε = (partner_ref, trigger_family, evidence_bundle, emergency_lane, retained_duty, sealed_at)
    membership_state: σ_mm ∈ {candidate, admitted, probationary, trusted, suspended, expelled, archived}
  functions:
    AdmissionBound: AdmissionBound(α)=true iff candidate_partner, sponsoring_authority, admitted_scope, trust_tier, probation_window, escrow_requirement, and admitted_at are all bound.
    ProbationBound: ProbationBound(ρ)=true iff admission_packet, observation_bundle, violation_budget, uplift_or_hold, review_due, and reviewed_at are all bound.
    ExpulsionBound: ExpulsionBound(ε)=true iff partner_ref, trigger_family, evidence_bundle, emergency_lane, retained_duty, and sealed_at are all bound.
    MembershipHealthy: MembershipHealthy(α,ρ)=true iff the admitted partner stays inside admitted_scope and satisfies probation review conditions for the declared trust tier.
    SilentPartnerRisk: SilentPartnerRisk(α,ρ,ε)=high iff a partner receives routing privilege, tier uplift, or continued access without sponsor traceability, probation evidence, or retained-duty handling.
  tool_split:
    DecisionLedger: α, ρ, ε, σ_mm の normative binding を保持する。
    GraphEngine: AdmissionBound、ProbationBound、ExpulsionBound、SilentPartnerRisk を計算する。
    GraphLint: sponsor-free admission / evidence-free probation / duty-free expulsion を検査する。
    archive_object: α, ρ, ε と membership lifecycle trail を保存する。
  forbidden_shortcuts:
  - AdmissionBound を sponsoring authority なしで true にする
  - ProbationBound を observation bundle なしで満たしたとみなす
  - ExpulsionBound を retained duty なしで宣言する
  residual_open_points: []
scheduler_federation_capability_routing_model:
  status: provisional_fixed
  statement: scheduler_federation_capability_routing_model は、capability advertisement、selective subscription、route affinity を parameter 化するモデルである。
  primitives:
    capability_advert: κ = (partner_ref, capability_family, supported_scope, qos_profile, trust_prerequisite, expiry_or_review, published_at)
    subscription_contract: σ_s = (subscriber_partner, capability_advert_ref, selected_scope, filter_profile, delivery_sla, unsubscribe_gate, bound_at)
    route_affinity: α_r = (capability_family, preferred_route_set, fallback_route_set, latency_budget, residency_constraint, attested_at)
    capability_state: σ_ca ∈ {published, subscribed, constrained, rerouted, expired, withdrawn, archived}
  functions:
    AdvertisementBound: AdvertisementBound(κ)=true iff partner_ref, capability_family, supported_scope, qos_profile, trust_prerequisite, expiry_or_review, and published_at are all bound.
    SubscriptionBound: SubscriptionBound(σ_s)=true iff subscriber_partner, capability_advert_ref, selected_scope, filter_profile, delivery_sla, unsubscribe_gate, and bound_at are all bound.
    AffinityBound: AffinityBound(α_r)=true iff capability_family, preferred_route_set, fallback_route_set, latency_budget, residency_constraint, and attested_at are all bound.
    RouteSelectable: RouteSelectable(κ,σ_s,α_r)=true iff subscriber trust tier and residency constraints admit at least one preferred or fallback route for the selected capability scope.
    OversubscriptionRisk: OversubscriptionRisk(κ,σ_s,α_r)=high iff full-scope intake, missing unsubscribe gate, or missing fallback routes can create uncontrolled dependency spread.
  tool_split:
    DecisionLedger: κ, σ_s, α_r, σ_ca の normative binding を保持する。
    GraphEngine: AdvertisementBound、SubscriptionBound、AffinityBound、OversubscriptionRisk を計算する。
    GraphLint: scope-free advertisement / gate-free subscription / fallback-free routing を検査する。
    archive_object: κ, σ_s, α_r と routing lifecycle trail を保存する。
  forbidden_shortcuts:
  - AdvertisementBound を trust prerequisite なしで true にする
  - SubscriptionBound を unsubscribe gate なしで満たしたとみなす
  - AffinityBound を fallback route set なしで宣言する
  residual_open_points: []
scheduler_federation_partition_failover_model:
  status: provisional_fixed
  statement: scheduler_federation_partition_failover_model は、partition incident、corridor rerouting、reunion attestation を parameter 化するモデルである。
  primitives:
