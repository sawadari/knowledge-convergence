  functions:
    RingBound: RingBound(ρ_g)=true iff ring_class, promotion_gate, rollback_lane, blast_radius_cap, covered_partner_set, and ratified_at are all bound.
    GraceBound: GraceBound(γ_w)=true iff surface, window_start, window_end, temporary_shim, required_notice, and forced_cutoff are all bound.
    SunsetBound: SunsetBound(δ_s)=true iff deprecated_surface, fallback_removal_condition, exception_registry, archive_duty, sunset_at, and closed_at are all bound or lawfully open.
    PromotionReady: PromotionReady(ρ_g)=true iff required diversity, trust-tier coverage, and gate evidence for the current ring are all satisfied.
    CutoffReady: CutoffReady(γ_w,δ_s)=true iff grace window is complete, temporary shim exit criteria are met, and required archive duty is satisfied.
