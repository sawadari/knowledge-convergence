    restitution_case: ρ_r = (loss_class, custody_return_rule, service_credit_rule, evidence_repair_rule, deadline, closed_at)
    dispute_state: δ_d ∈ {intake, locked, adjudicated, sanctioned, under_appeal, restitution_open, closed, archived}
  functions:
    TribunalBound: TribunalBound(τ_c)=true iff composition, case_intake_packet, forum_lock_rule, appeal_lane, charter, and ratified_at are all bound.
    SanctionBound: SanctionBound(σ_s)=true iff incident_class, severity_band, allowed_sanction_step_set, remediation_deadline, escalation_condition, and bound_at are all bound.
    RestitutionBound: RestitutionBound(ρ_r)=true iff loss_class, custody_return_rule, service_credit_rule, evidence_repair_rule, deadline, and closed_at are all bound or lawfully open.
    ForumLockSafe: ForumLockSafe(τ_c)=true iff the same incident lineage is assigned to exactly one active tribunal lane.
    RestitutionComplete: RestitutionComplete(ρ_r)=true iff required asset return, service credit, evidence repair, and deadline satisfaction are all witnessed.
