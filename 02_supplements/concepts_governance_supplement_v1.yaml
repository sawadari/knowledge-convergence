    - invariance_witness_ref
  delegation_policy:
    central_authority:
      exclusive_scope:
      - cross-domain conversion rule、canonical route core、global default registry template の新設または変更
      - semantic facet / counting_basis / exclusivity の再解釈
      - authority path・accountability family・rollback expectation の再束縛
      - effect_zone を contested / external / irreversible 側へ拡張する rule 変更
      - 複数 domain にまたがる revoke / supersession dispute の最終裁定
      delegable_prechecks:
      - evidence completeness review
      - lineage / witness / scope fit の事前確認
      - template-bound candidate の妥当性確認
    domain_authority:
      allowed_scope:
      - 既存 canonical registry と central policy の範囲内で、semantic family を変えない domain-local route mapping を ratify / activate / supersede / revoke する
      - central ratified template の範囲内で、domain-local strengthening rule を ratify / activate / supersede / revoke する
      - same identity かつ same or narrower scope の canonical registry successor entry を domain 境界内で確定する
      forbidden_scope:
      - cross-domain conversion や global canonical core の変更
      - authority/accountability rebinding
      - rollback expectation の弱化
      - external irreversible commitment を許す default 緩和
    delegated_reviewer:
      allowed_scope:
      - evidence completeness / scope fit / invariance witness / lineage 整合の review
      - pre-ratified template と zero semantic delta を満たす entry の activation
      - same identity・same scope・no revocation trigger の revalidation
      - suspected leak、authority drift、semantic mismatch、policy contradiction に対する provisional emergency suspend の起票と即時停止
      forbidden_scope:
      - 新規 semantic rule の ratification
      - final revoke の単独確定
      - cross-domain / global_default artifact の supersession
      - lexical 類似や慣行だけを根拠に lawful equivalence を主張すること
  sla_policy:
    baseline_windows:
      delegated_review_business_days: 2
      domain_ratification_business_days: 5
      central_ratification_business_days: 10
      activation_or_reflection_business_days: 2
      emergency_suspend_confirmation_business_days: 1
    override_rules:
    - profile 別 override は baseline を短縮または厳格化する方向にだけ許し、single_branch / external irreversible / policy-sensitive action のために緩めてはならない。
    - review_due は pre-expiry cap であり、期限超過を黙示延長の根拠に使ってはならない。
    breach_branch_rules:
      hold: active predecessor がなお lawful であり、same-frame で review / ratification / activation を完了できるとき。
      escalate: same-frame では解決できないが、upper authority path または emergency confirmation path が生きているとき。
      'false': lawful predecessor も upper authority path もなく、decision deadline または safety / policy constraint により current frame を継続できないとき。
  local_convention_barriers:
  - すべての mapping / strengthening / canonical entry は registry_id、scope_ref、authority_ref、lineage_ref、witness_ref を持たなければ authoritative に参照できない。
  - GraphLint は unregistered_mapping_reference、missing_lineage、template_scope_mismatch、silent_extension、local_convention_drift を診断し、GraphEngine は drift event を累積記録する。
  - 反復運用実績は proposal の補助根拠になっても、ratification の代替根拠にはならない。
  - emergency suspend の解除は explicit release または confirmed revoke / supersession を要し、silent revert を許さない。
  tool_split:
