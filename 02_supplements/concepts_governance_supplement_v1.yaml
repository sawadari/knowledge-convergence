    policy_sensitive:
      statement: policy-sensitive facet は semantic drift や local convention の放置コストが高いため、review / ratification / confirmation を baseline より必ず短くする。
      route_mapping_rule:
        delegated_review_due_cap: 1営業日
        domain_ratification_due_cap: 2営業日
        central_ratification_due_cap: 3営業日
        activation_due_cap: 1営業日
        emergency_confirmation_due_cap: 2時間
      strengthening_rule:
        delegated_review_due_cap: 1営業日
        domain_ratification_due_cap: 1営業日
        central_ratification_due_cap: 2営業日
        activation_due_cap: 4時間
        emergency_confirmation_due_cap: 1時間
      canonical_registry_entry:
