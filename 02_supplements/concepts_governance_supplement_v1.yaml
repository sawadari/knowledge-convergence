    - registry_revoked
    - local_convention_detected
  residual_open_points:
  - profile/context ごとの aggregation window と hard expiry を SLA clock とどう整合させるか
sla_clock_calibration_governance:
  status: provisional_fixed
  statement: profile specific SLA clock calibration governance とは、registry authority governance と detector governance における delegated_review_due・ratification_due・activation_due・emergency_confirmation_due を、artifact class・authority tier・profile・context override の直積上で monotone に較正し、危険文脈ほど短く、便宜文脈を理由に緩められないよう拘束する規則である。
  core_claims:
  - SLA は作業待ちの目安ではなく、未審査・未裁定・未反映・未確認の各 provisional state が lawful に滞留してよい最大時間である。
  - review_due は delegated review 未完了状態、ratification_due は normative binding 未確定状態、activation_due は ratified だが未 reflected / 未 effective 状態、emergency_confirmation_due は provisional emergency suspend の未確認状態に対応する。
  - route_mapping_rule は semantic blast radius が最も大きく、strengthening_rule は protected facet 保存前提の局所強化、canonical_registry_entry は same identity / same scope の登録更新が中心であるため、clock を一律にしない。
  - profile baseline と context override の effective due は strictest bound の min で決め、single_branch / external_irreversible / policy_sensitive を理由に時計を延ばしてはならない。
  - emergency suspend は review hold の代用品ではなく、release / revoke / supersede / confirm_hold のいずれかへ必ず接続する確認時計を持つ。
  profile_rationale:
    regulated:
      statement: regulated は provisional drift と未確認 suspend の滞留自体が制度違反や安全逸脱へ直結しやすいため、全 clock を最も短くする。
    engineering_tradeoff:
      statement: engineering_tradeoff は baseline profile とし、技術検討の反復を許しつつも unratified / unactivated state を長期滞留させない。
    organizational_or_social:
      statement: organizational_or_social は consultation と説明調整の負荷が相対的に大きいため review / ratification baseline はやや長く取るが、active suspend の confirmation と activation の放置は許さない。
