        domain_ratification_due_cap: 1営業日
        central_ratification_due_cap: 1営業日
        activation_due_cap: 4時間
        emergency_confirmation_due_cap: 1時間
  override_rules:
    shortening_only:
    - effective due は profile baseline と active context cap の min で決める。
    - local forum convenience、reviewer 不在、会議体の都合、batch 待ちを理由に due を延長してはならない。
    - lawful に再提出された successor artifact または reframe だけが新しい時計を開始できる。silent extension は開始しない。
    non_relaxable_clocks:
    - emergency_confirmation_due は profile/context を問わず緩和禁止である。
    - review_due は delegated reviewer から上位 authority へ handoff されても、handoff 前の滞留を帳消しにしない。
    - activation_due は ratified 済み artifact が effective basis へ未反映のまま external / branch-critical action を支えることを許さない hard cap である。
    - ratification_due は required authority tier を落として短絡する根拠に使ってはならない。
  breach_branch_rules:
    hold:
    - lawful predecessor が active で、same-frame completion に必要な reviewer / confirmer / activation path が生きているとき。
    - intended action が branch-preserving diagnostic / containment に限られ、effective due breach が external / authoritative commitment を直ちに発生させないとき。
    suspend_confirm:
    - provisional emergency suspend が起動済みで、affected reliance が既に停止され、required confirmer への lawful path が残っているとき。
    - suspend の継続は release ではなく confirm / revoke / supersede / explicit hold-confirm のいずれかへ接続されるとき。
    escalate:
    - same-frame completion は不能だが upper authority path または cross-forum confirmation path があるとき。
    - branch-critical action が迫っており、local tier では deadline を守れないとき。
    'false':
    - lawful predecessor がなく、upper authority path も absent で、decision deadline・safety constraint・policy constraint のいずれかにより current frame を継続できないとき。
    - emergency suspend の confirmation path が消滅し、release / revoke / supersede の lawful branch も成立しないとき。
