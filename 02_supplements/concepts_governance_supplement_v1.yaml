  - operator bias / adversarial flooding / replay attack の補正を drift corroboration の aggregation 側へどう入れるか
detector_confidence_aggregation_governance:
  status: provisional_fixed
  statement: detector confidence aggregation governance とは、local_convention_detected・confirmed policy drift・suspected leak の各 detector について、signal unit / cluster unit / corroboration unit / aggregation window を分離し、同系統反復や mirrored duplicate を独立証拠として水増しせずに、bounded な confidence aggregation を emergency suspend / confirm / release / revoke へ接続する共通統治規則である。
  core_claims:
  - signal unit と cluster unit と corroboration unit は別物であり、反復 alert 件数そのものを corroboration 数とみなさない。
  - same_source / same_pipeline / mirrored duplicate / batch slice の反復は cluster 内へ畳み込み、独立 corroboration を水増ししない。
  - confidence aggregation は cluster 内では capped aggregation、cluster 間では independence boundary つき bounded aggregation を使い、単純加算を採らない。
  - threshold は aggregated confidence 単独で切らず、blast radius、authority tier、effective reliance、direct authoritative pair または direct reach evidence の有無と束で評価する。
  - window overlap や burst event は persistence の補助根拠にはなりうるが、confirm 条件の shortcut には使わない。
  unit_taxonomy:
    signal_unit:
      statement: 単一 detector 実行または単一 admissible observation から得られる最小観測単位。source family、source instance、pipeline、team、authority tier、claim facet、observed_at、window_profile を束縛する。
    cluster_unit:
      statement: 同じ latent incident / same hypothesis を指す near-duplicate signal 群を束ねた単位。detector family、target lineage、protected facet または sink facet、effect zone、window anchor を共有する。
    corroboration_unit:
      statement: cluster 群のうち、failure mode と provenance が十分に分離され、独立支持として 1 回だけ数えられる単位。same_team 以下の反復は既定で 1 単位に capped する。
    aggregation_window:
      statement: 1 detector case の confidence を集約する時間または event interval。window は detector family ごとに異なり、window overlap は same hypothesis なら merge を優先する。
  detector_profiles:
    local_convention_detected:
      statement: registry / mapping / strengthening / reflection cycle を単位にし、same basis lineage と protected facet mismatch の疑いを cluster 化する。review thread の反復だけでは corroboration を増やさない。
    policy_drift:
      statement: active / reflected basis の有効期間と effective reliance 区間を窓に取り、protected facet mismatch または superseded / revoked / out-of-scope basis の effective use を cluster 化する。confirm には separation または direct authoritative pair を要求する。
    suspected_leak:
      statement: sink exposure episode と containment / ttl window を窓に取り、artifact lineage・sink family・route identity・audience / automation reach を束ねて cluster 化する。mirrored telemetry は suspicion の補助には使えても confirmed leak の shortcut にしない。
  independence_boundaries:
    same_source: 同一 source instance・同一 log stream・同一 declaration thread。独立 corroboration には数えない。
    same_pipeline: 同一 pipeline 内の再計算、retry、mirror copy。既定では 1 cluster に畳み込む。
    same_team: 同一 team / 同一 authority family に属するが、cross_pipeline / cross_authority までは離れていない観測。coupled_duplicate / judgement_split / tool_split / dual_separated / forum_separated に細分し、dual_separated 以上だけを same_team corroboration 候補とする。
    cross_pipeline: 異なる observability path、異なる execution chain、または registry trace と runtime trace のように failure mode が分離された観測。独立 corroboration の既定下限になる。
    cross_authority: authority tier または organization boundary が分離された観測。global_default や external commitment を含む confirm で最も強い separation とみなす。
  duplicate_and_burst_taxonomy:
    repeated_alert: 同一 source / pipeline から同じ hypothesis に対して反復発火した alert。persistence 補助には使えても corroboration を増やさない。
    mirrored_duplicate: 同一原観測の mirror / replica / cache / downstream copy。freshness / lag が整っても独立証拠には数えない。
    batch_anomaly: 単一 batch failure から多数 item が同時発火した状態。item 数ではなく batch incident 1 件として扱い、count inflation を禁止する。
    window_overlap: 重なる集約窓から同一 hypothesis が再計上される状態。window anchor と lineage が同じなら merge し、別 window とみなすには state transition または effect-zone shift を要求する。
    burst_event: 短時間の高頻度 signal 群。strong suspicion の早期起動には使えるが、confirm 条件では capped persistence bonus までに留める。
  aggregation_policy:
    within_cluster:
    - cluster 内集約は max-support を基底にし、source diversity と time persistence にだけ bounded bonus を与える。
    - same_source / same_pipeline の追加 signal は confidence を線形加算しない。
    - batch anomaly の item 数、mirrored duplicate 数、retry 回数は corroboration 数に変換しない。
    across_clusters:
    - cluster 間集約は corroboration unit ごとに代表 cluster を取り、bounded aggregation を使う。
    - same_team 以下の cluster 群は既定で 1 corroboration unit に capped し、cross_pipeline 以上で初めて独立 corroboration を増やす。
    - window overlap で hypothesis_key・effect_zone・lineage が同じ cluster は merge し、distinct state transition がある場合だけ分離する。
    non_implications:
    - aggregated confidence が高いこと自体は confirm を意味しない。
    - single strong cluster は emergency suspend を正当化しうるが、confirmed policy drift や confirmed leak の shortcut 一般にはならない。
  branch_connection:
    emergency_suspend:
    - single strong cluster でも、blast radius が大きい、effective reliance が live、または protected facet / prohibited sink への hit があるときは起動しうる。
    - burst だけで起動するのではなく、current action の downstream automation / external commitment / authoritative reliance と束で評価する。
    confirm:
    - confirmed policy drift には direct authoritative pair、または required separation を満たす 2 以上の corroboration unit を要求する。
    - confirmed leak には direct reach evidence と direct sink identity を要求し、mirrored telemetry 単独を shortcut にしない。
    release:
    - lawful lineage repair、reflection 完了、scope repair、closure evidence、または false positive clearing により active mismatch / live exposure が消えたとき。
    - window expiry だけでは release せず、repair または contrary evidence の束縛を要求する。
    revoke_or_escalate:
    - unlawful basis や leaked artifact を authoritative / active set から外す必要があるときは revoke を優先する。
    - required authority 不足、cross-domain impact、peer forum conflict、notification obligation が残るときは escalate する。
  tool_split:
    DecisionLedger:
    - detector_case_id
    - hypothesis_key
    - signal_unit_id
    - signal_cluster_id
    - corroboration_unit_id
    - aggregation_window_profile_ref
    - window_anchor_ref
    - independence_class
    - duplicate_kind
    - burst_cap_state
    - cluster_support_class
    - aggregated_confidence_bundle_ref
    GraphEngine:
    - detector_signal_clustered
    - detector_signal_deduped
    - detector_cluster_corroborated
    - detector_window_merged
    - detector_burst_capped
    - emergency_suspend_triggered
    - detector_case_released
  residual_open_points:
  - profile/context ごとの aggregation window と hard expiry の数値較正
  - mirror lag upper bound の prior / credibility level を detector freshness rule へどう較正するか
  - operator bias / adversarial flooding / replay attack への補正をどこまで canonical 化するか
detector_window_expiry_governance:
  status: provisional_fixed
  statement: detector window / expiry governance とは、detector case ごとの signal persistence window・corroboration aggregation window・case hard expiry を分離して較正し、freshness・mirror lag・confirmation_due と接続しながら stale evidence の admissibility を統治する規則である。
  core_claims:
  - signal persistence window は cluster が live corroboration として数えられる上限である。
  - corroboration aggregation window は独立 cluster を同一 case epoch に束ねられる上限である。
  - case hard expiry は unresolved case に対して stale support を current judgement へ使える最終上限であり、超過後は invalid へ落とす。
  - grace 領域は hold / emergency suspend の継続や manual review の補助には使えるが、confirmed policy drift、confirmed leak、release / closure の shortcut には使わない。
  - hard expiry 到達は auto release や auto clear を意味しない。hard expiry は stale support の admissibility を失効させ、新しい観測を new epoch として扱う境界である。
  detector_family_rationale:
    local_convention_detected:
      statement: local convention は疑い状態であり、review / reflection cycle にまたがる観測を束ねる必要があるため、3 family の中では最も長い window を取る。
    confirmed_policy_drift:
      statement: confirmed drift は active / reflected basis と current effective use の差分を扱うため、local convention より短く、suspected leak より長い中間 window を取る。
    suspected_leak:
      statement: suspected leak は外部到達や不可逆露出の危険を扱うため、3 family の中で最も短い window と hard expiry を取る。
  baseline_window_table:
    regulated:
      local_convention_detected:
        signal_persistence_window: 2営業日
        corroboration_aggregation_window: 4営業日
