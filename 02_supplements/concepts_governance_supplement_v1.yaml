  - operator bias / adversarial flooding / replay attack の補正項をどこまで canonical 化するか
mirror_lag_prior_credibility_governance:
  status: provisional_fixed
  statement: mirror lag prior / credibility governance とは、mirrored source の lag upper bound を source family ごとの prior と credibility class で初期化し、clock / cadence / breach history を用いて安全側に更新し、effective age・freshness・detector window・confirmation_due の admissibility へ接続する規則である。
  core_claims:
  - lag upper bound は平均遅延ではなく、current judgement に使ってよい安全側上界である。
  - credibility は content 真偽ではなく、その lag upper bound を current frame で信頼してよい強さを表す。
  - prior は source family と delivery semantics から与え、sample が少ない場合の初期保守値として使う。
  - 同一 source family でも clock missing、anchor mismatch、identity lineage 断絶、recent breach により credibility は低下しうる。
  - weak basis や self-report は bound を tighten できず、unknown_or_excessive は stale 以上として扱う。
  credibility_classes:
    deterministic:
      statement: hard ceiling または zero-lag が authority/clock basis で確定している状態。
      numeric_level: 0.99
      allowed_use:
      - live support
      - confirmed branch
      - closure / release confirmation
    bounded_strong:
      statement: ratified delivery SLA または stable mirror path により、保守側 upper bound を強く束縛できる状態。
      numeric_level: 0.95
      allowed_use:
      - live support
      - outward-risk facet の confirmed 候補
      limits:
      - direct reach confirmed の代用にはしない
      - sealed re-entry / closure confirmation の単独根拠にはしない
    bounded_moderate:
      statement: ratified batch rule または十分な recent empirical lag から upper bound を置けるが、path 変動余地が残る状態。
      numeric_level: 0.9
      allowed_use:
      - live または grace support
      - provisional promotion
      - suspicion 継続
      limits:
      - confirmed branch の単独根拠にはしない
    weak:
      statement: sparse export、digest、summary、または self-report 補助だけで上界を推定している状態。
      numeric_level: 0.75
      allowed_use:
      - hold 継続
      - manual review 起動
      limits:
      - live confirm / release / closure には使わない
    unknown_or_excessive:
      statement: admissible な upper bound がない、または current window に対して過大である状態。
      numeric_level: 0.0
      allowed_use: []
      limits:
      - stale 以上として扱う
      - confirmed / closure には使わない
  source_family_priors:
    direct_system_observation:
      prior_upper_bound: 0秒
      default_credibility_class: deterministic
      note: same authoritative plane の直観測は mirror lag rule を介さない。
    direct_reach_evidence:
      prior_upper_bound: 0秒
      default_credibility_class: deterministic
      note: current reach / externality の直達証拠は zero-lag で扱う。
    access_control_or_routing_log:
      prior_upper_bound: 5分
      default_credibility_class: bounded_strong
      note: first-party authoritative log を前提とし、clock health と lineage が束縛される場合に限る。
    mirrored_telemetry:
      prior_upper_bound: 30分
      default_credibility_class: bounded_strong
      note: near-real-time mirror path を対象とし、sampling summary や periodic export は含めない。
    mirrored_registry:
      prior_upper_bound: 1営業日
      default_credibility_class: bounded_moderate
      note: reflected registry や secondary catalog の反映遅延を含む。
    exported_log:
      prior_upper_bound: 4時間
      default_credibility_class: bounded_moderate
      note: periodic export / ETL / index refresh を含む。
    batch_summary:
      prior_upper_bound: 2営業日
      default_credibility_class: weak
      note: digest / report / aggregated summary は freshness より coverage 説明向けに使う。
  update_rules:
  - direct_system_observation と direct_reach_evidence は prior を更新せず、常に zero-lag deterministic とする。
  - mirrored source の active upper bound は、source family prior、ratified cadence/SLA bound、recent breach guard、安全余裕の max で保守側に求める。
  - stronger basis が入った場合だけ bound を tighten できる。weak basis や self-report では tighten しない。
  - recent breach が active upper bound を超えた場合、repair/revalidation 前は unknown_or_excessive へ落とす。
  - clock missing、anchor mismatch、identity lineage 断絶、sampling semantics 不明のいずれかがある場合、少なくとも bounded_strong には置かない。
  connection_rules:
    with_effective_age:
    - effective age は observation age + active upper bound で評価する。
    - bounded_moderate 以下の class は、single_branch / external_irreversible / policy_sensitive では live 判定を短くし、window の早い方に従わせる。
    with_freshness:
    - deterministic / bounded_strong で active upper bound が signal persistence window 内なら live 候補になりうる。
    - bounded_moderate は local convention / provisional drift では live 候補になりうるが、confirmed leak / closure の単独根拠にはしない。
    - weak は最大でも grace support とし、unknown_or_excessive は stale 以上とする。
    with_confirmation_due:
    - emergency confirm に使う mirrored evidence は、少なくとも bounded_strong で、effective age が confirmation_due_at と case_hard_expiry の早い方を超えないことを要求する。
    - mirrored_registry / exported_log / batch_summary は、単独では release / closure confirmation の最終根拠にしない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - lag_prior_family
    - lag_prior_upper_bound
    - lag_credibility_class
    - lag_credibility_level
    - lag_bound_basis
    - lag_bound_updated_at
    - lag_unknown_or_excessive_reason
    graph_engine:
    - lag_prior_initialized
    - lag_bound_tightened
    - lag_bound_degraded
    - lag_unknown_or_excessive_detected
  residual_open_points:
  - small-sample 時の empirical lag sample をどの observation class 粒度で pooled 更新するか
  - hidden coupling relation の semantic delta class を detector / facet ごとにどこまで自動判定するか
  - operator bias / adversarial flooding / replay attack の補正を detector confidence 側へどう戻すか
same_team_partial_independence_governance:
  status: provisional_fixed
  statement: same_team partial independence governance とは、同一 team / 同一 authority family の内部で、operator・tool・forum・raw basis・derivation の差分を common-mode failure 分離として較正し、どの pair を bounded diagnostic diversity、どの pair を same_team corroboration unit、どの pair を重複として畳み込むかを定める規則である。
  core_claims:
  - independence は人数差ではなく、共通 upstream・共通判断鎖・共通実行基盤からどこまで failure mode を分離できているかで決まる。
  - top-level provenance separation は same_source / same_pipeline / same_team / cross_pipeline / cross_authority を維持し、same_team はその内部でだけ細分する。
  - operator split だけ、または tool split だけでは独立 corroboration を作らず、manual triage と max_conf の bounded bonus に留める。
  - same_team corroboration unit は dual_separated または forum_separated に限って認め、1 team / 1 hypothesis / 1 aggregation window あたり 1 unit に cap する。
  - same_team corroboration は required_separation=same_team の文脈にだけ使え、cross_pipeline / cross_authority の required separation を代替しない。
  - same_team corroboration は local_convention_detected と template_local の drift 確認補助には使えるが、confirmed leak、direct reach、external commitment、policy_sensitive facet の shortcut には使わない。
  classification_order:
  - まず same_source / mirrored derivation / same_pipeline / cross_pipeline / cross_authority を判定し、same_team の内部較正は residual case にだけ適用する。
  - cross_pipeline または cross_authority が成立する場合、same_team の内部 class ではなく上位 separation を優先する。
  - same raw-basis snapshot、same exported slice、same mirrored copy から生じた pair は、別 operator / 別 tool でも coupled_duplicate へ落とす。
  hidden_coupling_axes:
  - shared_raw_basis_snapshot
  - mirrored_or_derived_copy
  - shared_operator_judgement
  - shared_tool_or_model_run
  - shared_rulepack_or_prompt_pack
  - shared_forum_or_review_chain
  - shared_authority_path
  same_team_partial_classes:
    coupled_duplicate:
      statement: same team 内で見かけ上は別 signal でも、同一 raw basis、mirror copy、derived preview、または実質的に同じ判断鎖から生じた重複。
      allowed_use:
      - dedup
      - persistence support
      non_implications:
      - 独立 corroboration を意味しない。
      - tool / operator の数を増やしても corroboration unit は増えない。
    judgement_split:
      statement: operator は異なるが、tool / forum / raw basis / pipeline が実質的に共有される pair。判断者多様性はあるが、failure mode 分離は弱い。
      allowed_use:
      - manual review priority の上昇
      - max_conf への bounded bonus
      non_implications:
      - corroboration unit の追加を意味しない。
      - confirm 条件の separation を満たさない。
    tool_split:
      statement: tool または model execution family は異なるが、operator または raw basis / forum が共有される pair。診断多様性はあるが、upstream coupling が残る。
      allowed_use:
      - diagnostic diversity の記録
      - max_conf への bounded bonus
      non_implications:
      - corroboration unit の追加を意味しない。
      - cross_pipeline の代用ではない。
    dual_separated:
      statement: operator と tool/execution family がともに分離され、shared raw-basis snapshot や mirrored derivation がなく、観測 anchor または acquisition path が独立している pair。
      allowed_use:
      - same_team corroboration unit
      - local_convention_detected の corroboration 補助
      caps:
      - 1 team / 1 hypothesis / 1 aggregation window あたり 1 unit
      - repeated pair や再観測を線形加算しない
    forum_separated:
      statement: dual_separated に加えて、forum / review chain または sub-authority path が分離され、同一 team 内で最も強い benign independence を持つ pair。
      allowed_use:
      - same_team corroboration unit
      - template_local の drift 確認補助
      caps:
      - cross_pipeline / cross_authority へ昇格しない限り 1 team cap を超えない
  admissibility_rules:
  - judgement_split と tool_split は corroboration unit 数を増やさず、bounded bonus だけを与える。
  - dual_separated / forum_separated でも、shared prompt / shared rulepack / shared model checkpoint が同一 raw basis へ同型変換を掛けているだけなら corroboration unit に昇格させない。
  - same_team corroboration unit は detector family ごとに required_separation=same_team のときだけ admissible であり、cross_pipeline / cross_authority の requirement を代替しない。
  - same_team corroboration unit は direct sink identity、direct reach、external commitment、sealed re-entry、policy_sensitive facet の final confirm には使わない。
  - one team から複数の dual/forum separated pair が出ても、current aggregation window 内では代表 1 unit だけを数える。
  context_connection:
    local_convention_detected:
    - judgement_split / tool_split は investigation priority を上げうるが、confirm shortcut には使わない。
    - dual_separated / forum_separated は same_team corroboration unit として admissible になりうる。
    confirmed_policy_drift:
    - template_local で required_separation=same_team の場合だけ、forum_separated を confirm 補助へ使える。
    - domain_local 以上で required_separation が cross_pipeline 以上なら same_team corroboration は不足とみなす。
    suspected_leak:
    - same_team partial independence は suspicion 強化には使えても、confirmed leak の direct reach / sink identity requirement を代替しない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - same_team_partial_class
    - hidden_coupling_axis_set
    - same_team_pair_admissibility
    - same_team_corroboration_cap_applied
    - bounded_bonus_class
    - confirm_forbidden_reason
    graph_engine:
    - same_team_pair_classified
    - same_team_pair_collapsed
    - same_team_bonus_applied
    - same_team_corroboration_capped
    - same_team_confirm_blocked
  residual_open_points:
  - hidden coupling relation の bounded_shared と hard_shared の境界を detector family / claim facet ごとにどこまで自動判定できるか
  - operator bias / adversarial flooding / replay attack の補正を aggregation 側へどう戻すか
hidden_common_mode_coupling_registry_governance:
  status: provisional_fixed
  statement: hidden common-mode coupling registry governance とは、prompt / rulepack / model checkpoint / template / mirror lineage のように、表面上は別 signal や別 reviewer path に見えても実際には同型変換・同一実行意味・同一派生鎖を共有させる upstream source を canonical registry として管理し、same_team corroboration cap、small-sample prior reset、penalty activation、manual review routing の共通根拠へ接続する規則である。
  core_claims:
  - hidden coupling は pairwise heuristic ではなく authoritative registry で扱う。local naming や運用記憶だけで independence を主張しない。
  - canonical source family は prompt_pack、rulepack、model_checkpoint、template_bundle、mirror_lineage の5つを採用する。
  - mirror_lineage は content source ではなく derivation family だが、independence collapse・replay 判定・prior reset trigger に効くので同じ registry で扱う。
  - same family であっても同一性・派生・継承・鏡像・同一実行束縛を区別し、family 一致だけで hard coupling とみなさない。
  - corroboration 判定は signal pair の表面差分より upstream closure を優先する。
  - registry 未束縛の hidden coupling は independence の証拠ではなく、未知は安全側で unresolved coupling として扱う。
  canonical_source_families:
    prompt_pack:
      statement: 推論・判定・要約の指示集合。system/developer/operator prompt、guard prompt、review prompt の束を含む。
    rulepack:
      statement: 判定規則・lint rule・threshold profile・mapping rule など、実行意味を拘束する規則束。
    model_checkpoint:
      statement: model family、checkpoint、adapter、safety overlay、runtime decoding profile の組。
    template_bundle:
      statement: report / review form / checklist / extraction schema / UI template など、出力・観測の枠を事前に形作るテンプレート束。
    mirror_lineage:
      statement: mirror / cache / exported slice / derived preview / replicated index の lineage root と refresh chain。
  relation_taxonomy:
    identical_source:
      statement: 同一 registry entry または content-equivalent hash / witness を持つ。
    parameterized_variant:
      statement: 共通 parent を持ち、差分は parameter / wording / threshold の局所変化に限られる。semantic role は保存される。
    inherited_bundle:
      statement: base pack / template を継承し、局所 add-on だけが異なる。
    mirrored_lineage:
      statement: direct source ではなく同一 lineage root から派生した copy / cache / export / preview である。
    co_executed_profile:
      statement: prompt / rulepack / checkpoint が別 entry でも同じ execution profile または same run capsule で束縛される。
    unrelated:
      statement: canonical witness 上、同一 upstream source を共有しない。
  coupling_strength_policy:
    hard_shared:
      conditions:
      - identical_source
      - mirrored_lineage
      - co_executed_profile
      - parameterized_variant または inherited_bundle で semantic delta class が none である
      - parameterized_variant または inherited_bundle で semantic delta class が material または unresolved である
      effects:
      - same_team corroboration unit を増やさない。
      - dual_separated / forum_separated を confirm 用 independence に使わない。
      - semantic delta class が none のときも、見かけ上の差分を独立 corroboration route に数えない。
      - small-sample calibration を cold_start または sparse へ戻す trigger になりうる。
    bounded_shared:
      conditions:
      - parameterized_variant または inherited_bundle で、semantic delta が ratified され、affected facet が限定される
      effects:
      - confirm 用 corroboration は増やさず、triage / bounded bonus / scoped manual review routing にだけ使う。
      - profile / facet に応じて same_team cap を厳格化する。
    weak_affinity:
      conditions:
      - family は同じだが active lineage / parent / execution capsule の共有が witness で束縛されない
      effects:
      - registry metadata として保持するが、自動 downgrade はしない。
      - unresolved coupling suspicion が別に立っていれば manual review を優先する。
  registry_entry_schema:
    required_fields:
    - coupling_source_id
    - source_family
    - canonical_fingerprint
    - semantic_role
    - version_or_snapshot
    - parent_source_ref
    - lineage_root_ref
    - execution_capsule_ref
    - authority_ref
    - validity_window
    - status
    optional_fields:
    - affected_detector_family_set
    - affected_claim_facet_set
    - semantic_delta_class
    - mirror_refresh_profile_ref
    - witness_ref
    - supersedes_ref
  linkage_rules:
    same_team_partial_independence:
    - signal pair が hard_shared な coupling source を共有する場合、TP は dual_separated / forum_separated へ昇格させず、少なくとも tool_split 以下へ抑制する。
    - hard_shared mirror_lineage を共有し、かつ raw_basis_lineage も同一なら coupled_duplicate として畳み込む。
    - bounded_shared は corroboration increment を増やさず、diagnostic diversity metadata と scoped triage にだけ使う。
    small_sample_prior_reset:
    - unseen coupling source family、major version change、lineage root change、unresolved relation の新規検出は calibration reset trigger 候補である。
    - hard_shared source の新規発見により、既存の warmed judgement が hidden coupling 前提で成立していた場合は OS を cold_start または sparse へ巻き戻す。
    - bounded_shared でも detector family / claim facet が protected facet に触れるときは prior_ready を一時停止しうる。
    penalty_activation:
    - flooding penalty は burst 内 cluster が hard_shared または bounded_shared source に密集するときに強化する。
    - replay penalty は mirrored_lineage または inherited_bundle の再包装を new corroboration と数えないための根拠にする。
    - bias penalty は shared prompt / template / forum chain が confirm path を実質同型化しているときに severity を上げうる。
    manual_review_routing:
    - hard_shared かつ protected facet 影響あり、または relation unresolved の場合、confirm / release 前に manual review を必須とする。
    - cross-domain / global_default / external_irreversible に触れる coupling registry の新設・major change は central または domain authority review を要する。
    - same-team local template だけに閉じる bounded_shared change は delegated review を許しうるが、confirm shortcut には使わない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - coupling_source_id_set
    - coupling_relation_ref_set
    - coupling_strength_class
    - coupling_resolution_status
    - calibration_reset_reason
    - same_team_downgrade_reason
    - manual_review_required_by_coupling
    graph_engine:
    - coupling_registry_entry_created
    - coupling_registry_entry_superseded
    - coupling_relation_bound
    - hidden_coupling_detected
    - same_team_independence_downgraded
    - calibration_reset_triggered_by_coupling
  residual_open_points:
  - 真の incident burst と adversarial flooding を hidden coupling を前提に early-stage でどう分離するか
adversarial_correlation_penalty_governance:
  status: provisional_fixed
  statement: small-sample prior / credibility governance とは、sparse evidence 下で α0 / β0 / credibility level ρ の役割を分離し、confirm / release / execute のような enabling branch と suspend / gate / manual review のような blocking branch を混同せずに安全側で判定する規則である。
  core_claims:
  - prior は証拠代替ではなく、少数観測時の過信を抑える正則化である。
  - α0 / β0 は prior mean と prior mass を通じて、既定期待値と慣性を分けて与える。
  - ρ は lower confidence bound の厳しさであり、integrity / freshness / provenance の代用ではない。
  - confirm / release / delegated auto re-enable は、confirm-grade support の posterior を安全側に読む用途でだけ prior を使う。
  - emergency suspend / manual review / provisional hold は、small-sample posterior 単独ではなく、strong direct anchor・critical context・policy block と束で開く。
  - severe penalty や confirmed attack-like judgement は、prior だけで作らず、direct abuse anchor または分離した corroboration を要求する。
  penalty_taxonomy:
    bias_penalty:
      statement: operator / reviewer / forum の寄与が過度に集中し、directional skew や confirm/veto の偏りが続くために、見かけ上の corroboration が実質的に同一判断鎖へ収束している状態への補正。
      activation_examples:
      - confirm path の主要 cluster が同一 operator family または同一 reviewer chain に集中する
      - same_team bonus や manual override が特定 operator 側へ系統的に偏る
      - self-report や reviewer-mediated transform への依存が強いのに counter-anchor が乏しい
      first_effects:
      - judgement_bonus / tool_bonus の除去
      - same_team corroboration credit の停止
      - aggregate confidence の安全側減衰
      do_not_apply_as_numeric_penalty_when:
      - direct authoritative pair が first-party anchor と fresh な runtime trace で束縛されている
      - direct reach / direct sink identity が高 integrity で束縛され、operator discretion が confirm path に介在しない
    flooding_penalty:
      statement: 同一 hypothesis / facet / sink に対し、low-diversity signal を短時間に大量投入して queue や aggregation を飽和させ、confidence を水増ししようとする挙動への補正。
      activation_examples:
      - dedup 後にも same pipeline / same team の burst が期待 cadence を大きく超える
      - batch slice や retry が cluster / corroboration unit を押し上げる方向で再包装される
      - sink enumeration や review queue saturation を狙う probing が見える
      first_effects:
      - excess cluster の collapse
      - persistence bonus の抑制
      - confirm path の一時停止または security/audit への escalate
      do_not_apply_when:
      - registry 済み cadence を持つ telemetry / batch job の正常 burst である
      - statistical equivalence rule に沿った lawful re-sampling である
    replay_penalty:
      statement: stale / grace / resolved / revoked の lineage や same observation anchor を、新規観測であるかのように別 window / 別 signal_id / 別 artifact へ再投入する挙動への補正。
      activation_examples:
      - same exported slice / mirrored snapshot / derived preview を new evidence として再利用する
      - hard expiry 超過後の support を new epoch の corroboration に数えようとする
      - resolved case の evidence を lineage concealment つきで再点火する
      first_effects:
      - cross-window corroboration の停止
      - persistence support への格下げまたは invalid 化
      - confirm shortcut の遮断
      do_not_apply_when:
      - explicit revalidation により新しい observation anchor と successor lineage が記録されている
      - remediation / reflection に伴う lawful new epoch が明示されている
  application_rules:
    detector_confidence_aggregation:
    - bias penalty はまず bounded bonus を外し、その後も cluster が残るときだけ confidence を減衰させる。
    - flooding penalty は dedup / merge / TeamCap 適用後の excess multiplicity にだけ掛ける。raw count の多さ自体を penalty 理由にしない。
    - replay penalty は freshness / lag / epoch split で既に invalid な部分を二重減点しない。残余の reused support だけを減衰させる。
    policy_drift_threshold:
    - local_convention_detected は penalty 後の max_conf で評価するが、confirmed_policy_drift は severe penalty が confirm path を汚染している間は開かない。
    - direct authoritative pair が clean なとき、その direct cluster 自体には numeric penalty を掛けず、周辺 corroboration path だけを減衰させる。
    suspected_leak_corroboration:
    - direct reach / direct sink identity は replay や flooding の shortcut を受けず、依然として別の必須条件として要求する。
    - same_team partial independence は suspicion 強化には使えても、penalty で汚染された corroboration は confirmed leak の補助根拠へ昇格させない。
    - severe flooding / replay が detector abuse を示す場合、LeakS とは別に detector abuse escalation を起動する。
  degrade_suspend_escalate_rules:
    degrade:
    - mild bias は bounded bonus を除去する
    - mild flooding は excess cluster を capped duplicate へ畳み込む
    - mild replay は persistence support にだけ残し、new corroboration に数えない
    suspend:
    - moderate flooding / replay により current confirm path が汚染され、automation / externality / authoritative reliance が生きている
    - severe bias により reviewer path の公正性が壊れ、same-frame manual override なしでは confirm を開けない
    escalate:
    - detector abuse suspicion があり、security / audit / upper authority path が存在する
    - severe penalty が policy-sensitive / external-commitment / sealed re-entry の文脈に触れる
    'false':
    - severe penalty があり、lawful remediation path も upper path もなく、current frame で reliance を継続できない
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - calibration_target_family
    - prior_mean
    - prior_mass
    - credibility_level
    - ordinal_fallback_state
    - prior_profile_ref
    - context_cap_ref
    - direct_anchor_exception_flag
    graph_engine:
    - prior_profile_bound
    - ordinal_fallback_entered
    - ordinal_fallback_released
    - calibration_reset_triggered
  residual_open_points:
  - hidden coupling relation の semantic delta class を calibration reset policy へどこまで自動連携するか
  small_sample_prior_credibility_governance: null
  role_split:
    prior_mean:
      notation: m0 = α0 / (α0 + β0)
      meaning: sparse evidence 下で既定でどこまで confirm-grade / success-grade だとみなすかの上限。
      safety_direction: high-impact 文脈ほど小さくする。
    prior_mass:
      notation: n0 = α0 + β0
      meaning: 少数観測に対して posterior がどれだけ動きにくいかを決める慣性。
      safety_direction: irreversible / policy-sensitive 文脈ほど大きくする。
    credibility_level:
      notation: ρ
      meaning: lower confidence bound をどこまで厳しく取るかを決める信頼水準。
      safety_direction: confirm / release / execute に使う文脈ほど高くする。
  target_families:
    delegated_auto_success:
      positive_event: bounded delegated action が incident なく完了し、rollback / post-check まで含めて success-grade だったこと。
      note: self-confidence の c_hist に使う。
    detector_confirmability:
      positive_event: detector support が dedup / freshness / provenance / penalty gate を通過し、confirm-grade corroboration として残ること。
      note: confirmed_policy_drift / confirmed_leak / final release 側に使う。
    penalty_severity_estimation:
      positive_event: bias / flooding / replay の penalty judgement が review 後も持続し、confirm gate に値すること。
      note: severe penalty は posterior 単独では作らず、direct abuse anchor または separated corroboration を要する。
  branch_policy:
    enabling_branch:
      applies_to:
      - confirmed_policy_drift
      - confirmed_leak
      - release
      - delegated auto re-enable
      rules:
      - warmed 状態または direct authoritative anchor がない限り、posterior 単独で threshold 充足とみなさない。
      - strong な prior を理由に confirm / release を早めない。
    blocking_branch:
      applies_to:
      - emergency_suspend
      - manual_review_priority
      - provisional_hold
      - penalty_gate provisional activation
      rules:
      - cold_start でも strong direct anchor や protected facet hit があれば開きうる。
      - ただし sparse posterior だけで severe penalty や confirmed attack judgement を作らない。
  ordinal_fallback_policy:
    states:
      cold_start: effective sample が初期閾値未満で、posterior は ranking / bonus removal / manual review priority にしか使わない状態。
      sparse: posterior は suspicion 継続や hold / suspend 維持に使えるが、final confirm / release / severe penalty には不足する状態。
      warmed: posterior を confirm-grade threshold 判定へ使える状態。
    reset_rules:
    - unseen context bucket
    - detector family の切替え
    - major policy version change
    - hidden common-mode coupling の新規検出
    - severe drift / replay concealment
  monotone_strictness_rules:
  - regulated_domain は engineering_tradeoff_domain より prior_mean を上げない。
  - external_irreversible と policy_sensitive は normal context より prior_mass と ρ を下げない。
  - suspected_leak / confirmed_policy_drift / penalty_severity は local_convention_detected より confirm optimism を高くしない。
early_stage_burst_flooding_separation_governance:
  status: provisional_fixed
  statement: early-stage burst / flooding separation governance とは、hidden common-mode coupling registry、same-team corroboration cap、small-sample prior を前提に、lawful incident burst と attack-like flooding を sparse な初期観測段階で分離し、suspend は早めるが confirm は早めすぎないための概念規則である。
  core_claims:
  - early-stage separation は malicious intent の最終断定ではなく、current detector branch を安全側に振り分ける provisional classification である。
  - lawful incident burst は単なる件数の多さではなく、registered cadence または incident response runbook に沿う集中観測であり、direct anchor・独立 route・sink 適合性のいずれかで支えられる。
  - attack-like flooding は、low-diversity・hard_shared concentration・replay reuse・sink probing の組で corroboration を水増しする、または queue / automation path を飽和させる集中投入である。
  - sparse state では benign と hostile の二値に潰さず、ambiguous_sparse を明示的に保持する。
  - suspend threshold は confirm threshold より低く、protected facet や external-sensitive sink では provisional suspend を先に開ける。
  - confirmed attack-like judgement は early-stage score だけで作らず、direct abuse anchor または separated corroboration を追加で要求する。
  minimal_observation_unit:
    support_atom:
      statement: 同一 hypothesis_key、同一 protected facet、同一 sink family、同一 epoch の下で dedup / merge / TeamCap 後に残る最小 support 単位。
      required_bindings:
      - hypothesis_key
      - protected_facet
      - sink_ref_or_sink_family
      - epoch_id
      - cluster_rep_ref
      - source_closure_ref
    cluster:
      statement: 同一 detector case の中で、support_atom を hypothesis_key × protected_facet × sink × epoch ごとに束ねた局所 burst 観測集合。
  cluster_taxonomy:
    lawful_incident_burst:
      statement: registered cadence または ratified incident workflow と整合し、replay concealment がなく、direct anchor / independent route / sink fit のいずれかで支えられる集中観測。
      non_implications:
      - confirm-grade corroboration の自動成立を意味しない。
      - excess multiplicity の全免責を意味しない。
    ambiguous_sparse_burst:
      statement: burst は見えるが、cadence・diversity・coupling・replay・sink exposure のいずれかが未束縛で、lawful / hostile をまだ切れない状態。
      non_implications:
      - benign 判定ではない。
      - confirm-grade flooding 判定でもない。
    flooding_suspect:
      statement: cadence excess、diversity collapse、hard_shared concentration、replay reuse、sink probing のうち複数が同時に現れ、lawful burst witness が不足しているため、corroboration inflation または detector abuse を疑う状態。
      non_implications:
      - 直ちに malicious intent を確定しない。
      - direct anchor を自動で否定しない。
    attack_like_flooding_confirmed:
      statement: flooding_suspect に加え、direct abuse anchor または separated corroboration があり、sink probing / queue saturation / concealed replay のいずれかが confirm-grade に束縛された状態。
      non_implications:
      - incident 内容自体の真偽を一括否定するわけではない。
      - remediation path の不存在を直ちに意味しない。
  threshold_bundle_axes:
    diversity_axis:
      statement: dedup・same_team cap・hidden coupling closure を通した後に、独立 corroboration unit がどこまで残るかを見る軸。
      safety_rule:
      - hard_shared と mirrored_lineage mass は diversity を増やさない。
      - bounded_shared は diagnostic metadata には使えても confirm 用独立 unit には使わない。
    cadence_axis:
      statement: 観測密度が registered cadence、incident runbook、lawful retry / re-sampling envelope と整合するかを見る軸。
      safety_rule:
      - raw count の多さだけで excess とみなさない。
      - registered されていない burst は benign 前提に置かない。
    coupling_axis:
      statement: cluster mass が hard_shared / bounded_shared / unresolved coupling source にどれだけ集中しているかを見る軸。
      safety_rule:
      - unresolved coupling は independence の証拠に使わない。
      - hard_shared concentration は same_team corroboration と persistence bonus を押し上げない。
    replay_axis:
      statement: same observation anchor、stale lineage、resolved / revoked lineage、mirrored preview の再包装がどれだけ含まれるかを見る軸。
      safety_rule:
      - concealed replay は lawful burst witness を上書きしうる強い汚染要因として扱う。
      - explicit revalidation 付き successor lineage は replay と混同しない。
    sink_axis:
      statement: burst が internal low-risk sink なのか、protected internal / external-sensitive / sink-enumerating なのかを見る軸。
      safety_rule:
      - protected / external-sensitive sink では suspend を confirm より先に開いてよい。
      - sink enumeration は detector abuse suspicion の強化要因である。
    direct_anchor_axis:
      statement: first-party runtime trace、direct authoritative pair、direct reach のような direct anchor がどこまで clean に束縛されるかを見る軸。
      safety_rule:
      - direct anchor は lawful burst を支えうるが、concealed replay や sink probing を免責しない。
      - direct anchor 不在では confirmed attack-like judgement を早く作りすぎない。
  branch_rules:
    lawful_incident_burst:
      enter_when:
      - cadence_axis が registered または bounded_elevated である
      - replay_axis が clean である
      - coupling_axis が hard_shared_dense / unresolved_dense ではない
      - direct_anchor_axis、independent route、registered runbook witness のいずれかがある
      effects:
      - excess multiplicity を corroboration unit へ自動加算しない。
      - persistence / triage は許すが、confirm shortcut は開かない。
    ambiguous_sparse_burst:
      enter_when:
      - lawful_incident_burst と flooding_suspect のどちらにも十分束縛されない
      effects:
      - corroboration increment は保守的に cap する。
      - hold / manual review priority / bounded monitoring を優先する。
    flooding_suspect:
      enter_when:
      - cadence excess・diversity collapse・hard_shared concentration・replay reuse・sink probing のうち少なくとも二つが active
      - lawful burst witness が不足または汚染されている
      effects:
      - flooding penalty の mild 以上を候補化する。
      - confirm path への bonus / corroboration increment を停止または減衰する。
      - protected context では emergency suspend / audit review を先に開きうる。
    attack_like_flooding_confirmed:
      enter_when:
      - flooding_suspect が active
      - concealed replay、queue saturation、sink enumeration、lineage concealment のいずれかが direct abuse anchor または separated corroboration で束縛される
      effects:
      - severe penalty gate、detector abuse escalation、security / upper authority path を開きうる。
      - same-frame remediation がなければ current confirm branch を閉じる。
  linkage_rules:
    hidden_common_mode_coupling_registry:
    - coupling registry は diversity_axis と coupling_axis の authoritative root であり、cluster taxonomy は pairwise heuristic ではなく closure を前提に判定する。
    - semantic delta が unresolved の prompt/template change は lawful burst witness を増やさず、ambiguous_sparse または flooding_suspect 側へ倒しうる。
    adversarial_correlation_penalty:
    - flooding_suspect は少なくとも bounded bonus 除去を伴い、attack_like_flooding_confirmed だけが severe flooding penalty や detector abuse escalation の確定根拠になりうる。
    - replay penalty は replay_axis、bias penalty は direct_anchor 汚染の有無と reviewer path concentration を通じて再評価する。
    small_sample_prior_credibility:
    - early-stage separation は cold_start / sparse でも suspend / hold に使えるが、confirmed attack-like judgement を posterior 単独で作らない。
    - lawful_incident_burst でも warmed requirement や direct anchor exception を代替しない。
    detector_confidence_aggregation:
    - lawful_incident_burst では cluster collapse を緩めても corroboration unit cap は維持する。
    - flooding_suspect では excess cluster を capped duplicate または persistence-only support へ落とす。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - burst_cluster_id
    - burst_taxonomy_state
    - diversity_axis_state
    - cadence_axis_state
    - coupling_axis_state
    - replay_axis_state
    - sink_axis_state
    - direct_anchor_axis_state
    - lawful_burst_witness_ref
    - detector_abuse_anchor_ref
    graph_engine:
    - burst_cluster_opened
    - burst_taxonomy_promoted
    - lawful_burst_witness_bound
    - flooding_suspect_raised
    - detector_abuse_anchor_bound
    - attack_like_flooding_confirmed
  residual_open_points:
  - semantic delta class の unresolved/material dense rotation を detector family ごとに cluster taxonomy へどこまで数値接続するか
cadence_registry_governance:
  status: provisional_fixed
  statement: cadence registry governance とは、detector family と sink class ごとに通常運転として許容する観測 cadence、simultaneous burst、review backlog、confirmation lag を canonical registry として束縛し、normal burst / lawful burst / suspicious burst / attack-like or drift-like active state を raw count ではなく registry 逸脱として判定する規則である。
  core_claims:
  - cadence は件数閾値だけではなく、window、burst、backlog、confirmation lag、runbook witness の束で評価する。
  - lawful burst は registered cadence、incident runbook、lawful retry/resampling envelope、batch charter のいずれかにより事前または same-frame で説明可能な集中観測だけを指し、confirm shortcut を開かない。
  - detector family ごとに許容する通常 cadence は異なる。local_convention_detected は backlog / lag を長めに許せるが、suspected_leak と irreversible_resource_lock 近傍では最短で扱う。
  - sink class は owner-bound internal から irreversible lock へ向かうほど cadence 許容量を単調に縮める。
  - cadence registry は batch charter、review_due、confirmation_due、escalation path の安全側 cap として働き、無登録 burst を benign 既定にしない。
  detector_family_taxonomy:
    local_convention_detected:
      statement: local convention や運用ドリフトの初期疑いを拾う detector family。通常 cadence は比較的高く、review backlog も長めに許す。
    confirmed_policy_drift:
      statement: reflected rule と runtime effective use の不整合を確定側へ運ぶ detector family。local convention より strict に扱う。
    suspected_leak:
      statement: containment breach や sink exposure を扱う detector family。cadence と confirmation lag を最も短く扱う family のひとつである。
    bias_penalty:
      statement: reviewer/operator 偏りを扱う penalty family。burst 自体より queue 偏向と review concentration を監視する。
    flooding_penalty:
      statement: corroboration inflation や queue saturation を扱う penalty family。raw cadence 許容量は比較的高いが、lawful witness 不在の excess を最も敏感に疑う。
    replay_penalty:
      statement: stale lineage や mirror reuse の再包装を扱う penalty family。cadence は中程度だが replay witness があると急速に tighten する。
  cadence_sink_classes:
    owner_bound_internal:
      statement: owner に閉じた sealed internal sink。temporary_cache の sealed case や owner-only telemetry を含む。
      typical_sources:
      - sealed_internal
    bounded_internal_shared:
      statement: named internal reviewer までに限定された非 authoritative sink。shared telemetry と derived preview の既定 class を含む。
      typical_sources:
      - bounded_internal_observable
    authoritative_state:
      statement: system of record、authoritative registry、reflected runtime state の mutation または read/write surface。
      typical_sources:
      - authoritative_state
    public_or_external_commitment:
      statement: public output または external commitment に触れる sink。対外説明や counterparty 影響を持つ。
      typical_sources:
      - public_output
      - external_commitment
      - externalized_nonbinding
    irreversible_resource_lock:
      statement: rollback 高コストまたは lawful rollback 不在の lock / irreversible commit を伴う sink。
      typical_sources:
      - irreversible_resource_lock
  projection_rules:
  - shared telemetry / temporary cache / derived preview の surface は、まず sink typing で sealed_internal / bounded_internal_observable / externalized_nonbinding を判定し、その後 cadence sink class へ射影する。
  - authoritative_or_committing は effect_realization と rollback expectation を見て authoritative_state、public_or_external_commitment、irreversible_resource_lock のいずれかへ細分してから cadence registry に入れる。
  - same detector case が複数 sink class に触れる場合は最も strict な sink class を採用する。
  registry_cell_fields:
  - cadence_window
  - normal_event_cap
  - simultaneous_burst_cap
  - review_backlog_soft_cap
  - confirmation_lag_soft_cap
  - lawful_burst_witness_set
  - batch_charter_adjustment_cap
  - suspicious_burst_escalation_rule
  metric_ordering_rules:
    event_rate:
    - flooding_penalty と local_convention_detected は raw event rate の既定許容量を比較的高く持てる。
    - suspected_leak と confirmed_policy_drift は raw event rate の cap を低めに持つ。
    backlog_and_lag:
    - local_convention_detected は backlog / confirmation lag を最も長く許す。
    - confirmed_policy_drift、bias_penalty、replay_penalty は中間で扱う。
    - suspected_leak、flooding_penalty、irreversible_resource_lock 近傍は backlog / lag cap を最短で扱う。
    sink_strictness:
    - owner_bound_internal ≥ bounded_internal_shared ≥ authoritative_state ≥ public_or_external_commitment ≥ irreversible_resource_lock の順で許容量を単調非増加にする。
  burst_state_taxonomy:
    normal_burst:
      statement: registry cell の normal_event_cap、review backlog cap、confirmation lag cap のすべての内側にある状態。
    lawful_burst:
      statement: normal_event_cap は超えるが simultaneous_burst_cap の内側にあり、registered cadence / runbook / lawful retry / ratified batch charter のいずれかで正当化された状態。
      non_implications:
      - confirm shortcut を意味しない。
      - corroboration unit の自動加算を意味しない。
    suspicious_burst:
      statement: burst cap、backlog cap、confirmation lag cap のいずれかを超過するか、または lawful witness を欠いたまま normal cap を超えた状態。
    attack_like_or_drift_like_active:
      statement: suspicious_burst に加えて、family-specific abuse anchor、queue saturation、concealed replay、direct authoritative mismatch、policy drift witness のいずれかが束縛され、current branch を degrade / suspend / escalate へ送るべき状態。
  branch_linkage:
  - cadence registry breach は raw count 単独では final confirm を作らず、early-stage burst taxonomy、penalty gate、policy drift confirm、suspected leak confirm と束で branch を決める。
  - lawful_burst は batch charter の admissibility 根拠には使えるが、review_due と confirmation_due の延長根拠には使わない。
  - batch charter は normal_event_cap と simultaneous_burst_cap を限定的に引き上げられるが、review_backlog_soft_cap と confirmation_lag_soft_cap を緩めない。
  - review backlog breach は queue congestion の事実であり、silence や timeout を benign 既定に反転させない。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - cadence_registry_cell_ref
    - cadence_sink_class
    - effective_normal_event_cap
    - effective_simultaneous_burst_cap
    - effective_review_backlog_soft_cap
    - effective_confirmation_lag_soft_cap
    - lawful_burst_witness_ref
    - cadence_breach_reason_set
    - batch_charter_adjustment_ref
    graph_engine:
    - cadence_registry_cell_bound
    - cadence_burst_classified
    - cadence_breach_detected
    - cadence_batch_charter_applied
    - cadence_breach_escalated
  residual_open_points:
  - detector family ごとの direct abuse anchor と detector abuse anchor の最小束縛をどう分けるか
  - seasonal / incident campaign の lawful burst を static registry と runtime override のどちらで吸収するか
semantic_delta_autoclassification_governance:
  status: provisional_fixed
  statement: semantic delta autoclassification governance とは、shared prompt / template 変更を lexical diff だけでなく canonical normalization・execution behavior・downstream binding・protected invariant の witness で判定し、semantic delta class を none / bounded / material / unresolved の4値で安全側に返して、hidden coupling・prior reset・burst taxonomy・penalty activation へ接続する規則である。
  core_claims:
  - semantic delta class の自動判定は wording 類似度ではなく、execution meaning と downstream governance effect の差分判定として扱う。
  - prompt_pack / template_bundle の表面差分だけでは none を返さない。protected facet、decision branch、evidence admissibility、sink exposure、schema binding が不変である witness を要求する。
  - bounded は「小さい変更」を意味しない。affected facet と blast radius が ratified mapping で限定され、unaffected protected facet に material drift が出ないときだけ bounded を返す。
  - material は threshold / comparator / veto / escalation / sink typing / evidence requirement / output schema requiredness / authority semantics / tool routing / confirmation logic の変更を含む。
  - unresolved は失敗ではなく安全側の中立分類であり、lineage 欠落・joint change・witness 競合・protected facet 接触・benchmark 不足のいずれかで既定値として返してよい。
  semantic_delta_classes:
    none:
      statement: canonical normalization 後の executing meaning、protected invariant、downstream binding が保存され、差分が execution-semantic no-op に留まる状態。
      minimum_witness:
      - canonical normalization または semantic no-op witness により executing meaning の同型性が束縛されている
      - protected invariant set が保存されている
      - downstream binding set が不変である
      - lineage / parent / execution capsule が追跡可能である
      governance_effects:
      - parameterized_variant / inherited_bundle でも confirm-grade independence は増えない
      - hard_shared 扱いを維持し、prior reset は原則不要とする
      - lawful burst witness を増やさない
    bounded:
      statement: 変更は存在するが、affected facet と blast radius が ratified mapping で限定され、unaffected protected facet の invariant が保存される状態。
      minimum_witness:
      - affected facet set と detector family set が明示されている
      - bounded-change rule または equivalence envelope が ratified 済みである
      - unaffected protected facet の replay / benchmark drift が許容域内である
      - downstream binding change が scoped で review owner / rollback path を持つ
      governance_effects:
      - affected facet に対してだけ corroboration increment を止め、scoped prior reset / review を掛ける
      - unaffected facet の historical calibration は維持できる
      - bounded bonus / scoped triage metadata にだけ使う
    material:
      statement: 変更が execution branch、confirmability、externality、authority、schema meaning のいずれかを再構成し、scoped cosmetic/bounded update では吸収できない状態。
      trigger_patterns:
      - threshold / comparator / veto / escalation / authority / sink / evidence / schema requiredness / tool routing / confirmation branch の変更
      - same input replay で decision branch または protected facet outcome が変わる
      - downstream binding または execution capsule が変化する
      governance_effects:
      - hard_shared with material drift として扱い、affected facet の warmed state を無効化する
      - pre/post version を独立 corroboration route に数えない
      - unannounced material change が burst 内へ流入した場合、ambiguous_sparse か flooding_suspect を優先する
    unresolved:
      statement: 差分は観測されたが、安全側 classification に必要な lineage / benchmark / facet mapping / execution witness のいずれかが不足または衝突している状態。
      trigger_patterns:
      - lineage / parent / execution capsule / witness ref が欠落している
      - prompt + template + rulepack の joint change で寄与分離不能である
      - lexical diff は小さいが benchmark / protected invariant が未確認である
      - protected facet に触れるのに bounded mapping が ratified されていない
      governance_effects:
      - lawful burst witness を増やさない
      - confirm / release / delegated auto activation の shortcut を開かない
      - protected facet では manual review と scoped reset を先に要求する
  witness_taxonomy:
  - canonicalization_witness
  - semantic_role_binding_witness
  - execution_behavior_witness
  - protected_invariant_witness
  - downstream_binding_witness
  - lineage_integrity_witness
  - replay_benchmark_witness
  facet_override_policy:
    detector_threshold_and_policy_gate:
    - threshold / comparator / confirmability / veto / escalation 文言の変更は lexical small diff でも affected facet 上は少なくとも material 候補とする。
    sink_typing_and_externality:
    - audience / sink / ttl / forwardability / queryability / exportability の変更は bounded 以下へ丸めず、少なくとも material または unresolved とする。
    evidence_binding_and_schema:
    - required field / required evidence / owner binding / freshness binding / route family binding の変更は schema cosmetic とみなさない。
    cosmetic_template_surface:
    - label order / whitespace / explanation prose の変更で、schema key・requiredness・default・routing・guard が不変なら none 候補にできる。
    local_template_internal_triage:
    - template_local かつ internal reversible で、pre-ratified equivalence envelope と replay benchmark がある場合だけ bounded を delegated review で処理しうる。
  failure_patterns:
    false_none:
    - paraphrase が threshold 緩和や veto 除去を隠す
    - template 表示名変更が sink audience / routing change を隠す
    - output schema の optional/required 変更が downstream branch change を隠す
    false_material:
    - render-only 変更なのに benchmark suite 不足のため material へ過大分類する
    - explanatory note の追加を execution meaning change と誤認する
    operational_guard:
    - false negative は confirm path 汚染を生むので、witness 不足時は unresolved に倒す
    - false positive は review cost を増やすが、安全性側の損失は相対的に小さい
  linkage_rules:
    hidden_common_mode_coupling_registry:
    - parameterized_variant / inherited_bundle で semantic delta class が none なら hard_shared を維持する。
    - bounded は affected facet scoped の bounded_shared を作れるが、confirm-grade independence は増やさない。
    - material / unresolved は hard_shared と reset trigger 候補を強める。
    small_sample_prior_credibility:
    - none は lineage 連続かつ benchmark 維持なら warmed calibration を保てる。
    - bounded は affected facet だけ sparse へ巻き戻しうる。
    - material / unresolved は affected facet の prior_ready を false にしうる。
    early_stage_burst_flooding_separation:
    - none は lawful burst witness を増やさず、shared mode collapse を維持する。
    - bounded は triage metadata にだけ使い、affected facet では corroboration inflation を防ぐ。
    - material / unresolved の高密度流入は lawful burst ではなく ambiguous_sparse または flooding_suspect 側の根拠になる。
    adversarial_correlation_penalty:
    - concealed material change や unresolved dense rotation は bias / flooding / replay penalty の severity を上げうる。
    - ratified bounded change 自体は penalty 根拠ではないが、burst inflation と結び付くと bounded bonus を停止する。
  decision_ledger_graph_engine_linkage:
    decision_ledger:
    - semantic_delta_class
    - delta_witness_ref_set
    - affected_facet_set
    - affected_detector_family_set
    - protected_invariant_result
    - downstream_binding_diff_class
    - scoped_prior_reset_reason
    - manual_review_required_by_delta
    graph_engine:
    - semantic_delta_classified
    - semantic_delta_reclassified
    - delta_witness_bound
    - protected_invariant_failed
    - scoped_prior_reset_triggered
    - burst_taxonomy_degraded_by_delta
  residual_open_points: []
self_evaluation_audit_log_governance:
  status: provisional_fixed
  statement: 自己評価監査ログ統治とは、semantic delta class・hidden coupling・prior reset・burst taxonomy・override judgement の判定を後から再監査・再較正できるように、何を event として残し、どの粒度で witness を保持し、いつ archive / purge へ移すかを定める規則である。
  core_claims:
  - 最終スコアや最終ラベルだけを残しても再監査はできない。判定時点の policy bundle、witness、override、branch effect、actor/authority を結び付けて残す必要がある。
  - GraphLint の説明 trace は有用だが、それだけを正本にしてはならない。normative binding は DecisionLedger、状態遷移と retention timer は GraphEngine、再計算可能な診断要約は GraphLint に分ける。
  - 保存期間は storage 都合ではなく audit criticality、protected facet 影響、override の有無、confirm/release への接続度で決める。
  - raw witness を全件永久保存する方針は採らないが、summary だけに潰してよい class と full witness を残すべき class を分ける。
  canonical_event_families:
    registry_snapshot:
      statement: 判定時点で効いていた policy / rulepack / template / model / registry version の束縛を残す event。
      minimum_fields:
      - policy_bundle_ref
      - registry_version_set
      - execution_capsule_ref
    evaluation_run:
      statement: semantic delta、hidden coupling、drift、burst taxonomy などの自己評価そのものを残す event。
      minimum_fields:
      - target_ref
      - detector_family
      - claim_facet_set
      - outcome_label
      - score_or_class
      - trace_summary_ref
    witness_binding:
      statement: 判定根拠として使った witness の束縛と admissibility を残す event。
      minimum_fields:
      - witness_ref_set
      - witness_hash_set
      - provenance_level
      - integrity_class
    override_review:
      statement: manual review、override、veto、reclassification、release/reject の理由と authority を残す event。
      minimum_fields:
      - reviewer_or_forum_ref
      - authority_basis_ref
      - override_kind
      - rationale_code_set
    branch_transition:
      statement: hold / escalate / suspend / confirm / reject / reset / rollback など branch 変化を残す event。
      minimum_fields:
      - state_before
      - state_after
      - branch_effect
      - parent_case_ref
    recalibration_feedback:
      statement: postmortem、confirmed leak、confirmed drift、false positive/negative 評価など、後から prior や threshold を更新する根拠を残す event。
      minimum_fields:
      - feedback_type
      - linked_event_ref_set
      - recalibration_scope
      - outcome_truth_source
  canonical_minimum_fields:
  - event_id
  - event_family
  - event_time
  - tool_owner
  - subject_ref
  - profile
  - context_class
  - policy_bundle_ref
  - execution_capsule_ref
  - witness_ref_set
  - witness_hash_set
  - outcome_label
  - branch_effect
  - actor_or_authority_ref
  - retention_bucket
  - parent_event_ref_set
  granularity_policy:
    full_witness:
      statement: raw witness、normalized trace、execution capsule、override 理由、branch effect を event 単位で再生可能に残す粒度。
      required_when:
      - protected facet に触れる
      - manual override / veto / escalate / reject / force suspend / delegated auto re-enable を伴う
      - semantic delta class が material または unresolved である
      - hidden coupling が hard_shared または unresolved relation を含む
      - prior reset / calibration reset / policy drift / leak confirm / abuse confirm に接続する
      - burst taxonomy が ambiguous_sparse_burst / flooding_suspect / attack_like_flooding_confirmed のいずれかである
    summary_with_repro_capsule:
      statement: hot path では summary を主に持つが、必要時に deterministic replay または immutable witness bundle へ戻れる粒度。
      admissible_when:
      - override がない
      - protected facet への影響がない、または ratified bounded mapping の範囲に閉じている
      - semantic delta class が none または bounded であり、prior reset を発火していない
      - branch effect が no_state_change または scoped_internal_review に留まる
    archive_digest:
      statement: 日常運用からは外すが、postmortem・監査・再較正のため summary、integrity proof、capsule ref を削らず archive へ送る粒度。
      required_when:
      - case は閉じたが confirm / release / override / penalty / public explanation の根拠として後日再参照されうる
      - raw witness の常時 hot 保持は不要だが、summary だけでは責任追跡が不足する
    purge_eligible_digest:
      statement: 低リスク・非override・非protected の派生診断について、canonical summary と witness hash を残した上で raw trace を purge してよい粒度。
      admissible_when:
      - final outcome や normative binding を変えていない
      - detector tuning や UI explanation の補助であり、protected facet・external sink・authority decision に接続しない
      - archive_digest に必要な summary / hash / capsule ref が先に固定されている
  common_retention_buckets:
    normative_permanent:
      statement: registry ratification、approval / veto / override、final confirm / release / reject、confirmed leak / drift / severe penalty など、normative explanation 責任を持つ event の bucket。
      baseline:
        full_witness_hot: permanent
        archive_retention: permanent
        purge_rule: never
    audit_long:
      statement: protected facet、material / unresolved delta、hard shared coupling、reset、abuse / leak / drift investigation に接続する高監査重要度 bucket。
      baseline_by_profile:
        regulated:
          full_witness_hot: 365d
          archive_retention: 7y
        engineering_tradeoff:
          full_witness_hot: 180d
          archive_retention: 3y
        organizational_or_social:
          full_witness_hot: 90d
          archive_retention: 2y
    audit_medium:
      statement: bounded / none の benign 評価だが、replay、postmortem、threshold review の比較可能性を残す bucket。
      baseline_by_profile:
        regulated:
          full_witness_hot: 180d
          archive_retention: 3y
        engineering_tradeoff:
          full_witness_hot: 90d
          archive_retention: 1y
        organizational_or_social:
          full_witness_hot: 30d
          archive_retention: 180d
    summary_short:
      statement: override なし、protected facet 非接触、nonbinding な自己診断の summary 保持 bucket。
      baseline_by_profile:
        regulated:
          full_witness_hot: 30d
          archive_retention: 1y
        engineering_tradeoff:
          full_witness_hot: 14d
          archive_retention: 180d
        organizational_or_social:
          full_witness_hot: 7d
          archive_retention: 90d
  context_override_rules:
  - external_irreversible、policy_sensitive、public_exposure、safety_critical の文脈では、bucket を短縮せず、少なくとも audit_long とする。
  - sandbox_internal、branch_local_nonbinding、template_local_review では、protected facet 非接触かつ override なしの場合に限り 1 bucket だけ短縮してよい。
  - legal_hold、postmortem_hold、active_investigation が立った event は retention timer を停止し、purge を禁止する。
  purge_and_archive_rules:
  - raw witness を purge してよいのは、canonical minimum fields、summary、witness hash、policy bundle ref、execution capsule ref、actor/authority ref が archive 側に固定された後だけである。
  - GraphEngine は retention_due、archive_due、purge_due を計時し、DecisionLedger は legal_hold と normative no-purge を正本管理する。
  - GraphLint の局所診断ログは purge 可能だが、branch change や override に影響した trace は GraphEngine または DecisionLedger から参照可能でなければならない。
  decision_ledger_graph_engine_graphlint_split:
    DecisionLedger:
    - registry ratification / activation / supersession
    - approval / veto / override / reject / final confirm / release の authority basis
    - legal_hold、postmortem_hold、accountability hold
    GraphEngine:
    - evaluation_run、reclassification、reset、cluster lifecycle、state transition
    - retention_due / archive_due / purge_due timer
    - archive completed / purge completed / replay requested の履歴
    GraphLint:
    - normalized trace summary
    - issue candidate、guard explanation、witness digest
    - deterministic replay に必要な入力正規化メタデータ
  residual_open_points:
  - bridge token の cryptographic shape を HSM-backed seal / append-only notarization / derived proof のどこまで標準化するか
  - merge / split transition bundle の predecessor/successor cardinality と allocation witness をどこまで canonical 化するか
  - export-local pseudonym の TTL table に対する profile/context local override と shortening-only rule をどこまで許すか
  - execution capsule のバイナリ実体と hash / manifest のどこまでを canonical archive object とみなすか
  - cluster de-dup 後の raw signal を event 単位で保持する範囲を detector family ごとにどう揃えるか
identity_redaction_accountability_governance:
  status: provisional_fixed
  statement: identity redaction accountability governance とは、reviewer / operator の個人識別を常時露出させずに、authority・accountability・incident replay・security escalation に必要な再開示可能性だけを lawful に残すため、identity surface の層、場面別 visibility、reopen 条件を定める規則である。
  core_claims:
  - accountability に必要なのは常時の実名露出ではなく、authority に束縛された再開示可能性である。
  - reviewer / operator の identity surface は、display identity、stable pseudonym、team / forum label、authority binding、accountability binding、legal-hold reopen key の少なくとも6層に分けて扱う。
  - cadence breach、bias / flooding / replay penalty、review accountability、incident replay、security escalation は、同じ identity surface を見ない。場面ごとの最小可視層を分ける必要がある。
  - stable pseudonym と authority / accountability binding が残っている限り、通常の監査・レビュー・penalty judgement は cleartext personal identity を要しない。
  - de-redaction は lawful purpose、required authority、active reopen basis、lower-layer insufficiency の4条件が揃うときにだけ許す。
  canonical_identity_layers:
    display_identity:
      statement: 人間に読みやすい表示名。可変であり、canonical key に使ってはならない。
    stable_pseudonym:
      statement: scope と epoch の内部で安定な識別子。通常の event 連結、bias / replay / cadence 追跡の主キーに使う。
    team_or_forum_label:
      statement: team、forum、review lane、operator family などの所属・経路ラベル。集計と可視化に使うが、個人 accountability の代用にはしない。
    authority_binding:
      statement: role、authority tier、approval charter、delegation scope、signature context の束縛。誰が見ても同じ権限意味を取れる層。
    accountability_binding:
      statement: decision owner、execution coordinator、outcome accountability、security escalation owner などの責任束縛。
    legal_hold_reopen_key:
      statement: lawful な再識別のための封印鍵またはそれへの参照。通常ログから導出できず、別 custody に置く。
  visibility_policy_by_scenario:
    routine_review:
      minimum_visible_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      hidden_by_default:
      - display_identity
      - legal_hold_reopen_key
    cadence_breach:
      minimum_visible_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      conditional_layers:
      - accountability_binding
      reveal_conditions:
      - repeated severe breach
      - contested override
      - cross-team queue freeze
    bias_flooding_replay_penalty:
      minimum_visible_layers:
      - stable_pseudonym
      - team_or_forum_label
      - authority_binding
      additional_required_context:
      - tool_or_pipeline_lineage
      - forum_chain_ref
      reveal_conditions:
      - confirmed abuse
      - replay concealment
      - review gaming suspicion that cannot be resolved at pseudonym layer
    review_accountability:
      minimum_visible_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      optional_layers:
      - team_or_forum_label
      non_implications:
      - display identity を常時見せることを意味しない。
    incident_replay:
      minimum_visible_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      - execution_or_event_lineage_ref
      reveal_conditions:
      - same-frame remediation failure
      - cross-system join required
      - external audit basis active
    security_escalation:
      minimum_visible_layers:
      - stable_pseudonym
      - authority_binding
      - accountability_binding
      - legal_hold_reopen_key
      non_implications:
      - team_or_forum_label だけで sufficient になることを意味しない。
  decision_ledger_graph_engine_graphlint_archive_split:
    DecisionLedger:
    - normative actor pseudonym
    - authority binding ref
    - accountability binding ref
    - reopen authorization basis
    - legal_hold / accountability_hold state
    forbidden_defaults:
    - real identity cache
    - sole re-identification path
    GraphEngine:
    - runtime actor instance ref
    - pseudonym epoch lineage
    - session / run linkage
    - reopen_requested / reopen_granted / reopen_denied event
    GraphLint:
    - redacted trace summary
    - actor class / authority tier / forum label
    - pseudonym-free diagnostic digest when actor specificity is unnecessary
    archive_object:
    - pseudonymized event body
    - sealed identity envelope または mapping ref
    - reopen policy ref
    - integrity proof and access log
  prohibited_shortcuts:
  - display identity、email address、chat handle を canonical actor key に使わない。
  - stable pseudonym の rotation で accountability lineage を切断しない。
  - team / forum label だけで reviewer / operator accountability を代用しない。
  - delegated reviewer 単独で de-redaction を確定しない。
  - cleartext personal identity の多さを独立 corroboration や bias severity の根拠に使わない。
  - GraphLint trace だけを reopen 可能性の唯一根拠にしない。
  residual_open_points:
  - bridge token の cryptographic shape を HSM-backed seal / append-only notarization / derived proof のどこまで標準化するか
  - tenant merge / split 時の lawful continuity 条件をどこまで細分化するか
  - export-local pseudonym の TTL table に対する profile/context local override と shortening-only rule をどこまで許すか
  - audit witness shard を HSM / append-only service / 人的 witness のどこまで hybrid 設計にするか
  - bridge packet の revocation と accountability lineage 保持をどう両立させるか
execution_capsule_canonical_archive_governance:
  status: provisional_fixed
  statement: execution capsule の canonical archive 境界とは、後続の replay / reopen / purge 判定が現行 runtime や可変 external blob store に依存せず再構成できるよう、manifest を正本核として、必要な digest chain・policy binding・identity envelope linkage・replay class を archive 側へ固定し、binary payload は replay 要件に応じて inline または immutable pinned blob として従属保持する境界である。
  decomposition:
    binary_payload:
      statement: 実行時の raw input / output、normalized artifact、model response snapshot、tool state dump などのバイナリ実体。
      canonical_classes:
      - replay_required_blob
      - optional_supporting_blob
      - noncanonical_external_copy
      rules:
      - deterministic replay または forensic replay を要求する payload は、content-addressed immutable blob として retention pin を付けて保持し、manifest から digest と byte-length で束縛する。
      - analytical replay や audit summary で足りる payload は、raw binary を外部 blob store に退避または purge しうるが、manifest には digest・serialization profile・witness linkage を残す。
      - mutable URL、current-system export、再生成可能だからという理由だけの pointer を canonical payload 代替にしてはならない。
    manifest:
      statement: archive object の正本核であり、payload class、canonicalization profile、digest set、replay class、policy bundle ref、lineage、branch effect、identity envelope linkage を束縛する。
      canonical_class: canonical_archive_core
      minimum_fields:
      - capsule_id
      - event_family
      - payload_role_map
      - replay_class
      - canonicalization_profile
      - environment_descriptor_ref
      - policy_bundle_ref_set
      - lineage_ref_set
      - digest_binding_set
      - sealed_identity_envelope_ref_or_digest
    digest_chain:
      statement: manifest・payload・sealed identity envelope・pointer target の完全性を束縛する最小 integrity layer。
      canonical_class: canonical_integrity_layer
      rules:
      - manifest digest は必須であり、payload / envelope / pointer target を hash chaining で束ねる。
      - digest algorithm、byte length、serialization profile を伴わない hash は replay admissibility を作らない。
      - parent archive object への chained digest は incident replay と purge audit の再構成経路を切ってはならない。
    sealed_identity_envelope:
      statement: pseudonymized event body と分離して別 custody に置かれる reopen 用 sealed object。
      canonical_class: canonical_companion_object
      rules:
      - archive core には envelope 本体ではなく envelope ref / digest / custody policy を固定する。
      - lawful reopen basis が active で required authority が揃う場合に限り別経路で開封する。
      - pseudonymized event body に inline して redaction 境界を崩してはならない。
    reference_pointer:
      statement: immutable blob store や外部記録への locator。
      canonical_class: auxiliary_locator
      rules:
      - pointer 単独は canonical proof にならない。
      - canonical に数えるには target digest、immutability class、retention pin、retrieval scope が manifest に束縛されていなければならない。
      - mutable alias や latest pointer を deterministic replay の入力に使ってはならない。
  scenario_rules:
    incident_replay:
      required_elements:
      - canonical manifest
      - digest chain
      - replay class と execution environment descriptor
      - required payload blob または reproducibility capsule
      conditional_elements:
      - actor reopen が必要な場合の sealed identity envelope
      insufficiency_cases:
      - archived manifest ではなく現行 toolchain から再生成した manifest に依存する
      - pointer target が mutable で archived digest と一致しない
    legal_hold_reopen:
      required_elements:
      - canonical manifest
      - digest chain
      - sealed identity envelope ref と custody proof
      - reopen basis / access audit log
      conditional_elements:
      - payload 内容なしでは当該審査を lawful に行えない場合の retained blob
      non_implications:
      - legal-hold reopen が raw payload の常時保持を意味しない
    purge_archive:
      purge_admissible_when:
      - manifest core と digest chain が retained されている
      - retention bucket が raw payload purge を許す
      - legal hold が inactive である
      - replay class が retained capsule だけで満たされる
      purge_forbidden_when:
      - deterministic replay または forensic replay に exact payload が必要である
      - pointer 先の immutable digest-bound replacement が存在しない
      - branch effect / override review を payload なしで再監査できない
    external_blob_store:
      required_controls:
      - content-addressed immutable storage
      - retention pin / hold linkage
      - digest verification on retrieve
      - access audit log
      non_implications:
      - blob store が normative archive の唯一の正本であることを意味しない
  responsibility_split:
    DecisionLedger:
    - canonical manifest id
    - policy / lineage / branch-effect binding
    - replay class and purge admissibility decision
    - legal-hold / reopen basis
    GraphEngine:
    - runtime execution capsule production record
    - environment descriptor / serialization profile
    - blob pin / unpin lifecycle
    - replay request / replay result linkage
    archive_object:
    - canonical manifest
    - digest chain
    - pseudonymized event body
    - sealed identity envelope ref_or_digest
    - access / purge / reopen audit trail
    external_blob_store:
    - immutable payload blob
    - content-addressed retrieval
    - retention pin state
    - no normative judgement without manifest binding
  prohibited_shortcuts:
  - pointer だけを残して target digest を失った状態を archive 完了とみなさない。
  - 現行 toolchain や current system of record から manifest / payload を再生成して archived object の代用にしない。
  - deterministic replay を要求しながら summary digest だけで sufficient と主張しない。
  - sealed identity envelope を pseudonymized event body に混在させて reopen 権限境界を崩さない。
  - mutable alias / latest version pointer を hash-chained object と同等に扱わない。
  residual_open_points:
  - emergency bypass で materialize した temporary export を archive boundary の外でどう TTL 管理するか
  - duplicate_discard_digest の multiset root hash primitive / collision witness / compression 境界をどこまで固定するか
raw_signal_retention_governance:
  status: provisional_fixed
  statement: cluster de-dup 後の raw signal retention governance とは、detector family / claim facet / sink class / replay class ごとに、dedup 後にも replay・abuse 判定・purge 監査を壊さない minimum retained raw unit と optional retained support blob を分離して固定する規則である。
  core_claims:
  - de-dup 後の retained raw unit は detector family ごとに異なる。cluster representative 1件を universal default にしてはならない。
  - representative だけで足りるのは、local convention の内部レビュー寄り事案や、confirmed policy drift のうち authoritative basis pair と effective use path が別記録で再構成できる場合に限られる。
  - flooding_penalty と replay_penalty では、discard された member 群の digest-bound 集約記録と burst / lineage 証拠を保持しなければ、count inflation・replay concealment・penalty fairness を再監査できない。
  - suspected_leak と protected facet 接触の confirmed_policy_drift では、route / recipient / effect realization / authoritative mismatch を直接または digest-bound に再確認できる raw slice を minimum retained raw unit に含める。
  - purge admissibility は、cluster representative の有無だけでなく、duplicate_discard_digest、abuse_anchor、replay-support blob が family-specific replay requirement を満たすかで判定する。
  retained_artifact_classes:
    cluster_representative:
      statement: dedup 後の cluster を代表する raw unit。representative signal 本体、source lineage、claim facet、window anchor、target lineage、effect zone、protected facet / sink facet を束縛する。
      minimum_fields:
      - representative_signal_id
      - hypothesis_key
      - detector_family
      - claim_facet
      - target_or_basis_lineage_ref
      - effect_zone_ref
      - observed_at
      - source_family
      - pipeline_or_route_ref
      - content_digest_or_normalized_snapshot_ref
    duplicate_discard_digest:
      statement: discard された duplicate 群を再監査するための digest-bound 集約記録。member 全文保持ではなくてもよいが、discard 根拠と cardinality を失ってはならない。
      minimum_fields:
      - cluster_member_digest_set_or_multiset_root
      - discard_reason_set
      - source_diversity_summary
      - window_membership_summary
      - duplicate_kind_summary
      - member_count
    burst_evidence_packet:
      statement: cadence / simultaneous burst / queue saturation / resampling 逸脱を再監査するための raw timing・window・queue 系証拠束。
      minimum_fields:
      - cadence_registry_cell_ref
      - window_event_count
      - simultaneous_burst_count
      - backlog_or_lag_snapshot
      - lawful_burst_witness_ref_set
      - batch_charter_ref_or_null
    abuse_anchor_packet:
      statement: direct abuse anchor または detector abuse anchor を支える raw evidence 束。
      minimum_fields:
      - anchor_kind
      - anchor_digest_set
      - actor_or_route_binding_ref
      - penalty_or_confirm_case_ref
    replay_support_blob:
      statement: deterministic / forensic replay、benchmark replay、protected facet mismatch 再検証のために追加保持する raw blob。
      minimum_fields:
      - blob_digest
      - serialization_profile
      - environment_descriptor_ref
      - replay_class
  family_retention_rules:
    local_convention_detected:
      minimum_retained_raw_unit:
      - cluster_representative
      conditional_minimum:
      - authoritative_state 以上の sink class、または protected facet 接触時は duplicate_discard_digest を追加する
      - protected facet 上の benchmark 差分や material/unresolved semantic delta が関与するときは replay_support_blob を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      - abuse_anchor_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_medium
        bounded_internal_shared: audit_medium
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: audit_long
      purge_notes:
      - cluster representative と required duplicate_discard_digest が残り、active investigation / hold がなく、confirm judgement に使っていなければ raw blob purge を許しうる
    confirmed_policy_drift:
      minimum_retained_raw_unit:
      - cluster_representative
      - authoritative_basis_pair_or_effective_use_path_evidence
      conditional_minimum:
      - protected facet mismatch、external commitment、irreversible lock が絡むときは replay_support_blob を追加する
      - cluster の dedup 後 cardinality や repeated mismatch を severity に使うときは duplicate_discard_digest を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      - abuse_anchor_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: normative_permanent
        public_or_external_commitment: normative_permanent
        irreversible_resource_lock: normative_permanent
      purge_notes:
      - confirm / override / reflected correction の根拠になった mismatch では、required basis pair と protected facet replay-support を欠く purge を許してはならない
    suspected_leak:
      minimum_retained_raw_unit:
      - cluster_representative
      - route_or_recipient_identity_evidence
      - effect_realization_or_direct_reach_basis
      conditional_minimum:
      - cluster 化により exposure episode を畳み込んだときは duplicate_discard_digest を追加する
      - public_or_external_commitment または irreversible_resource_lock では replay_support_blob を既定 required とする
      optional_retained_support_blob:
      - burst_evidence_packet
      - abuse_anchor_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: normative_permanent
        irreversible_resource_lock: normative_permanent
      purge_notes:
      - direct reach / recipient identity / route identity を raw または digest-bound で再確認できない状態で leak case を purge admissible にしてはならない
    bias_penalty:
      minimum_retained_raw_unit:
      - cluster_representative
      - duplicate_discard_digest
      - actor_or_forum_concentration_evidence
      conditional_minimum:
      - final penalty または contested review では abuse_anchor_packet を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      - replay_support_blob
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: audit_long
      purge_notes:
      - fairness review と reopen accountability が残る間は member digest 群と actor concentration evidence の purge を禁止する
    flooding_penalty:
      minimum_retained_raw_unit:
      - cluster_representative
      - duplicate_discard_digest
      - burst_evidence_packet
      conditional_minimum:
      - direct abuse confirm では abuse_anchor_packet を追加する
      optional_retained_support_blob:
      - replay_support_blob
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: audit_long
      purge_notes:
      - burst / count inflation / lawful batch 区別に使った timing 証拠を失う purge を許してはならない
    replay_penalty:
      minimum_retained_raw_unit:
      - cluster_representative
      - duplicate_discard_digest
      - lineage_or_mirror_reuse_evidence
      conditional_minimum:
      - protected facet 影響、branch change、forensic replay 要求時は replay_support_blob を追加する
      - confirmed concealment または intentional reuse では abuse_anchor_packet を追加する
      optional_retained_support_blob:
      - burst_evidence_packet
      archive_bucket_guidance:
        owner_bound_internal: audit_long
        bounded_internal_shared: audit_long
        authoritative_state: audit_long
        public_or_external_commitment: audit_long
        irreversible_resource_lock: normative_permanent
      purge_notes:
      - replay lineage と compared artifact の digest-bound relation を失う purge を許してはならない
  claim_facet_overrides:
    effect_realization_or_direct_reach_confirmed:
    - cluster representative だけでは足りず、effect receipt / public observation / target identity match のいずれかを direct または digest-bound で残す
    route_identity_or_recipient_identity:
    - access_control_or_routing_log 系の raw extract または digest-bound canonical slice を minimum retained raw unit に含める
    owner_binding_or_declared_intent:
    - final confirm や penalty fairness に使わない限り human declaration は normalized snapshot と digest 保持で足りる
    protected_facet_mismatch:
    - benchmark replay、authoritative pair、または equivalent raw comparison slice を replay_support_blob として残す
  purge_and_replay_connection:
    replay_classes:
      summary_only:
      - cluster representative と duplicate_discard_digest の summary で replay できる family に限り raw blob purge を許しうる
      analytical_replay:
      - normalized mismatch packet、burst packet、route digest slice など family-specific support blob を要求する
      deterministic_or_forensic:
      - exact payload、route log extract、benchmark blob、environment descriptor など replay_support_blob を required とし purge を禁止する
    decision_rule:
    - purge admissibility は replay class、archive bucket、legal hold、family minimum retained raw unit の4条件を同時に満たすときだけ true にする
    - required raw unit を失った cluster は dedup されていても confirm / penalty / incident replay の canonical evidence に数えない
  decision_ledger_graph_engine_linkage:
    DecisionLedger:
    - retention_family_rule_ref
    - retained_raw_unit_class_set
    - purge_admissibility_state
    - archive_bucket_ref
    - confirm_or_penalty_usage_ref
    GraphEngine:
    - cluster_representative_ref
    - duplicate_discard_digest_ref
    - burst_evidence_packet_ref
    - abuse_anchor_packet_ref
    - replay_support_blob_ref
    - blob_pin_or_unpin_event
  prohibited_shortcuts:
  - cluster representative 1件だけで全 detector family の minimum retained raw unit を満たしたとみなさない。
  - duplicate discard 後の member cardinality と discard reason を失ったまま flooding / replay penalty を確定しない。
  - suspected leak で route / recipient / effect evidence を summary label だけへ潰して purge admissible としない。
  - protected facet mismatch を benchmark replay なしの説明文だけで confirm しない。
  - current system から再計算できることを理由に replay_support_blob を未保持のまま purge してよいと主張しない。
  residual_open_points:
  - duplicate_discard_digest の family-specific summary と replay linkage を detector family / sink class ごとにどこまで固定するか
legal_hold_reopen_custody_governance:
  status: provisional_fixed
  statement: legal_hold_reopen_custody_governance とは、sealed identity envelope を lawful に再開封する際に、authorization・custody・security・audit witness を分離し、scenario ごとの minimum quorum、retention timer 停止、access audit、emergency bypass 条件を定める規則である。
  core_claims:
  - lawful reopen は「誰か1人の権限」ではなく lane-based quorum の成立として扱う。
  - delegated reviewer は reopen request と scope packet 準備まではできるが、単独で authority lane も custody lane も満たさない。
  - domain/central authority が authorization_shard、legal_hold_custodian が custody_release_shard、security_officer が security_override_shard を持ち、役割分離を崩さない。
  - audit witness は access audit anchor が append-only に固定されたことを条件にだけ成立し、事後記録で代替してはならない。
  - emergency bypass は final de-redaction ではなく、containment / incident stabilization のための最小 reveal scope を時限付きで開く provisional path である。
  actor_classes:
    delegated_reviewer:
      statement: reopen request、scope packet、evidence completeness の確認を担う。key release shard を持たない。
    domain_authority:
      statement: same-domain / same-tenant の lawful purpose と reveal scope を承認する authority actor。
    central_authority:
      statement: cross-domain / cross-tenant / global-default / high-sensitivity external audit の final authority を担う。
    legal_hold_custodian:
      statement: sealed identity envelope の escrow、legal hold state、retention timer stop 確認、custody release を担う。
    security_officer:
      statement: security escalation、compromise containment、provisional emergency bypass を担う。
    audit_notary:
      statement: append-only access audit anchor を固定し、audit_witness_shard を発行する独立 lane。
    external_auditor:
      statement: 監査対象の viewer / recipient であり、reusable shard holder にはならない。
  custody_lanes:
    authority_lane:
      holder_classes:
      - domain_authority
      - central_authority
      shard_class: authorization_shard
      statement: purpose / scope / authority tier の適法性を確定する lane。
    custody_lane:
      holder_classes:
      - legal_hold_custodian
      shard_class: custody_release_shard
      statement: sealed identity envelope の escrow release と hold/timer 状態を管理する lane。
    security_lane:
      holder_classes:
      - security_officer
      shard_class: security_override_shard
      statement: active compromise・attack-like 事案で provisional emergency bypass を開く lane。
    audit_notary_lane:
      holder_classes:
      - audit_notary
      shard_class: audit_witness_shard
      statement: access audit anchor の先行固定を条件に witness token を発行する lane。
  quorum_matrix:
    normal_reopen:
      minimum_required_lanes:
      - authority_lane
      - custody_lane
      - audit_notary_lane
      authority_rule:
        same_domain_same_tenant: domain_authority で足りる
        cross_domain_or_global: central_authority を要する
      reveal_scope: accountability_binding または必要最小限の identity slice
      notes:
      - delegated reviewer は request owner になれるが quorum lane には数えない。
    incident_replay:
      minimum_required_lanes:
      - authority_lane
      - custody_lane
      - audit_notary_lane
      conditional_required_lanes:
        security_lane:
        - compromise suspected
        - protected facet touched
        - cross-system join または cross-tenant join が必要
      reveal_scope: incident_slice with lineage and accountable actor binding
    external_audit:
      minimum_required_lanes:
      - authority_lane
      - custody_lane
      - audit_notary_lane
      authority_rule:
        default: central_authority
        exception: domain-local かつ single-tenant で ratified audit charter がある場合だけ domain_authority で足りる
      preconditions:
      - active legal_hold
      - retention timer stopped before envelope materialization
      - export_scope bound to audit charter
      audience_rule:
      - external_auditor は supervised session または digest-bound derived export だけを受ける。
      - external_auditor 自身を shard holder にしない。
    security_escalation:
      provisional_required_lanes:
      - security_lane
      - custody_lane
      - audit_notary_lane
      post_confirm_required_lanes:
      - authority_lane
      post_confirm_sla_basis:
      - profile/context specific emergency confirmation SLA
      reveal_scope: minimum emergency slice only
      failure_branch:
      - authority confirm 不成立なら auto-reseal / continued hold / violation event へ分岐する。
  legal_hold_timer_audit_rules:
  - access audit anchor は envelope materialization より前に append-only store へ固定する。
  - external_audit と security_escalation では、envelope と required replay blob に対する retention timer を release 前に停止する。
  - incident_replay は active_investigation / legal_hold / external response basis のいずれかが立つ場合、timer stop を mandatory にする。
  - normal_reopen は session_hold を立て、confirm / penalty / external response に使う場合だけ legal_hold へ昇格する。
  - reopened material から生成した derived note / export も access audit session に digest-bound linkage する。
  decision_ledger_graph_engine_archive_split:
    DecisionLedger:
    - reopen basis
    - lane quorum policy ref
    - purpose tag / allowed reveal scope
    - legal_hold / investigation_hold / session_hold state
    - post-confirm due
    GraphEngine:
    - access session
    - timer pause / resume event
    - key materialization / reseal event
    - blob pin state
    - derived export digest linkage
    archive_object:
    - sealed_identity_envelope_ref_or_digest
    - reopen_policy_ref
    - access_audit_log_ref
    - derived_export_digest_ref
    GraphLint:
    - redacted explanation only
    - cleartext identity や shard material を保持しない
  custody_separation_rules:
  - 同一自然人または同一 service boundary を authority_lane と custody_lane の両方に数えない。
  - security_lane は provisional bypass だけに使い、final confirm の authority_lane を兼ねない。
  - audit_notary_lane は request owner と独立した append-only path で発行し、pre-issued reusable token にしない。
  - external_auditor と delegated_reviewer に reusable custody shard を渡さない。
  - decrypted envelope を長期 cache や canonical archive object に昇格させない。
  prohibited_shortcuts:
  - delegated reviewer 単独で reopen を確定しない。
  - security_officer 単独で final de-redaction を確定しない。
  - access audit を事後記録で埋め合わせない。
  - retention timer 停止前に emergency bypass を発火しない。
  - external auditor へ raw shard や長期 plaintext copy を渡さない。
  - emergency bypass の出力を authority post-confirm 前に final evidence / penalty / public explanation へ流用しない。
  residual_open_points:
  - audit witness packet の vendor-neutral attestation / observer credential schema をどこまで canonical registry 化するか
  - cross-jurisdiction external audit の authority taxonomy と central delegation charter をどこまで registry 化するか
  - life-safety / active compromise 例外で accountable_identity_slice を許す threshold を profile/context ごとにどこまで再較正するか
stable_pseudonym_continuity_governance:
  status: provisional_fixed
  statement: stable_pseudonym_continuity_governance とは、stable pseudonym を canonical actor continuity handle として扱い、tenant / authority / accountability の lawful 境界に沿って scope・epoch・rotation bridge を定め、通常時の redaction と lawful reopen、さらに recipient-bound export を接続する規則である。
  core_claims:
  - stable pseudonym の canonical root scope は tenant_id × authority_family_id × accountability_domain_id とし、forum / tool / archive は projection surface として従属させる。
  - bridge token は clear identity を運ばず、predecessor / successor pseudonym の continuity commitment、lawful purpose、authorization basis、accountability lineage、revocation handle、sealed identity envelope binding を束縛する continuity artifact である。
  - bridge token の canonical composition は HSM-backed seal・append-only notarization・recipient-scoped derived proof の三層とし、seal と notarization を mandatory、derived proof を external audit / external digest / emergency bypass / recipient-visible export では mandatory とする。
  - reopen 後 derived export は source stable pseudonym を recipient-visible field に再利用せず、recipient / purpose / retention bucket / export bundle に束縛された export-local pseudonym へ一方向に再束縛する。
  - export-local pseudonym は temporary convenience label ではなく、TTL・revocation・non-reuse clause を持つ bounded continuity alias であり、reopen 終了や authority path 失効後に再利用してはならない。
  canonical_scope:
    root_dimensions:
    - tenant_id
    - authority_family
    - accountability_domain
    excluded_as_root_dimensions:
    - forum
    - tool
    - archive_bucket
    note: forum / tool / archive は view / storage / projection の単位であり、root scope を勝手に増やさない。
    projection_surfaces:
      forum_projection:
        statement: forum ごとの局所表示名や review convenience label は持ちうるが、canonical pseudonym root を置換しない。
      tool_projection:
        statement: DecisionLedger / GraphEngine / GraphLint / archive object ごとの local ref は actor pseudonym root へ従属する。
      archive_projection:
        statement: archive bucket や retention bucket は storage lifecycle を分けるが、identity scope root を分けない。
  epoch_policy:
    same_epoch_admissible_changes:
    - forum membership の変更だけ
    - tool migration / storage relocation
    - display label / team label の更新
    - replay capsule の再生成
    rotation_triggers:
    - authority_binding の material change
    - accountability_domain の change
    - tenant split / tenant merge のうち continuity risk がある change
    - compromise / leak / reopen による reidentification risk 上昇
    - legal partition / retention charter change により旧 pseudonym の reuse が unlawful になる場合
    non_triggers:
    - session refresh
    - archive compaction
    - reviewer assignment の一時変更
  bridge_taxonomy:
    epoch_rotation_bridge:
      statement: same canonical scope 内で epoch を更新するときの continuity bridge。
    scope_transition_bridge:
      statement: authority_family または accountability_domain の lawful transition をつなぐ bridge。cross-tenant には使わない。
    reopen_export_rebind_bridge:
      statement: reopened identity から derived export-local pseudonym へ一方向に再束縛する bridge。
  continuity_rules:
    preserve_when:
    - same tenant かつ same accountability_domain で lawful purpose が継続する
    - authority family change が ratified transition として bridge packet に記録されている
    - archive / replay / audit が同一 canonical scope 内で行われる
    cut_when:
    - tenant boundary を跨ぐ
    - public_output / external_commitment / external_audit recipient へ clear continuity を expose する
    - compromise containment のため lineage を quarantine する
    - lawful purpose absent または reveal scope excess
  bridge_token_composition:
    statement: bridge token は continuity の存在証明そのものではなく、continuity commitment と lawful verification path を recipient class ごとに分離して運ぶ artifact である。
    layers:
      hsm_backed_seal:
        statement: canonical field set の commitment を HSM 管理鍵で署名し、issuance authority と envelope binding を偽装不能にする mandatory layer。
        required_for:
        - epoch_rotation_bridge
        - scope_transition_bridge
        - reopen_export_rebind_bridge
      append_only_notarization:
        statement: token issuance / supersession / revocation / expiry を append-only ledger に束縛し、non-equivocation と時系列監査を担保する mandatory layer。
        required_for:
        - internal continuity verification
        - archive replay linkage
        - duplicate digest lineage linkage
        - external audit handoff
      recipient_scoped_derived_proof:
        statement: sealed payload や source stable pseudonym を出さずに recipient / purpose / reveal cap / validity を検証させる proof layer。
        mandatory_when:
        - external_auditor recipient
        - public_or_external_commitment sink
        - irreversible_resource_lock sink
        - emergency_bypass derived export
        - recipient が lawful reopen path を持たない
        optional_when:
        - same canonical scope 内で authority path を持つ internal replay / legal audit
    canonical_fields:
    - bridge_token_id
    - bridge_kind
    - predecessor_pseudonym_commitment
    - successor_pseudonym_commitment_or_export_commitment
    - canonical_scope_relation
    - lawful_purpose_ref
    - authorization_basis_ref
    - accountability_lineage_ref
    - recipient_class
    - validity_window
    - non_reuse_clause
    - revocation_handle
    - envelope_binding_digest
    - archive_manifest_digest_or_null
    - reopen_event_ref_or_null
    - duplicate_digest_ref_or_null
    - proof_profile_ref
    - issuance_notary_ref
    verification_path:
    - append-only notarization に token issuance が存在し、superseded / revoked / expired でないことを確認する。
    - HSM seal が canonical field set の commitment と issuance authority に対して有効であることを検証する。
    - lawful purpose、authorization basis、recipient class、reveal cap が current use と一致することを確認する。
    - derived proof required の文脈では、proof が recipient-scoped commitment と validity window を満たし、source stable pseudonym や clear identity を露出しないことを確認する。
    - reopen / archive / duplicate digest へ接続する場合は、対応する reopen event、archive manifest digest、duplicate digest linkage が token と整合することを確認する。
  export_local_pseudonym_policy:
    statement: export-local pseudonym は source stable pseudonym から導出される recipient-bound alias であり、single export bundle・single recipient class・single lawful purpose・single retention bucket に束縛する。
    issuance_grain:
    - source_pseudonym_ref
    - recipient_class
    - export_purpose
    - retention_bucket
    - export_bundle_id
    - reopen_event_ref_or_null
    ttl_table:
      engineering_tradeoff_domain:
        owner_bound_internal: 30d
        bounded_internal_shared: 7d
        authoritative_state: 72h
        public_or_external_commitment: 24h
        irreversible_resource_lock: 8h
      organizational_or_social_domain:
        owner_bound_internal: 14d
        bounded_internal_shared: 72h
        authoritative_state: 48h
        public_or_external_commitment: 12h
        irreversible_resource_lock: 4h
      regulated_domain:
        owner_bound_internal: 7d
        bounded_internal_shared: 24h
        authoritative_state: 24h
        public_or_external_commitment: 8h
        irreversible_resource_lock: 1h
    recipient_caps:
      internal_owner_or_same_scope_reviewer: none
      domain_or_central_authority: 72h
      external_auditor: 24h
      external_commitment_recipient: 8h
      emergency_response_principal: 1h
    effective_ttl_rule:
      statement: effective TTL は sink class × profile baseline、recipient cap、残存 reopen authorization window、active post-confirm due の strictest min で決める。
    revocation_triggers:
    - validity_window 終了
    - lawful purpose または authorization basis の失効
    - bridge token の superseded / revoked / resealed
    - reopen event close、authority post-confirm failure、legal-hold reseal
    - recipient mismatch、bundle 逸脱、non_reuse_clause 違反
    - compromise / leak / export routing anomaly による quarantine
    non_reuse_clause:
      statement: export-local pseudonym は single export bundle の内部 continuity にだけ使え、recipient class・purpose・retention bucket・reopen event・authority path のいずれかが変われば再発行しなければならない。
      invariants:
      - external digest と別 external recipient への human-readable export で同一 pseudonym を共有してはならない。
      - revoke / expire 済み pseudonym を追補 export や replay continuation に再活性化してはならない。
      - export-local pseudonym の purge / revoke は accountability lineage と bridge token tombstone を消してはならない。
  connection_policy:
    with_duplicate_discard_digest:
    - external digest の lineage summary は source stable pseudonym を直接載せず、bridge token の derived proof または redacted lineage slice を参照する。
    - duplicate_discard_digest が external sink に出るときは、export-local pseudonym と bridge token proof profile が recipient class / sink class に整合していなければならない。
    with_archive_replay:
    - same canonical scope 内の deterministic replay / legal audit では seal + notarization を既定 verification path とし、recipient-visible export がある場合だけ derived proof を追加する。
    - external replay bundle では archive manifest digest と bridge token proof ref を同時に束縛し、manifest 単独や pointer 単独を continuity witness にしてはならない。
    with_legal_hold_reopen:
    - reopen_export_rebind_bridge の token 発行は lane-based quorum で lawful reopen が成立し、sealed identity envelope binding が active である場合にだけ許される。
    - legal-hold reseal、authority post-confirm failure、scope excess が起きたときは dependent export-local pseudonym を自動 revoke する。
    with_emergency_bypass:
    - emergency bypass で出す bridge token は provisional status と bounded reveal を明示し、post-confirm 前に final evidence / public explanation / penalty judgement へ流用してはならない。
    - accountable_identity_slice 例外があっても export-local pseudonym は recipient-bound alias として別に発行し、source stable pseudonym を露出しない。
  prohibited_shortcuts:
  - forum ごとに別 stable pseudonym root を勝手に発行して canonical continuity を壊す。
  - tool migration を理由に pseudonym epoch を更新せず lineage bridge も残さない。
  - cross-tenant export に同一 stable pseudonym を再利用する。
  - bridge token を reusable shard、API key、恒久 join key として使う。
  - append-only notarization を省き、HSM seal だけで continuity witness を満たしたとみなす。
  - external_audit / external_digest / emergency_bypass で derived proof required 条件を無視する。
  - reopened derived export に source pseudonym や clear identity をそのまま出す。
  residual_open_points:
  - post-quantum migration を含む suite revision の dual-validity window と anti-downgrade rule をどこまで canonical registry 化するか
  - bundle-of-bundles における mandatory edge cohort / super-bundle coverage / archive linkage をどこで切るか
  - export-local pseudonym を伴う external digest の lineage slice をどこまで reversible にするか
duplicate_discard_digest_governance:
  status: provisional_fixed
  statement: 'duplicate_discard_digest とは、cluster de-dup により discard した member 群を、

    root profile に束縛された order-independent かつ count-sensitive な canonical digest として保持し、

    confirm・penalty・replay・purge judgement に必要な最小事実を audit-sufficient に残すための規則である。

    '
  core_claims:
  - digest は cluster representative の代用品ではなく、discard 群の監査・公平性・再判定に必要な summary anchor である。
  - canonical field set は common core と detector family / claim facet / sink class / replay class ごとの override に分ける。
  - multiset root は member の順序に依存してはならず、duplicate count の違いを潰してはならない。
  - multiset root の計算法は自由入力にせず、root_profile_ref に束縛する。
  - multiset root だけでは意味が足りず、cardinality、duplicate reason、stable pseudonym lineage、route / recipient / effect coverage を別 field で残す。
  - purge admissibility は、digest が family ごとの minimum retained raw unit を壊さないときにだけ開く。
  canonical_field_model:
    common_core_fields:
    - cluster_id
    - detector_family_ref
    - claim_facet_ref
    - sink_class_ref
    - replay_class_ref
    - canonical_scope_ref
    - pseudonym_epoch_ref
    - generation_window_ref
    - member_projection_schema_ref
    - root_profile_ref
    - schema_version_ref
    - multiset_root
    - collision_witness_ref_or_null
    - compression_grade_ref
    - total_member_count
    - unique_signature_count
    - duplicate_reason_set
    - duplicate_reason_histogram
    - representative_ref
    - retained_artifact_linkage_ref
    - bridge_token_proof_ref_or_null
    - archive_manifest_digest_or_null
    mandatory_semantic_summaries:
      cardinality_summary:
        statement: total_member_count、unique_signature_count、count bucket、discard ratio を残し、root だけで件数を推測させない。
      lineage_summary:
        statement: stable pseudonym lineage は clear identity ではなく、canonical scope / epoch に束縛された continuity slice として残す。
      route_recipient_effect_summary:
        statement: route / recipient / effect evidence が detector 判定に効く family では summary field を mandatory にする。
    family_overrides:
      local_convention_detected:
        extra_fields:
        - local_basis_summary
        - actor_or_team_concentration_summary
      confirmed_policy_drift:
        extra_fields:
        - basis_pair_summary
        - effective_use_path_summary
        - registry_or_policy_binding_summary
      suspected_leak:
        extra_fields:
        - route_summary
        - recipient_summary
        - effect_summary
        - direct_reach_or_observation_basis
      bias_penalty:
        extra_fields:
        - actor_concentration_summary
        - reviewer_or_operator_split_summary
      flooding_penalty:
        extra_fields:
        - cadence_window_summary
        - burst_shape_summary
        - source_diversity_summary
      replay_penalty:
        extra_fields:
        - replay_lineage_summary
        - reused_artifact_relation_summary
    sink_and_replay_overrides:
      strict_sink_rule:
        statement: authoritative_state / public_or_external_commitment / irreversible_resource_lock では、summary 省略を許さず、effect または accountability に触れる field を強化する。
      replay_rule:
        statement: deterministic_replay / forensic_replay では multiset root だけでなく replay-support linkage と archive manifest digest を必須とし、analytical_replay でも member projection schema を捨てない。
  multiset_root_policy:
    statement: multiset root は canonical member projection の multiset から作る order-independent root であり、set hash や representative hash の代用品ではない。
    required_properties:
    - order_independent
    - count_sensitive
    - profile_bound
    - schema_bound
    - scope_epoch_bound
    - family_override_aware
    root_profile_policy:
      statement: root_profile_ref は leaf hash、multiset accumulator、canonical serialization、domain separation、multiplicity encoding、collision witness profile、schema version を一体で束縛する canonical registry key である。
      canonical_profiles:
      - compact_internal_v1
      - standard_canonical_v1
      - strict_external_v1
      rules:
      - multiset root の直接比較・再利用・署名対象化は root_profile_ref と schema_version_ref が一致する場合に限る。
      - root profile または schema version を更新するときは dual-root migration witness を併記し、silent upgrade を禁止する。
      - sink class / replay class / recipient class / detector family の strictest 条件が要求する root profile を採用する。
    collision_witness_policy:
      statement: collision_witness は root の安全性を口頭で主張する代わりではなく、comparability・migration・dispute replay に必要な監査 anchor である。
      mandatory_cases:
      - external digest または recipient-visible export に duplicate_discard_digest を出す場合
      - replay_class が deterministic_replay または forensic_replay の場合
      - detector_family が suspected_leak または replay_penalty の場合
      - protected facet または strict sink に触れる場合
      optional_cases:
      - same-scope internal の summary_only / analytical_replay で、strict sink と protected facet に触れず、external recipient へ出さない場合
    boundary_rules:
    - member projection schema が変わるなら root を同一比較してはならない。
    - root profile または schema version が違う root を migration witness なしに同一 continuity chain へ入れてはならない。
    - canonical scope または pseudonym epoch が違う member を同一 root に混ぜてはならない。
    - same unique member set でも multiplicity が違えば別 root にしなければならない。
  compression_boundary_policy:
    statement: large cluster の summary 圧縮は digest の存在理由を壊さない範囲でだけ許し、lossless_canonical / bounded_loss_summary / coarse_internal_summary の3段階に限定する。
    grades:
      lossless_canonical:
        statement: histogram、route partition、lineage partition、recipient / effect partition を canonical bucket の範囲で正確保持する。
        required_when:
        - sink_class が public_or_external_commitment または irreversible_resource_lock
        - replay_class が deterministic_replay または forensic_replay
        - recipient class が external_auditor / external_commitment_recipient / emergency_response_principal
        - detector_family が suspected_leak または replay_penalty
        - protected facet または authority path の差分が判定に効く
      bounded_loss_summary:
        statement: total_member_count と unique_signature_count を exact に残しつつ、approved bucket / top-k / concentration upper bound のみ圧縮する。
        allowed_when:
        - replay_class が analytical_replay
        - recipient class が internal_owner_or_same_scope_reviewer または domain_or_central_authority
        - sink_class が owner_bound_internal / bounded_internal_shared / authoritative_state
        - protected facet、external commitment、irreversible lock の差分を跨いで summary を融合しない
      coarse_internal_summary:
        statement: internal monitoring 用の粗い summary であり、cluster health の観測には使えても confirm・penalty・external digest の基底には使えない。
        allowed_when:
        - replay_class が summary_only
        - sink_class が owner_bound_internal または bounded_internal_shared
        - recipient class が internal_owner_or_same_scope_reviewer
        - detector_family が local_convention_detected または内部観測専用 family である
    non_negotiable_preservations:
    - total_member_count と unique_signature_count は全 grade で exact に保持する。
    - duplicate_reason_set の presence/absence は全 grade で保持する。
    - route / recipient / effect summary は protected facet、external commitment、authority path を跨いで融合してはならない。
    - lineage summary は canonical scope / epoch / export bundle / lawful purpose / retention bucket を跨いで融合してはならない。
  connection_policy:
    stable_pseudonym_lineage:
    - lineage summary は stable pseudonym continuity を内部接続するが、external digest に source stable pseudonym をそのまま露出しない。
    - export では export-local pseudonym または redacted lineage slice へ再束縛する。
    - external digest に duplicate_discard_digest を出すときは、single export bundle / single recipient class / single lawful purpose / single retention bucket に束縛された lineage slice と bridge token proof_ref を必須にする。
    route_recipient_effect_evidence:
    - suspected_leak では route / recipient / effect のいずれかを root の外に summary field として残す。
    - confirmed_policy_drift / replay_penalty では effective use path または replay lineage の要約を残す。
    cardinality_and_fairness:
    - penalty や severity が cluster cardinality に依存する場合、duplicate_reason_histogram と count bucket を必須にする。
    - fairness review に必要な actor concentration や route concentration を representative 1件へ潰してはならない。
    archive_and_bridge_linkage:
    - deterministic_replay / forensic_replay、または external continuity に使う duplicate_discard_digest では archive manifest digest を mandatory にする。
    - bridge token proof_ref は export-local pseudonym / redacted lineage slice の lawful continuity witness として使い、root 単体で external continuity を主張してはならない。
  prohibited_shortcuts:
  - hash primitive / serialization / multiplicity encoding を digest ごとに自由指定し、root_profile_ref を持たせない。
  - representative 1件だけ残して duplicate_discard_digest を不要とみなす。
  - multiset root だけ残して member projection schema、count summary、duplicate reason を捨てる。
  - unique member set の hash を multiset root だと偽る。
  - root profile または schema version が違う root を migration witness なしに直接比較する。
  - strict sink や leak family で route / recipient / effect summary を省略する。
  - coarse 圧縮 summary を confirm / penalty / external digest の canonical basis に流用する。
  - external digest に source stable pseudonym や clear identity をそのまま出す。
  residual_open_points:
  - root_profile の version migration と dual-root coexistence window をどこまで canonical registry 化するか
  - bounded_loss_summary で保持すべき preserved-statistic set と top-k cap を detector family / profile ごとにどこまで数値 registry 化するか
root_profile_schema_version_dual_root_comparability_governance:
  status: provisional_fixed
  statement: root_profile_schema_version_dual_root_comparability_governance とは、root_profile_ref / schema_version_ref の migration 時に、dual-root coexistence を use surface ごとにどこまで許し、old root freeze / successor mandatory / history-only retention / rollback の境界を comparability witness により registry 化する規則である。
  core_claims:
  - dual-root coexistence は old root と new root を同格 current basis として並立させることではない。migration の間に predecessor と successor の両 digest を保持できるとしても、どの use surface でどちらが primary current basis かを分け、comparability witness で lawful な比較可能性だけを明示しなければならない。
  - new issuance freeze は successor を早出しすることの禁止であり、old root freeze は predecessor を current basis として引きずることの禁止である。したがって migration では、まず canonicalization / projection / benchmark linkage / rollback policy が揃うまで successor issuance を freeze し、arm 後は successor を primary にして predecessor の新規単独利用を止める二段 freeze が必要である。
  - comparability は一枚岩ではなく、exact_equivalent・bounded_projection_loss・benchmark_only・non_comparable の loss class に分けるべきである。current_basis に使えるのは exact_equivalent に限り、bounded_projection_loss は audit annex や bounded bridge continuity に限定し、benchmark_only は replay benchmark にだけ許す。
  - dual-root digest は old/new root を同時に持つことの記録であって、root 単体比較の免罪符ではない。dual-root digest には root pair / schema pair / subject set / canonicalization rule / projection family / loss class / admissible use surface / freeze boundary / rollback linkage を束ね、silent false comparability を検出できなければならない。
  - rollback は predecessor 復権の近道ではない。successor root を無効化する場合でも、どの digest pair・bridge continuity・benchmark baseline を巻き戻し、どの external disclosure に correction notice を出したかを reverse comparability witness として残さなければならない。
  use_surface_matrix:
    current_basis: conditional。dual-root coexistence は migration batch 内の shadow dual-current に限り許すが、successor root を primary current basis とし、comparison_loss_class が exact_equivalent で、paired dual-root digest と freeze boundary がある場合に限る。predecessor の単独 current basis 継続は old_root_freeze 後 forbidden。
    history_verification: admissible。predecessor / successor の両 root を immutable archive 上で保持してよい。bounded_projection_loss や benchmark_only でも、loss disclosure と benchmark linkage があれば history witness としては許すが、non_comparable を continuity recovery に使ってはならない。
    external_audit_disclosure: conditional。監査 current disclosure で dual-root を併記する場合は successor を current primary とし、predecessor は migration disclosure annex に退避する。exact_equivalent は full admissible、bounded_projection_loss は explicit loss notice 付きの annex 限定、benchmark_only / non_comparable は current disclosure basis として forbidden。
    bridge_continuity: conditional。bridge token proof_ref、lineage slice、archive manifest digest、dual-root digest が揃う場合にだけ predecessor→successor continuity を許す。exact_equivalent は bounded bridge continuity に使え、bounded_projection_loss は audience / lawful purpose / retention bucket を広げない narrow bridge に限る。benchmark_only / non_comparable は forbidden。
    replay_benchmark: admissible。benchmark family と comparison window が固定されていれば、exact_equivalent・bounded_projection_loss・benchmark_only を replay benchmark に使える。ただし benchmark 結果を current admissibility や external commitment の代用にしてはならない。
  comparability_loss_classes:
    exact_equivalent:
      meaning: canonical subject set と comparison objective を保ったまま predecessor / successor を current-comparable にできる class。
      allowed_surfaces:
      - current_basis
      - history_verification
      - external_audit_disclosure
      - bridge_continuity
      - replay_benchmark
      requirements:
      - root pair / schema pair が明示されている
      - canonicalization rule と projection family が deterministic で reversible reference を持つ
      - dual-root digest と drift scan digest がある
    bounded_projection_loss:
      meaning: 比較はできるが、aggregation / projection / serialization 差により current-equality までは言えない class。
      allowed_surfaces:
      - history_verification
      - external_audit_disclosure
      - bridge_continuity
      - replay_benchmark
      requirements:
      - loss dimension を comparison_loss_class に明示する
      - external disclosure では loss notice annex を mandatory にする
      - bridge continuity では audience / scope widening を禁止する
    benchmark_only:
      meaning: benchmark / replay / regression tracking のためだけに比較できる class。continuity current basis には使えない。
      allowed_surfaces:
      - history_verification
      - replay_benchmark
      requirements:
      - benchmark family ref と benchmark dataset digest を mandatory にする
      - current / bridge / external current basis への昇格を禁止する
    non_comparable:
      meaning: old/new root の並記は保持できても lawful comparison はできない class。
      allowed_surfaces:
      - history_verification
      requirements:
      - history-only retention に落とす
      - migration success を主張しない
      - successor mandatory surface への流入を禁止する
  freeze_and_window_rules:
    new_issuance_freeze:
      boundary: successor root / schema を使った新規 issuance は、canonicalization rule・projection family・comparability witness template・rollback policy・benchmark linkage が arm 済みになるまで freeze する。
      release_condition: migration batch が dual-root comparability witness の minimum field set を満たし、shadow validation で silent drift が 0 件または explictly waived になったときにだけ release する。
    old_root_freeze:
      boundary: successor issuance が arm され、primary current basis が successor に切り替わった時点で predecessor の新規単独 current usage を freeze する。
      post_freeze_reuse:
      - history_verification
      - external_audit_disclosure annex
      - bounded bridge continuity
      - replay_benchmark
    dual_root_window_classes:
      shadow_dual_current_internal_only: current_basis で paired dual-root digest を保持できる最短 window。internal / same-scope validation に限り、successor primary を mandatory とする。
      audit_and_bridge_only: old root freeze 後に predecessor を external_audit_disclosure annex と bridge continuity witness にだけ残す window。
      history_only: window 終了後は predecessor / successor を immutable archive と benchmark record にだけ残す。
    successor_mandatory_for:
    - new_issuance_freeze 解放後に生成されるすべての new issuance
    - old_root_freeze 後の current basis 判定
    - 監査向け current disclosure の primary digest
    - bridge cutover 後に新規発行される bridge token / external continuity packet
    - migration 完了後に登録される benchmark baseline の primary side
  comparability_witness:
    minimum_field_set:
    - comparability_witness_id
    - migration_kind_ref
    - predecessor_root_profile_ref
    - successor_root_profile_ref
    - predecessor_schema_version_ref
    - successor_schema_version_ref
    - subject_set_manifest_ref_or_digest
    - canonicalization_rule_ref
    - projection_family_ref
    - comparison_objective_ref
    - comparison_loss_class_ref
    - admissible_use_surface_set
    - pre_arm_new_issuance_freeze_at
    - old_root_freeze_at
    - dual_root_window_class_ref
    - window_end_at_or_condition
    - predecessor_root_digest_set_or_digest
    - successor_root_digest_set_or_digest
    - dual_root_digest_ref
    - benchmark_family_ref_or_null
    - benchmark_dataset_digest_or_null
    - bridge_token_proof_ref_or_null
    - drift_scan_digest_ref
    - rollback_policy_ref
    - archive_manifest_digest_ref
    rules:
    - dual_root_digest は predecessor / successor の digest を unordered に潰した summary ではなく、root pair / schema pair / pair-order / subject set / loss class を固定した paired witness でなければならない。
    - comparison_loss_class_ref が bounded_projection_loss 以上なら、どの facet が失われたかを loss disclosure として mandatory にする。
    - benchmark_family_ref は replay_benchmark または benchmark_only を admissible use surface に含む場合に mandatory とする。
    - bridge_token_proof_ref は bridge_continuity を admissible use surface に含む場合に mandatory とする。
    - rollback_policy_ref は predecessor 復帰条件だけでなく、successor digest invalidation・external correction notice・benchmark baseline 巻き戻し条件を含まなければならない。
    drift_and_rollback:
    - silent drift は、paired dual-root digest を持たない successor issuance、loss class と use surface の不一致、benchmark_only digest の current 流用、window 終了後の predecessor current reuse を含む。
    - rollback は reverse comparability witness を持つ独立 event とし、どの root pair を無効化し、どの bridge token / benchmark linkage を巻き戻したかを immutable に残す。
  responsibility_split:
    DecisionLedger: comparability_witness_id、root/schema pair、loss class、admissible use surface、new issuance freeze / old root freeze、primary root designation、rollback policy の正本を保持する。
    GraphEngine: issue_time / use surface / context / digest pair / benchmark linkage を評価し、dual-root admissibility、successor mandatory、window class、bridge continuity validity、drift trigger を計算する。
    GraphLint: migration witness なし root 直接比較、bounded_projection_loss の current basis 流用、benchmark_only の bridge / audit current basis 流用、freeze 前 successor issuance、window 終了後 predecessor current reuse、silent non-comparable carryover を検査する。
    archive_object: predecessor / successor paired digest、loss disclosure annex、benchmark dataset digest、bridge token proof、drift scan、rollback manifest を immutable に保持する。
  prohibited_shortcuts:
  - root_profile_ref または schema_version_ref が異なる root を comparability witness なしに直接比較すること
  - same member set だからという理由だけで new root を exact_equivalent とみなすこと
  - bounded_projection_loss や benchmark_only を current basis の近道に使うこと
  - successor root の shadow validation が終わる前に new issuance freeze を解除すること
  - external partner 未更新を理由に predecessor root を current primary のまま残すこと
  - rollback を silent predecessor re-enable として処理すること
  residual_open_points: []
bounded_loss_summary_registry_governance:
  status: provisional_fixed
  statement: bounded_loss_summary_registry_governance とは、duplicate_discard_digest の bounded_loss_summary について、どの統計を exact に保持し、どの統計を top-k + exact tail で保持し、どの条件で lossless_canonical に escalate し、どの圧縮を forbidden とするかを detector family / claim facet / sink class / replay class / recipient class / root profile ごとの registry cell で固定する規則である。
  core_claims:
  - bounded_loss_summary は「ざっくりした要約」ではない。exact に保持する統計、top-k で保持する統計、exact tail mass / omitted bucket count / max omitted bucket mass を必須にした bounded summary contract である。
  - detector family が preserved-statistic set の主軸を決め、claim facet / sink class / replay class / recipient class / root profile はその cell を弱めずに strict 化するだけである。したがって override は permissive override ではなく monotone tightening として扱う。
  - suspected_leak と replay_penalty は、route/recipient/effect・replay lineage・external continuity の再監査を壊しやすいため bounded_loss_summary を禁止し、lossless_canonical を mandatory とする。
  - protected facet / authority path / export bundle / lawful purpose / retention bucket は hard partition axis であり、bounded_loss_summary でもこれらを跨いで bucket を融合してはならない。partition count は exact に残し、融合が必要なら lossless へ escalate しなければならない。
  - top-k cap は単独では意味を持たない。top-k entry に加えて omitted_tail_mass、omitted_bucket_count、max_omitted_bucket_mass、concentration_upper_bound、summary_generation_rule_ref を残し、silent summary drift を再計算可能にしなければならない。
  - root_profile_ref は multiset root 側の canonicalization を束縛するが、bounded_loss_summary の admissibility にも効く。compact_internal_v1 は bounded admissible、standard_canonical_v1 は authority review 限定で bounded admissible、strict_external_v1 は bounded forbidden とする。
  registry_axes:
    primary_axes:
    - detector_family_ref
    - claim_facet_family_ref
    - sink_class_ref
    - replay_class_ref
    - recipient_class_ref
    - root_profile_ref
    hard_partition_axes:
    - protected_facet_partition
    - authority_path_partition
    - export_bundle_partition
    - lawful_purpose_partition
    - retention_bucket_partition
    - canonical_scope_partition
    - pseudonym_epoch_partition
    resolution_rule: registry cell は detector_family_ref を first key とし、claim_facet_family_ref が statistic family を追加し、sink / replay / recipient / root profile が cap class と lossless escalation 条件を上書きする。override は stricter side を採用し、cap を小さくして detail を減らすことは許されない。
  mandatory_summary_trailer:
    required_fields:
    - summary_registry_cell_ref
    - summary_generation_rule_ref
    - cap_class_ref
    - exact_preserved_stat_digest
    - omitted_bucket_count_by_dimension
    - omitted_tail_mass_by_dimension
    - max_omitted_bucket_mass_by_dimension
    - concentration_upper_bound_by_dimension
    - partition_guard_digest
    - drift_scan_basis_digest
    rules:
    - top-k summary を持つ各 dimension は omitted_tail_mass と max_omitted_bucket_mass を exact に持たなければならない。
    - partition_guard_digest は hard partition axes ごとの exact count vector を束縛しなければならない。
    - summary_generation_rule_ref は detector family / cap class / ordering key / tie-break / bucketization version を固定しなければならない。
  cap_classes:
    local_review:
      statement: same-scope internal analytical review 用の base cap class。
      caps:
        local_basis_top_k: 8
        basis_or_path_top_k: 8
        actor_or_source_top_k: 8
        route_recipient_effect_top_k: 8
        cadence_window_top_k: 8
        lineage_slice_top_k: 4
    authority_review:
      statement: domain_or_central_authority / authoritative_state analytical review 用の stricter cap class。より多くの detail を exact top-k で保持する。
      caps:
        local_basis_top_k: 16
        basis_or_path_top_k: 16
        actor_or_source_top_k: 16
        route_recipient_effect_top_k: 16
        cadence_window_top_k: 12
        lineage_slice_top_k: 8
    lossless_only: deterministic_replay / forensic_replay / strict_external_v1 / external recipient / strict sink / protected facet sensitive context では top-k truncation を許さず、lossless_canonical へ escalate する。
  context_and_profile_rules:
    root_profile_rules:
      compact_internal_v1: bounded_loss_summary admissible。recipient_class と sink_class が local review なら local_review cap、authority review なら authority_review cap を採用する。
      standard_canonical_v1: bounded_loss_summary conditional。recipient_class が domain_or_central_authority または sink_class が authoritative_state の analytical review に限り admissible とし、cap_class は authority_review を mandatory にする。
      strict_external_v1: bounded_loss_summary forbidden。strict_external_v1 を使うなら lossless_canonical へ escalate しなければならない。
    replay_and_recipient_rules:
      analytical_replay: bounded_loss_summary のみ admissible 候補。deterministic / forensic へ昇格した時点で lossless mandatory に切り替える。
      summary_only: coarse_internal_summary 候補であり、bounded_loss_summary を coarse の代用品にしてはならない。
      internal_owner_or_same_scope_reviewer: base は local_review cap class。
      domain_or_central_authority: base は authority_review cap class。
      external_auditor_or_external_commitment_recipient_or_emergency_response_principal: bounded_loss_summary forbidden。
      public_or_external_commitment_or_irreversible_resource_lock: bounded_loss_summary forbidden。
    escalation_conditions:
    - protected facet 差分または authority path 差分が判定に効く
    - recipient-visible export または external continuity に使う
    - deterministic_replay / forensic_replay を要求する
    - strict_external_v1 を要求する
    - cross-partition merge をしないと summary が作れない
  detector_family_registry:
    local_convention_detected:
      bounded_loss_admissibility: admissible。ただし analytical_replay かつ internal recipient に限る。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - local_basis_bucket_count
      - canonical_scope_partition_count
      - pseudonym_epoch_partition_count
      top_k_statistics_with_caps:
      - local_basis_summary
      - actor_or_team_concentration_summary
      - lineage_slice_summary
      forbidden_compressions:
      - route / recipient / effect evidence を local convention summary に吸収して leak family の代用品にすること
      - actor/team concentration を omitted tail mass なしで top-1 representative に潰すこと
    confirmed_policy_drift:
      bounded_loss_admissibility: conditional。protected facet / authority path 差分が inactive で、analytical_replay かつ internal / authority recipient の場合に限る。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - basis_pair_bucket_count
      - effective_use_path_bucket_count
      - registry_or_policy_binding_bucket_count
      - authority_path_partition_count
      top_k_statistics_with_caps:
      - basis_pair_summary
      - effective_use_path_summary
      - registry_or_policy_binding_summary
      - lineage_slice_summary
      forbidden_compressions:
      - authority path 差分を跨いだ basis_pair bucket の融合
      - effective_use_path の上位 path だけ残して policy binding の omitted tail を捨てること
    bias_penalty:
      bounded_loss_admissibility: conditional。final external penalty / irreversible lock でなく、analytical fairness review に限り admissible。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - reviewer_operator_split_matrix
      - protected_facet_partition_count
      - omitted_tail_mass_actor_dimension
      - max_omitted_bucket_mass_actor_dimension
      - concentration_upper_bound_actor_dimension
      top_k_statistics_with_caps:
      - actor_concentration_summary
      - team_or_route_concentration_summary
      - lineage_slice_summary
      forbidden_compressions:
      - fairness review に必要な omitted tail mass を落とすこと
      - reviewer/operator split を top-k identity summary に置き換えること
    flooding_penalty:
      bounded_loss_admissibility: conditional。direct abuse confirm 前の analytical severity review に限り admissible。
      exact_preserved_statistics:
      - total_member_count
      - unique_signature_count
      - duplicate_reason_histogram
      - registered_cadence_bucket_histogram
      - burst_shape_bucket_count
      - source_diversity_bucket_count
      - protected_facet_partition_count
      top_k_statistics_with_caps:
      - burst_window_summary
      - source_group_concentration_summary
      - lineage_slice_summary
      forbidden_compressions:
      - cadence bucket を coarse single total へ畳み、burst envelope 破れを再監査できなくすること
      - source diversity を representative 1件へ潰すこと
    suspected_leak:
      bounded_loss_admissibility: forbidden。route / recipient / effect と exposure episode continuity の再監査を壊すため lossless_canonical mandatory。
      exact_preserved_statistics:
      - route_partition_count
      - recipient_partition_count
      - effect_bucket_count
      - exposure_episode_count
      top_k_statistics_with_caps: []
      forbidden_compressions:
      - route / recipient / effect を top-k + tail へ落として external reach の exact replay を失うこと
    replay_penalty:
      bounded_loss_admissibility: forbidden。replay lineage / reused artifact relation / benchmark continuity の再監査を壊すため lossless_canonical mandatory。
      exact_preserved_statistics:
      - replay_lineage_partition_count
      - reused_artifact_relation_count
      - benchmark_linkage_count
      top_k_statistics_with_caps: []
      forbidden_compressions:
      - replay lineage を top-k representative relation に潰すこと
  claim_facet_overlays:
    route_or_recipient_or_effect:
      exact_preservations:
      - route_partition_count
      - recipient_partition_count
      - effect_bucket_count
      cap_dimension: route_recipient_effect_top_k
      escalate_to_lossless_when:
      - direct recipient identity または effect realization が confirm / penalty judgement の basis になる
      - external continuity または recipient-visible export に使う
    basis_or_policy_path:
      exact_preservations:
      - basis_pair_bucket_count
      - effective_use_path_bucket_count
      - registry_or_policy_binding_bucket_count
      cap_dimension: basis_or_path_top_k
    actor_or_reviewer_fairness:
      exact_preservations:
      - reviewer_operator_split_matrix
      - omitted_tail_mass_actor_dimension
      - max_omitted_bucket_mass_actor_dimension
      - concentration_upper_bound_actor_dimension
      cap_dimension: actor_or_source_top_k
    cadence_or_burst:
      exact_preservations:
      - registered_cadence_bucket_histogram
      - burst_shape_bucket_count
      - source_diversity_bucket_count
      cap_dimension: cadence_window_top_k
    replay_or_lineage_relation:
      exact_preservations:
      - canonical_scope_partition_count
      - pseudonym_epoch_partition_count
      - export_bundle_partition_count
      - lawful_purpose_partition_count
      - retention_bucket_partition_count
      cap_dimension: lineage_slice_top_k
      escalate_to_lossless_when:
      - replay lineage そのものが penalty confirm の basis になる
      - bridge continuity を duplicate_discard_digest から直接主張する
  silent_summary_drift_rules:
    drift_detected_when:
    - exact_preserved_stat_digest が再計算値と一致しない
    - top-k entry 集合は一致していても omitted_tail_mass / omitted_bucket_count / max_omitted_bucket_mass のいずれかがずれる
    - hard partition axes を跨いだ bucket merge が見つかる
    - registry cell が要求する cap class より小さい cap で summary が生成されている
    - summary_generation_rule_ref が tie-break / ordering / bucketization version を変えているのに migration witness がない
    - concentration_upper_bound が再計算より楽観的で fairness 判定を弱めている
    mandatory_checks:
    - same raw cluster から recompute した bounded summary と archived summary の diff scan
    - lossless representative sample または archive linkage を用いた tail audit
    - claim facet overlay と detector family overlay の strictest side selection lint
  responsibility_split:
    DecisionLedger: summary_registry_cell_ref、cap_class_ref、exact_preserved_stat_digest、compression_admissibility_state、lossless_escalation_reason の正本を保持する。
    GraphEngine: detector family / claim facet / sink / replay / recipient / root profile から applicable registry cell を解決し、exact stats・top-k summary・tail metrics・partition_guard_digest を生成する。
    GraphLint: forbidden family での bounded usage、missing exact trailer、cap undershoot、hard partition merge、fairness tail 欠落、silent summary drift を検査する。
    archive_object: summary_generation_rule、tail audit sample、lossless fallback linkage、partition_guard_digest、drift diff report を immutable に保持する。
  prohibited_shortcuts:
  - detector family ごとの preserved-statistic set を定義せず、一律の generic top-k summary を使うこと
  - top-k entry だけ残して omitted tail mass / omitted bucket count を捨てること
  - protected facet / authority path / export bundle / lawful purpose / retention bucket を跨いで summary bucket を融合すること
  - strict_external_v1 や deterministic / forensic replay で bounded_loss_summary を使うこと
  - suspected_leak / replay_penalty を local_convention 用 summary profile で近似すること
  - cap class を縮めて detail を減らす override を permissive override として扱うこと
  residual_open_points: []
transition_bundle_lineage_partition_governance:
  status: provisional_fixed
  statement: transition_bundle_lineage_partition_governance とは、tenant / authority / export bundle / lawful purpose / retention bucket / canonical scope / pseudonym epoch の merge / split / rebind を伴う transition bundle について、lineage slice partition witness の最小核、audit witness packet / central delegation charter / bridge token / archive manifest との binding、lawful continuity / notice / correction / rollback duty を固定する規則である。
  core_claims:
  - transition bundle は predecessor と successor の単なる対応表ではない。hard partition axis ごとの lineage slice を canonical cell として切り、その cell ごとに predecessor coverage・successor provenance・duty surface を束ねた governance object である。
  - lineage slice partition witness の主目的は、「何がどこへ移ったか」だけでなく、「何が移ってはならないか」「何が retire されたか」「どの successor がどの duty を負うか」を partition cell 単位で閉じることである。
  - audit witness packet は transition lawful continuity と partition completeness の一次 witness である。central delegation charter は merge / split を実施してよい authority path と duty template を与えるが、packet の代用にはならない。
  - bridge token は cross-scope / cross-epoch / export continuity の successor-facing binding に使うが、merge / split そのものの lawful authorization や notice completion を単独で証明してはならない。
  - archive manifest は immutable recovery anchor であり、bundle 実体・witness packet・bridge token・notice evidence・reverse bundle linkage を固定する。rollback や reopen は archive manifest を介して forward bundle を可逆化するのであって、forward bundle を消し込む操作ではない。
  - partial rollback は「forward bundle をなかったことにする」処理ではなく、affected partition cell だけを対象にした reverse continuity bundle と correction notice bundle を別 object として束ねるべきである。
  hard_partition_axes:
  - tenant_partition
  - authority_path_partition
  - export_bundle_partition
  - lawful_purpose_partition
  - retention_bucket_partition
  - canonical_scope_partition
  - pseudonym_epoch_partition
  transition_relation_taxonomy:
    one_to_many_split: 1つの predecessor lineage slice が複数 successor cell に分配される。allocation vector と excluded successor set を exact に残す。
    many_to_one_merge: 複数 predecessor lineage slice が1つの successor cell に束ねられる。merge admissibility は charter と packet の両方で確認し、hard partition axis を跨ぐ場合は default forbidden。
    many_to_many_recomposition: split と merge が同一 bundle 内で起きる複合遷移。predecessor/successor の cardinality だけで lawful continuity を判定してはならず、cell ごとの allocation witness が必要。
    rebind_without_cardinality_change: canonical scope / pseudonym epoch / export-local pseudonym 等の再束縛で cardinality は変わらないが continuity surface が変わる遷移。bridge token と notice duty が主に効く。
    retire_or_tombstone: successor を持たず lineage slice を終了する遷移。retire reason と reopen path を exact に残さなければならない。
  minimum_bundle_fields:
    required_fields:
    - transition_bundle_id
    - bundle_class_ref
    - transition_reason_ref
    - predecessor_partition_vector_digest
    - successor_partition_vector_digest
    - lineage_slice_partition_witness_ref
    - audit_witness_packet_ref
    - central_delegation_charter_ref_or_null
    - bridge_token_digest_set_or_null
    - archive_manifest_digest_ref
    - notice_and_correction_plan_ref_or_null
    - reverse_bundle_linkage_ref_or_null
    - predecessor_coverage_digest
    - successor_provenance_digest
    - retired_slice_digest_or_null
    - allocation_rule_ref
    - initiated_at
    - finalized_at_or_null
    rules:
    - predecessor_coverage_digest は predecessor slice 全件の covered / retired / deferred を partition cell 単位で exact に束縛しなければならない。
    - successor_provenance_digest は各 successor cell の provenance を predecessor slice set と allocation rule により再構成可能にしなければならない。
    - retired slice が存在する場合は retire reason / reopen eligibility / notice duty を省略してはならない。
  witness_binding_matrix:
    audit_witness_packet:
      primary_role: transition lawful continuity、partition completeness、forbidden cross-partition merge absence の一次証明
      must_bind:
      - lineage_slice_partition_witness_ref
      - predecessor_coverage_digest
      - successor_provenance_digest
      - continuity_class_ref
      - duty_surface_digest
      - archive_manifest_digest_ref
    central_delegation_charter:
      primary_role: authority path と allowed transition family、notice / correction / rollback の duty template を与える
      must_bind:
      - authority_path_ref
      - allowed_bundle_class_set
      - protected_facet_guard
      - notice_duty_template_ref
      - rollback_duty_template_ref
    bridge_token:
      primary_role: cross-scope / cross-epoch / export continuity で predecessor と successor の narrow equivalence を示す
      must_bind:
      - predecessor_successor_pair_digest
      - bridge_scope_ref
      - audience_class_ref
      - lawful_purpose_ref
      - expiry_or_freeze_ref
      limits:
      - bundle lawful authorization の代用禁止
      - notice completion の代用禁止
      - hard partition axis を跨ぐ merge admissibility の代用禁止
    archive_manifest:
      primary_role: bundle 実体、witness、notice evidence、reverse bundle を immutable に凍結し、rollback / reopen の recovery anchor にする
      must_bind:
      - transition_bundle_digest
      - audit_witness_packet_digest
      - bridge_token_digest_set_or_null
      - notice_evidence_digest_set_or_null
      - reverse_bundle_digest_set_or_null
  duty_split:
    transition_lawful_continuity: audit witness packet を主 witness とし、必要に応じて charter / bridge token / archive manifest を従 witness として束ねる。
    reveal_notice_correction: central delegation charter の duty template と notice_and_correction_plan を主にし、bridge token は recipient-facing continuity claim の narrow binder に限定する。
    rollback_reopen: archive manifest と reverse bundle linkage を主にし、forward bundle を erase せず reverse continuity を append する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - transition_bundle_id
      - bundle_class_ref
      - audit_witness_packet_ref
      - central_delegation_charter_ref_or_null
      - notice_and_correction_plan_ref_or_null
      - reverse_bundle_linkage_ref_or_null
      - duty state
    GraphEngine:
      owns:
      - predecessor_partition_vector_digest
      - successor_partition_vector_digest
      - lineage_slice_partition_witness generation
      - allocation vector resolution
      - bridge pairing materialization
    GraphLint:
      owns:
      - cross-partition merge lint
      - missing predecessor coverage lint
      - orphan successor provenance lint
      - bridge-token-overreach lint
      - notice/rollback duty mismatch lint
    archive_object:
      owns:
      - immutable bundle payload
      - audit witness packet snapshot
      - notice evidence package
      - reverse continuity chain
  forbidden_shortcuts:
  - predecessor/successor の cardinality だけで lawful continuity を判定する
  - bridge token だけで merge / split authorization を証明したことにする
  - notice completion を send success や token delivery だけで済ませる
  - partial rollback 時に forward bundle を上書き削除し reverse bundle を残さない
  - tenant / authority path / export bundle / lawful purpose / retention bucket / canonical scope / pseudonym epoch を跨ぐ merge を packet/charter なしで実行する
  residual_open_points: []
tenant_merge_split_lawful_continuity_governance:
  status: provisional_fixed
  statement: 'tenant_merge_split_lawful_continuity_governance とは、tenant merge / split によって tenant_id が変わるとき、

    stable pseudonym・bridge token chain・lineage slice・archive manifest・delegation charter chain の

    どれを continuity として保持でき、どこで cut / rebind / fork しなければならないかを拘束する規則である。

    '
  core_claims:
  - tenant_id が変わる merge / split では、source stable pseudonym の文字列的継続を許さず、continuity は accountability lineage と lawful handover によってのみ主張する。
  - same authority family・same jurisdiction family・accountability preserved・reflected central transition charter・一意な predecessor/successor mapping が同時に満たされる 1→1 recontainer だけが linear rebind を許す。
  - n→1 merge と 1→n split は linear bridge chain では表現せず、predecessor_set / successor_set / allocation witness を持つ transition bundle でだけ lawful continuity を主張する。
  - predecessor の archive manifest は immutable であり、merge 後の単一 manifest へ retroactive に吸収してはならない。successor tenant は新しい manifest root を持つ。
  - domain_delegation charter は same-tenant・same-jurisdiction・bounded reveal の内部委任に限るため、tenant merge / split の continuity charter としては使えず、central transition charter を要する。
  transition_axes:
    topology_change:
      recontainer_1_to_1:
        statement: tenant container だけが 1→1 で置換される。
      merge_n_to_1:
        statement: 複数 predecessor tenant が 1つの successor tenant へ統合される。
      split_1_to_n:
        statement: 1つの predecessor tenant が複数 successor tenant へ分割される。
    accountability_relation:
      preserved:
        statement: accountability_domain が保たれ、結果責任の帰属先が変わらない。
      reallocated:
        statement: accountability_domain が別主体へ再配賦される。
      ambiguous:
        statement: cutover 時点で successor ごとの責任帰属が一意に定まらない。
    authority_relation:
      same_authority_family:
        statement: authority family が不変である。
      cross_authority_family:
        statement: authority family が変わる。
    jurisdiction_relation:
      same_jurisdiction_family:
        statement: jurisdiction family が不変である。
      cross_jurisdiction_family:
        statement: jurisdiction family が変わる。
  keep_cut_rebind_rules:
    stable_pseudonym:
      literal_keep:
        statement: tenant_id が変わる場合は常に禁止する。
      linear_rebind:
        statement: recontainer_1_to_1 で、accountability_relation=preserved、authority_relation=same_authority_family、jurisdiction_relation=same_jurisdiction_family、かつ reflected central transition charter と effective bridge token がある場合に限り、successor stable pseudonym を新発行して lawful continuity を主張できる。
      bundle_rebind:
        statement: merge_n_to_1 または split_1_to_n では、各 successor stable pseudonym を新発行し、transition bundle で predecessor/successor 対応を束ねる。predecessor pseudonym を cutover 後の live alias に使わない。
      hard_cut:
        statement: accountability_relation が reallocated または ambiguous、authority_relation が cross_authority_family、jurisdiction_relation が cross_jurisdiction_family、または ratified だが未 reflected の transition charter しかない場合は literal continuity も linear rebind も認めない。
    bridge_token_chain:
      linear_extension:
        statement: 1→1 recontainer で unique predecessor/successor mapping があり、bridge token の predecessor/successor commitment・lawful purpose・authorization basis・revocation state が健全な場合だけ許す。
      event_rooted_bundle:
        statement: n→1 merge と 1→n split では、single chain の継続ではなく、transition_event_digest・predecessor_set・successor_set・allocation_witness を持つ bundle を mandatory とする。
      cut_conditions:
      - reflected central transition charter がない
      - predecessor/successor mapping が ambiguous
      - bridge token が superseded / revoked / quarantined である
      - lawful purpose または authorization basis が失効している
    lineage_slice:
      preserved_minimal:
        statement: accountability preserved の recontainer では、minimum accountable lineage だけを successor へ carry できる。
      partitioned:
        statement: split では successor ごとに partition witness で割り当てた lineage slice だけを持たせ、他 branch の broad lineage を carry してはならない。
      redacted_only:
        statement: cross-jurisdiction、protected facet、または recipient-visible export では redacted lineage slice または export-local pseudonym 経由でしか continuity を出してはならない。
      cut:
        statement: accountability reallocated / ambiguous で lawful allocation witness がない場合は lineage carry を禁止する。
    archive_manifest:
      predecessor_immutability:
        statement: predecessor manifest は immutable であり、merge 後 manifest に retroactive 連結して置き換えてはならない。
      successor_root:
        statement: successor tenant は新しい archive manifest root を持ち、必要なら predecessor manifest digest 群を handover bundle 経由で参照する。
      split_rule:
        statement: split では successor ごとに branch-local manifest を作り、allocated lineage slice / export bundle / reopen path を branch 別に分ける。
    charter_chain:
      no_automatic_inheritance:
        statement: predecessor charter は successor tenant に自動継承しない。
      central_transition_requirement:
        statement: tenant merge / split の continuity を主張するには、central_template または central_delegation に基づく reflected transition charter を mandatory とする。
      domain_delegation_limit:
        statement: domain_delegation は same-tenant internal operation に限り有効であり、cross-tenant / cross-jurisdiction transition charter の代替にしてはならない。
  lawful_transition_requirements:
  - transition event は predecessor_set / successor_set / effective_cutover_time / accountability_relation / authority_relation / jurisdiction_relation / lawful_purpose / ratification_event / reflection_event を持つ。
  - 1→1 recontainer では unique predecessor/successor mapping witness を mandatory とする。
  - n→1 merge / 1→n split では allocation_witness と branch coverage を mandatory とし、single bridge token 1本で全体を表したことにしてはならない。
  - recipient-visible continuity には export-local pseudonym または redacted lineage slice、bridge_token_proof_ref、archive_manifest_digest_ref、transition charter ref を同時に要する。
  - post-confirm 前の provisional transition bundle を final evidence / public explanation / irreversible commitment の basis にしてはならない。
  prohibited_shortcuts:
  - tenant_id が変わったのに source stable pseudonym を successor tenant の live alias として再利用する。
  - n→1 merge または 1→n split を single linear bridge token 1本で表したことにする。
  - predecessor manifest を書き換えて successor manifest に吸収したことにする。
  - predecessor の domain_delegation charter を successor tenant の transition charter だとみなす。
  - split 後に non-allocated broad lineage を各 successor へ複製して持ち出す。
  - reflected 前の ratified transition charter を final continuity basis として使う。
  residual_open_points:
  - same authority family だが cross-jurisdiction である場合の transition charter override をどこまで taxonomy 化するか
  - staged n→m transition を bundle-of-bundles continuity としてどこまで共通化するか
  - reflected 前の provisional transition bundle を bounded internal review にどこまで使えるか
merge_split_transition_bundle_canonical_schema_governance:
  status: provisional_fixed
  statement: 'merge_split_transition_bundle_canonical_schema_governance とは、tenant merge / split における lawful continuity を

    topology_kind・cardinality・mapping relation・allocation / partition witness・edge proof・bundle proof・archive handover manifest・export alias reissue

    の束として一意に記述し、single token summary や implicit inference による shortcut を禁止する規則である。

    '
  core_claims:
  - canonical schema は common core と topology-specific mandatory を分けるが、どの topology でも explicit topology_kind と explicit predecessor/successor count を持つ。
  - edge proof は predecessor/successor 局所関係を束縛し、bundle proof は edge 集合の coverage・bundle digest・manifest continuity を束縛する。両者を同一 proof ref に潰してはならない。
  - merge / split では allocation_witness と branch coverage を必須にし、1→1 recontainer では unique mapping witness を必須にする。
  - predecessor manifest は immutable のまま残し、successor manifest は新 root として別に作る。handover は archive handover manifest でだけ橋渡しする。
  - export-local pseudonym は successor branch × export bundle × recipient class 単位で新発行し、source stable pseudonym や他 branch alias の再利用を禁止する。
  - schema は topology・mapping・coverage・manifest linkage を保持し、TTL・recipient cap・non-reuse baseline・proof profile・revocation semantics は registry 側参照に残す。
  canonical_field_layers:
    common_core_fields:
    - schema_version_ref
    - transition_bundle_id
    - transition_event_ref
    - topology_kind
    - transition_mode
    - cutover_time
    - predecessor_scope_ref_set
    - successor_scope_ref_set
    - predecessor_count
    - successor_count
    - mapping_mode
    - transition_charter_ref
    - witness_packet_ref_or_null
    - bundle_digest_ref
    - bundle_proof_ref
    - archive_handover_manifest_ref
    - predecessor_manifest_digest_set
    - successor_manifest_digest_set
    - lawful_purpose_ref
    - continuity_status
    cardinality_and_mapping_fields:
    - edge_count
    - branch_coverage_rule_ref
    - unique_mapping_witness_ref_or_null
    - allocation_witness_ref_set_or_null
    - lineage_partition_witness_ref_set_or_null
    - uncovered_branch_disposition_ref_or_null
    - reflected_mapping_event_ref
    edge_fields:
    - edge_id
    - predecessor_scope_ref
    - successor_scope_ref
    - relation_kind
    - predecessor_lineage_slice_ref_or_null
    - successor_lineage_slice_ref_or_null
    - allocation_witness_ref_or_null
    - edge_bridge_token_ref
    - edge_proof_ref
    - token_handle_ref
    - proof_handle_ref
    export_alias_fields:
    - successor_branch_ref
    - export_bundle_ref_set_or_null
    - export_local_pseudonym_ref_set_or_null
    - recipient_class_ref_set_or_null
    - alias_policy_ref_or_null
    - alias_non_reuse_clause_ref_or_null
    - alias_revocation_handle_ref_set_or_null
  topology_mandatory_matrix:
    recontainer_1_to_1:
      cardinality_constraints:
      - predecessor_count=1
      - successor_count=1
      - edge_count=1
      mandatory_fields:
      - unique_mapping_witness_ref
      - edge_proof_ref
      - bundle_digest_ref
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      optional_fields:
      - allocation_witness_ref_or_null
      - lineage_partition_witness_ref_set_or_null
      continuity_cut_triggers:
      - unique_mapping_witness invalidated
      - mandatory edge の token_handle / proof_handle が active ではない
      - bundle_digest_ref と manifest linkage が一致しない
      - reflected transition_charter_ref が失効または未反映になる
    merge_n_to_1:
      cardinality_constraints:
      - predecessor_count>=2
      - successor_count=1
      - edge_count=predecessor_count
      mandatory_fields:
      - allocation_witness_ref_set
      - edge_proof_ref_set
      - bundle_proof_ref
      - branch_coverage_rule_ref=all_predecessors_covered
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      optional_fields:
      - lineage_partition_witness_ref_set_or_null
      continuity_cut_triggers:
      - predecessor_scope のいずれかが edge を持たない
      - allocation_witness が invalid / revoked / unreflected になる
      - mandatory edge の token_handle / proof_handle が active ではない
      - successor manifest root と bundle_digest_ref の整合が崩れる
    split_1_to_n:
      cardinality_constraints:
      - predecessor_count=1
      - successor_count>=2
      - edge_count=successor_count
      mandatory_fields:
      - allocation_witness_ref_set
      - lineage_partition_witness_ref_set
      - edge_proof_ref_set
      - bundle_proof_ref
      - branch_coverage_rule_ref=full_partition_or_explicit_hard_cut
      - predecessor_manifest_digest_set
      - successor_manifest_digest_set
      - archive_handover_manifest_ref
      optional_fields:
      - uncovered_branch_disposition_ref_or_null
      continuity_cut_triggers:
      - partition witness が overlap / gap を残す
      - successor branch のいずれかが mandatory edge proof を欠く
      - uncovered branch が hard_cut manifest なしで残る
      - export alias が branch 境界を越えて再利用される
  continuity_cut_conditions:
    bundle_level:
    - bundle_proof_ref が inactive / revoked / tombstoned である
    - bundle_digest_ref と edge_set / manifest_set / charter_ref の整合が壊れる
    - archive_handover_manifest_ref が欠落する
    - branch_coverage_rule_ref を満たさない
    edge_level:
    - edge_proof_ref が inactive / revoked / tombstoned である
    - parent token_handle_ref が active ではない
    - allocation_witness_ref_or_null または unique_mapping_witness_ref が invalidated される
    - predecessor_scope_ref / successor_scope_ref の relation_kind が reflected mapping event と整合しない
    export_alias_level:
    - export_local_pseudonym が successor branch / export bundle / recipient class のいずれかを越えて再利用される
    - alias parent proof_handle が inactive / revoked / quarantined になる
    - alias policy が bridge token registry の TTL / recipient cap / non-reuse baseline に反する
  schema_registry_split:
    schema_side:
    - topology_kind と explicit cardinality
    - mapping_mode と edge_set
    - allocation / unique mapping / lineage partition witness ref
    - bundle_digest_ref / bundle_proof_ref / archive_handover_manifest_ref
    - predecessor_manifest_digest_set / successor_manifest_digest_set
    - successor branch ごとの export alias binding
    registry_side:
    - suite_class / proof_profile / signer_authority_tier
    - token_handle / proof_handle の state machine と revocation semantics
    - export-local pseudonym の TTL baseline / recipient cap / non-reuse baseline
    - migration / downgrade barrier / supersession rule
  prohibited_shortcuts:
  - topology_kind を持たず、edge 数だけで merge / split を暗黙推定する。
  - merge / split を summary row 1件または single bridge token 1本で代表させる。
  - allocation_witness / lineage_partition_witness を省略し、bundle digest だけで coverage を主張する。
  - predecessor manifest を successor manifest に retroactive に吸収したことにする。
  - edge proof と bundle proof を同じ ref 1本に潰す。
  - export-local pseudonym を branch 非依存または recipient 非依存の reusable join key にする。
  - source stable pseudonym を successor export alias として再利用する。
  residual_open_points:
  - staged n→m transition を bundle-of-bundles でどう canonical 化するか
  - allocation_witness の numeric / set-valued / probabilistic family をどこまで canonical registry 化するか
  - bundle proof と edge proof の suite revision を同時移行するときの dual-validity window をどう設計するか
bridge_token_registry_governance:
  status: provisional_fixed
  statement: bridge_token_registry_governance とは、bridge token の signature suite・proof profile・revocation handle を raw algorithm 名の羅列ではなく lawful continuity の用途別 assurance class として registry 化し、internal continuity、transition bundle、external audit、recipient-visible continuity、emergency bypass の各文脈で必要最小の cryptographic / governance binding を強制する規則である。
  core_claims:
  - signature suite は単独署名方式ではなく、seal / notarization / derived proof の三層構成、signer authority tier、key custody、recipient binding、downgrade barrier を束ねる registry cell として扱う。
  - proof profile は recipient class 一般ではなく use context ごとに固定し、同じ recipient でも transition bundle と emergency bypass では別 profile を要求しうる。
  - revocation handle は base token の lawful existence を管理する token_handle と、derived proof / export-local pseudonym / bundle edge proof の局所無効化を管理する proof_handle を分ける。
  - supersession は monotone strengthening または reveal narrowing の場合だけ許し、predecessor/successor commitment・lawful purpose・accountability lineage が変わる場合は新規 token 発行または tombstone を要求する。
  - tombstone は hard cut や key compromise 後の ambiguity のように continuity を不可逆に閉じる negative continuity record であり、単なる expiry や superseded と同一視しない。
  signature_suite_registry:
    statement: canonical registry は suite_id ごとに cryptographic layer と governance constraint を一体で束縛し、tool は suite_id を参照して適法性を判断する。
    canonical_fields:
    - suite_id
    - suite_class
    - seal_class
    - notarization_class
    - derived_proof_class
    - signer_authority_tier
    - key_custody_class
    - recipient_binding_mode
    - reveal_cap_class
    - allowed_contexts
    - prohibited_contexts
    - downgrade_barrier
    - migration_policy_ref
    suite_classes:
      internal_attested_v1:
        statement: same canonical scope 内の internal continuity verification 用。seal と append-only notarization を mandatory とし、derived proof は既定では optional とする。
        mandatory_layers:
        - hsm_scope_attested_seal
        - append_only_internal_notary
        allowed_contexts:
        - internal_continuity
        prohibited_contexts:
        - recipient_visible_continuity
      transition_anchor_v1:
        statement: linear rebind または transition bundle の authoritative continuity anchor 用。central もしくは同等 authority の seal/notarization と predecessor-successor commitment を mandatory とする。
        mandatory_layers:
        - hsm_central_attested_seal
        - append_only_transition_notary
        - bundle_edge_commitment_or_null
        required_bindings:
        - transition_charter_ref
        - predecessor_successor_commitment
        - allocation_or_unique_mapping_ref
        allowed_contexts:
        - internal_continuity
        - transition_bundle
        prohibited_contexts:
        - recipient_visible_continuity_without_derived_proof
      external_audit_v1:
        statement: external audit / external digest continuity 用。seal・notarization・auditor-bound derived proof をすべて mandatory とする。
        mandatory_layers:
        - hsm_central_attested_seal
        - append_only_external_audit_notary
        - auditor_bound_continuity_proof
        required_bindings:
        - transition_or_authorization_charter_ref
        - archive_manifest_digest_ref_or_null
        - duplicate_digest_ref_or_null
        allowed_contexts:
        - external_audit
        prohibited_contexts:
        - public_human_readable_export_without_export_alias
      recipient_export_v1:
        statement: recipient-visible continuity 用。recipient-bound export-local pseudonym と short TTL の derived proof を mandatory とする。
        mandatory_layers:
        - hsm_central_or_domain_attested_seal
        - append_only_export_notary
        - recipient_alias_continuity_proof
        required_bindings:
        - export_bundle_id
        - recipient_class
        - lawful_purpose_ref
        - retention_bucket
        allowed_contexts:
        - recipient_visible_continuity
        prohibited_contexts:
        - multi_recipient_reuse
        - reusable_join_key_usage
      emergency_bypass_v1:
        statement: emergency bypass 用。provisional status、bounded reveal、post-confirm due を含む derived proof を mandatory とする。
        mandatory_layers:
        - dual_control_or_exception_attested_seal
        - append_only_emergency_notary
        - provisional_bounded_reveal_proof
        required_bindings:
        - exception_lane_ref
        - post_confirm_due
        - post_confirm_owner
        - audience_cap=1_or_stricter
        allowed_contexts:
        - emergency_bypass
        prohibited_contexts:
        - final_evidence_before_post_confirm
        - public_explanation_before_post_confirm
    general_rules:
    - tool は raw algorithm 名だけを見て suite admissibility を判定してはならず、suite_class と context coverage を同時に確認する。
    - suite revision は downgrade barrier を持ち、lower assurance suite への silent fallback を禁止する。
    - algorithm agility は migration_policy_ref で扱い、suite_id を変えずに裏側実装だけ差し替えたことにしてはならない。
  proof_profile_matrix:
    internal_continuity:
      mandatory_suite_classes:
      - internal_attested_v1
      - transition_anchor_v1
      mandatory_proof_class: none_or_same_scope_attestation
      mandatory_bindings:
      - lawful_purpose_ref
      - authorization_basis_ref
      - issuance_notary_ref
      revocation_cut_events:
      - token_handle_revoked
      - lawful_purpose_lost
    transition_bundle:
      mandatory_suite_classes:
      - transition_anchor_v1
      mandatory_proof_class: bundle_edge_commitment
      mandatory_bindings:
      - transition_charter_ref
      - predecessor_successor_mapping_ref_or_bundle_digest
      - allocation_witness_ref_or_unique_mapping_ref
      - archive_handover_manifest_ref
      revocation_cut_events:
      - transition_charter_revoked
      - allocation_witness_invalidated
      - hard_cut_declared
    external_audit:
      mandatory_suite_classes:
      - external_audit_v1
      mandatory_proof_class: auditor_bound_continuity_proof
      mandatory_bindings:
      - charter_ref
      - archive_manifest_digest_ref_or_null
      - duplicate_digest_ref_or_null
      - recipient_class=external_auditor
      revocation_cut_events:
      - audit_authority_retracted
      - token_handle_quarantined
      - manifest_lineage_broken
    recipient_visible_continuity:
      mandatory_suite_classes:
      - recipient_export_v1
      mandatory_proof_class: recipient_alias_continuity_proof
      mandatory_bindings:
      - export_local_pseudonym_ref
      - export_bundle_id
      - recipient_class
      - effective_ttl
      - non_reuse_clause
      revocation_cut_events:
      - recipient_scope_violation
      - bundle_deviation
      - post_confirm_failure
      - reopen_closed
    emergency_bypass:
      mandatory_suite_classes:
      - emergency_bypass_v1
      mandatory_proof_class: provisional_bounded_reveal_proof
      mandatory_bindings:
      - exception_lane_ref
      - post_confirm_due
      - post_confirm_owner
      - audience_cap
      - provisional_marker
      revocation_cut_events:
      - exception_lane_closed
      - post_confirm_timeout
      - clear_identity_scope_excess
      - authority_denial
  revocation_handle_governance:
    handle_classes:
      token_handle:
        statement: base token の issuance・seal・notary・supersession・tombstone を追跡する正本 handle。bridge token 自体の lawful existence を管理する。
      proof_handle:
        statement: derived proof、export-local pseudonym、bundle edge proof の局所有効性を追跡する従属 handle。recipient / bundle / purpose ごとの revoke を表現する。
    lifecycle_states:
      active: 現在の文脈で continuity witness として使用可能。
      superseded: より強いまたはより狭い successor handle が発行されたため、新規用途には使えないが lineage 参照は残る。
      revoked: lawful basis または cryptographic basis が失効し、当該 handle を continuity witness として使えない。
      quarantined: compromise / anomaly / unresolved dispute のため外部利用と authoritative confirm を一時停止した状態。
      expired: validity window または TTL を超過し、自動的に失効した状態。
      tombstoned: hard cut または irrecoverable ambiguity により continuity chain を不可逆に閉じた状態。
    revocation_reasons:
    - key_compromise_or_signature_suite_failure
    - lawful_purpose_or_authorization_loss
    - recipient_scope_or_reveal_cap_violation
    - transition_bundle_mapping_invalidated
    - transition_charter_or_authority_retracted
    - archive_manifest_or_reopen_link_break
    - hard_cut_transition
    propagation_rules:
    - token_handle が revoked または tombstoned になったときは、従属する proof_handle をすべて invalid にする。
    - proof_handle の recipient misuse は、base token の lawful basis が保たれている限り proof_handle 局所 revoke として閉じられる。
    - token_handle が superseded された後は old handle から新しい proof_handle を発行してはならない。
    - quarantined state は internal forensic review を除き external continuity claim と transition bundle confirm を停止する。
  supersession_and_tombstone_rules:
    supersession_allowed_when:
    - derived proof が recipient class または reveal cap を狭めるだけである
    - TTL が短縮されるだけである
    - suite class が強化されるが predecessor/successor commitment・lawful purpose・accountability lineage・charter linkage は不変である
    - transition bundle に追加 corroboration ref を足すだけで branch allocation 自体は変わらない
    supersession_forbidden_when:
    - predecessor/successor commitment が変わる
    - lawful purpose が変わる
    - accountability lineage が変わる
    - linear rebind と event-bundle rebind の mode を入れ替える
    - tenant hard cut または allocation rewrite が必要である
    tombstone_mandatory_when:
    - hard_cut transition が ratified かつ reflected された
    - key compromise または seal ambiguity により trustworthy continuity が回復不能になった
    - branch-critical token を支える central transition charter が revoke された
    - archive handover manifest または allocation witness が invalidated され、same-frame lawful repair が存在しない
    - derived proof または export-local pseudonym の unlawful cross-recipient reuse が起き、narrow reissue で回復できない
    non_implications:
    - superseded は不正発行を意味しない。
    - expired は tombstone の代用ではない。
    - proof_handle revoke だけでは base token の lineage を自動否定しない。
  connection_policy:
    with_stable_pseudonym_continuity:
    - recipient_visible_continuity では export-local pseudonym と proof_handle を同時に要求し、source stable pseudonym を recipient-visible field に出さない。
    - same canonical scope 内の internal continuity では derived proof を optional にできるが、suite downgrade は認めない。
    with_tenant_merge_split:
    - linear rebind では transition_anchor_v1 以上を要求し、event-bundle rebind では edge または bundle digest ごとの proof_handle を mandatory にする。
    - single bridge token 1本で n→1 merge または 1→n split 全体 continuity を代表させない。
    with_audit_witness_packet:
    - external_audit_v1 と emergency_bypass_v1 は packet 上の required witness と矛盾してはならず、packet digest 単体を suite validity の代わりに使わない。
    with_duplicate_discard_digest_and_archive:
    - external continuity に duplicate_discard_digest または archive manifest digest を使うときは、対応する proof_handle と token_handle の live state を同時に確認する。
  prohibited_shortcuts:
  - 署名が通ることだけを理由に suite admissibility を満たしたとみなす。
  - proof profile を recipient class から暗黙推定し、明示 profile_ref を省略する。
  - base token と derived proof の revoke を単一フラグに潰して局所 revoke を表現しない。
  - superseded token を recipient-visible export や branch-critical continuity の current witness として再利用する。
  - tombstone を出さずに hard cut を単なる expiry や revoke として隠す。
  residual_open_points:
  - post-quantum migration を含む suite revision の dual-validity window と anti-downgrade 監査をどこまで registry 化するか
  - transition bundle の predecessor/successor cardinality と export-local pseudonym 再発行規則をどこまで schema 側へ寄せるか
central_delegation_charter_taxonomy_governance:
  status: provisional_fixed
  statement: central_delegation_charter_taxonomy_governance とは、central delegation charter に含める jurisdiction family・authority family・override / escalation family・non-delegable boundary を canonical taxonomy として固定し、local / central / emergency / external-audit の各 context で、どの authority が lawful に current decision を拘束できるかを比較可能にする規則である。
  canonical_taxonomy:
    jurisdiction_family:
      same_tenant_same_jurisdiction:
        statement: 同一 tenant・同一 jurisdiction family の内部運用。domain-local charter が既定であり、central lane は例外または protected facet 用に限定される。
      same_tenant_cross_jurisdiction:
        statement: 同一 tenant 内だが jurisdiction family をまたぐ運用。domain authority だけでは閉じず、central template または central delegation を既定にする。
      cross_tenant_same_jurisdiction:
        statement: jurisdiction family は同一だが tenant をまたぐ運用。domain-local convenience を current basis にせず、shared charter と bridge / archive continuity を要求する。
      cross_tenant_cross_jurisdiction:
        statement: tenant と jurisdiction family の両方をまたぐ運用。central lane と external-audit readiness を既定にし、domain delegation の自動継承を禁止する。
      sovereign_or_external_audit_overlay:
        statement: regulator・court・external audit など、通常の tenant / domain 境界を上書きする監査・制度 overlay。local current より lawful disclosure 条件を優先する。
    authority_family:
      domain_execution_authority:
        statement: domain-local operation を execute / hold できる一次 authority。
      domain_review_authority:
        statement: domain-local review / approval を行う二次 authority。single-domain bounded decision に限って final approver になりうる。
      domain_protected_facet_authority:
        statement: protected facet の domain interpretation を担う authority。cross-boundary final interpretation の sole owner にはならない。
      central_policy_authority:
        statement: cross-tenant・cross-jurisdiction・external disclosure・global default charter を束ねる central authority。
      central_exception_authority:
        statement: exception lane・non-delegable escalation・post-confirm disposition を束ねる central authority。
      emergency_containment_authority:
        statement: life-safety / active compromise で provisional containment を許す authority。steady-state current の常設代替にはしない。
    override_escalation_family:
      monotone_scope_narrowing_override:
        statement: reveal scope / action family / recipient class を厳しくする override。domain lane でも許容しうる。
      centralization_override:
        statement: domain lane から central lane へ authority を引き上げる override。cross-boundary または protected facet で使う。
      emergency_containment_override:
        statement: immediate containment のため一時的に emergency lane を開く override。post-confirm を必須とする。
      external_audit_supervised_override:
        statement: external audit response のため supervised reveal / challenge を開く override。external auditor を authority 化しない。
      non_delegable_escalation:
        statement: delegation 不能な action family を central_exception_authority へ送る escalation。
  context_matrix:
    local_context:
      mandatory_authority_family:
      - domain_execution_authority
      conditional_authority_family:
      - domain_review_authority
      - domain_protected_facet_authority
      forbidden_authority_family:
      - emergency_containment_authority as steady-state final approver
      - external auditor or observer credential holder as authority family
      mandatory_bindings:
      - single_domain または bounded internal purpose
      - approved local approval route
      - charter scope が same_tenant_same_jurisdiction を覆うこと
    central_context:
      mandatory_authority_family:
      - central_policy_authority
      conditional_authority_family:
      - domain_execution_authority as evidence supplier
      - domain_protected_facet_authority as scoped interpreter
      forbidden_authority_family:
      - external auditor as final approver
      - emergency_containment_authority as normal policy owner
      mandatory_bindings:
      - central template または central delegation charter
      - cross-boundary lawful purpose
      - required attestation packet and challenge path
    emergency_context:
      mandatory_authority_family:
      - emergency_containment_authority
      conditional_authority_family:
      - central_exception_authority for post-confirm or protected facet cases
      - central_policy_authority for continuity-affecting action
      forbidden_authority_family:
      - domain_review_authority as sole finalizer after bypass
      - external auditor as bypass approver
      mandatory_bindings:
      - life-safety or active compromise trigger
      - append-only precommit
      - post-confirm owner / SLA
      - bounded reveal scope
    external_audit_context:
      mandatory_authority_family:
      - central_policy_authority
      conditional_authority_family:
      - domain_review_authority as supervised explainer
      - central_exception_authority for protected facet or exception lane
      forbidden_authority_family:
      - external auditor as charter issuer
      - emergency_containment_authority as routine disclosure owner
      mandatory_bindings:
      - external audit lawful purpose
      - attestation packet
      - observer credential
      - supervised approval route
      - archive / bridge / duplicate digest continuity as needed
  non_delegable_boundaries:
  - protected facet の final interpretation を domain lane だけで final commit してはならない
  - cross-tenant または cross-jurisdiction で bounded_actor_slice を超える reveal は central lane without explicit charter を禁止する
  - central / emergency / external-audit charter の issuance・ratification・revocation を domain delegation へ落としてはならない
  - bridge token の external continuity revoke / reissue と archive manifest continuity basis の final approval を local reviewer へ委譲してはならない
  - emergency bypass 後の public explanation・penalty finalization・irreversible resource lock は post-confirm 前に delegated auto へ送ってはならない
  charter_registry_schema:
    required_fields:
    - charter_id
    - charter_kind
    - tenant_relation_scope
    - jurisdiction_family_scope
    - authority_family_scope
    - override_family_set
    - escalation_family_set
    - non_delegable_action_family_set
    - allowed_context_set
    - allowed_approval_route_family_set
    - lawful_purpose_family_set
    - required_attestation_profile_set
    - required_observer_profile_set
    - post_confirm_policy_ref_or_null
    - bridge_token_policy_ref_or_null
    - archive_linkage_policy_ref_or_null
    - effective_window
    - issuer_ref
  responsibility_split:
    DecisionLedger:
    - charter taxonomy cell、chosen authority family、approval route family、lawful purpose family、non-delegable escalation result を正本記録する
    - local / central / emergency / external-audit のどの context matrix を適用したかを記録する
    GraphEngine:
    - jurisdiction family・authority family・override family の match 判定、context binding 判定、non-delegable boundary 判定を行う
    - conditional authority family が evidence supplier なのか final approver なのかを role-aware に評価する
    GraphLint:
    - external auditor の authority 化、emergency lane の常態化、charter context 不一致、non-delegable boundary の silent delegation、approval route omission を禁止する
  prohibited_shortcuts:
  - external auditor や observer credential holder を authority family へ数え上げる
  - emergency lane を steady-state current delegation の常設 route として使う
  - same_tenant_same_jurisdiction の charter を cross-tenant / cross-jurisdiction current の basis に流用する
  - non-delegable boundary に触れる action を domain_review_authority の承認だけで finalize する
  - approval route family や lawful purpose family を空のまま authority family だけで charter を妥当とみなす
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで registry 化するか
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
audit_witness_profile_registry_governance:
  status: provisional_fixed
  statement: vendor-neutral な監査 witness profile registry とは、audit witness packet に入る attestation と observer credential を、製品名や raw algorithm 名ではなく、役割意味・独立性・custody 境界・challenge 性・authority binding・migration barrier で管理する規則である。
  core_claims:
  - vendor-neutral とは payload 文字列を共通化することではなく、どの意味論的 class がどの監査文脈で何を保証するかを共通化することである。
  - packet schema は instance ref と binding ref を持ち、registry は class 定義・verification rule・freshness floor・downgrade barrier を持つ。両者を混同してはならない。
  - external protected audit / emergency bypass / post-confirm review の lawful 性は、単一 attestation ではなく、attestation class と observer credential class の組で判定する。
  - migration は alias-preserving translation または monotone strengthening に限り、dual-validity window は silent downgrade の免責にならない。
  attestation_class_registry:
    canonical_dimensions:
    - attestation_class_ref
    - attested_subject_kind
    - issuer_independence_floor
    - custody_boundary_floor
    - verification_method_class
    - freshness_floor
    - replay_binding_requirement
    - authority_binding_requirement
    - downgrade_barrier_set
    classes:
      session_precommit:
        statement: append-only precommit により、session basis・scope・lawful purpose・audience binding が reveal 前に固定されていたことを示す基底 attestation。
        typical_use:
        - internal supervised session
        - external protected audit
        - emergency bypass
      custody_boundary:
        statement: HSM などの custody-bound 実行面で reveal / reseal / revoke が許可境界の内側で行われたことを示す attestation。
        typical_use:
        - protected external audit
        - emergency bypass
        - protected post-confirm handling
      observer_challenge:
        statement: observer credential と session challenge を結び、実際に human-supervised observation が行われたことを示す attestation。
        typical_use:
        - emergency bypass
        - clear identity / direct contact route を含む protected audit
      authority_outcome:
        statement: authority post-confirm、continued hold / revoke / reseal / archive promotion judgement を束ねる outcome attestation。
        typical_use:
        - post-confirm review
        - emergency bypass closure
  observer_credential_class_registry:
    canonical_dimensions:
    - observer_credential_class_ref
    - issuer_kind
    - independence_floor
    - contact_route_mode
    - reveal_scope_cap
    - challenge_requirement
    - post_confirm_duty_flag
    - reuse_prohibition_scope
    classes:
      supervised_session_observer:
        statement: same-tenant / same-jurisdiction の supervised internal session を観測する bounded observer credential。
      protected_audit_observer:
        statement: protected external audit で session challenge と protected handling を観測する独立 observer credential。
      emergency_containment_observer:
        statement: life-safety / active compromise の provisional bypass を観測し、post-confirm duty へ接続される緊急 observer credential。
      post_confirm_reviewer:
        statement: authority-bound な post-confirm review / reseal / revoke judgement を担う reviewer credential。external auditor や delegated reviewer の代用ではない。
  evidence_binding_fields:
    packet_schema_side:
    - attestation_class_ref
    - observer_credential_class_ref_or_null
    - attestation_profile_ref
    - observer_profile_ref_or_null
    - registry_epoch_ref
    - session_basis_ref
    - scope_packet_digest_ref
    - reveal_scope_ref
    - audience_binding_ref
    - lawful_purpose_ref
    - charter_ref
    - authority_decision_ref_or_null
    - append_only_precommit_ref
    - hsm_attestation_ref_or_null
    - observer_challenge_ref_or_null
    - packet_digest
    - bridge_token_proof_ref_or_null
    - archive_manifest_digest_ref_or_null
    - validity_window_ref
    - revocation_handle_ref_or_null
    - supersession_ref_or_null
    registry_side:
    - issuer_kind
    - verification_method_class
    - freshness_floor
    - independence_floor
    - custody_boundary_floor
    - replay_binding_requirement
    - authority_binding_requirement
    - challenge_requirement
    - migration_alias_set
    - downgrade_barrier_set
    - forbidden_context_set
  context_profile_matrix:
    internal_supervised_session:
      mandatory_attestation:
      - session_precommit
      conditional_mandatory_attestation:
      - custody_boundary if protected_facet=true or cross-system replay is intended
      optional_observer_credential:
      - supervised_session_observer
      forbidden_attestation:
      - authority_outcome
      forbidden_observer_credential:
      - emergency_containment_observer
    external_protected_audit:
      mandatory_attestation:
      - session_precommit
      - custody_boundary
      conditional_mandatory_attestation:
      - observer_challenge if clear_identity=true or direct_contact_route=true
      mandatory_observer_credential:
      - protected_audit_observer
      forbidden_observer_credential:
      - emergency_containment_observer as current basis
    emergency_bypass:
      mandatory_attestation:
      - session_precommit
      - custody_boundary
      - observer_challenge
      mandatory_observer_credential:
      - emergency_containment_observer
      optional_attestation:
      - authority_outcome only after closure packet generation
      forbidden_attestation:
      - authority_outcome as pre-confirm current basis
    post_confirm_review:
      mandatory_attestation:
      - authority_outcome
      conditional_mandatory_attestation:
      - custody_boundary if reseal / revoke / protected archive promotion occurs
      mandatory_observer_credential:
      - post_confirm_reviewer
      forbidden_observer_credential:
      - emergency_containment_observer as sole final reviewer
  schema_registry_boundary:
  - packet schema には class/profile の参照と session-specific binding を残し、vendor proof blob 全体を canonical field set に埋め込まない。
  - registry は issuer / verifier / freshness / independence / migration barrier を持ち、packet ごとの outcome や session nonce は持たない。
  - packet validity は class semantics を参照して判定し、vendor payload の parse 成功だけで admissible とみなしてはならない。
  migration_and_downgrade_policy:
  - migration alias は semantic equivalence が ratified され、旧 profile が要求した independence / custody / freshness / replay_binding / authority_binding を新 profile がすべて下回らない場合にだけ許す。
  - monotone strengthening は stricter verifier、narrower reveal scope、stronger freshness、追加 challenge binding の方向に限る。
  - dual-validity window 中でも same packet の current witness として旧新 profile を無記名混在させてはならない。
  - external_protected_audit と emergency_bypass では、session_precommit only への downgrade、observer_challenge の脱落、post_confirm duty の脱落を forbidden downgrade とする。
  prohibited_shortcuts:
  - HSM product 名や cloud vendor 名を attestation class の canonical key にする。
  - delegated reviewer / external auditor / named recipient を authority tier または witness independence の代用にする。
  - observer credential を持たない emergency bypass packet を lawful current witness とみなす。
  - migration alias を記録せずに旧 profile と新 profile を同値だとみなす。
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  - jurisdiction family / authority family の finer taxonomy を central delegation charter registry にどこまで落とすか
  - bridge token suite revision と attestation profile migration の cross-registry downgrade barrier をどう厳密化するか
bridge_token_suite_revision_governance:
  status: provisional_fixed
  statement: bridge_token_suite_revision_governance とは、bridge token の suite 更新を単なる実装差替えではなく predecessor suite と successor suite の関係、dual-validity window、context 別 anti-downgrade barrier、migration witness、handle cut 条件を持つ canonical registry として管理し、旧 suite の歴史的検証と新 suite の現行発行を混同させないための統治規則である。
  core_claims:
  - suite revision は predecessor/successor・適用文脈・有効期間・migration witness を持つ独立 object であり、suite_id を据え置いたまま backend 実装だけ差し替えたことにしてはならない。
  - dual-validity window は coexistence 期間であって equivalence 期間ではなく、historical verification、bounded parallel issuance、successor-only issuance を文脈ごとに分けて明示する。
  - anti-downgrade は bridge token suite 単体ではなく、必要な attestation / observer profile と組み合わせた effective assurance vector で判定する。
  - token_handle cut は base token の lawful existence / lineage continuity の切断、proof_handle cut は context / recipient / export bundle ごとの局所無効化として分ける。
  suite_revision_registry:
    statement: canonical registry は revision_id 単位で旧 suite と新 suite の lawful migration 条件を固定する。
    canonical_fields:
    - revision_id
    - predecessor_suite_id
    - successor_suite_id
    - migration_kind
    - covered_contexts
    - dual_validity_mode
    - activation_time
    - cutoff_time_or_null
    - legacy_issue_policy
    - successor_issue_policy
    - anti_downgrade_barrier_vector
    - required_witness_profile_map
    - migration_witness_requirements
    - token_handle_cut_policy
    - proof_handle_cut_policy
    - tombstone_trigger_set
    migration_kinds:
      alias_preserving_translation: cryptographic primitive や envelope が変わっても、用途・binding・authority・recipient reveal が等価であり、covered context の effective assurance vector を弱めない移行。
      monotone_strengthening: predecessor と同一 continuity claim を保ったまま、seal / notarization / proof binding / authority tier / key custody / reveal cap の少なくとも1軸を強める移行。
      hard_cut_reissue: predecessor suite の current issuance を停止し、新しい token_handle と必要なら new proof_handle を再発行しなければ lawful continuity を継続できない移行。
    dual_validity_modes:
      verify_legacy_only: 旧 suite は historical verification 専用で残し、新規 issuance には使えない。
      bounded_parallel_issue: 明示された covered context と issuance scope に限り、旧 suite と新 suite の並行 issuance を一時的に許す。
      successor_only: dual-validity window を持たず、activation と同時に successor suite へ切り替える。
    general_rules:
    - suite revision registry entry がない migration を lawful revision とみなしてはならない。
    - dual-validity window 中でも same continuity claim の current witness を旧 suite と新 suite の両方で無記名併用してはならない。
    - covered_contexts にない文脈で旧 suite issuance を継続してはならない。
    - migration witness を伴わない legacy proof の再包装を successor issuance と数えてはならない。
  context_specific_policy:
    internal_continuity:
      legacy_verification: 旧 suite の historical verification は dual-validity 終了後も archive scope で許す。
      legacy_issuance: verify_legacy_only または bounded_parallel_issue の明示時だけ許す。
      successor_requirement:
      - current scope で新しい continuity claim を出すなら successor suite を優先する。
      forbidden_downgrade:
      - transition_anchor_v1 から internal_attested_v1 への silent fallback
      - witness profile coverage を失ったまま same current basis を維持すること
    transition_bundle:
      legacy_verification: predecessor edge / bundle の historical verification に限り許す。
      legacy_issuance: cutover 後の新しい bundle_edge_commitment には使ってはならない。
      successor_requirement:
      - 新しい transition bundle、再計算した allocation_witness、再発行した bundle_proof には successor suite を mandatory とする。
      forbidden_downgrade:
      - transition_anchor_v1 相当の predecessor/successor commitment を失う revision
      - bundle proof だけ先に弱い suite へ移し、edge proof との assurance 整合を壊すこと
    external_audit:
      legacy_verification: closed audit packet の検証に限り許す。
      legacy_issuance: dual-validity 開始後の新しい auditor-bound proof には使ってはならない。
      successor_requirement:
      - current external audit packet と new archive digest continuity には successor suite と required audit witness profile を同時に満たすこと。
      forbidden_downgrade:
      - auditor_bound_continuity_proof の脱落
      - custody_boundary または protected_audit_observer coverage を失うこと
    recipient_visible_continuity:
      legacy_verification: 既存 export bundle の TTL 内照会に限り許す。
      legacy_issuance: recipient 向け再送・再発行・TTL 延長に旧 suite を使ってはならない。
      successor_requirement:
      - 新しい export_local_pseudonym、new recipient alias continuity proof、TTL 延長を伴う再発行には successor suite と新 proof_handle を mandatory とする。
      forbidden_downgrade:
      - recipient binding の弱化
      - reveal cap の拡大
      - non_reuse_clause を維持しない revision
    emergency_bypass:
      legacy_verification: post-confirm review 目的の forensic verification に限り許す。
      legacy_issuance: bounded_parallel_issue を原則禁止し、exception lane ごとの明示許可がない限り successor_only とする。
      successor_requirement:
      - emergency current use では successor suite、observer_challenge、emergency_containment_observer、post_confirm duty を同時に満たすこと。
      forbidden_downgrade:
      - provisional_bounded_reveal_proof の脱落
      - post_confirm_due / post_confirm_owner の脱落
      - audience_cap の拡大
  cross_registry_barrier_policy:
    barrier_dimensions:
    - seal_strength
    - notarization_strength
    - proof_binding_strength
    - signer_authority
    - key_custody
    - recipient_binding
    - reveal_cap
    - replay_binding
    - witness_independence
    - witness_custody
    - authority_binding
    rules:
    - effective assurance vector は bridge token suite と required attestation / observer profile の両方を満たして初めて成立し、current context に必要な binding が1つでも欠けた時点で不成立とみなす。
    - external_audit と emergency_bypass では replay_binding・witness_custody・authority_binding のいずれかが弱化した migration を forbidden downgrade とする。
    - recipient_visible_continuity では recipient_binding と reveal_cap のいずれかが緩む migration を forbidden downgrade とする。
    - transition_bundle では predecessor/successor commitment と allocation coverage を束ねる proof binding が弱化した migration を forbidden downgrade とする。
  handle_cut_policy:
    token_handle:
      reissue_required_when:
      - successor suite への migration が hard_cut_reissue である
      - signer_authority_tier または key_custody_class が変わる
      - predecessor/successor commitment の hash scope が変わる
      - lawful purpose / authorization basis / accountability lineage の binding method が変わる
      hard_cut_when:
      - key_compromise_or_signature_suite_failure
      - downgrade barrier violation
      - migration witness absent after cutoff_time
      - authority-directed retirement with no lawful legacy verification exception
    proof_handle:
      reissue_required_when:
      - successor suite が recipient_binding_mode または reveal_cap_class を変える
      - new export bundle / recipient class / audit packet / edge proof を発行する
      - dual-validity 中に successor proof を current witness として使う
      immediate_revoke_when:
      - parent token_handle が revoked / tombstoned / hard-cut になる
      - covered context outside registry scope で legacy proof が再利用された
      - migration witness absent のまま successor issuance と主張した
  prohibited_shortcuts:
  - suite_id を据え置いたまま algorithm / key custody / authority tier を差し替え、revision entry を作らない。
  - dual-validity window を「旧 suite も新 suite もどちらでも同じ」と読む。
  - historical verification 用 legacy proof を current issuance の代用にする。
  - bridge token suite の upgrade を理由に required attestation / observer profile の downgrade を見逃す。
  - token_handle の supersession だけ記録し、proof_handle の再発行や revoke を省略する。
  residual_open_points:
  - proof_handle の partial revocation を mirrored cache / replay export / downstream digest へどこまで伝播させるか
  - bundle-of-bundles における claim class ごとの lane split と super-bundle current claim の境界をどこまで canonical registry 化するか
proof_handle_partial_revocation_propagation_governance:
  status: provisional_fixed
  statement: proof_handle の partial revocation propagation は、base token の lawful existence を保ったまま proof 局所の admissibility だけを閉じるために、event 種別 × sink class × scope unit ごとの伝播アクションを固定する統治規則である。
  propagation_actions:
    cut: current use 集合から除外し、新規 export / alias / continuity claim への参照を禁止する。
    freeze: object と lineage 参照は保持するが、再発行・再包絡・外部 confirm・current claim への昇格を停止する。
    tombstone: 不連続を不可逆 marker として記録し、後続 sink が silent reuse できないようにする。
    verify_only: 過去時点の lawful verification または内部監査読取に限って参照を許し、current issuance には使わせない。
  scope_units:
    edge_proof: per_proof
    bundle_proof: per_bundle
    recipient_bound_proof: per_recipient_alias_bundle
    manifest_linkage_proof: per_manifest_continuity_claim
  sink_rules:
    mirrored_cache:
      revoke: cut
      supersede: freeze
      quarantine: freeze
      expire: verify_only
      scope_rule:
      - edge proof は当該 proof_handle を直接参照する cache entry 単位で処理する。
      - bundle proof は coverage claim を共有する cache slice 全体を freeze/cut し、独立 edge proof を自動 tombstone しない。
    replay_export:
      revoke: tombstone
      supersede: cut
      quarantine: freeze
      expire: verify_only
      scope_rule:
      - export bundle 単位で propagation し、同一 bundle に live successor proof があっても revoked proof を silent replacement しない。
      - recipient 済み artifact は削除ではなく tombstone/refusal marker で閉じる。
    downstream_digest:
      revoke: tombstone
      supersede: verify_only
      quarantine: freeze
      expire: verify_only
      scope_rule:
      - digest object 自体は immutable とし、digest を continuity claim として使う linkage cell を切る。
      - bundle proof revoke は bundle coverage digest claim を tombstone し、edge proof 由来の独立 claim は dependency がなければ残せる。
    recipient_visible_alias:
      revoke: cut
      supersede: cut
      quarantine: freeze
      expire: cut
      scope_rule:
      - propagation 単位は proof_handle × recipient alias × export bundle とする。
      - alias の再発行や TTL 延長は successor proof_handle なしに行わない。
    archive_manifest_continuity:
      revoke: verify_only
      supersede: verify_only
      quarantine: freeze
      expire: verify_only
      scope_rule:
      - archive manifest 本体は immutable であり rewrite / tombstone しない。
      - 伝播対象は manifest digest を current continuity claim に使う linkage record である。
  local_vs_global_cut_boundary:
    local_revoke_sufficient_when:
    - parent token_handle が active または superseded であり、base token の lawful existence と lineage continuity が維持されている
    - 問題が recipient_scope_or_reveal_cap_violation、export_bundle_binding_loss、proof_profile_mismatch、local anomaly containment のいずれかに閉じている
    - same frame で successor proof_handle または freeze/tombstone marker を発行できる
    token_hard_cut_required_when:
    - parent token_handle が revoked または tombstoned である
    - key compromise、suite failure、charter/authority retraction、allocation witness invalidation、archive linkage collapse により descendant proof 全体の信頼根拠が失われる
    - downstream continuity claim の切断が per-proof では吸収できず、base lineage 自体を止める必要がある
  responsibility_split:
    DecisionLedger:
    - revocation_event、reason_code、scope_unit、sink_action_map、successor_proof_handle_ref、review_window を正本記録する。
    GraphEngine:
    - sink dependency を展開して cut / freeze / tombstone / verify_only を materialize する。
    - bundle proof と edge proof の dependency 差分を評価し、過剰 cascade を防ぐ。
    GraphLint:
    - current claim が verify_only / frozen / tombstoned handle を参照していないかを検査する。
    - manifest rewrite、silent alias reuse、token hard cut を伴わない global continuity claim 継続を禁止する。
  prohibited_shortcuts:
  - mirrored cache の invalidate だけで downstream digest や recipient alias の current claim 停止を済ませたことにする。
  - archive manifest digest を immutable object だからという理由で live proof check なしに external continuity の current witness として使う。
  - bundle proof revoke を edge proof 全滅と同一視するか、逆に bundle coverage claim を生かしたままにする。
  - superseded proof を verify_only のまま recipient alias の TTL 延長や replay export 再包絡に使う。
  residual_open_points:
  - bundle proof / edge proof の suite revision が同時発生するとき、dual-validity window と propagation freeze をどう合成するか
  - staged n→m transition を bundle-of-bundles で表すとき、proof propagation の最小 bundle 単位をどこまで固定長にするか
simultaneous_suite_revision_dual_validity_governance:
  status: provisional_fixed
  statement: bundle proof / edge proof の simultaneous suite revision dual-validity governance は、同一 transition bundle 内で bundle proof と edge proof が異なる predecessor/successor suite を持つ場合に、dual-validity window を proof artifact 一括ではなく claim class ごとに統治し、bundle coverage claim と edge 局所 claim の current admissibility を切り分ける規則である。
  core_claims:
  - dual-validity window の共有単位は transition bundle 全体ではなく、bundle_lane / edge_cohort_lane / claim class policy の3層である。
  - bundle coverage claim の current 成立には successor bundle proof だけでは足りず、その claim class が要求する mandatory edge cohort の conformity が要る。
  - edge 局所 claim は、bundle claim が freeze または verify_only でも、当該 edge lane が live で bundle witness 非必須なら current を維持できる。
  - predecessor / successor の混在は named mixed-mode と coordination window を持つ場合にだけ許し、same current claim の無記名併用を禁止する。
  - proof_handle の freeze / tombstone / verify_only / cut は dual-validity window より優先され、window が開いていても blocked state を current へ昇格させない。
  granularity_model:
    proof_lanes:
      bundle_lane: bundle proof revision を管理する lane。bundle digest、bundle coverage claim、bundle-level archive continuity の current admissibility を束ねる。
      edge_cohort_lane: edge proof revision を管理する lane。単一 edge または registry で定義した mandatory edge cohort を束ねる。
    claim_classes:
      bundle_coverage_claim:
        shared_unit: bundle_lane + mandatory_edge_cohort_set
        current_rule:
        - successor bundle proof が live である
        - mandatory edge cohort が claim class policy に従って conform している
        - predecessor edge を historical verify 以外の current basis として無記名混在させない
      edge_local_claim:
        shared_unit: 当該 edge_cohort_lane
        current_rule:
        - edge proof が lane policy 上 live である
        - bundle witness が mandatory な claim class でない
      replay_or_digest_continuity_claim:
        shared_unit: dependency に応じて bundle_lane または edge_cohort_lane
        current_rule:
        - current continuity claim が依存する lane の blocked state を継承する
        - independent edge digest claim は bundle freeze を自動継承しない
      recipient_alias_or_ttl_extension_claim:
        shared_unit: recipient-bound successor proof lane
        current_rule:
        - predecessor proof の dual-validity では足りず、successor proof_handle を mandatory とする
      archive_manifest_current_linkage_claim:
        shared_unit: bundle_lane + manifest linkage lane
        current_rule:
        - manifest object の immutable 性と current linkage の admissibility を分け、bundle coverage current 不成立時は verify_only または freeze に落とす
  conflict_resolution:
    precedence_order:
    - tombstone_or_cut_on_mandatory_witness
    - freeze_on_mandatory_witness
    - verify_only_on_mandatory_witness
    - mixed_mode_without_named_window
    - live_successor_or_permitted_legacy
    rules:
    - mandatory witness に tombstone または cut があれば、対象 claim は current 不可とし、必要に応じて tombstone または cut へ落とす。
    - mandatory witness に freeze があれば、対象 claim は freeze とし、successor issuance 完了まで current へ戻さない。
    - mandatory witness が verify_only だけなら historical / forensic use には残せるが、current claim には使わない。
    - bundle coverage claim と edge 局所 claim が衝突したときは artifact 種別ではなく claim class 依存関係で裁定し、edge local に bundle witness が不要なら edge current を残せる。
  registry_fields:
  - simultaneous_revision_id
  - bundle_revision_cell_ref
  - edge_cohort_revision_cell_set
  - claim_class_window_policy_map
  - mandatory_edge_cohort_rule
  - coordination_window_start
  - coordination_window_end_or_null
  - mixed_mode_admissibility_rule
  - propagation_overlay_rule
  - conflict_resolution_order
  responsibility_split:
    DecisionLedger:
    - simultaneous revision の claim class policy、mandatory edge cohort、coordination window、mixed-mode decision、freeze reason を正本記録する。
    GraphEngine:
    - bundle_lane / edge_cohort_lane / claim class dependency を展開し、current / freeze / verify_only / tombstone を materialize する。
    - bundle coverage claim と independent edge claim を分離評価し、過剰 cascade と silent current mix を防ぐ。
    GraphLint:
    - same current claim に predecessor / successor witness が無記名混在していないかを検査する。
    - bundle current を edge cohort non-conform のまま通す shortcut、frozen witness の current reuse、recipient alias の predecessor TTL extension を禁止する。
  prohibited_shortcuts:
  - transition bundle 全体に単一 dual-validity window を被せ、claim class 差分を潰す。
  - successor bundle proof が出たことだけを理由に、mandatory edge cohort の current conform を満たしたとみなす。
  - predecessor / successor witness を same current claim の添付資料として無記名併記し、mixed-mode decision を省略する。
  - freeze / tombstone / verify_only の handle を dual-validity 期間中という理由で current continuity claim に使う。
  - recipient alias 再発行、TTL 延長、replay export 再包絡を predecessor lane のまま継続する。
  residual_open_points:
  - bundle-of-bundles を super_bundle / sub_bundle の2層に固定するか、recursive nesting をどこまで許すか
  - allocation_witness の numeric / set-valued / probabilistic family をどこまで canonical registry 化するか
staged_bundle_of_bundles_canonical_schema_governance:
  status: provisional_fixed
  statement: staged n→m transition の bundle-of-bundles canonical schema governance は、flat な single canonical bundle では表せない段階的遷移を、global continuity を束ねる super_bundle、stage-bound な sub_bundle、stage 境界の lawful handoff を固定する handoff_manifest の三者で表し、super-bundle coverage claim と sub-bundle local claim の current admissibility を分離する統治規則である。
  adoption_boundary:
    single_bundle_sufficient_when:
    - one-shot cutover であり、単一の coordination window、topology/mapping unit、mandatory edge cohort regime、archive handover manifest で current continuity を表せる
    - intermediate stage を lawful current artifact として保持する必要がない
    bundle_of_bundles_required_when:
    - staged n→m transition で intermediate scope / tenant / branch / stage ごとに local bundle proof または local handoff manifest が必要である
    - mandatory edge cohort、allocation_witness、archive linkage、recipient export policy のいずれかが stage ごとに切り替わる
    - replay export / recipient alias / downstream digest を stage boundary で explicit に止める必要がある
  canonical_layers:
    super_bundle:
      role: global predecessor/successor scope と stage DAG、global charter、super-bundle coverage claim を束ねる上位単位。
      minimal_fields:
      - super_bundle_id
      - transition_program_ref
      - global_predecessor_scope_set
      - global_successor_scope_set
      - stage_node_set
      - stage_edge_set
      - stage_dependency_policy_ref
      - global_transition_charter_ref
      - super_bundle_coverage_rule_ref
      - global_lineage_digest_ref_or_null
      - final_archive_chain_ref_or_null
    sub_bundle:
      role: 単一 stage 内の local topology/mapping、mandatory edge cohort、local allocation_witness、local bundle proof/digest を束ねる単位。
      minimal_fields:
      - sub_bundle_id
      - parent_super_bundle_ref
      - stage_ref
      - local_topology_kind
      - local_mapping_mode
      - local_predecessor_scope_set
      - local_successor_scope_set
      - local_bundle_proof_ref
      - local_bundle_digest_ref
      - mandatory_edge_cohort_ref_set
      - local_allocation_witness_ref_set
      - entry_handoff_manifest_ref_or_null
      - exit_handoff_manifest_ref_or_null
    handoff_manifest:
      role: predecessor stage の lawful close と successor stage の lawful open の間に必要な handoff 条件、digest、authority、scope cut を固定する境界単位。
      minimal_fields:
      - handoff_manifest_id
      - source_sub_bundle_ref
      - target_sub_bundle_ref
      - stage_boundary_kind
      - handoff_charter_ref
      - input_manifest_digest_set
      - output_manifest_digest_set_or_null
      - handoff_condition_set
      - handoff_current_rule_ref
      - rollback_reopen_policy_ref_or_null
  claim_layer_rules:
    super_bundle_coverage_claim:
      current_when:
      - required sub_bundle claim がすべて current admissible である
      - required handoff_manifest current がすべて満たされる
      - global charter / lineage digest / mandatory global witness が live である
      non_implications:
      - completed sub_bundle が存在することだけでは super-bundle current を意味しない
      - 未依存の sub_bundle local claim を自動的に freeze / tombstone へ巻き込まない
    sub_bundle_local_claim:
      current_when:
      - 当該 stage の local bundle proof、mandatory edge cohort、local allocation_witness が current admissible である
      - entry handoff が mandatory な stage では、その handoff_manifest が current admissible である
      separation_rule:
      - 後続 stage の未開始・freeze・verify_only は dependency がない限り completed local claim を自動無効化しない
    handoff_manifest_current:
      current_when:
      - source sub_bundle の required close condition と target sub_bundle の required open condition が両方満たされる
      - handoff_charter と stage boundary digest が一致する
      non_implications:
      - handoff_manifest object の存在だけでは stage continuity を意味しない
  inheritance_rules:
    archive_manifest_continuity:
    - archive manifest object は stage ごとに immutable とし、rewrite / reissue しない
    - super_bundle は stage archive manifest object を直接 current continuity claim にせず、lineage digest / linkage rule を介して使う
    recipient_alias_replay_export_downstream_digest:
    - recipient alias、replay export、downstream digest は既定で sub_bundle または export bundle 局所である
    - stage boundary を越える current use には explicit successor proof と linkage rule が必要であり、自動継承を許さない
    dual_validity_and_propagation:
    - simultaneous suite revision や proof_handle propagation はまず sub_bundle / handoff_manifest に投影し、その blocked state を dependency に従って super_bundle claim へ昇格させる
    - 非依存 stage の blocked state を global current 不可へ過剰 cascade させない
  responsibility_split:
    DecisionLedger:
    - super_bundle / sub_bundle / handoff_manifest の binding、stage DAG、current rule、dependency、global/local witness を正本記録する
    GraphEngine:
    - stage DAG と linkage rule を展開し、sub-bundle local / handoff / super-bundle coverage の state を materialize する
    - blocked stage と independent completed stage を切り分けて過剰 cascade を防ぐ
    GraphLint:
    - flat single bundle への無断 flattening、handoff_manifest current 未確認の super-bundle current、stage boundary を越える recipient alias / replay export / downstream digest の silent inheritance を禁止する
  prohibited_shortcuts:
  - staged n→m transition 全体を flat な single canonical bundle に潰し、single mandatory edge cohort と single cutover window で表す
  - super-bundle coverage claim を completed sub_bundle の単純 OR で current とみなし、handoff_manifest current を要求しない
  - recipient alias / replay export / downstream digest を predecessor stage から successor stage へ explicit linkage なしに自動継承させる
  - stage ごとの archive manifest を rewrite / reissue して global continuity を擬装する
  residual_open_points:
  - allocation_witness の numeric / set-valued / probabilistic family をどこまで canonical registry 化するか
  - bundle-of-bundles を super_bundle / sub_bundle の2層に固定するか、recursive nesting をどこまで許すか
  - handoff manifest の rollback / reopen / replay splice を、stage DAG と lineage continuity の上でどう canonical 化するか
allocation_witness_family_registry_governance:
  status: provisional_fixed
  statement: allocation_witness family registry governance は、stage / sub_bundle / super_bundle / handoff_manifest が参照する allocation_witness を numeric / set-valued / probabilistic の3 family に分け、current continuity / coverage / handoff / anti-downgrade における admissibility を family ごとに拘束する統治規則である。
  canonical_families:
    numeric:
      role: conserved quantity・capacity・share・weight など、量的整合や不足超過を判定する family。
      canonical_classes:
      - conserved_quantity_balance
      - bounded_share_vector
      - weighted_capacity_or_vote
      minimum_fields:
      - witness_id
      - family_kind
      - numeric_class
      - quantity_family_ref
      - canonical_unit_ref
      - numerator_scope_ref
      - denominator_scope_ref_or_null
      - total_balance_ref_or_null
      - tolerance_profile_ref
      - measurement_window_ref_or_null
      - provenance_ref
    set_valued:
      role: branch identity・lineage slice・route membership・coverage / exclusivity を明示する family。
      canonical_classes:
      - exhaustive_partition_set
      - coverage_membership_set
      - route_assignment_relation
      minimum_fields:
      - witness_id
      - family_kind
      - set_class
      - universe_ref
      - canonical_identity_profile_ref
      - membership_digest_ref
      - partition_mode
      - completeness_flag
      - exclusivity_flag
      - scope_cut_ref_or_null
      - provenance_ref
    probabilistic:
      role: ambiguous mapping や uncertain allocation を分布として表し、freeze / verify_only / risk triage を補助する family。
      canonical_classes:
      - calibrated_branch_distribution
      - ambiguous_mapping_posterior
      - risk_envelope_distribution
      minimum_fields:
      - witness_id
      - family_kind
      - probabilistic_class
      - hypothesis_universe_ref
      - distribution_digest_ref
      - calibration_profile_ref
      - scoring_rule_ref
      - evidence_window_ref
      - confidence_floor_ref_or_null
      - provenance_ref
  comparability_rules:
    numeric:
    - 同一 quantity_family_ref、canonical_unit_ref、denominator_scope、measurement_window、tolerance_profile を持つ場合にだけ直接比較できる
    - composite / derived metric は canonical decomposition が registry 化されている場合にだけ current 判定へ使える
    set_valued:
    - 同一 universe_ref、canonical_identity_profile_ref、partition_mode、scope_cut を共有する場合にだけ直接比較できる
    - coverage_membership_set は exhaustive_partition_set の代用品にならず、exclusivity / completeness を要求する文脈へ downgrade できない
    probabilistic:
    - 同一 hypothesis_universe_ref、calibration_profile_ref、scoring_rule_ref、evidence_window を共有する場合にだけ比較できる
    - calibration strata が異なる distribution を silent に合成したり deterministic witness の代用にしてはならない
  admissibility_matrix:
    sub_bundle_local_current:
      numeric: conditional
      set_valued: conditional
      probabilistic: forbidden_as_sole_basis
      notes:
      - local topology が many_to_one / one_to_many で conserved quantity や share balance を要求する場合は numeric を mandatory とする
      - branch identity / lineage partition / route assignment が必要な場合は set_valued を mandatory とする
    super_bundle_coverage_claim:
      numeric: conditional
      set_valued: mandatory
      probabilistic: forbidden_as_sole_basis
      notes:
      - super-bundle coverage は branch coverage / orphan-free / overlap control のため set_valued を必須にする
      - numeric は capacity / weight / quota coverage を追加で要求する場合だけ mandatory にできる
    handoff_manifest_current:
      numeric: conditional
      set_valued: mandatory
      probabilistic: forbidden
      notes:
      - lawful scope cut と input/output membership の固定には set_valued を必須にする
      - numeric は count / budget / capacity handoff のときだけ補助 mandatory にできる
    anti_downgrade_check:
      numeric: conditional
      set_valued: mandatory
      probabilistic: conditional_diagnostic_only
      notes:
      - deterministic branch mapping や exhaustive partition が必要な文脈では numeric / probabilistic への downgrade を禁止する
    replay_recipient_alias_downstream_digest:
      numeric: forbidden
      set_valued: mandatory
      probabilistic: forbidden
      notes:
      - recipient / export / digest continuity は branch / recipient / scope binding の明示が必要で、量的 share や分布では代用できない
  downgrade_barriers:
  - exhaustive_partition_set を bounded_share_vector や calibrated_branch_distribution へ置換して lawful lineage continuity を主張してはならない
  - numeric witness が total balance を満たしていても、branch identity や scope cut を要求する文脈では set_valued witness を省略してはならない
  - probabilistic witness は freeze / verify_only / risk triage の補助に使えても、super-bundle current、handoff current、recipient alias continuity の sole current basis にしてはならない
  - calibration profile / scoring rule / evidence window が異なる probabilistic witness を silent に合成して anti-downgrade pass を主張してはならない
  responsibility_split:
    DecisionLedger:
    - family registry cell、class definition、mandatory / conditional / forbidden matrix、downgrade barrier を ratified rule として記録する
    - current claim ごとの required witness class と accepted comparator profile を正本記録する
    GraphEngine:
    - witness instance を family / class ごとに materialize し、sub_bundle / super_bundle / handoff_manifest の dependency に沿って admissibility を計算する
    - probabilistic witness は diagnostic lane に残し、sole current basis に昇格させない
    GraphLint:
    - partition required 文脈で numeric only / probabilistic only の current claim、universe 不一致 set 比較、calibration 不一致 distribution 比較を禁止する
    - recipient alias / replay export / downstream digest に対する non-set witness only continuity を禁止する
  prohibited_shortcuts:
  - 合計値が一致することだけを理由に exhaustive partition / lineage slice の整合を満たしたとみなす
  - coverage_membership_set を exhaustive_partition_set の代用品にし、orphan / overlap / exclusivity を検査しない
  - probabilistic witness を current handoff や recipient alias continuity の sole basis として使う
  - composite / derived metric を canonical decomposition なしに numeric witness として current 判定へ入れる
  residual_open_points:
  - bundle-of-bundles を super_bundle / sub_bundle の2層に固定するか、recursive nesting をどこまで許すか
  - recursive nesting を許す場合の stage DAG / dependency / inheritance constraint をどこまで canonical 化するか
  - handoff manifest の rollback / reopen / replay splice を、stage DAG と lineage continuity の上でどう canonical 化するか
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで registry 化するか
allocation_witness_composite_decomposition_governance:
  status: provisional_fixed
  statement: allocation_witness composite decomposition governance は、composite unit / derived metric を canonical family component へ分解できる場合にだけ current comparison に入れ、分解不能・family collapse・mandatory component 欠落の metric を current basis から除外する統治規則である。
  target_objects:
    composite_unit: 1つの allocation claim を複数の canonical family component の組で表す witness object。例として、quantity balance と branch membership を同時に要求する handoff や coverage claim を含む。
    derived_metric: canonical component から計算される二次指標。順位付け・risk triage・capacity saturation の補助には使えるが、mandatory family component の代用にはならない。
  lawful_decomposition_conditions:
  - 各 component が numeric / set-valued / probabilistic のいずれか1つの canonical class に明示的に割り当てられること
  - numeric component では quantity_family / canonical_unit / denominator_scope / tolerance_profile が保存されること
  - set-valued component では universe / identity profile / partition_mode / scope_cut が保存されること
  - probabilistic component では hypothesis_universe / calibration_profile / scoring_rule / evidence_window が保存されること
  - component を再集約する operator が monotone であり、どの source component から derived metric が計算されたかを provenance として再参照できること
  - component 間 dependency が明示され、identity-binding 文脈で deterministic component を silent drop しないこと
  comparison_exclusion_conditions:
  - canonical decomposition map が null または ambiguous である
  - component の comparator profile が family 内で比較不能である
  - super_bundle coverage / handoff current / recipient alias / replay export / downstream digest continuity で set-valued component が欠落している
  - quantity conservation と identity binding の両方が required な sub_bundle local current で numeric または set-valued のいずれかが欠落している
  - probabilistic component だけが残り deterministic current basis を置換している
  context_component_rules:
    sub_bundle_local_current:
      mandatory:
      - quantity_conservation_required かつ identity_binding_required の場合は numeric + set-valued
      - identity_binding_required のみの場合は set-valued
      - pure quantity balancing のみの場合は numeric
      conditional:
      - probabilistic component は ambiguity diagnosis / risk triage overlay としてだけ併用可
      forbidden:
      - identity-binding required 文脈で numeric only
      - probabilistic only
    super_bundle_coverage_claim:
      mandatory:
      - set-valued
      - quota / capacity / weighted coverage を含む場合は numeric を追加
      conditional:
      - probabilistic component は overlap risk や orphan risk の triage overlay としてだけ併用可
      forbidden:
      - numeric only
      - probabilistic only
    handoff_manifest_current:
      mandatory:
      - set-valued
      - count / budget / capacity handoff を伴う場合は numeric を追加
      conditional:
      - probabilistic component は verify_only/freeze の理由補助に限る
      forbidden:
      - probabilistic を current basis に使うこと
      - set-valued を derived metric で置換すること
    replay_recipient_alias_downstream_digest_continuity:
      mandatory:
      - set-valued
      conditional:
      - なし
      forbidden:
      - numeric
      - probabilistic
  togetherness_rules:
  - identity binding と quantity conservation の両方を要求する current claim では、numeric と set-valued の component を同一 decomposition packet として評価し、片方だけの pass で current とみなしてはならない
  - probabilistic component は deterministic component の admissibility を補強・診断できても、その不在を埋めてはならない
  - derived metric が複数 family を横断する場合、family ごとの component judgment を先に確定し、その後に summary score を補助表示しても current basis の判定を上書きしてはならない
  - downgrade 判定では old decomposition に set-valued component があり new decomposition で numeric / probabilistic だけになる場合を hard block する
  responsibility_split:
    DecisionLedger:
    - decomposition schema、component dependency、context ごとの mandatory family set、comparison exclusion reason を正本記録する
    - derived metric が advisory か current-basis-eligible かを claim 単位で宣言する
    GraphEngine:
    - composite witness を component graph に展開し、family ごとの admissibility を先に計算してから summary metric を評価する
    - mandatory component 欠落や family collapse を検知したら comparison_excluded を返す
    GraphLint:
    - canonical decomposition なしの derived metric current claim、mandatory set-valued 欠落、identity-binding 文脈の numeric only pass、probabilistic only continuity claim を禁止する
    - family-cross summary score を deterministic current basis として使う shortcut を禁止する
  prohibited_shortcuts:
  - coverage ratio や utilization score が高いことだけを理由に branch membership / scope cut の整合を満たしたとみなす
  - share vector の一致をもって exhaustive partition を省略する
  - posterior や risk score を deterministic handoff current の代用にする
  - composite metric をブラックボックスのまま current comparison に入れ、どの component が pass/fail を決めたかを残さない
  residual_open_points:
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで registry 化するか
  - central delegation charter の jurisdiction family / authority family taxonomy をどこまで registry 化するか
  - HSM attestation packet / human observer credential の external serialization notation をどこまで canonical registry 化するか
recursive_bundle_of_bundles_stage_dag_governance:
  status: provisional_fixed
  statement: bundle-of-bundles の recursive nesting / stage DAG governance は、recursive nesting を無条件に許すのではなく、intermediate super_bundle が独自の coverage claim・dependency cut・charter・recipient/export boundary を持ち、2層 flattening では current admissibility または lineage boundary を保存できない場合にだけ許し、containment / dependency / inheritance / export continuity を階層的に拘束する統治規則である。
  topology_classes:
    allowed:
      two_layer_leaf_only:
        condition:
        - root super_bundle と leaf sub_bundle だけで dependency / handoff / coverage / recipient/export boundary を表せる
        - intermediate grouping が独自の current claim / charter / boundary cut を持たない
      hierarchical_clustered_tree:
        condition:
        - nested super_bundle が child set に対して独自の coverage rule、dependency cut、charter、export boundary の少なくとも1つを持つ
        - containment が rooted tree で、各 child が親を1つだけ持つ
        - 各 nested super_bundle が leaf stage の連続部分 DAG または boundary-equivalent cluster を表す
    forbidden:
      multi_parent_shared_child:
        reason: current claim、責務継承、lineage cut が一意に定まらない
      cyclic_super_bundle_containment:
        reason: coverage 集約と stage order が well-founded でなくなる
      decorative_group_only_nesting:
        reason: 見た目 grouping だけで nested current claim を増やすと silent inheritance と duplicate adjudication を招く
      cross_lca_hidden_dependency:
        reason: lowest common ancestor に boundary interface を置かずに branch 間 dependency を張ると handoff / export / digest boundary が失われる
  stage_dag_constraints:
    containment_rules:
    - super_bundle containment は rooted tree でなければならない
    - 各 super_bundle の immediate child dependency graph は DAG でなければならない
    - parent super_bundle の stage DAG は child DAG の quotient partial order と両立しなければならない
    dependency_rules:
    - sibling 間 dependency は同一 parent 配下で declared edge がある場合にだけ許す
    - 異なる branch 間 dependency は lowest common ancestor に declared boundary interface / handoff requirement がある場合にだけ許す
    - child は parent edge を refinement できるが、ancestor partial order を反転させたり cycle を作ってはならない
    - leaf sub_bundle から ancestor を飛び越えて non-sibling branch へ direct mandatory dependency を張ってはならない
  inheritance_constraints:
    charter_and_policy:
    - parent charter / coverage_rule / dependency_policy / export_policy は child の default になる
    - child override は monotone strengthening だけ許し、parent mandatory rule を silent に弱めてはならない
    current_admissibility:
    - nested super_bundle current は mandatory child current と required inter-child handoff current の conjunction で決まり、descendant current を自動生成しない
    - ancestor の freeze / verify_only / tombstone は dependency closure に入る descendant にだけ投影し、非依存 branch へ過剰 cascade させない
    allocation_witness:
    - set-valued witness requirement は identity-binding / coverage-required 文脈では child へ継承する
    - numeric / probabilistic requirement は local topology / comparator profile が一致する場合の補助継承に留め、silent lift を許さない
    recipient_alias_replay_export_downstream_digest:
    - recipient alias / replay export / downstream digest は既定で local scope non-inheritable とする
    - ancestor / sibling scope への current use には lowest common ancestor boundary での explicit successor proof と linkage を mandatory にする
    archive_and_lineage:
    - archive manifest object は local immutable とする
    - ancestor は digest / linkage summary だけを継承でき、child manifest object を rewrite / merge してはならない
  responsibility_split:
    DecisionLedger:
    - rooted tree containment、boundary interface、quotient stage DAG、parent-child override rule、mandatory dependency closure を正本記録する
    GraphEngine:
    - nested super_bundle / sub_bundle の dependency closure と LCA boundary interface を展開し、local / handoff / ancestor coverage state を materialize する
    - child blocked state を mandatory closure に沿ってだけ ancestor へ昇格させ、非依存 branch への過剰 cascade を防ぐ
    GraphLint:
    - decorative nesting、multi-parent child、LCA interface を持たない cross-branch dependency、parent mandatory rule を弱める child override を禁止する
    - recipient alias / replay export / downstream digest の silent inheritance と child manifest rewrite による global continuity 擬装を禁止する
  prohibited_shortcuts:
  - recursive nesting が可能だからという理由で、すべての中間 grouping を super_bundle 化する
  - child を複数親に共有し、current claim と責務継承を後段の adjudication で解消する
  - lowest common ancestor に boundary interface を作らず、leaf branch 間 dependency を direct edge で済ませる
  - child override で parent mandatory rule を silent に弱め、local policy だけで current admissibility を再定義する
  - recipient alias / replay export / downstream digest を child scope から ancestor / sibling scope へ explicit linkage なしに持ち上げる
  residual_open_points:
  - handoff manifest の rollback / reopen / replay splice を、stage DAG と lineage continuity の上でどう canonical 化するか
  - allocation_witness の composite unit / derived metric を family registry とどう接続するか
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで registry 化するか
handoff_manifest_rollback_reopen_replay_splice_governance:
  status: provisional_fixed
  statement: handoff manifest の rollback / reopen / replay splice governance とは、nested stage DAG 上の handoff 境界を巻き戻し・再開・再接続するときに、archive manifest object の immutable 性を壊さず、append-only linkage と active current cell の切替だけで lawful continuity を維持し、local repair と nonlocal propagation を切り分ける統治規則である。
  core_claims:
  - archived handoff_manifest object と stage archive manifest digest は immutable であり、rollback / reopen / replay splice のたびに rewrite してはならない。
  - rollback / reopen / replay splice は archive object そのものではなく、linkage event、current continuity claim、lineage digest summary、recipient/export continuity binding に作用する。
  - local reopen は same-boundary repair に限り許され、source / target / stage boundary kind / charter / scope cut / recipient-export boundary class を silent に変えてはならない。
  - replay splice は historical predecessor manifest を lawful な successor linkage へ再接続する append-only 事象であり、explicit successor proof と declared LCA boundary interface を要する。
  - propagation は mandatory closure と current export continuity の有無で決まり、non-dependent sibling や unrelated ancestor へ一律 cascade してはならない。
  event_families:
    rollback:
      statement: active handoff current を撤回し、当該 handoff に依存する current claim を pre-handoff 境界へ戻す事象。
      admissible_when:
      - current handoff またはその dependency closure 上の current claim が unlawful / invalid / superseded になった
      - rollback_target、required authority、rollback charter または lawful rollback path がある
      non_implications:
      - archived handoff_manifest object の削除や rewrite を意味しない
      - non-dependent sibling branch の current を自動で取り消すことを意味しない
    reopen:
      statement: 同一 frame の中で、same-boundary repair により handoff current の評価を再開する事象。
      admissible_when:
      - source_sub_bundle_ref、target_sub_bundle_ref、stage_boundary_kind、handoff_charter_ref、scope_cut_ref、recipient-export boundary class が不変である
      - 同一 frame で repair path があり、required witness / authority を補充できる
      - recipient class widening、branch retarget、undeclared LCA cross は含まれない
      closure_rule:
      - 影響が handoff-local linkage cell に閉じ、ancestor mandatory closure と current export continuity に差分がなければ local reopen として閉じられる
    replay_splice:
      statement: historical predecessor manifest と current successor lineage の間に新しい lawful linkage を append-only で挿入する事象。
      admissible_when:
      - archived predecessor manifest を保持したまま同一 target または lawful な successor target へ再接続する必要がある
      - explicit successor proof、splice charter、declared LCA boundary interface、successor witness cell がある
      - target instance 変更、epoch 変更、branch-local export surface の差替えは silent replacement ではなく splice record として記録される
      non_implications:
      - 単なる note update や operator memo を意味しない
      - archived manifest object の差し替えを意味しない
  locality_and_propagation:
    local_only_when:
    - 変更されるのが handoff-local linkage/current state だけであり、ancestor の mandatory interface satisfaction と lineage digest summary が等価のままである
    - current recipient alias / replay export / downstream digest が local scope の外で当該 handoff に依存していない
    ancestor_chain_required_when:
    - rollback / reopen が ancestor super_bundle の mandatory interface satisfaction、coverage claim、lineage digest summary を変える
    - dependency closure 上の current / freeze / verify_only 判定を ancestor で再計算する必要がある
    lca_fanout_required_when:
    - replay splice が sibling / cousin branch へ retarget し、lowest common ancestor の boundary interface を横切る
    - current recipient alias / replay export / downstream digest continuity が LCA boundary を越えている
    escalate_or_false_when:
    - required authority、rollback path、splice charter、declared boundary interface のいずれかが欠ける
    - rooted tree containment、declared dependency、non-inheritable recipient/export boundary を破る retarget を要求する
  lineage_and_witness_switching:
    immutable_cells:
    - source_exit archive manifest digest
    - target_entry archive manifest digest once issued
    - archived handoff_manifest object
    active_cells:
    - predecessor_witness_cell
    - current_linkage_cell
    - successor_witness_cell_or_null
    rules:
    - predecessor_witness_cell は archived source-side close evidence を指し、reopen や splice で rewrite しない
    - current_linkage_cell は現在の lawful continuity claim を指し、supersede / rollback / reopen / splice は append-only event でのみ切り替える
    - successor_witness_cell は replay splice により新しい target instance、epoch、branch-local export surface、または LCA-crossing current use が生じるとき mandatory になる
    - recipient alias / replay export / downstream digest continuity は archived manifest object ではなく active current_linkage_cell または successor_witness_cell に束縛する
  state_machine:
    states:
    - current
    - reopen_pending
    - rolled_back
    - spliced_current
    - verify_only
    - freeze
    - cut
    - tombstone
    transitions:
    - current から reopen_pending へは same-boundary repair が lawful で、必要 witness または authority の補充待ちに入るときだけ遷移する
    - current から rolled_back へは active handoff current を撤回し、dependency closure 上の current claim を引き下げるとき遷移する
    - reopen_pending から current へは same-boundary repair が完了し、nonlocal propagation gap が残らないとき遷移する
    - reopen_pending から spliced_current へは same-boundary repair では閉じられず、lawful replay splice が append されたとき遷移する
    - rolled_back から spliced_current へは historical predecessor を lawful successor linkage へ再接続できたとき遷移する
    - any から freeze / verify_only へは mandatory witness または authority が部分充足であるとき遷移する
    - any から cut / tombstone へは lawful path absent または base manifest invalidation が起きたとき遷移する
  responsibility_split:
    DecisionLedger:
    - rollback / reopen / replay splice event、affected handoff_manifest_ref、boundary_lca_ref、propagation_scope、supersedes_linkage_ref、required authority judgement を正本記録する
    - predecessor/current/successor witness cell の active pointer と lineage digest summary の再計算結果を記録する
    GraphEngine:
    - dependency closure、ancestor chain、LCA fanout を展開し、handoff-local / ancestor / export continuity の state change を materialize する
    - local reopen で閉じられる場合と replay splice による nonlocal 伝播が必要な場合を分岐させる
    GraphLint:
    - archived manifest rewrite、silent retarget、undeclared LCA cross、splice record なしの predecessor/successor witness 混在、recipient/export continuity の無断再利用を禁止する
  prohibited_shortcuts:
  - rollback / reopen / replay splice のたびに archived handoff_manifest object や stage archive manifest digest を rewrite する
  - local reopen の名目で source / target / scope cut / charter / recipient boundary を silent に変更する
  - dependency closure と LCA boundary を見ずに sibling branch 全体へ一律 cascade する
  - same current continuity claim に predecessor witness と successor witness を splice record なしで無記名併記する
  - recipient alias / replay export / downstream digest を archived manifest object へ直接ぶら下げたまま current continuity を主張する
  residual_open_points:
  - allocation_witness の composite unit / derived metric を family registry とどう接続するか
  - probabilistic allocation_witness の calibration strata / scoring rule / risk threshold をどこまで registry 化するか
  - central delegation charter の jurisdiction family / authority family taxonomy をどこまで registry 化するか
probabilistic_allocation_witness_registry_governance:
  status: provisional_fixed
  statement: probabilistic allocation_witness registry governance は、probabilistic witness を deterministic current basis に昇格させず、class / calibration stratum / scoring rule / evidence window / confidence floor / risk threshold を registry 化して、freeze / verify_only / triage への非対称な診断統治を与える規則である。
  canonical_classes:
    calibrated_branch_distribution:
      role: branch / partition 候補への確率質量分布を表す
      mandatory_bindings:
      - hypothesis_universe_ref
      - calibration_profile_ref
      - scoring_rule_ref
      - evidence_window_ref
      - confidence_floor_ref
      - decision_cost_profile_ref
      admissible_uses:
      - sub_bundle local current の ambiguity diagnosis
      - merge / split 候補 ranking の補助
      forbidden_uses:
      - identity-binding required current の sole basis
      - handoff continuity の current basis
    ambiguous_mapping_posterior:
      role: 複数 mapping 仮説の posterior を表し、未確定対応の残差を示す
      mandatory_bindings:
      - hypothesis_universe_ref
      - calibration_profile_ref
      - scoring_rule_ref
      - evidence_window_ref
      - ambiguity_threshold_profile_ref
      admissible_uses:
      - verify_only / freeze の判定補助
      - anti-downgrade suspicion の検知
      forbidden_uses:
      - exhaustive partition や route assignment の代替
    risk_envelope_distribution:
      role: operational / safety / externality など consequence class ごとの tail risk 分布を表す
      mandatory_bindings:
      - risk_consequence_profile_ref
      - calibration_profile_ref
      - scoring_rule_ref
      - evidence_window_ref
      - risk_threshold_profile_ref
      - decision_cost_profile_ref
      admissible_uses:
      - triage / escalate / freeze の閾値判定補助
      forbidden_uses:
      - low risk を理由に deterministic block を解除すること
  registry_cell_schema:
    required_fields:
    - probabilistic_class
    - hypothesis_or_consequence_universe_ref
    - calibration_stratum_ref
    - calibration_profile_ref
    - scoring_rule_ref
    - evidence_window_ref
    - confidence_floor_ref
    - threshold_profile_ref
    - decision_cost_profile_ref
    - allowed_context_set
    - forbidden_context_set
    - drift_monitor_ref_or_null
  context_policy:
    sub_bundle_local_current:
      deterministic_prerequisite:
      - context が要求する set-valued または numeric + set-valued の mandatory component が先に満たされていること
      admissible_roles:
      - ambiguity diagnosis
      - verify_only trigger
      - freeze trigger
      conditional_roles:
      - candidate ranking
      - local triage
      forbidden_roles:
      - probabilistic only current
      - deterministic component 欠落の補填
    super_bundle_coverage:
      deterministic_prerequisite:
      - mandatory sub-bundle current と required handoff current が先に成立していること
      admissible_roles:
      - orphan / overlap / residual risk の diagnosis
      - verify_only / freeze / triage trigger
      forbidden_roles:
      - super-bundle coverage current の sole basis
      - set-valued coverage membership の代替
    handoff_manifest_current:
      admissible_roles:
      - none
      conditional_roles:
      - verify_only / freeze の reason packet への添付
      forbidden_roles:
      - handoff current の current basis
      - recipient/export continuity の current basis
    anti_downgrade_check:
      admissible_roles:
      - downgrade suspicion の検知
      - verify_only / freeze trigger
      forbidden_roles:
      - deterministic downgrade block の解除を単独で主張すること
    replay_recipient_alias_downstream_digest_continuity:
      admissible_roles:
      - none
      forbidden_roles:
      - probabilistic witness 全般
  threshold_governance:
    asymmetry_rules:
    - confidence floor breach、ambiguity mass 超過、tail-risk 超過は status を悪化させる trigger になりうる
    - 良好な calibration score や低リスクは、set-valued / numeric の mandatory 欠落を埋めたり current claim を成立させたりしてはならない
    - probabilistic witness は pass 証明ではなく、uncertainty / risk の管理信号として扱う
    action_mapping:
      verify_only:
        condition:
        - calibration は有効だが evidence coverage または sample size が review floor 近辺にあり、manual confirmation が必要
      freeze:
        condition:
        - confidence floor breach
        - ambiguity mass が freeze threshold を超える
        - tail-risk が freeze threshold を超える
      triage:
        condition:
        - risk_envelope_distribution が consequence class ごとの triage threshold を超える
      escalate:
        condition:
        - forbidden context で probabilistic witness を current basis に使おうとした
        - cross-profile merge や silent comparator swap を検知した
  comparability_barriers:
  - 同一 probabilistic class であっても、hypothesis/consequence universe、calibration profile、scoring rule、evidence window、decision cost profile が一致しない比較や合成を禁止する
  - calibration stratum が異なる witness を silent に平均化して単一 risk score や posterior に潰してはならない
  - deterministic witness と probabilistic witness の比較は current/pass の同値比較ではなく、downgrade suspicion / uncertainty overlay としてだけ扱う
  responsibility_split:
    DecisionLedger:
    - registry cell、score vector、threshold action、decision cost profile、deterministic guard result を正本記録する
    - probabilistic witness が advisory か trigger か、どの context で使われたかを宣言する
    GraphEngine:
    - profile/context 一致判定、score 計算、threshold action、drift monitor、deterministic prerequisite 充足確認を行う
    - probabilistic overlay が status 悪化を起こしても current basis を自動昇格させない
    GraphLint:
    - forbidden context 使用、cross-profile merge、probabilistic only current claim、low-risk による deterministic block 解除、silent scoring_rule swap を禁止する
  prohibited_shortcuts:
  - posterior が鋭いことだけを理由に exhaustive partition や route assignment relation を省略する
  - low risk score をもって handoff_manifest current や replay / recipient alias continuity の lawful basis とみなす
  - calibration profile や evidence window が違う distribution をまとめて 1 本の risk score に潰す
  - deterministic witness が欠けた状態で probabilistic overlay を sole pass basis にする
  residual_open_points:
  - central delegation charter の jurisdiction family / authority family taxonomy をどこまで registry 化するか
  - HSM attestation packet / human observer credential の external serialization notation をどこまで canonical registry 化するか
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで registry 化するか
freshness_expiry_registry_governance:
  status: provisional_fixed
  statement: freshness window と hard expiry は同一 window ではない。freshness は individual evidence の admissibility を、hard expiry は case / support bundle の prospective reliance 失効点を表す別 registry として固定し、profile baseline + context cap の2段で管理する。
  core_claims:
  - freshness registry は source family × claim facet × profile baseline ごとの evidence admissibility window を正本化する。hard expiry registry は detector family × claim facet × profile baseline ごとの case carry-over window を正本化する。
  - freshness を満たしていても、case hard expiry を超えた bundle は new judgement の corroboration に使えない。逆に case が未失効でも、個別 evidence が freshness failure なら confirmed branch の根拠に使えない。
  - single_branch / external_irreversible / policy_sensitive の context override は shortening-only であり、baseline を緩める local convention を許さない。
  - grace / stale は history を消さないが、confirm / release / external commitment の shortcut を開かない。review_due は expiry の別名ではなく、expiry 前の警戒状態である。
  registry_layers:
    evidence_freshness_cell:
    - source_family
    - claim_facet
    - baseline_profile
    - freshness_window
    - grace_window_or_null
    - integrity_floor
    - provenance_floor
    - mirror_lag_budget_ref
    case_expiry_cell:
    - detector_family
    - claim_facet
    - baseline_profile
    - aggregation_window
    - hard_expiry
    - live_only_branch_set
    - grace_admissible_branch_set
    context_cap:
    - context_tag
    - target_cell_selector
    - shortening_rule
    - hard_cap
    - stricter_only
  resolved_boundary:
    fixed_now:
    - evidence freshness registry と case expiry registry の分離
    - profile baseline + context cap の二層構造
    - review_due / stale / invalid / expired の役割分担
    kept_outside:
    - mirror lag prior の統計推定そのもの
    - detector threshold の数値較正そのもの
    - source-specific ingestion retry policy
  tool_split:
    DecisionLedger:
    - active な freshness/expiry registry cell の authoritative binding
    - context override の適法性判定
    - confirm/release branch で live-only 条件を適用した judgement 記録
    GraphEngine:
    - evidence_freshness_degraded / case_expired / epoch_split の状態遷移保存
    - registry cell と event/case の binding lineage 管理
    - review_due_at / hard_expiry_at / effective_age のタイマ管理
    GraphLint:
    - freshness と expiry を混同した shortcut の検出
    - context cap 不在や baseline 緩和の lint
    - grace support を confirmed branch へ流用した違反の検出
    archive_object:
    - freshness/expiry 判定に使った registry snapshot
    - effective age 計算 packet
    - epoch split / revalidation witness
  forbidden_shortcuts:
  - freshness を満たしているから case も live だとみなすこと。
  - review_due を expiry grace と誤読して high-impact reliance を継続すること。
  - context override を baseline 緩和の抜け道として使うこと。
  residual_open_points: []
detector_abuse_anchor_binding_governance:
  status: provisional_fixed
  statement: direct abuse anchor と detector abuse anchor は同じ「不正らしさ」ではない。direct abuse anchor は対象行為や prohibited effect への直接束縛、detector abuse anchor は検知系が操作・飽和・再包装されていることへの束縛であり、family ごとに最小束縛を分ける。
  core_claims:
  - direct abuse anchor は severe penalty、confirmed attack-like judgement、externality-sensitive final action の前提になりうる。detector abuse anchor 単独は suspend / degrade / manual review の根拠になれても、最終 penalty や malicious intent の確定根拠にはならない。
  - separated corroboration は detector abuse anchor の不足を補えるが、protected facet や external commitment に触れる confirm-grade judgement では direct abuse anchor を原則要求する。
  - family ごとの minimum binding は raw count ではなく、anchor type・lineage・effect zone・protected facet touch の束で決める。
  family_minimum_binding:
    sink_identity_and_reach:
      direct_abuse_anchor_minimum:
      - direct sink identity または direct reach evidence
      - authoritative route/access witness または direct system observation
      - prohibited sink/effect への actual or attempted realization
      detector_abuse_anchor_minimum:
      - mirror poisoning / access-log suppression / telemetry concealment のいずれか
      - 同一 sink claim facet に対する separated corroboration または authoritative mismatch
      - protected facet または externality-sensitive context 接触
    route_access_and_owner:
      direct_abuse_anchor_minimum:
      - unauthorized route/use の authoritative access trace
      - actor / credential / owner binding mismatch
      - intended action への current relevance
      detector_abuse_anchor_minimum:
      - threshold bypass / reviewer override tamper / log omission のいずれか
      - 同一 route_identity または owner_binding facet への replayable witness
      - manual review を要求する protected binding hit
    cadence_burst:
      direct_abuse_anchor_minimum:
      - queue saturation / sink probing / retry storm の direct trace
      - affected sink or queue の protected reachability
      - lawful burst witness 不成立
      detector_abuse_anchor_minimum:
      - cluster density / cadence breach / hidden coupling concentration の同時成立
      - duplicate / replay / mirror reuse のいずれか
      - same detector family 内の replayable burst packet
    replay_lineage:
      direct_abuse_anchor_minimum:
      - exact hash/root/lineage の concealed reuse
      - expired / revoked / resolved epoch をまたぐ再投入
      - current corroboration or confirm path への混入
      detector_abuse_anchor_minimum:
      - duplicate discard digest inconsistency または lineage omission pattern
      - artifact rotation による wrapper-only diversification
      - replay detector を汚染する cluster representative 競合
    semantic_delta_and_policy_drift:
      direct_abuse_anchor_minimum:
      - threshold / comparator / veto / route / schema requiredness の unannounced material change
      - affected protected facet に対する replay benchmark drift
      - active branch meaning の変化
      detector_abuse_anchor_minimum:
      - calibration bypass / hidden coupling concealment / benchmark omission のいずれか
      - same change bundle に対する semantic delta unresolved or material
      - policy-sensitive or externality-sensitive context 接触
  governance_rules:
  - detector abuse anchor 単独では final penalty を作らず、せいぜい suspend / manual review / bounded degrade を開く。
  - direct abuse anchor を要求する文脈では、freshness と replayability を満たした anchor packet を mandatory とする。
  - family 未選別の abuse anchor packet を共通 confirm 根拠として再利用してはならない。
  forbidden_shortcuts:
  - burst anomaly や posterior だけで malicious intent を確定すること。
  - detector abuse anchor を direct abuse anchor と同格に扱うこと。
  - family 不一致の anchor を横流しして severe penalty を起動すること。
  residual_open_points: []
joint_change_artifact_contribution_governance:
  status: provisional_fixed
  statement: prompt_pack / rulepack / template_bundle の joint change は、artifact 別の完全因果分解を常に要求しない。ただし benchmark cell に基づく replay を前提に、各 artifact の最小寄与 class と affected facet は分解して記録する。
  core_claims:
  - 最低限必要なのは「どの artifact が decisive だったか」「どの artifact が joint effect の成立に不可欠だったか」「どの artifact が modulation / presentation にとどまったか」を区別することである。
  - 寄与分解は lexical diff ではなく replay benchmark に基づく counterfactual difference で行う。baseline、single-delta、pair-delta、full-bundle を最低限走らせずに decisive attribution を主張してはならない。
  - 寄与 class は artifact ごとに facet-scoped で持つ。global single label で全 facet を潰してはならない。
  minimum_replay_matrix:
  - baseline
  - prompt_only
  - rulepack_only
  - template_only
  - prompt_rulepack
  - prompt_template
  - rulepack_template
  - prompt_rulepack_template
  contribution_classes:
    decisive_primary: 当該 artifact 単独の差分で protected outcome / decision branch / admissibility branch が再現よく変わる。
    required_joint: 単独では変わらないが、変化が生じるすべての successful pair/full bundle に当該 artifact が含まれる。
    modulating: branch は変えないが、severity / confidence / blast radius / required review を変える。
    observational_only: rendering / explanation / label ordering などで execution-semantic change を作らない。
    unresolved_joint: benchmark coverage、witness、facet mapping、counterfactual replay のいずれかが不足し、上の class を lawful に決められない。
  artifact_default_facets:
    prompt_pack:
    - execution meaning
    - evidence emphasis
    - reasoning path selection
    rulepack:
    - policy gate
    - threshold
    - route / approval / veto binding
    template_bundle:
    - schema requiredness
    - sink exposure
    - presentation / output routing
  binding_rule:
  - artifact_contribution_record は artifact_id、affected_facet_set、contribution_class、benchmark_cell_ref、counterfactual_replay_refs を持つ。
  - joint change で protected facet に material / unresolved drift がある場合、少なくとも affected facet ごとに unresolved_joint か decisive/required_joint のどちらかを記録する。
  - unaffected protected facet は negative case と benchmark drift で無影響を示せたときだけ observational_only / modulating として残せる。
  forbidden_shortcuts:
  - text diff が大きい artifact を自動的に primary cause とすること。
  - full-bundle の1回 replay だけで artifact attribution を確定すること。
  - benchmark cell 不在のまま decisive_primary を宣言すること。
  residual_open_points: []
replay_benchmark_registry_governance:
  status: provisional_fixed
  statement: replay benchmark suite は detector family × claim facet × criticality band × evidence strength class × portability class × profile family の canonical registry cell 単位で管理し、cell ごとに mandatory case set・negative case・migration rule・versioning rule を持つ。
  core_claims:
  - benchmark は generic replay 一般ではなく、どの detector family がどの claim facet をどの criticality 文脈で評価するかに束縛された registry cell である。
  - cross-profile comparability は raw score 直比較ではなく、同一 claim facet と portability class を共有し、required negative case と protected invariant が揃った cell 同士でだけ成立する。
  - alias-preserving migration は predecessor/successor の semantic cell core が同一で、mandatory negative case と protected invariant の pass/fail 意味が保存されるときにだけ許す。
  canonical_cell_fields:
  - benchmark_cell_id
  - detector_family
  - claim_facet
  - criticality_band
  - evidence_strength_class
  - portability_class
  - profile_family
  - mandatory_positive_case_refs
  - mandatory_negative_case_refs
  - stale_or_expired_case_refs
  - abuse_anchor_case_refs
  - joint_change_isolation_case_refs
  - protected_invariant_ref_set
  - replay_capsule_spec_ref
  - suite_version
  - migration_policy_ref
  mandatory_case_sets:
    positive_anchor: family/facet の intended success を replay で再現できる代表例
    negative_counterexample: false positive / false confirm / false release を防ぐ反例
    boundary_and_caveat: criticality band・evidence strength・portability class の境界例
    stale_or_expired: freshness / expiry failure を明示的に落とす例
    abuse_anchor: direct abuse anchor / detector abuse anchor の差分を確認する例
    joint_change_isolation: artifact attribution を分解するための baseline/single/pair/full replay 例
  family_facet_admissibility_examples:
    route_access:
    - route_identity
    - owner_binding
    sink_observation:
    - sink_typing_positive_escalation
    - effect_realization
    cadence_burst:
    - sink_typing_positive_escalation
    - effect_realization
    replay_lineage:
    - route_identity
    - effect_realization
    semantic_delta_or_policy_drift:
    - route_identity
    - sink_typing_positive_escalation
    - effect_realization
  versioning_rules:
    major:
    - mandatory case set の意味が変わる
    - protected invariant が変わる
    - cell core tuple が変わる
    minor:
    - negative case や portability cohort を追加するが pass/fail semantics は維持する
    - alias-preserving successor を追加する
    patch:
    - metadata / manifest / locator の修正だけで replay semantics を変えない
  tool_split:
    DecisionLedger:
    - benchmark cell の activation / supersession / migration 承認
    - cross-profile comparability と portability binding の authoritative 判定
    GraphEngine:
    - cell-version lineage、alias chain、dual-validity period の保存
    - benchmark case と runtime judgement の binding 履歴管理
    GraphLint:
    - coverage gap、missing negative case、invalid migration の診断
    - benchmark cell 未束縛の attribution / confirm shortcut 検出
    archive_object:
    - replay capsule、benchmark packet、migration witness の保存
    - predecessor/successor dual-run 比較 packet の保持
  forbidden_shortcuts:
  - detector family や claim facet を落とした generic benchmark で confirmability を代表させること。
  - negative case を持たない shiny pass suite を canonical と呼ぶこと。
  - semantic core が変わっているのに alias-preserving migration で済ませること。
  residual_open_points: []
audit_witness_external_audit_emergency_bypass_governance:
  status: provisional_fixed
  statement: audit_witness_external_audit_emergency_bypass_governance とは、legal-hold reopen と external audit における audit witness を単一 actor や単一装置へ還元せず、append-only precommit・HSM attested witness・human observer witness の役割分離で管理し、さらに central_authority 必須境界と emergency bypass の最大 reveal scope / post-confirm SLA を拘束する規則である。
  core_claims:
  - audit witness shard は decryption key の追加所有権ではなく、reveal session が lawful に開始・観測・再監査されたことを示す witness composition として扱う。
  - append-only precommit はすべての external_audit / security_escalation / clear-identity reopen で必須とし、後付けログで代替しない。
  - HSM attested witness は、cross-tenant、cross-jurisdiction、cross-system join、protected facet、external party visibility、accountable_identity_slice のいずれかに触れるとき mandatory とする。
  - human observer witness は常時 mandatory ではなく、clear identity または direct contact route を含む emergency bypass、cross-jurisdiction external audit、central_authority が最終承認する supervised session のときだけ mandatory とする。
  - central_authority は cross-tenant と cross-jurisdiction の既定 authority であり、domain_authority 例外は same-tenant・same-jurisdiction・pre-ratified charter・bounded reveal・supervised session に限る。
  - emergency bypass は provisional containment path であり、full envelope を開く経路ではない。authority post-confirm 前に final evidence、penalty finalization、public explanation へ流用してはならない。
  audit_witness_hybrid_policy:
    mandatory_base:
      append_only_precommit:
        statement: access audit anchor を envelope materialization より前に append-only path へ固定する基底 witness。
        required_when:
        - external_audit
        - security_escalation
        - clear-identity reopen
        - digest-bound export with external recipient
    conditional_layers:
      hsm_attested_witness:
        statement: session nonce、scope packet digest、envelope digest、audience binding を device-backed に attest する mechanized witness。
        required_when:
        - cross-tenant
        - cross-jurisdiction
        - cross-system join
        - protected facet touched
        - external party visibility
        - reveal_scope >= accountable_identity_slice
      human_observer_witness:
        statement: session purpose・named recipient・reveal_scope 実行を観測し、observer log と post-session challenge を残す人的 witness。
        required_when:
        - cross-jurisdiction external_audit
        - central_authority supervised session with clear identity
        - security_escalation where direct contact route or clear display identity is revealed
        non_roles:
        - authority_lane の代用にしない
        - custody_lane の代用にしない
        - external_auditor 自身を reusable witness holder にしない
  independence_rules:
  - append_only precommit path は request owner、custody release service、security override service と別 independence group を要する。
  - HSM attested witness は custody secret を保持する HSM partition と同一 logical slot に置かず、attestation key と release key を分離する。
  - human observer witness は authority_lane / custody_lane / security_lane の充足者と同一自然人にしない。
  - 同一 managed service でも control plane と audit plane が独立に封印・検証できないなら append_only precommit と HSM witness の二役に数えない。
  - external_auditor、delegated_reviewer、named recipient を audit witness component の reusable issuer にしない。
  central_authority_boundary:
    mandatory_conditions:
    - cross-tenant external audit
    - cross-jurisdiction external audit
    - cross-authority-family または global-default charter に依存する external audit
    - cross-system join により domain-local registry を越える actor continuity 復元が必要
    - external party 向け reveal が bounded_actor_slice を超える
    - protected facet を含む external audit または security escalation の post-confirm
    - domain authority 間で competing interpretation が残る
    domain_authority_exception_conditions:
    - same tenant かつ same jurisdiction family である
    - audit charter が central template または central delegation で事前 ratified 済みである
    - reveal_scope が handle_only または bounded_actor_slice に留まる
    - supervised session または digest-bound export に限定され、unsupervised plaintext export を行わない
    - cross-system join が domain-local canonical registry の範囲に収まる
    - protected facet の final interpretation を新規に変更しない
    non_implications:
    - single external auditor の存在だけでは central_authority 必須にならない
    - central_authority 必須だからといって clear identity reveal が自動許可されるわけではない
    - domain_authority 例外が成立しても HSM attested witness や append-only precommit の要否は別に評価する
  emergency_bypass_scope_policy:
    reveal_scope_classes:
      handle_only:
        statement: session_id、incident id、charter ref、branch ref のみを示し、actor continuity や identity を含まない。
      bounded_actor_slice:
        statement: stable pseudonym または export-local pseudonym、authority / accountability binding、minimal lineage anchor だけを含み、clear identity・direct contact route・reusable join key を含まない。
      accountable_identity_slice:
        statement: 単一 named principal の display identity または direct contact route と accountability binding を含む限定 slice。audience は 1 名または 1 supervised session に束縛し、bulk reveal を禁止する。
      full_envelope:
        statement: sealed identity envelope 全体、multi-actor clear identity、reusable join key、broad lineage を含む reveal。emergency bypass の admissible output にしない。
    baseline_profile_caps:
      regulated:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 2
        ttl: 4時間
        derived_export_cap: 1
        post_confirm_sla: 4時間
      engineering_tradeoff:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 2
        ttl: 1営業日
        derived_export_cap: 1
        post_confirm_sla: 1営業日
      organizational_or_social:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 3
        ttl: 1営業日
        derived_export_cap: 1
        post_confirm_sla: 1営業日
    context_caps:
      single_branch:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 2
        ttl: 4時間
        post_confirm_sla: 2時間
      external_irreversible:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 1
        ttl: 1時間
        post_confirm_sla: 1時間
      policy_sensitive:
        max_reveal_scope: bounded_actor_slice
        audience_cap_named_humans: 1
        ttl: 2時間
        post_confirm_sla: 1時間
    exception_rule:
      life_safety_or_active_compromise:
        statement: bounded_actor_slice だけでは containment が成立しないときに限り、single named principal への accountable_identity_slice を provisional に許す。
        preconditions:
        - security_lane と custody_lane が active である
        - append-only precommit と HSM attested witness が先に固定されている
        - human observer witness が session を観測する
        - audience が 1 名または 1 supervised session に束縛される
        - clear identity を使わない代替 containment path が不成立である
        numeric_caps:
          ttl: 1時間
          post_confirm_sla_default: 1時間
          post_confirm_sla_when_external_irreversible_or_policy_sensitive: 30分
        prohibitions:
        - full_envelope へ拡張しない
        - recipient list の拡張に使わない
        - canonical archive object や long-lived cache へ昇格しない
    failure_branches:
    - post-confirm 不成立時は auto-reseal、derived export revoke、continued hold、violation event を同時発火する。
    - 上位 authority path が生存するなら escalate を優先し、path absent なら current bypass session は false として閉じる。
    - ttl 超過または audience 拡張が起きた session は emergency convenience ではなく violation として扱う。
  decision_ledger_graph_engine_archive_split:
    DecisionLedger:
    - witness composition class
    - authority boundary judgement
    - effective max reveal scope
    - effective audience/ttl/post-confirm cap
    - exception basis and breach branch
    GraphEngine:
    - append-only precommit ref
    - HSM attestation ref
    - human observer session ref
    - auto-reseal timer
    - derived export revoke / shutdown event
    archive_object:
    - sealed session digest
    - witness packet digest
    - post-confirm outcome ref
    GraphLint:
    - redacted session summary only
    - clear identity、direct contact route、witness private material を保持しない
  prohibited_shortcuts:
  - append-only log だけで high-risk external audit の witness を満たしたとみなさない。
  - HSM attestation だけで human observer witness が必要な session を置換しない。
  - domain_authority だけで cross-tenant external audit を final confirm しない。
  - accountable_identity_slice を recipient 2 名以上へ同時配布しない。
  - emergency bypass 出力を authority post-confirm 前に final evidence / penalty / public explanation へ流用しない。
  - full_envelope を emergency containment の既定値にしない。
  residual_open_points:
  - vendor-neutral な HSM attestation packet / human observer credential schema をどこまで canonical registry 化するか
  - jurisdiction family と central delegation charter の finer taxonomy をどこまで formal registry 化するか
audit_witness_packet_central_delegation_charter_governance:
  status: provisional_fixed
  statement: 'audit_witness_packet_central_delegation_charter_governance とは、cross-tenant / cross-jurisdiction /

    protected external audit / emergency bypass において、audit witness packet と

    central delegation charter を単なる添付書類ではなく lawful continuity を束ねる監査単位として扱い、

    canonical schema・authority scope・delegation boundary・exception lane・post-confirm duty を拘束する規則である。

    '
  core_claims:
  - audit witness packet は witness の寄せ集めではなく、session basis・authority judgement・continuity linkage・post-confirm duty を1つの packet digest に束ねた監査単位である。
  - central delegation charter は reviewer assignment 一般ではなく、どの authority tier がどの scope・action family・exception lane をどの SLA で代行できるかを拘束する統治契約である。
  - cross-tenant / cross-jurisdiction / protected external audit では、packet が charter ref を持たないなら lawful continuity を主張してはならない。
  - duplicate_discard_digest・bridge token・archive manifest は packet の外部 link ではなく、scope summary・pseudonym continuity・replay continuity を束ねる mandatory linkage として扱う。
  - emergency bypass packet は provisional record であり、post-confirm 前の final evidence / final penalty / public explanation の basis にしてはならない。
  canonical_packet_schema:
    packet_identity_fields:
    - witness_packet_id
    - packet_class_ref
    - packet_schema_version_ref
    - packet_digest
    - generation_time
    - generator_authority_ref
    - source_system_family_ref
    session_basis_fields:
    - session_id_ref
    - scenario_ref
    - lawful_purpose_ref
    - scope_packet_digest_ref
    - reveal_scope_ref
    - audience_binding_ref
    - supervised_session_ref_or_null
    - request_event_ref
    witness_composition_fields:
    - append_only_precommit_ref
    - hsm_attestation_ref_or_null
    - human_observer_credential_ref_or_null
    - witness_component_set
    - witness_independence_class_ref
    - observer_challenge_ref_or_null
    authority_and_charter_fields:
    - charter_ref
    - charter_version_ref
    - authority_tier_ref
    - authority_decision_ref
    - domain_exception_basis_ref_or_null
    - exception_lane_ref_or_null
    - approval_or_post_confirm_due
    scope_and_continuity_fields:
    - duplicate_discard_digest_ref_or_null
    - root_profile_ref_or_null
    - compression_grade_ref_or_null
    - collision_witness_ref_or_null
    - bridge_token_proof_ref_or_null
    - archive_manifest_digest_ref_or_null
    - export_local_pseudonym_ref_or_null
    - lineage_slice_ref_or_null
    outcome_and_duty_fields:
    - session_outcome_ref
    - post_confirm_owner_ref
    - reseal_event_ref_or_null
    - revoke_event_ref_or_null
    - archive_promotion_state
    - downstream_usage_cap_ref
    privacy_and_retention_fields:
    - redaction_class_ref
    - recipient_class_ref
    - retention_bucket_ref
    - visibility_class_ref
    - non_reuse_clause_ref_or_null
    - purge_or_hold_state_ref
    packet_class_policy:
      internal_supervised:
        statement: same-tenant / bounded internal review の監査 packet。charter_ref は mandatory だが、bridge token proof と archive manifest digest は recipient-visible continuity がない限り optional とする。
      external_protected_audit:
        statement: cross-tenant / cross-jurisdiction / protected external audit の canonical packet。charter_ref、append-only precommit、required witness、bridge token proof、archive manifest digest を mandatory とする。
      emergency_bypass_record:
        statement: provisional containment の監査 packet。exception lane、post-confirm due、auto-reseal / revoke path を mandatory とし、archive_promotion_state は provisional に固定する。
      post_confirm_outcome_record:
        statement: authority post-confirm 後の最終 packet。confirm outcome、continued hold / revoke / reseal の分岐、archive promotion judgement を束ねる。
  central_delegation_charter_schema:
    identity_fields:
    - charter_id
    - charter_kind_ref
    - charter_version_ref
    - issuing_authority_ref
    - ratification_event_ref
    - effective_window
    - supersession_ref_or_null
    authority_scope_fields:
    - authority_tier_ref
    - tenant_relation_scope
    - jurisdiction_family_scope
    - protected_facet_scope
    - reveal_scope_cap
    - recipient_class_cap
    - allowed_session_mode_set
    delegation_boundary_fields:
    - allowed_action_family_set
    - forbidden_action_family_set
    - domain_exception_admissibility_rule
    - required_witness_floor
    - required_charter_template_ref_or_null
    - non_delegable_boundary_set
    sla_and_exception_fields:
    - activation_sla
    - review_sla
    - emergency_bypass_sla
    - post_confirm_sla
    - exception_lane_set
    - escalation_path_ref
    duty_and_linkage_fields:
    - post_confirm_owner_ref
    - archive_linkage_policy_ref
    - bridge_token_policy_ref
    - duplicate_digest_usage_policy_ref
    - observer_independence_policy_ref
    - revoke_and_suspend_rule_ref
    charter_kind_policy:
      central_template:
        statement: cross-boundary external audit の global baseline。authority family / witness floor / non-delegable boundary を規定する。
      central_delegation:
        statement: central_authority が domain または delegated reviewer へ bounded scope を委任する charter。template 逸脱を許さない。
      domain_delegation:
        statement: same-tenant / same-jurisdiction / pre-ratified bounded scope に限る domain-local charter。cross-boundary final confirm を許さない。
      emergency_exception_charter:
        statement: life-safety / active compromise の provisional lane 用 charter。single named principal・short TTL・post-confirm duty を mandatory とする。
  linkage_rules:
  - audit witness packet は常に charter_ref を持ち、packet digest 単体で lawful continuity を主張してはならない。
  - duplicate_discard_digest を packet に結ぶ場合、root_profile_ref と compression_grade_ref を同時に保持し、external_protected_audit / post_confirm_outcome_record では lossless_canonical 以外を許さない。
  - export-local pseudonym または redacted lineage slice を external continuity に使う場合、bridge_token_proof_ref を mandatory とし、source stable pseudonym を packet 外面へ露出しない。
  - deterministic replay / forensic replay / protected external audit / public_or_external_commitment へ接続する packet では archive_manifest_digest_ref を mandatory とする。
  - emergency_bypass_record は exception_lane_ref と post_confirm_owner_ref を mandatory とし、post-confirm 前に final evidence / final penalty / public explanation へ流用してはならない。
  - central_delegation charter は allowed_action_family_set と non_delegable_boundary_set を同時に持ち、delegated reviewer を authority tier の代用にしてはならない。
  - domain_delegation charter は same-tenant・same-jurisdiction・bounded reveal の範囲でだけ有効とし、cross-tenant / cross-jurisdiction final confirm を開いてはならない。
  decision_ledger_graph_engine_archive_split:
    DecisionLedger:
    - witness_packet_id と packet_digest
    - charter_ref と authority_decision_ref
    - effective reveal / recipient / SLA cap
    - exception lane と post-confirm owner
    - duplicate digest / bridge token / archive manifest linkage judgement
    GraphEngine:
    - append_only_precommit_ref
    - hsm_attestation_ref
    - human_observer_credential_ref
    - auto-reseal / revoke / reseal timer event
    - supervised session / export bundle execution ref
    archive_object:
    - witness_packet_digest
    - charter_digest
    - archive_manifest_digest
    - post_confirm outcome bundle
    GraphLint:
    - packet class / charter kind / linkage state の lint のみ保持する
    - clear identity、direct contact route、witness private material、full envelope payload を保持しない
  prohibited_shortcuts:
  - packet digest だけで authority scope や lawful continuity を主張する。
  - charter_ref を reviewer memo で代替する。
  - bounded_loss_summary の duplicate digest を external_protected_audit や post_confirm outcome の basis に流用する。
  - bridge token proof を欠いた export-local pseudonym を cross-boundary packet へ入れる。
  - archive manifest digest を欠いた packet で deterministic / forensic / protected external replay を主張する。
  - delegated reviewer や external auditor を authority tier / witness independence の代用にする。
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  - jurisdiction family / authority family の finer taxonomy を central delegation charter の registry にどこまで落とすか
  - tenant merge / split を伴う lawful continuity で bridge token / lineage slice / charter chain をどう接続するか
audit_witness_external_serialization_notation_governance:
  status: provisional_fixed
  statement: audit_witness_external_serialization_notation_governance とは、HSM attestation packet と human observer credential を外部伝達可能な vendor-neutral notation として扱うとき、semantic registry layer・canonical serialization layer・raw vendor evidence layer を分離し、challenge / freshness / replay / post-confirm duty を比較可能な detached canonical envelope として固定する規則である。
  core_claims:
  - external serialization notation は raw vendor blob をそのまま比較対象にすることではなく、registry ref・binding ref・canonical digest を持つ detached canonical envelope を正本にすることである。
  - semantic registry layer は class/profile の意味を管理し、canonical serialization layer は外部比較可能な field family を管理し、raw vendor evidence layer は quote・certificate chain・transcript・screen artifact などの製品依存物を digest-bound adjunct として従属保持する。
  - challenge binding・freshness binding・replay binding・post-confirm duty は別スロットであり、timestamp、packet digest、observer 名義などの単一要素で相互代用してはならない。
  - human observer credential は witness / reviewer credential であり、authority family や final approver の代用ではない。
  serialization_layers:
    semantic_registry_layer:
      statement: attestation class / profile、observer credential class / profile、verification_method_class、independence floor、custody floor、downgrade barrier を管理する意味層。
      owned_by:
      - audit_witness_profile_registry_governance
    canonical_serialization_layer:
      statement: external comparison、archive linkage、recipient-bound export、migration alias 判定に使う detached canonical envelope 層。field family と canonicalization profile を持つ。
      owned_by:
      - audit_witness_external_serialization_notation_governance
    raw_vendor_evidence_layer:
      statement: HSM quote、certificate chain、vendor receipt、session transcript、screen recording、device measurement blob などの製品依存 artifact を保管する層。canonical core には digest / ref だけを残す。
      owned_by:
      - archive object / external evidence adjunct
  canonical_field_families:
    common_identity_and_profile:
    - notation_kind_ref
    - notation_profile_ref
    - canonicalization_profile_ref
    - registry_epoch_ref
    - class_ref
    - profile_ref
    - issuer_handle_ref
    - subject_handle_ref_or_pseudonym_ref
    - packet_digest
    - raw_vendor_artifact_digest_ref_or_null
    scope_authority_and_custody:
    - session_basis_ref
    - scope_packet_digest_ref
    - reveal_scope_ref_or_cap_ref
    - audience_binding_ref_or_null
    - lawful_purpose_ref
    - charter_ref
    - authority_decision_ref_or_null
    - custody_boundary_ref_or_null
    challenge_freshness_replay:
    - challenge_bundle_ref_or_null
    - challenge_outcome_ref_or_null
    - freshness_anchor_ref
    - freshness_window_ref
    - replay_binding_ref
    - recipient_binding_ref_or_null
    lifecycle_and_continuity:
    - archive_manifest_digest_ref_or_null
    - bridge_token_proof_ref_or_null
    - validity_window_ref
    - revocation_handle_ref_or_null
    - supersession_ref_or_null
    - post_confirm_due_ref_or_null
    - post_confirm_owner_or_duty_ref_or_null
    hsm_attestation_specific:
    - attested_measurement_digest_ref
    - device_class_ref
    - signer_class_ref
    - detached_signature_container_ref
    observer_credential_specific:
    - observer_role_profile_ref
    - independence_attestation_ref
    - contact_route_mode_ref
    - session_presence_ref
    - reuse_prohibition_ref
  notation_profile_registry:
    hsm_attestation_packet:
      hsm_detached_receipt:
        statement: same-tenant bounded exchange 向けの最小 detached canonical receipt。raw quote digest と semantic profile ref を束縛するが、recipient-scoped replay guard は必須にしない。
        mandatory_bindings:
        - session_basis_ref
        - scope_packet_digest_ref
        - lawful_purpose_ref
        - charter_ref
        - freshness_anchor_ref
        - packet_digest
      hsm_custody_external_bundle:
        statement: cross-boundary / protected reveal / external audit 向けの custody-bound bundle。recipient binding、archive linkage、custody boundary を mandatory とする。
        mandatory_bindings:
        - custody_boundary_ref
        - audience_binding_ref_or_null
        - replay_binding_ref
        - archive_manifest_digest_ref_or_null
        - packet_digest
      hsm_challenge_emergency_bundle:
        statement: emergency containment または clear-identity / direct-contact reveal を伴う場合の challenge-bound bundle。challenge bundle と explicit post-confirm duty を mandatory とする。
        mandatory_bindings:
        - challenge_bundle_ref_or_null
        - challenge_outcome_ref_or_null
        - freshness_anchor_ref
        - replay_binding_ref
        - post_confirm_due_ref_or_null
    human_observer_credential:
      observer_scoped_session_credential:
        statement: supervised session の presence・scope cap・independence claim を示す基本 credential。interactive reveal がない限り challenge-bound を強制しない。
      observer_challenge_bound_credential:
        statement: challenge / response と session presence を束縛する observer credential。clear identity / direct contact / emergency bypass を含む reveal で mandatory になる。
      observer_post_confirm_reviewer_credential:
        statement: authority_outcome 後の post-confirm review / reseal / revoke judgement を担う reviewer credential。session-start witness や authority family の代用にはしない。
  admissibility_rules:
    canonical_comparison_basis:
    - 外部比較は canonical serialization layer 上の packet_digest と required binding field で行い、raw vendor blob の byte 列一致を canonical equality とみなさない。
    - notation_profile_ref と canonicalization_profile_ref が一致するか、alias-preserving migration / monotone strengthening が registry で明示されている場合にだけ比較可能とする。
    challenge_binding:
    - clear identity、direct contact route、emergency bypass、observer challenge class を含む場合は challenge_bundle_ref と challenge_outcome_ref を mandatory とする。
    - observer 名義や transcript 添付だけで challenge 実施済みとみなしてはならない。
    freshness_binding:
    - freshness は append_only_precommit / nonce-counter window / challenge round-trip / authority outcome window のいずれかの anchor で束縛する。
    - external audit と emergency bypass では wall-clock timestamp 単独を freshness anchor とみなしてはならない。
    replay_binding:
    - packet_digest 単独では replay guard にならず、session・recipient・purpose・archive・bridge のどの reuse を禁止するかを replay_binding_ref で明示する。
    - recipient-visible continuity や external replay を許す場合は archive_manifest_digest_ref、bridge continuity を伴う場合は bridge_token_proof_ref も mandatory とする。
    post_confirm_duty:
    - emergency provisional reveal、post-confirm pending の external protected audit、recipient-visible provisional export では post_confirm_due と owner / duty ref を mandatory とする。
    - observer_post_confirm_reviewer_credential は authority_outcome 前の provisional witness を finalize する根拠に使ってはならない。
  context_matrix:
    local_context:
      mandatory_hsm_profiles:
      - hsm_detached_receipt
      conditional_hsm_profiles:
      - hsm_custody_external_bundle if protected_facet=true or external replay is intended
      optional_observer_profiles:
      - observer_scoped_session_credential
      forbidden_profiles:
      - observer_post_confirm_reviewer_credential as session-start witness
      - hsm_challenge_emergency_bundle without emergency trigger
    central_context:
      mandatory_hsm_profiles:
      - hsm_custody_external_bundle
      conditional_hsm_profiles:
      - hsm_challenge_emergency_bundle if direct named notification or provisional reveal is used
      conditional_observer_profiles:
      - observer_challenge_bound_credential if clear identity or direct contact route is included
      forbidden_profiles:
      - hsm_detached_receipt as sole basis for cross-boundary reveal
    emergency_context:
      mandatory_hsm_profiles:
      - hsm_challenge_emergency_bundle
      mandatory_observer_profiles:
      - observer_challenge_bound_credential
      mandatory_lifecycle_bindings:
      - post_confirm_due_ref_or_null
      - post_confirm_owner_or_duty_ref_or_null
      forbidden_profiles:
      - observer_scoped_session_credential alone
      - hsm_detached_receipt alone
    external_audit_context:
      mandatory_hsm_profiles:
      - hsm_custody_external_bundle
      conditional_hsm_profiles:
      - hsm_challenge_emergency_bundle if clear identity or direct named route is used
      conditional_observer_profiles:
      - observer_challenge_bound_credential if named / interactive route is used
      - observer_post_confirm_reviewer_credential only after authority_outcome stage
      forbidden_profiles:
      - hsm_detached_receipt as external audit replay basis
  responsibility_split:
    DecisionLedger:
    - notation_profile_ref、canonicalization_profile_ref、registry_epoch_ref、migration_alias_ref、post_confirm duty を正本記録する。
    - semantic profile registry と notation profile registry の対応を記録し、mixed-profile without alias を禁止する。
    GraphEngine:
    - session_basis・challenge bundle・freshness anchor・custody boundary・replay binding の存在と相互束縛を評価する。
    - charter / authority / archive / bridge continuity との dependency を解決する。
    GraphLint:
    - raw vendor blob の canonical 昇格、timestamp-only freshness、packet-digest-only replay guard、observer credential の authority 化、post-confirm duty 欠落を lint する。
    archive_object:
    - canonical envelope digest、raw vendor artifact digest、challenge transcript digest、bridge / archive linkage digest を immutable に保持する。
    - canonical core と raw evidence adjunct の boundary を崩さず、外部 export 時にも canonical envelope を基準に再構成する。
  prohibited_shortcuts:
  - raw vendor quote、PDF receipt、screen capture を canonical comparison object とみなす。
  - timestamp だけで freshness を満たしたとみなす。
  - packet_digest だけで replay guard を満たしたとみなす。
  - observer credential を authority family や final approver として数える。
  - emergency bundle から post_confirm_due / owner を落としたまま external reveal を通す。
  - migration alias なしに旧 notation profile と新 notation profile を同一 packet へ混在させる。
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
audit_witness_notation_core_separation_governance:
  status: provisional_fixed
  statement: audit_witness_notation_core_separation_governance とは、HSM attestation packet と human observer credential に含まれる raw measurement claim・algorithm suite・extension field を、notation core・extension registry・raw evidence adjunct の三者へ分離し、比較可能性と監査可能性を壊さずに context ごとの admissibility を制御する統治規則である。
  core_claims:
  - raw measurement claim は raw quote、PCR / register tuple、device measurement blob、session transcript excerpt をそのまま notation core に置かず、comparison-stable な projection / digest / semantics family に縮約して保持する。
  - algorithm suite は concrete OID、COSE alg、curve parameter、certificate extension detail の literal 集合を core に残さず、admissibility / comparability / anti-downgrade 判定に必要な algorithm_suite_profile_ref と suite_strength_class_ref_or_null へ正規化する。互換性・migration alias・downgrade barrier は extension registry 側で管理する。
  - extension field は core へ自由挿入せず、meaning-affecting かつ registered な extension だけを registered_extension_set_ref_or_null / critical_extension_digest_ref_or_null として registry 昇格させる。unregistered extension payload は raw evidence adjunct に留め、central / emergency / external-audit では current basis や external comparison basis に使わない。
  - challenge / freshness / replay / post-confirm duty は separation 後も独立 binding であり、raw measurement claim、algorithm literal、extension payload のいずれでも単独代用してはならない。
  core_vs_extension_matrix:
    raw_measurement_claim:
      notation_core:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      extension_registry:
      - measurement_projection_profile_registry
      - claim_semantics_registry
      - projection_migration_alias_ref_or_null
      - context_admissibility_binding_ref
      raw_evidence_adjunct:
      - vendor_quote_or_measurement_blob
      - register_or_pcr_tuple
      - certificate_chain_or_vendor_statement
      - transcript_or_screen_artifact
    algorithm_suite:
      notation_core:
      - algorithm_suite_profile_ref
      - suite_strength_class_ref_or_null
      extension_registry:
      - suite_compatibility_family_ref
      - anti_downgrade_policy_ref
      - suite_alias_or_supersession_ref_or_null
      raw_evidence_adjunct:
      - concrete_oid_or_cose_alg_values
      - vendor_parameter_blob
      - certificate_extension_detail
    extension_field:
      notation_core:
      - registered_extension_set_ref_or_null
      - critical_extension_digest_ref_or_null
      extension_registry:
      - extension_profile_ref
      - extension_field_family_registry
      - criticality_rule_ref
      - context_admissibility_rule_ref
      raw_evidence_adjunct:
      - unregistered_vendor_extension_blob
      - display_only_metadata
      - transport_specific_wrapper
  context_matrix:
    local_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      conditional_extension_families:
      - algorithm_suite_profile_ref if local comparison barrier or downgrade barrier depends on suite family
      - registered_extension_set_ref_or_null if extension meaning affects later cross-boundary reuse
      allowed_raw_adjunct:
      - vendor_quote_or_measurement_blob
      - transcript_or_screen_artifact
      - concrete_oid_or_cose_alg_values
      forbidden:
      - unregistered extension payload を current basis や external comparison basis に昇格する
      - raw measurement claim の byte 列や literal tuple を canonical equality 判定へ直接投入する
    central_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      - algorithm_suite_profile_ref
      conditional_extension_families:
      - registered_extension_set_ref_or_null if any meaning-affecting extension is present
      - critical_extension_digest_ref_or_null if protected facet or downgrade-sensitive path is involved
      forbidden:
      - algorithm literal だけで suite comparability を主張する
      - unregistered critical extension を silent ignore したまま central review を通す
    emergency_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      - algorithm_suite_profile_ref
      mandatory_bindings:
      - challenge_bundle_ref_or_null
      - challenge_outcome_ref_or_null
      - freshness_anchor_ref
      - replay_binding_ref
      - post_confirm_due_ref_or_null
      - post_confirm_owner_or_duty_ref_or_null
      allowed_extensions:
      - emergency_whitelisted_extension_profile_ref only
      forbidden:
      - raw-only extension payload を理由に emergency reveal の admissibility を変える
      - algorithm suite profile を欠いたまま emergency challenge bundle を current basis にする
    external_audit_context:
      mandatory_core_families:
      - attested_measurement_digest_ref
      - measurement_projection_profile_ref
      - claim_semantics_ref
      - algorithm_suite_profile_ref
      mandatory_extension_families:
      - registered_extension_set_ref_or_null if any extension affects interpretation or replay continuity
      - critical_extension_digest_ref_or_null if protected facet or suite migration is involved
      forbidden:
      - hsm raw quote や observer transcript だけを external audit comparison object にする
      - unregistered extension payload を external current basis や replay basis に使う
  responsibility_split:
    DecisionLedger:
    - measurement_projection_profile_ref、claim_semantics_ref、algorithm_suite_profile_ref、suite_strength_class_ref_or_null、registered_extension_set_ref_or_null、critical_extension_digest_ref_or_null、migration alias を正本記録する。
    - semantic profile registry と notation core projection registry の対応、および extension criticality rule を記録する。
    GraphEngine:
    - context ごとの mandatory / conditional / forbidden 判定を実行し、challenge / freshness / replay / post-confirm duty との依存を解決する。
    - projection profile・suite profile・extension profile の alias / supersession / anti-downgrade 判定を行う。
    GraphLint:
    - raw measurement claim の core 混入、algorithm literal の core 比較、unregistered extension の silent promotion、critical extension digest 欠落、suite downgrade without alias を lint する。
    archive_object:
    - canonical envelope digest と raw vendor evidence adjunct digest を immutable に保持し、core/extension/adjunct の boundary を崩さない。
  prohibited_shortcuts:
  - raw quote、register tuple、transcript excerpt を canonical core field としてそのまま比較する。
  - concrete OID / COSE alg / parameter blob を registry ref なしに comparability や admissibility の根拠に使う。
  - unregistered extension payload を central / emergency / external-audit の current basis に昇格する。
  - measurement claim / algorithm suite / extension field のいずれか単独で challenge / freshness / replay / post-confirm duty を満たしたとみなす。
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
measurement_projection_profile_governance:
  status: provisional_fixed
  statement: measurement_projection_profile_governance とは、raw measurement bundle から comparison-stable projection を作る粒度、複数 raw field の lawful collapse 条件、registered extension と critical extension の昇格境界を registry 化し、local / central / emergency / external-audit の各 context で current basis に使える投影だけを制御する統治規則である。
  four_layer_partition:
    raw_measurement_bundle: vendor quote、register tuple、sensor transcript、parameter blob、screen artifact、timestamp 群、source-local metadata を含む原始測定束である。比較や current basis に直接使わず、digest / ref で保持する。
    comparison_stable_projection: 比較可能性に必要な core family だけを残した canonical projection であり、measurement_projection_profile_ref・measurement_scope_ref・claim_semantics_ref・attested_measurement_digest_ref を最小核とする。
    registered_extension: projection core に入らないが意味解釈・比較条件・operator rule を左右する追加情報であり、registry ref で束縛する。
    critical_extension: registered extension のうち、current basis・protected facet・admissibility・replay / reveal continuity・anti-downgrade に影響するものだけを昇格させ、digest と notice duty を伴って扱う。
  granularity_classes:
    atomic_projection:
      statement: 1つの raw measurement family を1つの canonical claim family へ写す粒度である。
      admissible_usage:
      - local
      - central
      - emergency
      - external_audit
    normalized_projection:
      statement: unit / code / naming の正規化を伴うが、意味と比較順序を変えない粒度である。
      admissible_usage:
      - local
      - central
      - emergency
      - external_audit
    bounded_aggregate_projection:
      statement: 複数 raw slot を registry 済み aggregation operator で collapse する粒度である。source cardinality、window class、composition digest、uncertainty bound を伴う場合にだけ comparison-stable とみなす。
      admissible_usage:
      - local
      - central_conditional
      - emergency_conditional
      - external_audit_conditional
    advisory_summary_projection:
      statement: pass/fail・traffic-light・one-line digest のような要約粒度である。current basis や replay basis には使わず、local diagnostic / recipient preview の補助に限る。
      admissible_usage:
      - local_conditional
  projection_core_family_matrix:
    always_in_projection_core:
    - measurement_projection_profile_ref
    - measurement_scope_ref
    - claim_semantics_ref
    - attested_measurement_digest_ref
    conditional_core_families:
      normalization_or_unit_family_ref: unit / code / scale の正規化が identity でない場合は mandatory
      aggregation_operator_ref: 複数 raw field を collapse する場合は mandatory
      observation_window_class_ref: time/window/sampling collapse がある場合は mandatory
      source_cardinality_ref: multi-source / multi-register collapse がある場合は mandatory
      composition_digest_ref_or_null: bounded_aggregate_projection を external comparison・replay・current basis に使う場合は mandatory
      uncertainty_or_tolerance_class_ref_or_null: 省略すると pass/fail や ordering が変わる場合は mandatory
      algorithm_suite_profile_ref_or_null: suite family が comparability・anti-downgrade・admissibility に関与する context では mandatory
      registered_extension_set_ref_or_null: meaning-affecting extension がある場合は mandatory
      critical_extension_digest_ref_or_null: critical extension が1つでもある場合は mandatory
    raw_bundle_only:
    - vendor_quote_or_measurement_blob
    - register_tuple_sequence
    - parameter_blob
    - screen_or_transcript_artifact
    - display_only_metadata
  lawful_collapse_rules:
    lawful_when:
    - collapse 前後で claim_semantics_ref、measurement_scope_ref、protected facet が不変である
    - used operator が measurement_projection_profile に登録され、aggregation_operator_ref または normalization ref として明示されている
    - multi-source / multi-window collapse では source_cardinality_ref、observation_window_class_ref、composition_digest_ref_or_null がある
    - collapse により ordering や pass/fail が変わりうる場合、uncertainty_or_tolerance_class_ref_or_null または threshold profile ref が束縛されている
    - raw bundle への trace-back が digest / manifest で可能であり、silent information loss にならない
    forbidden_when:
    - time window や source set が異なる raw slot を window class や composition digest なしに1値へ潰す
    - protected facet、reveal scope、replay continuity、challenge duty に効く差分を summary flag に埋め込んで core から落とす
    - pass/fail summary や color code を atomic / normalized projection の代用 current basis に使う
    - local 用 advisory summary を central / emergency / external_audit の comparison basis へ昇格する
  critical_extension_promotion:
    promote_to_critical_when:
    - extension が claim semantics、scope boundary、unit family、aggregation admissibility を変える
    - extension が suite downgrade barrier、protected facet interpretation、recipient-visible reveal cap を変える
    - extension が replay / challenge / post-confirm continuity の required duty を増減させる
    - extension を落とすと central / emergency / external_audit の current basis 可否が変わる
    keep_as_registered_noncritical_when:
    - display-only metadata や local UI helper のように意味・admissibility・continuity を変えない
    - raw adjunct から再生できても current basis の比較結果を変えない
  context_matrix:
    local_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      - advisory_summary_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      conditional:
      - aggregation_operator_ref for collapsed comparison
      - composition_digest_ref_or_null when later cross-boundary reuse is intended
      - critical_extension_digest_ref_or_null when local output may later become recipient-visible or central basis
      forbidden:
      - advisory summary を raw trace-back なしの authoritative local current にする
    central_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      - aggregation_operator_ref when collapsed
      - algorithm_suite_profile_ref if comparability or downgrade barrier depends on suite
      conditional:
      - source_cardinality_ref
      - observation_window_class_ref
      - composition_digest_ref_or_null
      - uncertainty_or_tolerance_class_ref_or_null
      - critical_extension_digest_ref_or_null
      forbidden:
      - advisory_summary_projection を central review current basis に使う
      - critical extension を registered だけで済ませて digest / notice duty を落とす
    emergency_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      - algorithm_suite_profile_ref
      - challenge_bundle_ref_or_null
      - freshness_anchor_ref
      - replay_binding_ref
      - post_confirm_due_ref_or_null
      conditional:
      - bounded_aggregate_projection は immediate containment に必要な場合だけ許し、composition_digest_ref_or_null と critical_extension_digest_ref_or_null を伴う
      forbidden:
      - raw-only collapse や advisory summary を emergency reveal / current basis に使う
      - critical extension 未束縛のまま protected facet に触れる
    external_audit_context:
      allowed_projection_classes:
      - atomic_projection
      - normalized_projection
      - bounded_aggregate_projection
      mandatory:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      - algorithm_suite_profile_ref when suite family is part of comparability claim
      - composition_digest_ref_or_null for any collapsed projection that is audit-visible
      - critical_extension_digest_ref_or_null when interpretation or replay continuity is affected
      forbidden:
      - advisory_summary_projection を audit comparison object に使う
      - raw measurement quote だけで comparison-stable projection の代用を主張する
      - critical extension を omission したまま alias-equivalent と扱う
  responsibility_split:
    DecisionLedger:
    - measurement_projection_profile_ref、granularity_class、allowed_collapse_operator_set、critical_extension_rule_ref、projection migration alias / successor を正本記録する。
    - どの collapse が local-only / central admissible / emergency conditional / external-audit admissible かを profile ごとに authoritative に判定する。
    GraphEngine:
    - 実際の packet / claim ごとに core family の充足、collapse witness、critical extension digest、challenge / replay / post-confirm duty の存在を評価する。
    - issue_time / context / recipient visibility に応じて advisory summary の昇格禁止、collapsed projection の current-basis admissibility、profile alias / supersession を駆動する。
    GraphLint:
    - summary-only current basis、operator 無記録 collapse、scope/window/source 混在 collapse、critical extension silent drop、raw blob の core 混入を検査する。
    archive_object:
    - raw measurement bundle digest、composition manifest digest、projection manifest digest、critical extension manifest digest を immutable に保持する。
  migration_barriers:
  - granularity_class が advisory_summary_projection から comparison-stable class へ変わる場合は alias ではなく successor / review を要する。
  - aggregation operator、window class、source cardinality requirement、uncertainty binding のいずれかが変わる場合は semantic delta として扱い、silent alias migration を禁止する。
  - critical extension の判定結果が変わる profile change は migration ではなく bounded または material successor として扱う。
  prohibited_shortcuts:
  - register tuple の個数や source set を隠したまま aggregated scalar だけを comparison object とみなす。
  - pass/fail、traffic-light、one-line digest を current basis や replay basis の代用にする。
  - critical extension を display-only metadata 扱いして digest と notice duty を落とす。
  - raw bundle の trace-back なしに collapsed projection を alias-equivalent と主張する。
  residual_open_points: []
ratified_unreflected_provisional_binding_governance:
  status: provisional_fixed
  statement: ratified_unreflected_provisional_binding_governance とは、adjudication case の outcome が ratified 済みだがまだ reflected されていないとき、その outcome を authoritative binding とみなさず、reflection preparation・bounded internal preview・厳格条件付き provisional recipient-visible export にだけ限定して provisional に使う統治規則である。
  core_claims:
  - authoritative binding は reflected 後だけ成立する。ratified-unreflected outcome は制度承認済みの resolution candidate ではあるが、current decision・coverage・route gating・hold release の正本 basis にはならない。
  - provisional use は、future reflection を準備する internal operation と、active / reflected basis が既に lawful に覆っている branch-preserving operation に限る。unreflected outcome 単独で approval path・required authority・accountability・rollback expectation を変更してはならない。
  - coverage では provisional preview と authoritative coverage を分ける。ratified-unreflected outcome は simulation / impact analysis / successor draft には使えても、shared_core・intersection_safe・target isolation・blocking veto clear の basis には使えない。
  - recipient-visible export は例外であり、named recipient、explicit provisional label、expiry、contradiction / supersession notice path、archive / bridge continuity、post-reflection follow-up を備える central lane の controlled provisional packet に限って conditional に許す。
  lifecycle_partition:
    open: 未 ratified。outcome 自体が未承認であり、provisional binding も許されない。
    ratified_unreflected: outcome は承認済みだが reflection_ops が未完了。preview / preparation / conditioned provisional export だけを許し、authoritative reliance は禁止する。
    reflected: outcome が V / route / basis / charter に反映済み。以後は通常の authoritative binding として扱える。
  use_surface_matrix:
    current_decision:
      allowed:
      - reflection_ops の起票、successor draft、review queue ordering、contradiction check などの non-authoritative preparation
      conditional:
      - active / reflected basis が別に存在し、その basis だけで lawful な branch-preserving local diagnostic / containment を行う際に、ratified-unreflected outcome を preview metadata として添付すること
      forbidden:
      - required authority、approval path、accountability owner、rollback expectation、external commitment を変える current decision の正当化
      - branch collapse、final approver fix、risk cap relaxation、policy reinterpretation 完了とみなすこと
    coverage:
      allowed:
      - successor basis 生成前の provisional coverage preview、impact simulation、delta explanation
      conditional:
      - covered / uncovered の確定ではなく、reflection pending を明示した preview label 付き internal comparison
      forbidden:
      - shared_core、intersection_safe、target isolation basis、blocking veto clear、branch-critical coverage satisfaction の basis に使うこと
    route_gating:
      allowed:
      - reflection-only route、archive prep、recipient notice prep、successor activation check の起票
      conditional:
      - active route を保持したまま、successor route の dry-run / validation queue を作ること
      forbidden:
      - active approval route の切替、fallback 完了扱い、gate bypass、timeout clear を unreflected outcome だけで行うこと
    hold_release:
      allowed: []
      conditional:
      - hold family の名称を conflict_pending から reflection_pending へ変える内部整理。ただし governance hold 自体は残すこと
      forbidden:
      - branch-critical hold、policy block、recipient-visible hold、external commitment hold を解除すること
      - head clear、bundle clear、q_decision>=2 の根拠に使うこと
    recipient_visible_export:
      allowed: []
      conditional:
      - named recipient に限定され、explicit provisional label、expiry、contradiction / supersession notice path、archive manifest digest、必要時 bridge token linkage、post-reflection follow-up owner が揃う controlled provisional packet
      forbidden:
      - public explanation、irreversible commitment、silent replacement、recipient-visible continuity の final basis、contradiction 発生後の無通知継続
  context_and_authority_rules:
    local_same_tenant_internal:
      statement: domain-local review / preparation では preview と reflection preparation を許す。ただし reflected basis を持たない authoritative action は禁止する。
    central_or_cross_jurisdiction:
      statement: central lane は provisional export と contradiction handling を統括できるが、それでも authoritative route switch と hold release は reflected 後に限定する。
    emergency_containment:
      statement: emergency lane は containment / notification prep を早められるが、ratified-unreflected outcome を steady-state authority の代用にしてはならない。
    external_audit_or_recipient_visible:
      statement: recipient-visible provisional export は named recipient・lawful purpose・archive/bridge continuity・revocation/notice duty が揃う場合だけ conditional に許す。public / anonymous / irreversible 方向は forbidden とする。
  contradiction_and_lifecycle_rules:
    expiry:
    - provisional packet は expiry と review_due を持ち、期限超過後は active basis へ自動昇格せず失効させる。
    supersession:
    - successor reflected outcome が成立したとき、旧 provisional packet は superseded として recipient notice と archive linkage を残す。
    rollback_and_contradiction:
    - contradiction、rollback、reflection failure、authority withdrawal が起きたとき、provisional export は explicit notice path を通じて revoke / correct / narrow しなければならない。
    - silent replacement、silent expiry、local memo だけでの cleanup を禁止する。
  responsibility_split:
    DecisionLedger: adjudication lifecycle、provisional_binding_class、allowed_surface_set、expiry、recipient set、notice / follow-up duty、supersession / contradiction link の正本を持つ。
    GraphEngine: reflection_ops、active route 維持、head_clear 禁止、expiry 到達、contradiction 発火、recipient notice queue を永続化する。
    GraphLint: unreflected outcome の authoritative use、shared_core coverage 化、route switch、hold release、silent provisional export、notice 欠落を検査する。
    archive_object: provisional packet digest、recipient scope、expiry、contradiction notice、supersession lineage の immutable linkage を保持する。
  prohibited_shortcuts:
  - ratified だからほぼ reflected とみなして active route を切り替えること
  - provisional coverage preview を shared_core coverage と読み替えること
  - reflection pending の hold を解除したことにすること
  - recipient-visible provisional export を post-confirm duty や contradiction notice なしで配ること
  - public explanation や irreversible commitment を provisional packet だけで正当化すること
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
provisional_recipient_visible_export_notice_governance:
  status: provisional_fixed
  statement: provisional_recipient_visible_export_notice_governance とは、authoritative reflection 前または controlled post-confirm で recipient-visible に出される provisional packet を packet class ごとに分離し、contradiction・rollback・supersession・expiry・reflection completion に応じた revoke / correct / narrow / follow-up notice の duty を registry 化して、recipient continuity と監査可能性を壊さないよう統治する規則である。
  core_claims:
  - recipient-visible provisional export は単一の操作ではなく、current_decision_preview・bounded_preview・emergency_reveal・post_confirm_follow_up の4 packet class に分ける。各 class は許される recipient、claim surface、action expectation、continuity requirement が異なる。
  - recipient-visible provisional packet は、packet_class、explicit provisional label、named recipient scope、expiry、notice plan、follow-up owner、predecessor/successor lineage を持たなければならない。contradiction / rollback / supersession / expiry が起きた packet を silent replacement または silent expiry で終わらせてはならない。
  - revoke は lawful basis 自体が失効したときに使い、correct は recipient scope / commitment class / reveal class を広げない successor correction に限定し、narrow は reveal scope / recipient scope / claim surface を単調減少で狭める replacement に限定する。follow-up notice は reflected successor または final closure が出た後に、受信済み recipient へ outcome を接続する義務である。
  - public explanation と anonymous broad distribution は既定で forbidden とし、recipient-visible provisional packet は named recipient または bounded recipient set に限定する。public-facing explanation が必要な場合は provisional packet ではなく別の redacted / ratified communication lane を使う。
  - archive / bridge continuity は packet class と context に応じて mandatory 化し、cross-boundary reuse、external audit、emergency reveal、recipient-visible continuity を伴う packet では archive manifest digest と bridge token proof を欠いてはならない。
  packet_classes:
    current_decision_preview:
      statement: 現在の意思決定参加者に対し、current decision の provisional state を説明するための最小 packet。action expectation は review / acknowledgment に限り、final commitment を発生させない。
      mandatory_fields:
      - packet_class_ref
      - provisional_label_ref
      - recipient_scope_ref
      - issue_time
      - expiry_at
      - notice_plan_ref
      - follow_up_owner_ref
      forbidden:
      - irreversible commitment の要求
      - public explanation への流用
      - archive / bridge continuity を欠いた cross-boundary reuse
    bounded_preview:
      statement: limited recipient に対し preview / preparation を行う packet。future reflected outcome への provisional anticipation を伝えるが、authoritative route switch や final obligation を生まない。
      mandatory_fields:
      - packet_class_ref
      - provisional_label_ref
      - recipient_scope_ref
      - preview_basis_ref
      - expiry_at
      - notice_plan_ref
      - predecessor_packet_ref_or_null
      - follow_up_owner_ref
      conditional_fields:
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null when cross-boundary continuity is intended
    emergency_reveal:
      statement: containment / safety / time-critical coordination のために緊急で限定開示する packet。steady-state authority の代用にはならず、strict expiry・recall path・post-confirm follow-up を持つ。
      mandatory_fields:
      - packet_class_ref
      - provisional_label_ref
      - recipient_scope_ref
      - emergency_reason_ref
      - issue_time
      - expiry_at
      - notice_plan_ref
      - follow_up_owner_ref
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null
      forbidden:
      - irreversible commitment の要求
      - public broadcast
      - notice plan を欠いた emergency reveal
    post_confirm_follow_up:
      statement: reflected successor または final closure を受信済み recipient へ接続するための follow-up packet。provisional packet の後続であり、新たな provisional reliance を増やすための packet ではない。
      mandatory_fields:
      - packet_class_ref
      - predecessor_packet_ref
      - final_outcome_ref_or_closure_ref
      - recipient_scope_ref
      - follow_up_reason_ref
      - archive_manifest_digest_ref_or_null
  notice_action_family:
    revoke:
      trigger:
      - contradiction が packet の claim surface を維持不能にしたとき
      - rollback / authority withdrawal / reflection failure により lawful basis が消えたとき
      - expiry 超過後も lawful successor を発行できないとき
      constraints:
      - recipient-visible packet には revoke notice を発行しなければならない
      - revoke は active basis への silent fallthrough を許さない
    correct:
      trigger:
      - packet 内容に修正可能な factual / labeling / linkage defect があり、lawful basis は保持されるとき
      constraints:
      - recipient scope を広げてはならない
      - irreversible commitment class を追加してはならない
      - predecessor/successor link を必須とする
    narrow:
      trigger:
      - reveal scope、recipient scope、claim surface、retention / forwardability を狭める必要があるとき
      constraints:
      - monotone narrowing だけを許す
      - broader packet を narrower packet で置き換えるときも notice を要する
    follow_up_notice:
      trigger:
      - reflected successor が成立したとき
      - final closure / revoke / permanent hold が確定したとき
      - emergency reveal の暫定状態を steady-state outcome に接続するとき
      constraints:
      - 受信済み recipient に successor または closure を接続する
      - public explanation へ一般化して代用してはならない
  state_machine:
    states:
    - draft
    - issued_active
    - notice_pending
    - corrected_successor_issued
    - narrowed_successor_issued
    - revoked_closed
    - expired_notice_pending
    - follow_up_closed
    transition_rules:
    - 'draft -> issued_active: issue admissibility と mandatory field family を満たしたとき'
    - 'issued_active -> notice_pending: contradiction / rollback / supersession / expiry / reflection completion が起きたとき'
    - 'notice_pending -> corrected_successor_issued: widening を伴わない correction successor と correction notice が発行されたとき'
    - 'notice_pending -> narrowed_successor_issued: monotone narrowing successor と narrowing notice が発行されたとき'
    - 'notice_pending -> revoked_closed: revoke notice が発行され、active reliance が閉じられたとき'
    - 'notice_pending -> follow_up_closed: reflected successor または final closure の follow-up notice が発行されたとき'
    - 'issued_active -> expired_notice_pending: expiry 到達時に successor も closure notice も未発行のとき'
  context_matrix:
    local_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: conditional
      bridge_continuity: conditional
      post_confirm_follow_up: conditional
      notes:
      - same-team の review / acknowledgment 向け packet を許す
      - cross-boundary reuse または later replay を想定する場合は archive continuity を mandatory に繰り上げる
    central_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: mandatory
      bridge_continuity: conditional
      post_confirm_follow_up: mandatory
      notes:
      - central policy / exception lane では notice owner と successor lineage を必須にする
      - recipient-visible continuity または cross-jurisdiction handoff を伴う場合は bridge continuity も mandatory にする
    emergency_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: mandatory
      bridge_continuity: mandatory
      post_confirm_follow_up: mandatory
      notes:
      - containment 指示や危険回避の bounded action は許すが、steady-state authority の代用は許さない
      - expiry と recall path を欠く emergency reveal は許さない
    external_audit_context:
      named_recipient: mandatory
      public_explanation: forbidden
      irreversible_commitment: forbidden
      archive_continuity: mandatory
      bridge_continuity: mandatory
      post_confirm_follow_up: mandatory
      notes:
      - recipient は audit recipient と lawful purpose で明示束縛し、anonymous publication を禁止する
      - supersession / revoke / correction には immutable archive linkage を必須にする
  responsibility_split:
    DecisionLedger:
    - packet_class、recipient_scope、provisional_label、expiry、notice_plan、follow_up_owner、predecessor/successor lineage、archive / bridge continuity ref を正本化する。
    - notice_action family の trigger、required notice、completion state を event として保持する。
    GraphEngine:
    - contradiction / rollback / supersession / expiry / reflection completion を受けて notice_pending・successor issuance・follow_up_due を遷移させる。
    - context ごとの archive / bridge mandatory 判定、recipient set enforcement、silent replacement 防止を実行する。
    GraphLint:
    - public explanation 化、irreversible commitment 化、silent replacement、silent expiry、widening correction、missing follow-up owner、missing continuity ref を検査する。
    archive_object:
    - packet digest、recipient scope、notice artifact、successor linkage、archive manifest digest、bridge token proof ref を immutable に保持する。
  prohibited_shortcuts:
  - public explanation を provisional packet で代用すること。
  - recipient-visible packet を contradiction 後に silent replacement すること。
  - expiry を revoke / follow-up notice の代わりに使うこと。
  - correction を理由に recipient scope や commitment class を広げること。
  - archive / bridge continuity が必要な packet を local memo だけで置き換えること。
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
provisional_recipient_visible_export_acknowledgment_recall_governance:
  status: provisional_fixed
  statement: provisional_recipient_visible_export_acknowledgment_recall_governance とは、recipient-visible provisional packet に対して、どの packet class / context で recipient acknowledgment を要求し、どの evidence family で contradiction closure・rollback 完了・follow-up closure・recall 完了を判定するかを registry 化し、silent gap と downstream open risk を統治する規則である。
  core_claims:
  - recipient acknowledgment は、named recipient が特定 packet またはその lawful successor / closure notice を受領し、少なくとも recipient-side state transition が起きたことを示す recipient-side evidence である。これは authority approval、truth 判定、contradiction 解消、lawful basis 回復そのものではない。
  - batch recall evidence は、recipient 集合ごとに recall duty がどこまで閉じたかを示す coverage evidence であり、per-recipient acknowledgment、hard bounce/no-access、successor follow-up acknowledgment、downstream forwarding disclosure、downstream recall completion を束ねて判定する。単なる send success、open-tracking、non-response はそれだけで completion にならない。
  - closure 判定は packet 単体ではなく recipient set と downstream chain を含む。contradiction / rollback / follow-up の duty は、required notice を発行しただけでは閉じず、context ごとに要求される acknowledgment / recall coverage class を満たして初めて close できる。
  - emergency_reveal は issuance の first move を recipient acknowledgment 待ちにしてはならないが、closure と recall completion は最も厳格に追跡する。external_audit では bounded_complete を認めず、immutable witness を伴う exact completion だけを closure とみなす。
  recipient_acknowledgment_semantics:
    receipt_acknowledgment: named recipient またはその lawful delegate が、packet digest / predecessor-successor lineage / issue_time を束縛して受領事実を返したことを示す最小 acknowledgment である。
    read_or_action_acknowledgment: recipient が packet を確認し、required bounded action または reliance freeze を受け取ったことを示す acknowledgment である。review request や containment instruction を伴う packet で追加要求されうる。
    recall_acknowledgment: recipient が revoke / correction / narrow / follow-up closure を受領し、旧 packet への reliance を止め、保持 / forwarding / operational use の停止または置換を確認したことを示す acknowledgment である。
    non_implications:
    - acknowledgment は current decision approval を意味しない。
    - acknowledgment は packet 内容の真実性や lawful adequacy を保証しない。
    - receipt_acknowledgment は recall_acknowledgment の代用ではない。
  acknowledgment_requirement_matrix:
    current_decision_preview:
      local_context: conditional
      central_context: mandatory
      emergency_context: forbidden
      external_audit_context: forbidden
    bounded_preview:
      local_context: conditional
      central_context: mandatory
      emergency_context: forbidden
      external_audit_context: mandatory
    emergency_reveal:
      local_context: mandatory
      central_context: mandatory
      emergency_context: mandatory
      external_audit_context: mandatory
    post_confirm_follow_up:
      local_context: conditional
      central_context: mandatory
      emergency_context: mandatory
      external_audit_context: mandatory
  conditional_rules:
    current_decision_preview_local:
    - same-team bounded review で downstream forwarding が制度上禁止され、later replay basis に使わない場合は conditional とする。
    - recipient が hold release 準備、route switch 準備、protected facet handling のいずれかに関与する場合は mandatory へ繰り上げる。
    bounded_preview_local:
    - named recipient が bounded preparation だけを行い、cross-boundary continuity を持たず、packet expiry が短い場合は conditional とする。
    - cross-boundary recipient、later recall cost が高い recipient、または forwarding 許容 recipient を含む場合は mandatory へ繰り上げる。
    post_confirm_follow_up_local:
    - 旧 provisional packet が local confined で downstream chain を持たない場合は conditional とする。
    - 旧 packet が emergency_reveal 由来、または prior recall gap を含む場合は mandatory へ繰り上げる。
  batch_recall_evidence_classes:
    hard_bounce_no_access: delivery 失敗が recipient alias・delivery channel・time window に束縛され、content access が成立していないことを示す evidence。未到達の closure に使える。
    soft_bounce_or_temporary_failure: 一時的 failure。completion には使えず pending または escalated_gap に残す。
    explicit_receipt_or_read_ack: recipient から返る receipt / read / action acknowledgment。reach coverage には使えるが recall completion には recall_ack または lawful successor acknowledgement を別途要する。
    explicit_recall_ack: recipient が revoke / correction / narrow / follow-up closure を受領し旧 reliance を止めたことを示す evidence。
    non_response_timeout: 指定 timeout まで recipient-originated evidence が無い状態。completion そのものではなく bounded_complete 候補または escalation trigger にしかならない。
    downstream_forwarding_disclosed: recipient が downstream recipient への forwarding / re-share を disclosed した evidence。child recipient set を batch に追加し、親 recipient の recall は child coverage 完了まで閉じない。
    downstream_silent_retention_gap: forwarding や retention が起こりうるが child recipient / retention stop が証明できない gap。complete を阻害する。
    successor_follow_up_ack: reflected successor または final closure packet への acknowledgment。旧 packet の recall_ack を代替しうるが predecessor/successor lineage を必須とする。
  completion_classes:
    complete: 全 recipient alias が explicit_recall_ack、successor_follow_up_ack、または hard_bounce_no_access で覆われ、開いた downstream chain が残っていない状態。
    bounded_complete: 一部 recipient が non_response_timeout のままだが、packet class / context / sink exposure が bounded であり、downstream forwarding / silent retention gap がなく、manual override と audit witness が付いた例外 closure。
    escalated_gap: downstream forwarding disclosure 未回収、downstream_silent_retention_gap、soft bounce の長期継続、または mandatory acknowledgment context での non-response が残り、上位 owner / authority へ引き上げられた状態。
    incomplete: timeout 進行中または required successor / recall evidence が未収集の状態。
  context_completion_matrix:
    local_context:
      complete_required_for:
      - emergency_reveal when contradiction/rollback/final closure is involved
      - cross-boundary bounded_preview
      - any packet with disclosed downstream forwarding
      bounded_complete_allowed_when:
      - packet class が current_decision_preview または bounded_preview である
      - recipient set が local confined で forwarding が禁止されている
      - non_response_timeout だけが残り、hard bounce / forwarding / silent retention gap がない
      - follow_up_owner の manual override と archive witness がある
      manual_override: allowed with owner_reason_ref・risk_acceptance_ref・next_review_at。
      audit_witness: recipient alias set、timeout record、channel log digest、override reason を残す。
    central_context:
      complete_required_for:
      - all emergency_reveal
      - all external-facing bounded_preview
      - all post_confirm_follow_up with prior recall gap
      bounded_complete_allowed_when:
      - packet class が current_decision_preview または strictly internal bounded_preview である
      - central owner と policy reviewer の dual sign-off がある
      - non_response_timeout 以外の open gap がなく、downstream forwarding / silent retention gap がない
      manual_override: conditional。central owner と policy reviewer の dual sign-off を必須とし、expiry 延長の代用にしてはならない。
      audit_witness: recipient coverage table、override packet、next escalation trigger、closure digest を残す。
    emergency_context:
      complete_required_for:
      - all contradiction closure
      - all rollback closure
      - all emergency_reveal expiry closure
      - all post_confirm_follow_up after emergency_reveal
      bounded_complete_allowed_when: []
      manual_override: issuance には不要だが closure には使えない。non-response は escalation を遅らせる理由にならない。
      audit_witness: issue_time、first-move reason、recipient reach attempts、escalation path、post-confirm closure evidence を残す。
    external_audit_context:
      complete_required_for:
      - all packet classes
      bounded_complete_allowed_when: []
      manual_override: forbidden。recipient-visible completion を percentage や attestation only で近似してはならない。
      audit_witness: immutable recipient coverage manifest、predecessor/successor lineage、recall evidence digest、downstream chain closure evidence を残す。
  effect_rules:
    contradiction_closure:
    - required notice を出しただけでは contradiction closure にならない。required recipient coverage class が満たされ、open downstream chain が閉じて初めて closure とみなす。
    - recipient acknowledgment は contradiction の truth value を変えない。closure は notice/recall duty の充足判定にだけ使う。
    rollback_completion:
    - rollback 完了は packet recall completion と underlying action rollback を分ける。recipient acknowledgment は前者にだけ効く。
    - 旧 packet に基づく bounded action が発行されていた場合は、read_or_action_acknowledgment または successor_follow_up_ack を要する。
    follow_up_notice_completion:
    - follow-up notice は、reflective successor または final closure が recipient set に届き、required acknowledgment class を満たしたときに閉じる。
    - post_confirm_follow_up は predecessor_packet_ref を欠いたまま旧 packet の recall completion 代用にしてはならない。
  responsibility_split:
    DecisionLedger:
    - packet ごとに acknowledgment requirement class、recipient alias set、timeout、recall duty state、manual override 条件、downstream child set linkage を正本記録する。
    - per-recipient coverage state を received / read / recalled / bounced_no_access / pending / escalated_gap に分けて保持する。
    GraphEngine:
    - issue_time・expiry・notice action・recipient response をもとに timeout と escalation を駆動し、downstream forwarding disclosed 時は child recipient set を追加する。
    - batch completion class を complete / bounded_complete / escalated_gap / incomplete のいずれかへ計算し、context ごとの closure admissibility を判定する。
    GraphLint:
    - send success や open tracking を acknowledgment と誤用すること、non-response を recall completion と数えること、downstream gap を無視して complete 扱いすること、forbidden context で bounded_complete を使うことを検査する。
    archive_object:
    - recipient coverage manifest、acknowledgment digest、bounce/no-access evidence digest、override packet digest、downstream closure manifest を immutable に保持する。
  prohibited_shortcuts:
  - SMTP accepted / message sent を recipient acknowledgment の代用にすること。
  - open pixel / click log だけで read_or_action_acknowledgment を主張すること。
  - non-response timeout を complete とみなし、recall duty を silent close すること。
  - downstream forwarding disclosed 後に child recipient coverage を追加せず親 recipient だけで closure すること。
  - external_audit や emergency_context で bounded_complete を使って recall completion を近似すること。
  residual_open_points: []
central_delegation_charter_extension_registry_governance:
  status: provisional_fixed
  statement: central_delegation_charter_extension_registry_governance とは、central delegation charter の comparison-stable な taxonomy core と、weighted quorum・ordered fallback・jurisdiction subtype extension を収める extension registry を分離し、context ごとの admissibility・override / escalation との接続・migration / supersession の統治境界を定める規則である。
  separation_principle:
  - taxonomy core は、どの authority family がどの jurisdiction family / context / lawful purpose に対して current decision を拘束できるかを比較可能にする最小核であり、文脈ごとに意味が変わる tally や fallback sequence を埋め込まない。
  - extension registry は、core が固定した authority / route / boundary の上に forum tally、successor chain、finer legal overlay を付与する層である。extension は family-level minimum を弱めず、monotone strengthening または bounded operational refinement だけを許す。
  - weighted quorum と ordered fallback は route mechanics の extension であり、jurisdiction subtype extension は family-level classification の上に乗る legal / sector overlay である。3者とも authority family や non-delegable boundary そのものに格上げしてはならない。
  core_vs_extension_matrix:
    weighted_quorum:
      classification: extension_registry
      statement: weighted quorum は collective approval forum における seat weight・threshold・veto・abstention・timeout rule を表す approval-structure extension であり、authority family や approval route family そのものではない。
      core_anchor: authority_family / approval_route_family / lawful_purpose_family は core に残し、weight vector・k-of-n threshold・veto class・abstention semantics・timeout handoff を extension profile に置く。
      mandatory_when:
      - single approver ではなく heterogeneous authority seat または 3席以上の collective forum を current decision basis に使うとき
      - same-tier conflict batch や central supervised board で vote weight / veto reach / abstention handling が decision outcome を変えうるとき
      conditional_when:
      - single-tenant の protected facet review を temporary board 化し、seat weight を advisory ではなく bounded approval input にするとき
      forbidden_when:
      - single_domain_route の単独承認を擬似 quorum へ読み替えるとき
      - emergency immediate containment の first move を quorum 成立待ちにするとき
      - external auditor や observer credential holder を voting seat や veto seat に数えるとき
    ordered_fallback:
      classification: extension_registry
      statement: ordered fallback は timeout・unavailability・recusal・route invalidation に備えた pre-registered successor chain を表す route-succession extension であり、approval route family 自体ではない。
      core_anchor: approval_route_family / override_family / escalation_family / non_delegable_boundary は core に残し、successor chain・trigger・wait window・activation witness・post-confirm duty を extension profile に置く。
      mandatory_when:
      - emergency_then_post_confirm_route で authority loss や responder unavailability を lawful に吸収する必要があるとき
      - central supervised route で responder succession または timeout handoff を事前登録しないと continuity が壊れるとき
      conditional_when:
      - local / central route で bounded successor chain を持つが、active route の primary path は明確に生きているとき
      forbidden_when:
      - fallback を使って non-delegable escalation や centralization override を迂回するとき
      - successor authority が predecessor より弱い権限または広い reveal を許す downgrade になるとき
      - route switch や timeout clear を silent に実施するとき
    jurisdiction_subtype_extension:
      classification: split_core_and_extension
      statement: jurisdiction family は taxonomy core に残し、sector statute・data class・export control・retention / notice variation・observer / attestation delta などの finer legal/regulatory overlay は jurisdiction subtype extension として registry 化する。
      core_anchor: tenant_relation_scope / jurisdiction_family_scope / lawful_purpose_family / non_delegable_boundary は core に残し、subtype_code・delta rule・mandatory witness delta・retention / notice delta・escalation trigger を extension profile に置く。
      mandatory_when:
      - cross_jurisdiction_family または sovereign_or_external_audit_overlay が current basis に入るとき
      - protected facet や recipient-visible export が subtype-specific disclosure / retention / notice rule に触れるとき
      - external audit response や cross-tenant reveal で legal overlay を明示しないと lawful purpose を特定できないとき
      conditional_when:
      - same jurisdiction family 内だが sector-specific overlay や customer-specific compliance appendix が存在しうるとき
      forbidden_when:
      - subtype extension を使って family-level minimum disclosure cap・observer requirement・retention duty を弱めるとき
      - locale や recipient 名だけから subtype を暗黙推定し、explicit profile_ref を持たないとき
  context_matrix:
    local_context:
      weighted_quorum: conditional。collective forum を current basis に使う場合だけ admissible。単独承認の擬似 quorum 化は forbidden。
      ordered_fallback: conditional。bounded successor chain は許すが、silent route switch や downgrade は forbidden。
      jurisdiction_subtype_extension: conditional。sector / customer overlay がある場合に限って使う。family-level minimum を下げる local convenience は forbidden。
    central_context:
      weighted_quorum: conditional。central board / supervised forum で seat weight が outcome を変える場合に admissible。authority family の代用にはしない。
      ordered_fallback: conditional。central responder succession や timeout handoff は許すが、non-delegable escalation の省略は forbidden。
      jurisdiction_subtype_extension: mandatory 寄り。cross-boundary / protected facet / external visibility を扱う場合は explicit profile_ref を必須とする。
    emergency_context:
      weighted_quorum: immediate containment では forbidden。post-confirm review や retrospective adjudication では conditional。
      ordered_fallback: mandatory 寄り。responder loss / timeout / custody break に備えた successor chain を要求する。
      jurisdiction_subtype_extension: containment first move では conditional だが、external reveal・retention・post-confirm disposition に入る時点で mandatory 寄りに昇格する。
    external_audit_context:
      weighted_quorum: forbidden。auditor-facing disclosure gate を vote weight だけで決めない。
      ordered_fallback: conditional。responder succession は許すが、supervised route を弱めてはならない。
      jurisdiction_subtype_extension: mandatory。overlay subtype を explicit に束縛しない external audit response を current basis にしてはならない。
  binding_rules:
    with_approval_route:
    - weighted quorum は dual_control_route または central_supervised_route の seat set が explicit な場合にだけ current basis へ接続できる。single_domain_route の solitary approval を後付けの weighted vote に変換してはならない。
    - ordered fallback は predecessor route と successor route の両方を explicit に持ち、trigger / timeout / recusal / invalidation reason を event として残す。fallback 発火は same-or-higher authority と monotone scope narrowing または centralization を満たさなければならない。
    - jurisdiction subtype extension は route family 自体を silent に変更せず、必要なら route_requirement を厳しくする delta としてだけ作用できる。
    with_override_and_escalation:
    - weighted quorum は centralization override や non-delegable escalation を自動承認しない。必要な override family は別に core 側で明示する。
    - ordered fallback は pre-registered な chain に従って centralization override または non-delegable escalation を発火できるが、activation witness と post-confirm duty を伴わなければならない。
    - jurisdiction subtype extension は external notice、observer requirement、retention、bridge / archive continuity の追加義務を課せるが、family-level minimum を緩める override には使えない。
    with_non_delegable_boundary:
    - 3つの extension はいずれも non-delegable action family を削除・縮退・匿名化してはならない。
    - protected facet の final interpretation、cross-boundary broad reveal、bridge token の external continuity revoke / reissue、post-confirm 前の public explanation / irreversible commitment は extension だけで lawful 化してはならない。
  registry_schema:
    weighted_quorum_profile:
      mandatory_fields:
      - profile_id
      - seat_class_set
      - weight_vector_ref
      - threshold_rule
      - veto_class_set_or_null
      - abstention_rule
      - timeout_policy_ref
      - fallback_profile_ref_or_null
      - supersession_rule_ref
    ordered_fallback_profile:
      mandatory_fields:
      - profile_id
      - predecessor_route_family
      - ordered_successor_chain
      - activation_trigger_set
      - wait_window_ref
      - same_or_higher_authority_constraint
      - post_confirm_policy_ref_or_null
      - supersession_rule_ref
    jurisdiction_subtype_profile:
      mandatory_fields:
      - profile_id
      - parent_jurisdiction_family
      - subtype_code
      - lawful_purpose_delta_set
      - reveal_cap_delta_set
      - retention_notice_rule_set
      - required_attestation_profile_delta_set
      - required_observer_profile_delta_set
      - escalation_trigger_set
      - supersession_rule_ref
  responsibility_split:
    DecisionLedger: charter_core_ref と extension_profile_ref 群、activation reason、seat weight / fallback trigger / subtype binding の current decision 正本、supersession / inheritance link を保持する。
    GraphEngine: context 判定から extension mandatory/conditional/forbidden を解釈し、timeout / recusal / route invalidation に応じた fallback activation、subtype delta による observer / attestation / notice requirement を発火する。
    GraphLint: weighted quorum の誤用、silent fallback、downgrade successor、missing subtype profile、subtype による family minimum 緩和、auditor の voting seat 化を検査する。
    archive_object: charter core digest、extension profile digest、activation witness、supersession / inheritance lineage、migration note を immutable に保持する。
  prohibited_shortcuts:
  - weighted quorum を authority family 名の一部に埋め込み、core taxonomy の比較対象にしてしまうこと
  - ordered fallback を使って centralization override や non-delegable escalation を silent に省略すること
  - jurisdiction subtype extension を単なるラベルとして扱い、retention / notice / observer / attestation の delta を持たせないこと
  - subtype extension を使って family-level minimum disclosure cap や reviewer independence を弱めること
  - external auditor や observer credential holder を quorum seat / veto seat に数えること
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離するか
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで registry 化するか
central_delegation_charter_extension_transition_governance:
  status: provisional_fixed
  statement: central_delegation_charter_extension_transition_governance とは、central delegation charter extension registry に属する weighted quorum・ordered fallback・jurisdiction subtype extension の各 profile について、migration・supersession・inheritance の遷移境界を分離し、taxonomy core・non-delegable boundary・context admissibility を壊さずに alias chain / successor chain / deprecation duty / provisional export propagation を統治する規則である。
  core_claims:
  - extension profile の遷移は migration・supersession・inheritance の3類型に分ける。migration は semantic delta が none の identifier / schema / code migration に限定し、supersession は material または bounded でも outcome space を変えうる変更を successor chain へ送る。inheritance は parent profile の family-level minimum を保持したまま、child profile が monotone strengthening または bounded narrowing だけを加える場合に限定する。
  - alias chain は equivalence-preserving migration にだけ使う。threshold rule、veto reach、fallback successor order、retention / observer / attestation duty、reveal cap の意味が変わる場合は alias ではなく successor chain を使わなければならない。
  - deprecation は old profile を history から消すことではなく、新規 issuance に対する predecessor freeze、bounded dual-validity window、context 別 successor admissibility、notice duty を束ねる lifecycle である。deprecated predecessor を current basis に使い続ける条件は context と issuance_time で制御し、silent continuation を禁止する。
  - provisional recipient-visible export と emergency lane は charter extension の遷移影響を受ける。recipient-visible packet が deprecated / superseded profile に依存している場合は follow-up notice または revoke / correction を要し、emergency lane では immediate first move を阻害しない一方で post-confirm successor binding を必須にする。
  - non-delegable boundary は extension 遷移でも弱められない。weighted quorum の再設計、ordered fallback の route successor、jurisdiction subtype overlay の変更はいずれも protected facet final interpretation、central exception、cross-boundary broad reveal、bridge continuity revoke / reissue、public explanation / irreversible commitment を extension 単独で lawful 化してはならない。
  transition_taxonomy:
    migration:
      statement: migration は semantic delta none の profile rename / schema version update / registry code migration を扱う。predecessor と successor は comparison-stable であり、alias chain で同値比較できる。
      admissible_when:
      - core_anchor と outcome space が不変である
      - comparability witness と alias family ref を提示できる
      - bounded dual-validity window と new issuance freeze_at を定義できる
      mandatory_fields:
      - predecessor_profile_ref
      - successor_profile_ref
      - transition_kind=migration
      - semantic_delta_class=none
      - alias_family_ref
      - comparability_witness_ref
      - dual_validity_window_ref_or_null
      - new_issuance_freeze_at
      - deprecation_notice_policy_ref
      forbidden_when:
      - threshold / veto / retention / observer / attestation / reveal cap の意味が変わる
      - context admissibility が predecessor と successor で変わる
      - non-delegable boundary への接続条件が変わる
    supersession:
      statement: supersession は bounded でも outcome space を変えうる変更を扱う successor 遷移であり、predecessor と successor は lineage で結ばれるが alias ではない。
      admissible_when:
      - material または bounded semantic delta が明示されている
      - successor admissibility と predecessor freeze policy が context 別に定義されている
      - deprecation notice / follow-up notice / migration barrier が定義されている
      mandatory_fields:
      - predecessor_profile_ref
      - successor_profile_ref
      - transition_kind=supersession
      - semantic_delta_class in {bounded, material}
      - delta_summary_ref
      - affected_context_set
      - new_issuance_freeze_at
      - allowed_history_window_ref_or_null
      - deprecation_notice_policy_ref
      - provisional_export_propagation_rule_ref_or_null
      forbidden_when:
      - successor を silent activation する
      - deprecated predecessor を freeze 後の新規 issuance に使う
      - dual-validity を無期限化する
    inheritance:
      statement: inheritance は parent profile の minimum を保ったまま child profile が stricter delta または bounded narrowing を足す遷移であり、family-level minimum を弱める child override を許さない。
      admissible_when:
      - parent profile ref と inherited field family が明示されている
      - child delta が monotone strengthening または bounded narrowing である
      - inheritance 適用 context と local override boundary が宣言されている
      mandatory_fields:
      - child_profile_ref
      - parent_profile_ref
      - transition_kind=inheritance
      - inherited_field_family_set
      - child_delta_ref
      - monotone_proof_ref
      - applicable_context_set
      - deprecation_notice_policy_ref_or_null
      forbidden_when:
      - vote dilution や weaker authority route を child で追加する
      - family-level retention / observer / attestation / reveal minimum を child が下げる
      - inheritance を理由に non-delegable escalation を省略する
  family_rules:
    weighted_quorum:
      migration_boundary:
      - seat_class_set と threshold outcome region が同値で、weight vector / veto semantics / abstention semantics の意味が不変な rename / schema migration だけを migration とする
      - seat class の集約単位や veto reach が変わる場合は supersession とする
      supersession_boundary:
      - threshold percentage、k-of-n rule、veto reach、timeout-to-fallback linkage が outcome を変えうる場合
      - observer_nonvoting_seat の扱い、abstention counting、seat weight normalization が変わる場合
      inheritance_boundary:
      - child forum が parent forum の seat class を保持したまま stricter threshold、additional veto、narrower reveal cap を加える場合だけ inheritance を許す
      - vote dilution、seat removal、observer の voting seat 化、quorum wait の長期化は inheritance に使えない
    ordered_fallback:
      migration_boundary:
      - successor route family と activation trigger semantics が不変で route_id / schema ref / note family だけが変わる場合に migration を許す
      supersession_boundary:
      - ordered successor chain の順序、authority tier、wait_window、activation_trigger_set、post-confirm duty が変わる場合
      - same-or-higher authority constraint の実質が変わる場合
      inheritance_boundary:
      - child route が parent chain を保持したまま stricter trigger、shorter wait、centralized successor prepending を行う場合だけ inheritance を許す
      - weaker authority append、silent bypass branch、non-delegable escalation 回避は inheritance で導入してはならない
    jurisdiction_subtype_extension:
      migration_boundary:
      - subtype_code や registry namespace が変わっても lawful_purpose_delta / reveal_cap_delta / retention_notice_rule / observer / attestation delta が不変なら migration を許す
      supersession_boundary:
      - retention / notice duty、required observer / attestation、reveal_cap、escalation trigger のいずれかが変わる場合は supersession とする
      inheritance_boundary:
      - child subtype が parent subtype の delta を保持したまま stricter retention / notice / observer / attestation requirement を足す場合だけ inheritance を許す
      - family-level minimum を緩める local/customer convenience overlay を inheritance に使ってはならない
  context_matrix:
    local_context:
      migration: conditional。alias comparability witness があれば bounded dual-validity を許す。notice は affected operator / reviewer へ必要。
      supersession: conditional。new issuance freeze と successor ref を必須とし、active board / route / subtype basis が残っている場合は follow-up notice を要求する。
      inheritance: conditional。team-local child delta は許すが parent minimum 緩和は forbidden。
    central_context:
      migration: mandatory 寄り。registry alias chain、effective_at、deprecation notice、archive digest linkage を必須とする。
      supersession: mandatory。successor admissibility matrix、dual-validity cap、new issuance freeze、provisional export propagation を必須とする。
      inheritance: conditional。central-approved child overlay は許すが bounded local override を超える場合は supersession へ送る。
    emergency_context:
      migration: conditional。immediate first move を止めない範囲でのみ許し、post-confirm successor binding を mandatory とする。
      supersession: conditional。active containment 中は predecessor reuse を短時間だけ許しうるが、stabilization 後の new issuance は successor 強制とする。
      inheritance: mandatory 寄り。emergency child profile は shorter wait / tighter duty / stronger observer requirement だけを加えられる。weaker path の追加は forbidden。
    external_audit_context:
      migration: mandatory。predecessor / successor / alias family / comparability witness を audit packet に束縛しなければならない。
      supersession: mandatory。dual-reference disclosure、deprecation notice、history window を欠く current basis は forbidden。
      inheritance: conditional。external-audit overlay child は stricter disclosure / observer / retention rule だけを追加できる。minimum 緩和は forbidden。
  transition_record_schema:
    common_mandatory_fields:
    - extension_kind
    - transition_kind
    - predecessor_profile_ref_or_null
    - successor_or_child_profile_ref
    - semantic_delta_class
    - affected_context_set
    - effective_at
    - new_issuance_freeze_at_or_null
    - deprecation_notice_policy_ref_or_null
    - dual_validity_window_ref_or_null
    - comparability_witness_ref_or_null
    - monotone_proof_ref_or_null
    - provisional_export_propagation_rule_ref_or_null
    - emergency_lane_rule_ref_or_null
    - archive_transition_manifest_ref
    alias_chain_minimum_fields:
    - alias_family_ref
    - alias_generation
    - alias_equivalence_scope_ref
    successor_chain_minimum_fields:
    - successor_family_ref
    - successor_generation
    - delta_summary_ref
    - history_window_ref_or_null
    inheritance_minimum_fields:
    - parent_profile_ref
    - inherited_field_family_set
    - child_delta_ref
    - local_override_boundary_ref_or_null
  propagation_rules:
    provisional_export:
    - deprecated / superseded charter profile を参照する recipient-visible provisional packet は、follow-up successor notice または revoke / correction notice を必要とする
    - profile change により recipient scope / commitment class / public explanation admissibility が変わる場合、packet を silent に継続してはならない
    emergency_lane:
    - active containment 中の predecessor reuse は immediate first move を阻害しない bounded reuse に限る
    - post-confirm phase では successor profile または explicit closure notice へ必ず接続する
  responsibility_split:
    DecisionLedger: extension profile の predecessor/successor/parent lineage、semantic_delta_class、effective_at、freeze_at、deprecation notice duty、provisional export propagation duty を正本記録する。
    GraphEngine: issue_time / context / active route / recipient-visible state に応じて predecessor・successor・child profile の admissibility を計算し、notice due・post-confirm binding・dual-validity expiration を駆動する。
    GraphLint: alias と successor の取り違え、silent weakening、freeze 後 predecessor issuance、weaker child inheritance、missing comparability witness、missing provisional follow-up を検査する。
    archive_object: transition manifest、comparability witness、monotone proof、deprecation notice artifact、dual-validity window 記録を immutable に保持する。
  prohibited_shortcuts:
  - semantic delta がある profile change を alias migration と偽装すること
  - deprecated predecessor を freeze 後の新規 issuance に使い続けること
  - inheritance を理由に vote dilution、weaker fallback、retention / observer / attestation duty 緩和を入れること
  - provisional recipient-visible packet や emergency lane の active packet を successor notice なしで放置すること
  - dual-validity window を無期限の mixed-version coexistence に変えること
  residual_open_points:
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
central_delegation_charter_extension_mixed_version_batch_migration_governance:
  status: provisional_fixed
  statement: central_delegation_charter_extension_mixed_version_batch_migration_governance とは、weighted_quorum・ordered_fallback・jurisdiction_subtype_extension の各 extension family について、mixed-version coexistence の許容面と predecessor freeze / successor mandatory / dual-validity window / history-only retention の境界を registry 化し、migration batch witness によって open packet lineage・recipient-visible packet・emergency lane への伝播と rollback を統治する規則である。
  core_claims:
  - mixed-version coexistence は「old/new profile が同時に存在すること」一般ではなく、どの use surface で predecessor をまだ lawful に参照できるかの限定的な window である。新規 issuance と current basis は freeze 境界で強く切り、open lineage continuation・recipient-visible follow-up・active containment continuity・history verification を分けて扱う。
  - weighted_quorum は forum outcome space の比較可能性が崩れやすいため、mixed-version を open forum / open packet lineage の収束処理にだけ限定する。ordered_fallback は active route continuity を守るために最も広い bounded coexistence を許すが、post-confirm successor binding を mandatory とする。jurisdiction_subtype_extension は legal overlay の二重運用が disclosure / retention duty を曖昧にしやすいため、new issuance と external-audit current basis では原則 forbidden とする。
  - predecessor freeze は profile の existence を消すことではなく、new issuance current basis への再使用を止める cut である。freeze 後の predecessor は open lineage closure または immutable history verification にしか使えず、recipient-visible packet や emergency lane に残っている場合は successor notice / follow-up / explicit bounded reuse witness を要する。
  - batch migration witness は profile 単位ではなく migration batch 単位で管理する。batch は predecessor profile set、successor profile set、affected context set、open packet lineage set、recipient-visible packet set、emergency lane case set、freeze / dual-validity / rollback 情報を同時に持ち、silent mixed-version drift を検出できなければ complete とみなさない。
  - rollback は migration 失敗時に predecessor を自動復権させる近道ではない。rollback も独立の witnessed batch として扱い、どの issuance を predecessor へ戻し、どの recipient-visible packet と emergency lane に correction / successor replacement notice を出したかを明示しなければならない。
  family_surface_matrix:
    weighted_quorum:
      new_issuance_current_basis: forbidden。freeze 後の新規 board / forum / approval packet は必ず successor profile を使う。
      open_lineage_continuation: conditional。freeze 前に開いた forum session、既発行 packet lineage、未完了の supervised batch に限り bounded coexistence を認める。
      recipient_visible_follow_up: conditional。recipient-visible packet が旧 quorum で justified されている場合は successor notice または correction notice を要求する。
      emergency_lane_active_containment: forbidden。immediate first move を mixed quorum state や旧 board wait に依存させてはならない。
      external_audit_current_basis: forbidden。監査向け current disclosure gate を predecessor / successor 併記の曖昧運用にしてはならない。
      history_verification: admissible。immutable witness により predecessor / successor の lineage と outcome equivalence が追跡できる場合に限る。
    ordered_fallback:
      new_issuance_current_basis: forbidden。freeze 後の新規 route issuance は successor chain へ固定する。
      open_lineage_continuation: conditional。freeze 前に active だった chain instance と、それに束縛された packet lineage に限る。
      recipient_visible_follow_up: conditional。route justification や responder identity が変わる場合は successor follow-up packet を要する。
      emergency_lane_active_containment: admissible。active containment を切らないための bounded predecessor reuse を許すが、stabilization 後は successor mandatory とする。
      external_audit_current_basis: conditional。incident continuity を説明するための dual-reference disclosure は許すが、sole gate を predecessor に残してはならない。
      history_verification: admissible。route activation witness と successor binding witness が immutable に残る場合に限る。
    jurisdiction_subtype_extension:
      new_issuance_current_basis: forbidden。freeze 後に旧 legal overlay を新規 issuance の current basis に使ってはならない。
      open_lineage_continuation: conditional。freeze 前に lawful に発行された open packet lineage を閉じるための bounded continuation に限る。
      recipient_visible_follow_up: conditional。notice / retention / reveal duty が変わる場合は successor overlay に基づく follow-up or correction を mandatory とする。
      emergency_lane_active_containment: conditional。containment first move では bounded predecessor reuse を許しうるが、external reveal / retention / post-confirm disposition は successor binding を要する。
      external_audit_current_basis: forbidden。監査 current basis で旧 overlay と新 overlay を曖昧に併用してはならない。
      history_verification: admissible。predecessor overlay の lawful basis と successor overlay への cutover witness を archive で追跡できる場合に限る。
  freeze_and_successor_rules:
    weighted_quorum:
      predecessor_freeze_boundary: effective successor profile が reflected され、かつ new board / new approval packet を開始する時点で predecessor freeze を掛ける。open forum session は batch witness で列挙されたものだけ継続できる。
      dual_validity_window: open_forum_and_open_packet_only。window 終了後は history_only retention に落とす。
      successor_mandatory_for:
      - new board opening after freeze
      - freeze 後に新規発行される approval packet
      - external-audit current basis
      - recipient-visible packet の successor justification
    ordered_fallback:
      predecessor_freeze_boundary: successor chain が reflected され、かつ responder continuity を壊さずに chain switch 可能になった時点で new issuance freeze を掛ける。active chain instance は case 単位 witness に限り旧 chain を短時間保持できる。
      dual_validity_window: active_chain_only_then_history_only。active_containment case が stabilization / closure に入ったら successor binding へ切り替える。
      successor_mandatory_for:
      - freeze 後に新規生成される route packet
      - stabilization 後の post-confirm path
      - 新規 incident 受付
      - closure / audit packet
    jurisdiction_subtype_extension:
      predecessor_freeze_boundary: successor overlay が lawful purpose / reveal / retention / observer delta を確定した時点で new issuance freeze を掛ける。旧 overlay は pre-freeze lineage の closure にしか使えない。
      dual_validity_window: lineage_closure_only_then_history_only。cross-boundary reveal や external audit では no mixed current basis。
      successor_mandatory_for:
      - freeze 後のすべての new issuance
      - external-audit current disclosure
      - cross-boundary reveal
      - post-confirm retention / notice disposition
  batch_migration_witness:
    minimum_field_set:
    - migration_batch_id
    - extension_family
    - transition_kind_set
    - predecessor_profile_set
    - successor_profile_set
    - affected_context_set
    - new_issuance_freeze_at
    - dual_validity_window_class
    - dual_validity_window_end_or_condition
    - open_packet_lineage_set_or_digest
    - recipient_visible_packet_set_or_digest
    - emergency_lane_case_set_or_digest
    - propagation_policy_ref
    - completion_criteria_ref
    - rollback_policy_ref
    - archive_transition_manifest_ref
    - drift_scan_digest_ref
    family_specific_addenda:
      weighted_quorum:
      - active_forum_session_set_or_digest
      - seat_outcome_comparability_ref
      - board_close_or_revote_policy_ref
      ordered_fallback:
      - active_chain_instance_set_or_digest
      - trigger_carryover_mapping_ref
      - post_confirm_successor_deadline_ref
      jurisdiction_subtype_extension:
      - duty_delta_summary_ref
      - notice_retention_delta_ref
      - observer_attestation_delta_ref
    propagation_requirements:
    - open packet lineage は predecessor / successor のどちらで閉じるかを lineage 単位で明示しなければならない。
    - recipient-visible packet は successor notice / correction / revoke / closure のどれを要求するかを packet set ごとに明示し、必要な場合は provisional_recipient_visible_export_acknowledgment_recall_governance の completion 条件を満たさなければならない。
    - emergency lane case は active_containment 中の bounded predecessor reuse と post-confirm successor binding deadline を case ごとに明示しなければならない。
    - affected_context_set に external_audit_context が含まれる場合は dual-reference disclosure artifact を batch witness に含める。
    completion_criteria:
    - new_issuance freeze が system state 上で実際に有効化され、freeze 後 issuance が predecessor profile へ流入していない。
    - open packet lineage set が successor binding、explicit closure、または lawful history-only retention のいずれかで被覆されている。
    - recipient-visible packet set と emergency lane case set について required propagation が完了している。
    - drift scan により silent mixed-version drift が 0 件、または escalated and closed である。
    - rollback policy が tested / armed されており、no-rollback の場合は explicit waiver witness がある。
    rollback_rule:
    - rollback は rollback_batch_id を持つ独立 witness として記録し、どの successor activation を取り消し、どの predecessor re-enable を認めたかを明示する。
    - rollback は freeze を silent に解除してはならず、freeze override reason・time window・affected issuance scope を必須とする。
    - recipient-visible packet または emergency lane に影響する rollback は correction / successor replacement / closure notice のいずれかを required propagation とする。
  responsibility_split:
    DecisionLedger: migration_batch_id、predecessor/successor profile set、freeze_at、dual-validity class、propagation duty、rollback policy、completion state の正本を保持する。
    GraphEngine: context / use surface / issue_time / packet lineage / emergency case を評価し、predecessor admissibility、successor mandatory、propagation due、drift scan 対象集合を計算する。
    GraphLint: freeze 後 predecessor reuse、family 不適合な coexistence、missing batch witness field、recipient-visible / emergency propagation 欠落、silent mixed-version drift、unwitnessed rollback を検査する。
    archive_object: batch transition manifest、dual-reference disclosure、drift scan digest、rollback witness、completion witness を immutable に保持する。
  prohibited_shortcuts:
  - mixed-version coexistence を「旧 profile もまだ残っている」だけで正当化すること
  - batch migration witness を作らずに freeze と successor 切替を個別イベントの寄せ集めで済ませること
  - recipient-visible packet や emergency lane の active state を predecessor 参照のまま silent に放置すること
  - jurisdiction subtype overlay の old/new 併用を external audit current basis の近道に使うこと
  - rollback を silent predecessor re-enable として実施すること
  residual_open_points: []
transition_bundle_reverse_continuity_governance:
  status: provisional_fixed
  statement: transition_bundle_reverse_continuity_governance とは、forward transition bundle を erase せずに partial rollback を reverse continuity bundle として append するときの minimum witness、affected partition cell 選択、correction notice supersession、full re-notice 境界を固定する規則である。
  core_claims:
  - reverse continuity bundle は「誤りを消す」ための overwrite ではなく、forward bundle によって生じた successor 側 effect を、affected partition cell 単位で lawful に戻すための append-only governance object である。
  - affected partition cell の既定単位は forward bundle の successor cell であり、cell_exact を原則とする。recipient closure や authority rebind の都合で拡張するときは、その expansion reason を witness に残さなければならない。
  - reverse bundle は、どの successor effect をどの predecessor baseline または retire state に戻すかを exact に示し、forward bundle の predecessor/successor provenance を破壊してはならない。
  - correction notice が previous notice を supersede できるのは、recipient class・export bundle・lawful purpose・retention bucket・commitment class を widen せず、かつ predecessor notice lineage が連結している場合に限る。
  - recipient scope の拡大、lawful purpose の変更、retention bucket の変更、commitment class の変更、prior recipient coverage の欠落、downstream forwarding 不明がある場合は、単なる supersession ではなく full re-notice を要求する。
  - archive manifest は forward bundle / reverse bundle / correction notice bundle を immutable に連結する recovery anchor であり、reverse 成立後も forward bundle を削除してはならない。
  minimum_reverse_witness:
    required_fields:
    - reverse_bundle_id
    - forward_transition_bundle_ref
    - affected_partition_cell_set_digest
    - rollback_basis_ref
    - reverse_to_predecessor_or_retire_map_digest
    - reverse_reason_code_ref
    - correction_notice_plan_ref
    - supersession_class_ref
    - archive_manifest_digest_ref
    - authority_path_ref
    - initiated_at
    - finalized_at_or_null
    rules:
    - rollback_basis_ref には forward bundle の bundle_class_ref と lawful continuity class の双方へ辿れる witness を要求する。
    - reverse_to_predecessor_or_retire_map_digest は affected cell ごとに predecessor baseline, retire target, no_restore のいずれかを exact に指定しなければならない。
    - correction_notice_plan_ref が null を許されるのは recipient-visible effect が 0 である internal-only rollback に限る。
  affected_partition_cell_selection:
    selection_modes:
      cell_exact: forward bundle の successor partition cell と 1 対 1 で rollback 対象を指定する既定形。
      recipient_closure_expansion: 同一 notice surface を閉じるため、同一 recipient class / export bundle 内の隣接 cell をまとめて対象に広げる。
      authority_rebind_expansion: authority path や canonical scope の再束縛が同一 action としてのみ合法なとき、関連 cell を束ねて戻す。
      retire_only_projection: predecessor baseline へ戻さず retire/tombstone に落とす場合に、lineage 終端 cell だけを対象にする。
    constraints:
    - selection mode は forward bundle が生成した successor cell 集合の部分集合または lawful expansion に限る。
    - lawful expansion では widened cell ごとに expansion reason と notice impact を示さなければならない。
    - other authority path や other lawful purpose への越境 rollback は reverse bundle 単独では許されず、reframe または new transition bundle を要する。
  correction_notice_supersession:
    supersession_classes:
      narrow_replace: 同一 recipient surface 上で claim surface または commitment surface を狭める correction。previous notice を supersede 可能。
      same_surface_correct: 同一 recipient class / export bundle / lawful purpose / retention bucket のまま factual error を是正する correction。previous notice を supersede 可能。
      recall_and_replace: previous notice を明示 revoke したうえで successor correction を出す。supersede は revoke evidence 付きでのみ許容。
      full_re_notice: recipient set, lawful purpose, retention bucket, commitment class, downstream duty のいずれかが material に変わるため、previous notice の supersede では足りず full re-notice が必要。
    mandatory_full_re_notice_conditions:
    - recipient class の widening
    - export bundle の変更
    - lawful purpose の変更
    - retention bucket の変更
    - commitment class の変更
    - previous notice coverage が bounded 以上で閉じていない
    - downstream forwarding が unresolved のまま
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reverse_bundle_id
      - rollback_basis_ref
      - supersession_class_ref
      - correction_notice_plan_ref
      - authority_path_ref
      - reverse lifecycle state
    GraphEngine:
      owns:
      - affected_partition_cell_set_digest generation
      - reverse_to_predecessor_or_retire_map_digest generation
      - forward/reverse provenance consistency check materialization
    GraphLint:
      owns:
      - illegal expansion lint
      - missing rollback basis lint
      - supersession-with-widening lint
      - forward deletion shortcut lint
    archive_object:
      owns:
      - forward/reverse/correction immutable linkage
      - recovery anchor snapshot
      - notice evidence package
  forbidden_shortcuts:
  - reverse bundle 成立をもって forward bundle を削除する
  - affected partition cell を recipient surface や authority path の証拠なしに広げる
  - coverage 不足の previous notice を superseded とみなして閉じる
  - bridge token や send success だけで correction notice supersession を完了扱いにする
  residual_open_points: []
reverse_bundle_overlap_cascade_governance:
  status: provisional_fixed
  statement: reverse_bundle_overlap_cascade_governance とは、同一 forward bundle または同一 affected partition cell に対して複数の reverse continuity bundle が生じる場合の rollback-set canonical 単位、overlap class、cascade rollback、reverse-of-reverse の admissibility を固定する規則である。
  core_claims:
  - rollback-set の canonical 単位は、forward bundle ref、affected partition cell、notice surface、authority path、correction generation を束ねた rollback cell である。
  - 複数 reverse bundle の重なりは、disjoint_refinement、same_surface_duplicate、authority_race、conflicting_supersession、reverse_of_reverse に分類して扱う。
  - current head は rollback cell ごとに 1 本だけ持ち、同一 head に対して competing reverse が並ぶ場合は automatic merge せず blocker または escalate に送る。
  - cascade rollback は既存 reverse bundle を前提に追加の reverse を積む操作であり、常に current head state から 1 手ずつ辿れる lineage を要求する。forward bundle を飛び越えた shortcut rollback は許さない。
  - reverse-of-reverse は reopen と new transition を混同してはならない。prior reverse bundle に reopen_eligible と authority path があり、notice duty が未閉鎖でない場合に限り admissible とする。
  - normalization の目的は最新 1 件だけを残すことではなく、rollback cell ごとに shadowed ancestor と active head を分離し、replay 可能な lineage を保つことである。
  rollback_cell_normal_form:
    required_fields:
    - forward_transition_bundle_ref
    - affected_partition_cell_ref
    - notice_surface_ref
    - authority_path_ref
    - correction_generation_ref
    - head_state_ref
    - shadowed_ancestor_set_digest_or_null
    invariants:
    - 同一 rollback cell には同時に 2 つ以上の active head を持たせてはならない。
    - correction_generation_ref は supersession chain と一致しなければならない。
    - shadowed ancestor は replay で再構成可能な lineage を保持しなければならない。
  overlap_classes:
    disjoint_refinement: affected cell は重なるが notice surface または authority path が strict refinement で競合しない。
    same_surface_duplicate: 同一 rollback cell に対して意味的に同じ reverse が再発行された状態。idempotent collapse で畳める。
    authority_race: 同一 affected cell に対して異なる authority path が competing reverse を提示している状態。automatic head 決定禁止。
    conflicting_supersession: notice generation は successor を名乗るが rollback target や commitment surface が両立しない状態。blocker。
    reverse_of_reverse: existing reverse head をさらに巻き戻す reopen 系操作。prior reverse の reopen_eligible と notice closure を要件とする。
  normalization_policy:
    rules:
    - same_surface_duplicate は same semantic digest と same rollback target map が一致する場合に限り idempotent collapse を許す。
    - disjoint_refinement は stricter surface へ narrow するだけなら active head を更新できるが、widen を伴う場合は conflicting_supersession に送る。
    - authority_race と conflicting_supersession は current basis を更新せず、escalate または reframe_required とする。
    - reverse_of_reverse は prior reverse head を ancestor として明示し、head chain を一本化しなければならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - rollback cell registry
      - active head state
      - escalation / blocker state
    GraphEngine:
      owns:
      - overlap detection materialization
      - shadowed ancestor set generation
      - head chain reconstruction
    GraphLint:
      owns:
      - dual-active-head lint
      - authority-race lint
      - shortcut-cascade lint
      - conflicting-supersession lint
    archive_object:
      owns:
      - ancestor/head immutable chain
      - idempotent collapse witness snapshot
  forbidden_shortcuts:
  - 複数 reverse bundle のうち timestamp 最新だけを current head とみなす
  - reverse-of-reverse を prior reverse lineage を残さず in-place 上書きする
  - authority race を silent tie-break で解消する
  - same semantic digest 不一致の duplicate を idempotent collapse する
  residual_open_points: []
correction_notice_downstream_closure_governance:
  status: provisional_fixed
  statement: correction_notice_downstream_closure_governance とは、correction notice の downstream propagation、acknowledgment closure、stale notice quarantine、current basis への影響を固定する規則である。
  core_claims:
  - notice closure の canonical 単位は recipient surface であり、primary recipient、delegated recipient、disclosed downstream、inferred downstream を区別して追跡する。
  - upstream で supersession が成立しても、downstream recipient に stale notice が残っているなら closure は自動では完了しない。current basis は downstream closure または lawful quarantine を確認してから更新する。
  - closure class は exact_closed、bounded_closed、quarantined_stale、escalated_gap、open の 5 値で扱い、send success や non-response だけで exact_closed にしてはならない。
  - stale notice quarantine は、旧 notice を current basis から隔離しつつ replay/audit 用の lineage は保持する統治状態であり、silent delete や silent overwrite の代用ではない。
  - inferred downstream が unresolved のまま commitment surface が残る場合は bounded_closed では足りず escalated_gap または full re-notice を要求する。
  - acknowledgment は receipt_ack、action_ack、correction_ack、recall_ack に分け、どの ack が必要かは recipient surface と notice class で決める。
  recipient_surface_model:
    surface_classes:
      primary_recipient: 初回 notice の名宛人。
      delegated_recipient: primary recipient から duty を引き継いだ指名済み受領者。
      disclosed_downstream: forwarding / export / delegation により明示的に把握されている downstream recipient。
      inferred_downstream: 完全な recipient identity は不明だが downstream propagation が推測される surface。
    required_bindings:
    - recipient_surface_id
    - notice_bundle_ref
    - recipient_class_ref
    - commitment_surface_ref
    - downstream_edge_set_digest_or_null
    - required_ack_class_set
    - closure_class_ref
  closure_policy:
    closure_classes:
      exact_closed: 必要な recipient surface がすべて required ack か equivalent completion evidence で閉じている。
      bounded_closed: 限定された surface で residual uncertainty があるが、context/profile 上 current basis に使える範囲に収まる。
      quarantined_stale: 旧 notice を stale として current basis から隔離したが replay/audit のために保持している。
      escalated_gap: downstream gap が material であり current basis を止めたうえで escalation した。
      open: closure 未了。
    rules:
    - inferred_downstream が commitment-relevant surface に残る場合、bounded_closed の admissibility は strict profile 限定とする。
    - quarantined_stale は stale notice と active successor notice が lineage で結ばれている場合に限り current basis 補助に使える。
    - escalated_gap または open がある rollback cell は final closure 扱いにしてはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - recipient surface registry
      - required ack class set
      - closure class state
      - quarantine state
    GraphEngine:
      owns:
      - downstream edge materialization
      - surface lineage generation
      - closure evidence aggregation
    GraphLint:
      owns:
      - stale-current coexistence lint
      - missing downstream coverage lint
      - invalid bounded_closed lint
      - silent overwrite lint
    archive_object:
      owns:
      - notice lineage chain
      - ack evidence package
      - quarantine snapshot
  forbidden_shortcuts:
  - send success や non-response timeout だけで exact_closed とみなす
  - stale notice を lineage を残さず silent delete する
  - inferred downstream unresolved のまま bounded_closed を current basis に使う
  - upstream supersession だけで downstream stale notice の closure を完了扱いにする
  residual_open_points: []
transition_chain_compaction_finality_governance:
  status: provisional_fixed
  statement: transition_chain_compaction_finality_governance とは、forward / reverse / correction chain を raw chain を消さずに compaction する条件、finality checkpoint、evidence retention tier を固定する規則である。
  core_claims:
  - compaction は raw chain の削除ではなく、replay-equivalent checkpoint を追加する圧縮操作である。raw forward / reverse / correction events は archive 上に保持し続ける。
  - finality checkpoint は、「もはや chain が変わらない」ことではなく、current basis に必要な rollback / notice / authority challenge が管理可能な範囲で閉じていることを示す統治状態である。
  - compaction class は structural_only、notice_squash、closure_checkpoint、audit_projection の4群に分け、どこまで current basis / audit basis に使えるかを分ける。
  - raw chain を compacted checkpoint に置き換えて current basis に使うには replay-equivalence witness が必要であり、witness は predecessor/successor lineage、active head、closure class、quarantine、authority state を再構成可能にしなければならない。
  - evidence retention tier は chain_core、proof_core、notice_core、downstream_ack_core、full_archive の5層に分け、profile/context ごとの minimum tier を下回って compaction してはならない。
  - legal-hold、open rollback cell、escalated notice gap、active authority challenge がある間は finality checkpoint を出してはならず、closure_checkpoint 以上の compaction を current basis に使ってはならない。
  compaction_classes:
    structural_only: lineage index や head pointer を付けるだけで notice/proof payload は縮約しない。
    notice_squash: lineage を保ったまま superseded notice を successor notice へ束ねるが、quarantine / ack evidence は保持する。
    closure_checkpoint: rollback cell と recipient surface の closure state を集約し、current basis 参照を軽量化する。
    audit_projection: audit basis 向けに compaction した read model。raw chain への replay path を mandatory にする。
  finality_policy:
    required_conditions:
    - 全 rollback cell に dual-active-head がない
    - recipient surface に open または escalated_gap がない
    - quarantined_stale は lineage-linked で replay-visible である
    - active authority challenge が current checkpoint を止めていない
    - required retention tier を満たす
    states:
      not_ready: current basis checkpoint として使えない。
      bounded_ready: 限定 context で current basis に使える。
      final_ready: registered context で current basis に使える。
      audit_only: audit basis には使えるが current basis には使えない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - checkpoint state
      - finality state
      - retention tier requirement
    GraphEngine:
      owns:
      - replay-equivalence witness generation
      - chain compaction materialization
      - checkpoint lineage map
    GraphLint:
      owns:
      - non-replay-equivalent compaction lint
      - illegal finality lint
      - retention-tier underrun lint
    archive_object:
      owns:
      - raw chain preservation
      - checkpoint snapshot
      - tiered evidence package
  forbidden_shortcuts:
  - raw chain を削除して compacted checkpoint だけを残す
  - replay-equivalence witness なしで closure_checkpoint を current basis に使う
  - legal-hold や escalated_gap があるのに final_ready を付与する
  - required retention tier を下回る証拠欠落を compaction の一部として黙認する
  residual_open_points: []
reverse_chain_legal_hold_reopen_replay_governance:
  status: provisional_fixed
  statement: reverse_chain_legal_hold_reopen_replay_governance とは、compaction 済み reverse chain に legal-hold または reopen 要求が入ったときの chain rehydration witness、replay audit window、current basis / audit basis の切替境界を固定する規則である。
  core_claims:
  - compaction は raw chain の消去ではなく checkpoint と manifest による再構成可能化であり、reopen は checkpoint・ancestor/head lineage・retained blob digest を束ねた rehydration witness が揃うときにだけ許される。
  - reopen purpose は correction_reopen、review_reopen、legal_hold_preservation、external_audit_reconstruction に分け、purpose ごとに許される replay scope と audience が異なる。
  - current basis は reflected 済み head と closure checkpoint を正本とし続け、replay 中に生成される audit basis は別 lane として保持する。audit basis を current basis へ昇格するには ratified correction または lawful no-change closure が必要である。
  - bounded replay は、目的・audience・affected rollback cell・retention tier が限定され、required witness が replay-equivalent で足りる場合に限る。payload exactness、identity unseal、cross-purpose stitching が必要な場合は full replay を要求する。
  - replay audit window は start / freeze / stop / reseal の状態を持ち、freeze 中は retention timer を止めても current basis を更新してはならない。window close 前に未解決の notice gap や authority challenge が残る場合は stop ではなく escalated_hold に送る。
  - legal-hold は replay の権利を自動付与しない。legal-hold は purge / compaction / timer 進行を停止するが、raw chain の reveal や de-redaction は別の purpose-bound authorization と packet rule を要する。
  rehydration_witness:
    required_fields:
    - reopen_session_id
    - trigger_kind_ref
    - reopen_purpose_ref
    - compaction_checkpoint_ref
    - reverse_chain_segment_digest_ref
    - ancestor_head_chain_digest_ref
    - retention_tier_attestation_ref
    - lawful_purpose_ref
    - authority_path_ref
    - audience_class_ref
    - requested_replay_scope_ref
    - started_at
    - freeze_until_or_null
    - closed_at_or_null
    rules:
    - compaction_checkpoint_ref は replay-equivalence witness と archive manifest digest に辿れなければならない。
    - reverse_chain_segment_digest_ref は reopen 対象 rollback cell 集合の境界を exact に示し、same checkpoint 内の unrelated segment を混ぜてはならない。
    - retention tier minimum が requested replay scope を満たさない場合は bounded replay を拒否し、必要なら full_archive recovery または escalate に送る。
  replay_window_classes:
    bounded_current_confirmation: current basis の妥当性確認だけを行い、current head や notice duty を変えない bounded replay。
    correction_validation: correction / reverse-of-reverse の admissibility を検証するために affected rollback cell 周辺だけを再生する replay。
    legal_hold_preservation: purge 停止・blob reseal・access audit のために witness chain を保持する replay。内容 reveal は最小限に限定する。
    external_audit_reconstruction: external audit 向けに replay-traceable lineage と required packet を再構成する replay。exact payload や identity unseal は別 gate を通す。
  basis_switch_rules:
    allowed_transitions:
    - current_basis -> audit_basis(session_open)
    - audit_basis -> current_basis(ratified_and_reflected_correction)
    - audit_basis -> current_basis(no_change_closure_with_witness)
    - audit_basis -> archived_audit_basis(session_close_no_promotion)
    blocked_transitions:
    - audit_basis で得た provisional finding を ratification なしに current_basis へ上書きする
    - freeze state のまま current basis を切り替える
    - legal_hold_preservation replay を根拠に correction_validation の昇格を行う
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reopen_session_id
      - reopen purpose / lawful purpose binding
      - basis lane state
      - promotion or no-change closure judgement
    GraphEngine:
      owns:
      - checkpoint rehydration plan
      - reverse chain segment reconstruction
      - affected rollback cell replay materialization
      - session freeze/stop lineage
    GraphLint:
      owns:
      - insufficient witness lint
      - scope leakage lint
      - illegal basis promotion lint
      - cross-purpose replay shortcut lint
    archive_object:
      owns:
      - checkpoint + manifest + retained blob linkage
      - rehydration witness packet
      - session access audit snapshot
  forbidden_shortcuts:
  - legal-hold を理由に raw chain 全体を自動 reveal する
  - checkpoint ref なしで current system state から replay を再生成する
  - audit basis の provisional finding を ratified correction なしに current basis へ反映する
  - freeze 中に retention timer を再開したり finality を再付与する
  residual_open_points: []
replay_packet_bounded_disclosure_governance:
  status: provisional_fixed
  statement: replay_packet_bounded_disclosure_governance とは、replay audit window 中に出せる packet class、actor/accountability/recipient/evidence slice の redaction-preserving disclosure、unseal 要件を固定する規則である。
  core_claims:
  - replay packet は chain dump ではなく purpose-bound packet class として出す。既定 class は summary_packet、trace_packet、exact_payload_packet、identity_unseal_packet の4群とする。
  - summary_packet は event family・affected rollback cell digest・finding class・time window を示すが、raw payload と individual identity を含めない。trace_packet は lineage / checkpoint / manifest linkage を示すが、blob 本体は含めない。
  - exact_payload_packet は exact payload が replay に必須な場合に限り許され、retention tier、audience class、purpose、authority path を満たさなければならない。identity_unseal_packet は別 gate であり、exact payload と同時許可を前提にしない。
  - actor identity、accountability binding、recipient alias、evidence blob は別 slice として扱い、同一 session で複数 packet を stitch して clear identity や cross-purpose reconstruction を作ってはならない。
  - redaction-preserving replay では packet ごとに redaction_basis_ref、join_barrier_ref、downstream_copy_rule を必須にし、consumer は packet class を跨いだ silent enrichment をしてはならない。
  - external audit でも disclosure は minimum sufficient packet を原則とし、full chain reveal は exact payload と identity unseal の双方が lawful に必要な場合に限る。
  packet_classes:
    summary_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - finding_class_ref
      - affected_rollback_cell_set_digest
      - time_window_ref
      - redaction_basis_ref
      - audience_class_ref
    trace_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - checkpoint_ref
      - lineage_segment_digest_ref
      - manifest_digest_ref
      - event_family_digest_ref
      - join_barrier_ref
    exact_payload_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - blob_digest_ref
      - payload_scope_ref
      - retention_attestation_ref
      - audience_class_ref
      - authority_path_ref
      - copy_rule_ref
    identity_unseal_packet:
      minimum_fields:
      - replay_session_id
      - packet_id
      - packet_class
      - identity_layer_ref
      - unseal_basis_ref
      - audience_class_ref
      - authority_path_ref
      - post_use_reseal_rule_ref
  slice_visibility_matrix:
    actor_identity: summary/trace では pseudonym まで、identity_unseal_packet でのみ lower layer を開く。
    accountability_binding: trace までは authority tier と forum binding を開示できるが、named individual binding は unseal gate を要する。
    recipient_alias: summary では cardinality/digest まで、trace では recipient surface lineage まで、exact payload と独立に扱う。
    evidence_blob: blob 本体は exact_payload_packet に限定し、trace_packet では blob_digest_ref のみを出す。
  stitching_barriers:
    rules:
    - summary_packet + trace_packet から clear identity を復元できてはならない。
    - identity_unseal_packet を exact_payload_packet と自動連結してはならない。
    - 異なる reopen purpose や audience_class 間で packet を再利用してはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - packet_class admissibility
      - audience / purpose binding
      - unseal authorization record
      - downstream copy restriction
    GraphEngine:
      owns:
      - packet materialization
      - slice-level redaction transform
      - join barrier tag propagation
    GraphLint:
      owns:
      - over-disclosure lint
      - cross-packet stitching lint
      - identity/blob co-release lint
      - missing redaction basis lint
    archive_object:
      owns:
      - packet manifest snapshot
      - issued packet digest log
      - post-use reseal evidence
  forbidden_shortcuts:
  - trace packet に raw blob を混ぜる
  - identity unseal を packet class ではなく viewer role だけで暗黙許可する
  - 同一 replay session 内の packet を横断結合して clear identity を再構成する
  - external audit を理由に full chain dump を既定動作にする
  residual_open_points: []
replay_derived_correction_reactivation_governance:
  status: provisional_fixed
  statement: replay_derived_correction_reactivation_governance とは、replay session で得た finding を correction / supersession / reverse head reactivation / new transition / escalate に振り分け、current basis と notice duty にどう接続するかを固定する規則である。
  core_claims:
  - replay finding class の既定集合は no_change、evidence_gap_confirmed、correction_required、supersession_required、lineage_break_detected、unlawful_disclosure_detected、insufficient_replay の7群とする。
  - no_change と evidence_gap_confirmed は no-change closure または bounded hold へ送れるが、current basis を silent に更新してはならない。correction_required と supersession_required は ratified correction path を要する。
  - reverse head reactivation は、prior reverse head が shadowed されただけで invalidated されておらず、new finding が current head の admissibility を否定し、かつ ancestor lineage が replay-traceable なときに限り許される。
  - lineage_break_detected と unlawful_disclosure_detected は reverse head reactivation では解決できず、new transition または escalate を要求する。
  - supersession_required は notice surface / commitment surface / recipient coverage の関係を伴うため、correction notice plan と recipient closure class を持たない限り current basis へ昇格できない。
  - replay で得た finding を reflected 前の provisional binding に使ってよいのは hold reason の追加や packet revoke までであり、branch-critical outcome を silent に切り替えてはならない。
  finding_classes:
    no_change: current head と notice duty に material change がない。witness 付き no-change closure 候補。
    evidence_gap_confirmed: 不足していた証拠の欠落自体が replay で確認された状態。bounded hold または explicit no-progress note を要する。
    correction_required: 同一 surface 内の correction で current basis を是正できる。ratified correction と reflected update を要する。
    supersession_required: prior notice / prior reverse head を successor が置き換える必要がある。coverage / commitment / recipient closure を伴う。
    lineage_break_detected: replay により ancestor/head chain の lawful continuity が破れている。new transition または reframe を要する。
    unlawful_disclosure_detected: packet issue や identity/blob co-release が unlawful だった。packet revoke / incident escalation / downstream notice を要する。
    insufficient_replay: required replay scope を再構成できず判断不能。current basis は維持し escalation または further recovery を要求する。
  branch_rules:
    allowed_actions:
    - no_change_closure
    - bounded_hold
    - ratified_correction
    - ratified_supersession
    - reverse_head_reactivation
    - new_transition_required
    - escalate_incident
    constraints:
    - reverse_head_reactivation では prior head の invalidation reason が cleared であり、shadowed ancestor digest が replay で確認できなければならない。
    - ratified_supersession では correction notice plan と recipient closure evidence が必須である。
    - lineage_break_detected と unlawful_disclosure_detected は current basis promotion を禁止し、incident or reframe lane に送る。
  notice_duty_projection:
    no_change: 新規 notice は不要。ただし replay session close witness を残す。
    correction_required: same-surface correction notice または internal correction packet を要求する。
    supersession_required: recipient closure plan を伴う successor correction notice を要求する。
    unlawful_disclosure_detected: revoke / breach / downstream recall notice を要求する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - finding class judgement
      - action branch selection
      - ratification state
      - notice duty binding
    GraphEngine:
      owns:
      - ancestor/head consistency replay
      - reactivation candidate reconstruction
      - finding-to-graph update plan
    GraphLint:
      owns:
      - illegal silent promotion lint
      - reactivation-with-invalid-ancestor lint
      - notice duty omission lint
      - insufficient replay closure lint
    archive_object:
      owns:
      - finding packet
      - no-change closure witness
      - reactivation / supersession proof bundle
  forbidden_shortcuts:
  - correction_required finding を no-change closure として閉じる
  - invalidated された prior reverse head を replay trace なしに再活性化する
  - unlawful_disclosure_detected を packet delete だけで無かったことにする
  - supersession_required に recipient closure evidence なしで current basis を切り替える
  residual_open_points: []
reopened_chain_reseal_retention_resume_governance:
  status: provisional_fixed
  statement: reopened_chain_reseal_retention_resume_governance とは、reopen / replay / correction 後の reverse chain を再 compaction し、reseal し、retention timer を resume / carry-over / reset する readiness 条件を固定する規則である。
  core_claims:
  - re-compaction readiness は replay session closed、finding branch resolved、required notice duty closed or escalated、packet revoke/reseal completed、active legal-hold unresolved なし、の5条件を満たすときにだけ真となる。
  - reseal は chain manifest reseal、packet set reseal、identity layer reseal、blob custody reseal の4面を持ち、ひとつでも未完なら final_ready を再付与してはならない。
  - retention timer は resume、carry_over、reset、freeze_continue の4値で扱う。legal-hold 継続中は freeze_continue、same-purpose bounded replay だけなら carry_over、payload unseal や downstream revoke を伴う incident replay では reset を要求する。
  - re-compaction 後の checkpoint は pre-reopen checkpoint を上書きせず、post-reopen checkpoint として append し、which-finding-branch closed this session を witness に残さなければならない。
  - audit basis を archived_audit_basis へ落とすには no-change closure witness または ratified-and-reflected outcome が必要であり、insufficient_replay や unresolved incident を抱えたまま reseal してはならない。
  - retention timer の resume は packet / identity / blob の各 surface で非同期に完了しうるが、surface ごとの timer_state をまとめて final closure と誤認してはならない。
  recompaction_readiness:
    required_checks:
    - replay_session_state=closed
    - finding_branch_state in {no_change_closed, correction_reflected, supersession_reflected, incident_escalated_with_hold}
    - required_notice_duty_state in {closed, escalated_gap_recorded}
    - reseal_surface_set completed
    - active_legal_hold_state in {none, separately_frozen_outside_session}
    allowed_targets:
    - closure_checkpoint
    - audit_projection
    - notice_squash
    blocked_targets:
    - structural_only を装って unresolved packet revoke を隠す
    - closure_checkpoint で insufficient_replay を閉じる
  reseal_surfaces:
    chain_manifest_reseal: post-reopen checkpoint と session closure witness を manifest に append する。
    packet_set_reseal: issued replay packet / revoke packet / correction packet の有効状態を閉じる。
    identity_layer_reseal: identity_unseal した layer を lawful に再封緘し、reuse 禁止を記録する。
    blob_custody_reseal: exact payload blob の custody handle と access audit を閉じる。
  timer_rules:
    resume: same-purpose / no-incident / no-unseal で session closure 後ただちに再開できる。
    carry_over: freeze 期間を差し引いて元の deadline を維持する。既定値。
    reset: payload unseal・incident escalation・downstream revoke・new legal obligation により保持義務が materially 更新された場合に要求する。
    freeze_continue: separate legal-hold や unresolved external audit hold が残る場合に継続する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - re-compaction readiness judgement
      - timer rule binding
      - final closure admissibility
      - separately frozen hold linkage
    GraphEngine:
      owns:
      - post-reopen checkpoint generation
      - surface-specific reseal state materialization
      - timer state propagation
    GraphLint:
      owns:
      - premature final_ready lint
      - mixed surface closure lint
      - illegal timer reset/carry-over lint
      - overwriting pre-reopen checkpoint lint
    archive_object:
      owns:
      - post-reopen checkpoint snapshot
      - reseal proof bundle
      - surface-level timer audit history
  forbidden_shortcuts:
  - pre-reopen checkpoint を上書きして reopen 痕跡を消す
  - identity layer が未 reseal のまま final_ready を付与する
  - insufficient_replay や unresolved incident を抱えたまま closure checkpoint を出す
  - timer を chain surface 一括で再開して packet / blob / identity の差異を失う
  residual_open_points: []
multi_session_quota_priority_governance:
  status: provisional_fixed
  statement: multi_session_quota_priority_governance とは、同一 chain family・同一 archive object・同一 authority tier に複数の legal-hold / replay session が重なるときの quota class、priority class、nested replay admissibility、starvation avoidance を固定する規則である。
  core_claims:
  - 同時実行枠は mutation を伴う exclusive_mutation_lane、trace 読み出し主体の bounded_parallel_read_lane、親 session の lawful 境界内でだけ走る nested_child_lane、監視専用の observer_shadow_lane の4 quota class で扱う。
  - priority は life_safety_or_active_compromise、external_mandated_audit、lawful_correction_reopen、routine_review の4 class を基本とし、優先度の高さは disclosure authority や identity unseal 権限を自動付与しない。
  - nested replay は child scope が parent scope の真部分集合であり、purpose・audience・identity layer・packet budget を widen せず、parent の join barrier と freeze rule を継承するときに限って許される。条件を満たさないものは sibling session として独立に queue する。
  - starvation avoidance は aging credit、max continuous occupancy、reservation checkpoint yield の3条件で扱う。低優先度 session を無期限に待機させてはならず、期限超過時は progress guarantee か authority escalation のどちらかを必須にする。
  - preemption は always-on override ではなく、preempted session snapshot、surface-level timer state、issued packet state、reason code を含む freeze witness を残したときにだけ許される。
  - timer inheritance は chain / packet / identity / blob の各 surface ごとに stricter-of rule を適用する。child session や lower priority session が親より短い retention や広い disclosure を選んではならない。
  quota_classes:
    exclusive_mutation_lane: checkpoint append、reseal、revoke、current basis promotion のように状態を変える操作専用の単独実行枠。
    bounded_parallel_read_lane: trace / summary / witness verification のような read-equivalent replay を並列に許す枠。
    nested_child_lane: 親 session に従属し、scope widening を伴わない child replay の専用枠。
    observer_shadow_lane: audit observability や fairness telemetry 採取だけを行い、packet issuance や timer mutation を行わない枠。
  priority_classes:
    life_safety_or_active_compromise: 安全影響または active compromise を抑止するために最上位 preemption を許す class。
    external_mandated_audit: 法令・契約・司法等で期限拘束された監査再生。
    lawful_correction_reopen: current basis の correction / supersession を要する reopen。
    routine_review: 定期レビューや説明補助のための非緊急 replay。
  nested_admissibility:
    required_conditions:
    - child_requested_scope ⊂ parent_admitted_scope
    - child_purpose compatible_with parent_purpose
    - child_audience_class no_wider_than parent_audience_class
    - child_identity_layer_cap no_wider_than parent_identity_cap
    - child_packet_budget explicitly reserved
    - parent_join_barrier inherited
    blocked_conditions:
    - child session が exact payload や identity unseal を parent より広く要求する
    - parent session が freeze 中なのに child が timer resume を試みる
    - child を使って sibling session の queue 順を飛び越える
  starvation_avoidance:
    fairness_controls:
    - aging_credit
    - max_continuous_occupancy
    - checkpoint_yield
    - priority_decay_for_noncritical_repeat
    rules:
    - routine_review でも aging_credit が閾値を超えたら bounded_parallel_read の最小枠を確保する。
    - external_mandated_audit が連続しても exclusive_mutation_lane を占有し続ける場合は checkpoint_yield を挿入する。
    - life_safety_or_active_compromise class の連続 preemption は starvation debt として ledger に記録する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - quota / priority binding
      - preemption reason code
      - nested admissibility judgement
      - starvation debt record
    GraphEngine:
      owns:
      - lane allocation
      - session snapshot / freeze witness materialization
      - surface-level timer inheritance propagation
    GraphLint:
      owns:
      - illegal nested widening lint
      - silent priority bypass lint
      - starvation bound violation lint
      - mixed-surface timer inheritance lint
    archive_object:
      owns:
      - lane occupancy evidence
      - preemption snapshot bundle
      - reservation checkpoint witness
  forbidden_shortcuts:
  - priority class だけで identity unseal や exact payload disclosure を暗黙許可する
  - nested child を使って parent scope を事後的に widen する
  - preemption 前の session snapshot を残さず active lane を奪う
  - chain surface の timer rule を packet / identity / blob に一括コピーする
  residual_open_points: []
shared_archive_reservation_budget_governance:
  status: provisional_fixed
  statement: shared_archive_reservation_budget_governance とは、複数 session が同一 archive object / chain family / checkpoint lineage を競合利用するときの witness reservation unit、sharing mode、packet budget segregation、borrow 制約を固定する規則である。
  core_claims:
  - reservation unit は witness_set、trace_packet_budget、exact_payload_handle、identity_unseal_slot、revoke_reseal_window の5単位を基本とする。trace 系と manifest digest は sharing 可能だが、exact payload と identity unseal は原則 exclusive または escrow とする。
  - packet budget は purpose と audience の直積で segregate する。summary/trace と exact payload / identity unseal を同一 budget に混ぜてはならず、borrow は central-authority ratification と debt ledger がある場合にだけ例外的に許す。
  - copy-on-read が可能なのは trace-equivalent witness に限る。mutable packet manifest や post-use reseal obligation を共有 alias してはならない。
  - orphan reservation は heartbeat timeout で即時解放せず、legal-hold / appeal / audit challenge の有無を確認したうえで quarantine_reclaim へ送る。
  - ある session の packet revoke や identity reseal が、別 session の lawful witness を silent invalidation してはならない。影響を受ける session には affected-session notice と admissibility recompute を必須にする。
  - shared archive object 上の reservation は allocation 記録だけでなく、release / transfer / quarantine の各遷移にも immutable witness を残さなければならない。
  reservation_units:
    witness_set: checkpoint / lineage / manifest digest を束ねた read-equivalent witness 単位。
    trace_packet_budget: summary / trace packet を発行できる上限枠。
    exact_payload_handle: payload blob の一時アクセス権を示す exclusive handle。
    identity_unseal_slot: identity layer を lawful に開くための一時 slot。
    revoke_reseal_window: issued packet revoke と post-use reseal を完了させる専用 window。
  sharing_modes:
    shareable_read_equivalent: trace-equivalent witness だけを複数 session で共有できる。
    exclusive_mutable: exact payload handle と revoke_reseal_window は単独保持を原則とする。
    escrow_transfer: authority ratification と受け手の acceptance が揃った場合に限り一時移管できる。
    forbidden_borrow: purpose widening・audience widening・identity widening を伴う借用は禁止する。
  borrowing_rules:
    allowed_only_if:
    - central_authority_ratified
    - borrow_reason_code recorded
    - debt_ledger appended
    - downstream revoke propagation plan exists
    blocked_if:
    - borrow により packet class が widen する
    - identity_unseal_slot を trace session に流用する
    - return deadline が未定義のまま escrow transfer する
  orphan_recovery:
    states:
    - heartbeat_lost
    - quarantine_reclaim
    - hold_blocked
    - reassigned_with_witness
    - fully_released
    rules:
    - heartbeat_lost だけでは fully_released にしない。
    - legal_hold / appeal / external_audit challenge が残るときは hold_blocked に留める。
    - reassigned には old holder の last snapshot と new holder の acceptance witness を要求する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - reservation grant / release / transfer decision
      - borrow debt ledger
      - affected-session notice obligation
    GraphEngine:
      owns:
      - reservation materialization
      - copy-on-read trace issuance
      - quarantine reclaim workflow
      - admissibility recompute trigger
    GraphLint:
      owns:
      - mixed-budget disclosure lint
      - silent invalidation lint
      - illegal borrow lint
      - orphan release without witness lint
    archive_object:
      owns:
      - reservation map snapshot
      - exclusive handle custody
      - transfer / release witness bundle
  forbidden_shortcuts:
  - trace budget を exact payload handle に横流しする
  - identity_unseal_slot を viewer role だけで黙って再利用する
  - heartbeat timeout を理由に hold 確認なしで reservation を自動解放する
  - 一方の session の revoke を他方の witness 失効として silent 適用する
  residual_open_points: []
authority_competition_override_appeal_governance:
  status: provisional_fixed
  statement: authority_competition_override_appeal_governance とは、central authority・domain authority・delegated reviewer・external mandate が競合するときの forced preemption、emergency override、appeal reopen、contested surface freeze を固定する規則である。
  core_claims:
  - override は authority tier の高さだけで自動成立しない。override_basis_ref、target_session_snapshot_ref、contested_surface_ref、counter-sign notice plan、restoration path が揃ったときにだけ forced preemption を許す。
  - emergency override は life-safety / active compromise / legal non-compliance を即時抑止するための例外であり、schedule priority を上げられても packet class や identity layer を自動 widen してはならない。
  - appeal reopen は既存 session を上書きする操作ではなく、source decision を参照する appellate lane として append する。appeal lane は source lane の mutable record を直接編集してはならない。
  - 同格 authority の競合は arrival time や operator discretion で解いてはならない。precedence DAG で優劣がつかない場合は contested surface を freeze し、上位 forum へ remand する。
  - override 後の restoration outcome は uphold、modify、vacate、remand の4 class に分け、quota debt・timer inheritance・reservation transfer の帰結を outcome ごとに明示する。
  - external mandate は scope と期限が明示された拘束であり、mandate 外の packet borrowing や identity unseal を正当化しない。
  override_classes:
    emergency_override: 即時危険抑止のための例外的 preemption。
    regular_forced_preemption: 上位 authority の通常 override。
    mandated_takeover: 司法・法令・契約等の external mandate による takeover。
    appeal_reopen: 既存判定の再審査を行う appellate lane。
  precedence_dag_rules:
    ordered_edges:
    - external_mandate > central_authority
    - central_authority > domain_authority
    - domain_authority > delegated_reviewer
    tie_rules:
    - 同一 tier で lawful scope が衝突するときは contested surface freeze を行う。
    - counter-sign notice が欠ける override は effective にしない。
    - precedence DAG で未比較なら remand を既定とする。
  appeal_lane_model:
    required_fields:
    - appeal_lane_id
    - source_session_id
    - appeal_basis_ref
    - contested_surface_set
    - forum_ref
    - stay_or_nonstay_flag
    - restoration_outcome_or_null
    rules:
    - appeal_lane は source session の immutable snapshot を参照し、source ledger record を直接更新しない。
    - stay が付く場合だけ contested surface の mutation を止められる。
    - appeal outcome は uphold / modify / vacate / remand のいずれかに閉じる。
  restoration_outcomes:
    uphold: override または source decision を維持する。
    modify: 一部 surface / packet / timer rule を変更して戻す。
    vacate: target decision を失効させ、新たな lane でやり直す。
    remand: 上位 forum へ差し戻し、現 lane は contested freeze を維持する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - override basis binding
      - precedence DAG evaluation
      - appeal lane creation
      - restoration outcome record
    GraphEngine:
      owns:
      - target session snapshot
      - contested surface freeze materialization
      - reservation / timer transfer plan
    GraphLint:
      owns:
      - scope-widening override lint
      - uncountersigned override lint
      - appeal-overwrite lint
      - equal-tier silent tie-break lint
    archive_object:
      owns:
      - override packet bundle
      - appeal snapshot archive
      - restoration witness bundle
  forbidden_shortcuts:
  - authority tier が高いことだけで override を成立させる
  - emergency override を理由に packet class や identity layer を widen する
  - appeal reopen で source session の record を直接書き換える
  - 同格 authority の衝突を arrival time だけで解決する
  residual_open_points: []
cross_session_settlement_debt_governance:
  status: provisional_fixed
  statement: cross_session_settlement_debt_governance とは、重なり合った multi-session replay / hold / appeal 群を lawful に閉じ直すための settlement checkpoint、quota debt carry-over、audit proof bundle を固定する規則である。
  core_claims:
  - settlement checkpoint は global merge ではなく append-only bundle であり、surviving hold、released reservation、transferred debt、contested residue、current basis promotion admissibility を一括で記録する。
  - debt は starvation_debt、disclosure_debt、reseal_debt、audit_followup_debt の4 class に分ける。ひとつの session の closure が他 session の debt を自動相殺してはならない。
  - debt transfer は lawful receiver、acceptance witness、due window、discharge condition が明示された場合にだけ許す。受け手不在の debt は settlement checkpoint に unresolved residue として残す。
  - partial settlement は surface 単位または object 単位で許されるが、partial closure を global clean closure と誤認させてはならない。global closure は surviving hold なし、required reseal complete、mandatory debt disposition complete を要件とする。
  - audit proof bundle には schedule decision lineage、preemption chain、reservation transfer、packet issuance / revoke history、debt ledger、restoration outcome、closure projection を含めなければならない。
  - auto-compaction や final_ready 再付与は settlement bundle 完成後でなければならず、unresolved residue を隠すための closure checkpoint を禁止する。
  settlement_bundle_fields:
    required_fields:
    - settlement_checkpoint_id
    - covered_session_set
    - surviving_hold_set
    - released_reservation_set
    - transferred_debt_set
    - unresolved_residue_set
    - closure_projection_ref
    - audit_proof_bundle_ref
    - created_at
    rules:
    - covered_session_set の外にある live session を暗黙に閉じてはならない。
    - closure_projection_ref は partial_surface / partial_object / global_clean / global_with_residue を区別する。
    - audit_proof_bundle_ref が欠ける settlement checkpoint は external-facing closure に使ってはならない。
  debt_classes:
    starvation_debt: 待機・checkpoint yield 不足・連続 preemption により生じた公平性負債。
    disclosure_debt: issued packet revoke・recipient notice・downstream cleanup が残っている負債。
    reseal_debt: identity / blob / packet / manifest の再封緘が未完な負債。
    audit_followup_debt: external audit や appeal remand に伴う追加提出・照合作業の負債。
  transfer_rules:
    allowed_only_if:
    - lawful_receiver_ref present
    - receiver_acceptance_ref present
    - due_window_ref present
    - discharge_condition_ref present
    blocked_if:
    - receiver が debt class に対応する authority / custody を持たない
    - partial settlement を理由に unrelated debt をまとめて移す
    - due window 不明のまま debt を carry-over する
  closure_states:
    partial_surface: 一部 surface だけ lawful に閉じた状態。
    partial_object: 一部 object / chain family だけ閉じた状態。
    global_clean: surviving hold も unresolved residue もない全体閉鎖。
    global_with_residue: global scope を評価したが residue が残るため clean closure ではない状態。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - settlement checkpoint judgement
      - debt transfer / discharge record
      - closure projection binding
      - current basis promotion admissibility after settlement
    GraphEngine:
      owns:
      - settlement bundle materialization
      - surface/object closure projection generation
      - debt carry-over propagation
    GraphLint:
      owns:
      - false global closure lint
      - debt transfer without receiver lint
      - missing audit proof bundle lint
      - residue-hiding checkpoint lint
    archive_object:
      owns:
      - audit proof bundle snapshot
      - settlement checkpoint archive
      - debt ledger history pack
  forbidden_shortcuts:
  - partial settlement を global clean closure と表示する
  - receiver acceptance なしで debt を transfer する
  - audit proof bundle なしで external-facing closure を出す
  - unresolved residue を closure checkpoint の外に落として見えなくする
  residual_open_points: []
quota_debt_remediation_rebalancing_governance:
  status: provisional_fixed
  statement: quota_debt_remediation_rebalancing_governance とは、confirmed breach 後の debt remediation family、lane rebalancing rule、backlog-drain plan、debt discharge / forgiveness 条件を固定する規則である。
  core_claims:
  - confirmed breach は remediation plan を必須にする。throttle を掛けるだけで debt を解消したことにしてはならない。
  - debt class ごとに remediation family を分ける。starvation_debt は fairness credit / reserved yield slot、disclosure_debt は revoke-notice sweep、reseal_debt は dedicated reseal window、audit_followup_debt は evidence assembly lane を基本とする。
  - lane rebalancing は donor lane、receiver lane、temporary borrow cap、protected floor、expiry、rollback path を束ねて行う。life-safety や mandated audit の protected floor を routine backlog drain のために侵食してはならない。
  - backlog-drain plan には target backlog class、drain horizon、per-window throughput target、admission freeze scope、review checkpoint を必須にする。改善を定量化せずに drain 完了を宣言してはならない。
  - debt discharge は obligation class ごとの completion witness を要求する。debt forgiveness は discharge evidence が不十分でも policy 上切り捨てる操作ではなく、authority-bound waiver と residual risk acknowledgment を持つ例外としてのみ許す。
  - rebalancing は lane 移動だけで debt を隠してはならない。receiver lane に移した backlog / residue / reseal obligation も traceable に carry され、settlement checkpoint に反映されなければならない。
  remediation_families:
    starvation_debt: reserved_yield_slot、fairness credit refill、bounded priority relaxation により待機 debt を減らす。
    disclosure_debt: issued packet revoke、recipient notice、downstream cleanup を sweep lane で束ねて解消する。
    reseal_debt: identity / blob / packet / manifest の reseal obligation を専用 window へ寄せる。
    audit_followup_debt: audit packet assembly、cross-check、submission queue を専用 lane で処理する。
  lane_rebalancing_rules:
    required_fields:
    - donor_lane_ref
    - receiver_lane_ref
    - temporary_borrow_cap
    - protected_floor_ref
    - expiry_ref
    - rollback_path_ref
    rules:
    - receiver lane が debt class に対応する custody / authority を持たない場合は rebalance を禁止する。
    - protected floor を下回る donor からの借用は、emergency class を除き許さない。
    - expiry 到達後に auto-return できない rebalancing は manual escalation を伴う。
  backlog_drain_plan:
    required_fields:
    - target_backlog_class
    - drain_horizon_ref
    - throughput_target_ref
    - admission_freeze_scope_ref
    - review_checkpoint_schedule_ref
    success_conditions:
    - target backlog が horizon 内で monotone に減少する
    - new debt creation rate が bounded である
    - protected floor を侵食しない
  debt_discharge_and_forgiveness:
    discharge_requires:
    - obligation-specific completion witness
    - carry-over residue linkage cleared or explicitly transferred
    - review checkpoint pass if policy requires
    forgiveness_allowed_only_if:
    - authority-bound waiver exists
    - residual risk acknowledgment exists
    - audit proof bundle links the waiver
    blocked_if:
    - timeout 到来だけで debt を forgive する
    - lane move だけで debt を hidden discharge 扱いにする
    - protected floor violation を残したまま remediation 完了を宣言する
  tool_responsibilities:
    DecisionLedger:
      owns:
      - remediation family binding
      - lane rebalance approval
      - debt discharge / waiver record
      - protected floor exception binding
    GraphEngine:
      owns:
      - rebalance execution plan
      - backlog-drain progress materialization
      - carry-over linkage propagation
      - rollback path execution witness
    GraphLint:
      owns:
      - hidden debt transfer lint
      - protected floor violation lint
      - drain plan incompleteness lint
      - forgiveness without waiver lint
    archive_object:
      owns:
      - rebalance snapshot
      - drain progress pack
      - debt discharge / waiver witness bundle
  forbidden_shortcuts:
  - confirmed breach に remediation plan を付けず throttle だけ掛ける
  - protected floor を侵食しても backlog が減れば良しとする
  - timeout だけで debt forgiveness を行う
  - lane move を hidden discharge として residue を見えなくする
  residual_open_points: []
accountable_identity_slice_exception_threshold_governance:
  status: provisional_fixed
  statement: accountable_identity_slice_exception_threshold_governance とは、life-safety / active compromise 例外で accountable_identity_slice を開ける閾値を detector family / sink class ごとに分け、bounded_actor_slice で足りる場面と single named principal 向け限定 reveal が必要な場面を区別する規則である。
  core_claims:
  - accountable_identity_slice は default reveal class ではない。まず bounded_actor_slice で containment 可能かを判定し、それが失敗した場合にだけ例外 lane を開く。
  - 閾値は detector ごとの生データ量ではなく、detector family の信号性質と sink class の不可逆性で決める。same score でも irreversible_resource_lock は authoritative_state より厳しい。
  - behavioral inference 系 detector は、そのまま accountable_identity_slice を正当化しない。policy drift、flooding、replay、local convention のような間接推論は、direct compromise 系へ upgrade されない限り bounded_actor_slice を上限とする。
  - accountable_identity_slice を許しても audience は single named principal または 1 supervised session に限定し、bulk disclosure、cache promotion、public explanation 流用を禁止する。
  - 例外 lane は identity reveal の権利ではなく containment の責務である。post-confirm が失敗したときは auto-reseal、derived export revoke、continued hold、violation event を同時に起動する。
  - DecisionLedger / GraphEngine / GraphLint / archive object は threshold matrix、direct-route evidence、exception session、auto-reseal branch を分担する。
  detector_family_classes:
    direct_system_compromise:
      statement: direct system observation、access-control / routing log、authenticated incident command など、compromise または imminent harm を直接束縛できる family。
    corroborated_compromise_or_leak:
      statement: suspected_leak / route_identity / effect_realization について multi-source corroboration と direct route evidence が揃った family。
    supervised_human_safety_report:
      statement: named principal または supervised operator からの life-safety report で、incident command と session witness が束縛される family。
    inferred_behavioral_detector:
      statement: policy drift、flooding、replay、local convention、cadence anomaly などの行動推論 family。identity reveal 例外の直接根拠には使わない。
  threshold_matrix:
    direct_system_compromise:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: life_safety_or_active_compromise_with_single_principal
      public_or_external_commitment: active_compromise_or_imminent_life_safety_with_direct_route_evidence
      irreversible_resource_lock: extreme_only_with_central_or_predelegated_incident_authority
    corroborated_compromise_or_leak:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: active_compromise_only_and_dual_corroboration
      public_or_external_commitment: extreme_only_with_direct_route_evidence
      irreversible_resource_lock: forbidden_without_direct_system_compromise_upgrade
    supervised_human_safety_report:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: life_safety_only_and_supervised_session
      public_or_external_commitment: life_safety_only_and_single_named_principal
      irreversible_resource_lock: forbidden_without_direct_system_compromise_upgrade
    inferred_behavioral_detector:
      owner_bound_internal: forbidden
      bounded_internal_shared: forbidden
      authoritative_state: forbidden
      public_or_external_commitment: forbidden
      irreversible_resource_lock: forbidden
  activation_requirements:
    mandatory_preconditions:
    - life_safety_flag または active_compromise_flag が true である
    - alternative bounded_actor_slice path が failed または insufficient である
    - security_lane と custody_lane が active である
    - append-only precommit、HSM attested witness、human observer witness が先に固定される
    - audience が 1 名または 1 supervised session に束縛される
    - clear identity を authority post-confirm 前の final evidence / penalty / public explanation に流用しない
    numeric_caps_by_sink_class:
      authoritative_state:
        ttl: 1時間
        post_confirm_sla: 1時間
      public_or_external_commitment:
        ttl: 30分
        post_confirm_sla: 30分
      irreversible_resource_lock:
        ttl: 15分
        post_confirm_sla: 15分
    upgrade_requirements:
    - irreversible_resource_lock での例外は central_authority または pre-ratified incident command delegation を要する
    - corroborated_compromise_or_leak が irreversible_resource_lock に触れるときは direct_system_compromise family への upgrade が必要
    - supervised_human_safety_report 単独では lock / public commitment の恒久変更を正当化しない
  tool_responsibilities:
    DecisionLedger:
      owns:
      - threshold matrix registry
      - exception basis binding
      - single-principal authorization
      - post-confirm / auto-reseal judgement
    GraphEngine:
      owns:
      - detector-family and sink-class normalization
      - direct-route evidence evaluation
      - ttl and post-confirm timer
      - derived export revoke execution
    GraphLint:
      owns:
      - behavioral-detector identity reveal lint
      - multi-recipient accountable-slice lint
      - missing-direct-route-evidence lint
      - post-confirm-missing exception lint
    archive_object:
      owns:
      - sealed exception session digest
      - direct-route evidence packet
      - auto-reseal / revoke history
      - exception review trail
  forbidden_shortcuts:
  - policy drift や flooding のような behavioral detector だけで accountable_identity_slice を開く。
  - bounded_internal_shared 以下の sink class に対して convenience のために clear identity を出す。
  - single named principal 制約を破って recipient を増やす。
  - TTL 超過後も derived export を revoke せずに保持する。
  - accountable_identity_slice を canonical archive object の通常 surface へ昇格する。
  residual_open_points: []
execution_capsule_blob_boundary_governance:
  status: provisional_fixed
  statement: execution_capsule_blob_boundary_governance とは、execution capsule の binary payload を inline blob と immutable pinned blob のどちらで保持するかを、root profile と replay class を主軸に、sink strictness・protected facet・legal hold を strict 化条件として固定する規則である。
  core_claims:
  - inline blob は storage optimization であり、canonical proof の downgrade path ではない。manifest に digest・byte-length・serialization profile・replay class が束縛されていない payload を inline 正本と呼んではならない。
  - size 境界は replay class より弱い。forensic replay、active legal hold、strict sink、protected facet、identity envelope 依存がある payload は小さくても pinned を強制する。
  - deterministic replay は例外的に小さい canonical text payload だけ inline を許す。binary sidecar、多部品 payload、mutable serializer、externalized commitment を伴う場合は pinned を強制する。
  - profile 差は summary_only / analytical_replay の inline ceiling と max part count にだけ表す。strict 化は monotone tightening とし、looser profile への downgrade で pin 要件を外してはならない。
  - pointer 単独、post-hoc repin、current system からの再生成を canonical replay artifact の代替にしてはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object / external blob store は boundary registry、blob lifecycle、forced-pin lint、archive binding を分担する。
  profile_boundary_registry:
    regulated_domain:
      summary_only:
        inline_max_bytes: 131072
        max_inline_parts: 1
        default_materialization: inline_or_pin
      analytical_replay:
        inline_max_bytes: 262144
        max_inline_parts: 1
        default_materialization: inline_or_pin
      deterministic_replay:
        inline_max_bytes: 65536
        max_inline_parts: 1
        default_materialization: pinned_unless_canonical_text_exception
      forensic_replay:
        inline_max_bytes: 0
        max_inline_parts: 0
        default_materialization: pinned_mandatory
    engineering_tradeoff_domain:
      summary_only:
        inline_max_bytes: 524288
        max_inline_parts: 2
        default_materialization: inline_or_pin
      analytical_replay:
        inline_max_bytes: 1048576
        max_inline_parts: 2
        default_materialization: inline_or_pin
      deterministic_replay:
        inline_max_bytes: 262144
        max_inline_parts: 1
        default_materialization: pinned_unless_canonical_text_exception
      forensic_replay:
        inline_max_bytes: 0
        max_inline_parts: 0
        default_materialization: pinned_mandatory
    organizational_or_social_domain:
      summary_only:
        inline_max_bytes: 1048576
        max_inline_parts: 2
        default_materialization: inline_or_pin
      analytical_replay:
        inline_max_bytes: 2097152
        max_inline_parts: 3
        default_materialization: inline_or_pin
      deterministic_replay:
        inline_max_bytes: 262144
        max_inline_parts: 1
        default_materialization: pinned_unless_canonical_text_exception
      forensic_replay:
        inline_max_bytes: 0
        max_inline_parts: 0
        default_materialization: pinned_mandatory
  forced_pin_triggers:
  - replay_class = forensic_replay
  - legal_hold_state = active
  - sink_class ∈ {public_or_external_commitment, irreversible_resource_lock}
  - protected_facet_flag = true
  - sealed_identity_envelope_body_dependency = true
  - payload_parts > max_inline_parts(profile, replay_class)
  - payload_byte_length > inline_max_bytes(profile, replay_class)
  - deterministic_replay で canonical text / fixed serializer / fixed environment descriptor を満たさない
  - binary sidecar または mutable alias への依存がある
  deterministic_inline_exception:
    admissible_when:
    - replay_class = deterministic_replay
    - payload は単一 canonical text object または deterministic serialization 済み single-part blob である
    - payload_byte_length <= inline_max_bytes(profile, deterministic_replay)
    - protected_facet_flag = false かつ sink_class ∉ {public_or_external_commitment, irreversible_resource_lock}
    - manifest に digest・byte-length・serializer version・environment descriptor が束縛されている
    non_implications:
    - deterministic replay 一般で inline を推奨することを意味しない
    - legal hold や forensic review の pin 要件を緩めることを意味しない
  tool_responsibilities:
    DecisionLedger:
      owns:
      - profile boundary registry
      - forced-pin judgement
      - purge / reopen admissibility decision
      - materialization override reason
    GraphEngine:
      owns:
      - blob byte-length and part-count capture
      - pin / unpin lifecycle
      - serializer / environment descriptor capture
      - replay request linkage
    GraphLint:
      owns:
      - oversize-inline lint
      - forensic-inline lint
      - pointer-only canonicalization lint
      - post-hoc repin without witness lint
    archive_object:
      owns:
      - manifest digest binding
      - inline payload embedding
      - pinned blob digest linkage
      - purge / reopen audit trail
    external_blob_store:
      owns:
      - immutable content-addressed blob
      - retention pin state
      - retrieve audit log
      - no normative meaning without manifest binding
  forbidden_shortcuts:
  - size だけで inline / pinned を決め、replay class や sink strictness を無視する。
  - forensic replay や legal hold active の payload を小さいからという理由で inline に留める。
  - mutable URL や latest alias だけを残して canonical pinned blob の代替とする。
  - raw payload を失った後で current system から再生成し、元の pinned blob があったことにする。
  - deterministic replay と称しながら multi-part binary payload を silent inline する。
  residual_open_points: []
claim_criticality_governance:
  status: provisional_fixed
  statement: claim_criticality_governance とは、主要主張 / context-sensitive claim / 補助主張を、branch effect・harm / irreversibility・authority reach・external commitment reach に基づいて criticality band へ分類し、GraphLint の severity / weight / required evidence / escalation routing に写像する規則である。
  core_claims:
  - 主要主張は文章上の見出しではなく、current action の lawful/admissible branch、approval path、accountability binding、rollback readiness、external commitment のいずれかを変えうる claim である。
  - context-sensitive claim は activation predicate が true の文脈でだけ主要主張化する。predicate が false または未束縛なら、主要主張として扱ってはならない。
  - 補助主張は説明・追跡・較正には必要でも、それ単独では current action の lawful branch を変えない claim である。補助主張を束ねても、active な主要主張の欠落を埋めたことにはならない。
  - criticality は truth importance の一般論ではなく、今の decision frame に対する branch importance である。stakeholder の声量や文量の多さを criticality 根拠にしてはならない。
  - GraphLint は issue 抽出の前に claim role と criticality band を束縛し、その結果を severity floor、weight floor、required evidence class、escalation route に写像する。単一総合点で高 criticality claim の欠落を相殺してはならない。
  - DecisionLedger / GraphEngine / GraphLint / archive object は claim role binding、activation state、lint judgement、critical trace archive を分担する。
  claim_role_rules:
    primary_claim:
      statement: activation predicate の有無にかかわらず、現行 frame で false / ambiguity / evidence gap が execute|hold|rollback|escalate|reject の分岐、approval path、責任分担、external commitment を変えうる claim。
      typical_cases:
      - safety gate
      - regulatory / contractual admissibility
      - authority chain validity
      - irreversible resource lock precondition
      - public or customer commitment basis
    context_sensitive_claim:
      statement: 特定 profile / operation / sink / decision context でだけ primary_claim 化する claim。activation predicate ref と inactive 時の downgraded role を必須にする。
      mandatory_fields:
      - activation_predicate_ref
      - active_scope_ref
      - inactive_role_ref
    auxiliary_claim:
      statement: 説明補助、背景説明、calibration、coverage enrichment、implementation detail を支えるが、それ単独では現行 branch を変えない claim。
      non_implications:
      - 不要であることを意味しない
      - systemic cluster 化で重大化しないことを意味しない
  criticality_bands:
    constitutional_or_irreversible:
      triggers:
      - life-safety または重大な法規 / 契約違反に直結する
      - public_or_external_commitment または irreversible_resource_lock を直接変える
      - authority route / human override / non-delegable stop を変える
      graphlint_defaults:
        severity_floor: critical_blocker
        weight_floor: 1.0
        required_evidence_class: authority_bound_direct
        escalation_route: top_authority_or_non_delegable_human_lane
    branch_decisive:
      triggers:
      - execute|hold|rollback|escalate|reject の分岐を変える
      - approval path または accountability binding を変える
      - rollback readiness や required control set を変える
      graphlint_defaults:
        severity_floor: major_blocker
        weight_floor: 1.0
        required_evidence_class: traceable_branch_basis
        escalation_route: decision_owner_or_required_approver_lane
    operational_support:
      triggers:
      - 主要主張の repair path、coverage basis、timing、resource allocation、monitoring adequacy を変える
      - 単独では branch を変えないが、active primary の成否に影響する
      graphlint_defaults:
        severity_floor: repair_major_or_minor
        weight_floor: 0.35
        required_evidence_class: traceable_supporting
        escalation_route: model_owner_or_domain_curator_lane
    explanatory_auxiliary:
      triggers:
      - 説明豊富化
      - reader guidance
      - non-branch background context
      graphlint_defaults:
        severity_floor: informational_or_minor
        weight_floor: 0.2
        required_evidence_class: linkable_or_optional
        escalation_route: local_documentation_lane
  weight_floor_policy:
    active_primary_rule: primary_claim と active な context-sensitive claim は mandatory weight floor 1.0 を持つ。これらに unmanaged major issue があると、対応する q_dimension は 1 を超えてはならない。
    inactive_context_sensitive_rule: inactive な context-sensitive claim は operational_support として最大 0.35 の weight で扱う。active でないのに primary blocker を作ってはならない。
    auxiliary_cap_rule: operational_support / explanatory_auxiliary は score 2→3 の改善に寄与してよいが、active primary の欠落・矛盾・未根拠を埋めて score 0/1→2 を作ってはならない。
    aggregation_note: 複数 auxiliary claim を束ねても primary substitution は作らない。systemic promotion は domain calibration thread で別途固定する。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - claim role registry
      - activation predicate binding
      - manual override of criticality band
      - escalation route authority binding
    GraphEngine:
      owns:
      - activation state evaluation
      - claim-to-branch linkage
      - role change history
      - context transition record
    GraphLint:
      owns:
      - criticality band inference proposal
      - role/activation mismatch lint
      - severity / weight / evidence mapping
      - primary-substitution lint
    archive_object:
      owns:
      - critical trace packet
      - claim classification evidence
      - activation predicate witness
      - lint and escalation audit trail
  forbidden_shortcuts:
  - 文書の先頭にあるからという理由だけで主要主張とみなす。
  - activation predicate のない context-sensitive claim を都合よく primary / auxiliary に切り替える。
  - auxiliary claim の件数や総文字数で primary claim 欠落を相殺する。
  - life-safety / legal / external commitment claim を補助主張として single aggregate score に溶かす。
  - criticality を stakeholder 数や声量の proxy にする。
  residual_open_points: []
auxiliary_support_domain_calibration_governance:
  status: provisional_fixed
  statement: auxiliary_support_domain_calibration_governance とは、active な primary_claim / context-sensitive claim を前提に、補助主張 cluster が q_structure / q_context / q_evidence / q_conflict / q_ambiguity / q_explain の各次元を score 2/3 へ押し上げるための floor・independence・systemic promotion 条件を、domain profile ごとに固定する規則である。
  core_claims:
  - 補助主張は primary substitution を作れない。active な primary_claim または active な context-sensitive claim に unresolved major issue が残る場合、対応する q_dimension は 1 を超えてはならない。
  - score 2 は primary basis に加えて最低限の auxiliary support floor が満たされた状態、score 3 は独立性・境界事例・反例探索まで含む robust support が満たされた状態として分ける。
  - 補助主張 cluster は、同一 active claim facet と同一 q_dimension に結び付く補助主張群であり、cluster_role は corroborative / boundary_case / rebuttal / operationalization / explanation_path の5種に正規化する。
  - 同一 source lineage や同一 evidence packet を複数 cluster として重複計上してはならない。独立 origin 数は source owner / collection route / claim facet のいずれかが独立であることを要する。
  - systemic promotion は cluster 件数の多さではなく、同一 active primary facet に対して unresolved auxiliary issue が閾値を超え、branch 判定を実質的に不安定化させる場合にだけ発火する。
  - inactive な context-sensitive claim は operational_support としてしか数えない。predicate witness が真になったときだけ active primary 同等の cap rule を受ける。
  cluster_role_definitions:
    corroborative: 主要主張の根拠や成立条件を別 origin から支持する cluster。
    boundary_case: 適用境界、反例候補、非対象条件、負例テストを明示する cluster。
    rebuttal: 競合 evidence や反対解釈に対する応答、isolating split、解消方針を持つ cluster。
    operationalization: 手順、条件束縛、monitoring、rollback readiness、required metadata を機械可読にする cluster。
    explanation_path: claim→context→evidence→constraint の追跡路を読める形にする cluster。
  domain_calibration_table:
    regulated_domain:
      score2_floor:
        q_structure:
          min_clusters: 2
          required_roles:
          - operationalization
          - corroborative
        q_context:
          min_clusters: 2
          required_roles:
          - boundary_case
          - operationalization
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - explanation_path
        q_conflict:
          min_clusters: 2
          required_roles:
          - rebuttal
          - explanation_path
        q_ambiguity:
          min_clusters: 2
          required_roles:
          - boundary_case
          - explanation_path
        q_explain:
          min_clusters: 2
          required_roles:
          - explanation_path
          - operationalization
      score3_floor:
        q_structure:
          min_clusters: 3
          required_roles:
          - operationalization
          - corroborative
          - boundary_case
        q_context:
          min_clusters: 3
          required_roles:
          - boundary_case
          - operationalization
          - rebuttal
        q_evidence:
          min_clusters: 3
          required_roles:
          - corroborative
          - explanation_path
          - rebuttal
        q_conflict:
          min_clusters: 3
          required_roles:
          - rebuttal
          - boundary_case
          - explanation_path
        q_ambiguity:
          min_clusters: 3
          required_roles:
          - boundary_case
          - rebuttal
          - explanation_path
        q_explain:
          min_clusters: 3
          required_roles:
          - explanation_path
          - operationalization
          - boundary_case
      independence_rule:
        score2_min_independent_origins: 1
        score3_min_independent_origins: 2
      systemic_promotion_threshold: 2
      score3_note: q_evidence と q_conflict を 3 にするには、少なくとも1つの独立 corroborative origin と1つの boundary/rebuttal cluster を要する。
    engineering_tradeoff_domain:
      score2_floor:
        q_structure:
          min_clusters: 1
          required_roles:
          - operationalization
        q_context:
          min_clusters: 1
          required_roles:
          - boundary_case
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - explanation_path
        q_conflict:
          min_clusters: 1
          required_roles:
          - rebuttal
        q_ambiguity:
          min_clusters: 1
          required_roles:
          - boundary_case
        q_explain:
          min_clusters: 1
          required_roles:
          - explanation_path
      score3_floor:
        q_structure:
          min_clusters: 2
          required_roles:
          - operationalization
          - boundary_case
        q_context:
          min_clusters: 2
          required_roles:
          - boundary_case
          - explanation_path
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - rebuttal
        q_conflict:
          min_clusters: 2
          required_roles:
          - rebuttal
          - boundary_case
        q_ambiguity:
          min_clusters: 2
          required_roles:
          - boundary_case
          - rebuttal
        q_explain:
          min_clusters: 2
          required_roles:
          - explanation_path
          - operationalization
      independence_rule:
        score2_min_independent_origins: 1
        score3_min_independent_origins: 2
      systemic_promotion_threshold: 3
      score3_note: tradeoff 比較が branch を変えうる facet では、q_evidence/q_conflict の score 3 に cross-family corroboration または replayed counterexample を要する。
    organizational_or_social_domain:
      score2_floor:
        q_structure:
          min_clusters: 1
          required_roles:
          - operationalization
        q_context:
          min_clusters: 2
          required_roles:
          - boundary_case
          - explanation_path
        q_evidence:
          min_clusters: 1
          required_roles:
          - corroborative
        q_conflict:
          min_clusters: 1
          required_roles:
          - rebuttal
        q_ambiguity:
          min_clusters: 2
          required_roles:
          - boundary_case
          - rebuttal
        q_explain:
          min_clusters: 1
          required_roles:
          - explanation_path
      score3_floor:
        q_structure:
          min_clusters: 2
          required_roles:
          - operationalization
          - boundary_case
        q_context:
          min_clusters: 3
          required_roles:
          - boundary_case
          - explanation_path
          - rebuttal
        q_evidence:
          min_clusters: 2
          required_roles:
          - corroborative
          - rebuttal
        q_conflict:
          min_clusters: 2
          required_roles:
          - rebuttal
          - explanation_path
        q_ambiguity:
          min_clusters: 3
          required_roles:
          - boundary_case
          - rebuttal
          - explanation_path
        q_explain:
          min_clusters: 2
          required_roles:
          - explanation_path
          - boundary_case
      independence_rule:
        score2_min_independent_origins: 1
        score3_min_independent_origins: 1
      systemic_promotion_threshold: 3
      score3_note: stakeholder scope, dissent handling, interpretation boundary が明示されない限り q_context / q_ambiguity は 3 に到達してはならない。
  systemic_promotion_rule:
    statement: 同一 active primary facet へ結び付く unresolved auxiliary cluster が profile ごとの閾値以上存在し、かつ cluster_role が2種類以上に跨る場合、その facet は auxiliary ではなく branch-instability を生む systemic blocker として major 扱いへ昇格する。
    promotion_preconditions:
    - 同一 active claim facet にリンクしている
    - unresolved cluster count >= systemic_promotion_threshold(profile)
    - cluster_role diversity >= 2
    - 解除されないまま score 2/3 判定を押し下げている
    non_implications:
    - 補助主張が primary_claim へ昇格することを意味しない
    - 件数だけで自動昇格することを意味しない
  active_context_sensitive_uplift_rule:
    inactive_state: predicate witness 未成立または scope 未束縛の context-sensitive claim は auxiliary cluster として最大 operational_support 扱いにとどめる。
    active_state: predicate witness, scope_ref, context binding が揃った瞬間に active primary 相当の floor/cap rule を適用する。
    anti_shortcut: predicate が不明のまま score 2/3 改善に使ってはならない。
  tool_responsibilities:
    DecisionLedger:
      owns:
      - domain calibration registry
      - profile override reason
      - context-sensitive predicate witness binding
      - systemic promotion override approval
    GraphEngine:
      owns:
      - cluster membership history
      - origin lineage capture
      - active/inactive context-sensitive transition
      - promotion event trace
    GraphLint:
      owns:
      - cluster formation
      - score2/score3 floor check
      - independence check
      - systemic promotion recommendation
    archive_object:
      owns:
      - calibration profile ref
      - cluster evidence packet
      - promotion witness
      - negative test packet
  forbidden_shortcuts:
  - active primary の unresolved major issue を残したまま、補助主張件数だけで q_dimension を 2 以上へ上げる。
  - 同一 source lineage の補助主張を独立 origin として重複計上する。
  - regulated_domain の score 3 を boundary_case や rebuttal なしで与える。
  - inactive な context-sensitive claim を都合よく active 扱いして cluster floor を満たしたことにする。
  residual_open_points: []
evidence_strength_embedding_governance:
  status: provisional_fixed
  statement: evidence_strength_embedding_governance とは、根拠強度を Q_e(K_e) の第7軸として外出しせず、q_evidence の内部 subfactor として管理しつつ、GraphLint / DecisionLedger 出力では evidence_strength_class を明示して監査可能にする規則である。
  options_compared:
    embedded_inside_q_evidence:
      adopt: true
      merits:
      - Q_e(K_e)=6次元という既存 contract を壊さない
      - evidence coverage / binding / strength / diversity を q_evidence の内部で連動評価できる
      - Q14/Q24 の benchmark registry に evidence strength class を素直に渡せる
    separate_seventh_dimension:
      adopt: false
      rejected_because:
      - true/hold/false の既存 gate 条件、Q_e 出力 schema、benchmark contract を広範に壊す
      - strength だけ高くても coverage や binding が欠けるケースを別軸で過大評価しやすい
      - primary substitution を防ぐ現在の blocker 優先判定と整合しにくい
  adopted_rule:
    subfactors:
    - coverage
    - binding
    - strength_class
    - origin_diversity
    strength_classes:
    - linkable_optional
    - traceable_supporting
    - traceable_branch_basis
    - authority_bound_direct
    q_evidence_policy: q_evidence は coverage / binding / strength / diversity の最弱リンクで決める。active claim の criticality band が要求する evidence class を満たさない場合、q_evidence は 1 を超えてはならない。
    output_policy: GraphLint は q_evidence とは別に evidence_strength_profile を返してよいが、それは監査用説明変数であり Q_e(K_e) の新次元ではない。
  criticality_alignment:
    constitutional_or_irreversible: authority_bound_direct を要求する
    branch_decisive: traceable_branch_basis 以上を要求する
    operational_support: traceable_supporting 以上を要求する
    explanatory_auxiliary: linkable_optional でもよいが、score 3 には diversity と boundary_case が要る
  tool_responsibilities:
    DecisionLedger:
      owns:
      - required evidence class binding
      - manual override reason when weaker class accepted
      - exception approval trace
    GraphEngine:
      owns:
      - evidence origin lineage
      - evidence packet family
      - strength class history
      - diversity witness linkage
    GraphLint:
      owns:
      - strength class inference
      - q_evidence subfactor scoring
      - strength-floor violation lint
      - output evidence_strength_profile
    archive_object:
      owns:
      - evidence packet digest
      - strength-class witness
      - criticality-to-evidence mapping snapshot
  forbidden_shortcuts:
  - strength class だけ高い単一証跡で q_evidence=3 を与える。
  - coverage や binding が弱いのに evidence_strength を別軸の高得点で相殺する。
  - GraphLint 出力に evidence_strength_profile を出したことを Q_e の次元追加と誤解する。
  residual_open_points: []
latent_downstream_hold_promotion_governance:
  status: provisional_fixed
  statement: latent_downstream_hold_promotion_governance とは、GC1 未成立や governance 評価未開始のため secondary reason をまだ正式 blocker としては扱わない状態を activation_state=latent_downstream として保持し、適用条件が満たされた時点で active governance blocker へ昇格させる規則である。
  core_claims:
  - latent_downstream は relation_to_primary ではなく activation_state である。理由間関係と活性状態を混線させてはならない。
  - latent_downstream は H3〜H6 に限って許す。H1/H2 は epistemic entry gate 上の active issue として扱い、latent に逃がしてはならない。
  - active への昇格は、governance facet が現在の chosen branch / rollback branch に対して適用可能になったとき、または期限・外部性・precommit が先行して待てなくなったときに発火する。
  - H5/H6 は near_due, external_or_irreversible exposure, public/precommit artifact のいずれかがある場合、GC1 完了前でも latent のまま放置してはならない。
  - primary_reason が解消されなくても、secondary reason の deadline が先に来る場合は active promotion を許す。
  promotion_triggers:
    governance_entry_trigger: GC1=true になり Eval_g の対象 facet が判定可能になったとき。
    dependency_clear_trigger: secondary reason の前提になっていた upstream blocker が解消し、required_action を今すぐ実行可能になったとき。
    temporal_urgency_trigger: remaining_time <= promotion_window(profile, reason_code) になったとき。
    precommit_or_externality_trigger: external commitment, irreversible preparation, public notice, customer-visible export など affected facet を先取りする artifact が current/precommit になったとき。
  promotion_windows:
    H3: decision_due の 25% 以内または approval path instantiation 開始時
    H4: approval_sla 開始時点または fallback/proxy activation が必要になった時点
    H5: risk_review_due 到来前、または mitigation/waiver が execution gate より後ろへずれ込むと判明した時点
    H6: policy_review_window 到来前、または exception request / external commitment が発火した時点
  tool_responsibilities:
    DecisionLedger:
      owns:
      - latent reason registry
      - promotion_window policy
      - manual early-promotion decision
      - active governance blocker judgement
    GraphEngine:
      owns:
      - activation_state transition event
      - deadline countdown trace
      - precommit artifact linkage
      - promotion/rebase history
    GraphLint:
      owns:
      - epistemic blockers that mask governance evaluation
      - latent reason surfacing hints for H5/H6
    archive_object:
      owns:
      - promotion witness packet
      - deadline basis snapshot
      - precommit linkage evidence
  forbidden_shortcuts:
  - GC1 未成立を理由に、deadline が迫る H5/H6 を無期限に latent のままにする。
  - relation_to_primary=latent_downstream と書いて activation_state を省略する。
  - chosen branch や precommit artifact が確定しているのに downstream governance blocker を active 化しない。
  residual_open_points: []
hold_reason_relation_taxonomy_governance:
  status: provisional_fixed
  statement: hold_reason_relation_taxonomy_governance とは、secondary hold reason と primary_reason の関係を dependency だけに縮退させず、dependency / causal / temporal / independent を分けて保持する規則である。
  adopted_vocab:
    derived_from_primary: 同一 root issue の局所 manifestation であり、primary の修復で通常は同時に消える。
    dependency_precondition: secondary の required_action または reopen_condition が primary の解消を前提にする。
    causal_driver: primary の存在や処理遅延が secondary の発生確率・強度を押し上げている。
    temporal_deadline_precedence: secondary の deadline や review window が primary の修復予定より先に来る。
    independent_co_blocker: primary と独立に解除が必要な並列 blocker。
  design_rules:
  - relation_to_primary は1つの canonical primary relation を必須にし、activation_state は別フィールドで持つ。
  - dependency_precondition と causal_driver は同義ではない。依存がなくても causal_driver はありうる。
  - temporal_deadline_precedence は causal でも dependency でもなく、SLA / review window / externality timing の順序を表す。
  - independent_co_blocker は「無関係」を意味しない。代表SLAや primary_reason 選定とは独立に解除責務を持つことを意味する。
  selection_guidance:
    pick_dependency_precondition_when:
    - secondary の reopen_condition が primary repair 後でないと評価不能
    - secondary action が primary output を入力とする
    pick_causal_driver_when:
    - primary の放置により risk/policy conflict が増幅する
    - primary event が secondary blocker を誘発した
    pick_temporal_deadline_precedence_when:
    - secondary deadline < planned primary repair completion
    - review window 失効が先に来る
    pick_independent_co_blocker_when:
    - 解除経路が独立
    - どちらを先に修復しても他方は残る
  forbidden_shortcuts:
  - すべての secondary reason を dependency_precondition に丸める。
  - deadline 先行を causal と書き換えて SLA 情報を失う。
  - activation_state=latent_downstream を relation_to_primary に埋め込む。
  residual_open_points: []
hold_reason_subtype_registry_governance:
  status: provisional_fixed
  statement: hold_reason_subtype_registry_governance とは、H1〜H6 の family-level core subtype を共通語彙として固定し、より細かい領域差は parent core subtype を弱めない domain extension としてのみ許す規則である。
  core_subtype_registry:
    H1:
    - missing_primary_evidence
    - missing_context_binding
    - missing_structure_link
    - missing_explanation_path
    H2:
    - contradictory_evidence
    - semantic_ambiguity
    - threshold_or_scope_collision
    - unresolved_counterargument
    H3:
    - decision_context_unbound
    - value_binding_gap
    - responsibility_binding_gap
    - approval_structure_gap
    H4:
    - required_approval_missing
    - approval_conflict_active
    - quorum_or_proxy_unmet
    - fallback_activation_pending
    H5:
    - residual_risk_over_tolerance
    - mitigation_evidence_insufficient
    - waiver_required_ungranted
    - monitoring_or_rollback_inadequate
    H6:
    - explicit_policy_prohibition
    - legal_or_contractual_prohibition
    - external_commitment_conflict
    - exception_path_missing_or_denied
  extension_boundary:
    allowed:
    - domain_extension_subtype は必ず parent_core_subtype_ref を持つ
    - extension は family を跨いではならない
    - extension は reopen authority, deadline_basis family, escalation route family を弱めてはならない
    forbidden:
    - core_subtype を書かず extension 名だけを保持する
    - regulated_domain 固有 subtype を core subtype と同格に扱い、cross-domain benchmark を壊す
    - extension により reason_code family を付け替える
  tool_responsibilities:
    DecisionLedger:
      owns:
      - core subtype registry
      - extension registration approval
      - cross-family invalidation check
    GraphEngine:
      owns:
      - reason_code/core_subtype/extension_subtype history
      - migration alias trace
    GraphLint:
      owns:
      - H1/H2 subtype inference hint
      - invalid subtype/family mismatch lint
    archive_object:
      owns:
      - subtype registry snapshot
      - extension charter witness
      - benchmark export label
  forbidden_shortcuts:
  - core subtype を未記載のまま自然言語だけで hold family を説明する。
  - domain extension subtype で core subtype の reopen_condition を密かに差し替える。
  - 同じ extension 名を複数 family で再利用し、比較可能性を壊す。
  residual_open_points: []
positive_state_vocabulary_governance:
  status: provisional_fixed
  statement: linked / bound を raw schema 上の literal present へ統一せず、component-specific positive state を authoritative storage に維持する。ただし cross-component analytics には derived meta predicate として positive_meta_state=present を返してよい。
  options_compared:
    unify_to_present_literal:
      adopt: false
      rejected_because:
      - evidence linkage と governance binding と event auxiliary value の意味差が消え、監査時に何が満たされたのか読めなくなる
      - legacy 正規化と component-aware lint を壊し、present から linked / bound / concrete value への逆写像が不可能になる
      - Q12 の invalid event 境界で、H の core field が「present かどうか」だけでは replay 可能性を判定できない
    keep_component_specific_positive_state:
      adopt: true
      merits:
      - E は linked、V/R は bound、G/C/H auxiliary は concrete typed value or concrete ref という意味差を保持できる
      - typed missing marker の reason layer と positive state の fulfillment layer を分けられる
      - generic dashboard では derived meta predicate として present_count / reasoned_missing_count を計算できる
  adopted_rule:
    authoritative_positive_states:
      G_C: required slot は concrete typed value または concrete ref を positive state とする。literal present は保存しない。
      E: evidence_status=linked を positive state とする。
      V_R: binding_status=bound を positive state とする。
      H_auxiliary: auxiliary slot は concrete typed value / concrete ref / concrete digest を positive state とする。literal present は保存しない。
    derived_meta_projection:
      present: component-specific positive state または concrete typed value/ref/digest を持つ。
      reasoned_missing: typed missing marker と required metadata を持つ。
      invalid: required slot に prohibited serialization または許されない marker が入っている。
    storage_policy:
    - raw schema 値として present を保存してはならない。present は query/view 層の派生述語である。
    - migration 時に literal present を見つけた場合、component kind を見て linked / bound / concrete value populated へ正規化し、kind が不明なら migration_error とする。
    - cross-component completeness 指標は positive_meta_state を使って集計してよいが、authoritative remediation は component-specific state を参照する。
  tool_responsibilities:
    GraphBuild:
      owns:
      - component kind aware status generation
      - literal present の生成禁止
      - legacy present alias の migration hint
    GraphLint:
      owns:
      - component-specific positive state lint
      - derived positive_meta_state computation
      - present literal misuse detection
    DecisionLedger:
      owns:
      - binding_status=bound の authoritative judgement
      - risk/approval/policy state と binding_status の切り分け
    GraphEngine:
      owns:
      - normalized positive state history
      - invalid migration event trace
      - component-aware state API
    archive_object:
      owns:
      - normalized_state_snapshot
      - migration warning packet
      - component-kind witness
  forbidden_shortcuts:
  - linked / bound / concrete value をまとめて literal present へ潰し、何が満たされたのかを失うこと。
  - present_count が高いことを理由に、linked/bound の component-specific 検査を省略すること。
  - component kind 不明の legacy present を自動的に linked や bound へ決め打ちすること。
  residual_open_points: []
hold_auxiliary_metadata_marker_governance:
  status: provisional_fixed
  statement: H の persisted event では、typed missing marker を core event identity field と replay-critical transition field へ入れてはならない。marker を許すのは audit-support auxiliary field に限り、その marker が branch effect や hold clear を単独で正当化してはならない。
  field_classes:
    core_event_identity_fields:
    - event_id
    - timestamp
    - actor_ref
    - operation
    - reason_or_reason_code
    replay_critical_transition_fields:
    - target_ref
    - state_before_ref_or_digest
    - state_after_ref_or_digest
    - primary_reason_ref
    - transition_kind_or_event_family
    audit_support_auxiliary_fields:
    - supporting_evidence_ref
    - external_case_ref
    - note_attachment_ref
    - migration_hint_ref
    - review_comment_ref
    - non_branch_critical_locator
  marker_admissibility:
    core_event_identity_fields: typed missing marker を一切許さない。欠けた persisted event は invalid_event である。
    replay_critical_transition_fields: draft/precommit 中の一時表現を除き、persisted archive では typed missing marker を許さない。marker が残った event は replay/closure の正本になれず invalid_event とする。
    audit_support_auxiliary_fields:
      allowed_markers:
      - absent
      - pending
      - external_ref
      - not_applicable
      - disputed
      conditions:
      - marker ごとの required metadata(required_by, pending_owner, external_locator, applicability_basis, dispute_ref など) が揃う
      - 当該 auxiliary slot が hold_cleared, approval_granted, waiver_valid, policy_exception_active の sole witness ではない
      - event validity と branch effect の判定が、当該 auxiliary slot 未解決でも変わらない
  invalid_event_rules:
  - core event identity field に marker または prohibited serialization がある persisted event は invalid_event
  - replay-critical transition field に marker が残ったまま hold_cleared / hold_rebased / execute authorization を記録した event は invalid_event
  - audit-support auxiliary field の pending/disputed を closure witness や lawful exception witness として算入した event は invalid_event
  closure_guard_rules:
  - hold_entered / hold_updated は unresolved auxiliary marker を含んでよいが、その marker 自体が primary_reason の根拠にはなれない
  - hold_cleared / approval_granted / waiver_valid / policy_exception_active は core field 完全性に加え、closure-critical witness が concrete value/ref/digest であることを要する
  - external_ref auxiliary は freshness / locator / access basis を満たす場合だけ audit support として許す
  tool_responsibilities:
    GraphBuild:
      owns:
      - draft/precommit auxiliary marker generation
      - core field marker prohibition
    GraphLint:
      owns:
      - invalid_event detection
      - closure-critical witness completeness check
      - auxiliary marker misuse lint
    DecisionLedger:
      owns:
      - closure-critical witness designation
      - approval/waiver/exception witness completeness judgement
    GraphEngine:
      owns:
      - persisted event validity flag
      - draft to persisted normalization trace
      - invalid event quarantine
    archive_object:
      owns:
      - closure witness packet
      - auxiliary marker metadata snapshot
      - invalid_event evidence packet
  forbidden_shortcuts:
  - event_id や timestamp の欠落を pending で埋めて persisted event として受理すること。
  - state_after_ref や primary_reason_ref が unresolved の event を hold_cleared として記録すること。
  - audit-support auxiliary の external_ref を、freshness 未確認のまま lawful closure witness として使うこと。
  residual_open_points: []
organizational_risk_binding_not_applicable_audit_governance:
  status: provisional_fixed
  statement: organizational_or_social_domain で risk_binding=not_applicable を許すのは、decision target が純粋な論点整理・可逆な内部分析・局所メモ更新に限られ、実質的な stakeholder harm / reputational exposure / resource commitment / external commitment / contested risk tolerance を伴わない場合だけである。
  risk_binding_activation_triggers:
  - 人員、顧客、パートナー、世論、ブランド、法務、労務、privacy、security に material な harm/exposure を与えうる
  - 予算、スケジュール、人員配置、公式方針、対外説明、公開物、社内制度を branch とともに拘束する
  - 撤回コストが非軽微、または local owner 単独で即時に巻き戻せない
  - stakeholder 間で risk_tolerance, acceptable harm, escalation duty のいずれかが争点になっている
  - 後続の regulated / contractual / public commitment branch へ接続する precursor decision である
  not_applicable_admissibility:
    allowed_only_when_all_true:
    - decision class が pure_clarification / internal_option_listing / reversible_local_analysis のいずれかである
    - effect_zone が local_internal_only であり、cross-team execution commitment を発生させない
    - reversibility_class が fully_reversible_before_commit である
    - external/public/customer/partner-facing artifact を current basis に含まない
    - risk_tolerance contested case が開いていない
    required_audit_packet:
    - risk_na_basis_class
    - effect_zone
    - reversibility_class
    - stakeholder_set_or_none_basis
    - review_window_or_trigger
    - reviewer_or_reflection_owner
    - reevaluation_trigger_on_externalization_or_commit
  reevaluation_triggers:
  - draft が public/internal official artifact へ昇格する
  - budget/resource/personnel/partner commitment が発生する
  - stakeholder conflict case が risk_tolerance / acceptable harm に触れる
  - 撤回コストが local reversible を超える
  forbidden_shortcuts:
  - 人間系の判断だから定量化しにくいという理由だけで risk_binding=not_applicable にすること。
  - 評判・労務・privacy・対外説明の影響を value conflict だけに押し込み、risk_binding を無効化すること。
  - review_window や reflection owner を残さず not_applicable を長期据え置きすること。
  residual_open_points: []
cross_profile_score3_benchmark_governance:
  status: provisional_fixed
  statement: score 3 の profile 間 benchmark は、生の ordinal 3 同士を比較するのではなく、claim facet ごとの witness packet を source/target profile へ写して portability class を判定し、その上で replay benchmark registry cell へ束縛する。
  benchmark_packet_core_fields:
  - source_profile
  - claim_facet
  - q_dimension_or_subdimension
  - criticality_band
  - active_profile_triggers
  - primary_claim_class
  - evidence_strength_class
  - auxiliary_support_roles_and_independent_origins
  - boundary_case_or_rebuttal_coverage
  - approval_risk_policy_binding_snapshot
  - reflection_or_adjudication_trace_or_null
  - resolved_blocker_and_cap_history
  - negative_case_or_counterexample_packet
  - residual_caveat_set
  portability_classes:
    direct_reusable: target profile で active になる mandatory obligation が source witness packet にすべて含まれ、追加補完なしで target 側でも score 3 を主張できる。
    caveated_reusable: common core は満たすが、target profile 固有の追加 witness が不足しており、補完後にだけ target 側 score 3 を主張できる。
    benchmark_only: benchmark cohort へは入れられるが、target profile の score 3 主張には使えない。比較参考値にとどまる。
    non_reusable: target profile で active な mandatory obligation を source が欠き、比較単位としても誤解を招く。
  comparison_rules:
  - same-profile でも negative_case / blocker_history / criticality_band が欠ける witness packet は direct_reusable にしてはならない。
  - engineering_tradeoff_domain または organizational_or_social_domain から regulated_domain への移植は、regulated mandatory authority / policy / risk witness が揃わない限り benchmark_only 以下である。
  - regulated_domain から engineering_tradeoff_domain への移植は common core が保たれれば direct_reusable または caveated_reusable になりうるが、target local tradeoff boundary と comparable set が未束縛なら caveated 以下である。
  - organizational_or_social_domain の score 3 は adjudication charter / reflection SLA / precedence archive を伴わない限り cross-profile reusable にしてはならない。
  - source witness に unresolved branch-critical cap や temporary exception 依存が残る場合、portability class を direct_reusable にしてはならない。
  cross_profile_default_matrix:
    regulated_domain->regulated_domain: direct_reusable or caveated_reusable
    regulated_domain->engineering_tradeoff_domain: direct_reusable or caveated_reusable
    regulated_domain->organizational_or_social_domain: caveated_reusable
    engineering_tradeoff_domain->regulated_domain: benchmark_only unless regulated-specific witness added
    engineering_tradeoff_domain->organizational_or_social_domain: caveated_reusable if adjudication/authority traces added, else benchmark_only
    organizational_or_social_domain->regulated_domain: benchmark_only or non_reusable
    organizational_or_social_domain->engineering_tradeoff_domain: caveated_reusable or benchmark_only
    organizational_or_social_domain->organizational_or_social_domain: direct_reusable or caveated_reusable
  q24_boundary:
    fixed_now:
    - portability class semantics
    - benchmark packet core fields
    - cross-profile comparison rules
    - benchmark cell への binding 境界
    resolved_by_Q24:
    - canonical benchmark registry cell
    - suite versioning
    - alias-preserving migration rule
    - benchmark cohort registry governance
  forbidden_shortcuts:
  - score=3 という ordinal だけを profile 間 benchmark の入力にすること。
  - regulated profile の witness を欠いたまま engineering の score 3 を regulated へ移植すること。
  - negative case や blocker history を持たない shiny pass packet を reusable score 3 と称すること。
  residual_open_points: []
approval_weighted_quorum_governance:
  status: provisional_fixed
  statement: weighted quorum や voting power は approval structure の共通語彙へ最小 envelope だけを入れ、seat weight table・apportionment formula・constituency census などの詳細は extension registry へ逃がす。つまり「weighted であること」と「成立判定に最低限必要な tally semantics」は core に残すが、組織固有の重み表そのものは core に含めない。
  core_vocabulary:
  - approval_mode=quorum|forum
  - eligible_voting_set_ref
  - counting_basis=headcount|seat_weight
  - threshold_rule
  - mandatory_role_set
  - veto_rule_or_blocking_class
  - abstention_rule
  - timeout_rule
  - tie_break_rule
  - weighted_tally_profile_ref_or_null
  extension_registry_fields:
  - seat_weight_table_ref
  - apportionment_formula_ref
  - constituency_snapshot_ref
  - reapportionment_trigger
  - supermajority_profile_ref
  - minority_protection_profile_ref
  - dynamic_voting_window_or_effective_period
  design_rules:
  - counting_basis=seat_weight を使う場合、weighted_tally_profile_ref を必須にする。headcount の quorum へ暗黙変換してはならない。
  - mandatory role, blocking veto, segregation_of_duties は weighted tally で上書きしてはならない。
  - observer seat, auditor seat, explainer seat を voting weight や veto seat に算入してはならない。
  - weighted tally は forum 内部の成立計算に属し、same-tier peer conflict routing を直接置き換えない。
  - 動的な人員数や部門規模から重みを導く場合でも、current basis では frozen snapshot ref を通してだけ参照する。
  hold_connection_rules:
  - weighted_tally_profile_ref が必要なのに欠ける場合は approval_structure_gap として H3 候補になる。
  - weighted tally profile はあるが threshold 未充足、mandatory role 未参加、valid blocking veto 存在のいずれかなら H4 候補になる。
  - forum internal tally の不成立を、別 forum や peer reviewer の多数で相殺してはならない。
  forbidden_shortcuts:
  - weighted quorum を approval authority family そのものへ昇格させ、core taxonomy を汚染すること。
  - seat weight table を current snapshot なしに live org chart から都度推論すること。
  - weighted majority を理由に mandatory role や policy/risk veto を黙殺すること。
  residual_open_points: []
joint_approval_accountability_split_governance:
  status: provisional_fixed
  statement: joint approval と joint accountability は同一 responsibility object R に共存してよいが、approval leg と accountability leg を別レコードとして保持し、approval 成立を accountability 移転の代用にしてはならない。
  core_claims:
  - approval は「誰が今この action を合法化できるか」を表し、accountability は「誰が outcome / rollback / explanation / incident response を引き受けるか」を表す。両者は同じ人物に束縛されても意味論は別である。
  - joint approval は all_of / quorum / forum などの approval structure で表せるが、joint accountability は無差別な共同責任としては置かず、facet partition と residual owner を持つ明示 co-accountability としてだけ許す。
  - forum verdict、proxy approval、fallback approval は approval leg の成立であり、forum chair・execution coordinator・secretariat を自動的に accountability owner にしてはならない。
  - approval が成立しても accountability leg が未束縛なら execute-ready ではない。逆に accountability owner がいても required approval が未成立なら lawful execution ではない。
  - 同一 actor が approver と accountability owner を兼ねてもよいが、approval_event_ref と accountability_binding_ref を別に残さなければならない。
  minimal_vocabulary:
    responsibility_object:
    - responsibility_id
    - target_ref
    - effect_zone_ref
    - approval_leg_ref
    - accountability_leg_ref
    - decision_outcome_ref
    - state
    approval_leg_fields:
    - approval_case_id
    - action_scope_ref
    - approval_structure_ref
    - approval_outcome_ref
    - validity_window
    - invalidation_rule_ref
    - approval_event_refs
    accountability_leg_fields:
    - accountability_case_id
    - accountable_facet_set
    - primary_owner_ref
    - co_owner_partition_ref_or_null
    - residual_owner_ref
    - rollback_owner_ref
    - reflection_owner_ref
    - liability_window
    - transfer_rule_ref
  adopted_rule:
    binding_rule:
    - commitment-sensitive facet ごとに primary accountability owner をちょうど1つ持つことを原則とする。
    - co-accountability を使う場合、facet partition と residual owner を必須にする。空白 facet を残してはならない。
    - approval leg の fulfilled / expired / invalidated は accountability leg の active / transferred / revoked と独立に遷移する。
    - accountability transfer は approval とは別イベントとして明示し、source owner・target owner・effective window・handoff witness を要する。
    hold_and_gap_policy:
      H3_candidates:
      - approval_accountability_split_gap
      - accountability_partition_missing
      - rollback_owner_missing_when_commitment_active
      - residual_owner_missing_under_co_accountability
      H4_candidates:
      - approval_wait_with_accountability_bound
      - forum_verdict_pending
      - approval_valid_but_accountability_handoff_pending
  tool_split:
    DecisionLedger:
    - approval_leg / accountability_leg の authoritative binding
    - co-accountability partition と residual owner の正当性判定
    - accountability transfer / rollback owner / reflection owner の記録
    GraphEngine:
    - approval state と accountability state の別系列ライフサイクル保存
    - approval_event_ref と accountability_binding_ref の lineage 管理
    - gap / pending / transferred / invalidated の状態遷移保持
    GraphLint:
    - approval 成立だけで accountability 充足とみなした shortcut の検出
    - co-accountability partition の coverage 欠落検出
    - rollback owner / reflection owner 欠落の lint
    archive_object:
    - approval witness packet
    - accountability partition packet
    - handoff / transfer witness packet
  forbidden_shortcuts:
  - approved_by_many を accountability shared_by_many と読み替えること。
  - forum chair / approver / proxy を暗黙の outcome owner とみなすこと。
  - co-accountability を facet partition なしの crowd ownership として記録すること。
  residual_open_points: []
same_frame_manual_redesign_typing_governance:
  status: provisional_fixed
  statement: same-frame manual redesign action family は、frame invariant を保ったまま admissible set を非空化する再設計操作として5つの core family だけを共通語彙化し、それ以下の domain/tool 固有差分は extension registry に逃がす。
  core_families:
    route_substitution_within_bound_family: すでに lawful に束縛された route family の内部で候補 route を差し替える。obligation family・authority path・accountability family は維持する。
    parameter_narrowing_or_safe_envelope: threshold, range, envelope, rollout width を安全側へ狭める。effect_zone や commitment class を拡張してはならない。
    evidence_gate_strengthening: required evidence, freshness, review step, rollback check, post-check を追加・強化する。required approval や veto を減らしてはならない。
    canonical_alignment_using_ratified_registry: ratified な canonical unit / baseline / mapping rule を使って representation mismatch を解消する。新しい registry rule の創設は含まない。
    rollback_monitoring_readiness_relayout: rollback plan、monitoring point、checkpoint、guard sequencing を再配置する。authority / accountability / target は変えない。
  extension_boundary:
    extension_is_required_when:
    - domain 固有の sub-type、artifact choreography、UI/workflow order、tool-specific manifest を表したいとき
    - core family の内部でしか意味を持たない parameter schema や verifier schema を持ちたいとき
    - cross-profile portability を前提にせず、project-local / domain-local な subtype を表したいとき
    core_must_not_include:
    - tool 名や製品名に依存する subtype
    - 業務組織固有の承認 lane 名称
    - domain-specific evidence packet の細目
    - UI 画面順や人員配置のような choreography detail
  governance_rules:
  - extension subtype は必ず parent core family を持つ。core family なしの孤立 subtype を作ってはならない。
  - core family 判定は frame invariants の保存性で行い、作業手順の類似で行ってはならない。
  - target replacement、authority/accountability 変更、policy exception 導入、scope split 導入は same-frame redesign family に含めない。
  forbidden_shortcuts:
  - manual redesign という名前で reframe や policy rewrite を紛れ込ませること。
  - domain 固有 subtype を core に昇格させて共通語彙を汚染すること。
  - evidence strengthening を approval relaxation や risk relaxation の代用にすること。
  residual_open_points: []
deliberate_exploration_option_value_governance:
  status: provisional_fixed
  statement: deliberate_exploration は、exploration charter に対して discrimination gain・branch relevance・reuse value・reversibility headroom と、cost/risk burn を半定量化し、continue / bounded_continue / terminate_or_escalate を判定する。
  semi_quant_axes:
    discrimination_gain: 0=候補識別に寄与しない, 1=局所識別, 2=action-relevant 識別, 3=branch-critical 識別
    branch_relevance: 0=将来判断に無関係, 1=補助的, 2=current action に関連, 3=single-branch commitment を左右
    reuse_value: 0=一回限り, 1=local reuse, 2=profile reuse, 3=cross-profile reuse
    reversibility_headroom: 0=ほぼ不可逆, 1=限定可逆, 2=十分可逆, 3=shadow/sandbox/rollback-contained
    cost_burn: 0=低, 1=管理可能, 2=高, 3=budget breach
    risk_burn: 0=低, 1=管理可能, 2=高, 3=authority/risk bound breach
  decision_policy:
    continue:
    - discrimination_gain >= 2
    - branch_relevance >= 2
    - max(cost_burn, risk_burn) <= 1
    - review_window と budget_cap が残っている
    bounded_continue:
    - discrimination_gain >= 1
    - branch_relevance >= 1 または reuse_value >= 2
    - risk_burn <= 1
    - 終了条件がまだ発火していない
    terminate_or_escalate:
    - discrimination_gain = 0 が連続 review で持続する
    - review_window 失効、budget_cap 超過、または allowed_actions 枯渇
    - risk_burn = 3 または authority/risk bound breach
    - 選択 / coexistence / split / hold / false のいずれかへ出口が定まった
  termination_outcomes:
  - governance_converged へ閉じる
  - ratified coexistence / split に移る
  - same-frame repair が必要なら hold に戻す
  - lawful path absent または frame invalidated なら false へ閉じる
  - registry / authority / policy 再設計が必要なら escalate する
  forbidden_shortcuts:
  - exploration 中だから終了条件を書かなくてよいとみなすこと。
  - 好奇心や作業継続欲だけで option value を高いと扱うこと。
  - cost/risk burn を無視して reuse value だけで継続を正当化すること。
  residual_open_points: []
route_family_extension_boundary_governance:
  status: provisional_fixed
  statement: route family の core は any_of / k_of_n の離散的 selection semantics と candidate/local_bundle/alignment までに限り、ordered_fallback と weighted k_of_n は extension overlay として分離する。
  core_vocabulary:
  - modality=any_of|k_of_n
  - k_required
  - candidate_routes
  - local_bundle_ref
  - activation_conditions
  - incompatibility_ref
  - selection_scope_ref
  - alignment_rule_ref
  extension_overlays:
    ordered_fallback_overlay:
      meaning: すでに lawful な candidate_routes の上に preference order / timeout / activation predicate を重ねる。core modality を置き換えない。
      required_fields:
      - ordered_chain
      - fallback_activation_predicates
      - timeout_rule
      - exhaustion_escalation_ref
    weighted_k_of_n_overlay:
      meaning: candidate route ごとの離散 weight を用いた weighted threshold を重ねる。approval forum の voting power と混同しない。
      required_fields:
      - route_weight_profile_ref
      - weight_threshold_rule
      - eligibility_freeze_ref
      - tie_break_rule
  boundary_rules:
  - ordered_fallback は route family identity ではなく selection policy である。obligation family・effect_zone・authority/accountability を変えてはならない。
  - weighted k_of_n は route selection の overlay であり、approval forum の weighted quorum や seat_weight_table を参照してはならない。必要なら別 registry ref で接続する。
  - extension overlay がなければ core comparability は離散 selection semantics で判定する。overlay 依存 action を core-only family へ写像してはならない。
  forbidden_shortcuts:
  - ordered fallback を any_of の単純並び順と誤認し、timeout / exhaustion / escalation を記録しないこと。
  - weighted k_of_n を approval weighted quorum と同じものとして扱うこと。
  - overlay に依存する route family を core family と称して registry 省略すること。
  residual_open_points: []
externality_budget_numeric_calibration_governance:
  status: provisional_fixed
  statement: externality budget の numeric calibration は regulated / engineering_tradeoff / organizational_or_social の3 profile を baseline とし、single_branch / external_irreversible / policy_sensitive の文脈 override では stricter-only で短縮する。
  calibration_rule:
  - 数値較正対象は sink_cap_count, audience_cap_named_humans, artifact_kind_cap_count, review_due, expiry, purge_due_after_expiry とする。
  - baseline profile table は isolation_externality_budget_governance の numeric_cap_table を正本とする。
  - context override は cap の緩和ではなく min / stricter 方向の短縮だけを許す。
  - review_due は cleanup / containment reinforcement / revalidation 用の pre-expiry cap であり、propagation 延長の黙示承認ではない。
  - expiry 後は quarantine read-only または purge queue へ送り、new propagation basis に使ってはならない。
  profile_summary:
    regulated: sealed_internal を既定とし、bounded_internal_observable は exception_only。review_due と expiry を最短に固定する。
    engineering_tradeoff: sealed_internal と bounded_internal_observable を運用するが、authoritative / externalized は isolation basis に数えない。
    organizational_or_social: bounded_internal_observable の audience を engineering_tradeoff より広く取れるが、human-forwardable surface を重く見て sink typing を保守化する。
  override_summary:
    single_branch: audience / ttl を短くし、sealed_internal を優先する。
    external_irreversible: 最短 review_due / expiry を要求し、class cap を sealed_internal に固定する。
    policy_sensitive: bounded_internal_observable は exception path に限定し、preapproval と designated reviewer を要求する。
  forbidden_shortcuts:
  - profile baseline より緩い local override を許すこと。
  - review_due を expiry の grace period と誤解すること。
  - externalized_nonbinding や authoritative_or_committing を isolation basis の numeric cap で正当化すること。
  residual_open_points: []
