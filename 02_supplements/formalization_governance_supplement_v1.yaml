audit_witness_authority_bypass_model:
  status: provisional_fixed
  statement: audit_witness_authority_bypass_model は、audit witness を append-only precommit・HSM attested witness・human observer witness の合成として形式化し、central_authority 必須境界と emergency bypass の reveal class / audience / ttl / post-confirm due を profile と context override の strictest min で拘束するモデルである。
  primitives:
    reveal_class: ς ∈ {handle_only, bounded_actor_slice, accountable_identity_slice, full_envelope}
    reveal_order: handle_only < bounded_actor_slice < accountable_identity_slice < full_envelope
    witness_component: χ ∈ {append_only_precommit, hsm_attested_witness, human_observer_witness}
    profile: π ∈ {regulated, engineering_tradeoff, organizational_or_social}
    context_override: ω ∈ {normal, single_branch, external_irreversible, policy_sensitive}
    tenant_relation: ν ∈ {same_tenant, cross_tenant}
    jurisdiction_relation: φ ∈ {same_jurisdiction_family, cross_jurisdiction_family}
    session_mode: μ ∈ {supervised_session, digest_bound_export, direct_named_notification}
    basis: β = (scenario, tenant_relation, jurisdiction_relation, cross_system_join_flag, protected_facet_flag, external_party_visibility, charter_class, life_safety_flag, active_compromise_flag)
    bypass_session: b = (basis_ref, reveal_class, audience_count, ttl, witness_component_set, authority_tier, post_confirm_due, archive_promotion_flag)
  functions:
    base_witness: BaseW(β)={append_only_precommit}
    need_hsm: NeedHSM(β,ς,μ)=true iff β.tenant_relation=cross_tenant or β.jurisdiction_relation=cross_jurisdiction_family or β.cross_system_join_flag=true or β.protected_facet_flag=true or β.external_party_visibility=true or ς≥accountable_identity_slice
    need_human: NeedHuman(β,ς,μ)=true iff β.jurisdiction_relation=cross_jurisdiction_family or (ς=accountable_identity_slice and μ∈{supervised_session,direct_named_notification}) or (β.scenario=security_escalation and ς=accountable_identity_slice)
    required_witness: WReq(β,ς,μ)=BaseW(β) ∪ ({hsm_attested_witness} if NeedHSM(β,ς,μ) else ∅) ∪ ({human_observer_witness} if NeedHuman(β,ς,μ) else ∅)
    central_required: CentralReq(β,ς,μ)=true iff β.tenant_relation=cross_tenant or β.jurisdiction_relation=cross_jurisdiction_family or β.cross_system_join_flag=true or (β.protected_facet_flag=true and β.external_party_visibility=true) or (β.external_party_visibility=true and ς>bounded_actor_slice) or β.charter_class=global_default
    domain_exception: DomExc(β,ς,μ)=true iff β.tenant_relation=same_tenant and β.jurisdiction_relation=same_jurisdiction_family and pre_ratified_domain_charter(β)=true and ς≤bounded_actor_slice and μ∈{supervised_session,digest_bound_export} and β.cross_system_join_flag=false and β.protected_facet_flag does not require new external interpretation
    required_authority: AuthReq(β,ς,μ)=central_authority if CentralReq(β,ς,μ)=true and DomExc(β,ς,μ)=false; otherwise domain_authority
    base_reveal_cap: BaseRCap(π)=bounded_actor_slice
    base_audience_cap: BaseAud(π)={regulated:2, engineering_tradeoff:2, organizational_or_social:3}[π]
    base_ttl: BaseTTL(π)={regulated:4時間, engineering_tradeoff:1営業日, organizational_or_social:1営業日}[π]
    base_due: BaseDue(π)={regulated:4時間, engineering_tradeoff:1営業日, organizational_or_social:1営業日}[π]
    context_reveal_cap: CtxRCap(ω)={normal:bounded_actor_slice, single_branch:bounded_actor_slice, external_irreversible:bounded_actor_slice, policy_sensitive:bounded_actor_slice}[ω]
    context_audience_cap: CtxAud(ω)={normal:∞, single_branch:2, external_irreversible:1, policy_sensitive:1}[ω]
    context_ttl_cap: CtxTTL(ω)={normal:∞, single_branch:4時間, external_irreversible:1時間, policy_sensitive:2時間}[ω]
    context_due_cap: CtxDue(ω)={normal:∞, single_branch:2時間, external_irreversible:1時間, policy_sensitive:1時間}[ω]
    life_safety_exception: ExcLS(β,ς,μ)=true iff (β.life_safety_flag=true or β.active_compromise_flag=true) and ς=accountable_identity_slice and direct_containment_need=true and μ∈{supervised_session,direct_named_notification}
    effective_reveal_cap: EffRCap(π,Ω,β)=accountable_identity_slice iff ExcLS(β,accountable_identity_slice,supervised_session)=true; otherwise min_class(BaseRCap(π), {CtxRCap(ω)|ω∈Ω})
    effective_audience_cap: EffAud(π,Ω,β)=1 iff ExcLS(β,accountable_identity_slice,direct_named_notification)=true; otherwise min(BaseAud(π), {CtxAud(ω)|ω∈Ω and CtxAud(ω)≠∞})
    effective_ttl: EffTTL(π,Ω,β)=30分 if ExcLS(β,accountable_identity_slice,direct_named_notification)=true and Ω∩{external_irreversible,policy_sensitive}≠∅ else 1時間 if ExcLS(β,accountable_identity_slice,direct_named_notification)=true else min(BaseTTL(π), {CtxTTL(ω)|ω∈Ω and CtxTTL(ω)≠∞})
    effective_due: EffDue(π,Ω,β)=30分 if ExcLS(β,accountable_identity_slice,direct_named_notification)=true and Ω∩{external_irreversible,policy_sensitive}≠∅ else 1時間 if ExcLS(β,accountable_identity_slice,direct_named_notification)=true else min(BaseDue(π), {CtxDue(ω)|ω∈Ω and CtxDue(ω)≠∞})
    bypass_admissibility: BypassOK(b,π,Ω,μ)=true iff b.reveal_class ≤ EffRCap(π,Ω,Basis(b)) and b.reveal_class ≠ full_envelope and b.audience_count ≤ EffAud(π,Ω,Basis(b)) and b.ttl ≤ EffTTL(π,Ω,Basis(b)) and WReq(Basis(b),b.reveal_class,μ) ⊆ b.witness_component_set and b.authority_tier=AuthReq(Basis(b),b.reveal_class,μ) and b.post_confirm_due ≤ EffDue(π,Ω,Basis(b)) and b.archive_promotion_flag=false
  invariants:
  - append_only_precommit はすべての admissible bypass_session に必須である。
  - full_envelope を bypass_session の reveal_class にしてはならない。
  - accountable_identity_slice を許すときは audience_count=1、NeedHSM=true、NeedHuman=true を同時に満たす。
  - external_auditor を human_observer_witness、authority_tier、custody_lane の充足者に数えてはならない。
  - CentralReq=true かつ DomExc=false の session を domain_authority で final confirm してはならない。
  - archive_promotion_flag=true の bypass_session は常に invalid とする。
  tool_projection:
    DecisionLedger:
      required_fields:
      - witness_component_set
      - authority_requirement
      - effective_reveal_cap
      - effective_audience_cap
      - effective_ttl
      - effective_post_confirm_due
      - life_safety_exception_flag
    GraphEngine:
      required_fields:
      - append_only_precommit_ref
      - hsm_attestation_ref
      - human_observer_session_ref
      - auto_reseal_timer_ref
      - derived_export_revoke_event_ref
    archive_object:
      required_fields:
      - sealed_session_digest_ref
      - witness_packet_digest_ref
      - post_confirm_outcome_ref
    GraphLint:
      forbidden_fields:
      - cleartext_identity
      - direct_contact_route
      - witness_private_material
      - full_envelope_payload
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離 parameter 化するか
  - cross-jurisdiction authority taxonomy と central delegation charter をどこまで predicate library に落とすか
  - ExcLS の direct_containment_need を detector family / sink class ごとにどこまで数値化するか
audit_witness_packet_delegation_charter_model:
  status: provisional_fixed
  statement: audit_witness_packet_delegation_charter_model は、audit witness packet と central delegation charter の canonical parameter を形式化し、required witness・authority scope・duplicate digest / bridge token / archive manifest linkage・exception lane・post-confirm duty の admissibility を判定するモデルである。
  primitives:
    packet_class: pclass ∈ {internal_supervised, external_protected_audit, emergency_bypass_record, post_confirm_outcome_record}
    charter_kind: κ ∈ {central_template, central_delegation, domain_delegation, emergency_exception_charter}
    authority_tier: α ∈ {domain_authority, central_authority}
    continuity_link: λ ∈ {duplicate_digest_link, bridge_token_link, archive_manifest_link}
    redaction_class: ρ ∈ {handle_only, bounded_actor_slice, accountable_identity_slice}
    packet: p = (packet_id, packet_class, packet_schema_version_ref, packet_digest, session_basis_ref, witness_component_set, charter_ref, authority_tier, duplicate_digest_ref_or_null, bridge_token_proof_ref_or_null, archive_manifest_digest_ref_or_null, export_local_pseudonym_ref_or_null, redaction_class, recipient_class, post_confirm_due, post_confirm_owner_ref, outcome_state, archive_promotion_state)
    charter: d = (charter_id, charter_kind, charter_version_ref, issuing_authority_ref, effective_window, authority_tier, tenant_relation_scope, jurisdiction_family_scope, protected_facet_scope, reveal_scope_cap, recipient_class_cap, allowed_session_mode_set, allowed_action_family_set, forbidden_action_family_set, non_delegable_boundary_set, activation_sla, review_sla, emergency_bypass_sla, post_confirm_sla, exception_lane_set, escalation_path_ref, bridge_token_policy_ref, archive_linkage_policy_ref, duplicate_digest_usage_policy_ref)
  imported_predicates:
    witness_requirement: WReq(β,ς,μ) from audit_witness_authority_bypass_model
    central_requirement: CentralReq(β,ς,μ) from audit_witness_authority_bypass_model
    domain_exception: DomExc(β,ς,μ) from audit_witness_authority_bypass_model
    authority_requirement: AuthReq(β,ς,μ) from audit_witness_authority_bypass_model
    bridge_token_validity: TokOK(τ,κ_sink,r) from stable_pseudonym_continuity_model
  functions:
    packet_class_admissibility: PClassOK(pclass,β,ς)=true iff (pclass=internal_supervised and β.tenant_relation=same_tenant and β.jurisdiction_relation=same_jurisdiction_family and ς≤bounded_actor_slice) or (pclass=external_protected_audit and (β.tenant_relation=cross_tenant or β.jurisdiction_relation=cross_jurisdiction_family or β.protected_facet_flag=true or β.external_party_visibility=true)) or (pclass=emergency_bypass_record and (β.life_safety_flag=true or β.active_compromise_flag=true)) or (pclass=post_confirm_outcome_record and authority confirmation has completed)
    charter_scope_validity: CharScopeOK(d,β,ς,μ)=true iff β.tenant_relation∈d.tenant_relation_scope and β.jurisdiction_relation∈d.jurisdiction_family_scope and ς≤d.reveal_scope_cap and μ∈d.allowed_session_mode_set
    charter_authority_validity: CharAuthOK(d,β,ς,μ)=true iff d.authority_tier=AuthReq(β,ς,μ) or (d.charter_kind=domain_delegation and DomExc(β,ς,μ)=true and d.authority_tier=domain_authority)
    duplicate_digest_link_validity: DigLinkOK(p)=true iff p.duplicate_digest_ref_or_null is null or (p.root_profile_ref_or_null not null and p.compression_grade_ref_or_null not null and (p.packet_class∉{external_protected_audit,post_confirm_outcome_record} or p.compression_grade_ref_or_null=lossless_canonical))
    bridge_link_validity: BridgeLinkOK(p,τ,κ_sink,r)=true iff p.bridge_token_proof_ref_or_null is null or (p.export_local_pseudonym_ref_or_null not null and TokOK(τ,κ_sink,r)=true)
    archive_link_requirement: ArchReq(p,β,κ_sink)=true iff p.packet_class∈{external_protected_audit,post_confirm_outcome_record} or κ_sink∈{public_or_external_commitment,irreversible_resource_lock} or β.external_party_visibility=true
    archive_link_validity: ArchOK(p,β,κ_sink)=true iff ArchReq(p,β,κ_sink)=false or p.archive_manifest_digest_ref_or_null not null
    packet_validity: PacketOK(p,d,β,ς,μ,τ,κ_sink,r)=true iff PClassOK(p.packet_class,β,ς) and WReq(β,ς,μ) ⊆ p.witness_component_set and p.charter_ref=d.charter_id and CharScopeOK(d,β,ς,μ) and CharAuthOK(d,β,ς,μ) and DigLinkOK(p) and BridgeLinkOK(p,τ,κ_sink,r) and ArchOK(p,β,κ_sink) and p.authority_tier=AuthReq(β,ς,μ) and p.post_confirm_due ≤ d.post_confirm_sla
  invariants:
  - PacketOK=true の packet は常に charter_ref を持つ。
  - p.packet_class=external_protected_audit のとき p.authority_tier=central_authority または DomExc=true を満たす domain_delegation を要する。
  - p.packet_class=emergency_bypass_record のとき p.archive_promotion_state=provisional であり、post-confirm 前に outcome_state=finalized にしてはならない。
  - p.bridge_token_proof_ref_or_null が not null なら export_local_pseudonym_ref_or_null も not null とする。
  - ArchReq=true なのに archive_manifest_digest_ref_or_null が null の packet を deterministic / forensic / external replay の basis にしてはならない。
  - delegated reviewer と external auditor を authority_tier または witness independence の充足者に数えてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - packet_digest
      - packet_class
      - charter_ref
      - authority_tier
      - required_witness_set
      - continuity_link_state
      - post_confirm_due
      - post_confirm_owner_ref
    GraphEngine:
      required_fields:
      - session_basis_ref
      - append_only_precommit_ref
      - hsm_attestation_ref_or_null
      - human_observer_credential_ref_or_null
      - reseal_event_ref_or_null
      - revoke_event_ref_or_null
    archive_object:
      required_fields:
      - witness_packet_digest
      - charter_digest
      - archive_manifest_digest_ref_or_null
      - outcome_state
    GraphLint:
      forbidden_fields:
      - cleartext_identity
      - direct_contact_route
      - witness_private_material
      - full_envelope_payload
  residual_open_points:
  - HSM attestation packet / human observer credential の raw measurement claim / algorithm suite / extension field をどこまで notation core から分離 parameter 化するか
  - central delegation charter の authority family / jurisdiction family taxonomy をどこまで predicate library に落とすか
  - tenant merge / split の lawful continuity で charter chain と bridge chain の cut condition をどう厳密化するか
audit_witness_external_serialization_model:
  status: provisional_fixed
  statement: audit_witness_external_serialization_model は、HSM attestation packet と human observer credential の external serialization notation を形式化し、canonical core・challenge / freshness / replay / lifecycle binding・migration comparability・raw vendor evidence adjunct の境界を判定するモデルである。
  primitives:
    serialization_subject: σ ∈ {hsm_attestation_packet, human_observer_credential}
    notation_profile: η ∈ {hsm_detached_receipt, hsm_custody_external_bundle, hsm_challenge_emergency_bundle, observer_scoped_session_credential, observer_challenge_bound_credential, observer_post_confirm_reviewer_credential}
    canonicalization_profile: γ ∈ {json_c14n_detached_digest, json_c14n_detached_digest_with_transcript, digest_bound_receipt}
    freshness_anchor: φ ∈ {append_only_precommit_anchor, nonce_counter_window_anchor, challenge_round_trip_anchor, authority_outcome_window_anchor}
    replay_binding_mode: ρ ∈ {session_bound, recipient_scoped, archive_bound, bridge_and_archive_bound}
    external_context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    hsm_envelope: H = (envelope_id, notation_profile_ref, canonicalization_profile_ref, registry_epoch_ref, attestation_class_ref, attestation_profile_ref, issuer_handle_ref, subject_handle_ref_or_pseudonym_ref, session_basis_ref, scope_packet_digest_ref, reveal_scope_ref, audience_binding_ref_or_null, lawful_purpose_ref, charter_ref, authority_decision_ref_or_null, custody_boundary_ref, attested_measurement_digest_ref, detached_signature_container_ref, challenge_bundle_ref_or_null, challenge_outcome_ref_or_null, freshness_anchor_ref, freshness_window_ref, replay_binding_ref, packet_digest, raw_vendor_artifact_digest_ref_or_null, archive_manifest_digest_ref_or_null, bridge_token_proof_ref_or_null, validity_window_ref, revocation_handle_ref_or_null, supersession_ref_or_null, post_confirm_due_ref_or_null, post_confirm_owner_ref_or_null)
    observer_envelope: O = (credential_id, notation_profile_ref, canonicalization_profile_ref, registry_epoch_ref, observer_credential_class_ref, observer_profile_ref, issuer_handle_ref, holder_pseudonym_ref, session_basis_ref, scope_packet_digest_ref, reveal_scope_cap_ref, lawful_purpose_ref, charter_ref, independence_attestation_ref, contact_route_mode_ref, session_presence_ref, challenge_bundle_ref_or_null, challenge_outcome_ref_or_null, freshness_anchor_ref, freshness_window_ref, replay_binding_ref_or_null, packet_digest, raw_vendor_artifact_digest_ref_or_null, archive_manifest_digest_ref_or_null, validity_window_ref, revocation_handle_ref_or_null, supersession_ref_or_null, post_confirm_duty_ref_or_null)
  imported_predicates:
    registry_conformity: RegOK(p,P_A,P_O,ξ,β,d,τ,κ_sink,r) from audit_witness_profile_registry_model
    charter_context_validity: CtxBindOK(τ,p,β,ξ,π) from central_delegation_charter_taxonomy_model
    packet_validity: PacketOK(p,d,β,ς,μ,τ_tok,κ_sink,r) from audit_witness_packet_delegation_charter_model
    bridge_token_validity: TokOK(τ_tok,κ_sink,r) from stable_pseudonym_continuity_model
  functions:
    notation_requirement: NReq(σ,ξ,β,μ)= {hsm_detached_receipt} if σ=hsm_attestation_packet and ξ=local_context; {hsm_custody_external_bundle} if σ=hsm_attestation_packet and ξ∈{central_context,external_audit_context}; {hsm_challenge_emergency_bundle} if σ=hsm_attestation_packet and ξ=emergency_context; {observer_scoped_session_credential} if σ=human_observer_credential and ξ=local_context; {observer_challenge_bound_credential} if σ=human_observer_credential and ξ=emergency_context or β.clear_identity_flag=true or μ=direct_named_notification; {observer_post_confirm_reviewer_credential} if σ=human_observer_credential and ξ=external_audit_context and authority outcome stage has begun
    challenge_requirement: ChReq(σ,ξ,β,μ)=true iff ξ=emergency_context or β.clear_identity_flag=true or μ=direct_named_notification or notation_profile_ref(σ)=observer_challenge_bound_credential
    freshness_requirement: FrReq(σ,η,ξ)= challenge_round_trip_anchor if η∈{hsm_challenge_emergency_bundle,observer_challenge_bound_credential}; authority_outcome_window_anchor if η=observer_post_confirm_reviewer_credential; append_only_precommit_anchor or nonce_counter_window_anchor otherwise
    replay_requirement: RepReq(σ,η,ξ,β,κ_sink)= bridge_and_archive_bound if β.bridge_or_archive_continuity_action=true or κ_sink=recipient_visible_continuity; archive_bound if ξ∈{external_audit_context} or κ_sink∈{public_or_external_commitment,irreversible_resource_lock}; recipient_scoped if β.external_party_visibility=true or β.clear_identity_flag=true; session_bound otherwise
    lifecycle_requirement: LifeReq(σ,η,ξ)=true iff ξ=emergency_context or η=observer_post_confirm_reviewer_credential or provisional external reveal is active
    canonical_core_validity: CoreOK(x)=true iff notation_profile_ref, canonicalization_profile_ref, registry_epoch_ref, class/profile ref, issuer_handle_ref, session_basis_ref, lawful_purpose_ref, charter_ref, packet_digest are present and packet_digest is computed over the canonicalization_profile_ref view only
    challenge_validity: ChOK(x,σ,ξ,β,μ)=true iff ChReq(σ,ξ,β,μ)=false or challenge_bundle_ref_or_null and challenge_outcome_ref_or_null are present and digest-bound to session_basis_ref and packet_digest
    freshness_validity: FrOK(x,σ,η,ξ)=true iff freshness_anchor_ref and freshness_window_ref are present and anchor_type(freshness_anchor_ref) satisfies FrReq(σ,η,ξ)
    replay_validity: RepOK(x,σ,η,ξ,β,κ_sink)=true iff RepReq(σ,η,ξ,β,κ_sink)=session_bound and replay_binding_ref binds session_basis_ref, or RepReq(...)=recipient_scoped and replay_binding_ref binds recipient/audience/purpose, or RepReq(...)=archive_bound and archive_manifest_digest_ref_or_null not null, or RepReq(...)=bridge_and_archive_bound and archive_manifest_digest_ref_or_null not null and bridge_token_proof_ref_or_null not null
    lifecycle_validity: LifeOK(x,σ,η,ξ)=true iff LifeReq(σ,η,ξ)=false or post_confirm_due_ref_or_null / post_confirm_duty_ref_or_null and responsible owner are present
    canonical_comparability: CmpOK(x,y)=true iff notation_profile_ref(x)=notation_profile_ref(y) or alias-preserving migration chain exists, canonicalization_profile_ref(x) and canonicalization_profile_ref(y) are compatible, and registry_epoch_ref is equal or monotone alias related
    external_serialization_validity: SerOK(x,σ,ξ,β,μ,κ_sink)=true iff CoreOK(x) and ChOK(x,σ,ξ,β,μ) and FrOK(x,σ,notation_profile_ref(x),ξ) and RepOK(x,σ,notation_profile_ref(x),ξ,β,κ_sink) and LifeOK(x,σ,notation_profile_ref(x),ξ) and required registry_conformity / packet_validity / charter_context_validity dependencies hold
  invariants:
  - raw_vendor_artifact_digest_ref_or_null のみをもつ object を canonical comparison basis にしてはならない。
  - external_audit_context または emergency_context では wall-clock timestamp 単独を freshness anchor とみなしてはならない。
  - bridge token または recipient-visible export を伴う packet で replay_binding_ref を session digest だけに落としてはならない。
  - observer_post_confirm_reviewer_credential を authority_outcome 前の current witness として使ってはならない。
  - emergency_context の notation では post_confirm_due_ref_or_null または post_confirm_duty_ref_or_null を省略してはならない。
  - migration alias なしに旧 notation profile と新 notation profile を同一 envelope へ混在させてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - notation_profile_ref
      - canonicalization_profile_ref
      - registry_epoch_ref
      - migration_alias_ref_or_null
      - post_confirm_due_ref_or_null
      - post_confirm_owner_or_duty_ref_or_null
    GraphEngine:
      required_fields:
      - session_basis_ref
      - challenge_bundle_ref_or_null
      - challenge_outcome_ref_or_null
      - freshness_anchor_ref
      - replay_binding_ref
      - custody_boundary_ref_or_null
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null
    GraphLint:
      checks:
      - raw_vendor_blob_promoted_to_canonical
      - timestamp_only_freshness
      - packet_digest_only_replay_guard
      - observer_credential_counted_as_authority
      - missing_post_confirm_duty_in_provisional_external_reveal
      - mixed_notation_profile_without_alias
    archive_object:
      required_fields:
      - canonical_envelope_digest
      - raw_vendor_artifact_digest_ref_or_null
      - challenge_transcript_digest_ref_or_null
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで parameter 化するか
  - measurement_projection_profile の granularity / collapse predicate と critical extension 昇格条件をどこまで parameter 化するか
audit_witness_notation_core_separation_model:
  status: provisional_fixed
  statement: audit_witness_notation_core_separation_model は、HSM attestation packet と human observer credential に含まれる raw measurement claim・algorithm suite・extension field を notation core・extension registry・raw evidence adjunct へ分離し、context ごとの admissibility と anti-downgrade を判定するモデルである。
  primitives:
    serialization_subject: σ ∈ {hsm_attestation_packet, human_observer_credential}
    external_context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    measurement_projection_profile: π_m ∈ ProjectionProfile
    claim_semantics_profile: ς_m ∈ ClaimSemanticsProfile
    algorithm_suite_profile: α_s ∈ SuiteProfile
    suite_strength_class: ω_s ∈ {legacy_compat_only, standard_assurance, hardened_assurance, emergency_hardened}
    extension_profile: ε_x ∈ ExtensionProfile
    criticality_class: κ_x ∈ {display_only, meaning_affecting, downgrade_sensitive, reveal_critical}
    canonical_core_projection: CoreProj(x)= (attested_measurement_digest_ref, measurement_projection_profile_ref, measurement_scope_ref, claim_semantics_ref, algorithm_suite_profile_ref_or_null, suite_strength_class_ref_or_null, registered_extension_set_ref_or_null, critical_extension_digest_ref_or_null)
    raw_evidence_adjunct: Adj(x)= (vendor_quote_blob_or_null, register_tuple_blob_or_null, transcript_artifact_or_null, concrete_algorithm_parameter_blob_or_null, unregistered_extension_blob_or_null)
  imported_predicates:
    serialization_validity: SerOK(x,σ,ξ,β,μ,κ_sink) from audit_witness_external_serialization_model
    profile_registry_validity: RegOK(p,P_A,P_O,ξ,β,d,τ,κ_sink,r) from audit_witness_profile_registry_model
  functions:
    core_family_requirement: CoreReq(σ,ξ)= {attested_measurement_digest_ref, measurement_projection_profile_ref, claim_semantics_ref} if σ=hsm_attestation_packet and ξ=local_context; add algorithm_suite_profile_ref if ξ∈{central_context,emergency_context,external_audit_context}; include registered_extension_set_ref_or_null / critical_extension_digest_ref_or_null when meaning-affecting or downgrade-sensitive extension is present
    raw_measurement_projection_validity: MeasProjOK(x)=true iff attested_measurement_digest_ref, measurement_projection_profile_ref, measurement_scope_ref, claim_semantics_ref are present and no raw vendor register tuple or transcript excerpt is embedded in canonical core
    algorithm_projection_validity: AlgProjOK(x,σ,ξ)=true iff algorithm_suite_profile_ref is present whenever CoreReq demands it, suite_strength_class_ref_or_null respects anti-downgrade registry, and concrete OID / parameter blob is not used as canonical comparison key
    extension_projection_validity: ExtProjOK(x,ξ)=true iff every meaning-affecting extension is represented by registered_extension_set_ref_or_null, every downgrade-sensitive or reveal-critical extension has critical_extension_digest_ref_or_null, and unregistered_extension_blob_or_null does not change current basis for ξ∈{central_context,emergency_context,external_audit_context}
    adjunct_boundary_validity: AdjBoundOK(x)=true iff raw quote / transcript / parameter blob / unregistered extension blob are stored only in Adj(x) and referenced from canonical envelope by digest or ref
    context_projection_validity: CtxProjOK(x,σ,ξ)=true iff MeasProjOK(x) and AlgProjOK(x,σ,ξ) and ExtProjOK(x,ξ) and AdjBoundOK(x)
    anti_downgrade_pass: ADPass(x,y)=true iff suite alias / projection alias / extension alias chain is monotone and no transition from stronger registry cell to weaker cell occurs without explicit migration authorization
    notation_core_separation_validity: CoreSepOK(x,σ,ξ,β,μ,κ_sink)=true iff SerOK(x,σ,ξ,β,μ,κ_sink) and CtxProjOK(x,σ,ξ) and required registry alias / anti-downgrade conditions hold
  invariants:
  - canonical envelope に raw vendor register tuple、raw quote body、session transcript excerpt、screen artifact を直埋めしてはならない。
  - concrete algorithm literal や parameter blob を notation core の comparability key にしてはならない。
  - central_context / emergency_context / external_audit_context では unregistered extension blob を current basis・comparison basis・replay basis に使ってはならない。
  - measurement projection / algorithm suite / extension family のいずれも、challenge / freshness / replay / post_confirm duty を単独では満たさない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - measurement_projection_profile_ref
      - measurement_scope_ref
      - claim_semantics_ref
      - algorithm_suite_profile_ref_or_null
      - suite_strength_class_ref_or_null
      - registered_extension_set_ref_or_null
      - critical_extension_digest_ref_or_null
      - projection_migration_alias_ref_or_null
      - suite_alias_or_supersession_ref_or_null
    GraphEngine:
      required_fields:
      - context_ref
      - attested_measurement_digest_ref
      - challenge_bundle_ref_or_null
      - freshness_anchor_ref
      - replay_binding_ref
      - post_confirm_due_ref_or_null
      - post_confirm_owner_or_duty_ref_or_null
    GraphLint:
      checks:
      - raw_measurement_claim_embedded_in_core
      - algorithm_literal_used_as_core_key
      - unregistered_extension_promoted_to_current_basis
      - critical_extension_missing_digest
      - suite_downgrade_without_explicit_alias
    archive_object:
      required_fields:
      - canonical_envelope_digest
      - raw_vendor_artifact_digest_ref_or_null
      - transcript_or_screen_artifact_digest_ref_or_null
      - algorithm_parameter_blob_digest_ref_or_null
      - unregistered_extension_blob_digest_ref_or_null
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで parameter 化するか
  - measurement_projection_profile の granularity / collapse predicate と critical extension 昇格条件をどこまで parameter 化するか
measurement_projection_profile_model:
  status: provisional_fixed
  statement: measurement_projection_profile_model は、raw measurement bundle から comparison-stable projection を作る granularity、lawful collapse predicate、critical extension promotion predicate を parameter 化し、context ごとの current basis admissibility を判定するモデルである。
  primitives:
    raw_measurement_bundle: b ∈ Bundle
    projection_profile: π_m ∈ ProjectionProfile
    context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    granularity_class: γ ∈ {atomic_projection, normalized_projection, bounded_aggregate_projection, advisory_summary_projection}
    collapse_operator: ω ∈ {identity, unit_normalization, code_alias_normalization, bounded_window_aggregation, set_digest_compaction, threshold_summary}
    field_family: φ ∈ {projection_profile_ref, measurement_scope_ref, claim_semantics_ref, attested_measurement_digest_ref, normalization_or_unit_family_ref, aggregation_operator_ref, observation_window_class_ref, source_cardinality_ref, composition_digest_ref_or_null, uncertainty_or_tolerance_class_ref_or_null, algorithm_suite_profile_ref_or_null, registered_extension_set_ref_or_null, critical_extension_digest_ref_or_null}
    extension_criticality: κ_ext ∈ {display_only, meaning_affecting, comparability_affecting, gating_affecting, replay_or_reveal_affecting}
    projection_claim: x = (π_m, γ, core_family_set, collapse_witness_set, registered_extension_set_ref_or_null, critical_extension_digest_ref_or_null)
  imported_predicates:
    notation_core_separation: CoreSepOK(a,σ,ξ,β,μ,κ_sink) from audit_witness_notation_core_separation_model
    serialization_validity: SerOK(a,σ,ξ,β,μ,κ_sink) from audit_witness_external_serialization_model
    charter_context_validity: CtxBindOK(τ,p,β,ξ,π) from central_delegation_charter_taxonomy_model
  functions:
    core_requirement: CoreReq(π_m,γ,ξ)= {projection_profile_ref, measurement_scope_ref, claim_semantics_ref, attested_measurement_digest_ref} ∪ Cond(π_m,γ,ξ)
    conditional_core_family_rule: Cond(π_m,γ,ξ) は、γ が normalized_projection なら normalization_or_unit_family_ref、γ が bounded_aggregate_projection なら aggregation_operator_ref・observation_window_class_ref・source_cardinality_ref・composition_digest_ref_or_null、comparison ordering または pass/fail が変わりうるなら uncertainty_or_tolerance_class_ref_or_null、suite family が comparability / downgrade barrier に効く ξ なら algorithm_suite_profile_ref_or_null、critical extension があるなら critical_extension_digest_ref_or_null を要求する
    raw_boundary_validity: RawBoundOK(b,x)=true iff raw register tuple / quote / parameter blob / transcript artifact は canonical core に直埋めされず digest / ref で adjunct 側へ保持される
    collapse_admissibility: CollOK(x,π_m,ξ)=true iff collapse_operator_ref が π_m に登録され、claim_semantics_ref と measurement_scope_ref が保存され、multi-source / multi-window collapse では source_cardinality_ref・observation_window_class_ref・composition_digest_ref_or_null が存在し、required uncertainty / tolerance family が落ちていない
    summary_only_projection: SumOnly(x)=true iff γ=advisory_summary_projection or ω=threshold_summary
    critical_extension_promotion: CritProm(e,ξ)=true iff κ_ext(e) ∈ {meaning_affecting, comparability_affecting, gating_affecting, replay_or_reveal_affecting} and omitting e changes current-basis admissibility or protected-facet interpretation under ξ
    projection_validity: ProjOK(x,b,π_m,ξ)=true iff CoreReq(π_m,γ(x),ξ) ⊆ core_family_set(x) and RawBoundOK(b,x) and CollOK(x,π_m,ξ) and every promoted extension satisfies CritProm -> critical_extension_digest_ref_or_null present
    context_current_basis_validity: CurrBasisOK(x,b,π_m,ξ)=true iff ProjOK(x,b,π_m,ξ) and (ξ!=local_context -> not SumOnly(x)) and (ξ in {emergency_context, external_audit_context} -> replay / challenge / continuity dependent fields remain bound)
    profile_migration_barrier: MigrAliasOK(π_old,π_new)=true iff granularity_class, allowed_collapse_operator_set, protected-facet-relevant required family, critical extension promotion outcome が不変である
  invariants:
  - advisory_summary_projection を central_context / emergency_context / external_audit_context の current basis に使ってはならない。
  - bounded_aggregate_projection は composition_digest_ref_or_null なしに replay basis や external comparison basis に使ってはならない。
  - critical extension へ昇格すべき extension を registered だけで済ませて omission してはならない。
  - granularity_class または collapse operator の change を alias migration と偽装してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - measurement_projection_profile_ref
      - granularity_class
      - allowed_collapse_operator_set
      - required_core_family_set
      - critical_extension_rule_ref
      - projection_profile_alias_or_successor_ref_or_null
    GraphEngine:
      required_fields:
      - measurement_scope_ref
      - claim_semantics_ref
      - attested_measurement_digest_ref
      - aggregation_operator_ref_or_null
      - observation_window_class_ref_or_null
      - source_cardinality_ref_or_null
      - composition_digest_ref_or_null
      - uncertainty_or_tolerance_class_ref_or_null
      - critical_extension_digest_ref_or_null
      - challenge_bundle_ref_or_null
      - freshness_anchor_ref_or_null
      - replay_binding_ref_or_null
      - post_confirm_due_ref_or_null
    GraphLint:
      checks:
      - summary_projection_used_as_current_basis
      - collapse_without_registered_operator
      - multi_source_or_multi_window_collapse_missing_manifest
      - critical_extension_promoted_but_digest_missing
      - profile_migration_alias_hides_granularity_change
    archive_object:
      required_fields:
      - raw_measurement_bundle_digest
      - composition_manifest_digest_or_null
      - projection_manifest_digest
      - critical_extension_manifest_digest_or_null
  residual_open_points:
  - central delegation charter extension registry の mixed-version coexistence window と batch migration witness 境界をどこまで registry 化するか
ratified_unreflected_provisional_binding_model:
  status: provisional_fixed
  statement: ratified_unreflected_provisional_binding_model は、ratified 済みだが未 reflected の adjudication outcome をどの use surface に provisional に使えるかを形式化し、authoritative binding と preview / preparation / controlled provisional export を分離するモデルである。
  primitives:
    conflict_case: c ∈ Case
    lifecycle_state: λ(c) ∈ {open, ratified_unreflected, reflected, rejected, superseded}
    use_surface: υ ∈ {current_decision, coverage_basis, route_gating, hold_release, recipient_visible_export}
    action_class: a_cls ∈ {reflection_preparation, non_authoritative_preview, branch_preserving_local_diagnostic, reflection_only_route_prep, controlled_provisional_export, authoritative_commitment}
    authority_tier: α ∈ {domain_review, domain_protected_facet, central_policy, central_exception, emergency_containment}
    context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    protected_facet: π ∈ {safety_or_regulated, authority_or_accountability, external_commitment, recipient_visibility, archive_bridge_continuity, local_operability}
    provisional_packet: p = (packet_id, case_ref, recipient_set_ref, provisional_label_ref, expiry_at, contradiction_notice_plan_ref, archive_manifest_digest_ref_or_null, bridge_token_proof_ref_or_null, follow_up_owner_ref, supersession_ref_or_null)
  imported_predicates:
    branch_criticality: BC(c,a,d) from stakeholder_conflict_adjudication_boundary
    covered_action: Covered(c,a,d) from stakeholder_conflict_adjudication_boundary
    route_mapping_validity: MSC(Φ,a) from route_mapping_registry_model
    basis_reliance: Rel(Φ,a,t) from basis_lifecycle_model
    charter_context_validity: CtxBindOK(τ,p,β,ξ,π) from central_delegation_charter_taxonomy_model
  functions:
    authoritative_use: AuthUse(υ)=true iff υ∈{current_decision,coverage_basis,route_gating,hold_release,recipient_visible_export}
    authoritative_binding_validity: AuthBindOK(c,υ)=true iff λ(c)=reflected
    preview_admissibility: PrevOK(c,υ,a_cls,d)=true iff λ(c)=ratified_unreflected ∧ υ∈{current_decision,coverage_basis} ∧ a_cls∈{reflection_preparation, non_authoritative_preview, branch_preserving_local_diagnostic} ∧ BC(c,a,d)=false or Covered(c,a,d)=true under already reflected basis
    route_preparation_admissibility: RoutePrepOK(c,a_cls)=true iff λ(c)=ratified_unreflected ∧ a_cls=reflection_only_route_prep
    hold_transform_admissibility: HoldShiftOK(c,a,d)=true iff λ(c)=ratified_unreflected ∧ BC(c,a,d)=false ∧ hold family changes only to reflection_pending and no release event is emitted
    controlled_export_admissibility: ExpProvOK(c,p,α,ξ,κ_ext)=true iff λ(c)=ratified_unreflected ∧ α∈{central_policy,central_exception} ∧ ξ∈{central_context,external_audit_context,emergency_context} ∧ recipient_set_ref(p) is named and finite ∧ provisional_label_ref(p) not null ∧ expiry_at(p) not null ∧ contradiction_notice_plan_ref(p) not null ∧ follow_up_owner_ref(p) not null ∧ (κ_ext=no_bridge_needed or archive_manifest_digest_ref_or_null(p) not null) ∧ (κ_ext=bridge_or_archive_needed -> bridge_token_proof_ref_or_null(p) not null and archive_manifest_digest_ref_or_null(p) not null)
    authoritative_decision_forbidden: DecForbid(c,a,d)=true iff λ(c)=ratified_unreflected ∧ action_class(a)=authoritative_commitment
    coverage_forbidden: CovForbid(c,kind)=true iff λ(c)=ratified_unreflected ∧ kind∈{shared_core, intersection_safe, target_isolation, blocker_clear}
    route_switch_forbidden: RouteForbid(c)=true iff λ(c)=ratified_unreflected and any active route switch / approval path switch / timeout clear is requested
    hold_release_forbidden: HoldRelForbid(c,a,d)=true iff λ(c)=ratified_unreflected ∧ BC(c,a,d)=true
    recipient_export_forbidden: ExpForbid(c,public_flag,irreversible_flag)=true iff λ(c)=ratified_unreflected ∧ (public_flag=true or irreversible_flag=true)
    contradiction_revoke: ContraRevoke(c,p)=true iff contradiction, rollback, authority withdrawal, or supersession occurs before reflection completion; then p must emit revoke/correct/narrow notice and cannot silently expire into active basis
    provisional_binding_validity: ProvBindOK(c,υ,a,p,d,α,ξ,κ_ext)=true iff (υ∈{current_decision,coverage_basis} -> PrevOK(c,υ,action_class(a),d)) ∧ (υ=route_gating -> RoutePrepOK(c,action_class(a))) ∧ (υ=hold_release -> HoldShiftOK(c,a,d)) ∧ (υ=recipient_visible_export -> ExpProvOK(c,p,α,ξ,κ_ext))
  invariants:
  - λ(c)=ratified_unreflected の outcome を shared_core / intersection_safe coverage の basis にしてはならない。
  - λ(c)=ratified_unreflected の outcome で active approval route、required authority、accountability owner、rollback expectation を切り替えてはならない。
  - branch-critical case では λ(c)=ratified_unreflected のまま hold release または head clear を発火してはならない。
  - recipient-visible provisional export は named recipient・provisional label・expiry・contradiction notice path・follow-up owner を欠いてはならない。
  - public explanation、irreversible commitment、recipient-visible continuity の final basis を λ(c)=ratified_unreflected の packet だけで正当化してはならない。
  - contradiction または supersession 後に provisional packet を silent replacement してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - adjudication_case_ref
      - lifecycle_state
      - provisional_binding_class
      - allowed_surface_set
      - expiry_at
      - contradiction_notice_plan_ref
      - reflection_ops_ref
      - follow_up_owner_ref
      - supersession_ref_or_null
    GraphEngine:
      required_fields:
      - reflection_ops_pending
      - active_route_preserved_flag
      - head_clear_forbidden_flag
      - provisional_packet_recipient_set_ref
      - expiry_timer_ref
      - contradiction_event_ref
      - revoke_or_correct_notice_queue_ref
    GraphLint:
      checks:
      - unreflected_outcome_used_as_authoritative_basis
      - unreflected_shared_core_coverage
      - unreflected_route_switch
      - unreflected_hold_release
      - silent_provisional_export
      - missing_contradiction_notice_path
      - public_or_irreversible_use_of_provisional_packet
    archive_object:
      required_fields:
      - provisional_packet_digest
      - recipient_scope_ref
      - expiry_at
      - contradiction_notice_ref_or_null
      - correction_packet_ref_or_null
      - supersession_ref_or_null
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで parameter 化するか
  - measurement_projection_profile の granularity / collapse predicate と critical extension 昇格条件をどこまで parameter 化するか
provisional_recipient_visible_export_notice_model:
  status: provisional_fixed
  statement: provisional_recipient_visible_export_notice_model は、recipient-visible provisional packet の admissibility、notice action、continuity requirement、follow-up closure を packet class と context ごとに判定するモデルである。
  primitives:
    packet_class: κ ∈ {current_decision_preview, bounded_preview, emergency_reveal, post_confirm_follow_up}
    context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    notice_action: ν ∈ {revoke, correct, narrow, follow_up_notice}
    packet_state: λ ∈ {draft, issued_active, notice_pending, corrected_successor_issued, narrowed_successor_issued, revoked_closed, expired_notice_pending, follow_up_closed}
    recipient_scope: ρ = finite named recipient set
    continuity_need: χ ∈ {none, archive_only, archive_and_bridge}
    trigger_event: τ ∈ {contradiction, rollback, authority_withdrawal, supersession, expiry, reflection_completed, final_closure}
    commitment_class: γ ∈ {review_only, bounded_preparation, bounded_containment, final_commitment}
    successor_relation: σ ∈ {none, correction_successor, narrowing_successor, reflected_successor, closure_successor}
  functions:
    issue_admissibility: IssueOK(p,κ,ξ,ρ,γ,χ)=true iff ρ is finite and named, provisional_label_ref(p) not null, expiry_at(p) not null, notice_plan_ref(p) not null, follow_up_owner_ref(p) not null, public_flag(p)=false, and γ!=final_commitment; additionally χ=archive_only requires archive_manifest_digest_ref_or_null(p) not null, χ=archive_and_bridge requires both archive_manifest_digest_ref_or_null(p) and bridge_token_proof_ref_or_null(p) not null
    continuity_requirement: ContNeed(κ,ξ,b)=archive_and_bridge iff ξ∈{emergency_context,external_audit_context} or recipient_visible_continuity(b)=true or cross_boundary(b)=true; =archive_only iff ξ=central_context or replay_or_audit_reuse(b)=true; else none
    revoke_requirement: RevokeReq(p,τ)=true iff τ∈{contradiction, rollback, authority_withdrawal} or (τ=expiry and no lawful successor exists)
    correct_requirement: CorrectReq(p,s)=true iff s=correction_successor and recipient_scope(s)⊆recipient_scope(p) and claim_surface(s) does not widen and commitment_class(s)≤commitment_class(p)
    narrow_requirement: NarrowReq(p,s)=true iff s=narrowing_successor and recipient_scope(s)⊆recipient_scope(p) and reveal_surface(s)⊆reveal_surface(p) and commitment_class(s)≤commitment_class(p)
    follow_up_requirement: FollowReq(p,τ,s)=true iff packet was recipient-visible and (τ∈{reflection_completed, final_closure} or s∈{reflected_successor, closure_successor})
    silent_replacement_forbidden: SilentReplaceForbid(p,s)=true iff p was recipient-visible and s is issued without predecessor_ref(p,s) or without required notice emission for τ∈{contradiction, supersession, expiry}
    public_use_forbidden: PublicForbid(p)=true iff public_flag(p)=true or anonymous_distribution_flag(p)=true
    irreversible_commitment_forbidden: CommitForbid(p)=true iff commitment_class(p)=final_commitment
    packet_validity: PktOK(p,κ,ξ,τ,s,b)=true iff IssueOK(p,κ,ξ,recipient_scope(p),commitment_class(p),ContNeed(κ,ξ,b)) and not PublicForbid(p) and not CommitForbid(p) and ((RevokeReq(p,τ) -> revoke_notice_ref_or_null(p) not null) and (CorrectReq(p,s) -> correction_successor_ref_or_null(p) not null) and (NarrowReq(p,s) -> narrowing_successor_ref_or_null(p) not null) and (FollowReq(p,τ,s) -> follow_up_packet_ref_or_null(p) not null)) and not SilentReplaceForbid(p,s)
  invariants:
  - recipient-visible provisional packet は finite named recipient set を欠いてはならない。
  - public explanation または anonymous distribution を provisional packet で行ってはならない。
  - provisional packet で final_commitment を要求してはならない。
  - contradiction / rollback / authority_withdrawal / unrecoverable expiry 後に revoke notice なしで packet を継続してはならない。
  - correction_successor と narrowing_successor は predecessor より広い recipient scope、広い reveal surface、または強い commitment class を持ってはならない。
  - reflection_completed または final_closure が起きた recipient-visible packet は follow-up packet または closure notice を欠いてはならない。
  - archive_and_bridge が要求される packet を archive digest または bridge proof なしで発行してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - packet_class_ref
      - recipient_scope_ref
      - provisional_label_ref
      - expiry_at
      - notice_plan_ref
      - follow_up_owner_ref
      - predecessor_packet_ref_or_null
      - successor_packet_ref_or_null
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null
    GraphEngine:
      required_fields:
      - packet_state
      - trigger_event_ref
      - notice_pending_flag
      - revoke_notice_queue_ref_or_null
      - correction_successor_ref_or_null
      - narrowing_successor_ref_or_null
      - follow_up_due_flag
      - follow_up_packet_ref_or_null
    GraphLint:
      checks:
      - public_or_anonymous_provisional_export
      - irreversible_commitment_in_provisional_packet
      - silent_replacement_after_contradiction_or_supersession
      - silent_expiry_without_notice
      - widening_correction_or_narrowing_violation
      - missing_archive_or_bridge_continuity_for_required_context
      - missing_follow_up_after_reflection_or_closure
    archive_object:
      required_fields:
      - packet_digest
      - recipient_scope_ref
      - notice_artifact_digest_ref_or_null
      - predecessor_packet_digest_ref_or_null
      - successor_packet_digest_ref_or_null
      - archive_manifest_digest_ref_or_null
      - bridge_token_proof_ref_or_null
  residual_open_points:
  - central delegation charter extension registry の migration / supersession / inheritance 境界をどこまで registry 化するか
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
provisional_recipient_visible_export_acknowledgment_recall_model:
  status: provisional_fixed
  statement: provisional_recipient_visible_export_acknowledgment_recall_model は、packet class / context ごとの acknowledgment requirement、per-recipient recall coverage、batch completion class、closure admissibility を parameter 化するモデルである。
  primitives:
    packet_class: κ ∈ {current_decision_preview, bounded_preview, emergency_reveal, post_confirm_follow_up}
    context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    recipient: r ∈ RecipientAlias
    recipient_batch: B ⊆ RecipientAlias
    ack_requirement: α ∈ {mandatory, conditional, forbidden}
    ack_event_class: η ∈ {receipt_ack, read_or_action_ack, recall_ack, successor_follow_up_ack, hard_bounce_no_access, soft_bounce, non_response_timeout, downstream_forwarding_disclosed, downstream_silent_retention_gap}
    coverage_state: σ_cov ∈ {received, recalled, bounced_no_access, pending, escalated_gap}
    completion_class: ω ∈ {complete, bounded_complete, escalated_gap, incomplete}
    closure_kind: χ ∈ {contradiction_closure, rollback_closure, follow_up_closure}
  functions:
    ack_requirement_matrix: AckReq(κ,ξ)=mandatory for (κ,ξ)∈{(current_decision_preview,central_context),(bounded_preview,central_context),(bounded_preview,external_audit_context),(emergency_reveal,local_context),(emergency_reveal,central_context),(emergency_reveal,emergency_context),(emergency_reveal,external_audit_context),(post_confirm_follow_up,central_context),(post_confirm_follow_up,emergency_context),(post_confirm_follow_up,external_audit_context)}; =forbidden for (κ,ξ)∈{(current_decision_preview,emergency_context),(current_decision_preview,external_audit_context),(bounded_preview,emergency_context)}; otherwise conditional
    ack_event_validity: AckEvtOK(e,p,r)=true iff e binds packet_digest or predecessor/successor lineage, named recipient alias r, event_time, and channel / actor evidence sufficient for the required ack class
    reach_coverage: ReachCov(r,p,ξ,t)=true iff ∃e with AckEvtOK(e,p,r) and η(e)∈{receipt_ack,read_or_action_ack,successor_follow_up_ack,hard_bounce_no_access}
    recall_coverage: RecallCov(r,p,ξ,t)=true iff required recall/follow-up duty exists and ∃e with AckEvtOK(e,p,r) and η(e)∈{recall_ack,successor_follow_up_ack,hard_bounce_no_access}; if η(e)=downstream_forwarding_disclosed then child recipient set Child(r,p,t) must also satisfy RecallCov
    downstream_gap_predicate: DownGap(B,p,t)=true iff ∃r∈B such that downstream_silent_retention_gap is present or downstream_forwarding_disclosed exists but some child recipient lacks RecallCov
    bounded_complete_admissibility: BoundedAdm(κ,ξ,B,p,t)=true iff ξ=local_context and κ∈{current_decision_preview,bounded_preview} and only non_response_timeout remains and not DownGap(B,p,t), or ξ=central_context and κ∈{current_decision_preview,bounded_preview} and dual-signoff override witness exists and not DownGap(B,p,t)
    batch_completion: BatchComp(B,p,κ,ξ,t)=complete iff ∀r∈B RecallCov(r,p,ξ,t)=true and not DownGap(B,p,t); =bounded_complete iff not complete and BoundedAdm(κ,ξ,B,p,t)=true; =escalated_gap iff DownGap(B,p,t) or (AckReq(κ,ξ)=mandatory and ∃r with non_response_timeout or soft_bounce beyond timeout); else incomplete
    closure_admissibility: CloseOK(B,p,κ,ξ,χ,t)=true iff required notice/successor linkage exists and ((ξ=external_audit_context or ξ=emergency_context) -> BatchComp=complete) and (ξ=central_context -> BatchComp∈{complete,bounded_complete only when override witness exists and κ∈{current_decision_preview,bounded_preview}}) and (ξ=local_context -> BatchComp∈{complete,bounded_complete})
    ack_non_implication: AckNonImp(e)=true iff no valid ack event implies authority approval, truth restoration, or contradiction resolution of claim content
  axioms:
  - send success、queue accepted、open pixel、click log は、それだけで receipt_ack / read_or_action_ack / recall_ack の十分条件にならない。
  - AckReq(κ,ξ)=forbidden の組では acknowledgment 欠如を closure blocker にしてはならず、その packet class 自体の use は narrow に解釈する。
  - downstream_forwarding_disclosed は child recipient set の追加を要求し、親 recipient の recall coverage を単独で complete にしてはならない。
  - external_audit_context と emergency_context では bounded_complete を closure admissibility に使ってはならない。
  - receipt_ack は reach coverage にだけ使え、recall coverage には recall_ack または successor_follow_up_ack か hard_bounce_no_access を要する。
  tool_projection:
    DecisionLedger:
      required_fields:
      - packet_class_ref
      - recipient_alias_set_ref
      - ack_requirement_class_ref
      - per_recipient_coverage_state
      - recall_timeout_ref
      - manual_override_packet_ref_or_null
      - downstream_child_batch_ref_or_null
      - completion_class
    GraphEngine:
      required_fields:
      - ack_event_digest_ref_set
      - bounce_or_no_access_digest_ref_set
      - non_response_timer_state
      - downstream_forwarding_event_ref_set
      - downstream_gap_flag
      - completion_class
      - closure_admissibility_flag
      - escalation_target_ref_or_null
    GraphLint:
      checks:
      - send_success_treated_as_acknowledgment
      - open_tracking_only_treated_as_read_ack
      - non_response_timeout_treated_as_complete_without_override
      - downstream_forwarding_without_child_batch_expansion
      - bounded_complete_used_in_emergency_or_external_audit
      - post_confirm_follow_up_without_predecessor_lineage_used_as_recall_completion
    archive_object:
      required_fields:
      - recipient_coverage_manifest_digest
      - ack_event_manifest_digest
      - bounce_no_access_manifest_digest_or_null
      - manual_override_digest_or_null
      - downstream_closure_manifest_digest_or_null
  residual_open_points:
  - central delegation charter extension registry の mixed-version coexistence window と batch migration witness 境界をどこまで registry 化するか
central_delegation_charter_extension_registry_model:
  status: provisional_fixed
  statement: central_delegation_charter_extension_registry_model は、central delegation charter の taxonomy core と weighted quorum・ordered fallback・jurisdiction subtype extension の extension parameter を分離し、context ごとの admissibility・activation・monotone constraint・migration / supersession を判定するモデルである。
  primitives:
    extension_kind: ε ∈ {weighted_quorum, ordered_fallback, jurisdiction_subtype}
    requirement_state: ρ ∈ {mandatory, conditional, forbidden}
    seat_class: σ ∈ {domain_execution_seat, domain_review_seat, protected_facet_seat, central_policy_seat, central_exception_seat, observer_nonvoting_seat}
    quorum_profile: Q = (profile_id, seat_class_set, weight_vector, threshold_rule, veto_class_set, abstention_rule, timeout_policy_ref, fallback_profile_ref_or_null, supersession_rule_ref)
    fallback_profile: F = (profile_id, predecessor_route_family, successor_chain, activation_trigger_set, wait_window, same_or_higher_authority_constraint, post_confirm_policy_ref_or_null, supersession_rule_ref)
    jurisdiction_subtype_profile: J = (profile_id, parent_jurisdiction_family, subtype_code, lawful_purpose_delta_set, reveal_cap_delta_set, retention_notice_rule_set, required_attestation_profile_delta_set, required_observer_profile_delta_set, escalation_trigger_set, supersession_rule_ref)
    activation_reason: γ ∈ {collective_board_route, timeout, unavailability, recusal, route_invalidated, cross_jurisdiction_overlay, sector_overlay, external_audit_overlay}
  imported_predicates:
    taxonomy_validity: TaxOK(τ,β,ξ,π) from central_delegation_charter_taxonomy_model
    context_binding_validity: CtxBindOK(τ,p,β,ξ,π) from central_delegation_charter_taxonomy_model
  functions:
    collective_route_requirement: CollectiveReq(τ)=true iff τ.allowed_approval_route_family_set contains dual_control_route or central_supervised_route and seat cardinality > 1
    weighted_quorum_requirement: WQReq(ξ,τ,γ)=mandatory iff CollectiveReq(τ)=true and γ=collective_board_route; forbidden iff ξ=external_audit_context or ξ=emergency_context for immediate containment; conditional otherwise
    weighted_quorum_validity: WQOK(Q,τ,ξ)=true iff WQReq(ξ,τ,collective_board_route) != forbidden and observer_nonvoting_seat ∉ Q.veto_class_set and observer_nonvoting_seat has zero voting weight and threshold_rule references only explicit seat_class_set
    fallback_requirement: FBReq(ξ,τ,γ)=mandatory iff ξ=emergency_context and γ in {timeout, unavailability, recusal} or τ.allowed_approval_route_family_set contains central_supervised_route with responder succession; conditional otherwise
    fallback_validity: FBOK(F,τ)=true iff predecessor_route_family(F) ∈ τ.allowed_approval_route_family_set and every successor in successor_chain(F) is same-or-higher authority and no successor bypasses non_delegable_escalation or centralization override required by τ
    jurisdiction_subtype_requirement: JSReq(β,ξ,π)=mandatory iff JurisReq(β,π) in {cross_tenant_cross_jurisdiction, sovereign_or_external_audit_overlay} or β.protected_facet_flag=true or β.external_party_visibility=true; conditional otherwise
    jurisdiction_subtype_validity: JSOK(J,β,π)=true iff parent_jurisdiction_family(J)=JurisReq(β,π) or parent_jurisdiction_family(J) is a lawful refinement thereof and every delta in J is monotone strengthening relative to family-level minimum
    extension_binding_validity: ExtBindOK(τ,Q,F,J,β,ξ,π,γ)=true iff TaxOK(τ,β,ξ,π)=true and (WQReq(ξ,τ,γ)=forbidden -> Q is null) and (WQReq(ξ,τ,γ)=mandatory -> WQOK(Q,τ,ξ)=true) and (FBReq(ξ,τ,γ)=mandatory -> FBOK(F,τ)=true) and (JSReq(β,ξ,π)=mandatory -> JSOK(J,β,π)=true)
    silent_route_switch_forbidden: SilentSwitch(τ,F)=true iff fallback activation occurs without explicit activation_reason, wait_window outcome, and successor_route event
    subtype_weakening_forbidden: SubtypeWeaken(J)=true iff reveal_cap_delta_set or retention_notice_rule_set weakens family-level minimum
  invariants:
  - observer_nonvoting_seat または external auditor を weighted quorum の voting weight / veto class に数えてはならない。
  - ξ=emergency_context かつ π=emergency_containment では、immediate first move を weighted quorum 成立待ちにしてはならない。
  - fallback successor chain は predecessor より弱い authority へ downgrade してはならず、non_delegable_escalation を飛ばしてはならない。
  - jurisdiction subtype profile は family-level minimum disclosure cap・observer requirement・retention duty を弱めてはならない。
  - external_audit_context の current disclosure basis では、weighted quorum profile を sole gate にしてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - charter_core_ref
      - weighted_quorum_profile_ref_or_null
      - ordered_fallback_profile_ref_or_null
      - jurisdiction_subtype_profile_ref_or_null
      - extension_activation_reason
      - extension_supersession_ref_or_null
      - inheritance_rule_ref_or_null
    GraphEngine:
      required_fields:
      - collective_route_flag
      - seat_cardinality
      - fallback_trigger_event_ref_or_null
      - successor_route_event_ref_or_null
      - subtype_overlay_required_flag
      - subtype_delta_applied_flag
    GraphLint:
      checks:
      - observer_or_auditor_counted_as_quorum_seat
      - emergency_immediate_move_waiting_for_quorum
      - silent_fallback_activation
      - downgrade_successor_route
      - missing_mandatory_subtype_profile
      - subtype_profile_weakens_family_minimum
    archive_object:
      required_fields:
      - charter_core_digest
      - extension_profile_digest_set
      - activation_reason_digest
      - supersession_ref_or_null
      - inheritance_rule_ref_or_null
  residual_open_points:
  - provisional recipient-visible export の contradiction / recall / notice duty をどこまで parameter 化するか
  - measurement_projection_profile の granularity / collapse predicate と critical extension 昇格条件をどこまで parameter 化するか
  - ExcLS の direct_containment_need を detector family / sink class ごとにどこまで数値化するか
central_delegation_charter_extension_transition_model:
  status: provisional_fixed
  statement: central_delegation_charter_extension_transition_model は、central delegation charter extension registry の profile 遷移を migration・supersession・inheritance に分け、alias equivalence・monotone strengthening・deprecation notice・dual-validity window・provisional export propagation を判定するモデルである。
  primitives:
    extension_kind: ε ∈ {weighted_quorum, ordered_fallback, jurisdiction_subtype}
    transition_kind: μ ∈ {migration, supersession, inheritance}
    semantic_delta_class: δ ∈ {none, bounded, material, unresolved}
    notice_state: ν ∈ {not_required, pending, issued, overdue}
    dual_validity_mode: ω ∈ {none, bounded_overlap, history_only}
    charter_extension_profile: Π = (profile_id, extension_kind, semantic_payload, context_admissibility, non_delegable_binding_ref_or_null)
    transition_record: T = (extension_kind, transition_kind, predecessor_profile_ref_or_null, successor_or_child_profile_ref, semantic_delta_class, affected_context_set, effective_at, freeze_at_or_null, alias_family_ref_or_null, comparability_witness_ref_or_null, monotone_proof_ref_or_null, dual_validity_window_ref_or_null, deprecation_notice_policy_ref_or_null, provisional_export_propagation_rule_ref_or_null, emergency_lane_rule_ref_or_null)
    profile_use_surface: υ ∈ {new_issuance, history_verification, current_basis, provisional_export, emergency_lane, external_audit_disclosure}
  imported_predicates:
    taxonomy_validity: TaxOK(τ,β,ξ,π) from central_delegation_charter_taxonomy_model
    extension_binding_validity: ExtBindOK(τ,Q,F,J,β,ξ,π,γ) from central_delegation_charter_extension_registry_model
    provisional_packet_validity: ProvPktOK(P,ξ) from provisional_recipient_visible_export_notice_model
  predicates_and_functions:
    alias_equivalence: AliasEq(Π0,Π1)=true iff extension_kind(Π0)=extension_kind(Π1) and semantic_delta_class(T)=none and outcome_space(Π0)=outcome_space(Π1) and context_admissibility(Π0)=context_admissibility(Π1)
    monotone_strengthening: MonoStr(Π0,Π1)=true iff every obligation / threshold / observer / attestation / retention / reveal constraint in Π1 is equal to or stricter than Π0 and no authority downgrade or duty relaxation occurs
    migration_validity: MigOK(T,Π0,Π1)=true iff μ=migration and AliasEq(Π0,Π1)=true and comparability_witness_ref(T) exists and semantic_delta_class(T)=none and dual_validity_window(T) is bounded
    supersession_requirement: SupReq(Π0,Π1)=true iff extension_kind identical and semantic_delta_class in {bounded, material} and not AliasEq(Π0,Π1)
    supersession_validity: SupOK(T,Π0,Π1,ξ,υ)=true iff μ=supersession and SupReq(Π0,Π1)=true and freeze_at(T) is defined for υ=new_issuance and notice_policy(T) covers affected_context_set and (υ in {current_basis, provisional_export, external_audit_disclosure} -> successor_or_history_window is explicit)
    inheritance_validity: InhOK(T,Πp,Πc,ξ)=true iff μ=inheritance and parent_profile_ref(T)=Πp and MonoStr(Πp,Πc)=true and inherited_field_family_set is explicit and local_override_boundary does not cross non-delegable boundary
    weighted_quorum_alias_equivalence: WQAliasEq(Π0,Π1)=true iff seat_class_set、threshold outcome region、veto reach、abstention semantics、timeout-to-fallback linkage が同値
    fallback_alias_equivalence: FBAliasEq(Π0,Π1)=true iff ordered successor chain, same-or-higher authority constraint, activation_trigger_set, wait_window semantics, post_confirm_policy が同値
    subtype_alias_equivalence: JSAliasEq(Π0,Π1)=true iff lawful_purpose_delta_set, reveal_cap_delta_set, retention_notice_rule_set, required_attestation_profile_delta_set, required_observer_profile_delta_set, escalation_trigger_set が同値
    new_issuance_admissibility: UseNew(Π,T,t)=true iff t < freeze_at(T) or μ=inheritance with applicable_context satisfied; deprecated predecessor after freeze_at is false
    history_use_admissibility: UseHist(Π,T,t)=true iff t is within bounded history window or immutable archive references predecessor explicitly
    provisional_export_propagation: ProvProp(T,P)=notice_required iff P references predecessor_profile_ref(T) and successor changes recipient-visible admissibility, commitment class, or route justification
    emergency_lane_propagation: EmergProp(T,e)=bounded_predecessor_reuse iff e.state=active_containment and immediate_first_move would be blocked; otherwise successor binding required
    overall_transition_validity: TransOK(T,Π0,Π1,τ,β,ξ,π,υ,t)=true iff TaxOK(τ,β,ξ,π)=true and ExtBindOK(...) for active profile and ((μ=migration -> MigOK(...)) and (μ=supersession -> SupOK(...)) and (μ=inheritance -> InhOK(...))) and UseNew / UseHist / ProvProp / EmergProp satisfy use surface υ
  invariants:
  - semantic delta がある profile change を alias migration として扱ってはならない。
  - weighted quorum の vote dilution、ordered fallback の weaker authority append、jurisdiction subtype の duty relaxation は inheritance として扱ってはならない。
  - freeze_at 後の predecessor profile を new_issuance current basis に使ってはならない。
  - dual_validity_window は bounded_overlap か history_only に限り、無期限 mixed-version coexistence を許してはならない。
  - provisional recipient-visible export が predecessor profile に依存する場合、successor / closure / revoke のいずれかの follow-up を欠いたまま active にしてはならない。
  - emergency lane では immediate first move を charter transition notice 待ちにしてはならないが、post-confirm successor binding を省略してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - extension_kind
      - active_profile_ref
      - predecessor_profile_ref_or_null
      - successor_or_child_profile_ref_or_null
      - transition_kind
      - semantic_delta_class
      - freeze_at_or_null
      - dual_validity_window_ref_or_null
      - deprecation_notice_state
      - provisional_export_follow_up_due_flag
      - emergency_lane_successor_due_flag
    GraphEngine:
      required_fields:
      - issue_time
      - use_surface
      - context_ref
      - alias_equivalence_result
      - monotone_strengthening_result
      - new_issuance_admissible_flag
      - history_window_active_flag
      - provisional_notice_due_flag
      - emergency_post_confirm_due_flag
    GraphLint:
      checks:
      - semantic_delta_masked_as_alias_migration
      - freeze_after_predecessor_reuse
      - unbounded_dual_validity_window
      - weaker_child_inheritance
      - missing_comparability_witness
      - missing_provisional_follow_up_after_supersession
    archive_object:
      required_fields:
      - transition_manifest_digest
      - comparability_witness_digest_or_null
      - monotone_proof_digest_or_null
      - deprecation_notice_artifact_digest_or_null
      - history_window_ref_or_null
  residual_open_points:
  - measurement_projection_profile の granularity / collapse rule と critical extension 昇格条件をどこまで registry 化するか
  - central delegation charter extension registry の mixed-version coexistence window と batch migration witness 境界をどこまで registry 化するか
central_delegation_charter_extension_mixed_version_batch_migration_model:
  status: provisional_fixed
  statement: central_delegation_charter_extension_mixed_version_batch_migration_model は、extension family ごとの mixed-version coexistence admissibility、predecessor freeze、successor mandatory、batch migration witness completeness、rollback validity、silent drift absenceを parameter 化するモデルである。
  primitives:
    extension_family: ε ∈ {weighted_quorum, ordered_fallback, jurisdiction_subtype_extension}
    context: ξ ∈ {local_context, central_context, emergency_context, external_audit_context}
    use_surface: υ ∈ {new_issuance_current_basis, open_lineage_continuation, recipient_visible_follow_up, emergency_lane_active_containment, external_audit_current_basis, history_verification}
    mixed_version_class: μ_mix ∈ {admissible, conditional, forbidden}
    window_class: ω ∈ {none, open_forum_and_open_packet_only, active_chain_only_then_history_only, lineage_closure_only_then_history_only, history_only}
    migration_batch: B_m = (migration_batch_id, ε, predecessor_profile_set, successor_profile_set, affected_context_set, freeze_at, window_class, open_packet_lineage_set, recipient_visible_packet_set, emergency_case_set, propagation_policy_ref, rollback_policy_ref, drift_scan_digest_ref)
    completion_state: σ_cmp ∈ {complete, incomplete, rollback_required, drift_detected}
    rollback_batch: R_b = (rollback_batch_id, source_migration_batch_id, restored_predecessor_profile_set, disabled_successor_profile_set, override_scope_ref, correction_notice_set_or_digest, archive_manifest_ref)
  imported_predicates:
    transition_validity: TransOK(T,Π0,Π1,τ,β,ξ,π,υ,t) from central_delegation_charter_extension_transition_model
    provisional_batch_completion: BatchComp(B,p,κ,ξ,t) from provisional_recipient_visible_export_acknowledgment_recall_model
    provisional_closure_admissibility: CloseOK(B,p,κ,ξ,χ,t) from provisional_recipient_visible_export_acknowledgment_recall_model
  functions:
    mixed_version_matrix: MixClass(ε,υ,ξ)=forbidden for υ=new_issuance_current_basis and all ε, =forbidden for (ε=weighted_quorum, υ∈{emergency_lane_active_containment, external_audit_current_basis}), =admissible for (ε=ordered_fallback, υ∈{emergency_lane_active_containment, history_verification}), =forbidden for (ε=jurisdiction_subtype_extension, υ=external_audit_current_basis), =admissible for υ=history_verification unless archive lineage is missing, otherwise conditional
    freeze_validity: FreezeOK(B_m,t)=true iff freeze_at(B_m) is defined, every issuance event after freeze_at uses successor_profile_set, and any predecessor use after freeze_at is confined to υ∈{open_lineage_continuation, recipient_visible_follow_up, emergency_lane_active_containment, history_verification} with MixClass not forbidden
    successor_mandatory: SuccMand(B_m,ε,υ,ξ,t)=true iff υ=new_issuance_current_basis after freeze_at, or υ=external_audit_current_basis, or (ε=weighted_quorum and υ=recipient_visible_follow_up with changed justification), or (ε=ordered_fallback and emergency case has reached stabilization), or (ε=jurisdiction_subtype_extension and υ in {recipient_visible_follow_up, emergency_lane_active_containment} with changed duty delta)
    window_validity: WinOK(B_m)=true iff ω(B_m) matches ε-family policy and window end is explicit; ω=open_forum_and_open_packet_only only for ε=weighted_quorum, ω=active_chain_only_then_history_only only for ε=ordered_fallback, ω=lineage_closure_only_then_history_only only for ε=jurisdiction_subtype_extension
    batch_witness_validity: BatchWitOK(B_m)=true iff predecessor_profile_set, successor_profile_set, affected_context_set, freeze_at, window_class, open_packet_lineage_set, recipient_visible_packet_set, emergency_case_set, propagation_policy_ref, rollback_policy_ref, drift_scan_digest_ref are all present and family-specific addenda exist
    propagation_validity: PropOK(B_m,t)=true iff every p in recipient_visible_packet_set satisfies required successor notice / correction / revoke / closure branch and, when recipient acknowledgment / recall is required, associated provisional BatchComp / CloseOK is not incomplete; every emergency case in emergency_case_set has bounded predecessor reuse witness or successor binding witness
    drift_absence: DriftFree(B_m,t)=true iff no issuance after freeze_at references predecessor_profile_set on a forbidden use surface and no active packet / route / overlay remains unlisted in open_packet_lineage_set ∪ recipient_visible_packet_set ∪ emergency_case_set
    batch_completion: BatchCmp(B_m,t)=complete iff FreezeOK(B_m,t) and WinOK(B_m) and BatchWitOK(B_m) and PropOK(B_m,t) and DriftFree(B_m,t); =drift_detected iff not DriftFree(B_m,t); =rollback_required iff successor activation failure or invalid propagation is detected and explicit rollback branch is armed; else incomplete
    rollback_validity: RollbackOK(R_b,B_m,t)=true iff source_migration_batch_id(R_b)=migration_batch_id(B_m), restored predecessor scope is explicit, freeze override window is bounded, correction_notice_set_or_digest is present when recipient-visible packet or emergency case is affected, and archive manifest is updated immutably
  invariants:
  - freeze_at 後の predecessor profile を new_issuance_current_basis に使ってはならない。
  - family policy に反する dual-validity window を batch witness に設定してはならない。
  - recipient-visible packet の required propagation が incomplete のまま migration batch を complete としてはならない。
  - emergency lane では immediate first move を止めない bounded predecessor reuse だけを許し、stabilization 後の successor binding omission を許してはならない。
  - rollback は explicit rollback batch witness なしに predecessor profile を再有効化してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - migration_batch_id
      - extension_family
      - predecessor_profile_set
      - successor_profile_set
      - affected_context_set
      - freeze_at
      - window_class
      - propagation_policy_ref
      - rollback_policy_ref
      - completion_state
    GraphEngine:
      required_fields:
      - use_surface
      - issue_time
      - active_lineage_ref_or_null
      - recipient_visible_packet_ref_or_null
      - emergency_case_ref_or_null
      - mixed_version_class
      - successor_mandatory_flag
      - drift_scan_result
    GraphLint:
      checks:
      - predecessor_reused_after_freeze_on_forbidden_surface
      - invalid_dual_validity_window_for_family
      - missing_batch_migration_witness_field
      - recipient_visible_propagation_incomplete
      - emergency_successor_binding_missing_after_stabilization
      - rollback_without_explicit_witness
      - silent_mixed_version_drift_detected
    archive_object:
      required_fields:
      - migration_batch_manifest_digest
      - dual_reference_disclosure_digest_or_null
      - drift_scan_digest
      - rollback_manifest_digest_or_null
      - completion_witness_digest_or_null
  residual_open_points: []
transition_bundle_reverse_continuity_model:
  status: provisional_fixed
  statement: transition_bundle_reverse_continuity_model は、partial rollback を reverse continuity bundle と correction notice bundle の append として扱うための affected cell selection、minimum witness、supersession / full re-notice 条件を parameter 化するモデルである。
  primitives:
    affected_cell: c_r ⊆ SuccCells(T_f)
    selection_mode: μ ∈ {cell_exact, recipient_closure_expansion, authority_rebind_expansion, retire_only_projection}
    rollback_target: ρ(c_r) ∈ {predecessor_baseline_ref, retire_state_ref, no_restore_allowed}
    supersession_class: σ_n ∈ {narrow_replace, same_surface_correct, recall_and_replace, full_re_notice}
    reverse_bundle: R = (reverse_bundle_id, forward_transition_bundle_ref, affected_partition_cell_set_digest, selection_mode_ref, rollback_basis_ref, reverse_to_predecessor_or_retire_map_digest, correction_notice_plan_ref_or_null, supersession_class_ref, authority_path_ref, archive_manifest_digest_ref, initiated_at, finalized_at_or_null)
    notice_surface: N_s = (recipient_class_ref, export_bundle_ref, lawful_purpose_ref, retention_bucket_ref, commitment_class_ref)
  functions:
    AffectedCellOK: AffectedCellOK(R,T_f)=true iff every c_r in R.affected_partition_cell_set_digest is a successor cell of T_f or is admitted by μ with explicit expansion reason and unchanged hard partition axes except the registered notice/authority closure surface.
    RollbackTargetOK: RollbackTargetOK(R)=true iff every affected cell has exactly one rollback target ρ(c_r), and ρ(c_r)=no_restore_allowed only when retire/tombstone semantics are explicitly bound.
    ReverseWitnessOK: ReverseWitnessOK(R,T_f)=true iff rollback_basis_ref, reverse_to_predecessor_or_retire_map_digest, authority_path_ref, archive_manifest_digest_ref, and required correction_notice_plan_ref are all present and consistent with T_f.
    SupersedeOK: SupersedeOK(N_old,N_new)=true iff N_new does not widen recipient_class_ref, export_bundle_ref, lawful_purpose_ref, retention_bucket_ref, or commitment_class_ref, and predecessor/successor notice lineage is explicit.
    FullRenoticeReq: FullRenoticeReq(N_old,N_new)=true iff ¬SupersedeOK(N_old,N_new) or old coverage is not closed or downstream forwarding remains unresolved.
    ForwardReverseConsistent: ForwardReverseConsistent(T_f,R)=true iff reverse bundle references but does not mutate T_f, and every reversed effect is replay-traceable through forward/reverse linkage.
  tool_split:
    DecisionLedger: R の lifecycle、σ_n、notice plan、authority binding を保持する。
    GraphEngine: c_r と ρ(c_r) の materialization、および T_f との lineage consistency を計算する。
    GraphLint: AffectedCellOK / SupersedeOK / FullRenoticeReq の violation を検出する。
    archive_object: T_f と R の immutable linkage、および correction notice evidence を保持する。
  forbidden_shortcuts:
  - R を T_f の destructive update として適用する
  - σ_n を設定せず notice lineage 不明のまま supersede 扱いにする
  - affected cell expansion を authority/path witness なしで正当化する
  residual_open_points: []
reverse_bundle_overlap_cascade_model:
  status: provisional_fixed
  statement: reverse_bundle_overlap_cascade_model は、rollback cell 正規形、overlap class、active head、一手ずつの cascade rollback を parameter 化するモデルである。
  primitives:
    rollback_cell: κ = (forward_transition_bundle_ref, affected_partition_cell_ref, notice_surface_ref, authority_path_ref, correction_generation_ref)
    overlap_class: ω ∈ {disjoint_refinement, same_surface_duplicate, authority_race, conflicting_supersession, reverse_of_reverse}
    head_state: h(κ) ∈ ReverseBundleID ∪ {forward_state, retired_state}
    ancestor_relation: R_i ≺ R_j iff R_j directly names R_i as prior head of κ
    normalization_state: ν ∈ {active_head, shadowed_ancestor, blocked_competition, escalated_competition}
  functions:
    OverlapClass: OverlapClass(R_i,R_j)=ω is computed from equality/refinement of κ, rollback target map compatibility, and authority path compatibility.
    SingleHead: SingleHead(κ)=true iff exactly one h(κ) is active for κ.
    NormalizeRollbackSet: NormalizeRollbackSet(S)=S_norm iff same_surface_duplicate bundles collapse only under semantic equality, disjoint_refinement updates head monotonically, and conflicting classes remain explicit blockers.
    CascadeOK: CascadeOK(R_new,κ)=true iff R_new names current h(κ) as prior head and preserves replay-traceable lineage without skipping intermediate heads.
    ReverseOfReverseOK: ReverseOfReverseOK(R_new,κ)=true iff prior head is reopen_eligible, authority path is admissible, and unresolved notice duties do not remain hidden.
    CurrentBasisHeadOK: CurrentBasisHeadOK(κ)=true iff SingleHead(κ) and ν not in {blocked_competition, escalated_competition}.
  tool_split:
    DecisionLedger: κ と h(κ) を正本として保持し、blocked/escalated competition を状態化する。
    GraphEngine: OverlapClass と ancestor relation を計算し、head chain を再構成する。
    GraphLint: SingleHead 違反、CascadeOK 違反、ReverseOfReverseOK 違反を検査する。
    archive_object: collapsed duplicate と ancestor/head の immutable proof を保存する。
  forbidden_shortcuts:
  - ancestor relation を残さず h(κ) だけを差し替える
  - ω を計算せず timestamp order だけで head を決める
  - ReverseOfReverseOK を prior head reopen_eligible なしで真とする
  residual_open_points: []
correction_notice_downstream_closure_model:
  status: provisional_fixed
  statement: correction_notice_downstream_closure_model は、recipient surface、required acknowledgment、closure class、stale notice quarantine を parameter 化するモデルである。
  primitives:
    recipient_surface: s = (recipient_surface_id, notice_bundle_ref, recipient_class_ref, commitment_surface_ref)
    downstream_edge: e = (source_surface_ref, target_surface_ref_or_unknown, propagation_basis_ref, disclosed_flag)
    ack_class: α_ack ∈ {receipt_ack, action_ack, correction_ack, recall_ack}
    closure_class: γ ∈ {exact_closed, bounded_closed, quarantined_stale, escalated_gap, open}
    quarantine_handle: Q_h = (stale_notice_ref, active_successor_notice_ref, quarantine_reason_ref, replay_visibility_ref)
  functions:
    RequiredAckSet: RequiredAckSet(s)=A_req is determined by recipient surface class, notice class, and commitment surface.
    DownstreamCoverageOK: DownstreamCoverageOK(s)=true iff disclosed downstream surfaces are enumerated and inferred downstream uncertainty stays within the admitted profile bound.
    ClosureClass: ClosureClass(s)=γ is derived from RequiredAckSet, collected evidence, DownstreamCoverageOK, and whether stale notice is quarantined.
    QuarantineOK: QuarantineOK(Q_h)=true iff stale and successor notices are lineage-linked, stale notice is excluded from current basis, and replay visibility is preserved.
    CurrentBasisNoticeOK: CurrentBasisNoticeOK(s)=true iff ClosureClass(s)∈{exact_closed, bounded_closed, quarantined_stale} and profile/context rules admit it.
    FinalClosureBlocker: FinalClosureBlocker(κ)=true iff any recipient surface on rollback cell κ has γ∈{escalated_gap, open}.
  tool_split:
    DecisionLedger: s, A_req, γ, Q_h を保持する。
    GraphEngine: downstream edge と aggregated evidence を計算する。
    GraphLint: CurrentBasisNoticeOK と FinalClosureBlocker の違反を検出する。
    archive_object: notice lineage、ack evidence、quarantine snapshot を保持する。
  forbidden_shortcuts:
  - γ を evidence aggregation なしに exact_closed へ設定する
  - Q_h なしに stale notice を current basis から消す
  - disclosed / inferred downstream を区別せず一括 timeout で閉じる
  residual_open_points: []
transition_chain_compaction_finality_model:
  status: provisional_fixed
  statement: transition_chain_compaction_finality_model は、compaction class、replay-equivalence witness、finality checkpoint、retention tier を parameter 化するモデルである。
  primitives:
    compaction_class: χ_c ∈ {structural_only, notice_squash, closure_checkpoint, audit_projection}
    retention_tier: τ ∈ {chain_core, proof_core, notice_core, downstream_ack_core, full_archive}
    checkpoint_state: C_p = (checkpoint_id, compaction_class_ref, source_chain_digest, replay_equivalence_witness_ref, finality_state_ref, retention_tier_ref, archive_manifest_digest_ref)
    finality_state: φ ∈ {not_ready, bounded_ready, final_ready, audit_only}
  functions:
    ReplayEqOK: ReplayEqOK(C_p)=true iff predecessor/successor lineage, active heads, notice closure classes, quarantine handles, and authority state can be reconstructed from C_p plus referenced archive objects.
    RetentionMinOK: RetentionMinOK(C_p,profile,context)=true iff τ satisfies the minimum tier required for the given profile/context.
    FinalityOK: FinalityOK(C_p)=true iff no rollback cell has unresolved active competition, no recipient surface has γ∈{open, escalated_gap}, all quarantined stale notices are replay-visible, and no blocking authority challenge remains.
    CurrentBasisCheckpointOK: CurrentBasisCheckpointOK(C_p)=true iff ReplayEqOK(C_p) ∧ RetentionMinOK(C_p,profile,context) ∧ φ∈{bounded_ready, final_ready}.
    AuditBasisCheckpointOK: AuditBasisCheckpointOK(C_p)=true iff ReplayEqOK(C_p) and τ≥proof_core and φ∈{audit_only, bounded_ready, final_ready}.
  tool_split:
    DecisionLedger: C_p と φ を保持し、profile/context 別 retention minimum を束縛する。
    GraphEngine: ReplayEqOK の witness と chain projection を生成する。
    GraphLint: RetentionMinOK / FinalityOK / CurrentBasisCheckpointOK の違反を検出する。
    archive_object: raw chain と checkpoint snapshot を tier 付きで保持する。
  forbidden_shortcuts:
  - ReplayEqOK を満たさない C_p を current basis に使う
  - τ を profile/context minimum 未満に落として compact する
  - φ=final_ready を authority challenge 残存下で付与する
  residual_open_points: []
reverse_chain_legal_hold_reopen_replay_model:
  status: provisional_fixed
  statement: reverse_chain_legal_hold_reopen_replay_model は、compaction 済み reverse chain に対する reopen admissibility、replay window class、basis lane 切替を parameter 化するモデルである。
  primitives:
    checkpoint: χ ∈ Checkpoint
    rehydration_witness: ψ = (reopen_session_id, trigger_kind, reopen_purpose, χ, segment_digest, lineage_digest, retention_attestation, authority_path, audience_class, replay_scope)
    replay_window_class: ω ∈ {bounded_current_confirmation, correction_validation, legal_hold_preservation, external_audit_reconstruction}
    basis_lane: β ∈ {current_basis, audit_basis, archived_audit_basis}
    session_state: σ ∈ {open, frozen, stopped, escalated_hold, resealed}
  functions:
    RehydrateOK: RehydrateOK(ψ)=true iff χ is linked to replay-equivalence witness, requested segment digest is exact, and retention tier covers replay_scope.
    WindowClass: WindowClass(ψ)=ω is chosen from reopen_purpose, audience_class, and requested replay_scope without widening beyond lawful purpose.
    BasisPromotionOK: BasisPromotionOK(β_audit -> β_current)=true iff replay finding is either ratified_and_reflected_correction or no_change_closure_with_witness.
    FreezeReq: FreezeReq(σ)=true iff legal_hold, unresolved authority challenge, or unresolved notice gap requires timer stop while keeping current_basis immutable.
    FullReplayReq: FullReplayReq(ψ)=true iff exact payload, identity unseal, or cross-purpose stitching is required beyond bounded witness set.
  tool_split:
    DecisionLedger: ψ の normative binding、β の昇格条件、σ の stop/escalate judgement を保持する。
    GraphEngine: χ から requested segment を復元し、ω ごとの replay materialization を行う。
    GraphLint: RehydrateOK / BasisPromotionOK / FreezeReq 違反を検査する。
    archive_object: χ・segment digest・retained blob の immutable linkage を保存する。
  forbidden_shortcuts:
  - RehydrateOK を満たさず current runtime state から replay を生成する
  - BasisPromotionOK を満たさず audit_basis を current_basis に昇格する
  - legal_hold_preservation を correction_validation と同一視する
  residual_open_points: []
replay_packet_bounded_disclosure_model:
  status: provisional_fixed
  statement: replay_packet_bounded_disclosure_model は、packet class、slice visibility、join barrier、unseal admissibility を parameter 化するモデルである。
  primitives:
    packet_class: π ∈ {summary_packet, trace_packet, exact_payload_packet, identity_unseal_packet}
    slice: ς ∈ {actor_identity, accountability_binding, recipient_alias, evidence_blob}
    audience_class: α ∈ AudienceClass
    join_barrier: jb ∈ {strict_no_join, purpose_local_join, authorized_session_join}
    redaction_state: ρ(ς,π) ∈ {hidden, pseudonymized, digest_only, scoped_visible, unsealed_visible}
  functions:
    PacketOK: PacketOK(π,α,purpose)=true iff minimum fields, authority path, and retention requirements for π are satisfied.
    SliceVisible: SliceVisible(ς,π,α)=ρ determines which representation of ς is allowed in π for α.
    JoinSafe: JoinSafe(P)=true iff issued packet set P cannot reconstruct clear identity or exact payload beyond any single packet admissibility.
    UnsealOK: UnsealOK(identity_layer,α,purpose)=true iff separate unseal basis and post_use_reseal rule are present.
  tool_split:
    DecisionLedger: PacketOK と UnsealOK の normative gate を保持する。
    GraphEngine: SliceVisible に従って packet を生成し join_barrier を付与する。
    GraphLint: JoinSafe 違反、packet overreach、identity/blob co-release を検査する。
    archive_object: 発行 packet と reseal 証跡を保存する。
  forbidden_shortcuts:
  - PacketOK なしに exact_payload_packet を出す
  - JoinSafe を検査せず packet 群を downstream へ配布する
  - UnsealOK を viewer role だけで代替する
  residual_open_points: []
replay_derived_correction_reactivation_model:
  status: provisional_fixed
  statement: replay_derived_correction_reactivation_model は、finding class、action branch、reverse head reactivation admissibility、notice duty projection を parameter 化するモデルである。
  primitives:
    finding_class: φ ∈ {no_change, evidence_gap_confirmed, correction_required, supersession_required, lineage_break_detected, unlawful_disclosure_detected, insufficient_replay}
    action_branch: a ∈ {no_change_closure, bounded_hold, ratified_correction, ratified_supersession, reverse_head_reactivation, new_transition_required, escalate_incident}
    reactivation_candidate: η = (prior_head_ref, current_head_ref, shadowed_ancestor_digest, invalidation_reason_state)
    notice_projection: ν_n ∈ {none, correction_notice, supersession_notice, revoke_or_breach_notice}
  functions:
    BranchOf: BranchOf(φ)=a is constrained by finding semantics and branch-criticality.
    ReactivateOK: ReactivateOK(η)=true iff prior head is shadowed-not-invalidated, lineage is replay-traceable, and current head admissibility is negated by replay finding.
    PromoteCurrentBasisOK: PromoteCurrentBasisOK(a)=true iff a in {ratified_correction, ratified_supersession, reverse_head_reactivation, no_change_closure} with required witness and no unresolved incident blocker.
    NoticeDutyOf: NoticeDutyOf(φ)=ν_n maps correction/supersession/unlawful disclosure classes to mandatory notice family.
  tool_split:
    DecisionLedger: φ, a, ν_n と ratification state を保持する。
    GraphEngine: η を再構成し graph update plan を生成する。
    GraphLint: ReactivateOK / PromoteCurrentBasisOK / NoticeDutyOf 違反を検査する。
    archive_object: finding proof bundle と closure/reactivation 証跡を保存する。
  forbidden_shortcuts:
  - BranchOf を省いて packet 発行者の判断だけで current basis を切り替える
  - ReactivateOK なしに prior head を current head に戻す
  - NoticeDutyOf を満たさず supersession を reflected 扱いにする
  residual_open_points: []
reopened_chain_reseal_retention_resume_model:
  status: provisional_fixed
  statement: reopened_chain_reseal_retention_resume_model は、re-compaction readiness、reseal surface completion、timer rule、post-reopen checkpoint append を parameter 化するモデルである。
  primitives:
    readiness_state: r ∈ {ready, blocked_notice, blocked_incident, blocked_hold, blocked_reseal, blocked_replay}
    reseal_surface: σ_s ∈ {chain_manifest_reseal, packet_set_reseal, identity_layer_reseal, blob_custody_reseal}
    timer_rule: τ ∈ {resume, carry_over, reset, freeze_continue}
    post_reopen_checkpoint: χ_post appended after χ_pre without overwrite
  functions:
    RecompactReady: RecompactReady(session)=true iff all required checks pass and r=ready.
    ResealComplete: ResealComplete(session)=true iff every required σ_s for the session is completed.
    TimerRuleOf: TimerRuleOf(session,surface)=τ is chosen from legal_hold state, unseal/incidence, and downstream obligations per surface.
    AppendOnlyPostCheckpoint: AppendOnlyPostCheckpoint(χ_pre,χ_post)=true iff χ_post preserves χ_pre and records closure branch witness.
  tool_split:
    DecisionLedger: RecompactReady と TimerRuleOf の normative binding を保持する。
    GraphEngine: χ_post と surface timer state を生成する。
    GraphLint: ResealComplete / AppendOnlyPostCheckpoint / premature final_ready 違反を検査する。
    archive_object: χ_post と reseal proof bundle を保存する。
  forbidden_shortcuts:
  - RecompactReady を満たさず χ_post を current basis に使う
  - ResealComplete を満たさず timer を全 surface で resume 扱いにする
  - AppendOnlyPostCheckpoint を破って χ_pre を上書きする
  residual_open_points: []
multi_session_quota_priority_model:
  status: provisional_fixed
  statement: multi_session_quota_priority_model は、quota class、priority class、nested admissibility、starvation bound、surface-level timer inheritance を parameter 化するモデルである。
  primitives:
    quota_class: q ∈ {exclusive_mutation_lane, bounded_parallel_read_lane, nested_child_lane, observer_shadow_lane}
    priority_class: p ∈ {life_safety_or_active_compromise, external_mandated_audit, lawful_correction_reopen, routine_review}
    nesting_mode: n ∈ {sibling, nested_child, forbidden_nested}
    starvation_debt: δ_s ≥ 0 recorded per session family and lane
    timer_inheritance: τ_inherit(surface)=max_strictness(parent, child, concurrent_holds)
  functions:
    ScheduleAdmissible: ScheduleAdmissible(session,lane)=true iff quota class fits requested operations and conflicting reservations are absent or lawfully preempted.
    NestedChildOK: NestedChildOK(child,parent)=true iff child scope is a proper subset, no purpose/audience/identity widening occurs, and explicit packet budget is reserved.
    PreemptionReq: PreemptionReq(s1 <- s2)=true iff higher priority is justified and a freeze witness snapshot for s1 is recorded.
    StarvationBound: StarvationBound(session)=satisfied iff aging credit or checkpoint yield guarantees bounded waiting or explicit escalation.
    TimerInheritanceRule: TimerInheritanceRule(session,surface)=τ_inherit(surface) where stricter retention / disclosure freeze dominates.
  tool_split:
    DecisionLedger: q, p, n, δ_s の normative binding と PreemptionReq の判定を保持する。
    GraphEngine: lane 配置、snapshot、τ_inherit(surface) の伝播を行う。
    GraphLint: NestedChildOK / StarvationBound / TimerInheritanceRule 違反を検査する。
    archive_object: lane occupancy と preemption snapshot の immutable witness を保存する。
  forbidden_shortcuts:
  - PreemptionReq を満たさず lane を奪う
  - NestedChildOK を満たさない child replay を nested 扱いで実行する
  - TimerInheritanceRule を無視して child session に緩い retention rule を適用する
  residual_open_points: []
shared_archive_reservation_budget_model:
  status: provisional_fixed
  statement: shared_archive_reservation_budget_model は、reservation unit、sharing mode、borrow debt、orphan reclaim、silent invalidation 防止を parameter 化するモデルである。
  primitives:
    reservation_unit: ρ ∈ {witness_set, trace_packet_budget, exact_payload_handle, identity_unseal_slot, revoke_reseal_window}
    sharing_mode: μ ∈ {shareable_read_equivalent, exclusive_mutable, escrow_transfer, forbidden_borrow}
    borrow_debt: δ_b ≥ 0 recorded with deadline, reason, return obligation
    reclaim_state: κ ∈ {heartbeat_lost, quarantine_reclaim, hold_blocked, reassigned_with_witness, fully_released}
  functions:
    ReservationGrantOK: ReservationGrantOK(session,ρ,μ)=true iff quota / purpose / audience constraints hold and conflicting exclusive reservations are absent.
    BorrowOK: BorrowOK(ρ)=true iff authority ratification, debt ledger, return deadline, and downstream revoke plan are all present.
    OrphanReclaimOK: OrphanReclaimOK(ρ)=true iff hold/challenge absence is verified or reassignment witness is complete.
    SilentInvalidationForbidden: SilentInvalidationForbidden(s1,s2)=true iff revocation or reseal by s1 triggers affected-session notice and admissibility recompute for s2 when shared witness exists.
  tool_split:
    DecisionLedger: ρ, μ, δ_b, transfer / release judgement を保持する。
    GraphEngine: reservation map と recompute workflow を生成する。
    GraphLint: BorrowOK / OrphanReclaimOK / SilentInvalidationForbidden 違反を検査する。
    archive_object: exclusive handle custody と release witness を保存する。
  forbidden_shortcuts:
  - BorrowOK を満たさず budget を流用する
  - OrphanReclaimOK を満たさず reservation を fully_released にする
  - shared witness への revoke 影響を通知せずに silent invalidation する
  residual_open_points: []
authority_competition_override_appeal_model:
  status: provisional_fixed
  statement: authority_competition_override_appeal_model は、override class、precedence DAG、contested surface freeze、appeal lane、restoration outcome を parameter 化するモデルである。
  primitives:
    authority_tier: α ∈ {external_mandate, central_authority, domain_authority, delegated_reviewer}
    override_class: ω ∈ {emergency_override, regular_forced_preemption, mandated_takeover, appeal_reopen}
    contested_surface: σ_c ⊆ {chain, packet, identity, blob, reservation, timer}
    appeal_lane: λ = (source_session, appeal_basis, forum, stay_flag, outcome)
    restoration_outcome: ρ_o ∈ {uphold, modify, vacate, remand}
  functions:
    OverrideOK: OverrideOK(α,ω)=true iff lawful basis, target snapshot, contested surface set, counter-sign notice plan, and restoration path are all bound.
    ContestFreezeReq: ContestFreezeReq(σ_c)=true iff equal-tier unresolved conflict or appellate stay requires mutation stop on contested surfaces.
    AppealLaneOK: AppealLaneOK(λ)=true iff source snapshot is immutable, appellate forum is bound, and direct overwrite of source records is absent.
    RestorationRuleOf: RestorationRuleOf(ρ_o)=defines reservation transfer, timer consequence, and debt consequence per outcome class.
  tool_split:
    DecisionLedger: α, ω, λ, ρ_o の normative binding を保持する。
    GraphEngine: target snapshot、σ_c freeze、transfer plan を生成する。
    GraphLint: OverrideOK / AppealLaneOK / ContestFreezeReq 違反を検査する。
    archive_object: override / appeal / restoration witness を保存する。
  forbidden_shortcuts:
  - OverrideOK を満たさず forced preemption を行う
  - AppealLaneOK を満たさず source session を直接更新する
  - ContestFreezeReq が必要なのに contested surface を動かし続ける
  residual_open_points: []
cross_session_settlement_debt_model:
  status: provisional_fixed
  statement: cross_session_settlement_debt_model は、settlement checkpoint、debt vector、transfer rule、closure projection、audit proof completeness を parameter 化するモデルである。
  primitives:
    settlement_checkpoint: χ_s = (covered_sessions, surviving_holds, released_reservations, transferred_debts, unresolved_residue, closure_projection, proof_bundle)
    debt_vector: δ = (δ_starvation, δ_disclosure, δ_reseal, δ_audit)
    transfer_rule: τ_d transfers one debt item only with lawful receiver, acceptance, due window, discharge condition
    closure_projection: γ ∈ {partial_surface, partial_object, global_clean, global_with_residue}
  functions:
    SettlementReady: SettlementReady(χ_s)=true iff covered live sessions are explicit, mandatory debt disposition is bound, and proof bundle is complete for requested closure projection.
    DebtTransferOK: DebtTransferOK(τ_d)=true iff receiver authority/custody matches debt class and acceptance + due window + discharge condition are present.
    GlobalClosureOK: GlobalClosureOK(γ)=true iff γ=global_clean implies no surviving hold and no unresolved residue, and γ=global_with_residue never implies final clean state.
    ProofBundleComplete: ProofBundleComplete(χ_s)=true iff scheduling, preemption, reservation, packet, debt, restoration, and closure lineage are all linked.
  tool_split:
    DecisionLedger: χ_s, δ, τ_d, γ の normative binding を保持する。
    GraphEngine: settlement bundle と debt carry-over propagation を生成する。
    GraphLint: SettlementReady / DebtTransferOK / GlobalClosureOK / ProofBundleComplete 違反を検査する。
    archive_object: χ_s と proof bundle の immutable snapshot を保存する。
  forbidden_shortcuts:
  - SettlementReady を満たさず settlement checkpoint を current basis promotion に使う
  - DebtTransferOK を満たさず debt を carry-over する
  - ProofBundleComplete を満たさず global_clean を宣言する
  residual_open_points: []
quota_debt_remediation_rebalancing_model:
  status: provisional_fixed
  statement: quota_debt_remediation_rebalancing_model は、debt remediation family、lane rebalance vector、backlog-drain plan、debt discharge / forgiveness 条件を parameter 化するモデルである。
  primitives:
    debt_bucket: δ_k ∈ {starvation_debt, disclosure_debt, reseal_debt, audit_followup_debt}
    rebalance_vector: ρ_r = (donor_lane, receiver_lane, borrow_cap, protected_floor, expiry, rollback_path)
    drain_plan: π_d = (target_backlog_class, drain_horizon, throughput_target, admission_freeze_scope, review_schedule)
    discharge_state: λ ∈ {open, in_progress, discharged, waived, denied}
  functions:
    RemediationFamilyOf: RemediationFamilyOf(δ_k)=maps each debt bucket to its required remediation family.
    RebalanceOK: RebalanceOK(ρ_r)=true iff receiver custody/authority matches, protected floor is preserved, and expiry/rollback are bound.
    DrainPlanSufficient: DrainPlanSufficient(π_d)=true iff backlog decreases within horizon without hidden debt migration and with review checkpoints bound.
    DebtDischargeOK: DebtDischargeOK(δ_k)=true iff obligation-specific completion witness and carry-over linkage resolution are present.
    DebtWaiverOK: DebtWaiverOK(δ_k)=true iff authority-bound waiver, residual risk acknowledgment, and proof-bundle linkage are all present.
  tool_split:
    DecisionLedger: δ_k, ρ_r, λ の normative binding と DebtWaiverOK を保持する。
    GraphEngine: rebalance execution と π_d progress を生成する。
    GraphLint: RebalanceOK / DrainPlanSufficient / DebtDischargeOK / DebtWaiverOK 違反を検査する。
    archive_object: rebalance / drain / discharge witness を保存する。
  forbidden_shortcuts:
  - RebalanceOK を満たさず lane を借用する
  - DrainPlanSufficient を満たさず remediation 完了を宣言する
  - DebtWaiverOK を満たさず forgiveness を適用する
  residual_open_points: []
accountable_identity_slice_exception_threshold_model:
  status: provisional_fixed
  statement: accountable_identity_slice_exception_threshold_model は、life-safety / active compromise 例外で accountable_identity_slice を許す threshold を detector family / sink class ごとに parameter 化し、single-principal exception session の admissibility を形式化するモデルである。
  primitives:
    detector_family: δ_f ∈ {direct_system_compromise, corroborated_compromise_or_leak, supervised_human_safety_report, inferred_behavioral_detector}
    sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
    threshold_class: θ ∈ {forbidden, life_safety_only, active_compromise_only, life_safety_or_active_compromise, extreme_only}
    exception_session: ε = (life_safety_flag, active_compromise_flag, detector_family_ref, sink_class_ref, corroboration_class_ref, direct_route_evidence_ref_or_null, single_named_principal_ref, alternative_path_failed, security_lane_state, custody_lane_state, central_or_predelegated_authority_ref_or_null, approved_at)
    reveal_scope: ς ∈ {bounded_actor_slice, accountable_identity_slice}
    exception_state: ω ∈ {not_applicable, requested, admitted, active, auto_reseal_pending, revoked}
  functions:
    Threshold: Threshold(δ_f,κ)=forbidden for all κ when δ_f=inferred_behavioral_detector; =life_safety_or_active_compromise for (direct_system_compromise, authoritative_state); =active_compromise_only for (corroborated_compromise_or_leak, authoritative_state); =life_safety_only for (supervised_human_safety_report, authoritative_state); =active_compromise_only or extreme_only on stricter sinks as bound by the registry matrix.
    NeedDirectRouteEvidence: NeedDirectRouteEvidence(δ_f,κ)=true iff κ ∈ {public_or_external_commitment, irreversible_resource_lock} or δ_f=corroborated_compromise_or_leak.
    NeedCentralOrDelegatedAuthority: NeedCentralOrDelegatedAuthority(δ_f,κ)=true iff κ=irreversible_resource_lock or (κ=public_or_external_commitment and δ_f!=supervised_human_safety_report).
    TTLCap: TTLCap(κ)=60分 if κ=authoritative_state; 30分 if κ=public_or_external_commitment; 15分 if κ=irreversible_resource_lock; undefined otherwise because accountable_identity_slice is forbidden.
    ExceptionAdmissible: ExceptionAdmissible(ε)=true iff Threshold(detector_family_ref,sink_class_ref) is satisfied by life_safety_flag / active_compromise_flag and alternative_path_failed=true and security_lane_state=active and custody_lane_state=active and single_named_principal_ref is bound and (NeedDirectRouteEvidence -> direct_route_evidence_ref_or_null not null) and (NeedCentralOrDelegatedAuthority -> central_or_predelegated_authority_ref_or_null not null).
    AutoResealRequired: AutoResealRequired(ε,ω,t)=true iff ω=active and (t exceeds TTLCap(sink_class_ref) or post-confirm fails or audience expands beyond the bound principal/session).
  invariants:
  - Threshold(...)=forbidden の場合、ExceptionAdmissible は常に false でなければならない。
  - bounded_internal_shared 以下の sink class では accountable_identity_slice を admissible にしてはならない。
  - NeedDirectRouteEvidence=true なのに direct_route_evidence が空なら admissible にしてはならない。
  - AutoResealRequired=true の exception session は revoke event と derived export revoke を伴わなければならない。
  tool_split:
    DecisionLedger: ε、θ、ω の normative binding を保持する。
    GraphEngine: Threshold、NeedDirectRouteEvidence、NeedCentralOrDelegatedAuthority、TTLCap、ExceptionAdmissible、AutoResealRequired を計算する。
    GraphLint: behavioral-detector exception / multi-recipient reveal / missing-direct-route-evidence / stale-exception 違反を検査する。
    archive_object: ε の snapshot と exception session archive を保存する。
  forbidden_shortcuts:
  - Threshold=forbidden の detector family で exception session を admitted にする
  - single_named_principal が空のまま accountable_identity_slice を出す
  - TTLCap 超過後も active exception を継続する
  - post-confirm failure 後に auto reseal を行わない
  residual_open_points: []
execution_capsule_blob_boundary_model:
  status: provisional_fixed
  statement: execution_capsule_blob_boundary_model は、root profile・replay class・sink class・payload byte-length・part count・protected facet を入力として、inline blob と pinned blob の admissible boundary を parameter 化するモデルである。
  primitives:
    root_profile: γ ∈ {regulated_domain, engineering_tradeoff_domain, organizational_or_social_domain}
    replay_class: ρ ∈ {summary_only, analytical_replay, deterministic_replay, forensic_replay}
    sink_class: κ ∈ {owner_bound_internal, bounded_internal_shared, authoritative_state, public_or_external_commitment, irreversible_resource_lock}
    materialization_class: μ ∈ {inline_blob, pinned_blob}
    payload_size_bytes: b ∈ ℕ
    payload_part_count: n ∈ ℕ
    canonical_text_flag: τ_txt ∈ {true,false}
    protected_facet_flag: φ_p ∈ {true,false}
    legal_hold_state: λ ∈ {active,inactive}
    sealed_identity_dependency: ι ∈ {true,false}
  functions:
    InlineCap: InlineCap(γ,ρ)=131072,262144,65536,0 for regulated_domain across {summary_only,analytical_replay,deterministic_replay,forensic_replay}; 524288,1048576,262144,0 for engineering_tradeoff_domain; 1048576,2097152,262144,0 for organizational_or_social_domain.
    PartCap: PartCap(γ,ρ)=1,1,1,0 for regulated_domain; 2,2,1,0 for engineering_tradeoff_domain; 2,3,1,0 for organizational_or_social_domain.
    ForcedPin: ForcedPin(ρ,κ,φ_p,λ,ι,τ_txt)=true iff ρ=forensic_replay or λ=active or κ∈{public_or_external_commitment, irreversible_resource_lock} or φ_p=true or ι=true or (ρ=deterministic_replay and τ_txt=false).
    InlineOK: InlineOK(γ,ρ,κ,b,n,τ_txt,φ_p,λ,ι)=true iff ForcedPin(...)=false and b<=InlineCap(γ,ρ) and n<=PartCap(γ,ρ).
    Materialize: Materialize(γ,ρ,κ,b,n,τ_txt,φ_p,λ,ι)=inline_blob iff InlineOK(...)=true; otherwise pinned_blob.
    ArchiveBindOK: ArchiveBindOK(m)=true iff manifest binds payload digest, byte-length, serialization profile, replay class, and pinned target digest when μ=pinned_blob.
  invariants:
  - ρ=forensic_replay で μ=inline_blob を許してはならない。
  - ρ=deterministic_replay で τ_txt=false の payload に μ=inline_blob を与えてはならない。
  - κ∈{public_or_external_commitment, irreversible_resource_lock} または φ_p=true の payload は b が閾値内でも pinned_blob を強制する。
  - ArchiveBindOK=false の payload を canonical replay basis に数えてはならない。
  - post-hoc repin により original digest witness を失った payload を pinned_blob 扱いへ昇格してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - root_profile
      - replay_class
      - sink_class
      - materialization_class
      - forced_pin_reason_set
      - purge_or_reopen_admissibility_state
    GraphEngine:
      required_fields:
      - payload_size_bytes
      - payload_part_count
      - serializer_profile_ref
      - environment_descriptor_ref
      - pin_lifecycle_state
    GraphLint:
      required_checks:
      - forced-pin violation
      - oversize-inline
      - forensic-inline
      - missing archive binding
      - post-hoc repin without witness
    archive_object:
      required_fields:
      - manifest_digest
      - payload_digest
      - payload_byte_length
      - replay_class
      - pinned_target_digest_or_null
  residual_open_points: []
claim_criticality_graphlint_model:
  status: provisional_fixed
  statement: claim_criticality_graphlint_model は、claim role・criticality band・activation state を GraphLint の severity / weight / required evidence / escalation routing に写像し、primary substitution を禁止するモデルである。
  primitives:
    claim_role: r ∈ {primary_claim, context_sensitive_claim, auxiliary_claim}
    criticality_band: κ_c ∈ {constitutional_or_irreversible, branch_decisive, operational_support, explanatory_auxiliary}
    activation_state: α ∈ {active, inactive}
    issue_impact_class: ι ∈ {major, minor, allowable}
    graphlint_severity: σ ∈ {critical_blocker, major_blocker, repair_major, repair_minor, informational}
    evidence_class: ε ∈ {authority_bound_direct, traceable_branch_basis, traceable_supporting, linkable_or_optional}
    escalation_route: η ∈ {top_authority_or_non_delegable_human_lane, decision_owner_or_required_approver_lane, model_owner_or_domain_curator_lane, local_documentation_lane}
    weight_floor: ω ∈ [0,1]
  functions:
    RoleWeight: RoleWeight(r,κ_c,α)=1.0 if r=primary_claim or (r=context_sensitive_claim and α=active and κ_c∈{constitutional_or_irreversible,branch_decisive}); 0.35 if κ_c=operational_support or (r=context_sensitive_claim and α=inactive); 0.2 if κ_c=explanatory_auxiliary.
    SeverityMap: SeverityMap(κ_c,ι)=critical_blocker if κ_c=constitutional_or_irreversible and ι=major; major_blocker if κ_c=branch_decisive and ι=major; repair_major if κ_c=operational_support and ι∈{major,minor}; repair_minor if κ_c=explanatory_auxiliary and ι=minor; informational otherwise.
    EvidenceReq: EvidenceReq(κ_c)=authority_bound_direct if κ_c=constitutional_or_irreversible; traceable_branch_basis if κ_c=branch_decisive; traceable_supporting if κ_c=operational_support; linkable_or_optional if κ_c=explanatory_auxiliary.
    EscRoute: EscRoute(κ_c)=top_authority_or_non_delegable_human_lane if κ_c=constitutional_or_irreversible; decision_owner_or_required_approver_lane if κ_c=branch_decisive; model_owner_or_domain_curator_lane if κ_c=operational_support; local_documentation_lane if κ_c=explanatory_auxiliary.
    PrimaryGateCap: PrimaryGateCap(r,κ_c,α,ι)=1 iff RoleWeight(r,κ_c,α)=1.0 and ι=major; otherwise unconstrained by this model.
    PrimarySubstitutionForbidden: PrimarySubstitutionForbidden(P_active,A_aux)=true iff an active primary/context-sensitive claim in P_active is unresolved while only auxiliary claims in A_aux are satisfied.
  invariants:
  - RoleWeight=1.0 の claim に unmanaged major issue があるとき、対応する q_dimension は 1 を超えてはならない。
  - activation predicate ref を欠く context_sensitive_claim を active 扱いにしてはならない。
  - constitutional_or_irreversible claim の unresolved major issue を informational または repair_minor に落としてはならない。
  - PrimarySubstitutionForbidden=true の状態で auxiliary claim 充足だけから q_dimension を 2 以上へ上げてはならない。
  - inactive context-sensitive claim を primary blocker として用いてはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - claim_id
      - claim_role
      - criticality_band
      - activation_predicate_ref_or_null
      - manual_override_reason_or_null
      - escalation_route
    GraphEngine:
      required_fields:
      - activation_state
      - context_binding_ref
      - claim_to_branch_ref
      - role_transition_history
    GraphLint:
      required_output_fields:
      - claim_role
      - criticality_band
      - graphlint_severity
      - weight_floor
      - required_evidence_class
      - escalation_route
      - primary_substitution_violation_flag
    archive_object:
      required_fields:
      - claim_classification_packet
      - activation_witness_ref_or_null
      - lint_trace_ref
      - escalation_audit_ref
  residual_open_points:
  - 主要主張 criticality の自動推定と手動指定の境界
auxiliary_support_domain_calibration_model:
  status: provisional_fixed
  statement: auxiliary_support_domain_calibration_model は、domain profile・q_dimension・claim cluster role を入力に、補助主張 cluster の score 2/3 floor、independence rule、systemic promotion cap を parameter 化するモデルである。
  primitives:
    domain_profile: γ ∈ {regulated_domain, engineering_tradeoff_domain, organizational_or_social_domain}
    q_dimension: q ∈ {q_structure, q_context, q_evidence, q_conflict, q_ambiguity, q_explain}
    score_level: s ∈ {0,1,2,3}
    cluster: χ ∈ Χ
    cluster_role: ρ(χ) ∈ {corroborative, boundary_case, rebuttal, operationalization, explanation_path}
    origin_lineage: λ(χ) ∈ Λ
    claim_activation: α ∈ {primary_active, context_sensitive_active, context_sensitive_inactive, auxiliary_only}
    issue_state: ι ∈ {resolved, minor_unmanaged, major_unmanaged}
  functions:
    PrimaryCap: PrimaryCap(α,ι)=1 if α∈{primary_active,context_sensitive_active} and ι=major_unmanaged; unconstrained by this rule otherwise.
    MinClusters: MinClusters(γ,q,2)=2 for all q in regulated_domain; 2 only for q_evidence and 1 otherwise in engineering_tradeoff_domain; 2 only for q_context,q_ambiguity and 1 otherwise in organizational_or_social_domain. MinClusters(γ,q,3)=3 for all q in regulated_domain; 2 for all q in engineering_tradeoff_domain; 3 for q_context,q_ambiguity and 2 otherwise in organizational_or_social_domain.
    MinIndependentOrigins: Indep(γ,2)=1 for all γ; Indep(regulated_domain,3)=2; Indep(engineering_tradeoff_domain,3)=2; Indep(organizational_or_social_domain,3)=1.
    RoleFloorOK: RoleFloorOK(γ,q,s,S)=true iff S contains the required role set declared in the calibration registry for (γ,q,s).
    ClusterCountOK: ClusterCountOK(γ,q,s,S)=true iff |S| >= MinClusters(γ,q,s).
    OriginDiversityOK: OriginDiversityOK(γ,s,S)=true iff the number of pairwise independent origin_lineage values in S is >= Indep(γ,s).
    SystemicPromotion: SystemicPromotion(γ,S)=true iff unresolved clusters linked to the same active primary facet have role diversity >=2 and cardinality >= {2,3,3} for γ={regulated_domain,engineering_tradeoff_domain,organizational_or_social_domain}.
    AuxScoreCap: AuxScoreCap(γ,q,S,α,ι)=1 if PrimaryCap(α,ι)=1; 2 if RoleFloorOK(γ,q,2,S) and ClusterCountOK(γ,q,2,S); 3 if RoleFloorOK(γ,q,3,S) and ClusterCountOK(γ,q,3,S) and OriginDiversityOK(γ,3,S); otherwise max 1.
  invariants:
  - PrimaryCap=1 のとき q は 1 を超えてはならない。
  - 同一 origin_lineage の cluster を score 3 の独立 origin として二重計上してはならない。
  - regulated_domain で q_evidence または q_conflict を 3 にするには、少なくとも1つの rebuttal または boundary_case cluster が必要である。
  - context_sensitive_inactive を primary_active と同じ floor/cap で扱ってはならない。
  - SystemicPromotion=true の unresolved cluster 群を auxiliary-only informational として集計してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - domain_profile
      - calibration_registry_ref
      - context_sensitive_predicate_witness_ref_or_null
      - manual_promotion_override_or_null
    GraphEngine:
      required_fields:
      - cluster_id
      - cluster_role
      - origin_lineage_ref
      - linked_active_claim_facet_ref
      - activation_transition_history
    GraphLint:
      required_output_fields:
      - q_dimension
      - score_level
      - cluster_count
      - required_role_floor_satisfied
      - independent_origin_count
      - systemic_promotion_flag
    archive_object:
      required_fields:
      - calibration_profile_ref
      - cluster_packet_refs
      - promotion_witness_ref_or_null
      - negative_test_ref_or_null
  residual_open_points: []
evidence_strength_embedding_model:
  status: provisional_fixed
  statement: evidence_strength_embedding_model は、根拠強度を q_evidence の内部 subfactor として表し、coverage・binding・strength_class・origin_diversity の最弱リンクで q_evidence を決めるモデルである。
  primitives:
    coverage_score: κ_cov ∈ {0,1,2,3}
    binding_score: κ_bind ∈ {0,1,2,3}
    strength_class: σ_e ∈ {linkable_optional, traceable_supporting, traceable_branch_basis, authority_bound_direct}
    diversity_score: κ_div ∈ {0,1,2,3}
    criticality_band: κ_c ∈ {constitutional_or_irreversible, branch_decisive, operational_support, explanatory_auxiliary}
    q_evidence: q_ev ∈ {0,1,2,3}
  functions:
    StrengthFloor: StrengthFloor(κ_c)=authority_bound_direct if κ_c=constitutional_or_irreversible; traceable_branch_basis if κ_c=branch_decisive; traceable_supporting if κ_c=operational_support; linkable_optional if κ_c=explanatory_auxiliary.
    StrengthScore: κ_str=0 if σ_e=linkable_optional and StrengthFloor unmet for active claim; 1 if σ_e is below required floor; 2 if σ_e exactly meets required floor; 3 if σ_e exceeds required floor and paired with counterevidence / boundary witness.
    StrengthFloorOK: StrengthFloorOK(σ_e,κ_c)=true iff σ_e >= StrengthFloor(κ_c) in the registry order linkable_optional < traceable_supporting < traceable_branch_basis < authority_bound_direct.
    EvidenceMin: q_ev = min(κ_cov, κ_bind, κ_str, κ_div).
    EmitStrengthProfile: EmitStrengthProfile = (strength_class, required_floor, floor_satisfied, diversity_score) as an audit payload, not a seventh q-dimension.
  invariants:
  - active primary/context-sensitive claim で StrengthFloorOK=false なら q_evidence は 1 を超えてはならない。
  - coverage または binding が 1 以下なら、strength_class が高くても q_evidence を 2 以上へ上げてはならない。
  - q_evidence=3 には q_ev subfactor の全てが 3 であり、未解消 disputed evidence がないことを要する。
  - EmitStrengthProfile を Q_e(K_e) の別次元として集計してはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - required_evidence_class
      - accepted_strength_class
      - manual_override_reason_or_null
    GraphEngine:
      required_fields:
      - evidence_packet_ref
      - strength_class
      - origin_diversity_refs
      - binding_trace_ref
    GraphLint:
      required_output_fields:
      - q_evidence
      - coverage_score
      - binding_score
      - strength_class
      - diversity_score
      - strength_floor_satisfied
    archive_object:
      required_fields:
      - evidence_strength_packet
      - required_floor_snapshot
      - criticality_mapping_ref
  residual_open_points: []
latent_downstream_hold_promotion_model:
  status: provisional_fixed
  statement: latent_downstream_hold_promotion_model は、secondary governance reason の activation_state を latent_downstream / active に分け、GC1 通過、dependency clear、deadline 逼迫、precommit/externality 露出を promotion trigger として formalize するモデルである。
  primitives:
    reason_code: rc ∈ {H3,H4,H5,H6}
    activation_state: α_h ∈ {latent_downstream, active}
    governance_stage: g ∈ {pre_gc1, gc1_passed, eval_g_started}
    branch_relevance: β ∈ {inactive, possible, chosen_or_precommit}
    deadline_state: δ ∈ {normal, near_due, overdue}
    externality_exposure: ξ ∈ {none, internal_only, external_or_irreversible}
    dependency_state: d ∈ {masked_by_upstream, clear_for_action}
  functions:
    LatentAllowed: LatentAllowed(rc,g)=true iff rc∈{H3,H4,H5,H6} and g=pre_gc1.
    Promote: Promote(rc,g,β,δ,ξ,d)=true iff β!=inactive and (g in {gc1_passed, eval_g_started} or d=clear_for_action or δ in {near_due,overdue} or ξ=external_or_irreversible).
    MandatoryEarlyPromotion: MandatoryEarlyPromotion(rc,δ,ξ)=true iff rc in {H5,H6} and (δ in {near_due,overdue} or ξ=external_or_irreversible).
    StateUpdate: α_h(t+1)=active iff Promote(...)=true or MandatoryEarlyPromotion(...)=true; otherwise α_h(t)=latent_downstream may persist only while LatentAllowed=true.
  invariants:
  - g in {gc1_passed, eval_g_started} かつ β!=inactive の reason を latent_downstream のまま残してはならない。
  - MandatoryEarlyPromotion=true の H5/H6 を latent_downstream として保持してはならない。
  - activation_state は relation_to_primary に埋め込んではならない。
  - GraphEngine は promotion event を記録するが、promotion の意味判定は DecisionLedger が担う。
  tool_projection:
    DecisionLedger:
      required_fields:
      - reason_code
      - activation_state
      - promotion_window_ref
      - promotion_trigger_set
    GraphEngine:
      required_fields:
      - activation_transition_event
      - deadline_state
      - precommit_artifact_ref_or_null
      - dependency_state
    GraphLint:
      required_output_fields:
      - masked_by_epistemic_blocker_flag
      - h5_h6_early_promotion_hint
    archive_object:
      required_fields:
      - promotion_witness_packet
      - deadline_basis_snapshot
      - precommit_exposure_packet_or_null
  residual_open_points: []
hold_reason_relation_taxonomy_model:
  status: provisional_fixed
  statement: hold_reason_relation_taxonomy_model は、secondary reason と primary_reason の関係を dependency だけに縮退させず、derived / dependency / causal / temporal / independent の5語彙へ正規化するモデルである。
  primitives:
    relation_to_primary: ρ_h ∈ {derived_from_primary, dependency_precondition, causal_driver, temporal_deadline_precedence, independent_co_blocker}
    activation_state: α_h ∈ {active, latent_downstream}
    deadline: τ ∈ time
    repair_plan_eta: η ∈ time
  functions:
    TemporalPrecedence: TemporalPrecedence(τ_sec,η_pri)=true iff τ_sec < η_pri.
    DependencyPrecondition: DependencyPrecondition(sec,pri)=true iff sec.required_action or sec.reopen_condition references pri.output or pri.clearance.
    CausalDriver: CausalDriver(sec,pri)=true iff persistence of pri raises the probability or severity of sec without being a logical prerequisite.
    CanonicalRelation: CanonicalRelation(sec,pri)=temporal_deadline_precedence if TemporalPrecedence=true and deadline dominates scheduling; dependency_precondition if DependencyPrecondition=true; causal_driver if CausalDriver=true; derived_from_primary if same root issue packet; independent_co_blocker otherwise.
  invariants:
  - activation_state=latent_downstream を relation_to_primary 値として使ってはならない。
  - temporal_deadline_precedence は causal_driver や dependency_precondition と同義に潰してはならない。
  - derived_from_primary は same-root evidence を要し、単なる時系列近接だけで付与してはならない。
  - independent_co_blocker は解除経路が独立であることを要し、単なる未分析 bucket として使ってはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - relation_to_primary
      - activation_state
      - deadline_basis_or_null
      - dependency_ref_or_null
    GraphEngine:
      required_fields:
      - causal_link_ref_or_null
      - deadline_timestamp_or_null
      - repair_plan_eta_or_null
    GraphLint:
      required_checks:
      - latent_state_not_in_relation_field
      - temporal_precedence_not_dropped
      - family_relation_mismatch
    archive_object:
      required_fields:
      - relation_witness_packet
      - deadline_comparison_snapshot_or_null
  residual_open_points: []
hold_reason_subtype_registry_model:
  status: provisional_fixed
  statement: hold_reason_subtype_registry_model は、H1〜H6 の family-level core subtype を canonical registry として形式化し、domain extension subtype を parent core subtype の下位にのみ許すモデルである。
  primitives:
    reason_code: rc ∈ {H1,H2,H3,H4,H5,H6}
    core_subtype: τ_core ∈ CoreSubtype(rc)
    extension_subtype_ref: τ_ext ∈ ExtensionSubtype ∪ {null}
    parent_core_subtype_ref: Parent(τ_ext)=τ_core
  core_registry:
    H1:
    - missing_primary_evidence
    - missing_context_binding
    - missing_structure_link
    - missing_explanation_path
    H2:
    - contradictory_evidence
    - semantic_ambiguity
    - threshold_or_scope_collision
    - unresolved_counterargument
    H3:
    - decision_context_unbound
    - value_binding_gap
    - responsibility_binding_gap
    - approval_structure_gap
    H4:
    - required_approval_missing
    - approval_conflict_active
    - quorum_or_proxy_unmet
    - fallback_activation_pending
    H5:
    - residual_risk_over_tolerance
    - mitigation_evidence_insufficient
    - waiver_required_ungranted
    - monitoring_or_rollback_inadequate
    H6:
    - explicit_policy_prohibition
    - legal_or_contractual_prohibition
    - external_commitment_conflict
    - exception_path_missing_or_denied
  functions:
    CoreRequired: CoreRequired(rc,τ_core)=true iff τ_core belongs to CoreSubtype(rc).
    ExtensionOK: ExtensionOK(rc,τ_core,τ_ext)=true iff τ_ext=null or Parent(τ_ext)=τ_core and Family(τ_ext)=rc and extension charter does not weaken reopen authority / deadline / escalation families.
    BenchmarkLabel: BenchmarkLabel = (reason_code, core_subtype, extension_subtype_ref_or_null) with cross-domain comparability guaranteed at least at the first two coordinates.
  invariants:
  - CoreRequired=false の hold packet を current registry event として受理してはならない。
  - ExtensionOK=false の extension_subtype を family current use に使ってはならない。
  - extension_subtype_ref だけを記録して core_subtype を省略してはならない。
  - cross-family subtype alias を comparability basis に使ってはならない。
  tool_projection:
    DecisionLedger:
      required_fields:
      - reason_code
      - core_subtype
      - extension_subtype_ref_or_null
      - extension_charter_ref_or_null
    GraphEngine:
      required_fields:
      - subtype_history
      - parent_core_subtype_ref_or_null
      - migration_alias_ref_or_null
    GraphLint:
      required_checks:
      - missing_core_subtype
      - cross_family_subtype_alias
      - unregistered_extension_subtype
    archive_object:
      required_fields:
      - subtype_registry_snapshot
      - benchmark_label
      - extension_witness_or_null
  residual_open_points: []
positive_state_vocabulary_model:
  status: provisional_fixed
  statement: positive state は component-specific に保持し、Present(x) は派生述語としてだけ用いる。
  notation:
    Pos_GC(slot): true iff slot has concrete typed value/ref
    Pos_E(slot): true iff evidence_status=linked
    Pos_VR(slot): true iff binding_status=bound
    Pos_Haux(slot): true iff auxiliary slot has concrete value/ref/digest
    Present(slot): true iff Pos_component(slot)=true
  storage_rule:
  - raw status 値として present を保存してはならない
  - literal present は component kind が決まるまで migration_error
  - cross-component 集計は Present(slot) を使ってよいが remediation は Pos_component を使う
  forbidden_shortcuts:
  - Pos_E と Pos_VR を同じ raw label へ潰すこと
  - Present(slot)=true を見て component-specific obligation を満たしたと誤認すること
hold_auxiliary_marker_boundary_model:
  status: provisional_fixed
  statement: persisted hold event では core identity field と replay-critical transition field に typed missing marker を許さず、audit-support auxiliary field にだけ条件付きで許す。
  field_partition:
    core_identity:
    - event_id
    - timestamp
    - actor_ref
    - operation
    - reason_or_reason_code
    replay_critical:
    - target_ref
    - state_before_ref_or_digest
    - state_after_ref_or_digest
    - primary_reason_ref
    - transition_kind_or_event_family
    audit_support_aux:
    - supporting_evidence_ref
    - external_case_ref
    - note_attachment_ref
    - migration_hint_ref
    - review_comment_ref
  admissibility_predicates:
    CoreOK: CoreOK(h)=true iff every core_identity field is concrete and non-marker
    ReplayOK: ReplayOK(h)=true iff every replay_critical field of persisted event h is concrete and non-marker
    AuxMarkerOK: AuxMarkerOK(h,a)=true iff a∈audit_support_aux, marker-specific metadata is complete, and a is not a sole closure witness
  validity_rule: PersistedValid(h)=true iff CoreOK(h) and ReplayOK(h) and all auxiliary markers satisfy AuxMarkerOK
  closure_guard: ClosureEvent(h)=true implies PersistedValid(h) and every closure-critical witness is concrete value/ref/digest
  invalid_event_cases:
  - core_identity field carries marker
  - replay_critical field remains pending/disputed at persist time
  - closure is justified only by unresolved auxiliary external_ref/pending/disputed
organizational_risk_binding_na_audit_model:
  status: provisional_fixed
  statement: organizational_or_social_domain における risk_binding の not_applicable は、bounded local analysis であることを示す監査パケットがある場合にだけ許す。
  notation:
    RiskActive_org(t): true iff stakeholder harm / reputational exposure / resource commitment / external commitment / contested risk tolerance is active on target t
    RiskNAAudit(t): =(basis_class, effect_zone, reversibility_class, reviewer_or_reflection_owner, review_window_or_trigger, reevaluation_trigger)
  admissibility_rule: risk_binding=not_applicable is valid iff RiskActive_org(t)=false and RiskNAAudit(t) is complete
  activation_triggers:
  - material stakeholder harm or exposure
  - budget/resource/personnel/partner commitment
  - public/external artifact linkage
  - contested risk_tolerance or acceptable_harm
  - non-local irreversibility
  reevaluation_rule: Once any activation trigger becomes true, previous not_applicable expires and risk_binding must become active or disputed
  forbidden_shortcuts:
  - human judgement domain だからという理由だけで not_applicable とすること
  - reviewer_or_reflection_owner を持たない not_applicable を current basis に残すこと
cross_profile_score3_benchmark_model:
  status: provisional_fixed
  statement: profile 間の score 3 比較は portability class で行い、その portability binding は replay_benchmark_registry_model の canonical registry cell に接続する。
  notation:
    WitnessPacket: ω = (source_profile, claim_facet, q_axis, criticality_band, active_profile_triggers, evidence_strength_class, auxiliary_support_roles, boundary_case_coverage, blocker_history, negative_case_packet, residual_caveats)
    PortClass: PortClass(γ_s, γ_t, ω) ∈ {direct_reusable, caveated_reusable, benchmark_only, non_reusable}
  classification_rules:
    direct_reusable: target mandatory obligations ⊆ obligations witnessed by ω
    caveated_reusable: common core is satisfied but target-specific addenda remain
    benchmark_only: ω can enter cohort comparison but cannot justify target score 3 claim
    non_reusable: ω misses target active mandatory obligations or carries unresolved cap
  default_matrix:
    regulated->engineering: direct_reusable or caveated_reusable
    engineering->regulated: benchmark_only unless regulated-specific addenda provided
    organizational->regulated: benchmark_only or non_reusable
    organizational->engineering: caveated_reusable or benchmark_only
  q24_boundary: registry cell id / suite versioning / alias-preserving migration / cohort governance は replay_benchmark_registry_model で provisional_fixed 化した
approval_weighted_quorum_boundary_model:
  status: provisional_fixed
  statement: weighted quorum は approval structure の core tally semantics と extension registry detail を分離して形式化する。
  notation:
    Q_core: (eligible_voting_set_ref, counting_basis, threshold_rule, mandatory_role_set, veto_rule, abstention_rule, timeout_rule, tie_break_rule, weighted_tally_profile_ref_or_null)
    W_ext: (seat_weight_table_ref, apportionment_formula_ref, constituency_snapshot_ref, reapportionment_trigger, supermajority_profile_ref, minority_protection_profile_ref)
  boundary_rules:
  - counting_basis=seat_weight -> weighted_tally_profile_ref_or_null ≠ null
  - mandatory_role_set and blocking veto are evaluated before tally success
  - observer/auditor seats are excluded from voting weight and veto class
  - W_ext changes do not rewrite authority family or accountability owner
  routing_boundary: weighted quorum decides forum-internal tally; peer-level conflict routing remains governed by same-tier conflict rules
approval_accountability_split_model:
  status: provisional_fixed
  statement: 同一 responsibility object R では approval leg と accountability leg を別系列で形式化し、Approve(R)=true と Accountable(R)=true を独立に評価する。
  notation:
    R: (resp_id, target_ref, effect_zone_ref, A_leg, C_leg, state)
    A_leg: A = (approval_case_id, A_p^+, approval_outcome_ref, validity_window, invalidation_rule_ref, approval_event_refs)
    C_leg: C = (accountable_facet_set, primary_owner, co_owner_partition_or_null, residual_owner, rollback_owner, reflection_owner, liability_window, transfer_rule_ref)
    Approve(R,t): true iff approval outcome is fulfilled and valid at t
    Accountable(R,t): true iff every committed facet in effect_zone_ref has exactly one primary owner or an explicit partition cover with residual owner at t
  axioms:
  - Approve(R,t)=true does not imply Accountable(R,t)=true.
  - Accountable(R,t)=true does not imply Approve(R,t)=true.
  - joint approval may be represented in A_p^+; joint accountability is valid only when accountable_facet_set is explicitly partitioned and residual_owner is bound.
  - approval expiry / invalidation changes A_leg state but does not silently rewrite C_leg.
  - accountability transfer is a separate event; it never occurs by approval majority alone.
  well_formedness_rules:
  - commitment-sensitive facet ごとに primary_owner が一意であるか、co_owner_partition_or_null が facet cover を持ち residual_owner を持つこと。
  - rollback_owner と reflection_owner は target の effect_zone が rollback / explanation を伴う場合に必須である。
  - forum verdict, proxy approval, fallback approval は approval_event_refs にだけ入り、C_leg owner field へ暗黙流入してはならない。
  classification_rules:
    execute_ready: Approve(R,t)=true and Accountable(R,t)=true
    approval_accountability_split_gap: Approve(R,t)=true and Accountable(R,t)=false
    approval_wait: Approve(R,t)=false and Accountable(R,t)=true
    dual_gap: Approve(R,t)=false and Accountable(R,t)=false
same_frame_manual_redesign_typing_model:
  status: provisional_fixed
  statement: same-frame manual redesign operator は core type τ_sf と extension subtype ε_sf に分け、admissibility は parent core type の invariant 保存性で評価する。
  notation:
    core_type: τ_sf ∈ {route_substitution_within_bound_family, parameter_narrowing_or_safe_envelope, evidence_gate_strengthening, canonical_alignment_using_ratified_registry, rollback_monitoring_readiness_relayout}
    extension_subtype: ε_sf = (subtype_id, parent_core_type, domain_or_tool_scope_ref, local_parameter_schema_ref, verifier_schema_ref_or_null, status)
    typed_operator: δ = (operator_id, τ_sf, ε_sf_or_null, preserved_invariants_ref, authority_basis_ref, review_window, fallback_escalation_ref)
  typing_rules:
  - ε_sf is admissible only if parent_core_type = τ_sf and local parameters do not weaken preserved invariants.
  - typed_operator without τ_sf is invalid.
  - ε_sf may refine choreography or parameter schema, but may not introduce target replacement, role/accountability change, policy exception, or scope split.
  admissibility_rule: SR_typed(Φ,δ)=true iff τ_sf is one of the core types, preserved invariants hold, lawful basis exists, and ε_sf (if present) is active within scope.
deliberate_exploration_option_value_model:
  status: provisional_fixed
  statement: deliberate_exploration の継続可否は、semi-quant option tuple Ω_exp と charter cap により continue / bounded_continue / terminate_or_escalate を返す。
  notation:
    exploration_charter: Ξ = (objective_ref, owner_ref, allowed_actions_ref, review_window, budget_cap, risk_cap, exit_criteria_ref)
    option_tuple: Ω_exp = (disc_gain, branch_rel, reuse_val, rev_headroom, cost_burn, risk_burn)
    axis_scale: '{0,1,2,3}'
    continue_class: Cls(Ω_exp,Ξ) ∈ {continue, bounded_continue, terminate_or_escalate}
  classification_rules:
    continue: disc_gain>=2 and branch_rel>=2 and max(cost_burn,risk_burn)<=1 and review_window/budget_cap remain live
    bounded_continue: disc_gain>=1 and (branch_rel>=1 or reuse_val>=2) and risk_burn<=1 and no termination trigger has fired
    terminate_or_escalate: disc_gain=0 for consecutive reviews, or review_window expired, or budget_cap exceeded, or allowed_actions exhausted, or risk_burn=3
  exit_mapping:
  - resolved branch exists -> governance_converged
  - coexistence or split becomes ratified -> unresolved_plurality / split governance
  - same-frame blocker appears -> hold
  - lawful path absent or frame invalidated -> false
  - authority / registry / policy redesign required -> force_escalate
route_family_extension_boundary_model:
  status: provisional_fixed
  statement: route family core と ordered_fallback / weighted k_of_n overlay を分離し、overlay 依存 semantics は extension registry でのみ解釈する。
  notation:
    F_core: (modality, k_required, candidate_routes, local_bundle_ref, activation_conditions, incompatibility_ref, selection_scope_ref, alignment_rule_ref)
    OF_ext: (ordered_chain, fallback_activation_predicates, timeout_rule, exhaustion_escalation_ref)
    WK_ext: (route_weight_profile_ref, weight_threshold_rule, eligibility_freeze_ref, tie_break_rule)
    OverlayOK: true iff overlay refers only to candidate_routes already present in F_core and preserves obligation/effect/authority/accountability/rollback semantics
  axioms:
  - OF_ext does not redefine modality; it only orders already-lawful candidates.
  - WK_ext does not import approval forum seat weight; it only counts route selection weights on candidate_routes.
  - Core comparability is evaluated on F_core. If current action depends on OF_ext or WK_ext and no active overlay registry exists, comparability is not established.
  validity_rules:
  - OverlayOK=false implies extension invalid.
  - weighted threshold without route_weight_profile_ref is invalid.
  - ordered fallback without timeout/exhaustion semantics is incomplete when sequential activation is required.
externality_budget_numeric_calibration_model:
  status: provisional_fixed
  statement: externality budget の数値較正は profile baseline table と stricter-only context override の min-composition で与える。
  notation:
    BaseCap(profile, class): numeric_cap_table から引く baseline cap
    CtxCap(context): single_branch / external_irreversible / policy_sensitive などの stricter override
    EffCap(profile,class,context): min(BaseCap, CtxCap) on each comparable axis
    axes:
    - sink_cap_count
    - audience_cap_named_humans
    - artifact_kind_cap_count
    - review_due
    - expiry
    - purge_due_after_expiry
  rules:
  - EffCap never relaxes BaseCap.
  - review_due is a pre-expiry control point; expiry is post-validity reliance cutoff.
  - externalized_nonbinding and authoritative_or_committing remain non-isolation classes regardless of numeric cap.
