route_mapping_registry_model:
  status: provisional_fixed
  statement: route_mapping_registry_model は、partial-overlap route candidate 間で coverage equivalence を主張できる範囲を canonical route core への写像として規定し、shared-core coverage へ使える lawful mapping と、uncovered / incomparable_coverage へ落ちる場合を切り分ける形式化である。
  notation:
    route_candidate: ρ = (route_id, obligation_family_ref, semantic_facet_set, counting_basis_ref, exclusivity_ref, effect_zone_ref, authority_path_ref, accountability_family_ref, rollback_expectation_ref, local_bundle_ref)
    canonical_route_core: κ = (obligation_family_ref, preserved_facet_set, counting_basis_ref, exclusivity_ref, effect_zone_ref, authority_path_ref, accountability_family_ref, rollback_expectation_ref)
    mapping_rule: m = (source_route_ref, canonical_route_core_ref, relation_kind, preserved_facet_ref, residual_facet_ref, mapping_scope_ref, mapping_authority_ref, validity_window, revocation_rule_ref, status)
    relation_kind: Rel(m) ∈ {exact_equivalent, core_equivalent, dominance_only, incompatible, unmapped}
    action_support_profile: χ(a) = action a が coverage 主張に依拠する obligation / facet / effect_zone / authority / accountability / rollback requirement の集合
    lawful_mapped: LM(ρ,a,m,Φ)=true iff m.status=active ∧ Φ∈Scope(m) ∧ χ(a)⊆Preserved(m) ∧ Residual(m)∩Z(a)=∅ ∧ Auth/Acc/Rb が m により保存される
    mapped_shared_core: MSC(Φ,a)=true iff ∀x∈Λ(Φ)∪Ω(Φ), ∃m_x such that LM(ρ_x,a,m_x,Φ)=true ∧ Rel(m_x)∈{exact_equivalent, core_equivalent}
  axioms:
  - exact_equivalent と core_equivalent だけが shared-core coverage の候補 basis である。
  - core_equivalent は、current action が preserved core だけに依拠し、residual bundle が affected zone・authority/accountability・rollback expectation を変えないときに限って lawful mapped になる。
  - dominance_only は equivalence ではなく、別途 ratified な monotone strengthening rule がない限り shared-core coverage の basis にしない。
  - required facet に対する mapping rule が存在しない場合、coverage 欠如ではなく lawful comparison 不足として incomparable_coverage を返す。
  - mapping rule が active でも、current action が preserved core を超えて residual bundle に依拠する場合は uncovered を返す。
  classification_rules:
    exact_equivalent_conditions:
    - obligation_family_ref が同一、または ratified equivalence で結ばれている
    - semantic facet、counting_basis、exclusivity、effect_zone が current action に必要な範囲で一致している
    - authority_path、accountability_family、rollback_expectation が保存される
    core_equivalent_conditions:
    - preserved core が current action の support profile を完全に覆う
    - residual bundle が affected zone と branch-preserving basis の外側に隔離されている
    - residual bundle が authority/accountability/rollback expectation を変えない
    dominance_only_conditions:
    - 一方向の包含や強化は確認できるが、相互置換可能性がない
    - current action が weaker/stronger 側の residual 条件に依存する可能性が残る
    incompatible_conditions:
    - semantic obligation、counting_basis、exclusivity、effect_zone、authority/accountability/rollback expectation のいずれかが衝突する
    unmapped_conditions:
    - required facet に対する ratified mapping rule がない
    - unreflected outcome や local convention しか basis がない
  coverage_connection_rules:
  - MSC(Φ,a)=true のとき、CovKind(Φ,a)=shared_core を lawful mapped basis で主張できる。
  - required facet に unmapped が残るとき、CovKind(Φ,a)=incomparable_coverage とする。
  - mapping は active でも current action が residual bundle に触れる、または preserved core を超えるとき、CovKind(Φ,a)=uncovered とする。
  - dominance_only は shared_core を生まない。ratified monotone rule がなければ uncovered、rule も比較基盤も不足するなら incomparable_coverage とする。
  decision_ledger_schema_extension:
    fields:
    - mapping_rule_id
    - source_route_ref
    - canonical_route_core_ref
    - relation_kind
    - preserved_facet_ref
    - residual_facet_ref
    - mapping_scope_ref
    - mapping_authority_ref
    - validity_window
    - revocation_rule_ref
    - action_support_profile_ref
    - mapping_basis_status
    - review_window
    - successor_rule_ref
    - revalidation_requirements_ref
  graph_engine_events:
  - route_mapping_ratified
  - route_mapping_activated
  - route_mapping_superseded
  - route_mapping_revoked
  - action_coverage_mapped
  - action_coverage_mapping_invalidated
  - route_mapping_review_due
  - route_mapping_expired
  - route_mapping_revalidated
  residual_open_points:
  - ratified 済みだが未 reflected の outcome を provisional mapping basis としてどこまで許すか
  - 同一 authority tier 内の competing successor mapping の tie-break / veto 規則をどう与えるか
monotone_strengthening_model:
  status: provisional_fixed
  statement: monotone_strengthening_model は、dominance_only な stronger candidate または wider evidence route を shared-core coverage に昇格させず、protected facet 上の単調改善と prohibited facet 上の非拡張を満たす action だけを strengthening basis として許容する形式化である。
  notation:
    strengthening_rule: σ = (rule_id, dominance_basis_ref, strengthening_family, protected_facet_ref, prohibited_change_ref, validation_scope, authority_invariance_ref, accountability_invariance_ref, rollback_preservation_ref, effect_zone_invariance_ref, validity_window, status)
    protected_facet_set: Π(σ) = strengthening で non-decreasing を要求する facet 集合
    prohibited_change_set: Ν(σ) = 拡張・置換・希薄化を禁止する facet 集合
    monotonicity_witness: MW(a,σ)=true iff ∀p∈Π(σ), Eval_p(a_after) ⪰ Eval_p(a_before)
    non_expansion_witness: NW(a,σ)=true iff ∀n∈Ν(σ), footprint_after(n) ⊆ footprint_before(n)
    invariance_bundle: IV(σ,a)=true iff authority_path, accountability_family, rollback_expectation, effect_zone が a_before と a_after で保存される
    strengthening_admissible: SA(Φ,a,σ)=true iff σ.status=active ∧ Φ∈Scope(σ) ∧ MW(a,σ)=true ∧ NW(a,σ)=true ∧ IV(σ,a)=true
  axioms:
  - SA=true でも CovKind を shared_core に昇格させない。strengthening は coverage basis ではなく別系列の action admissibility basis である。
  - MW は protected facet の改善または不悪化を要求し、NW は authority/accountability/rollback/effect_zone を含む prohibited facet の拡張禁止を要求する。
  - dominance_only であっても σ が active でなければ strengthening admissible を主張できない。
  - wider evidence は evidence_gate_strengthening にのみ使え、obligation 緩和や required approval 削減の根拠に使ってはならない。
  - ratified だが未 reflected の σ は authoritative action justification に使えない。
  classification_rules:
    admissible_strengthening:
    - safety / monitoring / rollback readiness / evidence gate のいずれかに属する
    - MW, NW, IV がすべて真である
    - external irreversible commitment、branch collapse、policy-sensitive reduction、role reassignment を起こさない
    escalate_strengthening:
    - MW は示せるが IV の一部が authority owner 判定を要する
    - protected facet / prohibited facet の canonicalization が scope 内で未確定
    rejected_strengthening:
    - required approval を削減する
    - accountability owner を変更または希薄化する
    - rollback expectation を弱める
    - effect_zone を contested / external / irreversible 側へ拡張する
    incomparable_strengthening:
    - dominance_basis はあるが、Π または Ν に必要な registry rule が欠ける
    - 比較対象の witness を計算する canonical metric が未整備
  decision_ledger_schema_extension:
    fields:
    - strengthening_rule_id
    - dominance_basis_ref
    - strengthening_family
    - protected_facet_ref
    - prohibited_change_ref
    - monotonicity_witness_ref
    - non_expansion_witness_ref
    - authority_invariance_ref
    - accountability_invariance_ref
    - rollback_preservation_ref
    - effect_zone_invariance_ref
    - validation_scope
    - rule_status
    - review_window
    - successor_rule_ref
  graph_engine_events:
  - strengthening_rule_ratified
  - strengthening_rule_activated
  - strengthening_rule_superseded
  - strengthening_rule_revoked
  - strengthening_action_evaluated
  - strengthening_action_admitted
  - strengthening_action_escalated
  - strengthening_action_rejected
  residual_open_points:
  - monotonicity witness の canonical metric registry
  - wider evidence route の relation_kind 分離要否
  - 同一 authority tier 内の competing strengthening successor の tie-break / veto 規則
basis_lifecycle_model:
  status: provisional_fixed
  statement: basis_lifecycle_model は、coverage_basis、isolation_basis、route_mapping_basis の寿命管理を basis identity と scope continuity に基づいて形式化し、expiry・revocation・supersession・revalidation を q_decision と GraphEngine lifecycle event に接続するモデルである。
  notation:
    basis: b = (basis_id, basis_kind, basis_identity_ref, scope_ref, authority_basis_ref, validity_window, review_window, predecessor_basis_ref, successor_basis_ref, revocation_rule_ref, status)
    basis_status: BSt(b,t) ∈ {active, review_due, expired, revoked, superseded, revalidation_pending}
    required_basis_set: Req(Φ,a) = current action a が frame Φ で lawful reliance に必要とする basis の集合
    review_due: RD(b,t)=true iff t は validity_window 内にあり、review_due_at(b) に到達済みで、RevTrig(b,t)=false かつ Sup(b,t)=false
    expired: EX(b,t)=true iff t > end(validity_window(b)) または mandatory review が未完了のまま review_window を超過
    revoked: RV(b,e,t)=true iff e∈RevTrig(b) かつ authority(e) が revocation_rule_ref を満たす
    superseded: SS(b,b2,t)=true iff Succ(b)=b2 ∧ SameIdentity(b,b2)=true ∧ ComparableScope(b,b2)=true ∧ BSt(b2,t)=active
    revalidation_allowed: ReValOK(b,t)=true iff SameIdentity(b)=true ∧ SameScope(b)=true ∧ RevTrig(b,t)=false ∧ authority continuity がある
    prospective_reliance: Rel(Φ,a,t)=true iff ∀b∈Req(Φ,a), BSt(b,t)=active または (BSt(b,t)=review_due かつ a が branch-preserving local diagnostic / containment class に属する)
  axioms:
  - expired、revoked、superseded な basis は新規 prospective action の正当化に使えない。
  - review_due は grace-after-expiry ではなく pre-expiry cap であり、single_branch / external irreversible / policy-sensitive / accountability-shift action の reliance を許さない。
  - revalidation は explicit event と new validity_window / review_window を伴う。silent extension を許さない。
  - revoked basis は in-place に active へ戻らない。再利用するには successor entry または new version が必要である。
  - successor entry が current action を lawful に覆う場合だけ superseded basis から successor への差替えを許す。
  kind_specific_trigger_sets:
    coverage_basis:
    - live candidate / outcome set 変更
    - covered action family の scope逸脱
    - reflected coexistence / split / exploration charter の失効
    isolation_basis:
    - effect_zone の contested zone 侵入
    - authoritative/public/external への leak
    - rollback packet / owner / verification window の失効
    route_mapping_basis:
    - canonical core / preserved facet 変更
    - counting_basis / exclusivity / effect_zone mismatch 発見
    - mapping authority withdrawal or supersession
  q_decision_connection_rules:
  - Req(Φ,a) に revoked basis が含まれるとき、q_decision は 1 以下となり、containment / rollback / escalation path の有無で hold / escalate / false を分ける。
  - Req(Φ,a) に expired または revalidation_pending basis が含まれるとき、replacement または refresh が same-frame にあれば hold、なければ escalate または false とする。
  - Req(Φ,a) の一部が review_due でも、a が branch-preserving diagnostic / local containment に限られる場合は q_decision を 2 まで許しうる。
  - review_due basis を single_branch、external irreversible commitment、role/accountability rebinding の根拠に使う場合、q_decision は 1 以下に抑える。
  - successor basis が active で scope を覆うとき、旧 basis の superseded は blocker ではなく successor 差替えとして扱う。
  decision_ledger_schema_extension:
    fields:
    - basis_id
    - basis_kind
    - basis_identity_ref
    - basis_status
    - scope_ref
    - authority_basis_ref
    - validity_window
    - review_window
    - predecessor_basis_ref
    - successor_basis_ref
    - revocation_rule_ref
    - revocation_reason_code
    - revalidation_requirements_ref
    - last_reviewed_at
  graph_engine_events:
  - basis_review_due
  - basis_revalidation_requested
  - basis_revalidated
  - basis_expired
  - basis_revoked
  - basis_superseded
  - basis_descendant_invalidated
  - isolation_leak_detected
  residual_open_points:
  - profile 別の review / activation / emergency confirmation SLA をどこまで数値較正するか
registry_authority_delegation_model:
  status: provisional_fixed
  statement: registry_authority_delegation_model は、route mapping / strengthening / canonical registry entry に対する review・ratification・activation・supersession・revoke の required authority tier と SLA breach 分岐を、protected facet と blast radius に基づいて形式化するモデルである。
  notation:
    registry_artifact: ρ = (artifact_id, artifact_class, identity_ref, scope_ref, template_ref, semantic_delta_class, blast_radius_class, protected_facet_ref, lineage_ref, status)
    authority_tier: Τ ∈ {central_authority, domain_authority, delegated_reviewer}
    action_class: α ∈ {propose, review, ratify, activate, revalidate, supersede, emergency_suspend, revoke, reject}
    protected_facet_set: Π(ρ) = {semantic_family, counting_basis, exclusivity, effect_zone, authority_path, accountability_family, rollback_expectation}
    blast_radius_class: B(ρ) ∈ {template_local, domain_local, cross_domain, global_default}
    required_tier: ReqTier(ρ,α) = current artifact と action α に対して必要な最小 authority tier
    delegated_admissible: DelOK(ρ,α)=true iff α∈{review, activate, revalidate, emergency_suspend} ∧ B(ρ)∈{template_local, domain_local} ∧ semantic_delta_class(ρ)=none ∧ ProtectedInvariant(ρ)=true ∧ LineageComplete(ρ)=true
    predecessor_safe: PredSafe(ρ,t)=true iff predecessor entry が active かつ current action を lawful に覆う
    sla_clock: SLA(ρ,α) = (submitted_at, due_at, breached_at, confirmation_due_at)
    emergency_suspended: ES(ρ,t)=true iff emergency_suspend event が出ており、confirm / release / revoke のいずれも未完了
  axioms:
  - ReqTier(ρ,α)=central_authority となるのは、cross_domain または global_default の artifact、あるいは semantic family・counting_basis・exclusivity・effect_zone・authority_path・accountability_family・rollback_expectation のいずれかを non-preserving に変更する action である。
  - ReqTier(ρ,α)=domain_authority となるのは、existing canonical core と ratified template を用い、protected facet を保存したまま domain-local scope で ratify / activate / supersede / revoke する action である。
  - ReqTier(ρ,α)=delegated_reviewer を許すのは、review、template-bound activation、same identity / same scope revalidation、および provisional emergency suspend だけである。
  - ratified だが未 activated / 未 reflected の artifact は authoritative reliance basis ではなく、ProspectiveRel(ρ,t)=false とみなす。
  - ES(ρ,t)=true の間、当該 artifact に依拠する prospective action は停止し、confirm / release / revoke が confirmation_due_at までに完了しなければ breach 扱いとする。
  - SLA breach は silent extension を許さず、PredSafe(ρ,t)、same-frame remedy、upper authority path、decision deadline の交差で hold / escalate / false を返す。
  tier_rules:
    central_authority:
      required_when:
      - cross-domain conversion rule または canonical route core の新設・変更
      - semantic facet / counting_basis / exclusivity の再解釈
      - authority/accountability/rollback expectation の再束縛
      - global default strengthening family の導入・変更
      - 複数 domain を横断する revoke / supersession dispute
    domain_authority:
      allowed_when:
      - 既存 canonical registry を参照し protected facet を保存する domain-local route mapping
      - central ratified template の範囲内にある domain-local strengthening rule
      - same identity かつ same or narrower scope の canonical registry successor entry
      - domain scope 内の final revoke
      forbidden_when:
      - cross-domain conversion rule の新設
      - global canonical core の変更
      - authority/accountability rebinding
      - rollback expectation の弱化
      - external irreversible commitment を default 許容する緩和
    delegated_reviewer:
      allowed_when:
      - evidence completeness / scope fit / invariance witness / lineage 整合の review
      - pre-ratified template と zero semantic delta を満たす entry の activation
      - same identity・same scope・no revocation trigger の revalidation
      - suspected leak / authority drift / semantic mismatch / policy contradiction に対する provisional emergency suspend
      forbidden_when:
      - 新規 semantic rule の ratification
      - final revoke の単独確定
      - cross-domain / global_default artifact の supersession
      - unregistered convention を lawful basis として承認すること
